    seoHtml:`<h2>Canonical 태그란?</h2><p><strong>rel=canonical</strong>은 검색 엔진에 "이 페이지의 정규(대표) URL은 여기다"라고 알려주는 HTML 링크 태그입니다. 동일·유사한 콘텐츠가 여러 URL에서 접근 가능할 때 <strong>중복 콘텐츠 문제를 방지</strong>하고 링크 에퀴티를 하나의 URL로 집중시킵니다. &lt;head&gt; 섹션에 <code>&lt;link rel="canonical" href="https://example.com/page"&gt;</code> 형식으로 추가합니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>Canonical 태그가 없으면 어떻게 되나요?</summary><p>검색 엔진이 여러 URL 중 정규 버전을 임의로 선택합니다. www/non-www, http/https, 파라미터 포함 URL 등이 별도 페이지로 인식되어 링크 에퀴티가 분산됩니다. SEO 순위에 부정적 영향을 줄 수 있습니다.</p></details>
<details class="faq-item"><summary>자기 참조(self-referencing) Canonical이란?</summary><p>페이지 A의 canonical이 페이지 A 자신을 가리키는 경우입니다. 이는 정상적인 패턴이며, "이 URL이 정규 버전임"을 명시적으로 선언하는 SEO 모범 사례입니다. 크로스 도메인 canonical과 달리 기본적으로 권장됩니다.</p></details>
<details class="faq-item"><summary>다중 Canonical 태그는 왜 문제가 되나요?</summary><p>하나의 페이지에 canonical 태그가 2개 이상 있으면 Google은 두 태그를 모두 무시합니다. CMS 플러그인 충돌, 테마 중복 출력 등으로 발생할 수 있습니다. 반드시 1개만 유지하세요.</p></details>
<details class="faq-item"><summary>HTTP와 HTTPS canonical 차이는?</summary><p>canonical URL은 반드시 HTTPS를 사용해야 합니다. HTTP canonical을 설정하면 HTTPS 페이지임에도 HTTP 버전을 정규 URL로 선언하는 모순이 생겨 SEO에 해롭습니다.</p></details>
<details class="faq-item"><summary>Canonical과 301 리디렉션의 차이는?</summary><p>301은 브라우저와 검색 엔진 모두를 새 URL로 실제 이동시킵니다. Canonical은 검색 엔진에만 "정규 URL"을 힌트로 알려주는 신호입니다. 가능하면 301을 사용하고, 같은 콘텐츠를 여러 URL로 노출해야 하는 경우 canonical을 사용하세요.</p></details>
<details class="faq-item"><summary>상대 경로 Canonical도 유효한가요?</summary><p>Google은 상대 경로 canonical도 지원합니다. 그러나 절대 URL(https://example.com/page)을 사용하는 것이 모호성을 줄이고 크로스 도메인 canonical에서도 정확히 작동하므로 권장됩니다.</p></details>
<details class="faq-item"><summary>Canonical 태그와 sitemap의 관계는?</summary><p>sitemap.xml에는 canonical URL만 포함시키는 것이 원칙입니다. non-canonical URL이 sitemap에 있으면 검색 엔진에 혼란을 줄 수 있습니다. canonical과 sitemap을 일관되게 유지하면 크롤 효율이 높아집니다.</p></details>

<h2 class="seo-sub">Frequently Asked Questions</h2>
<details class="faq-item"><summary>What happens if there is no canonical tag?</summary><p>Search engines will choose a canonical version themselves, often picking the wrong one. www vs non-www, http vs https, and URLs with query parameters may all be indexed separately, splitting link equity and potentially hurting rankings.</p></details>

const LANGS=['ko','en','zh','ja'];
let _lang='ko';
let _activeTab='url';

function detectLang(){
  const u=new URLSearchParams(location.search).get('lang');
  if(u&&_i18n[u])return u;
  const s=localStorage.getItem('modoo_lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language?.slice(0,2);
  return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';
}

function cycleLang(){
  const idx=LANGS.indexOf(_lang);
  _lang=LANGS[(idx+1)%LANGS.length];
  localStorage.setItem('modoo_lang',_lang);
  const url=new URL(location.href);
  url.searchParams.set('lang',_lang);
  history.replaceState({},'',url);
  applyLang();
}

function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.title=t.pageTitle;
  document.getElementById('h1Span').textContent=t.h1Span;
  document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('tabUrl').textContent=t.tabUrl;
  document.getElementById('tabHtml').textContent=t.tabHtml;
  document.getElementById('labelUrl').textContent=t.labelUrl;
  document.getElementById('labelHtml').textContent=t.labelHtml;
  document.getElementById('htmlInput').placeholder=t.htmlPlaceholder;
  document.getElementById('btnAnalyzeUrl').textContent=t.btnAnalyze;
  document.getElementById('btnClearUrl').textContent=t.btnClear;
  document.getElementById('btnAnalyzeHtml').textContent=t.btnAnalyze;
  document.getElementById('btnClearHtml').textContent=t.btnClear;
  document.getElementById('labelChecks').textContent=t.labelChecks;
  document.getElementById('corsWarn').textContent=t.corsWarn;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}

function switchTab(tab){
  _activeTab=tab;
  document.getElementById('tabUrl').className='tab'+(tab==='url'?' active':'');
  document.getElementById('tabHtml').className='tab'+(tab==='html'?' active':'');
  document.getElementById('panelUrl').className='tab-panel'+(tab==='url'?' active':'');
  document.getElementById('panelHtml').className='tab-panel'+(tab==='html'?' active':'');
}

function onUrlInput(){
  // nothing needed
}

function clearAll(){
  document.getElementById('urlInput').value='';
  document.getElementById('htmlInput').value='';
  document.getElementById('resultsArea').className='results';
}

async function analyzeUrl(){
  const url=document.getElementById('urlInput').value.trim();
  if(!url)return;
  const t=_i18n[_lang];
  const btn=document.getElementById('btnAnalyzeUrl');
  btn.textContent=t.loading;btn.disabled=true;
  try{
    const proxyUrl='https://api.allorigins.win/get?url='+encodeURIComponent(url);
    const resp=await fetch(proxyUrl);
    const data=await resp.json();
    if(data&&data.contents){
      runAnalysis(data.contents, url);
    }else{
      alert(t.fetchError);
    }
  }catch(e){
    alert(t.fetchError);
  }finally{
    btn.textContent=t.btnAnalyze;btn.disabled=false;
  }
}

function analyzeHtml(){
  const html=document.getElementById('htmlInput').value.trim();
  if(!html)return;
  runAnalysis(html,'');
}

function runAnalysis(html, pageUrl){
  const t=_i18n[_lang];
  const checks=t.checks;

  // Parse canonical tags using regex (handle both case variants)
  const canonicalRe=/<link[^>]+rel=["']canonical["'][^>]*>/gi;
  const hrefRe=/href=["']([^"']*)["']/i;
  const tags=[...html.matchAll(canonicalRe)];
  const canonicals=tags.map(m=>{
    const h=m[0].match(hrefRe);
    return h?h[1]:'';
  });

  const items=[];
  let failCount=0;let warnCount=0;

  // Check 1: Present?
  if(canonicals.length===0){
    items.push({type:'fail',badge:checks.present.fail,title:checks.present.failDesc,url:null});
    failCount++;
  }else{
    items.push({type:'pass',badge:checks.present.pass,title:checks.present.passDesc,url:canonicals[0]});
  }

  if(canonicals.length>0){
    // Check 2: Count
    if(canonicals.length>1){
      items.push({type:'warn',badge:checks.count.warn,title:checks.count.warnDesc.replace('{n}',canonicals.length),url:null});
      warnCount++;
    }else{
      items.push({type:'pass',badge:checks.count.pass,title:checks.count.passDesc,url:null});
    }

    const href=canonicals[0];

    // Check 3: empty href
    if(!href){
      items.push({type:'fail',badge:checks.empty.fail,title:checks.empty.failDesc,url:null});
      failCount++;
    }else{
      items.push({type:'pass',badge:checks.empty.pass,title:checks.empty.passDesc,url:null});

      // Check 4: HTTPS
      if(href.startsWith('http://')){
        items.push({type:'warn',badge:checks.https.warn,title:checks.https.warnDesc,url:null});
        warnCount++;
      }else if(href.startsWith('https://')){
        items.push({type:'pass',badge:checks.https.pass,title:checks.https.passDesc,url:null});
      }

      // Check 5: trailing slash info
      const hasTrail=href.endsWith('/');
      items.push({type:'info',badge:'INFO',title:(hasTrail?'Trailing slash present':'No trailing slash')+' — '+checks.trailing[hasTrail?'passDesc':'warnDesc'],url:null});
    }
  }

  // Score
  let scoreClass,scoreText,scoreDesc;
  if(canonicals.length===0){
    scoreClass='bad';scoreText='✗';scoreDesc=t.descMissing;
  }else if(failCount>0){
    scoreClass='bad';scoreText='✗';scoreDesc=t.descBad;
  }else if(warnCount>0){
    scoreClass='ok';scoreText='!';scoreDesc=t.descOk;
  }else{
    scoreClass='good';scoreText='✓';scoreDesc=t.scoreGood+' — '+t.descGood;
  }

  const sc=document.getElementById('scoreCircle');
  sc.className='score-circle '+scoreClass;
  sc.textContent=scoreText;
  document.getElementById('scoreDesc').textContent=scoreDesc;

  const list=document.getElementById('checkList');
  list.innerHTML='';
  items.forEach(item=>{
    const div=document.createElement('div');
    div.className='check-item '+item.type;
    let html2=`<span class="check-badge ${item.type}">${escHtml(item.badge)}</span><div class="check-text"><span>${escHtml(item.title)}</span>`;
    if(item.url){html2+=`<div class="canonical-url">${escHtml(item.url)}</div>`;}
    html2+='</div>';
    div.innerHTML=html2;
    list.appendChild(div);
  });

  document.getElementById('resultsArea').className='results show';
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

_lang=detectLang();
applyLang();
</script>
