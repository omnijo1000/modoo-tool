}
const DAYS_KO=['일','월','화','수','목','금','토'];
const DAYS_EN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_ZH=['日','一','二','三','四','五','六'];
const DAYS_JA=['日','月','火','水','木','金','土'];
function getDays(){return _lang==='ko'?DAYS_KO:_lang==='zh'?DAYS_ZH:_lang==='ja'?DAYS_JA:DAYS_EN;}
function relTime(ms){const s=Math.abs(ms/1000);const past=ms<0;const fmt=s<60?`${Math.round(s)}s`:s<3600?`${Math.round(s/60)}m`:s<86400?`${Math.round(s/3600)}h`:`${Math.round(s/86400)}d`;return past?`+${fmt} ago`:fmt==='0s'?'now':`-${fmt}`;}
function fmtDate(d,tz){if(tz==='local'||!tz)return d.toLocaleString();if(tz==='UTC')return d.toUTCString();try{return d.toLocaleString(undefined,{timeZone:tz})+' ('+tz+')';}catch{return d.toLocaleString();}}
function copyVal(v){navigator.clipboard.writeText(v).catch(()=>{});}
function resultHtml(items){return items.map(([l,v])=>`<div class="result-item"><div class="result-label">${l}</div><div class="result-val" onclick="copyVal('${v.replace(/'/g,"\\'")}');">${v}</div></div>`).join('');}
function epochToDate(){
  const t=_i18n[_lang];const raw=document.getElementById('epochIn').value.trim();const tz=document.getElementById('tz1').value;
  document.getElementById('epochErr').textContent='';document.getElementById('epochResult').innerHTML='';
  if(!raw)return;
  let n=parseFloat(raw);if(isNaN(n)){document.getElementById('epochErr').textContent=t.errInvalid;return;}
  if(Math.abs(n)>1e12)n=n/1000;
  const d=new Date(n*1000);if(isNaN(d.getTime())){document.getElementById('epochErr').textContent=t.errInvalid;return;}
  const items=[[t.labels.local,fmtDate(d,'local')],[t.labels.utc,d.toUTCString()],[t.labels.iso,d.toISOString()],[t.labels.day,getDays()[d.getDay()]],[t.labels.relative,relTime(Date.now()-d.getTime())],[t.labels.ms,String(Math.round(n*1000))],[t.labels.epochMs,String(Math.round(n*1000))]];
  if(tz!=='local'&&tz!=='UTC')items.splice(0,0,[tz,fmtDate(d,tz)]);
  document.getElementById('epochResult').innerHTML=resultHtml(items);
}
function dateToEpoch(){
  const t=_i18n[_lang];const raw=document.getElementById('dateIn').value;
  document.getElementById('dateErr').textContent='';document.getElementById('dateResult').innerHTML='';
  if(!raw)return;
  const d=new Date(raw);if(isNaN(d.getTime())){document.getElementById('dateErr').textContent=t.errDate;return;}
  const sec=Math.floor(d.getTime()/1000);const ms=d.getTime();
  const items=[[t.labels.epoch,String(sec)],[t.labels.epochMs,String(ms)],[t.labels.iso,d.toISOString()],[t.labels.utc,d.toUTCString()],[t.labels.day,getDays()[d.getDay()]]];
  document.getElementById('dateResult').innerHTML=resultHtml(items);
}
function useNow(){document.getElementById('epochIn').value=Math.floor(Date.now()/1000);epochToDate();}
function updateNow(){
  const now=Date.now();const sec=Math.floor(now/1000);
  document.getElementById('nowEpoch').textContent=sec;
  document.getElementById('nowHuman').textContent=new Date(now).toLocaleString();
}
setInterval(updateNow,1000);updateNow();
// init date input to now
const nowDt=new Date();const pad=n=>String(n).padStart(2,'0');
document.getElementById('dateIn').value=`${nowDt.getFullYear()}-${pad(nowDt.getMonth()+1)}-${pad(nowDt.getDate())}T${pad(nowDt.getHours())}:${pad(nowDt.getMinutes())}`;
_lang=detectLang();applyLang();
</script>
