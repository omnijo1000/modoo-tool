  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','btnExtract','btnSample','btnCopy','btnCsv','lblOpts','emptyMsg'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('filterIn').placeholder=t.filterPh;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  renderTable();
}
function parseXml(xml){
  try{
    const parser=new DOMParser();const doc=parser.parseFromString(xml,'application/xml');
    if(doc.querySelector('parsererror'))return null;
    const urls=[];
    doc.querySelectorAll('url,sitemap').forEach(el=>{
      const loc=el.querySelector('loc');
      if(!loc)return;
      const lastmod=el.querySelector('lastmod');
      const priority=el.querySelector('priority');
      const changefreq=el.querySelector('changefreq');
      urls.push({url:loc.textContent.trim(),lastmod:lastmod?lastmod.textContent.trim():'',priority:priority?parseFloat(priority.textContent.trim()):'',changefreq:changefreq?changefreq.textContent.trim():''});
    });
    return urls;
  }catch{return null;}
}
function extract(){
  const xml=document.getElementById('xmlIn').value.trim();
  if(!xml){_rows=[];renderTable();return;}
  const rows=parseXml(xml);
  if(!rows){alert('XML 파싱 오류');return;}
  _rows=rows;renderTable();
}
function renderTable(){
  const t=_i18n[_lang];
  const filter=document.getElementById('filterIn').value.toLowerCase();
  const showLastmod=document.getElementById('chkLastmod').checked;
  const showPrio=document.getElementById('chkPrio').checked;
  const showFreq=document.getElementById('chkFreq').checked;
  const filtered=filter?_rows.filter(r=>r.url.toLowerCase().includes(filter)):_rows;
  const highCount=_rows.filter(r=>parseFloat(r.priority)>=0.8).length;
  document.getElementById('statTotal').textContent=_rows.length;
  document.getElementById('statFiltered').textContent=filtered.length;
  document.getElementById('statHigh').textContent=highCount;
  document.getElementById('statsBar').style.display=_rows.length?'flex':'none';
  document.getElementById('lblTotal').textContent=t.lblTotal;
  document.getElementById('lblFiltered').textContent=t.lblFiltered;
  if(!_rows.length){document.getElementById('resultsBox').innerHTML=`<div class="empty-msg" id="emptyMsg">${t.emptyMsg}</div>`;return;}
  if(!filtered.length){document.getElementById('resultsBox').innerHTML=`<div class="empty-msg">${filter?'필터 결과 없음':'데이터 없음'}</div>`;return;}
  let html=`<table class="tbl"><thead><tr><th>${t.thIdx}</th><th>${t.thUrl}</th>`;
  if(showLastmod)html+=`<th>${t.thLastmod}</th>`;
  if(showPrio)html+=`<th>${t.thPrio}</th>`;
  if(showFreq)html+=`<th>${t.thFreq}</th>`;
  html+=`</tr></thead><tbody>`;
  filtered.forEach((r,i)=>{
    const pc=r.priority>=0.8?'prio-high':r.priority>=0.5?'prio-mid':'prio-low';
    html+=`<tr><td>${i+1}</td><td><a href="${r.url}" target="_blank" class="url-cell">${r.url}</a></td>`;
    if(showLastmod)html+=`<td>${r.lastmod||'—'}</td>`;
    if(showPrio)html+=`<td class="${pc}">${r.priority!==''?r.priority:'—'}</td>`;
    if(showFreq)html+=`<td>${r.changefreq||'—'}</td>`;
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  document.getElementById('resultsBox').innerHTML=html;
}
function copyUrls(){
  if(!_rows.length)return;
  const filter=document.getElementById('filterIn').value.toLowerCase();
  const filtered=filter?_rows.filter(r=>r.url.toLowerCase().includes(filter)):_rows;
  navigator.clipboard.writeText(filtered.map(r=>r.url).join('\n'));
}
function downloadCsv(){
  if(!_rows.length)return;
  const rows=[['URL','lastmod','priority','changefreq'],..._rows.map(r=>[r.url,r.lastmod,r.priority,r.changefreq])];
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='sitemap-urls.csv';a.click();
}
function loadSample(){
  document.getElementById('xmlIn').value=`<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
  <url><loc>https://example.com/</loc><lastmod>2026-06-01</lastmod><changefreq>daily</changefreq><priority>1.0</priority></url>
  <url><loc>https://example.com/about</loc><lastmod>2026-05-15</lastmod><changefreq>monthly</changefreq><priority>0.8</priority></url>
  <url><loc>https://example.com/blog</loc><lastmod>2026-06-10</lastmod><changefreq>weekly</changefreq><priority>0.9</priority></url>
  <url><loc>https://example.com/blog/seo-guide</loc><lastmod>2026-06-05</lastmod><changefreq>monthly</changefreq><priority>0.7</priority></url>
  <url><loc>https://example.com/tools/keyword-tool</loc><lastmod>2026-04-20</lastmod><changefreq>monthly</changefreq><priority>0.6</priority></url>
  <url><loc>https://example.com/contact</loc><lastmod>2026-01-01</lastmod><changefreq>yearly</changefreq><priority>0.3</priority></url>
</urlset>`;
  extract();
}
_lang=detectLang();applyLang();
</script>
