let curCat = 'length';

function setCat(cat, btn) {
  curCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  populateUnits();
  convert();
}

function populateUnits() {
  const c = categories[curCat];
  const lang = (typeof _lang !== 'undefined' && _lang) ? _lang : 'en';
  const f = document.getElementById('fromUnit');
  const t = document.getElementById('toUnit');
  f.innerHTML = c.units.map((u,i)=>`<option value="${i}">${u}</option>`).join('');
  t.innerHTML = c.units.map((u,i)=>`<option value="${i}" ${i===1?'selected':''}>${u}</option>`).join('');
  // quick refs (localized)
  const refs = (refsI18n[lang] && refsI18n[lang][curCat]) ? refsI18n[lang][curCat] : c.refs;
  document.getElementById('quickRefs').innerHTML = refs.map(r=>`<div class="qr-item">${r}</div>`).join('');
}

function convertTemp(val, fromIdx, toIdx) {
  // to celsius first
  let c;
  if(fromIdx===0) c=val;
  else if(fromIdx===1) c=(val-32)*5/9;
  else c=val-273.15;
  // from celsius to target
  if(toIdx===0) return c;
  if(toIdx===1) return c*9/5+32;
  return c+273.15;
}

function convert() {
  const c = categories[curCat];
  const fi = parseInt(document.getElementById('fromUnit').value);
  const ti = parseInt(document.getElementById('toUnit').value);
  const val = parseFloat(document.getElementById('inputVal').value);
  if(isNaN(val)) { document.getElementById('resultVal').textContent='-'; return; }
  let result;
  if(curCat==='temp') {
    result = convertTemp(val,fi,ti);
  } else {
    const base = val * c.toBase[fi];
    result = base / c.toBase[ti];
  }
  const disp = Math.abs(result) >= 0.001 ? result.toPrecision(6).replace(/\.?0+$/,'') : result.toExponential(4);
  document.getElementById('resultVal').textContent = disp;
  document.getElementById('resultUnit').textContent = c.units[fi] + ' → ' + c.units[ti];
}

function swap() {
  const f = document.getElementById('fromUnit');
  const t = document.getElementById('toUnit');
  const tmp = f.value; f.value = t.value; t.value = tmp;
  convert();
}

// init
populateUnits();
convert();
</script>

    faqH3:'자주 묻는 질문',
    faqList:`<details class="faq-item"><summary>Q. 1마일은 몇 킬로미터인가요?</summary><p>1 mile = 1.60934 km (정확값: 1.609344). 반대로 1 km ≈ 0.6214 mile. 미국 도로 표지판은 마일 기준이므로 여행 시 자주 사용되는 변환입니다.</p></details><details class="faq-item"><summary>Q. 인치(inch)를 cm로 어떻게 변환하나요?</summary><p>1 inch = 2.54 cm (정확값). cm → inch는 ÷2.54. 1 foot = 12 inch = 30.48 cm. 예: 6 feet = 182.88 cm.</p></details><details class="faq-item"><summary>Q. 화씨(°F)를 섭씨(°C)로 변환하는 공식은?</summary><p>°C = (°F − 32) × 5/9. 반대로 °F = °C × 9/5 + 32. 기억하기 쉬운 기준: 0°C=32°F, 100°C=212°F, 37°C=98.6°F(체온), 20°C=68°F(실온).</p></details><details class="faq-item"><summary>Q. 1파운드(lb)는 몇 킬로그램인가요?</summary><p>1 lb = 0.453592 kg. 1 kg = 2.20462 lb. 1 oz(온스) = 28.3495 g. 미국 요리 레시피에서 자주 등장합니다. 1 stone(영국) = 14 lb = 6.35 kg.</p></details><details class="faq-item"><summary>Q. 평(坪)을 m²로 변환하려면?</summary><p>1평 = 3.30579 m². 33평 아파트 ≈ 109 m². 반대로 1 m² ≈ 0.3025평. 1 acre = 4,046.86 m² = 약 1,224평.</p></details><details class="faq-item"><summary>Q. km/h를 mph로 변환하는 방법은?</summary><p>1 km/h = 0.621371 mph. 1 mph = 1.60934 km/h. 빠른 암산: km/h ÷ 1.6 ≈ mph. 예: 100 km/h ≈ 62 mph, 120 km/h ≈ 75 mph.</p></details><details class="faq-item"><summary>Q. GB와 GiB(기비바이트)는 다른가요?</summary><p>GB(기가바이트) = 10억 바이트(10⁹). GiB(기비바이트) = 2³⁰ = 1,073,741,824 바이트. 윈도우 파일 탐색기는 GiB를 GB로 표기해 혼선이 생깁니다. 500 GB SSD의 실제 파일 시스템 표시 용량은 약 465 GiB.</p></details><details class="faq-item"><summary>Q. 절대 온도(켈빈, K)는 무엇인가요?</summary><p>K = °C + 273.15. 0 K = 절대 영도(-273.15°C), 이론적으로 가장 낮은 온도. 과학·공학 계산에 주로 사용. 물은 273.15 K에서 얼고 373.15 K에서 끓습니다.</p></details><details class="faq-item"><summary>Q. 면적 단위 에이커(acre)와 헥타르(ha)는?</summary><p>1 acre = 4,046.86 m² ≈ 1,224평. 1 hectare(ha) = 10,000 m² = 2.471 acres. 미국 농지는 에이커, 국제 표준은 헥타르로 표기합니다.</p></details><details class="faq-item"><summary>Q. 노트(knot)는 무엇인가요?</summary><p>1 knot(노트) = 1 해리/시간 = 1.852 km/h = 1.151 mph. 항공·항해에서 사용하는 속도 단위. 100 knot ≈ 185.2 km/h (항공기 이착륙 속도 범위).</p></details><details class="faq-item"><summary>Q. 미터법과 야드-파운드법의 차이는?</summary><p>미터법(SI): km·m·cm·kg·g·°C — 대부분의 국가 사용. 야드-파운드법: mile·yard·foot·inch·lb·oz·°F — 미국·미얀마·라이베리아 공식 사용. 영국은 도로에서 마일을 쓰지만 과학·의료에는 미터법 사용.</p></details><details class="faq-item"><summary>Q. 요리할 때 단위 변환이 필요한 경우는?</summary><p>미국 레시피: cup(240 ml), tablespoon(15 ml), teaspoon(5 ml), oz(28.35 g), lb(453.6 g). 온도: 오븐 350°F = 177°C, 400°F = 204°C. 영국 레시피: stone/oz 무게 단위. 이 변환기의 무게·부피 탭으로 빠르게 계산하세요.</p></details>`,
    ucLength:'📏 길이', ucWeight:'⚖️ 무게', ucTemp:'🌡️ 온도', ucArea:'📐 면적', ucSpeed:'💨 속도', ucData:'💾 데이터', ucSwap:'⇆ 단위 교환' },
  en: { lang:'en', title:'Unit Converter - Length, Weight, Temperature, Area | Free Online Tool', h1:'Unit <span>Converter</span>', sub:'Instantly convert length, weight, temperature, area and more.', btn:'🌐 中文', from:'From', to:'To', input:'Value',
    seoH:'Unit Converter — Complete Reference',
    seoP1:'Instantly convert between metric and imperial units across length, weight, temperature, area, speed, and data storage. Key conversions: 1 km = 0.6214 mile, 1 kg = 2.2046 lb, 0°C = 32°F, 1 m² = 10.764 ft², 1 GB = 1,024 MB. Temperature formulas: °C→°F: multiply by 9/5 then add 32; °F→°C: subtract 32 then multiply by 5/9; °C→K: add 273.15. The metric system (SI) is used by most countries; the US, Myanmar, and Liberia officially use the imperial/customary system. This tool is essential for international travel, global recipes, engineering, and science.',
    exH3:'Usage Examples',
    exList:'<li>Convert US body weight 170 lbs → kg (≈77.1 kg)</li><li>Convert height 5 ft 9 in → cm (≈175.3 cm)</li><li>Convert US highway speed 65 mph → km/h (≈104.6 km/h)</li><li>Convert apartment size 1,000 ft² → m² (≈92.9 m²)</li><li>Convert fever temperature 100.4°F → °C (38°C)</li><li>Convert cloud storage 500 GB → TB (≈0.49 TB)</li>',
    faqH3:'Frequently Asked Questions',
    faqList:`<details class="faq-item"><summary>Q. How many km in a mile?</summary><p>1 mile = 1.60934 km (exact: 1.609344). Conversely, 1 km ≈ 0.6214 miles. US road signs use miles — when visiting, divide by 1.6 for a quick km estimate.</p></details><details class="faq-item"><summary>Q. How many cm in an inch?</summary><p>1 inch = 2.54 cm exactly. To convert cm to inches, divide by 2.54. 1 foot = 12 inches = 30.48 cm. Example: 6 feet = 182.88 cm.</p></details><details class="faq-item"><summary>Q. How do I convert Fahrenheit to Celsius?</summary><p>°C = (°F − 32) × 5/9. To reverse: °F = °C × 9/5 + 32. Handy landmarks: 32°F=0°C (freezing), 98.6°F=37°C (body temp), 212°F=100°C (boiling), 68°F=20°C (room temp).</p></details><details class="faq-item"><summary>Q. How many kg in a pound?</summary><p>1 lb = 0.453592 kg. 1 kg = 2.20462 lb. 1 ounce = 28.3495 g. Common in US recipes and body weight. 1 stone (UK) = 14 lb = 6.35 kg.</p></details><details class="faq-item"><summary>Q. How do I convert square feet to square meters?</summary><p>1 ft² = 0.092903 m². Multiply ft² by 0.0929 to get m². Example: 1,000 ft² ≈ 92.9 m². To reverse: multiply m² by 10.764.</p></details><details class="faq-item"><summary>Q. How do I convert km/h to mph?</summary><p>1 km/h = 0.621371 mph. Quick estimate: divide km/h by 1.6. Example: 100 km/h ≈ 62 mph, 120 km/h ≈ 75 mph. Reverse: multiply mph by 1.609.</p></details><details class="faq-item"><summary>Q. What is the difference between GB and GiB?</summary><p>GB (gigabyte) = 1,000,000,000 bytes (10⁹). GiB (gibibyte) = 2³⁰ = 1,073,741,824 bytes. Storage manufacturers use GB; Windows shows GiB labeled as GB — hence a 500 GB SSD shows ~465 GB in Windows.</p></details><details class="faq-item"><summary>Q. What is Kelvin (K) and when is it used?</summary><p>K = °C + 273.15. Absolute zero is 0 K = −273.15°C, the coldest possible temperature. Used in physics, chemistry, and engineering. Water freezes at 273.15 K and boils at 373.15 K.</p></details><details class="faq-item"><summary>Q. What is the difference between an acre and a hectare?</summary><p>1 acre = 4,046.86 m². 1 hectare (ha) = 10,000 m² = 2.471 acres. US uses acres for land area; most other countries use hectares. 1 km² = 100 ha = 247.1 acres.</p></details><details class="faq-item"><summary>Q. What is a knot?</summary><p>1 knot = 1 nautical mile/hour = 1.852 km/h = 1.151 mph. Used in aviation and maritime navigation. Typical cruising speed for large aircraft: 450–550 knots (≈830–1,020 km/h).</p></details><details class="faq-item"><summary>Q. Which countries still use the imperial system?</summary><p>The US, Myanmar, and Liberia are the only countries that have not officially adopted the metric system (SI). The UK uses a hybrid — metric for most things but miles for road distances and pints for beer.</p></details><details class="faq-item"><summary>Q. How do I convert recipe measurements from US to metric?</summary><p>1 cup = 240 ml (liquid). 1 tablespoon = 15 ml, 1 teaspoon = 5 ml. 1 oz = 28.35 g, 1 lb = 453.6 g. Oven: 350°F = 177°C, 400°F = 204°C, 425°F = 218°C. Use the weight tab in this converter for ingredient conversions.</p></details>`,

  zh: { lang:'zh', title:'单位换算器 - 长度·重量·温度·面积换算 | 免费', h1:'单位 <span>换算器</span>', sub:'即时换算长度、重量、温度、面积等单位。', btn:'🌐 日本語', from:'换算前', to:'换算后', input:'输入值',
    seoH:'单位换算完全指南',
    seoP1:'单位换算器支持长度、重量、温度、面积、速度和数据存储等多种计量单位的即时转换。常用换算：1 km = 0.6214 英里，1 kg = 2.2046 磅，0°C = 32°F，1 m² = 10.764 ft²，1 GB = 1,024 MB。温度换算公式：°C→°F：乘以9/5再加32；°F→°C：减32再乘以5/9；°C→K：加273.15。全球大多数国家使用公制（SI），美国、缅甸、利比里亚官方使用英制。本工具是国际旅行、海外食谱换算、工程计算的必备工具。',

    faqH3:'常见问题',
    faqList:`<details class="faq-item"><summary>Q. 1英里等于多少公里？</summary><p>1英里 = 1.60934 km（精确值：1.609344）。反之，1 km ≈ 0.6214英里。美国路标使用英里，出行时粗算可将英里数除以1.6得到公里数。</p></details><details class="faq-item"><summary>Q. 1英寸等于多少厘米？</summary><p>1英寸 = 2.54厘米（精确值）。厘米转英寸：÷2.54。1英尺 = 12英寸 = 30.48厘米。示例：6英尺 = 182.88厘米。</p></details><details class="faq-item"><summary>Q. 华氏度如何换算成摄氏度？</summary><p>°C = (°F − 32) × 5/9；反向：°F = °C × 9/5 + 32。常用参考：32°F=0°C（冰点），98.6°F=37°C（体温），212°F=100°C（沸点），68°F=20°C（室温）。</p></details><details class="faq-item"><summary>Q. 1磅等于多少千克？</summary><p>1磅 = 0.453592 kg；1 kg = 2.20462磅。1盎司 = 28.3495克。常见于美国食谱和体重描述。1英石（英国）= 14磅 = 6.35 kg。</p></details><details class="faq-item"><summary>Q. 平方英尺如何换算成平方米？</summary><p>1 ft² = 0.092903 m²，乘以0.0929得平方米。示例：1,000 ft² ≈ 92.9 m²。反向：乘以10.764得平方英尺。</p></details><details class="faq-item"><summary>Q. 公里每小时与英里每小时如何换算？</summary><p>1 km/h = 0.621371 mph；快速估算：÷1.6。示例：100 km/h ≈ 62 mph，120 km/h ≈ 75 mph。反向：mph × 1.609 = km/h。</p></details><details class="faq-item"><summary>Q. GB和GiB（gibibyte）有什么区别？</summary><p>GB（吉字节）= 10亿字节（10⁹）；GiB（吉比字节）= 2³⁰ = 1,073,741,824字节。存储厂商用GB标注，Windows却以GiB显示并标为"GB"，因此500 GB硬盘在Windows中显示约465 GB。</p></details><details class="faq-item"><summary>Q. 开尔文（K）是什么？</summary><p>K = °C + 273.15。绝对零度0 K = −273.15°C，是理论上的最低温度。主要用于物理、化学和工程领域。水在273.15 K（0°C）结冰，373.15 K（100°C）沸腾。</p></details><details class="faq-item"><summary>Q. 英亩和公顷有什么区别？</summary><p>1英亩 = 4,046.86 m²；1公顷 = 10,000 m² = 2.471英亩。美国土地面积常用英亩，国际标准用公顷。1 km² = 100公顷 = 247.1英亩。</p></details><details class="faq-item"><summary>Q. 什么是节（knot）？</summary><p>1节 = 1海里/小时 = 1.852 km/h = 1.151 mph。用于航空和航海领域。大型民航客机巡航速度约450~550节（≈830~1,020 km/h）。</p></details><details class="faq-item"><summary>Q. 哪些国家仍然使用英制？</summary><p>美国、缅甸和利比里亚是仅有的未正式采用公制的国家。英国采用混合制——大多数场合用公制，但道路距离用英里，啤酒用品脱计量。</p></details><details class="faq-item"><summary>Q. 如何将美式食谱换算成公制？</summary><p>1杯 = 240毫升（液体）；1汤匙 = 15毫升；1茶匙 = 5毫升；1盎司 = 28.35克；1磅 = 453.6克。烤箱：350°F = 177°C，400°F = 204°C，425°F = 218°C。使用本换算器的重量标签可快速计算食材用量。</p></details>`,

  ja: { lang:'ja', title:'単位変換器 - 長さ・重さ・温度・面積の変換 | 無料', h1:'単位 <span>変換器</span>', sub:'長さ・重さ・温度・面積などを即座に変換します。', btn:'🌐 한국어', from:'変換前', to:'変換後', input:'数値を入力',
    seoH:'単位変換 完全ガイド',
    seoP1:'単位変換器は長さ・重さ・温度・面積・速度・データ容量など多様な計量単位を瞬時に変換します。主な換算値：1 km = 0.6214マイル、1 kg = 2.2046ポンド、0°C = 32°F、1 m² = 10.764 ft²、1 GB = 1,024 MB。温度変換公式：°C→°F：×9/5＋32、°F→°C：(°F−32)×5/9、°C→K：+273.15。世界のほとんどの国がメートル法（SI）を使用し、米国・ミャンマー・リベリアが公式にヤード・ポンド法を使用しています。海外旅行、海外レシピ換算、工学・科学計算に必須のツールです。',

    exList:'<li>米国の体重170 lbs → kg換算（約77.1 kg）</li><li>身長5フィート9インチ → cm換算（約175.3 cm）</li><li>米国の制限速度65 mph → km/h換算（約104.6 km/h）</li><li>部屋の広さ1,000 ft² → m²換算（約92.9 m²）</li><li>発熱体温100.4°F → 摂氏換算（38°C）</li><li>クラウドストレージ500 GB → TB換算（約0.49 TB）</li>',

    faqList:`<details class="faq-item"><summary>Q. 1マイルは何キロメートルですか？</summary><p>1マイル = 1.60934 km（正確値：1.609344）。逆に1 km ≈ 0.6214マイル。米国の道路標識はマイル表示のため、渡航時にはマイル数を1.6で割るだけで大まかなkm数が求まります。</p></details><details class="faq-item"><summary>Q. 1インチは何センチメートルですか？</summary><p>1インチ = 2.54 cm（正確値）。cm→インチは÷2.54。1フィート = 12インチ = 30.48 cm。例：6フィート = 182.88 cm。</p></details><details class="faq-item"><summary>Q. 華氏から摂氏への変換方法は？</summary><p>°C = (°F − 32) × 5/9。逆に°F = °C × 9/5 + 32。覚えやすい基準：32°F=0°C、98.6°F=37°C（体温）、212°F=100°C（沸点）、68°F=20°C（室温）。</p></details><details class="faq-item"><summary>Q. 1ポンドは何キログラムですか？</summary><p>1 lb = 0.453592 kg、1 kg = 2.20462 lb。1オンス = 28.3495 g。米国のレシピや体重表記で頻出します。1ストーン（英国）= 14 lb = 6.35 kg。</p></details><details class="faq-item"><summary>Q. 平方フィートを平方メートルに変換するには？</summary><p>1 ft² = 0.092903 m²。ft²に0.0929を掛けるとm²が得られます。例：1,000 ft² ≈ 92.9 m²。逆は×10.764。</p></details><details class="faq-item"><summary>Q. km/hをmphに変換するには？</summary><p>1 km/h = 0.621371 mph。素早い暗算：÷1.6。例：100 km/h ≈ 62 mph、120 km/h ≈ 75 mph。逆は×1.609。</p></details><details class="faq-item"><summary>Q. GBとGiB（ギビバイト）の違いは？</summary><p>GB（ギガバイト）= 10億バイト（10⁹）。GiB（ギビバイト）= 2³⁰ = 1,073,741,824バイト。ストレージメーカーはGBを使い、WindowsはGiBを「GB」と表示するため、500 GB SSDはWindowsで約465 GBと表示されます。</p></details><details class="faq-item"><summary>Q. ケルビン（K）とは何ですか？</summary><p>K = °C + 273.15。絶対零度は0 K = −273.15°C で理論上の最低温度。物理・化学・工学で主に使用。水は273.15 K（0°C）で凍り、373.15 K（100°C）で沸騰します。</p></details><details class="faq-item"><summary>Q. エーカーとヘクタールの違いは？</summary><p>1エーカー = 4,046.86 m²。1ヘクタール（ha）= 10,000 m² = 2.471エーカー。米国では農地にエーカーを使い、国際標準はヘクタール。1 km² = 100 ha = 247.1エーカー。</p></details><details class="faq-item"><summary>Q. ノット（knot）とは何ですか？</summary><p>1ノット = 1海里/時 = 1.852 km/h = 1.151 mph。航空・航海で使用される速度単位。大型旅客機の巡航速度は約450〜550ノット（≈830〜1,020 km/h）。</p></details><details class="faq-item"><summary>Q. 公式にヤード・ポンド法を使う国は？</summary><p>米国・ミャンマー・リベリアのみが公式にメートル法（SI）を採用していない国です。英国は混合制で、科学・医療にはメートル法を使いつつ、道路はマイル、ビールはパイントで計量。</p></details><details class="faq-item"><summary>Q. 米国レシピを公制に換算するには？</summary><p>1カップ = 240 ml（液体）。1大さじ = 15 ml、1小さじ = 5 ml。1 oz = 28.35 g、1 lb = 453.6 g。オーブン：350°F = 177°C、400°F = 204°C、425°F = 218°C。本換算器の重さタブで食材の換算も可能です。</p></details>`,

function _detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  else if (n.startsWith('ja')) return 'ja';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}
let _lang = _detectLang();
function _applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = t.lang;
  document.title = t.title;
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = t.btn;
  const h1 = document.querySelector('h1');
  if (h1) h1.innerHTML = t.h1;
  const sub = document.querySelector('.subtitle');
  if (sub) sub.textContent = t.sub;
  const from = document.getElementById('fromLabel');
  if (from) from.textContent = t.from;
  const to = document.getElementById('toLabel');
  if (to) to.textContent = t.to;
  const input = document.getElementById('inputLabel');
  if (input) input.textContent = t.input;
  const seoH = document.getElementById('seoH');
  if (seoH) seoH.textContent = t.seoH;
  const seoP1 = document.getElementById('seoP1');
  if (seoP1) seoP1.innerHTML = t.seoP1||'';
  const exH3 = document.getElementById('exH3');
  if (exH3) exH3.textContent = t.exH3||'';
  const exList = document.getElementById('exList');
  if (exList) exList.innerHTML = t.exList||'';
  const faqH3 = document.getElementById('faqH3');
  if (faqH3) faqH3.textContent = t.faqH3||'';
  const faqList = document.getElementById('faqList');
  if (faqList) faqList.innerHTML = t.faqList||'';
  const back = document.querySelector('.back-link');
  if (back) back.textContent = (_lang === 'ko') ? '← 모두의 툴' : (_lang === 'zh') ? '← 首页' : (_lang === 'ja') ? '← ホーム' : '← Home';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  populateUnits();
  convert();
}
const _langOrder = ['ko','en','zh','ja'];
function cycleLang() {
  const idx = _langOrder.indexOf(_lang);
  _lang = _langOrder[(idx + 1) % _langOrder.length];
  localStorage.setItem('lang', _lang);
  const url = new URL(location.href);
  if (_lang === 'ko') { url.searchParams.delete('lang'); } else { url.searchParams.set('lang', _lang); }
  history.replaceState({}, '', url);
  _applyLang();
}
_applyLang();
