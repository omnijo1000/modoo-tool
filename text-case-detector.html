function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1).toLowerCase();}
function tokenize(s){
  if(/[_]/.test(s)) return s.split(/[_]+/).filter(Boolean);
  if(/[-]/.test(s)) return s.split(/[-]+/).filter(Boolean);
  if(/[.]/.test(s)) return s.split(/[.]+/).filter(Boolean);
  if(/\s/.test(s)) return s.trim().split(/\s+/);
  return s.replace(/([A-Z])/g,' $1').trim().split(/\s+/).filter(Boolean);
}
function detectCase(s){

  if(/^([A-Z][a-z0-9]+)+$/.test(s)) return 'pascal';
  if(/^[a-z][a-z0-9]*(_[a-z][a-z0-9]*)+$/.test(s)) return 'snake';

  if(/^[a-z]+$/.test(s)) return 'flat';

  if(/^[A-Z ]+$/.test(s.trim())) return 'upper';
