    seoHtml:`<h2>变位词检测器</h2><p><strong>变位词（anagram）</strong>是用相同字母重新排列组成的词或短语。例如listen→silent，earth→heart。支持忽略大小写、空格和标点符号，字符频率图表直观显示差异。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>什么是变位词？</summary><p>由完全相同的字母组成的不同词语，如listen→silent。</p></details>
<details class="faq-item"><summary>变位词和回文有什么区别？</summary><p>变位词是两个字符串字符组成相同，回文是一个字符串正读反读相同。</p></details>

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}

function normalize(s){

  return r;

  if(a||b){

      const ca=fa.get(c)||0,cb=fb.get(c)||0;

      const disp=c===' '?'SP':c.replace(/&/g,'&amp;').replace(/</g,'&lt;');
      return `<div class="freq-cell ${match?'match':'diff'}">
        <div class="ch">${disp}</div>
        <div class="cnt">${ca} / ${cb}</div>
        ${match?'':'<div class="diff-cnt">Δ${Math.abs(ca-cb)}</div>'}
      </div>`;
    }).join('');
    document.getElementById('freqGrid').innerHTML=cells;
    fs.style.display='block';
  }else{fs.style.display='none';}
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
