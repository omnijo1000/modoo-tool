<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APR Calculator - Annual Percentage Rate Calculator</title>
<meta name="description" content="Free online APR calculator. Calculate the true Annual Percentage Rate (APR) of a loan including fees and compounding. Compare nominal rate vs effective APR.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="alternate" hreflang="ko" href="https://modoohub.com/apr-calculator.html">
<link rel="alternate" hreflang="en" href="https://modoohub.com/apr-calculator.html?lang=en">
<link rel="alternate" hreflang="zh" href="https://modoohub.com/apr-calculator.html?lang=zh">
<link rel="alternate" hreflang="x-default" href="https://modoohub.com/apr-calculator.html">
<link rel="canonical" href="https://modoohub.com/apr-calculator.html">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#f59e0b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:620px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.tabs{display:flex;gap:6px;margin-bottom:16px;}
.tab{flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;background:none;color:var(--text-muted);text-align:center;}
.tab.on{border-color:var(--accent);color:var(--accent);background:rgba(245,158,11,.08);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:480px){.row2{grid-template-columns:1fr;}}
.field label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
.inp:focus{border-color:var(--accent);}
select.inp{cursor:pointer;}
.calc-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-top:4px;}
.calc-btn:hover{opacity:.85;}
.result{margin-top:14px;display:none;}
.res-main{background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:18px;text-align:center;margin-bottom:12px;}
.res-val{font-size:42px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
.res-label{font-size:12px;color:var(--text-muted);margin-top:4px;}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:480px){.res-grid{grid-template-columns:1fr 1fr;}}
.res-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.res-box-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;}
.res-box-label{font-size:11px;color:var(--text-dim);margin-top:3px;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NR6VJF0534"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-NR6VJF0534');</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6334638921720175" crossorigin="anonymous"></script>
<meta property="og:title" content="APR Calculator - Annual Percentage Rate">
<meta property="og:image" content="https://modoohub.com/og-image.png">
</head>
<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>APR <span>Calculator</span></h1>
  <p class="sub" data-i18n="sub">대출 실질 연이율(APR) · 명목금리 vs 실효금리 계산</p>

  <div class="tabs">
    <button class="tab on" id="tabLoan" onclick="setTab('loan')" data-i18n="tabLoan">대출 APR</button>
    <button class="tab" id="tabNominal" onclick="setTab('nominal')" data-i18n="tabNominal">명목금리 → EAR</button>
  </div>

  <!-- 대출 APR 탭 -->
  <div id="paneLoan">
    <div class="card">
      <div class="row2">
        <div class="field"><label data-i18n="loanAmtLabel">대출금액</label><input class="inp" type="number" id="loanAmt" value="10000000" min="0"></div>
        <div class="field"><label data-i18n="feesLabel">수수료·부대비용</label><input class="inp" type="number" id="fees" value="100000" min="0"></div>
      </div>
      <div class="row2">
        <div class="field"><label data-i18n="monthlyPayLabel">월 납입금</label><input class="inp" type="number" id="monthlyPay" value="200000" min="0"></div>
        <div class="field"><label data-i18n="termLabel">대출 기간 (개월)</label><input class="inp" type="number" id="termMonths" value="60" min="1"></div>
      </div>
      <button class="calc-btn" onclick="calcLoanAPR()" data-i18n="calcBtn">▶ APR 계산</button>
    </div>
  </div>

  <!-- 명목금리 탭 -->
  <div id="paneNominal" style="display:none">
    <div class="card">
      <div class="row2">
        <div class="field"><label data-i18n="nomRateLabel">명목 금리 (%)</label><input class="inp" type="number" id="nomRate" value="5" min="0" step="0.01"></div>
        <div class="field">
          <label data-i18n="compLabel">복리 횟수</label>
          <select class="inp" id="compFreq">
            <option value="1" data-i18n="compAnn">연간 (1회)</option>
            <option value="2" data-i18n="compSemi">반년 (2회)</option>
            <option value="4" data-i18n="compQtr">분기 (4회)</option>
            <option value="12" selected data-i18n="compMon">월간 (12회)</option>
            <option value="52" data-i18n="compWeek">주간 (52회)</option>
            <option value="365" data-i18n="compDay">일별 (365회)</option>
          </select>
        </div>
      </div>
      <button class="calc-btn" onclick="calcEAR()" data-i18n="calcBtn">▶ EAR 계산</button>
    </div>
  </div>

  <div class="result" id="result">
    <div class="res-main">
      <div class="res-val" id="rMain">-</div>
      <div class="res-label" id="rMainLabel" data-i18n="rAprLabel">연이율 (APR)</div>
    </div>
    <div class="res-grid" id="rGrid"></div>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">APR Calculator란?</h2>
    <p data-i18n="seoP">APR(Annual Percentage Rate)은 수수료와 이자를 모두 포함한 대출의 실질 연이율입니다. 명목 금리보다 높으며 대출 상품 비교 시 중요한 지표입니다.</p>
  </div>
  <footer>APR Calculator · Free Online Tool</footer>
</main>
<script>
const _i18n={
  ko:{sub:'대출 실질 연이율(APR) · 명목금리 vs 실효금리 계산',langBtn:'🌐 EN',backBtn:'← 모두의 툴',tabLoan:'대출 APR',tabNominal:'명목금리 → EAR',loanAmtLabel:'대출금액',feesLabel:'수수료·부대비용',monthlyPayLabel:'월 납입금',termLabel:'대출 기간 (개월)',nomRateLabel:'명목 금리 (%)',compLabel:'복리 횟수',compAnn:'연간 (1회)',compSemi:'반년 (2회)',compQtr:'분기 (4회)',compMon:'월간 (12회)',compWeek:'주간 (52회)',compDay:'일별 (365회)',calcBtn:'▶ 계산',rAprLabel:'연이율 (APR)',rEarLabel:'실효 연이율 (EAR)',rTotalPayLabel:'총 상환금액',rTotalIntLabel:'총 이자',rMonthlyRateLabel:'월 금리',seoH2:'APR Calculator란?',seoP:'APR은 수수료를 포함한 대출 실질 연이율입니다. 명목 금리보다 높으며 대출 비교 시 기준이 됩니다.'},
  en:{sub:'True Annual Percentage Rate (APR) · Nominal vs Effective rate',langBtn:'🌐 中文',backBtn:'← All Tools',tabLoan:'Loan APR',tabNominal:'Nominal → EAR',loanAmtLabel:'Loan Amount',feesLabel:'Fees & Costs',monthlyPayLabel:'Monthly Payment',termLabel:'Loan Term (months)',nomRateLabel:'Nominal Rate (%)',compLabel:'Compounding',compAnn:'Annually (1x)',compSemi:'Semi-annually (2x)',compQtr:'Quarterly (4x)',compMon:'Monthly (12x)',compWeek:'Weekly (52x)',compDay:'Daily (365x)',calcBtn:'▶ Calculate',rAprLabel:'Annual Percentage Rate (APR)',rEarLabel:'Effective Annual Rate (EAR)',rTotalPayLabel:'Total Payment',rTotalIntLabel:'Total Interest',rMonthlyRateLabel:'Monthly Rate',seoH2:'APR Calculator',seoP:'APR (Annual Percentage Rate) includes all fees and interest to show the true cost of a loan. Higher than the nominal rate, it\'s the standard for comparing loan products.'},
  zh:{sub:'年化利率(APR) · 名义利率 vs 实际利率计算',langBtn:'🌐 日本語',backBtn:'← 所有工具',tabLoan:'贷款APR',tabNominal:'名义利率→EAR',loanAmtLabel:'贷款金额',feesLabel:'手续费和附加费',monthlyPayLabel:'月还款额',termLabel:'贷款期限（月）',nomRateLabel:'名义利率（%）',compLabel:'复利频率',compAnn:'每年（1次）',compSemi:'每半年（2次）',compQtr:'每季度（4次）',compMon:'每月（12次）',compWeek:'每周（52次）',compDay:'每日（365次）',calcBtn:'▶ 计算',rAprLabel:'年化利率 (APR)',rEarLabel:'实际年利率 (EAR)',rTotalPayLabel:'总还款额',rTotalIntLabel:'总利息',rMonthlyRateLabel:'月利率',seoH2:'APR计算器',seoP:'APR包含所有费用和利息，显示贷款的真实成本，高于名义利率，是比较贷款产品的重要指标。'},
  ja:{sub:'実質年率(APR) · 名目金利 vs 実効金利の計算',langBtn:'🌐 한국어',backBtn:'← ホーム',tabLoan:'ローンAPR',tabNominal:'名目金利→EAR',loanAmtLabel:'融資金額',feesLabel:'手数料・諸費用',monthlyPayLabel:'月額返済金',termLabel:'返済期間（月）',nomRateLabel:'名目金利（%）',compLabel:'複利頻度',compAnn:'年間（1回）',compSemi:'半年（2回）',compQtr:'四半期（4回）',compMon:'月次（12回）',compWeek:'週次（52回）',compDay:'日次（365回）',calcBtn:'▶ 計算する',rAprLabel:'実質年率 (APR)',rEarLabel:'実効年利率 (EAR)',rTotalPayLabel:'総返済金額',rTotalIntLabel:'総利息',rMonthlyRateLabel:'月利率',seoH2:'APR計算機とは？',seoP:'APR（実質年率）は手数料と利息をすべて含んだローンの実質的な年間コストです。名目金利より高く、ローン商品を比較する際の重要な指標です。'},
};
let _lang='ko',_tab='loan';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});document.querySelectorAll('option[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k])el.textContent=t[k];});}
function setTab(t){_tab=t;document.getElementById('tabLoan').classList.toggle('on',t==='loan');document.getElementById('tabNominal').classList.toggle('on',t==='nominal');document.getElementById('paneLoan').style.display=t==='loan'?'block':'none';document.getElementById('paneNominal').style.display=t==='nominal'?'block':'none';document.getElementById('result').style.display='none';}
function fmt(n){return n.toLocaleString(_lang==='ko'?'ko-KR':'en-US',{maximumFractionDigits:2});}
function calcLoanAPR(){
  const P=parseFloat(document.getElementById('loanAmt').value)||0;
  const fees=parseFloat(document.getElementById('fees').value)||0;
  const pmt=parseFloat(document.getElementById('monthlyPay').value)||0;
  const n=parseInt(document.getElementById('termMonths').value)||1;
  const t=_i18n[_lang];
  const netP=P-fees;
  let r=0.005;
  for(let i=0;i<1000;i++){
    const f=netP-pmt*(1-(1+r)**-n)/r;
    const df=-pmt*(-(1-(1+r)**-n)/r**2+n*(1+r)**(-n-1)/r);
    const nr=r-f/df;
    if(Math.abs(nr-r)<1e-10)break;
    r=nr;
  }
  const apr=(Math.pow(1+r,12)-1)*100;
  const monthlyRate=r*100;
  const totalPay=pmt*n;
  const totalInt=totalPay-P;
  document.getElementById('rMain').textContent=apr.toFixed(3)+'%';
  document.getElementById('rMainLabel').setAttribute('data-i18n','rAprLabel');
  document.getElementById('rMainLabel').textContent=t.rAprLabel;
  document.getElementById('rGrid').innerHTML=`
    <div class="res-box"><div class="res-box-val">${monthlyRate.toFixed(3)}%</div><div class="res-box-label">${t.rMonthlyRateLabel}</div></div>
    <div class="res-box"><div class="res-box-val">${fmt(totalPay)}</div><div class="res-box-label">${t.rTotalPayLabel}</div></div>
    <div class="res-box"><div class="res-box-val">${fmt(Math.max(0,totalInt))}</div><div class="res-box-label">${t.rTotalIntLabel}</div></div>`;
  document.getElementById('result').style.display='block';
}
function calcEAR(){
  const r=parseFloat(document.getElementById('nomRate').value)/100||0.05;
  const n=parseInt(document.getElementById('compFreq').value)||12;
  const t=_i18n[_lang];
  const ear=(Math.pow(1+r/n,n)-1)*100;
  const monthlyEq=(Math.pow(1+r/n,n/12)-1)*100;
  document.getElementById('rMain').textContent=ear.toFixed(4)+'%';
  document.getElementById('rMainLabel').textContent=t.rEarLabel;
  document.getElementById('rGrid').innerHTML=`
    <div class="res-box"><div class="res-box-val">${(r*100).toFixed(2)}%</div><div class="res-box-label">명목금리</div></div>
    <div class="res-box"><div class="res-box-val">${ear.toFixed(4)}%</div><div class="res-box-label">EAR</div></div>
    <div class="res-box"><div class="res-box-val">${monthlyEq.toFixed(4)}%</div><div class="res-box-label">월 환산</div></div>`;
  document.getElementById('result').style.display='block';
}
_lang=detectLang();applyLang();
</script>
</body>
</html>
