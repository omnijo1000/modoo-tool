function onZoneClick(){
  if(_done)return;
  if(!_running){_running=true;_startTime=Date.now();document.getElementById('clickZone').classList.add('running');document.getElementById('promptText').textContent='';startTimer();}
  _clicks++;updateDisplay();
}
function updateDisplay(){
  const sec=_startTime?(Date.now()-_startTime)/1000:0;
  const cps=sec>0?(_clicks/sec).toFixed(1):0;
  document.getElementById('cpsNum').textContent=cps;
  document.getElementById('totalClicks').textContent=_clicks;
  document.getElementById('elapsedSec').textContent=sec.toFixed(1)+'s';
  document.getElementById('timerText').textContent=sec.toFixed(1)+'s / '+_dur+'s';
}
function startTimer(){
  _timer=setInterval(()=>{
    if(!_running)return;
    const sec=(Date.now()-_startTime)/1000;
    updateDisplay();
    if(sec>=_dur){finish();}
  },100);
}
function finish(){
  clearInterval(_timer);_running=false;_done=true;
  const cps=(_clicks/_dur).toFixed(2);
  document.getElementById('rCps').textContent=cps;
  document.getElementById('rTotal').textContent=_clicks;
  document.getElementById('rDur').textContent=_dur+'s';
  document.getElementById('rankBadge').textContent=_i18n[_lang].rankFn(parseFloat(cps));
  document.getElementById('resultBox').classList.add('show');
}
_lang=detectLang();applyLang();resetTest();
</script>
<script src="related.js"></script>
</body>
