  ja:{h1Accent:'サムネイルテキストジェネレーター',sub:'テーマを入力してサムネイルに入れる短くてインパクトのある文字を即時生成',backLink:'← ホーム',langBtn:'🌐 한국어',

    emotypes:{shock:'衝撃/驚き',fear:'警告/恐怖',success:'成功/達成',secret:'秘訣/ヒント',question:'疑問/好奇心'},
    templates:{
      shock:(t)=>[`${t}\n衝撃の事実`,`${t}\n完全に崩壊`,`${t}？\nマジで？`,`これが${t}\n本当だった`,`${t}\n誰も知らない`,`${t}\n想像を絶する`],
      fear:(t)=>[`${t}\n絶対やめて`,`${t}\n大変なことに`,`${t}\n手遅れかも`,`警告！\n${t}`,`今すぐ止めて\n${t}`,`${t}\n後悔します`],
      success:(t)=>[`${t}\n成功しました`,`${t}\nついに解決`,`${t}\n3倍速で`,`${t}\n完全攻略`,`${t}\n達成！`,`${t}\nレベルアップ`],
      secret:(t)=>[`${t}\n隠された秘密`,`${t}\n誰も教えない`,`${t}\nこれが答えだった`,`${t}\n裏技公開`,`${t}\nプロのコツ`,`${t}\n専門家の秘法`],
      question:(t)=>[`${t}\n本当に可能？`,`${t}\nどのくらいかかる？`,`${t}\n価値あり？`,`果たして${t}？`,`${t}\nやるべき？`,`${t}？\nコメントで予想`]
    },
    seoHtml:`<h2>AIサムネイルテキストジェネレーター</h2><p>YouTube、Instagram、ブログのサムネイルに入れる短くインパクトのある文字を自動生成します。衝撃、警告、成功、秘訣、疑問の5種類の感情タイプに対応。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>サムネイルテキストの理想的な長さは？</summary><p>1行20文字以内、最大2-3行が読みやすいです。</p></details>
<details class="faq-item"><summary>改行が重要な理由は？</summary><p>2行構成はリズムを生み、小さな画面でも読みやすいです。</p></details>
<details class="faq-item"><summary>良いサムネイルテキストの条件は？</summary><p>短くて感情を刺激し、動画の内容を示唆するもの。</p></details>
<details class="faq-item"><summary>色は重要ですか？</summary><p>暗い背景に黄色/赤が最もコントラストが高く目を引きます。</p></details>
<details class="faq-item"><summary>クリックベイトと正直なサムネイル？</summary><p>動画内容と合わせましょう。誤解を招くサムネイルは登録解除につながります。</p></details>
<details class="faq-item"><summary>サムネイルのA/Bテスト方法は？</summary><p>YouTube Studioに組み込みのサムネイル実験機能があります。</p></details>
<details class="faq-item"><summary>フォントサイズはどのくらいにすべきですか？</summary><p>スマホの小さな画面でも読めるよう、できるだけ大きくしましょう。</p></details>
<details class="faq-item"><summary>他の言語でも生成できますか？</summary><p>はい、URLに?lang=ko/en/zhを追加してください。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblTopic','lblType','btnGen'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  const sel=document.getElementById('emotype');
  Object.keys(t.emotypes).forEach((k,i)=>{if(sel.options[i])sel.options[i].text=t.emotypes[k];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function generate(){
  const t=_i18n[_lang];
  const topic=document.getElementById('topic').value.trim()||'주제';
  const emo=document.getElementById('emotype').value;
  const texts=t.templates[emo](topic);
  const bgs=['linear-gradient(135deg,#1a1a2e,#16213e)','linear-gradient(135deg,#0d1117,#1f2937)','linear-gradient(135deg,#1a0533,#2d0a4e)','linear-gradient(135deg,#051426,#0c2340)','linear-gradient(135deg,#1a1500,#2d2200)','linear-gradient(135deg,#0d1f12,#0a3322)'];
  document.getElementById('thumbGrid').innerHTML=texts.map((text,i)=>`
    <div class="thumb-card">
      <div class="thumb-preview" style="background:${bgs[i%bgs.length]}">
        <div class="thumb-text">${text.replace(/\n/g,'<br>')}</div>
      </div>
      <div class="thumb-bar">
        <span class="thumb-label">${text.replace(/\n/g,' ').length}자</span>
        <button class="thumb-copy" onclick="copyText(this,'${encodeURIComponent(text)}')">${t.copyBtn}</button>
      </div>
    </div>`).join('');
}
function copyText(btn,enc){
  const t=_i18n[_lang];
  navigator.clipboard.writeText(decodeURIComponent(enc)).then(()=>{btn.textContent=t.copied;setTimeout(()=>btn.textContent=t.copyBtn,1500);});
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
