    <div class="stat"><div class="stat-val" id="sTotal">0</div><div class="stat-label" data-i18n="statTotal">Total Lines</div></div>
    <div class="stat"><div class="stat-val" id="sNonEmpty">0</div><div class="stat-label" data-i18n="statNonEmpty">Non-empty</div></div>

  </div>

  <div style="margin-bottom:8px"><div class="col-label" data-i18n="labelInput">INPUT</div></div>
  <textarea id="inputArea" placeholder="Paste your text here..." oninput="update()"></textarea>

  <div class="toolbar" style="margin-top:12px;">
    <button class="tool-btn" onclick="copyText()" data-i18n="btnCopy">📋 Copy</button>
    <button class="tool-btn" onclick="clearAll()" data-i18n="btnClear">🗑 Clear</button>
  </div>

  <div id="numberedWrap" style="display:none">
    <div class="col-label" data-i18n="labelNumbered">NUMBERED LINES</div>
    <div class="numbered-panel" id="numberedPanel"></div>
  </div>

</main>
<script>
function update(){
  const v=document.getElementById('inputArea').value;
  if(!v){document.getElementById('sTotal').textContent='0';document.getElementById('sNonEmpty').textContent='0';document.getElementById('sEmpty').textContent='0';document.getElementById('sAvgLen').textContent='0';document.getElementById('numberedWrap').style.display='none';return;}
  const lines=v.split('\n');
  const nonEmpty=lines.filter(l=>l.trim()!=='').length;
  const empty=lines.length-nonEmpty;
  const avgLen=nonEmpty>0?Math.round(lines.filter(l=>l.trim()!=='').reduce((a,l)=>a+l.length,0)/nonEmpty):0;
  document.getElementById('sTotal').textContent=lines.length.toLocaleString();
  document.getElementById('sNonEmpty').textContent=nonEmpty.toLocaleString();
  document.getElementById('sEmpty').textContent=empty.toLocaleString();
  document.getElementById('sAvgLen').textContent=avgLen.toLocaleString();
  const panel=document.getElementById('numberedPanel');
  panel.innerHTML=lines.map((l,i)=>`<div class="num-line"><span class="line-num">${i+1}</span><span class="line-content">${escHtml(l)||'&nbsp;'}</span></div>`).join('');
  document.getElementById('numberedWrap').style.display='block';
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function copyText(){const v=document.getElementById('inputArea').value;if(v)navigator.clipboard.writeText(v);}
function clearAll(){document.getElementById('inputArea').value='';update();}
</script>

    seoHtml:'<h2>行数カウンターの使い方</h2><p>テキストを貼り付けると、総行数・空でない行数・空行数・平均行長をリアルタイムで集計します。コード・スクリプト・ドキュメントの行数確認に便利です。</p><details class="faq-item"><summary>空行も行数に含まれますか？</summary><p>はい。総行数には空行も含まれます。空行数は別途表示されるため、内容のある行と空行の数を区別して確認できます。</p></details><details class="faq-item"><summary>行番号は表示できますか？</summary><p>はい。入力欄下の行番号パネルで各行の番号と内容を確認できます。特定の行を素早く見つけるのに役立ちます。</p></details><details class="faq-item"><summary>コードファイルの行数を数えるには？</summary><p>エディタやファイルからコードをすべてコピーして入力欄に貼り付けてください。ファイルの直接アップロードには対応しておらず、すべての処理はブラウザ内で完結します。</p></details><details class="faq-item"><summary>平均行長とは何ですか？</summary><p>空でない行の平均文字数です。コードスタイルガイド（例: 80文字制限）への準拠確認や、テキスト全体の構造把握に活用できます。</p></details><details class="faq-item"><summary>入力したテキストはサーバーに送られますか？</summary><p>送信されません。すべての処理はブラウザ内で完結し、テキストはいかなるサーバーにも送信・保存されません。機密コードや個人文書も安心してご利用いただけます。</p></details><details class="faq-item"><summary>特定の単語を含む行だけ数えられますか？</summary><p>テキストフィルタリングまたは正規表現ベースのgrep機能で特定パターンを含む行をフィルタリングしてから数えられます。大規模なログ分析に特に役立ちます。</p></details><details class="faq-item"><summary>テキストファイルを直接アップロードできますか？</summary><p>ファイルのアップロードまたはテキストの貼り付けが使えます。すべての処理はブラウザ内のみで行われ、ファイル内容がサーバーに送信されることはありません。</p></details><details class="faq-item"><summary>行数の他に単語数や文字数も確認できますか？</summary><p>はい。行数とともに単語数、文字数（スペース込み/除く）、段落数なども表示されます。執筆の分量確認に役立ちます。</p></details>'}
};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
