<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#f97316;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:640px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:480px){.row2{grid-template-columns:1fr;}}
.field label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
.inp:focus{border-color:var(--accent);}
.range-row{display:flex;align-items:center;gap:10px;}
input[type=range]{flex:1;accent-color:var(--accent);}
.range-val{font-size:13px;font-family:'DM Mono',monospace;color:var(--accent);min-width:40px;}
.calc-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-top:4px;}
.calc-btn:hover{opacity:.85;}
.result{margin-top:14px;display:none;}
.fire-number{background:var(--surface);border:2px solid var(--accent);border-radius:14px;padding:20px;text-align:center;margin-bottom:12px;}
.fire-label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:4px;}
.fire-val{font-size:44px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
.fire-sub{font-size:12px;color:var(--text-dim);margin-top:4px;}
.progress-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.progress-label{display:flex;justify-content:space-between;font-size:12px;font-family:'DM Mono',monospace;margin-bottom:8px;}
.prog-bar{background:var(--surface2);border-radius:6px;height:10px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:6px;transition:width .4s;}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;}
@media(max-width:400px){.stats-grid{grid-template-columns:1fr;}}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
.stat-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:3px;}
.coast-box{background:rgba(249,115,22,.08);border:1px solid var(--accent);border-radius:10px;padding:14px;margin-bottom:12px;}
.coast-title{font-size:11px;font-family:'DM Mono',monospace;color:var(--accent);margin-bottom:6px;}
.coast-row{display:flex;justify-content:space-between;font-size:12px;font-family:'DM Mono',monospace;margin-bottom:4px;}
.coast-key{color:var(--text-muted);}
.coast-v{color:var(--text);}
.milestone-list{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
.ml-title{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:10px;}
.ml-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;font-family:'DM Mono',monospace;}
.ml-row:last-child{border-bottom:none;}
.ml-pct{color:var(--text-dim);}
.ml-amt{color:var(--accent);}
.ml-yr{color:var(--text-muted);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>FIRE <span>Calculator</span></h1>
  <p class="sub" data-i18n="sub">파이어 넘버 · 경제적 자유 달성 시점 · 4% 룰 계산기</p>

  <div class="card">
    <div class="row2">
      <div class="field"><label data-i18n="currentLabel">현재 자산</label><input class="inp" type="number" id="current" value="50000000" min="0"></div>
      <div class="field"><label data-i18n="annualSavLabel">연간 저축액</label><input class="inp" type="number" id="annualSav" value="20000000" min="0"></div>
    </div>
    <div class="row2">
      <div class="field"><label data-i18n="annualExpLabel">은퇴 후 연간 지출</label><input class="inp" type="number" id="annualExp" value="30000000" min="0"></div>
      <div class="field"><label data-i18n="retireAgeLabel">현재 나이</label><input class="inp" type="number" id="currentAge" value="30" min="10" max="80"></div>
    </div>
    <div class="field" style="margin-bottom:12px">
      <label data-i18n="returnLabel">예상 연 수익률 (%)</label>
      <div class="range-row">
        <input type="range" id="returnRate" min="1" max="15" value="7" step="0.5" oninput="document.getElementById('returnVal').textContent=this.value+'%'">
        <span class="range-val" id="returnVal">7%</span>
      </div>
    </div>
    <div class="field" style="margin-bottom:0">
      <label data-i18n="withdrawLabel">인출률 (%)</label>
      <div class="range-row">
        <input type="range" id="withdrawRate" min="2" max="6" value="4" step="0.1" oninput="document.getElementById('withdrawVal').textContent=this.value+'%'">
        <span class="range-val" id="withdrawVal">4%</span>
      </div>
    </div>
    <button class="calc-btn" onclick="calc()" style="margin-top:14px" data-i18n="calcBtn">▶ 계산하기</button>
  </div>

  <div class="result" id="result">
    <div class="fire-number">
      <div class="fire-label" data-i18n="fireNumLabel">파이어 넘버 (FIRE Number)</div>
      <div class="fire-val" id="rFireNum">-</div>
      <div class="fire-sub" id="rFireSub"></div>
    </div>

    <div class="progress-section">
      <div class="progress-label">
        <span data-i18n="progressLabel">달성률</span>
        <span id="rPct" style="color:var(--accent);font-weight:700"></span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val" id="rYears">-</div><div class="stat-label" data-i18n="yearsLabel">달성까지 남은 기간</div></div>
      <div class="stat-box"><div class="stat-val" id="rRetireAge">-</div><div class="stat-label" data-i18n="retireAgeResLabel">은퇴 나이</div></div>
      <div class="stat-box"><div class="stat-val" id="rRetireYear">-</div><div class="stat-label" data-i18n="retireYearLabel">은퇴 연도</div></div>
      <div class="stat-box"><div class="stat-val" id="rMonthly">-</div><div class="stat-label" data-i18n="monthlyWithdrawLabel">월 인출 가능액</div></div>
    </div>

    <div class="coast-box">
      <div class="coast-title">Coast FIRE</div>
      <div class="coast-row"><span class="coast-key" data-i18n="coastNumLabel">Coast FIRE 넘버</span><span class="coast-v" id="rCoast">-</span></div>
      <div class="coast-row"><span class="coast-key" data-i18n="coastStatusLabel">현재 상태</span><span class="coast-v" id="rCoastStatus">-</span></div>
    </div>

    <div class="milestone-list">
      <div class="ml-title" data-i18n="mlTitle">자산 마일스톤</div>
      <div id="mlBody"></div>
    </div>
  </div>

  <div class="seo" data-i18n="seoHtml"></div>
  <footer>FIRE Calculator · Financial Independence · Free Online Tool</footer>
</main>
<script>
const _i18n={
  ko:{sub:'파이어 넘버 · 경제적 자유 달성 시점 · 4% 룰 계산기',langBtn:'🌐 EN',backBtn:'← 모두의 툴',currentLabel:'현재 자산',annualSavLabel:'연간 저축액',annualExpLabel:'은퇴 후 연간 지출',retireAgeLabel:'현재 나이',returnLabel:'예상 연 수익률 (%)',withdrawLabel:'인출률 (%)',calcBtn:'▶ 계산하기',fireNumLabel:'파이어 넘버 (FIRE Number)',progressLabel:'달성률',yearsLabel:'달성까지 남은 기간',retireAgeResLabel:'은퇴 나이',retireYearLabel:'은퇴 연도',monthlyWithdrawLabel:'월 인출 가능액',coastNumLabel:'Coast FIRE 넘버',coastStatusLabel:'현재 상태',mlTitle:'자산 마일스톤',yearsUnit:'년',coastReached:'✓ 이미 달성',coastNotYet:'아직 미달성',seoHtml:'<h2>FIRE 계산기란?</h2><p><strong>FIRE(Financial Independence, Retire Early)</strong>는 경제적 자유를 통해 조기 은퇴를 목표로 하는 라이프스타일입니다. 연간 지출의 25배(4% 룰)가 FIRE 넘버이며, 현재 자산·연간 저축액·예상 수익률을 입력하면 달성 예상 시점과 Coast FIRE 넘버를 계산합니다.</p><h2>자주 묻는 질문 (FAQ)</h2><details class="faq-item"><summary>FIRE 넘버는 어떻게 계산하나요?</summary><p>연간 지출 × 25배입니다. 예) 은퇴 후 연 3,000만원 필요 → FIRE 넘버 = 7억 5,000만원. 4% 룰(Trinity Study)에 기반하며, 이 금액에서 연 4%씩 인출해도 30년 이상 자산이 유지됩니다.</p></details><details class="faq-item"><summary>Coast FIRE란 무엇인가요?</summary><p>현재 자산을 투자만 해두고(추가 저축 없이) 목표 은퇴 나이까지 복리로 FIRE 넘버에 도달하는 시점입니다. Coast FIRE 달성 후에는 생활비만 벌면 되어 직업 부담이 크게 줄어듭니다.</p></details><details class="faq-item"><summary>예상 수익률은 몇 %가 적당한가요?</summary><p>미국 주식 역사적 평균 실질 수익률 약 7%가 기준으로 많이 쓰입니다. 보수적으로는 5%, 적극적으로는 8~10%를 입력하고 시뮬레이션해 보세요.</p></details><details class="faq-item"><summary>인플레이션을 반영해야 하나요?</summary><p>예상 수익률을 명목 수익률(예: 10%) 대신 실질 수익률(인플레이션 차감, 예: 7%)로 입력하면 인플레이션 효과가 자동 반영됩니다.</p></details><details class="faq-item"><summary>이 계산기는 공식 재무 계획 도구인가요?</summary><p>참고용입니다. 정확한 은퇴 계획은 세금·공적연금·건강 비용 등 개인 변수가 많으므로 재무 설계사 상담을 권장합니다.</p></details>'},
  en:{sub:'FIRE Number · Years to financial independence · 4% rule',langBtn:'🌐 中文',backBtn:'← All Tools',currentLabel:'Current Savings',annualSavLabel:'Annual Savings',annualExpLabel:'Annual Expenses (retired)',retireAgeLabel:'Current Age',returnLabel:'Expected Annual Return (%)',withdrawLabel:'Withdrawal Rate (%)',calcBtn:'▶ Calculate',fireNumLabel:'FIRE Number',progressLabel:'Progress',yearsLabel:'Years to FIRE',retireAgeResLabel:'Retirement Age',retireYearLabel:'Retirement Year',monthlyWithdrawLabel:'Monthly Withdrawal',coastNumLabel:'Coast FIRE Number',coastStatusLabel:'Current Status',mlTitle:'Asset Milestones',yearsUnit:'yrs',coastReached:'✓ Already reached',coastNotYet:'Not yet reached',seoHtml:'<h2>FIRE Calculator</h2><p><strong>FIRE (Financial Independence, Retire Early)</strong> is a movement focused on achieving financial freedom through aggressive saving and investing. Your FIRE number is 25× annual retirement expenses (the 4% rule). Enter your current savings, annual contributions, and expected return to forecast when you\'ll reach financial independence.</p><h2>FAQ</h2><details class="faq-item"><summary>How is the FIRE number calculated?</summary><p>FIRE number = Annual expenses × 25. Example: $40,000/year expenses → FIRE number = $1,000,000. Based on the Trinity Study (4% rule): withdrawing 4% annually from this amount sustains a 30+ year retirement.</p></details><details class="faq-item"><summary>What is Coast FIRE?</summary><p>Coast FIRE is the point where your invested assets, growing without additional contributions, will compound to your full FIRE number by retirement age. Once you hit Coast FIRE, you only need to cover living expenses — no more saving required.</p></details><details class="faq-item"><summary>What return rate should I use?</summary><p>The US stock market has historically returned ~10% nominal or ~7% real (inflation-adjusted). Use 5–7% for conservative projections and 8–10% for optimistic scenarios.</p></details><details class="faq-item"><summary>How do I account for inflation?</summary><p>Use the real (inflation-adjusted) return rate instead of nominal. For example, enter 7% instead of 10% to implicitly subtract ~3% inflation from your growth assumptions.</p></details><details class="faq-item"><summary>Is this a formal financial planning tool?</summary><p>This is a reference tool for estimation. Actual retirement planning should account for taxes, social security, healthcare costs, and personal circumstances — consult a financial advisor for a personalized plan.</p></details>'},
  zh:{sub:'FIRE数字·实现财务自由的时间·4%法则',langBtn:'🌐 日本語',backBtn:'← 所有工具',currentLabel:'当前储蓄',annualSavLabel:'年储蓄额',annualExpLabel:'退休后年支出',retireAgeLabel:'当前年龄',returnLabel:'预期年化收益率（%）',withdrawLabel:'提款率（%）',calcBtn:'▶ 计算',fireNumLabel:'FIRE数字',progressLabel:'完成进度',yearsLabel:'距离FIRE还需年数',retireAgeResLabel:'退休年龄',retireYearLabel:'退休年份',monthlyWithdrawLabel:'每月可提取金额',coastNumLabel:'Coast FIRE数字',coastStatusLabel:'当前状态',mlTitle:'资产里程碑',yearsUnit:'年',coastReached:'✓ 已达到',coastNotYet:'尚未达到',seoHtml:'<h2>FIRE计算器</h2><p><strong>FIRE（财务独立提前退休）</strong>是通过积极储蓄和投资实现财务自由的生活方式。FIRE数字=年支出×25倍（4%法则）。输入当前储蓄、年储蓄额和预期收益率，预测实现财务自由的时间。</p><h2>常见问题 (FAQ)</h2><details class="faq-item"><summary>FIRE数字如何计算？</summary><p>FIRE数字 = 年支出 × 25倍。例如年支出10万元 → FIRE数字 = 250万元。基于Trinity Study（4%法则）：从该金额每年提取4%，资产可维持30年以上。</p></details><details class="faq-item"><summary>什么是Coast FIRE？</summary><p>Coast FIRE是指当前投资资产在不追加储蓄的情况下，依靠复利增长到退休年龄时就能达到FIRE数字的时间点。达到Coast FIRE后，只需覆盖生活费即可，无需继续储蓄。</p></details><details class="faq-item"><summary>应该使用什么收益率？</summary><p>美国股市历史平均名义收益率约10%，实际收益率（扣除通胀）约7%。保守估算用5-7%，乐观估算用8-10%。</p></details><details class="faq-item"><summary>如何考虑通货膨胀？</summary><p>使用实际收益率（名义收益率减通胀率）代替名义收益率。例如输入7%而非10%，相当于隐性扣除约3%的通胀。</p></details><details class="faq-item"><summary>这是正式的财务规划工具吗？</summary><p>仅供参考。实际退休规划需考虑税务、养老金、医疗费用等个人变量，建议咨询专业理财顾问。</p></details>'},
  ja:{sub:'FIREナンバー · 経済的自由達成まで · 4%ルール計算機',langBtn:'🌐 한국어',backBtn:'← ホーム',currentLabel:'現在の資産',annualSavLabel:'年間貯蓄額',annualExpLabel:'退職後の年間支出',retireAgeLabel:'現在の年齢',returnLabel:'想定年間利回り (%)',withdrawLabel:'引出率 (%)',calcBtn:'▶ 計算する',fireNumLabel:'FIREナンバー',progressLabel:'達成率',yearsLabel:'達成まで残り年数',retireAgeResLabel:'退職年齢',retireYearLabel:'退職年度',monthlyWithdrawLabel:'月間引出可能額',coastNumLabel:'Coast FIRE ナンバー',coastStatusLabel:'現在の状況',mlTitle:'資産マイルストーン',yearsUnit:'年',coastReached:'✓ 達成済み',coastNotYet:'未達成',seoHtml:'<h2>FIRE計算機</h2><p><strong>FIRE（経済的自立・早期退職）</strong>は積極的な貯蓄と投資で経済的自由を目指すライフスタイルです。FIREナンバー = 年間支出 × 25倍（4%ルール）。現在の資産・年間貯蓄額・期待利回りを入力して、経済的自由達成までの期間を予測します。</p><h2>よくある質問 (FAQ)</h2><details class="faq-item"><summary>FIREナンバーはどう計算しますか？</summary><p>FIREナンバー = 年間支出 × 25倍。例：年間支出300万円 → FIREナンバー = 7,500万円。Trinity Study（4%ルール）に基づき、この金額から年4%ずつ引き出しても30年以上資産が持続します。</p></details><details class="faq-item"><summary>Coast FIREとは何ですか？</summary><p>現在の投資資産が追加貯蓄なしで複利成長し、目標退職年齢までにFIREナンバーに到達できる時点のことです。Coast FIRE達成後は生活費を稼ぐだけでよく、貯蓄の必要がなくなります。</p></details><details class="faq-item"><summary>利回りは何%を使えばいいですか？</summary><p>米国株式市場の長期平均実質利回り（インフレ調整後）は約7%です。保守的には5〜7%、積極的には8〜10%を入力してシミュレーションしてみてください。</p></details><details class="faq-item"><summary>インフレはどう考慮しますか？</summary><p>名目利回りの代わりに実質利回り（インフレ分を差し引いた値）を入力してください。例えば10%の代わりに7%を入力すると、約3%のインフレが暗黙的に反映されます。</p></details><details class="faq-item"><summary>正式な財務計画ツールですか？</summary><p>参考ツールです。実際の退職計画は税金・公的年金・医療費などの個人変数が多いため、ファイナンシャルプランナーへの相談を推奨します。</p></details>'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function fmt(n){return Math.round(n).toLocaleString(_lang==='ko'?'ko-KR':'en-US');}
function calc(){
  const curr=parseFloat(document.getElementById('current').value)||0;
  const sav=parseFloat(document.getElementById('annualSav').value)||0;
  const exp=parseFloat(document.getElementById('annualExp').value)||0;
  const age=parseInt(document.getElementById('currentAge').value)||30;
  const ret=parseFloat(document.getElementById('returnRate').value)/100||0.07;
  const wr=parseFloat(document.getElementById('withdrawRate').value)/100||0.04;
  const t=_i18n[_lang];
  const fireNum=exp/wr;
  const pct=Math.min(100,curr/fireNum*100);
  let years=0,portfolio=curr;
  while(portfolio<fireNum&&years<100){
    portfolio=portfolio*(1+ret)+sav;
    years++;
  }
  const retireAge=age+years;
  const retireYear=new Date().getFullYear()+years;
  const monthly=fireNum*wr/12;
  const coastFire=fireNum/Math.pow(1+ret,65-age);
  document.getElementById('rFireNum').textContent=fmt(fireNum);
  document.getElementById('rFireSub').textContent=`${fmt(exp/12)} × 12 ÷ ${(wr*100).toFixed(1)}%`;
  document.getElementById('rPct').textContent=pct.toFixed(1)+'%';
  document.getElementById('progFill').style.width=Math.min(100,pct)+'%';
  document.getElementById('rYears').textContent=years>=100?'100+':years+t.yearsUnit;
  document.getElementById('rRetireAge').textContent=retireAge>=115?'115+':retireAge;
  document.getElementById('rRetireYear').textContent=retireYear>=2124?'2124+':retireYear;
  document.getElementById('rMonthly').textContent=fmt(monthly);
  document.getElementById('rCoast').textContent=fmt(coastFire);
  document.getElementById('rCoastStatus').textContent=curr>=coastFire?t.coastReached:t.coastNotYet;
  const milestones=[0.25,0.5,0.75,1.0,1.25];
  let mlHtml='';
  milestones.forEach(m=>{
    const target=fireNum*m;
    let yrs=0,p=curr;
    while(p<target&&yrs<100){p=p*(1+ret)+sav;yrs++;}
    const yr=p>=target?new Date().getFullYear()+yrs:'-';
    mlHtml+=`<div class="ml-row"><span class="ml-pct">${(m*100).toFixed(0)}%</span><span class="ml-amt">${fmt(target)}</span><span class="ml-yr">${yr}</span></div>`;
  });
  document.getElementById('mlBody').innerHTML=mlHtml;
  document.getElementById('result').style.display='block';
}
_lang=detectLang();applyLang();
</script>
