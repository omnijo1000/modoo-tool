<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator - Free Online QR Code Maker</title>
<meta name="description" content="Free online QR code generator. Create QR codes for URLs, text, WiFi, contact info. Download as PNG. All processing in browser.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="alternate" hreflang="ko" href="https://modoohub.com/qr-generator.html">
<link rel="alternate" hreflang="en" href="https://modoohub.com/qr-generator.html?lang=en">
<link rel="alternate" hreflang="zh" href="https://modoohub.com/qr-generator.html?lang=zh">
<link rel="alternate" hreflang="x-default" href="https://modoohub.com/qr-generator.html">
<link rel="canonical" href="https://modoohub.com/qr-generator.html">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#34d399;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:680px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.type-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.type-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}
.type-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(52,211,153,.08);}
.type-btn:not(.on):hover{border-color:var(--accent);color:var(--accent);}
.input-area{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;}
.field{margin-bottom:10px;}
.field:last-child{margin-bottom:0;}
label.fl{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
input.fi,textarea.fi,select.fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
input.fi:focus,textarea.fi:focus{border-color:var(--accent);}
textarea.fi{resize:none;min-height:80px;line-height:1.6;}
.opts-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.opt-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
select.sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;}
input[type=color].sm{width:36px;height:28px;border:1px solid var(--border);border-radius:6px;padding:2px;background:none;cursor:pointer;}
.gen-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-bottom:20px;}
.gen-btn:hover{opacity:.85;}
.result{text-align:center;}
#qrWrap{display:inline-block;background:#fff;padding:16px;border-radius:12px;margin-bottom:12px;}
#qrWrap canvas,#qrWrap img{display:block;}
.dl-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.tbtn{padding:8px 18px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NR6VJF0534"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-NR6VJF0534');</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6334638921720175" crossorigin="anonymous"></script>
<meta property="og:title" content="QR Code Generator - Free Online Tool">
<meta property="og:image" content="https://modoohub.com/og-image.png">
</head>
<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>QR Code <span>Generator</span></h1>
  <p class="sub" data-i18n="sub">URL · 텍스트 · WiFi · 연락처 QR코드 생성 · PNG 다운로드</p>

  <div class="type-row">
    <button class="type-btn on" id="tUrl" onclick="setType('url')">URL</button>
    <button class="type-btn" id="tText" onclick="setType('text')" data-i18n="tText">텍스트</button>
    <button class="type-btn" id="tWifi" onclick="setType('wifi')">WiFi</button>
    <button class="type-btn" id="tEmail" onclick="setType('email')">Email</button>
    <button class="type-btn" id="tPhone" onclick="setType('phone')" data-i18n="tPhone">전화번호</button>
  </div>

  <div class="input-area" id="inputArea"></div>

  <div class="opts-row">
    <span class="opt-label" data-i18n="sizeLabel">크기</span>
    <select class="sm" id="qrSize">
      <option value="128">128px</option>
      <option value="256" selected>256px</option>
      <option value="512">512px</option>
    </select>
    <span class="opt-label" data-i18n="ecLabel">오류 수정</span>
    <select class="sm" id="qrEc">
      <option value="L">L (7%)</option>
      <option value="M" selected>M (15%)</option>
      <option value="Q">Q (25%)</option>
      <option value="H">H (30%)</option>
    </select>
    <span class="opt-label" data-i18n="colorLabel">색상</span>
    <input type="color" class="sm" id="qrColor" value="#000000">
    <input type="color" class="sm" id="qrBg" value="#ffffff">
  </div>

  <button class="gen-btn" onclick="generate()" data-i18n="genBtn">▶ QR 코드 생성</button>

  <div class="result" id="result" style="display:none">
    <div id="qrWrap"><canvas id="qrCanvas"></canvas></div>
    <div class="dl-row">
      <button class="tbtn" onclick="downloadQR()" data-i18n="downloadBtn">PNG 다운로드</button>
      <button class="tbtn" onclick="copyQR()" data-i18n="copyImgBtn">이미지 복사</button>
    </div>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">QR Code Generator란?</h2>
    <p data-i18n="seoP">URL, 텍스트, WiFi 설정, 이메일, 전화번호 등을 QR코드로 변환합니다. 크기·오류수정 레벨·색상을 커스터마이즈하고 PNG로 다운로드할 수 있습니다.</p>
  </div>
  <footer>QR Code Generator · qrcode.js · All processing in browser</footer>
</main>
<script>
const _i18n={
  ko:{sub:'URL · 텍스트 · WiFi · 연락처 QR코드 생성 · PNG 다운로드',langBtn:'🌐 EN',backBtn:'← 모두의 툴',tText:'텍스트',tPhone:'전화번호',sizeLabel:'크기',ecLabel:'오류 수정',colorLabel:'색상',genBtn:'▶ QR 코드 생성',downloadBtn:'PNG 다운로드',copyImgBtn:'이미지 복사',seoH2:'QR Code Generator란?',seoP:'URL·텍스트·WiFi·이메일·전화번호를 QR코드로 변환합니다. 크기·색상 커스터마이즈, PNG 다운로드를 지원합니다.'},
  en:{sub:'URL · Text · WiFi · Contact QR code generator · PNG download',langBtn:'🌐 中文',backBtn:'← All Tools',tText:'Text',tPhone:'Phone',sizeLabel:'Size',ecLabel:'Error correction',colorLabel:'Color',genBtn:'▶ Generate QR Code',downloadBtn:'Download PNG',copyImgBtn:'Copy Image',seoH2:'QR Code Generator',seoP:'Convert URLs, text, WiFi settings, emails, and phone numbers to QR codes. Customize size, error correction and colors. Download as PNG.'},
  zh:{sub:'URL·文字·WiFi·联系人QR码生成·PNG下载',langBtn:'🌐 한국어',backBtn:'← 所有工具',tText:'文字',tPhone:'电话号码',sizeLabel:'尺寸',ecLabel:'纠错级别',colorLabel:'颜色',genBtn:'▶ 生成QR码',downloadBtn:'下载PNG',copyImgBtn:'复制图片',seoH2:'QR码生成器',seoP:'将URL、文字、WiFi设置、邮件、电话号码转换为QR码，支持自定义尺寸、颜色，可下载PNG。'},
};
let _lang='ko',_type='url';
const LANGS=['ko','en','zh'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

const FORMS={
  url:`<div class="field"><label class="fl">URL</label><input class="fi" id="f_url" placeholder="https://example.com" value="https://modoohub.com"></div>`,
  text:`<div class="field"><label class="fl" data-i18n="tText">텍스트</label><textarea class="fi" id="f_text" placeholder="텍스트를 입력하세요"></textarea></div>`,
  wifi:`<div class="field"><label class="fl">SSID</label><input class="fi" id="f_ssid" placeholder="Network name"></div><div class="field"><label class="fl">Password</label><input class="fi" id="f_wpass" type="password" placeholder="Password"></div><div class="field"><label class="fl">Security</label><select class="fi" id="f_sec"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="">None</option></select></div>`,
  email:`<div class="field"><label class="fl">Email</label><input class="fi" id="f_email" placeholder="you@example.com"></div><div class="field"><label class="fl">Subject</label><input class="fi" id="f_subj" placeholder="Subject (optional)"></div>`,
  phone:`<div class="field"><label class="fl">Phone</label><input class="fi" id="f_phone" placeholder="+82-10-0000-0000"></div>`,
};

function setType(t){
  _type=t;
  ['Url','Text','Wifi','Email','Phone'].forEach(n=>document.getElementById('t'+n).classList.remove('on'));
  const map={url:'Url',text:'Text',wifi:'Wifi',email:'Email',phone:'Phone'};
  document.getElementById('t'+map[t]).classList.add('on');
  document.getElementById('inputArea').innerHTML=FORMS[t];
  document.getElementById('result').style.display='none';
}

function buildContent(){
  if(_type==='url') return(document.getElementById('f_url').value||'').trim();
  if(_type==='text') return(document.getElementById('f_text').value||'').trim();
  if(_type==='wifi'){const s=document.getElementById('f_ssid').value,p=document.getElementById('f_wpass').value,t=document.getElementById('f_sec').value;return`WIFI:T:${t||'nopass'};S:${s};P:${p};;`;}
  if(_type==='email'){const e=document.getElementById('f_email').value,s=document.getElementById('f_subj').value;return`mailto:${e}`+(s?`?subject=${encodeURIComponent(s)}`:'');}
  if(_type==='phone') return'tel:'+(document.getElementById('f_phone').value||'').trim();
  return '';
}

async function generate(){
  const content=buildContent();
  if(!content) return;
  const size=parseInt(document.getElementById('qrSize').value);
  const ec=document.getElementById('qrEc').value;
  const color=document.getElementById('qrColor').value;
  const bg=document.getElementById('qrBg').value;
  const canvas=document.getElementById('qrCanvas');
  try{
    await QRCode.toCanvas(canvas,content,{width:size,errorCorrectionLevel:ec,color:{dark:color,light:bg}});
    document.getElementById('result').style.display='block';
    document.getElementById('qrWrap').style.background=bg;
  }catch(e){alert('QR 생성 실패: '+e.message);}
}

function downloadQR(){
  const canvas=document.getElementById('qrCanvas');
  const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download='qrcode.png';a.click();
}

async function copyQR(){
  const canvas=document.getElementById('qrCanvas');
  canvas.toBlob(async blob=>{
    try{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);showToast();}
    catch{const a=document.createElement('a');a.href=canvas.toDataURL();a.download='qrcode.png';a.click();}
  });
}

function showToast(){const el=document.getElementById('toast');if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}}
_lang=detectLang();applyLang();setType('url');
</script>
<div class="copied-toast" id="toast" data-i18n="toastMsg">복사되었습니다!</div>
</body>
</html>
