.type-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}
.type-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(52,211,153,.08);}
.type-btn:not(.on):hover{border-color:var(--accent);color:var(--accent);}
.input-area{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;}
.field{margin-bottom:10px;}
.field:last-child{margin-bottom:0;}
label.fl{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
input.fi,textarea.fi,select.fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
input.fi:focus,textarea.fi:focus{border-color:var(--accent);}
textarea.fi{resize:none;min-height:80px;line-height:1.6;}
.opts-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.opt-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
select.sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;}
input[type=color].sm{width:36px;height:28px;border:1px solid var(--border);border-radius:6px;padding:2px;background:none;cursor:pointer;}
.gen-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-bottom:20px;}
.gen-btn:hover{opacity:.85;}
.result{text-align:center;}
#qrWrap{display:inline-block;background:#fff;padding:16px;border-radius:12px;margin-bottom:12px;}
#qrWrap canvas,#qrWrap img{display:block;}
.dl-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.tbtn{padding:8px 18px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo-sub{font-size:14px;font-weight:700;color:var(--text-muted);margin:20px 0 8px;}
.seo-ul{padding-left:18px;margin-bottom:12px;}
.seo-ul li{font-size:13px;color:var(--text-dim);line-height:1.9;margin-bottom:4px;}
.faq-item{border-bottom:1px solid var(--border);padding:10px 0;}
.faq-item summary{font-size:13px;color:var(--text-muted);cursor:pointer;list-style:none;padding-right:16px;}
.faq-item summary::-webkit-details-marker{display:none;}
.faq-item[open] summary{color:var(--text);}
.faq-item p{font-size:12px;color:var(--text-dim);line-height:1.8;margin-top:8px;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<script>
const _i18n={
  ko:{sub:'URL · 텍스트 · WiFi · 연락처 QR코드 생성 · PNG 다운로드',langBtn:'🌐 EN',backBtn:'← 모두의 툴',tText:'텍스트',tPhone:'전화번호',sizeLabel:'크기',ecLabel:'오류 수정',colorLabel:'색상',genBtn:'▶ QR 코드 생성',downloadBtn:'PNG 다운로드',copyImgBtn:'이미지 복사',seoH2:'QR Code Generator 완벽 가이드',seoP:'QR코드 생성기는 URL, 텍스트, WiFi, 이메일, 전화번호를 스캔 가능한 QR코드 이미지로 변환하는 무료 온라인 도구입니다. 모든 처리는 브라우저 내에서만 이루어져 입력한 데이터가 서버로 전송되지 않습니다. QR코드(Quick Response Code)는 1994년 일본 덴소웨이브가 개발한 2차원 바코드로, 최대 7,089자(숫자) 또는 4,296자(영숫자)를 저장할 수 있으며 손상 시 최대 30%까지 복원됩니다. 오류 수정 레벨 L(7%)은 화면 표시용, M(15%)은 일반 사용, Q(25%)는 인쇄물, H(30%)는 로고 삽입 시 권장합니다. 인쇄 최소 크기는 2×2cm이며 전경·배경 색상 대비를 충분히 유지해야 스캔 성공률이 높습니다. 생성된 PNG 파일은 명함, 포스터, 패키지, 음식점 메뉴판, WiFi 안내판, 행사 등록 폼 등 다양한 매체에 활용할 수 있습니다.',exH3:'사용 예시',exList:'<li><strong>음식점 디지털 메뉴</strong> — URL 선택 → 온라인 메뉴 주소 입력 → 512px + H 레벨 → PNG 인쇄 후 테이블 부착</li><li><strong>카페 WiFi 자동 연결</strong> — WiFi 선택 → SSID·비밀번호·WPA2 입력 → QR 생성 → 카운터에 비치</li><li><strong>명함 연락처</strong> — Phone 선택 → 전화번호 입력 → 명함 하단에 삽입</li><li><strong>이벤트 등록 링크</strong> — URL 선택 → Google Form 주소 → 행사 포스터에 삽입</li><li><strong>제품 상세 페이지</strong> — URL 선택 → 제품 URL 입력 → 패키지·설명서에 인쇄</li>',faqH3:'자주 묻는 질문',faqList:'<details class="faq-item"><summary>QR코드에 담을 수 있는 데이터 크기 제한이 있나요?</summary><p>숫자 최대 7,089개, 영숫자 4,296자, 바이너리 2,953바이트까지 저장 가능합니다. URL이 길면 bit.ly 등으로 단축 후 사용하세요.</p></details><details class="faq-item"><summary>오류 수정 레벨은 어떻게 선택하나요?</summary><p>L(7%): 깨끗한 화면 표시용. M(15%): 일반 사용 권장. Q(25%): 인쇄물·야외 노출. H(30%): 중앙 로고 삽입 시. 레벨이 높을수록 QR이 복잡해집니다.</p></details><details class="faq-item"><summary>생성한 QR코드의 유효기간이 있나요?</summary><p>정적 QR코드 자체는 만료되지 않습니다. 단, URL 타입의 경우 연결된 웹페이지가 삭제되거나 도메인이 만료되면 접속이 안 됩니다. 텍스트·WiFi·연락처는 영구 사용 가능합니다.</p></details><details class="faq-item"><summary>컬러 QR코드도 스캔이 잘 되나요?</summary><p>전경(어두운색)과 배경(밝은색)의 명도 대비가 충분하면(최소 3:1 권장) 스캔됩니다. 밝은 전경+어두운 배경은 일부 스캐너에서 실패할 수 있으니 주의하세요.</p></details><details class="faq-item"><summary>WiFi QR코드는 어떻게 만드나요?</summary><p>WiFi 탭 선택 → 네트워크 이름(SSID), 비밀번호, 보안 방식(WPA2 권장) 입력 → QR 생성. iOS 11+, Android 9+ 기본 카메라로 스캔 시 자동 연결 팝업이 나타납니다.</p></details><details class="faq-item"><summary>인쇄 시 최소 크기는 얼마나 되나요?</summary><p>명함: 1.5×1.5cm 이상. 일반 안내판: 3×3cm 이상. 야외 현수막: 10×10cm 이상. 스캔 거리가 멀수록 크게 만들어야 하며 512px 이미지를 300dpi로 인쇄하세요.</p></details><details class="faq-item"><summary>동적 QR코드와 정적 QR코드의 차이는?</summary><p>정적(이 도구): 데이터가 QR코드에 직접 인코딩, 생성 후 변경 불가, 무료. 동적: 단축 URL을 거쳐 대상을 언제든 수정 가능, 스캔 통계 확인 가능, 유료 서비스 필요.</p></details><details class="faq-item"><summary>QR코드 중앙에 로고를 삽입할 수 있나요?</summary><p>이 도구는 순수 QR코드만 생성합니다. 로고 삽입이 필요하면 오류 수정 레벨을 H(30%)로 설정하고 PNG 다운로드 후 Photoshop·Figma·Canva 등에서 중앙(최대 면적의 30%)에 로고를 얹으세요.</p></details><details class="faq-item"><summary>iOS와 Android 모두 스캔 가능한가요?</summary><p>iOS 11+ 기본 카메라 앱, Android 9+ 기본 카메라 또는 Google Lens로 별도 앱 없이 스캔 가능합니다. 구형 기기는 전용 QR 스캐너 앱이 필요할 수 있습니다.</p></details><details class="faq-item"><summary>스캔 성공률을 높이는 방법은?</summary><p>① 인쇄 해상도 300dpi 이상 ② 전경·배경 명도 대비 충분히 유지 ③ 최소 크기 준수 ④ 반사 코팅지 사용 자제 ⑤ 오류 수정 레벨 Q 이상 사용 ⑥ QR 주변 여백(Quiet Zone) 4셀 이상 확보.</p></details><details class="faq-item"><summary>생성한 QR코드의 저작권은?</summary><p>이 도구로 생성한 QR코드는 사용자 소유입니다. 상업적 사용, 인쇄, 재배포 모두 자유롭게 가능합니다.</p></details><details class="faq-item"><summary>긴 URL도 QR코드로 만들 수 있나요?</summary><p>담을 수는 있지만 데이터가 많을수록 QR코드가 복잡해져 스캔 실패 위험이 높아집니다. 긴 URL은 bit.ly·t.ly 등 단축 서비스를 먼저 사용하는 것을 권장합니다.</p></details>'},
  en:{sub:'URL · Text · WiFi · Contact QR code generator · PNG download',langBtn:'🌐 中文',backBtn:'← All Tools',tText:'Text',tPhone:'Phone',sizeLabel:'Size',ecLabel:'Error correction',colorLabel:'Color',genBtn:'▶ Generate QR Code',downloadBtn:'Download PNG',copyImgBtn:'Copy Image',seoH2:'QR Code Generator — Complete Guide',seoP:'A free online QR code generator that converts URLs, text, WiFi credentials, emails and phone numbers into scannable QR code images. All processing happens entirely in your browser — no data is ever sent to a server. QR codes (Quick Response Code), invented by Denso Wave in 1994, store up to 7,089 numeric or 4,296 alphanumeric characters and can self-correct up to 30% damage. Error correction levels: L(7%) for clean digital use, M(15%) general purpose, Q(25%) for print, H(30%) when embedding a logo. Minimum print size: 2×2cm; always maintain sufficient contrast between foreground and background. Export as PNG for business cards, menus, posters, packaging, event registrations, and WiFi signs.',exH3:'Usage Examples',exList:'<li><strong>Restaurant digital menu</strong> — Select URL → enter online menu address → 512px + Level H → print and attach to table</li><li><strong>Café WiFi auto-connect</strong> — Select WiFi → enter SSID, password, WPA2 → generate QR → display at counter</li><li><strong>Business card contact</strong> — Select Phone → enter phone number → insert into business card design</li><li><strong>Event registration link</strong> — Select URL → enter Google Form URL → insert into event poster</li><li><strong>Product detail page</strong> — Select URL → enter product URL → print on packaging or manual</li>',faqH3:'Frequently Asked Questions',faqList:'<details class="faq-item"><summary>How much data can a QR code hold?</summary><p>Up to 7,089 numeric digits, 4,296 alphanumeric characters, or 2,953 bytes of binary. For long URLs, use a URL shortener like bit.ly first.</p></details><details class="faq-item"><summary>Which error correction level should I choose?</summary><p>L(7%): clean screens. M(15%): general use (recommended). Q(25%): printed materials or outdoor. H(30%): when inserting a logo in the center. Higher levels make the QR denser and slightly larger.</p></details><details class="faq-item"><summary>Do QR codes expire?</summary><p>Static QR codes never expire. However, if the linked URL is deleted or the domain expires, scanning will fail. Text, WiFi, and contact QR codes work indefinitely.</p></details><details class="faq-item"><summary>Do colored QR codes still scan?</summary><p>Yes, as long as the foreground (dark) and background (light) have sufficient contrast (minimum 3:1 ratio). Light-on-dark may fail with some scanners.</p></details><details class="faq-item"><summary>How do I create a WiFi QR code?</summary><p>Select the WiFi tab → enter your network name (SSID), password, and security type (WPA2 recommended) → generate. iOS 11+ and Android 9+ cameras connect automatically on scan.</p></details><details class="faq-item"><summary>What is the minimum print size?</summary><p>Business card: 1.5×1.5cm minimum. Standard signage: 3×3cm. Outdoor banner: 10×10cm or larger. Use 512px at 300dpi for sharp print quality.</p></details><details class="faq-item"><summary>Static vs dynamic QR code — what is the difference?</summary><p>Static (this tool): data encoded directly, cannot be changed after creation, free. Dynamic: routes through a short URL so the destination can be updated anytime; requires a paid service.</p></details><details class="faq-item"><summary>Can I add a logo to the center?</summary><p>This tool generates a pure QR code. To add a logo, set error correction to H(30%), download the PNG, then overlay your logo (max 30% of QR area) in Photoshop, Figma, or Canva.</p></details><details class="faq-item"><summary>Does it work on both iOS and Android?</summary><p>Yes. iOS 11+ and Android 9+ built-in cameras scan without any extra app. Older devices may require a dedicated QR scanner app.</p></details><details class="faq-item"><summary>How can I improve scan reliability?</summary><p>① Use 300 dpi or higher for print ② Maintain adequate foreground/background contrast ③ Keep minimum size ④ Avoid glossy reflective surfaces ⑤ Use error correction Q or higher ⑥ Leave a quiet zone (4 cells) around the QR.</p></details><details class="faq-item"><summary>Who owns the generated QR codes?</summary><p>You do. QR codes generated with this tool are yours to use, print, and distribute commercially — no restrictions.</p></details><details class="faq-item"><summary>Can I encode a very long URL?</summary><p>Yes, but the more data, the denser and harder to scan the QR becomes. Shorten long URLs with bit.ly or t.ly before encoding for best results.</p></details>'},
  zh:{sub:'URL·文字·WiFi·联系人QR码生成·PNG下载',langBtn:'🌐 日本語',backBtn:'← 所有工具',tText:'文字',tPhone:'电话号码',sizeLabel:'尺寸',ecLabel:'纠错级别',colorLabel:'颜色',genBtn:'▶ 生成QR码',downloadBtn:'下载PNG',copyImgBtn:'复制图片',seoH2:'二维码生成器完整指南',seoP:'免费在线二维码生成器，可将网址、文字、WiFi设置、邮箱和电话号码转换为可扫描的二维码图片。所有处理均在浏览器内完成，数据不会上传至服务器。二维码（QR Code）由日本电装波动公司于1994年发明，可存储最多7,089个数字或4,296个字母数字，损坏30%仍可恢复。纠错级别：L(7%)适用于屏幕显示，M(15%)通用，Q(25%)适用于印刷品，H(30%)适用于嵌入Logo。最小印刷尺寸为2×2厘米，前景与背景颜色对比需充足。导出PNG格式，适用于名片、菜单、海报、包装、活动报名及WiFi指示牌等多种场景。',exH3:'使用示例',exList:'<li><strong>餐厅数字菜单</strong> — 选择URL → 输入在线菜单地址 → 512px + H级别 → 打印后贴到桌面</li><li><strong>咖啡馆WiFi自动连接</strong> — 选择WiFi → 输入SSID、密码、WPA2 → 生成二维码 → 放置在前台</li><li><strong>名片联系方式</strong> — 选择电话 → 输入电话号码 → 插入名片下方</li><li><strong>活动报名链接</strong> — 选择URL → 输入Google表单地址 → 插入活动海报</li><li><strong>产品详情页</strong> — 选择URL → 输入产品URL → 打印在包装或说明书上</li>',faqH3:'常见问题解答',faqList:'<details class="faq-item"><summary>二维码能存储多少数据？</summary><p>最多可存储7,089个数字、4,296个字母数字或2,953字节的二进制数据。如URL较长，建议先使用bit.ly等短链工具缩短。</p></details><details class="faq-item"><summary>纠错级别如何选择？</summary><p>L(7%)：屏幕显示。M(15%)：通用（推荐）。Q(25%)：印刷品或户外。H(30%)：中心嵌入Logo时使用。级别越高，二维码密度越大。</p></details><details class="faq-item"><summary>二维码会过期吗？</summary><p>静态二维码本身不会过期。但若URL类型关联的网页被删除或域名过期，扫描后将无法访问。文字、WiFi和联系方式类型可永久使用。</p></details><details class="faq-item"><summary>彩色二维码能正常扫描吗？</summary><p>只要前景（深色）与背景（浅色）对比度足够（建议最低3:1），即可正常扫描。浅色前景+深色背景可能导致部分扫描器识别失败。</p></details><details class="faq-item"><summary>如何生成WiFi二维码？</summary><p>选择WiFi标签 → 输入网络名称(SSID)、密码和安全类型（建议WPA2）→ 生成二维码。iOS 11+和Android 9+相机扫描后可自动弹出连接提示。</p></details><details class="faq-item"><summary>打印的最小尺寸是多少？</summary><p>名片：最小1.5×1.5厘米。普通指示牌：最小3×3厘米。户外横幅：最小10×10厘米。建议使用512px图片以300dpi打印以获得清晰效果。</p></details><details class="faq-item"><summary>静态与动态二维码有何区别？</summary><p>静态（本工具）：数据直接编码在二维码中，生成后不可修改，免费使用。动态：通过短链跳转，可随时修改目标地址，支持扫描统计，需付费服务。</p></details><details class="faq-item"><summary>可以在二维码中央加入Logo吗？</summary><p>本工具生成纯二维码。若需加入Logo，请将纠错级别设为H(30%)，下载PNG后在Photoshop、Figma或Canva中将Logo（不超过二维码面积的30%）叠加在中央。</p></details><details class="faq-item"><summary>iOS和Android都能扫描吗？</summary><p>iOS 11+和Android 9+自带相机无需安装额外应用即可扫描。旧型设备可能需要专用二维码扫描应用。</p></details><details class="faq-item"><summary>如何提高扫描成功率？</summary><p>① 打印分辨率300dpi以上 ② 保持前景/背景充分对比 ③ 遵守最小尺寸规范 ④ 避免使用反光涂层纸 ⑤ 使用Q级以上纠错 ⑥ 二维码周围留出4格空白区。</p></details><details class="faq-item"><summary>生成的二维码版权归谁？</summary><p>版权归用户所有。使用本工具生成的二维码可自由用于商业用途、打印及分发，无任何限制。</p></details><details class="faq-item"><summary>能对很长的URL生成二维码吗？</summary><p>可以，但数据越多，二维码越密集，扫描失败的风险越高。建议先用bit.ly等工具缩短URL再生成。</p></details>'},
  ja:{sub:'URL · テキスト · WiFi · 連絡先QRコード生成 · PNGダウンロード',langBtn:'🌐 한국어',backBtn:'← ホーム',tText:'テキスト',tPhone:'電話番号',sizeLabel:'サイズ',ecLabel:'エラー訂正',colorLabel:'色',genBtn:'▶ QRコード生成',downloadBtn:'PNGダウンロード',copyImgBtn:'画像コピー',seoH2:'QRコードジェネレーター完全ガイド',seoP:'URL、テキスト、WiFi設定、メール、電話番号をスキャン可能なQRコード画像に変換する無料オンラインツールです。すべての処理はブラウザ内で完結し、入力データがサーバーに送信されることはありません。QRコード（Quick Response Code）は1994年にデンソーウェーブが開発した2次元バーコードで、最大7,089桁（数字）または4,296文字（英数字）を格納でき、30%まで損傷しても復元可能です。エラー訂正レベルL(7%)は画面表示向け、M(15%)は汎用、Q(25%)は印刷物、H(30%)はロゴ挿入時に推奨。印刷最小サイズは2×2cmで、前景と背景のコントラストを十分に確保することが重要です。',exH3:'使用例',exList:'<li><strong>飲食店のデジタルメニュー</strong> — URLを選択 → オンラインメニューURLを入力 → 512px + Hレベル → PNG印刷してテーブルに貼付</li><li><strong>カフェのWiFi自動接続</strong> — WiFiを選択 → SSID・パスワード・WPA2を入力 → QR生成 → カウンターに設置</li><li><strong>名刺の連絡先</strong> — 電話番号を選択 → 電話番号を入力 → 名刺下部に挿入</li><li><strong>イベント登録リンク</strong> — URLを選択 → Googleフォームのアドレス → イベントポスターに挿入</li><li><strong>製品詳細ページ</strong> — URLを選択 → 製品URLを入力 → パッケージ・説明書に印刷</li>',faqH3:'よくある質問',faqList:'<details class="faq-item"><summary>QRコードに格納できるデータ量は？</summary><p>数字は最大7,089桁、英数字は4,296文字、バイナリデータは2,953バイトまで格納できます。URLが長い場合はbit.lyなどで短縮してから使用してください。</p></details><details class="faq-item"><summary>エラー訂正レベルはどう選ぶ？</summary><p>L(7%): 清潔な環境の画面表示向け。M(15%): 汎用（推奨）。Q(25%): 印刷物・屋外露出。H(30%): 中央にロゴを挿入する場合。レベルが高いほどQRが複雑になります。</p></details><details class="faq-item"><summary>QRコードに有効期限はありますか？</summary><p>静的QRコード自体は期限切れになりません。ただしURLタイプの場合、リンク先のページが削除されたりドメインが失効するとアクセスできなくなります。テキスト・WiFi・連絡先は永続的に使用可能です。</p></details><details class="faq-item"><summary>カラーQRコードはスキャンできますか？</summary><p>前景（暗色）と背景（明色）の輝度コントラストが十分（最低3:1推奨）であればスキャン可能です。明るい前景に暗い背景の組み合わせは一部のスキャナーで失敗することがあります。</p></details><details class="faq-item"><summary>WiFi QRコードの作り方は？</summary><p>WiFiタブを選択 → ネットワーク名(SSID)、パスワード、セキュリティ方式(WPA2推奨)を入力 → QRを生成。iOS 11+とAndroid 9+の標準カメラでスキャンすると自動接続ポップアップが表示されます。</p></details><details class="faq-item"><summary>印刷時の最小サイズは？</summary><p>名刺: 1.5×1.5cm以上。一般サイネージ: 3×3cm以上。屋外バナー: 10×10cm以上。512px画像を300dpiで印刷することを推奨します。</p></details><details class="faq-item"><summary>静的QRコードと動的QRコードの違いは？</summary><p>静的（このツール）: データがQRコードに直接エンコードされ、生成後の変更不可、無料。動的: 短縮URLを介して宛先をいつでも変更可能、スキャン統計確認可能、有料サービスが必要。</p></details><details class="faq-item"><summary>中央にロゴを入れることはできますか？</summary><p>このツールは純粋なQRコードのみ生成します。ロゴ挿入が必要な場合は、エラー訂正レベルをH(30%)に設定してPNGをダウンロードし、Photoshop・Figma・Canvaなどでロゴ（QRコード面積の30%以内）を中央に重ねてください。</p></details><details class="faq-item"><summary>iOSとAndroidの両方でスキャンできますか？</summary><p>iOS 11+とAndroid 9+の標準カメラアプリで追加アプリなしにスキャン可能です。古い機種は専用QRスキャナーアプリが必要な場合があります。</p></details><details class="faq-item"><summary>スキャン成功率を上げるには？</summary><p>① 印刷解像度300dpi以上 ② 前景・背景の輝度コントラストを十分に確保 ③ 最小サイズを遵守 ④ 光沢コーティング紙を避ける ⑤ エラー訂正レベルQ以上を使用 ⑥ QR周囲のクワイエットゾーン（4セル以上）を確保。</p></details><details class="faq-item"><summary>生成したQRコードの著作権は？</summary><p>著作権はユーザーに帰属します。商用利用、印刷、再配布はすべて自由に行えます。</p></details><details class="faq-item"><summary>長いURLもQRコード化できますか？</summary><p>可能ですが、データが多いほどQRが複雑になりスキャン失敗のリスクが高まります。長いURLはbit.lyなどで短縮してから使用することを推奨します。</p></details>'},

let _lang='ko',_type='url';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

const FORMS={
  url:`<div class="field"><label class="fl">URL</label><input class="fi" id="f_url" placeholder="https://example.com" value="https://modoohub.com"></div>`,
  text:`<div class="field"><label class="fl" data-i18n="tText">텍스트</label><textarea class="fi" id="f_text" placeholder="텍스트를 입력하세요"></textarea></div>`,
  wifi:`<div class="field"><label class="fl">SSID</label><input class="fi" id="f_ssid" placeholder="Network name"></div><div class="field"><label class="fl">Password</label><input class="fi" id="f_wpass" type="password" placeholder="Password"></div><div class="field"><label class="fl">Security</label><select class="fi" id="f_sec"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="">None</option></select></div>`,
  email:`<div class="field"><label class="fl">Email</label><input class="fi" id="f_email" placeholder="you@example.com"></div><div class="field"><label class="fl">Subject</label><input class="fi" id="f_subj" placeholder="Subject (optional)"></div>`,
  phone:`<div class="field"><label class="fl">Phone</label><input class="fi" id="f_phone" placeholder="+82-10-0000-0000"></div>`,
};

function setType(t){
  _type=t;
  ['Url','Text','Wifi','Email','Phone'].forEach(n=>document.getElementById('t'+n).classList.remove('on'));
  const map={url:'Url',text:'Text',wifi:'Wifi',email:'Email',phone:'Phone'};
  document.getElementById('t'+map[t]).classList.add('on');
  document.getElementById('inputArea').innerHTML=FORMS[t];
  document.getElementById('result').style.display='none';
}

function buildContent(){
  if(_type==='url') return(document.getElementById('f_url').value||'').trim();
  if(_type==='text') return(document.getElementById('f_text').value||'').trim();
  if(_type==='wifi'){const s=document.getElementById('f_ssid').value,p=document.getElementById('f_wpass').value,t=document.getElementById('f_sec').value;return`WIFI:T:${t||'nopass'};S:${s};P:${p};;`;}
  if(_type==='email'){const e=document.getElementById('f_email').value,s=document.getElementById('f_subj').value;return`mailto:${e}`+(s?`?subject=${encodeURIComponent(s)}`:'');}
  if(_type==='phone') return'tel:'+(document.getElementById('f_phone').value||'').trim();
  return '';
}

async function generate(){
  const content=buildContent();
  if(!content) return;
  const size=parseInt(document.getElementById('qrSize').value);
  const ec=document.getElementById('qrEc').value;
  const color=document.getElementById('qrColor').value;
  const bg=document.getElementById('qrBg').value;
  const canvas=document.getElementById('qrCanvas');
  try{
    await QRCode.toCanvas(canvas,content,{width:size,errorCorrectionLevel:ec,color:{dark:color,light:bg}});
    document.getElementById('result').style.display='block';
    document.getElementById('qrWrap').style.background=bg;
  }catch(e){alert('QR 생성 실패: '+e.message);}
}

function downloadQR(){
  const canvas=document.getElementById('qrCanvas');
  const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download='qrcode.png';a.click();
}

async function copyQR(){
  const canvas=document.getElementById('qrCanvas');
  canvas.toBlob(async blob=>{
    try{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);showToast();}
    catch{const a=document.createElement('a');a.href=canvas.toDataURL();a.download='qrcode.png';a.click();}
  });
}

function showToast(){const el=document.getElementById('toast');if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}}
_lang=detectLang();applyLang();setType('url');
</script>
<div class="copied-toast" id="toast" data-i18n="toastMsg">복사되었습니다!</div>
<script src="related.js"></script>
