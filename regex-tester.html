<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정규식 테스터 - Regex 테스트 및 검증</title>
<meta name="description" content="정규식(Regex)을 실시간으로 테스트하세요. 매칭 결과 하이라이트, 캡처 그룹, 플래그 설정까지 지원하는 무료 온라인 정규식 테스터.">
<meta name="keywords" content="정규식 테스터, regex 테스터, 정규표현식, 정규식 테스트, regex test, 자바스크립트 정규식">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0a0f; --surface:#1a111a; --surface2:#221822; --border:#2e1e2e;
    --accent:#e879f9; --accent2:#d946ef; --accent-dim:rgba(232,121,249,0.08);
    --text:#fff0ff; --text-muted:#a878a8; --text-dim:#4a2a4a;
    --green:#4ade80; --red:#f87171; --yellow:#facc15; --blue:#60a5fa;
    --match-bg:rgba(232,121,249,0.25); --match-border:#d946ef;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; }
  header { border-bottom:1px solid var(--border); padding:20px 24px; display:flex; align-items:center; gap:12px; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--accent2); }
  .header-label { font-size:13px; color:var(--text-muted); letter-spacing:0.1em; font-family:'DM Mono',monospace; }
  .back-link { margin-left:auto; font-size:13px; color:var(--text-muted); text-decoration:none; }
  .back-link:hover { color:var(--accent2); }
  main { max-width:800px; margin:0 auto; padding:48px 24px; }
  h1 { font-size:clamp(26px,5vw,38px); font-weight:900; margin-bottom:12px; }
  h1 span { color:var(--accent2); }
  .subtitle { color:var(--text-muted); font-size:14px; margin-bottom:32px; }

  /* 정규식 입력 */
  .regex-input-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .regex-slash { font-family:'DM Mono',monospace; font-size:24px; color:var(--text-dim); }
  .regex-input { flex:1; background:transparent; border:none; outline:none; font-family:'DM Mono',monospace; font-size:20px; color:var(--accent); }
  .flag-input { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-family:'DM Mono',monospace; font-size:16px; color:var(--text-muted); outline:none; width:70px; }
  .flag-input:focus { border-color:var(--accent2); }

  /* 플래그 버튼 */
  .flags-row { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .flag-btn { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:5px 12px; font-size:12px; color:var(--text-muted); cursor:pointer; font-family:'DM Mono',monospace; transition:all 0.15s; }
  .flag-btn.active { background:var(--accent-dim); border-color:var(--accent2); color:var(--accent); }
  .flag-desc { font-size:11px; color:var(--text-dim); padding:0 2px; align-self:center; }

  /* 테스트 문자열 */
  .test-area { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:14px; }
  .area-label { font-size:11px; color:var(--text-muted); letter-spacing:0.08em; margin-bottom:10px; }
  textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px; font-family:'DM Mono',monospace; font-size:14px; color:var(--text); outline:none; resize:vertical; min-height:120px; line-height:1.6; }
  textarea:focus { border-color:var(--accent2); }

  /* 결과 하이라이트 */
  .highlight-area { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:14px; display:none; }
  .highlight-area.show { display:block; }
  .highlight-content { font-family:'DM Mono',monospace; font-size:14px; line-height:1.8; white-space:pre-wrap; word-break:break-all; }
  .match { background:var(--match-bg); border-bottom:2px solid var(--match-border); border-radius:2px; color:var(--accent); }

  /* 매치 결과 */
  .match-results { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:32px; display:none; }
  .match-results.show { display:block; }
  .match-count { font-size:13px; color:var(--text-muted); margin-bottom:12px; }
  .match-list { display:flex; flex-direction:column; gap:8px; max-height:300px; overflow-y:auto; }
  .match-item { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; }
  .match-index { font-size:11px; color:var(--text-dim); margin-bottom:4px; }
  .match-value { font-family:'DM Mono',monospace; font-size:13px; color:var(--accent); }
  .match-groups { margin-top:6px; display:flex; flex-direction:column; gap:3px; }
  .match-group { font-size:12px; color:var(--text-muted); font-family:'DM Mono',monospace; }

  /* 상태 */
  .status { padding:10px 16px; border-radius:8px; font-size:13px; margin-bottom:14px; display:none; }
  .status.show { display:flex; align-items:center; gap:8px; }
  .status.ok { background:rgba(74,222,128,0.08); border:1px solid rgba(74,222,128,0.3); color:var(--green); }
  .status.err { background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.3); color:var(--red); }
  .status.none { background:rgba(250,204,21,0.08); border:1px solid rgba(250,204,21,0.3); color:var(--yellow); }

  /* 프리셋 */
  .presets { margin-bottom:32px; }
  .preset-title { font-size:12px; color:var(--text-muted); letter-spacing:0.08em; margin-bottom:10px; }
  .preset-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; }
  .preset-btn { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; cursor:pointer; text-align:left; transition:all 0.15s; }
  .preset-btn:hover { border-color:var(--accent2); }
  .preset-name { font-size:13px; color:var(--text); margin-bottom:3px; }
  .preset-expr { font-family:'DM Mono',monospace; font-size:11px; color:var(--accent); }

  .seo { border-top:1px solid var(--border); padding-top:32px; }
  .seo h2 { font-size:16px; font-weight:700; margin-bottom:12px; }
  .seo p { font-size:13px; color:var(--text-muted); line-height:1.8; margin-bottom:24px; }
  footer { text-align:center; font-size:12px; color:var(--text-dim); margin-top:48px; }
</style>
</head>
<body>
<header>
  <div class="dot"></div>
  <span class="header-label">REGEX TESTER</span>
  <a href="index.html" class="back-link">← 모두의 툴</a>
</header>
<main>
  <h1>정규식<br><span>테스터</span></h1>
  <p class="subtitle">정규식을 실시간으로 테스트하고 매칭 결과를 확인하세요</p>

  <div class="regex-input-wrap">
    <span class="regex-slash">/</span>
    <input type="text" class="regex-input" id="regexInput" placeholder="정규식 입력..." oninput="test()">
    <span class="regex-slash">/</span>
    <input type="text" class="flag-input" id="flagInput" value="g" oninput="test()" maxlength="6" placeholder="flags">
  </div>

  <div class="flags-row">
    <span class="flag-desc">플래그:</span>
    <button class="flag-btn active" data-flag="g" onclick="toggleFlag('g')">g 전체</button>
    <button class="flag-btn" data-flag="i" onclick="toggleFlag('i')">i 대소문자무시</button>
    <button class="flag-btn" data-flag="m" onclick="toggleFlag('m')">m 멀티라인</button>
    <button class="flag-btn" data-flag="s" onclick="toggleFlag('s')">s 줄바꿈포함</button>
  </div>

  <div class="test-area">
    <div class="area-label">테스트 문자열</div>
    <textarea id="testInput" placeholder="테스트할 문자열을 입력하세요..." oninput="test()">안녕하세요! 이메일은 test@example.com 이고
전화번호는 010-1234-5678 입니다.
홈페이지는 https://www.example.co.kr 입니다.</textarea>
  </div>

  <div class="status" id="status"></div>

  <div class="highlight-area" id="highlightArea">
    <div class="area-label">매칭 하이라이트</div>
    <div class="highlight-content" id="highlightContent"></div>
  </div>

  <div class="match-results" id="matchResults">
    <div class="match-count" id="matchCount"></div>
    <div class="match-list" id="matchList"></div>
  </div>

  <div class="presets">
    <div class="preset-title">자주 쓰는 정규식</div>
    <div class="preset-grid">
      <button class="preset-btn" onclick="applyPreset('[\\w.-]+@[\\w.-]+\\.[a-zA-Z]{2,}','gi')"><div class="preset-name">이메일</div><div class="preset-expr">[\w.-]+@[\w.-]+\.[a-zA-Z]{2,}</div></button>
      <button class="preset-btn" onclick="applyPreset('01[016-9]-?\\d{3,4}-?\\d{4}','g')"><div class="preset-name">한국 휴대폰</div><div class="preset-expr">01[016-9]-?\d{3,4}-?\d{4}</div></button>
      <button class="preset-btn" onclick="applyPreset('https?://[^\\s]+','gi')"><div class="preset-name">URL</div><div class="preset-expr">https?://[^\s]+</div></button>
      <button class="preset-btn" onclick="applyPreset('\\d{4}-\\d{2}-\\d{2}','g')"><div class="preset-name">날짜 (YYYY-MM-DD)</div><div class="preset-expr">\d{4}-\d{2}-\d{2}</div></button>
      <button class="preset-btn" onclick="applyPreset('[가-힣]+','g')"><div class="preset-name">한글만</div><div class="preset-expr">[가-힣]+</div></button>
      <button class="preset-btn" onclick="applyPreset('[a-zA-Z0-9가-힣\\s]+','g')"><div class="preset-name">영문+숫자+한글</div><div class="preset-expr">[a-zA-Z0-9가-힣\s]+</div></button>
      <button class="preset-btn" onclick="applyPreset('\\d+','g')"><div class="preset-name">숫자만</div><div class="preset-expr">\d+</div></button>
      <button class="preset-btn" onclick="applyPreset('^\\d{6}(-\\d{7})?$','m')"><div class="preset-name">주민등록번호</div><div class="preset-expr">^\d{6}(-\d{7})?$</div></button>
    </div>
  </div>

  <div class="seo">
    <h2>정규식(Regex)이란?</h2>
    <p>정규식(Regular Expression)은 문자열에서 특정 패턴을 찾거나 검증하는 문자 패턴입니다. 이메일, 전화번호, URL 형식 검증, 문자열 추출 등에 활용됩니다.</p>
  </div>
  <footer>JavaScript RegExp 기준 · 실시간 처리, 서버 전송 없음</footer>
</main>
<script>
let activeFlags = new Set(['g']);

function toggleFlag(f) {
  if (activeFlags.has(f)) activeFlags.delete(f);
  else activeFlags.add(f);
  document.querySelectorAll('.flag-btn').forEach(btn => {
    btn.classList.toggle('active', activeFlags.has(btn.dataset.flag));
  });
  document.getElementById('flagInput').value = [...activeFlags].join('');
  test();
}

function applyPreset(pattern, flags) {
  document.getElementById('regexInput').value = pattern;
  document.getElementById('flagInput').value = flags;
  activeFlags = new Set(flags.split(''));
  document.querySelectorAll('.flag-btn').forEach(btn => {
    btn.classList.toggle('active', activeFlags.has(btn.dataset.flag));
  });
  test();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function test() {
  const pattern = document.getElementById('regexInput').value;
  const flags = document.getElementById('flagInput').value;
  const text = document.getElementById('testInput').value;
  const statusEl = document.getElementById('status');
  const highlightEl = document.getElementById('highlightArea');
  const matchResultsEl = document.getElementById('matchResults');

  if (!pattern) {
    statusEl.className = 'status';
    highlightEl.classList.remove('show');
    matchResultsEl.classList.remove('show');
    return;
  }

  let regex;
  try {
    regex = new RegExp(pattern, flags.includes('g') ? flags : flags + 'g');
  } catch(e) {
    statusEl.className = 'status show err';
    statusEl.innerHTML = '<span>✗ 잘못된 정규식: ' + e.message + '</span>';
    highlightEl.classList.remove('show');
    matchResultsEl.classList.remove('show');
    return;
  }

  const matches = [...text.matchAll(new RegExp(pattern, flags.includes('g') ? flags : flags + 'g'))];

  if (matches.length === 0) {
    statusEl.className = 'status show none';
    statusEl.innerHTML = '<span>⚠ 매칭 없음</span>';
    highlightEl.classList.remove('show');
    matchResultsEl.classList.remove('show');
    return;
  }

  statusEl.className = 'status show ok';
  statusEl.innerHTML = `<span>✓ ${matches.length}개 매칭</span>`;

  // 하이라이트
  let highlighted = '';
  let lastIndex = 0;
  for (const m of matches) {
    highlighted += escapeHtml(text.slice(lastIndex, m.index));
    highlighted += `<span class="match">${escapeHtml(m[0])}</span>`;
    lastIndex = m.index + m[0].length;
  }
  highlighted += escapeHtml(text.slice(lastIndex));
  document.getElementById('highlightContent').innerHTML = highlighted;
  highlightEl.classList.add('show');

  // 매치 목록
  document.getElementById('matchCount').textContent = `${matches.length}개 매칭`;
  document.getElementById('matchList').innerHTML = matches.map((m, i) => {
    const groups = m.slice(1).filter(g => g !== undefined);
    const groupsHtml = groups.length ? `<div class="match-groups">${groups.map((g,gi) => `<span class="match-group">그룹${gi+1}: ${g}</span>`).join('')}</div>` : '';
    return `<div class="match-item"><div class="match-index">#${i+1} · index: ${m.index}</div><div class="match-value">${escapeHtml(m[0])}</div>${groupsHtml}</div>`;
  }).join('');
  matchResultsEl.classList.add('show');
}

test();
</script>
</body>
</html>
