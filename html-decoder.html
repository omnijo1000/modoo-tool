        "text": "HTML entities are special character sequences used to represent characters that have reserved meaning in HTML or cannot easily be typed. They begin with an ampersand (&) and end with a semicolon (;). For example &lt; represents a less-than sign (<), &amp; represents an ampersand (&), and &quot; represents a double quote (\")."

      }
    },
    {
      "@type": "Question",
      "name": "What is the difference between named and numeric HTML entities?",
      "acceptedAnswer": {
        "@type": "Answer",

      }
    },
    {
      "@type": "Question",
      "name": "How are Unicode and emoji entities decoded?",
      "acceptedAnswer": {

      }

<details class="faq-item"><summary>What are HTML entities?</summary><p>HTML entities are special character sequences that start with & and end with ;. They represent characters that have special meaning in HTML syntax or cannot easily be typed. For example &amp;lt; is &lt;, &amp;amp; is &amp;, and &amp;quot; is ".</p></details>

<details class="faq-item"><summary>What is the difference between named and numeric entities?</summary><p>Named entities use readable names like &amp;lt; or &amp;copy;. Numeric entities use decimal (&amp;#60;) or hexadecimal (&amp;#x3C;) Unicode code points. Both produce the same character. Numeric entities can represent any Unicode character; named entities cover only a predefined set.</p></details>
<details class="faq-item"><summary>How are Unicode and emoji entities decoded?</summary><p>Unicode characters can be encoded as hex entities like &amp;#x1F600; for 😀. This tool uses the browser's native HTML parser via a textarea element, which natively handles all HTML5 named entities, decimal numeric entities, and hexadecimal numeric entities.</p></details>
<details class="faq-item"><summary>What is the difference between HTML decoding and URL decoding?</summary><p>HTML decoding converts &amp;lt; back to &lt; and &amp;amp; back to &amp;. URL decoding converts %3C back to &lt; and %26 back to &amp;. They are different schemes used in different contexts: HTML entities in markup, percent-encoding in URLs.</p></details>
<details class="faq-item"><summary>Why does scraped web data contain HTML entities?</summary><p>Web scraping retrieves raw HTML source which contains entities like &amp;amp; or &amp;nbsp;. Decoding these entities converts the HTML source into the actual text that users see in a browser. This decoder handles that conversion instantly.</p></details>
<details class="faq-item"><summary>Are there security concerns with HTML entity decoding?</summary><p>HTML entity decoding itself is safe. However, if you insert the decoded result into the DOM using innerHTML, you may reintroduce script tags or other HTML that could cause XSS vulnerabilities. Always use textContent to insert decoded text.</p></details>
<details class="faq-item"><summary>What are double-encoded entities?</summary><p>Double-encoded entities result from encoding an already-encoded string, turning &amp;lt; into &amp;amp;lt;. To fully decode a double-encoded string, run the decoder twice. Each pass removes one layer of encoding.</p></details>`

const REFS = [
  ['&amp;', '&'],
  ['&lt;', '<'],
  ['&gt;', '>'],
  ['&quot;', '"'],
  ['&#39;', "'"],
  ['&nbsp;', ' '],
  ['&copy;', '©'],
  ['&reg;', '®'],
  ['&trade;', '™'],
  ['&euro;', '€'],
  ['&pound;', '£'],
  ['&yen;', '¥'],
  ['&mdash;', '—'],
  ['&ndash;', '–'],
  ['&laquo;', '«'],
  ['&raquo;', '»'],
];

let lang = (function() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if (s && i18n[s]) return s;
  const n = (navigator.language || '').slice(0, 2);
  return n === 'zh' ? 'zh' : n === 'ja' ? 'ja' : n === 'ko' ? 'ko' : 'en';
})();

function applyLang() {
  const t = i18n[lang];
  document.documentElement.lang = lang;
  document.title = t.pageTitle;
  document.getElementById('h1El').innerHTML = t.h1;
  document.getElementById('subEl').textContent = t.sub;
  document.getElementById('backLink').textContent = t.backLink;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('btnPaste').textContent = t.btnPaste;
  document.getElementById('btnClear').textContent = t.btnClear;
  document.getElementById('btnSample').textContent = t.btnSample;
  document.getElementById('btnDecode').textContent = t.btnDecode;
  document.getElementById('btnCopy').textContent = t.btnCopy;
  document.getElementById('copySmall').textContent = t.btnCopy;
  document.getElementById('labelInput').textContent = t.labelInput;
  document.getElementById('labelOutput').textContent = t.labelOutput;
  document.getElementById('refTitle').textContent = t.refTitle;
  document.getElementById('footerEl').textContent = t.footer;
  document.getElementById('seoEl').innerHTML = t.seoHtml;
  updateStats(0);
}

function toggleLang() {
  const order = ['ko', 'en', 'zh', 'ja'];
  lang = order[(order.indexOf(lang) + 1) % order.length];
  localStorage.setItem('modoo_lang', lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', lang);
  history.replaceState({}, '', url);
  applyLang();
}

function updateStats(n) {
  const t = i18n[lang];
  document.getElementById('statsEl').innerHTML = t.statEntities.replace('${n}', '<span>' + n + '</span>');
}

function buildRefGrid() {
  const g = document.getElementById('refGrid');
  g.innerHTML = '';
  REFS.forEach(([entity, char]) => {
    const d = document.createElement('div');
    d.className = 'ref-item';
    const displayChar = char === ' ' ? '(nbsp)' : char;
    d.innerHTML = '<span class="ref-entity">' + entity.replace(/&/g, '&amp;') + '</span><span class="ref-char">' + displayChar + '</span>';
    g.appendChild(d);
  });
}

let _debounce;
function debouncedDecode() {
  clearTimeout(_debounce);
  _debounce = setTimeout(decodeHtml, 300);
}

function decodeHtml() {
  const text = document.getElementById('inputEl').value;
  if (!text) {
    document.getElementById('outputEl').value = '';
    updateStats(0);
    return;
  }
  const ta = document.createElement('textarea');
  ta.innerHTML = text;
  const decoded = ta.value;
  document.getElementById('outputEl').value = decoded;
  const count = (text.match(/&[#\w]+;/g) || []).length;
  updateStats(count);
}

function loadSample() {
  document.getElementById('inputEl').value = i18n[lang].sample;
  decodeHtml();
}

function clearAll() {
  document.getElementById('inputEl').value = '';
  document.getElementById('outputEl').value = '';
  updateStats(0);
}

async function pasteInput() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('inputEl').value = text;
    decodeHtml();
  } catch(e) {}
}

function copyOutput() {
  const text = document.getElementById('outputEl').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const t = i18n[lang];
    const btn = document.getElementById('btnCopy');
    const small = document.getElementById('copySmall');
    btn.textContent = t.copyDone;
    small.textContent = t.copyDone;
    btn.style.color = 'var(--green)';
    setTimeout(() => {
      btn.textContent = t.btnCopy;
      small.textContent = t.btnCopy;
      btn.style.color = '';
    }, 2000);
  });
}

applyLang();
buildRefGrid();
