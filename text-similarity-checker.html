<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What is cosine similarity?</summary><p>Represents texts as word-frequency vectors and measures the angle between them. Higher scores indicate more similar word distributions.</p></details>
<details class="faq-item"><summary>What is Jaccard similarity?</summary><p>Intersection of unique words divided by their union. Measures the proportion of shared unique vocabulary.</p></details>

function tokenize(text){return text.toLowerCase().replace(/[^\w\s가-힣]/g,' ').trim().split(/\s+/).filter(w=>w.length>0);}
function cosineSim(a,b){
  const freqA={},freqB={};
  for(const w of a)freqA[w]=(freqA[w]||0)+1;
  for(const w of b)freqB[w]=(freqB[w]||0)+1;
  const keys=new Set([...Object.keys(freqA),...Object.keys(freqB)]);
  let dot=0,normA=0,normB=0;
  for(const k of keys){const fa=freqA[k]||0,fb=freqB[k]||0;dot+=fa*fb;normA+=fa*fa;normB+=fb*fb;}
  if(!normA||!normB)return 0;
  return dot/(Math.sqrt(normA)*Math.sqrt(normB));
}
function jaccardSim(a,b){
  const setA=new Set(a),setB=new Set(b);
  const inter=[...setA].filter(w=>setB.has(w)).length;
  const union=new Set([...setA,...setB]).size;
  return union?inter/union:0;
}
function editSim(a,b){
  const s1=a.join(' '),s2=b.join(' ');
  if(!s1&&!s2)return 1;
  const m=s1.length,n=s2.length;
  if(m>500||n>500){const shorter=Math.min(m,n),longer=Math.max(m,n);return shorter/longer;}
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=s1[i-1]===s2[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return 1-dp[m][n]/Math.max(m,n);
}
function check(){
  const t=_i18n[_lang];
  const raw1=document.getElementById('text1').value;

  if(!raw1.trim()||!raw2.trim())return;

  const edt=editSim(tok1,tok2);

  document.getElementById('results').style.display='';
}
