      <p>Base64 인코딩은 바이너리 데이터 또는 임의의 텍스트를 64개의 출력 가능한 ASCII 문자(A–Z, a–z, 0–9, +, /)로 변환하는 방식입니다. HTTP 헤더, 이메일(MIME), JSON 필드, HTML data URI 등 ASCII 텍스트만 허용하는 채널에서도 임의의 데이터를 안전하게 전송할 수 있도록 해줍니다. 한글·중국어·일본어 등 비ASCII 문자는 먼저 UTF-8로 인코딩된 후 Base64로 변환되므로 모든 유니코드 문자를 처리할 수 있습니다.</p>

      <h2>자주 묻는 질문 (FAQ)</h2>
      <details class="faq-item"><summary>Q. Base64 인코딩을 왜 사용하나요?</summary><p>A. HTTP 헤더·이메일·JSON 등 ASCII 텍스트만 다루는 채널에서도 바이너리 데이터나 비ASCII 문자를 안전하게 전송하기 위해 사용합니다. 암호화가 아닌 순수 인코딩이므로 키 없이 누구나 디코딩할 수 있습니다.</p></details>

      <details class="faq-item"><summary>Q. Base64를 다시 원본 텍스트로 복원하려면?</summary><p>A. 이 페이지의 Swap ⇄ 버튼을 눌러 출력값을 입력에 넣거나, 사이트의 Base64 → Text 도구를 사용하면 됩니다. URL-safe 모드로 인코딩했다면 디코딩 시에도 URL-safe 또는 Auto-detect를 선택하세요.</p></details>

      <details class="faq-item"><summary>Q. Base64 인코딩은 암호화인가요?</summary><p>A. 아닙니다. Base64는 인코딩이지 암호화가 아닙니다. 키 없이 누구나 즉시 디코딩할 수 있으므로 민감한 정보 보호에는 사용할 수 없습니다. 보안이 필요하다면 AES나 RSA 암호화를 사용하세요.</p></details>

// ── 언어 초기화 ──────────────────────────────────────────────────────
let lang = (function() {
  const p = new URLSearchParams(location.search).get('lang');
  if (p && i18n[p]) return p;
  const s = localStorage.getItem('modoo_lang');
  if (s && i18n[s]) return s;
  const n = (navigator.language || '').slice(0,2);
  return n === 'zh' ? 'zh' : n === 'ja' ? 'ja' : n === 'ko' ? 'ko' : 'en';
})();

let encMode = 'standard';
let debounceTimer = null;

function applyLang() {
  const t = i18n[lang];
  document.documentElement.lang = lang;
  document.title = t.pageTitle;
  const map = {
    h1Title: 'h1', h1Sub: 'sub', backLink: 'backLink', langBtn: 'langBtn',
    optModeLabel: 'optModeLabel', optStandard: 'optStandard', optUrlSafe: 'optUrlSafe',
    btnPaste: 'btnPaste', btnClear: 'btnClear', btnSample: 'btnSample',
    btnConvert: 'btnConvert', btnCopy: 'btnCopy', btnSwap: 'btnSwap',
    labelInput: 'labelInput', labelOutput: 'labelOutput',
    footerText: 'footer'
  };
  for (const [id, key] of Object.entries(map)) {
    const el = document.getElementById(id);
    if (!el) continue;
    if (key === 'h1') el.innerHTML = t[key];
    else el.textContent = t[key];
  }
  document.getElementById('statusText').textContent = t.statusIdle;
  document.getElementById('inputEl').placeholder = t.placeholderIn;
  document.getElementById('outputEl').placeholder = t.placeholderOut;
  document.getElementById('seoSection').innerHTML = t.seoHtml;
  updateCounts();
}

function toggleLang() {
  const order = ['ko','en','zh','ja'];
  lang = order[(order.indexOf(lang) + 1) % order.length];
  localStorage.setItem('modoo_lang', lang);
  applyLang();
}

function setMode(m) {
  encMode = m;
  document.getElementById('optStandard').classList.toggle('active', m === 'standard');
  document.getElementById('optUrlSafe').classList.toggle('active', m === 'url-safe');
  encode();
}

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  document.getElementById('statusText').textContent = msg;
}

function updateCounts() {
  const t = i18n[lang];
  const inLen = document.getElementById('inputEl').value.length;
  const outLen = document.getElementById('outputEl').value.length;
  document.getElementById('inputCount').textContent = t.inputCount(inLen);
  document.getElementById('outputCount').textContent = t.outputCount(outLen);
}

function encode() {
  const text = document.getElementById('inputEl').value;
  if (!text) {
    document.getElementById('outputEl').value = '';
    updateCounts();
    setStatus('idle', i18n[lang].statusIdle);
    return;
  }
  try {
    const bytes = new TextEncoder().encode(text);
    const binStr = Array.from(bytes, b => String.fromCharCode(b)).join('');
    let b64 = btoa(binStr);
    if (encMode === 'url-safe') b64 = b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    document.getElementById('outputEl').value = b64;
    updateCounts();
    setStatus('ok', i18n[lang].statusOk(b64.length));
  } catch(e) {
    document.getElementById('outputEl').value = '';
    updateCounts();
    setStatus('err', i18n[lang].statusErr);
  }
}

function swap() {
  const inputEl = document.getElementById('inputEl');
  const outputEl = document.getElementById('outputEl');
  const tmp = inputEl.value;
  inputEl.value = outputEl.value;
  outputEl.value = tmp;
  encode();
}

function onInput() {
  updateCounts();
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(encode, 300);
}

function clearAll() {
  document.getElementById('inputEl').value = '';
  document.getElementById('outputEl').value = '';
  updateCounts();
  setStatus('idle', i18n[lang].statusIdle);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function copyOutput() {
  const text = document.getElementById('outputEl').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    showToast(i18n[lang].copyDone);
  });
}

async function pasteInput() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('inputEl').value = text;
    onInput();
  } catch(e) {}
}

function loadSample() {
  document.getElementById('inputEl').value = 'Hello, World! 안녕하세요 こんにちは 你好';
  document.getElementById('outputEl').value = '';
  encode();
}

// ── 초기화 ────────────────────────────────────────────────────────────
applyLang();
