  ja:{pageTitle:'正規表現生成ツール - パターン別Regex自動生成 | MODOO HUB',h1b:'生成ツール',sub:'パターン別正規表現の自動生成とリアルタイムテスト',backLink:'← ホーム',langBtn:'🌐 한국어',labelPattern:'パターン選択',labelCustom:'または直接入力',labelGenerated:'生成した正規表現',labelTest:'テストテキスト',labelMatches:'マッチ結果',btnCopy:'コピー',copied:'コピー完了 ✓',matchCount:'件マッチ',noMatch:'マッチなし',
    seoHtml:`<h2>正規表現生成ツールとは</h2><p>メール、URL、電話番号、IP、日付、UUIDなど頻繁に使うパターンの正規表現をワンクリックで生成します。g/i/mフラグを選択してリアルタイムにテストできます。JavaScript、Python、Javaなど主要言語で使える標準的な正規表現パターンです。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>正規表現（Regex）とは？</summary><p>文字列パターンを表現する言語です。メール形式の検証、特定単語の抽出、文字列置換などに使われます。</p></details>

const LANGS=['ko','en','zh','ja'];
let _lang='ko',_currentRe='';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('labelPattern').textContent=t.labelPattern;document.getElementById('labelCustom').textContent=t.labelCustom;
  document.getElementById('labelGenerated').textContent=t.labelGenerated;document.getElementById('labelTest').textContent=t.labelTest;
  document.getElementById('labelMatches').textContent=t.labelMatches;document.getElementById('btnCopy').textContent=t.btnCopy;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  renderPatterns();
}
function renderPatterns(){
  const grid=document.getElementById('patGrid');const pats=PATTERNS[_lang]||PATTERNS.ko;
  grid.innerHTML=pats.map(p=>`<button class="pat-btn" id="pat-${p.id}" onclick="selectPat('${p.id}')">${p.label}</button>`).join('');
}
function selectPat(id){
  const pats=PATTERNS[_lang]||PATTERNS.ko;const p=pats.find(x=>x.id===id);if(!p)return;
  document.querySelectorAll('.pat-btn').forEach(b=>b.classList.remove('active'));document.getElementById('pat-'+id).classList.add('active');
  _currentRe=p.re;document.getElementById('customRegex').value='';
  if(!document.getElementById('testText').value)document.getElementById('testText').value=p.sample;
  showRegex();runTest();
}
function applyCustom(){
  _currentRe=document.getElementById('customRegex').value;
  document.querySelectorAll('.pat-btn').forEach(b=>b.classList.remove('active'));
  showRegex();runTest();
}
function getFlags(){let f='';if(document.getElementById('fG').checked)f+='g';if(document.getElementById('fI').checked)f+='i';if(document.getElementById('fM').checked)f+='m';return f;}
function showRegex(){const f=getFlags();document.getElementById('regexBox').textContent=`/${_currentRe}/${f}`;}
function runTest(){
  const t=_i18n[_lang];showRegex();
  const text=document.getElementById('testText').value;const box=document.getElementById('matchResult');
  if(!_currentRe){box.innerHTML='';return;}
  try{
    const re=new RegExp(_currentRe,getFlags());const matches=[...text.matchAll(re)];
    if(matches.length===0){box.innerHTML=`<span class="match-fail">${t.noMatch}</span>`;return;}
    box.innerHTML=`<span style="color:var(--green);font-size:12px">${matches.length} ${t.matchCount}</span><br><br>`+matches.slice(0,20).map(m=>`<div class="match-item" style="background:rgba(74,222,128,.08)"><span class="match-ok">${m[0]}</span> <span style="color:var(--text-dim)">@${m.index}</span></div>`).join('');
  }catch(e){box.innerHTML=`<span class="match-fail">Error: ${e.message}</span>`;}
}
function copyRegex(){const t=_i18n[_lang];const v=document.getElementById('regexBox').textContent;if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{const btn=document.getElementById('btnCopy');const orig=btn.textContent;btn.textContent=t.copied;setTimeout(()=>btn.textContent=orig,2000);});
}
document.getElementById('fG').addEventListener('change',()=>{showRegex();runTest();});
document.getElementById('fI').addEventListener('change',()=>{showRegex();runTest();});
document.getElementById('fM').addEventListener('change',()=>{showRegex();runTest();});
_lang=detectLang();applyLang();
</script>
