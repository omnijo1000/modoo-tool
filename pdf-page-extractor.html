  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','dropText','dropHint','lblRange','lblChip','rangeHint','btnExtract','btnReset'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  if(t.tabs){document.getElementById('tab0').textContent=t.tabs[0];document.getElementById('tab1').textContent=t.tabs[1];}
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function setMode(m){_mode=m;[0,1].forEach(i=>document.getElementById('tab'+i).classList.toggle('active',i===m));document.getElementById('rangeBox').style.display=m===0?'block':'none';document.getElementById('chipBox').style.display=m===1?'block':'none';}
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});
async function handleFile(file){
  _fileName=file.name;_pdfBytes=new Uint8Array(await file.arrayBuffer());
  const doc=await PDFLib.PDFDocument.load(_pdfBytes);
  _totalPages=doc.getPageCount();
  const t=_i18n[_lang];const fi=document.getElementById('fileInfo');
  fi.innerHTML=`<span class="fi-icon">📄</span><div><div class="fi-name">${file.name}</div><div class="fi-meta">${(file.size/1024).toFixed(1)}KB · ${_totalPages} ${t.pages}</div></div>`;
  const grid=document.getElementById('pageGrid');grid.innerHTML='';
  for(let i=1;i<=_totalPages;i++){const c=document.createElement('div');c.className='page-chip';c.textContent=i;c.addEventListener('click',()=>{c.classList.toggle('sel');});grid.appendChild(c);}
  document.getElementById('rangeInput').placeholder=`1-${_totalPages}`;
  document.getElementById('editorSection').style.display='block';
  document.getElementById('resultMsg').innerHTML='';
}
function parseRange(s,max){
  const pages=new Set();
  s.split(',').forEach(p=>{p=p.trim();const m=p.match(/^(\d+)-(\d+)$/);if(m){const a=+m[1],b=+m[2];for(let i=a;i<=b;i++)if(i>=1&&i<=max)pages.add(i);}else{const n=+p;if(n>=1&&n<=max)pages.add(n);}});
  return [...pages].sort((a,b)=>a-b);
}
async function extract(){
  const t=_i18n[_lang];let pages=[];
  if(_mode===0){pages=parseRange(document.getElementById('rangeInput').value,_totalPages);}
  else{document.querySelectorAll('.page-chip.sel').forEach(c=>pages.push(+c.textContent));}
  if(!pages.length){document.getElementById('resultMsg').innerHTML=`<div class="result-msg err">${t.noPages}</div>`;return;}
  try{
    const srcDoc=await PDFLib.PDFDocument.load(_pdfBytes);
    const newDoc=await PDFLib.PDFDocument.create();
    const copied=await newDoc.copyPages(srcDoc,pages.map(p=>p-1));
    copied.forEach(pg=>newDoc.addPage(pg));
    const bytes=await newDoc.save();
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([bytes],{type:'application/pdf'}));
    a.download=_fileName.replace(/\.pdf$/i,`_pages_${pages.join('-')}.pdf`);a.click();
    document.getElementById('resultMsg').innerHTML=`<div class="result-msg ok">${t.ok}</div>`;
  }catch(e){document.getElementById('resultMsg').innerHTML=`<div class="result-msg err">${t.err}</div>`;}
}
function resetAll(){document.getElementById('editorSection').style.display='none';document.getElementById('fileInput').value='';_pdfBytes=null;}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
