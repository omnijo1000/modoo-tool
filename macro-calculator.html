<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#a78bfa;--protein:#f87171;--carbs:#fbbf24;--fat:#34d399;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:620px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.unit-toggle{display:flex;gap:6px;margin-bottom:16px;}
.unit-btn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;background:none;color:var(--text-muted);}
.unit-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(167,139,250,.08);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:480px){.row{grid-template-columns:1fr;}}
.row.tri{grid-template-columns:1fr 1fr 1fr;}
.field label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
.inp:focus{border-color:var(--accent);}
select.inp{cursor:pointer;}
.calc-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-top:4px;}
.calc-btn:hover{opacity:.85;}
.result{margin-top:14px;display:none;}
.tdee-box{background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:16px;text-align:center;margin-bottom:14px;}
.tdee-val{font-size:40px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
.tdee-label{font-size:12px;color:var(--text-muted);margin-top:4px;}
.macro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.macro-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.macro-box.p{border-top:3px solid var(--protein);}
.macro-box.c{border-top:3px solid var(--carbs);}
.macro-box.f{border-top:3px solid var(--fat);}
.macro-g{font-size:28px;font-weight:900;font-family:'DM Mono',monospace;}
.macro-box.p .macro-g{color:var(--protein);}
.macro-box.c .macro-g{color:var(--carbs);}
.macro-box.f .macro-g{color:var(--fat);}
.macro-kcal{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:3px;}
.macro-name{font-size:12px;color:var(--text-muted);margin-top:2px;}
.bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
.bar-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:8px;}
.bar-track{display:flex;height:12px;border-radius:6px;overflow:hidden;gap:2px;}
.bar-seg{height:100%;border-radius:3px;transition:width .4s;}
.bar-legend{display:flex;gap:14px;margin-top:8px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim);}
.leg-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.note{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;text-align:center;margin-top:10px;line-height:1.6;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>Macro <span>Calculator</span></h1>
  <p class="sub" data-i18n="sub">TDEE 기반 단백질·탄수화물·지방 목표량 계산</p>

  <div class="unit-toggle">
    <button class="unit-btn on" id="btnMetric" onclick="setUnit('metric')" data-i18n="btnMetric">Metric (kg/cm)</button>
    <button class="unit-btn" id="btnImperial" onclick="setUnit('imperial')" data-i18n="btnImperial">Imperial (lbs/in)</button>
  </div>

  <div class="card">
    <div class="row">
      <div class="field">
        <label data-i18n="ageLabel">나이</label>
        <input class="inp" type="number" id="age" value="30" min="10" max="100">
      </div>
      <div class="field">
        <label data-i18n="genderLabel">성별</label>
        <select class="inp" id="gender">
          <option value="m" data-i18n="genderM">남성</option>
          <option value="f" data-i18n="genderF">여성</option>
        </select>
      </div>
    </div>
    <div class="row" id="metricRow">
      <div class="field">
        <label data-i18n="weightLabel">체중 (kg)</label>
        <input class="inp" type="number" id="weightKg" value="70" min="20" max="300">
      </div>
      <div class="field">
        <label data-i18n="heightLabel">키 (cm)</label>
        <input class="inp" type="number" id="heightCm" value="170" min="100" max="250">
      </div>
    </div>
    <div class="row" id="imperialRow" style="display:none">
      <div class="field">
        <label data-i18n="weightLbLabel">체중 (lbs)</label>
        <input class="inp" type="number" id="weightLb" value="154" min="44" max="660">
      </div>
      <div class="field">
        <label data-i18n="heightInLabel">키 (inches)</label>
        <input class="inp" type="number" id="heightIn" value="67" min="40" max="100">
      </div>
    </div>
    <div class="row" style="margin-bottom:12px">
      <div class="field" style="grid-column:1/-1">
        <label data-i18n="actLabel">활동 수준</label>
        <select class="inp" id="activity">
          <option value="1.2" data-i18n="actSed">비활동 (좌식 생활)</option>
          <option value="1.375" data-i18n="actLight">가벼운 활동 (주 1-3회 운동)</option>
          <option value="1.55" selected data-i18n="actMod">보통 활동 (주 3-5회 운동)</option>
          <option value="1.725" data-i18n="actActive">활발한 활동 (주 6-7회 운동)</option>
          <option value="1.9" data-i18n="actVery">매우 활발 (하루 2회 운동)</option>
        </select>
      </div>
    </div>
    <div class="row" style="margin-bottom:0">
      <div class="field" style="grid-column:1/-1">
        <label data-i18n="goalLabel">목표</label>
        <select class="inp" id="goal">
          <option value="cut" data-i18n="goalCut">감량 (−500 kcal)</option>
          <option value="maintain" selected data-i18n="goalMaintain">유지</option>
          <option value="bulk" data-i18n="goalBulk">증량 (+300 kcal)</option>
        </select>
      </div>
    </div>
    <button class="calc-btn" onclick="calc()" data-i18n="calcBtn">▶ 계산하기</button>
  </div>

  <div class="result" id="result">
    <div class="tdee-box">
      <div class="tdee-val" id="rTdee">-</div>
      <div class="tdee-label" data-i18n="tdeeLabel">kcal / 일 (목표 칼로리)</div>
    </div>
    <div class="macro-grid">
      <div class="macro-box p">
        <div class="macro-g" id="rProt">-</div>
        <div class="macro-kcal" id="rProtKcal"></div>
        <div class="macro-name" data-i18n="protLabel">단백질</div>
      </div>
      <div class="macro-box c">
        <div class="macro-g" id="rCarb">-</div>
        <div class="macro-kcal" id="rCarbKcal"></div>
        <div class="macro-name" data-i18n="carbLabel">탄수화물</div>
      </div>
      <div class="macro-box f">
        <div class="macro-g" id="rFat">-</div>
        <div class="macro-kcal" id="rFatKcal"></div>
        <div class="macro-name" data-i18n="fatLabel">지방</div>
      </div>
    </div>
    <div class="bar-wrap">
      <div class="bar-label" data-i18n="barLabel">매크로 비율</div>
      <div class="bar-track">
        <div class="bar-seg" id="barP" style="background:var(--protein)"></div>
        <div class="bar-seg" id="barC" style="background:var(--carbs)"></div>
        <div class="bar-seg" id="barF" style="background:var(--fat)"></div>
      </div>
      <div class="bar-legend">
        <span><span class="leg-dot" style="background:var(--protein)"></span><span id="legP"></span></span>
        <span><span class="leg-dot" style="background:var(--carbs)"></span><span id="legC"></span></span>
        <span><span class="leg-dot" style="background:var(--fat)"></span><span id="legF"></span></span>
      </div>
    </div>
    <div class="note" data-i18n="noteText">※ Mifflin-St Jeor 공식 기반. 의료 목적이 아닌 참고용입니다.</div>
  </div>

  <div class="seo" data-i18n="seoHtml"></div>
  <footer>Macro Calculator · Mifflin-St Jeor · Free Online Tool</footer>
</main>
<script>
const _i18n={
  ko:{sub:'TDEE 기반 단백질·탄수화물·지방 목표량 계산',langBtn:'🌐 EN',backBtn:'← 모두의 툴',btnMetric:'Metric (kg/cm)',btnImperial:'Imperial (lbs/in)',ageLabel:'나이',genderLabel:'성별',genderM:'남성',genderF:'여성',weightLabel:'체중 (kg)',heightLabel:'키 (cm)',weightLbLabel:'체중 (lbs)',heightInLabel:'키 (inches)',actLabel:'활동 수준',actSed:'비활동 (좌식 생활)',actLight:'가벼운 활동 (주 1-3회 운동)',actMod:'보통 활동 (주 3-5회 운동)',actActive:'활발한 활동 (주 6-7회 운동)',actVery:'매우 활발 (하루 2회 운동)',goalLabel:'목표',goalCut:'감량 (−500 kcal)',goalMaintain:'유지',goalBulk:'증량 (+300 kcal)',calcBtn:'▶ 계산하기',tdeeLabel:'kcal / 일 (목표 칼로리)',protLabel:'단백질',carbLabel:'탄수화물',fatLabel:'지방',barLabel:'매크로 비율',noteText:'※ Mifflin-St Jeor 공식 기반. 의료 목적이 아닌 참고용입니다.',seoHtml:'<h2>Macro Calculator란?</h2><p><strong>Mifflin-St Jeor 공식</strong>으로 기초대사량(BMR)과 총 에너지 소비량(TDEE)을 계산하고, 감량·유지·증량 목표에 맞는 단백질·탄수화물·지방 일일 목표량을 산출합니다. 매크로 비율 그래프로 영양 배분도 한눈에 확인할 수 있습니다.</p><details class="faq-item"><summary>BMR과 TDEE의 차이는 무엇인가요?</summary><p>BMR(기초대사량)은 완전히 안정 상태에서 신체가 소비하는 최소 칼로리입니다. TDEE(총 에너지 소비량)는 BMR에 활동 계수를 곱한 값으로, 하루 실제 소비 칼로리를 나타냅니다. 목표 칼로리는 TDEE를 기준으로 조정합니다.</p></details><details class="faq-item"><summary>단백질·탄수화물·지방 비율은 어떻게 정해지나요?</summary><p>단백질은 체중 1kg당 약 2g(근육 유지를 위한 최소 권장량)으로 고정되고, 지방은 총 칼로리의 25%로 설정됩니다. 나머지 칼로리는 탄수화물로 채워집니다. 목표(감량/유지/증량)에 따라 총 칼로리가 달라집니다.</p></details><details class="faq-item"><summary>활동 수준은 어떻게 선택하나요?</summary><p>비활동(사무직/좌식): 계수 1.2 / 가벼운 활동(주 1-3회): 1.375 / 보통 활동(주 3-5회): 1.55 / 활발한 활동(주 6-7회): 1.725 / 매우 활발(하루 2회): 1.9. 운동 강도보다 하루 전체 활동량을 기준으로 선택하세요.</p></details><details class="faq-item"><summary>Mifflin-St Jeor 공식이 정확한가요?</summary><p>현재 가장 널리 사용되는 BMR 추정 공식이지만 개인의 신체 조성(근육량, 체지방률)에 따라 ±15% 오차가 발생할 수 있습니다. 2–4주간 실제 체중 변화를 관찰하며 칼로리를 조정하는 것이 좋습니다.</p></details><details class="faq-item"><summary>이 계산기 결과를 의료 목적으로 사용할 수 있나요?</summary><p>이 계산기는 참고용으로만 제공되며 의료 조언을 대체하지 않습니다. 특히 질환이 있거나 의약품을 복용 중인 경우, 식단 변화 전에 전문 의료인 또는 영양사와 상담하세요.</p></details><details class="faq-item"><summary>케토 다이어트에서 매크로 비율은 어떻게 설정하나요?</summary><p>케토 다이어트 매크로 비율은 지방 70~75%, 단백질 20~25%, 탄수화물 5%(순 탄수화물 20~50g) 기준입니다. 탄수화물을 극도로 제한해 몸이 케톤을 에너지원으로 사용하도록 유도합니다.</p></details><details class="faq-item"><summary>운동 일수에 따라 매크로를 다르게 설정해야 하나요?</summary><p>카보 사이클링(carb cycling) 접근법은 운동일에 탄수화물을 늘리고 휴식일에 줄이는 방식입니다. 고강도 훈련일에 탄수화물을 늘리면 근글리코겐 보충에 도움이 됩니다.</p></details><details class="faq-item"><summary>매크로 계산에서 알코올은 어떻게 처리하나요?</summary><p>알코올은 1g당 7kcal로 지방(9kcal)과 탄수화물(4kcal)의 중간입니다. 알코올은 4대 매크로에 포함되지 않지만 칼로리로는 계산해야 합니다. 알코올 섭취 시 지방 연소가 일시적으로 억제됩니다.</p></details>'},
  en:{sub:'Calculate daily protein, carbs & fat based on your TDEE',langBtn:'🌐 中文',backBtn:'← All Tools',btnMetric:'Metric (kg/cm)',btnImperial:'Imperial (lbs/in)',ageLabel:'Age',genderLabel:'Gender',genderM:'Male',genderF:'Female',weightLabel:'Weight (kg)',heightLabel:'Height (cm)',weightLbLabel:'Weight (lbs)',heightInLabel:'Height (inches)',actLabel:'Activity Level',actSed:'Sedentary (desk job)',actLight:'Lightly active (1-3x/week)',actMod:'Moderately active (3-5x/week)',actActive:'Very active (6-7x/week)',actVery:'Extra active (2x/day)',goalLabel:'Goal',goalCut:'Cut (−500 kcal)',goalMaintain:'Maintain',goalBulk:'Bulk (+300 kcal)',calcBtn:'▶ Calculate',tdeeLabel:'kcal / day (target calories)',protLabel:'Protein',carbLabel:'Carbs',fatLabel:'Fat',barLabel:'Macro ratio',noteText:'※ Based on Mifflin-St Jeor formula. For reference only, not medical advice.',seoHtml:'<h2>Macro Calculator</h2><p>Calculate your <strong>BMR and TDEE</strong> using the Mifflin-St Jeor formula, then get daily protein, carbohydrate, and fat targets tailored to your cut, maintain, or bulk goal. Includes a macro ratio chart to visualize your daily nutrition breakdown.</p><details class="faq-item"><summary>What is the difference between BMR and TDEE?</summary><p>BMR (Basal Metabolic Rate) is the number of calories your body burns at complete rest. TDEE (Total Daily Energy Expenditure) is your BMR multiplied by an activity factor — representing actual daily calorie burn. Your target calories are adjusted from TDEE based on your goal.</p></details><details class="faq-item"><summary>How are the protein, carb, and fat ratios determined?</summary><p>Protein is set at approximately 2g per kg of body weight (the minimum recommended for muscle retention). Fat is set at 25% of total calories. The remaining calories are filled by carbohydrates. Total calorie targets vary by goal: cut (−500 kcal), maintain (TDEE), or bulk (+300 kcal).</p></details><details class="faq-item"><summary>How should I choose my activity level?</summary><p>Sedentary (desk job): 1.2 / Lightly active (1–3x/week): 1.375 / Moderately active (3–5x/week): 1.55 / Very active (6–7x/week): 1.725 / Extra active (2x/day): 1.9. Base your choice on your overall daily activity, not just your workout sessions.</p></details><details class="faq-item"><summary>How accurate is the Mifflin-St Jeor formula?</summary><p>It\'s the most widely used BMR estimation formula today, but individual results can vary ±15% due to differences in body composition (muscle mass, body fat percentage). Track your actual weight change over 2–4 weeks and adjust calories accordingly.</p></details><details class="faq-item"><summary>Can I use this calculator for medical purposes?</summary><p>This calculator is for reference only and is not a substitute for medical advice. If you have any medical conditions or are taking medications, consult a qualified healthcare provider or registered dietitian before making significant dietary changes.</p></details><details class="faq-item"><summary>What are the macro ratios for a ketogenic diet?</summary><p>Standard keto macro ratios are roughly 70–75% fat, 20–25% protein, and 5% carbohydrates (20–50 g net carbs). The goal is to restrict carbs so severely that the body shifts to burning ketones for energy instead of glucose.</p></details><details class="faq-item"><summary>Should macros be adjusted on training days vs. rest days?</summary><p>Carb cycling adjusts carbohydrate intake based on activity — higher carbs on training days to replenish muscle glycogen, lower carbs on rest days. This approach can improve performance while maintaining a fat-loss focus on rest days.</p></details><details class="faq-item"><summary>How is alcohol handled in macro calculations?</summary><p>Alcohol provides 7 kcal per gram — between fat (9 kcal) and carbs (4 kcal). It is not one of the four primary macros but must be counted in total calories. Alcohol also temporarily suppresses fat oxidation, so heavy intake can stall fat loss.</p></details>'},
  zh:{sub:'基于TDEE计算每日蛋白质、碳水化合物和脂肪目标',langBtn:'🌐 日本語',backBtn:'← 所有工具',btnMetric:'公制 (kg/cm)',btnImperial:'英制 (lbs/in)',ageLabel:'年龄',genderLabel:'性别',genderM:'男性',genderF:'女性',weightLabel:'体重 (kg)',heightLabel:'身高 (cm)',weightLbLabel:'体重 (磅)',heightInLabel:'身高（英寸）',actLabel:'活动水平',actSed:'久坐（办公室工作）',actLight:'轻度活动（每周1-3次）',actMod:'中度活动（每周3-5次）',actActive:'高度活动（每周6-7次）',actVery:'极度活动（每天2次）',goalLabel:'目标',goalCut:'减脂（-500千卡）',goalMaintain:'维持',goalBulk:'增肌（+300千卡）',calcBtn:'▶ 计算',tdeeLabel:'千卡/天（目标热量）',protLabel:'蛋白质',carbLabel:'碳水化合物',fatLabel:'脂肪',barLabel:'宏量营养素比例',noteText:'※ 基于Mifflin-St Jeor公式，仅供参考，非医疗建议。',seoHtml:'<h2>宏量营养素计算器</h2><p>使用<strong>Mifflin-St Jeor公式</strong>计算基础代谢率（BMR）和每日总能量消耗（TDEE），根据减脂、维持或增肌目标获取每日蛋白质、碳水化合物和脂肪目标量。包含宏量营养素比例图表。</p><details class="faq-item"><summary>BMR和TDEE有什么区别？</summary><p>BMR（基础代谢率）是身体在完全静止状态下消耗的最低热量。TDEE（每日总能量消耗）是BMR乘以活动系数，代表实际每日总消耗热量。目标热量根据TDEE进行调整。</p></details><details class="faq-item"><summary>蛋白质、碳水化合物和脂肪的比例如何确定？</summary><p>蛋白质按每公斤体重约2g设定（维持肌肉的最低推荐量），脂肪占总热量的25%，剩余热量由碳水化合物补充。总热量根据目标变化：减脂（-500千卡）、维持（TDEE）、增肌（+300千卡）。</p></details><details class="faq-item"><summary>如何选择活动水平？</summary><p>久坐（办公室工作）: 1.2 / 轻度活动（每周1-3次）: 1.375 / 中度活动（每周3-5次）: 1.55 / 高度活动（每周6-7次）: 1.725 / 极度活动（每天2次）: 1.9。应根据全天整体活动量选择，而非仅考虑锻炼时间。</p></details><details class="faq-item"><summary>Mifflin-St Jeor公式准确吗？</summary><p>这是目前最广泛使用的BMR估算公式，但因个体体成分差异（肌肉量、体脂率）可能存在±15%的误差。建议连续追踪2–4周实际体重变化后相应调整热量摄入。</p></details><details class="faq-item"><summary>此计算器可用于医疗目的吗？</summary><p>此计算器仅供参考，不能替代医疗建议。若有任何健康状况或正在服药，请在做出重大饮食调整前咨询合格的医疗专业人员或注册营养师。</p></details><details class="faq-item"><summary>生酮饮食的宏量营养素比例如何设置？</summary><p>标准生酮饮食的宏量比例约为脂肪70-75%、蛋白质20-25%、碳水化合物5%（净碳水20-50克）。目标是将碳水化合物限制到极低水平，使身体改用酮体而非葡萄糖作为能量来源。</p></details><details class="faq-item"><summary>训练日和休息日的宏量应该不同吗？</summary><p>碳水化合物循环法根据活动量调整碳水摄入——训练日增加碳水以补充肌糖原，休息日减少碳水。这种方法可在保持减脂目标的同时提升运动表现。</p></details><details class="faq-item"><summary>酒精在宏量计算中如何处理？</summary><p>酒精每克提供7千卡，介于脂肪（9千卡）和碳水（4千卡）之间。酒精不属于四大宏量营养素，但必须计入总热量。酒精还会暂时抑制脂肪氧化，大量饮酒可能阻碍减脂进程。</p></details>'},
  ja:{sub:'TDEEに基づくたんぱく質・炭水化物・脂質の目標量計算',langBtn:'🌐 한국어',backBtn:'← ホーム',btnMetric:'メートル法 (kg/cm)',btnImperial:'ヤード・ポンド法 (lbs/in)',ageLabel:'年齢',genderLabel:'性別',genderM:'男性',genderF:'女性',weightLabel:'体重 (kg)',heightLabel:'身長 (cm)',weightLbLabel:'体重 (lbs)',heightInLabel:'身長（インチ）',actLabel:'活動レベル',actSed:'座位中心（デスクワーク）',actLight:'軽い活動（週1-3回運動）',actMod:'中程度の活動（週3-5回運動）',actActive:'活発な活動（週6-7回運動）',actVery:'非常に活発（1日2回運動）',goalLabel:'目標',goalCut:'減量（−500 kcal）',goalMaintain:'維持',goalBulk:'増量（+300 kcal）',calcBtn:'▶ 計算する',tdeeLabel:'kcal / 日（目標カロリー）',protLabel:'たんぱく質',carbLabel:'炭水化物',fatLabel:'脂質',barLabel:'マクロ栄養素比率',noteText:'※ Mifflin-St Jeor式に基づく。医療目的ではなく参考用です。',seoHtml:'<h2>マクロ計算機とは？</h2><p><strong>Mifflin-St Jeor式</strong>で基礎代謝量（BMR）とTDEEを計算し、減量・維持・増量の目標に合わせたたんぱく質・炭水化物・脂質の1日目標量を算出します。マクロ比率のグラフで栄養バランスも一目で確認できます。</p><details class="faq-item"><summary>BMRとTDEEの違いは何ですか？</summary><p>BMR（基礎代謝量）は完全安静状態で消費する最低限のカロリーです。TDEE（1日の総エネルギー消費量）はBMRに活動係数を掛けた値で、実際の1日消費カロリーを表します。目標カロリーはTDEEをベースに調整します。</p></details><details class="faq-item"><summary>たんぱく質・炭水化物・脂質の比率はどのように決まりますか？</summary><p>たんぱく質は体重1kgあたり約2g（筋肉維持の最低推奨量）、脂質は総カロリーの25%に設定され、残りのカロリーが炭水化物で補われます。総カロリーは目標によって変わります：減量（−500 kcal）、維持（TDEE）、増量（+300 kcal）。</p></details><details class="faq-item"><summary>活動レベルはどのように選べばよいですか？</summary><p>座位中心（デスクワーク）: 1.2 / 軽い活動（週1-3回）: 1.375 / 中程度の活動（週3-5回）: 1.55 / 活発な活動（週6-7回）: 1.725 / 非常に活発（1日2回）: 1.9。運動時間だけでなく、1日の総活動量を基準に選んでください。</p></details><details class="faq-item"><summary>Mifflin-St Jeor式はどのくらい正確ですか？</summary><p>現在最も広く使われているBMR推定式ですが、個人の体組成（筋肉量・体脂肪率）の違いにより±15%の誤差が生じる場合があります。2–4週間の体重変化を追跡し、必要に応じてカロリーを調整することをお勧めします。</p></details><details class="faq-item"><summary>医療目的に使用できますか？</summary><p>この計算機は参考用であり、医療アドバイスの代替ではありません。健康上の問題がある方や薬を服用中の方は、大きな食事変更を行う前に医師や管理栄養士にご相談ください。</p></details><details class="faq-item"><summary>ケトジェニックダイエットのマクロ比率は？</summary><p>標準的なケトのマクロ比率は脂質70〜75%、タンパク質20〜25%、炭水化物5%（正味炭水化物20〜50g）です。炭水化物を極限まで制限することで、体がブドウ糖の代わりにケトンをエネルギーとして利用するよう誘導します。</p></details><details class="faq-item"><summary>トレーニング日と休息日でマクロを変える必要がありますか？</summary><p>カーブサイクリングはトレーニング日は炭水化物を増やして筋グリコーゲンを補充し、休息日は減らすアプローチです。パフォーマンス向上と脂肪燃焼を両立させる効果があります。</p></details><details class="faq-item"><summary>マクロ計算でアルコールはどう扱いますか？</summary><p>アルコールは1gあたり7kcalで、脂質（9kcal）と炭水化物（4kcal）の中間です。4大マクロには含まれませんが総カロリーに計算する必要があります。アルコールは脂肪酸化を一時的に抑制するため、過剰摂取は脂肪燃焼を妨げる可能性があります。</p></details>'},

let _lang='ko',_unit='metric';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('backBtn').innerHTML=t.backBtn;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});
  document.querySelectorAll('option[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k])el.textContent=t[k];});
}
function setUnit(u){
  _unit=u;
  document.getElementById('btnMetric').classList.toggle('on',u==='metric');
  document.getElementById('btnImperial').classList.toggle('on',u==='imperial');
  document.getElementById('metricRow').style.display=u==='metric'?'grid':'none';
  document.getElementById('imperialRow').style.display=u==='imperial'?'grid':'none';
}
function calc(){
  const age=parseInt(document.getElementById('age').value)||30;
  const isMale=document.getElementById('gender').value==='m';
  const act=parseFloat(document.getElementById('activity').value);
  const goal=document.getElementById('goal').value;
  let wKg,hCm;
  if(_unit==='metric'){
    wKg=parseFloat(document.getElementById('weightKg').value)||70;
    hCm=parseFloat(document.getElementById('heightCm').value)||170;
  }else{
    wKg=parseFloat(document.getElementById('weightLb').value)/2.20462||70;
    hCm=parseFloat(document.getElementById('heightIn').value)*2.54||170;
  }
  const bmr=isMale?(10*wKg+6.25*hCm-5*age+5):(10*wKg+6.25*hCm-5*age-161);
  let tdee=Math.round(bmr*act);
  if(goal==='cut')tdee-=500;
  else if(goal==='bulk')tdee+=300;
  const prot=Math.round(wKg*2.0);
  const fat=Math.round(tdee*0.25/9);
  const carb=Math.round((tdee-prot*4-fat*9)/4);
  const pKcal=prot*4,cKcal=carb*4,fKcal=fat*9;
  const total=pKcal+cKcal+fKcal;
  const pPct=Math.round(pKcal/total*100),cPct=Math.round(cKcal/total*100),fPct=100-pPct-cPct;
  document.getElementById('rTdee').textContent=tdee.toLocaleString()+' kcal';
  document.getElementById('rProt').textContent=prot+'g';
  document.getElementById('rCarb').textContent=Math.max(0,carb)+'g';
  document.getElementById('rFat').textContent=fat+'g';
  document.getElementById('rProtKcal').textContent=pKcal+' kcal';
  document.getElementById('rCarbKcal').textContent=Math.max(0,cKcal)+' kcal';
  document.getElementById('rFatKcal').textContent=fKcal+' kcal';
  document.getElementById('barP').style.width=pPct+'%';
  document.getElementById('barC').style.width=cPct+'%';
  document.getElementById('barF').style.width=fPct+'%';
  const t=_i18n[_lang];
  document.getElementById('legP').textContent=`${t.protLabel} ${pPct}%`;
  document.getElementById('legC').textContent=`${t.carbLabel} ${cPct}%`;
  document.getElementById('legF').textContent=`${t.fatLabel} ${fPct}%`;
  document.getElementById('result').style.display='block';
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
</html>
