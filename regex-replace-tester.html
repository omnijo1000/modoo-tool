<script>
const LANGS=['ko','en','zh','ja'];let _lang='ko';let _flags=new Set(['g','i']);
const HINTS=[['$1','첫 캡처 그룹'],['$2','두 번째 캡처 그룹'],['$&','전체 매칭'],['$`','매칭 앞 텍스트'],["$'","매칭 뒤 텍스트"],['$\n','줄바꿈']];
const HINTS_EN=[['$1','1st capture group'],['$2','2nd capture group'],['$&','Full match'],['$`','Text before match'],["$'","Text after match"],['$\n','Newline']];
const _i18n={
  ko:{h1Accent:'치환 테스터',sub:'정규식으로 텍스트를 치환하고 실시간으로 결과를 확인합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',lblReplace:'치환:',lblFlags:'플래그:',lblInput:'입력 텍스트',lblOutput:'치환 결과',btnSample:'샘플',btnClear:'초기화',btnCopy:'결과 복사',copied:'복사됨!',
    stats:(n)=>`${n}개 치환됨`,hints:HINTS,
    seoHtml:`<h2>정규식 치환 테스터</h2><p>정규식 패턴으로 텍스트를 실시간으로 치환합니다. 캡처 그룹($1, $2)을 활용한 복잡한 치환, 전화번호·날짜 형식 변경, HTML 태그 제거 등 다양한 작업에 활용할 수 있습니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>캡처 그룹을 치환에 어떻게 사용하나요?</summary><p>패턴에 ()로 그룹을 만들고 치환문에 $1, $2... 로 참조합니다. 예: (\d{4})-(\d{2})-(\d{2}) → $2/$3/$1</p></details>
<details class="faq-item"><summary>$& 는 무엇인가요?</summary><p>$& 는 전체 매칭 문자열을 참조합니다. 예: 매칭을 **$&** 로 바꾸면 강조 표시됩니다.</p></details>
<details class="faq-item"><summary>전화번호 형식을 변환하는 방법은?</summary><p>패턴: (\d{3})-(\d{4})-(\d{4}), 치환: ($1) $2-$3</p></details>
<details class="faq-item"><summary>HTML 태그를 제거하는 방법은?</summary><p>패턴: &lt;[^&gt;]+&gt;, 치환: (빈칸)으로 설정하면 모든 HTML 태그가 제거됩니다.</p></details>
<details class="faq-item"><summary>대소문자를 변환할 수 있나요?</summary><p>JavaScript 치환에서는 $1 등의 그룹 참조는 가능하지만, toUpperCase 같은 함수 변환은 지원하지 않습니다.</p></details>
<details class="faq-item"><summary>다중 줄 텍스트를 처리할 수 있나요?</summary><p>m 플래그로 여러 줄 모드를, s 플래그로 . 이 줄바꿈을 포함하도록 설정할 수 있습니다.</p></details>
<details class="faq-item"><summary>치환 결과를 복사할 수 있나요?</summary><p>예, "결과 복사" 버튼으로 클립보드에 복사합니다.</p></details>
<details class="faq-item"><summary>빈 문자열로 치환하면 어떻게 되나요?</summary><p>매칭된 텍스트가 삭제됩니다. HTML 태그나 불필요한 문자 제거에 활용합니다.</p></details>`
  },
  en:{h1Accent:'Replace Tester',sub:'Replace text with regex patterns and preview results in real-time',backLink:'← All Tools',langBtn:'🌐 中文',lblReplace:'Replace:',lblFlags:'Flags:',lblInput:'Input text',lblOutput:'Result',btnSample:'Sample',btnClear:'Clear',btnCopy:'Copy result',copied:'Copied!',
    stats:(n)=>`${n} replacement(s)`,hints:HINTS_EN,
    seoHtml:`<h2>Regex Replace Tester</h2><p>Replace text using regex patterns in real-time. Use capture groups ($1, $2) for complex substitutions — change phone formats, date formats, remove HTML tags, or transform any text pattern instantly.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>How to use capture groups in replacement?</summary><p>Create groups with () in the pattern, reference them with $1, $2... Example: (\d{4})-(\d{2})-(\d{2}) → $2/$3/$1</p></details>
<details class="faq-item"><summary>What is $&?</summary><p>$& refers to the entire matched string. Example: replace matches with **$&** to add emphasis.</p></details>
<details class="faq-item"><summary>How to reformat phone numbers?</summary><p>Pattern: (\d{3})-(\d{4})-(\d{4}), Replace: ($1) $2-$3</p></details>
<details class="faq-item"><summary>How to remove HTML tags?</summary><p>Pattern: &lt;[^&gt;]+&gt;, Replace: (empty) — removes all HTML tags.</p></details>
<details class="faq-item"><summary>Can I change case in replacements?</summary><p>$1 group references work, but function transformations like toUpperCase are not supported.</p></details>
<details class="faq-item"><summary>Can it handle multi-line text?</summary><p>Use the m flag for multi-line mode; s flag to make . match newlines.</p></details>
<details class="faq-item"><summary>Can I copy the result?</summary><p>Yes — click "Copy result" to copy to clipboard.</p></details>
<details class="faq-item"><summary>What happens with an empty replacement?</summary><p>Matched text is deleted — useful for stripping HTML tags or unwanted characters.</p></details>`
  },
  zh:{h1Accent:'替换测试器',sub:'用正则表达式替换文本并实时预览结果',backLink:'← 所有工具',langBtn:'🌐 日本語',lblReplace:'替换:',lblFlags:'标志:',lblInput:'输入文本',lblOutput:'替换结果',btnSample:'示例',btnClear:'清除',btnCopy:'复制结果',copied:'已复制!',
    stats:(n)=>`已替换${n}处`,hints:HINTS_EN,
    seoHtml:`<h2>正则表达式替换测试器</h2><p>使用正则表达式实时替换文本。利用捕获组($1, $2)进行复杂替换——更改电话格式、日期格式、删除HTML标签或即时转换任何文本模式。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>如何在替换中使用捕获组？</summary><p>在模式中用()创建组，在替换中用$1、$2...引用。例：(\d{4})-(\d{2})-(\d{2}) → $2/$3/$1</p></details>
<details class="faq-item"><summary>$&是什么？</summary><p>$&引用整个匹配的字符串。例：将匹配替换为**$&**以添加强调。</p></details>
<details class="faq-item"><summary>如何重新格式化电话号码？</summary><p>模式: (\d{3})-(\d{4})-(\d{4})，替换: ($1) $2-$3</p></details>
<details class="faq-item"><summary>如何删除HTML标签？</summary><p>模式: &lt;[^&gt;]+&gt;，替换: (空)——删除所有HTML标签。</p></details>
<details class="faq-item"><summary>可以转换大小写吗？</summary><p>$1等组引用有效，但不支持toUpperCase等函数转换。</p></details>
<details class="faq-item"><summary>能处理多行文本吗？</summary><p>使用m标志启用多行模式；使用s标志使.匹配换行符。</p></details>
<details class="faq-item"><summary>可以复制结果吗？</summary><p>是的，点击"复制结果"复制到剪贴板。</p></details>
<details class="faq-item"><summary>空替换会怎样？</summary><p>匹配的文本将被删除——适用于去除HTML标签或不需要的字符。</p></details>`
  },
  ja:{h1Accent:'置換テスター',sub:'正規表現でテキストを置換しリアルタイムで結果を確認します',backLink:'← ホーム',langBtn:'🌐 한국어',lblReplace:'置換:',lblFlags:'フラグ:',lblInput:'入力テキスト',lblOutput:'置換結果',btnSample:'サンプル',btnClear:'クリア',btnCopy:'結果をコピー',copied:'コピー済み!',
    stats:(n)=>`${n}件置換`,hints:HINTS_EN,
    seoHtml:`<h2>正規表現置換テスター</h2><p>正規表現パターンでテキストをリアルタイムに置換します。キャプチャグループ($1, $2)を使った複雑な置換、電話番号・日付フォーマット変換、HTMLタグ削除など様々な作業に活用できます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>キャプチャグループを置換でどう使いますか？</summary><p>パターンで()でグループを作り、置換で$1、$2...で参照します。例：(\d{4})-(\d{2})-(\d{2}) → $2/$3/$1</p></details>
<details class="faq-item"><summary>$&とは何ですか？</summary><p>$&はマッチした文字列全体を参照します。例：**$&**に置換して強調表示します。</p></details>
<details class="faq-item"><summary>電話番号フォーマットを変換するには？</summary><p>パターン: (\d{3})-(\d{4})-(\d{4})、置換: ($1) $2-$3</p></details>
<details class="faq-item"><summary>HTMLタグを削除するには？</summary><p>パターン: &lt;[^&gt;]+&gt;、置換: (空)——すべてのHTMLタグを削除します。</p></details>
<details class="faq-item"><summary>大文字・小文字を変換できますか？</summary><p>$1などのグループ参照は使用できますが、toUpperCaseなどの関数変換はサポートされていません。</p></details>
<details class="faq-item"><summary>複数行テキストを処理できますか？</summary><p>mフラグで複数行モード、sフラグで.が改行を含むようになります。</p></details>
<details class="faq-item"><summary>結果をコピーできますか？</summary><p>はい、「結果をコピー」ボタンでクリップボードにコピーできます。</p></details>
<details class="faq-item"><summary>空文字列に置換するとどうなりますか？</summary><p>マッチしたテキストが削除されます。HTMLタグや不要な文字の除去に活用します。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblReplace','lblFlags','lblInput','lblOutput','btnSample','btnClear','btnCopy'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('hintsEl').innerHTML=t.hints.map(([h,desc])=>`<span class="hint" onclick="insertHint('${h}')" title="${desc}">${h}</span>`).join('');
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function insertHint(h){const el=document.getElementById('replacement');el.value+=h;el.focus();autoReplace();}
function toggleFlag(f){if(_flags.has(f))_flags.delete(f);else _flags.add(f);document.getElementById('f'+f).classList.toggle('active',_flags.has(f));autoReplace();}
function getFlags(){return[..._flags].join('');}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let _replCount=0;
function doReplace(){
  const t=_i18n[_lang];const pat=document.getElementById('pattern').value;const rep=document.getElementById('replacement').value;const text=document.getElementById('textIn').value;
  document.getElementById('errMsg').style.display='none';document.getElementById('statsRow').textContent='';
  if(!pat){document.getElementById('outBox').textContent=text;return;}
  let re;try{re=new RegExp(pat,getFlags());}catch(e){document.getElementById('errMsg').textContent=e.message;document.getElementById('errMsg').style.display='block';document.getElementById('outBox').textContent=text;return;}
  _replCount=0;
  const result=text.replace(re,(...args)=>{_replCount++;return rep.replace(/\$(\d+|&|`|')/g,(m,k)=>{if(k==='&')return args[0];if(k==='`')return text.slice(0,args[args.length-2]);if(k==="'")return text.slice(args[args.length-2]+args[0].length);const n=parseInt(k);return args[n]!==undefined?args[n]:m;});});
  document.getElementById('outBox').textContent=result;
  document.getElementById('statsRow').textContent=t.stats(_replCount);
}
let _autoT=null;function autoReplace(){clearTimeout(_autoT);_autoT=setTimeout(doReplace,200);}
function loadSample(){document.getElementById('pattern').value='(\\d{4})-(\\d{2})-(\\d{2})';document.getElementById('replacement').value='$2/$3/$1';document.getElementById('textIn').value='생일: 2000-03-15\n입사일: 2020-06-01\n오늘: 2026-06-13';doReplace();}
function clearAll(){document.getElementById('pattern').value='';document.getElementById('replacement').value='';document.getElementById('textIn').value='';document.getElementById('outBox').textContent='';document.getElementById('statsRow').textContent='';document.getElementById('errMsg').style.display='none';}
function copyOut(){const t=_i18n[_lang];const txt=document.getElementById('outBox').textContent;navigator.clipboard.writeText(txt).then(()=>{const btn=document.getElementById('btnCopy');const o=btn.textContent;btn.textContent=t.copied;setTimeout(()=>btn.textContent=t.btnCopy,1500);});}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
