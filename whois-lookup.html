<script>
function normalizeDomain(raw) {
  return raw.trim().replace(/^https?:\/\//i,'').replace(/\/.*$/,'').toLowerCase();
}

function parseRdap(data) {
  const events = {};
  (data.events || []).forEach(e => { events[e.eventAction] = e.eventDate; });
  const nameservers = (data.nameservers || []).map(ns => ns.ldhName || ns.unicodeName || '').filter(Boolean);
  const status = (data.status || []).join(', ');
  let registrar = '—';
  if (data.entities) {
    const reg = data.entities.find(e => e.roles && e.roles.includes('registrar'));
    if (reg) {
      const vcard = reg.vcardArray && reg.vcardArray[1];
      if (vcard) {
        const fn = vcard.find(v => v[0] === 'fn');
        if (fn) registrar = fn[3] || '—';
      }
      if (registrar === '—' && reg.handle) registrar = reg.handle;
    }
  }
  return {
    domain: data.ldhName || data.unicodeName || '',
    registrar,
    registered: events['registration'] || events['Registration'] || '—',
    expires: events['expiration'] || events['Expiration'] || '—',
    updated: events['last changed'] || events['Last Changed'] || '—',
    status,
    nameservers,
    raw: JSON.stringify(data, null, 2)
  };
}

function daysUntil(dateStr) {
  if (!dateStr || dateStr === '—') return null;
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  return Math.ceil((d - Date.now()) / 86400000);
}

function formatDate(dateStr) {
  if (!dateStr || dateStr === '—') return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toISOString().split('T')[0];
}

function showLoading(show) {
  document.getElementById('loadingDiv').classList.toggle('hidden', !show);
}

function showError(msg) {
  const el = document.getElementById('errorDiv');
  el.textContent = msg;
  el.classList.remove('hidden');
  document.getElementById('resultsSection').classList.add('hidden');
}

function hideError() {
  document.getElementById('errorDiv').classList.add('hidden');
}

  const days = daysUntil(info.expires);

  if (days !== null) {

    else if (days < 30) expiryBadge = `<span class="expiry-badge badge-danger">${days}d</span>`;
    else if (days < 90) expiryBadge = `<span class="expiry-badge badge-warn">${days}d</span>`;
    else expiryBadge = `<span class="expiry-badge badge-ok">${days}d</span>`;
  }

  const isActive = info.status.toLowerCase().includes('active') || info.status.toLowerCase().includes('ok');
  const statusClass = isActive ? 'status-active' : (info.status.toLowerCase().includes('expir') ? 'status-expired' : '');

  const nsHtml = info.nameservers.length
    ? `<ul class="ns-list">${info.nameservers.map(ns => `<li>${ns}</li>`).join('')}</ul>`
    : '<span class="info-value mono">—</span>';

  document.getElementById('infoGrid').innerHTML = `
    <div class="info-card" style="grid-column:1/-1;">
      <div class="info-label">${t.labelDomain || 'Domain'}</div>
      <div class="info-value domain">${escHtml(info.domain) || '—'}</div>

    </div>
    <div class="info-card">
      <div class="info-label">${t.labelRegistered}</div>
      <div class="info-value mono">${formatDate(info.registered)}</div>
    </div>
    <div class="info-card">
      <div class="info-label">${t.labelExpires}</div>
      <div class="info-value mono">${formatDate(info.expires)}${expiryBadge}</div>
    </div>
    <div class="info-card">
      <div class="info-label">${t.labelUpdated}</div>
      <div class="info-value mono">${formatDate(info.updated)}</div>
    </div>
    <div class="info-card">
      <div class="info-label">${t.labelStatus}</div>
      <div class="info-value ${statusClass}">${escHtml(info.status) || '—'}</div>
    </div>
    <div class="info-card" style="grid-column:1/-1;">
      <div class="info-label">${t.labelNameservers}</div>

    </div>

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function doLookup() {
  const raw = document.getElementById('domainInput').value;
  if (!raw.trim()) return;
  const domain = normalizeDomain(raw);
  hideError();
  showLoading(true);
  document.getElementById('resultsSection').classList.add('hidden');
  try {
    const r = await fetch(`https://rdap.org/domain/${encodeURIComponent(domain)}`);
    if (!r.ok) {
      if (r.status === 404) throw new Error('NOT_FOUND');
      throw new Error('NETWORK');
    }
    const data = await r.json();
    showLoading(false);
    const info = parseRdap(data);
    renderResults(info);
  } catch(e) {
    showLoading(false);
    const t = _i18n[currentLang] || _i18n.ko;
    if (e.message === 'NOT_FOUND') showError(t.errNotFound || 'Domain not found or WHOIS data unavailable.');
    else showError(t.errNetwork);
  }
}

document.addEventListener('keydown', e => {
  if (e.target === document.getElementById('domainInput') && e.key === 'Enter') doLookup();
});

    seoHtml:`<h2>WHOIS란 무엇인가요?</h2><p><strong>WHOIS</strong>는 도메인 이름의 등록 정보를 조회하는 프로토콜입니다. 도메인 소유자(등록자), 등록기관, 등록일, 만료일, 네임서버, 도메인 상태 등을 확인할 수 있습니다. 이 도구는 현대적 RDAP(Registration Data Access Protocol)를 사용하여 구조화된 JSON 형식으로 도메인 정보를 제공합니다. 도메인 구입 전 소유권 확인, 만료 예정 도메인 추적, 스팸/피싱 신고 등 다양한 용도로 활용됩니다.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. WHOIS란 무엇인가요?</summary><p>A. WHOIS는 도메인 이름, IP 주소, 자율 시스템 번호(ASN) 등의 등록 정보를 조회하는 인터넷 프로토콜입니다. 도메인의 등록자, 등록기관, 등록일, 만료일, 네임서버 정보를 확인할 수 있습니다.</p></details><details class="faq-item"><summary>Q. RDAP와 WHOIS의 차이는 무엇인가요?</summary><p>A. RDAP(Registration Data Access Protocol)는 WHOIS의 현대적 대안입니다. HTTPS를 통해 JSON 형식의 구조화된 데이터를 제공하고, 국제화와 접근 제어를 지원합니다. 현재 대부분의 레지스트리가 RDAP를 지원합니다.</p></details><details class="faq-item"><summary>Q. 도메인 개인정보 보호(Privacy Protection)란?</summary><p>A. 도메인 등록 시 등록자 개인정보(이름, 이메일, 전화번호 등)를 숨기는 서비스입니다. GDPR 시행 이후 많은 레지스트라가 기본으로 적용하며, 등록자 정보 대신 프록시 정보가 표시됩니다.</p></details><details class="faq-item"><summary>Q. 만료된 도메인을 구입할 수 있나요?</summary><p>A. 네. 도메인 만료 후 일정 기간(보통 30~75일)의 유예 기간이 있습니다. 유예 기간 내에는 기존 소유자가 갱신할 수 있고, 이후에는 경매나 일반 등록을 통해 구입할 수 있습니다.</p></details><details class="faq-item"><summary>Q. 도메인 소유자를 확인하는 방법은?</summary><p>A. WHOIS/RDAP 조회로 등록자 정보를 확인할 수 있습니다. 단, 개인정보 보호 서비스가 적용된 경우 실제 소유자 정보는 표시되지 않으며, 이 경우 도메인 이름의 이메일로 연락하거나 법적 절차를 통해 레지스트라에 요청해야 합니다.</p></details><details class="faq-item"><summary>Q. WHOIS 정보를 수정하려면?</summary><p>A. 도메인을 구매한 레지스트라(가비아, 후이즈, GoDaddy 등)의 관리 패널에서 수정할 수 있습니다. 일부 정보는 본인 인증이 필요하며, 연락처 정보는 항상 최신 상태로 유지하는 것이 중요합니다.</p></details><details class="faq-item"><summary>Q. GDPR과 WHOIS의 관계는?</summary><p>A. 2018년 GDPR(일반 개인정보 보호 규정) 시행 이후, 유럽 도메인 등록자의 개인정보가 WHOIS에서 제한되기 시작했습니다. 현재는 전 세계적으로 많은 레지스트라가 개인정보를 기본 비공개로 처리합니다.</p></details><details class="faq-item"><summary>Q. 도메인 상태 코드의 의미는?</summary><p>A. 주요 도메인 상태: active(정상), clientTransferProhibited(이관 금지), pendingDelete(삭제 대기), redemptionPeriod(복구 가능 기간), serverHold(DNS 비활성화). 각 상태에 따라 도메인 이관이나 갱신이 제한될 수 있습니다.</p></details>`

ar to disclose the registrant.</p></details><details class="faq-item"><summary>Q. How do I update WHOIS information?</summary><p>A. Log in to your domain registrar&apos;s control panel to update contact information. Keep it accurate — outdated contact info can cause issues with domain renewal notices and transfer authorization.</p></details><details class="faq-item"><summary>Q. How does GDPR affect WHOIS?</summary><p>A. Since GDPR (2018), European domain registrants&apos; personal data must be protected. Most registrars now redact personal details globally, making public WHOIS records show proxy/redacted information instead of real owner data.</p></details><details class="faq-item"><summary>Q. What do domain status codes mean?</summary><p>A. Common statuses: active (normal), clientTransferProhibited (transfer locked), pendingDelete (queued for deletion), redemptionPeriod (still recoverable), serverHold (DNS deactivated by registry). These affect what operations are allowed on the domain.</p></details>`

let currentLang = detectLang();
function detectLang(){
  const p=new URLSearchParams(location.search).get('lang');
  if(p&&_i18n[p])return p;
  const s=localStorage.getItem('modoo_lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language||'';
  if(n.startsWith('zh'))return 'zh';
  if(n.startsWith('ja'))return 'ja';
  if(n.startsWith('ko'))return 'ko';
  return 'en';
}
function applyLang(l){
  const t=_i18n[l]||_i18n.ko;
  document.documentElement.lang=l;
  document.title=t.pageTitle;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const v=t[el.dataset.i18n];
    if(v!==undefined)el.innerHTML=v;
  });
  const inp=document.getElementById('domainInput');
  if(inp)inp.placeholder=l==='ko'?'예: google.com':'e.g. google.com';
  document.getElementById('seoArea').innerHTML=t.seoHtml;
}
function toggleLang(){
  const order=['ko','en','zh','ja'];
  const next=order[(order.indexOf(currentLang)+1)%order.length];
  currentLang=next;
  localStorage.setItem('modoo_lang',next);
  const url=new URL(location.href);
  url.searchParams.set('lang',next);
  history.replaceState(null,'',url);
  applyLang(next);
}
document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));
</script>
