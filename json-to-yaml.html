<script>
const _i18n={
  ko:{pageTitle:'JSON to YAML 변환기 - 온라인 JSON → YAML 변환 | MODOO HUB',h1b:'YAML',sub:'JSON 붙여넣기 → YAML 즉시 변환',backLink:'← 모두의 툴',langBtn:'🌐 EN',indentLabel:'들여쓰기:',btnCopy:'복사',btnClear:'초기화',copied:'복사됨 ✓',errParse:'파싱 오류: ',seoHtml:`<h2>JSON to YAML 변환기</h2><p>JSON 데이터를 YAML 형식으로 즉시 변환합니다. <strong>YAML(YAML Ain\'t Markup Language)</strong>은 Kubernetes, Docker Compose, GitHub Actions, Ansible 등 현대 DevOps 도구의 설정 파일로 널리 사용되는 인간 친화적 직렬화 언어입니다. JSON보다 간결하고 주석을 지원합니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>JSON과 YAML 주요 차이점은?</summary><p>JSON은 중괄호·쌍따옴표·쉼표를 사용하고, YAML은 들여쓰기로 구조를 나타내 더 읽기 쉽습니다. YAML은 주석(#), 앵커(&)/별칭(*), 다중 문서 등을 지원합니다.</p></details>
<details class="faq-item"><summary>YAML은 어디에 쓰이나요?</summary><p>Kubernetes 매니페스트, Docker Compose, GitHub Actions 워크플로, Ansible 플레이북, CircleCI, Travis CI, Helm 차트 등 DevOps 도구 설정에 널리 쓰입니다.</p></details>
<details class="faq-item"><summary>변환 후 주석은 추가할 수 있나요?</summary><p>JSON에는 주석이 없으므로 변환 결과에도 주석이 없습니다. 변환 후 수동으로 # 주석을 추가하세요.</p></details>
<details class="faq-item"><summary>들여쓰기는 몇 칸이 좋나요?</summary><p>Kubernetes는 2칸, Python 관련 도구는 4칸을 많이 사용합니다. 팀 컨벤션에 맞게 선택하세요.</p></details>
<details class="faq-item"><summary>YAML에서 따옴표는 언제 필요한가요?</summary><p>특수문자(: { } [ ] # & * ? | - < > = ! % @ `)를 포함하거나, 숫자·불리언(true/false/null)처럼 보이는 문자열에는 따옴표가 필요합니다.</p></details>
<details class="faq-item"><summary>null은 YAML에서 어떻게 표현되나요?</summary><p>JSON의 null은 YAML에서 null 또는 ~ 로 표현됩니다.</p></details>
<details class="faq-item"><summary>배열은 어떻게 변환되나요?</summary><p>JSON 배열 ["a","b"]는 YAML에서 - a\n- b 형식의 블록 시퀀스로 변환됩니다.</p></details>
<details class="faq-item"><summary>역변환(YAML→JSON)도 지원하나요?</summary><p>yaml-to-json 도구를 이용하면 YAML을 JSON으로 역변환할 수 있습니다.</p></details>`
  },
  en:{pageTitle:'JSON to YAML Converter - Online JSON → YAML | MODOO HUB',h1b:'YAML',sub:'Paste JSON → instant YAML conversion',backLink:'← All Tools',langBtn:'🌐 中文',indentLabel:'Indent:',btnCopy:'Copy',btnClear:'Clear',copied:'Copied ✓',errParse:'Parse error: ',seoHtml:`<h2>JSON to YAML Converter</h2><p>Convert JSON data to YAML format instantly. <strong>YAML</strong> is a human-friendly data serialization language widely used for config files in Kubernetes, Docker Compose, GitHub Actions, and Ansible. It is more readable than JSON and supports comments.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Key differences between JSON and YAML?</summary><p>JSON uses braces, double quotes, and commas. YAML uses indentation for structure and is more human-readable. YAML also supports comments (#), anchors (&)/aliases (*), and multi-document files.</p></details>
<details class="faq-item"><summary>Where is YAML used?</summary><p>Kubernetes manifests, Docker Compose, GitHub Actions workflows, Ansible playbooks, CircleCI, Travis CI, Helm charts, and many other DevOps tools.</p></details>
<details class="faq-item"><summary>Can I add comments after conversion?</summary><p>JSON has no comments, so converted YAML has none either. Add # comments manually after conversion.</p></details>
<details class="faq-item"><summary>How many indent spaces?</summary><p>Kubernetes typically uses 2, Python-related tools often use 4. Follow your team convention.</p></details>
<details class="faq-item"><summary>When do strings need quotes in YAML?</summary><p>Strings containing special chars or that look like numbers/booleans (true/false/null) need quoting to avoid misinterpretation.</p></details>
<details class="faq-item"><summary>How is null represented in YAML?</summary><p>JSON null becomes YAML null or ~.</p></details>
<details class="faq-item"><summary>How are arrays converted?</summary><p>JSON array ["a","b"] becomes a YAML block sequence: - a\n- b.</p></details>
<details class="faq-item"><summary>Is YAML→JSON also supported?</summary><p>Use the yaml-to-json tool for reverse conversion.</p></details>`
  },
  zh:{pageTitle:'JSON转YAML工具 - 在线JSON → YAML转换 | MODOO HUB',h1b:'YAML',sub:'粘贴JSON → 即时转换为YAML',backLink:'← 所有工具',langBtn:'🌐 日本語',indentLabel:'缩进:',btnCopy:'复制',btnClear:'清除',copied:'已复制 ✓',errParse:'解析错误: ',seoHtml:`<h2>JSON转YAML工具</h2><p>将JSON数据即时转换为YAML格式。YAML是Kubernetes、Docker Compose、GitHub Actions、Ansible等DevOps工具广泛使用的人类友好序列化语言，比JSON更易读且支持注释。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>JSON和YAML的主要区别？</summary><p>JSON使用大括号、双引号和逗号；YAML用缩进表示结构，更易读，还支持注释(#)和锚点(&)/别名(*)。</p></details>
<details class="faq-item"><summary>YAML用在哪里？</summary><p>Kubernetes清单、Docker Compose、GitHub Actions工作流、Ansible剧本、Helm Chart等DevOps工具配置文件。</p></details>
<details class="faq-item"><summary>转换后可以添加注释吗？</summary><p>JSON没有注释，转换结果也没有，可以转换后手动添加#注释。</p></details>
<details class="faq-item"><summary>缩进建议几个空格？</summary><p>Kubernetes通常用2个，Python相关工具常用4个，按团队规范选择。</p></details>
<details class="faq-item"><summary>YAML中字符串何时需要引号？</summary><p>包含特殊字符或看起来像数字/布尔值的字符串需要加引号。</p></details>
<details class="faq-item"><summary>null在YAML中如何表示？</summary><p>JSON的null在YAML中表示为null或~。</p></details>
<details class="faq-item"><summary>数组如何转换？</summary><p>JSON数组["a","b"]转换为YAML块序列：- a\n- b。</p></details>
<details class="faq-item"><summary>支持YAML→JSON反向转换吗？</summary><p>请使用yaml-to-json工具进行反向转换。</p></details>`
  },
  ja:{pageTitle:'JSONからYAMLへの変換ツール - オンライン JSON → YAML | MODOO HUB',h1b:'YAML',sub:'JSONを貼り付け → YAMLに即時変換',backLink:'← ホーム',langBtn:'🌐 한국어',indentLabel:'インデント:',btnCopy:'コピー',btnClear:'クリア',copied:'コピー完了 ✓',errParse:'パースエラー: ',seoHtml:`<h2>JSON to YAML変換ツール</h2><p>JSONデータをYAML形式に即時変換します。YAMLはKubernetes・Docker Compose・GitHub Actions・Ansibleなど多くのDevOpsツールの設定ファイルに使われる人間に優しいシリアライゼーション言語です。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>JSONとYAMLの主な違いは？</summary><p>JSONは中括弧・ダブルクォート・カンマを使用。YAMLはインデントで構造を表現し、コメント(#)・アンカー(&)/エイリアス(*)をサポートします。</p></details>
<details class="faq-item"><summary>YAMLはどこで使われますか？</summary><p>Kubernetesマニフェスト・Docker Compose・GitHub Actionsワークフロー・Ansibleプレイブック・Helm Chartなど多くのDevOpsツール設定に使われます。</p></details>
<details class="faq-item"><summary>変換後にコメントを追加できますか？</summary><p>JSONにはコメントがないので変換結果にもありません。変換後に手動で#コメントを追加してください。</p></details>
<details class="faq-item"><summary>インデントは何スペースが良いですか？</summary><p>Kubernetesは2スペース、Python関連ツールは4スペースが多いです。チームの規約に合わせてください。</p></details>
<details class="faq-item"><summary>YAMLで文字列に引用符が必要なのはいつですか？</summary><p>特殊文字を含む場合や、数値・ブール値のように見える文字列には引用符が必要です。</p></details>
<details class="faq-item"><summary>nullはYAMLでどう表現されますか？</summary><p>JSONのnullはYAMLではnullまたは~で表現されます。</p></details>
<details class="faq-item"><summary>配列はどう変換されますか？</summary><p>JSON配列["a","b"]はYAMLブロックシーケンス：- a\n- b になります。</p></details>
<details class="faq-item"><summary>YAML→JSONの逆変換もできますか？</summary><p>yaml-to-jsonツールをご利用ください。</p></details>`
  }
};
const LANGS=['ko','en','zh','ja'];
let _lang='ko';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('indentLabel').textContent=t.indentLabel;
  document.getElementById('btnCopy').textContent=t.btnCopy;document.getElementById('btnClear').textContent=t.btnClear;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function clearAll(){document.getElementById('jsonIn').value='';document.getElementById('yamlOut').value='';document.getElementById('errMsg').textContent='';}
function convert(){
  const t=_i18n[_lang];const indent=parseInt(document.getElementById('indent').value);
  try{
    const obj=JSON.parse(document.getElementById('jsonIn').value);
    document.getElementById('yamlOut').value=jsyaml.dump(obj,{indent,lineWidth:-1,noRefs:true});
    document.getElementById('errMsg').textContent='';
  }catch(e){document.getElementById('errMsg').textContent=t.errParse+e.message;document.getElementById('yamlOut').value='';}
}
function copyOut(){
  const t=_i18n[_lang];const v=document.getElementById('yamlOut').value;
  if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{
    const btn=document.getElementById('btnCopy');const orig=btn.textContent;
    btn.textContent=t.copied;setTimeout(()=>btn.textContent=orig,2000);
  });
}
_lang=detectLang();applyLang();
</script>
