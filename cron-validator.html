{

  "mainEntity": [
    {"@type":"Question","name":"Why should I validate cron expressions before deploying?","acceptedAnswer":{"@type":"Answer","text":"An invalid cron expression can silently fail or run at unexpected times, causing missed backups, billing anomalies, or server outages. Validating before deployment catches syntax errors that won't be obvious until a job fires at the wrong time."}},
    {"@type":"Question","name":"What is the difference between 5-field and 6-field cron?","acceptedAnswer":{"@type":"Answer","text":"Standard 5-field cron is: minute hour day-of-month month day-of-week. 6-field cron (used by Spring @Scheduled and some cloud schedulers) prepends a seconds field: second minute hour day-of-month month day-of-week."}},
    {"@type":"Question","name":"What do the special characters * / - , mean in cron?","acceptedAnswer":{"@type":"Answer","text":"* matches any value. / defines a step (*/15 = every 15 units). - defines a range (1-5 = values 1 through 5). , defines a list (1,3,5 = each of those specific values)."}},
    {"@type":"Question","name":"Can I use month names or weekday names in cron?","acceptedAnswer":{"@type":"Answer","text":"Some cron implementations support names like JAN-DEC for months and SUN-SAT for weekdays. However, numeric values (1-12 for months, 0-7 for weekdays where both 0 and 7 = Sunday) are universally supported across all platforms."}},
    {"@type":"Question","name":"What happens if both DOM and DOW are specified?","acceptedAnswer":{"@type":"Answer","text":"When both day-of-month and day-of-week contain non-wildcard values, most cron implementations (Vixie cron) use OR logic — the job runs when either condition is true. For strict AND behavior, use a wrapper script that checks both conditions."}},
    {"@type":"Question","name":"Are L and W characters supported in standard cron?","acceptedAnswer":{"@type":"Answer","text":"L (last day) and W (nearest weekday) are Quartz Scheduler and Spring @Scheduled extensions. They are NOT supported by standard Linux crontab. AWS EventBridge has its own special characters. Always check your platform's documentation."}},
    {"@type":"Question","name":"How does cron differ between AWS EventBridge and GitHub Actions?","acceptedAnswer":{"@type":"Answer","text":"AWS EventBridge uses 6-field cron (with seconds) and requires non-wildcard values in either DOM or DOW (not both). GitHub Actions uses standard 5-field cron in UTC timezone with a minimum interval of approximately 5 minutes for scheduled workflows."}},
    {"@type":"Question","name":"How can I test a cron expression without running it on a server?","acceptedAnswer":{"@type":"Answer","text":"Use an online cron validator or parser (like this tool) to check the syntax and calculate next run times. Tools like cron-parser npm package or the croniter Python library let you calculate next runs programmatically before deploying."}}
  ]
}

<script>
const SAMPLES_DATA = [
  { expr: '* * * * *',      ko: '매분 실행',             en: 'Every minute',          zh: '每分钟执行',       ja: '毎分実行' },
  { expr: '0 9-17 * * 1-5', ko: '평일 오전 9시~오후 5시', en: 'Weekdays 9AM–5PM',      zh: '工作日 9时-17时',  ja: '平日9時〜17時' },
  { expr: '*/15 * * * *',   ko: '15분마다',               en: 'Every 15 minutes',      zh: '每15分钟',         ja: '15分ごと' },
  { expr: '0 0 1 * *',      ko: '매월 1일 자정',          en: '1st of every month',    zh: '每月1日午夜',      ja: '毎月1日深夜' },
  { expr: '30 2 * * 0',     ko: '일요일 오전 2:30',        en: 'Sundays at 2:30 AM',    zh: '周日凌晨2:30',     ja: '日曜日の2:30AM' },
  { expr: '0 */6 * * *',    ko: '6시간마다',              en: 'Every 6 hours',         zh: '每6小时',          ja: '6時間ごと' },
];

const i18n = {
  ko: {
    pageTitle: 'Cron 표현식 검증기 - Cron Validator | MODOO HUB',
    h1: 'Cron <span>Validator</span>',
    sub: 'Cron 표현식 문법 검증·오류 위치 표시',
    backLink: '← 모두의 툴',
    langBtn: '🌐 EN',
    btnClear: '지우기',
    labelInput: 'Cron 표현식 입력',
    labelSamples: '샘플 표현식',
    labelRef: '필드 참고',
    refThField: '필드',
    refThRange: '범위',
    refThNote: '비고',
    statusValid: '✓ 유효한 Cron 표현식',
    statusInvalid: '✗ 유효하지 않은 Cron 표현식',
    errTooFew: '필드가 부족합니다 (5개 또는 6개 필요)',
    errTooMany: '필드가 너무 많습니다 (최대 6개)',
    fieldNames5: ['MIN', 'HOUR', 'DOM', 'MON', 'DOW'],
    fieldNames6: ['SEC', 'MIN', 'HOUR', 'DOM', 'MON', 'DOW'],
    fieldLabels5: ['분', '시', '일(DOM)', '월', '요일(DOW)'],
    fieldLabels6: ['초', '분', '시', '일(DOM)', '월', '요일(DOW)'],
    errInvalidChar: v => `잘못된 문자: "${v}"`,
    errStepMin: `스텝(step)은 1 이상이어야 합니다`,
    errStartRange: (v, lo, hi) => `시작값 ${v}이(가) 허용 범위(${lo}–${hi})를 벗어납니다`,
    errRange: (v, lo, hi) => `범위 ${v}이(가) 허용 범위(${lo}–${hi})에 맞지 않습니다`,
    errOutOfRange: (v, lo, hi) => `값 ${v}이(가) 허용 범위(${lo}–${hi})를 벗어납니다`,
    fieldErrPrefix: (name) => `${name} 필드: `,
    refRows: [
      ['SEC',  '0–59',  '6필드 cron에서만 사용'],
      ['MIN',  '0–59',  '항상 사용'],
      ['HOUR', '0–23',  ''],
      ['DOM',  '1–31',  '일(Day of Month)'],
      ['MON',  '1–12',  '월(Month)'],
      ['DOW',  '0–7',   '0과 7은 모두 일요일'],
    ],
    describeValid: (parts) => {
      const is6 = parts.length === 6;
      const [min, hour, dom, mon, dow] = parts.slice(-5);
      const bits = [];
      if (min === '*' && hour === '*') bits.push('매분');
      else if (min.startsWith('*/')) bits.push(`${min.slice(2)}분마다`);
      else if (hour === '*') bits.push(`매시 ${min}분`);
      else bits.push(`${hour}시 ${min}분`);
      if (dow !== '*') {
        const map = {0:'일',1:'월',2:'화',3:'수',4:'목',5:'금',6:'토',7:'일'};
        if (dow.includes('-')) { const [a,b]=dow.split('-'); bits.push(`${(map[a]||a)}~${(map[b]||b)}요일`); }
        else if (dow.includes(',')) bits.push(dow.split(',').map(x=>(map[x.trim()]||x)+'요').join('·')+'일');
        else bits.push((map[dow]||dow)+'요일');
      } else if (dom !== '*') {
        bits.push(`매월 ${dom}일`);
      } else if (mon !== '*') {
        bits.push(`${mon}월`);
      } else {
        bits.push('매일');
      }
      return bits.join(', ');
    },
    seoHtml: `<h2>Cron 표현식 검증이란?</h2>
<p>잘못된 Cron 표현식은 배포 후 <strong>서버 장애</strong>, <strong>스케줄 누락</strong>, <strong>예상치 못한 실행</strong>을 일으킬 수 있습니다. 배포 전에 문법을 검증하면 초·분·일·월·요일 각 필드의 허용 범위와 특수 문자 규칙을 확인할 수 있습니다.</p>
<p>표준 Linux crontab은 5개 필드(분·시·일·월·요일)를 사용하고, Spring @Scheduled와 일부 클라우드 스케줄러는 앞에 초(0–59) 필드를 추가한 6개 필드를 사용합니다. 이 도구는 두 형식을 모두 실시간으로 검증합니다.</p>
<details class="faq-item"><summary>배포 전에 Cron 표현식을 검증해야 하는 이유는?</summary><p>잘못된 cron은 자동 백업 누락, 결제 처리 지연, 정기 리포트 미발송 등 비즈니스 손실을 초래할 수 있습니다. 또한 일부 시스템은 잘못된 표현식을 묵묵히 무시하므로 오류가 늦게 발견됩니다. 사전 검증으로 이를 예방할 수 있습니다.</p></details>
<details class="faq-item"><summary>5필드와 6필드 Cron의 차이는 무엇인가요?</summary><p>표준 5필드: <code>분 시 일 월 요일</code>. 6필드(Spring @Scheduled, 일부 AWS): <code>초 분 시 일 월 요일</code>. 초 필드의 범위는 0–59이며, 표준 Linux crontab에서는 지원되지 않습니다.</p></details>
<details class="faq-item"><summary>특수 문자 * / - , 의 규칙은?</summary><p>* 는 모든 값 허용. / 는 간격(*/5 = 5단위마다). - 는 범위(1-5 = 1부터 5까지). , 는 목록(1,3,5 = 각각 1, 3, 5). 조합도 가능합니다: 예) 1-5,10,15-20.</p></details>

// ---------- Validation core ----------
function validateField(v, lo, hi, t) {
  if (v === '*') return { ok: true };
  if (/[^0-9*\/\-,]/.test(v)) return { ok: false, err: t.errInvalidChar(v) };
  if (v.includes('/')) {
    const [s, step] = v.split('/');
    const st = parseInt(step);
    if (isNaN(st) || st < 1) return { ok: false, err: t.errStepMin };
    if (s !== '*') {
      const n = parseInt(s);
      if (isNaN(n) || n < lo || n > hi) return { ok: false, err: t.errStartRange(s, lo, hi) };
    }
    return { ok: true };
  }
  if (v.includes(',')) {
    for (const p of v.split(',')) {
      const r = validateField(p.trim(), lo, hi, t);
      if (!r.ok) return r;
    }
    return { ok: true };
  }
  if (v.includes('-')) {
    const parts = v.split('-');
    if (parts.length !== 2) return { ok: false, err: t.errRange(v, lo, hi) };
    const [a, b] = parts.map(Number);
    if (isNaN(a) || isNaN(b) || a < lo || b > hi || a > b) return { ok: false, err: t.errRange(v, lo, hi) };
    return { ok: true };
  }
  const n = parseInt(v);
  if (isNaN(n) || n < lo || n > hi) return { ok: false, err: t.errOutOfRange(v, lo, hi) };
  return { ok: true };
}

function validateCron(expr, t) {
  const p = expr.trim().split(/\s+/);
  if (p.length < 5) return { ok: false, err: t.errTooFew, fields: [] };
  if (p.length > 6) return { ok: false, err: t.errTooMany, fields: [] };
  const is6 = p.length === 6;
  const defs = is6
    ? [
        { n: 'SEC',  v: p[0], lo: 0,  hi: 59 },
        { n: 'MIN',  v: p[1], lo: 0,  hi: 59 },
        { n: 'HOUR', v: p[2], lo: 0,  hi: 23 },
        { n: 'DOM',  v: p[3], lo: 1,  hi: 31 },
        { n: 'MON',  v: p[4], lo: 1,  hi: 12 },
        { n: 'DOW',  v: p[5], lo: 0,  hi: 7  },
      ]
    : [
        { n: 'MIN',  v: p[0], lo: 0,  hi: 59 },
        { n: 'HOUR', v: p[1], lo: 0,  hi: 23 },
        { n: 'DOM',  v: p[2], lo: 1,  hi: 31 },
        { n: 'MON',  v: p[3], lo: 1,  hi: 12 },
        { n: 'DOW',  v: p[4], lo: 0,  hi: 7  },
      ];
  const results = defs.map(f => ({ ...f, result: validateField(f.v, f.lo, f.hi, t) }));
  const firstErr = results.find(r => !r.result.ok);
  return {
    ok: results.every(r => r.result.ok),
    err: firstErr ? t.fieldErrPrefix(firstErr.n) + firstErr.result.err : '',
    fields: results,
    parts: p,
  };
}

// ---------- i18n / lang ----------
function detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if (s && i18n[s]) return s;
  const n = (navigator.language || '').slice(0, 2);
  return n === 'zh' ? 'zh' : n === 'ja' ? 'ja' : n === 'ko' ? 'ko' : 'en';
}

function applyLang() {
  const t = i18n[lang];
  document.documentElement.lang = lang;
  document.title = t.pageTitle;
  document.getElementById('h1El').innerHTML = t.h1;
  document.getElementById('subEl').textContent = t.sub;
  document.getElementById('backLink').textContent = t.backLink;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('btnClear').textContent = t.btnClear;
  document.getElementById('labelInput').textContent = t.labelInput;
  document.getElementById('labelSamples').textContent = t.labelSamples;
  document.getElementById('labelRef').textContent = t.labelRef;
  document.getElementById('refThField').textContent = t.refThField;
  document.getElementById('refThRange').textContent = t.refThRange;
  document.getElementById('refThNote').textContent = t.refThNote;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (t[k] !== undefined) el.innerHTML = t[k];
  });
  renderSamples();
  renderRefTable();
  // Re-validate if there's content
  const val = document.getElementById('cronInput').value.trim();
  if (val) onCronInput();
}

function toggleLang() {
  const idx = LANGS.indexOf(lang);
  lang = LANGS[(idx + 1) % LANGS.length];
  localStorage.setItem('modoo_lang', lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', lang);
  history.replaceState({}, '', url);
  applyLang();
}

// ---------- Render helpers ----------
function renderSamples() {
  const t = i18n[lang];
  document.getElementById('samplesGrid').innerHTML = SAMPLES_DATA.map(s =>
    `<div class="sample-card" onclick="loadSample('${s.expr}')">
      <div class="sc-expr">${s.expr}</div>
      <div class="sc-desc">${s[lang] || s.en}</div>
    </div>`
  ).join('');
}

function renderRefTable() {
  const t = i18n[lang];
  document.getElementById('refBody').innerHTML = t.refRows.map(r =>
    `<tr><td>${r[0]}</td><td>${r[1]}</td><td style="font-family:'Noto Sans KR',sans-serif;">${r[2]}</td></tr>`
  ).join('');
}

function renderFieldBar(fields, emptyCount) {
  const t = i18n[lang];
  if (emptyCount) {
    // show placeholder chips
    const names = emptyCount === 5 ? t.fieldNames5 : t.fieldNames6;
    document.getElementById('fieldBar').innerHTML = names.map(n =>
      `<div class="field-chip fc-empty"><span class="fc-name">${n}</span><span class="fc-val">–</span></div>`
    ).join('');
    return;
  }
  document.getElementById('fieldBar').innerHTML = fields.map(f =>
    `<div class="field-chip ${f.result.ok ? 'fc-valid' : 'fc-invalid'}">
      <span class="fc-name">${f.n}</span>
      <span class="fc-val">${escHtml(f.v)}</span>
    </div>`
  ).join('');
}

// ---------- Main validation handler ----------
function onCronInput() {
  const val = document.getElementById('cronInput').value;
  const trimmed = val.trim();
  const t = i18n[lang];
  const input = document.getElementById('cronInput');

  if (!trimmed) {
    input.className = 'cron-input';
    document.getElementById('fieldBar').innerHTML = '';
    document.getElementById('statusRow').style.display = 'none';
    return;
  }

  const result = validateCron(trimmed, t);

  // Input border
  input.className = 'cron-input ' + (result.ok ? 'state-valid' : 'state-invalid');

  // Field bar
  if (result.fields && result.fields.length > 0) {
    renderFieldBar(result.fields, 0);
  } else {
    // Still show empty bar with expected count
    const parts = trimmed.split(/\s+/);
    renderFieldBar([], parts.length >= 6 ? 6 : 5);
  }

  // Status
  const statusRow = document.getElementById('statusRow');
  statusRow.style.display = 'flex';
  const icon = document.getElementById('statusIcon');
  const main = document.getElementById('statusMain');
  const detail = document.getElementById('statusDetail');
  const desc = document.getElementById('statusDesc');

  if (result.ok) {
    icon.textContent = '✓';
    main.className = 'status-main ok';
    main.textContent = t.statusValid;
    detail.textContent = '';
    desc.textContent = t.describeValid(result.parts);
  } else {
    icon.textContent = '✗';
    main.className = 'status-main err';
    main.textContent = t.statusInvalid;
    detail.textContent = result.err || '';
    desc.textContent = '';
  }
}

function loadSample(expr) {
  document.getElementById('cronInput').value = expr;
  onCronInput();
}

function clearAll() {
  document.getElementById('cronInput').value = '';
  document.getElementById('cronInput').className = 'cron-input';
  document.getElementById('fieldBar').innerHTML = '';
  document.getElementById('statusRow').style.display = 'none';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
lang = detectLang();
applyLang();
</script>
