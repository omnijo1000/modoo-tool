  ko:{h1b:'잠금 해제',sub:'PDF 인쇄·복사·편집 권한 제한을 해제합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',pageTitle:'PDF 잠금 해제 | MODOO HUB',dropTxt:'PDF 파일을 드래그하거나 클릭하여 선택',lblPwSect:'소유자 비밀번호 (선택)',lblOwnerPw:'소유자 비밀번호',hintEl:'열람은 가능하지만 인쇄·복사가 제한된 PDF의 권한 제한을 제거합니다.',unlockBtn:'🔓 제한 해제 후 다운로드',msgOk:'✅ 완료! 모든 권한 제한이 해제된 PDF를 다운로드합니다.',msgErr:'❌ 오류: 비밀번호가 틀리거나 지원하지 않는 형식입니다.',
    seoHtml:`<h2>PDF 잠금 해제</h2><p>PDF 파일의 <strong>인쇄·복사·편집 권한 제한</strong>을 해제합니다. 소유자 비밀번호를 입력하면 모든 권한 제한이 제거된 PDF를 다운로드할 수 있습니다. 브라우저에서 완전 로컬 처리됩니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>인쇄·복사가 막혀있는 PDF에 사용하나요?</summary><p>예, 소유자 비밀번호로 잠긴 PDF의 권한 제한을 해제합니다.</p></details>

<details class="faq-item"><summary>파일이 서버로 전송되나요?</summary><p>아니요. 브라우저 내에서만 처리됩니다.</p></details>
<details class="faq-item"><summary>PDF 비밀번호 제거와 다른가요?</summary><p>비밀번호 제거는 열람 비밀번호를 제거, 이 도구는 권한 제한을 해제합니다.</p></details>
<details class="faq-item"><summary>암호화된 PDF도 처리할 수 있나요?</summary><p>열람 비밀번호가 있는 경우 먼저 PDF 비밀번호 제거 도구를 사용하세요.</p></details>
<details class="faq-item"><summary>어떤 권한이 해제되나요?</summary><p>인쇄·복사·편집·주석 등 모든 권한 제한이 해제됩니다.</p></details>
<details class="faq-item"><summary>PDF 내용이 변경되나요?</summary><p>아니요. 권한 설정만 변경됩니다.</p></details>
<details class="faq-item"><summary>모바일에서도 사용 가능한가요?</summary><p>예, 모던 모바일 브라우저에서 동작합니다.</p></details>`
  },
  en:{h1b:'Unlock',sub:'Remove print, copy and edit restrictions from PDF',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'PDF Unlock | MODOO HUB',dropTxt:'Drop PDF here or click to select',lblPwSect:'Owner Password (optional)',lblOwnerPw:'Owner Password',hintEl:'Removes print, copy, edit restrictions from PDFs that open without a view password.',unlockBtn:'🔓 Unlock & Download',msgOk:'✅ Done! Downloading PDF with all restrictions removed.',msgErr:'❌ Error: Wrong password or unsupported format.',
    seoHtml:`<h2>PDF Unlocker</h2><p>Remove <strong>print, copy, and edit restrictions</strong> from PDF files. Enter the owner password (if known) to remove all permission locks and download an unrestricted PDF. Fully local browser processing.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>For PDFs where printing/copying is blocked?</summary><p>Yes — removes owner-password permission restrictions.</p></details>
<details class="faq-item"><summary>Works without a password?</summary><p>If no owner password is set, leave it blank and it will try automatically.</p></details>
<details class="faq-item"><summary>Is my file uploaded?</summary><p>No — fully local browser processing.</p></details>
<details class="faq-item"><summary>Different from password remover?</summary><p>Password remover removes the view password; this tool removes permission restrictions.</p></details>
<details class="faq-item"><summary>What about PDFs with a view password?</summary><p>Use PDF Password Remover first to remove the view password.</p></details>
<details class="faq-item"><summary>Which permissions are unlocked?</summary><p>All — printing, copying, editing, annotating are all unrestricted.</p></details>
<details class="faq-item"><summary>Does content change?</summary><p>No — only permission settings change.</p></details>
<details class="faq-item"><summary>Works on mobile?</summary><p>Yes, any modern mobile browser.</p></details>`
  },
  zh:{h1b:'解锁',sub:'解除PDF的打印·复制·编辑限制',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'PDF解锁 | MODOO HUB',dropTxt:'拖放PDF文件或点击选择',lblPwSect:'所有者密码（可选）',lblOwnerPw:'所有者密码',hintEl:'解除可打开但受打印/复制限制的PDF的权限锁定。',unlockBtn:'🔓 解锁并下载',msgOk:'✅ 完成！下载已解除所有限制的PDF。',msgErr:'❌ 错误：密码错误或格式不支持。',
    seoHtml:`<h2>PDF解锁</h2><p>解除<strong>PDF文件的打印、复制、编辑权限限制</strong>。输入所有者密码（如果已知）即可下载不受限制的PDF。完全在浏览器本地处理。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>适用于无法打印/复制的PDF吗？</summary><p>是的，解除所有者密码设置的权限限制。</p></details>
<details class="faq-item"><summary>没有密码也能解锁吗？</summary><p>如果没有设置所有者密码，留空即可自动尝试。</p></details>
<details class="faq-item"><summary>文件会上传服务器吗？</summary><p>不会，完全本地处理。</p></details>
<details class="faq-item"><summary>与密码删除有什么不同？</summary><p>密码删除是去除查看密码，此工具是解除权限限制。</p></details>
<details class="faq-item"><summary>有查看密码的PDF怎么办？</summary><p>先用PDF密码删除工具删除查看密码。</p></details>
<details class="faq-item"><summary>哪些权限会被解除？</summary><p>全部—打印、复制、编辑、注释等所有权限。</p></details>
<details class="faq-item"><summary>内容会改变吗？</summary><p>不会，只改变权限设置。</p></details>
<details class="faq-item"><summary>手机上可以使用吗？</summary><p>可以，现代移动浏览器均可。</p></details>`
  },
  ja:{h1b:'ロック解除',sub:'PDFの印刷・コピー・編集制限を解除します',backLink:'← ホーム',langBtn:'🌐 한국어',pageTitle:'PDFロック解除 | MODOO HUB',dropTxt:'PDFファイルをドロップまたはクリックして選択',lblPwSect:'オーナーパスワード（任意）',lblOwnerPw:'オーナーパスワード',hintEl:'閲覧はできても印刷/コピーが制限されているPDFの権限制限を解除します。',unlockBtn:'🔓 ロック解除してダウンロード',msgOk:'✅ 完了！すべての制限が解除されたPDFをダウンロード。',msgErr:'❌ エラー：パスワードが違うか非対応形式です。',
    seoHtml:`<h2>PDFロック解除</h2><p>PDFファイルの<strong>印刷・コピー・編集の権限制限</strong>を解除します。オーナーパスワードを入力すると、すべての権限制限が解除されたPDFをダウンロードできます。すべてブラウザ内でローカル処理されます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>印刷/コピーができないPDFに使いますか？</summary><p>はい、オーナーパスワードで設定された権限制限を解除します。</p></details>
<details class="faq-item"><summary>パスワードなしでも解除できますか？</summary><p>オーナーパスワードが設定されていない場合は空白のまま自動的に試みます。</p></details>
<details class="faq-item"><summary>ファイルはサーバーに送信されますか？</summary><p>いいえ、すべてブラウザ内でローカル処理されます。</p></details>
<details class="faq-item"><summary>パスワード削除と違いますか？</summary><p>パスワード削除は閲覧パスワードを削除し、このツールは権限制限を解除します。</p></details>
<details class="faq-item"><summary>閲覧パスワードがあるPDFは？</summary><p>まずPDFパスワード削除ツールで閲覧パスワードを削除してください。</p></details>
<details class="faq-item"><summary>どの権限が解除されますか？</summary><p>印刷・コピー・編集・注釈など、すべての権限制限が解除されます。</p></details>
<details class="faq-item"><summary>内容は変わりますか？</summary><p>いいえ、権限設定のみ変更されます。</p></details>
<details class="faq-item"><summary>モバイルでも使えますか？</summary><p>はい、モダンなモバイルブラウザで動作します。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','dropTxt','lblPwSect','lblOwnerPw','hintEl','unlockBtn'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function ev(e,cls){e.preventDefault();document.getElementById('dropZone').className='drop-zone'+' '+cls;}
function drop(e){e.preventDefault();document.getElementById('dropZone').className='drop-zone';const f=e.dataTransfer.files[0];if(f)loadFile(f);}
function loadFile(f){
  if(!f||!f.name.endsWith('.pdf'))return;
  _fname=f.name;
  document.getElementById('fileName').textContent=f.name+' ('+fmtBytes(f.size)+')';
  document.getElementById('formBox').style.display='block';
  const fr=new FileReader();fr.onload=ev2=>_buf=ev2.target.result;fr.readAsArrayBuffer(f);
}
function fmtBytes(b){return b>1048576?(b/1048576).toFixed(1)+' MB':Math.round(b/1024)+' KB';}
async function unlock(){
  const t=_i18n[_lang];const pw=document.getElementById('ownerPw').value;
  const btn=document.getElementById('unlockBtn');const msgEl=document.getElementById('msgEl');
  btn.disabled=true;msgEl.textContent='';
  const tryPws=[pw,'',undefined];
  let pdfDoc=null;
  for(const p of tryPws){
    try{
      const {PDFDocument}=PDFLib;
      pdfDoc=await PDFDocument.load(_buf,p!==undefined?{password:p}:{});
      break;
    }catch(e){pdfDoc=null;}
  }
  if(!pdfDoc){msgEl.className='msg err';msgEl.textContent=t.msgErr;btn.disabled=false;return;}
  try{
    const bytes=await pdfDoc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=(_fname||'doc').replace('.pdf','')+'_unlocked.pdf';a.click();
    msgEl.className='msg ok';msgEl.textContent=t.msgOk;
  }catch(e){msgEl.className='msg err';msgEl.textContent=t.msgErr;}
  btn.disabled=false;
}
let _buf=null,_fname='';
_lang=detectLang();applyLang();
</script>
