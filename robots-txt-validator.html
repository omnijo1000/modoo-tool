    seoHtml:`<h2>robots.txt 검증이란?</h2><p>robots.txt는 검색 엔진 크롤러에게 어떤 페이지를 수집해도 되는지 알려주는 파일입니다. 이 도구는 <strong>robots.txt 문법 오류를 자동으로 검사</strong>하고, 특정 URL이 특정 봇에 대해 허용되는지 차단되는지 즉시 테스트할 수 있습니다. 운영 전 반드시 검증하여 의도치 않은 크롤링 차단을 방지하세요.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>robots.txt 검증이 왜 중요한가요?</summary><p>robots.txt의 문법 오류 하나로 전체 사이트가 크롤링 차단될 수 있습니다. 또한 의도치 않게 중요 페이지를 차단하면 Google 검색 결과에서 사라질 수 있습니다. 배포 전 검증이 필수입니다.</p></details>
<details class="faq-item"><summary>흔한 robots.txt 문법 오류 유형은?</summary><p>대표적인 오류로는 ①알 수 없는 디렉티브 사용, ②User-agent 없이 Disallow 먼저 작성, ③경로에 와일드카드(*) 오용, ④여러 User-agent를 한 줄에 작성하는 경우가 있습니다. 각 User-agent는 별도 줄에 작성해야 합니다.</p></details>
<details class="faq-item"><summary>User-agent: *는 무엇을 의미하나요?</summary><p>모든 검색 엔진 크롤러에 적용되는 기본 규칙입니다. 특정 봇(예: Googlebot)에 별도 규칙이 있으면 그 규칙이 우선 적용되고, 없으면 * 규칙이 적용됩니다.</p></details>
<details class="faq-item"><summary>Disallow: '' (빈값)과 Disallow: /의 차이는?</summary><p>Disallow: (빈 값)은 아무것도 차단하지 않아 전체 허용을 의미합니다. Disallow: /는 루트부터 모든 경로를 차단하여 전체 사이트 크롤링을 막습니다. 두 값의 의미가 완전히 반대이므로 주의가 필요합니다.</p></details>
<details class="faq-item"><summary>더 구체적인 규칙이 우선 적용되나요?</summary><p>Google은 Allow와 Disallow가 충돌할 경우 더 구체적인(경로가 긴) 규칙을 우선 적용합니다. 길이가 같다면 Allow가 우선입니다. 이 도구는 순서 기반으로 마지막으로 매칭된 규칙을 적용하는 방식으로 동작합니다.</p></details>

const LANGS=['ko','en','zh','ja'];
let _lang='ko';
let _parsed=null;

function detectLang(){
  const u=new URLSearchParams(location.search).get('lang');
  if(u&&_i18n[u])return u;
  const s=localStorage.getItem('modoo_lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language?.slice(0,2);
  return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';
}

function cycleLang(){
  const idx=LANGS.indexOf(_lang);
  _lang=LANGS[(idx+1)%LANGS.length];
  localStorage.setItem('modoo_lang',_lang);
  const url=new URL(location.href);
  url.searchParams.set('lang',_lang);
  history.replaceState({},'',url);
  applyLang();
}

function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.title=t.pageTitle;
  document.getElementById('h1El').childNodes[0].textContent=t.h1+' ';
  document.getElementById('h1Span').textContent=t.h1Span;
  document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('labelInput').textContent=t.labelInput;
  document.getElementById('btnValidate').textContent=t.btnValidate;
  document.getElementById('btnFetch').textContent=t.btnFetch;
  document.getElementById('btnSample').textContent=t.btnSample;
  document.getElementById('btnClear').textContent=t.btnClear;
  document.getElementById('fetchUrl').placeholder=t.fetchPlaceholder;
  document.getElementById('robotsTa').placeholder=t.taPh;
  document.getElementById('labelTester').textContent=t.labelTester;
  document.getElementById('btnTest').textContent=t.btnTest;
  document.getElementById('labelParsed').textContent=t.labelParsed;
  document.getElementById('labelSitemaps').textContent=t.labelSitemaps;
  document.getElementById('labelIssues').textContent=t.labelIssues;
  document.getElementById('noIssuesEl').textContent=t.noIssues;
  document.getElementById('emptyState').textContent=t.emptyState;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  updateAgentSelect();
}

function updateAgentSelect(){
  const t=_i18n[_lang];
  const sel=document.getElementById('agentSelect');
  const cur=sel.value;
  const agents=_parsed?[...new Set(_parsed.blocks.map(b=>b.agent))]:[];
  const fixed=['*','Googlebot','Bingbot','Yandexbot'];
  const all=[...new Set([...fixed,...agents])];
  sel.innerHTML=all.map(a=>`<option value="${a}">${a==='*'?t.allAgents:a}</option>`).join('');
  if(all.includes(cur))sel.value=cur;
}

function parseRobots(text){
  const blocks=[];
  let current=null;
  const sitemaps=[];
  const issues=[];
  text.split('\n').forEach((rawLine,i)=>{
    const line=rawLine.trim();
    if(!line||line.startsWith('#'))return;
    const colonIdx=line.indexOf(':');
    if(colonIdx===-1){issues.push({line:i+1,msg:(_i18n[_lang].unknownDir)+' '+line});return;}
    const dir=line.slice(0,colonIdx).trim().toLowerCase();
    const val=line.slice(colonIdx+1).trim();
    if(dir==='user-agent'){current={agent:val,rules:[]};blocks.push(current);}
    else if(dir==='disallow'&&current)current.rules.push({type:'disallow',path:val});
    else if(dir==='allow'&&current)current.rules.push({type:'allow',path:val});
    else if(dir==='crawl-delay'&&current)current.rules.push({type:'crawl-delay',value:val});
    else if(dir==='sitemap')sitemaps.push(val);
    else if(dir!=='host')issues.push({line:i+1,msg:(_i18n[_lang].unknownDir)+' '+line.slice(0,colonIdx)});
  });
  return{blocks,sitemaps,issues};
}

function testUrl(parsedBlocks,agent,url){
  const specific=parsedBlocks.filter(b=>b.agent.toLowerCase()===agent.toLowerCase());
  const wildcard=parsedBlocks.filter(b=>b.agent==='*');
  const blocksToCheck=specific.length>0?specific:wildcard;
  for(const block of blocksToCheck){
    for(const rule of [...block.rules].reverse()){
      if(rule.type==='allow'||rule.type==='disallow'){
        if(rule.path===''||url.startsWith(rule.path)){
          return{allowed:rule.type==='allow',rule:`${rule.type}: ${rule.path||'(empty)'}`,agent:block.agent};
        }
      }
    }
  }
  return{allowed:true,rule:_i18n[_lang].ruleDefault};
}

function doValidate(){
  const text=document.getElementById('robotsTa').value;
  if(!text.trim())return;
  _parsed=parseRobots(text);
  renderParsed();
  updateAgentSelect();
  const el=document.getElementById('testResult');
  el.style.display='none';
}

function renderParsed(){
  const t=_i18n[_lang];
  const out=document.getElementById('parsedOutput');
  if(!_parsed||_parsed.blocks.length===0){
    out.innerHTML=`<div class="empty-state">${t.emptyState}</div>`;
    document.getElementById('sitemapsSection').style.display='none';
    document.getElementById('noIssuesEl').style.display='none';
    document.getElementById('issuesOutput').innerHTML='';
    return;
  }
  out.innerHTML=_parsed.blocks.map(b=>`
    <div class="agent-block">
      <div class="agent-name">${t.agentLabel} ${escHtml(b.agent)}</div>
      <div class="rules-list">
        ${b.rules.map(r=>{
          if(r.type==='crawl-delay')return`<span class="rule-chip crawl-delay">crawl-delay: ${escHtml(r.value)}</span>`;
          return`<span class="rule-chip ${r.type}">${r.type}: ${escHtml(r.path||'(empty)') }</span>`;
        }).join('')}
        ${b.rules.length===0?'<span style="font-size:11px;color:var(--text-dim);font-family:\'DM Mono\',monospace;">(no rules)</span>':''}
      </div>
    </div>
  `).join('');

  if(_parsed.sitemaps.length>0){
    document.getElementById('sitemapsSection').style.display='block';
    document.getElementById('sitemapsOutput').innerHTML=_parsed.sitemaps.map(s=>`<div class="sitemap-url">${escHtml(s)}</div>`).join('');
  } else {
    document.getElementById('sitemapsSection').style.display='none';
  }

  const issuesOut=document.getElementById('issuesOutput');
  const noIss=document.getElementById('noIssuesEl');
  if(_parsed.issues.length===0){
    noIss.style.display='block';
    issuesOut.innerHTML='';
    issuesOut.appendChild(noIss);
  } else {
    noIss.style.display='none';
    issuesOut.innerHTML=_parsed.issues.map(iss=>`<div class="issue-item"><span class="line-no">[${t.lineLabel} ${iss.line}]</span> ${escHtml(iss.msg)}</div>`).join('');
  }
}

function doTest(){
  const t=_i18n[_lang];
  if(!_parsed){doValidate();}
  if(!_parsed||_parsed.blocks.length===0)return;
  const agent=document.getElementById('agentSelect').value;
  const url=document.getElementById('testUrlInput').value.trim();
  if(!url)return;
  const res=testUrl(_parsed.blocks,agent,url);
  const el=document.getElementById('testResult');
  const textEl=document.getElementById('testResultText');
  const ruleEl=document.getElementById('testResultRule');
  el.className='test-result '+(res.allowed?'allowed':'disallowed');
  textEl.textContent=res.allowed?t.resultAllowed:t.resultDisallowed;
  ruleEl.textContent=`${t.ruleMatched} ${res.rule}`;
  el.style.display='block';
}

function loadSample(){
  document.getElementById('robotsTa').value=SAMPLE_ROBOTS;
  doValidate();
}

function doClear(){
  document.getElementById('robotsTa').value='';
  _parsed=null;
  const t=_i18n[_lang];
  document.getElementById('parsedOutput').innerHTML=`<div class="empty-state">${t.emptyState}</div>`;
  document.getElementById('sitemapsSection').style.display='none';
  document.getElementById('issuesOutput').innerHTML='';
  document.getElementById('noIssuesEl').style.display='none';
  document.getElementById('testResult').style.display='none';
  updateAgentSelect();
}

async function fetchRobots(){
  const t=_i18n[_lang];
  let domain=document.getElementById('fetchUrl').value.trim();
  if(!domain)return;
  if(!/^https?:\/\//i.test(domain))domain='https://'+domain;
  try{
    const url=new URL(domain);
    const robotsUrl=url.origin+'/robots.txt';
    const resp=await fetch(robotsUrl,{mode:'no-cors'});
    if(resp.type==='opaque'){
      // no-cors returns opaque; try cors proxy
      throw new Error('opaque');
    }
    const text=await resp.text();
    document.getElementById('robotsTa').value=text;
    doValidate();
  } catch(e){
    // try cors proxy fallback
    try{
      const url=new URL(domain);
      const robotsUrl=url.origin+'/robots.txt';
      const proxyUrl='https://api.allorigins.win/get?url='+encodeURIComponent(robotsUrl);
      const resp2=await fetch(proxyUrl);
      const json=await resp2.json();
      if(json.contents){
        document.getElementById('robotsTa').value=json.contents;
        doValidate();
      } else {
        alert(t.fetchError);
      }
    } catch(e2){
      alert(t.fetchError);
    }
  }
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

_lang=detectLang();
applyLang();
