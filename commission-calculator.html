<script>
const LANGS=['ko','en','zh','ja'];let _lang='ko',_mode=0;
let tiers=[{upTo:1000000,rate:3},{upTo:5000000,rate:5},{upTo:Infinity,rate:7}];
const _i18n={
  ko:{h1Accent:'수수료',sub:'판매 수수료와 구간별 수수료를 계산합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',
    tabs:['단일 수수료율','구간별 수수료'],lbl0a:'판매액',lbl0b:'수수료율',lbl1a:'총 판매액',lbl1b:'수수료 구간 설정',
    btnAddTier:'+ 구간 추가',tierLbl:'까지',tierRate:'수수료율',unlimited:'초과',
    lblSales:'판매액',lblRate:'수수료율',lblComm:'수수료',
    seoHtml:`<h2>수수료 계산기</h2><p>판매액과 수수료율을 입력하면 수수료 금액을 즉시 계산합니다. 단일 수수료율뿐 아니라 판매 구간별로 다른 수수료율을 적용하는 다단계 구조도 지원합니다. 영업 직원의 실적 보상, 부동산 중개 수수료, 전자상거래 플랫폼 수수료 계산에 활용할 수 있습니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>수수료율과 수수료 금액의 차이는?</summary><p>수수료율은 백분율(%)이고, 수수료 금액은 실제 지급되는 금액입니다. 금액 = 판매액 × (수수료율/100)</p></details>
<details class="faq-item"><summary>구간별 수수료는 어떻게 계산되나요?</summary><p>각 구간에 해당하는 금액에만 해당 수수료율을 적용합니다. 예: 100만원 이하 3%, 초과분 5%이면 200만원 판매 시 30,000 + 50,000 = 80,000원.</p></details>
<details class="faq-item"><summary>부동산 중개 수수료는?</summary><p>한국 기준 매매 금액에 따라 0.4~0.9% 구간을 적용합니다. 구간별 수수료 탭에서 설정하세요.</p></details>
<details class="faq-item"><summary>세전 수수료를 계산하나요?</summary><p>예. 세금을 고려하려면 계산된 수수료에 세율을 별도로 적용하세요.</p></details>
<details class="faq-item"><summary>여러 판매 건의 합계를 계산하려면?</summary><p>판매액에 여러 건의 합계를 입력하면 됩니다.</p></details>
<details class="faq-item"><summary>플랫폼 수수료 계산에 사용할 수 있나요?</summary><p>네. 쿠팡, 네이버 스마트스토어 등 플랫폼 수수료율을 입력하면 됩니다.</p></details>
<details class="faq-item"><summary>역산 계산(수수료 제외 금액 계산)은?</summary><p>수수료 제외 금액 = 수수료 포함 금액 ÷ (1 + 수수료율). 예: 수수료 5%, 110만원 → 110만 ÷ 1.05 = 104.8만원.</p></details>
<details class="faq-item"><summary>수수료가 음수로 나오면?</summary><p>입력 값을 확인해 주세요. 수수료율은 0~100% 사이여야 합니다.</p></details>`
  },
  en:{h1Accent:'Commission',sub:'Calculate sales commission and tiered commission rates',backLink:'← All Tools',langBtn:'🌐 中文',
    tabs:['Flat rate','Tiered rate'],lbl0a:'Sales amount',lbl0b:'Commission rate',lbl1a:'Total sales amount',lbl1b:'Commission tiers',
    btnAddTier:'+ Add tier',tierLbl:'up to',tierRate:'rate',unlimited:'unlimited',
    lblSales:'Sales',lblRate:'Rate',lblComm:'Commission',
    seoHtml:`<h2>Commission Calculator</h2><p>Enter a sales amount and commission rate to instantly calculate the commission earned. Supports both flat rates and tiered structures where different rates apply to different sales brackets. Useful for calculating salesperson bonuses, real estate agent fees, and e-commerce platform commissions.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Commission rate vs. commission amount?</summary><p>The rate is a percentage; the amount is the actual payment. Amount = Sales × (Rate/100).</p></details>
<details class="faq-item"><summary>How is tiered commission calculated?</summary><p>Each rate applies only to the amount within its bracket. E.g. 3% up to $10k and 5% above: on $20k sales = $300 + $500 = $800.</p></details>
<details class="faq-item"><summary>Is this gross or net commission?</summary><p>Gross (before tax). To get net, apply your tax rate to the result separately.</p></details>
<details class="faq-item"><summary>Can I total multiple sales?</summary><p>Yes — just enter the combined total as the sales amount.</p></details>
<details class="faq-item"><summary>Can I use this for platform fees?</summary><p>Yes — enter the platform's commission rate and your sales revenue.</p></details>
<details class="faq-item"><summary>How do I calculate the price before commission?</summary><p>Pre-commission price = Total ÷ (1 + rate). E.g. 5% rate, $1100 total → $1100 ÷ 1.05 = $1047.62.</p></details>
<details class="faq-item"><summary>What if commission is 0?</summary><p>Check your inputs — the rate must be greater than 0% and the sales amount must be positive.</p></details>
<details class="faq-item"><summary>Can I add an override cap?</summary><p>Not built in — once calculated, cap the result manually or add a zero-rate top tier.</p></details>`
  },
  zh:{h1Accent:'佣金',sub:'计算销售佣金和分级佣金率',backLink:'← 所有工具',langBtn:'🌐 日本語',
    tabs:['固定费率','分级费率'],lbl0a:'销售额',lbl0b:'佣金率',lbl1a:'总销售额',lbl1b:'佣金分级设置',
    btnAddTier:'+ 添加级别',tierLbl:'以内',tierRate:'费率',unlimited:'不限',
    lblSales:'销售额',lblRate:'费率',lblComm:'佣金',
    seoHtml:`<h2>佣金计算器</h2><p>输入销售额和佣金率，立即计算获得的佣金。支持固定费率和分级结构，不同销售区间可应用不同费率。适用于计算销售员奖金、房产中介费和电商平台佣金。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>佣金率和佣金金额的区别？</summary><p>佣金率是百分比，佣金金额是实际支付的金额。金额=销售额×(费率/100)。</p></details>
<details class="faq-item"><summary>分级佣金如何计算？</summary><p>每个费率只适用于该区间内的金额。例如10万以内3%，超出部分5%：20万销售额=3000+5000=8000元。</p></details>
<details class="faq-item"><summary>这是税前还是税后佣金？</summary><p>税前。如需税后，请将税率单独应用于计算结果。</p></details>
<details class="faq-item"><summary>可以合计多笔销售吗？</summary><p>可以，输入合计金额作为销售额即可。</p></details>
<details class="faq-item"><summary>可以用于平台费率计算吗？</summary><p>可以，输入平台的佣金率和销售收入即可。</p></details>
<details class="faq-item"><summary>如何计算扣除佣金前的价格？</summary><p>含佣金前价格=总额÷(1+费率)。例如5%费率，1100元→1100÷1.05=1047.62元。</p></details>
<details class="faq-item"><summary>佣金为0怎么办？</summary><p>检查输入，费率必须大于0%且销售额必须为正数。</p></details>
<details class="faq-item"><summary>可以添加上限吗？</summary><p>未内置，计算后手动设置上限，或在顶层级别添加零费率区间。</p></details>`
  },
  ja:{h1Accent:'コミッション',sub:'販売コミッションと段階的な報酬率を計算します',backLink:'← ホーム',langBtn:'🌐 한국어',
    tabs:['固定レート','段階レート'],lbl0a:'販売額',lbl0b:'コミッション率',lbl1a:'総販売額',lbl1b:'コミッション段階設定',
    btnAddTier:'+ 段階を追加',tierLbl:'まで',tierRate:'レート',unlimited:'無制限',
    lblSales:'販売額',lblRate:'レート',lblComm:'コミッション',
    seoHtml:`<h2>コミッション計算機</h2><p>販売額とコミッション率を入力すれば、獲得コミッションを即座に計算します。固定レートと段階的構造（販売区分ごとに異なるレート）の両方をサポートします。営業員のボーナス、不動産仲介手数料、ECプラットフォームの手数料計算に活用できます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>コミッション率とコミッション金額の違いは？</summary><p>レートはパーセンテージ、金額は実際の支払い額です。金額=販売額×(レート/100)。</p></details>
<details class="faq-item"><summary>段階的コミッションはどう計算されますか？</summary><p>各レートはその区分内の金額にのみ適用されます。例：100万まで3%、超過分5%：200万販売=30,000+50,000=80,000円。</p></details>
<details class="faq-item"><summary>税引き前か税引き後ですか？</summary><p>税引き前です。税後にするには結果に税率を別途適用してください。</p></details>
<details class="faq-item"><summary>複数の販売合計を計算できますか？</summary><p>はい、合計額を販売額として入力してください。</p></details>
<details class="faq-item"><summary>プラットフォーム手数料にも使えますか？</summary><p>はい、プラットフォームの手数料率と売上を入力してください。</p></details>
<details class="faq-item"><summary>コミッション前の価格を計算するには？</summary><p>コミッション前価格=合計÷(1+レート)。例：5%、1100円→1100÷1.05=1047.62円。</p></details>
<details class="faq-item"><summary>コミッションが0の場合は？</summary><p>入力を確認してください。レートは0%より大きく、販売額は正の数である必要があります。</p></details>
<details class="faq-item"><summary>上限を追加できますか？</summary><p>内蔵されていません。計算後に手動で上限を設定するか、上部の段階にゼロレートを追加してください。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();renderTiers();calc();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lbl0a','lbl0b','lbl1a','lbl1b','btnAddTier'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  if(t.tabs){document.getElementById('tab0').textContent=t.tabs[0];document.getElementById('tab1').textContent=t.tabs[1];}
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function setMode(m){_mode=m;[0,1].forEach(i=>{document.getElementById('tab'+i).classList.toggle('active',i===m);document.getElementById('mode'+i).style.display=i===m?'block':'none';});calc();}
function renderTiers(){
  const t=_i18n[_lang];const con=document.getElementById('tiersContainer');con.innerHTML='';
  tiers.forEach((tier,i)=>{
    const row=document.createElement('div');row.className='tier-row';
    const lbl=document.createElement('span');lbl.className='tier-lbl';lbl.textContent=t.tierLbl;
    const upInput=document.createElement('input');upInput.className='tier-input';
    upInput.type='number';upInput.value=tier.upTo===Infinity?'':tier.upTo;upInput.placeholder=t.unlimited;
    upInput.oninput=()=>{tiers[i].upTo=upInput.value===''?Infinity:+upInput.value;calc();};
    const rateInput=document.createElement('input');rateInput.className='tier-input';rateInput.style.maxWidth='60px';
    rateInput.type='number';rateInput.value=tier.rate;rateInput.placeholder='%';
    rateInput.oninput=()=>{tiers[i].rate=+rateInput.value;calc();};
    const pct=document.createElement('span');pct.className='f-unit';pct.textContent='%';
    const del=document.createElement('button');del.className='del-btn';del.textContent='×';
    del.onclick=()=>{tiers.splice(i,1);renderTiers();calc();};
    row.append(lbl,upInput,rateInput,pct,del);con.appendChild(row);
  });
}
function addTier(){tiers.push({upTo:Infinity,rate:10});renderTiers();calc();}
function fmt(n){return Math.round(n).toLocaleString();}
function calc(){
  const t=_i18n[_lang];
  if(_mode===0){
    const s=parseFloat(document.getElementById('sales').value)||0;
    const r=parseFloat(document.getElementById('rate').value)||0;
    const comm=s*r/100;
    document.getElementById('resultBig').textContent=fmt(comm);
    document.getElementById('resultSub').textContent=`${fmt(s)} × ${r}% = ${fmt(comm)}`;
    document.getElementById('resultBox').style.display='block';
    document.getElementById('breakdown').style.display='none';
  }else{
    const s=parseFloat(document.getElementById('salesTier').value)||0;
    if(!s){document.getElementById('resultBox').style.display='none';document.getElementById('breakdown').style.display='none';return;}
    let total=0,rem=s;const rows=[];
    const sorted=[...tiers].sort((a,b)=>(a.upTo===Infinity?1e18:a.upTo)-(b.upTo===Infinity?1e18:b.upTo));
    let prev=0;
    sorted.forEach(tier=>{
      const cap=tier.upTo===Infinity?rem:Math.min(tier.upTo-prev,rem);
      const chunk=Math.min(cap,rem);const comm=chunk*tier.rate/100;total+=comm;rem-=chunk;
      if(chunk>0)rows.push({range:`${fmt(prev+1)} ~ ${tier.upTo===Infinity?t.unlimited:fmt(tier.upTo)}`,rate:tier.rate,amount:chunk,comm});
      prev=tier.upTo===Infinity?prev:tier.upTo;if(rem<=0)return;
    });
    document.getElementById('resultBig').textContent=fmt(total);
    document.getElementById('resultSub').textContent=`${fmt(s)} → ${fmt(total)}`;
    document.getElementById('resultBox').style.display='block';
    const bd=document.getElementById('breakdown');bd.innerHTML='';
    rows.forEach(r=>{bd.innerHTML+=`<div class="breakdown-row"><span class="breakdown-label">${r.range} (${r.rate}%)</span><span class="breakdown-val">${fmt(r.comm)}</span></div>`;});
    bd.innerHTML+=`<div class="breakdown-row"><span class="breakdown-label">${t.lblComm}</span><span class="breakdown-val">${fmt(total)}</span></div>`;
    bd.style.display='block';
  }
}
_lang=detectLang();applyLang();renderTiers();
</script>
<script src="related.js"></script>
</body>
