    seoHtml:`<h2>QR코드 생성기란?</h2><p><strong>QR코드 생성기</strong>는 URL, 텍스트, Wi-Fi 정보, 연락처(vCard)를 즉시 QR코드로 변환하는 무료 도구입니다. 생성된 QR코드는 PNG 이미지로 다운로드하여 인쇄물, 명함, 마케팅 자료 등에 자유롭게 사용할 수 있습니다. 전경색·배경색 커스터마이징과 128~512px 크기 조절을 지원합니다. 모든 변환은 브라우저에서만 처리되어 입력 정보가 서버로 전송되지 않습니다.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. QR코드 생성은 무료인가요?</summary><p>A. 네, 완전 무료입니다. 회원가입, 워터마크, 사용 제한 없이 무제한으로 QR코드를 생성하고 다운로드할 수 있습니다.</p></details><details class="faq-item"><summary>Q. 생성된 QR코드의 유효기간이 있나요?</summary><p>A. 아니요. 이 도구는 URL을 단축하거나 서버에 저장하지 않아 유효기간이 없습니다. QR코드는 입력한 내용을 직접 인코딩합니다.</p></details><details class="faq-item"><summary>Q. Wi-Fi QR코드는 어떻게 사용하나요?</summary><p>A. Wi-Fi 탭에서 SSID와 비밀번호를 입력하면 QR코드가 생성됩니다. 스마트폰으로 스캔하면 자동으로 해당 Wi-Fi에 연결됩니다.</p></details><details class="faq-item"><summary>Q. 한글 텍스트도 QR코드로 변환되나요?</summary><p>A. 네, 한국어를 포함한 유니코드 텍스트 모두 QR코드로 변환할 수 있습니다.</p></details><details class="faq-item"><summary>Q. 상업적으로 사용 가능한가요?</summary><p>A. 네, 생성된 QR코드는 개인·상업적 목적 모두 자유롭게 사용할 수 있습니다.</p></details><details class="faq-item"><summary>Q. QR코드 색상을 바꿀 수 있나요?</summary><p>A. 네, 전경색(코드 색)과 배경색을 자유롭게 설정할 수 있습니다. 단, 스캔 오류를 방지하려면 전경색이 배경색보다 어두워야 합니다.</p></details><details class="faq-item"><summary>Q. 인쇄용으로 적합한 해상도는?</summary><p>A. 인쇄 목적이라면 512px로 설정하고 다운로드하거나, 벡터 편집 툴에서 확대하는 것을 권장합니다.</p></details><details class="faq-item"><summary>Q. vCard QR코드는 어떻게 작동하나요?</summary><p>A. 연락처 탭에서 이름, 전화번호, 이메일을 입력하면 vCard 포맷의 QR코드가 생성됩니다. 스마트폰으로 스캔하면 주소록에 바로 추가할 수 있습니다.</p></details>`},
  en:{pageTitle:'QR Code Generator - Free Online QR Creator | MODOO HUB',h1:'QR Code Generator',sub:'Convert URLs, text, Wi-Fi and contacts to QR codes instantly',backLink:'← All Tools',langBtn:'🌐 中文',tabText:'Text',tabContact:'Contact',lblUrl:'URL or Text',lblText:'Text',lblSsid:'Wi-Fi Name (SSID)',lblPass:'Password',lblEnc:'Encryption',lblName:'Name',lblPhone:'Phone',lblEmail:'Email',lblFg:'Foreground',lblBg:'Background',lblSize:'Size:',phText:'QR code appears here',btnDl:'Download PNG',
    seoHtml:`<h2>Free QR Code Generator</h2><p>Generate QR codes for <strong>URLs, text, Wi-Fi credentials, and contact info (vCard)</strong> instantly with no signup required. Download as PNG in sizes from 128px to 512px. Customize foreground and background colors for branded QR codes. All processing happens in your browser — your data is never sent to any server.</p><h2 class="seo-sub">Frequently Asked Questions</h2><details class="faq-item"><summary>Q. Is the QR code generator free?</summary><p>A. Yes, 100% free. No signup, no watermarks, unlimited use.</p></details><details class="faq-item"><summary>Q. Do the QR codes expire?</summary><p>A. No. QR codes generated here directly encode your content without URL shortening, so they never expire.</p></details><details class="faq-item"><summary>Q. How do Wi-Fi QR codes work?</summary><p>A. Enter your SSID and password in the Wi-Fi tab. When someone scans the QR code with their phone, it automatically connects to that Wi-Fi network.</p></details><details class="faq-item"><summary>Q. Can I use custom colors?</summary><p>A. Yes. You can set any foreground and background color. For best scan reliability, keep high contrast between foreground and background.</p></details><details class="faq-item"><summary>Q. What size should I use for printing?</summary><p>A. Use 512px for printed materials. For very large prints (posters, banners), scale it up in a vector editor like Inkscape.</p></details><details class="faq-item"><summary>Q. Can I use the QR codes commercially?</summary><p>A. Yes, generated QR codes are yours to use for any personal or commercial purpose.</p></details><details class="faq-item"><summary>Q. What is a vCard QR code?</summary><p>A. A vCard QR code encodes contact information. When scanned with a smartphone, it offers to add the contact to your address book.</p></details><details class="faq-item"><summary>Q. Does it support Unicode / non-Latin characters?</summary><p>A. Yes, all Unicode characters including Korean, Chinese, Japanese, Arabic etc. are supported.</p></details>`},

    seoHtml:`<h2>免费二维码生成器</h2><p><strong>二维码生成器</strong>可将URL、文本、Wi-Fi信息和联系人(vCard)即时转换为二维码。支持自定义颜色和128~512px尺寸，下载PNG格式无水印。所有处理在浏览器本地完成，您的数据不会上传到任何服务器。</p><h2 class="seo-sub">常见问题</h2><details class="faq-item"><summary>Q. 二维码生成是免费的吗？</summary><p>A. 是的，完全免费，无需注册，无使用次数限制，无水印。</p></details><details class="faq-item"><summary>Q. 生成的二维码会过期吗？</summary><p>A. 不会。本工具直接将内容编码到二维码中，不使用短链接服务，因此永不过期。</p></details><details class="faq-item"><summary>Q. 可以自定义颜色吗？</summary><p>A. 可以。支持自定义前景色和背景色，建议保持高对比度以确保扫描可靠性。</p></details><details class="faq-item"><summary>Q. Wi-Fi二维码怎么用？</summary><p>A. 在Wi-Fi选项卡输入SSID和密码，扫描生成的二维码即可自动连接Wi-Fi。</p></details><details class="faq-item"><summary>Q. 支持中文吗？</summary><p>A. 支持。中文及所有Unicode字符均可生成二维码。</p></details><details class="faq-item"><summary>Q. 可以商业使用吗？</summary><p>A. 可以。生成的二维码可用于个人和商业用途。</p></details><details class="faq-item"><summary>Q. 印刷用建议选多大尺寸？</summary><p>A. 印刷品建议选512px，海报等大尺寸材料可使用矢量编辑器放大。</p></details><details class="faq-item"><summary>Q. vCard二维码是什么？</summary><p>A. vCard二维码编码联系人信息，手机扫描后可直接添加到通讯录。</p></details>`},

let currentLang = detectLang();
let currentType = 'url';

function detectLang(){const p=new URLSearchParams(location.search).get('lang');if(p&&_i18n[p])return p;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
function applyLang(l){const t=_i18n[l]||_i18n.ko;document.title=t.pageTitle;document.documentElement.lang=l;document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});document.getElementById('seoSection').innerHTML=t.seoHtml;}
function toggleLang(){const order=['ko','en','zh','ja'];const next=order[(order.indexOf(currentLang)+1)%order.length];currentLang=next;localStorage.setItem('modoo_lang',next);const url=new URL(location.href);url.searchParams.set('lang',next);history.replaceState(null,'',url);applyLang(next);}

function setType(t) {
  currentType = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.t === t));
  ['url','text','wifi','vcard'].forEach(id => document.getElementById('input' + id.charAt(0).toUpperCase() + id.slice(1)).style.display = id === t ? '' : 'none');
  generate();
}

function getData() {
  switch(currentType) {
    case 'url': return document.getElementById('inUrl').value.trim();
    case 'text': return document.getElementById('inText').value.trim();
    case 'wifi': {
      const s = document.getElementById('inSsid').value;
      const p = document.getElementById('inPass').value;
      const e = document.getElementById('inEnc').value;
      return s ? `WIFI:T:${e};S:${s};P:${p};;` : '';
    }
    case 'vcard': {
      const n = document.getElementById('inName').value;
      const p = document.getElementById('inPhone').value;
      const e = document.getElementById('inEmail').value;
      if (!n && !p && !e) return '';
      return `BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL:${p}\nEMAIL:${e}\nEND:VCARD`;
    }
  }
  return '';
}

function generate() {
  const data = getData();
  const canvas = document.getElementById('qrCanvas');
  const ph = document.getElementById('placeholder');
  const dlBtn = document.getElementById('dlBtn');
  if (!data) { canvas.style.display='none'; ph.style.display='flex'; dlBtn.style.display='none'; return; }
  const size = parseInt(document.getElementById('sizeRange').value);
  const fg = document.getElementById('colorFg').value;
  const bg = document.getElementById('colorBg').value;
  QRCode.toCanvas(canvas, data, {width:size, color:{dark:fg,light:bg}, errorCorrectionLevel:'M'}, err => {
    if (err) { canvas.style.display='none'; ph.style.display='flex'; dlBtn.style.display='none'; return; }
    canvas.style.display='block';
    ph.style.display='none';
    dlBtn.style.display='block';
  });
}

function download() {
  const canvas = document.getElementById('qrCanvas');
  const a = document.createElement('a');
  a.download = 'qrcode.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

document.addEventListener('DOMContentLoaded', () => applyLang(currentLang));
</script>
