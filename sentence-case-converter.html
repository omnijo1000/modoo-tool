    const result=txt?c.fn(txt):'';
    return`<div class="case-card"><div class="case-head"><span class="case-label">${t.caseNames[c.key]}</span><button class="copy-btn" onclick="navigator.clipboard.writeText(this.closest('.case-card').querySelector('.case-out').textContent)">copy</button></div><div class="case-out">${result||'&nbsp;'}</div></div>`;
  }).join('');
}
function clearInput(){document.getElementById('textIn').value='';convert();}
function loadSample(){document.getElementById('textIn').value=_lang==='ko'?'안녕 hello world 모두의 툴 free online tools':_lang==='ja'?'こんにちは hello world 無料オンラインツール':'the quick brown fox jumps over the lazy dog';convert();}
_lang=detectLang();applyLang();
</script>
