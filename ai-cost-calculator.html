const _i18n={
  ko:{
    pageTitle:'AI API 비용 계산기 - 모델별 비용 비교 | MODOO HUB',

    seoHtml:`<h2>AI API 비용 계산이란?</h2><p>LLM API는 처리한 <strong>토큰 수</strong>에 비례해 과금됩니다. 입력(프롬프트) 토큰과 출력(컴플리션) 토큰 단가가 별도로 책정되며, 출력 토큰이 보통 2~5배 비쌉니다. 이 계산기는 정확한 토큰 수를 입력하면 주요 모델의 호출당 비용과 월간 예상 비용을 즉시 비교해 줍니다. 프로젝트 예산 수립, 모델 선정, 비용 최적화에 활용하세요.</p>
<details class="faq-item"><summary>입력 토큰과 출력 토큰의 가격이 왜 다른가요?</summary><p>출력(completion) 토큰은 모델이 직접 추론해 생성해야 하므로 GPU 연산이 더 많이 필요합니다. 이 때문에 대부분의 LLM API에서 출력 토큰 단가가 입력 토큰의 2~5배로 책정됩니다. 예: GPT-4o는 입력 $2.50/1M, 출력 $10/1M으로 4배 차이가 납니다.</p></details>
<details class="faq-item"><summary>컨텍스트 캐싱(Context Caching) 할인이란?</summary><p>긴 시스템 프롬프트나 문서를 반복 사용할 때, 이미 처리한 부분을 캐시해 재사용하면 입력 토큰 비용을 50~90% 절감할 수 있습니다. Anthropic의 Prompt Caching, Google의 Context Caching이 대표적입니다. 대화형 애플리케이션에서 특히 효과적입니다.</p></details>
<details class="faq-item"><summary>배치 API 할인은 얼마나 되나요?</summary><p>실시간 응답이 필요 없는 작업(데이터 분류, 번역, 요약 등)은 배치 API를 활용하면 약 50% 할인을 받을 수 있습니다. OpenAI Batch API, Anthropic Message Batches API 모두 지원합니다. 처리 시간이 수 시간 내로 늘어나는 트레이드오프가 있습니다.</p></details>
<details class="faq-item"><summary>월간 비용을 어떻게 추정하나요?</summary><p>월간 비용 = 호출당 비용 × 월간 호출 수입니다. 이 계산기의 '월간 비용' 컬럼이 자동으로 계산해 줍니다. 실제 서비스에서는 사용자당 평균 호출 수 × 예상 사용자 수로 입력하면 됩니다.</p></details>
<details class="faq-item"><summary>비용 대비 성능이 가장 좋은 모델은?</summary><p>일반적인 텍스트 작업에는 GPT-4o mini, Claude Haiku, Gemini 2.0 Flash가 가성비가 우수합니다. 코딩·분석 등 고품질이 필요한 경우 GPT-4o, Claude Sonnet 4.5를 고려하세요. 초고품질이 필요한 경우에만 o1, Claude Opus를 사용하는 것이 비용 효율적입니다.</p></details>
<details class="faq-item"><summary>토큰과 글자수(문자수)의 차이는?</summary><p>토큰은 모델의 토크나이저가 텍스트를 분해하는 단위입니다. 영어 단어 1개 ≈ 1~2토큰, 한국어·중국어 문자 1개 ≈ 2~3토큰이 일반적입니다. 같은 내용도 언어에 따라 토큰 수가 달라져 비용 차이가 납니다.</p></details>
<details class="faq-item"><summary>프롬프트 엔지니어링으로 비용을 줄이는 방법은?</summary><p>①시스템 프롬프트를 간결하게 작성, ②Few-shot 예시를 최소화, ③JSON 등 짧은 출력 형식 지정, ④불필요한 설명 요청 제거, ⑤Prompt Caching으로 반복 토큰 재사용. 이 방법으로 토큰 사용량을 30~70% 줄이는 것이 가능합니다.</p></details>
<details class="faq-item"><summary>가격은 언제 업데이트되나요?</summary><p>이 계산기의 가격은 2025년 기준입니다. AI 모델 가격은 경쟁 심화로 지속 하락 중이며, 공급사가 수시로 변경합니다. 정확한 최신 가격은 OpenAI, Anthropic, Google AI 공식 Pricing 페이지에서 반드시 확인하세요.</p></details>`,

const LANGS=['ko','en','zh','ja'];
let _lang='ko';

function detectLang(){
  const u=new URLSearchParams(location.search).get('lang');
  if(u&&_i18n[u])return u;
  const s=localStorage.getItem('modoo_lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language?.slice(0,2);
  return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';
}

function cycleLang(){
  const idx=LANGS.indexOf(_lang);
  _lang=LANGS[(idx+1)%LANGS.length];
  localStorage.setItem('modoo_lang',_lang);
  const url=new URL(location.href);
  url.searchParams.set('lang',_lang);
  history.replaceState({},'',url);
  applyLang();
}

function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.title=t.pageTitle;
  document.getElementById('h1El').childNodes[0].textContent=t.h1+' ';
  document.getElementById('h1Span').textContent=t.h1Span;
  document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('labelInputTokens').textContent=t.labelInputTokens;
  document.getElementById('labelOutputTokens').textContent=t.labelOutputTokens;
  document.getElementById('labelMonthlyCalls').textContent=t.labelMonthlyCalls;
  document.getElementById('colModel').textContent=t.colModel;
  document.getElementById('colInPrice').textContent=t.colInPrice;
  document.getElementById('colOutPrice').textContent=t.colOutPrice;
  document.getElementById('colPerCall').textContent=t.colPerCall;
  document.getElementById('colMonthly').textContent=t.colMonthly;
  document.getElementById('noteText').textContent=t.noteText;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  update();
}

function calcCost(model,inTokens,outTokens){
  const inCost=(inTokens/1_000_000)*model.inPer1M;
  const outCost=(outTokens/1_000_000)*model.outPer1M;
  return inCost+outCost;
}

function fmtCost(n){
  if(n===0)return '$0.000000';
  if(n<0.000001)return '<$0.000001';
  if(n<0.01)return '$'+n.toFixed(6);
  if(n<1)return '$'+n.toFixed(4);
  if(n<1000)return '$'+n.toFixed(2);
  return '$'+n.toLocaleString('en-US',{maximumFractionDigits:2});
}

function update(){
  const inT=Math.max(0,parseInt(document.getElementById('inTokens').value)||0);
  const outT=Math.max(0,parseInt(document.getElementById('outTokens').value)||0);
  const calls=Math.max(0,parseInt(document.getElementById('monthlyCalls').value)||0);

  const costs=MODELS.map(m=>({model:m,cost:calcCost(m,inT,outT)}));
  const min=Math.min(...costs.map(c=>c.cost));
  const max=Math.max(...costs.map(c=>c.cost));

  document.getElementById('modelRows').innerHTML=costs.map(({model:m,cost})=>{
    const monthly=cost*calls;
    const isCheapest=cost===min;
    const isPriciest=cost===max;
    const rowCls=isCheapest?'mt-row cheapest':isPriciest?'mt-row priciest':'mt-row';
    const costCls=isCheapest?'cell-green':'cell-accent';
    return`<div class="${rowCls}">
      <div class="model-cell">
        <span class="model-name">${m.name}${isCheapest?' ★':''}</span>
        <span class="provider-badge ${m.badge}">${m.provider}</span>
      </div>
      <span class="cell-muted">$${m.inPer1M.toFixed(2)}</span>
      <span class="cell-muted">$${m.outPer1M.toFixed(2)}</span>
      <span class="${costCls}">${fmtCost(cost)}</span>
      <span class="${costCls}">${fmtCost(monthly)}</span>
    </div>`;
  }).join('');
}

_lang=detectLang();
applyLang();
