<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#252525;--accent:#fbbf24;--accent2:#f59e0b;--text:#f5f5f5;--text-muted:#888;--text-dim:#444;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#c084fc;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:20px;}

.my-ip-btn:hover{color:var(--accent);border-color:var(--accent);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px;}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}

.loading{display:flex;align-items:center;gap:10px;color:var(--text-muted);font-size:14px;}

@keyframes spin{to{transform:rotate(360deg);}}
.error-msg{color:var(--red);background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:12px 16px;font-size:13px;}

.type-ipv4{background:rgba(96,165,250,.15);color:var(--blue);}
.type-ipv6{background:rgba(192,132,252,.15);color:var(--purple);}

.history-chip:hover{border-color:var(--accent);color:var(--accent);}

<script>
const COUNTRY_FLAGS = {
  'KR':'🇰🇷','US':'🇺🇸','JP':'🇯🇵','CN':'🇨🇳','DE':'🇩🇪','GB':'🇬🇧','FR':'🇫🇷','CA':'🇨🇦','AU':'🇦🇺',
  'IN':'🇮🇳','BR':'🇧🇷','RU':'🇷🇺','NL':'🇳🇱','SG':'🇸🇬','HK':'🇭🇰','TW':'🇹🇼','IT':'🇮🇹','ES':'🇪🇸',
  'SE':'🇸🇪','NO':'🇳🇴','CH':'🇨🇭','PL':'🇵🇱','ID':'🇮🇩','VN':'🇻🇳','TH':'🇹🇭','MY':'🇲🇾','PH':'🇵🇭',
};

let currentIp = '';
let history = JSON.parse(localStorage.getItem('ip_history') || '[]');

function getFlag(code) { return COUNTRY_FLAGS[code] || '🌐'; }

function isValidIp(ip) {
  const v4 = /^(\d{1,3}\.){3}\d{1,3}$/;
  const v6 = /^([0-9a-fA-F]{1,4}:){1,7}[0-9a-fA-F]{0,4}$|^::([0-9a-fA-F]{1,4}:){0,6}[0-9a-fA-F]{1,4}$|^[0-9a-fA-F]{1,4}::$/;
  return v4.test(ip) || v6.test(ip) || ip === '::1';
}

function detectIpType(ip) {
  return ip.includes(':') ? 'IPv6' : 'IPv4';
}

function showLoading(show) {
  document.getElementById('loadingDiv').classList.toggle('hidden', !show);
}

function showError(msg) {
  const el = document.getElementById('errorDiv');
  el.textContent = msg;
  el.classList.remove('hidden');
  document.getElementById('resultCard').classList.add('hidden');
}

function hideError() {
  document.getElementById('errorDiv').classList.add('hidden');
}

async function fetchIpData(ip) {
  const url = ip ? `https://ip-api.com/json/${ip}?fields=status,message,country,countryCode,regionName,city,zip,lat,lon,timezone,isp,org,as,query`
                 : 'https://ip-api.com/json/?fields=status,message,country,countryCode,regionName,city,zip,lat,lon,timezone,isp,org,as,query';
  const r = await fetch(url);
  if (!r.ok) throw new Error('Network error');
  return r.json();
}

function renderResult(data) {
  currentIp = data.query;
  document.getElementById('displayIp').textContent = data.query;
  document.getElementById('flagEmoji').textContent = getFlag(data.countryCode);
  document.getElementById('ipTypeBadge').textContent = detectIpType(data.query);
  document.getElementById('ipTypeBadge').className = 'type-badge ' + (data.query.includes(':') ? 'type-ipv6' : 'type-ipv4');

  const t = _i18n[currentLang] || _i18n.ko;
  document.getElementById('locationSummary').textContent = [data.city, data.regionName, data.country].filter(Boolean).join(', ');

  const fields = [
    {label: t.fieldCountry,   value: data.country || '—'},
    {label: t.fieldRegion,    value: data.regionName || '—'},
    {label: t.fieldCity,      value: data.city || '—'},
    {label: t.fieldZip,       value: data.zip || '—'},
    {label: t.fieldTimezone,  value: data.timezone || '—', mono: true},
    {label: t.fieldIsp,       value: data.isp || '—'},
    {label: t.fieldOrg,       value: data.org || '—'},
    {label: t.fieldAsn,       value: data.as || '—', mono: true},
    {label: t.fieldLat,       value: data.lat != null ? data.lat.toFixed(4) : '—', mono: true},
    {label: t.fieldLon,       value: data.lon != null ? data.lon.toFixed(4) : '—', mono: true},
  ];

  document.getElementById('infoGrid').innerHTML = fields.map(f =>
    `<div class="info-item"><div class="info-label">${f.label}</div><div class="info-value${f.mono?' mono':''}">${f.value}</div></div>`
  ).join('');

  if (data.lat && data.lon) {
    document.getElementById('mapArea').innerHTML =
      `<iframe loading="lazy" src="https://www.openstreetmap.org/export/embed.html?bbox=${data.lon-0.1},${data.lat-0.1},${data.lon+0.1},${data.lat+0.1}&layer=mapnik&marker=${data.lat},${data.lon}" title="map"></iframe>`;
  } else {
    document.getElementById('mapArea').innerHTML = `<span style="color:var(--text-dim);font-size:13px;">${t.noMap}</span>`;
  }

  document.getElementById('resultCard').classList.remove('hidden');
  addHistory(data.query);
}

async function lookup() {
  const raw = document.getElementById('ipInput').value.trim();
  if (!raw) { lookupMyIp(); return; }
  if (!isValidIp(raw)) {
    const t = _i18n[currentLang] || _i18n.ko;
    showError(t.errInvalid); return;
  }
  hideError(); showLoading(true);
  try {
    const data = await fetchIpData(raw);
    showLoading(false);
    if (data.status === 'fail') { showError(data.message || 'Lookup failed'); return; }
    renderResult(data);
  } catch(e) {
    showLoading(false);
    const t = _i18n[currentLang] || _i18n.ko;
    showError(t.errNetwork);
  }
}

async function lookupMyIp() {
  hideError(); showLoading(true);
  document.getElementById('ipInput').value = '';
  try {
    const data = await fetchIpData('');
    showLoading(false);
    if (data.status === 'fail') { showError(data.message || 'Lookup failed'); return; }
    document.getElementById('ipInput').value = data.query;
    renderResult(data);
  } catch(e) {
    showLoading(false);
    const t = _i18n[currentLang] || _i18n.ko;
    showError(t.errNetwork);
  }
}

function copyIp() {
  if (!currentIp) return;
  navigator.clipboard.writeText(currentIp).then(() => {
    const el = document.getElementById('copyDone'); el.style.display='inline'; setTimeout(()=>el.style.display='none',2000);
  });
}

function addHistory(ip) {
  history = [ip, ...history.filter(h => h !== ip)].slice(0, 8);
  localStorage.setItem('ip_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) { document.getElementById('historySection').classList.add('hidden'); return; }
  document.getElementById('historySection').classList.remove('hidden');
  document.getElementById('historyChips').innerHTML = history.map(ip =>
    `<span class="history-chip" onclick="lookupFromHistory('${ip}')">${ip}</span>`
  ).join('');
}

function lookupFromHistory(ip) {
  document.getElementById('ipInput').value = ip;
  lookup();
}

document.getElementById('ipInput').addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });

    btnCopyIp: 'IP 복사', copyDone: '✓ 복사됨',
    loading: '조회 중...', labelHistory: '최근 조회',
    privacyNote: '입력한 IP는 서버에 저장되지 않습니다. ip-api.com 무료 API 사용.',
    errInvalid: '올바른 IPv4 또는 IPv6 주소를 입력하세요.',
    errNetwork: '조회에 실패했습니다. 네트워크 상태를 확인하세요.',
    noMap: '위치 정보 없음',
    fieldCountry: '국가', fieldRegion: '지역', fieldCity: '도시', fieldZip: '우편번호',

    seoHtml:`<h2>IP 주소 조회란?</h2><p><strong>IP 주소 조회(IP Lookup)</strong>는 특정 IP 주소의 지리적 위치, 인터넷 서비스 제공자(ISP), 조직명, ASN(자율 시스템 번호), 시간대 등의 정보를 확인하는 도구입니다. 내 공인 IP를 자동으로 확인하거나, 원하는 IP 주소를 입력해 상세 정보를 조회할 수 있습니다. 네트워크 문제 해결, 보안 검토, 서버 위치 확인 등에 활용됩니다.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. 공인 IP와 사설 IP의 차이는?</summary><p>A. 공인 IP는 인터넷에서 고유하게 식별되는 주소로, ISP가 할당합니다. 사설 IP(192.168.x.x, 10.x.x.x 등)는 내부 네트워크에서만 사용되며 인터넷에서 직접 접근할 수 없습니다.</p></details><details class="faq-item"><summary>Q. IP 조회로 정확한 집 주소를 알 수 있나요?</summary><p>A. 아닙니다. IP 지리 정보는 도시·지역 수준이며 오차가 수십~수백 km에 달할 수 있습니다. 정확한 주소를 알려면 법적 절차를 통해 ISP에 요청해야 합니다.</p></details><details class="faq-item"><summary>Q. IPv4와 IPv6의 차이는?</summary><p>A. IPv4는 32비트 주소(예: 192.168.1.1)로 약 43억 개, IPv6는 128비트 주소(예: 2001:db8::1)로 사실상 무한한 주소를 지원합니다. 인터넷 주소 고갈로 IPv6 전환이 진행 중입니다.</p></details><details class="faq-item"><summary>Q. VPN을 사용하면 IP가 바뀌나요?</summary><p>A. 네. VPN 서버의 IP로 표시되며, 실제 위치 대신 VPN 서버 위치가 조회됩니다. 이 도구는 VPN 적용 후의 공인 IP를 보여줍니다.</p></details><details class="faq-item"><summary>Q. 동적 IP와 정적 IP의 차이는?</summary><p>A. 동적 IP는 ISP가 주기적으로 변경하며 일반 가정용 인터넷에서 흔합니다. 정적 IP는 고정되어 서버 운영에 적합하지만 추가 비용이 발생합니다.</p></details><details class="faq-item"><summary>Q. ASN이란 무엇인가요?</summary><p>A. ASN(Autonomous System Number)은 인터넷 라우팅 정책을 공유하는 네트워크 그룹에 부여된 고유 번호입니다. ISP, 대기업, 클라우드 사업자 등이 ASN을 보유합니다.</p></details><details class="faq-item"><summary>Q. IP 조회 결과가 실제 위치와 다른 이유는?</summary><p>A. IP 지리 데이터는 완벽하지 않습니다. ISP가 IP를 본사 도시에 등록하거나, CDN·클라우드 서비스를 통하면 실제 위치와 다르게 표시될 수 있습니다.</p></details><details class="faq-item"><summary>Q. 127.0.0.1은 무엇인가요?</summary><p>A. 루프백(loopback) 주소로 자기 자신을 가리킵니다. "localhost"로도 불리며 개발 환경에서 자주 사용되지만 공인 IP가 아니어서 조회되지 않습니다.</p></details>`

    seoHtml:`<h2>What is IP Address Lookup?</h2><p><strong>IP Address Lookup</strong> retrieves geolocation, ISP, organization, ASN, and timezone information for any IP address. Instantly check your own public IP or look up any IPv4/IPv6 address. Useful for network troubleshooting, security audits, and server location verification.</p><h2 class="seo-sub">FAQ</h2><details class="faq-item"><summary>Q. What is the difference between public and private IP?</summary><p>A. A public IP is globally unique and assigned by your ISP for internet communication. Private IPs (192.168.x.x, 10.x.x.x) are used within local networks and aren\'t accessible from the internet directly.</p></details><details class="faq-item"><summary>Q. Can IP lookup reveal my home address?</summary><p>A. No. IP geolocation is accurate to the city or region level, with errors of tens to hundreds of kilometers. Exact address requires legal process through the ISP.</p></details><details class="faq-item"><summary>Q. IPv4 vs IPv6 — what\'s the difference?</summary><p>A. IPv4 uses 32-bit addresses (~4.3 billion), while IPv6 uses 128-bit addresses (virtually unlimited). IPv6 adoption is growing due to IPv4 exhaustion.</p></details><details class="faq-item"><summary>Q. Does a VPN change my IP?</summary><p>A. Yes. A VPN replaces your visible IP with the VPN server\'s IP. This tool will show the VPN server\'s location instead of yours.</p></details><details class="faq-item"><summary>Q. What is ASN?</summary><p>A. An Autonomous System Number (ASN) identifies a network group that shares a routing policy. ISPs, large corporations, and cloud providers own ASNs.</p></details><details class="faq-item"><summary>Q. Why does IP location differ from actual location?</summary><p>A. IP geolocation databases aren\'t perfect. ISPs may register IPs to their headquarters city, and CDN/cloud routing can shift the apparent location.</p></details><details class="faq-item"><summary>Q. What is 127.0.0.1?</summary><p>A. The loopback address pointing to your own machine (localhost). It\'s not a public IP and can\'t be looked up externally.</p></details><details class="faq-item"><summary>Q. What is a dynamic vs static IP?</summary><p>A. Dynamic IPs change periodically (common for home internet). Static IPs are fixed and preferred for servers, but cost extra.</p></details>`

    seoHtml:`<h2>什么是IP地址查询？</h2><p><strong>IP地址查询</strong>可获取任意IP地址的地理位置、互联网服务提供商（ISP）、组织名称、ASN和时区等信息。可自动检测您的公网IP，或输入任意IP进行详细查询。适用于网络故障排查、安全审计和服务器位置确认。</p><h2 class="seo-sub">常见问题</h2><details class="faq-item"><summary>Q. 公网IP与私有IP的区别？</summary><p>A. 公网IP在互联网上唯一标识您的设备，由ISP分配。私有IP（如192.168.x.x）仅在局域网内使用，无法从互联网直接访问。</p></details><details class="faq-item"><summary>Q. IP查询能精确到家庭住址吗？</summary><p>A. 不能。IP地理位置只能精确到城市或地区级别，误差可达数十至数百公里。获取精确地址需通过法律程序向ISP申请。</p></details><details class="faq-item"><summary>Q. IPv4与IPv6有什么区别？</summary><p>A. IPv4使用32位地址（约43亿个），IPv6使用128位地址（几乎无限）。因IPv4地址耗尽，IPv6正在逐步普及。</p></details><details class="faq-item"><summary>Q. 使用VPN会改变我的IP吗？</summary><p>A. 会。VPN会将您的IP替换为VPN服务器的IP，本工具将显示VPN服务器的位置。</p></details><details class="faq-item"><summary>Q. 什么是ASN？</summary><p>A. ASN（自治系统号）是分配给共享路由策略网络组的唯一编号，ISP、大型企业和云服务商通常拥有ASN。</p></details><details class="faq-item"><summary>Q. IP位置与实际位置不符的原因？</summary><p>A. IP地理数据库并不完美。ISP可能将IP注册在总部城市，CDN/云路由也可能导致显示位置偏差。</p></details><details class="faq-item"><summary>Q. 127.0.0.1是什么？</summary><p>A. 回环地址，指向本机（localhost）。不是公网IP，无法进行外部查询。</p></details><details class="faq-item"><summary>Q. 动态IP与静态IP的区别？</summary><p>A. 动态IP由ISP定期更换，家庭宽带常见。静态IP固定不变，适合服务器，但需额外付费。</p></details>`

let currentLang = detectLang();
function detectLang(){
  const p=new URLSearchParams(location.search).get('lang');
  if(p&&_i18n[p])return p;
  const s=localStorage.getItem('modoo_lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language||'';
  if(n.startsWith('zh'))return 'zh';
  if(n.startsWith('ja'))return 'ja';
  if(n.startsWith('ko'))return 'ko';
  return 'en';
}
function applyLang(l){
  const t=_i18n[l]||_i18n.ko;
  document.documentElement.lang=l;
  document.title=t.pageTitle;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const v=t[el.dataset.i18n];
    if(v!==undefined)el.innerHTML=v;
  });
  const inp=document.getElementById('ipInput');
  if(inp)inp.placeholder=t.placeholder;
  document.getElementById('seoArea').innerHTML=t.seoHtml;
}
function toggleLang(){
  const order=['ko','en','zh','ja'];
  const next=order[(order.indexOf(currentLang)+1)%order.length];
  currentLang=next;
  localStorage.setItem('modoo_lang',next);
  const url=new URL(location.href);
  url.searchParams.set('lang',next);
  history.replaceState(null,'',url);
  applyLang(next);
}
document.addEventListener('DOMContentLoaded',()=>{
  applyLang(currentLang);
  renderHistory();
  lookupMyIp();
});
