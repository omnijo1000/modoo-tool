<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#34d399;--red:#f87171;--yellow:#facc15;--blue:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:10px;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}

.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}

h1{font-size:28px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:28px;line-height:1.6;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.two-col{grid-template-columns:1fr;}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.panel-title{font-size:11px;color:var(--text-dim);letter-spacing:.1em;font-family:'DM Mono',monospace;margin-bottom:12px;}
label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:5px;font-family:'DM Mono',monospace;}
select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;margin-bottom:10px;}
select:focus{border-color:var(--accent);}
input[type=text],input[type=password],input[type=number]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;margin-bottom:10px;}
input:focus{border-color:var(--accent);}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;resize:vertical;line-height:1.6;}
textarea:focus{border-color:var(--accent);}
.quick-claims{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.qc-btn{padding:4px 10px;border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--text-dim);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}
.qc-btn:hover{border-color:var(--accent);color:var(--accent);}
.gen-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin:16px 0 0;font-family:'DM Mono',monospace;}
.gen-btn:hover{opacity:.85;}
.result-area{margin-top:20px;}
.jwt-output-wrap{position:relative;}
.jwt-output{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.8;word-break:break-all;min-height:60px;}
.jwt-part-h{color:var(--red);}
.jwt-part-p{color:var(--blue);}
.jwt-part-s{color:var(--accent);}
.jwt-dot{color:var(--text-dim);}
.copy-row{display:flex;gap:8px;margin-top:8px;}
.copy-btn{padding:7px 16px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s;}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.decoded-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
@media(max-width:600px){.decoded-grid{grid-template-columns:1fr;}}
.decoded-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.db-title{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:8px;}
.db-content{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);line-height:1.7;word-break:break-word;}
.err-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-top:10px;display:none;}
.copied-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 24px;border-radius:20px;font-family:'DM Mono',monospace;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;}
.copied-toast.show{opacity:1;}
.seo{margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}
.seo h2{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:40px;}

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>JWT <span>Generator</span></h1>
  <p class="sub" data-i18n="sub">JWT 토큰 생성 및 서명 · HS256/HS384/HS512 · 브라우저에서 처리</p>

  <div class="two-col">
    <div>
      <div class="panel">
        <div class="panel-title" data-i18n="headerTitle">HEADER</div>
        <label>Algorithm</label>
        <select id="alg" onchange="generate()">
          <option value="HS256" selected>HS256 (HMAC SHA-256)</option>
          <option value="HS384">HS384 (HMAC SHA-384)</option>
          <option value="HS512">HS512 (HMAC SHA-512)</option>
        </select>
        <label>Type</label>
        <input type="text" id="typ" value="JWT" readonly style="color:var(--text-dim)">
      </div>
      <div class="panel" style="margin-top:12px">
        <div class="panel-title" data-i18n="secretTitle">SECRET KEY</div>
        <label data-i18n="secretLabel">서명 시크릿 키</label>
        <input type="text" id="secret" value="your-secret-key" placeholder="secret key" oninput="generate()">
      </div>
    </div>
    <div class="panel">
      <div class="panel-title" data-i18n="payloadTitle">PAYLOAD</div>
      <div class="quick-claims">
        <button class="qc-btn" onclick="addClaim('sub','user123')">+ sub</button>
        <button class="qc-btn" onclick="addClaim('iss','modoo')">+ iss</button>
        <button class="qc-btn" onclick="addExp(3600)">+ exp (1h)</button>
        <button class="qc-btn" onclick="addExp(86400)">+ exp (24h)</button>
        <button class="qc-btn" onclick="addIat()">+ iat</button>
        <button class="qc-btn" onclick="addClaim('aud','api')">+ aud</button>
        <button class="qc-btn" onclick="addClaim('jti',genJti())">+ jti</button>
      </div>
      <textarea id="payload" rows="10" oninput="generate()">{
  "sub": "user123",
  "iss": "modoo-hub",
  "iat": 1700000000,
  "exp": 1700086400
}</textarea>
    </div>
  </div>

  <button class="gen-btn" onclick="generate()" data-i18n="genBtn">▶ JWT 생성</button>

  <div class="result-area" id="resultArea" style="display:none">
    <div class="jwt-output-wrap">
      <div class="jwt-output" id="jwtOutput"></div>
    </div>
    <div class="copy-row">
      <button class="copy-btn" onclick="copyJwt()" data-i18n="copyBtn">토큰 복사</button>
      <button class="copy-btn" onclick="copyRaw()" data-i18n="copyRaw">원문 복사</button>
    </div>
    <div class="decoded-grid">
      <div class="decoded-box">
        <div class="db-title">HEADER (decoded)</div>
        <div class="db-content" id="decodedHeader"></div>
      </div>
      <div class="decoded-box">
        <div class="db-title">PAYLOAD (decoded)</div>
        <div class="db-content" id="decodedPayload"></div>
      </div>
    </div>
  </div>
  <div class="err-box" id="errBox"></div>

  <div class="seo" data-i18n="seoHtml"></div>
  <footer data-i18n="footer">JWT Generator · RFC 7519 · WebCrypto API · All processing in browser</footer>
</main>

<script>
const _i18n={
  ko:{sub:'JWT 토큰 생성 및 서명 · HS256/HS384/HS512 · 브라우저에서 처리',langBtn:'🌐 EN',backBtn:'← 모두의 툴',headerTitle:'HEADER',secretTitle:'SECRET KEY',secretLabel:'서명 시크릿 키',payloadTitle:'PAYLOAD',genBtn:'▶ JWT 생성',copyBtn:'토큰 복사',copyRaw:'원문 복사',seoHtml:'<h2>JWT Generator란?</h2><p>JWT(JSON Web Token)는 <strong>Header.Payload.Signature</strong> 세 부분을 점(.)으로 연결한 자가 포함(self-contained) 토큰입니다. 이 도구는 HS256·HS384·HS512 알고리즘을 지원하며 브라우저 WebCrypto API로 서명합니다. 생성된 토큰은 서버로 전송되지 않으며 모든 처리는 로컬에서 이루어집니다.</p><h2>자주 묻는 질문 (FAQ)</h2><details class="faq-item"><summary>JWT의 세 부분은 각각 무엇인가요?</summary><p>Header: 알고리즘·토큰 유형 지정(예: {"alg":"HS256","typ":"JWT"}). Payload: 클레임(claim) 데이터(예: sub, exp, iat). Signature: 헤더+페이로드를 시크릿 키로 서명한 값. 세 부분은 Base64URL로 인코딩됩니다.</p></details><details class="faq-item"><summary>JWT는 어디에 사용하나요?</summary><p>API 인증(Bearer Token), 세션 관리, SSO(단일 로그인), 마이크로서비스 간 신원 전달에 사용됩니다. Authorization: Bearer {token} 헤더로 전달하는 것이 일반적입니다.</p></details><details class="faq-item"><summary>HS256과 RS256의 차이는?</summary><p>HS256은 대칭키(동일 시크릿으로 서명·검증), RS256은 비대칭키(개인키로 서명, 공개키로 검증)입니다. 이 도구는 HS256·HS384·HS512(HMAC)를 지원합니다.</p></details><details class="faq-item"><summary>JWT는 암호화되나요?</summary><p>아니요. JWT의 Header·Payload는 Base64URL로 인코딩될 뿐, 암호화되지 않습니다. Signature는 위조 방지용이며 내용 기밀성은 없습니다. 민감 정보는 Payload에 넣지 마세요.</p></details><details class="faq-item"><summary>생성된 토큰이 서버로 전송되나요?</summary><p>아니요. WebCrypto API를 사용한 모든 처리가 브라우저에서만 이루어집니다. 시크릿 키와 토큰이 외부로 유출되지 않습니다.</p></details><details class="faq-item"><summary>JWT 토큰은 얼마나 오래 유효하게 설정해야 하나요?</summary><p>액세스 토큰은 15분~1시간, 리프레시 토큰은 7~30일을 권장합니다. 짧을수록 보안이 높아지지만 사용자 경험이 떨어질 수 있으므로 서비스 특성에 맞게 조절하세요.</p></details><details class="faq-item"><summary>JWT를 LocalStorage에 저장해도 안전한가요?</summary><p>권장하지 않습니다. LocalStorage는 XSS 공격에 노출될 수 있습니다. 액세스 토큰은 HttpOnly 쿠키에 저장하는 것이 더 안전합니다.</p></details><details class="faq-item"><summary>JWT를 로그아웃 시 무효화하려면 어떻게 하나요?</summary><p>JWT는 상태 비저장(stateless)이므로 서버에서 직접 무효화하기 어렵습니다. 블랙리스트 방식(redis에 토큰 저장)이나 토큰 만료 시간을 짧게 설정하는 방법을 사용합니다.</p></details>',footer:'JWT Generator · RFC 7519 · 모든 처리는 브라우저에서',toastMsg:'복사되었습니다!'},
  en:{sub:'Generate & sign JWT tokens · HS256/HS384/HS512 · All in browser',langBtn:'🌐 中文',backBtn:'← All Tools',headerTitle:'HEADER',secretTitle:'SECRET KEY',secretLabel:'Signing secret key',payloadTitle:'PAYLOAD',genBtn:'▶ Generate JWT',copyBtn:'Copy Token',copyRaw:'Copy Raw',seoHtml:'<h2>What is JWT Generator?</h2><p>JWT (JSON Web Token) is a compact, <strong>self-contained token</strong> consisting of Header.Payload.Signature, encoded in Base64URL. This tool signs tokens using HS256, HS384, or HS512 via the browser\'s WebCrypto API. Nothing is sent to any server — all processing is local.</p><h2>FAQ</h2><details class="faq-item"><summary>What are the three parts of a JWT?</summary><p>Header: specifies algorithm and token type (e.g. {"alg":"HS256","typ":"JWT"}). Payload: contains claims like sub, exp, iat, and custom data. Signature: HMAC of Base64URL(header) + "." + Base64URL(payload) using the secret key.</p></details><details class="faq-item"><summary>Where is JWT used?</summary><p>API authentication (Bearer tokens), session management, SSO (single sign-on), and microservice identity propagation. Typically passed as "Authorization: Bearer {token}" in HTTP headers.</p></details><details class="faq-item"><summary>What is the difference between HS256 and RS256?</summary><p>HS256 is symmetric (same secret for signing and verification). RS256 is asymmetric (private key signs, public key verifies). This tool supports HS256, HS384, and HS512 (HMAC-based).</p></details><details class="faq-item"><summary>Is the JWT payload encrypted?</summary><p>No. Header and payload are only Base64URL-encoded, not encrypted. The signature prevents tampering but does not provide confidentiality. Never put sensitive data (passwords, PII) in the payload.</p></details><details class="faq-item"><summary>Is my secret key or token sent to a server?</summary><p>No. All signing is performed using the browser\'s WebCrypto API. Your secret key and generated tokens never leave your device.</p></details><details class="faq-item"><summary>How long should a JWT token be valid?</summary><p>Access tokens should be valid for 15 minutes to 1 hour; refresh tokens for 7–30 days. Shorter expiry improves security but may reduce user experience — tune based on your service needs.</p></details><details class="faq-item"><summary>Is it safe to store JWT tokens in LocalStorage?</summary><p>Not recommended. LocalStorage is vulnerable to XSS attacks. Storing access tokens in HttpOnly cookies is significantly more secure.</p></details><details class="faq-item"><summary>How do I invalidate a JWT on logout?</summary><p>JWT is stateless so server-side invalidation is not straightforward. Common approaches are a token blacklist (stored in Redis) or short expiry times combined with refresh tokens.</p></details>',footer:'JWT Generator · RFC 7519 · All processing in browser',toastMsg:'Copied!'},
  zh:{sub:'JWT令牌生成与签名 · HS256/HS384/HS512 · 本地处理',langBtn:'🌐 日本語',backBtn:'← 所有工具',headerTitle:'HEADER',secretTitle:'SECRET KEY',secretLabel:'签名密钥',payloadTitle:'PAYLOAD',genBtn:'▶ 生成JWT',copyBtn:'复制Token',copyRaw:'复制原文',seoHtml:'<h2>JWT生成器简介</h2><p>JWT（JSON Web Token）是一种紧凑的<strong>自包含令牌</strong>，由Header.Payload.Signature三部分组成，以Base64URL编码。本工具使用HS256、HS384或HS512算法通过浏览器内置WebCrypto API签名，所有处理均在本地完成，不向任何服务器发送数据。</p><h2>常见问题 (FAQ)</h2><details class="faq-item"><summary>JWT的三个部分分别是什么？</summary><p>Header：指定算法和令牌类型（如{"alg":"HS256","typ":"JWT"}）。Payload：包含声明数据如sub、exp、iat等。Signature：用密钥对Base64URL(header)+"."+Base64URL(payload)进行HMAC签名。</p></details><details class="faq-item"><summary>JWT用在哪里？</summary><p>API认证（Bearer令牌）、会话管理、单点登录（SSO）、微服务间身份传递。通常通过"Authorization: Bearer {token}"HTTP头传递。</p></details><details class="faq-item"><summary>HS256和RS256有什么区别？</summary><p>HS256是对称算法（同一密钥签名和验证）。RS256是非对称算法（私钥签名，公钥验证）。本工具支持HS256、HS384和HS512（基于HMAC）。</p></details><details class="faq-item"><summary>JWT的Payload会被加密吗？</summary><p>不会。Header和Payload仅以Base64URL编码，不加密。签名防止篡改但不提供保密性。请勿在Payload中存放密码、个人信息等敏感数据。</p></details><details class="faq-item"><summary>密钥或令牌会发送到服务器吗？</summary><p>不会。所有签名均通过浏览器内置WebCrypto API完成，密钥和令牌不会离开您的设备。</p></details><details class="faq-item"><summary>JWT令牌应该设置多长的有效期？</summary><p>访问令牌建议15分钟至1小时，刷新令牌建议7-30天。有效期越短安全性越高，但可能影响用户体验，请根据业务需求调整。</p></details><details class="faq-item"><summary>将JWT存储在LocalStorage中安全吗？</summary><p>不建议。LocalStorage容易受到XSS攻击。将访问令牌存储在HttpOnly Cookie中更为安全。</p></details><details class="faq-item"><summary>如何在退出登录时使JWT失效？</summary><p>JWT是无状态的，服务器端直接撤销较困难。常用方案是令牌黑名单（存储在Redis中）或设置较短的有效期配合刷新令牌。</p></details>',footer:'JWT生成器 · RFC 7519 · 全本地处理',toastMsg:'已复制！'},
  ja:{sub:'JWTトークンの生成と署名 · HS256/HS384/HS512 · ブラウザ処理',langBtn:'🌐 한국어',backBtn:'← ホーム',headerTitle:'HEADER',secretTitle:'SECRET KEY',secretLabel:'署名用シークレットキー',payloadTitle:'PAYLOAD',genBtn:'▶ JWT生成',copyBtn:'トークンをコピー',copyRaw:'原文コピー',seoHtml:'<h2>JWT Generatorとは？</h2><p>JWT（JSON Web Token）はHeader.Payload.Signatureの3つをドット（.）で連結した<strong>自己完結型トークン</strong>で、各部分はBase64URLでエンコードされています。このツールはHS256・HS384・HS512アルゴリズムをブラウザ内蔵のWebCrypto APIで署名します。すべての処理はローカルで完結し、サーバーへの送信は一切ありません。</p><h2>よくある質問 (FAQ)</h2><details class="faq-item"><summary>JWTの3つの部分はそれぞれ何ですか？</summary><p>Header：アルゴリズムとトークン種別を指定（例：{"alg":"HS256","typ":"JWT"}）。Payload：sub・exp・iatなどのクレームデータ。Signature：Base64URL(header)+"."+Base64URL(payload)をシークレットキーでHMACした値。</p></details><details class="faq-item"><summary>JWTはどこで使いますか？</summary><p>API認証（Bearerトークン）・セッション管理・SSO（シングルサインオン）・マイクロサービス間の身元伝達に使われます。"Authorization: Bearer {token}" HTTPヘッダーで渡すのが一般的です。</p></details><details class="faq-item"><summary>HS256とRS256の違いは？</summary><p>HS256は対称鍵（同じシークレットで署名・検証）、RS256は非対称鍵（秘密鍵で署名、公開鍵で検証）です。このツールはHS256・HS384・HS512（HMAC系）をサポートしています。</p></details><details class="faq-item"><summary>JWTのPayloadは暗号化されますか？</summary><p>されません。HeaderとPayloadはBase64URLでエンコードされるだけで、暗号化されていません。Signatureは改ざん防止用であり、機密性はありません。パスワードや個人情報はPayloadに含めないでください。</p></details><details class="faq-item"><summary>シークレットキーやトークンはサーバーに送られますか？</summary><p>送られません。すべてブラウザのWebCrypto APIで処理されます。シークレットキーとトークンはデバイス外に出ません。</p></details><details class="faq-item"><summary>JWTトークンの有効期間はどれくらいに設定すべきですか？</summary><p>アクセストークンは15分〜1時間、リフレッシュトークンは7〜30日を推奨します。短いほどセキュリティが高まりますが、ユーザー体験とのバランスを考慮してください。</p></details><details class="faq-item"><summary>JWTをLocalStorageに保存しても安全ですか？</summary><p>推奨しません。LocalStorageはXSS攻撃に脆弱です。アクセストークンはHttpOnly Cookieに保存する方がはるかに安全です。</p></details><details class="faq-item"><summary>ログアウト時にJWTを無効化するにはどうすればいいですか？</summary><p>JWTはステートレスなためサーバー側での直接無効化が難しいです。トークンブラックリスト（Redisに保存）や短い有効期間とリフレッシュトークンの組み合わせが一般的です。</p></details>',footer:'JWT Generator · RFC 7519 · ブラウザ内のみで処理',toastMsg:'コピーしました！'},
};
let _lang='ko',_lastToken='';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function b64url(str){return btoa(str).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');}
function b64urlFromBuf(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');}
function genJti(){return crypto.randomUUID();}
function addClaim(k,v){try{const o=JSON.parse(document.getElementById('payload').value);o[k]=v;document.getElementById('payload').value=JSON.stringify(o,null,2);}catch(e){}generate();}
function addExp(secs){const exp=Math.floor(Date.now()/1000)+secs;addClaim('exp',exp);}
function addIat(){addClaim('iat',Math.floor(Date.now()/1000));}
async function generate(){
  const errBox=document.getElementById('errBox');
  errBox.style.display='none';
  try{
    const alg=document.getElementById('alg').value;
    const secret=document.getElementById('secret').value;
    const payloadStr=document.getElementById('payload').value.trim();
    const payload=JSON.parse(payloadStr);
    const header={alg,typ:'JWT'};
    const hEnc=b64url(JSON.stringify(header));
    const pEnc=b64url(JSON.stringify(payload));
    const msg=hEnc+'.'+pEnc;
    const hashMap={'HS256':'SHA-256','HS384':'SHA-384','HS512':'SHA-512'};
    const enc=new TextEncoder();
    const key=await crypto.subtle.importKey('raw',enc.encode(secret),{name:'HMAC',hash:hashMap[alg]},false,['sign']);
    const sig=await crypto.subtle.sign('HMAC',key,enc.encode(msg));
    const sEnc=b64urlFromBuf(sig);
    _lastToken=msg+'.'+sEnc;
    const out=document.getElementById('jwtOutput');
    out.innerHTML=`<span class="jwt-part-h">${hEnc}</span><span class="jwt-dot">.</span><span class="jwt-part-p">${pEnc}</span><span class="jwt-dot">.</span><span class="jwt-part-s">${sEnc}</span>`;
    document.getElementById('decodedHeader').textContent=JSON.stringify(header,null,2);
    document.getElementById('decodedPayload').textContent=JSON.stringify(payload,null,2);
    document.getElementById('resultArea').style.display='block';
  }catch(e){
    errBox.textContent='⚠ '+e.message;errBox.style.display='block';
    document.getElementById('resultArea').style.display='none';
  }
}
function copyJwt(){if(!_lastToken)return;navigator.clipboard?.writeText(_lastToken).then(showToast).catch(()=>{fallbackCopy(_lastToken);});}
function copyRaw(){const raw=document.getElementById('jwtOutput').textContent;navigator.clipboard?.writeText(raw).then(showToast).catch(()=>fallbackCopy(raw));}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();}
function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
_lang=detectLang();applyLang();generate();
</script>
