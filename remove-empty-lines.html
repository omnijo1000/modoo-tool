<header>
  <div class="dot"></div>

<main>
  <h1><span data-i18n="h1a">Remove</span> <span data-i18n="h1b">Empty Lines</span></h1>
  <p class="subtitle" data-i18n="sub">Paste your text below and click the button to remove all empty and blank lines.</p>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="sBefore">0</div><div class="stat-label" data-i18n="statBefore">Before</div></div>
    <div class="stat"><div class="stat-val" id="sAfter">0</div><div class="stat-label" data-i18n="statAfter">After</div></div>
    <div class="stat"><div class="stat-val" id="sRemoved">0</div><div class="stat-label" data-i18n="statRemoved">Removed</div></div>
  </div>

  <div class="options-row">
    <label class="opt-label"><input type="checkbox" id="optTrimWS" checked> <span data-i18n="optTrimWS">Trim whitespace-only lines</span></label>
  </div>

  <div class="col-wrap">
    <div>
      <div class="col-label" data-i18n="labelInput">INPUT</div>
      <textarea id="inputArea" placeholder="Paste your text here..." oninput="updateStats()"></textarea>
    </div>
    <div>
      <div class="col-label" data-i18n="labelOutput">OUTPUT</div>
      <textarea id="outputArea" placeholder="Result will appear here..." readonly></textarea>
    </div>
  </div>

  <div class="toolbar">
    <button class="tool-btn primary" onclick="processText()" data-i18n="btnProcess">Remove Empty Lines</button>
    <button class="tool-btn" onclick="copyOutput()" data-i18n="btnCopy">📋 Copy</button>
    <button class="tool-btn" onclick="clearAll()" data-i18n="btnClear">🗑 Clear</button>
    <button class="tool-btn" onclick="swapIO()" data-i18n="btnSwap">⇄ Swap</button>
  </div>

  <div class="seo">
    <h2 id="seoTitle1"></h2>
    <p id="seoBody1"></p>
    <p id="seoFaq1"></p>
    <p id="seoFaq2"></p>
  </div>
  <footer>© 2026 MODOO HUB · Free · <a href="privacy.html" style="color:var(--text-dim);text-decoration:none;">Privacy Policy</a></footer>
</main>
<script>
function processText(){
  const input=document.getElementById('inputArea').value;
  const trimWS=document.getElementById('optTrimWS').checked;
  const lines=input.split('\n');
  const filtered=lines.filter(l=>trimWS?l.trim()!=='':l!=='');
  document.getElementById('outputArea').value=filtered.join('\n');
  const removed=lines.length-filtered.length;
  document.getElementById('sBefore').textContent=lines.length.toLocaleString();
  document.getElementById('sAfter').textContent=filtered.length.toLocaleString();
  document.getElementById('sRemoved').textContent=removed.toLocaleString();
}
function updateStats(){
  const v=document.getElementById('inputArea').value;
  const lines=v?v.split('\n').length:0;
  document.getElementById('sBefore').textContent=lines.toLocaleString();
}
function copyOutput(){const v=document.getElementById('outputArea').value;if(v)navigator.clipboard.writeText(v);}
function clearAll(){document.getElementById('inputArea').value='';document.getElementById('outputArea').value='';document.getElementById('sBefore').textContent='0';document.getElementById('sAfter').textContent='0';document.getElementById('sRemoved').textContent='0';}
function swapIO(){const a=document.getElementById('inputArea'),b=document.getElementById('outputArea');const t=a.value;a.value=b.value;b.value=t;updateStats();}
</script>

function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;
  document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
  ['seoTitle1','seoBody1','seoFaq1','seoFaq2'].forEach(id=>{const el=document.getElementById(id);if(el&&t[id]!==undefined)el.innerHTML=t[id];});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
