const _i18n={
  ko:{sub:'HTML 엔티티 인코딩 · 디코딩 · &lt; &gt; &amp; &quot; 변환',langBtn:'🌐 EN',backBtn:'← 모두의 툴',modeEncode:'Encode →',modeDecode:'← Decode',sampleBtn:'예시',clearBtn:'초기화',swapBtn:'⇄ 뒤집기',copyBtn:'복사',previewLabel:'PREVIEW (렌더링 결과)',seoHtml:'<h2>HTML Encoder / Decoder란?</h2><p>HTML 특수문자를 <strong>엔티티(entity)</strong>로 변환하거나 엔티티를 원래 문자로 되돌립니다. <code>&lt;</code> → <code>&amp;lt;</code>, <code>&gt;</code> → <code>&amp;gt;</code>, <code>&amp;</code> → <code>&amp;amp;</code>, <code>"</code> → <code>&amp;quot;</code> 변환을 지원합니다. 코드 예제를 HTML에 안전하게 표시하거나, 사용자 입력을 XSS 없이 출력할 때 필수입니다.</p><h2>자주 묻는 질문 (FAQ)</h2><details class="faq-item"><summary>HTML 엔티티가 왜 필요한가요?</summary><p>HTML 문서에서 &lt;, &gt;, &amp; 같은 문자는 태그·속성으로 해석되므로 텍스트로 표시하려면 엔티티로 이스케이프해야 합니다. 사용자 입력을 그대로 HTML에 삽입하면 XSS(크로스 사이트 스크립팅) 취약점이 생깁니다.</p></details><details class="faq-item"><summary>주요 HTML 엔티티는 어떤 것들이 있나요?</summary><p>&amp;lt; (&lt;), &amp;gt; (&gt;), &amp;amp; (&amp;), &amp;quot; ("), &amp;apos; (\'), &amp;nbsp; (줄바꿈 없는 공백), &amp;copy; (©), &amp;trade; (™), &amp;mdash; (—) 등이 있습니다.</p></details><details class="faq-item"><summary>디코딩은 언제 사용하나요?</summary><p>HTML 소스에서 복사한 엔티티 문자열을 사람이 읽기 쉬운 원래 텍스트로 변환할 때 사용합니다. 또는 데이터베이스에 저장된 이스케이프 문자열을 확인할 때도 유용합니다.</p></details><details class="faq-item"><summary>숫자 코드(&amp;#60;)와 이름 코드(&amp;lt;)의 차이는?</summary><p>둘 다 동일하게 동작합니다. 이름 코드는 가독성이 높고, 숫자 코드는 모든 문자를 표현할 수 있어 유니코드 문자 이스케이프에 주로 씁니다.</p></details><details class="faq-item"><summary>이 도구는 서버로 데이터를 전송하나요?</summary><p>아니요. 모든 인코딩·디코딩은 브라우저 내에서만 처리됩니다. 민감한 코드도 안전하게 사용할 수 있습니다.</p></details><details class="faq-item"><summary>JavaScript에서 HTML 엔티티 변환을 자동으로 처리하는 방법은?</summary><p>DOM의 textContent 속성을 사용하면 자동으로 이스케이프됩니다. innerHTML에 직접 삽입하면 XSS 취약점이 생기므로 반드시 textContent나 DOMParser를 사용하세요.</p></details><details class="faq-item"><summary>모든 특수 문자를 HTML 엔티티로 바꿔야 하나요?</summary><p>반드시 변환해야 하는 문자는 &lt;, &gt;, &amp;, &quot; 4가지입니다. 한글·일반 기호는 UTF-8 환경에서는 엔티티 변환 없이도 안전하게 표시됩니다.</p></details><details class="faq-item"><summary>HTML 엔티티와 URL 인코딩의 차이는 무엇인가요?</summary><p>HTML 엔티티는 HTML 문서 내에서 특수 문자를 안전하게 표시하기 위한 것이고, URL 인코딩(%XX)은 URL 쿼리 파라미터에 특수 문자를 포함할 때 사용합니다. 용도가 다릅니다.</p></details>',toastMsg:'복사되었습니다!'},
  en:{sub:'HTML entity encoding & decoding · &lt; &gt; &amp; &quot; conversion',langBtn:'🌐 中文',backBtn:'← All Tools',modeEncode:'Encode →',modeDecode:'← Decode',sampleBtn:'Sample',clearBtn:'Clear',swapBtn:'⇄ Swap',copyBtn:'Copy',previewLabel:'PREVIEW (rendered)',seoHtml:'<h2>HTML Encoder / Decoder</h2><p>Convert special characters to <strong>HTML entities</strong> or decode them back to plain text. Supports <code>&lt;</code> → <code>&amp;lt;</code>, <code>&gt;</code> → <code>&amp;gt;</code>, <code>&amp;</code> → <code>&amp;amp;</code>, <code>"</code> → <code>&amp;quot;</code>, and all named HTML entities. Essential for safely displaying code examples in HTML and preventing XSS vulnerabilities.</p><h2>FAQ</h2><details class="faq-item"><summary>Why do I need HTML entities?</summary><p>Characters like &lt;, &gt;, and &amp; have special meaning in HTML. To display them as text, they must be escaped as entities. Inserting raw user input into HTML without escaping creates XSS (cross-site scripting) security vulnerabilities.</p></details><details class="faq-item"><summary>What are the most common HTML entities?</summary><p>&amp;lt; (&lt;), &amp;gt; (&gt;), &amp;amp; (&amp;), &amp;quot; ("), &amp;apos; (\'), &amp;nbsp; (non-breaking space), &amp;copy; (©), &amp;trade; (™), &amp;mdash; (—).</p></details><details class="faq-item"><summary>When should I use decode mode?</summary><p>Use decode when you have HTML entities in source code or a database and want to read the original text. Also useful for verifying that stored data was escaped correctly.</p></details><details class="faq-item"><summary>What is the difference between named (&amp;lt;) and numeric (&amp;#60;) entities?</summary><p>Both are functionally identical. Named entities are more readable; numeric entities can represent any Unicode character, so they are used for encoding exotic or non-ASCII characters.</p></details><details class="faq-item"><summary>Does this tool send data to a server?</summary><p>No. All encoding and decoding happens entirely in your browser. Safe to use with sensitive code or confidential content.</p></details><details class="faq-item"><summary>How can JavaScript handle HTML entity encoding automatically?</summary><p>Use the DOM textContent property to automatically escape content. Never insert user input via innerHTML as it creates XSS vulnerabilities — use textContent or DOMParser instead.</p></details><details class="faq-item"><summary>Do I need to encode all special characters as HTML entities?</summary><p>Only four characters are strictly required: &lt;, &gt;, &amp;, and &quot;. Korean and most non-ASCII characters are safe to display as-is in UTF-8 encoded HTML documents.</p></details><details class="faq-item"><summary>What is the difference between HTML entities and URL encoding?</summary><p>HTML entities are for safely displaying special characters inside HTML documents. URL encoding (%XX) is for including special characters in URL query parameters. They serve different purposes.</p></details>',toastMsg:'Copied!'},
  zh:{sub:'HTML实体编码与解码 · &lt; &gt; &amp; &quot; 转换',langBtn:'🌐 日本語',backBtn:'← 所有工具',modeEncode:'编码 →',modeDecode:'← 解码',sampleBtn:'示例',clearBtn:'清空',swapBtn:'⇄ 交换',copyBtn:'复制',previewLabel:'预览（渲染结果）',seoHtml:'<h2>HTML编码/解码工具</h2><p>将特殊字符转换为<strong>HTML实体</strong>或将实体解码为原始文本。支持<code>&lt;</code>→<code>&amp;lt;</code>、<code>&gt;</code>→<code>&amp;gt;</code>、<code>&amp;</code>→<code>&amp;amp;</code>、<code>"</code>→<code>&amp;quot;</code>及所有命名HTML实体。用于安全地在HTML中显示代码示例，防止XSS漏洞。</p><h2>常见问题 (FAQ)</h2><details class="faq-item"><summary>为什么需要HTML实体？</summary><p>&lt;、&gt;、&amp;等字符在HTML中有特殊含义。要将它们显示为文本，必须转义为实体。将用户输入直接插入HTML而不转义，会造成XSS（跨站脚本）安全漏洞。</p></details><details class="faq-item"><summary>最常用的HTML实体有哪些？</summary><p>&amp;lt;（&lt;）、&amp;gt;（&gt;）、&amp;amp;（&amp;）、&amp;quot;（"）、&amp;apos;（\'）、&amp;nbsp;（不换行空格）、&amp;copy;（©）、&amp;trade;（™）、&amp;mdash;（—）。</p></details><details class="faq-item"><summary>什么时候使用解码模式？</summary><p>当HTML源码或数据库中包含实体字符串，需要还原为可读原文时使用。也可用于验证存储的数据是否已正确转义。</p></details><details class="faq-item"><summary>命名实体（&amp;lt;）和数字实体（&amp;#60;）有什么区别？</summary><p>功能完全相同。命名实体可读性更强，数字实体可以表示任意Unicode字符，常用于编码非ASCII或特殊字符。</p></details><details class="faq-item"><summary>本工具会向服务器发送数据吗？</summary><p>不会。所有编码和解码均在浏览器本地完成，可放心使用敏感代码或机密内容。</p></details><details class="faq-item"><summary>JavaScript中如何自动处理HTML实体转换？</summary><p>使用DOM的textContent属性可自动转义内容。切勿通过innerHTML直接插入用户输入，这会导致XSS漏洞，请使用textContent或DOMParser。</p></details><details class="faq-item"><summary>所有特殊字符都需要转换为HTML实体吗？</summary><p>严格要求转换的只有4个字符：&lt;、&gt;、&amp;和&quot;。在UTF-8编码的HTML文档中，中文等非ASCII字符无需转换即可安全显示。</p></details><details class="faq-item"><summary>HTML实体和URL编码有什么区别？</summary><p>HTML实体用于在HTML文档中安全显示特殊字符；URL编码（%XX）用于在URL查询参数中包含特殊字符，两者用途不同。</p></details>',toastMsg:'已复制！'},
  ja:{sub:'HTML エンティティ エンコード・デコード · &lt; &gt; &amp; &quot; 変換',langBtn:'🌐 한국어',backBtn:'← ホーム',modeEncode:'エンコード →',modeDecode:'← デコード',sampleBtn:'サンプル',clearBtn:'クリア',swapBtn:'⇄ 入れ替え',copyBtn:'コピー',previewLabel:'プレビュー（レンダリング結果）',seoHtml:'<h2>HTML エンコーダー / デコーダーとは？</h2><p>特殊文字を<strong>HTMLエンティティ</strong>に変換したり、エンティティを元のテキストに戻したりします。<code>&lt;</code>→<code>&amp;lt;</code>、<code>&gt;</code>→<code>&amp;gt;</code>、<code>&amp;</code>→<code>&amp;amp;</code>、<code>"</code>→<code>&amp;quot;</code>などすべての名前付きエンティティに対応しています。コード例をHTMLに安全に表示したり、XSS脆弱性を防ぐために必要です。</p><h2>よくある質問 (FAQ)</h2><details class="faq-item"><summary>HTMLエンティティが必要な理由は？</summary><p>&lt;、&gt;、&amp;などの文字はHTMLで特別な意味を持ちます。テキストとして表示するにはエンティティにエスケープする必要があります。ユーザー入力をそのままHTMLに挿入するとXSS（クロスサイトスクリプティング）脆弱性が生じます。</p></details><details class="faq-item"><summary>主なHTMLエンティティにはどんなものがありますか？</summary><p>&amp;lt;（&lt;）、&amp;gt;（&gt;）、&amp;amp;（&amp;）、&amp;quot;（"）、&amp;apos;（\'）、&amp;nbsp;（改行なしスペース）、&amp;copy;（©）、&amp;trade;（™）、&amp;mdash;（—）などがあります。</p></details><details class="faq-item"><summary>デコードモードはどんな時に使いますか？</summary><p>HTMLソースコードやデータベースにあるエンティティ文字列を読みやすい元のテキストに変換したい場合に使います。保存データのエスケープが正しいか確認するときにも便利です。</p></details><details class="faq-item"><summary>名前付きエンティティ（&amp;lt;）と数値エンティティ（&amp;#60;）の違いは？</summary><p>機能は同じです。名前付きエンティティは可読性が高く、数値エンティティは任意のUnicode文字を表現できるため、非ASCII文字のエスケープに主に使われます。</p></details><details class="faq-item"><summary>このツールはサーバーにデータを送信しますか？</summary><p>いいえ。すべてのエンコード・デコード処理はブラウザ内のみで完結します。機密コードや重要なコンテンツも安全に使用できます。</p></details><details class="faq-item"><summary>JavaScriptでHTMLエンティティを自動処理するには？</summary><p>DOMのtextContentプロパティを使うと自動的にエスケープされます。innerHTMLへの直接挿入はXSS脆弱性を生むため、必ずtextContentかDOMParserを使用してください。</p></details><details class="faq-item"><summary>すべての特殊文字をHTMLエンティティに変換する必要がありますか？</summary><p>必須なのは&lt;、&gt;、&amp;、&quot;の4文字だけです。UTF-8エンコードのHTML文書では日本語などの非ASCII文字はそのまま安全に表示できます。</p></details><details class="faq-item"><summary>HTMLエンティティとURLエンコードの違いは何ですか？</summary><p>HTMLエンティティはHTMLドキュメント内で特殊文字を安全に表示するためのもので、URLエンコード（%XX）はURLクエリパラメータに特殊文字を含める際に使います。用途が異なります。</p></details>',toastMsg:'コピーしました！'},
};
let _lang='ko',_mode='encode';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

const REFS=[
  ['<','&lt;'],['>', '&gt;'],['&','&amp;'],['"','&quot;'],["'",'&#39;'],
  [' ','&nbsp;'],['©','&copy;'],['®','&reg;'],['™','&trade;'],
  ['€','&euro;'],['£','&pound;'],['¥','&yen;'],['°','&deg;'],
  ['±','&plusmn;'],['×','&times;'],['÷','&divide;'],['→','&rarr;'],
];

function buildRefGrid(){
  const g=document.getElementById('refGrid');
  g.innerHTML='';
  REFS.forEach(([ch,ent])=>{
    const d=document.createElement('div');d.className='ref-item';
    d.innerHTML=`<span>${ch==='<'?'&lt;':ch==='>'?'&gt;':ch==='&'?'&amp;':ch}</span><span>${ent}</span>`;
    g.appendChild(d);
  });
}

function setMode(m){
  _mode=m;
  document.getElementById('modeEncode').classList.toggle('on',m==='encode');
  document.getElementById('modeDecode').classList.toggle('on',m==='decode');
  document.getElementById('previewWrap').style.display=m==='encode'?'block':'none';
  convert();
}

function encodeHTML(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function decodeHTML(s){
  const ta=document.createElement('textarea');ta.innerHTML=s;return ta.value;
}

let _debounce;
function liveConvert(){clearTimeout(_debounce);_debounce=setTimeout(convert,100);}

function convert(){
  const input=document.getElementById('inputText').value;
  const out=_mode==='encode'?encodeHTML(input):decodeHTML(input);
  document.getElementById('outputBox').textContent=out;
  document.getElementById('outputBox')._text=out;
  if(_mode==='encode') document.getElementById('previewBox').innerHTML=input;
}

const SAMPLES={
  encode:'<h1>Hello & "World"</h1>\n<p>Price: <strong>$10 > $5</strong></p>\n<a href="page.html">Link</a>',
  decode:'&lt;h1&gt;Hello &amp; &quot;World&quot;&lt;/h1&gt;\n&lt;p&gt;Price: &lt;strong&gt;$10 &gt; $5&lt;/strong&gt;&lt;/p&gt;',
};

function loadSample(){document.getElementById('inputText').value=SAMPLES[_mode];convert();}
function clearAll(){document.getElementById('inputText').value='';document.getElementById('outputBox').textContent='';document.getElementById('outputBox')._text='';if(_mode==='encode')document.getElementById('previewBox').innerHTML='';}
function swapIO(){const out=document.getElementById('outputBox')._text||document.getElementById('outputBox').textContent;if(!out)return;document.getElementById('inputText').value=out;setMode(_mode==='encode'?'decode':'encode');convert();}
function copyOutput(){const text=document.getElementById('outputBox')._text||document.getElementById('outputBox').textContent;if(!text)return;navigator.clipboard?.writeText(text).then(showToast).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();});}
function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
_lang=detectLang();applyLang();buildRefGrid();setMode('encode');
</script>
