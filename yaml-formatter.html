:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#f472b6;--key:#60a5fa;--str:#4ade80;--num:#fb923c;--bool:#c084fc;--cmt:#555;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:960px;margin:0 auto;padding:32px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6;}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.tbtn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn.action{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.tbtn.action:hover{opacity:.85;}
.tbtn.on{border-color:var(--accent);color:var(--accent);background:rgba(244,114,182,.08);}
.sep{width:1px;height:20px;background:var(--border);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:650px){.two-col{grid-template-columns:1fr;}}
.col-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:6px;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;resize:none;line-height:1.7;min-height:400px;}
textarea:focus{border-color:var(--accent);}
.output-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.7;min-height:400px;overflow:auto;white-space:pre-wrap;word-break:break-word;cursor:pointer;}
.output-box:hover{border-color:var(--accent);}
.y-key{color:var(--key);}
.y-str{color:var(--str);}
.y-num{color:var(--num);}
.y-bool{color:var(--bool);}
.y-null{color:var(--text-dim);}
.y-cmt{color:var(--cmt);font-style:italic;}
.y-dash{color:var(--text-muted);}
.err-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#f87171;margin-top:8px;display:none;}
.copied-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 24px;border-radius:20px;font-family:'DM Mono',monospace;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;}
.copied-toast.show{opacity:1;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

const _i18n={
  ko:{sub:'YAML 유효성 검사 · 포맷 · JSON 변환 · 구문 강조',langBtn:'🌐 EN',backBtn:'← 모두의 툴',fmtBtn:'▶ 포맷',toJsonBtn:'→ JSON 변환',fromJsonBtn:'← JSON to YAML',sampleBtn:'예시',clearBtn:'초기화',copyBtn:'복사',outputLabel:'OUTPUT',seoHtml:'<h2>YAML Formatter 사용법</h2><p>YAML Formatter는 js-yaml 라이브러리를 사용해 YAML 문서의 유효성을 검사하고 들여쓰기를 정규화합니다. YAML → JSON, JSON → YAML 상호 변환도 지원하며 구문 강조로 가독성을 높입니다.</p><details class="faq-item"><summary>YAML과 JSON의 차이는 무엇인가요?</summary><p>YAML은 들여쓰기 기반의 사람이 읽기 쉬운 데이터 형식으로, 주석을 지원하고 중괄호·따옴표를 최소화합니다. JSON은 기계 처리에 최적화된 엄격한 형식입니다. 설정 파일(Docker, K8s, GitHub Actions 등)에는 YAML, API 응답에는 JSON이 많이 쓰입니다.</p></details><details class="faq-item"><summary>YAML에서 흔한 문법 오류는 무엇인가요?</summary><p>들여쓰기에 탭(Tab)을 사용하면 오류가 발생합니다(스페이스만 허용). 콜론(:) 뒤에 공백이 없거나, 따옴표가 필요한 특수문자 값(콜론 포함 문자열)을 따옴표 없이 쓴 경우도 자주 발생합니다.</p></details><details class="faq-item"><summary>YAML을 JSON으로 변환하면 주석이 사라지나요?</summary><p>네. JSON은 주석을 지원하지 않기 때문에 YAML → JSON 변환 시 주석(# 시작 줄)은 모두 제거됩니다. 주석이 중요한 경우 YAML 원본을 별도로 보관하세요.</p></details><details class="faq-item"><summary>YAML에서 문자열, 숫자, 불리언을 어떻게 구분하나요?</summary><p>YAML은 타입을 자동 추론합니다. true/false는 불리언, 숫자는 숫자로 파싱됩니다. 숫자처럼 생긴 문자열(예: 전화번호 "01012345678")은 따옴표로 감싸야 문자열로 처리됩니다.</p></details><details class="faq-item"><summary>포맷된 YAML이 서버에 저장되나요?</summary><p>아니요. 모든 처리는 브라우저 내 js-yaml 라이브러리로만 이루어지며 입력한 YAML은 서버로 전송되지 않습니다. API 키나 비밀번호가 포함된 설정 파일도 안심하고 사용할 수 있습니다.</p></details>',toastMsg:'복사되었습니다!'},
  en:{sub:'YAML validation · Format · JSON conversion · Syntax highlight',langBtn:'🌐 中文',backBtn:'← All Tools',fmtBtn:'▶ Format',toJsonBtn:'→ To JSON',fromJsonBtn:'← JSON to YAML',sampleBtn:'Sample',clearBtn:'Clear',copyBtn:'Copy',outputLabel:'OUTPUT',seoHtml:'<h2>How to Use the YAML Formatter</h2><p>YAML Formatter validates and formats YAML documents using the js-yaml library, normalizing indentation and structure. It also supports YAML → JSON and JSON → YAML conversion with syntax highlighting for easy reading.</p><details class="faq-item"><summary>What is the difference between YAML and JSON?</summary><p>YAML is an indentation-based, human-readable format that supports comments and minimizes brackets and quotes. JSON is a strict, machine-optimized format. YAML is widely used in config files (Docker, Kubernetes, GitHub Actions); JSON is the standard for API responses.</p></details><details class="faq-item"><summary>What are common YAML syntax errors to avoid?</summary><p>Using tabs for indentation causes errors — YAML requires spaces only. Other frequent issues: missing space after a colon (key: value vs. key:value), and not quoting strings that contain special characters like colons or curly braces.</p></details><details class="faq-item"><summary>Are comments preserved when converting YAML to JSON?</summary><p>No — JSON does not support comments, so all YAML comments (lines starting with #) are stripped during YAML → JSON conversion. Keep a copy of the original YAML if comments are important.</p></details><details class="faq-item"><summary>How does YAML distinguish strings, numbers, and booleans?</summary><p>YAML auto-infers types: true/false become booleans, bare numbers become integers or floats. If you need a number-like value to remain a string (e.g., a phone number), wrap it in quotes: "01012345678".</p></details><details class="faq-item"><summary>Is my YAML sent to any server?</summary><p>No — all processing runs entirely in your browser using the js-yaml library. Your YAML is never uploaded or stored. It is safe to paste configuration files containing API keys or passwords.</p></details>',toastMsg:'Copied!'},
  zh:{sub:'YAML验证 · 格式化 · JSON转换 · 语法高亮',langBtn:'🌐 日本語',backBtn:'← 所有工具',fmtBtn:'▶ 格式化',toJsonBtn:'→ 转为JSON',fromJsonBtn:'← JSON转YAML',sampleBtn:'示例',clearBtn:'清空',copyBtn:'复制',outputLabel:'输出',seoHtml:'<h2>YAML格式化工具使用指南</h2><p>YAML格式化工具使用js-yaml库对YAML文档进行验证和格式化，规范化缩进和结构。同时支持YAML→JSON和JSON→YAML互转，并提供语法高亮以提高可读性。</p><details class="faq-item"><summary>YAML和JSON有什么区别？</summary><p>YAML是基于缩进的人类可读格式，支持注释，括号和引号用量最少。JSON是严格的机器优化格式。YAML广泛用于配置文件（Docker、Kubernetes、GitHub Actions等），JSON是API响应的标准格式。</p></details><details class="faq-item"><summary>YAML常见的语法错误有哪些？</summary><p>使用Tab缩进会导致错误——YAML只允许空格缩进。其他常见问题：冒号后缺少空格（应为key: value而非key:value），以及包含特殊字符（如冒号、花括号）的字符串未加引号。</p></details><details class="faq-item"><summary>YAML转JSON时注释会被保留吗？</summary><p>不会。由于JSON不支持注释，YAML→JSON转换时所有YAML注释（以#开头的行）都会被删除。如果注释很重要，请保留YAML原文件的副本。</p></details><details class="faq-item"><summary>YAML如何区分字符串、数字和布尔值？</summary><p>YAML自动推断类型：true/false被解析为布尔值，裸数字被解析为整数或浮点数。如果需要类似数字的值保持为字符串（如电话号码），请用引号包裹："01012345678"。</p></details><details class="faq-item"><summary>我的YAML会被上传到服务器吗？</summary><p>不会，所有处理完全在浏览器中通过js-yaml库完成。您的YAML不会被上传或存储，可以放心粘贴包含API密钥或密码的配置文件。</p></details>',toastMsg:'已复制！'},
  ja:{sub:'YAML検証 · フォーマット · JSON変換 · 構文ハイライト',langBtn:'🌐 한국어',backBtn:'← ホーム',fmtBtn:'▶ フォーマット',toJsonBtn:'→ JSONに変換',fromJsonBtn:'← JSONをYAMLに変換',sampleBtn:'サンプル',clearBtn:'クリア',copyBtn:'コピー',outputLabel:'出力',seoHtml:'<h2>YAMLフォーマッターの使い方</h2><p>YAMLフォーマッターはjs-yamlライブラリを使ってYAMLドキュメントを検証・整形し、インデントと構造を正規化します。YAML→JSONおよびJSON→YAMLの変換と構文ハイライトにも対応しています。</p><details class="faq-item"><summary>YAMLとJSONの違いは何ですか？</summary><p>YAMLはインデントベースで人間が読みやすいフォーマットでコメントをサポートし、括弧や引用符の使用を最小化します。JSONは厳格な機械向けフォーマットです。YAMLは設定ファイル（Docker・Kubernetes・GitHub Actionsなど）に、JSONはAPIレスポンスに広く使われます。</p></details><details class="faq-item"><summary>YAMLのよくある文法エラーは何ですか？</summary><p>インデントにタブを使うとエラーになります——YAMLはスペースのみ対応しています。その他の頻出エラー：コロン後のスペースがない（key: valueではなくkey:value）、コロンや波括弧を含む文字列を引用符なしで書いている。</p></details><details class="faq-item"><summary>YAMLをJSONに変換するとコメントは保持されますか？</summary><p>保持されません。JSONはコメントをサポートしないため、YAML→JSON変換時にすべてのコメント（#で始まる行）が削除されます。コメントが重要な場合はYAMLの元ファイルを別途保管してください。</p></details><details class="faq-item"><summary>YAMLは文字列・数値・真偽値をどう区別しますか？</summary><p>YAMLは型を自動推論します：true/falseはブール値、裸の数字は整数または浮点数として解析されます。数字のような文字列（電話番号など）を文字列として扱うには引用符で囲んでください："01012345678"。</p></details><details class="faq-item"><summary>入力したYAMLはサーバーに送信されますか？</summary><p>送信されません。すべての処理はブラウザ内のjs-yamlライブラリで完結します。YAMLがアップロードまたは保存されることはないため、APIキーやパスワードを含む設定ファイルでも安心してご利用いただけます。</p></details>',toastMsg:'コピーしました！'},
};
let _lang='ko',_mode='yaml';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

function setMode(m){_mode=m;}

function highlightYAML(yaml){
  return yaml.split('\n').map(line=>{
    const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if(/^\s*#/.test(line)) return `<span class="y-cmt">${esc(line)}</span>`;
    const m=line.match(/^(\s*)(- )?([^:]+)(:)(\s*)(.*)$/);
    if(m){
      const [,ind,dash,key,colon,sp,val]=m;
      let vHtml='';
      if(/^".*"$|^'.*'$/.test(val.trim())) vHtml=`<span class="y-str">${esc(val)}</span>`;
      else if(/^-?\d+(\.\d+)?$/.test(val.trim())) vHtml=`<span class="y-num">${esc(val)}</span>`;
      else if(/^(true|false|yes|no|on|off)$/i.test(val.trim())) vHtml=`<span class="y-bool">${esc(val)}</span>`;
      else if(/^(null|~)$/.test(val.trim())) vHtml=`<span class="y-null">${esc(val)}</span>`;
      else vHtml=esc(val);
      return esc(ind)+(dash?`<span class="y-dash">${esc(dash)}</span>`:'')+(key?`<span class="y-key">${esc(key)}</span>`:'')+(colon?esc(colon)+esc(sp):'')+vHtml;
    }
    const listM=line.match(/^(\s*)(- )(.*)$/);
    if(listM){
      const [,ind,dash,val]=listM;
      let vHtml='';
      if(/^".*"$|^'.*'$/.test(val.trim())) vHtml=`<span class="y-str">${esc(val)}</span>`;
      else if(/^-?\d+(\.\d+)?$/.test(val.trim())) vHtml=`<span class="y-num">${esc(val)}</span>`;
      else if(/^(true|false)$/i.test(val.trim())) vHtml=`<span class="y-bool">${esc(val)}</span>`;
      else vHtml=esc(val);
      return esc(ind)+`<span class="y-dash">${esc(dash)}</span>`+vHtml;
    }
    return esc(line);
  }).join('\n');
}

let _debounce;
function liveFormat(){clearTimeout(_debounce);_debounce=setTimeout(format,300);}

function format(){
  const input=document.getElementById('yamlInput').value.trim();
  const errBox=document.getElementById('errBox');
  errBox.style.display='none';
  if(!input){document.getElementById('yamlOutput').innerHTML='';return;}
  try{
    if(_mode==='yaml'){
      const parsed=jsyaml.load(input);
      const formatted=jsyaml.dump(parsed,{indent:2,lineWidth:-1});
      document.getElementById('yamlOutput').innerHTML=highlightYAML(formatted);
      document.getElementById('yamlOutput')._plain=formatted;
    } else if(_mode==='json'){
      const parsed=jsyaml.load(input);
      const json=JSON.stringify(parsed,null,2);
      document.getElementById('yamlOutput').textContent=json;
      document.getElementById('yamlOutput')._plain=json;
    } else {
      const parsed=JSON.parse(input);
      const yaml=jsyaml.dump(parsed,{indent:2,lineWidth:-1});
      document.getElementById('yamlOutput').innerHTML=highlightYAML(yaml);
      document.getElementById('yamlOutput')._plain=yaml;
    }
  }catch(e){
    errBox.textContent='⚠ '+e.message;errBox.style.display='block';
  }
}

function loadSample(){
  document.getElementById('yamlInput').value=`# Server configuration
server:
  host: localhost
  port: 8080
  debug: true

database:
  url: postgresql://db:5432/mydb
  pool_size: 10
  timeout: 30

features:
  - authentication
  - logging
  - caching

metadata:
  version: 1.2.3
  author: Modoo Hub`;
  format();
}
function clearAll(){document.getElementById('yamlInput').value='';document.getElementById('yamlOutput').innerHTML='';document.getElementById('errBox').style.display='none';}
function copyOutput(){const text=document.getElementById('yamlOutput')._plain||document.getElementById('yamlOutput').textContent;if(!text)return;navigator.clipboard?.writeText(text).then(showToast).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();});}
function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
_lang=detectLang();applyLang();
</script>
