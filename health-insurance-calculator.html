    seoHtml:`<h2>2024년 건강보험료 계산 방법</h2><p>2024년 <strong>직장가입자 건강보험료율</strong>은 보수월액의 <strong>7.09%</strong>입니다. 근로자와 사업주가 각각 <strong>3.545%</strong>씩 부담합니다. 여기에 건강보험료의 <strong>12.95%</strong>에 해당하는 장기요양보험료가 추가됩니다. 지역가입자는 소득·재산·자동차를 점수화해 계산하며, 이 계산기는 소득·재산 기준 간편 추산을 제공합니다.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. 2024년 건강보험료율은?</summary><p>A. 직장가입자 7.09% (근로자 3.545% + 사업주 3.545%). 장기요양보험료는 건강보험료의 12.95%를 추가 부담합니다.</p></details><details class="faq-item"><summary>Q. 장기요양보험료란?</summary><p>A. 노인·장애인 돌봄 서비스 재원 마련을 위한 보험료입니다. 건강보험료 × 12.95%로 계산하며 근로자와 사업주가 절반씩 부담합니다.</p></details><details class="faq-item"><summary>Q. 보수월액이란 무엇인가요?</summary><p>A. 급여에서 비과세 소득을 제외한 금액입니다. 일반적으로 기본급 + 상여금 + 각종 수당의 합계에서 식대 비과세분 등을 뺀 금액입니다.</p></details><details class="faq-item"><summary>Q. 지역가입자 보험료는 어떻게 결정되나요?</summary><p>A. 소득·재산·자동차를 점수화한 뒤 점수당 금액을 곱해 산정합니다. 이 계산기는 소득·재산만 반영한 간편 추산을 제공합니다.</p></details><details class="faq-item"><summary>Q. 피부양자 등록 요건은?</summary><p>A. 연 소득 2,000만원 이하이고 재산 과표 5억4,000만원 이하인 배우자·직계존비속 등이 피부양자로 등록될 수 있습니다.</p></details><details class="faq-item"><summary>Q. 건강보험료 상·하한은?</summary><p>A. 2024년 직장가입자 건강보험료 월 상한은 약 390만원, 하한은 최저임금 기준으로 약 2만원대입니다.</p></details><details class="faq-item"><summary>Q. 사업주 부담분은 어떻게 되나요?</summary><p>A. 사업주는 근로자와 동일한 3.545%를 부담합니다. 즉, 총 건강보험료는 보수월액의 7.09%이며 절반씩 나눕니다.</p></details><details class="faq-item"><summary>Q. 건강보험료가 급여에서 자동 공제되나요?</summary><p>A. 네, 직장가입자는 매월 급여 지급 시 건강보험료가 자동으로 공제됩니다.</p></details>`},
  en:{pageTitle:'Korean Health Insurance Calculator - 2024 Premium | MODOO HUB',h1:'Health Insurance Calculator',sub:'Calculate 2024 Korean health insurance and long-term care premiums',backLink:'← All Tools',langBtn:'🌐 中文',tabEmployee:'Employee',tabLocal:'Self-employed',lblMonthly:'Monthly salary (10,000 KRW)',lblIncome:'Annual income (10,000 KRW)',lblProperty:'Property value (10,000 KRW, 0 if none)',lblMyTotal:'Your monthly total',empRateNote:'2024 rates: Health insurance 7.09% (employee 3.545%), Long-term care 12.95% of health premium',locRateNote:'Self-employed premiums are based on income, property and vehicle scores. This is a simplified estimate.',

    seoHtml:`<h2>Korean Health Insurance Premium Calculator</h2><p>In 2024, Korean employee health insurance premiums are set at <strong>7.09% of monthly salary</strong>, split equally between employee (3.545%) and employer (3.545%). An additional <strong>long-term care premium of 12.95%</strong> of the health premium is also levied. Self-employed individuals pay based on income, property and vehicle scores combined.</p><h2 class="seo-sub">FAQ</h2><details class="faq-item"><summary>Q. What is the 2024 health insurance rate?</summary><p>A. 7.09% of monthly salary for employees (3.545% employee + 3.545% employer). Long-term care adds 12.95% on top of the health premium.</p></details><details class="faq-item"><summary>Q. What is long-term care insurance?</summary><p>A. It funds elderly and disabled care services. Calculated as health premium × 12.95%, split equally between employee and employer.</p></details><details class="faq-item"><summary>Q. How are self-employed premiums calculated?</summary><p>A. Based on income, property, and vehicle scores. This calculator provides a simplified income+property estimate.</p></details><details class="faq-item"><summary>Q. Who can be a dependent (피부양자)?</summary><p>A. Spouses, direct relatives with annual income under 20 million KRW and property tax base under 540 million KRW.</p></details><details class="faq-item"><summary>Q. Is there a premium ceiling?</summary><p>A. Yes. The monthly health insurance cap for employees in 2024 is approximately 3.9 million KRW.</p></details><details class="faq-item"><summary>Q. Does this apply to foreign workers in Korea?</summary><p>A. Yes, foreign workers in Korea are subject to the same health insurance obligations under Korean law.</p></details><details class="faq-item"><summary>Q. Are premiums auto-deducted from salary?</summary><p>A. Yes, employee premiums are automatically deducted from monthly payroll.</p></details><details class="faq-item"><summary>Q. How accurate is this calculator?</summary><p>A. It uses official 2024 rates and is accurate for standard cases. Actual premiums may differ due to annual adjustments, bonuses included in salary base, etc.</p></details>`},

let currentLang=detectLang(),currentTab='employee';
function detectLang(){const p=new URLSearchParams(location.search).get('lang');if(p&&_i18n[p])return p;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
function applyLang(l){const t=_i18n[l]||_i18n.ko;document.title=t.pageTitle;document.documentElement.lang=l;document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});document.getElementById('seoSection').innerHTML=t.seoHtml;if(currentTab==='employee')calcEmployee();else calcLocal();}
function toggleLang(){const order=['ko','en','zh','ja'];const next=order[(order.indexOf(currentLang)+1)%order.length];currentLang=next;localStorage.setItem('modoo_lang',next);const url=new URL(location.href);url.searchParams.set('lang',next);history.replaceState(null,'',url);applyLang(next);}
function setTab(t){currentTab=t;document.getElementById('panelEmployee').classList.toggle('hidden',t!=='employee');document.getElementById('panelLocal').classList.toggle('hidden',t==='employee');document.getElementById('tabEmp').classList.toggle('active',t==='employee');document.getElementById('tabLoc').classList.toggle('active',t!=='employee');}
function fmt(n){return Math.round(n).toLocaleString()+'원';}

function calcEmployee(){
  const t=_i18n[currentLang]||_i18n.ko;
  const salary=(parseFloat(document.getElementById('empSalary').value)||0)*10000;
  if(!salary){document.getElementById('empResult').classList.add('hidden');return;}
  const healthTotal=Math.round(salary*0.0709);
  const healthEmployee=Math.round(salary*0.03545);
  const healthEmployer=healthTotal-healthEmployee;
  const careTotal=Math.round(healthTotal*0.1295);
  const careEmployee=Math.round(healthEmployee*0.1295);
  const careEmployer=careTotal-careEmployee;
  const myTotal=healthEmployee+careEmployee;
  const employerTotal=healthEmployer+careEmployer;
  document.getElementById('empMyTotal').textContent=fmt(myTotal);
  document.getElementById('empGrid').innerHTML=`
    <div class="res-card"><span class="res-label">${t.bkHealth}</span><span class="res-val accent">${fmt(healthEmployee)}</span></div>
    <div class="res-card"><span class="res-label">${t.bkCare}</span><span class="res-val accent">${fmt(careEmployee)}</span></div>
    <div class="res-card"><span class="res-label">${t.bkHealthTotal}</span><span class="res-val">${fmt(healthTotal)}</span></div>
    <div class="res-card"><span class="res-label">${t.bkCareTotal}</span><span class="res-val">${fmt(careTotal)}</span></div>
    <div class="res-card"><span class="res-label">${t.bkEmployer}</span><span class="res-val">${fmt(employerTotal)}</span></div>
  `;
  document.getElementById('empResult').classList.remove('hidden');
}

function calcLocal(){
  const t=_i18n[currentLang]||_i18n.ko;
  const income=(parseFloat(document.getElementById('locIncome').value)||0)*10000;
  const property=(parseFloat(document.getElementById('locProperty').value)||0)*10000;
  if(!income&&!property){document.getElementById('locResult').classList.add('hidden');return;}
  // 간편 추산: 소득분 보험료 + 재산분 보험료
  // 소득 점수: 연소득/12 × 0.0709 (월액 기준 적용)
  const incomeMonthly=income/12;
  const healthFromIncome=Math.round(incomeMonthly*0.0709);
  // 재산 점수: 재산 × 0.0022 / 12 (간략 추산)
  const healthFromProperty=Math.round(property*0.0022/12);
  const healthTotal=Math.max(healthFromIncome+healthFromProperty,19780); // 최저보험료
  const careTotal=Math.round(healthTotal*0.1295);
  const myTotal=healthTotal+careTotal;
  document.getElementById('locMyTotal').textContent=fmt(myTotal);
  document.getElementById('locGrid').innerHTML=`
    <div class="res-card"><span class="res-label">${t.bkHealth}</span><span class="res-val accent">${fmt(healthTotal)}</span></div>
    <div class="res-card"><span class="res-label">${t.bkCare}</span><span class="res-val accent">${fmt(careTotal)}</span></div>
  `;
  document.getElementById('locResult').classList.remove('hidden');
}

document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));
