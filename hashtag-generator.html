*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif;min-height:100vh;}
header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}

h1 span{color:var(--accent);}
.subtitle{font-size:13px;color:var(--text-muted);margin-bottom:28px;line-height:1.6;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;color:var(--text);font-size:14px;font-family:'Noto Sans',sans-serif;line-height:1.8;outline:none;resize:vertical;min-height:140px;transition:border-color 0.2s;margin-bottom:16px;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--text-dim);}
.opt-row{display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}

.opt-item input[type=number]{width:72px;background:#111;border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;outline:none;}
.opt-item input[type=checkbox]{accent-color:var(--accent);}
.col-label{font-size:11px;color:var(--text-dim);margin-bottom:8px;font-family:'DM Mono',monospace;letter-spacing:0.08em;}
.hashtag-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;min-height:80px;margin-bottom:16px;line-height:1.8;font-size:14px;word-break:break-all;color:var(--accent);font-family:'DM Mono',monospace;}

details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}

<main>
  <h1>Hashtag <span>Generator</span></h1>
  <p class="subtitle" data-i18n="sub">Generate hashtags from your text for social media posts.</p>

  <div class="col-label" data-i18n="labelInput">INPUT TEXT</div>
  <textarea id="inputArea" placeholder="Paste your caption or blog post here..."></textarea>

  <div class="opt-row">
    <div class="opt-item"><span data-i18n="optMax">Max hashtags:</span><input type="number" id="optMaxN" value="20" min="1" max="100"></div>
    <div class="opt-item"><span data-i18n="optMinLen">Min word length:</span><input type="number" id="optMinLen" value="3" min="1" max="20"></div>
    <div class="opt-item"><label style="display:flex;gap:6px;align-items:center;cursor:pointer"><input type="checkbox" id="optPrefix" checked><span data-i18n="optHash">Add # prefix</span></label></div>
  </div>

  <div class="toolbar">
    <button class="tool-btn primary" onclick="generate()" data-i18n="btnGenerate">Generate Hashtags</button>
    <button class="tool-btn" onclick="copyOutput()" data-i18n="btnCopy">📋 Copy</button>
    <button class="tool-btn" onclick="clearAll()" data-i18n="btnClear">🗑 Clear</button>
  </div>

  <div class="col-label" data-i18n="labelOutput">HASHTAGS</div>
  <div class="hashtag-box" id="hashOutput">—</div>

  <div class="seo" data-i18n="seoHtml"></div>
  <footer>© 2026 MODOO HUB · Free · <a href="privacy.html" style="color:var(--text-dim);text-decoration:none;">Privacy Policy</a></footer>
</main>
<script>
const STOPWORDS=new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with','is','are','was','were','it','this','that','i','you','he','she','we','they','be','have','has','had','do','does','did','not','by','from','as','if','my','your','his','her','our','its','will','can','would']);
function generate(){
  const v=document.getElementById('inputArea').value;
  const maxN=parseInt(document.getElementById('optMaxN').value)||20;
  const minLen=parseInt(document.getElementById('optMinLen').value)||3;
  const prefix=document.getElementById('optPrefix').checked;
  const words=v.toLowerCase().match(/[a-z가-힣]+/g)||[];
  const seen=new Set();
  const tags=[];
  for(const w of words){
    if(w.length>=minLen&&!STOPWORDS.has(w)&&!seen.has(w)){seen.add(w);tags.push(prefix?'#'+w:w);if(tags.length>=maxN)break;}
  }
  document.getElementById('hashOutput').textContent=tags.length?tags.join(' '):'—';
}
function copyOutput(){const v=document.getElementById('hashOutput').textContent;if(v&&v!=='—')navigator.clipboard.writeText(v);}
function clearAll(){document.getElementById('inputArea').value='';document.getElementById('hashOutput').textContent='—';}
</script>
<script>
const _i18n={
  ko:{lang:'ko',title:'해시태그 생성기 - 텍스트에서 해시태그 자동 생성 | 무료',btn:'🌐 EN',
    sub:'텍스트에서 소셜 미디어용 해시태그를 자동으로 생성합니다.',
    labelInput:'입력 텍스트',optMax:'최대 해시태그 수:',optMinLen:'최소 단어 길이:',optHash:'# 접두사 추가',
    btnGenerate:'해시태그 생성',btnCopy:'📋 복사',btnClear:'🗑 지우기',labelOutput:'해시태그',
    seoHtml:'<h2>해시태그 생성기 사용법</h2><p>텍스트에서 주요 단어를 추출하여 인스타그램, 트위터, 틱톡 등 소셜 미디어에 사용할 해시태그를 자동으로 생성합니다. 최대 개수와 최소 단어 길이를 조정해 원하는 결과를 얻을 수 있습니다.</p><details class="faq-item"><summary>불용어(stopwords)란 무엇인가요?</summary><p>the, a, an, and 등 의미 없는 일반 단어들입니다. 이들은 해시태그 생성 시 자동으로 제외되어, 실제 의미 있는 키워드만 해시태그로 생성됩니다.</p></details><details class="faq-item"><summary>인스타그램 해시태그 최대 개수는?</summary><p>인스타그램은 게시물당 최대 30개의 해시태그를 허용합니다. 다만 최적의 도달률을 위해서는 관련성 높은 5~15개 정도를 사용하는 것이 권장됩니다.</p></details><details class="faq-item"><summary>키워드는 어떤 기준으로 추출되나요?</summary><p>불용어를 제거한 후 최소 단어 길이 이상인 단어들을 추출합니다. 텍스트에서 자주 등장하는 단어일수록 우선순위가 높아집니다. 최소 단어 길이 설정으로 짧은 단어를 걸러낼 수 있습니다.</p></details><details class="faq-item"><summary>트위터/X에서도 사용할 수 있나요?</summary><p>트위터/X는 280자 제한이 있으므로 해시태그를 2~3개로 제한하는 것이 좋습니다. 도달률보다는 관련성이 높은 해시태그를 선택하세요.</p></details><details class="faq-item"><summary>해시태그 순서가 중요한가요?</summary><p>대부분의 소셜 미디어에서 해시태그 순서는 도달률에 큰 영향을 주지 않습니다. 중요한 태그를 앞에 배치하거나 본문 끝에 모아 배치하는 것이 일반적입니다.</p></details>'},
  en:{lang:'en',title:'Hashtag Generator - Generate Hashtags from Text | Free',btn:'🌐 中文',
    sub:'Generate hashtags from your text for social media posts.',
    labelInput:'INPUT TEXT',optMax:'Max hashtags:',optMinLen:'Min word length:',optHash:'Add # prefix',
    btnGenerate:'Generate Hashtags',btnCopy:'📋 Copy',btnClear:'🗑 Clear',labelOutput:'HASHTAGS',
    seoHtml:'<h2>How to Use the Hashtag Generator</h2><p>Extract key words from your text and turn them into hashtags for Instagram, Twitter, TikTok, and other social media. Adjust the max count and minimum word length to control the output.</p><details class="faq-item"><summary>What are stopwords?</summary><p>Stopwords are common words like "the", "a", "an", and "and" that carry no meaningful content. They are automatically excluded from hashtag generation so only relevant keywords become hashtags.</p></details><details class="faq-item"><summary>How many hashtags does Instagram allow?</summary><p>Instagram allows up to 30 hashtags per post. For best reach, most creators recommend using 5–15 relevant hashtags rather than the maximum — too many can look spammy.</p></details><details class="faq-item"><summary>How does keyword extraction work?</summary><p>The tool removes stopwords and filters by minimum word length, then extracts the remaining words as hashtag candidates. Words that appear more frequently in the text are prioritized. Adjust the minimum word length to filter out short filler words.</p></details><details class="faq-item"><summary>Can I use this for Twitter/X?</summary><p>Yes. Twitter/X has a 280-character limit, so it is best to limit hashtags to 2–3 per post. Choose the most relevant ones — fewer targeted hashtags tend to perform better on Twitter.</p></details><details class="faq-item"><summary>Does the order of hashtags matter?</summary><p>On most platforms, hashtag order does not significantly affect reach. Common practice is to place hashtags at the end of the caption or group them separately. Focus on relevance rather than order.</p></details>'},
  zh:{lang:'zh',title:'话题标签生成器 - 从文本生成Hashtag | 免费',btn:'🌐 日本語',
    sub:'从文本中提取关键词，生成社交媒体话题标签。',
    labelInput:'输入文本',optMax:'最多标签数:',optMinLen:'最小词长:',optHash:'添加#前缀',
    btnGenerate:'生成话题标签',btnCopy:'📋 复制',btnClear:'🗑 清空',labelOutput:'话题标签',
    seoHtml:'<h2>话题标签生成器使用指南</h2><p>从文本中提取关键词，自动生成适用于 Instagram、Twitter、TikTok 等社交媒体的话题标签。可设置最大数量和最小词长来控制输出结果。</p><details class="faq-item"><summary>什么是停用词？</summary><p>停用词是 the、a、an、and 等常见无实意词，生成话题标签时会自动排除，只保留有意义的关键词作为标签。</p></details><details class="faq-item"><summary>Instagram 最多允许几个标签？</summary><p>Instagram 每篇帖子最多允许 30 个话题标签。建议使用 5–15 个与内容高度相关的标签，过多标签可能显得刷屏，影响效果。</p></details><details class="faq-item"><summary>关键词是如何提取的？</summary><p>工具去除停用词并筛选最小词长后，提取剩余单词作为标签候选。在文本中出现频率越高的词优先级越高。调整最小词长可过滤掉较短的无意义词汇。</p></details><details class="faq-item"><summary>可以用于 Twitter/X 吗？</summary><p>可以。Twitter/X 有 280 字符限制，建议每条推文使用 2–3 个标签。选择最相关的标签，精准少量比大量堆砌效果更好。</p></details><details class="faq-item"><summary>话题标签的顺序重要吗？</summary><p>在大多数平台上，标签顺序对触达率影响不大。通常将标签放在帖子末尾或单独分行排列，重点在于选用与内容相关的标签而非顺序。</p></details>'},
  ja:{lang:'ja',title:'ハッシュタグ生成器 - テキストからハッシュタグを生成 | 無料',btn:'🌐 한국어',
    sub:'テキストからソーシャルメディア用のハッシュタグを自動生成します。',
    labelInput:'入力テキスト',optMax:'最大タグ数:',optMinLen:'最小単語長:',optHash:'# プレフィックスを追加',
    btnGenerate:'ハッシュタグを生成',btnCopy:'📋 コピー',btnClear:'🗑 クリア',labelOutput:'ハッシュタグ',
    seoHtml:'<h2>ハッシュタグ生成器の使い方</h2><p>テキストからキーワードを抽出し、Instagram・Twitter・TikTok などのソーシャルメディアで使えるハッシュタグを自動生成します。最大数と最小単語長を調整して出力を制御できます。</p><details class="faq-item"><summary>ストップワードとは何ですか？</summary><p>the、a、an、and などの一般的な無意味語です。ハッシュタグ生成時に自動的に除外され、意味のあるキーワードのみがタグとして生成されます。</p></details><details class="faq-item"><summary>Instagram のハッシュタグの最大数は？</summary><p>Instagram は投稿ごとに最大 30 個のハッシュタグを許可しています。ただし効果的なリーチのためには、関連性の高い 5〜15 個程度の使用が推奨されます。</p></details><details class="faq-item"><summary>キーワードはどのように抽出されますか？</summary><p>ストップワードを除去し、最小単語長以上の単語を抽出します。テキスト内で頻出する単語ほど優先度が高くなります。最小単語長の設定で短い単語を除外できます。</p></details><details class="faq-item"><summary>Twitter/X でも使えますか？</summary><p>使えます。Twitter/X は 280 文字制限があるため、1 ツイートあたり 2〜3 個に絞ることを推奨します。多数より関連性の高いタグを厳選する方が効果的です。</p></details><details class="faq-item"><summary>ハッシュタグの順序は重要ですか？</summary><p>ほとんどのプラットフォームでは順序がリーチに大きく影響しません。一般的にはキャプションの末尾にまとめるか、改行して別に配置します。順序より関連性を重視してください。</p></details>'}
};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
