<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>Q. 리다이렉트란 무엇인가요?</summary><p>A. 리다이렉트는 서버가 특정 URL로 접근한 클라이언트(브라우저, 검색봇)를 다른 URL로 자동 안내하는 HTTP 응답입니다. 3xx 상태 코드 중 어느 것을 사용하느냐에 따라 영구/임시 여부, HTTP 메서드 유지 여부가 결정됩니다. 올바른 리다이렉트 설정은 SEO와 사용자 경험 모두에 직결됩니다.</p></details>
<details class="faq-item"><summary>Q. 301과 302 리다이렉트의 차이는?</summary><p>A. 301은 "영구 이동"으로 구글이 PageRank(링크 권위도)를 거의 100% 새 URL로 전달합니다. 302는 "임시 이동"으로 원본 URL에 PageRank가 남아있고 새 URL로 권위도가 완전히 전달되지 않습니다. 콘텐츠가 영구 이전했다면 반드시 301을 사용하세요. A/B 테스트나 임시 공사 중 페이지에는 302를 사용합니다.</p></details>
<details class="faq-item"><summary>Q. 307과 308은 302, 301과 무엇이 다른가요?</summary><p>A. 307은 302와 마찬가지로 임시 리다이렉트이지만, 원본 HTTP 요청 메서드(GET, POST 등)를 변경하지 않습니다. 308은 301의 현대적 대안으로 영구 리다이렉트이면서 메서드를 보존합니다. API 엔드포인트처럼 POST 요청을 처리하는 URL을 리다이렉트할 때 307/308이 중요합니다.</p></details>
<details class="faq-item"><summary>Q. 리다이렉트 체인이 SEO에 미치는 영향은?</summary><p>A. 리다이렉트 체인(A→B→C)이 길어질수록 PageRank가 각 홉에서 조금씩 손실됩니다. Googlebot은 크롤 예산을 절약하기 위해 5~10개 이상의 리다이렉트 체인을 중단할 수 있습니다. 이상적인 체인 길이는 최대 3단계이며, 가능하면 A→C로 직접 리다이렉트하는 것이 좋습니다.</p></details>

const LANGS = ['ko','en','zh','ja'];
let _lang = 'ko';

function detectLang(){
  const u = new URLSearchParams(location.search).get('lang');
  if(u && _i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if(s && _i18n[s]) return s;
  const n = navigator.language?.slice(0,2);
  return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';
}

function cycleLang(){
  const idx = LANGS.indexOf(_lang);
  _lang = LANGS[(idx+1) % LANGS.length];
  localStorage.setItem('modoo_lang', _lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', _lang);
  history.replaceState({}, '', url);
  applyLang();
}

function applyLang(){
  const t = _i18n[_lang];
  document.documentElement.lang = _lang;
  document.title = t.pageTitle;
  document.getElementById('h1El').innerHTML = t.h1;
  document.getElementById('subEl').textContent = t.sub;
  document.getElementById('backLink').textContent = t.backLink;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('corsNote').textContent = t.corsNote;
  document.getElementById('sectionManual').textContent = t.sectionManual;
  document.getElementById('btnAnalyze').textContent = t.btnAnalyze;
  document.getElementById('btnSample').textContent = t.btnSample;
  document.getElementById('btnClear').textContent = t.btnClear;
  document.getElementById('labelChain').textContent = t.labelChain;
  document.getElementById('labelHops').textContent = t.labelHops;
  document.getElementById('labelFinal').textContent = t.labelFinal;
  document.getElementById('labelIssues').textContent = t.labelIssues;
  document.getElementById('labelRefTable').textContent = t.labelRefTable;
  document.getElementById('seoDiv').innerHTML = t.seoHtml;
  renderRefTable(t);
  document.querySelectorAll('.add-hop-text').forEach(el => el.textContent = t.addHop);
  document.querySelectorAll('.hop-url-input').forEach(el => el.placeholder = t.urlPlaceholder);
}

function addHop(url='', status='301'){
  const t = _i18n[_lang];
  const container = document.getElementById('hopsContainer');
  const addBtn = container.querySelector('.add-hop-btn');
  const row = document.createElement('div');
  row.className = 'hop-row';
  row.dataset.id = ++hopCount;
  row.innerHTML = `
    <input type="text" class="hop-url-input" value="${url}" placeholder="${t.urlPlaceholder}">
    <select class="hop-status">
      <option value="301"${status==='301'?' selected':''}>301</option>
      <option value="302"${status==='302'?' selected':''}>302</option>
      <option value="307"${status==='307'?' selected':''}>307</option>
      <option value="308"${status==='308'?' selected':''}>308</option>
      <option value="200"${status==='200'?' selected':''}>200</option>
    </select>
    <button class="hop-remove" onclick="removeHop(this)" title="Remove">×</button>
  `;
  container.insertBefore(row, addBtn);
}

function removeHop(btn){
  btn.closest('.hop-row').remove();
}

function loadSample(){
  clearChain();
  addHop('http://example.com/', '301');
  addHop('https://example.com/', '301');
  addHop('https://www.example.com/', '200');
}

function clearChain(){
  const container = document.getElementById('hopsContainer');
  container.querySelectorAll('.hop-row').forEach(r => r.remove());
  document.getElementById('chainVisual').style.display = 'none';
  hopCount = 0;
}

function analyzeChain(){
  const rows = document.querySelectorAll('.hop-row');
  if(rows.length === 0) return;
  const hops = Array.from(rows).map(r => ({
    url: r.querySelector('.hop-url-input').value.trim(),
    status: r.querySelector('.hop-status').value,
  })).filter(h => h.url.length > 0);
  if(hops.length === 0) return;

  const t = _i18n[_lang];

  // Build chain visual
  let chainHtml = '';
  hops.forEach((hop, i) => {
    const statusCls = `status-${hop.status}`;
    const statusBg = `status-${hop.status}-bg`;
    chainHtml += `<div class="redirect-hop"><span class="${statusCls} status-label ${statusBg}">${hop.status}</span><br>${hop.url}</div>`;
    if(i < hops.length - 1) chainHtml += `<span class="redirect-arrow">→</span>`;
  });
  document.getElementById('chainEl').innerHTML = chainHtml;

  // Final URL & hops count
  const finalHop = hops[hops.length - 1];
  document.getElementById('hopsCount').textContent = (hops.length - 1) + ' hops';
  document.getElementById('finalUrl').textContent = finalHop.url;

  // Issues
  const issues = [];
  // Loop detection
  const urls = hops.map(h => h.url);
  const seen = new Set();
  let hasLoop = false;
  urls.forEach(u => { if(seen.has(u)) hasLoop = true; seen.add(u); });
  if(hasLoop) issues.push({icon:'🔴', text: t.issueLoop});
  // Too many redirects
  if(hops.length - 1 > 5) issues.push({icon:'🟡', text: t.issueTooMany});
  // Mixed protocols
  const protos = hops.map(h => h.url.startsWith('https') ? 'https' : 'http');
  let mixedProto = false;
  for(let i = 1; i < protos.length - 1; i++){
    if(protos[i] !== protos[i-1] && protos[i] !== protos[i+1]) { mixedProto = true; break; }
  }
  if(mixedProto) issues.push({icon:'🟡', text: t.issueMixedProto});
  // www mismatch
  const hasWww = hops.some(h => h.url.includes('://www.'));
  const hasNonWww = hops.some(h => !h.url.includes('://www.') && (h.url.startsWith('http://') || h.url.startsWith('https://')));
  if(hasWww && hasNonWww) issues.push({icon:'🟡', text: t.issueWww});
  // Temp redirects
  if(hops.some(h => h.status === '302' || h.status === '307') && hops.length > 1)
    issues.push({icon:'🔵', text: t.issueTemp});

  const issuesList = document.getElementById('issuesList');
  if(issues.length === 0){
    issuesList.innerHTML = `<div class="issue-item"><span class="issue-icon">✅</span><span class="issue-text issue-ok">${t.noIssues}</span></div>`;
  } else {
    issuesList.innerHTML = issues.map(i => `<div class="issue-item"><span class="issue-icon">${i.icon}</span><span class="issue-text">${i.text}</span></div>`).join('');
  }

  document.getElementById('chainVisual').style.display = 'block';
}

function renderRefTable(t){
  const rows = t.refRows.map(r => `
    <div class="ref-row">
      <span class="ref-code ${r.cls}">${r.code}</span>
      <span class="ref-perm ${r.cls}">${r.type}</span>
      <span class="ref-desc">${r.desc}</span>
    </div>
  `).join('');
  document.getElementById('refTableEl').innerHTML = `
    <div class="ref-head">
      <span>${t.refHead[0]}</span>
      <span>${t.refHead[1]}</span>
      <span>${t.refHead[2]}</span>
    </div>
    ${rows}
  `;
}

applyLang();
