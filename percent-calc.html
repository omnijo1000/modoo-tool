<script>
function fmt(n) {
  if (isNaN(n) || !isFinite(n)) return null;
  return n % 1 === 0 ? n.toLocaleString() : n.toLocaleString(undefined, {maximumFractionDigits:2});
}

function calc1() {
  const x = parseFloat(document.getElementById('a1').value);
  const y = parseFloat(document.getElementById('a2').value);
  if (isNaN(x) || isNaN(y)) { document.getElementById('r1').textContent='—'; document.getElementById('r1sub').textContent=''; return; }
  const pct = x * y / 100;
  const after = x - pct;
  document.getElementById('r1').textContent = fmt(pct) + '원';
  document.getElementById('r1sub').textContent = `할인 후 가격: ${fmt(after)}원`;
}

function calc2() {
  const a = parseFloat(document.getElementById('b1').value);
  const b = parseFloat(document.getElementById('b2').value);
  if (isNaN(a) || isNaN(b) || b === 0) { document.getElementById('r2').textContent='—'; document.getElementById('r2sub').textContent=''; return; }
  const pct = (a / b) * 100;
  document.getElementById('r2').textContent = fmt(pct) + '%';
  document.getElementById('r2sub').textContent = `${fmt(a)} ÷ ${fmt(b)} × 100`;
}

function calc3() {
  const a = parseFloat(document.getElementById('c1').value);
  const b = parseFloat(document.getElementById('c2').value);
  if (isNaN(a) || isNaN(b) || a === 0) { document.getElementById('r3').textContent='—'; document.getElementById('r3sub').textContent=''; return; }
  const rate = ((b - a) / Math.abs(a)) * 100;
  const sign = rate >= 0 ? '+' : '';
  document.getElementById('r3').textContent = sign + fmt(rate) + '%';
  document.getElementById('r3').style.color = rate >= 0 ? '#4ade80' : '#f87171';
  const diff = b - a;
  document.getElementById('r3sub').textContent = `차이: ${diff >= 0 ? '+' : ''}${fmt(diff)}`;
}

function calc4() {
  const disc = parseFloat(document.getElementById('d1').value);
  const price = parseFloat(document.getElementById('d2').value);
  if (isNaN(disc) || isNaN(price) || disc >= 100) { document.getElementById('r4').textContent='—'; document.getElementById('r4sub').textContent=''; return; }
  const orig = price / (1 - disc / 100);
  const saved = orig - price;
  document.getElementById('r4').textContent = '원가: ' + fmt(orig) + '원';
  document.getElementById('r4sub').textContent = `절약 금액: ${fmt(saved)}원`;
}

function calc5() {
  const x = parseFloat(document.getElementById('e1').value);
  const y = parseFloat(document.getElementById('e2').value);
  if (isNaN(x) || isNaN(y)) {
    document.getElementById('r5plus').textContent='—';
    document.getElementById('r5minus').textContent='—';
    document.getElementById('r5sub').textContent='';
    document.getElementById('r5sub2').textContent='';
    return;
  }
  const pct = x * y / 100;
  document.getElementById('r5plus').textContent = fmt(x + pct) + '원 (+' + fmt(y) + '%)';
  document.getElementById('r5sub').textContent = `더한 금액: +${fmt(pct)}원`;
  document.getElementById('r5minus').textContent = fmt(x - pct) + '원 (-' + fmt(y) + '%)';
  document.getElementById('r5sub2').textContent = `뺀 금액: -${fmt(pct)}원`;
}
</script>

    sec4Title:'🔙 역산 — 할인 후 가격으로 원가 구하기', sec4Tag:'원가 역산', sec4Rate:'할인율', sec4DiscountedIs:'% 할인된 가격이', sec4When:'원일 때',
    sec5Title:'➕➖ X에 Y% 더하거나 빼기', sec5Tag:'가감 계산', sec5Add:'에',
    seoHtml:`<h2>퍼센트 계산기 완전 가이드</h2><p>퍼센트(%)는 전체를 100으로 봤을 때의 비율입니다. 쇼핑 할인, 세율 계산, 통계 증감률, 투자 수익률 등 일상 생활에서 가장 자주 쓰이는 계산 중 하나입니다. <strong>기본 공식</strong>: X의 Y% = X × Y ÷ 100. <strong>비율</strong>: A는 B의 몇%? → A ÷ B × 100. <strong>증감률</strong>: (B - A) ÷ A × 100. <strong>역산</strong>: Y% 할인 후 가격이 P원 → 원가 = P ÷ (1 - Y/100). <strong>가감</strong>: X의 Y% 증가 = X × (1 + Y/100), Y% 감소 = X × (1 - Y/100).</p><h3 class="seo-sub">활용 예시</h3><ul class="seo-ul"><li>할인 계산: 12,000원 25% 할인 → 9,000원 (3,000원 절약)</li><li>부가세: 10,000원(공급가) × 1.10 = 11,000원(부가세 포함)</li><li>증감률: 지난달 50,000원, 이번달 60,000원 → 20% 증가</li><li>역산: 30% 할인 후 7,000원 → 원가 = 7,000 ÷ 0.70 = 10,000원</li><li>급여 인상: 월급 300만원 × 1.05 = 315만원 (5% 인상 후)</li><li>시장점유율: A사 매출 4억 / 시장 전체 20억 = 20%</li></ul><h3 class="seo-sub">자주 묻는 질문</h3><details class="faq-item"><summary>Q. 할인율과 할인액의 차이는?</summary><p>할인율은 원래 가격에서 얼마나 줄어드는지의 비율(%), 할인액은 실제로 깎이는 금액(원). 예: 10,000원의 20% 할인 → 할인율 20%, 할인액 2,000원, 결제 금액 8,000원.</p></details><details class="faq-item"><summary>Q. 부가세 포함 금액에서 공급가를 역산하려면?</summary><p>공급가 = 부가세 포함 금액 ÷ 1.10 (부가세 10%). 예: 11,000원(세금 포함) ÷ 1.10 = 10,000원(공급가). 간이과세 4%: ÷ 1.04. 이 계산기의 "역산" 기능을 활용하세요.</p></details><details class="faq-item"><summary>Q. 증감률과 증감량의 차이는?</summary><p>증감량(절대 변화): B - A. 증감률(상대 변화): (B - A) ÷ A × 100%. 예: 매출이 100에서 130으로 증가 → 증감량 +30, 증감률 +30%. 규모가 다른 항목을 비교할 때는 증감률을 사용합니다.</p></details><details class="faq-item"><summary>Q. 복수 할인이 중첩될 때 계산 방법은?</summary><p>10% 할인 후 20% 추가 할인은 30% 할인이 아닙니다. 계산: 원가 × (1-0.10) × (1-0.20) = 원가 × 0.72 = 28% 할인. 중첩 할인은 곱셈으로 계산합니다. 예: 10,000원 × 0.90 × 0.80 = 7,200원.</p></details><details class="faq-item"><summary>Q. 퍼센트 포인트(pp)와 퍼센트(%)의 차이는?</summary><p>퍼센트(%): 변화의 상대적 비율. 퍼센트포인트(pp): 퍼센트 값의 절대적 차이. 예: 지지율이 40%→45%로 상승: "5pp 증가"(절대), "12.5% 증가"(상대). 통계·경제 지표에서는 pp가 더 정확한 표현입니다.</p></details><details class="faq-item"><summary>Q. 이익률과 이익액 계산 방법은?</summary><p>매출총이익액 = 매출 - 원가. 매출총이익률 = (매출 - 원가) ÷ 매출 × 100. 예: 매출 100만원, 원가 60만원 → 이익액 40만원, 이익률 40%. 원가율 = 원가 ÷ 매출 × 100 = 60%.</p></details><details class="faq-item"><summary>Q. 연이율을 월이율로 변환하는 방법은?</summary><p>단순 변환: 월이율 = 연이율 ÷ 12. 예: 연 12% → 월 1%. 복리 정확 환산: 월이율 = (1 + 연이율)^(1/12) - 1. 연 12%의 경우: (1.12)^(1/12) - 1 ≈ 0.949%. 금융 계산에는 복리 환산 사용을 권장합니다.</p></details><details class="faq-item"><summary>Q. 환율 변화율은 어떻게 계산하나요?</summary><p>변화율 = (새 환율 - 기존 환율) ÷ 기존 환율 × 100. 예: 달러당 1,300원→1,400원: (1,400-1,300)÷1,300×100 = +7.69% 원화 약세. 반대로 달러 기준: -(7.69÷107.69) ≈ -7.14% 달러 강세. 기준 통화가 달라지면 비율도 달라집니다.</p></details><details class="faq-item"><summary>Q. 시험 점수를 백분율로 환산하는 방법은?</summary><p>백분율 = 획득 점수 ÷ 만점 × 100. 예: 90문항 중 72개 정답 → 72 ÷ 90 × 100 = 80%. 가중치가 다른 과목 평균: 각 과목 점수 × 가중치 비율을 합산. 예: 국어 80점(가중치 30%) + 영어 70점(가중치 40%) + 수학 90점(가중치 30%) = 80×0.3 + 70×0.4 + 90×0.3 = 79점.</p></details><details class="faq-item"><summary>Q. 인플레이션율 계산 방법은?</summary><p>인플레이션율 = (현재 물가 - 과거 물가) ÷ 과거 물가 × 100. 한국 CPI 기준. 예: 작년 100,000원 장바구니가 올해 103,000원 → 3% 인플레이션. 실질 수익률 = 명목 수익률 - 인플레이션율 (피셔 방정식). 연 5% 수익, 3% 인플레이션 → 실질 수익 ≈ 2%.</p></details><details class="faq-item"><summary>Q. 세금 신고 시 경비 공제율은 어떻게 계산하나요?</summary><p>공제 금액 = 총 수입 × 공제율. 예: 프리랜서 총 수입 5,000만원, 단순경비율 64% 적용 → 필요경비 3,200만원, 과세 소득 1,800만원. 기준경비율·단순경비율은 업종별로 다르므로 국세청 홈택스에서 확인하세요.</p></details><details class="faq-item"><summary>Q. 통계의 신뢰구간 95%는 무슨 뜻인가요?</summary><p>신뢰구간 95%는 "동일한 방법으로 100번 샘플링하면 그 중 약 95번은 구간 안에 모집단 참값이 포함된다"는 뜻입니다. 여론조사에서 "±3%p, 95% 신뢰수준"은 표본 오차가 ±3%p 이내이고, 이 정확도가 95% 확률로 보장된다는 의미입니다.</p></details>`,

  en: { lang:'en', title:'Percent Calculator - Discount, Ratio & Rate of Change', h1:'Percent Calculator', sub:'Calculate discount rates, percentage increases/decreases, ratios and reverse percentage.', btn:'🌐 中文',
    sec1Title:'🛒 What is Y% of X?', sec1Tag:'Discount calc', sec1LabelA:'Value', sec1Of:'×',
    sec2Title:'📊 A is what % of B?', sec2Tag:'Ratio calc', sec2Is:'is', sec2Of:'of',
    sec3Title:'📈 % change from A to B?', sec3Tag:'Rate of change', sec3Before:'Before', sec3After:'After',
    sec4Title:'🔙 Reverse — find original price from discounted price', sec4Tag:'Reverse calc', sec4Rate:'Discount rate', sec4DiscountedIs:'% discount, price is', sec4When:'then original is',
    sec5Title:'➕➖ Add or subtract Y% from X', sec5Tag:'Add/subtract', sec5Add:'+',
    seoHtml:`<h2>Percent Calculator — Complete Guide</h2><p>Percentage (%) represents a ratio as a fraction of 100. It is one of the most frequently used calculations in everyday life — shopping discounts, tax calculations, statistical rates of change, investment returns, and more. <strong>Core formulas</strong>: Y% of X = X × Y ÷ 100. <strong>Ratio</strong>: A is what % of B? → A ÷ B × 100. <strong>Rate of change</strong>: (B - A) ÷ A × 100. <strong>Reverse</strong>: price after Y% discount is P → original = P ÷ (1 - Y/100). <strong>Add/subtract</strong>: X increased by Y% = X × (1 + Y/100), decreased = X × (1 - Y/100).</p><h3 class="seo-sub">Usage Examples</h3><ul class="seo-ul"><li>Discount: $120 at 25% off → $90 (saving $30)</li><li>Sales tax: $100 net × 1.10 = $110 including 10% VAT/GST</li><li>Rate of change: revenue $50K last month, $60K this month → +20%</li><li>Reverse: item is $70 after 30% discount → original = $70 ÷ 0.70 = $100</li><li>Salary increase: $3,000/month × 1.05 = $3,150 after 5% raise</li><li>Market share: company A revenue $40M / total market $200M = 20%</li></ul><h3 class="seo-sub">Frequently Asked Questions</h3><details class="faq-item"><summary>Q. What is the difference between discount rate and discount amount?</summary><p>Discount rate: the percentage by which the price is reduced. Discount amount: the actual money saved. Example: $100 at 20% discount → discount rate 20%, discount amount $20, final price $80.</p></details><details class="faq-item"><summary>Q. How do I reverse-calculate the pre-tax price from a tax-inclusive price?</summary><p>Pre-tax price = tax-inclusive price ÷ (1 + tax rate). Example: $110 including 10% GST → $110 ÷ 1.10 = $100 (pre-tax). For UK VAT at 20%: $120 ÷ 1.20 = $100. Use the Reverse tab in this calculator.</p></details><details class="faq-item"><summary>Q. What is the difference between rate of change and absolute change?</summary><p>Absolute change: B - A (actual difference). Rate of change: (B - A) ÷ A × 100% (relative difference). Example: sales up from 100 to 130 → absolute change +30, rate of change +30%. Rates of change are useful when comparing items of different scale.</p></details><details class="faq-item"><summary>Q. How do stacked discounts work?</summary><p>10% off then an additional 20% off is NOT 30% off. Calculation: price × (1 − 0.10) × (1 − 0.20) = price × 0.72 = 28% off total. Example: $100 × 0.90 × 0.80 = $72. Always multiply sequential discounts — never add them.</p></details><details class="faq-item"><summary>Q. What is the difference between percentage points (pp) and percent (%)?</summary><p>Percentage (%): relative change. Percentage points (pp): absolute difference between two percentages. Example: approval rating rises from 40% to 45%: "5pp increase" (absolute), "12.5% increase" (relative). Economic and statistical reporting uses pp to avoid ambiguity.</p></details><details class="faq-item"><summary>Q. How do I calculate profit margin and profit amount?</summary><p>Gross profit = Revenue - Cost. Gross margin = (Revenue - Cost) ÷ Revenue × 100. Example: Revenue $100K, Cost $60K → Gross profit $40K, Margin 40%. Cost ratio = Cost ÷ Revenue × 100 = 60% (= 100% - margin).</p></details><details class="faq-item"><summary>Q. How do I convert annual interest rate to monthly rate?</summary><p>Simple conversion: Monthly rate = Annual rate ÷ 12. Example: 12% annual → 1% monthly. Compound-accurate: Monthly rate = (1 + annual rate)^(1/12) - 1. For 12% annual: (1.12)^(1/12) - 1 ≈ 0.949%. Use compound conversion for precise financial calculations.</p></details><details class="faq-item"><summary>Q. How do I calculate exchange rate change?</summary><p>Rate of change = (new rate - old rate) ÷ old rate × 100. Example: USD/KRW 1,300 → 1,400: (1,400-1,300)÷1,300×100 = +7.69% KRW depreciation. From the USD perspective: -(7.69÷107.69) ≈ -7.14% USD appreciation. Note: the rate changes depending on which currency is the base.</p></details><details class="faq-item"><summary>Q. How do I convert a test score to percentage?</summary><p>Percentage = score obtained ÷ total score × 100. Example: 72 correct out of 90 questions → 72 ÷ 90 × 100 = 80%. Weighted average: multiply each subject score by its weight. Example: English 80 (30%) + Math 70 (40%) + Science 90 (30%) = 80×0.3 + 70×0.4 + 90×0.3 = 79%.</p></details><details class="faq-item"><summary>Q. How do I calculate inflation rate?</summary><p>Inflation rate = (current price - past price) ÷ past price × 100. Example: last year $100 basket costs $103 this year → 3% inflation. Real return ≈ nominal return - inflation rate (Fisher equation). 5% nominal return with 3% inflation → ~2% real return.</p></details><details class="faq-item"><summary>Q. What does "95% confidence interval" mean in statistics?</summary><p>A 95% confidence interval means: if we repeated the sampling process 100 times, approximately 95 of those intervals would contain the true population value. A poll reporting "±3pp margin of error at 95% confidence" means the sample result is within ±3 percentage points of the true value, with 95% probability.</p></details><details class="faq-item"><summary>Q. How do I calculate percentage of completion for a project?</summary><p>Percent complete = tasks completed ÷ total tasks × 100. For weighted milestones: assign weights and sum (completed weight ÷ total weight × 100). Example: 3 of 10 tasks done = 30%. For budget: spent $30K of $100K budget = 30% budget utilization. Compare budget % vs. completion % to assess schedule efficiency.</p></details>`,
  },
  zh: { lang:'zh', title:'百分比计算器 - 折扣·增减率·比率计算', h1:'百分比计算器', sub:'计算折扣率、百分比增减、比率和反向百分比。', btn:'🌐 日本語',
    sec1Title:'🛒 X 的 Y% 是多少？', sec1Tag:'折扣计算', sec1LabelA:'原始值', sec1Of:'的',
    sec2Title:'📊 A 是 B 的百分之几？', sec2Tag:'比率计算', sec2Is:'是', sec2Of:'的',
    sec3Title:'📈 从 A 到 B 变化了多少百分比？', sec3Tag:'增减率', sec3Before:'变化前', sec3After:'变化后',
    sec4Title:'🔙 反算 — 由折后价求原价', sec4Tag:'原价反算', sec4Rate:'折扣率', sec4DiscountedIs:'% 折后价为', sec4When:'，原价为',
    sec5Title:'➕➖ X 加减 Y%', sec5Tag:'加减计算', sec5Add:'加',
    seoHtml:`<h2>百分比计算器完全指南</h2><p>百分比（%）将整体视为100表示比例，是日常生活中最常用的计算之一——购物折扣、税率计算、统计增减率、投资收益率等。<strong>基本公式</strong>：X的Y% = X × Y ÷ 100。<strong>比率</strong>：A是B的百分之几？→ A ÷ B × 100。<strong>增减率</strong>：(B - A) ÷ A × 100。<strong>反算</strong>：Y%折扣后价格为P → 原价 = P ÷ (1 - Y/100)。<strong>加减</strong>：X增加Y% = X × (1 + Y/100)，减少 = X × (1 - Y/100)。</p><h3 class="seo-sub">使用示例</h3><ul class="seo-ul"><li>折扣计算：¥120折后25% → ¥90（节省¥30）</li><li>增值税：¥100（不含税）× 1.13 = ¥113（含13% VAT）</li><li>增减率：上月收入¥5万，本月¥6万 → 增长20%</li><li>反算：打七折后价格¥70 → 原价 = ¥70 ÷ 0.70 = ¥100</li><li>薪资调整：月薪¥10,000 × 1.05 = ¥10,500（加薪5%后）</li><li>市场占有率：A公司收入¥4亿 / 市场总量¥20亿 = 20%</li></ul><h3 class="seo-sub">常见问题</h3><details class="faq-item"><summary>Q. 折扣率和折扣金额的区别是什么？</summary><p>折扣率：价格降低的比例（%）。折扣金额：实际节省的钱（元）。例：¥100打八折（20%折扣）→ 折扣率20%，折扣金额¥20，最终价格¥80。</p></details><details class="faq-item"><summary>Q. 如何从含税价格反算不含税价格？</summary><p>不含税价格 = 含税价格 ÷ (1 + 税率)。例：含13%增值税的¥113 → ¥113 ÷ 1.13 = ¥100（不含税）。含6%税：÷ 1.06。使用本计算器的"反算"功能即可完成。</p></details><details class="faq-item"><summary>Q. 增减率和增减量的区别是什么？</summary><p>增减量（绝对变化）：B - A。增减率（相对变化）：(B - A) ÷ A × 100%。例：销售额从100增至130 → 增减量+30，增减率+30%。比较不同规模的项目时使用增减率。</p></details><details class="faq-item"><summary>Q. 叠加折扣如何计算？</summary><p>先打九折再打八折，不等于七折。计算：原价 × (1-0.10) × (1-0.20) = 原价 × 0.72 = 总折扣28%。例：¥100 × 0.90 × 0.80 = ¥72。多重折扣必须相乘，不能相加。</p></details><details class="faq-item"><summary>Q. 百分点（pp）和百分比（%）的区别？</summary><p>百分比（%）：相对变化。百分点（pp）：两个百分比之间的绝对差。例：支持率从40%升至45%："增加5pp"（绝对），"增加12.5%"（相对）。统计和经济报告中使用pp更准确。</p></details><details class="faq-item"><summary>Q. 如何计算利润率和利润额？</summary><p>毛利润额 = 收入 - 成本。毛利率 = (收入 - 成本) ÷ 收入 × 100。例：收入¥100万，成本¥60万 → 毛利润¥40万，毛利率40%。成本率 = 成本 ÷ 收入 × 100 = 60%。</p></details><details class="faq-item"><summary>Q. 年利率如何换算为月利率？</summary><p>简单换算：月利率 = 年利率 ÷ 12。例：年利12% → 月利1%。复利精确换算：月利率 = (1 + 年利率)^(1/12) - 1。年利12%：(1.12)^(1/12) - 1 ≈ 0.949%。精确金融计算建议使用复利换算。</p></details><details class="faq-item"><summary>Q. 如何计算汇率变化率？</summary><p>变化率 = (新汇率 - 旧汇率) ÷ 旧汇率 × 100。例：美元/人民币从6.5→7.0：(7.0-6.5)÷6.5×100 = +7.69%人民币贬值。从美元角度：人民币升值时美元贬值，两个百分比不完全对称，注意基准货币的选取。</p></details><details class="faq-item"><summary>Q. 如何将考试分数换算为百分制？</summary><p>百分制 = 获得分数 ÷ 满分 × 100。例：90题答对72道 → 72 ÷ 90 × 100 = 80%。加权平均：各科成绩 × 权重之和。例：语文80分（权重30%）+ 数学70分（权重40%）+ 英语90分（权重30%）= 79分。</p></details><details class="faq-item"><summary>Q. 如何计算通货膨胀率？</summary><p>通货膨胀率 = (当期物价 - 上期物价) ÷ 上期物价 × 100。例：去年购物篮¥100，今年¥103 → 通胀率3%。实际收益率 ≈ 名义收益率 - 通胀率（费雪方程式）。名义收益5%，通胀3% → 实际收益约2%。</p></details><details class="faq-item"><summary>Q. 统计中"95%置信区间"是什么意思？</summary><p>95%置信区间指：如果用同样方法重复抽样100次，大约有95次的置信区间包含总体真实值。民调"误差±3个百分点，置信度95%"意味着：样本结果与真实值之差在±3pp以内的概率为95%。</p></details><details class="faq-item"><summary>Q. 如何计算项目完成百分比？</summary><p>完成百分比 = 已完成任务数 ÷ 总任务数 × 100。加权里程碑：给每个里程碑分配权重，用（已完成权重 ÷ 总权重 × 100）计算。预算执行率：已花费¥3万 / 总预算¥10万 = 30%。将预算执行率与进度完成率对比可评估效率。</p></details>`,

  ja: { lang:'ja', title:'パーセント計算機 - 割引率・増減率・比率計算', h1:'パーセント計算機', sub:'割引率、パーセンテージの増減、比率、逆算まで。日常でよく使うパーセント計算。', btn:'🌐 한국어',
    sec1Title:'🛒 XのY%はいくら？', sec1Tag:'割引金額計算', sec1LabelA:'元の値', sec1Of:'の',
    sec2Title:'📊 AはBの何%？', sec2Tag:'比率計算', sec2Is:'は', sec2Of:'の',
    sec3Title:'📈 AからBへ何%変化した？', sec3Tag:'増減率', sec3Before:'変化前', sec3After:'変化後',
    sec4Title:'🔙 逆算 — 割引後価格から元の価格を求める', sec4Tag:'元価逆算', sec4Rate:'割引率', sec4DiscountedIs:'% 割引後の価格が', sec4When:'のとき',
    sec5Title:'➕➖ XにY%を足すか引く', sec5Tag:'加減計算', sec5Add:'に',
    seoHtml:`<h2>パーセント計算機 完全ガイド</h2><p>パーセント（%）は全体を100とした場合の割合を表します。日常で最も頻繁に使われる計算のひとつで、ショッピングの割引、税率計算、統計の増減率、投資利益率など多岐にわたります。<strong>基本公式</strong>：X の Y% = X × Y ÷ 100。<strong>比率</strong>：A は B の何%？→ A ÷ B × 100。<strong>増減率</strong>：(B - A) ÷ A × 100。<strong>逆算</strong>：Y% 割引後が P 円 → 元の価格 = P ÷ (1 - Y/100)。<strong>加減算</strong>：X の Y% 増 = X × (1 + Y/100)、Y% 減 = X × (1 - Y/100)。</p><h3 class="seo-sub">活用例</h3><ul class="seo-ul"><li>割引計算：¥12,000 の 25% 引き → ¥9,000（¥3,000割引）</li><li>消費税：¥10,000（税抜）× 1.10 = ¥11,000（税込）</li><li>増減率：先月¥50,000、今月¥60,000 → 20%増加</li><li>逆算：30%割引後が¥7,000 → 元値 = ¥7,000 ÷ 0.70 = ¥10,000</li><li>給与増加：月給¥300,000 × 1.05 = ¥315,000（5%昇給後）</li><li>市場シェア：A社売上¥4億 / 市場全体¥20億 = 20%</li></ul><h3 class="seo-sub">よくある質問</h3><details class="faq-item"><summary>Q. 割引率と割引額の違いは？</summary><p>割引率は元の価格に対する割引の割合（%）。割引額は実際に値引きされる金額（円）。例：¥10,000の20%割引 → 割引率は20%、割引額は¥2,000、支払額は¥8,000。</p></details><details class="faq-item"><summary>Q. 消費税を含む価格から税抜価格を逆算するには？</summary><p>税抜価格 = 税込価格 ÷ (1 + 税率)。日本の消費税10%の場合：税込¥11,000 ÷ 1.10 = ¥10,000（税抜）。軽減税率8%の場合：÷ 1.08。</p></details><details class="faq-item"><summary>Q. 増減率と増減量の違いは？</summary><p>増減量（絶対変化）：B - A。増減率（相対変化）：(B - A) ÷ A × 100%。例：売上が100から130に増加 → 増減量+30、増減率+30%。増減率は異なる規模の比較に有用です。</p></details><details class="faq-item"><summary>Q. 「30%オフ」と「7割引き」は同じ？</summary><p>はい、同じです。「3割引き」=30%オフ、「7割引き」=70%オフ。ただし注意：「7割」は価格の70%（30%オフ）、「7割引」は70%オフで別物です。日本語の「〜割引」はオフ率、「〜割」は残る割合なので混同に注意してください。</p></details><details class="faq-item"><summary>Q. 複数の割引を重ねた場合の計算方法は？</summary><p>10%引きの後さらに20%引きは30%引きではありません。計算：元値 × (1-0.10) × (1-0.20) = 元値 × 0.72 = 28%引き。複数割引は乗算で計算します。例：¥10,000 × 0.90 × 0.80 = ¥7,200。</p></details><details class="faq-item"><summary>Q. 年利率と月利率の変換は？</summary><p>単純変換：月利 = 年利 ÷ 12。例：年利12% → 月利1%。ただし複利の場合：月利 = (1 + 年利)^(1/12) - 1。年利12%の場合：月利 = (1.12)^(1/12) - 1 ≈ 0.949%。精密な金融計算には複利換算が必要です。</p></details><details class="faq-item"><summary>Q. パーセントポイント（pp）とパーセントの違いは？</summary><p>パーセント（%）：変化の相対的割合。パーセントポイント（pp）：パーセント値の絶対的差異。例：支持率が40%→45%に上昇：「5pp増加」（絶対）、「12.5%増加」（相対）。統計・経済指標では pp の方が正確な表現。</p></details><details class="faq-item"><summary>Q. 利益率と利益額の計算方法は？</summary><p>粗利益額 = 売上 - 原価。粗利益率 = (売上 - 原価) ÷ 売上 × 100。例：売上¥100,000、原価¥60,000 → 粗利益額¥40,000、粗利益率40%。原価率 = 原価 ÷ 売上 × 100 = 60%（100% - 利益率）。</p></details><details class="faq-item"><summary>Q. BMI計算にパーセントは関係ありますか？</summary><p>BMI自体はkg/m²単位ですが、体脂肪率（%）は別の指標です。体重の何パーセントが脂肪かを示します。成人男性の標準体脂肪率：10-20%、成人女性：18-28%。体重の変化率：(現体重-目標体重)÷現体重×100で体重減少率を計算できます。</p></details><details class="faq-item"><summary>Q. パーセントの四捨五入はどこで行うべきですか？</summary><p>計算の途中では四捨五入せず、最終結果のみ丸めます。中間値を丸めると累積誤差が生じます。例：33.333...% は計算に使用するときは33.333を使い、表示するときのみ「33.3%」に丸めます。小数点以下の桁数は用途に応じて設定してください。</p></details><details class="faq-item"><summary>Q. 外国為替での変化率計算は？</summary><p>為替変化率 = (新レート - 旧レート) ÷ 旧レート × 100。例：1ドル=130円→140円：(140-130)÷130×100 = +7.69%の円安。逆の見方（ドル視点）：(1/140-1/130)÷(1/130)×100 = -7.14%のドル高。基準通貨が逆になると率も変わることに注意。</p></details><details class="faq-item"><summary>Q. 統計の標準偏差とパーセントの関係は？</summary><p>正規分布では：平均±1σ内に約68.27%、±2σ内に約95.45%、±3σ内に約99.73%のデータが含まれます。これを「68-95-99.7ルール」と呼びます。品質管理（6σ基準）では±3σ内を「正常」とみなし、±6σでは欠陥率約0.00034%を目指します。</p></details>`,
  }
};
function _detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  else if (n.startsWith('ja')) return 'ja';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}
let _lang = _detectLang();
function _applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = t.lang;
  document.title = t.title;
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = t.btn;
  const h1 = document.querySelector('h1');
  if (h1) h1.innerHTML = t.h1;
  const sub = document.querySelector('.subtitle');
  if (sub) sub.textContent = t.sub;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  const back = document.querySelector('.back-link');
  if (back) back.textContent = (_lang === 'ko') ? '← 모두의 툴' : (_lang === 'zh') ? '← 首页' : (_lang === 'ja') ? '← ホーム' : '← Home';
}
const _langOrder = ['ko','en','zh','ja'];
function cycleLang() {
  const idx = _langOrder.indexOf(_lang);
  _lang = _langOrder[(idx + 1) % _langOrder.length];
  localStorage.setItem('lang', _lang);
  const url = new URL(location.href);
  if (_lang === 'ko') { url.searchParams.delete('lang'); } else { url.searchParams.set('lang', _lang); }
  history.replaceState({}, '', url);
  _applyLang();
}
_applyLang();
</script>
