<main>
  <h1>% <span>퍼센트 계산기</span></h1>
  <p class="subtitle">할인율, 몇 퍼센트인지, 증감률, 역산까지 — 일상에서 자주 쓰는 퍼센트 계산 모음</p>

  <!-- 1. X의 Y% 는 얼마? -->
  <div class="calc-section">
    <div class="calc-title">
      <span data-i18n="sec1Title">🛒 X의 Y%는 얼마?</span>
      <span class="calc-tag" data-i18n="sec1Tag">할인금액 계산</span>
    </div>
    <div class="input-row">
      <span class="input-label" data-i18n="sec1LabelA">원래 값</span>
      <input type="number" id="a1" placeholder="59000" oninput="calc1()">
      <span class="unit" data-i18n="sec1Of">의</span>
      <input type="number" id="a2" placeholder="30" oninput="calc1()">
      <span class="unit">%</span>
    </div>
    <div class="result-box">
      <div class="result-main" id="r1">—</div>
      <div class="result-sub" id="r1sub"></div>
    </div>
  </div>

  <!-- 2. A는 B의 몇 %? -->
  <div class="calc-section">
    <div class="calc-title">
      <span data-i18n="sec2Title">📊 A는 B의 몇 %?</span>
      <span class="calc-tag" data-i18n="sec2Tag">비율 계산</span>
    </div>
    <div class="input-row">
      <input type="number" id="b1" placeholder="35000" oninput="calc2()">
      <span class="divider" data-i18n="sec2Is">은</span>
      <input type="number" id="b2" placeholder="50000" oninput="calc2()">
      <span class="unit" data-i18n="sec2Of">의</span>
    </div>
    <div class="result-box">
      <div class="result-main" id="r2">—</div>
      <div class="result-sub" id="r2sub"></div>
    </div>
  </div>

  <!-- 3. 증가/감소율 -->
  <div class="calc-section">
    <div class="calc-title">
      <span data-i18n="sec3Title">📈 A에서 B로 몇 % 변했나?</span>
      <span class="calc-tag" data-i18n="sec3Tag">증감률</span>
    </div>
    <div class="input-row">
      <span class="input-label" data-i18n="sec3Before">이전 값</span>
      <input type="number" id="c1" placeholder="80000" oninput="calc3()">
      <span class="unit">→</span>
      <input type="number" id="c2" placeholder="95000" oninput="calc3()">
      <span class="input-label" data-i18n="sec3After">이후 값</span>
    </div>
    <div class="result-box">
      <div class="result-main" id="r3">—</div>
      <div class="result-sub" id="r3sub"></div>
    </div>
  </div>

  <!-- 4. 역산: Y% 할인가가 X이면 원가는? -->
  <div class="calc-section">
    <div class="calc-title">
      <span data-i18n="sec4Title">🔙 역산 — 할인 후 가격으로 원가 구하기</span>
      <span class="calc-tag" data-i18n="sec4Tag">원가 역산</span>
    </div>
    <div class="input-row">
      <span class="input-label" data-i18n="sec4Rate">할인율</span>
      <input type="number" id="d1" placeholder="30" oninput="calc4()">
      <span class="unit" data-i18n="sec4DiscountedIs">% 할인된 가격이</span>
      <input type="number" id="d2" placeholder="41300" oninput="calc4()">
      <span class="unit" data-i18n="sec4When">원일 때</span>
    </div>

      <div class="result-main" id="r4">—</div>

    </div>
  </div>

  <!-- 5. X에 Y% 더하기/빼기 -->

    <div class="calc-title">
      <span data-i18n="sec5Title">➕➖ X에 Y% 더하거나 빼기</span>
      <span class="calc-tag" data-i18n="sec5Tag">가감 계산</span>
    </div>
    <div class="input-row">
      <input type="number" id="e1" placeholder="100000" oninput="calc5()">
      <span class="unit" data-i18n="sec5Add">에</span>
      <input type="number" id="e2" placeholder="10" oninput="calc5()">
      <span class="unit">%</span>
    </div>
    <div class="result-box">
      <div class="result-main" id="r5plus">—</div>
      <div class="result-sub" id="r5sub"></div>
      <div class="result-main" id="r5minus" style="margin-top:8px;color:#f87171">—</div>
      <div class="result-sub" id="r5sub2"></div>

<script>
function fmt(n) {
  if (isNaN(n) || !isFinite(n)) return null;
  return n % 1 === 0 ? n.toLocaleString() : n.toLocaleString(undefined, {maximumFractionDigits:2});
}

function calc1() {
  const x = parseFloat(document.getElementById('a1').value);
  const y = parseFloat(document.getElementById('a2').value);
  if (isNaN(x) || isNaN(y)) { document.getElementById('r1').textContent='—'; document.getElementById('r1sub').textContent=''; return; }
  const pct = x * y / 100;
  const after = x - pct;
  document.getElementById('r1').textContent = fmt(pct) + '원';
  document.getElementById('r1sub').textContent = `할인 후 가격: ${fmt(after)}원`;
}

function calc2() {
  const a = parseFloat(document.getElementById('b1').value);
  const b = parseFloat(document.getElementById('b2').value);
  if (isNaN(a) || isNaN(b) || b === 0) { document.getElementById('r2').textContent='—'; document.getElementById('r2sub').textContent=''; return; }
  const pct = (a / b) * 100;
  document.getElementById('r2').textContent = fmt(pct) + '%';
  document.getElementById('r2sub').textContent = `${fmt(a)} ÷ ${fmt(b)} × 100`;
}

function calc3() {
  const a = parseFloat(document.getElementById('c1').value);
  const b = parseFloat(document.getElementById('c2').value);
  if (isNaN(a) || isNaN(b) || a === 0) { document.getElementById('r3').textContent='—'; document.getElementById('r3sub').textContent=''; return; }
  const rate = ((b - a) / Math.abs(a)) * 100;
  const sign = rate >= 0 ? '+' : '';
  document.getElementById('r3').textContent = sign + fmt(rate) + '%';
  document.getElementById('r3').style.color = rate >= 0 ? '#4ade80' : '#f87171';
  const diff = b - a;
  document.getElementById('r3sub').textContent = `차이: ${diff >= 0 ? '+' : ''}${fmt(diff)}`;
}

function calc4() {
  const disc = parseFloat(document.getElementById('d1').value);
  const price = parseFloat(document.getElementById('d2').value);
  if (isNaN(disc) || isNaN(price) || disc >= 100) { document.getElementById('r4').textContent='—'; document.getElementById('r4sub').textContent=''; return; }
  const orig = price / (1 - disc / 100);
  const saved = orig - price;
  document.getElementById('r4').textContent = '원가: ' + fmt(orig) + '원';
  document.getElementById('r4sub').textContent = `절약 금액: ${fmt(saved)}원`;
}

function calc5() {
  const x = parseFloat(document.getElementById('e1').value);
  const y = parseFloat(document.getElementById('e2').value);
  if (isNaN(x) || isNaN(y)) {
    document.getElementById('r5plus').textContent='—';
    document.getElementById('r5minus').textContent='—';
    document.getElementById('r5sub').textContent='';
    document.getElementById('r5sub2').textContent='';
    return;
  }
  const pct = x * y / 100;
  document.getElementById('r5plus').textContent = fmt(x + pct) + '원 (+' + fmt(y) + '%)';
  document.getElementById('r5sub').textContent = `더한 금액: +${fmt(pct)}원`;
  document.getElementById('r5minus').textContent = fmt(x - pct) + '원 (-' + fmt(y) + '%)';
  document.getElementById('r5sub2').textContent = `뺀 금액: -${fmt(pct)}원`;
}
</script>

<script>
/* ===== i18n multilingual ===== */
const _i18n = {
  ko: { lang:'ko', title:'퍼센트 계산기 - 할인율·증감률·비율 계산', h1:'퍼센트 계산기', sub:'할인율, 몇 퍼센트인지, 증감률, 역산까지. 일상에서 자주 쓰는 퍼센트 계산.', btn:'🌐 EN',
    sec1Title:'🛒 X의 Y%는 얼마?', sec1Tag:'할인금액 계산', sec1LabelA:'원래 값', sec1Of:'의',

    sec4Title:'🔙 역산 — 할인 후 가격으로 원가 구하기', sec4Tag:'원가 역산', sec4Rate:'할인율', sec4DiscountedIs:'% 할인된 가격이', sec4When:'원일 때',

    sec3Title:'📈 % change from A to B?', sec3Tag:'Rate of change', sec3Before:'Before', sec3After:'After',
    sec4Title:'🔙 Reverse — find original price from discounted price', sec4Tag:'Reverse calc', sec4Rate:'Discount rate', sec4DiscountedIs:'% discount, price is', sec4When:'then original is',
    sec5Title:'➕➖ Add or subtract Y% from X', sec5Tag:'Add/subtract', sec5Add:'+',
  },
  zh: { lang:'zh', title:'百分比计算器 - 折扣·增减率·比率计算', h1:'百分比计算器', sub:'计算折扣率、百分比增减、比率和反向百分比。', btn:'🌐 日本語',
    sec1Title:'🛒 X 的 Y% 是多少？', sec1Tag:'折扣计算', sec1LabelA:'原始值', sec1Of:'的',

  ja: { lang:'ja', title:'パーセント計算機 - 割引率・増減率・比率計算', h1:'パーセント計算機', sub:'割引率、パーセンテージの増減、比率、逆算まで。日常でよく使うパーセント計算。', btn:'🌐 한국어',

    sec4Title:'🔙 逆算 — 割引後価格から元の価格を求める', sec4Tag:'元価逆算', sec4Rate:'割引率', sec4DiscountedIs:'% 割引後の価格が', sec4When:'のとき',
    sec5Title:'➕➖ XにY%を足すか引く', sec5Tag:'加減計算', sec5Add:'に',
  }
};
function _detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  else if (n.startsWith('ja')) return 'ja';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}
let _lang = _detectLang();
function _applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = t.lang;
  document.title = t.title;
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = t.btn;
  const h1 = document.querySelector('h1');
  if (h1) h1.innerHTML = t.h1;
  const sub = document.querySelector('.subtitle');
  if (sub) sub.textContent = t.sub;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  const back = document.querySelector('.back-link');
  if (back) back.textContent = (_lang === 'ko') ? '← 모두의 툴' : (_lang === 'zh') ? '← 首页' : (_lang === 'ja') ? '← ホーム' : '← Home';
}
const _langOrder = ['ko','en','zh','ja'];
function cycleLang() {
  const idx = _langOrder.indexOf(_lang);
  _lang = _langOrder[(idx + 1) % _langOrder.length];
  localStorage.setItem('lang', _lang);
  const url = new URL(location.href);
  if (_lang === 'ko') { url.searchParams.delete('lang'); } else { url.searchParams.set('lang', _lang); }
  history.replaceState({}, '', url);
  _applyLang();
}
_applyLang();
