<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#34d399;--tag:#60a5fa;--attr:#fbbf24;--val:#4ade80;--cmt:#555;--pi:#c084fc;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:960px;margin:0 auto;padding:32px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6;}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.tbtn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn.action{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.tbtn.action:hover{opacity:.85;}
.sep{width:1px;height:20px;background:var(--border);}
.opt-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
select.sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;}
select.sm:focus{border-color:var(--accent);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:650px){.two-col{grid-template-columns:1fr;}}
.col-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:6px;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;resize:none;line-height:1.7;min-height:400px;}
textarea:focus{border-color:var(--accent);}
.output-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.7;min-height:400px;overflow:auto;white-space:pre-wrap;word-break:break-word;cursor:pointer;}
.output-box:hover{border-color:var(--accent);}
.tag{color:var(--tag);}
.attr-name{color:var(--attr);}
.attr-val{color:var(--val);}
.xml-cmt{color:var(--cmt);font-style:italic;}
.xml-pi{color:var(--pi);}
.xml-text{color:var(--text-muted);}
.err-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#f87171;margin-top:8px;display:none;}
.ok-badge{display:inline-block;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;padding:2px 10px;border-radius:4px;margin-left:8px;}
.copied-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 24px;border-radius:20px;font-family:'DM Mono',monospace;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;}
.copied-toast.show{opacity:1;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<body>
<header>
  <span class="logo">MODOO HUB</span>

<main>
  <h1>XML <span>Formatter</span></h1>
  <p class="sub" data-i18n="sub">XML 자동 정렬 · 들여쓰기 · 유효성 검사 · 구문 강조</p>

  <div class="toolbar">
    <button class="tbtn action" onclick="format()" data-i18n="fmtBtn">▶ 포맷</button>
    <button class="tbtn" onclick="minify()" data-i18n="minBtn">압축</button>
    <button class="tbtn" onclick="loadSample()" data-i18n="sampleBtn">예시</button>
    <button class="tbtn" onclick="clearAll()" data-i18n="clearBtn">초기화</button>
    <div class="sep"></div>
    <span class="opt-label" data-i18n="indentLabel">들여쓰기</span>
    <select class="sm" id="indent">
      <option value="2">2 spaces</option>
      <option value="4" selected>4 spaces</option>
      <option value="t">tab</option>
    </select>
    <div class="sep"></div>
    <button class="tbtn" onclick="copyOutput()" data-i18n="copyBtn">복사</button>
  </div>

  <div class="two-col">
    <div>
      <div class="col-label" data-i18n="inputLabel">INPUT XML</div>
      <textarea id="xmlInput" spellcheck="false" oninput="liveFormat()" placeholder="<?xml version='1.0'?><root><item id='1'>Hello</item></root>"></textarea>
    </div>
    <div>
      <div class="col-label" id="outputColLabel" data-i18n="outputLabel">OUTPUT</div>
      <div class="output-box" id="xmlOutput" onclick="copyOutput()"></div>
    </div>
  </div>
  <div class="err-box" id="errBox"></div>

  <div class="seo">
    <h2 data-i18n="seoH2">XML Formatter란?</h2>
    <p data-i18n="seoP">XML Formatter는 읽기 어려운 압축된 XML을 자동으로 들여쓰기하여 가독성을 높입니다. 브라우저 내장 DOMParser를 사용해 XML 유효성 검사도 함께 수행합니다.</p>
  </div>
  <footer>XML Formatter · DOMParser · All processing in browser</footer>
</main>
<div class="copied-toast" id="toast" data-i18n="toastMsg">복사되었습니다!</div>
<script>
const _i18n={
  ko:{sub:'XML 자동 정렬 · 들여쓰기 · 유효성 검사 · 구문 강조',langBtn:'🌐 EN',backBtn:'← 모두의 툴',fmtBtn:'▶ 포맷',minBtn:'압축',sampleBtn:'예시',clearBtn:'초기화',indentLabel:'들여쓰기',copyBtn:'복사',inputLabel:'INPUT XML',outputLabel:'OUTPUT',seoH2:'XML Formatter란?',seoP:'압축된 XML을 자동으로 들여쓰기하고 DOMParser로 유효성 검사를 수행합니다.',toastMsg:'복사되었습니다!'},
  en:{sub:'Auto-format XML · Indent · Validate · Syntax highlight',langBtn:'🌐 中文',backBtn:'← All Tools',fmtBtn:'▶ Format',minBtn:'Minify',sampleBtn:'Sample',clearBtn:'Clear',indentLabel:'Indent',copyBtn:'Copy',inputLabel:'INPUT XML',outputLabel:'OUTPUT',seoH2:'XML Formatter',seoP:'Auto-indent compressed XML for readability and validate using the browser built-in DOMParser.',toastMsg:'Copied!'},
  zh:{sub:'自动格式化XML · 缩进 · 验证 · 语法高亮',langBtn:'🌐 日本語',backBtn:'← 所有工具',fmtBtn:'▶ 格式化',minBtn:'压缩',sampleBtn:'示例',clearBtn:'清空',indentLabel:'缩进',copyBtn:'复制',inputLabel:'输入XML',outputLabel:'输出',seoH2:'XML格式化工具',seoP:'自动缩进XML提高可读性，并使用浏览器内置DOMParser进行有效性验证。',toastMsg:'已复制！'},
  ja:{sub:'XML自動フォーマット · インデント · 検証 · 構文ハイライト',langBtn:'🌐 한국어',backBtn:'← ホーム',fmtBtn:'▶ フォーマット',minBtn:'圧縮',sampleBtn:'サンプル',clearBtn:'クリア',indentLabel:'インデント',copyBtn:'コピー',inputLabel:'入力XML',outputLabel:'出力',seoH2:'XMLフォーマッターとは？',seoP:'圧縮されたXMLを自動的にインデントして可読性を高め、ブラウザ内蔵のDOMParserで妥当性を検証します。',toastMsg:'コピーしました！'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

function getIndent(){const v=document.getElementById('indent').value;return v==='t'?'\t':' '.repeat(parseInt(v));}

function formatNode(node, depth, indent){
  const ind=indent.repeat(depth);
  const ind1=indent.repeat(depth+1);
  if(node.nodeType===Node.TEXT_NODE){
    const t=node.textContent.trim();
    return t?ind+escH(t)+'\n':'';
  }
  if(node.nodeType===Node.COMMENT_NODE) return ind+'<!--'+escH(node.textContent)+'-->\n';
  if(node.nodeType===Node.PROCESSING_INSTRUCTION_NODE) return ind+'&lt;?'+escH(node.nodeName)+' '+escH(node.textContent)+'?&gt;\n';
  if(node.nodeType===Node.DOCUMENT_NODE){return [...node.childNodes].map(c=>formatNode(c,0,indent)).join('');}
  if(node.nodeType!==Node.ELEMENT_NODE) return '';

  const name=escH(node.nodeName);
  let attrs='';
  for(const a of node.attributes){
    attrs+=` <span class="attr-name">${escH(a.name)}</span>=<span class="attr-val">"${escH(a.value)}"</span>`;
  }

  const children=[...node.childNodes];
  const onlyText=children.length===1&&children[0].nodeType===Node.TEXT_NODE;
  const empty=children.length===0;

  if(empty) return ind+`<span class="tag">&lt;${name}${attrs}/&gt;</span>\n`;
  if(onlyText){const t=children[0].textContent.trim();if(t) return ind+`<span class="tag">&lt;${name}${attrs}&gt;</span><span class="xml-text">${escH(t)}</span><span class="tag">&lt;/${name}&gt;</span>\n`;}

  let out=ind+`<span class="tag">&lt;${name}${attrs}&gt;</span>\n`;
  for(const c of children) out+=formatNode(c,depth+1,indent);
  out+=ind+`<span class="tag">&lt;/${name}&gt;</span>\n`;
  return out;
}

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function validate(xml){
  const parser=new DOMParser();
  const doc=parser.parseFromString(xml,'application/xml');
  const err=doc.querySelector('parsererror');
  return err?{ok:false,msg:err.textContent.split('\n')[0]}:{ok:true,doc};
}

let _plain='',_debounce;
function liveFormat(){clearTimeout(_debounce);_debounce=setTimeout(format,300);}

function format(){
  const xml=document.getElementById('xmlInput').value.trim();
  const errBox=document.getElementById('errBox');
  errBox.style.display='none';
  if(!xml){document.getElementById('xmlOutput').innerHTML='';_plain='';return;}
  const {ok,doc,msg}=validate(xml);
  if(!ok){errBox.textContent='⚠ '+msg;errBox.style.display='block';return;}
  const indent=getIndent();
  let hasDecl='';
  if(xml.trimStart().startsWith('<?xml')){
    const m=xml.match(/^<\?xml[^?]*\?>/);
    if(m) hasDecl=`<span class="xml-pi">${escH(m[0])}</span>\n`;
  }
  const body=[...doc.childNodes].filter(n=>n.nodeType!==Node.PROCESSING_INSTRUCTION_NODE||n.nodeName!=='xml').map(n=>formatNode(n,0,indent)).join('');
  document.getElementById('xmlOutput').innerHTML=hasDecl+body;
  _plain=formatNodePlain(doc,0,indent).trim();
  document.getElementById('xmlOutput')._plain=_plain;
}

function formatNodePlain(node,depth,indent){
  const ind=indent.repeat(depth);
  if(node.nodeType===Node.TEXT_NODE){const t=node.textContent.trim();return t?ind+t+'\n':'';}
  if(node.nodeType===Node.COMMENT_NODE) return ind+'<!--'+node.textContent+'-->\n';
  if(node.nodeType===Node.DOCUMENT_NODE) return [...node.childNodes].map(c=>formatNodePlain(c,0,indent)).join('');
  if(node.nodeType!==Node.ELEMENT_NODE) return '';
  let attrs='';for(const a of node.attributes)attrs+=` ${a.name}="${a.value}"`;
  const children=[...node.childNodes];
  if(children.length===0) return ind+`<${node.nodeName}${attrs}/>\n`;
  const onlyText=children.length===1&&children[0].nodeType===Node.TEXT_NODE;
  if(onlyText){const t=children[0].textContent.trim();if(t)return ind+`<${node.nodeName}${attrs}>${t}</${node.nodeName}>\n`;}
  let out=ind+`<${node.nodeName}${attrs}>\n`;
  for(const c of children)out+=formatNodePlain(c,depth+1,indent);
  return out+ind+`</${node.nodeName}>\n`;
}

function minify(){
  const xml=document.getElementById('xmlInput').value.trim();
  if(!xml)return;
  const {ok,msg}=validate(xml);
  const errBox=document.getElementById('errBox');
  if(!ok){errBox.textContent='⚠ '+msg;errBox.style.display='block';return;}
  errBox.style.display='none';
  const m=xml.replace(/>\s+</g,'><').replace(/\s{2,}/g,' ').trim();
  document.getElementById('xmlOutput').textContent=m;
  document.getElementById('xmlOutput')._plain=m;
}

function loadSample(){
  document.getElementById('xmlInput').value=`<?xml version="1.0" encoding="UTF-8"?><bookstore><book category="web"><title lang="en">Learning XML</title><author>Erik Ray</author><year>2003</year><price>39.95</price></book><book category="children"><title lang="en">Harry Potter</title><author>J K. Rowling</author><year>2005</year><price>29.99</price></book></bookstore>`;
  format();
}
function clearAll(){document.getElementById('xmlInput').value='';document.getElementById('xmlOutput').innerHTML='';document.getElementById('errBox').style.display='none';}
function copyOutput(){const text=document.getElementById('xmlOutput')._plain||document.getElementById('xmlOutput').textContent;if(!text)return;navigator.clipboard?.writeText(text).then(showToast).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();});}
function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
