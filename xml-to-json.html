    seoHtml:`<h2>XML to JSON 변환기</h2><p>XML 데이터를 JSON으로 즉시 변환합니다. <strong>XML 속성(@), 텍스트 콘텐츠(#text), CDATA, 중첩 요소</strong>를 모두 처리합니다. RSS 피드, SOAP API, SVG, 레거시 시스템의 XML 데이터를 현대 API에 맞는 JSON으로 변환할 때 활용하세요.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>XML 속성은 JSON에서 어떻게 표현되나요?</summary><p>속성은 @속성명 키로 표현됩니다. &lt;tag id="1"&gt; → {"tag":{"@id":"1"}}.</p></details>

<details class="faq-item"><summary>RSS/Atom 피드도 변환 가능한가요?</summary><p>네, RSS/Atom 피드는 표준 XML이므로 변환 가능합니다. 결과 구조는 피드 형식에 따라 다릅니다.</p></details>
<details class="faq-item"><summary>XML 선언(&lt;?xml ...?&gt;)은?</summary><p>XML 선언은 변환 결과에서 제외되고 루트 요소부터 처리됩니다.</p></details>
<details class="faq-item"><summary>대용량 XML도 처리 가능한가요?</summary><p>브라우저 DOMParser를 사용하므로 수 MB 이상의 XML은 성능이 저하될 수 있습니다.</p></details>`
  },
  en:{pageTitle:'XML to JSON Converter - Online XML → JSON | MODOO HUB',h1b:'JSON',sub:'Paste XML → instant JSON conversion',backLink:'← All Tools',langBtn:'🌐 中文',btnCopy:'Copy',btnClear:'Clear',copied:'Copied ✓',errParse:'XML parse error: ',
    seoHtml:`<h2>XML to JSON Converter</h2><p>Instantly convert XML data to JSON. Handles <strong>XML attributes (@), text content (#text), CDATA, and nested elements</strong>. Convert RSS feeds, SOAP APIs, SVG, and legacy XML data to modern JSON format.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>How are XML attributes represented in JSON?</summary><p>Attributes become @attrName keys. &lt;tag id="1"&gt; → {"tag":{"@id":"1"}}.</p></details>
<details class="faq-item"><summary>What about text content?</summary><p>Text becomes a #text key, or a plain string if the element has no children.</p></details>
<details class="faq-item"><summary>Multiple elements with the same tag?</summary><p>Repeated sibling elements become JSON arrays.</p></details>
<details class="faq-item"><summary>XML namespaces?</summary><p>xmlns declarations and prefixes are treated as attributes or included in tag names.</p></details>
<details class="faq-item"><summary>CDATA handling?</summary><p>CDATA section content is extracted as plain text.</p></details>
<details class="faq-item"><summary>Can I convert RSS/Atom feeds?</summary><p>Yes. RSS/Atom are standard XML so they can be converted. Output structure reflects the feed format.</p></details>
<details class="faq-item"><summary>XML declaration (&lt;?xml ...?&gt;)?</summary><p>The XML declaration is excluded from output; processing starts at the root element.</p></details>
<details class="faq-item"><summary>Large XML support?</summary><p>Uses browser DOMParser. Multi-MB XML may cause performance slowdowns.</p></details>`
  },
  zh:{pageTitle:'XML转JSON工具 - 在线XML → JSON转换 | MODOO HUB',h1b:'JSON',sub:'粘贴XML → 即时转换为JSON',backLink:'← 所有工具',langBtn:'🌐 日本語',btnCopy:'复制',btnClear:'清除',copied:'已复制 ✓',errParse:'XML解析错误: ',
    seoHtml:`<h2>XML转JSON工具</h2><p>即时将XML数据转换为JSON。处理XML属性(@)、文本内容(#text)、CDATA和嵌套元素。适用于RSS源、SOAP API、SVG和遗留系统XML数据转换。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>XML属性在JSON中如何表示？</summary><p>属性用@属性名键表示。&lt;tag id="1"&gt; → {"tag":{"@id":"1"}}。</p></details>
<details class="faq-item"><summary>文本内容呢？</summary><p>文本用#text键表示，无子元素时为简单字符串。</p></details>
<details class="faq-item"><summary>同名标签多个怎么办？</summary><p>同名兄弟元素转换为JSON数组。</p></details>
<details class="faq-item"><summary>XML命名空间？</summary><p>xmlns声明和前缀作为属性处理或包含在标签名中。</p></details>
<details class="faq-item"><summary>CDATA如何处理？</summary><p>CDATA内容提取为纯文本。</p></details>
<details class="faq-item"><summary>可以转换RSS/Atom源吗？</summary><p>可以，RSS/Atom是标准XML，可以正常转换。</p></details>
<details class="faq-item"><summary>XML声明(&lt;?xml...?&gt;)？</summary><p>XML声明在输出中被排除，从根元素开始处理。</p></details>
<details class="faq-item"><summary>支持大型XML吗？</summary><p>使用浏览器DOMParser，数MB以上XML可能性能下降。</p></details>`
  },
  ja:{pageTitle:'XMLからJSONへの変換ツール - オンライン XML → JSON | MODOO HUB',h1b:'JSON',sub:'XMLを貼り付け → JSONに即時変換',backLink:'← ホーム',langBtn:'🌐 한국어',btnCopy:'コピー',btnClear:'クリア',copied:'コピー完了 ✓',errParse:'XMLパースエラー: ',
    seoHtml:`<h2>XML to JSON変換ツール</h2><p>XMLデータをJSONに即時変換します。XML属性(@)・テキストコンテンツ(#text)・CDATA・ネスト要素を処理します。RSSフィード・SOAP API・SVGデータの変換に便利です。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>XML属性はJSONでどう表現されますか？</summary><p>属性は@属性名キーになります。&lt;tag id="1"&gt; → {"tag":{"@id":"1"}}。</p></details>
<details class="faq-item"><summary>テキストコンテンツは？</summary><p>#textキーになります。子要素がない場合はシンプルな文字列になります。</p></details>
<details class="faq-item"><summary>同名タグが複数ある場合は？</summary><p>同名の兄弟要素はJSON配列になります。</p></details>
<details class="faq-item"><summary>XMLネームスペースは？</summary><p>xmlns宣言とプレフィックスは属性として処理されるか、タグ名に含まれます。</p></details>
<details class="faq-item"><summary>CDATAはどう処理されますか？</summary><p>CDATAセクションの内容はプレーンテキストとして抽出されます。</p></details>

<details class="faq-item"><summary>XML宣言(&lt;?xml...?&gt;)は？</summary><p>XML宣言は出力から除外され、ルート要素から処理されます。</p></details>

  }

const LANGS=['ko','en','zh','ja'];
let _lang='ko';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('btnCopy').textContent=t.btnCopy;document.getElementById('btnClear').textContent=t.btnClear;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function nodeToJson(node){
  if(node.nodeType===3){const v=node.nodeValue.trim();return v||null;}
  if(node.nodeType===4){return node.nodeValue;}
  const obj={};
  for(let i=0;i<node.attributes.length;i++){
    const a=node.attributes[i];
    obj['@'+a.name]=a.value;
  }
  const children=[];
  node.childNodes.forEach(c=>{
    if(c.nodeType===1||c.nodeType===3||c.nodeType===4){
      const v=nodeToJson(c);
      if(v!==null)children.push({tag:c.tagName,val:v,type:c.nodeType});
    }
  });
  const tagGroups={};
  children.forEach(c=>{
    if(c.type===3||c.type===4){obj['#text']=(obj['#text']||'')+(typeof c.val==='string'?c.val:'');}
    else{
      if(!tagGroups[c.tag])tagGroups[c.tag]=[];
      tagGroups[c.tag].push(c.val);
    }
  });
  Object.entries(tagGroups).forEach(([tag,vals])=>{
    obj[tag]=vals.length===1?vals[0]:vals;
  });
  if(Object.keys(obj).length===0)return null;
  if(Object.keys(obj).length===1&&obj['#text']!==undefined)return obj['#text'];
  return obj;
}
function clearAll(){document.getElementById('xmlIn').value='';document.getElementById('jsonOut').value='';document.getElementById('errMsg').textContent='';}
function convert(){
  const t=_i18n[_lang];const xml=document.getElementById('xmlIn').value.trim();
  if(!xml){document.getElementById('jsonOut').value='';return;}
  try{
    const parser=new DOMParser();const doc=parser.parseFromString(xml,'application/xml');
    const err=doc.querySelector('parsererror');
    if(err){document.getElementById('errMsg').textContent=t.errParse+err.textContent.split('\n')[0];document.getElementById('jsonOut').value='';return;}
    const root=doc.documentElement;
    const result={};result[root.tagName]=nodeToJson(root);
    document.getElementById('jsonOut').value=JSON.stringify(result,null,2);
    document.getElementById('errMsg').textContent='';
  }catch(e){document.getElementById('errMsg').textContent=t.errParse+e.message;}
}
function copyOut(){
  const t=_i18n[_lang];const v=document.getElementById('jsonOut').value;
  if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{
    const btn=document.getElementById('btnCopy');const orig=btn.textContent;
    btn.textContent=t.copied;setTimeout(()=>btn.textContent=orig,2000);
  });
}
_lang=detectLang();applyLang();
</script>
