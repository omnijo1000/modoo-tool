const _i18n={
  ko:{pageTitle:'복합 연평균 성장률(CAGR) 계산기 | 모두의 툴',h1:'📊 복합 연평균 성장률(CAGR)',sub:'투자 수익률과 복리 성장률을 계산합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',startLabel:'시작 값',endLabel:'종료 값',yearsLabel:'기간 (년)',cagrLbl:'CAGR',totalLbl:'총 수익률',absLbl:'절대 증가',tableTitle:'연도별 성장 추이',thYear:'연도',thValue:'값',thGrowth:'성장',seoHtml:`<h2>복합 연평균 성장률(CAGR)이란?</h2><p>CAGR(Compound Annual Growth Rate)은 특정 기간 동안의 복리 연평균 성장률입니다. 투자, 매출, 사용자 수 등 다양한 지표의 성장률을 연 단위로 비교할 때 사용합니다. 단순 성장률과 달리 복리 효과를 반영해 실제 연평균 성장을 더 정확히 나타냅니다. 공식: CAGR = (종료 값 / 시작 값)^(1/연수) - 1. 투자 분석, 비즈니스 성과 평가, 시장 성장 예측에 필수 지표입니다.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. CAGR 공식은 무엇인가요?</summary><p>A. CAGR = (종료 값 / 시작 값)^(1/연수) - 1. 예: 1000이 5년 후 2000이 되면 CAGR = (2000/1000)^(1/5)-1 ≈ 14.87%.</p></details><details class="faq-item"><summary>Q. CAGR과 단순 성장률 차이는?</summary><p>A. 단순 성장률은 시작과 끝만 비교합니다. CAGR은 복리를 반영해 기간이 달라도 공정하게 비교할 수 있습니다.</p></details><details class="faq-item"><summary>Q. 주식 투자 수익률 계산에 쓸 수 있나요?</summary><p>A. 네. 매수 금액을 시작 값, 현재 평가액을 종료 값, 보유 기간을 연수로 입력하면 연평균 수익률이 나옵니다.</p></details><details class="faq-item"><summary>Q. 좋은 CAGR은 얼마인가요?</summary><p>A. 상황에 따라 다릅니다. S&P 500 장기 평균은 약 10%, 고성장 기업은 20%+를 목표로 합니다.</p></details><details class="faq-item"><summary>Q. 반년 단위로 계산하려면?</summary><p>A. 기간을 0.5로 입력하면 됩니다. 소수점 기간도 지원합니다.</p></details><details class="faq-item"><summary>Q. CAGR이 음수가 나왔어요.</summary><p>A. 종료 값이 시작 값보다 작으면 음수(손실)가 됩니다.</p></details><details class="faq-item"><summary>Q. 연도별 표는 무엇을 의미하나요?</summary><p>A. CAGR을 적용했을 때 각 연도 말의 예상 값을 보여줍니다.</p></details><details class="faq-item"><summary>Q. 매출 성장률 예측에 활용할 수 있나요?</summary><p>A. 네. 과거 CAGR을 알면 동일한 성장률이 유지된다고 가정했을 때 미래 매출을 추정할 수 있습니다.</p></details>`},
  en:{pageTitle:'Compound Annual Growth Rate (CAGR) Calculator | Modoo Tools',h1:'📊 CAGR Calculator',sub:'Calculate investment returns and compound growth rate',backLink:'← All Tools',langBtn:'🌐 中文',startLabel:'Start Value',endLabel:'End Value',yearsLabel:'Period (Years)',cagrLbl:'CAGR',totalLbl:'Total Return',absLbl:'Absolute Gain',tableTitle:'Year-by-Year Growth',thYear:'Year',thValue:'Value',thGrowth:'Growth',seoHtml:`<h2>CAGR Calculator</h2><p>CAGR (Compound Annual Growth Rate) measures the mean annual growth rate of an investment over a specified time period longer than one year. It represents one of the most accurate ways to calculate and determine returns for investments. Formula: CAGR = (End Value / Start Value)^(1/Years) - 1. Widely used for investment analysis, business performance evaluation, and market growth forecasting.</p><h2 class="seo-sub">FAQ</h2><details class="faq-item"><summary>Q. What is the CAGR formula?</summary><p>A. CAGR = (End Value / Start Value)^(1/Years) - 1. Example: $1000 growing to $2000 in 5 years = CAGR of ~14.87%.</p></details><details class="faq-item"><summary>Q. What is the difference between CAGR and simple growth rate?</summary><p>A. Simple growth rate only compares start and end. CAGR accounts for compounding and allows fair comparison across different time periods.</p></details><details class="faq-item"><summary>Q. Can I use this for stock investment returns?</summary><p>A. Yes. Enter purchase amount as start value, current value as end value, and holding period as years.</p></details><details class="faq-item"><summary>Q. What is a good CAGR?</summary><p>A. It depends on context. S&P 500 long-term average is ~10%. High-growth companies aim for 20%+.</p></details><details class="faq-item"><summary>Q. Can I calculate for half-year periods?</summary><p>A. Yes. Enter 0.5 for years. Decimal periods are supported.</p></details><details class="faq-item"><summary>Q. I got a negative CAGR.</summary><p>A. If the end value is less than the start value, CAGR is negative (a loss).</p></details><details class="faq-item"><summary>Q. What does the year-by-year table show?</summary><p>A. It shows the projected value at the end of each year when applying the CAGR.</p></details><details class="faq-item"><summary>Q. Can I use this for revenue growth forecasting?</summary><p>A. Yes. If you know the historical CAGR, you can project future revenue assuming the same growth rate continues.</p></details>`},
  zh:{pageTitle:'复合年均增长率(CAGR)计算器 | Modoo工具',h1:'📊 CAGR复合年均增长率计算器',sub:'计算投资回报率和复利增长率',backLink:'← 首页',langBtn:'🌐 日本語',startLabel:'起始值',endLabel:'终止值',yearsLabel:'期间（年）',cagrLbl:'CAGR',totalLbl:'总收益率',absLbl:'绝对增长',tableTitle:'逐年增长趋势',thYear:'年度',thValue:'值',thGrowth:'增长',seoHtml:`<h2>CAGR复合年均增长率计算器</h2><p>CAGR（复合年均增长率）衡量投资在特定时期内的年均增长率，是评估投资回报最准确的方式之一。公式：CAGR = (终止值/起始值)^(1/年数) - 1。广泛用于投资分析、企业绩效评估和市场增长预测。</p><h2 class="seo-sub">常见问题</h2><details class="faq-item"><summary>Q. CAGR的公式是什么？</summary><p>A. CAGR = (终止值/起始值)^(1/年数) - 1。例：1000元5年后变为2000元，CAGR≈14.87%。</p></details><details class="faq-item"><summary>Q. CAGR和简单增长率有什么区别？</summary><p>A. 简单增长率只比较起始和终止。CAGR考虑复利效应，适合跨期比较。</p></details><details class="faq-item"><summary>Q. 可以用于股票投资收益计算吗？</summary><p>A. 可以。将买入金额作为起始值，当前市值作为终止值，持有年限为期间。</p></details><details class="faq-item"><summary>Q. 多少CAGR算好？</summary><p>A. 因情况而异。标普500长期平均约10%，高增长企业目标20%+。</p></details><details class="faq-item"><summary>Q. 可以计算半年期吗？</summary><p>A. 可以，年数输入0.5即可，支持小数。</p></details><details class="faq-item"><summary>Q. CAGR是负数怎么办？</summary><p>A. 终止值小于起始值时，CAGR为负数（亏损）。</p></details><details class="faq-item"><summary>Q. 逐年表格显示什么？</summary><p>A. 显示按该CAGR增长时每年末的预计值。</p></details><details class="faq-item"><summary>Q. 可以用于营收增长预测吗？</summary><p>A. 可以。已知历史CAGR，可预测相同增速下的未来营收。</p></details>`},
  ja:{pageTitle:'複合年間成長率（CAGR）計算機 | Modooツール',h1:'📊 CAGR 複合年間成長率計算機',sub:'投資リターンと複利成長率を計算します',backLink:'← ホーム',langBtn:'🌐 한국어',startLabel:'開始値',endLabel:'終了値',yearsLabel:'期間（年）',cagrLbl:'CAGR',totalLbl:'総リターン',absLbl:'絶対増加',tableTitle:'年次成長推移',thYear:'年',thValue:'値',thGrowth:'成長',seoHtml:`<h2>CAGR（複合年間成長率）計算機とは</h2><p>CAGR（Compound Annual Growth Rate）は、特定期間における年平均の複利成長率です。投資、売上、ユーザー数など様々な指標を年単位で比較する際に使います。公式：CAGR = (終了値/開始値)^(1/年数) - 1。投資分析、ビジネス評価、市場成長予測に欠かせない指標です。</p><h2 class="seo-sub">よくある質問</h2><details class="faq-item"><summary>Q. CAGRの公式は？</summary><p>A. CAGR = (終了値/開始値)^(1/年数) - 1。例：1000が5年後に2000になるとCAGR≒14.87%。</p></details><details class="faq-item"><summary>Q. CAGRと単純成長率の違いは？</summary><p>A. 単純成長率は始点と終点のみ比較。CAGRは複利効果を反映し、異なる期間でも公平に比較できます。</p></details><details class="faq-item"><summary>Q. 株式投資リターンの計算に使えますか？</summary><p>A. はい。購入額を開始値、現在の評価額を終了値、保有期間を年数として入力してください。</p></details><details class="faq-item"><summary>Q. 良いCAGRはいくらですか？</summary><p>A. 状況によります。S&P 500の長期平均は約10%、高成長企業は20%+を目標とします。</p></details><details class="faq-item"><summary>Q. 半年単位で計算できますか？</summary><p>A. 年数に0.5を入力すれば計算できます。小数対応しています。</p></details><details class="faq-item"><summary>Q. CAGRがマイナスになりました。</summary><p>A. 終了値が開始値より小さい場合、CAGRはマイナス（損失）になります。</p></details><details class="faq-item"><summary>Q. 年次テーブルは何を示しますか？</summary><p>A. そのCAGRを適用した場合の各年末の予想値を示します。</p></details><details class="faq-item"><summary>Q. 売上成長予測に使えますか？</summary><p>A. はい。過去のCAGRが分かれば、同じ成長率が続くと仮定して将来の売上を予測できます。</p></details>`}

function detectLang(){const p=new URLSearchParams(location.search).get('lang');if(p&&_i18n[p])return p;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
function applyLang(l){const t=_i18n[l]||_i18n.ko;document.title=t.pageTitle;document.documentElement.lang=l;document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});document.getElementById('seoContent').innerHTML=t.seoHtml||'';}
function toggleLang(){const order=['ko','en','zh','ja'];const next=order[(order.indexOf(currentLang)+1)%order.length];currentLang=next;localStorage.setItem('modoo_lang',next);const url=new URL(location.href);url.searchParams.set('lang',next);history.replaceState(null,'',url);applyLang(next);}
currentLang=detectLang();
document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));

function calc(){
  const sv=parseFloat(document.getElementById('startVal').value);
  const ev=parseFloat(document.getElementById('endVal').value);
  const yr=parseFloat(document.getElementById('years').value);
  if(isNaN(sv)||isNaN(ev)||isNaN(yr)||sv<=0||yr<=0){
    document.getElementById('resultRow').style.display='none';
    document.getElementById('tableCard').style.display='none';
    return;
  }
  const cagr=Math.pow(ev/sv,1/yr)-1;
  const total=(ev/sv-1)*100;
  const abs=ev-sv;

  document.getElementById('cagrNum').textContent=(cagr*100).toFixed(2)+'%';
  document.getElementById('cagrNum').style.color=cagr>=0?'var(--green)':'var(--red)';
  document.getElementById('totalReturn').textContent=total.toFixed(2)+'%';
  document.getElementById('absGain').textContent=(abs>=0?'+':'')+abs.toLocaleString(undefined,{maximumFractionDigits:2});
  document.getElementById('resultRow').style.display='flex';

  // Year-by-year table (max 20 rows)
  const maxRows=Math.min(Math.ceil(yr),20);
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  const maxVal=sv*Math.pow(1+cagr,maxRows);
  for(let i=1;i<=maxRows;i++){
    const v=sv*Math.pow(1+cagr,i);
    const pct=((v-sv)/sv*100).toFixed(1);
    const barW=Math.round(v/maxVal*120);
    const tr=document.createElement('tr');
    if(i===maxRows)tr.style.color='var(--accent)';
    tr.innerHTML=`<td>${i}</td><td>${v.toLocaleString(undefined,{maximumFractionDigits:2})}</td><td>${pct}%</td><td><div class="bar-cell"><div class="bar" style="width:${barW}px"></div></div></td>`;
    tbody.appendChild(tr);
  }
  document.getElementById('tableCard').style.display='block';
}
</script>
