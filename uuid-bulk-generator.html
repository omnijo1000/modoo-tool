function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}

function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblNum','lblQuote','btnGen','btnCopy','btnDown'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});

  document.getElementById('lblFormat').firstChild.textContent=t.lblFormat;

  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function genUUID(){
  if(crypto.randomUUID)return crypto.randomUUID();
  const b=crypto.getRandomValues(new Uint8Array(16));b[6]=(b[6]&0x0f)|0x40;b[8]=(b[8]&0x3f)|0x80;
  const h=Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('');
  return`${h.slice(0,8)}-${h.slice(8,12)}-${h.slice(12,16)}-${h.slice(16,20)}-${h.slice(20)}`;
}
function fmtUUID(u,fmt){
  switch(fmt){
    case 'upper':return u.toUpperCase();
    case 'nohyphen':return u.replace(/-/g,'');
    case 'braces':return`{${u}}`;
    case 'parens':return`(${u})`;
    case 'urn':return`urn:uuid:${u}`;
    default:return u;
  }
}
function generate(){
  const t=_i18n[_lang];let n=parseInt(document.getElementById('countIn').value)||10;n=Math.max(1,Math.min(1000,n));

  document.getElementById('outBox').textContent=lines.join('\n');
  document.getElementById('outCount').textContent=t.outCount(n);
}
function copyAll(){const t=_i18n[_lang];navigator.clipboard.writeText(_uuids.join('\n')).then(()=>{const btn=document.getElementById('btnCopy');const o=btn.textContent;btn.textContent=t.copied;setTimeout(()=>btn.textContent=t.btnCopy,1500);});}
function download(){const blob=new Blob([_uuids.join('\n')],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='uuids.txt';a.click();}
