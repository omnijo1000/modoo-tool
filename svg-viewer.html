function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function buildBgChips(){
  document.getElementById('bgChips').innerHTML=BG_COLORS.map(c=>`<div class="bg-chip${_bg===c?' active':''}" style="background:${c==='transparent'?'repeating-conic-gradient(#888 0% 25%, #444 0% 50%) 0 0/8px 8px':c};" onclick="setBg('${c}')"></div>`).join('');
}
function setBg(c){_bg=c;buildBgChips();document.getElementById('previewWrap').style.background=c==='transparent'?'repeating-conic-gradient(#333 0% 25%, #1a1a1a 0% 50%) 0 0/16px 16px':c;}
function zoom(d){_scale=Math.max(.25,Math.min(4,_scale+d));document.getElementById('previewInner').style.transform=`scale(${_scale})`;document.getElementById('zoomVal').textContent=Math.round(_scale*100)+'%';}
function resetZoom(){_scale=1;document.getElementById('previewInner').style.transform='scale(1)';document.getElementById('zoomVal').textContent='100%';}
function render(){
  const t=_i18n[_lang];const code=document.getElementById('svgCode').value.trim();
  const errEl=document.getElementById('errMsg');errEl.textContent='';
  if(!code){document.getElementById('previewInner').innerHTML='';document.getElementById('infoRow').innerHTML='';return;}
  if(!code.toLowerCase().includes('<svg')){errEl.textContent=t.errInvalid;document.getElementById('previewInner').innerHTML='';return;}
  const parser=new DOMParser();const doc=parser.parseFromString(code,'image/svg+xml');
  const perr=doc.querySelector('parsererror');
  if(perr){errEl.textContent=t.errInvalid+' '+perr.textContent.split('\n')[0].slice(0,80);document.getElementById('previewInner').innerHTML='';return;}
  const svg=doc.querySelector('svg');
  if(!svg){errEl.textContent=t.errInvalid;return;}
  const vb=svg.getAttribute('viewBox')||'—';
  const w=svg.getAttribute('width')||'—';
  const h=svg.getAttribute('height')||'—';
  const blob=new Blob([code],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const img=document.createElement('img');img.style.maxWidth='100%';img.style.maxHeight='280px';img.src=url;
  document.getElementById('previewInner').innerHTML='';document.getElementById('previewInner').appendChild(img);
  document.getElementById('infoRow').innerHTML=`<div class="info-chip">viewBox: <span>${vb}</span></div><div class="info-chip">w: <span>${w}</span></div><div class="info-chip">h: <span>${h}</span></div>`;
}
function downloadSvg(){
  const code=document.getElementById('svgCode').value.trim();if(!code)return;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([code],{type:'image/svg+xml'}));a.download='image.svg';a.click();
}
function copySvg(){
  const t=_i18n[_lang];const b=document.getElementById('btnCopy');
  navigator.clipboard.writeText(document.getElementById('svgCode').value).then(()=>{b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,1500);});
}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('lblCode').textContent=t.lblCode;document.getElementById('btnDl').textContent=t.btnDl;document.getElementById('btnCopy').textContent=t.btnCopy;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;buildBgChips();
}
document.getElementById('svgCode').value=DEFAULT_SVG;
_lang=detectLang();applyLang();render();
</script>
<script src="related.js"></script>
