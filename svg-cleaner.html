    seoHtml:`<h2>SVG Cleaner</h2><p>Adobe Illustrator, Inkscape, Figma, Sketch 등의 벡터 편집 프로그램에서 내보낸 SVG 파일에는 웹에서 사용하기 위한 불필요한 에디터 전용 요소들이 포함됩니다. 이 도구는 이러한 요소들을 제거하여 웹에서 사용할 수 있는 깔끔한 SVG 파일을 만들어줍니다. Inkscape의 sodipodi/inkscape 네임스페이스, Illustrator의 i:/serif: 네임스페이스 등을 정리합니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>SVG Optimizer와 차이점은?</summary><p>SVG Cleaner는 에디터 전용 요소 제거에 특화되어 있고, SVG Optimizer는 파일 크기 최적화에 더 집중합니다. 두 도구를 함께 사용하면 가장 효과적입니다.</p></details>
<details class="faq-item"><summary>Inkscape SVG를 정리하면 어떤 요소가 제거되나요?</summary><p>sodipodi:, inkscape: 네임스페이스의 모든 요소와 속성이 제거됩니다. 이는 Inkscape 편집 내부 정보로 렌더링에 영향을 주지 않습니다.</p></details>
<details class="faq-item"><summary>정리 후 SVG가 제대로 표시되는지 어떻게 확인하나요?</summary><p>출력 코드를 브라우저에서 직접 열거나 SVG Viewer 도구를 사용해 미리보기를 확인하세요.</p></details>
<details class="faq-item"><summary>Figma에서 내보낸 SVG도 정리가 되나요?</summary><p>예, Figma 전용 속성(figma:, data-figma-)이 제거됩니다.</p></details>
<details class="faq-item"><summary>에디터 생성 ID 제거 옵션은 언제 사용하나요?</summary><p>SVG를 웹에 인라인으로 삽입할 때 Page_1, Layer_2 같은 자동 ID가 충돌할 수 있습니다. 이때 제거가 유용합니다.</p></details>
<details class="faq-item"><summary>정리 후 파일 크기가 얼마나 줄어드나요?</summary><p>에디터에 따라 다르지만 Inkscape SVG는 메타데이터가 많아 10~40% 감소하는 경우가 많습니다.</p></details>

    seoHtml:`<h2>SVG Cleaner</h2><p>SVGs exported from Adobe Illustrator, Inkscape, Figma, and Sketch often contain editor-specific elements that are unnecessary for web use. This tool removes those artifacts — sodipodi/inkscape namespaces from Inkscape, i:/serif: namespaces from Illustrator, and Figma-specific attributes — resulting in clean, web-ready SVG files.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What&apos;s the difference between SVG Cleaner and SVG Optimizer?</summary><p>SVG Cleaner specializes in removing editor-specific artifacts; SVG Optimizer focuses on size reduction. Using both gives the best results.</p></details>

};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','dropText','dropHint','sectionLabel','btnClean','btnCopy','btnDl','btnClear','lblInput','lblOutput','reportTitle'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  renderOpts();
}
function renderOpts(){
  const grid=document.getElementById('cleanGrid');grid.innerHTML='';
  CLEAN_OPTS.forEach(o=>{
    const lbl=o[_lang]||o.ko;const desc=o[_lang+'Desc']||o.koDesc;
    const div=document.createElement('label');div.className='clean-item';
    div.innerHTML=`<input type="checkbox" ${state[o.key]?'checked':''}><div class="clean-text"><div class="clean-label">${lbl}</div><div class="clean-desc">${desc}</div></div>`;
    div.querySelector('input').addEventListener('change',e=>state[o.key]=e.target.checked);
    grid.appendChild(div);
  });
}
function cleanSvg(svg){
  let s=svg;const report=[];
  if(state.aiClean){const before=s.length;s=s.replace(/xmlns:i="[^"]*"/g,'').replace(/<i:[^/]*\/>/g,'').replace(/<i:[\s\S]*?<\/i:[^>]*>/g,'').replace(/i:[a-z-]+=("[^"]*"|'[^']*')/g,'').replace(/xmlns:serif="[^"]*"/g,'').replace(/serif:[a-z-]+=("[^"]*"|'[^']*')/g,'').replace(/xmlns:xlink="http:\/\/www\.w3\.org\/1999\/xlink"/g,'');if(s.length<before)report.push('Adobe Illustrator');}
  if(state.inkClean){const before=s.length;s=s.replace(/xmlns:sodipodi="[^"]*"/g,'').replace(/xmlns:inkscape="[^"]*"/g,'').replace(/<sodipodi:[^/]*\/>/g,'').replace(/<sodipodi:[\s\S]*?<\/sodipodi:[^>]*>/g,'').replace(/sodipodi:[a-z-]+=("[^"]*"|'[^']*')/g,'').replace(/<inkscape:[^/]*\/>/g,'').replace(/<inkscape:[\s\S]*?<\/inkscape:[^>]*>/g,'').replace(/inkscape:[a-z-]+=("[^"]*"|'[^']*')/g,'');if(s.length<before)report.push('Inkscape');}
  if(state.figmaClean){const before=s.length;s=s.replace(/xmlns:figma="[^"]*"/g,'').replace(/figma:[a-z-]+=("[^"]*"|'[^']*')/g,'').replace(/data-figma-[a-z-]+=("[^"]*"|'[^']*')/g,'');if(s.length<before)report.push('Figma');}
  if(state.sketchClean){const before=s.length;s=s.replace(/xmlns:sketch="[^"]*"/g,'').replace(/sketch:[a-z-]+=("[^"]*"|'[^']*')/g,'').replace(/<sketch:[\s\S]*?<\/sketch:[^>]*>/g,'');if(s.length<before)report.push('Sketch');}
  if(state.removeIds){s=s.replace(/\sid="(Layer|layer|Group|group|Rectangle|Circle|Path|Ellipse|Polygon|Line|Text|Image|g|path|rect|circle)[_\-]?\d*"/g,'');}
  if(state.cleanNs){s=s.replace(/xmlns:[a-z]+="[^"]*"\s*/g,'').replace(/<svg /,'<svg xmlns="http://www.w3.org/2000/svg" ');}
  if(state.removeEmptyAttr){s=s.replace(/\s[a-z][a-z0-9-]*=""\s*/g,' ');}
  if(state.removeNl){s=s.replace(/[\t\n\r]+/g,' ').replace(/\s{2,}/g,' ').replace(/> </g,'><').trim();}
  return{result:s,report};
}
function doClean(){
  const inp=document.getElementById('inputSvg').value.trim();if(!inp)return;
  const{result,report}=cleanSvg(inp);
  document.getElementById('outputSvg').value=result;
  const t=_i18n[_lang];const inSz=new Blob([inp]).size;const outSz=new Blob([result]).size;
  const saved=inSz-outSz;const pct=((saved/inSz)*100).toFixed(1);
  document.getElementById('statBefore').innerHTML=`${t.before}: <span>${fmt(inSz)}</span>`;
  document.getElementById('statAfter').innerHTML=`${t.after}: <span>${fmt(outSz)}</span>`;
  document.getElementById('statSaved').innerHTML=`${t.saved}: <span>${fmt(saved)} (${pct}%)</span>`;
  document.getElementById('statsBar').style.display='flex';
  document.getElementById('infoIn').textContent=fmt(inSz);
  document.getElementById('infoOut').textContent=fmt(outSz);
  if(report.length){
    const ul=document.getElementById('reportList');ul.innerHTML='';
    report.forEach(r=>{const li=document.createElement('li');li.textContent=r;ul.appendChild(li);});
    document.getElementById('reportBox').style.display='block';
  }
}
function fmt(b){return b>1024?`${(b/1024).toFixed(1)}KB`:`${b}B`;}
function updateInSize(){document.getElementById('infoIn').textContent=fmt(new Blob([document.getElementById('inputSvg').value]).size);}
function copyOut(){const v=document.getElementById('outputSvg').value;if(v)navigator.clipboard.writeText(v);}
function downloadOut(){const v=document.getElementById('outputSvg').value;if(!v)return;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([v],{type:'image/svg+xml'}));a.download='cleaned.svg';a.click();}
function clearAll(){['inputSvg','outputSvg'].forEach(id=>document.getElementById(id).value='');document.getElementById('statsBar').style.display='none';document.getElementById('reportBox').style.display='none';}
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)load(f);});
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])load(e.target.files[0]);});
function load(f){const r=new FileReader();r.onload=e=>{document.getElementById('inputSvg').value=e.target.result;updateInSize();};r.readAsText(f);}
_lang=detectLang();applyLang();
</script>
