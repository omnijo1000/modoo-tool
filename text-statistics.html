function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function countSyllables(word){return (word.toLowerCase().match(/[aeiouy]+/g)||[]).length||1;}
function fleschScore(text){
  const words=text.trim().split(/\s+/).filter(Boolean);
  if(words.length<10)return null;
  const sents=Math.max(1,(text.match(/[.!?](\s|$)/g)||[]).length);
  const syls=words.reduce((a,w)=>a+countSyllables(w),0);
  const score=206.835-1.015*(words.length/sents)-84.6*(syls/words.length);
  return Math.round(Math.max(0,Math.min(100,score)));
}
function fleschLevel(score,t){
  if(score>=90)return t.vEasy;if(score>=70)return t.easy;if(score>=50)return t.fair;if(score>=30)return t.difficult;return t.vDiff;
}
function analyze(){

  const chars=text.length;

  const words=text.trim()?text.trim().split(/\s+/).filter(Boolean):[];
  const sentences=(text.match(/[.!?](\s|$)/g)||[]).length;
  const paragraphs=text.trim()?(text.split(/\n{2,}/).filter(s=>s.trim())).length:0;
  const lines=text?text.split('\n').length:0;

  const avgLen=words.length?(words.reduce((a,w)=>a+w.length,0)/words.length).toFixed(1):0;
  const unique=words.length?new Set(words.map(w=>w.toLowerCase())).size:0;
  const statData=[
    {key:'chars',val:chars.toLocaleString()},
    {key:'charsNoSpace',val:charsNoSpace.toLocaleString()},
    {key:'words',val:words.length.toLocaleString()},
    {key:'sentences',val:sentences.toLocaleString()},
    {key:'paragraphs',val:paragraphs.toLocaleString()},
    {key:'lines',val:lines.toLocaleString()},
    {key:'readMin',val:readMin},
    {key:'avgWordLen',val:avgLen},
    {key:'uniqueWords',val:unique.toLocaleString()},
  ];
  document.getElementById('statGrid').innerHTML=statData.map(s=>`<div class="stat-card"><div class="stat-val">${s.val}</div><div class="stat-label">${t.stats[s.key]}</div></div>`).join('');

    document.getElementById('fleschLabel').textContent=fleschLevel(fs,t.flesch);
    document.getElementById('fleschBar').style.width=fs+'%';
  }else{fbox.style.display='none';}
  const freqBox=document.getElementById('freqBox');
  if(text.trim()){
    const freq=new Map();
    for(const c of text)if(c!==' '&&c!=='\n'&&c!=='\t')freq.set(c,(freq.get(c)||0)+1);
    const top=[...freq.entries()].sort((a,b)=>b[1]-a[1]).slice(0,20);
    const maxCnt=top[0]?.[1]||1;
    freqBox.style.display='block';
    document.getElementById('freqBars').innerHTML=top.map(([c,n])=>`<div class="freq-row">
      <div class="freq-ch">${c.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
      <div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:${n/maxCnt*100}%"></div></div>
      <div class="freq-cnt">${n}</div>
    </div>`).join('');
  }else{freqBox.style.display='none';}
}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('lblInput').textContent=t.lblInput;document.getElementById('lblFlesch').textContent=t.lblFlesch;document.getElementById('lblFreq').textContent=t.lblFreq;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;analyze();
}
_lang=detectLang();applyLang();
