  ko:{h1Accent:'이력서 생성기',sub:'경력, 기술, 성과를 입력하면 전문 이력서 초안을 즉시 생성합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',
    lblName:'이름',lblTarget:'목표 직무 / 포지션',lblExp:'총 경력 (년)',lblSkills:'핵심 기술 스택 (쉼표 구분)',lblHistory:'주요 경력사항',lblEdu:'학력',lblLang2:'이력서 언어',

    sec:{profile:'프로필 요약',skills:'핵심 기술',history:'경력사항',edu:'학력'},
    seoHtml:`<h2>AI 이력서 생성기</h2><p>목표 직무, 경력, 기술 스택, 주요 성과를 입력하면 전문적인 이력서 초안이 자동으로 생성됩니다. 신입부터 시니어까지 다양한 경력 수준의 이력서 작성을 지원합니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>좋은 이력서의 핵심 요소는?</summary><p>명확한 직무 목표, 측정 가능한 성과, 관련 기술 스택, 간결한 경력 요약이 필수입니다.</p></details>
<details class="faq-item"><summary>이력서 길이는 어느 정도가 적당한가요?</summary><p>신입은 1페이지, 경력자는 2페이지가 표준입니다. 핵심 내용만 담으세요.</p></details>

<details class="faq-item"><summary>ATS란 무엇인가요?</summary><p>Applicant Tracking System. 회사가 이력서를 자동 필터링하는 시스템으로, 키워드 매칭이 중요합니다.</p></details>

<details class="faq-item"><summary>포트폴리오는 이력서에 포함해야 하나요?</summary><p>개발자, 디자이너 등 포트폴리오 직군은 GitHub, Behance 링크를 반드시 포함하세요.</p></details>`
  },
  en:{h1Accent:'Resume Generator',sub:'Enter experience, skills, and achievements to instantly generate a professional resume',backLink:'← All Tools',langBtn:'🌐 中文',
    lblName:'Full Name',lblTarget:'Target Role / Position',lblExp:'Years of Experience',lblSkills:'Key Skills (comma separated)',lblHistory:'Work Experience',lblEdu:'Education',lblLang2:'Resume Language',
    btnGen:'Generate Resume',btnCopy:'Copy',copied:'✓ Copied',placeholder:'Your resume will appear here.',
    expLevels:{'0':'Entry Level','1':'Junior (1-2 yrs)','3':'Mid-Level (3-5 yrs)','6':'Senior (6-10 yrs)','11':'Expert (10+ yrs)'},
    sec:{profile:'Professional Summary',skills:'Core Skills',history:'Work Experience',edu:'Education'},
    seoHtml:`<h2>AI Resume Generator</h2><p>Enter your target role, experience, skills, and achievements to auto-generate a professional resume draft. Supports entry to senior level resumes.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Key elements of a good resume?</summary><p>Clear job target, measurable achievements, relevant skills, concise summary.</p></details>
<details class="faq-item"><summary>Ideal resume length?</summary><p>1 page for entry level, 2 pages for experienced professionals.</p></details>
<details class="faq-item"><summary>What is the STAR method?</summary><p>Situation-Task-Action-Result — a structured way to describe achievements.</p></details>
<details class="faq-item"><summary>What is ATS?</summary><p>Applicant Tracking System — scans resumes for keywords before a human sees them.</p></details>
<details class="faq-item"><summary>Can I generate resumes in other languages?</summary><p>Yes — select the language in Resume Language dropdown.</p></details>
<details class="faq-item"><summary>Can I edit the generated resume?</summary><p>Yes — use it as a draft and customize with your real experience.</p></details>
<details class="faq-item"><summary>Should I include a photo?</summary><p>In Western countries, generally no. In Asia, often expected. Check local norms.</p></details>
<details class="faq-item"><summary>Should I add portfolio links?</summary><p>Yes for creative/tech roles — include GitHub, Behance, or portfolio URL.</p></details>`
  },
  zh:{h1Accent:'简历生成器',sub:'输入经历、技能和成就，立即生成专业简历',backLink:'← 所有工具',langBtn:'🌐 日本語',
    lblName:'姓名',lblTarget:'目标职位',lblExp:'工作年限',lblSkills:'核心技能（逗号分隔）',lblHistory:'工作经历',lblEdu:'教育背景',lblLang2:'简历语言',
    btnGen:'生成简历',btnCopy:'复制',copied:'✓ 已复制',placeholder:'简历将在此处显示。',
    expLevels:{'0':'应届毕业生','1':'初级 (1-2年)','3':'中级 (3-5年)','6':'高级 (6-10年)','11':'专家 (10年以上)'},
    sec:{profile:'个人简介',skills:'核心技能',history:'工作经历',edu:'教育背景'},
    seoHtml:`<h2>AI简历生成器</h2><p>输入目标职位、工作经历、技能和成就，自动生成专业简历草稿。支持应届生到高级职位的简历撰写。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>好简历的关键要素？</summary><p>明确的职位目标、可量化的成就、相关技能、简洁的个人简介。</p></details>
<details class="faq-item"><summary>简历应该多长？</summary><p>应届生1页，有经验者2页为标准。</p></details>
<details class="faq-item"><summary>什么是STAR方法？</summary><p>情境-任务-行动-结果，结构化描述工作成就的方法。</p></details>
<details class="faq-item"><summary>什么是ATS？</summary><p>申请人跟踪系统，在人工审核前自动筛选简历关键词。</p></details>
<details class="faq-item"><summary>可以生成其他语言的简历吗？</summary><p>可以，在简历语言下拉菜单中选择即可。</p></details>
<details class="faq-item"><summary>可以修改生成的简历吗？</summary><p>可以，以草稿为基础，根据实际经历进行修改。</p></details>
<details class="faq-item"><summary>需要附上照片吗？</summary><p>亚洲国家通常需要，西方国家一般不建议添加。</p></details>
<details class="faq-item"><summary>需要添加作品集链接吗？</summary><p>技术和创意职位建议添加GitHub或作品集链接。</p></details>`
  },
  ja:{h1Accent:'履歴書ジェネレーター',sub:'経歴・スキル・実績を入力してプロの履歴書を即時生成します',backLink:'← ホーム',langBtn:'🌐 한국어',
    lblName:'氏名',lblTarget:'希望職種/ポジション',lblExp:'経験年数',lblSkills:'主要スキル（カンマ区切り）',lblHistory:'職務経歴',lblEdu:'学歴',lblLang2:'履歴書の言語',
    btnGen:'履歴書を生成',btnCopy:'コピー',copied:'✓ コピー済み',placeholder:'履歴書がここに表示されます。',
    expLevels:{'0':'新卒・未経験','1':'ジュニア (1-2年)','3':'ミドル (3-5年)','6':'シニア (6-10年)','11':'エキスパート (10年以上)'},
    sec:{profile:'職務要約',skills:'主要スキル',history:'職務経歴',edu:'学歴'},
    seoHtml:`<h2>AI履歴書ジェネレーター</h2><p>希望職種、職務経歴、スキル、実績を入力するとプロフェッショナルな履歴書の下書きが自動生成されます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>良い履歴書のポイントは？</summary><p>明確な職務目標、数値化された実績、関連スキル、簡潔な自己PR。</p></details>
<details class="faq-item"><summary>履歴書の適切な長さは？</summary><p>新卒は1ページ、経験者は2ページが目安です。</p></details>
<details class="faq-item"><summary>STARメソッドとは？</summary><p>状況・課題・行動・結果を構造的に記述する実績表現法です。</p></details>
<details class="faq-item"><summary>ATSとは何ですか？</summary><p>応募者追跡システム。書類選考前に自動でキーワードをスキャンします。</p></details>
<details class="faq-item"><summary>他の言語の履歴書も生成できますか？</summary><p>はい、言語ドロップダウンから選択してください。</p></details>
<details class="faq-item"><summary>生成した履歴書は修正できますか？</summary><p>はい、下書きとして実際の経験に合わせてカスタマイズしてください。</p></details>
<details class="faq-item"><summary>写真は必要ですか？</summary><p>日本では一般的に必要です。海外では不要な場合が多いです。</p></details>
<details class="faq-item"><summary>ポートフォリオリンクは必要ですか？</summary><p>エンジニアやデザイナーはGitHubやポートフォリオURLを必ず記載してください。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.h1Accent+' | MODOO HUB';
  ['h1Accent','subEl','backLink','langBtn','lblName','lblTarget','lblExp','lblSkills','lblHistory','lblEdu','lblLang2','btnGen','btnCopy'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function generateResume(){
  const t=_i18n[_lang];
  const sec=t.sec;
  const name=document.getElementById('name').value.trim()||'[이름]';
  const targetRole=document.getElementById('target').value.trim()||'[직무]';
  const expKey=document.getElementById('exp').value;
  const expLabel=t.expLevels[expKey];
  const skills=document.getElementById('skills').value.trim();
  const history=document.getElementById('history').value.trim();
  const edu=document.getElementById('edu').value.trim();
  let out=`${name}\n${targetRole} · ${expLabel}\n`;
  out+=`${'─'.repeat(40)}\n\n`;
  out+=`【${sec.profile}】\n`;
  out+=`${expLabel} ${targetRole}`;
  if(skills)out+=`로 ${skills.split(',').slice(0,3).map(s=>s.trim()).join(', ')} 전문성 보유.`;
  out+='\n\n';
  if(skills){out+=`【${sec.skills}】\n${skills}\n\n`;}
  if(history){out+=`【${sec.history}】\n${history}\n\n`;}
  if(edu){out+=`【${sec.edu}】\n${edu}\n`;}
  _outText=out;
  document.getElementById('outBox').textContent=out;
}
function copyOut(){
  const t=_i18n[_lang];
  if(!_outText)return;
  navigator.clipboard.writeText(_outText).then(()=>{const b=document.getElementById('btnCopy');b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,2000);});
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
