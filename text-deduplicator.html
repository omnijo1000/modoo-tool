function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblCase','lblTrim','lblEmpty','lblSort','lblSortRev','lblInput','lblOutput','btnClear','btnCopy','btnSample','btnCopyBtn'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  dedup();
}
function gch(id){return document.getElementById(id).checked;}
function dedup(){
  const t=_i18n[_lang];
  const raw=document.getElementById('textIn').value;
  let lines=raw.split('\n');
  const total=lines.length;
  if(gch('chkEmpty'))lines=lines.filter(l=>l.trim()!=='');
  const seen=new Set();const unique=[];
  for(const ln of lines){
    let key=gch('chkTrim')?ln.trim():ln;
    if(gch('chkCase'))key=key.toLowerCase();
    if(!seen.has(key)){seen.add(key);unique.push(ln);}
  }
  let result=[...unique];
  if(gch('chkSort'))result.sort((a,b)=>a.localeCompare(b));
  if(gch('chkSortRev'))result.sort((a,b)=>b.localeCompare(a));
  document.getElementById('outEl').textContent=result.join('\n');
  const removed=total-result.length;
  document.getElementById('statsBar').innerHTML=`<span>${t.stats(total,result.length,removed<0?0:removed)}</span>`;
}
function clearInput(){document.getElementById('textIn').value='';dedup();}
function copyOut(){navigator.clipboard.writeText(document.getElementById('outEl').textContent);}
function loadSample(){document.getElementById('textIn').value='apple\nbanana\napple\norange\nbanana\ngrape\nOrange\n\ngrape';dedup();}
_lang=detectLang();applyLang();
</script>
