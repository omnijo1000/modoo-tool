  const match=await bcrypt.compare(pwd,hash);
  const parts=hash.split('$');const cost=parts[2];
  rBox.innerHTML=`<div class="result-box ${match?'match-ok':'match-fail'}">${match?t.matchOk:t.matchFail}</div>`;
  iBox.innerHTML=`<div class="hash-info">Version: <span>$${parts[1]}$</span> &nbsp; Cost: <span>${cost}</span> &nbsp; Salt: <span>${hash.slice(7,29)}</span></div>`;
  document.getElementById('btnVerify').disabled=false;document.getElementById('loadMsg').style.display='none';
}
function clearAll(){document.getElementById('pwdIn').value='';document.getElementById('hashIn').value='';document.getElementById('resultBox').innerHTML='';document.getElementById('hashInfoBox').innerHTML='';}
_lang=detectLang();applyLang();
</script>
