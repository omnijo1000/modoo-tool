<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#818cf8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:640px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:500px){.row2,.row3{grid-template-columns:1fr;}}
.field label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
.inp:focus{border-color:var(--accent);}
select.inp{cursor:pointer;}
.chk-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.chk-row label{font-size:13px;color:var(--text-muted);cursor:pointer;}
input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;}
.contrib-wrap{display:none;margin-bottom:12px;}
.calc-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-top:4px;}
.calc-btn:hover{opacity:.85;}
.result{margin-top:14px;display:none;}
.main-res{background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:18px;text-align:center;margin-bottom:12px;}
.main-val{font-size:40px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
.main-label{font-size:12px;color:var(--text-muted);margin-top:4px;}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
@media(max-width:480px){.res-grid{grid-template-columns:1fr 1fr;}}
.res-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;text-align:center;}
.res-v{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent);}
.res-l{font-size:11px;color:var(--text-dim);margin-top:3px;}
.growth-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.bar-title{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:8px;}
.bar-track{display:flex;height:14px;border-radius:7px;overflow:hidden;}
.bar-principal{background:#818cf8;height:100%;}
.bar-gain{background:#34d399;height:100%;}
.bar-legend{display:flex;gap:16px;margin-top:8px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim);}
.year-table{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.yt-header{display:grid;grid-template-columns:60px 1fr 1fr 1fr;padding:8px 12px;background:var(--surface2);font-size:10px;font-family:'DM Mono',monospace;color:var(--text-dim);}
.yt-row{display:grid;grid-template-columns:60px 1fr 1fr 1fr;padding:8px 12px;border-top:1px solid var(--border);font-size:11px;font-family:'DM Mono',monospace;}
.yt-scroll{max-height:220px;overflow-y:auto;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo strong{color:var(--text-muted);}
.seo-sub{font-size:14px;font-weight:700;color:var(--text-muted);margin:20px 0 8px;}
.seo-ul{padding-left:18px;margin-bottom:12px;}
.seo-ul li{font-size:13px;color:var(--text-dim);line-height:1.9;margin-bottom:4px;}
.faq-item{border-bottom:1px solid var(--border);padding:10px 0;}
.faq-item summary{font-size:13px;color:var(--text-muted);cursor:pointer;list-style:none;padding-right:16px;}
.faq-item summary::-webkit-details-marker{display:none;}
.faq-item[open] summary{color:var(--text);}
.faq-item p{font-size:12px;color:var(--text-dim);line-height:1.8;margin-top:8px;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<script>
const _i18n={
  ko:{sub:'투자 수익률 · CAGR · 총 수익 계산기',langBtn:'🌐 EN',backBtn:'← 모두의 툴',initLabel:'초기 투자금',rateLabel:'연 수익률 (%)',yearsLabel:'투자 기간 (년)',compLabel:'복리 주기',compAnn:'연간',compQtr:'분기',compMon:'월간',contribChk:'정기 추가 납입',contribAmtLabel:'월 납입금',calcBtn:'▶ 계산하기',finalLabel:'최종 자산',gainLabel:'수익금',barTitle:'원금 vs 수익',principalLabel:'원금',interestLabel:'수익',ytYear:'연도',ytDeposit:'납입 누계',ytGain:'수익',ytTotal:'총 자산',seoH2:'투자 수익률 계산기 완벽 가이드',seoP:'투자 수익률 계산기는 초기 투자금, 연 수익률, 투자 기간, 복리 주기를 입력하면 최종 자산·총 수익·CAGR(연평균 성장률)·ROI를 즉시 계산합니다. 복리 공식: FV = PV × (1 + r/n)^(n×t), 여기서 r=연이율, n=연간 복리 횟수, t=투자 기간. 월 정기 납입 시 FV = PV×(1+r/n)^nt + PMT×[(1+r/n)^nt − 1]/(r/n). 복리 효과는 시간과 함께 기하급수적으로 커지므로 장기 투자가 핵심입니다. 연 7% 수익률, 1,000만원 30년 투자 시 약 7,600만원(무납입)으로 성장합니다.',
    exH3:'활용 예시',
    exList:'<li>1,000만원, 연 7%, 30년 → S&P500 평균 수익률 시뮬레이션</li><li>매월 30만원 적립, 연 5%, 20년 → 적립식 펀드 최종 자산 계산</li><li>1억원 원금, 연 8%, 10년 → 부동산 임대 투자 수익 추정</li><li>복리 주기(연/분기/월)별 최종 자산 차이 비교</li><li>은퇴까지 20년 남았을 때 목표 자산 달성을 위한 필요 수익률 역산</li><li>주식·채권·예금 세 가지 수익률(10%/5%/3%)의 30년 후 자산 비교</li>',
    faqH3:'자주 묻는 질문',
    faqList:`<details class="faq-item"><summary>Q. 복리 계산 공식은 무엇인가요?</summary><p>FV = PV × (1 + r/n)^(n×t). PV=현재 투자금, r=연이율(소수), n=연간 복리 횟수(연간=1, 분기=4, 월=12), t=투자 기간(년). 예: 1,000만원, 연 7%, 월 복리, 30년 → FV = 10,000,000 × (1+0.07/12)^(12×30) ≈ 8,116만원.</p></details><details class="faq-item"><summary>Q. CAGR(연평균 성장률)이란 무엇인가요?</summary><p>CAGR = (최종 자산/초기 투자금)^(1/투자 기간) − 1. 투자 기간 동안의 평균 연간 성장률을 나타냅니다. 중간에 등락이 있더라도 최종 결과를 기준으로 계산하므로, 다른 기간의 투자를 비교할 때 유용합니다.</p></details><details class="faq-item"><summary>Q. 복리 주기(연/분기/월)에 따른 차이는?</summary><p>복리 횟수가 많을수록 최종 자산이 커집니다. 1,000만원, 연 10%, 10년 → 연간 복리: 2,593만원, 분기 복리: 2,685만원, 월 복리: 2,707만원. 차이는 장기·고수익률일수록 더 커집니다.</p></details><details class="faq-item"><summary>Q. 월 정기 납입(적립식)이 얼마나 효과적인가요?</summary><p>매월 30만원을 연 7%로 30년 적립하면 총 납입금 1억 800만원이 약 3억 6,000만원으로 성장합니다. 적은 금액이라도 조기 시작과 꾸준한 납입이 일시 투자보다 효과적인 경우가 많습니다.</p></details><details class="faq-item"><summary>Q. 투자 기간이 짧을 때 수익률을 높이면 될까요?</summary><p>단기에는 수익률보다 원금이 중요하고, 장기일수록 수익률과 복리가 지배적 요인이 됩니다. 단기(5년 이하)에 고수익률을 추구하면 리스크가 급격히 높아집니다. 투자 기간을 늘리는 것이 수익률을 높이는 것보다 효율적입니다.</p></details><details class="faq-item"><summary>Q. S&P 500의 역사적 평균 수익률은 얼마인가요?</summary><p>1928년 이후 S&P 500의 연평균 수익률은 약 9.8~10%(배당 재투자 포함). 인플레이션 조정 후 실질 수익률은 약 6.5~7%. 한국 코스피 장기 평균은 약 8~10%입니다. 과거 수익률이 미래를 보장하지는 않습니다.</p></details><details class="faq-item"><summary>Q. 인플레이션을 감안한 실질 수익률은?</summary><p>실질 수익률 ≈ 명목 수익률 − 인플레이션율. 인플레이션율 3% 환경에서 명목 7% 수익률의 실질 수익률은 약 3.9%. 실질 구매력 보전을 위해서는 인플레이션율 이상의 수익률이 필수입니다.</p></details><details class="faq-item"><summary>Q. 세금이 투자 수익에 미치는 영향은?</summary><p>한국: 국내 주식 매매차익은 대주주 아닐 경우 현재 비과세(2024년 기준). 해외 주식 양도소득세 22%. 금융 이자·배당소득 15.4%(원천징수). 세후 수익률을 계산기에 입력하면 세금 후 순수익 예측 가능.</p></details><details class="faq-item"><summary>Q. 목표 자산을 달성하려면 수익률이 얼마나 필요한가요?</summary><p>역산 공식: r = (FV/PV)^(1/t) − 1. 예: 1,000만원 → 10년 후 2,000만원 목표 → r = (2)^(1/10) − 1 ≈ 7.18%/년. 이 계산기에 다양한 수익률을 입력해 필요 수익률을 역으로 찾을 수 있습니다.</p></details><details class="faq-item"><summary>Q. 분산 투자와 단일 자산 투자의 차이는?</summary><p>분산 투자는 리스크를 줄이지만 평균 수익률도 다소 낮아질 수 있습니다. 포트폴리오 전체 수익률 = 각 자산 수익률의 가중 평균. 주식 70%+채권 30% 포트폴리오 수익률 시뮬레이션은 두 자산의 가중 수익률을 계산기에 입력하세요.</p></details><details class="faq-item"><summary>Q. 이 계산기는 세금·수수료를 포함하나요?</summary><p>기본 계산은 세금·수수료를 포함하지 않습니다. 정확한 순수익 계산을 위해 수익률에서 수수료(ETF의 경우 0.03~0.5%/년)와 세율을 빼고 입력하세요. 예: 명목 10% 수익, 세율 22%, 수수료 0.3% → 입력 수익률 = 10%×(1−0.22)−0.3% ≈ 7.5%.</p></details><details class="faq-item"><summary>Q. 72의 법칙이란?</summary><p>투자금이 2배 되는 기간 추산 공식: 72 ÷ 연수익률(%). 예: 연 6% → 72/6 = 12년 후 2배. 연 10% → 약 7.2년. 역으로 목표 기간 내 2배가 되려면 필요 수익률 = 72/년수로 추산합니다.</p></details>`,},
  en:{sub:'Investment return · CAGR · Total gain calculator',langBtn:'🌐 中文',backBtn:'← All Tools',initLabel:'Initial Investment',rateLabel:'Annual Return (%)',yearsLabel:'Investment Period (yrs)',compLabel:'Compounding',compAnn:'Annually',compQtr:'Quarterly',compMon:'Monthly',contribChk:'Regular contributions',contribAmtLabel:'Monthly Contribution',calcBtn:'▶ Calculate',finalLabel:'Final Value',gainLabel:'Total Gain',barTitle:'Principal vs Gain',principalLabel:'Principal',interestLabel:'Gain',ytYear:'Year',ytDeposit:'Total Deposited',ytGain:'Gain',ytTotal:'Total Value',seoH2:'Investment Return Calculator — Complete Guide',seoP:'This calculator computes compound investment returns from initial investment, annual return rate, investment period, and compounding frequency. Compound interest formula: FV = PV × (1 + r/n)^(n×t), where r = annual rate, n = compounding periods/year, t = years. With monthly contributions: FV = PV×(1+r/n)^nt + PMT×[(1+r/n)^nt − 1]/(r/n). The power of compounding grows exponentially with time — a $10,000 investment at 7% annually for 30 years grows to ~$76,000 without adding a cent.',
    exH3:'Usage Examples',
    exList:'<li>$10,000 at 7% annually for 30 years → simulate S&P 500 average return</li><li>$300/month contribution at 5% for 20 years → dollar-cost averaging final value</li><li>$100,000 at 8% for 10 years → real estate rental income projection</li><li>Compare monthly vs quarterly vs annual compounding on the same principal</li><li>Reverse-engineer: what annual return do I need to reach $1M from $100K in 20 years?</li><li>Compare three scenarios: stocks (10%), bonds (5%), savings (3%) over 30 years</li>',
    faqH3:'Frequently Asked Questions',
    faqList:`<details class="faq-item"><summary>Q. What is the compound interest formula?</summary><p>FV = PV × (1 + r/n)^(n×t). PV = present value, r = annual rate (decimal), n = compounding periods per year (1=annual, 4=quarterly, 12=monthly), t = years. Example: $10,000 at 7% monthly compounding for 30 years → FV = $81,165.</p></details><details class="faq-item"><summary>Q. What is CAGR?</summary><p>CAGR (Compound Annual Growth Rate) = (Final Value / Initial Value)^(1/years) − 1. It represents the smoothed annual growth rate over a period, regardless of intermediate volatility. Useful for comparing investments over different time horizons.</p></details><details class="faq-item"><summary>Q. How does compounding frequency affect returns?</summary><p>More frequent compounding means slightly higher returns. $10,000 at 10% for 10 years: Annual compounding = $25,937; Quarterly = $26,851; Monthly = $27,070. The difference grows larger with longer periods and higher rates.</p></details><details class="faq-item"><summary>Q. How powerful is regular monthly contribution (DCA)?</summary><p>$300/month at 7% for 30 years: Total deposited $108,000 grows to ~$360,000. Small, consistent contributions — started early — often outperform lump-sum investing for the average investor due to behavioral advantages of automation.</p></details><details class="faq-item"><summary>Q. Is it better to increase return rate or investment period?</summary><p>For short terms, principal size matters most; for long terms, rate and compounding dominate. Extending 20 → 30 years at 7% more than doubles the final value. Increasing rate 7% → 10% over 30 years triples it. Time is the most reliable lever for most investors.</p></details><details class="faq-item"><summary>Q. What is the historical average S&P 500 return?</summary><p>Since 1928, the S&P 500 has returned ~9.8–10% annually (with dividends reinvested). Inflation-adjusted real return is ~6.5–7%. Past performance is not a guarantee of future results. Use 7% as a conservative long-term planning estimate.</p></details><details class="faq-item"><summary>Q. How do I account for inflation?</summary><p>Real return rate ≈ nominal rate − inflation rate. At 3% inflation, a nominal 7% return yields ~3.9% real return. For long-term planning, use real returns to estimate purchasing power. Enter the inflation-adjusted rate in this calculator for real-value projections.</p></details><details class="faq-item"><summary>Q. What about taxes on investment gains?</summary><p>This calculator does not include taxes. For a net-of-tax estimate: multiply your return rate by (1 − tax rate). US long-term capital gains: 0–20% depending on income. UK: 10–20% CGT above the annual exempt amount. Always consult a tax advisor for personalized planning.</p></details><details class="faq-item"><summary>Q. What return rate do I need to reach my goal?</summary><p>Use the inverse formula: r = (FV/PV)^(1/t) − 1. Example: $10,000 → $20,000 in 10 years → r = (2)^(0.1) − 1 ≈ 7.18%/year. Try different return rates in this calculator to find your required growth rate.</p></details><details class="faq-item"><summary>Q. How do management fees affect returns?</summary><p>Fee drag compounds over time: 1% annual fee on a 7% return reduces effective return to 6%, cutting a 30-year $10,000 investment from $76,000 to $57,000 — a ~25% loss. Prefer low-cost index funds (ETF expense ratios: 0.03–0.2%) over actively managed funds (1–2%).</p></details><details class="faq-item"><summary>Q. What is the Rule of 72?</summary><p>A mental shortcut: years to double your money ≈ 72 ÷ annual return %. At 6%: 72/6 = 12 years. At 10%: ~7.2 years. Reverse: to double in 8 years, you need ~72/8 = 9% return. Quick and surprisingly accurate for rates between 2% and 20%.</p></details><details class="faq-item"><summary>Q. Should I use annual or monthly compounding in this calculator?</summary><p>Most stock market investments compound approximately daily or continuously. Monthly compounding closely approximates this and is the most realistic setting for long-term investment projections. Annual compounding slightly underestimates final value; monthly is recommended for planning purposes.</p></details>`,},
  zh:{sub:'投资收益率 · CAGR · 总收益计算器',langBtn:'🌐 日本語',backBtn:'← 所有工具',initLabel:'初始投资',rateLabel:'年化收益率（%）',yearsLabel:'投资年限',compLabel:'复利频率',compAnn:'每年',compQtr:'每季度',compMon:'每月',contribChk:'定期追加投资',contribAmtLabel:'月投入金额',calcBtn:'▶ 计算',finalLabel:'最终资产',gainLabel:'收益金额',barTitle:'本金 vs 收益',principalLabel:'本金',interestLabel:'收益',ytYear:'年份',ytDeposit:'累计投入',ytGain:'收益',ytTotal:'总资产',seoH2:'投资收益计算器完全指南',seoP:'投资收益计算器通过输入初始投资金额、年化收益率、投资年限和复利频率，即时计算最终资产、总收益、CAGR（年均复合增长率）和ROI。复利公式：FV = PV × (1 + r/n)^(n×t)，其中r=年利率，n=年复利次数，t=投资年限。含月定投时：FV = PV×(1+r/n)^nt + PMT×[(1+r/n)^nt − 1]/(r/n)。复利效应随时间呈指数级增长——10,000元以年化7%投资30年，不追加投入，最终可增长至约76,000元。',
    exH3:'使用示例',
    exList:'<li>10,000元，年化7%，30年 → 模拟S&P500历史平均收益</li><li>每月定投300元，年化5%，20年 → 计算定投最终资产</li><li>100,000元，年化8%，10年 → 不动产租金收益估算</li><li>对比月复利/季复利/年复利对最终资产的影响</li><li>反推：从100,000元到1,000,000元需要20年，年化收益率需要多少？</li><li>对比股票(10%)、债券(5%)、存款(3%)三种方案30年后的资产差异</li>',
    faqH3:'常见问题',
    faqList:`<details class="faq-item"><summary>Q. 复利计算公式是什么？</summary><p>FV = PV × (1 + r/n)^(n×t)。PV=现值，r=年利率（小数），n=年复利次数（年=1，季=4，月=12），t=年数。示例：10,000元以7%月复利投资30年 → FV ≈ 81,165元。</p></details><details class="faq-item"><summary>Q. 什么是CAGR（年均复合增长率）？</summary><p>CAGR = (最终资产/初始投资)^(1/年数) − 1。表示投资期间的平均年化增长率，不受中间波动影响。适合比较不同投资期限的投资产品。</p></details><details class="faq-item"><summary>Q. 复利频率对收益有多大影响？</summary><p>复利越频繁，最终收益越高。10,000元，年化10%，10年：年复利=25,937元；季复利=26,851元；月复利=27,070元。差距随投资期限延长和收益率提高而显著扩大。</p></details><details class="faq-item"><summary>Q. 每月定投（定期定额）有多大效果？</summary><p>每月定投300元，年化7%，30年：累计投入108,000元，最终增长至约360,000元。小额持续定投——越早开始越好——通常比一次性投入更适合普通投资者，有效平摊成本。</p></details><details class="faq-item"><summary>Q. 是否提高收益率更重要，还是延长投资期限更重要？</summary><p>短期内本金规模最重要，长期则收益率和复利主导。将投资期从20年延长至30年（年化7%）的最终资产超过2倍；将收益率从7%提升至10%（30年）的最终资产超过3倍。时间是多数普通投资者最可靠的优势。</p></details><details class="faq-item"><summary>Q. S&P 500历史平均收益率是多少？</summary><p>自1928年以来，S&P 500年均收益率约9.8~10%（含股息再投资）。扣除通胀后实际收益率约6.5~7%。过去表现不代表未来收益。长期规划建议使用7%作为保守估算。</p></details><details class="faq-item"><summary>Q. 如何考虑通货膨胀因素？</summary><p>实际收益率 ≈ 名义收益率 − 通胀率。年通胀3%环境下，名义7%收益的实际收益约3.9%。长期规划建议输入通胀调整后的收益率，以评估实际购买力增长。</p></details><details class="faq-item"><summary>Q. 投资收益需要缴税吗？</summary><p>本计算器不含税收因素。税后估算：将收益率乘以（1−税率）。中国A股：目前个人股票买卖暂免征收资本利得税；股息红利税率10%或20%。具体税务规划建议咨询专业顾问。</p></details><details class="faq-item"><summary>Q. 达到目标资产需要什么样的收益率？</summary><p>反推公式：r = (FV/PV)^(1/t) − 1。示例：10,000元 → 10年后20,000元 → r = (2)^(0.1) − 1 ≈ 7.18%/年。在本计算器中尝试不同收益率，即可找到达成目标所需的年化回报。</p></details><details class="faq-item"><summary>Q. 管理费用对长期收益有多大影响？</summary><p>费用拖累随复利累积：年费1%将7%收益率降至6%，10,000元30年后从76,000元减至57,000元，损失约25%。优先选择低成本指数基金（ETF费率0.03~0.2%）而非主动管理基金（1~2%）。</p></details><details class="faq-item"><summary>Q. 什么是"72法则"？</summary><p>快速估算资产翻倍所需年数：72 ÷ 年化收益率（%）。年化6%：72/6=12年翻倍；年化10%：约7.2年翻倍。反推：8年内翻倍需要约72/8=9%的年化收益率。适用于2%~20%收益率范围，精度惊人。</p></details><details class="faq-item"><summary>Q. 应该选择年复利还是月复利？</summary><p>股票市场投资实际上近似每日或连续复利。月复利最接近真实情况，是长期投资规划的最佳选项。年复利会略微低估最终资产值，建议使用月复利进行规划。</p></details>`,},
  ja:{sub:'投資リターン · CAGR · 総利益計算機',langBtn:'🌐 한국어',backBtn:'← ホーム',initLabel:'初期投資額',rateLabel:'年間収益率 (%)',yearsLabel:'投資期間 (年)',compLabel:'複利頻度',compAnn:'毎年',compQtr:'四半期',compMon:'毎月',contribChk:'定期積立',contribAmtLabel:'月積立額',calcBtn:'▶ 計算する',finalLabel:'最終資産',gainLabel:'利益額',barTitle:'元本 vs 利益',principalLabel:'元本',interestLabel:'利益',ytYear:'年',ytDeposit:'累計投入額',ytGain:'利益',ytTotal:'総資産',seoH2:'投資リターン計算機 完全ガイド',seoP:'投資リターン計算機は初期投資額・年間収益率・投資期間・複利頻度を入力することで、最終資産・総利益・CAGR（年平均成長率）・ROIを即座に計算します。複利公式：FV = PV × (1 + r/n)^(n×t)。r=年利率、n=年間複利回数、t=年数。月積立あり：FV = PV×(1+r/n)^nt + PMT×[(1+r/n)^nt − 1]/(r/n)。複利効果は時間とともに指数関数的に拡大します。年7%で10,000円を30年間投資すると、追加投資なしで約76,000円に成長します。',
    exH3:'活用例',
    exList:'<li>10,000円、年7%、30年 → S&P500の歴史的平均収益率でシミュレーション</li><li>毎月3,000円積立、年5%、20年 → 積立投資の最終資産を計算</li><li>100,000円、年8%、10年 → 不動産賃貸収益の推定</li><li>月次/四半期/年次複利の最終資産の差を比較</li><li>100,000円から20年で1,000,000円に到達するために必要な年率を逆算</li><li>株式(10%)/債券(5%)/預金(3%)の3シナリオを30年後で比較</li>',
    faqH3:'よくある質問',
    faqList:`<details class="faq-item"><summary>Q. 複利計算の公式は何ですか？</summary><p>FV = PV × (1 + r/n)^(n×t)。PV=現在の投資額、r=年利率（小数）、n=年間複利回数（年=1、四半期=4、月=12）、t=年数。例：10,000円を年7%・月複利で30年 → FV ≈ 81,165円。</p></details><details class="faq-item"><summary>Q. CAGRとは何ですか？</summary><p>CAGR（年平均成長率）= (最終資産/初期投資)^(1/年数) − 1。投資期間中の平均的な年間成長率を示し、途中の変動に関係なく最終結果から計算します。異なる期間の投資を比較する際に有効です。</p></details><details class="faq-item"><summary>Q. 複利頻度によって収益はどれほど変わりますか？</summary><p>複利回数が多いほど最終資産が増えます。10,000円、年10%、10年：年複利=25,937円；四半期=26,851円；月複利=27,070円。期間が長く収益率が高いほど差が大きくなります。</p></details><details class="faq-item"><summary>Q. 毎月の積立投資（ドルコスト平均法）はどれほど効果的ですか？</summary><p>毎月3,000円を年7%で30年積み立てると：累計投資額108,000円が約360,000円に成長します。少額でも早く始め、継続することが一括投資を上回るケースも多く、行動面での自動化メリットもあります。</p></details><details class="faq-item"><summary>Q. 収益率を上げるより投資期間を延ばす方が重要ですか？</summary><p>短期は元本規模が最重要、長期では収益率と複利が支配的要因になります。年7%で20年→30年に延ばすと最終資産は2倍以上に。収益率7%→10%（30年）では最終資産が3倍超に。時間は多くの投資家にとって最も確実なレバーです。</p></details><details class="faq-item"><summary>Q. S&P 500の歴史的平均収益率は？</summary><p>1928年以来、S&P 500の年平均収益率は約9.8〜10%（配当再投資込み）。インフレ調整後の実質収益率は約6.5〜7%。過去の実績が将来を保証するわけではありません。長期計画には7%を保守的な目安として使用することを推奨します。</p></details><details class="faq-item"><summary>Q. インフレを考慮するにはどうすればよいですか？</summary><p>実質収益率 ≈ 名目収益率 − インフレ率。年3%インフレ環境では名目7%の実質リターンは約3.9%。長期計画では購買力の実質成長を把握するため、インフレ調整後の収益率を入力することを推奨します。</p></details><details class="faq-item"><summary>Q. 税金は投資収益にどう影響しますか？</summary><p>本計算機は税金を含みません。税引後の推定には収益率に(1−税率)を掛けてください。日本：株式の配当・譲渡益税率は約20.315%（所得税+住民税）。NISAを活用することで非課税の恩恵が受けられます。</p></details><details class="faq-item"><summary>Q. 目標資産に必要な収益率はどう計算しますか？</summary><p>逆算式：r = (FV/PV)^(1/t) − 1。例：10,000円→10年後20,000円の目標 → r = (2)^(0.1) − 1 ≈ 7.18%/年。本計算機でさまざまな収益率を入力して目標達成に必要な年率を探すことができます。</p></details><details class="faq-item"><summary>Q. 運用コストが長期収益に与える影響は？</summary><p>コストドラッグは複利で拡大します：年1%の手数料が7%収益率を6%に下げると、10,000円の30年後の資産は76,000円から57,000円へ約25%減少。低コストのインデックスファンド（ETF：0.03〜0.2%）をアクティブ運用（1〜2%）より優先することが重要です。</p></details><details class="faq-item"><summary>Q. 72の法則とは何ですか？</summary><p>資産が2倍になる年数の概算：72 ÷ 年利率(%)。年6%：72/6=12年で2倍。年10%：約7.2年。逆に8年で2倍にするには72/8=9%の収益率が必要です。2〜20%の収益率範囲で驚くほど正確な近似式です。</p></details><details class="faq-item"><summary>Q. 年複利と月複利、どちらを使うべきですか？</summary><p>株式市場への投資は実際にはほぼ日次・連続複利に近い形で成長します。月複利がこれに最も近く、長期投資計画の最良の設定です。年複利は最終資産をやや過小評価するため、計画目的には月複利の使用を推奨します。</p></details>`,},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});document.querySelectorAll('option[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k])el.textContent=t[k];});}
function fmt(n){return Math.round(n).toLocaleString(_lang==='ko'?'ko-KR':_lang==='ja'?'ja-JP':'en-US');}
function calc(){
  const P=parseFloat(document.getElementById('initInv').value)||0;
  const r=parseFloat(document.getElementById('annRate').value)/100||0;
  const y=parseInt(document.getElementById('years').value)||1;
  const n=parseInt(document.getElementById('comp').value)||12;
  const useC=document.getElementById('useContrib').checked;
  const monthly=useC?(parseFloat(document.getElementById('contribAmt').value)||0):0;
  const rn=r/n;
  const periods=n*y;
  let fv=P*Math.pow(1+rn,periods);
  if(monthly>0)fv+=monthly*(Math.pow(1+rn,periods)-1)/rn;
  const totalDeposit=P+monthly*12*y;
  const gain=fv-totalDeposit;
  const cagr=(Math.pow(fv/(P||1),1/y)-1)*100;
  const roi=(gain/totalDeposit)*100;
  const t=_i18n[_lang];
  document.getElementById('rFinal').textContent=fmt(fv);
  document.getElementById('rCagr').textContent=cagr.toFixed(2)+'%';
  document.getElementById('rGain').textContent=fmt(gain);
  document.getElementById('rRoi').textContent=roi.toFixed(1)+'%';
  const pPct=Math.round(totalDeposit/fv*100);
  const gPct=100-pPct;
  document.getElementById('barP').style.width=pPct+'%';
  document.getElementById('barG').style.width=gPct+'%';
  document.getElementById('legP').textContent=pPct+'%';
  document.getElementById('legG').textContent=gPct+'%';
  const rows=[];
  for(let yr=1;yr<=Math.min(y,50);yr++){
    const p=n*yr;
    let v=P*Math.pow(1+rn,p);
    if(monthly>0)v+=monthly*(Math.pow(1+rn,p)-1)/rn;
    const dep=P+monthly*12*yr;
    rows.push(`<div class="yt-row"><span>${yr}</span><span>${fmt(dep)}</span><span>${fmt(v-dep)}</span><span>${fmt(v)}</span></div>`);
  }
  document.getElementById('ytBody').innerHTML=rows.join('');
  document.getElementById('result').style.display='block';
}
_lang=detectLang();applyLang();
</script>
