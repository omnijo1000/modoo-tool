function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('tab1').textContent=t.tab1;document.getElementById('tab2').textContent=t.tab2;
  document.getElementById('labelPayload').textContent=t.labelPayload;document.getElementById('labelAnalysis').textContent=t.labelAnalysis;
  document.getElementById('labelSecret').textContent=t.labelSecret;document.getElementById('labelSig').textContent=t.labelSig;
  document.getElementById('labelBody').textContent=t.labelBody;document.getElementById('labelVerifyResult').textContent=t.labelVerifyResult;
  document.getElementById('btnGH').textContent=t.btnGH;document.getElementById('btnStripe').textContent=t.btnStripe;
  document.getElementById('btnClear').textContent=t.btnClear;document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function switchTab(n){
  document.getElementById('section1').style.display=n===1?'':'none';
  document.getElementById('section2').style.display=n===2?'':'none';
  document.getElementById('tab1').className='tab'+(n===1?' active':'');
  document.getElementById('tab2').className='tab'+(n===2?' active':'');
}
function analyzePayload(){
  const raw=document.getElementById('payload').value.trim();const box=document.getElementById('analysisBox');
  if(!raw){box.innerHTML='';return;}
  try{
    const obj=JSON.parse(raw);
    const keys=Object.keys(obj);
    let html=`<span class="info">JSON valid — ${keys.length} top-level keys</span>\n\n`;
    keys.forEach(k=>{
      const v=obj[k];const t=Array.isArray(v)?'array['+v.length+']':typeof v;
      html+=`<span class="key-badge">${k}</span><span style="color:var(--text-dim)">${t}</span>\n`;
    });
    if(obj.action)html+=`\n<span style="color:var(--accent)">action: ${obj.action}</span>`;
    if(obj.event)html+=`\n<span style="color:var(--accent)">event: ${obj.event}</span>`;
    box.innerHTML=html;
  }catch(e){box.innerHTML=`<span class="err">JSON parse error: ${e.message}</span>`;}
}
function loadGithubExample(){
  document.getElementById('payload').value=JSON.stringify({"action":"push","ref":"refs/heads/main","repository":{"name":"my-repo","full_name":"alice/my-repo","private":false},"pusher":{"name":"alice","email":"alice@example.com"},"commits":[{"id":"abc123","message":"fix: resolve auth bug","author":{"name":"Alice"}}],"head_commit":{"id":"abc123","message":"fix: resolve auth bug"}},null,2);analyzePayload();
}
function loadStripeExample(){
  document.getElementById('payload').value=JSON.stringify({"id":"evt_test_1234","object":"event","type":"payment_intent.succeeded","data":{"object":{"id":"pi_test_1234","object":"payment_intent","amount":2000,"currency":"usd","status":"succeeded"}},"created":1718000000},null,2);analyzePayload();
}
function clearPayload(){document.getElementById('payload').value='';document.getElementById('analysisBox').innerHTML='';}
async function verifySignature(){
  const t=_i18n[_lang];
  const secret=document.getElementById('secret').value;
  const sig=document.getElementById('signature').value.trim();
  const body=document.getElementById('rawBody').value;
  const box=document.getElementById('verifyBox');
  if(!secret||!sig||!body){box.innerHTML='';return;}
  try{
    const enc=new TextEncoder();
    const key=await crypto.subtle.importKey('raw',enc.encode(secret),{name:'HMAC',hash:'SHA-256'},false,['sign']);
    const mac=await crypto.subtle.sign('HMAC',key,enc.encode(body));
    const hex=Array.from(new Uint8Array(mac)).map(b=>b.toString(16).padStart(2,'0')).join('');
    const computed='sha256='+hex;
    const match=sig===computed||sig===hex;
    box.innerHTML=match?`<span class="ok">${t.sigOk}</span>\n${t.sigComputed} ${computed}`:`<span class="err">${t.sigFail}</span>\n${t.sigComputed} ${computed}\n受信: ${sig}`;
  }catch(e){box.innerHTML=`<span class="err">Error: ${e.message}</span>`;}
}
_lang=detectLang();applyLang();
</script>
