<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Line Sorter - Sort Lines Online Free</title>
<meta name="description" content="Free online text line sorter. Sort lines alphabetically A-Z or Z-A, by length, numerically, or randomly. Supports case-sensitive sorting and removing empty lines.">

<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:700px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.panel-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:5px;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;resize:vertical;min-height:180px;outline:none;line-height:1.6;}
textarea:focus{border-color:var(--accent);}
textarea[readonly]{color:var(--text-muted);}
.sort-btns{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;}
.sort-btn{padding:7px 14px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--text-muted);background:none;}
.sort-btn:hover,.sort-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(96,165,250,.08);}
.opts{display:flex;flex-wrap:wrap;gap:12px;margin:10px 0 12px;align-items:center;}
.opt{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;cursor:pointer;}
.opt input{accent-color:var(--accent);}
.btn-row{display:flex;gap:8px;margin:12px 0;}
.btn{padding:9px 20px;border-radius:8px;font-size:12px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;border:none;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{opacity:.85;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.copy-toast{display:none;font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-left:4px;}
.info{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin:4px 0 10px;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6334638921720175" crossorigin="anonymous"></script>
<meta property="og:title" content="Text Line Sorter - Sort Lines Online">
<meta property="og:image" content="https://modoohub.com/og-image.png">
</head>
<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>Text Line <span>Sorter</span></h1>
  <p class="sub" data-i18n="sub">텍스트 줄을 알파벳순·길이순·숫자순·무작위로 정렬</p>

  <div class="panel-label" data-i18n="inputLabel">입력</div>
  <textarea id="inputText" data-i18n-ph="inputPh" placeholder="정렬할 텍스트를 입력하세요..." oninput="liveSort()"></textarea>

  <div class="sort-btns">
    <button class="sort-btn active" data-sort="az" onclick="setSortMode(this)" data-i18n="sortAZ">A → Z</button>
    <button class="sort-btn" data-sort="za" onclick="setSortMode(this)" data-i18n="sortZA">Z → A</button>
    <button class="sort-btn" data-sort="short" onclick="setSortMode(this)" data-i18n="sortShort">길이 짧은순</button>
    <button class="sort-btn" data-sort="long" onclick="setSortMode(this)" data-i18n="sortLong">길이 긴순</button>
    <button class="sort-btn" data-sort="num" onclick="setSortMode(this)" data-i18n="sortNum">숫자순</button>
    <button class="sort-btn" data-sort="rand" onclick="setSortMode(this)" data-i18n="sortRand">무작위</button>
  </div>

  <div class="opts">
    <label class="opt"><input type="checkbox" id="caseSens" onchange="liveSort()"><span data-i18n="caseSens">대소문자 구분</span></label>
    <label class="opt"><input type="checkbox" id="remEmpty" checked onchange="liveSort()"><span data-i18n="remEmpty">빈 줄 제거</span></label>
    <label class="opt"><input type="checkbox" id="trimWs" onchange="liveSort()"><span data-i18n="trimWs">앞뒤 공백 제거</span></label>
    <label class="opt"><input type="checkbox" id="remDup" onchange="liveSort()"><span data-i18n="remDup">중복 제거</span></label>
  </div>

  <div class="info" id="infoLine"></div>
  <div class="panel-label" data-i18n="outputLabel">출력</div>
  <textarea id="outputText" readonly data-i18n-ph="outputPh" placeholder="결과가 여기에 표시됩니다..."></textarea>

  <div class="btn-row">
    <button class="btn btn-ghost" onclick="copyOut()" data-i18n="copyBtn">복사</button>
    <button class="btn btn-ghost" onclick="clearAll()" data-i18n="clearBtn">지우기</button>
    <span class="copy-toast" id="toast" data-i18n="copied">✓ 복사됨</span>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">Text Line Sorter란?</h2>
    <p data-i18n="seoP">텍스트의 줄을 알파벳순(A-Z, Z-A), 길이순, 숫자순, 무작위로 정렬합니다. 중복 제거와 공백 처리 옵션도 제공합니다.</p>
  </div>
  <footer>Text Line Sorter · Free Online Tool</footer>
</main>
<script>
const _i18n={
  ko:{sub:'텍스트 줄을 알파벳순·길이순·숫자순·무작위로 정렬',langBtn:'🌐 EN',backBtn:'← 모두의 툴',inputLabel:'입력',inputPh:'정렬할 텍스트를 입력하세요...',outputLabel:'출력',outputPh:'결과가 여기에 표시됩니다...',sortAZ:'A → Z',sortZA:'Z → A',sortShort:'길이 짧은순',sortLong:'길이 긴순',sortNum:'숫자순',sortRand:'무작위',caseSens:'대소문자 구분',remEmpty:'빈 줄 제거',trimWs:'앞뒤 공백 제거',remDup:'중복 제거',copyBtn:'복사',clearBtn:'지우기',copied:'✓ 복사됨',seoH2:'Text Line Sorter란?',seoP:'텍스트 줄을 다양한 방식으로 정렬합니다.'},
  en:{sub:'Sort text lines alphabetically, by length, numerically, or randomly',langBtn:'🌐 中文',backBtn:'← All Tools',inputLabel:'Input',inputPh:'Paste text to sort here...',outputLabel:'Output',outputPh:'Result will appear here...',sortAZ:'A → Z',sortZA:'Z → A',sortShort:'Shortest first',sortLong:'Longest first',sortNum:'Numeric',sortRand:'Random',caseSens:'Case sensitive',remEmpty:'Remove blank lines',trimWs:'Trim whitespace',remDup:'Remove duplicates',copyBtn:'Copy',clearBtn:'Clear',copied:'✓ Copied',seoH2:'Text Line Sorter',seoP:'Sort text lines alphabetically (A-Z, Z-A), by length, numerically, or randomly. Options for duplicates removal and whitespace trimming.'},
  zh:{sub:'按字母、长度、数字或随机顺序排列文本行',langBtn:'🌐 한국어',backBtn:'← 所有工具',inputLabel:'输入',inputPh:'粘贴要排序的文本...',outputLabel:'输出',outputPh:'结果显示在这里...',sortAZ:'A → Z',sortZA:'Z → A',sortShort:'最短优先',sortLong:'最长优先',sortNum:'数字顺序',sortRand:'随机',caseSens:'区分大小写',remEmpty:'删除空行',trimWs:'去除首尾空白',remDup:'去重',copyBtn:'复制',clearBtn:'清除',copied:'✓ 已复制',seoH2:'文本行排序器',seoP:'按字母顺序（A-Z、Z-A）、长度、数字或随机顺序排列文本行，支持去重和空白处理。'},
};
let _lang='ko',_sortMode='az';
const LANGS=['ko','en','zh'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.getElementById('inputText').placeholder=t.inputPh;document.getElementById('outputText').placeholder=t.outputPh;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});liveSort();}
function setSortMode(btn){document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');_sortMode=btn.dataset.sort;liveSort();}
function liveSort(){
  const text=document.getElementById('inputText').value;
  if(!text.trim()){document.getElementById('outputText').value='';document.getElementById('infoLine').textContent='';return;}
  const cs=document.getElementById('caseSens').checked;
  const re=document.getElementById('remEmpty').checked;
  const tw=document.getElementById('trimWs').checked;
  const rd=document.getElementById('remDup').checked;
  let lines=text.split('\n');
  if(tw)lines=lines.map(l=>l.trim());
  if(re)lines=lines.filter(l=>l!=='');
  if(rd){const seen=new Set();lines=lines.filter(l=>{const k=cs?l:l.toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});}
  if(_sortMode==='az')lines.sort((a,b)=>(cs?a:a.toLowerCase()).localeCompare(cs?b:b.toLowerCase()));
  else if(_sortMode==='za')lines.sort((a,b)=>(cs?b:b.toLowerCase()).localeCompare(cs?a:a.toLowerCase()));
  else if(_sortMode==='short')lines.sort((a,b)=>a.length-b.length);
  else if(_sortMode==='long')lines.sort((a,b)=>b.length-a.length);
  else if(_sortMode==='num')lines.sort((a,b)=>{const na=parseFloat(a),nb=parseFloat(b);return isNaN(na)||isNaN(nb)?a.localeCompare(b):na-nb;});
  else if(_sortMode==='rand')lines.sort(()=>Math.random()-.5);
  document.getElementById('outputText').value=lines.join('\n');
  document.getElementById('infoLine').textContent=`${lines.length} lines`;
}
function copyOut(){const v=document.getElementById('outputText').value;if(!v)return;navigator.clipboard.writeText(v);const t=document.getElementById('toast');t.style.display='inline';setTimeout(()=>{t.style.display='none';},1600);}
function clearAll(){document.getElementById('inputText').value='';document.getElementById('outputText').value='';document.getElementById('infoLine').textContent='';}
_lang=detectLang();applyLang();
</script>
</body>
</html>
