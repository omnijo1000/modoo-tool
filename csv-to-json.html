<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:900px;margin:0 auto;padding:32px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6;}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.tbtn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn.action{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.tbtn.action:hover{opacity:.85;}
.sep{width:1px;height:20px;background:var(--border);}
.opt-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
select.sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;}
select.sm:focus{border-color:var(--accent);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:650px){.two-col{grid-template-columns:1fr;}}
.col-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:.08em;margin-bottom:6px;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;resize:none;line-height:1.7;min-height:380px;}
textarea:focus{border-color:var(--accent);}
.output-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.7;min-height:380px;overflow:auto;white-space:pre-wrap;word-break:break-word;color:var(--text-muted);}
.err-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#f87171;margin-top:10px;display:none;}
.stat-bar{display:flex;gap:16px;margin-top:8px;}
.stat{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.stat span{color:var(--accent);}
.copied-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 24px;border-radius:20px;font-family:'DM Mono',monospace;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;}
.copied-toast.show{opacity:1;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:12px;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>CSV <span>to JSON</span></h1>
  <p class="sub" data-i18n="sub">CSV를 JSON 배열로 변환 · 구분자 자동 감지 · 파일 다운로드</p>

  <div class="toolbar">
    <button class="tbtn action" onclick="convert()" data-i18n="convertBtn">▶ 변환</button>
    <button class="tbtn" onclick="loadSample()" data-i18n="sampleBtn">예시 불러오기</button>
    <button class="tbtn" onclick="clearAll()" data-i18n="clearBtn">초기화</button>
    <div class="sep"></div>
    <span class="opt-label" data-i18n="delimLabel">구분자</span>
    <select class="sm" id="delim" onchange="convert()">
      <option value="auto" selected>Auto</option>
      <option value=",">, (Comma)</option>
      <option value=";">; (Semicolon)</option>
      <option value="&#9;">⇥ (Tab)</option>
      <option value="|">| (Pipe)</option>
    </select>
    <span class="opt-label" data-i18n="indentLabel">들여쓰기</span>
    <select class="sm" id="indent" onchange="convert()">
      <option value="2">2</option>
      <option value="4" selected>4</option>
    </select>
    <div class="sep"></div>
    <button class="tbtn" onclick="copyOutput()" data-i18n="copyBtn">복사</button>
    <button class="tbtn" onclick="downloadJSON()" data-i18n="downloadBtn">다운로드 .json</button>
  </div>

  <div class="two-col">
    <div>
      <div class="col-label">INPUT CSV</div>
      <textarea id="csvInput" spellcheck="false" placeholder="name,age,city&#10;Alice,30,Seoul&#10;Bob,25,Tokyo" oninput="liveConvert()"></textarea>
    </div>
    <div>
      <div class="col-label">OUTPUT JSON</div>
      <div class="output-box" id="jsonOutput"></div>
    </div>
  </div>
  <div class="stat-bar">
    <div class="stat" data-i18n="statRows">행: <span id="statRows">0</span></div>
    <div class="stat" data-i18n="statCols">열: <span id="statCols">0</span></div>
    <div class="stat" id="detectedDelimStat"></div>
  </div>
  <div class="err-box" id="errBox"></div>

  <div class="seo">
    <h2 data-i18n="seoH2">CSV to JSON란?</h2>
    <p data-i18n="seoP">CSV 첫 행을 키로 사용해 JSON 객체 배열로 변환합니다. 쉼표·세미콜론·탭 등 구분자를 자동으로 감지하며, 따옴표로 감싸인 필드와 줄바꿈 포함 값도 처리합니다.</p>
  </div>
  <footer>CSV to JSON Converter · All processing in browser</footer>
</main>
<div class="copied-toast" id="toast" data-i18n="toastMsg">복사되었습니다!</div>
<script>
const _i18n={
  ko:{sub:'CSV를 JSON 배열로 변환 · 구분자 자동 감지 · 파일 다운로드',langBtn:'🌐 EN',backBtn:'← 모두의 툴',convertBtn:'▶ 변환',sampleBtn:'예시 불러오기',clearBtn:'초기화',delimLabel:'구분자',indentLabel:'들여쓰기',copyBtn:'복사',downloadBtn:'다운로드 .json',statRows:'행: ',statCols:'열: ',seoH2:'CSV to JSON란?',seoP:'CSV 첫 행을 키로 JSON 객체 배열로 변환합니다. 구분자 자동 감지, 따옴표 필드, 줄바꿈 포함 값 처리를 지원합니다.',toastMsg:'복사되었습니다!'},
  en:{sub:'Convert CSV to JSON array · Auto-detect delimiter · Download file',langBtn:'🌐 中文',backBtn:'← All Tools',convertBtn:'▶ Convert',sampleBtn:'Load Sample',clearBtn:'Clear',delimLabel:'Delimiter',indentLabel:'Indent',copyBtn:'Copy',downloadBtn:'Download .json',statRows:'Rows: ',statCols:'Cols: ',seoH2:'CSV to JSON Converter',seoP:'Converts CSV files to JSON arrays using the first row as keys. Supports auto-detection of delimiters and handles quoted fields with embedded commas or newlines.',toastMsg:'Copied!'},
  zh:{sub:'CSV转JSON数组 · 自动检测分隔符 · 下载文件',langBtn:'🌐 日本語',backBtn:'← 所有工具',convertBtn:'▶ 转换',sampleBtn:'加载示例',clearBtn:'清空',delimLabel:'分隔符',indentLabel:'缩进',copyBtn:'复制',downloadBtn:'下载 .json',statRows:'行: ',statCols:'列: ',seoH2:'CSV转JSON工具',seoP:'将CSV转换为JSON对象数组，以首行为键名，支持自动检测分隔符及带引号的字段。',toastMsg:'已复制！'},
  ja:{sub:'CSV を JSON 配列に変換 · 区切り文字自動検出 · ファイルダウンロード',langBtn:'🌐 한국어',backBtn:'← ホーム',convertBtn:'▶ 変換',sampleBtn:'サンプル読み込み',clearBtn:'クリア',delimLabel:'区切り文字',indentLabel:'インデント',copyBtn:'コピー',downloadBtn:'ダウンロード .json',statRows:'行: ',statCols:'列: ',seoH2:'CSV to JSON コンバーター',seoP:'CSV の先頭行をキーとして JSON オブジェクト配列に変換します。区切り文字の自動検出、引用符付きフィールド、改行を含む値の処理をサポートします。',toastMsg:'コピーしました！'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

function detectDelim(csv){
  const line=(csv.split('\n')[0]||'');
  const counts={',':(line.match(/,/g)||[]).length, ';':(line.match(/;/g)||[]).length, '\t':(line.match(/\t/g)||[]).length, '|':(line.match(/\|/g)||[]).length};
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
}

function parseCSV(text, delim){
  const rows=[];let cur=[],field='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){if(c==='"'&&text[i+1]==='"'){field+='"';i++;}else if(c==='"'){inQ=false;}else field+=c;}
    else if(c==='"'){inQ=true;}
    else if(c===delim){cur.push(field);field='';}
    else if(c==='\r'){if(text[i+1]==='\n')i++;cur.push(field);rows.push(cur);cur=[];field='';}
    else if(c==='\n'){cur.push(field);rows.push(cur);cur=[];field='';}
    else field+=c;
  }
  if(field||cur.length)cur.push(field);
  if(cur.length)rows.push(cur);
  return rows;
}

let _debounce;
function liveConvert(){clearTimeout(_debounce);_debounce=setTimeout(convert,300);}

function convert(){
  const errBox=document.getElementById('errBox');
  errBox.style.display='none';
  const csv=document.getElementById('csvInput').value;
  if(!csv.trim()){document.getElementById('jsonOutput').textContent='';document.getElementById('statRows').textContent='0';document.getElementById('statCols').textContent='0';return;}
  try{
    const selDelim=document.getElementById('delim').value;
    const delim=selDelim==='auto'?detectDelim(csv):selDelim;
    const delimNames={',':', (Comma)',';':'; (Semicolon)','\t':'Tab','|':'| (Pipe)'};
    document.getElementById('detectedDelimStat').textContent=selDelim==='auto'?'detected: '+delimNames[delim]:'';
    const rows=parseCSV(csv,delim).filter(r=>r.some(c=>c.trim()));
    if(rows.length<2){document.getElementById('jsonOutput').textContent='[]';return;}
    const headers=rows[0];
    const data=rows.slice(1).map(r=>{const obj={};headers.forEach((h,i)=>obj[h.trim()]=r[i]??'');return obj;});
    const indent=parseInt(document.getElementById('indent').value);
    const result=JSON.stringify(data,null,indent);
    document.getElementById('jsonOutput').textContent=result;
    document.getElementById('jsonOutput')._text=result;
    document.getElementById('statRows').textContent=data.length;
    document.getElementById('statCols').textContent=headers.length;
  }catch(e){
    errBox.textContent='⚠ '+e.message;errBox.style.display='block';
  }
}

function loadSample(){
  document.getElementById('csvInput').value='id,name,email,age,city\n1,Alice,alice@example.com,30,Seoul\n2,Bob,bob@example.com,25,Tokyo\n3,Carol,carol@example.com,35,New York';
  convert();
}

function clearAll(){document.getElementById('csvInput').value='';document.getElementById('jsonOutput').textContent='';document.getElementById('errBox').style.display='none';document.getElementById('statRows').textContent='0';document.getElementById('statCols').textContent='0';}

function copyOutput(){
  const text=document.getElementById('jsonOutput')._text||document.getElementById('jsonOutput').textContent;
  if(!text)return;
  navigator.clipboard?.writeText(text).then(showToast).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();});
}

function downloadJSON(){
  const text=document.getElementById('jsonOutput')._text||document.getElementById('jsonOutput').textContent;
  if(!text)return;
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(text);
  a.download='output.json';a.click();
}

function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
_lang=detectLang();applyLang();
</script>
</body>
</html>
