const _i18n={
  ko:{pageTitle:'시간당 급여 계산기 | 모두의 툴',h1:'💰 시간당 급여 계산기',sub:'연봉·월급을 시급으로 변환합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',tab0:'연봉 → 시급',tab1:'월급 → 시급',annualLabel:'연봉 (만원)',monthlyLabel:'월급 (만원)',workDaysLabel:'주 근무일 (일)',workHoursLabel:'일 근무시간',hourlyLbl:'시간당',dailyLbl:'하루',weeklyLbl:'주간',monthlyLbl2:'월간',seoHtml:`<h2>시간당 급여 계산기란?</h2><p>연봉 또는 월급을 시간당 급여(시급)로 변환합니다. 주 근무일수와 일 근무시간을 설정할 수 있어 다양한 근무 형태에 대응합니다. 프리랜서 요율 책정, 구직 협상, 아르바이트 비교 등에 활용하세요. 2024년 한국 최저시급(9,860원)과 비교 기능도 제공합니다. 공식: 시급 = 연봉 / (52주 × 주 근무일 × 일 근무시간).</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. 연봉 5000만원은 시급이 얼마인가요?</summary><p>A. 주5일, 하루8시간 기준: 5000만원 / (52×5×8) = 약 24,038원/시간.</p></details><details class="faq-item"><summary>Q. 2024년 최저시급은?</summary><p>A. 2024년 한국 최저시급은 9,860원입니다. 월 환산(209시간)으로 2,060,740원.</p></details><details class="faq-item"><summary>Q. 월급과 연봉 계산 결과가 다른 이유는?</summary><p>A. 연봉은 52주 기준, 월급은 12개월로 계산합니다. 보너스 포함 여부에 따라 차이가 납니다.</p></details><details class="faq-item"><summary>Q. 주휴수당은 포함되나요?</summary><p>A. 이 계산기는 기본 근무시간 기반입니다. 주휴수당은 실제 임금 계산 시 별도로 고려하세요.</p></details><details class="faq-item"><summary>Q. 프리랜서 시급 책정에 활용할 수 있나요?</summary><p>A. 네. 원하는 연 수입을 입력해 목표 시급을 계산하고, 프리랜서 요율 계산기와 함께 활용하세요.</p></details><details class="faq-item"><summary>Q. 야근이나 초과근무는?</summary><p>A. 초과근무 시급은 통상 1.5배입니다. 기본 시급을 계산 후 별도 적용하세요.</p></details><details class="faq-item"><summary>Q. 계약직과 정규직 시급 비교는?</summary><p>A. 각자의 연봉/월급을 입력해 비교할 수 있습니다. 복리후생 차이도 고려하세요.</p></details><details class="faq-item"><summary>Q. 미국 달러 급여도 계산 가능한가요?</summary><p>A. 숫자만 입력하면 동일 공식으로 계산됩니다. 통화 단위를 맞춰 비교하세요.</p></details>`},
  en:{pageTitle:'Salary Per Hour Calculator | Modoo Tools',h1:'💰 Salary Per Hour Calculator',sub:'Convert annual or monthly salary to hourly rate',backLink:'← All Tools',langBtn:'🌐 中文',tab0:'Annual → Hourly',tab1:'Monthly → Hourly',annualLabel:'Annual Salary ($)',monthlyLabel:'Monthly Salary ($)',workDaysLabel:'Work Days/Week',workHoursLabel:'Work Hours/Day',hourlyLbl:'Per Hour',dailyLbl:'Per Day',weeklyLbl:'Per Week',monthlyLbl2:'Per Month',seoHtml:`<h2>Salary Per Hour Calculator</h2><p>Convert your annual or monthly salary to an hourly rate. Customize working days per week and hours per day to match your schedule. Useful for freelancers setting rates, job offer comparisons, and wage negotiations. Formula: Hourly = Annual Salary / (52 weeks × days/week × hours/day).</p><h2 class="seo-sub">FAQ</h2><details class="faq-item"><summary>Q. What is $80,000/year in hourly rate?</summary><p>A. At 5 days/week, 8 hours/day: $80,000 / (52×5×8) = ~$38.46/hour.</p></details><details class="faq-item"><summary>Q. What is the US federal minimum wage?</summary><p>A. The US federal minimum wage is $7.25/hour (as of 2024). Many states have higher rates.</p></details><details class="faq-item"><summary>Q. Why do annual and monthly calculations differ?</summary><p>A. Annual uses 52 weeks; monthly uses 12 months. Bonuses and extra pay periods can cause differences.</p></details><details class="faq-item"><summary>Q. Is overtime included?</summary><p>A. This calculator uses regular hours only. Overtime is typically 1.5× the base rate.</p></details><details class="faq-item"><summary>Q. Can I use this for freelance rate setting?</summary><p>A. Yes. Enter your target annual income to find the hourly rate you need to charge.</p></details><details class="faq-item"><summary>Q. What about benefits and taxes?</summary><p>A. This calculates gross pay only. Factor in benefits and taxes separately when comparing offers.</p></details><details class="faq-item"><summary>Q. How do I compare two job offers?</summary><p>A. Convert both salaries to hourly rates using the same work schedule for a fair comparison.</p></details><details class="faq-item"><summary>Q. Does this work for part-time workers?</summary><p>A. Yes. Set the work days and hours to match your part-time schedule.</p></details>`},
  zh:{pageTitle:'时薪计算器 | Modoo工具',h1:'💰 时薪计算器',sub:'将年薪或月薪换算为时薪',backLink:'← 首页',langBtn:'🌐 日本語',tab0:'年薪→时薪',tab1:'月薪→时薪',annualLabel:'年薪（元）',monthlyLabel:'月薪（元）',workDaysLabel:'每周工作天数',workHoursLabel:'每天工作时间',hourlyLbl:'每小时',dailyLbl:'每天',weeklyLbl:'每周',monthlyLbl2:'每月',seoHtml:`<h2>时薪计算器</h2><p>将年薪或月薪换算为时薪。可自定义每周工作天数和每天工作时间。适用于自由职业者定价、薪酬谈判和工作比较。公式：时薪 = 年薪 / (52周 × 每周工作天数 × 每天工作时间)。</p><h2 class="seo-sub">常见问题</h2><details class="faq-item"><summary>Q. 年薪20万元折合时薪多少？</summary><p>A. 每周5天每天8小时：200000/(52×5×8)≈96元/小时。</p></details><details class="faq-item"><summary>Q. 中国最低工资标准是多少？</summary><p>A. 各地不同，以北京为例，2024年最低月薪为2320元。</p></details><details class="faq-item"><summary>Q. 年薪和月薪计算结果为何不同？</summary><p>A. 年薪按52周计算，月薪按12个月计算。奖金等也会导致差异。</p></details><details class="faq-item"><summary>Q. 包含加班费吗？</summary><p>A. 本计算器只计算正常工时，加班费通常为1.5倍时薪。</p></details><details class="faq-item"><summary>Q. 可以用于自由职业定价吗？</summary><p>A. 可以。输入目标年收入即可得到需要的时薪。</p></details><details class="faq-item"><summary>Q. 五险一金怎么算？</summary><p>A. 本工具计算税前工资，社保和个税需另行计算。</p></details><details class="faq-item"><summary>Q. 如何比较两份工作的薪酬？</summary><p>A. 用相同工作时间设置将两份薪酬都换算为时薪进行比较。</p></details><details class="faq-item"><summary>Q. 兼职也能计算吗？</summary><p>A. 可以。调整每周工作天数和每天工作时间即可。</p></details>`},
  ja:{pageTitle:'時給換算計算機 | Modooツール',h1:'💰 時給換算計算機',sub:'年収・月収を時給に換算します',backLink:'← ホーム',langBtn:'🌐 한국어',tab0:'年収→時給',tab1:'月収→時給',annualLabel:'年収（万円）',monthlyLabel:'月収（万円）',workDaysLabel:'週の勤務日数',workHoursLabel:'1日の勤務時間',hourlyLbl:'時給',dailyLbl:'日給',weeklyLbl:'週給',monthlyLbl2:'月給',seoHtml:`<h2>時給換算計算機とは</h2><p>年収または月収を時給に換算します。週の勤務日数と1日の勤務時間をカスタマイズできます。フリーランスの料金設定、求人比較、給与交渉に役立ちます。公式：時給 = 年収 / (52週 × 週の勤務日数 × 1日の勤務時間)。</p><h2 class="seo-sub">よくある質問</h2><details class="faq-item"><summary>Q. 年収500万円の時給は？</summary><p>A. 週5日・1日8時間の場合：500万円/(52×5×8)≈2,404円/時間。</p></details><details class="faq-item"><summary>Q. 2024年の最低賃金は？</summary><p>A. 2024年度の全国加重平均最低賃金は1,004円/時間です。</p></details><details class="faq-item"><summary>Q. 年収と月収で計算結果が異なるのはなぜ？</summary><p>A. 年収は52週基準、月収は12ヶ月基準で計算します。賞与の有無でも差が出ます。</p></details><details class="faq-item"><summary>Q. 残業代は含まれますか？</summary><p>A. このツールは所定労働時間のみ計算します。残業代は通常1.25〜1.5倍です。</p></details><details class="faq-item"><summary>Q. フリーランスの料金設定に使えますか？</summary><p>A. はい。目標年収を入力して必要な時給を計算できます。</p></details><details class="faq-item"><summary>Q. 社会保険や税金は？</summary><p>A. このツールは額面計算のみです。社会保険料や所得税は別途考慮してください。</p></details><details class="faq-item"><summary>Q. 2つの求人を比較するには？</summary><p>A. 同じ勤務条件で両方の給与を時給換算して比較してください。</p></details><details class="faq-item"><summary>Q. パートタイムにも使えますか？</summary><p>A. はい。勤務日数と勤務時間をパートの条件に合わせて設定してください。</p></details>`}
};
let currentLang='ko', mode=0;
function detectLang(){const p=new URLSearchParams(location.search).get('lang');if(p&&_i18n[p])return p;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
function applyLang(l){const t=_i18n[l]||_i18n.ko;document.title=t.pageTitle;document.documentElement.lang=l;document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});document.getElementById('seoContent').innerHTML=t.seoHtml||'';}
function toggleLang(){const order=['ko','en','zh','ja'];const next=order[(order.indexOf(currentLang)+1)%order.length];currentLang=next;localStorage.setItem('modoo_lang',next);const url=new URL(location.href);url.searchParams.set('lang',next);history.replaceState(null,'',url);applyLang(next);}
currentLang=detectLang();
document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));

function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===m));
  document.getElementById('mode0').style.display=m===0?'block':'none';
  document.getElementById('mode1').style.display=m===1?'block':'none';
  calc();
}
function calc(){
  const daysPerWeek=parseFloat(document.getElementById('workDaysPerWeek').value)||5;
  const hoursPerDay=parseFloat(document.getElementById('workHoursPerDay').value)||8;
  let annualKRW;
  if(mode===0){
    const v=parseFloat(document.getElementById('annual').value);
    if(isNaN(v)){document.getElementById('resultGrid').style.display='none';return;}
    annualKRW=v*10000;
  } else {
    const v=parseFloat(document.getElementById('monthly').value);
    if(isNaN(v)){document.getElementById('resultGrid').style.display='none';return;}
    annualKRW=v*10000*12;
  }
  const totalHours=52*daysPerWeek*hoursPerDay;
  const hourly=annualKRW/totalHours;
  const daily=hourly*hoursPerDay;
  const weekly=daily*daysPerWeek;
  const monthly=annualKRW/12;
  const fmt=(n)=>'₩'+Math.round(n).toLocaleString();
  document.getElementById('hourlyNum').textContent=fmt(hourly);
  document.getElementById('dailyNum').textContent=fmt(daily);
  document.getElementById('weeklyNum').textContent=fmt(weekly);
  document.getElementById('monthlyNum').textContent=fmt(monthly);
  document.getElementById('resultGrid').style.display='grid';
  // Min wage comparison (KR 2024: 9860)
  const minWage=9860;
  const pct=(hourly/minWage*100).toFixed(0);
  document.getElementById('minwageBar').innerHTML=`시급 <strong>${fmt(hourly)}</strong>은 최저시급(₩9,860)의 <strong>${pct}%</strong>`;
  document.getElementById('minwageBar').style.display='block';
}
</script>
<script src="related.js"></script>
</body>
</html>
