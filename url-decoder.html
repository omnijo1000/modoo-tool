      "name": "When do I need to decode a URL?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "You need to decode URLs when reading server logs with percent-encoded query strings, debugging API responses that contain encoded parameters, parsing redirect URLs in OAuth flows, or making sense of URLs copied from browser address bars that contain encoded characters."
      }
    },
    {
      "@type": "Question",
      "name": "What do %20 and %2F mean?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "%20 represents a space character (ASCII 32 = hex 20). %2F represents a forward slash (/). In general, percent-encoded sequences like %XX represent the byte with hexadecimal value XX in the UTF-8 encoding of the original character."
      }
    },
    {
      "@type": "Question",
      "name": "What is the difference between decodeURI and decodeURIComponent?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "decodeURIComponent decodes all percent-encoded sequences including those representing URL structural characters like %2F (/), %3F (?), and %26 (&). decodeURI leaves those structural sequences intact and only decodes sequences that represent non-URL characters, preserving the URL structure."
      }
    },
    {
      "@type": "Question",
      "name": "What happens when I try to decode malformed percent sequences?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Malformed percent sequences like %GG (non-hex digits) or %2 (incomplete sequence) cause a URIError in JavaScript. This tool catches the error and shows an error message. If possible it will try the alternative decode function as a fallback before reporting failure."
      }
    },
    {
      "@type": "Question",
      "name": "How do I handle double-encoded URLs?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A double-encoded URL has sequences like %2520 instead of %20. To fully decode it, apply decoding twice. Run the decoder once to get %20, then run it again to get a space. Some systems double-encode parameters accidentally; this is a common source of bugs."
      }
    },
    {
      "@type": "Question",
      "name": "How can URL decoding help with web traffic debugging?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Server access logs often store URLs in percent-encoded form. Decoding them makes query parameters, search terms, and path segments human-readable, helping you identify which pages users visited and what they searched for."
      }
    },
    {
      "@type": "Question",
      "name": "How are Korean characters decoded from a URL?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Korean characters are encoded as their UTF-8 byte sequences in percent format. For example %EC%95%88%EB%85%95 decodes to 안녕 because EC 95 88 is the UTF-8 encoding of 안 and EB 85 95 is the encoding of 녕."
      }
    }

<p>URL decoding converts percent-encoded sequences like %EC%95%88 back into readable text. You need it when reading server logs with encoded query strings, debugging API responses with encoded parameters, parsing OAuth redirect URLs, or interpreting URLs copied from a browser address bar.</p>
<h2>decodeURIComponent vs decodeURI</h2>
<p><strong>decodeURIComponent</strong> decodes all percent-encoded sequences including those representing URL structural characters like %2F (/), %3F (?), and %26 (&). Use it for decoding individual query parameter values. <strong>decodeURI</strong> preserves structural sequences and only decodes the rest. <strong>Auto</strong> mode tries decodeURIComponent first and falls back to decodeURI on error.</p>
<h2>FAQ</h2>
<details class="faq-item"><summary>When do I need to decode a URL?</summary><p>You need URL decoding when reading server logs with percent-encoded query strings, debugging API responses containing encoded parameters, parsing OAuth redirect URLs, or making sense of URLs copied from browser address bars that contain encoded characters.</p></details>
<details class="faq-item"><summary>What do %20 and %2F mean?</summary><p>%20 is a space character (ASCII 32 = hex 20). %2F is a forward slash (/). Each %XX sequence represents the byte whose hexadecimal value is XX in the UTF-8 encoding of the original character.</p></details>

let lang = (function() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if (s && i18n[s]) return s;
  const n = (navigator.language || '').slice(0, 2);
  return n === 'zh' ? 'zh' : n === 'ja' ? 'ja' : n === 'ko' ? 'ko' : 'en';
})();

let mode = 'auto';

function applyLang() {
  const t = i18n[lang];
  document.documentElement.lang = lang;
  document.title = t.pageTitle;
  document.getElementById('h1El').innerHTML = t.h1;
  document.getElementById('subEl').textContent = t.sub;
  document.getElementById('backLink').textContent = t.backLink;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('btnPaste').textContent = t.btnPaste;
  document.getElementById('btnClear').textContent = t.btnClear;
  document.getElementById('btnSample').textContent = t.btnSample;
  document.getElementById('btnDecode').textContent = t.btnDecode;
  document.getElementById('btnCopy').textContent = t.btnCopy;
  document.getElementById('copySmall').textContent = t.btnCopy;
  document.getElementById('btnModeAuto').textContent = t.optAuto;
  document.getElementById('btnModeComponent').textContent = t.optComponent;
  document.getElementById('btnModeFull').textContent = t.optFullUrl;
  document.getElementById('labelInput').textContent = t.labelInput;
  document.getElementById('labelOutput').textContent = t.labelOutput;
  document.getElementById('footerEl').textContent = t.footer;
  document.getElementById('seoEl').innerHTML = t.seoHtml;
}

function toggleLang() {
  const order = ['ko', 'en', 'zh', 'ja'];
  lang = order[(order.indexOf(lang) + 1) % order.length];
  localStorage.setItem('modoo_lang', lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', lang);
  history.replaceState({}, '', url);
  applyLang();
}

function setMode(m) {
  mode = m;
  document.getElementById('btnModeAuto').classList.toggle('on', m === 'auto');
  document.getElementById('btnModeComponent').classList.toggle('on', m === 'component');
  document.getElementById('btnModeFull').classList.toggle('on', m === 'full');
  decode();
}

function clearErr() {
  document.getElementById('errMsg').textContent = '';
  document.getElementById('inputEl').classList.remove('error');
}

function showErr(msg) {
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('inputEl').classList.add('error');
}

let _debounce;
function debouncedDecode() {
  clearTimeout(_debounce);
  _debounce = setTimeout(decode, 300);
}

function decode() {
  const text = document.getElementById('inputEl').value.trim();
  if (!text) { document.getElementById('outputEl').value = ''; clearErr(); return; }
  const t = i18n[lang];

  if (mode === 'auto') {
    try {
      document.getElementById('outputEl').value = decodeURIComponent(text);
      clearErr();
    } catch(e) {
      try {
        document.getElementById('outputEl').value = decodeURI(text);
        clearErr();
      } catch(e2) {
        showErr(t.errInvalid);
        document.getElementById('outputEl').value = '';
      }
    }
  } else {
    try {
      document.getElementById('outputEl').value = mode === 'full' ? decodeURI(text) : decodeURIComponent(text);
      clearErr();
    } catch(e) {
      try {
        document.getElementById('outputEl').value = mode === 'full' ? decodeURIComponent(text) : decodeURI(text);
        clearErr();
      } catch(e2) {
        showErr(t.errInvalid);
        document.getElementById('outputEl').value = '';
      }
    }
  }
}

function loadSample() {
  document.getElementById('inputEl').value = i18n[lang].sample;
  decode();
}

function clearAll() {
  document.getElementById('inputEl').value = '';
  document.getElementById('outputEl').value = '';
  clearErr();
}

async function pasteInput() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('inputEl').value = text;
    decode();
  } catch(e) {}
}

function copyOutput() {
  const text = document.getElementById('outputEl').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const t = i18n[lang];
    const btn = document.getElementById('btnCopy');
    const small = document.getElementById('copySmall');
    btn.textContent = t.copyDone;
    small.textContent = t.copyDone;
    btn.style.color = 'var(--green)';
    setTimeout(() => {
      btn.textContent = t.btnCopy;
      small.textContent = t.btnCopy;
      btn.style.color = '';
    }, 2000);
  });
}

applyLang();
