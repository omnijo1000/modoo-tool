const LANGS = ['ko','en','zh','ja'];
let _lang = 'ko';
let rules = []; // {agent, type, path}
let currentAgent = '*';

function detectLang(){
  const u = new URLSearchParams(location.search).get('lang');
  if(u && _i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if(s && _i18n[s]) return s;
  const n = navigator.language?.slice(0,2);
  return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';
}

function cycleLang(){
  const idx = LANGS.indexOf(_lang);
  _lang = LANGS[(idx+1) % LANGS.length];
  localStorage.setItem('modoo_lang', _lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', _lang);
  history.replaceState({},'',url);
  applyLang();
}

function applyLang(){
  const t = _i18n[_lang];
  document.documentElement.lang = _lang;
  document.title = t.pageTitle;
  document.getElementById('h1Span').textContent = t.h1Span;
  document.getElementById('subEl').textContent = t.sub;
  document.getElementById('backLink').textContent = t.backLink;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('builderTitle').textContent = t.builderTitle;
  document.getElementById('labelAgent').textContent = t.labelAgent;
  document.getElementById('labelCommonPaths').textContent = t.labelCommonPaths;
  document.getElementById('labelSitemap').innerHTML = t.labelSitemap + ' <span style="color:var(--text-dim);font-size:10px">(optional)</span>';
  document.getElementById('labelCrawlDelay').innerHTML = t.labelCrawlDelay + ' <span style="color:var(--text-dim);font-size:10px">(optional)</span>';
  document.getElementById('outputLabel').textContent = t.outputLabel;
  document.getElementById('btnCopy').textContent = t.btnCopy;
  document.getElementById('btnDownload').textContent = t.btnDownload;
  document.getElementById('btnClear').textContent = t.btnClear;
  document.getElementById('btnAdd').textContent = t.btnAdd;
  document.getElementById('optAllow').textContent = t.optAllow;
  document.getElementById('optDisallow').textContent = t.optDisallow;
  document.getElementById('agentCustom').placeholder = t.agentPlaceholder;
  document.getElementById('rulePath').placeholder = t.pathPlaceholder;
  renderPresets(t);
  renderAgentChips();
  renderCommonPaths();
  renderRules();
  document.getElementById('seoDiv').innerHTML = t.seoHtml;
}

function renderPresets(t){
  document.getElementById('presetsEl').innerHTML = `
    <button class="preset-btn" onclick="applyPreset('allowAll')">${t.presetAllowAll}</button>
    <button class="preset-btn" onclick="applyPreset('blockAll')">${t.presetBlockAll}</button>
    <button class="preset-btn" onclick="applyPreset('wordpress')">${t.presetWordPress}</button>
    <button class="preset-btn" onclick="applyPreset('blockAI')">${t.presetBlockAI}</button>
  `;
}

function renderAgentChips(){
  document.getElementById('agentChips').innerHTML = AGENT_CHIPS.map(a =>
    `<button class="agent-chip${currentAgent===a?' active':''}" onclick="selectAgent('${a}')">${a}</button>`
  ).join('') + `<button class="agent-chip" onclick="focusCustomAgent()">Custom...</button>`;
}

function selectAgent(val){
  currentAgent = val;
  document.getElementById('agentCustom').value = val === '*' ? '' : val;
  renderAgentChips();
}

function focusCustomAgent(){
  document.getElementById('agentCustom').focus();
}

function onAgentInput(){
  const v = document.getElementById('agentCustom').value.trim();
  currentAgent = v || '*';
  renderAgentChips();
}

function renderCommonPaths(){
  document.getElementById('commonPathsEl').innerHTML = COMMON_PATHS.map(p =>
    `<button class="chip" onclick="addCommonPath('${p}')">${p}</button>`
  ).join('');
}

function addCommonPath(path){
  const agent = getAgent();
  rules.push({agent, type:'disallow', path});
  renderRules();
  generate();
}

function getAgent(){
  const v = document.getElementById('agentCustom').value.trim();
  return v || currentAgent || '*';
}

function addRule(){
  const agent = getAgent();
  const type = document.getElementById('ruleType').value;
  const path = document.getElementById('rulePath').value.trim();
  if(!path){
    document.getElementById('rulePath').focus();
    return;
  }
  rules.push({agent, type, path});
  document.getElementById('rulePath').value = '';
  renderRules();
  generate();
}

function deleteRule(idx){
  rules.splice(idx, 1);
  renderRules();
  generate();
}

function renderRules(){
  const container = document.getElementById('rulesList');
  if(rules.length === 0){
    container.innerHTML = `<div class="empty-rules">${_i18n[_lang].emptyRules}</div>`;
    return;
  }
  container.innerHTML = rules.map((r,i) => `
    <div class="rule-item">
      <span class="rule-agent">${escHtmlAttr(r.agent)}</span>
      <span class="rule-type ${r.type}">${r.type==='allow'?'Allow':'Disallow'}</span>
      <span class="rule-path">${escHtmlAttr(r.path)}</span>
      <button class="rule-del" onclick="deleteRule(${i})" title="Delete">×</button>
    </div>
  `).join('');
}

function generate(){
  const groups = {};
  rules.forEach(r => {
    if(!groups[r.agent]) groups[r.agent] = {allows:[], disallows:[], crawlDelay: null};
    if(r.type === 'allow') groups[r.agent].allows.push(r.path);
    else groups[r.agent].disallows.push(r.path);
  });
  const cd = document.getElementById('crawlDelay').value.trim();
  Object.keys(groups).forEach(agent => {
    if(cd) groups[agent].crawlDelay = cd;
  });
  let out = '';
  Object.entries(groups).forEach(([agent, g]) => {
    out += `User-agent: ${agent}\n`;
    g.disallows.forEach(p => out += `Disallow: ${p}\n`);
    g.allows.forEach(p => out += `Allow: ${p}\n`);
    if(g.crawlDelay) out += `Crawl-delay: ${g.crawlDelay}\n`;
    out += '\n';
  });
  const sitemap = document.getElementById('sitemapUrl').value.trim();
  if(sitemap) out += `Sitemap: ${sitemap}\n`;
  document.getElementById('outputTa').value = out.trim();
}

function applyPreset(key){
  const text = PRESETS[key];
  document.getElementById('outputTa').value = text.trim();
  // Parse preset into rules
  rules = [];
  let currentAg = '*';
  text.split('\n').forEach(line => {
    line = line.trim();
    if(line.startsWith('User-agent:')) currentAg = line.slice(11).trim();
    else if(line.startsWith('Disallow:')) rules.push({agent:currentAg, type:'disallow', path:line.slice(9).trim()});
    else if(line.startsWith('Allow:')) rules.push({agent:currentAg, type:'allow', path:line.slice(6).trim()});
  });
  renderRules();
}

function copyOutput(){
  const text = document.getElementById('outputTa').value;
  if(!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopy');
    const t = _i18n[_lang];
    btn.textContent = t.copyDone;
    btn.style.background = 'var(--green)';
    btn.style.borderColor = 'var(--green)';
    btn.style.color = '#000';
    setTimeout(() => {
      btn.textContent = t.btnCopy;
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 2000);
  }).catch(() => {
    document.getElementById('outputTa').select();
    document.execCommand('copy');
  });
}

function downloadFile(){
  const text = document.getElementById('outputTa').value;
  if(!text) return;
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'robots.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

function clearAll(){
  rules = [];
  document.getElementById('agentCustom').value = '';
  document.getElementById('rulePath').value = '';
  document.getElementById('sitemapUrl').value = '';
  document.getElementById('crawlDelay').value = '';
  currentAgent = '*';
  renderAgentChips();
  renderRules();
  document.getElementById('outputTa').value = '';
}

function escHtmlAttr(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

_lang = detectLang();
applyLang();
</script>
