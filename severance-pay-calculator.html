  ko:{pageTitle:'퇴직금 계산기 - 무료 온라인 퇴직금 계산 | MODOO HUB',h1:'퇴직금 계산기',sub:'입사일·퇴직일·월급 입력으로 법정 퇴직금 자동 계산 (2024년 기준)',backLink:'← 모두의 툴',langBtn:'🌐 EN',lblJoin:'입사일',lblLeave:'퇴직일',lblSalary:'월 기본급 (만원)',lblBonus:'연간 상여금 (만원, 없으면 0)',unitManwon:'만원',btnCalc:'퇴직금 계산하기',resTitle:'예상 퇴직금',notice:'※ 이 계산기는 참고용이며 실제 퇴직금과 차이가 있을 수 있습니다. 정확한 금액은 고용노동부 퇴직금 계산기 또는 전문가 상담을 이용하세요.',
    bkDays:'재직일수',bkYears:'근속연수',bkAvgWage:'1일 평균임금',bkSeverance:'퇴직금 (세전)',
    seoHtml:`<h2>퇴직금 계산 방법</h2><p><strong>퇴직금</strong>은 1년 이상 근무한 근로자가 퇴직 시 받는 법정 급여입니다. 계산 공식은 <strong>퇴직금 = 1일 평균임금 × 30일 × (재직일수 / 365)</strong>입니다. 1일 평균임금은 퇴직 전 3개월간 임금 총액을 해당 기간 총 일수(보통 91~92일)로 나눈 금액입니다. 상여금과 연차수당도 포함되며, 실제 계산은 더 복잡할 수 있습니다. 이 도구는 간편한 참고용 계산기입니다.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. 퇴직금 지급 조건은?</summary><p>A. 1년 이상 계속 근무하고 주 평균 15시간 이상 일한 근로자에게 지급됩니다. 계약직·파트타임도 조건 충족 시 동일하게 적용됩니다.</p></details><details class="faq-item"><summary>Q. 퇴직금 계산 공식은?</summary><p>A. 퇴직금 = 1일 평균임금 × 30 × (총 재직일수 / 365). 1일 평균임금 = 퇴직 전 3개월 임금 합계 / 해당 기간 일수.</p></details><details class="faq-item"><summary>Q. 상여금도 퇴직금에 포함되나요?</summary><p>A. 네, 연간 상여금의 3/12(3개월분)이 평균임금 산정에 포함됩니다.</p></details><details class="faq-item"><summary>Q. 1년 미만 근무하면 퇴직금을 못 받나요?</summary><p>A. 맞습니다. 1년 미만 근무 시 법정 퇴직금 대상이 아닙니다. 단, 회사 내규에 따라 별도 위로금이 지급될 수 있습니다.</p></details><details class="faq-item"><summary>Q. 퇴직금에 세금이 붙나요?</summary><p>A. 네, 퇴직소득세가 부과됩니다. 근속연수에 따라 공제금액이 다르며, 실제 수령액은 세금 공제 후 금액입니다.</p></details><details class="faq-item"><summary>Q. 퇴직금 지급 기한은?</summary><p>A. 근로기준법상 퇴직일로부터 14일 이내에 지급해야 합니다. 당사자 합의 시 연장 가능합니다.</p></details><details class="faq-item"><summary>Q. IRP 계좌로 받아야 하나요?</summary><p>A. 2022년 4월부터 퇴직급여 300만원 초과 시 IRP 계좌로 지급이 의무화되었습니다. 55세 이상이거나 일시금 수령 특례에 해당하면 예외입니다.</p></details><details class="faq-item"><summary>Q. 연차수당도 퇴직금에 포함되나요?</summary><p>A. 미사용 연차수당도 평균임금 산정에 포함됩니다. 이 계산기는 연차수당을 별도로 반영하지 않으므로 참고용으로 활용하세요.</p></details>`},
  en:{pageTitle:'Severance Pay Calculator - Korean Retirement Pay | MODOO HUB',h1:'Severance Pay Calculator',sub:'Calculate Korean statutory severance pay (2024 standard)',backLink:'← All Tools',langBtn:'🌐 中文',lblJoin:'Start Date',lblLeave:'End Date',lblSalary:'Monthly Base Salary (10,000 KRW)',lblBonus:'Annual Bonus (10,000 KRW, 0 if none)',unitManwon:'만원',btnCalc:'Calculate Severance Pay',resTitle:'Estimated Severance Pay',notice:'※ For reference only. Actual amount may differ. Consult the Ministry of Employment or a labor expert for precise figures.',
    bkDays:'Working days',bkYears:'Years of service',bkAvgWage:'Daily average wage',bkSeverance:'Severance pay (before tax)',
    seoHtml:`<h2>Korean Severance Pay Calculator</h2><p>Korean labor law mandates <strong>severance pay (퇴직금)</strong> for employees who work 1+ year continuously with 15+ hours/week. Formula: <strong>Severance = Daily Average Wage × 30 × (Service Days / 365)</strong>. Daily average wage = total wages in last 3 months / number of days in that period. This calculator provides a quick estimate for reference.</p><h2 class="seo-sub">FAQ</h2><details class="faq-item"><summary>Q. Who is eligible for severance pay in Korea?</summary><p>A. Employees who have worked continuously for 1+ year with an average of 15+ hours per week, including part-time and contract workers.</p></details><details class="faq-item"><summary>Q. What is the severance pay formula?</summary><p>A. Severance = Daily Average Wage × 30 × (Total Service Days / 365). Daily Average Wage = Total wages in last 3 months / number of days in that period.</p></details><details class="faq-item"><summary>Q. Is bonus included in severance calculation?</summary><p>A. Yes. Annual bonus × 3/12 (3 months worth) is included in the average wage calculation.</p></details><details class="faq-item"><summary>Q. Is severance pay taxed?</summary><p>A. Yes, retirement income tax (퇴직소득세) applies with deductions based on years of service.</p></details><details class="faq-item"><summary>Q. When must severance pay be paid?</summary><p>A. Within 14 days of resignation, unless extended by mutual agreement.</p></details><details class="faq-item"><summary>Q. Does this apply to foreign workers in Korea?</summary><p>A. Yes, all workers in Korea covered by the Labor Standards Act are entitled to severance pay under the same conditions.</p></details><details class="faq-item"><summary>Q. What if I worked less than 1 year?</summary><p>A. No statutory severance is owed for under 1 year of service, but some companies offer voluntary separation pay.</p></details><details class="faq-item"><summary>Q. Must severance be paid to an IRP account?</summary><p>A. Since April 2022, severance exceeding 3 million KRW must be deposited into an IRP (Individual Retirement Pension) account, with some exceptions.</p></details>`},
  zh:{pageTitle:'韩国退职金计算器 - 离职补偿金计算 | MODOO HUB',h1:'退职金计算器',sub:'韩国法定退职金自动计算（2024年标准）',backLink:'← 首页',langBtn:'🌐 日本語',lblJoin:'入职日期',lblLeave:'离职日期',lblSalary:'月基本工资（万韩元）',lblBonus:'年奖金（万韩元，无则填0）',unitManwon:'万韩元',btnCalc:'计算退职金',resTitle:'预计退职金',notice:'※ 仅供参考，实际金额可能有差异。请咨询雇用劳动部或劳务专家获取精确数据。',

    seoHtml:`<h2>韩国退职金计算器</h2><p>韩国劳动法规定，连续工作1年以上、每周工作15小时以上的员工可获得<strong>退职金（퇴직금）</strong>。计算公式：<strong>退职金 = 日均工资 × 30天 × (在职天数/365)</strong>。本计算器提供参考计算，实际金额请咨询专业人士。</p><h2 class="seo-sub">常见问题</h2><details class="faq-item"><summary>Q. 退职金计算公式是什么？</summary><p>A. 退职金 = 日均工资 × 30 × (在职总天数/365)。日均工资 = 离职前3个月总工资/该期间总天数。</p></details><details class="faq-item"><summary>Q. 工作不满1年能拿退职金吗？</summary><p>A. 不能。法定退职金要求连续工作满1年。部分公司可能提供自愿离职补偿。</p></details><details class="faq-item"><summary>Q. 奖金计入退职金吗？</summary><p>A. 是的。年奖金的3/12（即3个月份额）计入平均工资。</p></details><details class="faq-item"><summary>Q. 退职金要缴税吗？</summary><p>A. 是的，需缴纳退职所得税，工作年限越长扣除额越多。</p></details><details class="faq-item"><summary>Q. 退职金何时支付？</summary><p>A. 根据韩国劳动基准法，应在离职后14天内支付。</p></details><details class="faq-item"><summary>Q. 外籍劳工也适用吗？</summary><p>A. 是的，在韩国受《劳动基准法》保护的所有劳动者同等适用。</p></details><details class="faq-item"><summary>Q. 外籍人士需要开IRP账户吗？</summary><p>A. 2022年4月起，超过300万韩元的退职金必须转入IRP个人退休金账户，有部分例外情况。</p></details><details class="faq-item"><summary>Q. 年假补偿金也计入吗？</summary><p>A. 未使用的年假补偿也应计入平均工资，本计算器未单独考虑，仅供参考。</p></details>`},
  ja:{pageTitle:'退職金計算機 - 韓国法定退職金計算 | MODOO HUB',h1:'退職金計算機',sub:'韓国法定退職金自動計算（2024年基準）',backLink:'← ホーム',langBtn:'🌐 한국어',lblJoin:'入社日',lblLeave:'退職日',lblSalary:'月基本給（万ウォン）',lblBonus:'年間賞与（万ウォン、なければ0）',unitManwon:'万ウォン',btnCalc:'退職金を計算する',resTitle:'予想退職金',notice:'※ 参考値です。実際の金額は異なる場合があります。正確な金額は雇用労働部または専門家にご相談ください。',
    bkDays:'在職日数',bkYears:'勤続年数',bkAvgWage:'1日平均賃金',bkSeverance:'退職金（税引前）',
    seoHtml:`<h2>韓国退職金計算機</h2><p>韓国の労働基準法では、1年以上継続勤務かつ週15時間以上勤務した労働者に<strong>退職金（퇴직금）</strong>が支払われます。計算式：<strong>退職金 = 1日平均賃金 × 30 × (在職日数/365)</strong>。本ツールは参考計算用です。</p><h2 class="seo-sub">よくある質問</h2><details class="faq-item"><summary>Q. 退職金の計算式は？</summary><p>A. 退職金 = 1日平均賃金 × 30 × (総在職日数/365)。1日平均賃金 = 退職前3ヶ月の賃金合計/その期間の日数。</p></details><details class="faq-item"><summary>Q. 1年未満では退職金は受け取れない？</summary><p>A. 法定退職金は1年以上の継続勤務が要件です。会社独自の離職慰労金が支払われる場合もあります。</p></details><details class="faq-item"><summary>Q. 賞与も含まれますか？</summary><p>A. はい。年間賞与の3/12（3ヶ月分）が平均賃金の算定に含まれます。</p></details><details class="faq-item"><summary>Q. 退職金に税金はかかりますか？</summary><p>A. はい。退職所得税が課され、勤続年数に応じた控除があります。</p></details><details class="faq-item"><summary>Q. 退職金はいつ支払われる？</summary><p>A. 退職日から14日以内に支払われなければなりません。</p></details><details class="faq-item"><summary>Q. 外国人労働者にも適用されますか？</summary><p>A. はい、韓国の労働基準法が適用される全ての労働者に同様に適用されます。</p></details><details class="faq-item"><summary>Q. IRP口座への振込みは必須ですか？</summary><p>A. 2022年4月以降、300万ウォン超の退職金はIRP口座への振込みが義務化されています（例外あり）。</p></details><details class="faq-item"><summary>Q. 未使用年次有給も含まれますか？</summary><p>A. 未使用有給休暇手当も平均賃金に含まれます。このツールでは別途考慮していないため参考値としてご利用ください。</p></details>`}
};

let currentLang = detectLang();

function detectLang(){const p=new URLSearchParams(location.search).get('lang');if(p&&_i18n[p])return p;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
function applyLang(l){const t=_i18n[l]||_i18n.ko;document.title=t.pageTitle;document.documentElement.lang=l;document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});document.getElementById('seoSection').innerHTML=t.seoHtml;}
function toggleLang(){const order=['ko','en','zh','ja'];const next=order[(order.indexOf(currentLang)+1)%order.length];currentLang=next;localStorage.setItem('modoo_lang',next);const url=new URL(location.href);url.searchParams.set('lang',next);history.replaceState(null,'',url);applyLang(next);}

function fmt(n){if(n>=100000000)return(n/100000000).toFixed(1)+'억원';if(n>=10000)return Math.round(n/10000)+'만원';return Math.round(n).toLocaleString()+'원';}

function calculate(){
  const t=_i18n[currentLang]||_i18n.ko;
  const join=new Date(document.getElementById('joinDate').value);
  const leave=new Date(document.getElementById('leaveDate').value);
  const salary=parseFloat(document.getElementById('salary').value||0)*10000;
  const bonus=parseFloat(document.getElementById('bonus').value||0)*10000;

  if(!join.getTime()||!leave.getTime()||!salary){
    alert(currentLang==='ko'?'모든 항목을 입력해주세요.':currentLang==='en'?'Please fill in all fields.':currentLang==='zh'?'请填写所有字段。':'すべての項目を入力してください。');
    return;
  }
  if(leave<=join){alert(currentLang==='ko'?'퇴직일이 입사일보다 이후여야 합니다.':'Resignation date must be after start date.');return;}

  const days=Math.floor((leave-join)/(1000*60*60*24));
  const years=(days/365).toFixed(2);

  if(days<365){
    document.getElementById('resVal').textContent=currentLang==='ko'?'지급 불가':currentLang==='en'?'Not eligible':'未达标';
    document.getElementById('resSub').textContent=currentLang==='ko'?'1년 미만 근무 (퇴직금 대상 아님)':currentLang==='en'?'Less than 1 year of service':'工作不满1年';
    document.getElementById('breakdown').innerHTML='';
    document.getElementById('result').style.display='block';
    return;
  }

  // 3개월 임금 = 월급×3 + 상여금×3/12
  const threeMonthWage = salary*3 + bonus*(3/12);
  // 3개월 일수 (평균 91일 사용)
  const threeMonthDays = 91;
  const dailyAvg = threeMonthWage / threeMonthDays;
  const severance = Math.round(dailyAvg * 30 * (days / 365));

  document.getElementById('resVal').textContent=fmt(severance);
  document.getElementById('resSub').textContent=Math.floor(days/365)+'년 '+Math.floor((days%365)/30)+'개월 '+days%30+'일 근무';
  document.getElementById('breakdown').innerHTML=`
    <div class="bk-row"><span class="bk-label">${t.bkDays}</span><span class="bk-val">${days.toLocaleString()}일</span></div>
    <div class="bk-row"><span class="bk-label">${t.bkYears}</span><span class="bk-val">${years}년</span></div>
    <div class="bk-row"><span class="bk-label">${t.bkAvgWage}</span><span class="bk-val">${Math.round(dailyAvg).toLocaleString()}원</span></div>
    <div class="bk-row"><span class="bk-label">${t.bkSeverance}</span><span class="bk-val" style="color:var(--accent)">${fmt(severance)}</span></div>
  `;
  document.getElementById('result').style.display='block';
}

// Default dates
document.addEventListener('DOMContentLoaded',()=>{
  const today=new Date();
  const y=today.getFullYear(),m=String(today.getMonth()+1).padStart(2,'0'),d=String(today.getDate()).padStart(2,'0');
  document.getElementById('leaveDate').value=`${y}-${m}-${d}`;
  const join=new Date(today);join.setFullYear(y-3);
  document.getElementById('joinDate').value=`${join.getFullYear()}-${m}-${d}`;
  applyLang(currentLang);
});
</script>
