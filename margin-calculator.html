<script>
const LANGS=['ko','en','zh','ja'];let _lang='ko',_mode=0;
const _i18n={
  ko:{h1Accent:'마진',sub:'이익률, 마크업, 순이익을 계산합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',
    tabs:['매출/원가로 계산','목표 마진으로 계산'],lbl0a:'매출액',lbl0b:'원가 (판매비용)',lbl1a:'원가',lbl1b:'목표 마진율',
    lblMargin:'마진율',lblMarkup:'마크업',lblProfit:'순이익',lblPrice:'판매가',lblBarCost:'원가 비율',lblBarProfit:'이익 비율',
    seoHtml:`<h2>마진 계산기</h2><p>마진(이익률)은 판매 가격에서 원가를 뺀 이익이 판매 가격에서 차지하는 비율입니다. 예를 들어 1만원에 판매하고 원가가 7천원이라면 이익은 3천원이고 마진율은 30%입니다. 마크업은 이익을 원가 기준으로 계산한 것으로, 같은 예에서 마크업은 42.86%입니다. 이 도구는 두 방향의 계산을 모두 지원합니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>마진율과 마크업의 차이는?</summary><p>마진율은 (이익÷매출)×100이고, 마크업은 (이익÷원가)×100입니다. 예: 원가 700, 판매가 1000이면 마진율 30%, 마크업 42.86%.</p></details>
<details class="faq-item"><summary>목표 마진율이 있을 때 판매가는?</summary><p>판매가 = 원가 ÷ (1 − 마진율). 원가 700원, 마진율 30%이면 700÷0.7 = 1000원.</p></details>
<details class="faq-item"><summary>마진이 높을수록 좋은가요?</summary><p>일반적으로 높을수록 이익이 크지만, 업종마다 정상 마진율이 다릅니다. 소매업은 보통 5~30%, SaaS는 70~90%.</p></details>
<details class="faq-item"><summary>총마진과 순마진의 차이는?</summary><p>총마진은 매출에서 직접 비용만 뺀 것이고, 순마진은 운영비, 세금 등 모든 비용을 뺀 최종 이익률입니다.</p></details>
<details class="faq-item"><summary>이 계산기는 어디에 활용되나요?</summary><p>제품 가격 책정, 사업 수익성 분석, 투자 수익 계산 등에 활용됩니다.</p></details>
<details class="faq-item"><summary>마진 50%는 어떻게 계산되나요?</summary><p>판매가의 50%가 이익입니다. 원가가 500원이면 판매가는 1000원, 이익이 500원.</p></details>
<details class="faq-item"><summary>서비스업에도 적용할 수 있나요?</summary><p>네. 원가는 서비스 제공 비용(인건비, 재료비 등), 매출은 청구 금액을 입력하면 됩니다.</p></details>
<details class="faq-item"><summary>VAT 포함 가격으로 계산해야 하나요?</summary><p>일관성 있게 적용하면 됩니다. VAT 제외 기준으로 계산하는 것이 일반적입니다.</p></details>`
  },
  en:{h1Accent:'Margin',sub:'Calculate profit margin, markup, and net profit',backLink:'← All Tools',langBtn:'🌐 中文',
    tabs:['Revenue & Cost','Target margin'],lbl0a:'Revenue (selling price)',lbl0b:'Cost (COGS)',lbl1a:'Cost',lbl1b:'Target margin',
    lblMargin:'Margin',lblMarkup:'Markup',lblProfit:'Net profit',lblPrice:'Selling price',lblBarCost:'Cost ratio',lblBarProfit:'Profit ratio',
    seoHtml:`<h2>Margin Calculator</h2><p>Profit margin is the percentage of revenue that remains after deducting costs. For example, selling at $1000 with a $700 cost gives $300 profit and a 30% margin. Markup is calculated relative to cost — in the same example, the markup is 42.86%. This tool supports both directions: calculate margin from revenue/cost, or find the selling price from a target margin.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What is the difference between margin and markup?</summary><p>Margin = (Profit ÷ Revenue) × 100. Markup = (Profit ÷ Cost) × 100. E.g. cost 700, price 1000: margin 30%, markup 42.86%.</p></details>
<details class="faq-item"><summary>How do I find the selling price from a target margin?</summary><p>Price = Cost ÷ (1 − margin). E.g. cost $700, target 30%: 700÷0.7 = $1000.</p></details>
<details class="faq-item"><summary>Is a higher margin always better?</summary><p>Generally yes, but normal margins vary by industry. Retail: 5–30%, SaaS: 70–90%.</p></details>
<details class="faq-item"><summary>Gross margin vs. net margin?</summary><p>Gross margin deducts only direct costs; net margin deducts all expenses including operating costs and taxes.</p></details>
<details class="faq-item"><summary>What is this calculator useful for?</summary><p>Pricing products, analyzing business profitability, calculating investment returns.</p></details>
<details class="faq-item"><summary>What does 50% margin mean?</summary><p>Half the selling price is profit. If cost is $500, sell at $1000 for $500 profit.</p></details>
<details class="faq-item"><summary>Can I use this for services?</summary><p>Yes — enter your cost to deliver the service as cost, and the amount charged as revenue.</p></details>
<details class="faq-item"><summary>Should I use prices including or excluding VAT?</summary><p>Be consistent either way. Excluding VAT is more common for margin calculations.</p></details>`
  },
  zh:{h1Accent:'利润率',sub:'计算利润率、加成率和净利润',backLink:'← 所有工具',langBtn:'🌐 日本語',
    tabs:['收入/成本计算','目标利润率计算'],lbl0a:'收入（售价）',lbl0b:'成本（销货成本）',lbl1a:'成本',lbl1b:'目标利润率',
    lblMargin:'利润率',lblMarkup:'加成率',lblProfit:'净利润',lblPrice:'售价',lblBarCost:'成本比例',lblBarProfit:'利润比例',
    seoHtml:`<h2>利润率计算器</h2><p>利润率是扣除成本后剩余收入的百分比。例如以1000元销售，成本700元，利润300元，利润率30%。加成率是相对于成本计算的，同例加成率为42.86%。本工具支持两个方向：从收入/成本计算利润率，或根据目标利润率确定售价。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>利润率和加成率有什么区别？</summary><p>利润率=(利润÷收入)×100，加成率=(利润÷成本)×100。例：成本700，售价1000：利润率30%，加成率42.86%。</p></details>
<details class="faq-item"><summary>如何根据目标利润率确定售价？</summary><p>售价 = 成本 ÷ (1 - 利润率)。例：成本700，目标30%：700÷0.7 = 1000元。</p></details>
<details class="faq-item"><summary>利润率越高越好吗？</summary><p>一般来说是的，但不同行业有不同的正常利润率。零售业5-30%，SaaS 70-90%。</p></details>
<details class="faq-item"><summary>毛利率和净利率的区别？</summary><p>毛利率只扣除直接成本，净利率扣除包括运营成本和税收在内的所有费用。</p></details>
<details class="faq-item"><summary>这个计算器有什么用途？</summary><p>产品定价、业务盈利能力分析、投资回报计算等。</p></details>
<details class="faq-item"><summary>50%的利润率意味着什么？</summary><p>售价的一半是利润。如果成本是500元，售价1000元，利润500元。</p></details>
<details class="faq-item"><summary>可以用于服务业吗？</summary><p>可以，将服务提供成本作为成本，收费金额作为收入输入即可。</p></details>
<details class="faq-item"><summary>是否应使用含税或不含税价格？</summary><p>保持一致即可，通常使用不含税价格计算利润率。</p></details>`
  },
  ja:{h1Accent:'マージン',sub:'利益率、マークアップ、純利益を計算します',backLink:'← ホーム',langBtn:'🌐 한국어',
    tabs:['売上/原価で計算','目標マージンで計算'],lbl0a:'売上高（販売価格）',lbl0b:'原価（売上原価）',lbl1a:'原価',lbl1b:'目標マージン率',
    lblMargin:'マージン率',lblMarkup:'マークアップ',lblProfit:'純利益',lblPrice:'販売価格',lblBarCost:'原価比率',lblBarProfit:'利益比率',
    seoHtml:`<h2>マージン計算機</h2><p>利益率は売上から原価を引いた利益が売上に占める割合です。例えば1000円で販売し原価が700円なら利益は300円でマージン率は30%。マークアップは原価に対する利益率で、同例ではマークアップは42.86%です。本ツールは両方向の計算をサポートします。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>マージンとマークアップの違いは？</summary><p>マージン=(利益÷売上)×100、マークアップ=(利益÷原価)×100。例：原価700、価格1000：マージン30%、マークアップ42.86%。</p></details>
<details class="faq-item"><summary>目標マージンから販売価格を求めるには？</summary><p>価格=原価÷(1-マージン率)。例：原価700円、目標30%：700÷0.7=1000円。</p></details>
<details class="faq-item"><summary>マージンは高いほど良いですか？</summary><p>一般的にはそうですが、業界によって標準が異なります。小売業5〜30%、SaaS 70〜90%。</p></details>
<details class="faq-item"><summary>粗利率と純利率の違いは？</summary><p>粗利率は直接コストのみを差し引き、純利率は運営費や税金など全費用を差し引いた最終利益率です。</p></details>
<details class="faq-item"><summary>この計算機の用途は？</summary><p>製品価格設定、ビジネス収益性分析、投資収益計算などに活用できます。</p></details>
<details class="faq-item"><summary>マージン50%とは？</summary><p>販売価格の半分が利益です。原価500円なら販売価格1000円、利益500円。</p></details>
<details class="faq-item"><summary>サービス業にも使えますか？</summary><p>はい、サービス提供コストを原価、請求額を売上として入力してください。</p></details>
<details class="faq-item"><summary>税込・税抜どちらで計算すべきですか？</summary><p>どちらでも一貫していれば問題ありません。税抜で計算するのが一般的です。</p></details>`
  }
};

  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function setMode(m){_mode=m;[0,1].forEach(i=>{document.getElementById('tab'+i).classList.toggle('active',i===m);document.getElementById('mode'+i).style.display=i===m?'block':'none';});calc();}
function fmt(n){return Math.abs(n)<1e6?n.toLocaleString(undefined,{maximumFractionDigits:0}):n.toLocaleString();}
function calc(){
  const t=_i18n[_lang];
  let rev,cost,profit,margin,markup,price;
  if(_mode===0){
    rev=parseFloat(document.getElementById('revenue').value);cost=parseFloat(document.getElementById('cost').value);
    if(!rev||!cost||rev<=0||cost<0){document.getElementById('resultsGrid').style.display='none';document.getElementById('barBox').style.display='none';return;}
    profit=rev-cost;margin=(profit/rev)*100;markup=cost>0?(profit/cost)*100:0;price=rev;
  }else{
    cost=parseFloat(document.getElementById('costM').value);const mt=parseFloat(document.getElementById('marginTarget').value);
    if(!cost||cost<=0||!mt||mt<=0||mt>=100){document.getElementById('resultsGrid').style.display='none';document.getElementById('barBox').style.display='none';return;}
    margin=mt;price=cost/(1-mt/100);profit=price-cost;markup=(profit/cost)*100;rev=price;
  }
  document.getElementById('rMargin').textContent=margin.toFixed(2)+'%';
  document.getElementById('rMarkup').textContent=markup.toFixed(2)+'%';
  document.getElementById('rProfit').textContent=fmt(profit);
  document.getElementById('rPrice').textContent=fmt(price);
  document.getElementById('resultsGrid').style.display='grid';
  const costPct=Math.min((cost/rev)*100,100);const profPct=Math.min(margin,100);
  document.getElementById('costBar').style.width=costPct+'%';document.getElementById('costBar').style.background=costPct>80?'var(--red)':'var(--text-dim)';
  document.getElementById('profitBar').style.width=profPct+'%';
  document.getElementById('barCostVal').textContent=costPct.toFixed(1)+'%';document.getElementById('barProfitVal').textContent=profPct.toFixed(1)+'%';
  document.getElementById('barBox').style.display='block';
}
_lang=detectLang();applyLang();
</script>
