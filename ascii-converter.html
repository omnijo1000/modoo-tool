function textToAscii(){
  const raw=document.getElementById('textInput').value;
  const base=parseInt(document.querySelector('input[name=base]:checked').value);
  const comma=document.getElementById('optComma').checked;
  const nums=raw.split('').map(c=>{
    const n=c.charCodeAt(0);
    switch(base){case 16:return n.toString(16).toUpperCase().padStart(2,'0');case 2:return n.toString(2).padStart(8,'0');case 8:return n.toString(8);default:return n.toString();}
  });
  document.getElementById('asciiOut').value=nums.join(comma?',':" ");
  const cells=document.getElementById('charCells');
  cells.innerHTML=raw.split('').slice(0,60).map(c=>{
    const n=c.charCodeAt(0);
    const disp=base===10?n:base===16?n.toString(16).toUpperCase():base===2?n.toString(2):n.toString(8);
    const g=n<32?'[ctrl]':c;
    return `<div class="char-cell"><div class="ch">${g}</div><div class="num">${disp}</div></div>`;
  }).join('');
}
function asciiToText(){
  const raw=document.getElementById('asciiInput').value.trim();
  const base=parseInt(document.querySelector('input[name=base2]:checked').value);
  const parts=raw.split(/[\s,;]+/).filter(Boolean);
  let result='';
  for(const p of parts){
    const n=parseInt(p,base);
    if(!isNaN(n)&&n>=0&&n<=127)result+=String.fromCharCode(n);
  }
  document.getElementById('textOut').value=result;
}
