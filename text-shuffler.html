  <h1>Text <span>Shuffler</span></h1>
  <p class="subtitle" data-i18n="sub">Select a shuffle mode and randomize your text.</p>

  <div class="mode-row">
    <button class="mode-btn active" id="modeLines" onclick="setMode('lines')" data-i18n="modeLines">Shuffle Lines</button>
    <button class="mode-btn" id="modeWords" onclick="setMode('words')" data-i18n="modeWords">Shuffle Words</button>
    <button class="mode-btn" id="modeChars" onclick="setMode('chars')" data-i18n="modeChars">Shuffle Characters</button>
  </div>

  </div>

<script>
let _mode='lines';
function setMode(m){_mode=m;['lines','words','chars'].forEach(k=>document.getElementById('mode'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('active',k===m));}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function doShuffle(){
  const input=document.getElementById('inputArea').value;
  let out='';
  if(_mode==='lines'){const lines=input.split('\n');out=shuffle(lines).join('\n');}
  else if(_mode==='words'){out=input.split('\n').map(l=>{const w=l.split(/(\s+)/);return shuffle(w).join('');}).join('\n');}
  else{out=[...input].sort(()=>Math.random()-0.5).join('');}
  document.getElementById('outputArea').value=out;
}
function copyOutput(){const v=document.getElementById('outputArea').value;if(v)navigator.clipboard.writeText(v);}
function clearAll(){document.getElementById('inputArea').value='';document.getElementById('outputArea').value='';}
</script>
<script>
const _i18n={
  ko:{lang:'ko',title:'텍스트 셔플 - 줄·단어·문자 무작위 순서 섞기 | 무료',btn:'🌐 EN',
    sub:'셔플 모드를 선택하고 텍스트를 무작위로 섞어 보세요.',
    modeLines:'줄 섞기',modeWords:'단어 섞기',modeChars:'문자 섞기',
    labelInput:'입력',labelOutput:'출력',btnShuffle:'🔀 셔플',btnCopy:'📋 복사',btnClear:'🗑 지우기',
    seoHtml:'<h2>텍스트 셔플 도구란?</h2><p>텍스트 셔플 도구는 텍스트의 줄, 단어, 문자를 무작위로 섞어주는 온라인 도구입니다. 퀴즈 출제, 랜덤 순서 결정, 데이터 샘플링 등에 활용할 수 있습니다.</p><details class="faq-item"><summary>여러 번 셔플할 수 있나요?</summary><p>네. 셔플 버튼을 클릭할 때마다 새로운 무작위 순서로 섞입니다.</p></details><details class="faq-item"><summary>원본 텍스트는 변경되나요?</summary><p>아니요. 원본 입력창은 그대로이며, 결과는 출력창에만 표시됩니다.</p></details><details class="faq-item"><summary>어떤 셔플 알고리즘을 사용하나요?</summary><p>Fisher-Yates(Knuth) 셔플 알고리즘을 사용합니다. 완전히 균등한 무작위 순서를 보장합니다.</p></details><details class="faq-item"><summary>비어있는 줄도 섞이나요?</summary><p>네. 빈 줄도 하나의 줄로 처리되어 함께 섞입니다. 빈 줄이 걱정된다면 먼저 빈 줄 제거 도구를 사용하세요.</p></details><details class="faq-item"><summary>데이터가 서버로 전송되나요?</summary><p>아니요. 모든 셔플 처리는 브라우저 내에서만 이루어집니다. 데이터는 어디에도 전송되지 않습니다.</p></details>'},
  en:{lang:'en',title:'Text Shuffler - Shuffle Lines, Words, Characters Online | Free',btn:'🌐 中文',
    sub:'Select a shuffle mode and randomize your text.',
    modeLines:'Shuffle Lines',modeWords:'Shuffle Words',modeChars:'Shuffle Characters',
    labelInput:'INPUT',labelOutput:'OUTPUT',btnShuffle:'🔀 Shuffle',btnCopy:'📋 Copy',btnClear:'🗑 Clear',
    seoHtml:'<h2>What is Text Shuffler?</h2><p>Text Shuffler is a free online tool that randomly reorders lines, words, or characters in your text. Useful for quizzes, randomized lists, sampling datasets, or just having fun.</p><details class="faq-item"><summary>Can I shuffle multiple times?</summary><p>Yes. Click the Shuffle button as many times as you like for a new random order each time.</p></details><details class="faq-item"><summary>Is the original text modified?</summary><p>No. The input area remains unchanged. Results appear only in the output area.</p></details><details class="faq-item"><summary>What shuffle algorithm is used?</summary><p>The tool uses the Fisher-Yates (Knuth) shuffle algorithm, which guarantees a uniformly random permutation.</p></details><details class="faq-item"><summary>Are empty lines included in the shuffle?</summary><p>Yes. Empty lines are treated as valid items and shuffled along with other lines. Use the Remove Empty Lines tool first if you want to exclude them.</p></details><details class="faq-item"><summary>Is my data sent to a server?</summary><p>No. All shuffling is performed entirely in your browser. Your text is never transmitted anywhere.</p></details>'},
  zh:{lang:'zh',title:'文本随机排列 - 在线打乱行·单词·字符 | 免费',btn:'🌐 日本語',
    sub:'选择打乱模式，随机排列您的文本。',
    modeLines:'打乱行',modeWords:'打乱单词',modeChars:'打乱字符',
    labelInput:'输入',labelOutput:'输出',btnShuffle:'🔀 打乱',btnCopy:'📋 复制',btnClear:'🗑 清空',
    seoHtml:'<h2>文本随机排列工具简介</h2><p>文本随机排列工具可以将文本中的行、单词或字符进行随机重新排序，适用于出题、随机列表、数据采样等场景。</p><details class="faq-item"><summary>可以多次打乱吗？</summary><p>可以。每次点击打乱按钮都会生成新的随机顺序。</p></details><details class="faq-item"><summary>原始文本会被修改吗？</summary><p>不会。输入框内容保持不变，结果仅显示在输出框中。</p></details><details class="faq-item"><summary>使用的是什么打乱算法？</summary><p>工具使用Fisher-Yates（Knuth）打乱算法，可保证完全均匀的随机排列。</p></details><details class="faq-item"><summary>空行也会参与打乱吗？</summary><p>是的。空行被视为有效条目，会和其他行一起打乱。如不希望包含空行，请先使用删除空行工具。</p></details><details class="faq-item"><summary>数据会上传到服务器吗？</summary><p>不会。所有打乱操作均在浏览器本地完成，文本不会传输到任何地方。</p></details>'},
  ja:{lang:'ja',title:'テキストシャッフル - 行・単語・文字をランダム並び替え | 無料',btn:'🌐 한국어',
    sub:'シャッフルモードを選択して、テキストをランダムに並び替えます。',
    modeLines:'行をシャッフル',modeWords:'単語をシャッフル',modeChars:'文字をシャッフル',
    labelInput:'入力',labelOutput:'出力',btnShuffle:'🔀 シャッフル',btnCopy:'📋 コピー',btnClear:'🗑 クリア',
    seoHtml:'<h2>テキストシャッフルツールとは？</h2><p>テキストシャッフルツールは、テキストの行・単語・文字をランダムに並び替えるオンラインツールです。クイズ作成・ランダムリスト・データサンプリングなどに活用できます。</p><details class="faq-item"><summary>何度でもシャッフルできますか？</summary><p>はい。シャッフルボタンをクリックするたびに新しいランダム順が生成されます。</p></details><details class="faq-item"><summary>元のテキストは変更されますか？</summary><p>いいえ。入力欄はそのままで、結果は出力欄にのみ表示されます。</p></details><details class="faq-item"><summary>どのシャッフルアルゴリズムを使用していますか？</summary><p>Fisher-Yates（Knuth）シャッフルアルゴリズムを使用しており、均一なランダム順列を保証します。</p></details><details class="faq-item"><summary>空行もシャッフルに含まれますか？</summary><p>はい。空行も有効な行として扱われ、他の行と一緒にシャッフルされます。不要な場合は先に空行削除ツールをご利用ください。</p></details><details class="faq-item"><summary>データはサーバーに送信されますか？</summary><p>いいえ。すべてのシャッフル処理はブラウザ内で行われます。テキストはどこにも送信されません。</p></details>'}
};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
