<script>
const _i18n={
  ko:{sub:'이미지 용량 압축 · JPEG/WebP 품질 조절 · 브라우저에서 처리',langBtn:'🌐 EN',backBtn:'← 모두의 툴',dropText:'이미지를 드래그하거나 클릭해서 선택',qualLabel:'품질',fmtLabel:'출력',compBtn:'▶ 압축',origLabel:'ORIGINAL',compLabel:'COMPRESSED',dlBtn:'⬇ 다운로드',seoH2:'Image Compressor 완벽 가이드',seoP:'이미지 파일 크기는 웹사이트 로딩 속도와 SEO에 직접 영향을 미칩니다. Canvas API를 활용해 브라우저에서 직접 이미지를 압축하므로 서버 전송 없이 개인정보가 완전히 보호됩니다. JPEG는 품질 70~80% 설정 시 원본 대비 60~80% 용량 절감이 가능하며, WebP 형식은 같은 화질에서 JPEG보다 25~35% 더 작습니다. PNG 투명 이미지는 WebP 변환으로 투명도를 유지하면서도 용량을 크게 줄일 수 있습니다. Google PageSpeed Insights에서 권장하는 "적절한 이미지 크기" 항목을 통과하려면 웹 표시 크기에 맞는 압축이 필수입니다.',exH3:'활용 예시',exList:'<li>블로그 본문 이미지 업로드 전 용량 최적화 (1MB → 150KB)</li><li>상품 이미지를 WebP로 변환해 쇼핑몰 페이지 속도 개선</li><li>이메일 첨부 이미지 크기 축소 (첨부 한도 초과 방지)</li><li>소셜 미디어 업로드용 이미지 최적화 (인스타그램, 트위터)</li><li>PNG 로고·스크린샷을 WebP로 전환해 투명도 유지하며 압축</li><li>대용량 RAW 사진 미리보기 썸네일 생성</li>',faqH3:'자주 묻는 질문',faqList:`<details class="faq-item"><summary>Q. JPEG, WebP, PNG 중 어떤 형식을 선택해야 하나요?</summary><p>사진·복잡한 이미지 → WebP (최고 압축률, 모든 현대 브라우저 지원). 투명 배경 필요 → WebP 또는 PNG. IE11 지원 필요 → JPEG. 단, WebP가 JPEG보다 25~35% 작으므로 특별한 이유 없으면 WebP 권장.</p></details><details class="faq-item"><summary>Q. 품질 값(Quality)을 얼마로 설정해야 하나요?</summary><p>웹 표시용: 70~80이 최적. 눈으로 구분이 어려우면서 용량은 60~75% 절감. 인쇄·고품질 포트폴리오: 85~90 권장. 썸네일·미리보기: 50~65로도 충분.</p></details><details class="faq-item"><summary>Q. 이미지가 서버로 전송되나요?</summary><p>아니요. Canvas API를 사용해 브라우저 로컬에서만 처리합니다. 인터넷 연결 없이도 작동하며 개인 사진이나 기밀 이미지도 안전하게 압축할 수 있습니다.</p></details><details class="faq-item"><summary>Q. 압축 후 원본과 화질 차이가 크게 나나요?</summary><p>품질 75% 기준 일반적인 화면 표시 목적에서는 차이를 거의 느끼기 어렵습니다. 비교 슬라이더를 사용해 원본과 압축본을 직접 비교해 보세요.</p></details><details class="faq-item"><summary>Q. PNG를 압축하면 투명도가 유지되나요?</summary><p>PNG를 PNG로 출력하면 투명도 유지. PNG를 WebP로 출력해도 투명도 유지. 단, JPEG로 출력하면 투명 영역이 흰색으로 채워집니다. 투명도가 중요하면 WebP 또는 PNG 출력 선택.</p></details><details class="faq-item"><summary>Q. 압축 가능한 최대 파일 크기는 얼마인가요?</summary><p>브라우저 메모리 한도 내에서 처리됩니다. 일반적으로 20MB 미만의 이미지는 문제없이 처리됩니다. 초대형 TIFF나 고해상도 RAW 파일은 브라우저 메모리 부족으로 실패할 수 있습니다.</p></details><details class="faq-item"><summary>Q. 여러 이미지를 한 번에 압축할 수 있나요?</summary><p>현재 버전은 이미지 1개씩 처리합니다. 다음 이미지를 드래그&드롭하거나 클릭해 선택하면 새 이미지 처리가 시작됩니다.</p></details><details class="faq-item"><summary>Q. WebP 형식은 모든 브라우저에서 지원되나요?</summary><p>Chrome, Edge, Firefox, Safari 14+, 모바일 브라우저 대부분 지원. IE11에서는 미지원. 2023년 기준 전 세계 브라우저 점유율 96%+ 지원. IE11 대상 사이트가 아니면 WebP 사용 권장.</p></details><details class="faq-item"><summary>Q. 압축 후 이미지의 가로·세로 크기가 변하나요?</summary><p>아니요. 이 도구는 화질(품질)을 조정해 파일 크기를 줄이는 것이므로 픽셀 해상도는 유지됩니다. 이미지 크기(픽셀)를 변경하려면 Image Resizer를 사용하세요.</p></details><details class="faq-item"><summary>Q. Google PageSpeed에서 이미지 최적화 권고를 받았는데 어떤 설정이 좋을까요?</summary><p>WebP 형식 + 품질 75~80 설정 권장. 표시 크기보다 2배 이상 큰 이미지는 Image Resizer로 크기를 먼저 줄인 후 압축하면 더 효과적입니다.</p></details><details class="faq-item"><summary>Q. EXIF 정보(GPS, 카메라 설정)가 제거되나요?</summary><p>Canvas API를 통한 변환 과정에서 EXIF 메타데이터는 기본적으로 제거됩니다. 개인정보 보호 측면에서 이점이 있지만, EXIF가 필요한 경우 전문 도구를 사용하세요.</p></details><details class="faq-item"><summary>Q. 압축된 이미지를 다운로드하면 파일명은 어떻게 되나요?</summary><p>원본 파일명에 '_compressed' 접미사가 추가되고 선택한 출력 형식의 확장자로 저장됩니다. (예: photo_compressed.webp)</p></details>`},
  en:{sub:'Compress image size · JPEG/WebP quality · All in browser',langBtn:'🌐 中文',backBtn:'← All Tools',dropText:'Drag & drop or click to select image',qualLabel:'Quality',fmtLabel:'Output',compBtn:'▶ Compress',origLabel:'ORIGINAL',compLabel:'COMPRESSED',dlBtn:'⬇ Download',seoH2:'Image Compressor — Complete Guide',seoP:'Image file size directly impacts page load speed, SEO rankings, and user experience. This tool compresses images entirely in your browser using the Canvas API — your files never leave your device. JPEG at quality 70–80 typically reduces file size by 60–80% with negligible visible quality loss. WebP produces files 25–35% smaller than JPEG at equivalent quality, and is supported by 96%+ of browsers worldwide. PNG images with transparency can be converted to WebP to maintain transparency while significantly reducing file size. Compress before uploading to blogs, e-commerce stores, email attachments, or social media to pass Google PageSpeed "Serve images in next-gen formats" and "Properly size images" audits.',exH3:'Usage Examples',exList:'<li>Optimize blog images before upload (reduce 1MB → 150KB)</li><li>Convert product photos to WebP to speed up e-commerce page loads</li><li>Shrink email attachment images to stay under size limits</li><li>Prepare optimized images for social media (Instagram, Twitter, LinkedIn)</li><li>Convert PNG logos to WebP while keeping transparency</li><li>Generate lightweight thumbnails from high-resolution photos</li>',faqH3:'Frequently Asked Questions',faqList:`<details class="faq-item"><summary>Q. Which format should I choose: JPEG, WebP, or PNG?</summary><p>Photos & complex images → WebP (best compression, 96%+ browser support). Transparent backgrounds → WebP or PNG. Legacy IE11 support needed → JPEG. WebP is 25–35% smaller than JPEG at the same quality, so prefer WebP unless you have a specific reason not to.</p></details><details class="faq-item"><summary>Q. What quality setting should I use?</summary><p>Web display: 70–80 is the sweet spot — visually indistinguishable from original while reducing file size 60–75%. Print or high-quality portfolio: 85–90. Thumbnails and previews: 50–65 is sufficient.</p></details><details class="faq-item"><summary>Q. Is my image sent to a server?</summary><p>No. All processing happens locally in your browser using the Canvas API. The tool works offline and is safe for personal photos or confidential images.</p></details><details class="faq-item"><summary>Q. Will quality noticeably degrade after compression?</summary><p>At quality 75%, the difference is barely perceptible for typical screen display. Use the before/after comparison slider to judge for yourself before downloading.</p></details><details class="faq-item"><summary>Q. Is PNG transparency preserved after compression?</summary><p>PNG → PNG: transparency preserved. PNG → WebP: transparency preserved. PNG → JPEG: transparent areas become white. Choose WebP or PNG output if transparency matters.</p></details><details class="faq-item"><summary>Q. What is the maximum file size I can compress?</summary><p>Processing is limited by browser memory. Images under 20MB generally work fine. Very large TIFF or high-resolution RAW files may fail due to memory constraints.</p></details><details class="faq-item"><summary>Q. Can I compress multiple images at once?</summary><p>The current version processes one image at a time. Drop the next image to start a new compression immediately.</p></details><details class="faq-item"><summary>Q. Is WebP supported in all browsers?</summary><p>Chrome, Edge, Firefox, Safari 14+, and most mobile browsers support WebP. IE11 does not. As of 2024, global browser support exceeds 96%. Use WebP unless targeting legacy browsers.</p></details><details class="faq-item"><summary>Q. Will the image dimensions change after compression?</summary><p>No. This tool only adjusts compression quality — pixel dimensions remain unchanged. To resize image dimensions, use the Image Resizer tool.</p></details><details class="faq-item"><summary>Q. I got a Google PageSpeed "serve next-gen formats" warning. What settings should I use?</summary><p>Select WebP output at quality 75–80. If the original image is larger than its display size, run it through Image Resizer first, then compress. This combination typically clears both PageSpeed image warnings.</p></details><details class="faq-item"><summary>Q. Are EXIF metadata (GPS, camera settings) removed?</summary><p>Yes. The Canvas API conversion strips EXIF metadata by default. This is a privacy benefit — location data in photos is removed. If you need to preserve EXIF, use a dedicated metadata tool.</p></details><details class="faq-item"><summary>Q. What will the downloaded file be named?</summary><p>The original filename with '_compressed' appended, using the chosen output format's extension. (e.g., photo_compressed.webp)</p></details>`},
  zh:{sub:'图片压缩 · JPEG/WebP质量调节 · 浏览器处理',langBtn:'🌐 日本語',backBtn:'← 所有工具',dropText:'拖放或点击选择图片',qualLabel:'质量',fmtLabel:'输出',compBtn:'▶ 压缩',origLabel:'原图',compLabel:'压缩后',dlBtn:'⬇ 下载',seoH2:'图片压缩工具完全指南',seoP:'图片文件大小直接影响网页加载速度、SEO排名和用户体验。本工具完全在浏览器内通过Canvas API处理图片，文件不会上传至任何服务器，个人隐私得到充分保护。JPEG格式在70–80质量设置下通常可减少60–80%的文件大小，而WebP格式在相同画质下比JPEG小25–35%，且已被全球96%以上的浏览器支持。带透明背景的PNG图片可转换为WebP，在保留透明度的同时大幅减小文件体积。优化后的图片有助于通过Google PageSpeed"使用新一代格式提供图片"和"适当调整图片大小"的审查。',exH3:'使用示例',exList:'<li>博客文章图片上传前优化（1MB压缩至150KB）</li><li>将商品图片转为WebP格式，提升电商页面加载速度</li><li>压缩邮件附件图片，避免超出附件大小限制</li><li>为社交媒体准备优化图片（Instagram、微博、微信）</li><li>将PNG Logo转为WebP格式，保留透明度同时减小体积</li><li>从高分辨率照片生成轻量级缩略图</li>',faqH3:'常见问题',faqList:`<details class="faq-item"><summary>Q. 应该选择JPEG、WebP还是PNG格式？</summary><p>照片和复杂图像 → WebP（最佳压缩率，支持率96%+）。需要透明背景 → WebP或PNG。需要兼容IE11 → JPEG。WebP比JPEG小25–35%，没有特殊需求推荐使用WebP。</p></details><details class="faq-item"><summary>Q. 应该设置多少质量值？</summary><p>网页展示：70–80为最佳平衡点，视觉几乎无差别，文件减少60–75%。印刷或高质量作品集：85–90。缩略图和预览：50–65已足够。</p></details><details class="faq-item"><summary>Q. 图片会上传到服务器吗？</summary><p>不会。所有处理均在浏览器本地通过Canvas API完成，无需网络连接，个人照片和机密图片均可安全使用。</p></details><details class="faq-item"><summary>Q. 压缩后画质下降明显吗？</summary><p>质量75%时，普通屏幕展示几乎看不出差别。下载前可使用前后对比滑块自行判断效果。</p></details><details class="faq-item"><summary>Q. 压缩PNG图片后透明度还在吗？</summary><p>PNG → PNG：保留透明度。PNG → WebP：保留透明度。PNG → JPEG：透明区域变为白色。需要保留透明度请选择WebP或PNG输出。</p></details><details class="faq-item"><summary>Q. 能处理的最大文件是多大？</summary><p>受浏览器内存限制，20MB以下的图片通常可正常处理。超大TIFF或高分辨率RAW文件可能因内存不足而失败。</p></details><details class="faq-item"><summary>Q. 能同时压缩多张图片吗？</summary><p>当前版本每次处理一张图片。拖入下一张图片即可立即开始新的压缩。</p></details><details class="faq-item"><summary>Q. 所有浏览器都支持WebP吗？</summary><p>Chrome、Edge、Firefox、Safari 14+及大多数移动浏览器均支持WebP。IE11不支持。2024年全球浏览器支持率超过96%，非IE11场景推荐使用WebP。</p></details><details class="faq-item"><summary>Q. 压缩后图片的尺寸（宽高）会改变吗？</summary><p>不会。本工具只调整压缩质量，像素尺寸保持不变。如需更改图片尺寸，请使用Image Resizer工具。</p></details><details class="faq-item"><summary>Q. Google PageSpeed提示"使用新一代格式"应如何优化？</summary><p>选择WebP输出，质量设为75–80。若原图尺寸远大于显示尺寸，建议先用Image Resizer缩小尺寸再压缩，通常可同时通过PageSpeed的图片相关检查项。</p></details><details class="faq-item"><summary>Q. EXIF信息（GPS位置、相机参数）会被删除吗？</summary><p>是的。Canvas API转换过程中默认会去除EXIF元数据，有助于保护位置隐私。如需保留EXIF，请使用专用的元数据工具。</p></details><details class="faq-item"><summary>Q. 下载的文件名是什么？</summary><p>原始文件名加上"_compressed"后缀，扩展名为所选输出格式。例如：photo_compressed.webp。</p></details>`},
  ja:{sub:'画像圧縮 · JPEG/WebP 品質調節 · ブラウザ処理',langBtn:'🌐 한국어',backBtn:'← ホーム',dropText:'画像をドラッグまたはクリックして選択',qualLabel:'品質',fmtLabel:'出力',compBtn:'▶ 圧縮',origLabel:'元の画像',compLabel:'圧縮後',dlBtn:'⬇ ダウンロード',seoH2:'Image Compressor 完全ガイド',seoP:'画像ファイルサイズはページ読み込み速度、SEO順位、ユーザー体験に直接影響します。本ツールはCanvas APIを使用してブラウザ内でのみ処理を行い、ファイルはサーバーに送信されません。JPEGは品質70〜80設定でファイルサイズを60〜80%削減できます。WebPは同等画質でJPEGより25〜35%小さく、全世界のブラウザの96%以上でサポートされています。透明背景のPNG画像もWebPに変換することで透明度を保持しつつファイルサイズを大幅に削減できます。Google PageSpeedの「次世代フォーマットでの画像の配信」および「適切なサイズの画像」監査を通過するために圧縮最適化が不可欠です。',exH3:'活用例',exList:'<li>ブログ記事の画像をアップロード前に最適化（1MB → 150KB）</li><li>商品画像をWebPに変換してECサイトのページ表示速度を改善</li><li>メール添付画像を圧縮してサイズ制限をクリア</li><li>SNS投稿用画像を最適化（Instagram、Twitter、LINE）</li><li>PNGロゴをWebPに変換して透明度を維持しつつ軽量化</li><li>高解像度写真から軽量サムネイルを生成</li>',faqH3:'よくある質問',faqList:`<details class="faq-item"><summary>Q. JPEG・WebP・PNG、どの形式を選べばいい？</summary><p>写真・複雑な画像 → WebP（最高圧縮率、96%+ブラウザ対応）。透明背景が必要 → WebPまたはPNG。IE11対応が必要 → JPEG。WebPはJPEGより25〜35%小さいので特別な理由がなければWebP推奨。</p></details><details class="faq-item"><summary>Q. 品質（Quality）はいくつに設定すべきですか？</summary><p>Web表示用：70〜80が最適。視覚的にほぼ差がなくファイルサイズ60〜75%削減。印刷・高品質ポートフォリオ：85〜90推奨。サムネイル・プレビュー：50〜65で十分。</p></details><details class="faq-item"><summary>Q. 画像はサーバーに送信されますか？</summary><p>いいえ。Canvas APIを使用してブラウザ内のみで処理されます。オフラインでも動作し、個人写真や機密画像も安全に圧縮できます。</p></details><details class="faq-item"><summary>Q. 圧縮後の画質は大きく落ちますか？</summary><p>品質75%では通常の画面表示において差はほとんどわかりません。ダウンロード前に比較スライダーで確認することをお勧めします。</p></details><details class="faq-item"><summary>Q. PNG圧縮後も透明度は保持されますか？</summary><p>PNG → PNG：透明度保持。PNG → WebP：透明度保持。PNG → JPEG：透明領域が白くなります。透明度が重要な場合はWebPまたはPNG出力を選択してください。</p></details><details class="faq-item"><summary>Q. 処理できる最大ファイルサイズは？</summary><p>ブラウザのメモリ制限内で処理されます。20MB未満の画像は通常問題なく処理できます。超大容量のTIFFや高解像度RAWファイルはメモリ不足で失敗することがあります。</p></details><details class="faq-item"><summary>Q. 複数の画像を一度に圧縮できますか？</summary><p>現在のバージョンは1枚ずつ処理します。次の画像をドラッグ＆ドロップまたはクリックで選択すると、すぐに次の圧縮を開始できます。</p></details><details class="faq-item"><summary>Q. WebPはすべてのブラウザで使えますか？</summary><p>Chrome、Edge、Firefox、Safari 14+、ほとんどのモバイルブラウザで対応。IE11は非対応。2024年時点でグローバルブラウザ対応率は96%超。IE11対象サイトでなければWebP推奨。</p></details><details class="faq-item"><summary>Q. 圧縮後に画像の縦横サイズは変わりますか？</summary><p>変わりません。このツールは圧縮品質のみ調整します。ピクセルサイズを変更したい場合はImage Resizerをご利用ください。</p></details><details class="faq-item"><summary>Q. Google PageSpeedで「次世代フォーマット」の指摘を受けた場合は？</summary><p>WebP出力＋品質75〜80の設定を推奨します。元画像が表示サイズより大幅に大きい場合は先にImage Resizerで縮小してから圧縮すると、PageSpeedの画像関連の指摘を一括で解消できます。</p></details><details class="faq-item"><summary>Q. EXIFメタデータ（GPS・カメラ設定）は削除されますか？</summary><p>はい。Canvas API変換の過程でEXIFメタデータはデフォルトで削除されます。位置情報プライバシーの観点でメリットがあります。EXIFを保持したい場合は専用ツールをお使いください。</p></details><details class="faq-item"><summary>Q. ダウンロードしたファイルの名前はどうなりますか？</summary><p>元のファイル名に「_compressed」を付加し、選択した出力形式の拡張子で保存されます（例：photo_compressed.webp）。</p></details>`},
};
let _lang='ko',_origFile=null,_compBlob=null;
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

function ev(e,type){e.preventDefault();const dz=document.getElementById('dropZone');if(type==='over')dz.classList.add('over');else if(type==='leave')dz.classList.remove('over');else{dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))loadFile(f);}}
function onFile(e){const f=e.target.files[0];if(f)loadFile(f);}
function fmtSize(b){return b>1024*1024?(b/1024/1024).toFixed(2)+' MB':(b/1024).toFixed(1)+' KB';}

function loadFile(f){
  _origFile=f;
  document.getElementById('opts').style.display='block';
  document.getElementById('result').style.display='none';
}

function compress(){
  if(!_origFile) return;
  const quality=parseInt(document.getElementById('quality').value)/100;
  const fmt='image/'+document.getElementById('outFmt').value;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=img.width;c.height=img.height;
      c.getContext('2d').drawImage(img,0,0);
      c.toBlob(blob=>{
        _compBlob=blob;
        const compUrl=URL.createObjectURL(blob);
        const origUrl=e.target.result;
        document.getElementById('origImg').src=origUrl;
        document.getElementById('compImg').src=compUrl;
        document.getElementById('origSize').textContent=fmtSize(_origFile.size);
        document.getElementById('compSize').textContent=fmtSize(blob.size);
        const pct=Math.round((1-blob.size/_origFile.size)*100);
        document.getElementById('saving').textContent=pct>0?`▼ ${pct}% 절감`:`▲ ${Math.abs(pct)}% 증가`;
        document.getElementById('result').style.display='block';
      },fmt,quality);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(_origFile);
}

function download(){
  if(!_compBlob)return;
  const ext=document.getElementById('outFmt').value;
  const name=(_origFile.name.replace(/\.[^.]+$/,'')||'image')+'_compressed.'+ext;
  const a=document.createElement('a');a.href=URL.createObjectURL(_compBlob);a.download=name;a.click();
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
