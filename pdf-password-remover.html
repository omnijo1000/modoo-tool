let _lang='ko',_buf=null;
const _i18n={
  ko:{h1b:'비밀번호 제거',sub:'PDF 파일의 비밀번호 보호를 해제합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',pageTitle:'PDF 비밀번호 제거 | MODOO HUB',dropTxt:'PDF 파일을 드래그하거나 클릭하여 선택',lblPw:'비밀번호 입력',lblPwField:'현재 비밀번호',removeBtn:'🔓 비밀번호 제거 후 다운로드',msgOk:'✅ 완료! 다운로드가 시작됩니다.',msgErr:'❌ 오류: 비밀번호가 틀리거나 지원하지 않는 형식입니다.',
    seoHtml:`<h2>PDF 비밀번호 제거</h2><p>암호화된 <strong>PDF 파일</strong>의 비밀번호를 제거하고 보호 해제된 PDF를 다운로드합니다. 현재 비밀번호를 알고 있는 경우 브라우저에서 바로 처리됩니다. 서버 전송 없이 완전 로컬 처리입니다.</p>

<details class="faq-item"><summary>제거 후 PDF 품질이 달라지나요?</summary><p>아니요. 내용·품질·구조 변경 없이 보호만 해제됩니다.</p></details>
<details class="faq-item"><summary>파일 크기가 달라지나요?</summary><p>약간 달라질 수 있지만 내용은 동일합니다.</p></details>
<details class="faq-item"><summary>반대로 비밀번호를 추가하려면?</summary><p>PDF 비밀번호 추가 도구를 사용하세요.</p></details>
<details class="faq-item"><summary>모바일에서도 사용할 수 있나요?</summary><p>예, 모바일 브라우저에서도 동작합니다.</p></details>
<details class="faq-item"><summary>처리 속도는 어떤가요?</summary><p>파일 크기에 따라 다르지만 대부분 수 초 내에 완료됩니다.</p></details>`
  },
  en:{h1b:'Password Remover',sub:'Remove password protection from PDF files',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'PDF Password Remover | MODOO HUB',dropTxt:'Drop PDF here or click to select',lblPw:'Enter Password',lblPwField:'Current Password',removeBtn:'🔓 Remove Password & Download',msgOk:'✅ Done! Download starting.',msgErr:'❌ Error: Wrong password or unsupported format.',
    seoHtml:`<h2>PDF Password Remover</h2><p>Remove password protection from <strong>encrypted PDF files</strong> and download the unlocked PDF. Works entirely in your browser — no files sent to any server. You must know the current password to remove it.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Can I remove the password without knowing it?</summary><p>No. You must enter the current password. Password cracking is not supported.</p></details>
<details class="faq-item"><summary>Is my file uploaded to a server?</summary><p>No — fully local, processed in the browser.</p></details>
<details class="faq-item"><summary>What encryption is supported?</summary><p>Standard AES-128 and AES-256 PDF encryption.</p></details>
<details class="faq-item"><summary>Will the PDF quality change?</summary><p>No — content and structure are preserved exactly.</p></details>
<details class="faq-item"><summary>Will the file size change?</summary><p>Slightly, but the content is identical.</p></details>
<details class="faq-item"><summary>How do I add a password instead?</summary><p>Use the PDF Password Adder tool.</p></details>
<details class="faq-item"><summary>Does it work on mobile?</summary><p>Yes, any modern mobile browser works.</p></details>
<details class="faq-item"><summary>How fast is the processing?</summary><p>Most files complete within seconds, depending on file size.</p></details>`
  },
  zh:{h1b:'密码删除',sub:'删除PDF文件的密码保护',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'PDF密码删除 | MODOO HUB',dropTxt:'拖放PDF文件或点击选择',lblPw:'输入密码',lblPwField:'当前密码',removeBtn:'🔓 删除密码并下载',msgOk:'✅ 完成！下载开始。',msgErr:'❌ 错误：密码错误或不支持的格式。',
    seoHtml:`<h2>PDF密码删除器</h2><p>删除<strong>加密PDF文件</strong>的密码保护，下载解密后的PDF。完全在浏览器中本地处理，不上传任何文件。需要知道当前密码才能删除。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>不知道密码能删除吗？</summary><p>不能。您必须输入当前密码，不支持密码破解。</p></details>
<details class="faq-item"><summary>文件会上传服务器吗？</summary><p>不会，完全在浏览器本地处理。</p></details>
<details class="faq-item"><summary>支持哪些加密方式？</summary><p>支持标准AES-128和AES-256 PDF加密。</p></details>
<details class="faq-item"><summary>PDF质量会改变吗？</summary><p>不会，内容和结构完全保留。</p></details>
<details class="faq-item"><summary>文件大小会变吗？</summary><p>可能略有变化，但内容相同。</p></details>
<details class="faq-item"><summary>如何添加密码？</summary><p>使用PDF密码添加工具。</p></details>
<details class="faq-item"><summary>手机上可以使用吗？</summary><p>可以，任何现代移动浏览器都可以使用。</p></details>
<details class="faq-item"><summary>处理速度如何？</summary><p>根据文件大小，大多数文件几秒内完成。</p></details>`
  },
  ja:{h1b:'パスワード削除',sub:'PDFファイルのパスワード保護を解除します',backLink:'← ホーム',langBtn:'🌐 한국어',pageTitle:'PDFパスワード削除 | MODOO HUB',dropTxt:'PDFファイルをドロップまたはクリックして選択',lblPw:'パスワード入力',lblPwField:'現在のパスワード',removeBtn:'🔓 パスワードを削除してダウンロード',msgOk:'✅ 完了！ダウンロード開始。',msgErr:'❌ エラー：パスワードが違うか非対応形式です。',
    seoHtml:`<h2>PDFパスワード削除</h2><p><strong>暗号化されたPDFファイル</strong>のパスワード保護を解除し、保護なしのPDFをダウンロードします。すべてブラウザ内で処理され、ファイルはどこにも送信されません。現在のパスワードを知っている必要があります。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>パスワードを知らなくても削除できますか？</summary><p>いいえ。現在のパスワードを入力する必要があります。パスワードクラッキングはサポートしていません。</p></details>
<details class="faq-item"><summary>ファイルはサーバーに送信されますか？</summary><p>いいえ、すべてブラウザ内でローカル処理されます。</p></details>
<details class="faq-item"><summary>どの暗号化に対応していますか？</summary><p>標準のAES-128およびAES-256 PDF暗号化に対応しています。</p></details>
<details class="faq-item"><summary>PDF品質は変わりますか？</summary><p>いいえ、内容と構造はそのまま保持されます。</p></details>
<details class="faq-item"><summary>ファイルサイズは変わりますか？</summary><p>わずかに変わる可能性がありますが内容は同じです。</p></details>
<details class="faq-item"><summary>パスワードを追加するには？</summary><p>PDFパスワード追加ツールをご利用ください。</p></details>
<details class="faq-item"><summary>モバイルでも使えますか？</summary><p>はい、モダンなモバイルブラウザで動作します。</p></details>
<details class="faq-item"><summary>処理速度は？</summary><p>ファイルサイズによりますが、ほとんどは数秒で完了します。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;
  document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('dropTxt').textContent=t.dropTxt;
  document.getElementById('lblPw').textContent=t.lblPw;
  document.getElementById('lblPwField').textContent=t.lblPwField;
  document.getElementById('removeBtn').textContent=t.removeBtn;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function ev(e,cls){e.preventDefault();document.getElementById('dropZone').className='drop-zone'+' '+cls;}
function drop(e){e.preventDefault();document.getElementById('dropZone').className='drop-zone';const f=e.dataTransfer.files[0];if(f)loadFile(f);}
function loadFile(f){
  if(!f||!f.name.endsWith('.pdf'))return;
  document.getElementById('fileName').textContent=f.name+' ('+fmtBytes(f.size)+')';
  document.getElementById('formBox').style.display='block';
  const fr=new FileReader();fr.onload=ev2=>_buf=ev2.target.result;fr.readAsArrayBuffer(f);
}
function fmtBytes(b){return b>1048576?(b/1048576).toFixed(1)+' MB':Math.round(b/1024)+' KB';}
async function removePw(){
  const t=_i18n[_lang];const pw=document.getElementById('pwInput').value;const msgEl=document.getElementById('msgEl');
  const btn=document.getElementById('removeBtn');btn.disabled=true;msgEl.textContent='';
  try{
    const {PDFDocument}=PDFLib;
    const pdfDoc=await PDFDocument.load(_buf,{password:pw,ignoreEncryption:false});
    const bytes=await pdfDoc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    const fn=document.getElementById('fileName').textContent.split(' ')[0].replace('.pdf','');
    a.download=fn+'_unlocked.pdf';a.click();
    msgEl.className='msg ok';msgEl.textContent=t.msgOk;
  }catch(e){msgEl.className='msg err';msgEl.textContent=t.msgErr;}
  btn.disabled=false;
}
_lang=detectLang();applyLang();
</script>
