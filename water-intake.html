<style>
:root{--bg:#0a0a0a;--surface:#141414;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#38bdf8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:10px;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:540px;margin:0 auto;padding:40px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:28px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:32px;line-height:1.6;}
.input-group{margin-bottom:18px;}
label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:6px;font-family:'DM Mono',monospace;}
input[type=number]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:22px;font-weight:700;font-family:'DM Mono',monospace;outline:none;}
input:focus{border-color:var(--accent);}
.rb-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.rbtn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;text-align:left;line-height:1.5;}
.rbtn:hover,.rbtn.on{background:rgba(56,189,248,.12);border-color:var(--accent);color:var(--accent);font-weight:700;}
.rbtn.wide{width:100%;border-radius:8px;}
.rbtn.half{width:calc(50% - 4px);}
.calc-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Noto Sans KR',sans-serif;}
.calc-btn:hover{opacity:.85;}
.result-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px;display:none;}
.result-box.show{display:block;}
.water-display{text-align:center;padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.water-icon{font-size:40px;margin-bottom:8px;}
.water-amount{font-size:56px;font-weight:900;color:var(--accent);font-family:'DM Mono',monospace;line-height:1;}
.water-unit{font-size:16px;color:var(--text-muted);margin-top:4px;}
.cups-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.cup-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.cup-label{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:4px;}
.cup-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.s-row:last-child{border-bottom:none;}
.s-label{font-size:13px;color:var(--text-muted);}
.s-val{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);}
.tip-box{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--text-muted);line-height:1.7;margin-top:14px;}
.seo{margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}
.seo h2{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:40px;}
</style>

<script>
const _i18n = {

    langBtn:'🌐 EN', backBtn:'← 모두의 툴',
    weightLabel:'체중 (kg)', actLabel:'활동 수준', climateLabel:'기후', specialLabel:'특수 상황 (선택)',

    seoHtml:'<h2>하루 물 섭취량 계산기 사용법</h2><p>건강 전문가들은 체중 1kg당 약 33ml의 수분 섭취를 권장합니다. 운동 강도, 기후, 임신·수유 여부에 따라 추가 수분이 필요합니다. 체중·활동량·기후를 입력하면 하루 권장 수분량을 계산해 드립니다.</p><details class="faq-item"><summary>하루에 물을 얼마나 마셔야 하나요?</summary><p>일반 성인 기준 하루 1.5~2.5L가 권장됩니다. 체중 60kg 성인이라면 약 2L(60×33ml=1,980ml)가 기준입니다. 운동 시에는 30분마다 150~250ml를 추가로 섭취하세요.</p></details><details class="faq-item"><summary>커피나 차도 수분 섭취로 인정되나요?</summary><p>카페인이 소량 포함된 음료(커피·차)도 수분 섭취로 인정됩니다. 다만 알코올은 이뇨 작용이 있어 실제 수분 손실을 유발하므로 물로 추가 보충이 필요합니다.</p></details><details class="faq-item"><summary>물을 너무 많이 마셔도 문제가 되나요?</summary><p>드물지만 단시간에 과도한 수분(4L 이상)을 섭취하면 저나트륨혈증(물 중독)이 발생할 수 있습니다. 일반 생활에서는 갈증을 기준으로 마시면 과다 섭취 위험은 낮습니다.</p></details><details class="faq-item"><summary>수분 섭취를 효과적으로 늘리는 방법은?</summary><p>기상 직후 물 1잔으로 시작하고, 1~2시간마다 200ml씩 나눠 마시세요. 식사 전 물 1잔은 포만감을 높여 과식 예방에도 도움이 됩니다. 스마트폰 알림을 활용하는 것도 좋습니다.</p></details><details class="faq-item"><summary>더운 날씨나 운동 시 얼마나 더 마셔야 하나요?</summary><p>더운 환경에서는 기본 권장량의 20~30%를 추가 섭취하는 것이 좋습니다. 격한 운동 시에는 1시간당 500~1,000ml를 추가로 보충하고, 전해질 손실이 클 경우 스포츠 음료를 병행하세요.</p></details><details class="faq-item"><summary>커피나 차도 하루 수분 섭취량으로 계산되나요?</summary><p>커피와 차는 이뇨 작용이 있지만 수분 손실량보다 공급량이 많아 실질적인 수분 공급원으로 인정됩니다. 하루 카페인 400mg(커피 3~4잔) 이하라면 수분 섭취량에 포함할 수 있습니다.</p></details><details class="faq-item"><summary>운동 중 수분 보충은 얼마나 자주 해야 하나요?</summary><p>운동 전 500ml, 운동 중 15~20분마다 150~250ml, 운동 후 체중 감소량 1kg당 1.5L 섭취가 권장됩니다. 갈증을 느낄 때는 이미 1~2% 탈수 상태입니다. 장시간 운동 시 전해질 음료 병행을 고려하세요.</p></details><details class="faq-item"><summary>수분을 너무 많이 마시는 과수화(overhydration)도 위험한가요?</summary><p>과수화는 혈중 나트륨 농도를 낮춰 저나트륨혈증(hyponatremia)을 유발할 수 있습니다. 특히 장거리 마라톤 등에서 나타나며 두통, 오심, 심한 경우 의식 장애로 이어질 수 있습니다. 운동 시 갈증에 따라 마시는 것이 안전합니다.</p></details>',

    seoHtml:'<h2>How to Use the Water Intake Calculator</h2><p>Health experts recommend about 33ml of water per kg of body weight per day. Activity level, climate, and special conditions like pregnancy or breastfeeding increase this baseline. Enter your weight, activity level, and climate to get a personalized daily recommendation.</p><details class="faq-item"><summary>How much water should I drink per day?</summary><p>A common guideline is 33ml per kg of body weight. A 70kg adult needs roughly 2.3L (70 × 33ml). During exercise, add 150–250ml every 30 minutes of activity. Thirst is also a reliable real-time signal.</p></details><details class="faq-item"><summary>Do coffee and tea count toward my water intake?</summary><p>Yes — despite containing caffeine, coffee and tea contribute to hydration. However, alcohol has a diuretic effect and causes net fluid loss, so additional water is needed when drinking alcohol.</p></details><details class="faq-item"><summary>Can drinking too much water be harmful?</summary><p>Excessive water consumption over a short period (generally 4L+ in a few hours) can cause hyponatremia (water intoxication) — dangerously low blood sodium. In normal daily life, following thirst and the calculator recommendation keeps you well within safe range.</p></details><details class="faq-item"><summary>What are good habits to stay consistently hydrated?</summary><p>Start the day with a glass of water on waking. Drink 200ml every 1–2 hours rather than large amounts at once. A glass before meals helps with portion control. Phone reminders or a marked water bottle help track intake.</p></details><details class="faq-item"><summary>How much extra water do I need in hot weather or during exercise?</summary><p>In hot or humid conditions, add 20–30% to your baseline. During intense exercise, aim for an extra 500–1,000ml per hour. If sweating heavily, consider a sports drink to replace electrolytes alongside water.</p></details><details class="faq-item"><summary>Does coffee or tea count toward daily water intake?</summary><p>Coffee and tea are mild diuretics, but the fluid they provide outweighs the fluid loss, so they do count toward hydration. Up to about 400 mg of caffeine per day (3–4 cups of coffee) is generally safe and can be included in daily fluid totals.</p></details><details class="faq-item"><summary>How often should you drink water during exercise?</summary><p>Drink about 500 ml before exercise, 150–250 ml every 15–20 minutes during exercise, and approximately 1.5 L per kg of body weight lost after exercise. Feeling thirsty indicates 1–2% dehydration. For long sessions, consider electrolyte drinks.</p></details><details class="faq-item"><summary>Can drinking too much water (overhydration) be dangerous?</summary><p>Overhydration dilutes blood sodium levels, potentially causing hyponatremia — symptoms include headache, nausea, and in severe cases confusion or seizure. It most commonly occurs in endurance events. Drinking to thirst rather than a rigid schedule is the safest approach during exercise.</p></details>',
    footer:'Daily Water Intake Calculator',

    seoHtml:'<h2>饮水量计算器使用指南</h2><p>健康专家建议每公斤体重每天补充约33ml水分。活动量、气候以及妊娠、哺乳等特殊情况会增加基础需水量。输入体重、活动水平和气候，即可获取个性化的每日饮水推荐量。</p><details class="faq-item"><summary>每天应该喝多少水？</summary><p>通常建议每公斤体重补充33ml水。70kg的成年人每天大约需要2.3L（70×33ml）。运动时每30分钟额外补充150~250ml。口渴感也是实时判断是否需要补水的可靠信号。</p></details><details class="faq-item"><summary>喝咖啡和茶算作补水吗？</summary><p>算，尽管含有咖啡因，咖啡和茶仍有补水效果。但酒精具有利尿作用，会导致体液净损失，饮酒时需要额外补充水分。</p></details><details class="faq-item"><summary>喝太多水会有危险吗？</summary><p>在短时间内摄入过量水分（通常为几小时内超过4L）可能导致低钠血症（水中毒），这是危险的血钠浓度过低状态。在正常日常生活中，遵循口渴感和计算器建议量基本不会有过量风险。</p></details><details class="faq-item"><summary>如何养成规律补水的好习惯？</summary><p>早起先喝一杯水，每1~2小时喝200ml，避免一次性大量饮水。饭前喝一杯水有助于控制食量。手机提醒或有刻度的水瓶可以帮助追踪每日饮水量。</p></details><details class="faq-item"><summary>高温天气或运动时需要多喝多少水？</summary><p>在炎热或潮湿环境中，在基础量的基础上增加20~30%。高强度运动时，每小时额外补充500~1,000ml。大量出汗时，可同时饮用运动饮料以补充流失的电解质。</p></details><details class="faq-item"><summary>咖啡或茶计入每日水分摄入量吗？</summary><p>咖啡和茶具有轻微利尿作用，但提供的水分多于流失的水分，因此可计入水分补充。每天摄入约400毫克以内的咖啡因（3-4杯咖啡）是安全的，可包含在每日总水分中。</p></details><details class="faq-item"><summary>运动期间应该多久喝一次水？</summary><p>建议运动前饮水500毫升，运动中每15-20分钟补充150-250毫升，运动后每减少1公斤体重补充约1.5升水。感到口渴时通常已处于1-2%的脱水状态。长时间运动时可考虑补充电解质饮料。</p></details><details class="faq-item"><summary>喝太多水（过度水化）也会危险吗？</summary><p>过度水化会稀释血液中的钠浓度，可能导致低钠血症，症状包括头痛、恶心，严重时出现意识障碍。在耐力运动中最为常见，按口渴程度补水比严格遵循固定时间表更安全。</p></details>',

    seoHtml:'<h2>水分摂取量計算機の使い方</h2><p>健康の専門家は体重1kgあたり約33mlの水分摂取を推奨しています。活動量・気候・妊娠や授乳などの特別な状況によって基準量が増加します。体重・活動レベル・気候を入力すると、1日の推奨水分量を計算します。</p><details class="faq-item"><summary>1日に水をどれくらい飲めばよいですか？</summary><p>一般的な目安は体重1kgあたり33mlです。体重70kgの成人なら約2.3L（70×33ml）が目安です。運動中は30分ごとに150〜250mlを追加補給してください。喉の渇きも信頼できる実時間サインです。</p></details><details class="faq-item"><summary>コーヒーやお茶も水分補給になりますか？</summary><p>なります。カフェインを含んでいても、コーヒーやお茶は水分補給に貢献します。ただしアルコールは利尿作用があり体液の正味損失を引き起こすため、飲酒時は追加の水分補給が必要です。</p></details><details class="faq-item"><summary>水を飲みすぎると危険ですか？</summary><p>短時間に過剰な水分（数時間で4L以上）を摂取すると低ナトリウム血症（水中毒）が起こる可能性があります。通常の日常生活では、喉の渇きと計算機の推奨量に従えば過剰摂取のリスクはほぼありません。</p></details><details class="faq-item"><summary>こまめに水分補給する良い習慣は？</summary><p>起床直後にコップ1杯の水を飲むことから始めましょう。1〜2時間ごとに200mlずつ分けて飲み、一度に大量に飲むのは避けましょう。食事前の1杯は満腹感を高め過食防止にも役立ちます。スマートフォンのリマインダーも活用してください。</p></details><details class="faq-item"><summary>暑い日や運動時はどれくらい多く飲めばよいですか？</summary><p>暑い・蒸し暑い環境では基準量の20〜30%を追加摂取することをお勧めします。激しい運動中は1時間あたり500〜1,000mlを追加補給し、大量に汗をかく場合はスポーツドリンクも併用してください。</p></details><details class="faq-item"><summary>コーヒーやお茶も1日の水分摂取量に含まれますか？</summary><p>コーヒーやお茶には軽い利尿作用がありますが、提供する水分量の方が損失量を上回るため水分補給源として認められます。1日あたりカフェイン約400mg（コーヒー3〜4杯）以下であれば水分摂取量に含めることができます。</p></details><details class="faq-item"><summary>運動中はどのくらいの頻度で水分補給すべきですか？</summary><p>運動前に500ml、運動中は15〜20分ごとに150〜250ml、運動後は体重減少1kgあたり約1.5Lの摂取が推奨されます。口渇を感じた時点で1〜2%の脱水状態になっています。長時間の運動では電解質飲料の併用も検討してください。</p></details><details class="faq-item"><summary>水を飲みすぎる過水和も危険ですか？</summary><p>過水和は血中ナトリウム濃度を低下させ低ナトリウム血症を引き起こす可能性があります。症状は頭痛、吐き気、重症では意識障害です。持久系スポーツで多く見られます。運動中は固定スケジュールではなく口渇に合わせて飲むのが安全です。</p></details>',

let _lang = 'ko';
const LANGS = ['ko','en','zh','ja'];

function pick(btn, grp) {
  document.querySelectorAll('#'+grp+' .rbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}
function getVal(grp) { return parseFloat(document.querySelector('#'+grp+' .rbtn.on')?.dataset.val) || 0; }

function detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language?.slice(0,2);
  return n === 'zh' ? 'zh' : n === 'ja' ? 'ja' : n === 'ko' ? 'ko' : 'en';
}
function cycleLang() {
  const idx = LANGS.indexOf(_lang);
  _lang = LANGS[(idx+1)%LANGS.length];
  localStorage.setItem('modoo_lang', _lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', _lang);
  history.replaceState({}, '', url);
  applyLang();
}
function applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = _lang;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('backBtn').innerHTML = t.backBtn;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (t[k] !== undefined) el.innerHTML = t[k];
  });
}
function calc() {
  const weight = parseFloat(document.getElementById('weight').value);
  if (!weight || weight <= 0) return;
  const t = _i18n[_lang];
  const base = weight * 33;
  const activity = getVal('actGrp');
  const climate = getVal('climateGrp');
  const special = getVal('specialGrp');
  const total = base + activity + climate + special;
  const liters = (total / 1000).toFixed(2);
  document.getElementById('rLiters').textContent = liters;
  document.getElementById('cup200').textContent = Math.ceil(total/200);
  document.getElementById('cup250').textContent = Math.ceil(total/250);
  document.getElementById('bottle500').textContent = Math.ceil(total/500);
  const makeRow = (label, ml, color) => ml > 0
    ? `<div class="s-row"><span class="s-label">${label}</span><span class="s-val" style="color:${color||'var(--text)'}">${(ml/1000).toFixed(2)}L (${ml}ml)</span></div>`
    : '';
  document.getElementById('rRows').innerHTML =
    makeRow(t.rBase, base, 'var(--accent)') +
    makeRow(t.rActivity, activity) +
    makeRow(t.rClimate, climate) +
    makeRow(t.rSpecial, special) +
    `<div class="s-row" style="font-weight:700"><span class="s-label">${t.rTotal}</span><span class="s-val" style="color:var(--accent)">${liters}L (${Math.round(total)}ml)</span></div>`;
  document.getElementById('tipBox').textContent = t.tip;
  document.getElementById('result').classList.add('show');
}
_lang = detectLang();
applyLang();
</script>
