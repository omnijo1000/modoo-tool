<style>
:root{--bg:#0a0a0a;--surface:#141414;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#38bdf8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:10px;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:540px;margin:0 auto;padding:40px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:28px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:32px;line-height:1.6;}
.input-group{margin-bottom:18px;}
label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:6px;font-family:'DM Mono',monospace;}
input[type=number]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:22px;font-weight:700;font-family:'DM Mono',monospace;outline:none;}
input:focus{border-color:var(--accent);}
.rb-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.rbtn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;text-align:left;line-height:1.5;}
.rbtn:hover,.rbtn.on{background:rgba(56,189,248,.12);border-color:var(--accent);color:var(--accent);font-weight:700;}
.rbtn.wide{width:100%;border-radius:8px;}
.rbtn.half{width:calc(50% - 4px);}
.calc-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Noto Sans KR',sans-serif;}
.calc-btn:hover{opacity:.85;}
.result-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px;display:none;}
.result-box.show{display:block;}
.water-display{text-align:center;padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.water-icon{font-size:40px;margin-bottom:8px;}
.water-amount{font-size:56px;font-weight:900;color:var(--accent);font-family:'DM Mono',monospace;line-height:1;}
.water-unit{font-size:16px;color:var(--text-muted);margin-top:4px;}
.cups-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.cup-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.cup-label{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:4px;}
.cup-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.s-row:last-child{border-bottom:none;}
.s-label{font-size:13px;color:var(--text-muted);}
.s-val{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);}
.tip-box{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--text-muted);line-height:1.7;margin-top:14px;}
.seo{margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}
.seo h2{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:40px;}
</style>

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>

<main>
  <h1 data-i18n="h1">물 섭취량 <span>계산기</span></h1>
  <p class="sub" data-i18n="sub">체중·활동량·기후에 따른 하루 권장 수분 섭취량 계산</p>

  <div class="input-group">
    <label data-i18n="weightLabel">체중 (kg)</label>
    <input type="number" id="weight" value="70" min="1" step="0.1">
  </div>

  <div class="input-group">
    <label data-i18n="actLabel">활동 수준</label>
    <div class="rb-group" id="actGrp">
      <button class="rbtn half on" data-val="0" onclick="pick(this,'actGrp')"><span data-i18n="actSed">좌식 생활</span><br><small data-i18n="actSedH">운동 거의 없음</small></button>
      <button class="rbtn half" data-val="350" onclick="pick(this,'actGrp')"><span data-i18n="actLight">가벼운 활동</span><br><small data-i18n="actLightH">주 1-3회</small></button>
      <button class="rbtn half" data-val="700" onclick="pick(this,'actGrp')"><span data-i18n="actMod">보통 활동</span><br><small data-i18n="actModH">주 3-5회</small></button>
      <button class="rbtn half" data-val="1000" onclick="pick(this,'actGrp')"><span data-i18n="actActive">활발한 활동</span><br><small data-i18n="actActiveH">주 6-7회</small></button>
    </div>
  </div>

  <div class="input-group">
    <label data-i18n="climateLabel">기후</label>
    <div class="rb-group" id="climateGrp">
      <button class="rbtn on" data-val="0" onclick="pick(this,'climateGrp')" data-i18n="climNormal">일반 기후</button>
      <button class="rbtn" data-val="400" onclick="pick(this,'climateGrp')" data-i18n="climHot">더운 / 습한 환경</button>
    </div>
  </div>

  <div class="input-group">
    <label data-i18n="specialLabel">특수 상황 (선택)</label>
    <div class="rb-group" id="specialGrp">
      <button class="rbtn on" data-val="0" onclick="pick(this,'specialGrp')" data-i18n="specNone">없음</button>
      <button class="rbtn" data-val="500" onclick="pick(this,'specialGrp')" data-i18n="specPreg">임신 중</button>
      <button class="rbtn" data-val="700" onclick="pick(this,'specialGrp')" data-i18n="specBreast">모유 수유 중</button>
    </div>
  </div>

  <button class="calc-btn" onclick="calc()" data-i18n="calcBtn">계산하기</button>

  <div class="result-box" id="result">
    <div class="water-display">
      <div class="water-icon">💧</div>
      <div class="water-amount" id="rLiters">--</div>
      <div class="water-unit" data-i18n="literDay">L / 일</div>
    </div>
    <div class="cups-row">
      <div class="cup-card">
        <div class="cup-label" data-i18n="cupMl">컵 (200ml)</div>
        <div class="cup-val" id="cup200">--</div>
      </div>
      <div class="cup-card">
        <div class="cup-label" data-i18n="cupGlass">잔 (250ml)</div>
        <div class="cup-val" id="cup250">--</div>
      </div>
      <div class="cup-card">
        <div class="cup-label" data-i18n="bottleLabel">병 (500ml)</div>
        <div class="cup-val" id="bottle500">--</div>
      </div>
    </div>
    <div id="rRows"></div>
    <div class="tip-box" id="tipBox"></div>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">하루 물 섭취량 기준</h2>
    <p data-i18n="seoP">WHO 및 영양 전문가들은 체중 1kg당 약 33ml의 수분 섭취를 권장합니다. 운동 강도가 높거나 더운 환경에서는 추가 수분이 필요합니다. 일반적으로 성인은 하루 1.5~2.5L(음료 기준)를 섭취하는 것이 권장됩니다.</p>
  </div>
  <footer data-i18n="footer">하루 권장 수분 섭취량 계산기</footer>
</main>
<script>
const _i18n = {
  ko:{
    h1:'물 섭취량 <span style="color:var(--accent)">계산기</span>',
    sub:'체중·활동량·기후에 따른 하루 권장 수분 섭취량 계산',
    langBtn:'🌐 EN', backBtn:'← 모두의 툴',
    weightLabel:'체중 (kg)', actLabel:'활동 수준', climateLabel:'기후', specialLabel:'특수 상황 (선택)',
    actSed:'좌식 생활', actSedH:'운동 거의 없음',
    actLight:'가벼운 활동', actLightH:'주 1-3회',
    actMod:'보통 활동', actModH:'주 3-5회',
    actActive:'활발한 활동', actActiveH:'주 6-7회',
    climNormal:'일반 기후', climHot:'더운 / 습한 환경',
    specNone:'없음', specPreg:'임신 중', specBreast:'모유 수유 중',
    calcBtn:'계산하기',
    literDay:'L / 일',
    cupMl:'컵 (200ml)', cupGlass:'잔 (250ml)', bottleLabel:'병 (500ml)',
    rBase:'기본 권장량 (체중 기준)',
    rActivity:'활동량 추가',
    rClimate:'기후 추가',
    rSpecial:'특수 상황 추가',
    rTotal:'하루 총 권장 수분',
    tip:'물은 한 번에 많이 마시기보다 1~2시간마다 200ml씩 나눠 마시는 것이 좋습니다. 식사 전후 30분은 위산 희석을 방지하기 위해 피하세요.',
    seoH2:'하루 물 섭취량 기준',
    seoP:'WHO 및 영양 전문가들은 체중 1kg당 약 33ml 수분 섭취를 권장합니다. 운동 강도가 높거나 더운 환경에서는 추가 수분이 필요합니다.',
    footer:'하루 권장 수분 섭취량 계산기',
  },
  en:{
    h1:'Water Intake <span style="color:var(--accent)">Calculator</span>',
    sub:'Calculate daily water needs based on weight, activity & climate',
    langBtn:'🌐 中文', backBtn:'← All Tools',
    weightLabel:'Body Weight (kg)', actLabel:'Activity Level', climateLabel:'Climate', specialLabel:'Special Conditions (optional)',
    actSed:'Sedentary', actSedH:'Little or no exercise',
    actLight:'Lightly Active', actLightH:'1-3x / week',
    actMod:'Moderately Active', actModH:'3-5x / week',
    actActive:'Very Active', actActiveH:'6-7x / week',
    climNormal:'Normal Climate', climHot:'Hot / Humid',
    specNone:'None', specPreg:'Pregnant', specBreast:'Breastfeeding',
    calcBtn:'Calculate',
    literDay:'L / day',
    cupMl:'Cups (200ml)', cupGlass:'Glasses (250ml)', bottleLabel:'Bottles (500ml)',
    rBase:'Base (weight-based)',
    rActivity:'Activity add-on',
    rClimate:'Climate add-on',
    rSpecial:'Special condition add-on',
    rTotal:'Total Daily Water',
    tip:'Spread your water intake evenly — aim for a glass every 1-2 hours. Avoid large amounts right before or after meals.',
    seoH2:'Daily Water Intake Guidelines',
    seoP:'Health experts recommend about 33ml of water per kg of body weight. Higher activity levels and hot climates increase your needs.',
    footer:'Daily Water Intake Calculator',
  },
  zh:{
    h1:'饮水量 <span style="color:var(--accent)">计算器</span>',
    sub:'根据体重、活动量和气候计算每日饮水量',
    langBtn:'🌐 日本語', backBtn:'← 所有工具',
    weightLabel:'体重 (kg)', actLabel:'活动水平', climateLabel:'气候', specialLabel:'特殊情况（可选）',
    actSed:'久坐', actSedH:'几乎不运动',
    actLight:'轻度活动', actLightH:'每周1-3次',
    actMod:'中度活动', actModH:'每周3-5次',
    actActive:'高强度活动', actActiveH:'每周6-7次',
    climNormal:'普通气候', climHot:'炎热/潮湿',
    specNone:'无', specPreg:'孕期', specBreast:'哺乳期',
    calcBtn:'计算',
    literDay:'L / 天',
    cupMl:'杯 (200ml)', cupGlass:'杯 (250ml)', bottleLabel:'瓶 (500ml)',
    rBase:'基础需水量（体重）',
    rActivity:'活动量追加',
    rClimate:'气候追加',
    rSpecial:'特殊情况追加',
    rTotal:'每日总饮水量',
    tip:'建议每1-2小时喝200ml水，分散补水效果更好。饭前饭后30分钟内避免大量饮水。',
    seoH2:'每日饮水量标准',
    seoP:'健康专家建议每公斤体重约补充33ml水。高强度运动或炎热环境下需要额外补水。',
    footer:'每日饮水量计算器',
  },
  ja:{
    h1:'水分摂取量 <span style="color:var(--accent)">計算機</span>',
    sub:'体重・活動量・気候に基づく1日の推奨水分摂取量を計算',
    langBtn:'🌐 한국어', backBtn:'← ホーム',
    weightLabel:'体重 (kg)', actLabel:'活動レベル', climateLabel:'気候', specialLabel:'特別な状況（任意）',
    actSed:'座位中心', actSedH:'ほぼ運動なし',
    actLight:'軽い活動', actLightH:'週1〜3回',
    actMod:'中程度の活動', actModH:'週3〜5回',
    actActive:'活発な活動', actActiveH:'週6〜7回',
    climNormal:'通常気候', climHot:'暑い／湿度が高い',
    specNone:'なし', specPreg:'妊娠中', specBreast:'授乳中',
    calcBtn:'計算',
    literDay:'L / 日',
    cupMl:'カップ (200ml)', cupGlass:'グラス (250ml)', bottleLabel:'ボトル (500ml)',
    rBase:'基本推奨量（体重基準）',
    rActivity:'活動量の追加分',
    rClimate:'気候の追加分',
    rSpecial:'特別な状況の追加分',
    rTotal:'1日の総水分摂取量',
    tip:'水は一度にたくさん飲むより、1〜2時間ごとに200mlずつ分けて飲むのが効果的です。食事の前後30分は大量に飲むのを避けましょう。',
    seoH2:'1日の水分摂取量の目安',
    seoP:'健康の専門家は体重1kgあたり約33mlの水分摂取を推奨しています。運動量が多い場合や暑い環境では追加の水分補給が必要です。',
    footer:'1日の水分摂取量計算機',
  },
};
let _lang = 'ko';
const LANGS = ['ko','en','zh','ja'];

function pick(btn, grp) {
  document.querySelectorAll('#'+grp+' .rbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}
function getVal(grp) { return parseFloat(document.querySelector('#'+grp+' .rbtn.on')?.dataset.val) || 0; }

function detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language?.slice(0,2);
  return n === 'zh' ? 'zh' : n === 'ja' ? 'ja' : n === 'ko' ? 'ko' : 'en';
}
function cycleLang() {
  const idx = LANGS.indexOf(_lang);
  _lang = LANGS[(idx+1)%LANGS.length];
  localStorage.setItem('modoo_lang', _lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', _lang);
  history.replaceState({}, '', url);
  applyLang();
}
function applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = _lang;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('backBtn').innerHTML = t.backBtn;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (t[k] !== undefined) el.innerHTML = t[k];
  });
}
function calc() {
  const weight = parseFloat(document.getElementById('weight').value);
  if (!weight || weight <= 0) return;
  const t = _i18n[_lang];
  const base = weight * 33;
  const activity = getVal('actGrp');
  const climate = getVal('climateGrp');
  const special = getVal('specialGrp');
  const total = base + activity + climate + special;
  const liters = (total / 1000).toFixed(2);
  document.getElementById('rLiters').textContent = liters;
  document.getElementById('cup200').textContent = Math.ceil(total/200);
  document.getElementById('cup250').textContent = Math.ceil(total/250);
  document.getElementById('bottle500').textContent = Math.ceil(total/500);
  const makeRow = (label, ml, color) => ml > 0
    ? `<div class="s-row"><span class="s-label">${label}</span><span class="s-val" style="color:${color||'var(--text)'}">${(ml/1000).toFixed(2)}L (${ml}ml)</span></div>`
    : '';
  document.getElementById('rRows').innerHTML =
    makeRow(t.rBase, base, 'var(--accent)') +
    makeRow(t.rActivity, activity) +
    makeRow(t.rClimate, climate) +
    makeRow(t.rSpecial, special) +
    `<div class="s-row" style="font-weight:700"><span class="s-label">${t.rTotal}</span><span class="s-val" style="color:var(--accent)">${liters}L (${Math.round(total)}ml)</span></div>`;
  document.getElementById('tipBox').textContent = t.tip;
  document.getElementById('result').classList.add('show');
}
_lang = detectLang();
applyLang();
</script>
<script src="related.js"></script>
</body>
