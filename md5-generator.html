<p>MD5 (Message Digest Algorithm 5) was designed by Ron Rivest in 1991. It converts any input into a fixed 128-bit (32 hex character) hash. Despite being one of the most widely recognized hash functions, <strong>MD5 is not safe for security purposes</strong> due to demonstrated collision attacks. It remains useful for non-security tasks like file checksums and data deduplication.</p>
<details class="faq-item"><summary>Why is MD5 deprecated for passwords?</summary><p>MD5 is extremely fast — modern GPUs can compute billions of MD5 hashes per second. An attacker with a GPU can brute-force a 6-character password in milliseconds. MD5 also has collision vulnerabilities: two different inputs can produce the same hash. For passwords, use bcrypt, Argon2 (NIST recommended), or scrypt — designed to be intentionally slow.</p></details>
<details class="faq-item"><summary>MD5 vs SHA-256: what's the difference?</summary><p>MD5 produces 128-bit (32 hex char) output; SHA-256 produces 256-bit (64 hex char) output. MD5 has had real collision attacks demonstrated (in seconds on modern hardware); SHA-256 has none. For any security use case — file integrity of security software, digital signatures, certificates — use SHA-256 or stronger.</p></details>
<details class="faq-item"><summary>Where is MD5 still safe to use?</summary><p>MD5 is still appropriate for non-cryptographic purposes: verifying downloaded files where the checksum source is trusted (and the download is not a security-critical binary), database deduplication to find identical records or files, cache key generation, and maintaining compatibility with legacy systems where security is irrelevant.</p></details>

}

  ta.value = t;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast();
}

function showToast() {
  const el = document.getElementById('toast');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
