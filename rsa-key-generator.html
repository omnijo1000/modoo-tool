  const btn=document.getElementById('genBtn');const lbl=document.getElementById('genLabel');
  btn.disabled=true;lbl.innerHTML=`<span class="spinner"></span>${t.genLabelBusy}`;
  document.getElementById('pubArea').value='';document.getElementById('privArea').value='';document.getElementById('infoBar').textContent='';
  const bits=parseInt(document.getElementById('sizeSelect').value);
  const usage=document.getElementById('usageSelect').value;
  const algoName=usage==='sign'?'RSASSA-PKCS1-v1_5':'RSA-OAEP';
  const keyUsages=usage==='sign'?['sign','verify']:['encrypt','decrypt'];
  try{
    const t0=Date.now();
    const kp=await crypto.subtle.generateKey({name:algoName,modulusLength:bits,publicExponent:new Uint8Array([1,0,1]),hash:'SHA-256'},true,keyUsages);
    const pubDer=await crypto.subtle.exportKey('spki',kp.publicKey);
    const privDer=await crypto.subtle.exportKey('pkcs8',kp.privateKey);
    const elapsed=((Date.now()-t0)/1000).toFixed(2);
    document.getElementById('pubArea').value=wrapPem(ab2b64(pubDer),'PUBLIC KEY');
    document.getElementById('privArea').value=wrapPem(ab2b64(privDer),'PRIVATE KEY');
    document.getElementById('infoBar').textContent=`${bits}-bit RSA | ${algoName} | ${elapsed}s`;
  }catch(e){
    document.getElementById('infoBar').textContent='Error: '+e.message;
  }
  btn.disabled=false;lbl.textContent=t.genLabel;
}
function copyKey(id,btnId){
  const t=_i18n[_lang];const val=document.getElementById(id).value;if(!val)return;
  navigator.clipboard.writeText(val).then(()=>{
    const btn=document.getElementById(btnId);const orig=btn.textContent;btn.textContent=t.copied;setTimeout(()=>btn.textContent=orig,1500);
  });
}
_lang=detectLang();applyLang();
</script>
