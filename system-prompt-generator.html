function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1Accent','subEl','backLink','langBtn','lblPresets','lblRole','lblCompany','lblTone','lblLang','lblGoal','lblLimits','lblResult','btnGen','btnClear','btnCopy'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  const toneSel=document.getElementById('tone');
  if(toneSel)Object.keys(t.tones).forEach((k,i)=>{if(toneSel.options[i])toneSel.options[i].text=t.tones[k];});
  const langSel=document.getElementById('respLang');
  if(langSel)Object.keys(t.respLangs).forEach((k,i)=>{if(langSel.options[i])langSel.options[i].text=t.respLangs[k];});
  document.getElementById('presetsRow').innerHTML=t.presets.map((p,i)=>
    `<button class="preset-btn" onclick="applyPreset(${i})">${p.label}</button>`
  ).join('');
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function applyPreset(i){
  const p=_i18n[_lang].presets[i];
  document.getElementById('role').value=p.role;
  document.getElementById('goal').value=p.goal;
  document.getElementById('limits').value=p.limits;
  generate();
}
function generate(){
  const t=_i18n[_lang];
  const role=document.getElementById('role').value.trim();
  const company=document.getElementById('company').value.trim();
  const tone=document.getElementById('tone').value;
  const lang=document.getElementById('respLang').value;
  const goal=document.getElementById('goal').value.trim();
  const limits=document.getElementById('limits').value.trim();
  document.getElementById('resultOut').value=t.build(role,company,tone,lang,goal,limits);
}
function clearAll(){
  ['role','company','goal','limits'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('resultOut').value='';
}
function copyOut(){
  const v=document.getElementById('resultOut').value;const t=_i18n[_lang];
  if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{const b=document.getElementById('btnCopy');b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,2000);});
}
_lang=detectLang();applyLang();
