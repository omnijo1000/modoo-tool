<script>
const LANGS=['ko','en','zh','ja'];
let _lang='ko';
let _origImg=null,_scale=1,_dragging=false,_sx=0,_sy=0,_sel={x:0,y:0,w:0,h:0};
const _i18n={
  ko:{h1a:'이미지',sub:'드래그로 영역을 선택하여 이미지를 잘라냅니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',pageTitle:'이미지 자르기 | MODOO HUB',dzText:'이미지를 드래그하거나 클릭하여 업로드',lblAspect:'비율',optFree:'자유',lblW:'너비',lblH:'높이',btnCrop:'자르기',lblOut:'크롭 결과',btnDl:'다운로드',
    seoHtml:`<h2>이미지 자르기</h2><p>이미지를 드래그하여 원하는 영역을 선택하고 잘라낼 수 있습니다. <strong>비율 고정</strong>(1:1, 4:3, 16:9 등) 옵션을 지원하여 SNS 썸네일, 프로필 사진 등 특정 규격에 맞게 자를 수 있습니다. 결과는 PNG로 다운로드됩니다.</p>

  },
  en:{h1a:'Image',sub:'Drag to select a region and crop the image',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'Image Cropper | MODOO HUB',dzText:'Drag & drop image or click to upload',lblAspect:'Ratio',optFree:'Free',lblW:'Width',lblH:'Height',btnCrop:'Crop',lblOut:'Crop result',btnDl:'Download',
    seoHtml:`<h2>Image Cropper</h2><p>Drag to select a region and crop your image. Supports <strong>aspect ratio lock</strong> (1:1, 4:3, 16:9, etc.) for SNS thumbnails, profile photos, and other standard sizes. Result downloads as PNG.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Supported formats?</summary><p>PNG, JPG, WebP, GIF — any browser-supported image.</p></details>

<details class="faq-item"><summary>Large images?</summary><p>Limited by browser memory.</p></details>
<details class="faq-item"><summary>What is free ratio?</summary><p>No constraint — drag freely in any direction.</p></details>
<details class="faq-item"><summary>GIF support?</summary><p>Only the first frame is cropped; animation is not preserved.</p></details>`
  },
  zh:{h1a:'图像',sub:'拖动选择区域后裁剪图片',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'图像裁剪工具 | MODOO HUB',dzText:'拖拽图片或点击上传',lblAspect:'比例',optFree:'自由',lblW:'宽度',lblH:'高度',btnCrop:'裁剪',lblOut:'裁剪结果',btnDl:'下载',
    seoHtml:`<h2>图像裁剪工具</h2><p>拖动选择区域后裁剪图片。支持<strong>宽高比锁定</strong>（1:1、4:3、16:9等），适合社交媒体缩略图、头像等标准尺寸。结果以PNG格式下载。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>支持哪些格式？</summary><p>PNG、JPG、WebP、GIF等浏览器支持的所有图像格式。</p></details>
<details class="faq-item"><summary>如何锁定宽高比？</summary><p>从下拉菜单选择比例，拖动时会自动保持该比例。</p></details>
<details class="faq-item"><summary>可以输入精确像素值吗？</summary><p>可以，直接在X、Y、W、H输入框中输入坐标和尺寸。</p></details>
<details class="faq-item"><summary>文件会上传服务器吗？</summary><p>不会，所有处理在浏览器本地完成。</p></details>
<details class="faq-item"><summary>输出格式？</summary><p>PNG格式。</p></details>
<details class="faq-item"><summary>支持大图像吗？</summary><p>受浏览器内存限制。</p></details>
<details class="faq-item"><summary>自由比例是什么？</summary><p>不限制比例，自由拖动选择任意区域。</p></details>
<details class="faq-item"><summary>支持GIF吗？</summary><p>仅裁剪第一帧，不保留动画。</p></details>`
  },
  ja:{h1a:'画像',sub:'ドラッグで領域を選択して画像を切り取ります',backLink:'← ホーム',langBtn:'🌐 한국어',pageTitle:'画像トリミング | MODOO HUB',dzText:'画像をドラッグまたはクリックしてアップロード',lblAspect:'比率',optFree:'フリー',lblW:'幅',lblH:'高さ',btnCrop:'切り取り',lblOut:'切り取り結果',btnDl:'ダウンロード',
    seoHtml:`<h2>画像トリミングツール</h2><p>ドラッグで領域を選択して画像を切り取ります。<strong>アスペクト比ロック</strong>（1:1・4:3・16:9など）に対応し、SNSサムネイルやプロフィール画像など標準サイズに合わせてトリミングできます。結果はPNGでダウンロードされます。</p>

<details class="faq-item"><summary>大きな画像は？</summary><p>ブラウザのメモリに依存します。</p></details>

};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1a','subEl','backLink','langBtn','dzText','lblAspect','optFree','lblW','lblH','btnCrop','lblOut','btnDl'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFile(e.dataTransfer.files[0]);});
document.getElementById('fileIn').addEventListener('change',e=>loadFile(e.target.files[0]));
['cropX','cropY','cropW','cropH'].forEach(id=>document.getElementById(id).addEventListener('input',syncFromInputs));
function loadFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>{
    _origImg=img;
    const MAX=680;_scale=Math.min(1,MAX/Math.max(img.naturalWidth,img.naturalHeight));
    const cvs=document.getElementById('dispCvs');
    cvs.width=Math.round(img.naturalWidth*_scale);cvs.height=Math.round(img.naturalHeight*_scale);
    const ctx=cvs.getContext('2d');ctx.drawImage(img,0,0,cvs.width,cvs.height);
    _sel={x:0,y:0,w:cvs.width,h:cvs.height};
    document.getElementById('editorBox').style.display='block';
    document.getElementById('outBox').style.display='none';
    updateInfoBar();syncToInputs();drawSel();
    URL.revokeObjectURL(url);
  };
  img.src=url;
}
function getAspect(){const v=document.getElementById('aspectSel').value;if(v==='free')return null;const[a,b]=v.split(':').map(Number);return a/b;}
const ca=document.getElementById('cropArea');
ca.addEventListener('mousedown',e=>{if(!_origImg)return;const r=e.target.getBoundingClientRect();_sx=e.clientX-r.left;_sy=e.clientY-r.top;_dragging=true;_sel={x:_sx,y:_sy,w:0,h:0};});
ca.addEventListener('mousemove',e=>{if(!_dragging)return;const r=e.target.getBoundingClientRect();let ex=e.clientX-r.left,ey=e.clientY-r.top;const cvs=document.getElementById('dispCvs');ex=Math.max(0,Math.min(ex,cvs.width));ey=Math.max(0,Math.min(ey,cvs.height));let w=ex-_sx,h=ey-_sy;const asp=getAspect();if(asp){const aw=Math.abs(w);const ah=Math.abs(h);if(aw/ah>asp)h=Math.sign(h)*aw/asp;else w=Math.sign(w)*ah*asp;}
_sel={x:Math.min(_sx,_sx+w),y:Math.min(_sy,_sy+h),w:Math.abs(w),h:Math.abs(h)};syncToInputs();drawSel();});
ca.addEventListener('mouseup',()=>{_dragging=false;});
ca.addEventListener('mouseleave',()=>{_dragging=false;});
function drawSel(){const s=document.getElementById('selBox');if(!_sel.w||!_sel.h){s.style.display='none';return;}s.style.display='block';s.style.left=_sel.x+'px';s.style.top=_sel.y+'px';s.style.width=_sel.w+'px';s.style.height=_sel.h+'px';}
function syncToInputs(){const p=1/_scale;document.getElementById('cropX').value=Math.round(_sel.x*p);document.getElementById('cropY').value=Math.round(_sel.y*p);document.getElementById('cropW').value=Math.max(1,Math.round(_sel.w*p));document.getElementById('cropH').value=Math.max(1,Math.round(_sel.h*p));updateInfoBar();}
function syncFromInputs(){if(!_origImg)return;const s=_scale;_sel.x=parseInt(document.getElementById('cropX').value)*s;_sel.y=parseInt(document.getElementById('cropY').value)*s;_sel.w=parseInt(document.getElementById('cropW').value)*s;_sel.h=parseInt(document.getElementById('cropH').value)*s;drawSel();updateInfoBar();}
function updateInfoBar(){const p=1/_scale;document.getElementById('infoBar').textContent=`${Math.round(_sel.x*p)}, ${Math.round(_sel.y*p)}  /  ${Math.round(_sel.w*p)} × ${Math.round(_sel.h*p)} px`;}
function cropImg(){
  if(!_origImg)return;
  const p=1/_scale;const x=Math.round(_sel.x*p),y=Math.round(_sel.y*p),w=Math.max(1,Math.round(_sel.w*p)),h=Math.max(1,Math.round(_sel.h*p));
  const cvs=document.createElement('canvas');cvs.width=w;cvs.height=h;
  cvs.getContext('2d').drawImage(_origImg,x,y,w,h,0,0,w,h);
  const url=cvs.toDataURL('image/png');
  document.getElementById('resultImg').src=url;
  document.getElementById('outBox').style.display='block';
}
function download(){
  const a=document.createElement('a');a.href=document.getElementById('resultImg').src;a.download='cropped.png';a.click();
}
_lang=detectLang();applyLang();
</script>
