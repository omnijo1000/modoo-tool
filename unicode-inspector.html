    seoHtml:`<h2>유니코드 인스펙터란?</h2><p>텍스트의 각 문자에 대해 <strong>유니코드 코드포인트(U+XXXX), UTF-8 바이트 시퀀스, HTML 엔티티</strong>를 한눈에 분석합니다. 특수문자, 이모지, 한글, CJK 문자 디버깅에 필수 도구입니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>유니코드 코드포인트란?</summary><p>각 문자에 할당된 고유 번호입니다. 'A'는 U+0041, '가'는 U+AC00입니다.</p></details>
<details class="faq-item"><summary>UTF-8 바이트란?</summary><p>유니코드 문자를 인코딩한 실제 바이트 값입니다. 영문은 1바이트, 한글은 3바이트입니다.</p></details>

<details class="faq-item"><summary>최대 몇 자까지 분석 가능한가요?</summary><p>브라우저 성능을 고려해 500자 이내를 권장합니다.</p></details>`
  },
  en:{pageTitle:'Unicode Inspector - Code Point, UTF-8, HTML Entity per Character | MODOO HUB',h1b:'Inspector',sub:'Inspect code points, UTF-8 bytes, and HTML entities per character',backLink:'← All Tools',langBtn:'🌐 中文',inputLabel:'Input Text',charLabel:'Character Analysis',placeholder:'Enter text to analyze (Hello 안녕 🎉)...',emptyMsg:'Enter text to see per-character Unicode information.',hChars:'chars',hBytes:'bytes',hCodePts:'code points',
    seoHtml:`<h2>Unicode Inspector</h2><p>Analyze each character in text to show its <strong>Unicode code point (U+XXXX), UTF-8 byte sequence, and HTML entity</strong>. Essential for debugging special characters, emoji, and CJK text.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What is a Unicode code point?</summary><p>A unique number assigned to each character. 'A' is U+0041; '가' is U+AC00.</p></details>
<details class="faq-item"><summary>What are UTF-8 bytes?</summary><p>The actual byte values encoding a Unicode character. ASCII chars use 1 byte; Korean chars use 3 bytes.</p></details>
<details class="faq-item"><summary>What are HTML entities?</summary><p>A way to represent special characters in HTML. '&lt;' becomes &amp;lt;, '>' becomes &amp;gt;.</p></details>
<details class="faq-item"><summary>How many bytes does an emoji use?</summary><p>Most emoji use 4 UTF-8 bytes; compound emoji (with ZWJ) use more.</p></details>
<details class="faq-item"><summary>What is BOM?</summary><p>Byte Order Mark — a special byte sequence (EF BB BF) at the start of a UTF-8 file indicating encoding.</p></details>
<details class="faq-item"><summary>Are control characters shown?</summary><p>Yes — tab (U+0009), newline (U+000A) and other control characters are shown with their code points.</p></details>
<details class="faq-item"><summary>Can I copy individual characters?</summary><p>Yes — click any character card to copy it to the clipboard.</p></details>
<details class="faq-item"><summary>What is the character limit?</summary><p>We recommend under 500 characters for best browser performance.</p></details>`
  },
  zh:{pageTitle:'Unicode检查器 - 每字符代码点·UTF-8·HTML实体分析 | MODOO HUB',h1b:'检查器',sub:'分析每个字符的Unicode代码点·UTF-8字节·HTML实体',backLink:'← 所有工具',langBtn:'🌐 日本語',inputLabel:'输入文本',charLabel:'字符分析结果',placeholder:'输入要分析的文本（Hello 안녕 🎉）...',emptyMsg:'输入文本后将显示每个字符的Unicode信息。',hChars:'字符',hBytes:'字节',hCodePts:'代码点',
    seoHtml:`<h2>Unicode检查器</h2><p>分析文本中每个字符的<strong>Unicode代码点(U+XXXX)、UTF-8字节序列和HTML实体</strong>，是调试特殊字符、表情符号和CJK文本的必备工具。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>什么是Unicode代码点？</summary><p>分配给每个字符的唯一编号。'A'是U+0041，'가'是U+AC00。</p></details>
<details class="faq-item"><summary>什么是UTF-8字节？</summary><p>编码Unicode字符的实际字节值。ASCII字符用1字节，中文字符用3字节。</p></details>
<details class="faq-item"><summary>什么是HTML实体？</summary><p>在HTML中表示特殊字符的方法。'&lt;'写作&amp;lt;，'>'写作&amp;gt;。</p></details>
<details class="faq-item"><summary>表情符号占几个字节？</summary><p>大多数表情符号占4个UTF-8字节，复合表情（含ZWJ）可能更多。</p></details>
<details class="faq-item"><summary>什么是BOM？</summary><p>字节顺序标记——UTF-8文件开头的特殊字节序列(EF BB BF)，表示文件编码。</p></details>
<details class="faq-item"><summary>会显示控制字符吗？</summary><p>是的，制表符(U+0009)、换行符(U+000A)等控制字符也会显示其代码点。</p></details>
<details class="faq-item"><summary>可以复制单个字符吗？</summary><p>是的，点击任意字符卡片即可将其复制到剪贴板。</p></details>
<details class="faq-item"><summary>字符数量有限制吗？</summary><p>为保证浏览器性能，建议不超过500个字符。</p></details>`
  },
  ja:{pageTitle:'Unicodeインスペクター - 文字ごとのコードポイント·UTF-8·HTMLエンティティ分析 | MODOO HUB',h1b:'インスペクター',sub:'文字ごとのコードポイント・UTF-8バイト・HTMLエンティティを分析',backLink:'← ホーム',langBtn:'🌐 한국어',inputLabel:'テキスト入力',charLabel:'文字分析結果',placeholder:'分析するテキストを入力（Hello 안녕 🎉）...',emptyMsg:'テキストを入力すると文字ごとのUnicode情報が表示されます。',hChars:'文字',hBytes:'バイト',hCodePts:'コードポイント',
    seoHtml:`<h2>Unicodeインスペクターとは</h2><p>テキストの各文字について<strong>Unicodeコードポイント(U+XXXX)、UTF-8バイトシーケンス、HTMLエンティティ</strong>を一覧表示します。特殊文字、絵文字、CJK文字のデバッグに欠かせないツールです。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>Unicodeコードポイントとは？</summary><p>各文字に割り当てられた固有の番号です。'A'はU+0041、'가'はU+AC00です。</p></details>
<details class="faq-item"><summary>UTF-8バイトとは？</summary><p>Unicode文字をエンコードした実際のバイト値です。ASCII文字は1バイト、日本語文字は3バイトです。</p></details>
<details class="faq-item"><summary>HTMLエンティティとは？</summary><p>HTMLで特殊文字を表現する方法です。'&lt;'は&amp;lt;、'>'は&amp;gt;と書きます。</p></details>
<details class="faq-item"><summary>絵文字は何バイトですか？</summary><p>ほとんどの絵文字はUTF-8で4バイトです。ZWJを含む複合絵文字はさらに多くなります。</p></details>
<details class="faq-item"><summary>BOMとは何ですか？</summary><p>バイトオーダーマーク — UTF-8ファイルの先頭にある特殊バイト列(EF BB BF)でエンコーディングを示します。</p></details>
<details class="faq-item"><summary>制御文字も表示されますか？</summary><p>はい、タブ(U+0009)、改行(U+000A)などの制御文字もコードポイントと共に表示されます。</p></details>
<details class="faq-item"><summary>個々の文字をコピーできますか？</summary><p>はい、文字カードをクリックするとその文字をクリップボードにコピーします。</p></details>
<details class="faq-item"><summary>文字数制限はありますか？</summary><p>ブラウザのパフォーマンスを考慮し、500文字以内を推奨します。</p></details>`
  }

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function toUtf8Hex(cp){
  if(cp<0x80)return [cp].map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
  const bytes=[];let c=cp;
  if(c<0x800){bytes.push(0xC0|(c>>6));bytes.push(0x80|(c&0x3F));}
  else if(c<0x10000){bytes.push(0xE0|(c>>12));bytes.push(0x80|((c>>6)&0x3F));bytes.push(0x80|(c&0x3F));}
  else{bytes.push(0xF0|(c>>18));bytes.push(0x80|((c>>12)&0x3F));bytes.push(0x80|((c>>6)&0x3F));bytes.push(0x80|(c&0x3F));}
  return bytes.map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
}
function escHtmlChar(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function inspect(){
  const t=_i18n[_lang];const raw=document.getElementById('inputArea').value;
  const chars=[...raw];
  if(!chars.length){document.getElementById('statChips').innerHTML='';document.getElementById('charGrid').innerHTML=`<div style="font-size:12px;color:var(--text-dim);text-align:center;padding:20px">${t.emptyMsg}</div>`;return;}
  const byteTotal=new TextEncoder().encode(raw).length;
  const cpSet=new Set(chars.map(c=>c.codePointAt(0)));
  document.getElementById('statChips').innerHTML=`<span class="chip">${chars.length} ${t.hChars}</span><span class="chip">${byteTotal} ${t.hBytes}</span><span class="chip">${cpSet.size} ${t.hCodePts}</span>`;
  const grid=document.getElementById('charGrid');
  grid.innerHTML=chars.slice(0,500).map(ch=>{
    const cp=ch.codePointAt(0);
    const cpStr='U+'+cp.toString(16).toUpperCase().padStart(4,'0');
    const utf8=toUtf8Hex(cp);
    const dec=cp;
    const htmlEnt=cp>127?`&#${dec};`:escHtmlChar(ch);
    const jsEsc=cp<=0xFFFF?`\\u${cp.toString(16).padStart(4,'0').toUpperCase()}`:`\\u{${cp.toString(16).toUpperCase()}}`;
    const glyph=cp<0x20?'[ctrl]':escHtmlChar(ch);
    return `<div class="char-card" onclick="navigator.clipboard.writeText('${ch.replace(/'/g,"\\u0027")}')">
      <div class="char-glyph">${glyph}</div>
      <div class="char-rows">
        <div class="char-row"><span class="char-key">CP</span><span class="char-val cp">${cpStr}</span></div>
        <div class="char-row"><span class="char-key">UTF8</span><span class="char-val utf">${utf8}</span></div>
        <div class="char-row"><span class="char-key">HTML</span><span class="char-val html">${htmlEnt}</span></div>
        <div class="char-row"><span class="char-key">JS</span><span class="char-val">${jsEsc}</span></div>
      </div>
    </div>`;
  }).join('');
}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('inputLabel').textContent=t.inputLabel;document.getElementById('charLabel').textContent=t.charLabel;document.getElementById('inputArea').placeholder=t.placeholder;document.getElementById('seoDiv').innerHTML=t.seoHtml;inspect();}
