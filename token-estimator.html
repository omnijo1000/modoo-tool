<details class="faq-item"><summary>出力費用は含まれますか？</summary><p>入力費用のみ表示されます。出力費用は応答長に依存します。</p></details>
<details class="faq-item"><summary>日本語は英語より多くトークンを使いますか？</summary><p>はい、日本語は英語よりトークン効率が低いです。</p></details>
<details class="faq-item"><summary>正確なトークン数を得るには？</summary><p>OpenAIのtiktokenライブラリまたは各プロバイダーの公式APIを使用してください。</p></details>
<details class="faq-item"><summary>価格は最新ですか？</summary><p>価格は変更される可能性があります。各社の公式サイトで確認してください。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1Accent','subEl','backLink','langBtn','lblChars','lblWords','lblLines','btnSample','btnClear','sectionTitle'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  estimate();
}
function countTokens(text){
  if(!text)return 0;
  const hasKorean=/[가-힣]/.test(text);
  const hasCJK=/[぀-鿿]/.test(text);
  if(hasKorean||hasCJK) return Math.ceil(text.length/2.5);
  return Math.ceil(text.length/4);
}
function fmtCost(c){if(c<0.001)return '<$0.001';return '$'+c.toFixed(4);}
function loadSample(){document.getElementById('inputText').value=SAMPLE_TEXT;estimate();}
function clearAll(){document.getElementById('inputText').value='';estimate();}
function estimate(){
  const text=document.getElementById('inputText').value;
  const t=_i18n[_lang];
  document.getElementById('charCount').textContent=text.length;
  document.getElementById('wordCount').textContent=text.trim()?text.trim().split(/\s+/).length:0;
  document.getElementById('lineCount').textContent=text.split('\n').length;
  const tokens=countTokens(text);
  const grid=document.getElementById('modelGrid');
  grid.innerHTML=MODELS.map(m=>{
    const cost=tokens*(m.inPer1k/1000);
    const pct=Math.min(100,(tokens/m.ctx*100)).toFixed(1);
    return `<div class="model-card ${m.cls}">
      <div class="model-name">${m.name}</div>
      <div class="stat-row"><span class="stat-label">${t.lblTokens}</span><span class="stat-val highlight">${tokens.toLocaleString()}</span></div>
      <div class="stat-row"><span class="stat-label">${t.lblInCost}</span><span class="stat-val">${fmtCost(cost)}</span></div>
      <div class="ctx-bar-wrap">
        <div class="ctx-label">${t.lblCtx}: ${pct}% / ${(m.ctx/1000).toFixed(0)}K</div>
        <div class="ctx-bar"><div class="ctx-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('');
}
_lang=detectLang();applyLang();
</script>
