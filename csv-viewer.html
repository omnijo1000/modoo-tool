footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<p><strong>CSV 뷰어</strong>는 쉼표(또는 다른 구분자)로 구분된 텍스트 데이터를 보기 쉬운 <strong>인터랙티브 테이블</strong>로 시각화하는 도구입니다. 데이터 분석, 엑셀 없이 데이터 확인, API 응답 검증, 스프레드시트 미리보기 등에 활용됩니다. 브라우저에서 직접 처리되므로 파일이 서버에 전송되지 않습니다.</p>
<h2>자주 묻는 질문 (FAQ)</h2>
<details class="faq-item"><summary>CSV 형식이란 무엇인가요?</summary><p>A. CSV(Comma-Separated Values)는 쉼표로 값을 구분하는 텍스트 기반 데이터 형식입니다. 각 행이 하나의 레코드이며, 첫 번째 행이 보통 열 이름(헤더)입니다. 스프레드시트·데이터베이스 내보내기에 널리 사용됩니다.</p></details>
<details class="faq-item"><summary>구분자(Delimiter)의 종류에는 무엇이 있나요?</summary><p>A. 가장 일반적인 구분자는 쉼표(,)입니다. 세미콜론(;)은 유럽 국가에서 쉼표를 소수점으로 사용하기 때문에 선호됩니다. 탭(\t)은 TSV(Tab-Separated Values)로, 파이프(|)도 사용됩니다. 이 뷰어는 모두 지원하며 자동 감지 기능도 있습니다.</p></details>
<details class="faq-item"><summary>값 안에 쉼표가 포함된 경우 어떻게 처리하나요?</summary><p>A. RFC 4180 표준에 따라 값을 큰따옴표(")로 감싸면 내부 쉼표를 올바르게 처리합니다. 예: "Seoul, Korea". 따옴표 안에 따옴표를 넣으려면 ""처럼 두 번 씁니다.</p></details>
<details class="faq-item"><summary>CSV와 Excel(.xlsx)의 차이는 무엇인가요?</summary><p>A. CSV는 순수 텍스트 형식으로 어떤 프로그램에서도 열 수 있습니다. Excel은 서식·수식·차트 등을 포함한 바이너리 포맷입니다. 데이터 교환에는 CSV가 적합하고, 복잡한 분석에는 Excel이 유리합니다.</p></details>
<details class="faq-item"><summary>CSV 파일을 여는 방법은?</summary><p>A. Excel, Google Sheets, LibreOffice Calc, 텍스트 편집기 등으로 열 수 있습니다. 이 뷰어에서는 파일 선택 버튼이나 드래그앤드롭으로 바로 열 수 있습니다.</p></details>
<details class="faq-item"><summary>CSV 인코딩 문제(깨진 글자)는 어떻게 해결하나요?</summary><p>A. 한글이 깨지는 경우 대부분 UTF-8 BOM 누락 문제입니다. Excel에서 저장 시 "CSV UTF-8(BOM 포함)"으로 저장하거나, 텍스트 편집기에서 UTF-8로 재저장하세요. 이 뷰어는 UTF-8 BOM을 자동으로 제거합니다.</p></details>

<p>A <strong>CSV Viewer</strong> renders comma-separated (or delimiter-separated) data as an interactive, sortable, searchable table directly in your browser. Useful for data analysis, previewing API responses, validating exports, and inspecting spreadsheet data without Excel.</p>
<h2>Frequently Asked Questions</h2>
<details class="faq-item"><summary>What is the CSV format?</summary><p>A. CSV (Comma-Separated Values) is a plain-text format where each line represents a record and fields are separated by a delimiter — usually a comma. The first row typically contains column headers. It is widely used for data exchange between applications.</p></details>
<details class="faq-item"><summary>What delimiter types are supported?</summary><p>A. This viewer supports comma (,), semicolon (;), tab (\t), and pipe (|). The auto-detect mode counts which delimiter appears most in the first line and picks the winner. You can override manually using the selector.</p></details>
<details class="faq-item"><summary>How are fields with commas inside them handled?</summary><p>A. Per RFC 4180, fields that contain the delimiter or newlines should be wrapped in double quotes ("). Example: "London, UK". To include a literal double quote, use two consecutive quotes: "".</p></details>
<details class="faq-item"><summary>What is the difference between CSV and Excel?</summary><p>A. CSV is a plain-text format readable by any program. Excel (.xlsx) is a binary format with formatting, formulas, and charts. CSV is ideal for data interchange; Excel is better for complex calculations and presentation.</p></details>
<details class="faq-item"><summary>How do I open a CSV file?</summary><p>A. You can open CSV files with Excel, Google Sheets, LibreOffice Calc, or any text editor. In this viewer, use the "Open File" button or drag and drop the file onto the input area.</p></details>
<details class="faq-item"><summary>How do I fix encoding issues (garbled characters)?</summary><p>A. Garbled characters usually mean a charset mismatch. Save the file as UTF-8 (with or without BOM) in your editor. This viewer automatically strips the UTF-8 BOM. For legacy files, re-save as UTF-8 using Notepad++ or VS Code.</p></details>
<details class="faq-item"><summary>How are large files (1,000+ rows) handled?</summary><p>A. For browser performance, only the first 1,000 rows are rendered in the table. Row/column/empty-cell statistics are still computed over the full dataset. The Download button exports the complete original data.</p></details>
<details class="faq-item"><summary>What is the difference between CSV and TSV?</summary><p>A. CSV uses commas as delimiters; TSV (Tab-Separated Values) uses tabs. TSV is preferred when values often contain commas (e.g., free-text fields). Both formats are auto-detected by this viewer.</p></details>`

const LANGS = ['ko','en','zh','ja'];
let _lang = 'ko';
let _parsedRows = [];
let _headers = [];
let _sortCol = -1;
let _sortDir = 0;

function detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  if (n.startsWith('ja')) return 'ja';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}

function cycleLang() {
  const idx = LANGS.indexOf(_lang);
  _lang = LANGS[(idx + 1) % LANGS.length];
  localStorage.setItem('modoo_lang', _lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', _lang);
  history.replaceState({}, '', url);
  applyLang();
}

// CSV parsing per RFC 4180
function parseCSV(text, delimiter) {
  // Strip UTF-8 BOM
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  if (delimiter === 'auto') {
    const counts = {',': 0, ';': 0, '\t': 0, '|': 0};
    const firstLine = text.split('\n')[0];
    for (const c of firstLine) if (counts[c] !== undefined) counts[c]++;
    delimiter = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
  }
  const rows = [];
  let inQuote = false, field = '', row = [];
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQuote && text[i + 1] === '"') { field += '"'; i++; }
      else inQuote = !inQuote;
    } else if (c === delimiter && !inQuote) {
      row.push(field); field = '';
    } else if ((c === '\n' || (c === '\r' && text[i + 1] === '\n')) && !inQuote) {
      if (c === '\r') i++;
      row.push(field); rows.push(row); row = []; field = '';
    } else if (c === '\r' && !inQuote) {
      row.push(field); rows.push(row); row = []; field = '';
    } else {
      field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim()));
}

let _debounce;
function onInputChange() {
  clearTimeout(_debounce);
  _debounce = setTimeout(renderTable, 400);
}

function renderTable() {
  const raw = document.getElementById('csvInput').value.trim();
  const errBox = document.getElementById('errBox');
  const tableWrap = document.getElementById('tableWrap');
  const toolbar = document.getElementById('outputToolbar');
  errBox.style.display = 'none';

  if (!raw) {
    tableWrap.style.display = 'none';
    toolbar.style.display = 'none';
    _parsedRows = []; _headers = [];
    document.getElementById('statRowsNum').textContent = '0';
    document.getElementById('statColsNum').textContent = '0';
    document.getElementById('statEmptyNum').textContent = '0';
    return;
  }

  try {
    const delimVal = document.getElementById('delimSel').value;
    const allRows = parseCSV(raw, delimVal);
    if (allRows.length < 1) { tableWrap.innerHTML = ''; tableWrap.style.display = 'none'; return; }

    _headers = allRows[0].map(h => h.trim());
    const dataRows = allRows.slice(1);
    _parsedRows = dataRows;

    // Stats over full data
    let emptyCount = 0;
    dataRows.forEach(r => r.forEach(c => { if (!c.trim()) emptyCount++; }));
    document.getElementById('statRowsNum').textContent = dataRows.length;
    document.getElementById('statColsNum').textContent = _headers.length;
    document.getElementById('statEmptyNum').textContent = emptyCount;

    const notice = document.getElementById('maxNotice');
    const MAX = 1000;
    if (dataRows.length > MAX) {
      notice.style.display = 'block';
    } else {
      notice.style.display = 'none';
    }

    buildTable(_headers, dataRows.slice(0, MAX));
    tableWrap.style.display = 'block';
    toolbar.style.display = 'flex';
    _sortCol = -1; _sortDir = 0;
    filterRows();
  } catch(e) {
    errBox.textContent = '⚠ ' + e.message;
    errBox.style.display = 'block';
  }
}

function buildTable(headers, rows) {
  const wrap = document.getElementById('tableWrap');
  const table = document.createElement('table');
  table.className = 'csv-table';
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');

  // Row number header
  const thNum = document.createElement('th');
  thNum.className = 'row-num-th';
  thNum.textContent = '#';
  headerRow.appendChild(thNum);

  headers.forEach((h, idx) => {
    const th = document.createElement('th');
    th.textContent = h || ('col' + (idx + 1));
    th.dataset.col = idx;
    th.onclick = () => sortByCol(idx);
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  rows.forEach((row, ri) => {
    const tr = document.createElement('tr');
    tr.dataset.row = ri;
    const tdNum = document.createElement('td');
    tdNum.className = 'row-num';
    tdNum.textContent = ri + 1;
    tr.appendChild(tdNum);
    headers.forEach((_, ci) => {
      const td = document.createElement('td');
      const val = row[ci] !== undefined ? row[ci] : '';
      td.textContent = val;
      td.title = val;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.innerHTML = '';
  wrap.appendChild(table);
}

function sortByCol(colIdx) {
  if (_sortCol === colIdx) {
    _sortDir = (_sortDir + 1) % 3;
  } else {
    _sortCol = colIdx;
    _sortDir = 1;
  }

  const MAX = 1000;
  let rows = _parsedRows.slice(0, MAX);
  if (_sortDir === 0) {
    // reset
  } else {
    rows = rows.slice().sort((a, b) => {
      const va = a[colIdx] || '';
      const vb = b[colIdx] || '';
      const na = parseFloat(va), nb = parseFloat(vb);
      const cmp = (!isNaN(na) && !isNaN(nb)) ? (na - nb) : va.localeCompare(vb);
      return _sortDir === 1 ? cmp : -cmp;
    });
  }

  buildTable(_headers, rows);
  // Update sort indicators
  const ths = document.querySelectorAll('.csv-table th');
  ths.forEach((th, i) => {
    if (i === 0) return; // row num
    th.classList.remove('sort-asc', 'sort-desc');
    if (i - 1 === colIdx) {
      if (_sortDir === 1) th.classList.add('sort-asc');
      else if (_sortDir === 2) th.classList.add('sort-desc');
    }
    th.onclick = () => sortByCol(i - 1);
  });
  filterRows();
}

function filterRows() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const rows = document.querySelectorAll('.csv-table tbody tr');
  rows.forEach(tr => {
    if (!q) { tr.classList.remove('filtered-out'); return; }
    const text = tr.textContent.toLowerCase();
    tr.classList.toggle('filtered-out', !text.includes(q));
  });
}

function pasteFromClipboard() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(text => {
      document.getElementById('csvInput').value = text;
      renderTable();
    }).catch(() => document.getElementById('csvInput').focus());
  } else {
    document.getElementById('csvInput').focus();
  }
}

function clearAll() {
  document.getElementById('csvInput').value = '';
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('outputToolbar').style.display = 'none';
  document.getElementById('errBox').style.display = 'none';
  document.getElementById('maxNotice').style.display = 'none';
  document.getElementById('statRowsNum').textContent = '0';
  document.getElementById('statColsNum').textContent = '0';
  document.getElementById('statEmptyNum').textContent = '0';
  document.getElementById('searchInput').value = '';
  _parsedRows = []; _headers = [];
}

const SAMPLE = `Name,Age,City,Score
Alice,28,Seoul,95.5
Bob,34,Tokyo,87.2
Charlie,25,Beijing,92.1
Diana,31,London,88.8
Eve,29,New York,91.3`;

function loadSample() {
  document.getElementById('csvInput').value = SAMPLE;
  renderTable();
}

function handleFile(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('csvInput').value = e.target.result;
    renderTable();
  };
  reader.readAsText(file, 'UTF-8');
  evt.target.value = '';
}

function copyTSV() {
  const rows = document.querySelectorAll('.csv-table tbody tr:not(.filtered-out)');
  const lines = [_headers.join('\t')];
  rows.forEach(tr => {
    const cells = Array.from(tr.querySelectorAll('td')).slice(1).map(td => td.textContent);
    lines.push(cells.join('\t'));
  });
  const text = lines.join('\n');
  navigator.clipboard?.writeText(text).then(showToast).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); showToast();
  });
}

function downloadCSV() {
  const text = document.getElementById('csvInput').value;
  if (!text) return;
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,﻿' + encodeURIComponent(text);
  a.download = 'data.csv'; a.click();
}

function showToast() {
  const el = document.getElementById('toast');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// Drag and drop
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { document.getElementById('csvInput').value = ev.target.result; renderTable(); };
  reader.readAsText(file, 'UTF-8');
});

_lang = detectLang();
applyLang();
