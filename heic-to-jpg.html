function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  document.getElementById('h1Accent').textContent=t.h1Accent;
  document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('dropText').textContent=t.dropText;
  document.getElementById('dropHint').textContent=t.dropHint;
  document.getElementById('lblQuality').textContent=t.lblQuality;
  document.getElementById('lblFormat').textContent=t.lblFormat;
  document.getElementById('btnClear').textContent=t.btnClear;
  document.getElementById('infoNote').textContent=t.infoNote;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFiles(e.dataTransfer.files);});
document.getElementById('fileInput').addEventListener('change',e=>handleFiles(e.target.files));
async function handleFiles(files){
  for(const f of files){
    if(!f.name.match(/\.(heic|heif)$/i)&&f.type!=='image/heic'&&f.type!=='image/heif'){
      addResult(f.name,null,null,'error');continue;
    }
    addResult(f.name,null,null,'proc');
    try{
      const blob=await heic2any({blob:f,toType:document.getElementById('outFmt').value,quality:parseInt(document.getElementById('quality').value)/100});
      const url=URL.createObjectURL(blob);
      const ext=document.getElementById('outFmt').value.split('/')[1];
      const outName=f.name.replace(/\.(heic|heif)$/i,'.'+ext);
      updateResult(f.name,url,outName,blob.size,'ok');
    }catch(e){updateResult(f.name,null,null,0,'error');}
  }
}
function addResult(name,url,outName,state){
  const t=_i18n[_lang];const el=document.createElement('div');el.className='result-item';el.id='ri_'+CSS.escape(name);
  const stateHtml=state==='proc'?`<span class="status proc">${t.proc}</span>`:state==='error'?`<span class="status err">${t.err}</span>`:'';
  el.innerHTML=`<div style="width:48px;height:48px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px">📷</div><div class="file-info"><div class="file-name">${name}</div><div class="file-size" id="fs_${CSS.escape(name)}">${stateHtml}</div></div>`;
  document.getElementById('resultList').appendChild(el);
}
function updateResult(name,url,outName,size,state){
  const t=_i18n[_lang];const el=document.getElementById('ri_'+CSS.escape(name));if(!el)return;
  if(state==='ok'){
    const img=document.createElement('img');img.src=url;img.className='thumb';
    el.querySelector('div').replaceWith(img);
    el.querySelector('.file-name').textContent=outName;
    el.querySelector('.file-size').innerHTML=`<span class="status ok">${t.done}</span> · ${(size/1024).toFixed(1)}KB`;
    const btn=document.createElement('a');btn.href=url;btn.download=outName;btn.className='dl-btn';btn.textContent=t.dl;
    el.appendChild(btn);
  }else{
    el.querySelector('.file-size').innerHTML=`<span class="status err">${t.err}</span>`;
  }
}
function clearAll(){document.getElementById('resultList').innerHTML='';document.getElementById('fileInput').value='';}
_lang=detectLang();applyLang();
</script>
