details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<script>
const _i18n={
  ko:{sub:'JSON 배열을 CSV로 변환 · 구분자 선택 · 파일 다운로드',langBtn:'🌐 EN',backBtn:'← 모두의 툴',convertBtn:'▶ 변환',sampleBtn:'예시 불러오기',clearBtn:'초기화',delimLabel:'구분자',copyBtn:'복사',downloadBtn:'다운로드 .csv',seoHtml:'<h2>JSON to CSV 변환기란?</h2><p>JSON 배열 데이터를 <strong>CSV(쉼표 구분 값)</strong> 형식으로 변환합니다. 객체 키가 헤더 행으로 자동 추출되어 Excel·Google Sheets에서 바로 사용할 수 있습니다. 쉼표·세미콜론·탭·파이프 구분자를 지원하며, 결과를 클립보드에 복사하거나 .csv 파일로 다운로드할 수 있습니다.</p><h2>자주 묻는 질문 (FAQ)</h2><details class="faq-item"><summary>중첩된(nested) JSON 객체는 어떻게 처리되나요?</summary><p>중첩 객체는 점 표기법(dot notation)으로 평탄화(flatten)됩니다. 예: {"user": {"name": "Kim"}} → user.name 열로 표시됩니다.</p></details><details class="faq-item"><summary>JSON 배열이 아닌 단일 객체도 변환할 수 있나요?</summary><p>이 변환기는 객체 배열([{...}, {...}])에 최적화되어 있습니다. 단일 객체는 1행의 CSV로 변환됩니다.</p></details><details class="faq-item"><summary>값에 쉼표나 줄바꿈이 있으면 어떻게 처리되나요?</summary><p>RFC 4180에 따라 해당 값은 자동으로 큰따옴표로 감싸집니다. Excel·Google Sheets에서 올바르게 파싱됩니다.</p></details><details class="faq-item"><summary>구분자는 어떻게 선택하나요?</summary><p>유럽 국가에서는 쉼표 대신 세미콜론을 구분자로 사용하는 경우가 많습니다. 탭 구분자는 TSV(탭 구분 파일) 형식에 해당합니다.</p></details><details class="faq-item"><summary>대용량 JSON도 처리할 수 있나요?</summary><p>브라우저에서 직접 처리하므로 서버 업로드 없이 사용 가능하지만, 매우 큰 파일(수만 행 이상)은 브라우저 성능에 영향을 줄 수 있습니다.</p></details><details class="faq-item"><summary>배열 안에 배열(중첩 배열)이 있으면 어떻게 되나요?</summary><p>중첩 배열은 JSON.stringify()로 직렬화된 문자열로 표현됩니다. CSV는 2차원 구조이므로 완전한 중첩 배열을 별도 열로 분리하기는 어렵습니다.</p></details><details class="faq-item"><summary>null 또는 undefined 값은 CSV에서 어떻게 처리되나요?</summary><p>null과 undefined는 빈 문자열("")로 변환됩니다. 스프레드시트에서 빈 셀로 표시됩니다.</p></details><details class="faq-item"><summary>CSV를 Excel에서 열면 한글이 깨지는데 어떻게 하나요?</summary><p>이 도구는 UTF-8로 CSV를 내보냅니다. Excel에서는 파일을 직접 열지 말고 "데이터 가져오기"를 사용해 인코딩을 UTF-8로 지정하세요.</p></details>',toastMsg:'복사되었습니다!'},
  en:{sub:'Convert JSON array to CSV · Choose delimiter · Download file',langBtn:'🌐 中文',backBtn:'← All Tools',convertBtn:'▶ Convert',sampleBtn:'Load Sample',clearBtn:'Clear',delimLabel:'Delimiter',copyBtn:'Copy',downloadBtn:'Download .csv',seoHtml:'<h2>JSON to CSV Converter</h2><p>Convert JSON array data into <strong>CSV (comma-separated values)</strong> format ready for Excel, Google Sheets, or any spreadsheet tool. Object keys are automatically extracted as header columns. Supports comma, semicolon, tab, and pipe delimiters. Copy to clipboard or download as a .csv file.</p><h2>FAQ</h2><details class="faq-item"><summary>How are nested JSON objects handled?</summary><p>Nested objects are flattened using dot notation. Example: {"user": {"name": "Kim"}} → column header "user.name". Deeply nested structures may need manual cleanup.</p></details><details class="faq-item"><summary>Can I convert a single JSON object (not an array)?</summary><p>This converter is optimized for arrays of objects ([{...}, {...}]). A single object will be converted as a single-row CSV.</p></details><details class="faq-item"><summary>How are values containing commas or newlines handled?</summary><p>Per RFC 4180, such values are automatically wrapped in double quotes, which Excel and Google Sheets parse correctly.</p></details><details class="faq-item"><summary>When should I use a semicolon or tab delimiter?</summary><p>Many European countries use semicolons as CSV delimiters (since commas are decimal separators). Tabs produce TSV files — useful for some databases and BI tools.</p></details><details class="faq-item"><summary>Can it handle large JSON files?</summary><p>All processing happens in the browser — no server upload needed. Very large files (tens of thousands of rows) may slow the browser due to memory limits.</p></details><details class="faq-item"><summary>What happens when JSON arrays contain nested arrays?</summary><p>Nested arrays are serialized as JSON strings within the CSV cell. Since CSV is a 2D format, complex nested arrays cannot be fully expanded into separate columns.</p></details><details class="faq-item"><summary>How are null or undefined values handled in the CSV output?</summary><p>Both null and undefined values are converted to empty strings, appearing as blank cells in spreadsheet applications.</p></details><details class="faq-item"><summary>Why does my CSV appear garbled when opened in Excel?</summary><p>This tool exports UTF-8 encoded CSV. In Excel, use "Data > From Text/CSV" and select UTF-8 encoding rather than opening the file directly.</p></details>',toastMsg:'Copied!'},
  zh:{sub:'JSON数组转CSV · 选择分隔符 · 下载文件',langBtn:'🌐 日本語',backBtn:'← 所有工具',convertBtn:'▶ 转换',sampleBtn:'加载示例',clearBtn:'清空',delimLabel:'分隔符',copyBtn:'复制',downloadBtn:'下载 .csv',seoHtml:'<h2>JSON转CSV工具</h2><p>将JSON数组数据转换为<strong>CSV（逗号分隔值）</strong>格式，可直接在Excel、Google表格等电子表格工具中使用。对象键名自动提取为列标题。支持逗号、分号、制表符、竖线分隔符，可复制到剪贴板或下载为.csv文件。</p><h2>常见问题 (FAQ)</h2><details class="faq-item"><summary>嵌套的JSON对象如何处理？</summary><p>嵌套对象使用点号（dot notation）展平。例如：{"user": {"name": "Kim"}} → 列标题为"user.name"。深度嵌套结构可能需要手动整理。</p></details><details class="faq-item"><summary>可以转换单个JSON对象（非数组）吗？</summary><p>本工具针对对象数组（[{...}, {...}]）优化。单个对象会转换为单行CSV。</p></details><details class="faq-item"><summary>值中包含逗号或换行符怎么办？</summary><p>按RFC 4180标准，这类值会自动用双引号括起，Excel和Google表格可正确解析。</p></details><details class="faq-item"><summary>什么时候使用分号或制表符？</summary><p>欧洲国家常用分号作为CSV分隔符（因为逗号是小数点）。制表符生成TSV文件，适用于某些数据库和BI工具。</p></details><details class="faq-item"><summary>能处理大型JSON文件吗？</summary><p>所有处理在浏览器本地进行，无需上传服务器。但超大文件（数万行以上）可能因内存限制影响浏览器性能。</p></details><details class="faq-item"><summary>如果JSON数组中包含嵌套数组怎么办？</summary><p>嵌套数组会被序列化为JSON字符串存入单元格。由于CSV是二维格式，无法将嵌套数组完整展开为多列。</p></details><details class="faq-item"><summary>null或undefined值如何处理？</summary><p>null和undefined均转换为空字符串，在电子表格中显示为空单元格。</p></details><details class="faq-item"><summary>用Excel打开CSV时中文乱码怎么办？</summary><p>本工具导出UTF-8编码的CSV。在Excel中请使用"数据→从文本/CSV导入"并选择UTF-8编码，不要直接双击打开。</p></details>',toastMsg:'已复制！'},
  ja:{sub:'JSON配列をCSVに変換 · 区切り文字選択 · ファイルダウンロード',langBtn:'🌐 한국어',backBtn:'← ホーム',convertBtn:'▶ 変換',sampleBtn:'サンプル読み込み',clearBtn:'クリア',delimLabel:'区切り文字',copyBtn:'コピー',downloadBtn:'ダウンロード .csv',seoHtml:'<h2>JSON to CSV変換ツールとは？</h2><p>JSON配列データをExcel・Google スプレッドシートなどで使える<strong>CSV形式</strong>に変換します。オブジェクトのキーが自動的にヘッダー列として抽出されます。カンマ・セミコロン・タブ・パイプ区切りに対応し、結果はクリップボードにコピーまたは.csvファイルとしてダウンロードできます。</p><h2>よくある質問 (FAQ)</h2><details class="faq-item"><summary>ネストされたJSONオブジェクトはどう処理されますか？</summary><p>ネストされたオブジェクトはドット記法でフラット化されます。例：{"user": {"name": "Kim"}} → 列ヘッダーが"user.name"になります。深いネスト構造は手動での整理が必要な場合があります。</p></details><details class="faq-item"><summary>配列でない単一のJSONオブジェクトも変換できますか？</summary><p>このツールはオブジェクト配列（[{...}, {...}]）に最適化されています。単一オブジェクトは1行のCSVに変換されます。</p></details><details class="faq-item"><summary>値にカンマや改行が含まれる場合は？</summary><p>RFC 4180に従い、該当値は自動的にダブルクォートで囲まれます。ExcelやGoogle スプレッドシートで正しく解析されます。</p></details><details class="faq-item"><summary>セミコロンやタブ区切りはいつ使いますか？</summary><p>欧州諸国ではカンマが小数点に使われるため、セミコロンをCSV区切り文字に使うことが多いです。タブはTSVファイルを生成し、一部のデータベースやBIツールで使われます。</p></details><details class="faq-item"><summary>大きなJSONファイルも処理できますか？</summary><p>すべてブラウザ内で処理するためサーバーへのアップロード不要ですが、非常に大きなファイル（数万行以上）はメモリ制限によりブラウザに負荷をかける場合があります。</p></details><details class="faq-item"><summary>JSON配列内にネスト配列がある場合はどうなりますか？</summary><p>ネスト配列はJSON文字列にシリアライズされてセルに格納されます。CSVは2次元構造のため、複雑なネスト配列を別列に分離することはできません。</p></details><details class="faq-item"><summary>nullやundefinedの値はどのように処理されますか？</summary><p>nullとundefinedはいずれも空文字列に変換され、スプレッドシートでは空白セルとして表示されます。</p></details><details class="faq-item"><summary>ExcelでCSVを開くと文字化けします。どうすればいいですか？</summary><p>このツールはUTF-8でCSVをエクスポートします。Excelでは直接開かず「データ→テキスト/CSVから」でUTF-8エンコーディングを指定してください。</p></details>',toastMsg:'コピーしました！'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

function escapeCSV(val, delim){
  if(val===null||val===undefined) return '';
  const s=String(val);
  if(s.includes(delim)||s.includes('"')||s.includes('\n')) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}

function flattenObj(obj, prefix=''){
  const res={};
  for(const k in obj){
    const key=prefix?prefix+'.'+k:k;
    if(obj[k]!==null&&typeof obj[k]==='object'&&!Array.isArray(obj[k])){
      Object.assign(res,flattenObj(obj[k],key));
    } else {
      res[key]=Array.isArray(obj[k])?JSON.stringify(obj[k]):obj[k];
    }
  }
  return res;
}

function jsonToCSV(json, delim){
  const rows=JSON.parse(json);
  if(!Array.isArray(rows)) throw new Error('Top-level value must be a JSON array');
  if(rows.length===0) return '';
  const flat=rows.map(r=>typeof r==='object'&&r!==null?flattenObj(r):{value:r});
  const headers=[...new Set(flat.flatMap(r=>Object.keys(r)))];
  const lines=[headers.map(h=>escapeCSV(h,delim)).join(delim)];
  for(const row of flat) lines.push(headers.map(h=>escapeCSV(row[h]??'',delim)).join(delim));
  return lines.join('\n');
}

let _debounce;
function liveConvert(){clearTimeout(_debounce);_debounce=setTimeout(convert,300);}

function convert(){
  const errBox=document.getElementById('errBox');
  errBox.style.display='none';
  const json=document.getElementById('jsonInput').value.trim();
  if(!json){document.getElementById('csvOutput').textContent='';return;}
  try{
    const delim=document.getElementById('delim').value;
    const csv=jsonToCSV(json,delim);
    document.getElementById('csvOutput').textContent=csv;
    document.getElementById('csvOutput')._text=csv;
  }catch(e){
    errBox.textContent='⚠ '+e.message;errBox.style.display='block';
    document.getElementById('csvOutput').textContent='';
  }
}

function loadSample(){
  document.getElementById('jsonInput').value=JSON.stringify([
    {"id":1,"name":"Alice","email":"alice@example.com","age":30,"city":"Seoul"},
    {"id":2,"name":"Bob","email":"bob@example.com","age":25,"city":"Tokyo"},
    {"id":3,"name":"Carol","email":"carol@example.com","age":35,"city":"New York"}
  ],null,2);
  convert();
}

function clearAll(){document.getElementById('jsonInput').value='';document.getElementById('csvOutput').textContent='';document.getElementById('errBox').style.display='none';}

function copyOutput(){
  const text=document.getElementById('csvOutput')._text||document.getElementById('csvOutput').textContent;
  if(!text)return;
  navigator.clipboard?.writeText(text).then(showToast).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();});
}

function download(){
  const text=document.getElementById('csvOutput')._text||document.getElementById('csvOutput').textContent;
  if(!text)return;
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(text);
  a.download='output.csv';a.click();
}

function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
_lang=detectLang();applyLang();
</script>
