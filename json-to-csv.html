<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#34d399;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:900px;margin:0 auto;padding:32px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6;}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.tbtn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}
.tbtn:hover,.tbtn.primary{border-color:var(--accent);color:var(--accent);}
.tbtn.primary{background:rgba(52,211,153,.1);font-weight:700;}
.tbtn.action{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.tbtn.action:hover{opacity:.85;}
.sep{width:1px;height:20px;background:var(--border);}
.opt-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
select.sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;}
select.sm:focus{border-color:var(--accent);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:650px){.two-col{grid-template-columns:1fr;}}
.col-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:.08em;margin-bottom:6px;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;resize:none;line-height:1.7;min-height:380px;}
textarea:focus{border-color:var(--accent);}
.output-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.7;min-height:380px;overflow:auto;white-space:pre-wrap;word-break:break-word;color:var(--text-muted);}
.err-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#f87171;margin-top:10px;display:none;}
.copied-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 24px;border-radius:20px;font-family:'DM Mono',monospace;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;}
.copied-toast.show{opacity:1;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:12px;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>JSON <span>to CSV</span></h1>
  <p class="sub" data-i18n="sub">JSON 배열을 CSV로 변환 · 구분자 선택 · 파일 다운로드</p>

  <div class="toolbar">
    <button class="tbtn action" onclick="convert()" data-i18n="convertBtn">▶ 변환</button>
    <button class="tbtn" onclick="loadSample()" data-i18n="sampleBtn">예시 불러오기</button>
    <button class="tbtn" onclick="clearAll()" data-i18n="clearBtn">초기화</button>
    <div class="sep"></div>
    <span class="opt-label" data-i18n="delimLabel">구분자</span>
    <select class="sm" id="delim" onchange="convert()">
      <option value=",">, (Comma)</option>
      <option value=";">; (Semicolon)</option>
      <option value="&#9;">⇥ (Tab)</option>
      <option value="|">| (Pipe)</option>
    </select>
    <div class="sep"></div>
    <button class="tbtn" onclick="copyOutput()" data-i18n="copyBtn">복사</button>
    <button class="tbtn" onclick="download()" data-i18n="downloadBtn">다운로드 .csv</button>
  </div>

  <div class="two-col">
    <div>
      <div class="col-label">INPUT JSON</div>
      <textarea id="jsonInput" spellcheck="false" placeholder='[{"name":"Alice","age":30},{"name":"Bob","age":25}]' oninput="liveConvert()"></textarea>
    </div>
    <div>
      <div class="col-label">OUTPUT CSV</div>
      <div class="output-box" id="csvOutput"></div>
    </div>
  </div>
  <div class="err-box" id="errBox"></div>

  <div class="seo">
    <h2 data-i18n="seoH2">JSON to CSV란?</h2>
    <p data-i18n="seoP">JSON 배열 데이터를 스프레드시트에서 사용할 수 있는 CSV 형식으로 변환합니다. 키 이름이 헤더 행으로 자동 추출되며, 쉼표·세미콜론·탭 등 다양한 구분자를 선택할 수 있습니다. 변환된 결과는 바로 다운로드할 수 있습니다.</p>
  </div>
  <footer>JSON to CSV Converter · All processing in browser</footer>
</main>
<div class="copied-toast" id="toast" data-i18n="toastMsg">복사되었습니다!</div>
<script>
const _i18n={
  ko:{sub:'JSON 배열을 CSV로 변환 · 구분자 선택 · 파일 다운로드',langBtn:'🌐 EN',backBtn:'← 모두의 툴',convertBtn:'▶ 변환',sampleBtn:'예시 불러오기',clearBtn:'초기화',delimLabel:'구분자',copyBtn:'복사',downloadBtn:'다운로드 .csv',seoH2:'JSON to CSV란?',seoP:'JSON 배열을 CSV 형식으로 변환합니다. 키 이름이 헤더로 자동 추출되며 다양한 구분자를 지원합니다.',toastMsg:'복사되었습니다!'},
  en:{sub:'Convert JSON array to CSV · Choose delimiter · Download file',langBtn:'🌐 中文',backBtn:'← All Tools',convertBtn:'▶ Convert',sampleBtn:'Load Sample',clearBtn:'Clear',delimLabel:'Delimiter',copyBtn:'Copy',downloadBtn:'Download .csv',seoH2:'JSON to CSV Converter',seoP:'Convert JSON arrays to CSV format for use in spreadsheets. Keys become header rows automatically. Supports comma, semicolon, tab and pipe delimiters.',toastMsg:'Copied!'},
  zh:{sub:'JSON数组转CSV · 选择分隔符 · 下载文件',langBtn:'🌐 日本語',backBtn:'← 所有工具',convertBtn:'▶ 转换',sampleBtn:'加载示例',clearBtn:'清空',delimLabel:'分隔符',copyBtn:'复制',downloadBtn:'下载 .csv',seoH2:'JSON转CSV工具',seoP:'将JSON数组转换为CSV格式，方便在电子表格中使用。键名自动提取为标题行，支持逗号、分号、制表符等分隔符。',toastMsg:'已复制！'},
  ja:{sub:'JSON配列をCSVに変換 · 区切り文字選択 · ファイルダウンロード',langBtn:'🌐 한국어',backBtn:'← ホーム',convertBtn:'▶ 変換',sampleBtn:'サンプル読み込み',clearBtn:'クリア',delimLabel:'区切り文字',copyBtn:'コピー',downloadBtn:'ダウンロード .csv',seoH2:'JSON to CSV変換ツールとは？',seoP:'JSON配列データをスプレッドシートで使えるCSV形式に変換します。キー名がヘッダー行として自動抽出され、カンマ・セミコロン・タブなど各種区切り文字に対応しています。',toastMsg:'コピーしました！'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

function escapeCSV(val, delim){
  if(val===null||val===undefined) return '';
  const s=String(val);
  if(s.includes(delim)||s.includes('"')||s.includes('\n')) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}

function flattenObj(obj, prefix=''){
  const res={};
  for(const k in obj){
    const key=prefix?prefix+'.'+k:k;
    if(obj[k]!==null&&typeof obj[k]==='object'&&!Array.isArray(obj[k])){
      Object.assign(res,flattenObj(obj[k],key));
    } else {
      res[key]=Array.isArray(obj[k])?JSON.stringify(obj[k]):obj[k];
    }
  }
  return res;
}

function jsonToCSV(json, delim){
  const rows=JSON.parse(json);
  if(!Array.isArray(rows)) throw new Error('Top-level value must be a JSON array');
  if(rows.length===0) return '';
  const flat=rows.map(r=>typeof r==='object'&&r!==null?flattenObj(r):{value:r});
  const headers=[...new Set(flat.flatMap(r=>Object.keys(r)))];
  const lines=[headers.map(h=>escapeCSV(h,delim)).join(delim)];
  for(const row of flat) lines.push(headers.map(h=>escapeCSV(row[h]??'',delim)).join(delim));
  return lines.join('\n');
}

let _debounce;
function liveConvert(){clearTimeout(_debounce);_debounce=setTimeout(convert,300);}

function convert(){
  const errBox=document.getElementById('errBox');
  errBox.style.display='none';
  const json=document.getElementById('jsonInput').value.trim();
  if(!json){document.getElementById('csvOutput').textContent='';return;}
  try{
    const delim=document.getElementById('delim').value;
    const csv=jsonToCSV(json,delim);
    document.getElementById('csvOutput').textContent=csv;
    document.getElementById('csvOutput')._text=csv;
  }catch(e){
    errBox.textContent='⚠ '+e.message;errBox.style.display='block';
    document.getElementById('csvOutput').textContent='';
  }
}

function loadSample(){
  document.getElementById('jsonInput').value=JSON.stringify([
    {"id":1,"name":"Alice","email":"alice@example.com","age":30,"city":"Seoul"},
    {"id":2,"name":"Bob","email":"bob@example.com","age":25,"city":"Tokyo"},
    {"id":3,"name":"Carol","email":"carol@example.com","age":35,"city":"New York"}
  ],null,2);
  convert();
}

function clearAll(){document.getElementById('jsonInput').value='';document.getElementById('csvOutput').textContent='';document.getElementById('errBox').style.display='none';}

function copyOutput(){
  const text=document.getElementById('csvOutput')._text||document.getElementById('csvOutput').textContent;
  if(!text)return;
  navigator.clipboard?.writeText(text).then(showToast).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();});
}

function download(){
  const text=document.getElementById('csvOutput')._text||document.getElementById('csvOutput').textContent;
  if(!text)return;
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(text);
  a.download='output.csv';a.click();
}

function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
_lang=detectLang();applyLang();
</script>
</body>
