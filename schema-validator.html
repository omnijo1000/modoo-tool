<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>JSON-LD 검증이 왜 중요한가요?</summary><p>잘못된 구조화 데이터는 구글이 리치 스니펫을 표시하지 않게 만듭니다. JSON 문법 오류, 필수 필드 누락, 잘못된 값 형식 등이 흔한 문제입니다. 검증을 통해 게시 전에 이런 문제를 발견하고 수정할 수 있습니다.</p></details>

<details class="faq-item"><summary>@context는 꼭 필요한가요?</summary><p>네, 필수입니다. "@context": "https://schema.org"가 없으면 구글이 스키마를 올바르게 해석하지 못합니다. 모든 JSON-LD 블록의 최상위에 반드시 포함해야 합니다.</p></details>

<details class="faq-item"><summary>구글 공식 테스트 도구는 어떻게 사용하나요?</summary><p>구글 리치 결과 테스트(search.google.com/test/rich-results)에서 URL을 입력하거나 코드를 직접 붙여넣기 해서 검증합니다. 실제 구글 크롤러 결과를 반영하므로 가장 정확한 검증 방법입니다.</p></details>

    seoHtml:`<h2>Why validate JSON-LD schema markup?</h2><p>Structured data (JSON-LD) helps Google understand page content and display <strong>rich snippets in search results</strong>. Incorrect JSON-LD — parse errors or missing required fields — prevents rich snippets from appearing. Always validate before deploying to maximize your SEO opportunities.</p>
<h2 class="seo-sub">Frequently Asked Questions</h2>
<details class="faq-item"><summary>Why is JSON-LD validation important?</summary><p>Invalid structured data prevents Google from displaying rich snippets. Common issues include JSON syntax errors, missing required fields, and incorrect value formats. Validating before publishing helps you catch and fix these problems early.</p></details>
<details class="faq-item"><summary>What is the difference between required and recommended fields?</summary><p>Without required fields, Google will not display rich snippets for that schema type. Recommended fields are optional but add more detail to your rich snippet — for example, an image field on an Article can trigger image-rich results.</p></details>
<details class="faq-item"><summary>How do I fix JSON parse errors?</summary><p>1) Check that all braces and brackets are properly opened and closed. 2) Use double quotes for all strings. 3) Remove trailing commas after the last item. 4) Escape special characters (backslashes, quotes). Use a tool like JSONLint to check the overall JSON structure.</p></details>
<details class="faq-item"><summary>Is @context required?</summary><p>Yes, it is mandatory. Without "@context": "https://schema.org", Google cannot correctly interpret the schema. It must be present at the top level of every JSON-LD block.</p></details>
<details class="faq-item"><summary>Can I have multiple schemas on one page?</summary><p>Yes. You can use multiple separate script tags with type="application/ld+json", or put an array ([{...},{...}]) inside a single script tag. Google recognizes all JSON-LD blocks on a page.</p></details>

const LANGS=['ko','en','zh','ja'];
let _lang='ko';

const SAMPLE_JSON=`{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "How to Write Great JSON-LD",
  "author": {
    "@type": "Person",
    "name": "Jane Smith"
  },
  "datePublished": "2026-06-12",
  "description": "A guide to writing effective structured data."
}`;

function detectLang(){
  const u=new URLSearchParams(location.search).get('lang');
  if(u&&_i18n[u])return u;
  const s=localStorage.getItem('modoo_lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language?.slice(0,2);
  return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';
}

function cycleLang(){
  const idx=LANGS.indexOf(_lang);
  _lang=LANGS[(idx+1)%LANGS.length];
  localStorage.setItem('modoo_lang',_lang);
  const url=new URL(location.href);
  url.searchParams.set('lang',_lang);
  history.replaceState({},'',url);
  applyLang();
}

function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.title=t.pageTitle;
  document.getElementById('h1El').innerHTML=t.h1;
  document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('inputLabel').textContent=t.inputLabel;
  document.getElementById('resultLabel').textContent=t.resultLabel;
  document.getElementById('btnValidate').textContent=t.btnValidate;
  document.getElementById('btnExtract').textContent=t.btnExtract;
  document.getElementById('btnSample').textContent=t.btnSample;
  document.getElementById('btnClear').textContent=t.btnClear;
  document.getElementById('btnGoogleTest').textContent=t.btnGoogleTest;
  document.getElementById('emptyMsg').textContent=t.emptyMsg;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}

function extractJsonLd(text){
  const parser=new DOMParser();
  const doc=parser.parseFromString(text,'text/html');
  const scripts=Array.from(doc.querySelectorAll('script[type="application/ld+json"]'));
  return scripts.map(s=>s.textContent.trim());
}

function doExtract(){
  const t=_i18n[_lang];
  const raw=document.getElementById('inputTa').value.trim();
  if(!raw)return;
  const blocks=extractJsonLd(raw);
  if(!blocks.length){alert(t.extractFail);return;}
  if(blocks.length>1){
    const msg=t.multipleFound.replace('%n',blocks.length);
    document.getElementById('inputTa').value=blocks[0];
    showToast(msg);
  } else {
    document.getElementById('inputTa').value=blocks[0];
  }
}

function doValidate(){
  const t=_i18n[_lang];
  const raw=document.getElementById('inputTa').value.trim();
  if(!raw){document.getElementById('resultDiv').innerHTML=`<div class="result-empty">${t.emptyMsg}</div>`;return;}
  // Try extracting from HTML first if it looks like HTML
  let jsonStr=raw;
  if(raw.includes('<')){
    const blocks=extractJsonLd(raw);
    if(blocks.length>0)jsonStr=blocks[0];
  }
  // Try parsing
  let obj;
  try{obj=JSON.parse(jsonStr);}
  catch(e){
    document.getElementById('resultDiv').innerHTML=`
      <div class="result-status error"><span class="status-icon">✕</span>${t.resultError}</div>
      <div class="result-section"><div class="result-section-title">${t.labelErrors}</div><div class="error-box">${escHtml(e.message)}</div></div>`;
    return;
  }
  // Handle array
  const schemas=Array.isArray(obj)?obj:[obj];
  let html='';
  schemas.forEach((schema,si)=>{
    html+=renderResult(schema,t,si,schemas.length);
  });
  document.getElementById('resultDiv').innerHTML=html;
}

function renderResult(obj,t,idx,total){
  const type=obj['@type']||'Unknown';
  const context=obj['@context']||'';
  const required=REQUIRED_FIELDS[type]||[];
  const recommended=RECOMMENDED_FIELDS[type]||[];
  const missing=required.filter(f=>!(f in obj)||obj[f]===null||obj[f]==='');
  const warnings=recommended.filter(f=>!(f in obj)||obj[f]===null||obj[f]==='');
  const issues=[];
  if(!context.includes('schema.org'))issues.push(t.noContext);
  if(!REQUIRED_FIELDS[type]&&type!=='Unknown')issues.push(t.unknownType);
  const isValid=missing.length===0&&issues.length===0;

  let html='';
  if(total>1)html+=`<div style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:8px;">[${idx+1}/${total}]</div>`;
  html+=`<div class="result-status ${isValid?'valid':'invalid'}"><span class="status-icon">${isValid?'✓':'✕'}</span>${isValid?t.resultValid:t.resultInvalid}</div>`;
  html+=`<span class="type-badge">@type: ${escHtml(type)}</span>`;

  if(issues.length){
    html+=`<div class="result-section"><div class="result-section-title">${t.labelErrors}</div><ul class="check-list">`;
    issues.forEach(i=>html+=`<li><span class="check-icon check-fail">✕</span>${escHtml(i)}</li>`);
    html+=`</ul></div>`;
  }

  if(required.length){
    html+=`<div class="result-section"><div class="result-section-title">${t.labelRequired}</div><ul class="check-list">`;
    required.forEach(f=>{
      const ok=f in obj&&obj[f]!==null&&obj[f]!=='';
      html+=`<li><span class="check-icon ${ok?'check-ok':'check-fail'}">${ok?'✓':'✕'}</span>${escHtml(f)}</li>`;
    });
    html+=`</ul></div>`;
  }

  if(warnings.length){
    html+=`<div class="result-section"><div class="result-section-title">${t.labelWarnings}</div><ul class="check-list">`;
    warnings.forEach(f=>html+=`<li><span class="check-icon warn-icon">⚠</span>${escHtml(f)}</li>`);
    html+=`</ul></div>`;
  }

  return html;
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #252525;color:#f5f5f5;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function loadSample(){document.getElementById('inputTa').value=SAMPLE_JSON;}
function doClear(){document.getElementById('inputTa').value='';document.getElementById('resultDiv').innerHTML=`<div class="result-empty" id="emptyMsg">${_i18n[_lang].emptyMsg}</div>`;}
function openGoogle(){window.open('https://search.google.com/test/rich-results','_blank');}

_lang=detectLang();
applyLang();
</script>
