<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:auto;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:700px;margin:0 auto;padding:36px 20px 60px;}
.back{font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;display:inline-block;margin-bottom:22px;}
.back:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;line-height:1.6;}
.src-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px;}
.panel-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:.08em;margin-bottom:12px;}
.src-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
input[type=datetime-local]{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;flex:1;min-width:160px;color-scheme:dark;}
input[type=datetime-local]:focus{border-color:var(--accent);}
select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
select:focus{border-color:var(--accent);}
.now-btn{padding:8px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;white-space:nowrap;}
.now-btn:hover{border-color:var(--accent);color:var(--accent);}
.tz-grid{display:flex;flex-direction:column;gap:8px;}
.tz-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:border-color .15s;}
.tz-card:hover{border-color:var(--border);}
.tz-card.highlight{border-color:var(--accent);}
.tz-flag{font-size:20px;min-width:28px;text-align:center;}
.tz-info{flex:1;}
.tz-city{font-size:13px;font-weight:700;}
.tz-name{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:2px;}
.tz-time{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:var(--accent);text-align:right;}
.tz-date{font-size:11px;color:var(--text-muted);text-align:right;font-family:'DM Mono',monospace;margin-top:2px;}
.tz-diff{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;text-align:right;}
.add-row{display:flex;gap:8px;margin-top:10px;}
.add-select{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
.add-btn{padding:8px 16px;border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;background:none;}
.add-btn:hover{background:rgba(96,165,250,.1);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <a href="index.html" class="back" id="backBtn">← 모두의 툴</a>
  <h1>Time Zone <span>Converter</span></h1>
  <p class="sub" data-i18n="sub">세계 시간대 변환 · 여러 도시 동시 비교 · DST 자동 반영</p>

  <div class="src-panel">
    <div class="panel-label" data-i18n="srcLabel">기준 시간 설정</div>
    <div class="src-row">
      <input type="datetime-local" id="srcTime">
      <select id="srcTz" onchange="update()"></select>
      <button class="now-btn" onclick="setNow()" data-i18n="nowBtn">지금</button>
    </div>
  </div>

  <div class="tz-grid" id="tzGrid"></div>

  <div class="add-row">
    <select class="add-select" id="addTzSel"></select>
    <button class="add-btn" onclick="addTz()" data-i18n="addBtn">+ 추가</button>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">Time Zone Converter란?</h2>
    <p data-i18n="seoP">Intl.DateTimeFormat API를 사용해 전 세계 시간대를 변환합니다. 서머타임(DST)이 자동 반영되며, 여러 도시를 동시에 비교할 수 있습니다.</p>
  </div>
  <footer>Time Zone Converter · Intl.DateTimeFormat · All in browser</footer>
</main>
<script>
const _i18n={
  ko:{sub:'세계 시간대 변환 · 여러 도시 동시 비교 · DST 자동 반영',langBtn:'🌐 EN',backBtn:'← 모두의 툴',srcLabel:'기준 시간 설정',nowBtn:'지금',addBtn:'+ 추가',seoH2:'Time Zone Converter란?',seoP:'Intl.DateTimeFormat API로 전 세계 시간대를 변환합니다. 서머타임(DST)이 자동 반영됩니다.'},
  en:{sub:'World time zone converter · Compare multiple cities · DST support',langBtn:'🌐 中文',backBtn:'← All Tools',srcLabel:'Set source time',nowBtn:'Now',addBtn:'+ Add',seoH2:'Time Zone Converter',seoP:'Convert time across world time zones using the Intl.DateTimeFormat API. Daylight saving time is applied automatically.'},
  zh:{sub:'世界时区转换 · 多城市同时对比 · 自动DST',langBtn:'🌐 한국어',backBtn:'← 所有工具',srcLabel:'设置基准时间',nowBtn:'现在',addBtn:'+ 添加',seoH2:'时区转换器',seoP:'使用Intl.DateTimeFormat API进行全球时区转换，自动处理夏令时。'},
};
let _lang='ko';
const LANGS=['ko','en','zh'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

const ALL_TZ=[
  {tz:'Asia/Seoul',flag:'🇰🇷',city:'Seoul'},
  {tz:'Asia/Tokyo',flag:'🇯🇵',city:'Tokyo'},
  {tz:'Asia/Shanghai',flag:'🇨🇳',city:'Shanghai'},
  {tz:'Asia/Singapore',flag:'🇸🇬',city:'Singapore'},
  {tz:'Asia/Bangkok',flag:'🇹🇭',city:'Bangkok'},
  {tz:'Asia/Dubai',flag:'🇦🇪',city:'Dubai'},
  {tz:'Asia/Kolkata',flag:'🇮🇳',city:'Mumbai'},
  {tz:'Asia/Karachi',flag:'🇵🇰',city:'Karachi'},
  {tz:'Asia/Dhaka',flag:'🇧🇩',city:'Dhaka'},
  {tz:'Asia/Jakarta',flag:'🇮🇩',city:'Jakarta'},
  {tz:'Asia/Manila',flag:'🇵🇭',city:'Manila'},
  {tz:'Asia/Kuala_Lumpur',flag:'🇲🇾',city:'Kuala Lumpur'},
  {tz:'Asia/Taipei',flag:'🇹🇼',city:'Taipei'},
  {tz:'Asia/Hong_Kong',flag:'🇭🇰',city:'Hong Kong'},
  {tz:'Europe/London',flag:'🇬🇧',city:'London'},
  {tz:'Europe/Paris',flag:'🇫🇷',city:'Paris'},
  {tz:'Europe/Berlin',flag:'🇩🇪',city:'Berlin'},
  {tz:'Europe/Moscow',flag:'🇷🇺',city:'Moscow'},
  {tz:'Europe/Istanbul',flag:'🇹🇷',city:'Istanbul'},
  {tz:'Africa/Cairo',flag:'🇪🇬',city:'Cairo'},
  {tz:'Africa/Lagos',flag:'🇳🇬',city:'Lagos'},
  {tz:'America/New_York',flag:'🇺🇸',city:'New York'},
  {tz:'America/Chicago',flag:'🇺🇸',city:'Chicago'},
  {tz:'America/Denver',flag:'🇺🇸',city:'Denver'},
  {tz:'America/Los_Angeles',flag:'🇺🇸',city:'Los Angeles'},
  {tz:'America/Toronto',flag:'🇨🇦',city:'Toronto'},
  {tz:'America/Vancouver',flag:'🇨🇦',city:'Vancouver'},
  {tz:'America/Sao_Paulo',flag:'🇧🇷',city:'São Paulo'},
  {tz:'America/Mexico_City',flag:'🇲🇽',city:'Mexico City'},
  {tz:'America/Buenos_Aires',flag:'🇦🇷',city:'Buenos Aires'},
  {tz:'Pacific/Auckland',flag:'🇳🇿',city:'Auckland'},
  {tz:'Australia/Sydney',flag:'🇦🇺',city:'Sydney'},
  {tz:'Pacific/Honolulu',flag:'🇺🇸',city:'Honolulu'},
  {tz:'UTC',flag:'🌐',city:'UTC'},
];

let _activeTzs=['Asia/Seoul','America/New_York','Europe/London','Asia/Tokyo','UTC'];

function buildSelects(){
  const opts=ALL_TZ.map(t=>`<option value="${t.tz}">${t.flag} ${t.city} (${t.tz})</option>`).join('');
  document.getElementById('srcTz').innerHTML=opts;
  document.getElementById('addTzSel').innerHTML=opts;
  const localTz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const match=ALL_TZ.find(t=>t.tz===localTz);
  document.getElementById('srcTz').value=match?localTz:'UTC';
}

function setNow(){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const local=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('srcTime').value=local;
  update();
}

function getSrcDate(){
  const val=document.getElementById('srcTime').value;
  if(!val) return new Date();
  return new Date(val);
}

function formatTime(date,tz){
  return new Intl.DateTimeFormat('en',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(date);
}
function formatDate(date,tz){
  return new Intl.DateTimeFormat('en',{timeZone:tz,year:'numeric',month:'short',day:'numeric',weekday:'short'}).format(date);
}
function getOffset(date,tz){
  const utc=date.getTime();
  const tzDate=new Date(date.toLocaleString('en',{timeZone:tz}));
  const utcDate=new Date(date.toLocaleString('en',{timeZone:'UTC'}));
  const diff=(tzDate-utcDate)/60000;
  const sign=diff>=0?'+':'-';
  const h=Math.floor(Math.abs(diff)/60),m=Math.abs(diff)%60;
  return`UTC${sign}${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function update(){
  const date=getSrcDate();
  const srcTz=document.getElementById('srcTz').value;
  const grid=document.getElementById('tzGrid');
  grid.innerHTML='';
  _activeTzs.forEach(tz=>{
    const info=ALL_TZ.find(t=>t.tz===tz)||{flag:'🌐',city:tz};
    const card=document.createElement('div');
    card.className='tz-card'+(tz===srcTz?' highlight':'');
    const offset=getOffset(date,tz);
    card.innerHTML=`<div class="tz-flag">${info.flag}</div><div class="tz-info"><div class="tz-city">${info.city}</div><div class="tz-name">${tz} · ${offset}</div></div><div><div class="tz-time">${formatTime(date,tz)}</div><div class="tz-date">${formatDate(date,tz)}</div></div><button onclick="removeTz('${tz}')" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:4px 6px;" title="remove">✕</button>`;
    grid.appendChild(card);
  });
}

function addTz(){
  const tz=document.getElementById('addTzSel').value;
  if(!_activeTzs.includes(tz)){_activeTzs.push(tz);update();}
}
function removeTz(tz){_activeTzs=_activeTzs.filter(t=>t!==tz);update();}

document.getElementById('srcTime').addEventListener('input',update);
document.getElementById('srcTz').addEventListener('change',update);

_lang=detectLang();applyLang();buildSelects();setNow();
</script>
</body>
</html>
