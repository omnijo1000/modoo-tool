  seoHtml:`<h2>세계 시간대 변환기 완전 가이드</h2>
<p>시간대 변환기는 <strong>Intl.DateTimeFormat API</strong>를 사용해 전 세계 어느 도시의 현지 시간이든 즉시 계산합니다. 서머타임(DST)이 자동 반영되고, 여러 도시를 동시에 비교할 수 있어 국제 회의·출장·해외 서비스 운영에 필수적입니다. 모든 계산은 브라우저 내에서 처리되어 개인정보 걱정이 없습니다.</p>
<h3 class="seo-sub">활용 예제</h3>
<ul class="seo-ul">
<li>서울 오전 10시 회의 → 뉴욕(EST) 오후 8시, 런던(GMT) 오전 1시 확인</li>
<li>미국 서부(PST) 마감 자정 → 한국 시간 오후 5시(다음날) 역산</li>

<li>Unix 타임스탬프 → 특정 도시 현지 시간으로 변환</li>
<li>국제 날짜 변경선(IDL) 동쪽/서쪽 날짜 차이 확인</li>
</ul>
<h3 class="seo-sub">자주 묻는 질문 (FAQ)</h3>
<details class="faq-item"><summary>Q. UTC와 GMT의 차이는 무엇인가요?</summary><p>UTC(협정 세계시)는 원자 시계 기반의 현대 국제 표준이고, GMT(그리니치 표준시)는 지구 자전 기반의 전통적 시간 기준입니다. 실용적으로는 거의 동일하며 초 단위 차이만 존재합니다. IT 시스템과 국제 규격에서는 UTC를 사용하고, 영국 런던의 지역 시간대를 가리킬 때는 GMT를 씁니다.</p></details>
<details class="faq-item"><summary>Q. 서머타임(DST)이란 무엇이고 어느 나라에서 사용하나요?</summary><p>서머타임은 여름철 낮 시간을 늘리기 위해 시계를 1시간 앞당기는 제도입니다. 미국(3월 둘째 일요일 시작~11월 첫째 일요일), 유럽(3월 마지막 일요일~10월 마지막 일요일), 호주·캐나다 등 약 70개국에서 사용합니다. 한국·일본·중국·인도는 서머타임 미적용입니다. 이 변환기는 모든 지역의 DST를 자동 처리합니다.</p></details>
<details class="faq-item"><summary>Q. 한국(서울)의 UTC 오프셋은 얼마인가요?</summary><p>한국 표준시(KST)는 UTC+9로 연중 변동 없습니다. 뉴욕(EDT 기준)보다 13시간, 런던(BST 기준)보다 8시간, 로스앤젤레스(PDT)보다 16시간 빠릅니다. 서머타임을 적용하지 않으므로 계절에 따라 시차가 1시간씩 달라지는 점에 주의하세요.</p></details>
<details class="faq-item"><summary>Q. 인도가 UTC+5:30인 이유는 무엇인가요?</summary><p>인도 표준시(IST)는 UTC+5:30으로 30분 단위 오프셋입니다. 광대한 동서 국토를 하나의 시간대로 통일하되 인접 시간대(파키스탄 UTC+5, 방글라데시 UTC+6)와의 중간값을 선택한 역사적 결정입니다. 네팔(UTC+5:45), 스리랑카(UTC+5:30)도 비표준 오프셋을 사용합니다.</p></details>
<details class="faq-item"><summary>Q. 국제 날짜 변경선(IDL)이란?</summary><p>날짜 변경선은 태평양 중앙(약 경도 180°)에 위치한 가상의 선으로, 이 선을 서쪽에서 동쪽으로 건너면 날짜가 하루 줄고, 동쪽에서 서쪽으로 건너면 날짜가 하루 늘어납니다. 통가·사모아·피지 등 태평양 도서국 위치 때문에 선이 꺾여 있습니다. 예: 하와이(UTC-10)와 뉴질랜드(UTC+13)는 실제로 23시간 차이지만 날짜는 하루 다릅니다.</p></details>
<details class="faq-item"><summary>Q. 글로벌 팀 화상회의 시간 잡는 팁이 있나요?</summary><p>세계 표준 업무 시간(월-금 09:00-18:00)이 겹치는 범위를 찾는 게 핵심입니다. 서울-뉴욕 겹침 범위는 거의 없어 한쪽이 야간 근무를 감수해야 합니다. 팁: ① UTC로 1차 합의 후 각자 현지 시간으로 변환 ② 서머타임 전환 주간 전후 확인 ③ 인도·이란 등 비표준 오프셋 국가는 별도 확인 필수.</p></details>
<details class="faq-item"><summary>Q. Unix 타임스탬프란 무엇인가요?</summary><p>Unix 타임스탬프는 1970년 1월 1일 00:00:00 UTC(Unix 에포크)로부터 경과한 초 수입니다. 예: 1749470400 = 2025-06-09 12:00:00 UTC. 모든 시간대와 무관한 절대값이므로 서버·로그·API에서 널리 쓰입니다. JavaScript에서는 \`Date.now()\`(밀리초)나 \`Math.floor(Date.now()/1000)\`(초)로 얻습니다.</p></details>
<details class="faq-item"><summary>Q. ISO 8601 형식이란 무엇인가요?</summary><p>ISO 8601은 날짜와 시간의 국제 표준 표기법입니다. 형식: YYYY-MM-DDTHH:MM:SS±HH:MM (예: 2026-06-09T14:30:00+09:00). 끝에 'Z'가 붙으면 UTC를 의미합니다(2026-06-09T05:30:00Z = 서울 오후 2:30). JSON·API·로그에서 날짜 표기 시 이 형식을 권장합니다.</p></details>
<details class="faq-item"><summary>Q. Intl.DateTimeFormat API가 무엇인가요?</summary><p>브라우저 내장 JavaScript API로, IANA 시간대 데이터베이스를 기반으로 서버 없이 정확한 시간대 변환을 제공합니다. new Intl.DateTimeFormat('ko',{timeZone:'Asia/Seoul',...}).format(date) 형태로 사용합니다. 서머타임, 반시간 오프셋, 역사적 시간대 변경까지 자동 처리하며 모든 현대 브라우저에서 지원됩니다.</p></details>
<details class="faq-item"><summary>Q. IANA 시간대 데이터베이스란?</summary><p>IANA(Internet Assigned Numbers Authority)가 관리하는 전 세계 시간대 정보 DB입니다. 'Asia/Seoul', 'America/New_York' 같은 형식을 사용하며, 역사적 서머타임 변경·정치적 시간대 변경 등 모든 이력을 포함합니다. 운영체제·브라우저·프로그래밍 언어가 이 데이터를 사용합니다. 현재 600개 이상의 시간대가 등록되어 있습니다.</p></details>
<details class="faq-item"><summary>Q. 같은 국가인데 시간대가 다른 곳이 있나요?</summary><p>네. 미국(EST/CST/MST/PST 등 6개), 호주(AEST/ACST/AWST 3개), 러시아(UTC+2~+12, 11개), 캐나다(5개), 브라질(4개) 등 광대한 나라들은 여러 시간대를 사용합니다. 중국은 지리상 5개 시간대에 걸쳐 있지만 정치적으로 UTC+8 하나를 씁니다.</p></details>
<details class="faq-item"><summary>Q. 비행 도착 시간을 계산하는 법은?</summary><p>① 출발지 현지 출발 시간을 UTC로 변환, ② 비행 시간(예: 서울→뉴욕 약 14시간) 더하기, ③ 결과를 목적지 현지 시간으로 변환합니다. 이 계산기에서 기준 시간을 출발 UTC 시간으로 설정하고, 목적지 시간대를 추가하면 됩니다. 서머타임 전환일 비행은 도착 시간이 특이하게 보일 수 있습니다.</p></details>`},
  en:{sub:'World time zone converter · Compare multiple cities · DST support',langBtn:'🌐 中文',backBtn:'← All Tools',srcLabel:'Set source time',nowBtn:'Now',addBtn:'+ Add',
  seoHtml:`<h2>World Time Zone Converter — Complete Guide</h2>
<p>This time zone converter uses the browser's built-in <strong>Intl.DateTimeFormat API</strong> to instantly convert times across every city in the world. Daylight saving time (DST) is applied automatically, and you can compare multiple cities side-by-side — all without sending any data to a server.</p>
<h3 class="seo-sub">Usage Examples</h3>
<ul class="seo-ul">
<li>Seoul 10:00 AM meeting → New York 9:00 PM (EDT), London 2:00 AM (BST)</li>
<li>US West Coast midnight deadline → reverse-calculate Korean time (next day 5 PM)</li>
<li>India IST (UTC+5:30) half-hour offset + 30+ cities compared simultaneously</li>
<li>Check times around DST transitions (US: Mar/Nov, Europe: Mar/Oct)</li>
<li>Convert Unix timestamps to local time in any city</li>
<li>Verify date difference across the International Date Line</li>
</ul>
<h3 class="seo-sub">Frequently Asked Questions</h3>
<details class="faq-item"><summary>Q. What's the difference between UTC and GMT?</summary><p>UTC (Coordinated Universal Time) is the modern international standard based on atomic clocks, while GMT (Greenwich Mean Time) is the traditional time standard based on Earth's rotation. In practice they differ by at most a fraction of a second. IT systems and international standards use UTC; GMT is used as a reference to the time zone of London, UK.</p></details>
<details class="faq-item"><summary>Q. What is Daylight Saving Time (DST) and which countries use it?</summary><p>DST advances clocks by one hour in summer to extend evening daylight. The US observes it from the second Sunday in March to the first Sunday in November; Europe from the last Sunday in March to the last Sunday in October. About 70 countries observe DST. South Korea, Japan, China, and India do not. This converter automatically handles all DST rules.</p></details>
<details class="faq-item"><summary>Q. What UTC offset is Seoul (Korea)?</summary><p>Korea Standard Time (KST) is UTC+9, year-round with no DST. That makes Seoul 13 hours ahead of New York (EDT), 8 hours ahead of London (BST), and 16 hours ahead of Los Angeles (PDT). Since Korea doesn't observe DST, the time difference shifts by ±1 hour depending on whether the other location is currently on summer or winter time.</p></details>
<details class="faq-item"><summary>Q. Why does India use UTC+5:30 instead of a whole-hour offset?</summary><p>India Standard Time (IST) is UTC+5:30 — a 30-minute offset. It was chosen to represent a single unified time zone across India's wide east-west span, splitting the difference between Pakistan (UTC+5) and Bangladesh (UTC+6). Nepal (UTC+5:45) and Sri Lanka (UTC+5:30) also use non-standard offsets.</p></details>
<details class="faq-item"><summary>Q. What is the International Date Line?</summary><p>The International Date Line (IDL) is an imaginary line at roughly 180° longitude in the Pacific Ocean. Crossing it westward adds a day; crossing it eastward subtracts a day. The line zig-zags around Pacific island nations. Example: Hawaii (UTC−10) and New Zealand (UTC+13) are 23 real hours apart but on different calendar dates.</p></details>
<details class="faq-item"><summary>Q. Tips for scheduling global team meetings?</summary><p>The goal is finding overlap in standard business hours (Mon–Fri 09:00–18:00) across all locations. Seoul and New York have almost no overlap, so one side must take an off-hours slot. Tips: ① Agree on a UTC time first, then let each person convert; ② Watch for DST transition weeks; ③ Double-check non-standard offsets like India (+5:30), Iran (+3:30), or Australia (multiple zones).</p></details>
<details class="faq-item"><summary>Q. What is a Unix timestamp?</summary><p>A Unix timestamp is the number of seconds elapsed since the Unix epoch: January 1, 1970 00:00:00 UTC. Example: 1749470400 = 2025-06-09 12:00:00 UTC. It's an absolute value independent of any time zone, making it ideal for servers, logs, and APIs. In JavaScript, use Date.now() for milliseconds or Math.floor(Date.now()/1000) for seconds.</p></details>
<details class="faq-item"><summary>Q. What is ISO 8601 date format?</summary><p>ISO 8601 is the international standard for representing dates and times: YYYY-MM-DDTHH:MM:SS±HH:MM (e.g. 2026-06-09T14:30:00+09:00). A trailing 'Z' denotes UTC (e.g. 2026-06-09T05:30:00Z = Seoul 2:30 PM). Always use this format in JSON, APIs, and logs to avoid ambiguity between MM/DD/YYYY and DD/MM/YYYY conventions.</p></details>
<details class="faq-item"><summary>Q. What is the Intl.DateTimeFormat API?</summary><p>The Intl.DateTimeFormat API is a built-in JavaScript/browser API that converts dates across time zones using the IANA Time Zone Database — no server needed. Usage: new Intl.DateTimeFormat('en', {timeZone:'America/New_York', ...}).format(date). It handles DST, half-hour offsets, and historical time zone changes automatically, and is supported in all modern browsers.</p></details>
<details class="faq-item"><summary>Q. What is the IANA Time Zone Database?</summary><p>The IANA (Internet Assigned Numbers Authority) Time Zone Database is the authoritative source for worldwide time zone information. Zones follow the format 'Continent/City' (e.g. 'Asia/Seoul', 'America/New_York') and include the full history of DST rules and political time zone changes. Operating systems, browsers, and programming languages all rely on this database, which currently contains over 600 zones.</p></details>
<details class="faq-item"><summary>Q. Can one country have multiple time zones?</summary><p>Yes. The US has 6 (including territories), Russia has 11 (UTC+2 to UTC+12), Australia has 3, Canada has 5, and Brazil has 4. China spans 5 geographic zones but uses a single political time zone of UTC+8. This converter lists all major cities across those multi-zone countries individually.</p></details>
<details class="faq-item"><summary>Q. How do I calculate flight arrival time?</summary><p>① Convert your departure local time to UTC, ② add flight duration (e.g. Seoul→New York ≈ 14 hours), ③ convert the result to the destination's local time. In this tool, set the source time to your UTC departure and add the destination time zone to the grid. Note that flights crossing DST transition dates can show unusual arrival times.</p></details>`},

  seoHtml:`<h2>世界时区转换器 完整指南</h2>
<p>时区转换器使用浏览器内置的 <strong>Intl.DateTimeFormat API</strong>，基于 IANA 时区数据库即时换算全球任意城市的本地时间。夏令时自动处理，支持多城市同时对比，所有计算在本地完成，无需联网。</p>
<h3 class="seo-sub">使用示例</h3>
<ul class="seo-ul">
<li>首尔上午10点会议 → 纽约(EDT)晚上9点、伦敦(BST)凌晨2点</li>
<li>美国西海岸(PST)午夜截止 → 反算中国时间（次日下午4点）</li>

</ul>
<h3 class="seo-sub">常见问题 (FAQ)</h3>
<details class="faq-item"><summary>Q. UTC和GMT有什么区别？</summary><p>UTC（协调世界时）是基于原子钟的现代国际标准，GMT（格林威治标准时）是基于地球自转的传统时间基准。实用上两者差异不超过1秒。IT系统和国际规范使用UTC，GMT则专指英国伦敦时区。本工具内部以UTC进行所有时间计算。</p></details>
<details class="faq-item"><summary>Q. 什么是夏令时(DST)？哪些国家执行？</summary><p>夏令时是夏季将时钟拨快1小时以延长傍晚光照的制度。美国从3月第二个周日至11月第一个周日，欧洲从3月最后一个周日至10月最后一个周日执行。约70个国家施行夏令时。中国、韩国、日本、印度不使用夏令时。本工具自动处理所有夏令时规则。</p></details>
<details class="faq-item"><summary>Q. 中国(上海/北京)的UTC偏移是多少？</summary><p>中国标准时间(CST)为UTC+8，全年不变，不实行夏令时。比纽约(EST)早13小时、比伦敦(GMT)早8小时、比洛杉矶(PST)早16小时。中国地理横跨5个时区，但政策上全国统一使用UTC+8，西藏、新疆等西部地区实际日出时间较晚。</p></details>
<details class="faq-item"><summary>Q. 印度为什么使用UTC+5:30这种半小时偏移？</summary><p>印度标准时间(IST)为UTC+5:30，是历史上在巴基斯坦(UTC+5)和孟加拉国(UTC+6)之间取中间值的政策决定，同时让广大国土保持统一时区。尼泊尔(UTC+5:45)、斯里兰卡(UTC+5:30)也使用非整点偏移。</p></details>
<details class="faq-item"><summary>Q. 什么是国际日期变更线？</summary><p>国际日期变更线(IDL)是大约位于东经180°的太平洋中部假想线。从西向东越线日期减一天，从东向西越线日期加一天。线路因太平洋岛国而弯曲。例：夏威夷(UTC-10)和新西兰(UTC+13)相差23小时，但处于不同日期。</p></details>
<details class="faq-item"><summary>Q. 如何安排跨时区的国际会议？</summary><p>核心是找到所有参与者标准工作时间(周一至五 09:00-18:00)的重叠区间。北京与纽约几乎没有重叠，双方必有一方需在非工作时间参会。建议：①先以UTC时间确认，再各自换算本地时间；②注意夏令时切换周；③印度(+5:30)、伊朗(+3:30)等非整点偏移需单独确认。</p></details>
<details class="faq-item"><summary>Q. 什么是Unix时间戳？</summary><p>Unix时间戳是自1970年1月1日00:00:00 UTC(Unix纪元)起经过的秒数。例：1749470400 = 2025-06-09 12:00:00 UTC。它是与时区无关的绝对值，广泛用于服务器日志和API。JavaScript中用Date.now()获取毫秒数，除以1000取整得到秒数。</p></details>
<details class="faq-item"><summary>Q. 什么是ISO 8601日期格式？</summary><p>ISO 8601是日期时间的国际标准格式：YYYY-MM-DDTHH:MM:SS±HH:MM（例：2026-06-09T14:30:00+08:00）。末尾'Z'表示UTC（2026-06-09T06:30:00Z = 北京下午2:30）。在JSON、API和日志中使用此格式可避免MM/DD和DD/MM的歧义。</p></details>
<details class="faq-item"><summary>Q. Intl.DateTimeFormat API是什么？</summary><p>浏览器内置的JavaScript API，基于IANA时区数据库实现无服务器的精准时区转换。用法：new Intl.DateTimeFormat('zh',{timeZone:'Asia/Shanghai',...}).format(date)。自动处理夏令时、半小时偏移和历史时区变更，所有现代浏览器均支持。</p></details>
<details class="faq-item"><summary>Q. IANA时区数据库是什么？</summary><p>IANA时区数据库是全球时区信息的权威来源，格式为"洲/城市"（如Asia/Shanghai、America/New_York），包含夏令时规则及政治性时区变更的完整历史记录。操作系统、浏览器和编程语言均依赖该数据库，目前收录600多个时区。</p></details>
<details class="faq-item"><summary>Q. 同一国家可以有多个时区吗？</summary><p>是的。美国有6个时区(含领地)、俄罗斯11个(UTC+2至+12)、澳大利亚3个、加拿大5个、巴西4个。中国地理上跨越5个时区，但政治上统一使用UTC+8。本工具为各多时区国家的主要城市单独列出。</p></details>
<details class="faq-item"><summary>Q. 如何计算航班到达时间？</summary><p>①将出发地本地出发时间转换为UTC，②加上飞行时长(如首尔→纽约约14小时)，③将结果转换为目的地本地时间。在本工具中，将基准时间设为UTC出发时间，添加目的地时区即可查看到达时间。跨越夏令时切换日的航班到达时间可能看起来异常。</p></details>`},

  seoHtml:`<h2>世界タイムゾーン変換器 完全ガイド</h2>
<p>タイムゾーン変換器はブラウザ内蔵の <strong>Intl.DateTimeFormat API</strong> を使い、IANAタイムゾーンデータベースに基づいて世界中の都市の現地時間を即座に算出します。夏時間(DST)は自動処理され、複数都市を同時に比較可能。すべての処理はブラウザ内で完結します。</p>
<h3 class="seo-sub">活用例</h3>
<ul class="seo-ul">
<li>東京午前10時の会議 → ニューヨーク(EDT)午後9時、ロンドン(BST)午前2時を確認</li>
<li>米国西海岸(PST)深夜0時締め切り → 日本時間を逆算（翌日午後5時）</li>
<li>インド(IST, UTC+5:30)の30分オフセット含む30都市以上を同時比較</li>
<li>夏時間切り替え日(米国3月・11月、欧州3月・10月)前後の時刻確認</li>
<li>Unixタイムスタンプを指定都市の現地時間に変換</li>
<li>国際日付変更線をまたいだ日付差の確認</li>
</ul>
<h3 class="seo-sub">よくある質問 (FAQ)</h3>
<details class="faq-item"><summary>Q. UTCとGMTの違いは何ですか？</summary><p>UTC（協定世界時）は原子時計に基づく現代の国際標準、GMT（グリニッジ標準時）は地球の自転に基づく伝統的な時間基準です。実用上の差はほぼゼロ（1秒未満）。ITシステムや国際規格ではUTCを使用し、GMTは英国ロンドンの地域時間帯を指す際に用います。</p></details>
<details class="faq-item"><summary>Q. 夏時間(DST)とは何ですか？どの国で使われていますか？</summary><p>夏時間は夏季に時計を1時間進めて夕方の明るい時間を延ばす制度です。米国は3月第2日曜日〜11月第1日曜日、欧州は3月最終日曜日〜10月最終日曜日に実施。約70カ国が採用。日本・韓国・中国・インドは不採用です。このツールはすべてのDSTルールを自動処理します。</p></details>
<details class="faq-item"><summary>Q. 日本(東京)のUTCオフセットは？</summary><p>日本標準時(JST)はUTC+9で、夏時間なく通年一定です。ニューヨーク(EDT)より13時間、ロンドン(BST)より8時間、ロサンゼルス(PDT)より16時間進んでいます。日本が夏時間を採用していないため、相手国が夏時間か冬時間かで時差が1時間変わる点に注意が必要です。</p></details>
<details class="faq-item"><summary>Q. インドがUTC+5:30を使う理由は？</summary><p>インド標準時(IST)はUTC+5:30という30分単位のオフセットです。広大な国土を一つの時間帯に統一しつつ、パキスタン(UTC+5)とバングラデシュ(UTC+6)の中間値を取った歴史的決定です。ネパール(UTC+5:45)、スリランカ(UTC+5:30)も非整時オフセットを使用しています。</p></details>
<details class="faq-item"><summary>Q. 国際日付変更線とは何ですか？</summary><p>国際日付変更線(IDL)は太平洋のほぼ東経180°に位置する仮想の線です。西から東へ越えると日付が1日減り、東から西へ越えると1日増えます。太平洋の島国の位置関係から線は折れ曲がっています。例：ハワイ(UTC-10)とニュージーランド(UTC+13)は実際には23時間差ですが、カレンダー日付は異なります。</p></details>
<details class="faq-item"><summary>Q. グローバルチームの会議時間調整のコツは？</summary><p>全員の標準業務時間(月〜金 09:00〜18:00)が重なる帯域を探すのが基本です。東京とニューヨークはほぼ重なりがなく、どちらかが時間外対応を求められます。コツ：①まずUTC時間で合意し、各自が現地時間に換算；②夏時間切り替え週を確認；③インド(+5:30)、イラン(+3:30)など非整時オフセットの国は個別確認必須。</p></details>
<details class="faq-item"><summary>Q. Unixタイムスタンプとは何ですか？</summary><p>Unixタイムスタンプは1970年1月1日00:00:00 UTC(Unixエポック)からの経過秒数です。例：1749470400 = 2025-06-09 12:00:00 UTC。時間帯に依存しない絶対値のためサーバー・ログ・APIで広く使われます。JavaScriptではDate.now()でミリ秒、Math.floor(Date.now()/1000)で秒を取得できます。</p></details>
<details class="faq-item"><summary>Q. ISO 8601形式とは何ですか？</summary><p>ISO 8601は日付・時刻の国際標準表記法です。形式：YYYY-MM-DDTHH:MM:SS±HH:MM（例：2026-06-09T14:30:00+09:00）。末尾'Z'はUTCを意味します（2026-06-09T05:30:00Z = 東京14:30）。JSON・API・ログにはこの形式を使うことでMM/DD vs DD/MM の曖昧さを回避できます。</p></details>
<details class="faq-item"><summary>Q. Intl.DateTimeFormat APIとは？</summary><p>ブラウザ内蔵のJavaScript APIで、IANAタイムゾーンデータベースを使ってサーバー不要で正確なタイムゾーン変換を提供します。使い方：new Intl.DateTimeFormat('ja',{timeZone:'Asia/Tokyo',...}).format(date)。夏時間・半時間オフセット・歴史的時間帯変更を自動処理し、現代のすべてのブラウザで対応しています。</p></details>
<details class="faq-item"><summary>Q. IANAタイムゾーンデータベースとは？</summary><p>IANAが管理する世界の時間帯情報のデータベースです。'Asia/Tokyo'、'America/New_York'の形式を使い、夏時間ルールや政治的な時間帯変更の完全な履歴を収録しています。OS・ブラウザ・プログラミング言語はすべてこのデータに依存しており、現在600以上の時間帯が登録されています。</p></details>
<details class="faq-item"><summary>Q. 同じ国で時間帯が複数ある国はありますか？</summary><p>はい。米国は6つ(領土含む)、ロシアは11つ(UTC+2〜+12)、オーストラリアは3つ、カナダは5つ、ブラジルは4つの時間帯を持ちます。中国は地理的に5つの時間帯にまたがっていますが、政治的にUTC+8一つを使用。このツールは各国の主要都市を個別に一覧しています。</p></details>
<details class="faq-item"><summary>Q. フライトの到着時間を計算するには？</summary><p>①出発地の現地出発時刻をUTCに変換、②フライト時間を加算（例：東京→ニューヨーク約14時間）、③目的地の現地時間に変換します。このツールでは基準時間をUTC出発時刻に設定し、目的地の時間帯をグリッドに追加すれば到着時間を確認できます。夏時間切り替え日をまたぐフライトは到着時刻が特殊に見えることがあります。</p></details>`},

  const sign=diff>=0?'+':'-';
  const h=Math.floor(Math.abs(diff)/60),m=Math.abs(diff)%60;
  return`UTC${sign}${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function update(){
  const date=getSrcDate();
  const srcTz=document.getElementById('srcTz').value;
  const grid=document.getElementById('tzGrid');
  grid.innerHTML='';
  _activeTzs.forEach(tz=>{
    const info=ALL_TZ.find(t=>t.tz===tz)||{flag:'🌐',city:tz};
    const card=document.createElement('div');
    card.className='tz-card'+(tz===srcTz?' highlight':'');
    const offset=getOffset(date,tz);
    card.innerHTML=`<div class="tz-flag">${info.flag}</div><div class="tz-info"><div class="tz-city">${info.city}</div><div class="tz-name">${tz} · ${offset}</div></div><div><div class="tz-time">${formatTime(date,tz)}</div><div class="tz-date">${formatDate(date,tz)}</div></div><button onclick="removeTz('${tz}')" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:4px 6px;" title="remove">✕</button>`;
    grid.appendChild(card);
  });
}

function addTz(){
  const tz=document.getElementById('addTzSel').value;
  if(!_activeTzs.includes(tz)){_activeTzs.push(tz);update();}
}
function removeTz(tz){_activeTzs=_activeTzs.filter(t=>t!==tz);update();}

document.getElementById('srcTime').addEventListener('input',update);
document.getElementById('srcTz').addEventListener('change',update);

_lang=detectLang();applyLang();buildSelects();setNow();
</script>
<script src="related.js"></script>
</body>
