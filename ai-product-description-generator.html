};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblName','lblCategory','lblFeatures','lblTarget','lblBenefit','lblStyle','btnGen','btnCopy'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('styleChips').innerHTML=t.styles.map(s=>`<span class="chip${_style===s.id?' active':''}" onclick="setStyle('${s.id}')">${s.label}</span>`).join('');
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function setStyle(id){_style=id;document.querySelectorAll('.chip').forEach((c,i)=>c.classList.toggle('active',_i18n[_lang].styles[i].id===id));}
function generate(){
  const t=_i18n[_lang];
  const name=document.getElementById('name').value.trim()||'제품';
  const feats=document.getElementById('features').value.trim();
  const tgt=document.getElementById('target').value.trim();
  const ben=document.getElementById('benefit').value.trim();
  const featList=feats?feats.split(',').map(s=>s.trim()).filter(Boolean):[];
  let out='';
  if(_style==='benefit'){
    out+=`✦ ${name}\n\n`;
    if(ben)out+=`${ben}\n\n`;
    if(tgt)out+=`${tgt}를 위한 최적의 선택입니다.\n\n`;
    if(featList.length)out+=`📋 주요 기능\n${featList.map(f=>`• ${f}`).join('\n')}`;
  } else if(_style==='feature'){
    out+=`【${name}】 상세 사양\n\n`;
    if(featList.length)out+=featList.map(f=>`• ${f}`).join('\n')+'\n\n';
    if(ben)out+=`차별점: ${ben}`;
  } else if(_style==='story'){
    out+=`당신의 일상을 바꿀 ${name}.\n\n`;
    if(tgt)out+=`${tgt}라면 알 것입니다 — `;
    if(ben)out+=`${ben}.\n\n`;
    if(featList.length)out+=featList.map(f=>`• ${f}`).join('\n');
  } else {
    out+=`${name}\n`;
    if(featList.length)out+=featList.slice(0,5).join(' · ');
  }
  _outText=out;
  document.getElementById('outBox').textContent=out;
}
function copyOut(){
  const t=_i18n[_lang];
  if(!_outText)return;
  navigator.clipboard.writeText(_outText).then(()=>{const b=document.getElementById('btnCopy');b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,2000);});
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
