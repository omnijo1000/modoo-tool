      <h2>자주 묻는 질문 (FAQ)</h2>
      <details class="faq-item"><summary>Q. Base64 디코딩이란 무엇인가요?</summary><p>A. Base64 디코딩은 Base64 인코딩의 역과정입니다. Base64 문자열(A–Z, a–z, 0–9, +, /, = 패딩으로 구성)을 원본 바이너리 또는 텍스트로 복원합니다. 원본이 UTF-8 텍스트였다면 사람이 읽을 수 있는 문자열로 디코딩됩니다.</p></details>
      <details class="faq-item"><summary>Q. Standard Base64와 URL-safe Base64를 어떻게 구분하나요?</summary><p>A. Standard Base64는 +와 /를 사용하고 =로 패딩됩니다. URL-safe는 -와 _를 사용하고 패딩을 생략합니다. Auto-detect 모드는 입력에 -나 _가 포함되어 있으면 자동으로 URL-safe로 처리합니다.</p></details>

// ── 언어 초기화 ──────────────────────────────────────────────────────
let lang = (function() {
  const p = new URLSearchParams(location.search).get('lang');
  if (p && i18n[p]) return p;
  const s = localStorage.getItem('modoo_lang');
  if (s && i18n[s]) return s;
  const n = (navigator.language || '').slice(0,2);
  return n === 'zh' ? 'zh' : n === 'ja' ? 'ja' : n === 'ko' ? 'ko' : 'en';
})();

let decMode = 'auto';
let debounceTimer = null;

function applyLang() {
  const t = i18n[lang];
  document.documentElement.lang = lang;
  document.title = t.pageTitle;
  const map = {
    h1Title: 'h1', h1Sub: 'sub', backLink: 'backLink', langBtn: 'langBtn',
    optModeLabel: 'optModeLabel', optAuto: 'optAuto',
    optStandard: 'optStandard', optUrlSafe: 'optUrlSafe',
    btnPaste: 'btnPaste', btnClear: 'btnClear', btnSample: 'btnSample',
    btnDecode: 'btnDecode', btnCopy: 'btnCopy', btnSwap: 'btnSwap',
    labelInput: 'labelInput', labelOutput: 'labelOutput',
    footerText: 'footer'
  };
  for (const [id, key] of Object.entries(map)) {
    const el = document.getElementById(id);
    if (!el) continue;
    if (key === 'h1') el.innerHTML = t[key];
    else el.textContent = t[key];
  }
  document.getElementById('statusText').textContent = t.statusIdle;
  document.getElementById('inputEl').placeholder = t.placeholderIn;
  document.getElementById('outputEl').placeholder = t.placeholderOut;
  document.getElementById('seoSection').innerHTML = t.seoHtml;
  updateCounts();
}

function toggleLang() {
  const order = ['ko','en','zh','ja'];
  lang = order[(order.indexOf(lang) + 1) % order.length];
  localStorage.setItem('modoo_lang', lang);
  applyLang();
}

function setMode(m) {
  decMode = m;
  document.getElementById('optAuto').classList.toggle('active', m === 'auto');
  document.getElementById('optStandard').classList.toggle('active', m === 'standard');
  document.getElementById('optUrlSafe').classList.toggle('active', m === 'url-safe');
  decode();
}

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  document.getElementById('statusText').textContent = msg;
}

function showErr(msg) {
  document.getElementById('inlineErr').textContent = msg;
  document.getElementById('inputEl').classList.add('error');
}

function clearErr() {
  document.getElementById('inlineErr').textContent = '';
  document.getElementById('inputEl').classList.remove('error');
}

function updateCounts() {
  const t = i18n[lang];
  const inLen = document.getElementById('inputEl').value.length;
  const outLen = document.getElementById('outputEl').value.length;
  document.getElementById('inputCount').textContent = t.inputCount(inLen);
  document.getElementById('outputCount').textContent = t.outputCount(outLen);
}

function decode() {
  let b64 = document.getElementById('inputEl').value.trim().replace(/\s+/g, '');
  if (!b64) {
    document.getElementById('outputEl').value = '';
    clearErr();
    updateCounts();
    setStatus('idle', i18n[lang].statusIdle);
    return;
  }
  try {
    if (decMode === 'url-safe' || (decMode === 'auto' && /[-_]/.test(b64))) {
      b64 = b64.replace(/-/g, '+').replace(/_/g, '/');
    }
    while (b64.length % 4) b64 += '=';
    const binStr = atob(b64);
    const bytes = new Uint8Array([...binStr].map(c => c.charCodeAt(0)));
    const text = new TextDecoder('utf-8').decode(bytes);
    document.getElementById('outputEl').value = text;
    clearErr();
    updateCounts();
    setStatus('ok', i18n[lang].statusOk(text.length));
  } catch(e) {
    document.getElementById('outputEl').value = '';
    clearErr();
    updateCounts();
    showErr(i18n[lang].errInvalid);
    setStatus('err', i18n[lang].statusErr);
  }
}

function swap() {
  const inputEl = document.getElementById('inputEl');
  const outputEl = document.getElementById('outputEl');
  const tmp = inputEl.value;
  inputEl.value = outputEl.value;
  outputEl.value = tmp;
  decode();
}

function onInput() {
  updateCounts();
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(decode, 300);
}

function clearAll() {
  document.getElementById('inputEl').value = '';
  document.getElementById('outputEl').value = '';
  clearErr();
  updateCounts();
  setStatus('idle', i18n[lang].statusIdle);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function copyOutput() {
  const text = document.getElementById('outputEl').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    showToast(i18n[lang].copyDone);
  });
}

async function pasteInput() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('inputEl').value = text;
    onInput();
  } catch(e) {}
}

function loadSample() {
  document.getElementById('inputEl').value = 'SGVsbG8sIFdvcmxkISAn7JWE64W8IO2WiCDjgZLjgpPjgavjgaHjgIIK5L2g5aW9';
  document.getElementById('outputEl').value = '';
  clearErr();
  decode();
}
