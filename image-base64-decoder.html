  },
  en:{h1b:'Decoder',sub:'Decode Base64 strings back to images',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'Image Base64 Decoder | MODOO HUB',lblInput:'Base64 Input',inputPh:'data:image/png;base64,iVBORw0KGgo... or raw Base64',btnPaste:'Paste',btnClear:'Clear',lblPreview:'Preview',btnDl:'Download',errInvalid:'Invalid Base64 image string.',
    seoHtml:`<h2>Image Base64 Decoder</h2><p>Convert Base64 strings back to <strong>images</strong>. Paste a Data URL (data:image/...;base64,) or raw Base64 — the image is restored instantly. Useful for extracting images embedded in HTML, CSS, or API responses.</p>

<details class="faq-item"><summary>Can I input raw Base64?</summary><p>Yes — raw Base64 without the data: prefix is accepted and treated as PNG.</p></details>

<details class="faq-item"><summary>What if decoding fails?</summary><p>Verify the input is a valid Base64 image string without line breaks or extra spaces.</p></details>
<details class="faq-item"><summary>How to identify the image format?</summary><p>Check the Data URL prefix (e.g. data:image/png).</p></details>
<details class="faq-item"><summary>To encode an image to Base64?</summary><p>Use the image-base64-encoder tool.</p></details>`
  },
  zh:{h1b:'解码器',sub:'将Base64字符串解码为图像',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'图像Base64解码器 | MODOO HUB',lblInput:'Base64输入',inputPh:'data:image/png;base64,iVBORw0KGgo... 或纯Base64字符串',btnPaste:'粘贴',btnClear:'清除',lblPreview:'预览',btnDl:'下载',errInvalid:'无效的Base64图像字符串。',
    seoHtml:`<h2>图像Base64解码器</h2><p>将Base64字符串解码为<strong>图像</strong>。粘贴Data URL（data:image/...;base64,）或纯Base64字符串，即可立即恢复图像。适用于从HTML、CSS或API响应中提取嵌入的图像。</p>

<details class="faq-item"><summary>可以输入纯Base64字符串吗？</summary><p>可以，无需data:前缀的纯Base64数据也被接受，视为PNG处理。</p></details>

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','lblInput','btnPaste','btnClear','lblPreview','btnDl'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('inputText').placeholder=t.inputPh;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function decode(){
  const t=_i18n[_lang];let val=document.getElementById('inputText').value.trim();
  const errEl=document.getElementById('errMsg');errEl.style.display='none';
  if(!val){document.getElementById('outBox').style.display='none';return;}
  if(!val.startsWith('data:')){val='data:image/png;base64,'+val;}
  const img=document.getElementById('previewImg');
  img.onerror=()=>{errEl.textContent=t.errInvalid;errEl.style.display='block';document.getElementById('outBox').style.display='none';_dataUrl='';};
  img.onload=()=>{_dataUrl=val;document.getElementById('outBox').style.display='block';errEl.style.display='none';const m=val.match(/data:([^;]+)/);document.getElementById('infoBar').textContent=`${img.naturalWidth} × ${img.naturalHeight} px  |  ${m?m[1]:'image'}`;};
  img.src=val;
}
function pasteInput(){navigator.clipboard.readText().then(t=>{document.getElementById('inputText').value=t;decode();}).catch(()=>{});}
function clearInput(){document.getElementById('inputText').value='';document.getElementById('outBox').style.display='none';document.getElementById('errMsg').style.display='none';_dataUrl='';}
function download(){if(!_dataUrl)return;const a=document.createElement('a');const m=_dataUrl.match(/data:image\/([^;]+)/);const ext=m?'.'+m[1].replace('jpeg','jpg'):'';a.href=_dataUrl;a.download='decoded'+ext;a.click();}
let _dataUrl='';
_lang=detectLang();applyLang();
