    seoHtml:`<h2>JWT 검증기란?</h2><p>JWT(JSON Web Token)는 인증·인가에 널리 쓰이는 토큰 형식입니다. <strong>Header.Payload.Signature</strong> 세 부분을 Base64URL로 인코딩해 점(.)으로 연결합니다. 이 도구는 JWT를 즉시 디코딩해 구조 유효성, 만료 여부, 표준 클레임을 분석합니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>JWT 서명도 검증되나요?</summary><p>서명 검증(Signature Verification)은 서버 측 시크릿 키 또는 공개키가 필요합니다. 이 도구는 클라이언트에서 동작하므로 구조·만료·클레임 분석만 제공합니다.</p></details>
<details class="faq-item"><summary>JWT 토큰이 만료됐는지 어떻게 확인하나요?</summary><p>Payload의 exp 클레임(Unix timestamp)과 현재 시각을 비교합니다. exp < 현재 시각이면 만료로 판정됩니다.</p></details>
<details class="faq-item"><summary>HS256, RS256 차이는?</summary><p>HS256은 HMAC-SHA256으로 동일한 시크릿 키로 서명·검증합니다. RS256은 RSA 비대칭키로 개인키로 서명하고 공개키로 검증합니다.</p></details>
<details class="faq-item"><summary>JWT에서 민감 정보를 저장해도 되나요?</summary><p>Payload는 Base64URL 인코딩만 된 것으로 누구나 디코딩할 수 있습니다. 민감 정보(비밀번호, 카드번호 등)는 절대 JWT에 저장하지 마세요.</p></details>
<details class="faq-item"><summary>nbf 클레임이란?</summary><p>Not Before의 약자로, 이 시각 이전에는 토큰을 사용할 수 없음을 의미합니다. nbf > 현재 시각이면 아직 유효하지 않습니다.</p></details>
<details class="faq-item"><summary>JWE와 JWT 차이는?</summary><p>JWT(JSON Web Token)는 서명만 하며 페이로드가 노출됩니다. JWE(JSON Web Encryption)는 페이로드를 암호화해 내용이 보호됩니다.</p></details>
<details class="faq-item"><summary>JWT는 어디에 저장해야 하나요?</summary><p>localStorage는 XSS 공격에 취약합니다. httpOnly 쿠키가 더 안전합니다. Authorization: Bearer 헤더로 전송할 때는 메모리에만 보관하는 것이 권장됩니다.</p></details>

    seoHtml:`<h2>JWT Validator</h2><p>JWT (JSON Web Token) is a widely used token format for authentication and authorization. It consists of three Base64URL-encoded parts: <strong>Header.Payload.Signature</strong>. This tool instantly decodes a JWT and analyzes its structure, expiry, and standard claims.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Is the signature verified?</summary><p>Signature verification requires a server-side secret key or public key. This client-side tool only analyzes structure, expiry, and claims.</p></details>
<details class="faq-item"><summary>How is token expiry checked?</summary><p>The exp claim (Unix timestamp) is compared to the current time. If exp is in the past, the token is expired.</p></details>
<details class="faq-item"><summary>HS256 vs RS256?</summary><p>HS256 uses HMAC-SHA256 with a shared secret key for both signing and verification. RS256 uses RSA asymmetric keys — private key to sign, public key to verify.</p></details>
<details class="faq-item"><summary>Can I store sensitive data in JWT?</summary><p>No. The payload is only Base64URL-encoded, not encrypted — anyone can decode it. Never store passwords, card numbers, or other sensitive data in a JWT.</p></details>
<details class="faq-item"><summary>What is the nbf claim?</summary><p>Not Before — the token should not be accepted before this time. If nbf is in the future, the token is not yet valid.</p></details>
<details class="faq-item"><summary>JWT vs JWE?</summary><p>JWT is signed (payload visible). JWE (JSON Web Encryption) encrypts the payload so the contents are protected.</p></details>
<details class="faq-item"><summary>Where should I store a JWT?</summary><p>localStorage is vulnerable to XSS. httpOnly cookies are safer. For Bearer header usage, store only in memory.</p></details>
<details class="faq-item"><summary>Why is my JWT so long?</summary><p>Too many claims in the payload bloat the token size, increasing network overhead. Include only required claims and look up the rest server-side.</p></details>`

    seoHtml:`<h2>JWT验证器</h2><p>JWT（JSON Web Token）是广泛用于认证和授权的令牌格式，由三个Base64URL编码部分组成：<strong>Header.Payload.Signature</strong>。本工具即时解码JWT并分析其结构、过期时间和标准声明。</p>

<details class="faq-item"><summary>如何检查令牌是否过期？</summary><p>将exp声明（Unix时间戳）与当前时间比较。如果exp在过去，令牌已过期。</p></details>
<details class="faq-item"><summary>HS256和RS256的区别？</summary><p>HS256使用共享密钥的HMAC-SHA256进行签名和验证。RS256使用RSA非对称密钥——私钥签名，公钥验证。</p></details>

<details class="faq-item"><summary>nbf声明是什么？</summary><p>Not Before——令牌在此时间之前不应被接受。如果nbf在未来，令牌尚未生效。</p></details>

    msgOk:'有効なJWT構造',msgExpired:'トークンの有効期限切れ',msgInvalid:'無効なJWT形式',msgNotYet:'まだ有効でないトークン(nbf)',
    claimSub:'サブジェクト',claimIss:'発行者',claimAud:'オーディエンス',claimExp:'有効期限',claimIat:'発行日時',claimNbf:'有効開始日時',claimJti:'JWT ID',claimAlg:'アルゴリズム',claimTyp:'タイプ',
    seoHtml:`<h2>JWTバリデーターとは</h2><p>JWT（JSON Web Token）は認証・認可に広く使われるトークン形式です。<strong>Header.Payload.Signature</strong>の3部をBase64URLエンコードして点(.)で連結します。このツールはJWTを即時デコードし、構造の有効性・有効期限・標準クレームを分析します。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>署名も検証されますか？</summary><p>署名検証にはサーバー側のシークレットキーまたは公開鍵が必要です。このクライアントサイドツールは構造・有効期限・クレームの分析のみ提供します。</p></details>
<details class="faq-item"><summary>トークンの有効期限はどう確認しますか？</summary><p>expクレーム（Unixタイムスタンプ）と現在時刻を比較します。expが過去であればトークンは期限切れです。</p></details>
<details class="faq-item"><summary>HS256とRS256の違いは？</summary><p>HS256は共有シークレットキーを使うHMAC-SHA256です。RS256はRSA非対称鍵を使い、秘密鍵で署名して公開鍵で検証します。</p></details>
<details class="faq-item"><summary>JWTに機密情報を入れてもいいですか？</summary><p>いいえ。ペイロードはBase64URLエンコードのみで誰でもデコードできます。パスワードやカード番号などの機密情報は絶対に入れないでください。</p></details>
<details class="faq-item"><summary>nbfクレームとは？</summary><p>Not Beforeの略で、この時刻以前はトークンを使えません。nbfが未来の場合、トークンはまだ有効ではありません。</p></details>
<details class="faq-item"><summary>JWTとJWEの違いは？</summary><p>JWTは署名のみ（ペイロードは見える）。JWE（JSON Web Encryption）はペイロードを暗号化して内容を保護します。</p></details>
<details class="faq-item"><summary>JWTはどこに保存すべきですか？</summary><p>localStorageはXSS攻撃に弱いです。httpOnly Cookieがより安全です。Bearerヘッダー使用時はメモリのみに保持することを推奨します。</p></details>
<details class="faq-item"><summary>JWTが長すぎる場合は？</summary><p>ペイロードのクレームが多すぎるとトークンが大きくなりネットワーク負荷が増えます。必須クレームのみ含め、それ以外はサーバーで取得することを推奨します。</p></details>`
  }
};
const LANGS=['ko','en','zh','ja'];
let _lang='ko';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1a').textContent=t.h1a;document.getElementById('h1b').textContent=t.h1b;
  document.getElementById('subEl').textContent=t.sub;document.getElementById('backLink').textContent=t.backLink;
  document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('labelInput').textContent=t.labelInput;
  document.getElementById('labelHeader').textContent=t.labelHeader;document.getElementById('labelPayload').textContent=t.labelPayload;
  document.getElementById('labelSig').textContent=t.labelSig;document.getElementById('labelClaims').textContent=t.labelClaims;
  document.getElementById('btnValidate').textContent=t.btnValidate;document.getElementById('btnClear').textContent=t.btnClear;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function b64urlDecode(str){
  str=str.replace(/-/g,'+').replace(/_/g,'/');
  while(str.length%4)str+='=';
  try{return JSON.parse(atob(str));}catch(e){return null;}
}
function b64urlRaw(str){
  str=str.replace(/-/g,'+').replace(/_/g,'/');
  while(str.length%4)str+='=';
  try{return atob(str);}catch(e){return null;}
}
function autoValidate(){validate();}
function clearAll(){document.getElementById('tokenInput').value='';document.getElementById('resultArea').className='result';}
function validate(){
  const t=_i18n[_lang];
  const raw=document.getElementById('tokenInput').value.trim();
  const ra=document.getElementById('resultArea');
  if(!raw){ra.className='result';return;}
  const parts=raw.split('.');
  if(parts.length!==3){
    ra.className='result show';
    document.getElementById('statusBar').className='status-bar err';
    document.getElementById('statusBar').textContent='✗ '+t.msgInvalid;
    document.getElementById('headerJson').textContent='';
    document.getElementById('payloadJson').textContent='';
    document.getElementById('sigJson').textContent='';
    document.getElementById('claimsList').innerHTML='';
    return;
  }
  const header=b64urlDecode(parts[0]);
  const payload=b64urlDecode(parts[1]);
  const sig=parts[2];
  if(!header||!payload){
    ra.className='result show';
    document.getElementById('statusBar').className='status-bar err';
    document.getElementById('statusBar').textContent='✗ '+t.msgInvalid;
    document.getElementById('headerJson').textContent='';document.getElementById('payloadJson').textContent='';document.getElementById('sigJson').textContent='';document.getElementById('claimsList').innerHTML='';
    return;
  }
  const now=Math.floor(Date.now()/1000);
  let status='ok',msg=t.msgOk;
  if(payload.exp && payload.exp < now){status='warn';msg=t.msgExpired;}
  if(payload.nbf && payload.nbf > now){status='warn';msg=t.msgNotYet;}
  ra.className='result show';
  const sb=document.getElementById('statusBar');
  sb.className='status-bar '+(status==='ok'?'ok':'warn');
  sb.textContent=(status==='ok'?'✓ ':'⚠ ')+msg;
  document.getElementById('headerJson').textContent=JSON.stringify(header,null,2);
  document.getElementById('payloadJson').textContent=JSON.stringify(payload,null,2);
  document.getElementById('sigJson').textContent=sig.substring(0,40)+(sig.length>40?'…':'');
  // claims
  const clMap={sub:t.claimSub,iss:t.claimIss,aud:t.claimAud,exp:t.claimExp,iat:t.claimIat,nbf:t.claimNbf,jti:t.claimJti};
  const algMap={alg:t.claimAlg,typ:t.claimTyp};
  let html='';
  Object.entries({...header,...payload}).forEach(([k,v])=>{
    const name=clMap[k]||algMap[k]||k;
    let display=String(v);
    let note='';
    if((k==='exp'||k==='iat'||k==='nbf')&&typeof v==='number'){
      const d=new Date(v*1000);
      display=d.toISOString().replace('T',' ').slice(0,19);
      if(k==='exp') note=v<now?'<span class="tag err">expired</span>':'<span class="tag ok">valid</span>';
      if(k==='nbf') note=v>now?'<span class="tag warn">not yet valid</span>':'<span class="tag ok">active</span>';
    }
    html+=`<div class="claim"><span class="claim-key">${k}</span><span class="claim-val">${display} <span class="claim-note">${name}</span>${note}</span></div>`;
  });
  document.getElementById('claimsList').innerHTML=html;
}
_lang=detectLang();applyLang();
document.addEventListener('DOMContentLoaded',()=>{const v=document.getElementById('tokenInput').value;if(v)validate();});
</script>
<script src="related.js"></script>
</body>
</html>
