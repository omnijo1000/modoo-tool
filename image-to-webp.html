<script>
const _i18n={
  ko:{sub:'JPEG·PNG·GIF → WebP 변환 · 최대 10개 일괄 변환',langBtn:'🌐 EN',backBtn:'← 모두의 툴',dropText:'이미지를 드래그하거나 클릭 (최대 10개)',qualLabel:'품질',convBtn:'▶ 변환',dlAllBtn:'⬇ 모두 다운로드',seoHtml:'<h2>이미지 to WebP 변환기란?</h2><p>JPEG·PNG·GIF 이미지를 <strong>WebP 형식</strong>으로 변환합니다. WebP는 Google이 개발한 차세대 이미지 형식으로 JPEG 대비 25~34% 용량이 작아 웹 페이지 로딩 속도 개선에 효과적입니다. Canvas API를 사용해 브라우저에서 직접 처리하며 최대 10개를 일괄 변환합니다.</p><h2>자주 묻는 질문 (FAQ)</h2><details class="faq-item"><summary>WebP는 JPEG보다 어떤 점이 좋나요?</summary><p>같은 화질에서 파일 크기가 25~34% 작습니다. 웹 페이지 이미지를 WebP로 교체하면 LCP(최대 콘텐츠 렌더링) 개선과 데이터 절약 효과가 있습니다. Core Web Vitals 최적화에도 권장됩니다.</p></details><details class="faq-item"><summary>품질(Quality) 값은 어떻게 설정하나요?</summary><p>0~100 사이 값으로 설정합니다. 웹 표시용은 75~85, 인쇄·고화질용은 90 이상을 권장합니다. 값이 낮을수록 파일이 작아지지만 화질이 저하됩니다.</p></details><details class="faq-item"><summary>WebP를 지원하지 않는 브라우저가 있나요?</summary><p>2024년 기준 Chrome·Firefox·Safari·Edge 등 주요 브라우저가 모두 WebP를 지원합니다. IE(Internet Explorer)는 지원하지 않으므로 IE 대응이 필요한 경우 JPEG/PNG를 병행 사용하세요.</p></details><details class="faq-item"><summary>GIF 애니메이션도 WebP로 변환되나요?</summary><p>Canvas API로 처리하면 첫 프레임만 정적 WebP로 변환됩니다. 애니메이션 WebP 변환은 지원하지 않습니다.</p></details><details class="faq-item"><summary>변환된 WebP 파일을 일괄 다운로드할 수 있나요?</summary><p>네. 여러 이미지를 변환한 후 "모두 다운로드" 버튼을 클릭하면 각 파일을 개별적으로 다운로드합니다.</p></details>'},
  en:{sub:'JPEG · PNG · GIF → WebP · Batch convert up to 10 images',langBtn:'🌐 中文',backBtn:'← All Tools',dropText:'Drag & drop or click (up to 10 images)',qualLabel:'Quality',convBtn:'▶ Convert',dlAllBtn:'⬇ Download All',seoHtml:'<h2>Image to WebP Converter</h2><p>Convert JPEG, PNG, and GIF images to <strong>WebP format</strong> — Google\'s next-gen image codec that delivers 25–34% smaller files than JPEG at equivalent quality. Processing happens directly in the browser via Canvas API. Batch convert up to 10 images at once.</p><h2>FAQ</h2><details class="faq-item"><summary>Why is WebP better than JPEG?</summary><p>WebP typically produces 25–34% smaller files than JPEG at the same visual quality. Switching website images to WebP improves LCP (Largest Contentful Paint) and reduces data usage. It is recommended for Core Web Vitals optimization.</p></details><details class="faq-item"><summary>How should I set the quality value?</summary><p>Quality ranges from 0–100. For web display, 75–85 is a good balance. For high-fidelity or print, use 90+. Lower values produce smaller files but with more visible compression artifacts.</p></details><details class="faq-item"><summary>Does all browsers support WebP?</summary><p>As of 2024, all major browsers (Chrome, Firefox, Safari, Edge) support WebP. IE does not — if IE support is required, provide JPEG/PNG fallbacks using the HTML &lt;picture&gt; element.</p></details><details class="faq-item"><summary>Can I convert animated GIFs to WebP?</summary><p>Canvas API only captures the first frame, so animated GIFs are converted to a static WebP image. Animated WebP conversion is not supported.</p></details><details class="faq-item"><summary>Can I batch download all converted files?</summary><p>Yes. After converting multiple images, click "Download All" to save each file individually.</p></details>'},
  zh:{sub:'JPEG·PNG·GIF → WebP转换 · 最多10张批量处理',langBtn:'🌐 日本語',backBtn:'← 所有工具',dropText:'拖放或点击选择（最多10张）',qualLabel:'质量',convBtn:'▶ 转换',dlAllBtn:'⬇ 全部下载',seoHtml:'<h2>图片转WebP工具</h2><p>将JPEG、PNG、GIF图片转换为<strong>WebP格式</strong>——Google的下一代图片编解码格式，同等质量下比JPEG小25-34%。使用Canvas API在浏览器中直接处理，支持最多10张批量转换。</p><h2>常见问题 (FAQ)</h2><details class="faq-item"><summary>WebP比JPEG好在哪里？</summary><p>相同画质下，WebP通常比JPEG小25-34%。将网站图片转换为WebP可改善LCP（最大内容绘制）并减少流量消耗，有助于Core Web Vitals优化。</p></details><details class="faq-item"><summary>质量值应该如何设置？</summary><p>质量范围为0-100。网页展示建议75-85，高保真或印刷用途建议90以上。值越低文件越小，但压缩失真越明显。</p></details><details class="faq-item"><summary>所有浏览器都支持WebP吗？</summary><p>截至2024年，Chrome、Firefox、Safari、Edge等主流浏览器均支持WebP。IE不支持——如需兼容IE，请使用HTML &lt;picture&gt;元素提供JPEG/PNG备选方案。</p></details><details class="faq-item"><summary>动态GIF能转换为WebP吗？</summary><p>Canvas API只能捕获第一帧，因此动态GIF会被转换为静态WebP图片，不支持动态WebP转换。</p></details><details class="faq-item"><summary>可以批量下载转换后的文件吗？</summary><p>可以。多张图片转换完成后，点击"全部下载"即可逐一保存每个文件。</p></details>'},
  ja:{sub:'JPEG・PNG・GIF → WebP 変換 · 最大 10 枚の一括変換',langBtn:'🌐 한국어',backBtn:'← ホーム',dropText:'画像をドラッグまたはクリック（最大 10 枚）',qualLabel:'品質',convBtn:'▶ 変換',dlAllBtn:'⬇ すべてダウンロード',seoHtml:'<h2>Image to WebP とは？</h2><p>JPEG・PNG・GIFを<strong>WebP形式</strong>に変換します。WebPはGoogleが開発した次世代画像フォーマットで、同等画質でJPEGより25〜34%小さいファイルを実現します。Canvas APIを使用してブラウザで直接処理し、最大10枚を一括変換できます。</p><h2>よくある質問 (FAQ)</h2><details class="faq-item"><summary>WebPはJPEGより何が優れていますか？</summary><p>同等画質でJPEGより25〜34%小さいファイルを生成します。WebPへの変換によりLCP（最大コンテンツ描画）が改善し、データ節約効果があります。Core Web Vitals最適化にも推奨されます。</p></details><details class="faq-item"><summary>品質値はどのように設定すればいいですか？</summary><p>0〜100の範囲で設定します。Web表示には75〜85、高品質・印刷用には90以上を推奨します。値が低いほどファイルは小さくなりますが、圧縮アーティファクトが増えます。</p></details><details class="faq-item"><summary>すべてのブラウザでWebPは使えますか？</summary><p>2024年時点でChrome・Firefox・Safari・Edgeなど主要ブラウザはWebPに対応しています。IEは非対応のため、IE対応が必要な場合はHTML &lt;picture&gt;要素でJPEG/PNGのフォールバックを用意してください。</p></details><details class="faq-item"><summary>アニメーションGIFをWebPに変換できますか？</summary><p>Canvas APIでは最初のフレームのみキャプチャされるため、アニメーションGIFは静止画WebPに変換されます。アニメーションWebPの変換はサポートしていません。</p></details><details class="faq-item"><summary>変換したファイルをまとめてダウンロードできますか？</summary><p>はい。複数画像を変換後、「すべてダウンロード」ボタンをクリックすると各ファイルが個別に保存されます。</p></details>'},
};
let _lang='ko',_files=[],_results=[];
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang')||localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('lang',_lang);localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);if(_lang==='ko')url.searchParams.delete('lang');else url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function fmtSize(b){return b>1024*1024?(b/1024/1024).toFixed(2)+' MB':(b/1024).toFixed(1)+' KB';}
function ev(e,type){e.preventDefault();const dz=document.getElementById('dropZone');if(type==='over')dz.classList.add('over');else if(type==='leave')dz.classList.remove('over');else{dz.classList.remove('over');addFiles(e.dataTransfer.files);}}
function onFiles(e){addFiles(e.target.files);}
function addFiles(fileList){
  const toAdd=[...fileList].filter(f=>f.type.startsWith('image/')).slice(0,10-_files.length);
  _files=[..._files,...toAdd].slice(0,10);
  _results=new Array(_files.length).fill(null);
  renderList();
  document.getElementById('optsBar').style.display=_files.length?'flex':'none';
}
function renderList(){
  const list=document.getElementById('fileList');list.innerHTML='';
  _files.forEach((f,i)=>{
    const item=document.createElement('div');item.className='file-item';
    const url=URL.createObjectURL(f);
    const res=_results[i];
    item.innerHTML=`<img class="file-thumb" src="${url}"><div class="file-info"><div class="file-name">${f.name}</div><div class="file-sizes">${fmtSize(f.size)}${res?' → '+fmtSize(res.size)+' ('+Math.round((1-res.size/f.size)*100)+'%)':''}</div></div><span class="file-status ${res?'done':'wait'}">${res?'✓ WebP':'-'}</span>${res?`<button class="dl-item-btn" onclick="dlOne(${i})">↓</button>`:''}`;
    list.appendChild(item);
  });
}
function convertAll(){
  const q=parseInt(document.getElementById('quality').value)/100;
  let done=0;
  _files.forEach((f,i)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
        c.getContext('2d').drawImage(img,0,0);
        c.toBlob(blob=>{_results[i]=blob;done++;if(done===_files.length){renderList();document.getElementById('dlAllBtn').style.display='block';}else renderList();},'image/webp',q);
      };img.src=e.target.result;
    };reader.readAsDataURL(f);
  });
}
function dlOne(i){
  const blob=_results[i];if(!blob)return;
  const name=_files[i].name.replace(/\.[^.]+$/,'')+'.webp';
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
}
function downloadAll(){
  _results.forEach((b,i)=>{if(b)setTimeout(()=>dlOne(i),i*200);});
}
_lang=detectLang();applyLang();
</script>
