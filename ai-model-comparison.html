<details class="faq-item"><summary>最も安いモデルは？</summary><p>Gemini 1.5 Flashが入力$0.075/1Mトークンで最安値です。</p></details>
<details class="faq-item"><summary>無料で使えるモデルは？</summary><p>Google Geminiシリーズは1分あたりのリクエスト制限内で無料API利用が可能です。</p></details>
<details class="faq-item"><summary>マルチモーダルとは？</summary><p>テキスト以外に画像や音声なども処理できる機能です。</p></details>
<details class="faq-item"><summary>コーディングに最適なモデルは？</summary><p>GPT-4oとClaude Sonnetがコーディングに優れています。複雑な推論にはo1も強力です。</p></details>
<details class="faq-item"><summary>価格はどのくらいの頻度で変わりますか？</summary><p>AIモデルの価格は随時変更される可能性があります。最新情報は各プロバイダーの公式ページで確認してください。</p></details>
<details class="faq-item"><summary>トークンとは何ですか？</summary><p>AIがテキストを処理する最小単位です。英語は約4文字=1トークン、日本語は約2文字≈1トークンです。</p></details>
<details class="faq-item"><summary>HaikuがSonnetより優れる場合は？</summary><p>応答速度が重要な場合や大量処理でコスト削減が必要な場合はHaikuが有利です。</p></details>`
  }
};
const MAX_CTX=2000;
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);render();}
function render(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('noteEl').textContent=t.note;document.getElementById('seoDiv').innerHTML=t.seoHtml;
  const filters=[{k:'all',l:t.filterAll},{k:'oai',l:t.filterOai},{k:'ant',l:t.filterAnt},{k:'goo',l:t.filterGoo}];
  document.getElementById('filterBar').innerHTML=filters.map(f=>`<button class="filter-chip${_filter===f.k?' active':''}" onclick="setFilter('${f.k}')">${f.l}</button>`).join('');
  document.getElementById('tblHead').innerHTML=`<tr><th>${t.hModel}</th><th>${t.hCtx}</th><th>${t.hPriceIn}</th><th>${t.hPriceOut}</th><th>${t.hMulti}</th><th>${t.hFree}</th><th>${t.hNote}</th></tr>`;
  const rows=MODELS.filter(m=>_filter==='all'||m.brand===_filter);
  document.getElementById('tblBody').innerHTML=rows.map(m=>`
    <tr>
      <td><span class="brand-badge ${m.brand}">${BRANDS[m.brand]}</span>&nbsp;${m.name}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-family:'DM Mono',monospace;font-size:11px">${m.ctxLabel}</span>
          <div class="ctx-bar" style="width:${Math.max(30,Math.round(m.ctx/MAX_CTX*80))}px"><div class="ctx-fill" style="width:${Math.round(m.ctx/MAX_CTX*100)}%"></div></div>
        </div>
      </td>
      <td><span class="price-in">$${m.pIn.toFixed(3)}</span></td>
      <td><span class="price-out">$${m.pOut.toFixed(2)}</span></td>
      <td style="text-align:center">${m.multimodal?t.yes:t.no}</td>
      <td style="text-align:center" class="${m.free?'tier-free':'tier-paid'}">${m.free?t.freeTier:t.noTier}</td>
      <td style="font-size:11px;color:var(--text-dim)">${m.note}</td>
    </tr>`).join('');
}
function setFilter(f){_filter=f;render();}
_lang=detectLang();render();
</script>
<script src="related.js"></script>
