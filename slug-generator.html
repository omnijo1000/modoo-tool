<body>
<header>
  <div class="dot"></div>
  <span class="header-label">MODOO HUB</span>
  <a href="index.html" class="back-link">← 모두의 툴</a>

</header>
<main>
  <h1>Slug <span>Generator</span></h1>
  <p class="subtitle" data-i18n="sub">Convert any text to a clean, URL-friendly slug.</p>

  <div class="input-group">
    <div class="col-label" data-i18n="labelInput">INPUT TEXT</div>
    <input type="text" id="inputText" placeholder="e.g. Hello World! This is my blog post." oninput="generateSlug()">
  </div>

  <div class="sep-row">
    <span class="sep-label" data-i18n="sepLabel">Separator:</span>
    <button class="sep-btn active" id="sepHyphen" onclick="setSep('-')" data-i18n="sepHyphen">- hyphen</button>
    <button class="sep-btn" id="sepUnderscore" onclick="setSep('_')" data-i18n="sepUnderscore">_ underscore</button>
  </div>

  <div class="options-row">
    <label class="opt-label"><input type="checkbox" id="optLower" checked> <span data-i18n="optLower">Lowercase</span></label>
    <label class="opt-label"><input type="checkbox" id="optRemoveSpecial" checked> <span data-i18n="optSpecial">Remove special chars</span></label>
  </div>

  <div class="col-label" data-i18n="labelOutput">SLUG OUTPUT</div>
  <div class="slug-output" id="slugOutput">—</div>

  <div class="toolbar">
    <button class="tool-btn" onclick="copySlug()" data-i18n="btnCopy">📋 Copy Slug</button>
    <button class="tool-btn" onclick="clearAll()" data-i18n="btnClear">🗑 Clear</button>
  </div>

  <div class="seo">
    <h2 id="seoTitle1"></h2>
    <p id="seoBody1"></p>
    <p id="seoFaq1"></p>
    <p id="seoFaq2"></p>
  </div>
  <footer>© 2026 MODOO HUB · Free · <a href="privacy.html" style="color:var(--text-dim);text-decoration:none;">Privacy Policy</a></footer>
</main>
<script>
let _sep='-';
function setSep(s){_sep=s;document.getElementById('sepHyphen').classList.toggle('active',s==='-');document.getElementById('sepUnderscore').classList.toggle('active',s==='_');generateSlug();}
function generateSlug(){
  let v=document.getElementById('inputText').value;
  const lower=document.getElementById('optLower').checked;
  const special=document.getElementById('optRemoveSpecial').checked;
  if(lower)v=v.toLowerCase();
  if(special)v=v.replace(/[^a-z0-9\s-_]/gi,'');
  v=v.trim().replace(/[\s_-]+/g,_sep).replace(new RegExp(`^[${_sep}]+|[${_sep}]+$`,'g'),'');
  document.getElementById('slugOutput').textContent=v||'—';
}
function copySlug(){const v=document.getElementById('slugOutput').textContent;if(v&&v!=='—')navigator.clipboard.writeText(v);}
function clearAll(){document.getElementById('inputText').value='';document.getElementById('slugOutput').textContent='—';}
</script>
<script>
const _i18n={
  ko:{lang:'ko',title:'URL 슬러그 생성기 - 텍스트를 URL 슬러그로 변환 | 무료',btn:'🌐 EN',
    sub:'텍스트를 깔끔한 URL 친화적 슬러그로 변환하세요.',
    labelInput:'입력 텍스트',sepLabel:'구분자:',sepHyphen:'- 하이픈',sepUnderscore:'_ 언더스코어',
    optLower:'소문자로 변환',optSpecial:'특수문자 제거',labelOutput:'슬러그 출력',
    btnCopy:'📋 슬러그 복사',btnClear:'🗑 지우기',
    seoTitle1:'URL 슬러그란 무엇인가요?',seoBody1:'URL 슬러그는 웹 페이지 주소에 사용되는 사람이 읽을 수 있는 짧은 텍스트입니다. 예: my-blog-post. 슬러그에는 소문자, 숫자, 하이픈만 사용하는 것이 SEO에 유리합니다.',
    seoFaq1:'<strong>Q. 하이픈과 언더스코어 중 어느 것이 더 좋은가요?</strong><br>구글은 하이픈(-)을 단어 구분자로 인식하지만 언더스코어(_)는 단어 결합으로 간주합니다. SEO 관점에서는 하이픈을 권장합니다.',
    seoFaq2:'<strong>Q. 한국어는 슬러그로 변환되나요?</strong><br>현재 이 도구는 한국어 등 비라틴 문자를 제거합니다. 한국어 슬러그가 필요한 경우 영문 번역 후 변환하는 것을 권장합니다.'},
  en:{lang:'en',title:'Slug Generator - Convert Text to URL Slug | Free',btn:'🌐 中文',
    sub:'Convert any text to a clean, URL-friendly slug.',
    labelInput:'INPUT TEXT',sepLabel:'Separator:',sepHyphen:'- hyphen',sepUnderscore:'_ underscore',
    optLower:'Lowercase',optSpecial:'Remove special chars',labelOutput:'SLUG OUTPUT',
    btnCopy:'📋 Copy Slug',btnClear:'🗑 Clear',
    seoTitle1:'What is a URL Slug?',seoBody1:'A URL slug is a human-readable part of a URL that identifies a page. For example: my-blog-post. Good slugs use lowercase letters, numbers, and hyphens only — no spaces or special characters.',
    seoFaq1:'<strong>Q. Hyphen or underscore — which is better?</strong><br>Google treats hyphens as word separators but underscores as word joiners. For SEO, hyphens are recommended.',

  zh:{lang:'zh',title:'URL Slug生成器 - 将文本转换为URL Slug | 免费',btn:'🌐 日本語',
    sub:'将任意文本转换为简洁的URL友好型Slug。',
    labelInput:'输入文本',sepLabel:'分隔符:',sepHyphen:'- 连字符',sepUnderscore:'_ 下划线',
    optLower:'转为小写',optSpecial:'删除特殊字符',labelOutput:'Slug输出',
    btnCopy:'📋 复制Slug',btnClear:'🗑 清空',
    seoTitle1:'什么是URL Slug？',seoBody1:'URL Slug是URL中便于人类阅读的部分，用于标识页面。例如：my-blog-post。好的Slug只使用小写字母、数字和连字符，不含空格或特殊字符。',

  ja:{lang:'ja',title:'URLスラッグ生成器 - テキストをURLスラッグに変換 | 無料',btn:'🌐 한국어',
    sub:'テキストをきれいなURL対応スラッグに変換します。',
    labelInput:'入力テキスト',sepLabel:'区切り文字:',sepHyphen:'- ハイフン',sepUnderscore:'_ アンダースコア',
    optLower:'小文字に変換',optSpecial:'特殊文字を削除',labelOutput:'スラッグ出力',
    btnCopy:'📋 スラッグをコピー',btnClear:'🗑 クリア',
    seoTitle1:'URLスラッグとは？',seoBody1:'URLスラッグはURLの中で人間が読める部分で、ページを識別します。例: my-blog-post。良いスラッグは小文字・数字・ハイフンのみを使用し、スペースや特殊文字は含みません。',
    seoFaq1:'<strong>Q. ハイフンとアンダースコアどちらが良いですか？</strong><br>Googleはハイフンを単語の区切りとして認識しますが、アンダースコアは単語の結合として扱います。SEO的にはハイフンが推奨です。',
    seoFaq2:'<strong>Q. 日本語などの非ASCII文字は対応していますか？</strong><br>非ASCII文字（日本語・韓国語・漢字など）は削除されます。ローマ字または英語に翻訳してから変換することをお勧めします。'}
};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
  ['seoTitle1','seoBody1','seoFaq1','seoFaq2'].forEach(id=>{const el=document.getElementById(id);if(el&&t[id]!==undefined)el.innerHTML=t[id];});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
