<script>
const _i18n={
  ko:{pageTitle:'퍼센트 증가 계산기 | 모두의 툴',h1:'📈 퍼센트 증가 계산기',sub:'두 값 사이의 증가율을 계산합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',tab0:'증가율 계산',tab1:'증가 후 값 계산',origLabel:'원래 값',newLabel:'새 값',rateLabel:'증가율 (%)',seoHtml:`<h2>퍼센트 증가 계산기란?</h2><p>원래 값과 새 값을 입력해 퍼센트 증가율을 계산하거나, 원래 값과 증가율로 증가 후 값을 역산합니다. 주식 수익률, 매출 성장률, 인구 증가율, 가격 변동 등 다양한 상황에서 활용됩니다. 공식: 증가율(%) = (새 값 - 원래 값) / 원래 값 × 100. 결과는 소수점 두 자리까지 표시됩니다.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. 100에서 150이 되면 증가율은?</summary><p>A. (150-100)/100×100 = 50%. 50% 증가입니다.</p></details><details class="faq-item"><summary>Q. 역산 모드는 무엇인가요?</summary><p>A. 원래 값과 증가율을 입력해 증가 후 값을 계산합니다. 예: 100에 30% 증가 → 130.</p></details><details class="faq-item"><summary>Q. 소수점 결과도 나오나요?</summary><p>A. 네, 소수점 두 자리까지 표시됩니다.</p></details><details class="faq-item"><summary>Q. 음수 결과가 나왔어요.</summary><p>A. 새 값이 원래 값보다 작으면 음수(감소)가 나옵니다. 감소율 계산기를 사용하세요.</p></details><details class="faq-item"><summary>Q. 원래 값이 0이면 어떻게 되나요?</summary><p>A. 0으로 나누기 불가 — 원래 값은 0이 아닌 값을 입력해야 합니다.</p></details><details class="faq-item"><summary>Q. 주식 수익률 계산에 사용할 수 있나요?</summary><p>A. 네. 매수가를 원래 값, 현재가를 새 값으로 입력하면 수익률이 나옵니다.</p></details><details class="faq-item"><summary>Q. 매출 성장률을 계산하려면?</summary><p>A. 지난 기간 매출을 원래 값, 이번 기간 매출을 새 값으로 입력하세요.</p></details><details class="faq-item"><summary>Q. 복리 성장률은 어디서 계산하나요?</summary><p>A. CAGR 계산기를 사용하면 복리 연평균 성장률을 계산할 수 있습니다.</p></details>`},
  en:{pageTitle:'Percentage Increase Calculator | Modoo Tools',h1:'📈 Percentage Increase Calculator',sub:'Calculate percentage increase between two values',backLink:'← All Tools',langBtn:'🌐 中文',tab0:'Calculate Increase',tab1:'Find New Value',origLabel:'Original Value',newLabel:'New Value',rateLabel:'Increase Rate (%)',seoHtml:`<h2>Percentage Increase Calculator</h2><p>Enter the original and new values to calculate the percentage increase, or enter the original value and rate to find the new value. Useful for stock returns, revenue growth, price changes, and population growth. Formula: Rate (%) = (New Value − Original Value) / Original Value × 100. Results are shown to two decimal places.</p><h2 class="seo-sub">FAQ</h2><details class="faq-item"><summary>Q. What is the percentage increase from 100 to 150?</summary><p>A. (150−100)/100×100 = 50%. A 50% increase.</p></details><details class="faq-item"><summary>Q. What is reverse mode?</summary><p>A. Enter the original value and rate to find the new value. E.g. 100 + 30% → 130.</p></details><details class="faq-item"><summary>Q. Are decimal results shown?</summary><p>A. Yes, results are shown to two decimal places.</p></details><details class="faq-item"><summary>Q. I got a negative result.</summary><p>A. If the new value is less than the original, the result is negative (a decrease). Use the percentage decrease calculator instead.</p></details><details class="faq-item"><summary>Q. What if the original value is 0?</summary><p>A. Division by zero is undefined — original value must be non-zero.</p></details><details class="faq-item"><summary>Q. Can I use this for stock returns?</summary><p>A. Yes. Enter the purchase price as original and current price as new value.</p></details><details class="faq-item"><summary>Q. How to calculate revenue growth?</summary><p>A. Enter last period revenue as original, current period as new value.</p></details><details class="faq-item"><summary>Q. Where can I calculate compound growth rate?</summary><p>A. Use the CAGR Calculator for compound annual growth rate.</p></details>`},
  zh:{pageTitle:'百分比增长计算器 | Modoo工具',h1:'📈 百分比增长计算器',sub:'计算两个值之间的增长率',backLink:'← 首页',langBtn:'🌐 日本語',tab0:'计算增长率',tab1:'计算增长后的值',origLabel:'原始值',newLabel:'新值',rateLabel:'增长率 (%)',seoHtml:`<h2>百分比增长计算器</h2><p>输入原始值和新值计算百分比增长率，或输入原始值和增长率反算增长后的值。适用于股票收益、销售增长、价格变动等场景。公式：增长率(%) = (新值 - 原始值) / 原始值 × 100。结果精确到小数点后两位。</p><h2 class="seo-sub">常见问题</h2><details class="faq-item"><summary>Q. 100到150的增长率是多少？</summary><p>A. (150-100)/100×100 = 50%，增长了50%。</p></details><details class="faq-item"><summary>Q. 反算模式是什么？</summary><p>A. 输入原始值和增长率，计算增长后的值。例如：100增长30%→130。</p></details><details class="faq-item"><summary>Q. 结果会显示小数吗？</summary><p>A. 会，结果精确到小数点后两位。</p></details><details class="faq-item"><summary>Q. 结果是负数怎么办？</summary><p>A. 如果新值小于原始值，结果为负（即减少）。请使用百分比减少计算器。</p></details><details class="faq-item"><summary>Q. 原始值为0怎么办？</summary><p>A. 不能除以零，原始值必须为非零值。</p></details><details class="faq-item"><summary>Q. 可以计算股票收益率吗？</summary><p>A. 可以。将买入价作为原始值，现价作为新值即可。</p></details><details class="faq-item"><summary>Q. 如何计算营收增长率？</summary><p>A. 将上期营收作为原始值，本期营收作为新值。</p></details><details class="faq-item"><summary>Q. 在哪里计算复利增长率？</summary><p>A. 使用CAGR计算器计算复合年均增长率。</p></details>`},
  ja:{pageTitle:'パーセント増加計算機 | Modooツール',h1:'📈 パーセント増加計算機',sub:'2つの値の間の増加率を計算します',backLink:'← ホーム',langBtn:'🌐 한국어',tab0:'増加率を計算',tab1:'増加後の値を計算',origLabel:'元の値',newLabel:'新しい値',rateLabel:'増加率 (%)',seoHtml:`<h2>パーセント増加計算機とは</h2><p>元の値と新しい値を入力してパーセント増加率を計算、または元の値と増加率から増加後の値を逆算します。株式リターン、売上成長率、価格変動、人口増加など様々な場面で活用できます。公式：増加率(%) = (新しい値 - 元の値) / 元の値 × 100。結果は小数点以下2桁まで表示されます。</p><h2 class="seo-sub">よくある質問</h2><details class="faq-item"><summary>Q. 100から150への増加率は？</summary><p>A. (150-100)/100×100 = 50%。50%の増加です。</p></details><details class="faq-item"><summary>Q. 逆算モードとは？</summary><p>A. 元の値と増加率を入力して増加後の値を計算します。例：100に30%増加→130。</p></details><details class="faq-item"><summary>Q. 小数の結果は表示されますか？</summary><p>A. はい、小数点以下2桁まで表示されます。</p></details><details class="faq-item"><summary>Q. マイナスの結果が出ました。</summary><p>A. 新しい値が元の値より小さい場合、結果はマイナス（減少）になります。パーセント減少計算機をご使用ください。</p></details><details class="faq-item"><summary>Q. 元の値が0の場合は？</summary><p>A. ゼロ除算は不可です。元の値は0以外の値を入力してください。</p></details><details class="faq-item"><summary>Q. 株式リターンの計算に使えますか？</summary><p>A. はい。購入価格を元の値、現在価格を新しい値として入力してください。</p></details><details class="faq-item"><summary>Q. 売上成長率を計算するには？</summary><p>A. 前期売上を元の値、今期売上を新しい値として入力してください。</p></details><details class="faq-item"><summary>Q. 複利成長率はどこで計算できますか？</summary><p>A. CAGR計算機をご使用ください。</p></details>`}
};
let currentLang='ko', mode=0;
function detectLang(){const p=new URLSearchParams(location.search).get('lang');if(p&&_i18n[p])return p;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
function applyLang(l){const t=_i18n[l]||_i18n.ko;document.title=t.pageTitle;document.documentElement.lang=l;document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});document.getElementById('seoContent').innerHTML=t.seoHtml||'';}
function toggleLang(){const order=['ko','en','zh','ja'];const next=order[(order.indexOf(currentLang)+1)%order.length];currentLang=next;localStorage.setItem('modoo_lang',next);const url=new URL(location.href);url.searchParams.set('lang',next);history.replaceState(null,'',url);applyLang(next);}
currentLang=detectLang();
document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));

function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===m));
  document.getElementById('mode0').style.display=m===0?'block':'none';
  document.getElementById('mode1').style.display=m===1?'block':'none';
  document.getElementById('resultBox').style.display='none';
  calc();
}

function calc(){
  const box=document.getElementById('resultBox');
  const numEl=document.getElementById('resultNum');
  const labelEl=document.getElementById('resultLabel');
  const fillEl=document.getElementById('visFill');
  const fmEl=document.getElementById('formulaBox');
  if(mode===0){
    const orig=parseFloat(document.getElementById('orig0').value);
    const nv=parseFloat(document.getElementById('new0').value);
    if(isNaN(orig)||isNaN(nv)||orig===0){box.style.display='none';return;}
    const rate=((nv-orig)/orig*100);
    numEl.textContent=rate.toFixed(2)+'%';
    numEl.style.color=rate>=0?'var(--green)':'var(--red)';
    labelEl.textContent=`${orig} → ${nv}`;
    fillEl.style.width=Math.min(Math.abs(rate),100)+'%';
    fillEl.style.background=rate>=0?'var(--green)':'var(--red)';
    fmEl.textContent=`(${nv} - ${orig}) / ${orig} × 100 = ${rate.toFixed(2)}%`;
    box.style.display='block';
  } else {
    const orig=parseFloat(document.getElementById('orig1').value);
    const rate=parseFloat(document.getElementById('rate1').value);
    if(isNaN(orig)||isNaN(rate)){box.style.display='none';return;}
    const nv=orig*(1+rate/100);
    numEl.textContent=nv.toFixed(2);
    numEl.style.color='var(--green)';
    labelEl.textContent=`${orig} + ${rate}% = ?`;
    fillEl.style.width=Math.min(Math.abs(rate),100)+'%';
    fillEl.style.background='var(--green)';
    fmEl.textContent=`${orig} × (1 + ${rate}/100) = ${nv.toFixed(2)}`;
    box.style.display='block';
  }
}
</script>
