<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Generator - Free Online Barcode Maker</title>
<meta name="description" content="Free online barcode generator. Create barcodes in CODE128, EAN-13, EAN-8, UPC-A, CODE39, ITF formats. Download as PNG or SVG. All processing in browser.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="alternate" hreflang="ko" href="https://modoohub.com/barcode-generator.html">
<link rel="alternate" hreflang="en" href="https://modoohub.com/barcode-generator.html?lang=en">
<link rel="alternate" hreflang="zh" href="https://modoohub.com/barcode-generator.html?lang=zh">
<link rel="alternate" hreflang="x-default" href="https://modoohub.com/barcode-generator.html">
<link rel="canonical" href="https://modoohub.com/barcode-generator.html">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:auto;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:680px;margin:0 auto;padding:36px 20px 60px;}
.back{font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;display:inline-block;margin-bottom:22px;}
.back:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;}
.row{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.row:last-child{margin-bottom:0;}
label.rl{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;min-width:80px;}
input.ri,select.ri{flex:1;min-width:140px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
input.ri:focus{border-color:var(--accent);}
input[type=number].ri{width:80px;flex:none;}
input[type=color].ri{width:40px;height:32px;padding:2px;cursor:pointer;flex:none;}
.cb-item{display:flex;align-items:center;gap:6px;cursor:pointer;}
.cb-item input{accent-color:var(--accent);}
.cb-item span{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.gen-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-bottom:20px;}
.gen-btn:hover{opacity:.85;}
.result{text-align:center;display:none;}
.barcode-wrap{display:inline-block;background:#fff;padding:20px 24px;border-radius:12px;margin-bottom:12px;}
.barcode-wrap svg{display:block;}
.dl-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.tbtn{padding:8px 18px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.err-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#f87171;margin-bottom:10px;display:none;}
.hint{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:8px;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NR6VJF0534"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-NR6VJF0534');</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6334638921720175" crossorigin="anonymous"></script>
<meta property="og:title" content="Barcode Generator - Free Online Barcode Maker">
<meta property="og:image" content="https://modoohub.com/og-image.png">
</head>
<body>
<header>
  <span class="logo">MODOO HUB</span>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <a href="index.html" class="back" id="backBtn">← 모두의 툴</a>
  <h1>Barcode <span>Generator</span></h1>
  <p class="sub" data-i18n="sub">CODE128 · EAN-13 · UPC-A · CODE39 바코드 생성 · PNG 다운로드</p>

  <div class="panel">
    <div class="row">
      <label class="rl" data-i18n="formatLabel">형식</label>
      <select class="ri" id="bFormat" onchange="updateHint()">
        <option value="CODE128">CODE128 (범용)</option>
        <option value="EAN13">EAN-13 (13자리)</option>
        <option value="EAN8">EAN-8 (8자리)</option>
        <option value="UPC">UPC-A (12자리)</option>
        <option value="CODE39">CODE39</option>
        <option value="ITF14">ITF-14 (14자리)</option>
        <option value="MSI">MSI</option>
        <option value="pharmacode">Pharmacode</option>
      </select>
    </div>
    <div class="row">
      <label class="rl" data-i18n="dataLabel">데이터</label>
      <input class="ri" id="bData" value="123456789012" oninput="liveGen()">
    </div>
    <div class="hint" id="bHint"></div>
  </div>

  <div class="panel">
    <div class="row">
      <label class="rl" data-i18n="widthLabel">바 두께</label>
      <input type="number" class="ri" id="bWidth" value="2" min="1" max="5">
      <label class="rl" data-i18n="heightLabel">높이</label>
      <input type="number" class="ri" id="bHeight" value="60" min="20" max="200">
    </div>
    <div class="row">
      <label class="rl" data-i18n="colorLabel">색상</label>
      <input type="color" class="ri" id="bColor" value="#000000" oninput="liveGen()">
      <label class="rl" data-i18n="bgLabel">배경</label>
      <input type="color" class="ri" id="bBg" value="#ffffff" oninput="liveGen()">
    </div>
    <div class="row">
      <label class="cb-item"><input type="checkbox" id="bShowText" checked oninput="liveGen()"><span data-i18n="showText">텍스트 표시</span></label>
    </div>
  </div>

  <div class="err-box" id="errBox"></div>
  <button class="gen-btn" onclick="generate()" data-i18n="genBtn">▶ 바코드 생성</button>

  <div class="result" id="result">
    <div class="barcode-wrap" id="bWrap">
      <svg id="barcodeSvg"></svg>
    </div>
    <div class="dl-row">
      <button class="tbtn" onclick="downloadPNG()" data-i18n="downloadPng">PNG 다운로드</button>
      <button class="tbtn" onclick="downloadSVG()" data-i18n="downloadSvg">SVG 다운로드</button>
    </div>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">Barcode Generator란?</h2>
    <p data-i18n="seoP">CODE128, EAN-13, EAN-8, UPC-A, CODE39 등 다양한 바코드 형식을 생성합니다. JsBarcode 라이브러리를 사용하며 PNG 및 SVG로 다운로드할 수 있습니다.</p>
  </div>
  <footer>Barcode Generator · JsBarcode · All processing in browser</footer>
</main>
<script>
const _i18n={
  ko:{sub:'CODE128 · EAN-13 · UPC-A · CODE39 바코드 생성 · PNG 다운로드',langBtn:'🌐 EN',backBtn:'← 모두의 툴',formatLabel:'형식',dataLabel:'데이터',widthLabel:'바 두께',heightLabel:'높이',colorLabel:'색상',bgLabel:'배경',showText:'텍스트 표시',genBtn:'▶ 바코드 생성',downloadPng:'PNG 다운로드',downloadSvg:'SVG 다운로드',seoH2:'Barcode Generator란?',seoP:'CODE128·EAN-13·EAN-8·UPC-A·CODE39 등 다양한 바코드 형식을 생성하고 PNG·SVG로 다운로드합니다.'},
  en:{sub:'CODE128 · EAN-13 · UPC-A · CODE39 barcode generator · PNG download',langBtn:'🌐 中文',backBtn:'← All Tools',formatLabel:'Format',dataLabel:'Data',widthLabel:'Bar width',heightLabel:'Height',colorLabel:'Color',bgLabel:'Background',showText:'Show text',genBtn:'▶ Generate Barcode',downloadPng:'Download PNG',downloadSvg:'Download SVG',seoH2:'Barcode Generator',seoP:'Generate barcodes in CODE128, EAN-13, EAN-8, UPC-A, CODE39 and more. Download as PNG or SVG.'},
  zh:{sub:'CODE128·EAN-13·UPC-A·CODE39条码生成·PNG下载',langBtn:'🌐 한국어',backBtn:'← 所有工具',formatLabel:'格式',dataLabel:'数据',widthLabel:'条宽',heightLabel:'高度',colorLabel:'颜色',bgLabel:'背景',showText:'显示文字',genBtn:'▶ 生成条码',downloadPng:'下载PNG',downloadSvg:'下载SVG',seoH2:'条码生成器',seoP:'生成CODE128·EAN-13·EAN-8·UPC-A·CODE39等格式条码，支持PNG和SVG下载。'},
};
const HINTS={CODE128:'임의 ASCII 문자',EAN13:'12자리 숫자 (체크디지트 자동)',EAN8:'7자리 숫자 (체크디지트 자동)',UPC:'11자리 숫자',CODE39:'대문자·숫자·특수(-. $/ +%)',ITF14:'13자리 숫자',MSI:'숫자',pharmacode:'3~131 사이 숫자'};
let _lang='ko',_debounce;
const LANGS=['ko','en','zh'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function updateHint(){document.getElementById('bHint').textContent=HINTS[document.getElementById('bFormat').value]||'';}
function liveGen(){clearTimeout(_debounce);_debounce=setTimeout(generate,400);}
function generate(){
  const data=document.getElementById('bData').value.trim();
  const fmt=document.getElementById('bFormat').value;
  const errBox=document.getElementById('errBox');
  errBox.style.display='none';
  if(!data)return;
  try{
    JsBarcode('#barcodeSvg',data,{
      format:fmt,
      lineColor:document.getElementById('bColor').value,
      background:document.getElementById('bBg').value,
      width:parseInt(document.getElementById('bWidth').value)||2,
      height:parseInt(document.getElementById('bHeight').value)||60,
      displayValue:document.getElementById('bShowText').checked,
      margin:10,
    });
    document.getElementById('bWrap').style.background=document.getElementById('bBg').value;
    document.getElementById('result').style.display='block';
  }catch(e){errBox.textContent='⚠ '+e.message;errBox.style.display='block';document.getElementById('result').style.display='none';}
}
function downloadPNG(){
  const svg=document.getElementById('barcodeSvg');
  const xml=new XMLSerializer().serializeToString(svg);
  const img=new Image();
  const svgBlob=new Blob([xml],{type:'image/svg+xml'});
  const url=URL.createObjectURL(svgBlob);
  img.onload=()=>{const c=document.createElement('canvas');c.width=img.width;c.height=img.height;const ctx=c.getContext('2d');ctx.drawImage(img,0,0);const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='barcode.png';a.click();URL.revokeObjectURL(url);};
  img.src=url;
}
function downloadSVG(){
  const svg=document.getElementById('barcodeSvg');
  const xml=new XMLSerializer().serializeToString(svg);
  const a=document.createElement('a');a.href='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(xml);a.download='barcode.svg';a.click();
}
_lang=detectLang();applyLang();updateHint();generate();
</script>
</body>
</html>
