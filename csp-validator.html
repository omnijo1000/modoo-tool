    seoHtml:`<h2>CSP 검증이 중요한 이유</h2><p>잘못 설정된 CSP는 <strong>사이트를 깨뜨리거나 보안 효과가 없을 수</strong> 있습니다. 'unsafe-inline'이 포함되면 XSS 공격이 가능하고, 와일드카드(*)는 모든 출처를 허용해 CSP 자체가 무의미해집니다. 검증을 통해 위험 키워드와 누락된 지시어를 확인하세요.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>CSP 파싱 오류는 어떻게 확인하나요?</summary><p>브라우저 개발자 도구 콘솔에서 CSP 위반 메시지를 확인할 수 있습니다. "Refused to execute inline script because it violates the following Content Security Policy directive" 형식의 메시지가 표시됩니다.</p></details>
<details class="faq-item"><summary>'unsafe-inline'을 없애면 사이트가 깨지는 경우는?</summary><p>인라인 &lt;script&gt;, style 속성, onclick 핸들러 등이 차단됩니다. nonce 기반으로 교체하거나 외부 파일로 이동해야 합니다. Report-Only 모드로 먼저 테스트하세요.</p></details>
<details class="faq-item"><summary>frame-ancestors 'none'은 무엇을 막나요?</summary><p>다른 어떤 페이지도 이 페이지를 &lt;iframe&gt;, &lt;frame&gt;, &lt;object&gt;로 삽입할 수 없게 합니다. 클릭재킹 공격을 완전히 차단하는 가장 강력한 설정입니다.</p></details>
<details class="faq-item"><summary>CSP와 XSS의 관계는?</summary><p>CSP는 XSS 공격의 영향을 줄이는 방어 레이어입니다. 올바르게 설정된 CSP는 공격자가 스크립트를 삽입하더라도 실행을 차단합니다. 단, XSS 자체를 방지하는 것은 입력 검증과 출력 이스케이프입니다.</p></details>
<details class="faq-item"><summary>data: URI를 img-src에 허용해도 되나요?</summary><p>img-src에 data:를 허용하면 base64 인코딩된 이미지를 인라인으로 사용할 수 있습니다. script-src나 style-src에 data:를 허용하면 심각한 보안 취약점이 됩니다.</p></details>
<details class="faq-item"><summary>https:와 http:의 차이는?</summary><p>https:는 모든 HTTPS 도메인을 허용합니다. http:는 모든 HTTP 도메인을 허용하므로 보안상 좋지 않습니다. 가능한 한 구체적인 도메인을 명시하세요.</p></details>
<details class="faq-item"><summary>upgrade-insecure-requests 지시어란?</summary><p>HTTP 리소스를 자동으로 HTTPS로 업그레이드하도록 지시합니다. mixed content 문제를 해결하는 데 유용합니다. block-all-mixed-content는 HTTP 리소스를 완전히 차단합니다.</p></details>
<details class="faq-item"><summary>CSP를 점진적으로 도입하는 방법은?</summary><p>1) Report-Only 모드로 시작해 위반 사항 수집 → 2) 위반을 하나씩 수정 → 3) 실제 차단 모드로 전환. Google&apos;s CSP Evaluator 도구로 강도를 평가할 수 있습니다.</p></details>`

<h2 class="seo-sub">Frequently Asked Questions</h2>
<details class="faq-item"><summary>How do I find CSP parse errors?</summary><p>Check the browser DevTools console for CSP violation messages like "Refused to execute inline script because it violates the following Content Security Policy directive."</p></details>
<details class="faq-item"><summary>What breaks when removing 'unsafe-inline'?</summary><p>Inline &lt;script&gt; tags, style attributes, and onclick handlers will be blocked. Replace them with nonce-based inline code or move to external files. Test with Report-Only mode first.</p></details>
<details class="faq-item"><summary>What does frame-ancestors 'none' block?</summary><p>It prevents any page from embedding this page via &lt;iframe&gt;, &lt;frame&gt;, or &lt;object&gt;. This is the strongest protection against clickjacking.</p></details>
<details class="faq-item"><summary>How does CSP relate to XSS?</summary><p>CSP is a defense layer that reduces XSS impact — a correctly configured CSP blocks script execution even if an attacker injects code. Preventing XSS itself requires input validation and output escaping.</p></details>
<details class="faq-item"><summary>Is data: safe in img-src?</summary><p>Allowing data: in img-src permits inline base64 images. Allowing data: in script-src or style-src is a critical vulnerability — never do this.</p></details>
<details class="faq-item"><summary>Difference between https: and http: in CSP?</summary><p>https: allows all HTTPS domains. http: allows all HTTP domains (insecure). Always prefer explicit domain allowlists over scheme-only wildcards.</p></details>
<details class="faq-item"><summary>What is upgrade-insecure-requests?</summary><p>It tells the browser to upgrade HTTP resource requests to HTTPS automatically, solving mixed content issues. block-all-mixed-content blocks HTTP resources entirely.</p></details>

<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>如何查找CSP解析错误？</summary><p>在浏览器开发者工具控制台查找CSP违规消息，如"Refused to execute inline script because it violates the following Content Security Policy directive"。</p></details>
<details class="faq-item"><summary>移除'unsafe-inline'后什么会失效？</summary><p>内联&lt;script&gt;标签、style属性和onclick处理器将被阻止。需将其替换为nonce方式或移至外部文件。先用Report-Only模式测试。</p></details>
<details class="faq-item"><summary>frame-ancestors 'none'阻止什么？</summary><p>防止任何页面通过&lt;iframe&gt;、&lt;frame&gt;或&lt;object&gt;嵌入此页面，是防止点击劫持的最强保护。</p></details>
<details class="faq-item"><summary>CSP与XSS的关系？</summary><p>CSP是减少XSS影响的防御层——正确配置的CSP即使攻击者注入代码也会阻止脚本执行。防止XSS本身需要输入验证和输出转义。</p></details>
<details class="faq-item"><summary>img-src中允许data:安全吗？</summary><p>在img-src中允许data:可使用内联base64图片。在script-src或style-src中允许data:是严重漏洞——切勿这样做。</p></details>
<details class="faq-item"><summary>CSP中https:与http:的区别？</summary><p>https:允许所有HTTPS域名。http:允许所有HTTP域名（不安全）。始终优先使用明确的域名白名单而非仅使用协议通配符。</p></details>
<details class="faq-item"><summary>upgrade-insecure-requests是什么？</summary><p>告知浏览器自动将HTTP资源请求升级为HTTPS，解决混合内容问题。block-all-mixed-content则完全阻止HTTP资源。</p></details>
<details class="faq-item"><summary>如何逐步推出CSP？</summary><p>1) 从Report-Only模式开始收集违规 → 2) 逐一修复违规 → 3) 切换到强制模式。可使用Google的CSP Evaluator工具评估策略强度。</p></details>`
  },
  ja:{pageTitle:'CSPバリデーター - Content Security Policy分析 & エラー診断 | MODOO HUB',h1Span:'バリデーター',sub:'CSPヘッダー解析·危険キーワード警告·不足ディレクティブ診断',backLink:'← ホーム',langBtn:'🌐 한국어',labelInput:'Content-Security-Policyヘッダー値または完全ヘッダー',btnValidate:'検証',btnClear:'クリア',titleIssues:'診断結果',titleDirectives:'解析済みディレクティブ',thDir:'ディレクティブ',thVal:'値',noIssues:'問題は見つかりませんでした。',
    warnUnsafe:(d,k)=>`${d}: '${k}'使用 — XSS保護が弱まります。nonceまたはhashベースに置換を推奨。`,
    warnWildcard:(d)=>`${d}: ワイルドカード'*'で全オリジンが許可されています。`,

<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>CSPの解析エラーはどこで確認できますか？</summary><p>ブラウザ開発者ツールのコンソールでCSP違反メッセージを確認できます。"Refused to execute inline script because it violates the following Content Security Policy directive"のような形式で表示されます。</p></details>
<details class="faq-item"><summary>'unsafe-inline'を削除するとどこが壊れますか？</summary><p>インライン&lt;script&gt;タグ・style属性・onclickハンドラーがブロックされます。nonceベースに置換するか外部ファイルに移動する必要があります。まずReport-Onlyモードでテストしてください。</p></details>
<details class="faq-item"><summary>frame-ancestors 'none'は何をブロックしますか？</summary><p>他のどのページもこのページを&lt;iframe&gt;・&lt;frame&gt;・&lt;object&gt;で埋め込めなくなります。クリックジャッキングに対する最強の保護です。</p></details>
<details class="faq-item"><summary>CSPとXSSの関係は？</summary><p>CSPはXSSの影響を軽減する防御レイヤーです。正しく設定されたCSPは攻撃者がスクリプトを挿入しても実行をブロックします。XSS自体の防止には入力検証と出力エスケープが必要です。</p></details>
<details class="faq-item"><summary>img-srcでdata:を許可しても安全ですか？</summary><p>img-srcでdata:を許可するとbase64エンコードされた画像をインラインで使えます。script-srcやstyle-srcでdata:を許可するのは深刻な脆弱性です。</p></details>
<details class="faq-item"><summary>CSPのhttps:とhttp:の違いは？</summary><p>https:は全HTTPSドメインを許可します。http:は全HTTPドメインを許可します（非セキュア）。スキームのみのワイルドカードより具体的なドメイン指定を優先してください。</p></details>
<details class="faq-item"><summary>upgrade-insecure-requestsとは？</summary><p>ブラウザにHTTPリソースリクエストを自動でHTTPSにアップグレードするよう指示し、混在コンテンツ問題を解決します。block-all-mixed-contentはHTTPリソースを完全にブロックします。</p></details>

const LANGS=['ko','en','zh','ja'];
let _lang='ko';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;document.getElementById('h1Span').textContent=t.h1Span;document.getElementById('subEl').textContent=t.sub;document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('labelInput').textContent=t.labelInput;document.getElementById('btnValidate').textContent=t.btnValidate;document.getElementById('btnClear').textContent=t.btnClear;document.getElementById('titleIssues').textContent=t.titleIssues;document.getElementById('titleDirectives').textContent=t.titleDirectives;document.getElementById('thDir').textContent=t.thDir;document.getElementById('thVal').textContent=t.thVal;document.getElementById('seoDiv').innerHTML=t.seoHtml;}
function clearAll(){document.getElementById('cspInput').value='';document.getElementById('resultsArea').className='results';}
function parseCSP(raw){
  let val=raw.trim();
  const m=val.match(/content-security-policy(?:-report-only)?:\s*(.+)/i);
  if(m)val=m[1].trim();
  const dirs={};
  val.split(';').forEach(part=>{
    const p=part.trim();if(!p)return;
    const sp=p.indexOf(' ');
    if(sp<0){dirs[p.toLowerCase()]='';}
    else{dirs[p.slice(0,sp).toLowerCase()]=p.slice(sp+1).trim();}
  });
  return dirs;
}
function validate(){
  const raw=document.getElementById('cspInput').value.trim();
  if(!raw)return;
  const t=_i18n[_lang];
  const dirs=parseCSP(raw);
  const issues=[];
  Object.entries(dirs).forEach(([d,v])=>{
    UNSAFE.forEach(u=>{if(v.includes("'"+u+"'"))issues.push({type:'warn',msg:t.warnUnsafe(d,u)});});
    if(v.includes('*'))issues.push({type:'warn',msg:t.warnWildcard(d)});
  });
  if(!dirs['default-src'])issues.push({type:'error',msg:t.infoNoDefault});
  IMPORTANT_DIRS.filter(d=>d!=='default-src').forEach(d=>{
    if(!dirs[d])issues.push({type:'info',msg:t.infoMissing(d)});
  });
  const il=document.getElementById('issueList');
  il.innerHTML='';
  if(issues.length===0){
    const div=document.createElement('div');
    div.className='issue info';
    div.innerHTML=`<span class="issue-icon">✓</span><span>${t.noIssues}</span>`;
    il.appendChild(div);
  } else {
    issues.forEach(({type,msg})=>{
      const div=document.createElement('div');
      div.className='issue '+type;
      const icon=type==='error'?'✗':type==='warn'?'⚠':'ℹ';
      div.innerHTML=`<span class="issue-icon">${icon}</span><span>${escHtml(msg)}</span>`;
      il.appendChild(div);
    });
  }
  const tbody=document.getElementById('dirTbody');
  tbody.innerHTML='';
  Object.entries(dirs).forEach(([d,v])=>{
    const tr=document.createElement('tr');
    const vals=v.split(/\s+/).map(tok=>{
      const u=tok.replace(/'/g,'');
      const isUnsafe=UNSAFE.includes(u);
      return `<span class="tag ${isUnsafe?'unsafe':'safe'}">${escHtml(tok)}</span>`;
    }).join('');
    tr.innerHTML=`<td>${escHtml(d)}</td><td>${vals||'(empty)'}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('resultsArea').className='results show';
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
_lang=detectLang();applyLang();
