// ── 언어 초기화 ──────────────────────────────────────────────────────
let lang = (function() {
  const p = new URLSearchParams(location.search).get('lang');
  if (p && i18n[p]) return p;
  const s = localStorage.getItem('modoo_lang');
  if (s && i18n[s]) return s;
  const n = (navigator.language || '').slice(0,2);
  return n === 'zh' ? 'zh' : n === 'ja' ? 'ja' : n === 'ko' ? 'ko' : 'en';
})();

function applyLang() {
  const t = i18n[lang];
  document.documentElement.lang = lang;
  document.title = t.pageTitle;
  const ids = {
    h1Title:'h1', h1Sub:'sub', backLink:'backLink', langBtn:'langBtn',
    btnPaste:'btnPaste', btnClear:'btnClear', btnSample:'btnSample',
    btnMinify:'btnMinify', btnCopy:'btnCopy', copySmall:'btnCopy',
    labelInput:'labelInput', labelOutput:'labelOutput',
    lblOriginal:'statOriginal', lblMinified:'statMinified', lblSaved:'statSaved',
    footerText:'footer'
  };
  for (const [id, key] of Object.entries(ids)) {
    const el = document.getElementById(id);
    if (!el) continue;
    if (key === 'h1') el.innerHTML = t.h1;
    else el.textContent = t[key];
  }
  document.getElementById('statusText').textContent = t.statusIdle;
  document.getElementById('input').placeholder = t.placeholder;
  document.getElementById('output').placeholder = t.placeholderOut;
  document.getElementById('seoSection').innerHTML = t.seoHtml;
}

function toggleLang() {
  const order = ['ko','en','zh','ja'];
  lang = order[(order.indexOf(lang) + 1) % order.length];
  localStorage.setItem('modoo_lang', lang);
  applyLang();
}

// ── 핵심 기능 ─────────────────────────────────────────────────────────
function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  document.getElementById('statusText').textContent = msg;
}

function showStats(orig, mini) {
  const saved = orig > 0 ? Math.round((1 - mini / orig) * 100) : 0;
  document.getElementById('valOriginal').textContent = orig + ' B';
  document.getElementById('valMinified').textContent = mini + ' B';
  document.getElementById('valSaved').textContent = saved + '%';
  document.getElementById('statsBar').style.display = 'flex';
}

function minify() {
  const val = document.getElementById('input').value.trim();
  if (!val) return;
  try {
    const obj = JSON.parse(val);
    const out = JSON.stringify(obj);
    document.getElementById('output').value = out;
    const orig = new Blob([val]).size;
    const mini = new Blob([out]).size;
    showStats(orig, mini);
    setStatus('ok', i18n[lang].statusOk);
  } catch(e) {
    setStatus('err', i18n[lang].statusErr + ': ' + e.message);
    document.getElementById('statsBar').style.display = 'none';
  }
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('output').value = '';
  document.getElementById('statsBar').style.display = 'none';
  setStatus('idle', i18n[lang].statusIdle);
}

function copyOutput() {
  const text = document.getElementById('output').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopy');
    const sm = document.getElementById('copySmall');
    const done = i18n[lang].copyDone;
    btn.textContent = done;
    if (sm) sm.textContent = done;
    btn.style.color = 'var(--green)';
    setTimeout(() => {
      btn.textContent = i18n[lang].btnCopy;
      if (sm) sm.textContent = i18n[lang].btnCopy;
      btn.style.color = '';
    }, 2000);
  });
}

async function pasteInput() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('input').value = text;
  } catch(e) {}
}

function loadSample() {
  document.getElementById('input').value = JSON.stringify({
    "name": "Alice",
    "age": 30,
    "address": {
      "city": "Seoul",
      "zip": "04524"
    },
    "tags": ["developer", "designer"],
    "active": true
  }, null, 2);
  document.getElementById('output').value = '';
  document.getElementById('statsBar').style.display = 'none';
  setStatus('idle', i18n[lang].statusIdle);
}

// ── 초기화 ────────────────────────────────────────────────────────────
applyLang();
</script>
