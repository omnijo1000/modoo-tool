    remainFmt:(s)=>{if(s<0)return'期限切れ';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>24)return`${Math.floor(h/24)}日${h%24}時間`;if(h>0)return`${h}時間${m}分`;return`${m}分${sec}秒`;},
    noExp:'expなし',none:'なし',invalid:'無効なJWT形式です。',
    seoHtml:`<h2>JWT有効期限チェッカー</h2><p>JWTトークンを貼り付けるとexp（有効期限）、iat（発行時刻）、nbf（有効開始）クレームを解析し、残り有効時間を即座に表示します。すべてブラウザ内で処理されます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>JWTのexpクレームとは？</summary><p>exp（Expiration Time）はトークンの有効期限をUnixタイムスタンプ（秒）で示します。</p></details>
<details class="faq-item"><summary>JWT期限切れ後はどうすればよいですか？</summary><p>リフレッシュトークンで新しいアクセストークンを取得するか、再ログインしてください。</p></details>
<details class="faq-item"><summary>トークンはサーバーに送信されますか？</summary><p>いいえ、すべてのデコードはブラウザ内JavaScriptで処理されます。</p></details>
<details class="faq-item"><summary>iatとexpの違いは？</summary><p>iat（Issued At）はトークン生成時刻、expは有効期限です。</p></details>
<details class="faq-item"><summary>nbfクレームとは？</summary><p>Not Before — このタイムスタンプ以前はトークンが無効です。</p></details>
<details class="faq-item"><summary>署名の検証はしますか？</summary><p>いいえ、このツールはペイロードのデコードのみです。署名検証にはサーバー側の秘密鍵が必要です。</p></details>
<details class="faq-item"><summary>有効期限を延長できますか？</summary><p>いいえ、JWTはサーバーで署名されるためクライアントでは変更できません。</p></details>
<details class="faq-item"><summary>JWTが長い理由は？</summary><p>JWT = Base64エンコードされたヘッダー.ペイロード.署名の3部分をドットで繋げたものです。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','btnCheck','btnClear','btnSample','lblExpiry','lblRemain','lblIssued','lblNotBefore','lblClaims'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function b64decode(str){str=str.replace(/-/g,'+').replace(/_/g,'/');while(str.length%4)str+='=';try{return JSON.parse(decodeURIComponent(escape(atob(str))));}catch(e){return null;}}
function fmtTime(ts){if(!ts)return null;return new Date(ts*1000).toLocaleString();}
function checkJwt(){
  const t=_i18n[_lang];
  const raw=document.getElementById('jwtIn').value.trim();
  if(!raw){document.getElementById('resultArea').style.display='none';return;}
  const parts=raw.split('.');
  if(parts.length!==3){document.getElementById('resultArea').style.display='none';alert(t.invalid);return;}
  const payload=b64decode(parts[1]);
  if(!payload){document.getElementById('resultArea').style.display='none';alert(t.invalid);return;}
  document.getElementById('resultArea').style.display='block';
  const now=Math.floor(Date.now()/1000);
  const exp=payload.exp;
  const iat=payload.iat;
  const nbf=payload.nbf;
  document.getElementById('valExpiry').textContent=exp?fmtTime(exp):t.noExp;
  document.getElementById('valIssued').textContent=iat?fmtTime(iat):t.none;
  document.getElementById('valNotBefore').textContent=nbf?fmtTime(nbf):t.none;
  const badge=document.getElementById('statusBadge');
  const remain=document.getElementById('valRemain');
  if(!exp){
    badge.className='status-badge badge-warn';badge.textContent=t.statusNoExp;
    remain.textContent=t.noExp;remain.className='info-value';
  } else {
    const diff=exp-now;
    remain.textContent=t.remainFmt(diff);
    if(diff<0){badge.className='status-badge badge-expired';badge.textContent=t.statusExpired;remain.className='info-value red';}
    else if(diff<3600){badge.className='status-badge badge-warn';badge.textContent=t.statusWarn;remain.className='info-value yellow';}
    else{badge.className='status-badge badge-valid';badge.textContent=t.statusValid;remain.className='info-value big green';}
  }
  const list=document.getElementById('claimsList');
  list.innerHTML=Object.entries(payload).map(([k,v])=>{
    let disp=typeof v==='object'?JSON.stringify(v):String(v);
    if((k==='exp'||k==='iat'||k==='nbf')&&typeof v==='number')disp+=` (${fmtTime(v)})`;
    return `<div class="claims-row"><span class="claims-key">${k}</span><span class="claims-val">${disp}</span></div>`;
  }).join('');
}
function clearAll(){document.getElementById('jwtIn').value='';document.getElementById('resultArea').style.display='none';}
function loadSample(){
  const exp=Math.floor(Date.now()/1000)+3600;
  const header=btoa(JSON.stringify({alg:'HS256',typ:'JWT'})).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const payload=btoa(JSON.stringify({sub:'1234567890',name:'John Doe',iat:Math.floor(Date.now()/1000),exp})).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  document.getElementById('jwtIn').value=`${header}.${payload}.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c`;
  checkJwt();
}
_lang=detectLang();applyLang();
</script>
