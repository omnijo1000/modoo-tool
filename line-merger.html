<script>
const LANGS=['ko','en','zh','ja'];
let _lang='ko',_sepMode='comma';
const SEPS={comma:',',space:' ',pipe:'|',tab:'\t',none:''};
const _i18n={
  ko:{h1b:'합치기',sub:'여러 줄 텍스트를 원하는 구분자로 한 줄로 합치기',backLink:'← 모두의 툴',langBtn:'🌐 EN',pageTitle:'줄 합치기 | MODOO HUB',lblInput:'입력 (한 줄씩)',lblSep:'구분자',lblTrim:'앞뒤 공백 제거',lblEmpty:'빈 줄 제외',lblResult:'결과',btnCopy:'복사',copied:'복사됨!',
    chips:[', (쉼표)','공백','| (파이프)','탭','없음','커스텀'],customPlaceholder:'구분자...',statIn:'입력 줄',statOut:'출력 길이',
    seoHtml:`<h2>줄 합치기</h2><p>여러 줄로 입력된 텍스트를 <strong>원하는 구분자로 한 줄로 합치는</strong> 도구입니다. CSV 형식 생성, 리스트를 쉼표 구분 문자열로 변환, 단어 목록을 공백으로 합치는 등 다양한 용도로 활용할 수 있습니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>줄 합치기는 어떤 경우에 쓰나요?</summary><p>리스트 항목을 쉼표 구분 CSV로, 단어를 공백 구분 문자열로, 키를 파이프 구분으로 합칠 때 사용합니다.</p></details>
<details class="faq-item"><summary>쉼표 구분자 선택 시 마지막 줄 뒤에도 쉼표가 붙나요?</summary><p>마지막 항목 뒤에는 구분자가 추가되지 않습니다.</p></details>

<details class="faq-item"><summary>앞뒤 공백 제거란?</summary><p>각 줄의 앞뒤 공백을 제거한 후 합칩니다. 들여쓰기나 후행 공백을 정리할 때 유용합니다.</p></details>
<details class="faq-item"><summary>커스텀 구분자는 여러 글자도 되나요?</summary><p>예, 어떤 문자열이든 구분자로 사용할 수 있습니다. 예: " -> ".</p></details>
<details class="faq-item"><summary>없음 구분자는 무엇인가요?</summary><p>구분자 없이 모든 줄을 이어 붙입니다. 단어를 하나의 문자열로 합칠 때 사용합니다.</p></details>
<details class="faq-item"><summary>SQL IN 절에 사용할 수 있나요?</summary><p>쉼표 구분자로 합친 뒤 앞뒤에 괄호를 추가하면 됩니다. 예: (apple,banana,cherry).</p></details>
<details class="faq-item"><summary>탭 구분자는 어디서 쓰나요?</summary><p>TSV(탭 구분 값) 형식 생성, 스프레드시트 붙여 넣기 등에 사용합니다.</p></details>`
  },
  en:{h1b:'Merger',sub:'Merge multiple lines into one using a separator',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'Line Merger | MODOO HUB',lblInput:'Input (one per line)',lblSep:'Separator',lblTrim:'Trim whitespace',lblEmpty:'Skip empty lines',lblResult:'Result',btnCopy:'Copy',copied:'Copied!',
    chips:[', (comma)','Space','| (pipe)','Tab','None','Custom'],customPlaceholder:'Separator...',statIn:'Input lines',statOut:'Output length',
    seoHtml:`<h2>Line Merger</h2><p>Merge multiple lines into a single line using <strong>any separator</strong> — comma, space, pipe, tab, or custom. Great for building CSV rows, converting lists to strings, or creating SQL IN clauses.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>When is this useful?</summary><p>Converting list items to CSV, building comma/space-separated strings, joining words.</p></details>
<details class="faq-item"><summary>Is a separator added after the last item?</summary><p>No — the separator is only placed between items.</p></details>
<details class="faq-item"><summary>What does "skip empty lines" do?</summary><p>Excludes blank lines so you don\'t get double separators.</p></details>
<details class="faq-item"><summary>What does "trim whitespace" do?</summary><p>Strips leading and trailing spaces from each line before merging.</p></details>
<details class="faq-item"><summary>Can the custom separator be multi-character?</summary><p>Yes — any string works, e.g. " -> ".</p></details>
<details class="faq-item"><summary>What is the "None" separator?</summary><p>Concatenates all lines with no separator — useful for joining characters or codes.</p></details>
<details class="faq-item"><summary>SQL IN clause?</summary><p>Use comma separator then wrap the result in parentheses: (apple,banana,cherry).</p></details>
<details class="faq-item"><summary>Where is the tab separator useful?</summary><p>For creating TSV (tab-separated values) or pasting into spreadsheets.</p></details>`
  },
  zh:{h1b:'合并器',sub:'将多行文本用分隔符合并为一行',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'行合并器 | MODOO HUB',lblInput:'输入（每行一个）',lblSep:'分隔符',lblTrim:'修剪空白',lblEmpty:'跳过空行',lblResult:'结果',btnCopy:'复制',copied:'已复制！',
    chips:[', (逗号)','空格','| (管道)','制表符','无','自定义'],customPlaceholder:'分隔符...',statIn:'输入行数',statOut:'输出长度',
    seoHtml:`<h2>行合并器</h2><p>将多行文本用<strong>任意分隔符合并为一行</strong>：逗号、空格、管道、制表符或自定义。适用于构建CSV行、将列表转换为字符串或创建SQL IN子句。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>何时使用行合并？</summary><p>将列表转换为CSV、构建逗号/空格分隔字符串、连接单词。</p></details>
<details class="faq-item"><summary>最后一项后面会加分隔符吗？</summary><p>不会，分隔符只放在项目之间。</p></details>
<details class="faq-item"><summary>"跳过空行"是什么意思？</summary><p>排除空行，避免出现连续分隔符。</p></details>
<details class="faq-item"><summary>"修剪空白"是什么意思？</summary><p>合并前删除每行首尾的空格。</p></details>
<details class="faq-item"><summary>自定义分隔符可以是多个字符吗？</summary><p>可以，任意字符串都可以作为分隔符。</p></details>
<details class="faq-item"><summary>"无"分隔符是什么？</summary><p>不加分隔符直接连接所有行。</p></details>
<details class="faq-item"><summary>用于SQL IN子句？</summary><p>使用逗号分隔符合并后，在结果两端加括号即可。</p></details>
<details class="faq-item"><summary>制表符分隔符在哪里使用？</summary><p>用于创建TSV（制表符分隔值）或粘贴到电子表格中。</p></details>`
  },
  ja:{h1b:'マージャー',sub:'複数行のテキストを区切り文字で1行に結合',backLink:'← ホーム',langBtn:'🌐 한국어',pageTitle:'行マージャー | MODOO HUB',lblInput:'入力（1行ずつ）',lblSep:'区切り文字',lblTrim:'前後の空白を削除',lblEmpty:'空行をスキップ',lblResult:'結果',btnCopy:'コピー',copied:'コピー済み！',
    chips:[', (コンマ)','スペース','| (パイプ)','タブ','なし','カスタム'],customPlaceholder:'区切り文字...',statIn:'入力行数',statOut:'出力長',
    seoHtml:`<h2>行マージャーとは</h2><p>複数行のテキストを<strong>任意の区切り文字で1行に結合</strong>します。カンマ・スペース・パイプ・タブ・カスタム文字列をサポート。CSV行の構築、リストの文字列変換、SQL IN句の生成に便利です。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>どんな時に使いますか？</summary><p>リストをCSVに変換、カンマ/スペース区切り文字列の構築、単語の結合。</p></details>
<details class="faq-item"><summary>最後の項目の後に区切り文字は付きますか？</summary><p>いいえ、区切り文字は項目間にのみ挿入されます。</p></details>
<details class="faq-item"><summary>「空行をスキップ」とは？</summary><p>空行を除外し、区切り文字が連続しないようにします。</p></details>
<details class="faq-item"><summary>「前後の空白を削除」とは？</summary><p>結合前に各行の先頭・末尾の空白を削除します。</p></details>
<details class="faq-item"><summary>カスタム区切り文字は複数文字でも可能ですか？</summary><p>はい、任意の文字列が使用できます。</p></details>
<details class="faq-item"><summary>「なし」区切り文字とは？</summary><p>区切り文字なしで全行を連結します。</p></details>
<details class="faq-item"><summary>SQL IN句に使えますか？</summary><p>カンマ区切りで結合後、括弧で囲むと使えます。</p></details>
<details class="faq-item"><summary>タブ区切りはどこで使いますか？</summary><p>TSV（タブ区切り値）の作成やスプレッドシートへの貼り付けに使用します。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function setSep(mode,btn){
  _sepMode=mode;
  document.querySelectorAll('.sep-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('customSep').style.display=mode==='custom'?'inline-block':'none';
  merge();
}
function getSep(){if(_sepMode==='custom')return document.getElementById('customSep').value;return SEPS[_sepMode]??',';}
function merge(){
  const t=_i18n[_lang];const raw=document.getElementById('input').value;
  const doTrim=document.getElementById('optTrim').checked;
  const skipEmpty=document.getElementById('optEmpty').checked;
  let lines=raw.split('\n');
  if(doTrim)lines=lines.map(l=>l.trim());
  if(skipEmpty)lines=lines.filter(l=>l.length>0);
  const result=lines.join(getSep());
  document.getElementById('outputTa').value=result;
  document.getElementById('statRow').innerHTML=`<div class="stat-chip">${t.statIn}: <span>${raw.split('\n').length}</span></div><div class="stat-chip">${t.statOut}: <span>${result.length}</span></div>`;
}
function copyResult(){
  const t=_i18n[_lang];const val=document.getElementById('outputTa').value;
  navigator.clipboard.writeText(val).then(()=>{const b=document.getElementById('btnCopy');b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,1500);});
}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','lblInput','lblSep','lblTrim','lblEmpty','lblResult','btnCopy'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  const chips=['sc0','sc1','sc2','sc3','sc4','sc5'];
  chips.forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=t.chips[i];});
  document.getElementById('customSep').placeholder=t.customPlaceholder;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;merge();
}
_lang=detectLang();applyLang();
</script>
