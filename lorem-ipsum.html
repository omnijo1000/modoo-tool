<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:680px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;line-height:1.6;}
.controls{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.ctrl-label{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.type-row{display:flex;gap:6px;}
.type-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}
.type-btn.on{background:rgba(251,191,36,.12);border-color:var(--accent);color:var(--accent);}
.type-btn:not(.on):hover{border-color:var(--accent);color:var(--accent);}
input[type=number]{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;width:80px;}
input[type=number]:focus{border-color:var(--accent);}
.cb-item{display:flex;align-items:center;gap:6px;cursor:pointer;}
.cb-item input{accent-color:var(--accent);cursor:pointer;}
.cb-item span{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.gen-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-bottom:14px;}
.gen-btn:hover{opacity:.85;}
.output-area{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;font-size:14px;line-height:1.9;color:var(--text-muted);min-height:200px;cursor:pointer;}
.output-area:hover{border-color:var(--accent);}
.output-area p+p{margin-top:16px;}
.action-row{display:flex;gap:8px;margin-top:10px;}
.tbtn{padding:7px 16px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.stat{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:6px;}
.stat span{color:var(--text-muted);}
.copied-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 24px;border-radius:20px;font-family:'DM Mono',monospace;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;}
.copied-toast.show{opacity:1;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>Lorem <span>Ipsum</span></h1>
  <p class="sub" data-i18n="sub">더미 텍스트 생성기 · 단락·문장·단어 단위</p>

  <div class="controls">
    <span class="ctrl-label" data-i18n="typeLabel">유형</span>
    <div class="type-row">
      <button class="type-btn on" id="tPara" onclick="setType('para')" data-i18n="tPara">단락</button>
      <button class="type-btn" id="tSent" onclick="setType('sent')" data-i18n="tSent">문장</button>
      <button class="type-btn" id="tWord" onclick="setType('word')" data-i18n="tWord">단어</button>
    </div>
    <span class="ctrl-label" data-i18n="countLabel">수량</span>
    <input type="number" id="count" value="3" min="1" max="50">
    <label class="cb-item"><input type="checkbox" id="cbClassic" checked><span data-i18n="cbClassic">Classic start</span></label>
  </div>

  <button class="gen-btn" onclick="generate()" data-i18n="genBtn">▶ 생성</button>

  <div class="output-area" id="output" onclick="copyAll()"></div>
  <div class="stat"><span id="wordStat">0</span> <span data-i18n="words">words</span> · <span id="charStat">0</span> <span data-i18n="chars">chars</span></div>
  <div class="action-row">
    <button class="tbtn" onclick="copyAll()" data-i18n="copyBtn">복사</button>
    <button class="tbtn" onclick="generate()" data-i18n="regenBtn">↺ 재생성</button>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">Lorem Ipsum이란?</h2>
    <p data-i18n="seoP">Lorem Ipsum은 인쇄·출판 업계에서 수백 년간 사용된 표준 더미 텍스트입니다. UI 디자인, 웹 개발, 문서 레이아웃 작업 시 실제 콘텐츠 대신 사용하는 placeholder 텍스트로 활용합니다.</p>
  </div>
  <footer>Lorem Ipsum Generator · Placeholder Text · All in browser</footer>
</main>
<div class="copied-toast" id="toast" data-i18n="toastMsg">복사되었습니다!</div>
<script>
const _i18n={
  ko:{sub:'더미 텍스트 생성기 · 단락·문장·단어 단위',langBtn:'🌐 EN',backBtn:'← 모두의 툴',typeLabel:'유형',tPara:'단락',tSent:'문장',tWord:'단어',countLabel:'수량',cbClassic:'Classic start',genBtn:'▶ 생성',copyBtn:'복사',regenBtn:'↺ 재생성',words:'단어',chars:'글자',seoH2:'Lorem Ipsum이란?',seoP:'인쇄·출판 업계 표준 더미 텍스트로 UI 디자인·웹 개발·문서 레이아웃 작업의 placeholder로 사용됩니다.',toastMsg:'복사되었습니다!'},
  en:{sub:'Placeholder text generator · Paragraphs · Sentences · Words',langBtn:'🌐 中文',backBtn:'← All Tools',typeLabel:'Type',tPara:'Paragraphs',tSent:'Sentences',tWord:'Words',countLabel:'Count',cbClassic:'Classic start',genBtn:'▶ Generate',copyBtn:'Copy',regenBtn:'↺ Regenerate',words:'words',chars:'chars',seoH2:'What is Lorem Ipsum?',seoP:'Lorem Ipsum is standard placeholder text used in the print and publishing industry. Use it as filler content in UI design, web development, and document layout.',toastMsg:'Copied!'},
  zh:{sub:'占位文字生成器 · 段落·句子·单词',langBtn:'🌐 日本語',backBtn:'← 所有工具',typeLabel:'类型',tPara:'段落',tSent:'句子',tWord:'单词',countLabel:'数量',cbClassic:'经典开头',genBtn:'▶ 生成',copyBtn:'复制',regenBtn:'↺ 重新生成',words:'单词',chars:'字符',seoH2:'Lorem Ipsum是什么？',seoP:'Lorem Ipsum是印刷出版行业几百年来使用的标准占位文字，用于UI设计、网页开发和文档排版的内容填充。',toastMsg:'已复制！'},
  ja:{sub:'ダミーテキスト生成 · 段落·文章·単語単位',langBtn:'🌐 한국어',backBtn:'← ホーム',typeLabel:'種類',tPara:'段落',tSent:'文章',tWord:'単語',countLabel:'数量',cbClassic:'クラシック開始',genBtn:'▶ 生成',copyBtn:'コピー',regenBtn:'↺ 再生成',words:'単語',chars:'文字',seoH2:'Lorem Ipsumとは？',seoP:'Lorem Ipsumは印刷・出版業界で何百年も使われてきた標準のダミーテキストです。UIデザイン・Web開発・ドキュメントレイアウト作業のプレースホルダーとして使用します。',toastMsg:'コピーしました！'},
};
let _lang='ko',_type='para';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

const WORDS='lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium totam rem aperiam eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit sed quia consequuntur magni dolores eos qui ratione voluptatem sequi nesciunt neque porro quisquam est qui dolorem ipsum quia dolor sit amet consectetur adipisci velit'.split(' ');

const CLASSIC='Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.';

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function capitalize(s){return s?s[0].toUpperCase()+s.slice(1):s;}

function genSentence(wCount){
  const len=wCount||Math.floor(Math.random()*12)+6;
  const ws=Array.from({length:len},()=>pick(WORDS));
  return capitalize(ws.join(' '))+'.';
}

function genParagraph(){
  const sentCount=Math.floor(Math.random()*4)+3;
  return Array.from({length:sentCount},()=>genSentence()).join(' ');
}

function setType(t){
  _type=t;
  ['Para','Sent','Word'].forEach(n=>document.getElementById('t'+n).classList.remove('on'));
  const map={para:'Para',sent:'Sent',word:'Word'};
  document.getElementById('t'+map[t]).classList.add('on');
  generate();
}

function generate(){
  const n=Math.min(50,Math.max(1,parseInt(document.getElementById('count').value)||3));
  const classic=document.getElementById('cbClassic').checked;
  let result='',paras=[];

  if(_type==='para'){
    for(let i=0;i<n;i++){
      if(i===0&&classic) paras.push(CLASSIC+' '+Array.from({length:Math.floor(Math.random()*3)+2},()=>genSentence()).join(' '));
      else paras.push(genParagraph());
    }
    const out=document.getElementById('output');
    out.innerHTML='';
    paras.forEach(p=>{const el=document.createElement('p');el.textContent=p;out.appendChild(el);});
    result=paras.join('\n\n');
  } else if(_type==='sent'){
    const sents=[];
    if(classic&&n>0) sents.push(CLASSIC);
    while(sents.length<n) sents.push(genSentence());
    document.getElementById('output').textContent=sents.join('\n');
    result=sents.join('\n');
  } else {
    const ws=[];
    if(classic) ws.push(...CLASSIC.replace(/[.,]/g,'').toLowerCase().split(' '));
    while(ws.length<n) ws.push(pick(WORDS));
    const text=ws.slice(0,n).join(' ');
    document.getElementById('output').textContent=text;
    result=text;
  }

  const wc=(result.trim()?result.trim().split(/\s+/).length:0);
  document.getElementById('wordStat').textContent=wc;
  document.getElementById('charStat').textContent=result.length;
  document.getElementById('output')._text=result;
}

function copyAll(){
  const text=document.getElementById('output')._text||document.getElementById('output').textContent;
  if(!text)return;
  navigator.clipboard?.writeText(text).then(showToast).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();});
}
function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
_lang=detectLang();applyLang();generate();
</script>
