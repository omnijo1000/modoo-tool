<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:640px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;line-height:1.6;}
.picker-row{display:flex;align-items:flex-start;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
.native-picker-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
input[type=color]{width:80px;height:80px;border:none;border-radius:12px;cursor:pointer;padding:0;background:none;outline:none;}
input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
input[type=color]::-webkit-color-swatch{border-radius:10px;border:none;}
.swatch-big{width:80px;height:80px;border-radius:12px;border:1px solid var(--border);cursor:pointer;}
.color-info{flex:1;min-width:240px;}
.fmt-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.fmt-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;width:40px;}
.fmt-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
.fmt-input:focus{border-color:var(--accent);}
.copy-tiny{padding:5px 10px;border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text-dim);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;white-space:nowrap;}
.copy-tiny:hover{border-color:var(--accent);color:var(--accent);}
.sliders{margin-bottom:18px;}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.slider-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;width:20px;}
input[type=range]{flex:1;accent-color:var(--accent);height:4px;}
.slider-val{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;width:32px;text-align:right;}
.history-wrap{margin-top:4px;}
.hist-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.hist-clear{font-size:10px;color:var(--text-dim);cursor:pointer;border:none;background:none;padding:0;font-family:'DM Mono',monospace;}
.hist-clear:hover{color:var(--accent);}
.history{display:flex;gap:6px;flex-wrap:wrap;}
.hist-swatch{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:transform .1s;flex-shrink:0;}
.hist-swatch:hover{transform:scale(1.15);border-color:var(--accent);}
.presets-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin:16px 0 8px;}
.presets{display:flex;gap:6px;flex-wrap:wrap;}
.preset{width:28px;height:28px;border-radius:6px;border:1px solid transparent;cursor:pointer;transition:transform .1s;}
.preset:hover{transform:scale(1.15);border-color:var(--accent);}
.copied-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 24px;border-radius:20px;font-family:'DM Mono',monospace;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;}
.copied-toast.show{opacity:1;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo-sub{font-size:14px;font-weight:700;color:var(--text-muted);margin:20px 0 8px;}
.seo-ul{padding-left:18px;margin-bottom:12px;}
.seo-ul li{font-size:13px;color:var(--text-dim);line-height:1.9;margin-bottom:4px;}
.faq-item{border-bottom:1px solid var(--border);padding:10px 0;}
.faq-item summary{font-size:13px;color:var(--text-muted);cursor:pointer;list-style:none;padding-right:16px;}
.faq-item summary::-webkit-details-marker{display:none;}
.faq-item[open] summary{color:var(--text);}
.faq-item p{font-size:12px;color:var(--text-dim);line-height:1.8;margin-top:8px;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<script>
const _i18n={
  ko:{sub:'HEX · RGB · HSL · HSV 변환 · 컬러 히스토리',langBtn:'🌐 EN',backBtn:'← 모두의 툴',presetsLabel:'프리셋',histLabel:'히스토리',histClear:'지우기',toastMsg:'복사되었습니다!',
    seoH2:'Color Picker 완벽 가이드',seoP:'색상을 선택하고 HEX·RGB·HSL·HSV 형식 간 자유롭게 변환하는 도구입니다. 웹 개발, 그래픽 디자인, UI/UX 작업에서 색상 코드는 필수 도구입니다. HEX(#FF5733)는 CSS에서 가장 널리 사용되는 형식, RGB(255, 87, 51)는 스크린 색상 합성, HSL(9°, 100%, 60%)은 색조·채도·명도 기반으로 직관적인 색상 조정에 적합합니다. HSV/HSB는 디자인 소프트웨어(Adobe, Figma)의 색상 팔레트 기본 형식입니다. R·G·B 슬라이더로 세밀하게 조정하고 원하는 형식으로 클립보드에 복사하세요.',
    exH3:'활용 예시',exList:'<li>CSS 스타일시트 작성 시 HEX 코드 확인 및 복사</li><li>Figma/Adobe XD 디자인에서 RGB/HSL 색상값 추출</li><li>브랜드 컬러(Primary, Secondary) 코드 저장 및 공유</li><li>팔레트에서 배경색·텍스트색 조합의 명도 대비 확인</li><li>Tailwind CSS, Bootstrap 커스텀 컬러 변수 설정</li><li>히스토리 기능으로 최근 사용 색상 빠르게 재선택</li>',
    faqH3:'자주 묻는 질문',faqList:`<details class="faq-item"><summary>Q. HEX, RGB, HSL 중 어느 형식을 사용해야 하나요?</summary><p>CSS: HEX 또는 HSL 권장. HEX는 간결(#FF5733), HSL은 색조 조정이 직관적(hsl(9, 100%, 60%)). 투명도가 필요하면 rgba() 또는 hsla(). 디자인 툴: HSB/HSV가 표준.</p></details><details class="faq-item"><summary>Q. HSL과 HSB(HSV)의 차이는 무엇인가요?</summary><p>HSL: 명도(Lightness) 100%=흰색, 0%=검정, 50%=순색. HSB/HSV: 밝기(Brightness) 100%=순색, 0%=검정. Photoshop·Figma는 HSB 사용. CSS는 HSL 사용.</p></details><details class="faq-item"><summary>Q. 웹 접근성(WCAG)을 위한 색상 대비 기준이 있나요?</summary><p>WCAG 2.1 기준: 일반 텍스트는 배경 대비 4.5:1 이상, 큰 텍스트(18pt+)는 3:1 이상. 체크 방법: HSL 명도(Lightness) 차이가 크면 대비가 좋습니다. 전용 Contrast Checker 도구 병행 권장.</p></details><details class="faq-item"><summary>Q. HEX 코드를 RGB로 직접 변환하는 방법은?</summary><p>#RRGGBB 각 쌍을 16진수로 변환: R = 0xFF, G = 0x57, B = 0x33 → R=255, G=87, B=51. 이 도구에서 HEX 입력 시 자동으로 RGB가 표시됩니다.</p></details><details class="faq-item"><summary>Q. 색상 히스토리 기능은 어떻게 사용하나요?</summary><p>색상을 클립보드에 복사하면 히스토리에 자동 추가됩니다. 히스토리에서 이전에 사용한 색상을 클릭하면 다시 선택할 수 있습니다.</p></details><details class="faq-item"><summary>Q. CSS에서 opacity(투명도)는 어떻게 추가하나요?</summary><p>HEX에 투명도 추가: #FF573380 (마지막 2자리 = 투명도, 80=50% 불투명). rgba(255,87,51,0.5) 또는 hsla(9,100%,60%,0.5)로도 표현 가능.</p></details><details class="faq-item"><summary>Q. 보색(Complementary Color)은 어떻게 찾나요?</summary><p>HSL에서 색조(Hue)에 180°를 더하면 보색. 예: 빨간색(Hue 0°)의 보색 = 청록(Hue 180°). 삼각색(Triadic)은 120°씩 추가.</p></details><details class="faq-item"><summary>Q. 프리셋 색상에는 어떤 것들이 있나요?</summary><p>Material Design, Tailwind CSS 등의 주요 시스템 컬러와 기본 웹 색상(빨강, 파랑, 초록 등)이 포함됩니다. 빠른 시작점으로 활용할 수 있습니다.</p></details><details class="faq-item"><summary>Q. 색상 값을 다른 앱에 붙여넣기 쉽게 복사하려면?</summary><p>원하는 형식의 값(HEX/RGB/HSL/HSV)을 클릭하면 자동으로 클립보드에 복사됩니다. 복사 완료 시 토스트 메시지가 표시됩니다.</p></details><details class="faq-item"><summary>Q. 다크 모드와 라이트 모드에 적합한 색상 선택 기준은?</summary><p>다크 모드 배경: HSL 명도 8~15% 범위. 라이트 모드 배경: 95~100%. 텍스트는 배경과 명도 차이가 클수록 좋습니다. WCAG 기준 4.5:1 이상 대비를 유지하세요.</p></details><details class="faq-item"><summary>Q. Tailwind CSS 커스텀 색상에 사용하려면?</summary><p>tailwind.config.js의 theme.extend.colors에 HEX 코드를 추가합니다. 예: primary: { 500: '#FF5733' }. 이 도구로 HEX 코드를 선택하고 복사해 바로 사용하세요.</p></details><details class="faq-item"><summary>Q. 사용하는 브라우저에서 페이지의 색상 코드를 추출하려면?</summary><p>Chrome DevTools의 색상 피커를 사용하세요: 요소 선택 → 스타일 패널 → 색상 사각형 클릭 → 스포이드 아이콘으로 화면의 어떤 색상이든 추출 가능합니다.</p></details>`},
  en:{sub:'HEX · RGB · HSL · HSV conversion · Color history',langBtn:'🌐 中文',backBtn:'← All Tools',presetsLabel:'Presets',histLabel:'History',histClear:'Clear',toastMsg:'Copied!',
    seoH2:'Color Picker — Complete Guide',seoP:'Pick any color and instantly convert between HEX, RGB, HSL, and HSV formats. Essential for web developers and designers — each format serves a specific purpose: HEX (#FF5733) is the most common CSS format; RGB (255, 87, 51) is used for screen color mixing; HSL (9°, 100%, 60%) is intuitive for adjusting hue, saturation, and lightness; HSB/HSV is the standard in design apps like Adobe and Figma. Use the RGB sliders for precise color tuning and copy to clipboard in the format you need.',
    exH3:'Usage Examples',exList:'<li>Copy HEX codes for CSS stylesheets and inline styles</li><li>Extract RGB/HSL values from Figma or Adobe XD designs</li><li>Save and share brand color codes (Primary, Secondary, Accent)</li><li>Verify luminance contrast between background and text colors</li><li>Set up Tailwind CSS or Bootstrap custom color variables</li><li>Use color history to quickly reselect recently used colors</li>',
    faqH3:'Frequently Asked Questions',faqList:`<details class="faq-item"><summary>Q. Which format should I use — HEX, RGB, or HSL?</summary><p>CSS: HEX for brevity (#FF5733) or HSL for intuitive adjustments (hsl(9, 100%, 60%)). Need transparency: rgba() or hsla(). Design tools: HSB/HSV is standard. Match the format expected by the tool or codebase you're working with.</p></details><details class="faq-item"><summary>Q. What is the difference between HSL and HSB/HSV?</summary><p>HSL: Lightness 100% = white, 0% = black, 50% = pure color. HSB/HSV: Brightness 100% = pure color, 0% = black. Photoshop and Figma use HSB. CSS uses HSL.</p></details><details class="faq-item"><summary>Q. What are WCAG color contrast requirements?</summary><p>WCAG 2.1: Normal text needs 4.5:1 contrast ratio against background; large text (18pt+) needs 3:1. Generally, higher HSL Lightness difference between text and background means better contrast. Use a dedicated contrast checker tool to verify.</p></details><details class="faq-item"><summary>Q. How do I convert HEX to RGB manually?</summary><p>Split #RRGGBB into pairs and convert from hex: #FF5733 → R=0xFF=255, G=0x57=87, B=0x33=51 → rgb(255,87,51). This tool does it instantly.</p></details><details class="faq-item"><summary>Q. How does the color history work?</summary><p>Colors are automatically added to history when you copy a value. Click any history swatch to reload that color. Click Clear to reset the history.</p></details><details class="faq-item"><summary>Q. How do I add opacity/transparency to a color?</summary><p>HEX with alpha: add 2 hex digits at the end — #FF573380 (80 hex = 50% opacity). Or use rgba(255,87,51,0.5) or hsla(9,100%,60%,0.5) in CSS.</p></details><details class="faq-item"><summary>Q. How do I find a complementary color?</summary><p>Add 180° to the Hue in HSL. Example: Red (Hue 0°) → Complementary = Teal (Hue 180°). For triadic colors, add 120° increments.</p></details><details class="faq-item"><summary>Q. What presets are included?</summary><p>Common web colors plus a selection from popular design systems like Material Design and Tailwind CSS palette. Use them as quick starting points for color exploration.</p></details><details class="faq-item"><summary>Q. How do I copy a color value?</summary><p>Click the value next to HEX, RGB, HSL, or HSV — it copies to your clipboard immediately. A brief toast notification confirms the copy was successful.</p></details><details class="faq-item"><summary>Q. What HSL values work best for dark mode vs light mode?</summary><p>Dark mode backgrounds: HSL Lightness 8–15%. Light mode backgrounds: 95–100%. Text should have maximum Lightness contrast against its background — aim for the WCAG 4.5:1 ratio.</p></details><details class="faq-item"><summary>Q. How do I use this for Tailwind CSS custom colors?</summary><p>Copy the HEX code from this picker and add it to tailwind.config.js: theme.extend.colors → primary: { 500: '#FF5733' }. Use our picker to explore and verify the exact shade before adding.</p></details><details class="faq-item"><summary>Q. How can I extract colors from an existing webpage?</summary><p>Use Chrome DevTools: inspect element → Styles panel → click the color swatch → use the eyedropper icon to sample any pixel on screen. Or use a browser extension like ColorZilla.</p></details>`},
  zh:{sub:'HEX · RGB · HSL · HSV转换 · 颜色历史',langBtn:'🌐 日本語',backBtn:'← 所有工具',presetsLabel:'预设',histLabel:'历史',histClear:'清空',toastMsg:'已复制！',
    seoH2:'颜色选择器完全指南',seoP:'选取任意颜色并在HEX、RGB、HSL、HSV格式之间即时转换。每种格式都有其特定用途：HEX（#FF5733）是CSS最常用的格式；RGB（255, 87, 51）用于屏幕颜色合成；HSL（9°, 100%, 60%）通过色调、饱和度、亮度直观调色；HSB/HSV是Adobe、Figma等设计工具的标准色彩模式。使用RGB滑块精细调节颜色，点击即可复制所需格式的值。',
    exH3:'使用示例',exList:'<li>为CSS样式表和内联样式复制HEX颜色代码</li><li>从Figma或Adobe XD设计中提取RGB/HSL值</li><li>保存和分享品牌色彩代码（主色、辅色、强调色）</li><li>验证背景色与文字颜色的亮度对比</li><li>设置Tailwind CSS或Bootstrap自定义颜色变量</li><li>利用颜色历史快速重新选择最近使用的颜色</li>',
    faqH3:'常见问题',faqList:`<details class="faq-item"><summary>Q. 应该使用哪种格式——HEX、RGB还是HSL？</summary><p>CSS推荐HEX（简洁：#FF5733）或HSL（直观调整：hsl(9,100%,60%)）。需要透明度：rgba()或hsla()。设计工具：HSB/HSV为标准。根据您所用工具或代码库的要求选择格式。</p></details><details class="faq-item"><summary>Q. HSL和HSB/HSV有什么区别？</summary><p>HSL：亮度100%=白色，0%=黑色，50%=纯色。HSB/HSV：明度100%=纯色，0%=黑色。Photoshop和Figma使用HSB，CSS使用HSL。</p></details><details class="faq-item"><summary>Q. 网页无障碍（WCAG）的颜色对比度要求是什么？</summary><p>WCAG 2.1：普通文本与背景的对比度≥4.5:1，大号文本（18pt+）≥3:1。HSL亮度差异越大，对比度越好。建议使用专用对比度检测工具验证。</p></details><details class="faq-item"><summary>Q. 如何手动将HEX转换为RGB？</summary><p>将#RRGGBB分成三组十六进制数转换：#FF5733 → R=0xFF=255，G=0x57=87，B=0x33=51 → rgb(255,87,51)。本工具自动完成转换。</p></details><details class="faq-item"><summary>Q. 颜色历史是如何工作的？</summary><p>复制颜色值时自动添加到历史记录，点击历史色块可重新加载该颜色，点击清空可重置历史。</p></details><details class="faq-item"><summary>Q. 如何为颜色添加透明度？</summary><p>HEX加透明度：在末尾加两位十六进制数 — #FF573380（80十六进制=50%不透明度）。也可使用rgba(255,87,51,0.5)或hsla(9,100%,60%,0.5)。</p></details><details class="faq-item"><summary>Q. 如何找互补色？</summary><p>在HSL中将色相加180°。例：红色（色相0°）→互补色=青色（色相180°）。三角色：每次加120°。</p></details><details class="faq-item"><summary>Q. 预设颜色包含哪些？</summary><p>包含常见Web颜色以及Material Design、Tailwind CSS调色板中的精选颜色，可作为颜色探索的快速起点。</p></details><details class="faq-item"><summary>Q. 如何复制颜色值？</summary><p>点击HEX、RGB、HSL或HSV旁的值即可立即复制到剪贴板，弹出提示确认复制成功。</p></details><details class="faq-item"><summary>Q. 深色模式和浅色模式各适合什么HSL值？</summary><p>深色模式背景：HSL亮度8~15%。浅色模式背景：95~100%。文字应与背景有较大亮度差，目标对比度达到WCAG 4.5:1标准。</p></details><details class="faq-item"><summary>Q. 如何用于Tailwind CSS自定义颜色？</summary><p>从本工具复制HEX代码，添加到tailwind.config.js的theme.extend.colors中，例如：primary: { 500: '#FF5733' }。</p></details><details class="faq-item"><summary>Q. 如何从现有网页中提取颜色？</summary><p>使用Chrome DevTools：检查元素→样式面板→点击颜色色块→使用取色器图标从屏幕任意位置取色。或使用ColorZilla等浏览器扩展。</p></details>`},
  ja:{sub:'HEX · RGB · HSL · HSV 変換 · カラー履歴',langBtn:'🌐 한국어',backBtn:'← ホーム',presetsLabel:'プリセット',histLabel:'履歴',histClear:'クリア',toastMsg:'コピーしました！',
    seoH2:'カラーピッカー完全ガイド',seoP:'任意の色を選択してHEX・RGB・HSL・HSV形式間で即時変換できます。Web開発やデザインに欠かせないツールで、各フォーマットには用途があります：HEX（#FF5733）はCSS最頻用形式、RGB（255, 87, 51）は画面の色合成、HSL（9°, 100%, 60%）は色相・彩度・明度による直感的な調整に最適、HSB/HSVはAdobe・Figmaなどのデザインツールの標準色空間です。R・G・Bスライダーで精密に調節し、必要なフォーマットでクリップボードにコピーできます。',
    exH3:'活用例',exList:'<li>CSSスタイルシートやインラインスタイル用のHEXコードをコピー</li><li>FigmaやAdobe XDのデザインからRGB/HSL値を抽出</li><li>ブランドカラーコード（プライマリ・セカンダリ・アクセント）の保存と共有</li><li>背景色とテキスト色の輝度コントラストを確認</li><li>Tailwind CSSやBootstrapのカスタムカラー変数を設定</li><li>カラー履歴で最近使用した色を素早く再選択</li>',
    faqH3:'よくある質問',faqList:`<details class="faq-item"><summary>Q. HEX・RGB・HSLのどの形式を使うべきですか？</summary><p>CSS：HEX（簡潔：#FF5733）またはHSL（直感的：hsl(9,100%,60%)）。透明度が必要：rgba()またはhsla()。デザインツール：HSB/HSVが標準。使用するツールやコードベースに合わせて選択。</p></details><details class="faq-item"><summary>Q. HSLとHSB/HSVの違いは？</summary><p>HSL：明度100%=白、0%=黒、50%=純色。HSB/HSV：明度100%=純色、0%=黒。PhotoshopとFigmaはHSBを使用。CSSはHSL。</p></details><details class="faq-item"><summary>Q. Webアクセシビリティ（WCAG）のコントラスト要件は？</summary><p>WCAG 2.1：通常テキストは背景との比率4.5:1以上、大きなテキスト（18pt+）は3:1以上。HSL明度の差が大きいほどコントラストが良い。専用のコントラストチェッカーで確認推奨。</p></details><details class="faq-item"><summary>Q. HEXをRGBに手動変換するには？</summary><p>#RRGGBBを16進数の組に分けて変換：#FF5733 → R=0xFF=255、G=0x57=87、B=0x33=51 → rgb(255,87,51)。このツールで自動変換されます。</p></details><details class="faq-item"><summary>Q. カラー履歴はどう使いますか？</summary><p>色をコピーすると自動的に履歴に追加されます。履歴スウォッチをクリックするとその色が再読み込みされます。</p></details><details class="faq-item"><summary>Q. 色に透明度を追加するには？</summary><p>HEXに透明度：末尾に2桁の16進数を追加 — #FF573380（80hex=50%不透明）。rgba(255,87,51,0.5)またはhsla(9,100%,60%,0.5)も使用可。</p></details><details class="faq-item"><summary>Q. 補色の見つけ方は？</summary><p>HSLの色相（Hue）に180°を加えます。例：赤（Hue 0°）→補色=ティール（Hue 180°）。トライアディック：120°ずつ加算。</p></details><details class="faq-item"><summary>Q. プリセットには何が含まれていますか？</summary><p>基本的なWeb色とMaterial Design・Tailwind CSSパレットから精選した色が含まれています。カラー探索の出発点として活用できます。</p></details><details class="faq-item"><summary>Q. 色の値をコピーするには？</summary><p>HEX・RGB・HSL・HSVの値をクリックするとクリップボードにコピーされます。トーストで成功が通知されます。</p></details><details class="faq-item"><summary>Q. ダーク・ライトモードに適したHSL値は？</summary><p>ダークモード背景：HSL明度8〜15%。ライトモード背景：95〜100%。テキストは背景との明度差が大きいほど良く、WCAG 4.5:1比率を目標に。</p></details><details class="faq-item"><summary>Q. Tailwind CSSカスタムカラーに使うには？</summary><p>このピッカーでHEXコードを選びコピーして、tailwind.config.jsのtheme.extend.colorsに追加：primary: { 500: '#FF5733' }。</p></details><details class="faq-item"><summary>Q. 既存ウェブページから色を抽出するには？</summary><p>Chrome DevTools：要素を検査→スタイルパネル→カラースウォッチをクリック→スポイトアイコンで画面上の任意の色を取得できます。</p></details>`},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

const PRESETS=['#f87171','#fb923c','#fbbf24','#4ade80','#34d399','#38bdf8','#60a5fa','#818cf8','#a78bfa','#f472b6','#ffffff','#d1d5db','#6b7280','#374151','#1f2937','#000000','#ef4444','#3b82f6','#10b981','#8b5cf6'];
let _history=[];

function hexToRgb(hex){
  const h=hex.replace('#','');
  const full=h.length===3?h.split('').map(c=>c+c).join(''):h;
  return{r:parseInt(full.slice(0,2),16),g:parseInt(full.slice(2,4),16),b:parseInt(full.slice(4,6),16)};
}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max===min){h=s=0;}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};}
function rgbToHsv(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;let h;const s=max===0?0:d/max,v=max;if(max===min){h=0;}else{switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}return{h:Math.round(h*360),s:Math.round(s*100),v:Math.round(v*100)};}

function updateAll(hex,addHistory=true){
  const {r,g,b}=hexToRgb(hex);
  const {h:hl,s:sl,l}=rgbToHsl(r,g,b);
  const {h:hv,s:sv,v}=rgbToHsv(r,g,b);
  document.getElementById('nativePicker').value=hex;
  document.getElementById('swatchBig').style.background=hex;
  document.getElementById('hexInput').value=hex;
  document.getElementById('rgbInput').value=`rgb(${r}, ${g}, ${b})`;
  document.getElementById('hslInput').value=`hsl(${hl}, ${sl}%, ${l}%)`;
  document.getElementById('hsvInput').value=`hsv(${hv}, ${sv}%, ${v}%)`;
  document.getElementById('rSlider').value=r;document.getElementById('rVal').textContent=r;
  document.getElementById('gSlider').value=g;document.getElementById('gVal').textContent=g;
  document.getElementById('bSlider').value=b;document.getElementById('bVal').textContent=b;
  if(addHistory) addToHistory(hex);
}

function onPickerChange(){const hex=document.getElementById('nativePicker').value;updateAll(hex);}
function onHexInput(){
  let v=document.getElementById('hexInput').value.trim();
  if(!v.startsWith('#'))v='#'+v;
  if(/^#[0-9a-fA-F]{6}$/.test(v)||/^#[0-9a-fA-F]{3}$/.test(v)) updateAll(v.length===4?'#'+v[1]+v[1]+v[2]+v[2]+v[3]+v[3]:v);
}
function onRgbSlider(){
  const r=document.getElementById('rSlider').value,g=document.getElementById('gSlider').value,b=document.getElementById('bSlider').value;
  document.getElementById('rVal').textContent=r;document.getElementById('gVal').textContent=g;document.getElementById('bVal').textContent=b;
  updateAll(rgbToHex(+r,+g,+b));
}

function copyFmt(fmt){
  let text='';
  if(fmt==='hex') text=document.getElementById('hexInput').value;
  else if(fmt==='rgb') text=document.getElementById('rgbInput').value;
  else if(fmt==='hsl') text=document.getElementById('hslInput').value;
  else if(fmt==='hsv') text=document.getElementById('hsvInput').value;
  navigator.clipboard?.writeText(text).then(showToast).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();});
}

function addToHistory(hex){
  if(_history[0]===hex)return;
  _history=_history.filter(c=>c!==hex);
  _history.unshift(hex);
  if(_history.length>24)_history.pop();
  renderHistory();
}
function renderHistory(){
  const el=document.getElementById('history');el.innerHTML='';
  _history.forEach(c=>{const s=document.createElement('div');s.className='hist-swatch';s.style.background=c;s.title=c;s.onclick=()=>updateAll(c,false);el.appendChild(s);});
}
function clearHistory(){_history=[];renderHistory();}

function buildPresets(){
  const el=document.getElementById('presets');
  PRESETS.forEach(c=>{const s=document.createElement('div');s.className='preset';s.style.background=c;s.title=c;s.onclick=()=>updateAll(c);el.appendChild(s);});
}

function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
_lang=detectLang();applyLang();buildPresets();updateAll('#f87171',false);
</script>
<script src="related.js"></script>
</body>
</html>
