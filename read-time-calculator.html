<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2e2e2e;--accent:#38bdf8;--text:#f0f0f0;--text-muted:#888;--text-dim:#555;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif;min-height:100vh;}
header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
main{max-width:680px;margin:0 auto;padding:48px 24px;}
h1{font-size:28px;font-weight:900;margin-bottom:8px;}
h1 span{color:var(--accent);}
.subtitle{font-size:13px;color:var(--text-muted);margin-bottom:28px;line-height:1.6;}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center;}
.stat-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
.stat-label{font-size:10px;color:var(--text-dim);margin-top:3px;text-transform:uppercase;letter-spacing:0.08em;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;color:var(--text);font-size:14px;font-family:'Noto Sans',sans-serif;line-height:1.8;outline:none;resize:vertical;min-height:160px;transition:border-color 0.2s;margin-bottom:20px;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--text-dim);}
.slider-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}
.slider-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.slider-title{font-size:13px;color:var(--text-muted);}
.slider-val{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent);}
input[type=range]{width:100%;accent-color:var(--accent);margin-bottom:8px;}
.presets{display:flex;gap:8px;flex-wrap:wrap;}
.preset-btn{background:#111;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans',sans-serif;transition:all 0.15s;}
.preset-btn:hover,.preset-btn.active{border-color:var(--accent);color:var(--accent);}
.preset-btn.active{background:rgba(56,189,248,0.1);}
.seo{margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}
.seo h2{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
.seo strong{color:var(--text-muted);}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:48px;padding:24px;}
.back-link{margin-left:auto;font-size:13px;color:var(--text-muted);text-decoration:none;}
.back-link:hover{color:var(--accent);}
.lang-toggle{margin-left:4px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;transition:all 0.15s;}
.lang-toggle:hover{border-color:var(--accent);color:var(--accent);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
.header-label{font-size:13px;color:var(--text-muted);letter-spacing:0.1em;font-family:'DM Mono',monospace;}
@media(max-width:500px){.stats-bar{grid-template-columns:1fr 1fr;}}
</style>

<body>
<header>
  <div class="dot"></div>
  <span class="header-label">MODOO HUB</span>
  <a href="index.html" class="back-link">← 모두의 툴</a>
  <div class="lang-toggle" onclick="cycleLang()" id="langBtn">🌐 EN</div>
</header>
<main>
  <h1>Read Time <span>Calculator</span></h1>
  <p class="subtitle" data-i18n="sub">Estimate reading and speaking time for any text.</p>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="sReadTime">0m</div><div class="stat-label" data-i18n="statRead">Read Time</div></div>
    <div class="stat"><div class="stat-val" id="sSpeakTime">0m</div><div class="stat-label" data-i18n="statSpeak">Speak Time</div></div>
    <div class="stat"><div class="stat-val" id="sWords">0</div><div class="stat-label" data-i18n="statWords">Words</div></div>
    <div class="stat"><div class="stat-val" id="sChars">0</div><div class="stat-label" data-i18n="statChars">Characters</div></div>
  </div>

  <textarea id="inputArea" placeholder="Paste your text here..." oninput="update()"></textarea>

  <div class="slider-section">
    <div class="slider-header">
      <span class="slider-title" data-i18n="sliderLabel">Reading Speed (WPM)</span>
      <span class="slider-val" id="wpmVal">200</span>
    </div>
    <input type="range" id="wpmSlider" min="100" max="500" value="200" oninput="onSlider()">
    <div class="presets">
      <button class="preset-btn" onclick="setPreset(150)" data-i18n="presetSlow">Slow (150)</button>
      <button class="preset-btn active" onclick="setPreset(200)" data-i18n="presetAvg">Average (200)</button>
      <button class="preset-btn" onclick="setPreset(300)" data-i18n="presetFast">Fast (300)</button>
      <button class="preset-btn" onclick="setPreset(450)" data-i18n="presetVFast">Speed Reader (450)</button>
    </div>
  </div>

  <div class="seo">
    <h2 id="seoTitle1"></h2>
    <p id="seoBody1"></p>
    <p id="seoFaq1"></p>
    <p id="seoFaq2"></p>
  </div>
  <footer>© 2026 MODOO HUB · Free · <a href="privacy.html" style="color:var(--text-dim);text-decoration:none;">Privacy Policy</a></footer>
</main>
<script>
function formatTime(mins){if(mins<1)return'< 1m';if(mins<60)return Math.ceil(mins)+'m';const h=Math.floor(mins/60);const m=Math.round(mins%60);return m>0?`${h}h ${m}m`:`${h}h`;}
function update(){
  const v=document.getElementById('inputArea').value;
  const words=v.trim()?v.trim().split(/\s+/).filter(w=>w).length:0;
  const wpm=parseInt(document.getElementById('wpmSlider').value)||200;
  const readMins=words/wpm;
  const speakMins=words/130;
  document.getElementById('sReadTime').textContent=words?formatTime(readMins):'0m';
  document.getElementById('sSpeakTime').textContent=words?formatTime(speakMins):'0m';
  document.getElementById('sWords').textContent=words.toLocaleString();
  document.getElementById('sChars').textContent=v.length.toLocaleString();
}
function onSlider(){document.getElementById('wpmVal').textContent=document.getElementById('wpmSlider').value;update();}
function setPreset(v){
  document.getElementById('wpmSlider').value=v;
  document.getElementById('wpmVal').textContent=v;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  update();
}
</script>
<script>

    sub:'텍스트의 읽기 시간과 말하기 시간을 추정합니다.',
    statRead:'읽기 시간',statSpeak:'말하기 시간',statWords:'단어',statChars:'글자',
    sliderLabel:'읽기 속도 (WPM)',presetSlow:'느림 (150)',presetAvg:'보통 (200)',presetFast:'빠름 (300)',presetVFast:'속독 (450)',
    seoTitle1:'읽기 시간 계산 방법',seoBody1:'읽기 시간은 전체 단어 수를 분당 읽기 속도(WPM)로 나누어 계산합니다. 성인 평균 묵독 속도는 200~250 WPM, 말하기 속도는 약 130 WPM입니다.',

    seoFaq2:'<strong>Q. 블로그 글 적정 분량은?</strong><br>일반적으로 SEO에 효과적인 블로그 글은 1,500~2,500 단어(약 7~12분)입니다.'},

    statRead:'Read Time',statSpeak:'Speak Time',statWords:'Words',statChars:'Characters',
    sliderLabel:'Reading Speed (WPM)',presetSlow:'Slow (150)',presetAvg:'Average (200)',presetFast:'Fast (300)',presetVFast:'Speed Reader (450)',

};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
  ['seoTitle1','seoBody1','seoFaq1','seoFaq2'].forEach(id=>{const el=document.getElementById(id);if(el&&t[id]!==undefined)el.innerHTML=t[id];});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
