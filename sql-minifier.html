<script>
const KEYWORDS=['SELECT','FROM','WHERE','JOIN','LEFT','RIGHT','INNER','OUTER','CROSS','ON','GROUP','BY','ORDER','HAVING','LIMIT','OFFSET','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','DROP','ALTER','ADD','COLUMN','INDEX','VIEW','PROCEDURE','FUNCTION','TRIGGER','AS','AND','OR','NOT','IN','IS','NULL','LIKE','BETWEEN','EXISTS','DISTINCT','UNION','ALL','CASE','WHEN','THEN','ELSE','END'];
const _i18n={
  ko:{pageTitle:'SQL 최소화 - SQL 쿼리 공백 제거·압축 | MODOO HUB',h1b:'최소화',sub:'SQL 쿼리 공백·주석 제거 → 한 줄 압축',backLink:'← 모두의 툴',langBtn:'🌐 EN',labelIn:'SQL 입력',labelOut:'결과',optLabelComments:'주석 제거',optLabelUpper:'키워드 대문자화',btnCopy:'복사',btnClear:'초기화',copied:'복사됨 ✓',statBefore:'입력',statAfter:'출력',statSaved:'절감',
    seoHtml:`<h2>SQL 최소화란?</h2><p>SQL 쿼리의 불필요한 공백, 줄바꿈, 주석을 제거해 크기를 줄입니다. 애플리케이션 코드에 SQL을 임베딩하거나 HTTP 요청으로 전송할 때, 또는 코드 가독성을 높이기 위해 활용합니다. <strong>주석 제거, 키워드 대문자화</strong> 옵션을 선택할 수 있습니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>SQL 최소화가 성능에 영향을 주나요?</summary><p>데이터베이스 파서는 공백을 무시하므로 최소화 자체는 쿼리 실행 성능에 거의 영향을 주지 않습니다.</p></details>
<details class="faq-item"><summary>주석을 제거하는 것이 안전한가요?</summary><p>대부분의 경우 안전합니다. 단, 문자열 리터럴 안에 -- 또는 /* 가 있는 경우 주의가 필요합니다.</p></details>
<details class="faq-item"><summary>키워드 대문자화란?</summary><p>SELECT, FROM, WHERE 등 SQL 예약어를 대문자로 변환합니다. 가독성 향상과 코딩 컨벤션 통일에 유용합니다.</p></details>
<details class="faq-item"><summary>어떤 주석 형식을 처리하나요?</summary><p>-- 한 줄 주석과 /* ... */ 블록 주석을 제거합니다.</p></details>
<details class="faq-item"><summary>문자열 내 공백은 유지되나요?</summary><p>작은따옴표 내의 문자열 값은 수정하지 않습니다. 'hello world'는 그대로 유지됩니다.</p></details>
<details class="faq-item"><summary>MySQL, PostgreSQL, SQLite 모두 지원하나요?</summary><p>SQL 최소화는 표준 SQL 문법을 기준으로 하며 대부분의 RDBMS에 적용됩니다.</p></details>
<details class="faq-item"><summary>역방향(포맷팅)도 지원하나요?</summary><p>SQL 포맷팅(들여쓰기, 줄바꿈 추가)은 sql-validator 도구를 참고하세요.</p></details>
<details class="faq-item"><summary>세미콜론은 유지되나요?</summary><p>세미콜론(;)은 SQL 구문 구분자로 유지됩니다.</p></details>`
  },
  en:{pageTitle:'SQL Minifier - Remove SQL Whitespace & Comments | MODOO HUB',h1b:'Minifier',sub:'Remove SQL whitespace & comments → compress to one line',backLink:'← All Tools',langBtn:'🌐 中文',labelIn:'SQL Input',labelOut:'Result',optLabelComments:'Remove comments',optLabelUpper:'Uppercase keywords',btnCopy:'Copy',btnClear:'Clear',copied:'Copied ✓',statBefore:'Before',statAfter:'After',statSaved:'saved',
    seoHtml:`<h2>SQL Minifier</h2><p>Remove unnecessary whitespace, line breaks, and comments from SQL queries. Useful for embedding SQL in application code, sending via HTTP, or enforcing a compact style. Options include <strong>comment removal and keyword uppercasing</strong>.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Does minification affect SQL performance?</summary><p>Database parsers ignore whitespace, so minification has virtually no impact on query execution performance.</p></details>
<details class="faq-item"><summary>Is removing comments safe?</summary><p>Generally safe. Be careful if -- or /* appears inside string literals.</p></details>
<details class="faq-item"><summary>What is keyword uppercasing?</summary><p>Converts SQL reserved words (SELECT, FROM, WHERE…) to uppercase — improves readability and enforces style conventions.</p></details>
<details class="faq-item"><summary>Which comment formats are handled?</summary><p>Single-line -- comments and /* ... */ block comments are removed.</p></details>
<details class="faq-item"><summary>Is whitespace inside strings preserved?</summary><p>Yes. Content inside single quotes is left untouched. \'hello world\' stays as-is.</p></details>
<details class="faq-item"><summary>MySQL, PostgreSQL, SQLite supported?</summary><p>Minification is based on standard SQL and applies to most RDBMS.</p></details>
<details class="faq-item"><summary>What about formatting (reverse)?</summary><p>For SQL formatting with indentation and line breaks, see the sql-validator tool.</p></details>
<details class="faq-item"><summary>Are semicolons preserved?</summary><p>Yes, semicolons are statement delimiters and are preserved.</p></details>`
  },
  zh:{pageTitle:'SQL压缩工具 - 删除SQL空格和注释 | MODOO HUB',h1b:'压缩工具',sub:'删除SQL空格·注释 → 压缩为一行',backLink:'← 所有工具',langBtn:'🌐 日本語',labelIn:'SQL输入',labelOut:'结果',optLabelComments:'删除注释',optLabelUpper:'大写关键字',btnCopy:'复制',btnClear:'清除',copied:'已复制 ✓',statBefore:'输入',statAfter:'输出',statSaved:'节省',
    seoHtml:`<h2>SQL压缩工具</h2><p>删除SQL查询中不必要的空格、换行和注释。适用于在应用代码中嵌入SQL或通过HTTP传输。支持删除注释和大写关键字选项。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>压缩会影响SQL性能吗？</summary><p>数据库解析器忽略空格，因此压缩对查询执行性能几乎没有影响。</p></details>
<details class="faq-item"><summary>删除注释安全吗？</summary><p>通常安全。但要注意字符串字面量内包含--或/*的情况。</p></details>
<details class="faq-item"><summary>关键字大写化是什么？</summary><p>将SELECT、FROM、WHERE等SQL保留字转换为大写，提高可读性。</p></details>
<details class="faq-item"><summary>处理哪些注释格式？</summary><p>删除--单行注释和/* ... */块注释。</p></details>
<details class="faq-item"><summary>字符串内的空格保留吗？</summary><p>是的，单引号内的内容不做修改。</p></details>
<details class="faq-item"><summary>支持MySQL、PostgreSQL、SQLite吗？</summary><p>基于标准SQL语法，适用于大多数RDBMS。</p></details>
<details class="faq-item"><summary>分号会保留吗？</summary><p>是的，分号作为语句分隔符会保留。</p></details>
<details class="faq-item"><summary>支持反向格式化吗？</summary><p>SQL格式化（添加缩进和换行）请参考sql-validator工具。</p></details>`
  },
  ja:{pageTitle:'SQL最小化ツール - SQL空白・コメント削除 | MODOO HUB',h1b:'最小化',sub:'SQL空白・コメント削除 → 1行に圧縮',backLink:'← ホーム',langBtn:'🌐 한국어',labelIn:'SQL入力',labelOut:'結果',optLabelComments:'コメント削除',optLabelUpper:'キーワード大文字化',btnCopy:'コピー',btnClear:'クリア',copied:'コピー完了 ✓',statBefore:'入力前',statAfter:'出力後',statSaved:'削減',
    seoHtml:`<h2>SQL最小化ツールとは</h2><p>SQLクエリの不要な空白・改行・コメントを削除してサイズを削減します。アプリケーションコードへのSQL埋め込みやHTTP送信時に便利です。コメント削除・キーワード大文字化オプション付き。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>最小化はSQL性能に影響しますか？</summary><p>DBパーサーは空白を無視するため、最小化はクエリ実行性能にほぼ影響しません。</p></details>
<details class="faq-item"><summary>コメント削除は安全ですか？</summary><p>通常は安全です。文字列リテラル内に--や/*がある場合は注意が必要です。</p></details>
<details class="faq-item"><summary>キーワード大文字化とは？</summary><p>SELECT、FROM、WHEREなどSQLの予約語を大文字に変換します。可読性向上とスタイル統一に役立ちます。</p></details>
<details class="faq-item"><summary>どのコメント形式を処理しますか？</summary><p>--単行コメントと/* ... */ブロックコメントを削除します。</p></details>
<details class="faq-item"><summary>文字列内の空白は保持されますか？</summary><p>はい。シングルクォート内の内容は変更しません。</p></details>
<details class="faq-item"><summary>MySQL・PostgreSQL・SQLiteに対応？</summary><p>標準SQL構文を基準にしており、大部分のRDBMSに適用されます。</p></details>
<details class="faq-item"><summary>セミコロンは保持されますか？</summary><p>はい。セミコロンは文ごとの区切り記号として保持されます。</p></details>
<details class="faq-item"><summary>逆方向（フォーマット）も対応？</summary><p>SQLフォーマット（インデント・改行追加）はsql-validatorツールをご参照ください。</p></details>`
  }
};
const LANGS=['ko','en','zh','ja'];
let _lang='ko';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('labelIn').textContent=t.labelIn;document.getElementById('labelOut').textContent=t.labelOut;
  document.getElementById('optLabelComments').textContent=t.optLabelComments;document.getElementById('optLabelUpper').textContent=t.optLabelUpper;
  document.getElementById('btnCopy').textContent=t.btnCopy;document.getElementById('btnClear').textContent=t.btnClear;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function clearAll(){document.getElementById('sqlIn').value='';document.getElementById('sqlOut').value='';document.getElementById('statEl').textContent='';}
function minify(){
  const t=_i18n[_lang];let sql=document.getElementById('sqlIn').value;
  const rmComments=document.getElementById('optComments').checked;
  const upper=document.getElementById('optUppercase').checked;
  if(rmComments){sql=sql.replace(/\/\*[\s\S]*?\*\//g,' ').replace(/--[^\n]*/g,' ');}
  // Preserve string literals
  const strings=[];sql=sql.replace(/'[^']*'/g,m=>{strings.push(m);return `__STR${strings.length-1}__`;});
  sql=sql.replace(/\s+/g,' ').trim();
  if(upper){
    KEYWORDS.forEach(kw=>{
      const re=new RegExp('\\b'+kw+'\\b','gi');
      sql=sql.replace(re,kw);
    });
  }
  // Restore strings
  strings.forEach((s,i)=>{sql=sql.replace('__STR'+i+'__',s);});
  document.getElementById('sqlOut').value=sql;
  const bef=document.getElementById('sqlIn').value.length;const aft=sql.length;
  const pct=bef>0?Math.round((1-aft/bef)*100):0;
  document.getElementById('statEl').textContent=`${t.statBefore}: ${bef} → ${t.statAfter}: ${aft} (${pct}% ${t.statSaved})`;
}
function copyOut(){
  const t=_i18n[_lang];const v=document.getElementById('sqlOut').value;if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{
    const btn=document.getElementById('btnCopy');const orig=btn.textContent;
    btn.textContent=t.copied;setTimeout(()=>btn.textContent=orig,2000);
  });
}
document.getElementById('optComments').addEventListener('change',minify);
document.getElementById('optUppercase').addEventListener('change',minify);
_lang=detectLang();applyLang();
</script>
