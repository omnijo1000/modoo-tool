.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:44px 20px;text-align:center;cursor:pointer;transition:all .2s;}

.drop-icon{font-size:38px;margin-bottom:10px;}
.drop-text{font-size:14px;color:var(--text-muted);}
input[type=file]{display:none;}
.opts{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-top:14px;display:none;}
.page-info{font-size:13px;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:14px;}
.mode-row{display:flex;gap:6px;margin-bottom:14px;}
.mode-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}
.mode-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(251,191,36,.08);}
.hint-text{font-size:12px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:10px;}
input.range-in{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
input.range-in:focus{border-color:var(--accent);}
.page-grid{display:flex;flex-wrap:wrap;gap:6px;max-height:200px;overflow-y:auto;padding:4px 0;}
.page-btn{width:42px;height:42px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s;}
.page-btn.sel{background:rgba(251,191,36,.15);border-color:var(--accent);color:var(--accent);}
.split-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-top:14px;}
.split-btn:hover{opacity:.85;}
.result-list{margin-top:14px;display:flex;flex-direction:column;gap:6px;}
.res-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 14px;display:flex;align-items:center;gap:10px;}
.res-name{flex:1;font-size:13px;font-family:'DM Mono',monospace;}
.res-size{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.dl-sm{padding:6px 14px;border:1px solid var(--accent);border-radius:5px;color:var(--accent);font-size:11px;cursor:pointer;background:none;font-family:'DM Mono',monospace;}
.dl-sm:hover{background:rgba(251,191,36,.1);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

const _i18n={
  ko:{sub:'PDF 페이지 분리 · 범위 지정 · 개별 페이지 추출',langBtn:'🌐 EN',backBtn:'← 모두의 툴',dropText:'PDF 파일을 드래그하거나 클릭해서 선택',mRange:'범위 지정',mAll:'페이지별 분리',mPick:'페이지 선택',rangeHint:'예: 1-3, 5, 7-9',allHint:'각 페이지를 별도 PDF로 분리합니다',pickHint:'추출할 페이지를 선택하세요',splitBtn:'▶ 분리하기',seoHtml:'<h2>PDF Split이란?</h2><p>pdf-lib를 사용해 <strong>브라우저에서 직접</strong> PDF를 분리합니다. 서버에 파일을 전송하지 않아 개인정보가 안전합니다. 페이지 범위 지정, 모든 페이지 개별 분리, 특정 페이지 선택 추출의 세 가지 모드를 지원합니다.</p><details class="faq-item"><summary>범위 지정 모드의 입력 형식은 어떻게 되나요?</summary><p>쉼표로 구분하여 여러 범위를 지정합니다. 예: "1-3, 5, 7-9" → 1~3페이지, 5페이지, 7~9페이지를 각각 별도 PDF로 추출. 단일 페이지는 숫자만, 범위는 하이픈(-)으로 구분합니다.</p></details><details class="faq-item"><summary>페이지별 분리 모드와 페이지 선택 모드의 차이는?</summary><p>페이지별 분리: 각 페이지가 별도의 PDF 파일로 저장됩니다(10페이지 PDF → 10개 파일). 페이지 선택: 원하는 페이지들을 선택하면 하나의 PDF로 병합하여 추출합니다. 특정 페이지만 뽑아 하나의 파일로 만들 때 유용합니다.</p></details><details class="faq-item"><summary>파일이 서버로 전송되나요?</summary><p>아니요. pdf-lib는 완전한 클라이언트 사이드 라이브러리로, 모든 처리가 브라우저 안에서 이루어집니다. 파일이 외부 서버로 전송되지 않아 민감한 문서도 안전하게 처리할 수 있습니다.</p></details><details class="faq-item"><summary>암호화된 PDF를 분리할 수 있나요?</summary><p>비밀번호로 잠긴 PDF는 먼저 잠금을 해제해야 합니다. 이 도구는 암호화되지 않은 PDF만 지원합니다. Adobe Acrobat이나 다른 PDF 잠금 해제 도구로 먼저 비밀번호를 제거한 후 사용하세요.</p></details><details class="faq-item"><summary>파일 크기나 페이지 수 제한이 있나요?</summary><p>엄격한 제한은 없지만 매우 큰 파일(100MB 이상)이나 수백 페이지의 PDF는 처리 시간이 오래 걸리거나 브라우저 메모리 부족으로 실패할 수 있습니다. 실용적인 범위에서는 대부분의 PDF가 정상 동작합니다.</p></details><details class="faq-item"><summary>PDF 분리 후 각 파일의 이름은 어떻게 설정되나요?</summary><p>분리된 파일은 원본 파일명 뒤에 페이지 번호가 붙어 저장됩니다. 예: document-p1.pdf, document-p2.pdf. 파일 이름은 다운로드 후 원하는 대로 변경할 수 있습니다.</p></details><details class="faq-item"><summary>분리한 PDF를 다시 합칠 수 있나요?</summary><p>가능합니다. modoo-tool의 PDF 병합 도구를 사용하면 분리된 PDF 파일들을 하나의 파일로 다시 결합할 수 있습니다.</p></details><details class="faq-item"><summary>홀수/짝수 페이지만 분리할 수 있나요?</summary><p>페이지 선택 모드에서 홀수 페이지(1,3,5,7...)나 짝수 페이지(2,4,6,8...)를 직접 입력해 선택적으로 추출할 수 있습니다.</p></details>'},
  en:{sub:'Split PDF pages · Page ranges · Extract individual pages',langBtn:'🌐 中文',backBtn:'← All Tools',dropText:'Drag & drop or click to select PDF',mRange:'Page ranges',mAll:'Split all pages',mPick:'Pick pages',rangeHint:'e.g. 1-3, 5, 7-9',allHint:'Each page becomes a separate PDF file',pickHint:'Select pages to extract into one PDF',splitBtn:'▶ Split',seoHtml:'<h2>PDF Split Tool</h2><p>Split PDF files <strong>directly in the browser</strong> using pdf-lib — no server upload, no privacy risk. Three modes: page range extraction, per-page split, and custom page selection into a single output file.</p><details class="faq-item"><summary>How do I format the page range input?</summary><p>Separate multiple ranges with commas. Examples: "1-3, 5, 7-9" extracts pages 1–3, page 5, and pages 7–9 as separate PDFs. A single number means one page; a hyphen denotes a range. Page numbers start at 1.</p></details><details class="faq-item"><summary>What is the difference between "Split all pages" and "Pick pages"?</summary><p>Split all pages: every page becomes a separate PDF file (a 10-page PDF → 10 files). Pick pages: you select specific pages and they are merged into a single output PDF. Use "Pick pages" when you need to extract a custom subset into one file.</p></details><details class="faq-item"><summary>Are my files uploaded to a server?</summary><p>No. pdf-lib is a fully client-side library — all processing happens inside your browser. Your files never leave your device, making this safe for sensitive documents like contracts, medical records, or confidential reports.</p></details><details class="faq-item"><summary>Can I split password-protected PDFs?</summary><p>No — encrypted PDFs must be unlocked first. This tool only works with unencrypted PDFs. Use Adobe Acrobat or another PDF unlock tool to remove the password before splitting.</p></details><details class="faq-item"><summary>Are there file size or page count limits?</summary><p>There are no strict limits, but very large files (100 MB+) or PDFs with hundreds of pages may take a long time or fail due to browser memory constraints. Most typical PDFs process quickly and reliably.</p></details><details class="faq-item"><summary>How are split PDF files named?</summary><p>Split files are saved with the original filename followed by the page number, e.g. document-p1.pdf, document-p2.pdf. You can rename the files after downloading.</p></details><details class="faq-item"><summary>Can I merge the split PDFs back together?</summary><p>Yes. Use the PDF Merge tool on Modoo Hub to combine the split PDF files back into a single document.</p></details><details class="faq-item"><summary>Can I extract only odd or even pages?</summary><p>Yes. In page-selection mode, enter odd pages (1,3,5,7...) or even pages (2,4,6,8...) to selectively extract them.</p></details>'},
  zh:{sub:'PDF页面分割 · 范围指定 · 单页提取',langBtn:'🌐 日本語',backBtn:'← 所有工具',dropText:'拖放或点击选择PDF文件',mRange:'指定范围',mAll:'逐页分割',mPick:'选择页面',rangeHint:'例如: 1-3, 5, 7-9',allHint:'每页生成单独的PDF文件',pickHint:'选择要提取的页面（合并为一个PDF）',splitBtn:'▶ 分割',seoHtml:'<h2>PDF分割工具</h2><p>使用pdf-lib在<strong>浏览器中直接</strong>分割PDF，无需上传服务器，保护隐私安全。支持三种模式：范围指定、逐页分割和自定义页面选择（合并为一个文件）。</p><details class="faq-item"><summary>页面范围的输入格式是什么？</summary><p>用逗号分隔多个范围。例如：「1-3, 5, 7-9」提取第1-3页、第5页和第7-9页，各自保存为单独PDF。单个数字表示单页，连字符表示范围，页码从1开始。</p></details><details class="faq-item"><summary>「逐页分割」和「选择页面」有什么区别？</summary><p>逐页分割：每页都生成单独的PDF文件（10页PDF→10个文件）。选择页面：选择特定页面后合并为一个输出PDF。当需要将多个特定页面提取为一个文件时，请使用「选择页面」模式。</p></details><details class="faq-item"><summary>文件会上传到服务器吗？</summary><p>不会。pdf-lib是完全在客户端运行的库，所有处理都在浏览器内完成。文件不会离开您的设备，适合处理合同、医疗记录等敏感文档。</p></details><details class="faq-item"><summary>可以分割受密码保护的PDF吗？</summary><p>不可以——加密PDF必须先解除保护。本工具仅支持未加密的PDF。请先使用Adobe Acrobat或其他PDF解密工具移除密码，然后再进行分割。</p></details><details class="faq-item"><summary>有文件大小或页数限制吗？</summary><p>没有严格限制，但非常大的文件（100MB以上）或数百页的PDF可能需要较长处理时间，或因浏览器内存不足而失败。大多数日常PDF文件都能正常快速处理。</p></details><details class="faq-item"><summary>分割后的PDF文件如何命名？</summary><p>分割后的文件以原文件名加页码命名，例如document-p1.pdf、document-p2.pdf，下载后可自行重命名。</p></details><details class="faq-item"><summary>分割后的PDF可以重新合并吗？</summary><p>可以。使用Modoo Hub的PDF合并工具，可将分割后的PDF文件合并回单个文档。</p></details><details class="faq-item"><summary>能只提取奇数页或偶数页吗？</summary><p>可以。在页面选择模式下，输入奇数页（1,3,5,7...）或偶数页（2,4,6,8...）即可选择性提取。</p></details>'},
  ja:{sub:'PDFページの分割 · 範囲指定 · 個別ページ抽出',langBtn:'🌐 한국어',backBtn:'← ホーム',dropText:'PDFファイルをドラッグするかクリックして選択',mRange:'範囲指定',mAll:'ページごとに分割',mPick:'ページ選択',rangeHint:'例: 1-3, 5, 7-9',allHint:'各ページを別々のPDFファイルに分割します',pickHint:'抽出するページを選択してください（1つのPDFにまとめます）',splitBtn:'▶ 分割',seoHtml:'<h2>PDF分割ツールとは？</h2><p>pdf-libを使用して<strong>ブラウザで直接</strong>PDFを分割します。サーバーへのアップロード不要でプライバシーを保護。範囲指定・ページごとの分割・カスタムページ選択（1ファイルに統合）の3モードに対応しています。</p><details class="faq-item"><summary>ページ範囲の入力形式は？</summary><p>カンマで複数の範囲を区切ります。例：「1-3, 5, 7-9」で1〜3ページ、5ページ、7〜9ページを別々のPDFとして抽出します。単一の数字は1ページ、ハイフンは範囲を表します。ページ番号は1から始まります。</p></details><details class="faq-item"><summary>「ページごとに分割」と「ページ選択」の違いは？</summary><p>ページごとに分割：各ページが個別のPDFファイルになります（10ページ→10ファイル）。ページ選択：特定のページを選んで1つのPDFに統合して出力します。複数の特定ページを1つのファイルにまとめたい場合は「ページ選択」をご利用ください。</p></details><details class="faq-item"><summary>ファイルはサーバーにアップロードされますか？</summary><p>いいえ。pdf-libは完全クライアントサイドのライブラリで、すべての処理がブラウザ内で完結します。ファイルがデバイスの外に出ることはなく、契約書や医療記録などの機密文書も安全に処理できます。</p></details><details class="faq-item"><summary>パスワード付きPDFは分割できますか？</summary><p>できません。暗号化されたPDFは先にロックを解除する必要があります。本ツールは暗号化されていないPDFのみ対応しています。Adobe AcrobatなどのPDFツールでパスワードを解除してからご利用ください。</p></details><details class="faq-item"><summary>ファイルサイズやページ数の制限はありますか？</summary><p>厳密な制限はありませんが、非常に大きなファイル（100MB以上）や数百ページのPDFは処理に時間がかかったり、ブラウザのメモリ不足で失敗する場合があります。一般的なPDFはほとんど問題なく処理できます。</p></details><details class="faq-item"><summary>分割されたPDFファイルはどのように命名されますか？</summary><p>分割ファイルは元のファイル名にページ番号が付いた形（例: document-p1.pdf）で保存されます。ダウンロード後に自由にリネームできます。</p></details><details class="faq-item"><summary>分割したPDFを再び結合できますか？</summary><p>できます。Modoo HubのPDF結合ツールを使えば分割したPDFファイルを1つのドキュメントに再結合できます。</p></details><details class="faq-item"><summary>奇数ページまたは偶数ページだけ抽出できますか？</summary><p>できます。ページ選択モードで奇数ページ（1,3,5,7...）または偶数ページ（2,4,6,8...）を入力して選択的に抽出できます。</p></details>'},
};
let _lang='ko',_pdfBuf=null,_pageCount=0,_mode='range',_origName='',_selPages=new Set();
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function ev(e,type){e.preventDefault();const dz=document.getElementById('dropZone');if(type==='over')dz.classList.add('over');else if(type==='leave')dz.classList.remove('over');else{dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f)loadFile(f);}}
function onFile(e){const f=e.target.files[0];if(f)loadFile(f);}
async function loadFile(f){
  _origName=f.name.replace(/\.pdf$/i,'');
  _pdfBuf=await f.arrayBuffer();
  const doc=await PDFLib.PDFDocument.load(_pdfBuf);
  _pageCount=doc.getPageCount();
  document.getElementById('pageInfo').textContent=`${f.name} · ${_pageCount} pages`;
  buildPageGrid();
  document.getElementById('opts').style.display='block';
  document.getElementById('resultList').innerHTML='';
}
function setMode(m){
  _mode=m;
  ['Range','All','Pick'].forEach(n=>document.getElementById('m'+n).classList.remove('on'));
  const map={range:'Range',all:'All',pick:'Pick'};
  document.getElementById('m'+map[m]).classList.add('on');
  document.getElementById('rangeWrap').style.display=m==='range'?'block':'none';
  document.getElementById('allWrap').style.display=m==='all'?'block':'none';
  document.getElementById('pickWrap').style.display=m==='pick'?'block':'none';
}
function buildPageGrid(){
  const g=document.getElementById('pageGrid');g.innerHTML='';_selPages.clear();
  for(let i=1;i<=_pageCount;i++){
    const b=document.createElement('button');b.className='page-btn';b.textContent=i;
    b.onclick=()=>{if(_selPages.has(i)){_selPages.delete(i);b.classList.remove('sel');}else{_selPages.add(i);b.classList.add('sel');}};
    g.appendChild(b);
  }
}
function parseRanges(str){
  const pages=new Set();
  str.split(',').forEach(part=>{
    const m=part.trim().match(/^(\d+)(?:-(\d+))?$/);
    if(!m)return;
    const s=parseInt(m[1]),e=m[2]?parseInt(m[2]):s;
    for(let i=s;i<=e;i++)if(i>=1&&i<=_pageCount)pages.add(i);
  });
  return [...pages].sort((a,b)=>a-b);
}
function fmtSize(b){return b>1024*1024?(b/1024/1024).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';}
async function extractPages(indices,name){
  const doc=await PDFLib.PDFDocument.load(_pdfBuf);
  const out=await PDFLib.PDFDocument.create();
  const pages=await out.copyPages(doc,indices.map(i=>i-1));
  pages.forEach(p=>out.addPage(p));
  const bytes=await out.save();
  return{blob:new Blob([bytes],{type:'application/pdf'}),name};
}
async function doSplit(){
  if(!_pdfBuf)return;
  document.getElementById('resultList').innerHTML='';
  const results=[];
  if(_mode==='range'){
    const pages=parseRanges(document.getElementById('rangeIn').value);
    if(!pages.length)return alert('유효한 페이지 범위를 입력하세요');
    results.push(await extractPages(pages,`${_origName}_p${pages[0]}-${pages[pages.length-1]}`));
  } else if(_mode==='all'){
    for(let i=1;i<=_pageCount;i++) results.push(await extractPages([i],`${_origName}_p${i}`));
  } else {
    const pages=[..._selPages].sort((a,b)=>a-b);
    if(!pages.length)return alert('페이지를 선택하세요');
    results.push(await extractPages(pages,`${_origName}_selected`));
  }
  const list=document.getElementById('resultList');
  results.forEach(r=>{
    const item=document.createElement('div');item.className='res-item';
    item.innerHTML=`<span style="font-size:18px">📄</span><span class="res-name">${r.name}.pdf</span><span class="res-size">${fmtSize(r.blob.size)}</span><button class="dl-sm" onclick="(()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([...arguments].slice(0),'application/pdf'));a.download='${r.name}.pdf';a.click();})()">↓</button>`;
    item.querySelector('.dl-sm').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(r.blob);a.download=r.name+'.pdf';a.click();};
    list.appendChild(item);
  });
}
_lang=detectLang();applyLang();
</script>
