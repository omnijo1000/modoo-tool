// ── 言語検出 ────────────────────────────────────────────────────────
let lang = (new URLSearchParams(location.search).get('lang')) || localStorage.getItem('modoo_lang');
if (!lang || !i18n[lang]) {
  const nav = navigator.language || '';
  if (nav.startsWith('zh')) lang = 'zh';
  else if (nav.startsWith('ja')) lang = 'ja';
  else if (nav.startsWith('ko')) lang = 'ko';
  else lang = 'en';
}

function applyLang() {
  const t = i18n[lang];
  document.documentElement.lang = lang;
  document.title = t.pageTitle;
  if (document.getElementById('h1Title')) document.getElementById('h1Title').innerHTML = t.h1;
  if (document.getElementById('h1Sub')) document.getElementById('h1Sub').textContent = t.sub;
  if (document.getElementById('backLink')) document.getElementById('backLink').textContent = t.backLink;
  if (document.getElementById('langBtn')) document.getElementById('langBtn').textContent = t.langBtn;
  if (document.getElementById('btnView')) document.getElementById('btnView').textContent = t.btnView;
  if (document.getElementById('btnPaste')) document.getElementById('btnPaste').textContent = t.btnPaste;
  if (document.getElementById('btnExpand')) document.getElementById('btnExpand').textContent = t.btnExpand;
  if (document.getElementById('btnCollapse')) document.getElementById('btnCollapse').textContent = t.btnCollapse;
  if (document.getElementById('btnClear')) document.getElementById('btnClear').textContent = t.btnClear;
  if (document.getElementById('labelInput')) document.getElementById('labelInput').textContent = t.labelInput;
  if (document.getElementById('labelOutput')) document.getElementById('labelOutput').textContent = t.labelOutput;
  if (document.getElementById('pathLabel')) document.getElementById('pathLabel').textContent = t.pathLabel;
  if (document.getElementById('copyPathBtn')) document.getElementById('copyPathBtn').textContent = t.copyPath;
  if (document.getElementById('copyInputBtn')) document.getElementById('copyInputBtn').textContent = t.copyPath;
  if (document.getElementById('footerText')) document.getElementById('footerText').textContent = t.footer;
  if (document.getElementById('seoSection')) document.getElementById('seoSection').innerHTML = t.seoHtml;
  if (document.getElementById('taInput')) document.getElementById('taInput').placeholder = t.placeholder;
  const placeholder = document.getElementById('outputPlaceholder');
  if (placeholder) placeholder.textContent = t.outputPlaceholder;
  // idle status text
  const st = document.getElementById('status');
  if (st && st.classList.contains('idle')) {
    document.getElementById('statusText').textContent = t.statusIdle;
  }
}

function toggleLang() {
  const order = ['ko', 'en', 'zh', 'ja'];
  const idx = order.indexOf(lang);
  lang = order[(idx + 1) % order.length];
  localStorage.setItem('modoo_lang', lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', lang);
  history.replaceState(null, '', url.toString());
  applyLang();
}

// ── Tree rendering ───────────────────────────────────────────────────
let currentPath = '$';

function typeOf(val) {
  if (val === null) return 'null';
  if (Array.isArray(val)) return 'array';
  return typeof val;
}

function badgeClass(type) {
  return 'type-badge badge-' + type;
}

function renderTree(obj, container, path) {
  if (path === undefined) path = '$';
  container.innerHTML = '';
  const node = buildNode(obj, null, path, true);
  container.appendChild(node);
}

function buildNode(val, key, path, isRoot) {
  const type = typeOf(val);
  const wrapper = document.createElement('div');
  wrapper.className = 'tree-node' + (isRoot ? ' root-node' : '');

  const isComplex = type === 'object' || type === 'array';
  const row = document.createElement('div');
  row.className = 'tree-row' + (isComplex ? ' clickable' : '');

  // Toggle arrow for complex nodes
  const toggle = document.createElement('span');
  toggle.className = 'tree-toggle open';
  toggle.textContent = '▶';
  if (!isComplex) toggle.style.visibility = 'hidden';
  row.appendChild(toggle);

  // Key
  if (key !== null) {
    const keyEl = document.createElement('span');
    keyEl.className = 'tree-key';
    keyEl.textContent = typeof key === 'number' ? '[' + key + ']' : '"' + key + '"';
    row.appendChild(keyEl);
    const colon = document.createElement('span');
    colon.className = 'tree-colon';
    colon.textContent = ':';
    row.appendChild(colon);
  }

  // Type badge
  const badge = document.createElement('span');
  badge.className = badgeClass(type);
  badge.textContent = type;
  row.appendChild(badge);

  // Value or summary
  if (!isComplex) {
    const valEl = document.createElement('span');
    valEl.className = 'tree-val-' + type;
    if (type === 'string') valEl.textContent = '"' + val + '"';
    else if (type === 'null') valEl.textContent = 'null';
    else valEl.textContent = String(val);
    row.appendChild(valEl);
  } else {
    const summary = document.createElement('span');
    summary.className = 'tree-val-summary';
    const count = Array.isArray(val) ? val.length : Object.keys(val).length;
    summary.textContent = type === 'array'
      ? '[ ' + count + ' items ]'
      : '{ ' + count + ' keys }';
    row.appendChild(summary);
  }

  // Click handler to copy path
  row.addEventListener('click', function(e) {
    e.stopPropagation();
    currentPath = path;
    document.getElementById('pathValue').textContent = path;
    if (isComplex) {
      const children = wrapper.querySelector('.tree-children');
      if (children) {
        const hidden = children.style.display === 'none';
        children.style.display = hidden ? '' : 'none';
        toggle.className = 'tree-toggle' + (hidden ? ' open' : '');
      }
    }
  });

  wrapper.appendChild(row);

  // Children
  if (isComplex) {
    const childrenEl = document.createElement('div');
    childrenEl.className = 'tree-children';
    if (Array.isArray(val)) {
      val.forEach(function(item, i) {
        childrenEl.appendChild(buildNode(item, i, path + '[' + i + ']', false));
      });
    } else {
      Object.keys(val).forEach(function(k) {
        childrenEl.appendChild(buildNode(val[k], k, path + '.' + k, false));
      });
    }
    wrapper.appendChild(childrenEl);
  }

  return wrapper;
}

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  document.getElementById('statusText').textContent = msg;
}

function renderView() {
  const text = document.getElementById('taInput').value.trim();
  if (!text) {
    setStatus('idle', i18n[lang].statusIdle);
    document.getElementById('treePanel').innerHTML = '<span class="tree-empty">' + i18n[lang].outputPlaceholder + '</span>';
    return;
  }
  try {
    const obj = JSON.parse(text);
    document.getElementById('taInput').className = 'success';
    const panel = document.getElementById('treePanel');
    renderTree(obj, panel, '$');
    currentPath = '$';
    document.getElementById('pathValue').textContent = '$';
    setStatus('ok', i18n[lang].statusOk);
  } catch(e) {
    document.getElementById('taInput').className = 'error';
    setStatus('err', i18n[lang].statusErr + ': ' + e.message);
    document.getElementById('treePanel').innerHTML = '<span class="tree-empty">' + i18n[lang].outputPlaceholder + '</span>';
  }
}

function onInput() {
  const text = document.getElementById('taInput').value.trim();
  if (!text) {
    document.getElementById('taInput').className = '';
    setStatus('idle', i18n[lang].statusIdle);
    return;
  }
  // Auto-render on input
  renderView();
}

function expandAll() {
  const panel = document.getElementById('treePanel');
  panel.querySelectorAll('.tree-children').forEach(function(el){ el.style.display = ''; });
  panel.querySelectorAll('.tree-toggle').forEach(function(el){ el.className = 'tree-toggle open'; });
}

function collapseAll() {
  const panel = document.getElementById('treePanel');
  // collapse all except root's immediate children container
  const allChildren = panel.querySelectorAll('.tree-children');
  allChildren.forEach(function(el, i) {
    if (i > 0) el.style.display = 'none';
  });
  panel.querySelectorAll('.tree-toggle').forEach(function(el, i) {
    if (i > 0) el.className = 'tree-toggle';
  });
}

function clearAll() {
  document.getElementById('taInput').value = '';
  document.getElementById('taInput').className = '';
  document.getElementById('treePanel').innerHTML = '<span class="tree-empty" id="outputPlaceholder">' + i18n[lang].outputPlaceholder + '</span>';
  document.getElementById('pathValue').textContent = '—';
  currentPath = '$';
  setStatus('idle', i18n[lang].statusIdle);
}

function copyPath() {
  const path = document.getElementById('pathValue').textContent;
  if (!path || path === '—') return;
  navigator.clipboard.writeText(path).then(function() {
    const btn = document.getElementById('copyPathBtn');
    btn.textContent = i18n[lang].copyDone;
    btn.style.color = 'var(--green)';
    setTimeout(function(){ btn.textContent = i18n[lang].copyPath; btn.style.color = ''; }, 2000);
  });
}

function copyInput() {
  const text = document.getElementById('taInput').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(function() {
    const btn = document.getElementById('copyInputBtn');
    btn.textContent = i18n[lang].copyDone;
    btn.style.color = 'var(--green)';
    setTimeout(function(){ btn.textContent = i18n[lang].copyPath; btn.style.color = ''; }, 2000);
  });
}

async function pasteClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('taInput').value = text;
    renderView();
  } catch(e) {
    setStatus('err', 'Clipboard access denied');
  }
}

// ── Init ────────────────────────────────────────────────────────────
applyLang();
</script>
