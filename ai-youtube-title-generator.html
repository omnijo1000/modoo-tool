<details class="faq-item"><summary>应该使用大写和特殊字符吗？</summary><p>适当的大写和括号/感叹号可提升点击率，避免全大写。</p></details>
<details class="faq-item"><summary>数字标题为什么有效？</summary><p>传达具体价值，让观众预测视频结构。</p></details>
<details class="faq-item"><summary>标题对YouTube SEO有多重要？</summary><p>YouTube算法使用标题关键词在搜索结果中展示视频。</p></details>
<details class="faq-item"><summary>字符颜色代表什么？</summary><p>绿色=最佳(&lt;70)，黄色=注意(70-80)，红色=过长(&gt;80)。</p></details>

<details class="faq-item"><summary>YouTubeタイトルの理想的な長さは？</summary><p>70文字以内で検索結果で切れません。キーワードは前半に置きましょう。</p></details>
<details class="faq-item"><summary>大文字や特殊文字は使うべきですか？</summary><p>適切な大文字や括弧・感嘆符はCTRを上げます。全大文字は避けて。</p></details>

};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblTopic','lblChannel','lblType','btnGen'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('typeChips').innerHTML=t.types.map(tp=>`<span class="chip${_type===tp.id?' active':''}" onclick="setType('${tp.id}')">${tp.label}</span>`).join('');
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function setType(id){_type=id;document.querySelectorAll('.chip').forEach((c,i)=>c.classList.toggle('active',_i18n[_lang].types[i].id===id));}
function charClass(n){return n<=70?'char-ok':n<=80?'char-warn':'char-bad';}
function generate(){
  const t=_i18n[_lang];
  const topic=document.getElementById('topic').value.trim()||'주제';
  const channel=document.getElementById('channel').value.trim()||'시청자';
  const all=[];
  Object.keys(t.templates).forEach(k=>{t.templates[k](topic,channel).forEach(s=>{if(!all.includes(s))all.push(s);});});
  const shown=all.slice(0,10);
  document.getElementById('titleList').innerHTML=shown.map((ti,i)=>`
    <div class="title-item" onclick="copyTitle(this,'${encodeURIComponent(ti)}')">
      <span class="title-num">${String(i+1).padStart(2,'0')}</span>
      <span class="title-text">${ti}</span>
      <span class="char-count ${charClass(ti.length)}">${ti.length}</span>
      <button class="title-copy">${t.copyBtn}</button>
    </div>`).join('');
}
function copyTitle(el,enc){
  const t=_i18n[_lang];
  const text=decodeURIComponent(enc);
  navigator.clipboard.writeText(text).then(()=>{const btn=el.querySelector('.title-copy');btn.textContent=t.copied;setTimeout(()=>btn.textContent=t.copyBtn,1500);});
}
_lang=detectLang();applyLang();
</script>
