const _i18n={
  ko:{pageTitle:'시간대 회의 플래너 | 모두의 툴',h1:'🌍 시간대 회의 플래너',sub:'글로벌 팀의 최적 회의 시간을 찾습니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',participantTitle:'참여자 추가',addBtn:'+ 참여자 추가',workHoursLabel:'근무 시간:',workHoursUnit:'시 (각 로컬 기준)',planBtn:'최적 시간 찾기',timelineTitle:'24시간 근무 현황 (UTC 기준)',legendWork:'근무 시간',legendOverlap:'모두 근무 (최적)',legendOff:'비근무',bestSlotsTitle:'추천 회의 시간 (UTC)',namePlaceholder:'이름',seoHtml:`<h2>시간대 회의 플래너란?</h2><p>글로벌 팀원들의 시간대를 입력해 모든 참여자가 근무 중인 겹치는 시간을 시각적으로 찾는 도구입니다. 서울, 뉴욕, 런던, 도쿄 등 세계 주요 도시 시간대를 지원하며, 24시간 타임라인으로 근무 시간 겹침을 한눈에 확인할 수 있습니다. 한국-미국 협업, 유럽-아시아 팀 회의 계획에 특히 유용합니다.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. 한국과 미국(동부)의 최적 회의 시간은?</summary><p>A. 서울-뉴욕 시차는 14시간(EDT). 서울 오전 8시 = 뉴욕 전날 오후 6시. 양쪽이 약간 양보해야 합니다.</p></details><details class="faq-item"><summary>Q. 모든 시간대가 겹치는 시간이 없으면?</summary><p>A. 한쪽이 초과 근무를 해야 합니다. 돌아가며 부담을 나누는 것을 권장합니다.</p></details><details class="faq-item"><summary>Q. 시간대 offset은 어떻게 계산하나요?</summary><p>A. UTC 기준 +/-로 표시됩니다. 한국은 UTC+9, 뉴욕은 UTC-5(EST) 또는 UTC-4(EDT).</p></details><details class="faq-item"><summary>Q. 서머타임(DST)은 반영되나요?</summary><p>A. 이 도구는 표준 오프셋 기준입니다. 서머타임 기간에는 1시간 차이가 발생할 수 있습니다.</p></details><details class="faq-item"><summary>Q. 최대 몇 명까지 추가할 수 있나요?</summary><p>A. 제한 없습니다. 하지만 많은 시간대일수록 겹치는 시간이 줄어듭니다.</p></details><details class="faq-item"><summary>Q. 서울-런던 최적 시간은?</summary><p>A. 시차 9시간. 서울 오후 5시 = 런던 오전 8시. 이 구간이 비교적 적합합니다.</p></details><details class="faq-item"><summary>Q. 서울-시드니 최적 시간은?</summary><p>A. 시차 1-2시간. 가장 협업하기 쉬운 조합 중 하나입니다.</p></details><details class="faq-item"><summary>Q. 비동기 협업이 더 나을 때는?</summary><p>A. 시간대 차이가 8시간 이상이고 겹치는 근무 시간이 1시간 미만이면 비동기 협업을 권장합니다.</p></details>`},
  en:{pageTitle:'Time Zone Meeting Planner | Modoo Tools',h1:'🌍 Time Zone Meeting Planner',sub:'Find the best meeting time for global teams',backLink:'← All Tools',langBtn:'🌐 中文',participantTitle:'Add Participants',addBtn:'+ Add Participant',workHoursLabel:'Work Hours:',workHoursUnit:'(local time)',planBtn:'Find Best Time',timelineTitle:'24h Work Overview (UTC)',legendWork:'Working',legendOverlap:'All Working (Best)',legendOff:'Off',bestSlotsTitle:'Recommended Meeting Times (UTC)',namePlaceholder:'Name',seoHtml:`<h2>Time Zone Meeting Planner</h2><p>Add participants from different cities to visually find overlapping working hours for a meeting. Supports major world cities including Seoul, New York, London, Tokyo, and Sydney. The 24-hour timeline shows working hours for all participants at a glance. Especially useful for Korea-US, Europe-Asia, and multi-continent team scheduling.</p><h2 class="seo-sub">FAQ</h2><details class="faq-item"><summary>Q. Best meeting time for Seoul and New York (EST)?</summary><p>A. 14-hour difference. Seoul 8am = New York 6pm previous day. One side has to compromise.</p></details><details class="faq-item"><summary>Q. What if there is no overlap?</summary><p>A. Someone has to work outside normal hours. Rotate the burden fairly.</p></details><details class="faq-item"><summary>Q. How are time zone offsets calculated?</summary><p>A. Based on UTC offset. Korea is UTC+9, New York is UTC-5 (EST) or UTC-4 (EDT).</p></details><details class="faq-item"><summary>Q. Does this handle DST (daylight saving time)?</summary><p>A. This tool uses standard offsets. During DST periods, actual offsets may differ by 1 hour.</p></details><details class="faq-item"><summary>Q. How many participants can I add?</summary><p>A. No limit, but more time zones means less overlap.</p></details><details class="faq-item"><summary>Q. Best time for Seoul-London meetings?</summary><p>A. 9-hour difference. Seoul 5pm = London 8am. That window works for both sides.</p></details><details class="faq-item"><summary>Q. Best time for Seoul-Sydney meetings?</summary><p>A. Only 1-2 hour difference — one of the easiest pairs to schedule.</p></details><details class="faq-item"><summary>Q. When should I use async instead?</summary><p>A. If the time difference is 8+ hours with less than 1 hour of overlap, async collaboration is usually better.</p></details>`},
  zh:{pageTitle:'时区会议规划器 | Modoo工具',h1:'🌍 时区会议规划器',sub:'为全球团队找到最佳会议时间',backLink:'← 首页',langBtn:'🌐 日本語',participantTitle:'添加参与者',addBtn:'+ 添加参与者',workHoursLabel:'工作时间：',workHoursUnit:'（当地时间）',planBtn:'查找最佳时间',timelineTitle:'24小时工作概览（UTC）',legendWork:'工作中',legendOverlap:'全员在线（最佳）',legendOff:'休息',bestSlotsTitle:'推荐会议时间（UTC）',namePlaceholder:'姓名',seoHtml:`<h2>时区会议规划器</h2><p>添加来自不同城市的参与者，可视化找到所有人都在工作的时间段。支持首尔、纽约、伦敦、东京、悉尼等主要城市时区。24小时时间轴一目了然显示各参与者的工作时间。特别适合中韩、欧亚、跨洲团队会议安排。</p><h2 class="seo-sub">常见问题</h2><details class="faq-item"><summary>Q. 首尔和纽约（EST）最佳会议时间？</summary><p>A. 时差14小时。首尔上午8点=纽约前一天下午6点，双方都需要妥协。</p></details><details class="faq-item"><summary>Q. 没有重叠时间怎么办？</summary><p>A. 必须有一方在非工作时间开会，建议轮流承担。</p></details><details class="faq-item"><summary>Q. 时区偏移如何计算？</summary><p>A. 以UTC为基准。韩国UTC+9，纽约UTC-5（EST）或UTC-4（EDT）。</p></details><details class="faq-item"><summary>Q. 支持夏令时吗？</summary><p>A. 本工具使用标准时区偏移，夏令时期间实际偏移可能相差1小时。</p></details><details class="faq-item"><summary>Q. 最多添加多少人？</summary><p>A. 无限制，但时区越多，重叠时间越少。</p></details><details class="faq-item"><summary>Q. 北京和伦敦最佳会议时间？</summary><p>A. 时差8小时。北京下午4点=伦敦上午8点，较为合适。</p></details><details class="faq-item"><summary>Q. 北京和悉尼最佳时间？</summary><p>A. 时差仅2小时，是最容易协调的时区组合之一。</p></details><details class="faq-item"><summary>Q. 什么情况下选择异步协作？</summary><p>A. 时差超过8小时且重叠不足1小时时，建议采用异步协作方式。</p></details>`},
  ja:{pageTitle:'タイムゾーン会議プランナー | Modooツール',h1:'🌍 タイムゾーン会議プランナー',sub:'グローバルチームの最適な会議時間を見つけます',backLink:'← ホーム',langBtn:'🌐 한국어',participantTitle:'参加者を追加',addBtn:'+ 参加者を追加',workHoursLabel:'勤務時間：',workHoursUnit:'（現地時間）',planBtn:'最適な時間を探す',timelineTitle:'24時間勤務状況（UTC基準）',legendWork:'勤務中',legendOverlap:'全員勤務中（最適）',legendOff:'非勤務',bestSlotsTitle:'推奨会議時間（UTC）',namePlaceholder:'名前',seoHtml:`<h2>タイムゾーン会議プランナーとは</h2><p>異なる都市の参加者を追加して、全員が勤務中の時間を視覚的に見つけるツールです。ソウル・ニューヨーク・ロンドン・東京・シドニーなど主要都市のタイムゾーンに対応。24時間タイムラインで勤務時間の重複を一目で確認できます。日韓・アジア欧米チームのスケジュール調整に特に役立ちます。</p><h2 class="seo-sub">よくある質問</h2><details class="faq-item"><summary>Q. 東京とニューヨーク（EST）の最適会議時間は？</summary><p>A. 時差14時間。東京午前8時＝ニューヨーク前日午後6時。どちらかが妥協する必要があります。</p></details><details class="faq-item"><summary>Q. 重複時間がない場合は？</summary><p>A. どちらかが通常勤務時間外に会議する必要があります。交互に負担を分かち合うことを推奨します。</p></details><details class="faq-item"><summary>Q. タイムゾーンオフセットの計算方法は？</summary><p>A. UTCを基準にしています。日本はUTC+9、ニューヨークはUTC-5（EST）またはUTC-4（EDT）。</p></details><details class="faq-item"><summary>Q. サマータイム（DST）は考慮されますか？</summary><p>A. このツールは標準オフセットを使用します。DST期間中は実際のオフセットが1時間ずれる場合があります。</p></details><details class="faq-item"><summary>Q. 最大何人まで追加できますか？</summary><p>A. 制限はありませんが、タイムゾーンが増えるほど重複時間は減ります。</p></details><details class="faq-item"><summary>Q. 東京とロンドンの最適時間は？</summary><p>A. 時差9時間。東京午後5時＝ロンドン午前8時が双方にとって比較的適切です。</p></details><details class="faq-item"><summary>Q. 東京とシドニーの最適時間は？</summary><p>A. 時差わずか1-2時間。最も調整しやすい組み合わせの1つです。</p></details><details class="faq-item"><summary>Q. 非同期コラボレーションが向いている場合は？</summary><p>A. 時差が8時間以上で重複が1時間未満の場合、非同期での協業を推奨します。</p></details>`}
};

let currentLang='ko';
let participants=[
  {name:'서울',zone:0},
  {name:'뉴욕',zone:8},
];

function detectLang(){const p=new URLSearchParams(location.search).get('lang');if(p&&_i18n[p])return p;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
function applyLang(l){const t=_i18n[l]||_i18n.ko;document.title=t.pageTitle;document.documentElement.lang=l;document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});document.getElementById('seoContent').innerHTML=t.seoHtml||'';renderParticipants();}
function toggleLang(){const order=['ko','en','zh','ja'];const next=order[(order.indexOf(currentLang)+1)%order.length];currentLang=next;localStorage.setItem('modoo_lang',next);const url=new URL(location.href);url.searchParams.set('lang',next);history.replaceState(null,'',url);applyLang(next);}
currentLang=detectLang();
document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));

function addParticipant(){participants.push({name:'',zone:0});renderParticipants();}
function removeParticipant(i){participants.splice(i,1);renderParticipants();}
function updateName(i,v){participants[i].name=v;}
function updateZone(i,v){participants[i].zone=parseInt(v);}

function renderParticipants(){
  const t=_i18n[currentLang]||_i18n.ko;
  const list=document.getElementById('participantList');
  list.innerHTML='';
  participants.forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='participant-row';
    const nameInput=document.createElement('input');
    nameInput.type='text';nameInput.value=p.name;nameInput.placeholder=t.namePlaceholder;
    nameInput.oninput=e=>updateName(i,e.target.value);
    const zoneSelect=document.createElement('select');
    zoneSelect.onchange=e=>updateZone(i,e.target.value);
    ZONES.forEach((z,zi)=>{
      const opt=document.createElement('option');
      opt.value=zi;opt.textContent=z.label;
      if(zi===p.zone)opt.selected=true;
      zoneSelect.appendChild(opt);
    });
    const delBtn=document.createElement('button');
    delBtn.className='del-btn';delBtn.textContent='×';
    delBtn.onclick=()=>removeParticipant(i);
    row.appendChild(nameInput);row.appendChild(zoneSelect);
    if(participants.length>1)row.appendChild(delBtn);
    list.appendChild(row);
  });
}

function plan(){
  const workStart=parseInt(document.getElementById('workStart').value)||9;
  const workEnd=parseInt(document.getElementById('workEnd').value)||18;
  // For each UTC hour (0-23), check how many participants are working
  const utcHours=Array(24).fill(0);
  const participantHours=participants.map(p=>{
    const zone=ZONES[p.zone];
    const off=zone.off;
    const working=Array(24).fill(false);
    for(let utc=0;utc<24;utc++){
      let local=utc+off;
      if(local<0)local+=24;
      if(local>=24)local-=24;
      if(local>=workStart&&local<workEnd)working[utc]=true;
    }
    return working;
  });
  // Count overlap
  for(let utc=0;utc<24;utc++){
    utcHours[utc]=participantHours.every(w=>w[utc])?2:participantHours.some(w=>w[utc])?1:0;
  }

  // Build timeline header
  const tlHours=document.getElementById('tlHours');
  tlHours.innerHTML='';
  for(let h=0;h<24;h++){
    const d=document.createElement('div');
    d.className='tl-hour';
    d.textContent=h+'h';
    tlHours.appendChild(d);
  }

  // Build rows
  const tlRows=document.getElementById('tlRows');
  tlRows.innerHTML='';
  participants.forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='timeline-row';
    const nameEl=document.createElement('div');
    nameEl.className='tl-name';
    nameEl.textContent=(p.name||ZONES[p.zone].label.split(' ')[0])+' ('+ZONES[p.zone].label.split('(')[1].replace(')','') + ')';
    const blocks=document.createElement('div');
    blocks.className='tl-blocks';
    for(let utc=0;utc<24;utc++){
      const b=document.createElement('div');
      b.className='tl-block ';
      if(participantHours[i][utc]&&utcHours[utc]===2)b.className+='block-overlap';
      else if(participantHours[i][utc])b.className+='block-work';
      else b.className+='block-off';
      blocks.appendChild(b);
    }
    row.appendChild(nameEl);row.appendChild(blocks);
    tlRows.appendChild(row);
  });

  // Best slots
  const bestSlots=document.getElementById('bestSlots');
  bestSlots.innerHTML='';
  let overlapSlots=[];
  for(let h=0;h<24;h++){if(utcHours[h]===2)overlapSlots.push(h);}
  if(overlapSlots.length===0){
    bestSlots.innerHTML='<span style="color:var(--text-muted);font-size:13px;">겹치는 근무 시간 없음 — 한쪽이 양보 필요</span>';
  } else {
    // Group consecutive
    let groups=[];let cur=[overlapSlots[0]];
    for(let i=1;i<overlapSlots.length;i++){
      if(overlapSlots[i]===overlapSlots[i-1]+1)cur.push(overlapSlots[i]);
      else{groups.push(cur);cur=[overlapSlots[i]];}
    }
    groups.push(cur);
    groups.forEach(g=>{
      const chip=document.createElement('div');
      chip.className='slot-chip';
      chip.textContent=`UTC ${g[0]}:00 – ${g[g.length-1]+1}:00`;
      bestSlots.appendChild(chip);
    });
  }
  document.getElementById('resultCard').style.display='block';
}
</script>
<script src="related.js"></script>
</body>
</html>
