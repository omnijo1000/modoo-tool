const _i18n = {

    seoHtml: `<h2>XML 사이트맵이란?</h2><p>XML 사이트맵은 웹사이트의 모든 URL 목록을 담은 파일로, <strong>검색 엔진 크롤러가 사이트 구조를 파악하고 중요한 페이지를 빠짐없이 발견</strong>할 수 있도록 안내합니다. Google, Bing 등 주요 검색 엔진이 지원하며, 사이트맵을 제출하면 새 콘텐츠가 더 빠르게 인덱싱됩니다. 각 URL에 priority(중요도), changefreq(변경 빈도), lastmod(최종 수정일)를 명시해 크롤러에게 추가 정보를 제공할 수 있습니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>XML 사이트맵이란 무엇인가요?</summary><p>XML 사이트맵은 사이트에 포함된 URL 목록을 XML 형식으로 정리한 파일입니다. 검색 엔진은 이 파일을 읽어 어떤 페이지가 존재하는지, 언제 업데이트되었는지 파악합니다. 특히 내부 링크가 적거나 사이트 규모가 큰 경우 크롤링 효율을 높이는 데 효과적입니다.</p></details>
<details class="faq-item"><summary>priority 값은 어떻게 설정하나요?</summary><p>priority는 0.0~1.0 사이 값으로, 동일 사이트 내 URL의 상대적 중요도를 나타냅니다. 홈페이지는 1.0, 주요 카테고리·서비스 페이지는 0.8, 일반 콘텐츠는 0.5, 아카이브나 태그 페이지는 0.3 이하를 권장합니다. Google이 이 값을 절대적 기준으로 따르지는 않지만 크롤링 우선순위에 참고합니다.</p></details>
<details class="faq-item"><summary>changefreq는 무엇을 의미하나요?</summary><p>changefreq는 해당 페이지가 얼마나 자주 업데이트되는지 크롤러에게 알려주는 힌트입니다. always, hourly, daily, weekly, monthly, yearly, never 중 선택합니다. 뉴스나 블로그 최신 글은 daily, 정적 페이지는 monthly를 권장합니다. 실제 업데이트 빈도와 크게 다르면 크롤러 신뢰도가 낮아질 수 있습니다.</p></details>
<details class="faq-item"><summary>Google Search Console에 사이트맵을 제출하는 방법은?</summary><p>Google Search Console → 색인 → Sitemaps 메뉴에서 사이트맵 URL(예: https://example.com/sitemap.xml)을 입력하고 제출합니다. 또는 robots.txt에 Sitemap: https://example.com/sitemap.xml 을 추가하면 Googlebot이 자동으로 발견합니다.</p></details>
<details class="faq-item"><summary>사이트맵 인덱스(Sitemap Index)란?</summary><p>사이트맵 인덱스는 여러 사이트맵 파일을 하나로 묶는 상위 사이트맵입니다. 단일 사이트맵은 최대 50,000개 URL, 50MB 제한이 있으므로 대형 사이트는 사이트맵을 분할하고 인덱스 파일로 연결합니다. &lt;sitemapindex&gt; 태그를 사용합니다.</p></details>
<details class="faq-item"><summary>robots.txt에 사이트맵을 선언해야 하나요?</summary><p>필수는 아니지만 권장합니다. robots.txt 하단에 Sitemap: https://example.com/sitemap.xml 을 추가하면 Googlebot, Bingbot 등이 robots.txt를 파싱할 때 사이트맵을 자동으로 발견합니다. Search Console에 제출하는 방법과 병행하면 더욱 효과적입니다.</p></details>
<details class="faq-item"><summary>동적 사이트맵과 정적 사이트맵의 차이는?</summary><p>정적 사이트맵은 미리 생성한 XML 파일로, 소규모 사이트나 변경이 적은 사이트에 적합합니다. 동적 사이트맵은 서버에서 실시간으로 생성되므로 콘텐츠가 자주 업데이트되는 대형 사이트(뉴스, 쇼핑몰 등)에 적합하며, 항상 최신 URL 목록을 유지할 수 있습니다.</p></details>

const LANGS = ['ko','en','zh','ja'];
let _lang = 'ko';
let urls = []; // {loc, priority, changefreq, lastmod}

function detectLang(){
  const u = new URLSearchParams(location.search).get('lang');
  if(u && _i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if(s && _i18n[s]) return s;
  const n = (navigator.language||'').slice(0,2);
  return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';
}

function cycleLang(){
  const idx = LANGS.indexOf(_lang);
  _lang = LANGS[(idx+1) % LANGS.length];
  localStorage.setItem('modoo_lang', _lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', _lang);
  history.replaceState({},'',url);
  applyLang();
}

function applyLang(){
  const t = _i18n[_lang];
  document.documentElement.lang = _lang;
  document.title = t.pageTitle;
  document.getElementById('h1El').innerHTML = t.h1;
  document.getElementById('subEl').textContent = t.sub;
  document.getElementById('backLink').textContent = t.backLink;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('builderTitle').textContent = t.builderTitle;
  document.getElementById('labelBaseUrl').textContent = t.labelBaseUrl;
  document.getElementById('addRowLabel').textContent = t.addRowLabel;
  document.getElementById('quickAddLabel').textContent = t.quickAddLabel;
  document.getElementById('btnAdd').textContent = t.btnAdd;
  document.getElementById('btnAutoGen').textContent = t.btnAutoGen;
  document.getElementById('btnClear').textContent = t.btnClear;
  document.getElementById('btnCopyXml').textContent = t.btnCopyXml;
  document.getElementById('btnDownload').textContent = t.btnDownload;
  document.getElementById('outputLabel').textContent = t.outputLabel;
  document.getElementById('pathInput').placeholder = t.placeholderPath;
  document.getElementById('seoDiv').innerHTML = t.seoHtml;
  renderStats();
  renderUrlList();
  renderQuickChips();
}

function renderQuickChips(){
  document.getElementById('quickChips').innerHTML = QUICK_PATHS.map(p =>
    `<button class="chip" onclick="addQuickPath('${p}')">${p}</button>`
  ).join('');
}

function onBaseUrlInput(){
  generateXml();
}

function getBaseUrl(){
  return document.getElementById('baseUrl').value.trim().replace(/\/+$/,'');
}

function addQuickPath(path){
  const base = getBaseUrl();
  if(!base){ document.getElementById('baseUrl').focus(); return; }
  const loc = base + path;
  if(urls.find(u=>u.loc===loc)) return;
  const lastmod = todayStr();
  const prio = path==='/'?'1.0':'0.8';
  const freq = path==='/'?'daily':'monthly';
  urls.push({loc, priority:prio, changefreq:freq, lastmod});
  renderUrlList();
  renderStats();
  generateXml();
}

function addUrl(){
  const base = getBaseUrl();
  const path = document.getElementById('pathInput').value.trim();
  if(!base){ document.getElementById('baseUrl').focus(); return; }
  if(!path){ document.getElementById('pathInput').focus(); return; }
  const loc = base + (path.startsWith('/')?path:'/'+path);
  if(urls.find(u=>u.loc===loc)) return;
  const priority = document.getElementById('prioritySelect').value;
  const changefreq = document.getElementById('changefreqSelect').value;
  const lastmod = document.getElementById('lastmodInput').value;
  urls.push({loc, priority, changefreq, lastmod});
  document.getElementById('pathInput').value = '';
  renderUrlList();
  renderStats();
  generateXml();
}

function autoGenerate(){
  const base = getBaseUrl();
  if(!base){ document.getElementById('baseUrl').focus(); return; }
  const today = todayStr();
  AUTO_PATHS.forEach(({path, priority, changefreq}) => {
    const loc = base + path;
    if(!urls.find(u=>u.loc===loc)){
      urls.push({loc, priority, changefreq, lastmod: today});
    }
  });
  renderUrlList();
  renderStats();
  generateXml();
}

function deleteUrl(idx){
  urls.splice(idx,1);
  renderUrlList();
  renderStats();
  generateXml();
}

function renderUrlList(){
  const container = document.getElementById('urlList');
  if(urls.length===0){
    container.innerHTML = `<div class="empty-list">${_i18n[_lang].emptyList}</div>`;
    return;
  }
  container.innerHTML = urls.map((u,i) => `
    <div class="url-item">
      <span class="url-loc" title="${escHtml(u.loc)}">${escHtml(u.loc)}</span>
      <span class="url-meta">${u.priority} · ${u.changefreq}${u.lastmod?' · '+u.lastmod:''}</span>
      <button class="url-del" onclick="deleteUrl(${i})" title="Delete">×</button>
    </div>
  `).join('');
}

function renderStats(){
  document.getElementById('statsEl').innerHTML = _i18n[_lang].statsText(urls.length);
}

function generateXml(){
  let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
  xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';
  urls.forEach(u => {
    xml += '  <url>\n';
    xml += `    <loc>${escXml(u.loc)}</loc>\n`;
    if(u.lastmod) xml += `    <lastmod>${u.lastmod}</lastmod>\n`;
    if(u.changefreq) xml += `    <changefreq>${u.changefreq}</changefreq>\n`;
    if(u.priority) xml += `    <priority>${u.priority}</priority>\n`;
    xml += '  </url>\n';
  });
  xml += '</urlset>';
  document.getElementById('outputTa').value = xml;
  return xml;
}

function escXml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyXml(){
  const text = document.getElementById('outputTa').value;
  if(!text) return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('btnCopyXml');
    const t = _i18n[_lang];
    btn.textContent = t.copyDone;
    btn.style.background = 'var(--green)';
    btn.style.borderColor = 'var(--green)';
    btn.style.color = '#000';
    setTimeout(()=>{
      btn.textContent = t.btnCopyXml;
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 2000);
  }).catch(()=>{
    document.getElementById('outputTa').select();
    document.execCommand('copy');
  });
}

function downloadSitemap(){
  const text = document.getElementById('outputTa').value;
  if(!text) return;
  const blob = new Blob([text], {type:'application/xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sitemap.xml';
  a.click();
  URL.revokeObjectURL(a.href);
}

function clearAll(){
  urls = [];
  document.getElementById('baseUrl').value = '';
  document.getElementById('pathInput').value = '';
  document.getElementById('outputTa').value = '';
  renderUrlList();
  renderStats();
}

function todayStr(){
  return new Date().toISOString().slice(0,10);
}

// Set default lastmod to today
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('lastmodInput').value = todayStr();
});

_lang = detectLang();
applyLang();
generateXml();
</script>
