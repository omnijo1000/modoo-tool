  ko:{pageTitle:'유니코드 → 텍스트 변환 - \\uXXXX 디코딩 | MODOO HUB',h1b:'텍스트',sub:'\\uXXXX·U+XXXX·HTML엔티티 자동 감지 후 원래 텍스트로 복원',backLink:'← 모두의 툴',langBtn:'🌐 EN',inputLabel:'유니코드 입력',outputLabel:'변환 결과',placeholder:'\\uAC00\\uB098\\ub2e4 or U+AC00 or &#44032;',copied:'✓ 복사됨',

<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What formats are supported?</summary><p>\\uXXXX (JS/Java), \\u{XXXXX} (ES6+), U+XXXX (Unicode standard), &#XXXX; (HTML decimal), &#xXXXX; (HTML hex), \\UXXXXXXXX (Python).</p></details>
<details class="faq-item"><summary>Can I mix formats in one input?</summary><p>Yes — multiple formats can be mixed in a single input and all will be decoded.</p></details>

<details class="faq-item"><summary>Are emoji decoded?</summary><p>Yes — \\u{1F389} decodes to 🎉.</p></details>

  zh:{pageTitle:'Unicode转文本 - 解码\\uXXXX转义序列 | MODOO HUB',h1b:'文本',sub:'自动识别\\uXXXX·U+XXXX·HTML实体并解码为原始文本',backLink:'← 所有工具',langBtn:'🌐 日本語',inputLabel:'Unicode输入',outputLabel:'解码结果',placeholder:'\\uAC00\\uB098\\ub2e4 或 U+AC00 或 &#44032;',copied:'✓ 已复制',

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function decode(){
  const raw=document.getElementById('inputArea').value;
  let out=raw;
  out=out.replace(/\\u\{([0-9a-fA-F]+)\}/g,(_,h)=>{try{return String.fromCodePoint(parseInt(h,16));}catch{return _;}});
  out=out.replace(/\\u([0-9a-fA-F]{4})/g,(_,h)=>String.fromCodePoint(parseInt(h,16)));
  out=out.replace(/\\U([0-9a-fA-F]{8})/g,(_,h)=>{try{return String.fromCodePoint(parseInt(h,16));}catch{return _;}});
  out=out.replace(/U\+([0-9a-fA-F]{4,6})/g,(_,h)=>{try{return String.fromCodePoint(parseInt(h,16));}catch{return _;}});
  out=out.replace(/&#([0-9]+);/g,(_,d)=>{try{return String.fromCodePoint(parseInt(d,10));}catch{return _;}});
  out=out.replace(/&#x([0-9a-fA-F]+);/g,(_,h)=>{try{return String.fromCodePoint(parseInt(h,16));}catch{return _;}});
  document.getElementById('outputArea').value=out;
  const tags=document.getElementById('formatTags');
  tags.innerHTML=FORMATS.map(f=>`<span class="ftag${f.re.test(raw)?' detected':''}">${f.label}</span>`).join('');
}
function copyOut(){navigator.clipboard.writeText(document.getElementById('outputArea').value);}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('inputLabel').textContent=t.inputLabel;document.getElementById('outputLabel').textContent=t.outputLabel;
  document.getElementById('inputArea').placeholder=t.placeholder;document.getElementById('seoDiv').innerHTML=t.seoHtml;decode();
}
_lang=detectLang();applyLang();
