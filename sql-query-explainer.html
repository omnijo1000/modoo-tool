<details class="faq-item"><summary>What SQL statements are supported?</summary><p>SELECT, INSERT, UPDATE, DELETE, CREATE and other major DML/DDL statements.</p></details>

<details class="faq-item"><summary>Does it distinguish JOIN types?</summary><p>Yes — INNER JOIN, LEFT JOIN, and RIGHT JOIN are each described differently.</p></details>

<details class="faq-item"><summary>Will it fix SQL errors?</summary><p>No — the focus is structural analysis and explanation, not error correction.</p></details>
<details class="faq-item"><summary>Is it free?</summary><p>Yes, fully free — no data is sent to any server.</p></details>`

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;['h1Accent','subEl','backLink','langBtn','btnExplain','btnSample','btnClear'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});document.getElementById('seoDiv').innerHTML=t.seoHtml;if(!document.getElementById('sqlIn').value)document.getElementById('resultArea').innerHTML='';}
const CLAUSE_ORDER=['WITH','CREATE','INSERT','UPDATE','DELETE','SELECT','FROM','JOIN','LEFT JOIN','RIGHT JOIN','INNER JOIN','WHERE','GROUP BY','HAVING','ORDER BY','LIMIT','OFFSET'];
const CLAUSE_BADGE={'SELECT':'badge-select','FROM':'badge-from','JOIN':'badge-join','LEFT JOIN':'badge-join','RIGHT JOIN':'badge-join','INNER JOIN':'badge-join','WHERE':'badge-where','GROUP BY':'badge-group','HAVING':'badge-having','ORDER BY':'badge-order','LIMIT':'badge-limit','OFFSET':'badge-limit','INSERT':'badge-insert','UPDATE':'badge-update','DELETE':'badge-delete','CREATE':'badge-create','WITH':'badge-other'};
function parseSQL(sql){
  const norm=sql.replace(/\s+/g,' ').trim();
  const results=[];
  const re=new RegExp(`\\b(${CLAUSE_ORDER.map(c=>c.replace(' ','\\s+')).join('|')})\\b`,'gi');
  const matches=[];let m;while((m=re.exec(norm))!==null)matches.push({key:m[1].toUpperCase().replace(/\s+/,' '),idx:m.index});
  for(let i=0;i<matches.length;i++){
    const {key,idx}=matches[i];const end=i+1<matches.length?matches[i+1].idx:norm.length;
    const raw=norm.slice(idx+key.length,end).trim();
    results.push({key,val:raw||'—'});
  }
  return results;
}
function explain(){
  const t=_i18n[_lang];const sql=document.getElementById('sqlIn').value.trim();
  if(!sql){document.getElementById('resultArea').innerHTML=`<div class="empty-msg">${t.emptyMsg}</div>`;return;}
  const clauses=parseSQL(sql);
  if(!clauses.length){document.getElementById('resultArea').innerHTML=`<div class="empty-msg">${t.emptyMsg}</div>`;return;}
  const html=clauses.map(({key,val})=>{
    const cdef=t.clauses[key]||{label:key,desc:(v)=>v,detail:()=>''};
    const badge=CLAUSE_BADGE[key]||'badge-other';
    const desc=cdef.desc(val);const detail=cdef.detail(val);
    return`<div class="clause-card"><span class="clause-badge ${badge}">${cdef.label||key}</span><div class="clause-body"><div class="clause-code">${val}</div><div class="clause-desc">${desc}</div>${detail?`<div class="clause-detail">${detail}</div>`:''}</div></div>`;
  }).join('');
  document.getElementById('resultArea').innerHTML=html;
}
let _autoTimer=null;
function autoExplain(){clearTimeout(_autoTimer);_autoTimer=setTimeout(explain,500);}
function loadSample(){document.getElementById('sqlIn').value=`SELECT u.name, COUNT(o.id) AS order_count\nFROM users u\nLEFT JOIN orders o ON u.id = o.user_id\nWHERE u.active = 1\nGROUP BY u.id\nHAVING COUNT(o.id) > 5\nORDER BY order_count DESC\nLIMIT 10`;explain();}
