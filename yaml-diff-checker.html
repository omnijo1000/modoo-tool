<details class="faq-item"><summary>Can I export results?</summary><p>Yes — use browser print to save as PDF or copy the text.</p></details>`

  zh:{h1Accent:'Diff比较器',sub:'输入两个YAML即时比较并高亮显示添加、删除和更改的项目',backLink:'← 所有工具',langBtn:'🌐 日本語',

    seoHtml:`<h2>YAML Diff比较器</h2><p>输入两个YAML文件即时比较，用颜色标出添加、删除和更改的键值。适用于Kubernetes清单、Helm图表、Docker Compose和CI/CD YAML比较。</p>

<details class="faq-item"><summary>YAML Diff在哪里使用？</summary><p>Kubernetes清单变更、Helm图表值比较、CI/CD流水线更新检查。</p></details>
<details class="faq-item"><summary>会检测缩进差异吗？</summary><p>此工具按语义解析YAML，仅有缩进风格不同时不会显示差异。</p></details>

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblLeft','lblRight','btnDiff','btnSample','btnClear','lgAdd','lgDel','lgChg'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function parseSimpleYaml(str){
  const obj={};
  str.split('\n').forEach(line=>{
    const m=line.match(/^(\s*)([\w.\-]+)\s*:\s*(.*)$/);
    if(m){const key=m[2].trim(),val=m[3].trim();obj[key]=val===''?{}:isNaN(val)?val==='true'?true:val==='false'?false:val:Number(val);}
  });
  return obj;
}
function flattenObj(obj,prefix=''){
  const res={};
  for(const [k,v] of Object.entries(obj)){
    const key=prefix?`${prefix}.${k}`:k;
    if(v&&typeof v==='object'&&!Array.isArray(v))Object.assign(res,flattenObj(v,key));
    else res[key]=JSON.stringify(v);
  }
  return res;
}
function diff(){
  const t=_i18n[_lang];
  const a=flattenObj(parseSimpleYaml(document.getElementById('yamlA').value));
  const b=flattenObj(parseSimpleYaml(document.getElementById('yamlB').value));
  const allKeys=new Set([...Object.keys(a),...Object.keys(b)]);
  const lines=[];let addC=0,delC=0,chgC=0;
  [...allKeys].sort().forEach(k=>{
    if(!(k in a)){lines.push({cls:'diff-add',text:`+ ${k}: ${b[k]}`});addC++;}
    else if(!(k in b)){lines.push({cls:'diff-del',text:`- ${k}: ${a[k]}`});delC++;}
    else if(a[k]!==b[k]){lines.push({cls:'diff-chg',text:`~ ${k}: ${a[k]} → ${b[k]}`});chgC++;}
    else lines.push({cls:'diff-same',text:`  ${k}: ${a[k]}`});
  });
  document.getElementById('legendEl').style.display='flex';
  document.getElementById('diffBox').style.display='block';
  document.getElementById('diffLines').innerHTML=lines.map(l=>`<div class="diff-line ${l.cls}">${l.text}</div>`).join('');
  document.getElementById('statsBar').innerHTML=`<span class="stat-add">${t.stats(addC,0,0).split('  ')[0]}</span><span class="stat-del">${t.stats(0,delC,0).split('  ')[1]}</span><span class="stat-chg">${t.stats(0,0,chgC).split('  ')[2]}</span>`;
}
