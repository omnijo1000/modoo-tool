<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2e2e2e;--accent:#38bdf8;--text:#f0f0f0;--text-muted:#888;--text-dim:#555;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif;min-height:100vh;}
header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
main{max-width:720px;margin:0 auto;padding:48px 24px;}
h1{font-size:28px;font-weight:900;margin-bottom:8px;}
h1 span{color:var(--accent);}
.subtitle{font-size:13px;color:var(--text-muted);margin-bottom:28px;line-height:1.6;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;color:var(--text);font-size:14px;font-family:'Noto Sans',sans-serif;line-height:1.8;outline:none;resize:vertical;min-height:160px;transition:border-color 0.2s;margin-bottom:16px;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--text-dim);}
.opt-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.opt-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);}
.opt-item input[type=number]{width:60px;background:#111;border:1px solid var(--border);border-radius:8px;padding:6px 8px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;outline:none;}
.opt-item input[type=checkbox]{accent-color:var(--accent);}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.tool-btn{background:#111;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans',sans-serif;transition:all 0.15s;}
.tool-btn:hover{border-color:var(--accent);color:var(--accent);}
.tool-btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.tool-btn.primary:hover{opacity:0.85;}
.col-label{font-size:11px;color:var(--text-dim);margin-bottom:8px;font-family:'DM Mono',monospace;letter-spacing:0.08em;}
.kw-table{width:100%;border-collapse:collapse;margin-bottom:24px;}
.kw-table th{background:#111;color:var(--text-dim);font-size:11px;font-family:'DM Mono',monospace;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);}
.kw-table td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.kw-table td:first-child{font-family:'DM Mono',monospace;color:var(--text);}
.kw-table td:nth-child(2){color:var(--accent);font-family:'DM Mono',monospace;font-weight:700;}
.kw-table td:nth-child(3){color:var(--text-muted);font-family:'DM Mono',monospace;}
.bar-wrap{background:#111;border-radius:4px;height:8px;min-width:60px;flex:1;}
.bar-fill{height:100%;border-radius:4px;background:var(--accent);}
.bar-cell{display:flex;align-items:center;gap:8px;}
.seo{margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}
.seo h2{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
.seo strong{color:var(--text-muted);}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:48px;padding:24px;}
.back-link{margin-left:auto;font-size:13px;color:var(--text-muted);text-decoration:none;}
.back-link:hover{color:var(--accent);}
.lang-toggle{margin-left:4px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;transition:all 0.15s;}
.lang-toggle:hover{border-color:var(--accent);color:var(--accent);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
.header-label{font-size:13px;color:var(--text-muted);letter-spacing:0.1em;font-family:'DM Mono',monospace;}

<body>
<header>
  <div class="dot"></div>
  <span class="header-label">MODOO HUB</span>
  <a href="index.html" class="back-link">← 모두의 툴</a>
  <div class="lang-toggle" onclick="cycleLang()" id="langBtn">🌐 EN</div>
</header>
<main>
  <h1>Keyword <span>Density</span></h1>
  <p class="subtitle" data-i18n="sub">Analyze keyword frequency and density in your text.</p>

  <textarea id="inputArea" placeholder="Paste your article or text here..."></textarea>

  <div class="opt-row">
    <div class="opt-item"><span data-i18n="optMinLen">Min word length:</span><input type="number" id="optMinLen" value="3" min="1"></div>
    <div class="opt-item"><label style="display:flex;gap:6px;align-items:center;cursor:pointer"><input type="checkbox" id="optStopwords" checked><span data-i18n="optStop">Ignore stopwords</span></label></div>
  </div>

  <div class="toolbar">
    <button class="tool-btn primary" onclick="analyze()" data-i18n="btnAnalyze">Analyze</button>
    <button class="tool-btn" onclick="clearAll()" data-i18n="btnClear">🗑 Clear</button>
  </div>

  <div id="resultWrap" style="display:none">
    <div class="col-label" data-i18n="labelResult">TOP 10 KEYWORDS</div>
    <table class="kw-table">
      <thead><tr><th data-i18n="thWord">Word</th><th data-i18n="thCount">Count</th><th data-i18n="thDensity">Density</th><th data-i18n="thBar">Bar</th></tr></thead>
      <tbody id="kwTableBody"></tbody>
    </table>
  </div>

  <div class="seo">
    <h2 id="seoTitle1"></h2>
    <p id="seoBody1"></p>
    <p id="seoFaq1"></p>
    <p id="seoFaq2"></p>
  </div>
  <footer>© 2026 MODOO HUB · Free · <a href="privacy.html" style="color:var(--text-dim);text-decoration:none;">Privacy Policy</a></footer>
</main>
<script>
const STOPWORDS=new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with','is','are','was','were','it','this','that','i','you','he','she','we','they','be','have','has','had','do','does','did','not','by','from','as','if','my','your','his','her','our','its','will','can','would','could','should','may','might','must','shall','been','which','what','how','when','where','who','whom']);
function analyze(){
  const v=document.getElementById('inputArea').value;
  const minLen=parseInt(document.getElementById('optMinLen').value)||3;
  const ignoreStop=document.getElementById('optStopwords').checked;
  const words=(v.toLowerCase().match(/[a-z가-힣]+/g)||[]);
  const total=words.length;
  if(!total){document.getElementById('resultWrap').style.display='none';return;}
  const freq={};
  words.forEach(w=>{if(w.length>=minLen&&(!ignoreStop||!STOPWORDS.has(w)))freq[w]=(freq[w]||0)+1;});
  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const max=sorted[0]?sorted[0][1]:1;
  document.getElementById('kwTableBody').innerHTML=sorted.map(([w,c])=>{
    const pct=(c/total*100).toFixed(2);
    const barPct=Math.round(c/max*100);
    return`<tr><td>${escHtml(w)}</td><td>${c}</td><td>${pct}%</td><td><div class="bar-cell"><div class="bar-wrap"><div class="bar-fill" style="width:${barPct}%"></div></div></div></td></tr>`;
  }).join('');
  document.getElementById('resultWrap').style.display='block';
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function clearAll(){document.getElementById('inputArea').value='';document.getElementById('resultWrap').style.display='none';}
</script>
<script>
const _i18n={
  ko:{lang:'ko',title:'키워드 밀도 분석기 - 단어 빈도 및 밀도 분석 | 무료',btn:'🌐 EN',
    sub:'텍스트의 키워드 빈도와 밀도를 분석합니다.',
    optMinLen:'최소 단어 길이:',optStop:'불용어 제외',btnAnalyze:'분석',btnClear:'🗑 지우기',
    labelResult:'상위 10개 키워드',thWord:'단어',thCount:'횟수',thDensity:'밀도',thBar:'비율',
    seoTitle1:'키워드 밀도란?',seoBody1:'키워드 밀도는 전체 단어 수 대비 특정 키워드의 등장 비율입니다. SEO 관점에서 이상적인 키워드 밀도는 1~3%로 알려져 있습니다. 과도한 반복은 페널티를 받을 수 있습니다.',

  en:{lang:'en',title:'Keyword Density Checker - Analyze Keyword Frequency | Free',btn:'🌐 中文',
    sub:'Analyze keyword frequency and density in your text.',
    optMinLen:'Min word length:',optStop:'Ignore stopwords',btnAnalyze:'Analyze',btnClear:'🗑 Clear',
    labelResult:'TOP 10 KEYWORDS',thWord:'Word',thCount:'Count',thDensity:'Density',thBar:'Bar',
    seoTitle1:'What is Keyword Density?',seoBody1:'Keyword density is the percentage of times a keyword appears in your text relative to the total word count. For SEO, an ideal keyword density is generally 1–3%. Overuse can result in keyword stuffing penalties.',

    seoFaq2:'<strong>Q. What are stopwords?</strong><br>Common words like the, a, is that carry no real meaning. Excluding them gives you a more meaningful keyword analysis.'},
  zh:{lang:'zh',title:'关键词密度分析 - 在线分析关键词频率和密度 | 免费',btn:'🌐 日本語',

    optMinLen:'最小词长:',optStop:'排除停用词',btnAnalyze:'分析',btnClear:'🗑 清空',
    labelResult:'前10关键词',thWord:'词语',thCount:'次数',thDensity:'密度',thBar:'比例',

    seoFaq2:'<strong>Q. ストップワードとは何ですか？</strong><br>the・a・isなどの意味のない一般的な単語のことです。除外することでより意味のあるキーワード分析ができます。'}
};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
  ['seoTitle1','seoBody1','seoFaq1','seoFaq2'].forEach(id=>{const el=document.getElementById(id);if(el&&t[id]!==undefined)el.innerHTML=t[id];});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
