    seoHtml:`<h2>AI推文生成器</h2><p>输入主题、目的和语气，自动生成280字符以内的高互动率推文。支持5种目的（观点、问题、技巧、故事、CTA）和5种语气。</p>

<details class="faq-item"><summary>推文的最佳发布时间？</summary><p>通常是受众所在时区的上午9-10点、中午12-1点、下午5-6点。</p></details>
<details class="faq-item"><summary>推文串是否有效？</summary><p>是的，长内容分割成推文串可以提高互动率和曝光度。</p></details>
<details class="faq-item"><summary>可以生成其他语言的推文吗？</summary><p>可以，在URL中添加?lang=ko/en/ja即可。</p></details>
<details class="faq-item"><summary>可以修改生成的推文吗？</summary><p>可以，以草稿为基础，加入个人声音和经历。</p></details>`
  },
  ja:{h1Accent:'ツイートジェネレーター',sub:'テーマとトーンを入力してエンゲージメント率の高いツイートを即時生成（280文字以内）',backLink:'← ホーム',langBtn:'🌐 한국어',
    lblTopic:'テーマ/内容',lblGoal:'ツイートの目的',lblTone:'トーン',lblCount:'生成数',lblDetail:'追加詳細（任意）',btnGen:'ツイートを生成',copyBtn:'コピー',copied:'✓ コピー済み',
    goals:{opinion:'意見を共有',question:'議論を促す',tip:'ヒント/情報提供',story:'短いストーリー',cta:'行動を促す'},
    tones:{bold:'大胆',witty:'ウィット',thoughtful:'思慮深い',casual:'カジュアル',inspiring:'インスパイア'},

    templates:{
      opinion:{bold:(t,d)=>`${t}についての率直な意見：\n\n${d||'ほとんどの人は間違っている。その理由を説明する。'}\n\n反論があればコメントで。`,witty:(t,d)=>`${t}？「興味深い」という言葉が正しいかな。\n\n${d||'誰も予想していなかった方向に進んでいる。'}\n\nあなたはどう思う？`,thoughtful:(t,d)=>`${t}について最近よく考えている。\n\n${d||'最初は一つの観点だったが、今はずっと複雑だと分かった。'}\n\nどう思いますか？`},
      question:{bold:(t,d)=>`本当に聞きたい：\n\n${t}についてどう思う？\n\n${d||''}\n\nコメントで教えて。👇`,witty:(t,d)=>[`${t}…自分だけじゃないよね？\n\nRTして他の人の意見も聞こう。`][0],thoughtful:(t,d)=>`${t}についてコミュニティの知恵が必要です。\n\n${d||''}\n\n経験者の方のご意見が聞きたいです。`},

      story:{bold:(t,d)=>`${t}についての短い話：\n\n${d||'3年前これを諦めかけた。\n今はこれが人生を変えた。\n\nその間に何があったか？'}\n\n続きを読みたい人は💬`,witty:(t,d)=>`${t}の実際の状況：\n\n${d||'「これ可能なの？」と言っていた人が今は一番上手い。\n\n皮肉なもので。'}\n\n人生って...`,thoughtful:(t,d)=>`${t}で自分を変えた瞬間：\n\n${d||'一つの気づきがすべてを変えた。\n\nそれは：完璧より継続だ。'}\n\nあなたの転換点は何でしたか？`},

    seoHtml:`<h2>AIツイートジェネレーター</h2><p>テーマ、目的、トーンを入力すると280文字以内のエンゲージメント率の高いツイートが自動生成されます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>エンゲージメント率の高いツイートの特徴は？</summary><p>感情を刺激する、質問を投げかける、意外性がある、具体的なヒントがあるツイートが多くリプライとRTを獲得します。</p></details>
<details class="faq-item"><summary>ツイートのハッシュタグは何個が適切ですか？</summary><p>1-2個が最適です。3個以上はスパムに見えてエンゲージメントが下がります。</p></details>
<details class="faq-item"><summary>ツイートの理想的な長さは？</summary><p>100-180文字がCTRとエンゲージメント率が最も高いです。</p></details>
<details class="faq-item"><summary>絵文字は使うべきですか？</summary><p>1-2個の適切な絵文字はエンゲージメントを上げます。多すぎると信頼性が下がります。</p></details>
<details class="faq-item"><summary>ツイートの最適な投稿時間は？</summary><p>一般的に午前9-10時、昼12-1時、夕方5-6時（現地時間）が高いです。</p></details>
<details class="faq-item"><summary>ツイートスレッドは効果的ですか？</summary><p>はい、長いコンテンツをスレッドに分けるとエンゲージメントと露出が増えます。</p></details>

  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblTopic','lblGoal','lblTone','lblCount','lblDetail','btnGen'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  const goalSel=document.getElementById('goal');
  Object.keys(t.goals).forEach((k,i)=>{if(goalSel.options[i])goalSel.options[i].text=t.goals[k];});
  const toneSel=document.getElementById('tone');
  Object.keys(t.tones).forEach((k,i)=>{if(toneSel.options[i])toneSel.options[i].text=t.tones[k];});
  const cntSel=document.getElementById('count');
  Object.keys(t.counts).forEach((k,i)=>{if(cntSel.options[i])cntSel.options[i].text=t.counts[k];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function charClass(n){return n<=200?'chars-ok':n<=260?'chars-warn':'chars-bad';}
function generate(){
  const t=_i18n[_lang];
  const topic=document.getElementById('topic').value.trim()||'주제';
  const goal=document.getElementById('goal').value;
  const tone=document.getElementById('tone').value;
  const count=parseInt(document.getElementById('count').value);
  const detail=document.getElementById('detail').value.trim();
  const toneKeys=Object.keys(t.tones);
  const goalKeys=Object.keys(t.goals);
  const tweets=[];
  const fn=t.templates[goal]?.[tone];
  if(fn)tweets.push(fn(topic,detail));
  for(const g of goalKeys){
    for(const tn of toneKeys){
      if(tweets.length>=count)break;
      if(g===goal&&tn===tone)continue;
      const f=t.templates[g]?.[tn];
      if(f)tweets.push(f(topic,''));
    }
    if(tweets.length>=count)break;
  }
  document.getElementById('tweetList').innerHTML=tweets.slice(0,count).map((tw,i)=>`
    <div class="tweet-card">
      <div class="tweet-body">${tw}</div>
      <div class="tweet-footer">
        <span class="tweet-chars ${charClass(tw.length)}">${tw.length}/280</span>
        <button class="tweet-copy" onclick="copyTweet(this,'${encodeURIComponent(tw)}')">${t.copyBtn}</button>
      </div>
    </div>`).join('');
}
function copyTweet(btn,enc){
  const t=_i18n[_lang];
  navigator.clipboard.writeText(decodeURIComponent(enc)).then(()=>{btn.textContent=t.copied;setTimeout(()=>btn.textContent=t.copyBtn,2000);});
}
_lang=detectLang();applyLang();
</script>
