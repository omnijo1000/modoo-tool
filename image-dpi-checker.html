<details class="faq-item"><summary>ウェブ画像のDPIが低くても問題ありませんか？</summary><p>問題ありません — DPIは印刷にのみ意味があり、画面表示ではDPIは無視されます。</p></details>
<details class="faq-item"><summary>ファイルはサーバーにアップロードされますか？</summary><p>いいえ、すべての処理はブラウザのローカルで行われます。</p></details>
<details class="faq-item"><summary>DPIを変更するには？</summary><p>PhotoshopやGIMPの画像サイズダイアログで解像度を変更してください。</p></details>`
  }

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','dropText','dropHint'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function readExifDpi(buf){
  const view=new DataView(buf);
  let offset=0;
  if(view.getUint16(0)!==0xFFD8)return null;
  offset=2;
  while(offset<buf.byteLength-4){
    const marker=view.getUint16(offset);offset+=2;
    if(marker===0xFFE1){
      const len=view.getUint16(offset);offset+=2;
      const exifHeader=new Uint8Array(buf,offset,6);
      if(exifHeader[0]===0x45&&exifHeader[1]===0x78&&exifHeader[2]===0x69&&exifHeader[3]===0x66){
        const tiffStart=offset+6;
        const tiffView=new DataView(buf,tiffStart);
        const le=tiffView.getUint16(0)===0x4949;
        const readU16=o=>le?tiffView.getUint16(o,true):tiffView.getUint16(o,false);
        const readU32=o=>le?tiffView.getUint32(o,true):tiffView.getUint32(o,false);
        const ifdOffset=readU32(4);const numEntries=readU16(ifdOffset);
        let xRes=null,yRes=null;
        for(let i=0;i<numEntries;i++){
          const eOff=ifdOffset+2+i*12;const tag=readU16(eOff);const type=readU16(eOff+2);const cnt=readU32(eOff+4);const valOff=eOff+8;
          if(tag===0x011A||tag===0x011B){
            let num,den;
            if(type===5){const rOff=readU32(valOff);num=readU32(rOff);den=readU32(rOff+4);}
            else{num=readU32(valOff);den=1;}
            const val=den?num/den:num;
            if(tag===0x011A)xRes=val;else yRes=val;
          }
        }
        if(xRes)return{x:Math.round(xRes),y:Math.round(yRes||xRes)};
      }
      offset+=len-2;
    } else {
      const len=view.getUint16(offset);offset+=len;
    }
    if(marker===0xFFDA)break;
  }
  return null;
}
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});
function handleFile(file){
  const t=_i18n[_lang];const url=URL.createObjectURL(file);const img=new Image();
  img.onload=()=>{
    const w=img.naturalWidth,h=img.naturalHeight;
    const fmtSize=b=>b>=1048576?(b/1048576).toFixed(2)+'MB':b>=1024?(b/1024).toFixed(1)+'KB':b+'B';
    const ext=(file.name.match(/\.(\w+)$/)||['',''])[1].toUpperCase();
    const isJpeg=file.type==='image/jpeg';
    if(isJpeg){
      const fr=new FileReader();
      fr.onload=e=>{
        const exif=readExifDpi(e.target.result);
        const dpi=exif?exif.x:72;
        const fromExif=!!exif;
        renderResult(file,url,w,h,dpi,fromExif,fmtSize(file.size),ext);
      };
      fr.readAsArrayBuffer(file);
    } else {
      renderResult(file,url,w,h,72,false,fmtSize(file.size),ext);
    }
  };
  img.onerror=()=>URL.revokeObjectURL(url);
  img.src=url;
}
function renderResult(file,url,w,h,dpi,fromExif,szStr,ext){
  const t=_i18n[_lang];
  const printInW=(w/dpi).toFixed(2);const printInH=(h/dpi).toFixed(2);
  const printCmW=(w/dpi*2.54).toFixed(2);const printCmH=(h/dpi*2.54).toFixed(2);
  let dpiClass='',dpiLabel='';
  if(dpi>=300){dpiClass='badge-ok';dpiLabel=t.dpiOk;}
  else if(dpi>=150){dpiClass='badge-warn';dpiLabel=t.dpiWarn;}
  else{dpiClass='badge-no';dpiLabel=t.dpiLow;}
  const gaugePct=Math.min(100,(dpi/600)*100);
  const gaugeColor=dpi>=300?'var(--green)':dpi>=150?'var(--accent)':'var(--red)';
  const printPapers=[
    {name:'A4',wIn:8.27,hIn:11.69},{name:'Letter',wIn:8.5,hIn:11},{name:'4×6"',wIn:4,hIn:6}
  ];
  const paperHtml=printPapers.map(p=>{
    const minDim=Math.min(w/p.wIn,h/p.hIn);
    const cls=minDim>=300?'badge-ok':minDim>=150?'badge-warn':'badge-no';
    return `<div class="print-cell"><div class="print-name">${p.name}</div><div class="print-size ${cls}">${Math.floor(minDim)} DPI</div></div>`;
  }).join('');
  const div=document.createElement('div');div.className='result-card';
  div.innerHTML=`<div class="preview-area"><img src="${url}" alt="preview"></div>
<div class="info-section">
<div class="info-row"><span class="info-label">${t.lblFile}</span><span class="info-value">${file.name}</span></div>
<div class="info-row"><span class="info-label">${t.lblFmt}</span><span class="info-value">${ext}</span></div>
<div class="info-row"><span class="info-label">${t.lblSize}</span><span class="info-value">${szStr}</span></div>
<div class="info-row"><span class="info-label">${t.lblDim}</span><span class="info-value accent">${w} × ${h} px</span></div>
<div class="info-row"><span class="info-label">${t.lblDpi}</span><span class="info-value"><span class="info-badge ${dpiClass}">${dpi} DPI · ${dpiLabel}</span></span></div>
<div class="dpi-gauge"><div class="dpi-fill" style="width:${gaugePct}%;background:${gaugeColor}"></div></div>
<div class="info-row"><span class="info-label">${t.lblExifSrc}</span><span class="info-value">${fromExif?t.srcExif:t.srcDefault}</span></div>
<div class="info-row"><span class="info-label">${t.lblPrintW}</span><span class="info-value">${printInW}" / ${printCmW}cm</span></div>
<div class="info-row"><span class="info-label">${t.lblPrintH}</span><span class="info-value">${printInH}" / ${printCmH}cm</span></div>
</div>
<div style="padding:8px 16px;font-size:11px;color:var(--text-dim);border-top:1px solid var(--border)">${t.printSizes}</div>
<div class="print-grid">${paperHtml}</div>
<div class="info-note">${t.noteText}</div>`;
  const ra=document.getElementById('resultArea');ra.innerHTML='';ra.appendChild(div);
}
_lang=detectLang();applyLang();
</script>
