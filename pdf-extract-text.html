  },
  en:{h1b:'Extract Text',sub:'Extract text content from PDF files',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'PDF Extract Text | MODOO HUB',dropTxt:'Drop PDF here or click to select',warnImg:'⚠️ Scanned image PDFs may not have a text layer — extraction will be limited.',dlBtn:'⬇️ Download TXT',copyAllBtn:'Copy All',pgLabel:'Page',copiedMsg:'Copied',
    seoHtml:`<h2>PDF Text Extractor</h2><p>Extract text from <strong>PDF files</strong> page by page. Copy to clipboard or download as a TXT file. Fully local browser processing — no uploads.</p>
<h2 class="seo-sub">FAQ</h2>

<details class="faq-item"><summary>Are non-Latin characters supported?</summary><p>Yes, any language embedded in the PDF text layer is extracted.</p></details>

<details class="faq-item"><summary>Can I copy page by page?</summary><p>Yes — use the Copy button next to each page.</p></details>
<details class="faq-item"><summary>What encoding is the TXT file?</summary><p>UTF-8 encoding.</p></details>
<details class="faq-item"><summary>Encrypted PDFs supported?</summary><p>Only unencrypted PDFs are supported.</p></details>
<details class="faq-item"><summary>Same as PDF to text conversion?</summary><p>Yes — it extracts the embedded text layer.</p></details>`
  },
  zh:{h1b:'提取文本',sub:'从PDF文件中提取文本内容',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'PDF文本提取 | MODOO HUB',dropTxt:'拖放PDF文件或点击选择',warnImg:'⚠️ 扫描图像PDF可能没有文本层，提取可能受限。',dlBtn:'⬇️ 下载TXT',copyAllBtn:'全部复制',pgLabel:'页',copiedMsg:'已复制',
    seoHtml:`<h2>PDF文本提取</h2><p>按页面提取<strong>PDF文件</strong>中的文本内容。可复制到剪贴板或下载为TXT文件。完全在浏览器本地处理，不上传文件。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>可以从扫描PDF提取文本吗？</summary><p>只有经过OCR处理的PDF才能提取。纯图像扫描PDF没有文本层。</p></details>
<details class="faq-item"><summary>文件会上传服务器吗？</summary><p>不会，完全本地处理。</p></details>
<details class="faq-item"><summary>支持中文提取吗？</summary><p>只要PDF内嵌了文本层，任何语言都可提取。</p></details>
<details class="faq-item"><summary>表格结构会保留吗？</summary><p>只提取纯文本，表格结构无法保证。</p></details>
<details class="faq-item"><summary>可以按页复制吗？</summary><p>可以，使用每页旁边的复制按钮。</p></details>
<details class="faq-item"><summary>TXT文件是什么编码？</summary><p>UTF-8编码。</p></details>
<details class="faq-item"><summary>加密PDF支持吗？</summary><p>只支持未加密的PDF。</p></details>
<details class="faq-item"><summary>和PDF转文本一样吗？</summary><p>类似，都是提取内嵌的文本层。</p></details>`
  },
  ja:{h1b:'テキスト抽出',sub:'PDFファイルからテキストを抽出します',backLink:'← ホーム',langBtn:'🌐 한국어',pageTitle:'PDFテキスト抽出 | MODOO HUB',dropTxt:'PDFファイルをドロップまたはクリックして選択',warnImg:'⚠️ スキャン画像PDFはテキストレイヤーがないため抽出が制限される場合があります。',dlBtn:'⬇️ TXTダウンロード',copyAllBtn:'全てコピー',pgLabel:'ページ',copiedMsg:'コピー済み',
    seoHtml:`<h2>PDFテキスト抽出</h2><p><strong>PDFファイル</strong>からページ単位でテキストを抽出します。クリップボードにコピーまたはTXTファイルとしてダウンロードできます。すべてブラウザ内でローカル処理されます。</p>

<details class="faq-item"><summary>スキャンPDFからもテキストを抽出できますか？</summary><p>OCRが適用されたPDFのみ可能です。画像のみのスキャンPDFはテキストレイヤーがありません。</p></details>

};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','dropTxt','warnImg','dlBtn','copyAllBtn'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function ev(e,cls){e.preventDefault();document.getElementById('dropZone').className='drop-zone'+' '+cls;}
function drop(e){e.preventDefault();document.getElementById('dropZone').className='drop-zone';const f=e.dataTransfer.files[0];if(f)loadFile(f);}
function loadFile(f){
  if(!f||!f.name.endsWith('.pdf'))return;
  _fname=f.name;_pages=[];
  const fr=new FileReader();
  fr.onload=async ev2=>{
    const arr=new Uint8Array(ev2.target.result);
    const pdf=await pdfjsLib.getDocument({data:arr}).promise;
    const n=pdf.numPages;
    for(let i=1;i<=n;i++){
      const pg=await pdf.getPage(i);
      const tc=await pg.getTextContent();
      let text='';
      tc.items.forEach(item=>{
        if(item.str)text+=item.str;
        if(item.hasEOL)text+='\n';
      });
      _pages.push(text.trim());
    }
    renderResult();
  };fr.readAsArrayBuffer(f);
}
function renderResult(){
  const t=_i18n[_lang];
  document.getElementById('resultBox').style.display='block';
  const chars=_pages.reduce((a,p)=>a+p.length,0);
  document.getElementById('infoBar').textContent=`${_pages.length} ${t.pgLabel}s · ${chars.toLocaleString()} chars`;
  const cont=document.getElementById('pagesContainer');cont.innerHTML='';
  _pages.forEach((txt,i)=>{
    const b=document.createElement('div');b.className='page-block';
    b.innerHTML=`<div class="page-label"><span>${t.pgLabel} ${i+1}</span><button class="copy-btn" onclick="copyPage(${i},this)">${t.copiedMsg?'copy':''}</button></div><div class="page-text" id="pt${i}">${escHtml(txt)||'(empty)'}</div>`;
    b.querySelector('.copy-btn').textContent='copy';
    cont.appendChild(b);
  });
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function copyPage(i,btn){
  navigator.clipboard.writeText(_pages[i]).then(()=>{const t=_i18n[_lang];const orig=btn.textContent;btn.textContent=t.copiedMsg;setTimeout(()=>btn.textContent=orig,1500);});
}
function copyAll(){
  const t=_i18n[_lang];
  const all=_pages.map((p,i)=>`--- ${t.pgLabel} ${i+1} ---\n${p}`).join('\n\n');
  navigator.clipboard.writeText(all);
}
function downloadTxt(){
  const t=_i18n[_lang];
  const all=_pages.map((p,i)=>`--- ${t.pgLabel} ${i+1} ---\n${p}`).join('\n\n');
  const blob=new Blob([all],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(_fname||'doc').replace('.pdf','')+'.txt';a.click();
}
