  ko:{h1b:'JPG',sub:'WebP 이미지를 JPG 또는 PNG로 변환합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',pageTitle:'WebP to JPG 변환기 | MODOO HUB',dzText:'WebP 이미지를 드래그하거나 클릭하여 업로드 (여러 파일 가능)',lblOpts:'변환 설정',lblFormat:'출력 형식',lblQ:'품질(JPG)',lblBg:'배경색',btnConvert:'변환',lblResult:'변환 결과',dl:'다운로드',
    seoHtml:`<h2>WebP to JPG 변환기</h2><p>WebP 이미지를 <strong>JPG 또는 PNG</strong> 형식으로 변환합니다. JPG 품질과 배경색(투명 영역 처리용)을 설정할 수 있습니다. PNG로 변환하면 투명도가 유지됩니다. 여러 파일을 동시에 변환할 수 있습니다.</p>

<details class="faq-item"><summary>투명 배경 WebP를 JPG로 변환하면?</summary><p>JPG는 투명도를 지원하지 않으므로 배경색 설정값으로 채워집니다. PNG로 변환하면 투명도가 유지됩니다.</p></details>

<details class="faq-item"><summary>변환 후 파일명은?</summary><p>원본 파일명에서 확장자만 변경됩니다.</p></details>`
  },
  en:{h1b:'JPG',sub:'Convert WebP images to JPG or PNG',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'WebP to JPG Converter | MODOO HUB',dzText:'Drag & drop WebP images or click to upload (multiple)',lblOpts:'Conversion settings',lblFormat:'Output format',lblQ:'Quality (JPG)',lblBg:'Background',btnConvert:'Convert',lblResult:'Results',dl:'Download',
    seoHtml:`<h2>WebP to JPG Converter</h2><p>Convert WebP images to <strong>JPG or PNG</strong> format. Set JPG quality and background color for transparent areas. Convert to PNG to preserve transparency. Supports multiple files at once.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Transparent WebP to JPG?</summary><p>JPG has no transparency support — transparent areas are filled with the selected background color. Convert to PNG to keep transparency.</p></details>
<details class="faq-item"><summary>Multiple files at once?</summary><p>Yes — batch convert multiple images simultaneously.</p></details>
<details class="faq-item"><summary>What quality should I use?</summary><p>85–95 is the sweet spot for quality vs. file size.</p></details>
<details class="faq-item"><summary>PNG larger than JPG?</summary><p>Generally yes, but PNG preserves transparency and quality losslessly.</p></details>
<details class="faq-item"><summary>Is my file sent to a server?</summary><p>No — fully local.</p></details>
<details class="faq-item"><summary>Other formats besides WebP?</summary><p>Yes — any browser-supported image can be converted to JPG/PNG.</p></details>
<details class="faq-item"><summary>Is resolution preserved?</summary><p>Yes — original dimensions are kept.</p></details>
<details class="faq-item"><summary>Output filename?</summary><p>Same as input with extension changed.</p></details>`
  },
  zh:{h1b:'JPG',sub:'将WebP图像转换为JPG或PNG',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'WebP转JPG | MODOO HUB',dzText:'拖拽WebP图片或点击上传（支持多文件）',lblOpts:'转换设置',lblFormat:'输出格式',lblQ:'质量(JPG)',lblBg:'背景色',btnConvert:'转换',lblResult:'转换结果',dl:'下载',
    seoHtml:`<h2>WebP转JPG转换器</h2><p>将WebP图像转换为<strong>JPG或PNG</strong>格式。可设置JPG质量和背景色（用于透明区域处理）。转换为PNG可保留透明度，支持多文件同时转换。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>透明WebP转JPG后会怎样？</summary><p>JPG不支持透明度，透明区域会以背景色填充。转换为PNG可保留透明度。</p></details>
<details class="faq-item"><summary>可以同时处理多个文件吗？</summary><p>可以，支持多图片同时批量转换。</p></details>
<details class="faq-item"><summary>JPG质量应该设置多少？</summary><p>85~95是画质和体积的平衡点。</p></details>
<details class="faq-item"><summary>PNG会比JPG大吗？</summary><p>通常是的，但PNG完整保留透明度和画质。</p></details>
<details class="faq-item"><summary>文件会上传服务器吗？</summary><p>不会，所有处理在浏览器本地完成。</p></details>
<details class="faq-item"><summary>除WebP外还支持其他格式吗？</summary><p>支持，浏览器可识别的所有图像格式都可转换为JPG/PNG。</p></details>
<details class="faq-item"><summary>原始分辨率会保留吗？</summary><p>是的，转换后保持原始尺寸。</p></details>
<details class="faq-item"><summary>输出文件名是什么？</summary><p>与输入文件名相同，仅更改扩展名。</p></details>`
  },
  ja:{h1b:'JPG',sub:'WebP画像をJPGまたはPNGに変換',backLink:'← ホーム',langBtn:'🌐 한국어',pageTitle:'WebPからJPGへ変換 | MODOO HUB',dzText:'WebP画像をドラッグまたはクリックしてアップロード（複数可）',lblOpts:'変換設定',lblFormat:'出力形式',lblQ:'品質(JPG)',lblBg:'背景色',btnConvert:'変換',lblResult:'変換結果',dl:'ダウンロード',
    seoHtml:`<h2>WebPからJPGへ変換</h2><p>WebP画像を<strong>JPGまたはPNG</strong>形式に変換します。JPG品質と背景色（透明エリア用）を設定できます。PNGに変換すると透明度が保持されます。複数ファイルを同時変換できます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>透明WebPをJPGに変換すると？</summary><p>JPGは透明度をサポートしないため、透明エリアは背景色で塗りつぶされます。透明度を保つにはPNGに変換してください。</p></details>
<details class="faq-item"><summary>複数ファイルを一度に変換できますか？</summary><p>はい、複数画像を同時にバッチ変換できます。</p></details>
<details class="faq-item"><summary>JPG品質はいくつにすればいいですか？</summary><p>85〜95が画質とサイズのバランス点です。</p></details>
<details class="faq-item"><summary>PNGはJPGより大きくなりますか？</summary><p>一般的にはい、ただし透明度と画質を完全に維持します。</p></details>
<details class="faq-item"><summary>ファイルはサーバーに送信されますか？</summary><p>いいえ、すべてローカルで処理されます。</p></details>
<details class="faq-item"><summary>WebP以外の形式も変換できますか？</summary><p>はい、ブラウザがサポートするすべての画像をJPG/PNGに変換できます。</p></details>
<details class="faq-item"><summary>解像度は保持されますか？</summary><p>はい、元の解像度のまま変換されます。</p></details>
<details class="faq-item"><summary>出力ファイル名は？</summary><p>入力ファイルと同じ名前で拡張子のみ変更されます。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','dzText','lblOpts','lblFormat','lblQ','lblBg','btnConvert','lblResult'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function fmtBytes(n){if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(2)+' MB';}
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFiles(e.dataTransfer.files);});
document.getElementById('fileIn').addEventListener('change',e=>loadFiles(e.target.files));
function loadFiles(files){_files=Array.from(files).filter(f=>f.type.startsWith('image/'));if(_files.length)document.getElementById('optBox').style.display='block';}
function convertAll(){
  if(!_files.length)return;
  const t=_i18n[_lang];const mime=document.getElementById('outFormat').value;const q=parseInt(document.getElementById('quality').value)/100;
  const bg=document.getElementById('bgColor').value;const ext=mime==='image/jpeg'?'.jpg':'.png';
  document.getElementById('outBox').style.display='block';
  document.getElementById('resultList').innerHTML='';
  _files.forEach(file=>{
    const url=URL.createObjectURL(file);const img=new Image();
    img.onload=()=>{
      const cvs=document.createElement('canvas');cvs.width=img.naturalWidth;cvs.height=img.naturalHeight;
      const ctx=cvs.getContext('2d');
      if(mime==='image/jpeg'){ctx.fillStyle=bg;ctx.fillRect(0,0,cvs.width,cvs.height);}
      ctx.drawImage(img,0,0);
      cvs.toBlob(blob=>{
        const blobUrl=URL.createObjectURL(blob);
        const fname=file.name.replace(/\.[^.]+$/,'')+ext;
        const div=document.createElement('div');div.className='result-item';
        div.innerHTML=`<img src="${blobUrl}" width="48" height="48" style="object-fit:cover;border-radius:4px;border:1px solid var(--border);">
<div class="result-info"><div class="fname">${file.name}</div><div class="sizes">${fmtBytes(file.size)} → ${fmtBytes(blob.size)}</div></div>
<a href="${blobUrl}" download="${fname}" class="result-dl">${t.dl}</a>`;
        document.getElementById('resultList').appendChild(div);
        URL.revokeObjectURL(url);
      },mime,mime==='image/jpeg'?q:undefined);
    };img.src=url;
  });
}
_lang=detectLang();applyLang();
</script>
