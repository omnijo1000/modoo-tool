// Conversion functions
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v => Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');
}

function hslToRgb(h,s,l) {
  s/=100; l/=100;
  const k = n => (n + h/30) % 12;
  const a = s * Math.min(l,1-l);
  const f = n => l - a * Math.max(-1, Math.min(k(n)-3, Math.min(9-k(n),1)));
  return {r:Math.round(f(0)*255), g:Math.round(f(8)*255), b:Math.round(f(4)*255)};
}

function hsvToRgb(h,s,v) {
  s/=100; v/=100;
  const i = Math.floor(h/60)%6, f=h/60-Math.floor(h/60);
  const p=v*(1-s), q=v*(1-f*s), t=v*(1-(1-f)*s);
  let r,g,b;
  switch(i){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;default:r=v;g=p;b=q;}
  return {r:Math.round(r*255),g:Math.round(g*255),b:Math.round(b*255)};
}

function rgbToHsl(r,g,b) {
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;
  }
  return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

function rgbToHsv(r,g,b) {
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
  let h,s=max===0?0:d/max,v=max;
  if(max===min){h=0;}else{switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}
  return {h:Math.round(h*360),s:Math.round(s*100),v:Math.round(v*100)};
}

function clamp(v,min,max){return Math.max(min,Math.min(max,Math.round(v)));}

  fromHsv();
}
function syncHsvInput(ch) {
  const sfx = ch==='H'?'Hv':ch==='S'?'Sv':'V';
  const max = ch==='H'?360:100;
  let v = parseInt(document.getElementById('in'+sfx).value)||0;
  v = clamp(v,0,max);
  document.getElementById('sl'+sfx).value = v;
  hsv[ch.toLowerCase()] = v;
  fromHsv();
}
function fromHsv() {
  const r2 = hsvToRgb(hsv.h,hsv.s,hsv.v);
  rgb = r2;
  hsl = rgbToHsl(rgb.r,rgb.g,rgb.b);
  updateRgbInputs();
  updateHslInputs();
  updateSliderGradients();
  renderOutput(rgbToHex(rgb.r,rgb.g,rgb.b));
}

function updateRgbInputs() {
  document.getElementById('slR').value = rgb.r; document.getElementById('inR').value = rgb.r;
  document.getElementById('slG').value = rgb.g; document.getElementById('inG').value = rgb.g;
  document.getElementById('slB').value = rgb.b; document.getElementById('inB').value = rgb.b;
}
function updateHslInputs() {
  document.getElementById('slH').value = hsl.h; document.getElementById('inH').value = hsl.h;
  document.getElementById('slS').value = hsl.s; document.getElementById('inS').value = hsl.s;
  document.getElementById('slL').value = hsl.l; document.getElementById('inL').value = hsl.l;
}
function updateHsvInputs() {
  document.getElementById('slHv').value = hsv.h; document.getElementById('inHv').value = hsv.h;
  document.getElementById('slSv').value = hsv.s; document.getElementById('inSv').value = hsv.s;
  document.getElementById('slV').value = hsv.v; document.getElementById('inV').value = hsv.v;
}

function updateSliderGradients() {
  const {r,g,b} = rgb;
  document.getElementById('slR').style.background = `linear-gradient(to right,rgb(0,${g},${b}),rgb(255,${g},${b}))`;
  document.getElementById('slG').style.background = `linear-gradient(to right,rgb(${r},0,${b}),rgb(${r},255,${b}))`;
  document.getElementById('slB').style.background = `linear-gradient(to right,rgb(${r},${g},0),rgb(${r},${g},255))`;
  const hex = rgbToHex(r,g,b);
  document.getElementById('previewSwatch').style.background = hex;
  document.getElementById('previewSwatchHsl').style.background = hex;
  document.getElementById('previewSwatchHsv').style.background = hex;
}

function renderOutput(hex) {
  const display = isUpperCase ? hex.toUpperCase() : hex.toLowerCase();
  const noHash = display.slice(1);
  document.getElementById('hexBig').textContent = display;
  document.getElementById('hexNoHash').textContent = noHash;
  const fmts = [
    `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`,
    `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`,
    `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 1)`,
  ];
  document.getElementById('allFormats').innerHTML = fmts.map(f =>
    `<div class="fmt-chip" onclick="copyText('${f}',this)">${f}</div>`
  ).join('');
  addRecent(hex.toUpperCase());
}

function setCase(c) {
  isUpperCase = c === 'upper';
  document.getElementById('caseUpper').classList.toggle('active', isUpperCase);
  document.getElementById('caseLower').classList.toggle('active', !isUpperCase);
  const hex = rgbToHex(rgb.r,rgb.g,rgb.b);
  renderOutput(hex);
}

function copyHex() {
  const val = document.getElementById('hexBig').textContent;
  navigator.clipboard.writeText(val);
  const btn = document.getElementById('copyMainBtn');
  const t = _i18n[currentLang] || _i18n.ko;
  btn.textContent = t.copyDone || 'Copied!';
  setTimeout(()=>{btn.textContent=t.btnCopy||'Copy';},2000);
}

function copyNoHash(btn) {
  const val = document.getElementById('hexNoHash').textContent;
  navigator.clipboard.writeText(val);
  const t = _i18n[currentLang] || _i18n.ko;
  btn.textContent = t.copyDone || 'Copied!';
  btn.style.color = 'var(--green)';
  setTimeout(()=>{btn.textContent=t.btnCopy||'Copy';btn.style.color='';},2000);
}

function copyText(text, el) {
  navigator.clipboard.writeText(text);
  const t = _i18n[currentLang] || _i18n.ko;
  const orig = el.textContent;
  el.textContent = t.copyDone || 'Copied!';
  el.style.color = 'var(--green)';
  setTimeout(()=>{el.textContent=orig;el.style.color='';},2000);
}

function addRecent(hex) {
  if (!recentColors.includes(hex)) {
    recentColors.unshift(hex);
    if (recentColors.length > 8) recentColors = recentColors.slice(0,8);
    renderRecent();
  }
}

function renderRecent() {
  const wrap = document.getElementById('recentSwatches');
  if (recentColors.length === 0) {
    const t = _i18n[currentLang] || _i18n.ko;
    wrap.innerHTML = `<span class="recent-empty">${t.recentEmpty || 'None yet'}</span>`;
    return;
  }
  wrap.innerHTML = recentColors.map(c => `<div class="recent-swatch" style="background:${c}" title="${c}" onclick="applyColor('${c}')"></div>`).join('');
}

function applyColor(hex) {
  const r2 = parseInt(hex.slice(1,3),16);
  const g2 = parseInt(hex.slice(3,5),16);
  const b2 = parseInt(hex.slice(5,7),16);
  rgb = {r:r2,g:g2,b:b2};
  hsl = rgbToHsl(r2,g2,b2);
  hsv = rgbToHsv(r2,g2,b2);
  updateRgbInputs();
  updateHslInputs();
  updateHsvInputs();
  updateSliderGradients();
  renderOutput(rgbToHex(r2,g2,b2));
}

document.addEventListener('DOMContentLoaded', () => {
  applyLang(currentLang);
  updateRgbInputs();
  updateHslInputs();
  updateHsvInputs();
  updateSliderGradients();
  renderOutput(rgbToHex(59,130,246));
});
</script>
