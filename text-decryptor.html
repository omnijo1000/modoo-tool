function vigenereDecrypt(s,key){
  key=key.toLowerCase().replace(/[^a-z]/g,'');if(!key)return s;
  let ki=0;return s.replace(/[a-zA-Z]/g,c=>{const b=c<='Z'?65:97;const sh=key[ki++%key.length].charCodeAt(0)-97;return String.fromCharCode((c.charCodeAt(0)-b-sh+26)%26+b);});
}
async function aesDecrypt(b64,pwd){
  const enc=new TextEncoder();
  const buf=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const salt=buf.slice(0,16),iv=buf.slice(16,28),ct=buf.slice(28);
  const keyMat=await crypto.subtle.importKey('raw',enc.encode(pwd),{name:'PBKDF2'},false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},keyMat,{name:'AES-GCM',length:256},false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return new TextDecoder().decode(plain);
}
async function doDecrypt(){
  const t=_i18n[_lang];const text=document.getElementById('input').value.trim();
  const errEl=document.getElementById('errMsg');errEl.textContent='';
  if(!text){errEl.textContent=t.errNo;return;}
  let result='';
  try{
    if(_algo==='rot13'){result=rot13(text);}
    else if(_algo==='caesar'){const sh=parseInt(document.getElementById('shiftInput')?.value)||3;result=caesarDec(text,sh);}
    else if(_algo==='vigenere'){const k=document.getElementById('keyInput')?.value||'';if(!k.match(/[a-zA-Z]/)){errEl.textContent=t.errNoKey;return;}result=vigenereDecrypt(text,k);}
    else{const pwd=document.getElementById('pwdInput')?.value||'';if(!pwd){errEl.textContent=t.errNoPwd;return;}result=await aesDecrypt(text,pwd);}
  }catch(e){errEl.textContent=t.errDec;return;}
  const ob=document.getElementById('outBox');ob.style.display='block';
  document.getElementById('outputTa').value=result;
  document.getElementById('noticeEl').textContent=_algo==='aes'?t.noticeAes:'';
}
function copyOut(){
  const t=_i18n[_lang];const b=document.getElementById('btnCopy');
  navigator.clipboard.writeText(document.getElementById('outputTa').value).then(()=>{b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,1500);});
}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('lblAlgo').textContent=t.lblAlgo;document.getElementById('lblInput').textContent=t.lblInput;
  document.getElementById('lblOut').textContent=t.lblOut;document.getElementById('btnDec').textContent=t.btnDec;document.getElementById('btnCopy').textContent=t.btnCopy;
  document.getElementById('algoRow').innerHTML=ALGOS.map((a,i)=>`<button class="algo-chip${_algo===a?' active':''}" data-algo="${a}" onclick="setAlgo('${a}')">${t.algos[i]}</button>`).join('');
  buildKeyArea();document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
_lang=detectLang();applyLang();
