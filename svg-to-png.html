    seoHtml:`<h2>SVG to PNG 변환기</h2><p>SVG 벡터 파일을 PNG 래스터 이미지로 변환합니다. <strong>배율(Scale)</strong>을 1×~8×로 조정하여 고해상도 PNG를 얻을 수 있으며, 투명 배경 또는 사용자 지정 배경색을 선택할 수 있습니다. 브라우저의 Canvas API를 사용하여 서버 전송 없이 로컬에서 처리합니다.</p>

<details class="faq-item"><summary>어떤 SVG 파일을 지원하나요?</summary><p>.svg 확장자 파일을 지원합니다.</p></details>
<details class="faq-item"><summary>최대 배율은?</summary><p>8×까지 설정 가능하며 메모리 한계에 따라 다를 수 있습니다.</p></details>
<details class="faq-item"><summary>애니메이션 SVG는 어떻게 되나요?</summary><p>정지 프레임(첫 프레임)으로 캡처됩니다.</p></details>`
  },
  en:{h1b:'PNG',sub:'Convert SVG to high-resolution PNG with background color and scale settings',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'SVG to PNG Converter | MODOO HUB',dzText:'Drag & drop SVG or click to upload',lblOpts:'Conversion settings',lblScale:'Scale',lblTransp:'Transparent background',lblBg:'Background color',btnConvert:'Convert to PNG',lblOut:'Result',btnDl:'Download PNG',
    seoHtml:`<h2>SVG to PNG Converter</h2><p>Convert SVG vector files to PNG raster images. Adjust <strong>scale</strong> from 1× to 8× for high-resolution output, and choose transparent or custom background color. All processing happens locally in your browser — no server upload.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Why convert SVG to PNG?</summary><p>PNG is universally supported; SVG may not work in some apps or services.</p></details>
<details class="faq-item"><summary>How does scale work?</summary><p>2× outputs PNG at twice the SVG's native resolution. Use 4× or higher for high-DPI displays.</p></details>
<details class="faq-item"><summary>Transparent background requirements?</summary><p>SVG must not define a background fill for transparency to be preserved.</p></details>
<details class="faq-item"><summary>Is my file sent to a server?</summary><p>No — processing is entirely local in the browser.</p></details>
<details class="faq-item"><summary>SVGs with external resources?</summary><p>SVGs referencing external URLs may be restricted by CORS.</p></details>
<details class="faq-item"><summary>Supported file types?</summary><p>.svg files are supported.</p></details>
<details class="faq-item"><summary>Max scale?</summary><p>Up to 8×, limited by available browser memory.</p></details>
<details class="faq-item"><summary>What about animated SVGs?</summary><p>The first/static frame is captured.</p></details>`
  },
  zh:{h1b:'PNG',sub:'将SVG矢量图转换为高分辨率PNG，支持背景色和缩放设置',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'SVG转PNG | MODOO HUB',dzText:'拖拽SVG文件或点击上传',lblOpts:'转换设置',lblScale:'缩放',lblTransp:'透明背景',lblBg:'背景颜色',btnConvert:'转换为PNG',lblOut:'转换结果',btnDl:'下载PNG',
    seoHtml:`<h2>SVG转PNG转换器</h2><p>将SVG矢量文件转换为PNG光栅图像。可调整<strong>缩放比例</strong>（1×至8×）获得高分辨率输出，并选择透明背景或自定义背景色。所有处理在浏览器本地进行，无需上传服务器。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>为什么要将SVG转PNG？</summary><p>PNG被所有环境支持，而SVG在某些应用中不被支持。</p></details>
<details class="faq-item"><summary>缩放如何工作？</summary><p>2×输出SVG原始分辨率两倍的PNG，高清需求请选择4×以上。</p></details>
<details class="faq-item"><summary>透明背景的条件？</summary><p>SVG不能单独定义背景色，才能保持透明。</p></details>
<details class="faq-item"><summary>文件会上传服务器吗？</summary><p>不会，所有处理在浏览器本地完成。</p></details>
<details class="faq-item"><summary>含外部资源的SVG？</summary><p>引用外部URL的SVG可能受CORS限制。</p></details>
<details class="faq-item"><summary>支持哪些文件类型？</summary><p>支持.svg格式文件。</p></details>
<details class="faq-item"><summary>最大缩放倍数？</summary><p>最高支持8×，受浏览器内存限制。</p></details>
<details class="faq-item"><summary>动画SVG会怎样？</summary><p>捕获第一帧（静态）。</p></details>`
  },
  ja:{h1b:'PNG',sub:'SVGベクターをPNG画像に変換、背景色・倍率設定対応',backLink:'← ホーム',langBtn:'🌐 한국어',pageTitle:'SVGからPNGへ変換 | MODOO HUB',dzText:'SVGファイルをドラッグまたはクリックしてアップロード',lblOpts:'変換設定',lblScale:'倍率',lblTransp:'透明背景',lblBg:'背景色',btnConvert:'PNGに変換',lblOut:'変換結果',btnDl:'PNGダウンロード',
    seoHtml:`<h2>SVGからPNGへ変換</h2><p>SVGベクターファイルをPNGラスター画像に変換します。<strong>倍率</strong>を1×〜8×に設定して高解像度PNGを取得でき、透明背景またはカスタム背景色を選択できます。すべてブラウザのローカルで処理します。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>SVGをPNGに変換する理由は？</summary><p>PNGはすべての環境でサポートされていますが、SVGは一部のアプリで非対応です。</p></details>
<details class="faq-item"><summary>倍率の仕組みは？</summary><p>2×はSVGのネイティブ解像度の2倍のPNGを出力します。</p></details>
<details class="faq-item"><summary>透明背景の条件は？</summary><p>SVGが背景色を定義していない場合に透明が維持されます。</p></details>
<details class="faq-item"><summary>ファイルはサーバーに送信されますか？</summary><p>いいえ、すべてブラウザのローカルで処理されます。</p></details>
<details class="faq-item"><summary>外部リソースを含むSVGは？</summary><p>外部URLを参照するSVGはCORSの制約を受ける場合があります。</p></details>
<details class="faq-item"><summary>対応ファイル形式は？</summary><p>.svgファイルに対応しています。</p></details>
<details class="faq-item"><summary>最大倍率は？</summary><p>8×まで設定可能で、メモリに依存します。</p></details>
<details class="faq-item"><summary>アニメーションSVGは？</summary><p>最初のフレーム（静止画）として取得されます。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','dzText','lblOpts','lblScale','lblTransp','lblBg','btnConvert','lblOut','btnDl'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function fmtBytes(n){return n<1024?n+' B':(n/1024).toFixed(1)+' KB';}
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFile(e.dataTransfer.files[0]);});
document.getElementById('fileIn').addEventListener('change',e=>loadFile(e.target.files[0]));
document.getElementById('transpBg').addEventListener('change',e=>{
  document.getElementById('bgColorField').style.display=e.target.checked?'none':'flex';
});
function loadFile(file){
  if(!file||!file.type.includes('svg'))return;
  const r=new FileReader();
  r.onload=e=>{_svgText=e.target.result;document.getElementById('optBox').style.display='block';document.getElementById('outBox').style.display='none';};
  r.readAsText(file);
}
function convert(){
  if(!_svgText)return;
  const scale=Math.max(1,Math.min(8,parseInt(document.getElementById('scale').value)||2));
  const transp=document.getElementById('transpBg').checked;
  const bgColor=document.getElementById('bgColor').value;
  const blob=new Blob([_svgText],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    const w=img.naturalWidth||img.width||512;
    const h=img.naturalHeight||img.height||512;
    const cvs=document.getElementById('cvs');
    cvs.width=w*scale;cvs.height=h*scale;
    const ctx=cvs.getContext('2d');
    if(!transp){ctx.fillStyle=bgColor;ctx.fillRect(0,0,cvs.width,cvs.height);}
    ctx.drawImage(img,0,0,cvs.width,cvs.height);
    URL.revokeObjectURL(url);
    document.getElementById('outBox').style.display='block';
    document.getElementById('outInfo').textContent=`${cvs.width} × ${cvs.height} px`;
  };
  img.onerror=()=>{URL.revokeObjectURL(url);alert('SVG 렌더링 실패');};
  img.src=url;
}
