    seoHtml:`<h2>Article Schema Generator</h2><p>Generate Article Schema JSON-LD for blog posts, news articles, and technical documentation. Google uses Article schema to display publish dates, author information, and article images in search results — essential structured data for news and blog SEO.</p>

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','sectBasic','sectAuthor','sectPub','lblTitle','lblDesc','lblType','lblUrl','lblImg','lblSection','lblDatePub','lblDateMod','lblAuthorName','lblAuthorUrl','lblPubName','lblPubLogo','btnGen','btnSample','btnClear','outTitle','btnCopy'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function gv(id){return document.getElementById(id).value.trim();}
function toISO(val){if(!val)return '';try{return new Date(val).toISOString();}catch{return val;}}
function generate(){
  const title=gv('fTitle');if(!title)return;
  const type=gv('fType')||'Article';
  const schema={"@context":"https://schema.org","@type":type,"headline":title};
  if(gv('fDesc'))schema.description=gv('fDesc');
  if(gv('fImg'))schema.image=gv('fImg');
  if(gv('fUrl'))schema.url=gv('fUrl');
  if(gv('fSection'))schema.articleSection=gv('fSection');
  if(gv('fDatePub'))schema.datePublished=toISO(gv('fDatePub'));
  if(gv('fDateMod'))schema.dateModified=toISO(gv('fDateMod'));
  if(gv('fAuthorName')){schema.author={"@type":"Person","name":gv('fAuthorName')};if(gv('fAuthorUrl'))schema.author.url=gv('fAuthorUrl');}
  if(gv('fPubName')){schema.publisher={"@type":"Organization","name":gv('fPubName')};if(gv('fPubLogo'))schema.publisher.logo={"@type":"ImageObject","url":gv('fPubLogo')};}
  document.getElementById('outPre').textContent=JSON.stringify(schema,null,2);
  document.getElementById('outBox').style.display='block';
}
function copyOut(){navigator.clipboard.writeText(document.getElementById('outPre').textContent);}
function clearForm(){['fTitle','fDesc','fUrl','fImg','fSection','fDatePub','fDateMod','fAuthorName','fAuthorUrl','fPubName','fPubLogo'].forEach(id=>document.getElementById(id).value='');document.getElementById('outBox').style.display='none';}
function loadSample(){
  const now=new Date().toISOString().slice(0,16);
  document.getElementById('fTitle').value=_lang==='ko'?'2026년 SEO 가이드: 검색 상위 노출을 위한 10가지 전략':_lang==='ja'?'2026年SEOガイド：検索上位表示のための10の戦略':_lang==='zh'?'2026年SEO指南：排名前列的10个策略':'2026 SEO Guide: 10 Strategies to Rank Higher';
  document.getElementById('fDesc').value=_lang==='ko'?'최신 Google 알고리즘에 맞춘 SEO 전략을 소개합니다.':_lang==='ja'?'最新Googleアルゴリズムに合わせたSEO戦略を紹介します。':_lang==='zh'?'介绍与最新Google算法匹配的SEO策略。':'Learn SEO strategies aligned with the latest Google algorithm updates.';
  document.getElementById('fType').value='BlogPosting';
  document.getElementById('fUrl').value='https://example.com/blog/seo-guide-2026';
  document.getElementById('fImg').value='https://example.com/images/seo-guide.jpg';
  document.getElementById('fSection').value='SEO';
  document.getElementById('fDatePub').value=now;
  document.getElementById('fDateMod').value=now;
  document.getElementById('fAuthorName').value=_lang==='ko'?'홍길동':_lang==='ja'?'山田太郎':_lang==='zh'?'张三':'John Smith';
  document.getElementById('fAuthorUrl').value='https://example.com/authors/john-smith';
  document.getElementById('fPubName').value='MODOO BLOG';
  document.getElementById('fPubLogo').value='https://modoohub.com/logo.png';
  generate();
}
_lang=detectLang();applyLang();
document.getElementById('fDatePub').value=new Date().toISOString().slice(0,16);
