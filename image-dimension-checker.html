const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFiles(e.dataTransfer.files);});
document.getElementById('fileInput').addEventListener('change',e=>handleFiles(e.target.files));
function handleFiles(files){for(const f of files){if(f.type.startsWith('image/'))checkFile(f);}}
function checkFile(file){
  const t=_i18n[_lang];const url=URL.createObjectURL(file);const img=new Image();
  img.onload=()=>{
    const w=img.naturalWidth,h=img.naturalHeight;
    const g=gcd(w,h);const ratio=`${w/g}:${h/g}`;
    const px=(w*h);const pxStr=px>=1e6?(px/1e6).toFixed(1)+'MP':px.toLocaleString()+'px';
    const fmtSize=b=>b>=1024*1024?(b/1024/1024).toFixed(2)+'MB':b>=1024?(b/1024).toFixed(1)+'KB':b+'B';
    const ext=(file.name.match(/\.(\w+)$/)||['',''])[1].toUpperCase()||file.type.split('/')[1].toUpperCase();
    const div=document.createElement('div');div.className='file-item';
    const thumbImg=document.createElement('img');thumbImg.src=url;thumbImg.className='thumb-mini';thumbImg.onload=()=>{};
    div.appendChild(thumbImg);
    const info=document.createElement('div');info.className='fi-info';
    info.innerHTML=`<div class="fi-name">${file.name}</div><div class="fi-dims"><span style="color:var(--accent)">${w} × ${h}</span> &nbsp;·&nbsp; ${ratio} &nbsp;·&nbsp; ${fmtSize(file.size)} &nbsp;·&nbsp; ${ext} &nbsp;·&nbsp; ${pxStr}</div>`;
    div.appendChild(info);
    document.getElementById('fileList').appendChild(div);
    URL.revokeObjectURL(url);
  };
  img.onerror=()=>URL.revokeObjectURL(url);
  img.src=url;
}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function clearAll(){document.getElementById('fileList').innerHTML='';document.getElementById('fileInput').value='';}
_lang=detectLang();applyLang();
</script>
