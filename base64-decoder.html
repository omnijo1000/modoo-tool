      <details class="faq-item"><summary>Q. Standard와 URL-safe Base64를 어떻게 구분하나요?</summary><p>A. Standard Base64에는 +와 / 문자가 포함되고 끝에 = 패딩이 있습니다. URL-safe Base64는 대신 -와 _를 사용하며 패딩이 없는 경우가 많습니다. JWT는 항상 URL-safe입니다. Auto-detect 모드가 자동으로 판별합니다.</p></details>

// ── 언어 초기화 ──────────────────────────────────────────────────────
let lang = (function() {
  const p = new URLSearchParams(location.search).get('lang');
  if (p && i18n[p]) return p;
  const s = localStorage.getItem('modoo_lang');
  if (s && i18n[s]) return s;
  const n = (navigator.language || '').slice(0,2);
  return n === 'zh' ? 'zh' : n === 'ja' ? 'ja' : n === 'ko' ? 'ko' : 'en';
})();

let decMode = 'auto';

function applyLang() {
  const t = i18n[lang];
  document.documentElement.lang = lang;
  document.title = t.pageTitle;
  const map = {
    h1Title:'h1', h1Sub:'sub', backLink:'backLink', langBtn:'langBtn',
    optModeLabel:'optModeLabel', optAuto:'optAuto', optStandard:'optStandard', optUrlSafe:'optUrlSafe',
    btnPaste:'btnPaste', btnClear:'btnClear', btnSample:'btnSample',
    btnDecode:'btnDecode', btnCopy:'btnCopy', copySmall:'btnCopy', btnDownload:'btnDownload',
    labelInput:'labelInput', labelOutput:'labelOutput',
    footerText:'footer'
  };
  for (const [id, key] of Object.entries(map)) {
    const el = document.getElementById(id);
    if (!el) continue;
    if (key === 'h1') el.innerHTML = t.h1;
    else el.textContent = t[key];
  }
  document.getElementById('statusText').textContent = t.statusIdle;
  document.getElementById('input').placeholder = t.placeholder;
  document.getElementById('output').placeholder = t.placeholderOut;
  document.getElementById('seoSection').innerHTML = t.seoHtml;
  updateCount();
}

function toggleLang() {
  const order = ['ko','en','zh','ja'];
  lang = order[(order.indexOf(lang) + 1) % order.length];
  localStorage.setItem('modoo_lang', lang);
  applyLang();
}

function setMode(m) {
  decMode = m;
  ['optAuto','optStandard','optUrlSafe'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  const activeId = m === 'auto' ? 'optAuto' : m === 'standard' ? 'optStandard' : 'optUrlSafe';
  const activeEl = document.getElementById(activeId);
  if (activeEl) activeEl.classList.add('active');
}

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  document.getElementById('statusText').textContent = msg;
}

function updateCount() {
  const n = document.getElementById('input').value.length;
  document.getElementById('inputCount').textContent = i18n[lang].charCount(n);
}

function decode() {
  let b64 = document.getElementById('input').value.trim().replace(/\s/g,'');
  if (!b64) return;
  try {
    // normalize based on mode
    const isUrlSafe = decMode === 'url-safe' || (decMode === 'auto' && /[-_]/.test(b64));
    if (isUrlSafe) {
      b64 = b64.replace(/-/g,'+').replace(/_/g,'/');
    }
    // add padding
    while (b64.length % 4) b64 += '=';
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const text = new TextDecoder().decode(bytes);
    document.getElementById('output').value = text;
    document.getElementById('output').className = 'success';
    setStatus('ok', i18n[lang].statusOk(text.length));
  } catch(e) {
    document.getElementById('output').value = '';
    document.getElementById('output').className = 'error';
    setStatus('err', i18n[lang].statusErr);
  }
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('output').value = '';
  document.getElementById('output').className = '';
  updateCount();
  setStatus('idle', i18n[lang].statusIdle);
}

function copyOutput() {
  const text = document.getElementById('output').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopy');
    const sm = document.getElementById('copySmall');
    const done = i18n[lang].copyDone;
    btn.textContent = done;
    if (sm) sm.textContent = done;
    btn.style.color = 'var(--green)';
    setTimeout(() => {
      btn.textContent = i18n[lang].btnCopy;
      if (sm) sm.textContent = i18n[lang].btnCopy;
      btn.style.color = '';
    }, 2000);
  });
}

function downloadOutput() {
  const text = document.getElementById('output').value;
  if (!text) return;
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'decoded.txt';
  a.click();
  URL.revokeObjectURL(url);
}

async function pasteInput() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('input').value = text;
    updateCount();
  } catch(e) {}
}

function loadSample() {
  // "Hello, World! 안녕하세요 こんにちは" in Base64
  document.getElementById('input').value = 'SGVsbG8sIFdvcmxkISDsnbTripQg7ISk7KCc7ZiV';
  document.getElementById('output').value = '';
  document.getElementById('output').className = '';
  updateCount();
  setStatus('idle', i18n[lang].statusIdle);
}
