function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','lblText','orEl','lblWords','lblSpeed','lblSlow','lblAvg','lblFast','lblReadLabel','lblSpeakLabel'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('txtInput').placeholder=t.txtPh;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  calc();
}
function setSpeed(el,wpm){document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');_wpm=wpm;calc();}
function fromText(){const t=document.getElementById('txtInput').value.trim();const words=t?t.split(/\s+/).filter(Boolean).length:0;_words=words;document.getElementById('wordNum').value=words;const t2=_i18n[_lang];document.getElementById('wciEl').textContent=words?words.toLocaleString()+' '+(t2.lblWords||'words'):'';calc();}
function fromNum(){_words=parseInt(document.getElementById('wordNum').value)||0;document.getElementById('wciEl').textContent='';calc();}
function fmtTime(mins){if(mins<1)return '<1 min';if(mins<60){const m=Math.round(mins);return m+' min'+(m!==1?'s':'');}const h=Math.floor(mins/60),m=Math.round(mins%60);return h+'h '+(m>0?m+'m':'');}
function calc(){
  const readMins=_words/_wpm;
  const speakMins=_words/(_i18n[_lang].speakWpm||130);
  document.getElementById('readTime').textContent=fmtTime(readMins);
  document.getElementById('speakTime').textContent=fmtTime(speakMins);
