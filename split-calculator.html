        <button class="ppl-btn" onclick="changePpl(-1,'i')">−</button>
        <div class="ppl-count" id="iPplCount">4</div>
        <button class="ppl-btn" onclick="changePpl(1,'i')">+</button>
        <div class="ppl-label">명</div>

<script>
let sPpl=4, iPpl=4;
let itemCount=0, customCount=0;

function switchTab(id,btn){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  btn.classList.add('active');
}
function changePpl(d,type){
  if(type==='s'){sPpl=Math.max(1,sPpl+d);document.getElementById('sPplCount').textContent=sPpl;}
  else{iPpl=Math.max(1,iPpl+d);document.getElementById('iPplCount').textContent=iPpl;}
}
function fmt(n){return Math.round(n).toLocaleString('ko-KR')+'원';}

function calcSimple(){
  const total=parseFloat(document.getElementById('sTotal').value)||0;
  const round=document.getElementById('sRound').checked;
  let per=total/sPpl;
  if(round) per=Math.ceil(per/100)*100;
  document.getElementById('sPerPerson').textContent=fmt(per);
  document.getElementById('sSub').textContent=`총 ${fmt(total)} ÷ ${sPpl}명 = 1인당 ${fmt(per)}`;
  document.getElementById('simpleResult').style.display='block';
}

function addItem(){
  itemCount++;
  const div=document.createElement('div');
  div.className='item-row';
  div.id='ir'+itemCount;
  div.innerHTML=`<input class="item-name" type="text" placeholder="메뉴명" value="">
    <input class="item-price" type="number" placeholder="금액" value="" min="0" oninput="updateItemSum()">
    <input class="item-qty" type="number" placeholder="수량" value="1" min="1" oninput="updateItemSum()">
    <button class="remove-btn" onclick="this.parentElement.remove();updateItemSum()">×</button>`;
  document.getElementById('itemRows').appendChild(div);
  updateItemSum();
}
function updateItemSum(){
  let s=0;
  document.querySelectorAll('#itemRows .item-row').forEach(r=>{
    const price=parseFloat(r.querySelector('.item-price').value)||0;
    const qty=parseInt(r.querySelector('.item-qty').value)||1;
    s+=price*qty;
  });
  document.getElementById('itemSum').textContent=fmt(s);
}
function calcItems(){
  let s=0;
  document.querySelectorAll('#itemRows .item-row').forEach(r=>{
    const price=parseFloat(r.querySelector('.item-price').value)||0;
    const qty=parseInt(r.querySelector('.item-qty').value)||1;
    s+=price*qty;
  });
  const per=Math.ceil(s/iPpl/100)*100;
  document.getElementById('iPerPerson').textContent=fmt(per);
  document.getElementById('iSub').textContent=`총 ${fmt(s)} ÷ ${iPpl}명 = 1인당 ${fmt(per)}`;
  document.getElementById('itemResult').style.display='block';
}

function addCustom(){
  customCount++;
  const div=document.createElement('div');
  div.className='item-row';
  div.id='cr'+customCount;
  div.innerHTML=`<input class="item-name" type="text" placeholder="이름" value="인원${customCount}">
    <input class="item-price" type="number" placeholder="금액" value="" min="0" oninput="updateCustomSum()">
    <button class="remove-btn" onclick="this.parentElement.remove();updateCustomSum()">×</button>`;
  document.getElementById('customRows').appendChild(div);
  updateCustomSum();
}
function updateCustomSum(){
  let s=0;
  document.querySelectorAll('#customRows .item-row').forEach(r=>{
    s+=parseFloat(r.querySelector('.item-price').value)||0;
  });
  document.getElementById('customSum').textContent=fmt(s);
}
function calcCustom(){
  const rows=[];
  document.querySelectorAll('#customRows .item-row').forEach(r=>{
    const name=r.querySelector('.item-name').value||'인원';
    const amt=parseFloat(r.querySelector('.item-price').value)||0;
    rows.push({name,amt});
  });
  if(rows.length===0) return;
  const total=rows.reduce((a,r)=>a+r.amt,0);
  const avg=total/rows.length;
  const grid=document.getElementById('customShareGrid');
  grid.innerHTML=rows.map(r=>{
    const diff=r.amt-avg;
    const action=diff>0?`<span style="color:#4ade80">+${fmt(diff)} 받기</span>`:diff<0?`<span style="color:#f87171">${fmt(diff)} 내기</span>`:`<span style="color:var(--text-dim)">정산 없음</span>`;
    return `<div class="share-row">
      <div><div class="share-name">${r.name}</div><div style="font-size:11px;color:var(--text-dim);">낸 금액 ${fmt(r.amt)}</div></div>
      <div>${action}</div>
    </div>`;
  }).join('');
  document.getElementById('customResult').style.display='block';
}

// init
addItem();addItem();addItem();
addCustom();addCustom();addCustom();
</script>

Object.assign(_i18n.ko, {
  seoHtml:'<h2>더치페이 계산기 사용법</h2><p>더치페이(Dutch Pay)는 식사나 모임 비용을 참여자들이 균등하게 분담하는 방식입니다. 영어로는 "Going Dutch"라 하며, 한국에서는 1/N 정산으로도 불립니다. 균등 분담과 품목별 분담 두 가지 방식을 지원합니다.</p><details class="faq-item"><summary>잔돈(나머지)은 어떻게 처리하나요?</summary><p>이 계산기는 100원 단위 올림 옵션을 제공합니다. 예를 들어 1인당 37,500원이라면 37,600원씩 받아 잔돈을 공동 자금으로 활용하거나 한 명이 덜 내는 방식으로 처리할 수 있습니다.</p></details><details class="faq-item"><summary>사람마다 다른 금액을 설정할 수 있나요?</summary><p>네, 커스텀 정산 모드에서 각 인원의 금액을 개별 입력하면 합계와 각자 내야 할 금액을 계산해 줍니다. 술을 안 마신 사람, 일찍 자리를 뜬 사람 등의 차등 분담에 유용합니다.</p></details><details class="faq-item"><summary>카카오페이로 바로 송금할 수 있나요?</summary><p>이 계산기는 금액 계산만 지원하며 직접 송금 기능은 없습니다. 계산 후 카카오페이, 토스, 네이버페이 등 송금 앱을 통해 각자에게 청구하시면 됩니다.</p></details><details class="faq-item"><summary>품목별 계산과 균등 분담 중 어떤 것을 써야 하나요?</summary><p>간단한 회식이라면 균등 분담이 편리합니다. 각자 시킨 메뉴 가격이 크게 다르거나 참여 시간이 다를 경우 품목별 계산 모드를 사용하면 더 공정하게 나눌 수 있습니다.</p></details><details class="faq-item"><summary>계산 결과를 저장하거나 공유할 수 있나요?</summary><p>현재 자동 저장 기능은 없습니다. 화면을 캡처하거나 결과를 복사해서 단체 채팅방에 공유하는 방식을 권장합니다. 모든 계산은 브라우저에서만 처리되며 서버로 전송되지 않습니다.</p></details>'

Object.assign(_i18n.en, {
  seoHtml:'<h2>How to Use the Bill Split Calculator</h2><p>Dutch pay means splitting shared expenses equally among all participants. Also known as "Going Dutch," it is widely used for dining, trips, and group events. This calculator supports both equal splitting and item-based splitting modes.</p><details class="faq-item"><summary>How do I handle leftover change after rounding?</summary><p>This calculator offers a round-up option (to the nearest 100 KRW). For example, if each person owes 37,500 KRW, you can collect 37,600 KRW and use the remainder as shared funds or reduce one person\'s share.</p></details><details class="faq-item"><summary>Can I split unequal amounts between people?</summary><p>Yes — use the custom split mode to enter each person\'s individual amount. The calculator totals everything and shows what each person owes. This is useful when someone didn\'t drink or left early.</p></details><details class="faq-item"><summary>Can I use this to send payment requests directly?</summary><p>This calculator handles the math only — it does not send money directly. After calculating, use a payment app (Venmo, PayPal, Cash App, Kakao Pay, etc.) to request payment from each person.</p></details><details class="faq-item"><summary>When should I use item-based vs. equal splitting?</summary><p>Equal splitting works best for simple meals with similar costs. Use item-based splitting when people ordered very different items or some participants only attended part of the event, so costs are more fairly distributed.</p></details><details class="faq-item"><summary>Can I save or share the calculation result?</summary><p>There is no built-in save feature. Take a screenshot or copy the result text and share it in a group chat. All calculations run locally in your browser — no data is stored or sent to a server.</p></details>'
});
Object.assign(_i18n.zh, {
  seoHtml:'<h2>AA制计算器使用指南</h2><p>AA制是将聚餐或活动费用由参与者平均分摊的方式，适用于聚会、旅行和团体活动。本计算器支持均等分摊和按品目分摊两种模式，方便快速结算。</p><details class="faq-item"><summary>如何处理分摊后的零头？</summary><p>本工具支持按100韩元进位取整。例如人均37,500韩元时可按37,600韩元收取，零头可作为公共费用或减少某一人的支付金额，避免零钱麻烦。</p></details><details class="faq-item"><summary>可以为每个人设置不同金额吗？</summary><p>可以，使用自定义分摊模式分别输入每个人的金额，计算器会自动汇总并显示各人应付金额。适用于有人没喝酒、提前离场等差异化分摊场景。</p></details><details class="faq-item"><summary>可以直接通过这个工具转账吗？</summary><p>本计算器仅提供金额计算功能，不支持直接转账。计算完成后，请使用支付宝、微信支付等转账工具向各成员请款。</p></details><details class="faq-item"><summary>什么时候用品目计算，什么时候用均等分摊？</summary><p>简单聚餐且消费相近时，均等分摊最为方便。若各人点的菜品价格差异较大，或部分成员仅参加了一段时间，建议使用品目分摊，分配更加公平。</p></details><details class="faq-item"><summary>可以保存或分享计算结果吗？</summary><p>目前没有自动保存功能。建议截图或复制结果文字后分享到群聊。所有计算均在浏览器本地完成，不上传任何数据到服务器。</p></details>'
});
Object.assign(_i18n.ja, {
  seoHtml:'<h2>割り勘計算機の使い方</h2><p>割り勘は食事や集まりの費用を参加者が均等に分担する方式です。「ワリカン」とも呼ばれ、飲み会・旅行・グループイベントで広く使われます。この計算機は均等分担と品目別分担の両方に対応しています。</p><details class="faq-item"><summary>端数はどう処理しますか？</summary><p>この計算機は切り上げオプションを提供しています。例えば1人あたり37,500円の場合、37,600円ずつ集めて端数を共同費用にするか、1人分を減らす方法で処理できます。</p></details><details class="faq-item"><summary>人によって異なる金額を設定できますか？</summary><p>はい、カスタム分担モードで各人の金額を個別に入力すると、合計と各人の支払額を計算します。お酒を飲まなかった人や途中退席した人など、差異がある場合に便利です。</p></details><details class="faq-item"><summary>この計算機から直接送金できますか？</summary><p>この計算機は金額の計算のみに対応しており、直接送金機能はありません。計算後はPayPay、LINE Pay、楽天ペイなどの送金アプリで各自に請求してください。</p></details><details class="faq-item"><summary>品目別計算と均等分担はどちらを使うべきですか？</summary><p>シンプルな飲み会で消費が近い場合は均等分担が便利です。各自の注文金額に大きな差がある場合や、一部の参加者が途中から参加した場合は品目別分担の方が公平に分けられます。</p></details><details class="faq-item"><summary>計算結果を保存・共有できますか？</summary><p>現在、自動保存機能はありません。画面をキャプチャするか結果をコピーしてグループチャットで共有することをお勧めします。すべての計算はブラウザ内で行われ、データはサーバーに送信されません。</p></details>'
});
function _detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  else if (n.startsWith('ja')) return 'ja';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}
let _lang = _detectLang();
function _applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = t.lang;
  document.title = t.title;
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = t.btn;
  const h1 = document.querySelector('h1');
  if (h1) h1.innerHTML = t.h1;
  const sub = document.querySelector('.subtitle');
  if (sub) sub.textContent = t.sub;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  const back = document.querySelector('.back-link');
  if (back) back.textContent = (_lang === 'ko') ? '← 모두의 툴' : (_lang === 'zh') ? '← 首页' : (_lang === 'ja') ? '← ホーム' : '← Home';
}
const _langOrder = ['ko','en','zh','ja'];
function cycleLang() {
  const idx = _langOrder.indexOf(_lang);
  _lang = _langOrder[(idx + 1) % _langOrder.length];
  localStorage.setItem('lang', _lang);
  const url = new URL(location.href);
  if (_lang === 'ko') { url.searchParams.delete('lang'); } else { url.searchParams.set('lang', _lang); }
  history.replaceState({}, '', url);
  _applyLang();
}
_applyLang();
</script>
