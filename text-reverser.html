<body>
<header>
  <div class="dot"></div>
  <span class="header-label">MODOO HUB</span>

</header>
<main>
  <h1>Text <span>Reverser</span></h1>
  <p class="subtitle" data-i18n="sub">Choose a mode and reverse your text instantly.</p>

  <div class="mode-row">
    <button class="mode-btn active" id="modeText" onclick="setMode('text')" data-i18n="modeText">Reverse Text</button>
    <button class="mode-btn" id="modeWord" onclick="setMode('word')" data-i18n="modeWord">Reverse Each Word</button>
    <button class="mode-btn" id="modeLine" onclick="setMode('line')" data-i18n="modeLine">Reverse Each Line</button>
  </div>

  <div class="col-wrap">
    <div>
      <div class="col-label" data-i18n="labelInput">INPUT</div>
      <textarea id="inputArea" placeholder="Type or paste text here..." oninput="doReverse()"></textarea>
    </div>
    <div>
      <div class="col-label" data-i18n="labelOutput">OUTPUT</div>
      <textarea id="outputArea" placeholder="Reversed text will appear here..." readonly></textarea>
    </div>
  </div>

  <div class="toolbar">
    <button class="tool-btn" onclick="copyOutput()" data-i18n="btnCopy">📋 Copy</button>
    <button class="tool-btn" onclick="clearAll()" data-i18n="btnClear">🗑 Clear</button>
    <button class="tool-btn" onclick="swapIO()" data-i18n="btnSwap">⇄ Swap</button>
  </div>

  <div class="seo">
    <h2 id="seoTitle1"></h2>
    <p id="seoBody1"></p>
    <p id="seoFaq1"></p>
    <p id="seoFaq2"></p>
  </div>
  <footer>© 2026 MODOO HUB · Free · <a href="privacy.html" style="color:var(--text-dim);text-decoration:none;">Privacy Policy</a></footer>
</main>
<script>
let _mode='text';
function setMode(m){
  _mode=m;
  ['text','word','line'].forEach(k=>document.getElementById('mode'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('active',k===m));
  doReverse();
}
function doReverse(){
  const input=document.getElementById('inputArea').value;
  let out='';
  if(_mode==='text'){out=[...input].reverse().join('');}
  else if(_mode==='word'){out=input.split('\n').map(l=>l.split(/(\s+)/).reverse().join('')).join('\n');}
  else{out=input.split('\n').reverse().join('\n');}
  document.getElementById('outputArea').value=out;
}
function copyOutput(){const v=document.getElementById('outputArea').value;if(v)navigator.clipboard.writeText(v);}
function clearAll(){document.getElementById('inputArea').value='';document.getElementById('outputArea').value='';}
function swapIO(){const a=document.getElementById('inputArea'),b=document.getElementById('outputArea');const t=a.value;a.value=b.value;b.value=t;doReverse();}
</script>

};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
  ['seoTitle1','seoBody1','seoFaq1','seoFaq2'].forEach(id=>{const el=document.getElementById(id);if(el&&t[id]!==undefined)el.innerHTML=t[id];});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
