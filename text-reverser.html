<script>
let _mode='text';
function setMode(m){
  _mode=m;
  ['text','word','line'].forEach(k=>document.getElementById('mode'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('active',k===m));
  doReverse();
}
function doReverse(){
  const input=document.getElementById('inputArea').value;
  let out='';
  if(_mode==='text'){out=[...input].reverse().join('');}
  else if(_mode==='word'){out=input.split('\n').map(l=>l.split(/(\s+)/).reverse().join('')).join('\n');}
  else{out=input.split('\n').reverse().join('\n');}
  document.getElementById('outputArea').value=out;
}
function copyOutput(){const v=document.getElementById('outputArea').value;if(v)navigator.clipboard.writeText(v);}
function clearAll(){document.getElementById('inputArea').value='';document.getElementById('outputArea').value='';}
function swapIO(){const a=document.getElementById('inputArea'),b=document.getElementById('outputArea');const t=a.value;a.value=b.value;b.value=t;doReverse();}
</script>

    seoHtml:'<h2>텍스트 뒤집기 도구란?</h2><p>텍스트 뒤집기 도구는 텍스트의 문자 순서, 단어 순서, 또는 줄 순서를 뒤집어 주는 온라인 도구입니다. 암호화 놀이, 미러 텍스트, 코드 테스트 등에 활용됩니다.</p><details class="faq-item"><summary>텍스트 전체 뒤집기와 각 단어 뒤집기의 차이는?</summary><p>전체 뒤집기는 모든 문자 순서를 역전시키고, 단어 뒤집기는 각 단어 내 문자만 뒤집습니다.</p></details><details class="faq-item"><summary>한국어, 중국어도 지원하나요?</summary><p>네. 유니코드 문자를 지원하므로 모든 언어의 텍스트를 뒤집을 수 있습니다.</p></details><details class="faq-item"><summary>줄 순서 뒤집기란?</summary><p>각 줄의 내용은 그대로 두고 줄의 배치 순서 자체를 거꾸로 바꿉니다. 로그 파일을 최신순으로 정렬할 때 유용합니다.</p></details><details class="faq-item"><summary>미러 텍스트란 무엇인가요?</summary><p>텍스트 전체를 뒤집으면 거울에 비친 것처럼 반대로 읽히는 미러 텍스트가 됩니다. 디자인이나 재미로 활용됩니다.</p></details><details class="faq-item"><summary>결과를 저장하려면?</summary><p>복사 버튼을 클릭하면 결과를 클립보드에 복사할 수 있습니다. 교체 버튼으로 입력과 출력을 바꿀 수 있습니다.</p></details><details class="faq-item"><summary>이모지(Emoji)도 올바르게 뒤집히나요?</summary><p>이모지는 유니코드 서로게이트 쌍(surrogate pair)으로 구성되어 있어 단순 문자 반전 시 깨질 수 있습니다. 이 도구는 유니코드 인식 반전을 지원해 이모지가 포함된 텍스트도 올바르게 처리합니다.</p></details><details class="faq-item"><summary>팰린드롬(palindrome) 확인에 사용할 수 있나요?</summary><p>가능합니다. 텍스트를 뒤집은 결과가 원본과 같으면 팰린드롬입니다. 뒤집기 결과를 원본과 직접 비교하거나, 팰린드롬 체커 도구를 사용하면 더 정확하게 확인할 수 있습니다.</p></details><details class="faq-item"><summary>숫자나 특수문자도 함께 뒤집히나요?</summary><p>네. 숫자, 특수문자, 구두점 등 모든 문자가 위치 순서대로 뒤집힙니다. 예: "Hello, World! 123" → "321 !dlroW ,olleH".</p></details>'},

    seoHtml:'<h2>What is Text Reverser?</h2><p>Text Reverser is a free online tool that flips your text backwards. Choose to reverse the entire text character by character, reverse each individual word, or reverse the order of lines.</p><details class="faq-item"><summary>What is the difference between Reverse Text and Reverse Each Word?</summary><p>Reverse Text flips all characters in the entire string. Reverse Each Word flips characters within each word individually.</p></details><details class="faq-item"><summary>Does it support non-English text?</summary><p>Yes. The tool uses Unicode-aware character splitting, so it works with Korean, Chinese, Japanese, Arabic and all other languages.</p></details><details class="faq-item"><summary>What does Reverse Each Line do?</summary><p>It reverses the order of lines while keeping each line\'s content intact. Useful for showing the most recent log entries first.</p></details><details class="faq-item"><summary>What is mirror text?</summary><p>Reversing the entire text character by character creates mirror text — text that reads backwards like a reflection. Used in art and fun designs.</p></details><details class="faq-item"><summary>How do I save the result?</summary><p>Click the Copy button to copy the reversed text to your clipboard. Use the Swap button to move the output back to the input area.</p></details><details class="faq-item"><summary>Are emoji handled correctly when reversing?</summary><p>Emoji consist of Unicode surrogate pairs and can break with simple character reversal. This tool uses Unicode-aware reversal that correctly handles text containing emoji.</p></details><details class="faq-item"><summary>Can I use this to check if text is a palindrome?</summary><p>Yes. If the reversed text matches the original, it is a palindrome. Compare the reversed output to the original, or use a dedicated palindrome checker for more accurate detection.</p></details><details class="faq-item"><summary>Are numbers and special characters also reversed?</summary><p>Yes. Numbers, special characters, and punctuation are all reversed in positional order. Example: "Hello, World! 123" → "321 !dlroW ,olleH".</p></details>'},

    seoHtml:'<h2>文字翻转工具简介</h2><p>文字翻转工具可以将文本的字符顺序、单词顺序或行顺序进行反转，适用于加密游戏、镜像文本、代码测试等场景。</p><details class="faq-item"><summary>反转整段文本和反转每个单词有什么区别？</summary><p>反转整段文本会将所有字符的顺序颠倒，反转每个单词只颠倒每个单词内部的字符顺序。</p></details><details class="faq-item"><summary>支持中文、韩文吗？</summary><p>支持。工具使用Unicode字符分割，可处理所有语言的文本。</p></details><details class="faq-item"><summary>反转每一行是什么意思？</summary><p>保持每行内容不变，只将行的排列顺序颠倒。适合将日志文件按最新顺序排列。</p></details><details class="faq-item"><summary>什么是镜像文本？</summary><p>将整段文本按字符反转后，读起来就像镜中倒影，即为镜像文本。常用于设计和趣味场景。</p></details><details class="faq-item"><summary>如何保存结果？</summary><p>点击复制按钮可将翻转后的文本复制到剪贴板。使用交换按钮可将输出内容放回输入框。</p></details><details class="faq-item"><summary>反转时表情符号（Emoji）能正确处理吗？</summary><p>表情符号由Unicode代理对组成，简单字符反转可能导致乱码。本工具支持Unicode感知反转，能正确处理包含表情符号的文本。</p></details><details class="faq-item"><summary>可以用来检查文本是否是回文吗？</summary><p>可以。如果反转后的文本与原文相同，则为回文。将反转结果与原文对比，或使用专门的回文检测工具进行更精确的判断。</p></details><details class="faq-item"><summary>数字和特殊字符也会被反转吗？</summary><p>会的。数字、特殊字符和标点符号都会按位置顺序反转。例："Hello, World! 123" → "321 !dlroW ,olleH"。</p></details>'},

    seoHtml:'<h2>テキスト反転ツールとは？</h2><p>テキスト反転ツールは、テキストの文字順・単語順・行順を逆にするオンラインツールです。暗号遊び・ミラーテキスト・コードテストなどに活用できます。</p><details class="faq-item"><summary>テキスト全体の反転と各単語の反転の違いは？</summary><p>全体反転はすべての文字順を逆にします。単語反転は各単語内の文字のみを逆にします。</p></details><details class="faq-item"><summary>日本語・韓国語などにも対応していますか？</summary><p>はい。Unicode文字分割を使用しているため、すべての言語のテキストを反転できます。</p></details><details class="faq-item"><summary>各行を反転するとは？</summary><p>各行の内容はそのままで、行の並び順を逆にします。ログファイルを最新順に並べるときに便利です。</p></details><details class="faq-item"><summary>ミラーテキストとは何ですか？</summary><p>テキスト全体を文字単位で反転すると、鏡に映ったような逆読みのミラーテキストになります。デザインや遊びに活用できます。</p></details><details class="faq-item"><summary>結果を保存するには？</summary><p>コピーボタンをクリックすると結果をクリップボードにコピーできます。入替ボタンで出力を入力欄に移すこともできます。</p></details><details class="faq-item"><summary>絵文字（Emoji）も正しく反転されますか？</summary><p>絵文字はUnicodeサロゲートペアで構成されており、単純な文字反転では壊れることがあります。このツールはUnicode認識反転をサポートし、絵文字を含むテキストも正しく処理します。</p></details><details class="faq-item"><summary>パリンドローム（回文）チェックに使えますか？</summary><p>できます。反転したテキストが元のテキストと一致すれば回文です。反転結果と元のテキストを直接比較するか、専用の回文チェッカーを使うとより正確に確認できます。</p></details><details class="faq-item"><summary>数字や特殊文字も反転されますか？</summary><p>はい。数字、特殊文字、句読点もすべて位置順に反転されます。例："Hello, World! 123" → "321 !dlroW ,olleH"。</p></details>'}
};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
