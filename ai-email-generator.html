<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What makes a good business email?</summary><p>Clear subject, greeting, purpose, key content, CTA, professional closing.</p></details>

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1Accent','subEl','backLink','langBtn','lblSender','lblRecipient','lblTone','lblLang','lblContext','btnGen','btnClear','btnCopy','btnCopySubj'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  const toneSel=document.getElementById('tone');
  Object.keys(t.tones).forEach((k,i)=>{if(toneSel.options[i])toneSel.options[i].text=t.tones[k];});
  const langSel=document.getElementById('emailLang');
  Object.keys(t.emailLangs).forEach((k,i)=>{if(langSel.options[i])langSel.options[i].text=t.emailLangs[k];});
  document.getElementById('typeGrid').innerHTML=t.types.map(tp=>
    `<button class="type-btn${_type===tp.id?' active':''}" onclick="setType('${tp.id}')">${tp.icon}<br>${tp.label}</button>`
  ).join('');
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function setType(id){_type=id;const t=_i18n[_lang];document.querySelectorAll('.type-btn').forEach((b,i)=>b.classList.toggle('active',t.types[i].id===id));}
function generateEmail(){
  const t=_i18n[_lang];
  const sender=document.getElementById('sender').value.trim()||'[발신자]';
  const recipient=document.getElementById('recipient').value.trim()||'[수신자]';
  const tone=document.getElementById('tone').value;
  const context=document.getElementById('context').value.trim();
  const subj=t.defaultSubj[_type]||'이메일';
  const greeting=t.greetings[tone]||t.greetings.professional;
  const closing=t.closings[tone]||t.closings.professional;
  const body=context||'[핵심 내용을 입력해 주세요]';
  _genSubject=subj;
  _genBody=`${greeting}\n\n${body}\n\n${closing}\n${sender}`;
  document.getElementById('emailSubj').textContent=subj;
  document.getElementById('emailMeta').textContent=`${sender} → ${recipient}`;
  document.getElementById('emailBody').textContent=_genBody;
}
function clearAll(){
  ['sender','recipient','context'].forEach(id=>document.getElementById(id).value='');
  _genSubject='';_genBody='';
  document.getElementById('emailSubj').textContent=_i18n[_lang].lblContext;
  document.getElementById('emailMeta').textContent='';
  document.getElementById('emailBody').textContent='';
}
function copyEmail(){
  const t=_i18n[_lang];
  const full=`제목: ${_genSubject}\n\n${_genBody}`;
  if(!_genBody)return;
  navigator.clipboard.writeText(full).then(()=>{const b=document.getElementById('btnCopy');b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,2000);});
}
function copySubject(){
  const t=_i18n[_lang];
  if(!_genSubject)return;
  navigator.clipboard.writeText(_genSubject).then(()=>{const b=document.getElementById('btnCopySubj');b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopySubj,2000);});
}
_lang=detectLang();applyLang();
