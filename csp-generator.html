const _i18n={
  ko:{pageTitle:'CSP 생성기 - Content Security Policy 헤더 생성 | MODOO HUB',h1Span:'생성기',sub:'Content Security Policy 지시어 설정 → 헤더 값·서버 설정 즉시 생성',backLink:'← 모두의 툴',langBtn:'🌐 EN',labelDirectives:'지시어 설정',labelHeader:'헤더 값',labelMeta:'HTML Meta 태그',labelNginx:'Nginx 설정',labelApache:'Apache 설정',btnCopy:'복사',copyDone:'복사됨 ✓',
    seoHtml:`<h2>CSP(Content Security Policy)란?</h2><p>CSP는 브라우저가 로드할 수 있는 리소스 출처를 제한하는 HTTP 응답 헤더입니다. <strong>XSS(크로스 사이트 스크립팅), 데이터 인젝션, 클릭재킹</strong> 등의 공격을 방어합니다. script-src에 허용된 출처 외의 스크립트는 실행이 차단됩니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>'self'와 '*'의 차이는?</summary><p>'self'는 현재 페이지와 동일한 오리진(프로토콜+도메인+포트)만 허용합니다. '*'는 모든 출처를 허용하므로 CSP의 보안 효과를 완전히 없앱니다. 가능한 한 구체적인 도메인을 명시하세요.</p></details>
<details class="faq-item"><summary>'unsafe-inline'과 'unsafe-eval'을 피해야 하는 이유는?</summary><p>'unsafe-inline'은 인라인 스크립트/스타일을 허용해 XSS 공격이 가능해집니다. 'unsafe-eval'은 eval()과 유사한 함수를 허용합니다. 대신 nonce-{랜덤값} 또는 hash 기반으로 특정 인라인 코드만 허용하세요.</p></details>
<details class="faq-item"><summary>CSP를 Report-Only 모드로 테스트하는 방법은?</summary><p>Content-Security-Policy-Report-Only 헤더를 사용하면 차단하지 않고 위반 사항만 보고합니다. report-uri 지시어로 보고 URL을 지정하고 차단 없이 테스트하세요.</p></details>
<details class="faq-item"><summary>Google Analytics와 CSP 충돌 해결법은?</summary><p>script-src에 'https://www.googletagmanager.com', img-src에 'https://www.google-analytics.com'을 추가하세요. GTM을 사용한다면 nonce 기반 설정이 더 정확합니다.</p></details>
<details class="faq-item"><summary>default-src와 다른 지시어의 관계는?</summary><p>default-src는 지정되지 않은 다른 지시어의 폴백 역할을 합니다. script-src를 명시하면 script에 대해서는 default-src를 무시합니다. 각 지시어를 개별적으로 세밀하게 설정하는 것이 좋습니다.</p></details>
<details class="faq-item"><summary>CSP 메타 태그와 HTTP 헤더의 차이는?</summary><p>&lt;meta http-equiv="Content-Security-Policy"&gt;는 HTML에 직접 포함할 수 있어 서버 설정 없이도 사용 가능합니다. 단, frame-ancestors, sandbox, report-uri 등 일부 지시어는 메타 태그에서 지원되지 않습니다.</p></details>
<details class="faq-item"><summary>nonce 기반 CSP란?</summary><p>서버에서 요청마다 랜덤 nonce를 생성해 스크립트에 nonce="값"으로 추가하고 CSP에 'nonce-값'으로 허용합니다. 인라인 스크립트를 안전하게 허용하는 권장 방법입니다.</p></details>
<details class="faq-item"><summary>object-src 'none'이 권장되는 이유는?</summary><p>Flash, Java 등 레거시 플러그인은 보안 취약점이 많습니다. object-src 'none'으로 플러그인을 완전히 차단하는 것이 현대 웹 보안 모범 사례입니다.</p></details>`

  en:{pageTitle:'CSP Generator - Content Security Policy Header Generator | MODOO HUB',h1Span:'Generator',sub:'Configure CSP directives → instantly generate header value, meta tag & server config',backLink:'← All Tools',langBtn:'🌐 中文',labelDirectives:'Configure Directives',labelHeader:'Header Value',labelMeta:'HTML Meta Tag',labelNginx:'Nginx Config',labelApache:'Apache Config',btnCopy:'Copy',copyDone:'Copied ✓',
    seoHtml:`<h2>What is CSP (Content Security Policy)?</h2><p>CSP is an HTTP response header that restricts which resource origins a browser can load. It defends against <strong>XSS (Cross-Site Scripting), data injection, and clickjacking</strong>. Scripts from non-whitelisted origins are blocked from executing.</p>
<h2 class="seo-sub">Frequently Asked Questions</h2>
<details class="faq-item"><summary>What is the difference between 'self' and '*'?</summary><p>'self' allows only the same origin (protocol + domain + port) as the current page. '*' allows all origins, completely defeating CSP&apos;s security benefit. Always specify concrete domains where possible.</p></details>
<details class="faq-item"><summary>Why avoid 'unsafe-inline' and 'unsafe-eval'?</summary><p>'unsafe-inline' allows inline scripts and styles, re-enabling XSS attacks. 'unsafe-eval' permits eval() and similar functions. Instead, use nonce-{random} or hash-based allowlists for specific inline code.</p></details>
<details class="faq-item"><summary>How to test CSP in Report-Only mode?</summary><p>Use the Content-Security-Policy-Report-Only header — it reports violations without blocking. Add a report-uri directive pointing to your reporting endpoint to test without breaking the site.</p></details>
<details class="faq-item"><summary>How to fix Google Analytics CSP conflicts?</summary><p>Add https://www.googletagmanager.com to script-src and https://www.google-analytics.com to img-src. For GTM, nonce-based configuration is more precise.</p></details>
<details class="faq-item"><summary>How do default-src and other directives interact?</summary><p>default-src is a fallback for directives not explicitly set. If you set script-src, it overrides default-src for scripts only. Configure each directive individually for fine-grained control.</p></details>
<details class="faq-item"><summary>CSP meta tag vs HTTP header?</summary><p>The &lt;meta http-equiv="Content-Security-Policy"&gt; tag can be included in HTML without server configuration. However, some directives (frame-ancestors, sandbox, report-uri) are not supported in meta tags.</p></details>
<details class="faq-item"><summary>What is nonce-based CSP?</summary><p>The server generates a random nonce per request, adds nonce="value" to scripts, and includes 'nonce-value' in the CSP. This is the recommended way to safely allow inline scripts.</p></details>
<details class="faq-item"><summary>Why is object-src 'none' recommended?</summary><p>Legacy plugins (Flash, Java) have many security vulnerabilities. Setting object-src 'none' completely blocks plugin-based attacks — a modern web security best practice.</p></details>`
  },
  zh:{pageTitle:'CSP生成器 - Content Security Policy头生成 | MODOO HUB',h1Span:'生成器',sub:'配置CSP指令 → 即时生成头值·元标签·服务器配置',backLink:'← 所有工具',langBtn:'🌐 日本語',labelDirectives:'配置指令',labelHeader:'头值',labelMeta:'HTML Meta标签',labelNginx:'Nginx配置',labelApache:'Apache配置',btnCopy:'复制',copyDone:'已复制 ✓',
    seoHtml:`<h2>什么是CSP（内容安全策略）？</h2><p>CSP是限制浏览器可加载资源来源的HTTP响应头，防御<strong>XSS（跨站脚本）、数据注入和点击劫持</strong>等攻击。来自非白名单来源的脚本将被阻止执行。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>'self'和'*'的区别？</summary><p>'self'只允许与当前页面相同的源（协议+域名+端口）。'*'允许所有来源，完全消除CSP的安全效果。请尽可能指定具体域名。</p></details>
<details class="faq-item"><summary>为什么要避免'unsafe-inline'和'unsafe-eval'？</summary><p>'unsafe-inline'允许内联脚本和样式，重新使XSS攻击成为可能。'unsafe-eval'允许eval()等函数。建议改用nonce-{随机值}或基于hash的白名单来允许特定内联代码。</p></details>
<details class="faq-item"><summary>如何以Report-Only模式测试CSP？</summary><p>使用Content-Security-Policy-Report-Only头——只报告违规而不阻止。添加report-uri指令指向你的报告端点，无需阻断即可测试。</p></details>
<details class="faq-item"><summary>如何解决Google Analytics与CSP的冲突？</summary><p>在script-src中添加https://www.googletagmanager.com，在img-src中添加https://www.google-analytics.com。使用GTM时，基于nonce的配置更精确。</p></details>
<details class="faq-item"><summary>default-src与其他指令的关系？</summary><p>default-src是未明确设置的指令的后备。如果设置了script-src，它仅覆盖脚本的default-src。建议为每个指令单独配置以实现精细控制。</p></details>
<details class="faq-item"><summary>CSP meta标签与HTTP头的区别？</summary><p>&lt;meta http-equiv="Content-Security-Policy"&gt;可直接包含在HTML中，无需服务器配置。但部分指令（frame-ancestors、sandbox、report-uri）不支持meta标签方式。</p></details>
<details class="faq-item"><summary>什么是基于nonce的CSP？</summary><p>服务器为每个请求生成随机nonce，在脚本上添加nonce="值"，并在CSP中包含'nonce-值'。这是安全允许内联脚本的推荐方式。</p></details>
<details class="faq-item"><summary>为什么推荐object-src 'none'？</summary><p>Flash、Java等旧版插件存在大量安全漏洞。设置object-src 'none'完全阻断基于插件的攻击——这是现代Web安全最佳实践。</p></details>`
  },

<details class="faq-item"><summary>'unsafe-inline'と'unsafe-eval'を避けるべき理由は？</summary><p>'unsafe-inline'はインラインスクリプト/スタイルを許可しXSS攻撃を再び可能にします。'unsafe-eval'はeval()等の関数を許可します。代わりにnonce-{ランダム値}またはhashベースで特定インラインコードのみ許可してください。</p></details>
<details class="faq-item"><summary>CSPをReport-Onlyモードでテストするには？</summary><p>Content-Security-Policy-Report-Onlyヘッダーを使うとブロックせず違反のみ報告します。report-uriディレクティブでレポートURLを指定しサイトを壊さずテストできます。</p></details>

<details class="faq-item"><summary>default-srcと他のディレクティブの関係は？</summary><p>default-srcは明示的に設定されていない他のディレクティブのフォールバックです。script-srcを設定するとスクリプトについてのみdefault-srcを上書きします。各ディレクティブを個別に細かく設定するのが良いでしょう。</p></details>

const LANGS=['ko','en','zh','ja'];
let _lang='ko';

function detectLang(){
  const u=new URLSearchParams(location.search).get('lang');
  if(u&&_i18n[u])return u;
  const s=localStorage.getItem('modoo_lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language?.slice(0,2);
  return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';
}
function cycleLang(){
  const idx=LANGS.indexOf(_lang);
  _lang=LANGS[(idx+1)%LANGS.length];
  localStorage.setItem('modoo_lang',_lang);
  const url=new URL(location.href);
  url.searchParams.set('lang',_lang);
  history.replaceState({},'',url);
  applyLang();
}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.title=t.pageTitle;
  document.getElementById('h1Span').textContent=t.h1Span;
  document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('labelDirectives').textContent=t.labelDirectives;
  document.getElementById('labelHeader').textContent=t.labelHeader;
  document.getElementById('labelMeta').textContent=t.labelMeta;
  document.getElementById('labelNginx').textContent=t.labelNginx;
  document.getElementById('labelApache').textContent=t.labelApache;
  document.getElementById('btnCopyHeader').textContent=t.btnCopy;
  document.getElementById('btnCopyMeta').textContent=t.btnCopy;
  document.getElementById('btnCopyNginx').textContent=t.btnCopy;
  document.getElementById('btnCopyApache').textContent=t.btnCopy;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  renderDirectiveForm();
  generate();
}
function renderDirectiveForm(){
  const form=document.getElementById('dirForm');
  form.innerHTML='';
  DIRECTIVES.forEach(d=>{
    const div=document.createElement('div');
    div.className='dir-row';
    const desc=d.desc[_lang]||d.desc.en;
    div.innerHTML=`<div class="dir-name">${d.key}</div><div class="dir-desc">${desc}</div><input type="text" class="dir-input" id="dir_${d.key.replace(/-/g,'_')}" placeholder="" oninput="generate()"><div class="quick-btns">${KEYWORDS.map(k=>`<button class="qbtn" onclick="addKw('${d.key.replace(/-/g,'_')}','${k}')">${k}</button>`).join('')}</div>`;
    form.appendChild(div);
  });
}
function addKw(id,kw){
  const el=document.getElementById('dir_'+id);
  const cur=el.value.trim();
  const parts=cur?cur.split(/\s+/):[];
  if(!parts.includes(kw)){parts.push(kw);}
  el.value=parts.join(' ');
  generate();
}
function generate(){
  const parts=[];
  DIRECTIVES.forEach(d=>{
    const el=document.getElementById('dir_'+d.key.replace(/-/g,'_'));
    if(!el)return;
    const v=el.value.trim();
    if(v)parts.push(d.key+' '+v);
  });
  const policy=parts.join('; ');
  document.getElementById('outHeader').value=policy?'Content-Security-Policy: '+policy:'';
  document.getElementById('outMeta').value=policy?`<meta http-equiv="Content-Security-Policy" content="${policy}">`:'' ;
  document.getElementById('outNginx').value=policy?`add_header Content-Security-Policy "${policy}";`:'';
  document.getElementById('outApache').value=policy?`Header always set Content-Security-Policy "${policy}"`:'';
}
function copy(id,btnId){
  const t=_i18n[_lang];
  const text=document.getElementById(id).value;
  if(!text)return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById(btnId);
    const orig=btn.textContent;
    btn.textContent=t.copyDone;
    btn.style.background='var(--green)';btn.style.borderColor='var(--green)';btn.style.color='#000';
    setTimeout(()=>{btn.textContent=orig;btn.style.background='';btn.style.borderColor='';btn.style.color='';},2000);
  });
}
_lang=detectLang();
applyLang();
