  const orig=new Blob([h]).size;
  if(!h){document.getElementById('htmlOut').value='';document.getElementById('statsBar').innerHTML='';return;}
  if(document.getElementById('optComments').checked)h=h.replace(/<!--(?!>|->)[\s\S]*?-->/g,'');
  if(document.getElementById('optNewlines').checked)h=h.replace(/\r?\n/g,' ');
  if(document.getElementById('optSpaces').checked)h=h.replace(/>\s+</g,'><');
  if(document.getElementById('optAttrs').checked)h=h.replace(/\s{2,}/g,' ');
  h=h.trim();
  document.getElementById('htmlOut').value=h;
  const min=new Blob([h]).size;
  const t=_i18n[_lang];
  document.getElementById('statsBar').innerHTML=orig>0?`<span class="stat-item">${t.statFn(orig,min)}</span>`:'';
}
function copyOutput(){const v=document.getElementById('htmlOut').value;if(!v)return;navigator.clipboard.writeText(v).then(()=>{const t=_i18n[_lang];const b=document.getElementById('btnCopy');b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,2000);});}
function downloadOut(){const v=document.getElementById('htmlOut').value;if(!v)return;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([v],{type:'text/html'}));a.download='minified.html';a.click();}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
