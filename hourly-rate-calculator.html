<script>
const _i18n={
  ko:{pageTitle:'시급 계산기 | 모두의 툴',h1:'⏱ 시급 계산기',sub:'시급으로 일급·주급·월급·연봉을 계산합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',hourlyLabel:'시급 (원)',hoursLabel:'일 근무시간',daysLabel:'주 근무일',otLabel:'초과근무 시간/주',monthlyLbl:'월급 (209h 기준)',hourlyLbl:'시급',dailyLbl:'일급',weeklyLbl:'주급',annualLbl:'연봉',otTitle:'초과근무 수당 (1.5배)',otWeeklyLbl:'주당 초과 수당',otMonthlyLbl:'월 초과 수당',seoHtml:`<h2>시급 계산기란?</h2><p>시급(시간당 임금)을 입력해 일급, 주급, 월급, 연봉을 한 번에 계산합니다. 주 근무일수와 일 근무시간을 설정할 수 있으며, 초과근무(연장근로) 시간에 따른 수당도 자동으로 계산합니다. 한국 기준 월급은 주 40시간 근무 기준 209시간으로 계산됩니다. 아르바이트, 파트타임, 일용직 근로자의 임금 계산에 유용합니다.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. 시급 10,000원이면 월급이 얼마인가요?</summary><p>A. 주 40시간, 월 209시간 기준: 10,000원 × 209시간 = 2,090,000원.</p></details><details class="faq-item"><summary>Q. 209시간은 어떻게 나오나요?</summary><p>A. 주 40시간 + 주휴수당(8시간) = 48시간. 48 × 52주 / 12개월 ≈ 209시간.</p></details><details class="faq-item"><summary>Q. 초과근무 수당 계산 방법은?</summary><p>A. 연장근로는 기본 시급의 1.5배. 초과 주당 시간 × 1.5 × 시급.</p></details><details class="faq-item"><summary>Q. 최저시급보다 낮으면 위법인가요?</summary><p>A. 네. 2026년 최저시급(10,320원) 미만은 최저임금법 위반입니다.</p></details><details class="faq-item"><summary>Q. 주휴수당은 자동으로 포함되나요?</summary><p>A. 월급 계산(209시간 기준)에는 주휴수당이 포함됩니다.</p></details><details class="faq-item"><summary>Q. 세금(소득세)은 포함되나요?</summary><p>A. 이 계산기는 세전 금액입니다. 실수령액은 세금 공제 후 달라집니다.</p></details><details class="faq-item"><summary>Q. 시급 계산에 4대보험은?</summary><p>A. 4대보험료는 별도입니다. 급여에서 별도로 공제됩니다.</p></details><details class="faq-item"><summary>Q. 일용직 일급 계산은?</summary><p>A. 시급 × 일 근무시간으로 일급을 계산합니다.</p></details>`},
  en:{pageTitle:'Hourly Rate Calculator | Modoo Tools',h1:'⏱ Hourly Rate Calculator',sub:'Calculate daily, weekly, monthly, and annual pay from hourly rate',backLink:'← All Tools',langBtn:'🌐 中文',hourlyLabel:'Hourly Rate ($)',hoursLabel:'Hours/Day',daysLabel:'Days/Week',otLabel:'Overtime Hours/Week',monthlyLbl:'Monthly (avg)',hourlyLbl:'Hourly',dailyLbl:'Daily',weeklyLbl:'Weekly',annualLbl:'Annual',otTitle:'Overtime Pay (1.5×)',otWeeklyLbl:'Weekly OT Pay',otMonthlyLbl:'Monthly OT Pay',seoHtml:`<h2>Hourly Rate Calculator</h2><p>Enter your hourly rate to instantly calculate daily, weekly, monthly, and annual earnings. Customize working hours and days per week, and automatically calculate overtime pay at 1.5× the base rate. Useful for part-time workers, freelancers, and hourly employees comparing job offers.</p><h2 class="seo-sub">FAQ</h2><details class="faq-item"><summary>Q. How much is $20/hour monthly?</summary><p>A. At 5 days/week, 8 hours/day: $20 × 40h × 4.333 weeks = ~$3,467/month.</p></details><details class="faq-item"><summary>Q. How is overtime calculated?</summary><p>A. Overtime is 1.5× the base hourly rate. Federal law requires OT for hours over 40/week.</p></details><details class="faq-item"><summary>Q. What is the US minimum wage?</summary><p>A. Federal minimum is $7.25/hour. Many states have higher rates.</p></details><details class="faq-item"><summary>Q. Is tax included?</summary><p>A. No. This shows gross pay. Taxes and deductions reduce your take-home pay.</p></details><details class="faq-item"><summary>Q. Does this work for part-time workers?</summary><p>A. Yes. Set your actual hours/day and days/week.</p></details><details class="faq-item"><summary>Q. How accurate is the monthly estimate?</summary><p>A. Based on 52 weeks / 12 months = 4.333 weeks per month on average.</p></details><details class="faq-item"><summary>Q. Can I include double-time pay?</summary><p>A. This tool uses 1.5× overtime. For double-time, multiply your OT pay by 2/1.5.</p></details><details class="faq-item"><summary>Q. How do I use this to compare job offers?</summary><p>A. Enter each hourly rate with the same work schedule to compare total earnings fairly.</p></details>`},
  zh:{pageTitle:'时薪计算器 | Modoo工具',h1:'⏱ 时薪计算器',sub:'通过时薪计算日薪、周薪、月薪和年薪',backLink:'← 首页',langBtn:'🌐 日本語',hourlyLabel:'时薪（元）',hoursLabel:'每天工作时间',daysLabel:'每周工作天数',otLabel:'每周加班时间',monthlyLbl:'月薪（平均）',hourlyLbl:'时薪',dailyLbl:'日薪',weeklyLbl:'周薪',annualLbl:'年薪',otTitle:'加班工资（1.5倍）',otWeeklyLbl:'每周加班工资',otMonthlyLbl:'每月加班工资',seoHtml:`<h2>时薪计算器</h2><p>输入时薪，即可一键计算日薪、周薪、月薪和年薪。可自定义每天工作时间和每周工作天数，并自动计算1.5倍加班工资。适用于兼职、零时工和按小时计薪的员工。</p><h2 class="seo-sub">常见问题</h2><details class="faq-item"><summary>Q. 时薪50元月薪是多少？</summary><p>A. 每周5天每天8小时：50×8×5×4.333≈8,667元/月。</p></details><details class="faq-item"><summary>Q. 加班工资如何计算？</summary><p>A. 加班工资为基本时薪的1.5倍，适用于超过法定工时的部分。</p></details><details class="faq-item"><summary>Q. 包含税吗？</summary><p>A. 不包含，显示的是税前工资。实际到手需扣除个税和社保。</p></details><details class="faq-item"><summary>Q. 兼职可以用吗？</summary><p>A. 可以，设置实际的每天工作时间和每周工作天数即可。</p></details><details class="faq-item"><summary>Q. 月薪估算准确吗？</summary><p>A. 基于52周/12个月=每月平均4.333周计算。</p></details><details class="faq-item"><summary>Q. 可以计算双倍加班费吗？</summary><p>A. 本工具用1.5倍，如需2倍，将加班工资乘以2/1.5即可。</p></details><details class="faq-item"><summary>Q. 最低工资标准是多少？</summary><p>A. 各地不同，请查阅当地劳动部门公告。</p></details><details class="faq-item"><summary>Q. 如何比较两份工作？</summary><p>A. 用相同工作时间设置分别计算，对比总收入。</p></details>`},
  ja:{pageTitle:'時給計算機 | Modooツール',h1:'⏱ 時給計算機',sub:'時給から日給・週給・月給・年収を計算します',backLink:'← ホーム',langBtn:'🌐 한국어',hourlyLabel:'時給（円）',hoursLabel:'1日の勤務時間',daysLabel:'週の勤務日数',otLabel:'週の残業時間',monthlyLbl:'月給（平均）',hourlyLbl:'時給',dailyLbl:'日給',weeklyLbl:'週給',annualLbl:'年収',otTitle:'残業代（1.25倍）',otWeeklyLbl:'週の残業代',otMonthlyLbl:'月の残業代',seoHtml:`<h2>時給計算機とは</h2><p>時給を入力して日給・週給・月給・年収を一度に計算します。1日の勤務時間と週の勤務日数をカスタマイズでき、残業代（法定割増賃金）も自動計算します。アルバイト・パートタイム・時給制社員の給与計算に便利です。</p><h2 class="seo-sub">よくある質問</h2><details class="faq-item"><summary>Q. 時給1,500円で月給はいくらですか？</summary><p>A. 週5日・1日8時間の場合：1,500円×8時間×5日×4.333週≈260,000円/月。</p></details><details class="faq-item"><summary>Q. 残業代の計算方法は？</summary><p>A. 法定労働時間（週40時間）を超えた場合、基本時給の1.25倍以上の割増賃金が必要です。</p></details><details class="faq-item"><summary>Q. 最低賃金はいくらですか？</summary><p>A. 2024年度の全国加重平均最低賃金は1,004円/時間です。</p></details><details class="faq-item"><summary>Q. 税金は含まれますか？</summary><p>A. 含まれません。表示は額面（税引前）です。</p></details><details class="faq-item"><summary>Q. パートタイムにも使えますか？</summary><p>A. はい。実際の勤務時間と勤務日数を設定してください。</p></details><details class="faq-item"><summary>Q. 月給の推計は正確ですか？</summary><p>A. 52週÷12ヶ月＝月平均4.333週で計算しています。</p></details><details class="faq-item"><summary>Q. 深夜手当は計算できますか？</summary><p>A. このツールは標準の割増賃金（1.25倍）を使用しています。深夜は1.25倍加算して手動計算してください。</p></details><details class="faq-item"><summary>Q. 2つのアルバイトを比較するには？</summary><p>A. それぞれ同じ条件で入力して月給を比較してください。</p></details>`}
};
let currentLang='ko';
function detectLang(){const p=new URLSearchParams(location.search).get('lang');if(p&&_i18n[p])return p;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
function applyLang(l){const t=_i18n[l]||_i18n.ko;document.title=t.pageTitle;document.documentElement.lang=l;document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});document.getElementById('seoContent').innerHTML=t.seoHtml||'';}
function toggleLang(){const order=['ko','en','zh','ja'];const next=order[(order.indexOf(currentLang)+1)%order.length];currentLang=next;localStorage.setItem('modoo_lang',next);const url=new URL(location.href);url.searchParams.set('lang',next);history.replaceState(null,'',url);applyLang(next);}
currentLang=detectLang();
document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));

function calc(){
  const hourly=parseFloat(document.getElementById('hourly').value);
  if(isNaN(hourly)){document.getElementById('resultGrid').style.display='none';document.getElementById('otSection').style.display='none';return;}
  const hpd=parseFloat(document.getElementById('hoursPerDay').value)||8;
  const dpw=parseFloat(document.getElementById('daysPerWeek').value)||5;
  const ot=parseFloat(document.getElementById('otHours').value)||0;
  const daily=hourly*hpd;
  const weekly=daily*dpw;
  const monthly=hourly*209;
  const annual=monthly*12;
  const fmt=(n)=>'₩'+Math.round(n).toLocaleString();
  document.getElementById('hourlyResult').textContent=fmt(hourly);
  document.getElementById('dailyNum').textContent=fmt(daily);
  document.getElementById('weeklyNum').textContent=fmt(weekly);
  document.getElementById('monthlyNum').textContent=fmt(monthly);
  document.getElementById('annualNum').textContent=fmt(annual);
  document.getElementById('resultGrid').style.display='grid';
  if(ot>0){
    const otPay=ot*hourly*1.5;
    document.getElementById('otWeeklyPay').textContent=fmt(otPay);
    document.getElementById('otMonthlyPay').textContent=fmt(otPay*4.333);
    document.getElementById('otSection').style.display='block';
  } else {
    document.getElementById('otSection').style.display='none';
  }
}
