<details class="faq-item"><summary>ページ別の単語数を確認できますか？</summary><p>はい、結果にページ別の単語数と文字数の内訳が含まれます。</p></details>
<details class="faq-item"><summary>抽出したテキストを保存できますか？</summary><p>テキストをコピーボタンでクリップボードにコピーできます。</p></details>
<details class="faq-item"><summary>パスワード保護されたPDFは？</summary><p>まずPDFアンロックツールでロックを解除してください。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','dropText','dropHint'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});
let _allText='';
async function handleFile(file){
  const t=_i18n[_lang];
  document.getElementById('progressBar').style.display='block';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('resultArea').innerHTML='';
  document.getElementById('scannedNote').style.display='none';
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  const n=pdf.numPages;const pageStats=[];let fullText='';
  for(let i=1;i<=n;i++){
    const pg=await pdf.getPage(i);const tc=await pg.getTextContent();
    const txt=tc.items.map(x=>x.str).join(' ');
    const words=txt.trim().split(/\s+/).filter(w=>w.length>0).length;
    const chars=txt.length;const charsNoSp=txt.replace(/\s/g,'').length;
    pageStats.push({page:i,words,chars,charsNoSp,txt});
    fullText+=txt+'\n';
    document.getElementById('progressFill').style.width=`${(i/n)*100}%`;
  }
  document.getElementById('progressBar').style.display='none';
  const totalWords=pageStats.reduce((a,b)=>a+b.words,0);
  const totalChars=fullText.length;const totalNoSp=fullText.replace(/\s/g,'').length;
  _allText=fullText;
  if(totalWords===0){document.getElementById('scannedNote').textContent=t.scannedNote;document.getElementById('scannedNote').style.display='block';return;}
  const ra=document.getElementById('resultArea');
  ra.innerHTML=`<div class="stats-grid">
<div class="stat-card"><div class="stat-num">${totalWords.toLocaleString()}</div><div class="stat-label">${t.lblWords}</div></div>
<div class="stat-card"><div class="stat-num">${totalChars.toLocaleString()}</div><div class="stat-label">${t.lblChars}</div></div>
<div class="stat-card"><div class="stat-num">${totalNoSp.toLocaleString()}</div><div class="stat-label">${t.lblCharsNoSp}</div></div>
<div class="stat-card"><div class="stat-num">${n}</div><div class="stat-label">${t.lblPages}</div></div>
</div>
<div class="btn-row" style="margin-bottom:14px">
<button class="btn" onclick="navigator.clipboard.writeText(_allText)">${t.btnCopy}</button>
<button class="btn" onclick="document.getElementById('resultArea').innerHTML=''">${t.btnClear}</button>
</div>
<div class="page-table">
<div class="pt-header">${t.txtPreview}</div>
<div class="pt-row head"><span>${t.lblPage}</span><span>${t.lblPgWords}</span><span>${t.lblPgChars}</span><span>${t.lblPgCharsN}</span></div>
${pageStats.map(p=>`<div class="pt-row data"><span>${p.page}</span><span>${p.words.toLocaleString()}</span><span>${p.chars.toLocaleString()}</span><span>${p.charsNoSp.toLocaleString()}</span></div>`).join('')}
</div>
<div style="margin-top:12px;font-size:11px;color:var(--text-dim);margin-bottom:6px;font-family:'DM Mono',monospace">${t.txtPreview}</div>
<div class="text-preview">${fullText.slice(0,2000)}${fullText.length>2000?'...':''}</div>`;
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
</html>
