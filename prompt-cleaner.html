let _lang='ko';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('labelInput').textContent=t.labelInput;document.getElementById('labelOutput').textContent=t.labelOutput;
  document.getElementById('cleanBtn').textContent=t.cleanBtn;document.getElementById('resetBtn').textContent=t.resetBtn;
  document.getElementById('copyBtn').textContent=t.copyBtn;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  renderOpts();
}
function renderOpts(){const l=_lang;document.getElementById('optsDiv').innerHTML=OPTS.map(o=>`<label class="opt-item"><input type="checkbox" id="opt_${o.id}" checked> ${o[l]||o.en}</label>`).join('');}
function getOpts(){const r={};OPTS.forEach(o=>r[o.id]=document.getElementById('opt_'+o.id)?.checked);return r;}
function estTokens(s){return Math.ceil(s.length*0.25);}
function clean(){
  const t=_i18n[_lang];const inp=document.getElementById('inputArea').value;const o=getOpts();
  let s=inp;
  if(o.singleNewline)s=s.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  if(o.removeTabs)s=s.replace(/\t/g,' ');
  if(o.trimLines)s=s.split('\n').map(l=>l.trim()).join('\n');
  if(o.collapseSpaces)s=s.replace(/ {2,}/g,' ');
  if(o.removeBlankLines)s=s.split('\n').filter(l=>l.trim()!=='').join('\n');
  else if(o.collapseBlank)s=s.replace(/\n{3,}/g,'\n\n');
  if(o.trimStart)s=s.trimStart();
  if(o.trimEnd)s=s.trimEnd();
  document.getElementById('outputArea').value=s;
  const bi=inp.length,bo=s.length,sv=bi-bo;
  const tkI=estTokens(inp),tkO=estTokens(s);
  document.getElementById('beforeStats').innerHTML=`<span class="stat-item">${t.chars}: <span class="stat-val">${bi.toLocaleString()}</span></span><span class="stat-item">${t.tokens}: <span class="stat-val">${tkI.toLocaleString()}</span></span>`;
  document.getElementById('afterStats').innerHTML=`<span class="stat-item">${t.chars}: <span class="stat-val">${bo.toLocaleString()}</span></span><span class="stat-item">${t.tokens}: <span class="stat-val">${tkO.toLocaleString()}</span></span><span class="stat-item"><span class="saved">${t.saved}: ${sv.toLocaleString()} chars</span></span>`;
}
function reset(){document.getElementById('inputArea').value='';document.getElementById('outputArea').value='';document.getElementById('beforeStats').innerHTML='';document.getElementById('afterStats').innerHTML='';}
function copyOut(){
  const t=_i18n[_lang];const v=document.getElementById('outputArea').value;if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{const btn=document.getElementById('copyBtn');const o=btn.textContent;btn.textContent=t.copied;setTimeout(()=>btn.textContent=o,1500);});
}
_lang=detectLang();applyLang();
</script>
