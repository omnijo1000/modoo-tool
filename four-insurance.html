<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4대보험 계산기 2026 - 건강·국민연금·고용·산재 계산</title>
<meta name="description" content="2026년 기준 4대보험(건강보험·국민연금·고용보험·산재보험) 계산기. 월급 입력 시 근로자·사업주 부담분 자동 계산.">
<meta property="og:title" content="4대보험 계산기 | MODOO HUB">
<meta property="og:image" content="https://modoohub.com/og-image.png">
<link rel="canonical" href="https://modoohub.com/four-insurance.html">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f0a;--surface:#111811;--surface2:#182018;--border:#1e2e1e;--accent:#86efac;--accent2:#4ade80;--accent3:#16a34a;--accent-dim:rgba(134,239,172,0.08);--text:#f0f5f0;--text-muted:#7a9a7a;--text-dim:#3a5a3a;--red:#f87171;--yellow:#facc15;--blue:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;gap:12px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);}
.header-label{font-size:13px;color:var(--text-muted);letter-spacing:.1em;font-family:'DM Mono',monospace;}
.back-link{margin-left:auto;font-size:13px;color:var(--text-muted);text-decoration:none;}
.back-link:hover{color:var(--accent2);}
main{max-width:680px;margin:0 auto;padding:48px 24px;}
h1{font-size:clamp(26px,5vw,38px);font-weight:900;line-height:1.1;margin-bottom:12px;}
h1 span{color:var(--accent2);}
.subtitle{color:var(--text-muted);font-size:14px;line-height:1.7;margin-bottom:40px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:14px;transition:border-color .2s;}
.card:focus-within{border-color:var(--accent3);}
label{font-size:12px;color:var(--text-muted);letter-spacing:.08em;display:block;margin-bottom:10px;}
.input-wrap{display:flex;align-items:center;gap:8px;}
input[type=number]{flex:1;background:transparent;border:none;outline:none;font-size:28px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;width:100%;min-width:0;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
.unit{color:var(--text-dim);font-size:14px;}
.radio-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.rbtn{flex:1;min-width:80px;padding:9px 6px;border:1px solid var(--border);border-radius:8px;text-align:center;font-size:13px;cursor:pointer;color:var(--text-muted);background:var(--surface2);transition:all .2s;}
.rbtn.on{border-color:var(--accent3);color:var(--accent2);background:var(--accent-dim);}
.result{border-radius:16px;padding:24px;margin-bottom:14px;display:none;background:var(--accent-dim);border:1px solid var(--accent3);}
.result.show{display:block;}
.ins-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
@media(max-width:500px){.ins-grid{grid-template-columns:1fr;}}
.ins-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.ins-name{font-size:11px;color:var(--text-dim);letter-spacing:.08em;margin-bottom:8px;}
.ins-worker{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--red);}
.ins-emp{font-size:12px;color:var(--text-muted);margin-top:4px;font-family:'DM Mono',monospace;}
.ins-rate{font-size:11px;color:var(--text-dim);margin-top:2px;}
.divider{height:1px;background:var(--border);margin:16px 0;}
.row{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.lk{color:var(--text-muted);}
.lv{font-family:'DM Mono',monospace;color:var(--text);}
.lv.red{color:var(--red);}
.lv.green{color:var(--accent2);}
.total-box{background:var(--surface);border-radius:10px;padding:16px;margin-top:16px;}
.total-title{font-size:11px;color:var(--text-dim);letter-spacing:.08em;margin-bottom:12px;}
.total-row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;}
.total-lk{color:var(--text-muted);}
.total-lv{font-family:'DM Mono',monospace;font-weight:700;}
.total-lv.red{color:var(--red);}
.total-lv.blue{color:var(--blue);}
.total-lv.green{color:var(--accent2);}
</style>
</head>
<body>
<header>
  <div class="dot"></div>
  <span class="header-label">MODOO HUB</span>
  <a href="/" class="back-link">← 홈으로</a>
</header>
<main>
  <h1><span>4대보험</span><br>계산기</h1>
  <p class="subtitle">2026년 기준 · 건강·국민연금·고용·산재 · 근로자·사업주 부담 구분</p>

  <div class="card">
    <label>월 급여 (보수월액, 세전)</label>
    <div class="input-wrap">
      <input type="number" id="salary" placeholder="0" oninput="calc()">
      <span class="unit">만원</span>
    </div>
  </div>

  <div class="card">
    <label>고용보험 업종 (산재보험료율 기준)</label>
    <div class="radio-row" id="industry">
      <div class="rbtn on" onclick="sel(this,'industry');calc()">일반 (0.73%)</div>
      <div class="rbtn" onclick="sel(this,'industry');calc()">건설 (3.7%)</div>
      <div class="rbtn" onclick="sel(this,'industry');calc()">임업 (5.9%)</div>
    </div>
  </div>

  <div class="result" id="result">
    <div class="ins-grid">
      <div class="ins-card">
        <div class="ins-name">건강보험</div>
        <div class="ins-worker" id="hi_w">—</div>
        <div class="ins-emp" id="hi_e">사업주: —</div>
        <div class="ins-rate">7.09% (근로자 3.545%)</div>
      </div>
      <div class="ins-card">
        <div class="ins-name">장기요양보험</div>
        <div class="ins-worker" id="lt_w">—</div>
        <div class="ins-emp" id="lt_e">사업주: —</div>
        <div class="ins-rate">건강보험료의 12.95%</div>
      </div>
      <div class="ins-card">
        <div class="ins-name">국민연금</div>
        <div class="ins-worker" id="np_w">—</div>
        <div class="ins-emp" id="np_e">사업주: —</div>
        <div class="ins-rate">9% (각 4.5%)</div>
      </div>
      <div class="ins-card">
        <div class="ins-name">고용보험</div>
        <div class="ins-worker" id="ei_w">—</div>
        <div class="ins-emp" id="ei_e">사업주: —</div>
        <div class="ins-rate">근로자 0.9% / 사업주 1.05%~</div>
      </div>
    </div>

    <div class="total-box">
      <div class="total-title">합계 요약</div>
      <div class="total-row"><span class="total-lk">근로자 부담 합계</span><span class="total-lv red" id="t_worker">—</span></div>
      <div class="total-row"><span class="total-lk">사업주 부담 합계 (산재 포함)</span><span class="total-lv blue" id="t_emp">—</span></div>
      <div class="total-row"><span class="total-lk">총 4대보험료</span><span class="total-lv green" id="t_total">—</span></div>
      <div class="divider"></div>
      <div class="total-row"><span class="total-lk">월급 - 4대보험 (근로자)</span><span class="total-lv green" id="t_net">—</span></div>
    </div>
  </div>
</main>
<script>
function fmt(n){return Math.round(n).toLocaleString('ko-KR');}
function fmtW(n){return fmt(n)+'만원';}
function sel(el,g){document.querySelectorAll('#'+g+' .rbtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');}
function getVal(g){return document.querySelector('#'+g+' .rbtn.on')?.textContent.trim()||'';}

function calc(){
  const sal=parseFloat(document.getElementById('salary').value)||0;
  if(sal<=0){document.getElementById('result').style.display='none';return;}

  const ind=getVal('industry');
  const sanjaRate=ind.includes('건설')?0.037:ind.includes('임업')?0.059:0.0073;

  // 2026년 요율
  const hi_rate=0.03545; // 건강보험 근로자
  const hi_w=sal*hi_rate;
  const hi_e=sal*hi_rate;
  const lt_w=hi_w*0.1295;
  const lt_e=hi_e*0.1295;

  // 국민연금: 상한 590만원, 하한 37만원
  const npBase=Math.min(Math.max(sal,37),590);
  const np_w=npBase*0.045;
  const np_e=npBase*0.045;

  // 고용보험
  const ei_w=sal*0.009;
  const ei_e=sal*0.0105; // 사업주 기본(150인미만)

  // 산재보험 (사업주만)
  const sanja=sal*sanjaRate;

  const worker=hi_w+lt_w+np_w+ei_w;
  const emp=hi_e+lt_e+np_e+ei_e+sanja;
  const total=worker+emp;
  const net=sal-worker;

  document.getElementById('result').style.display='block';
  document.getElementById('hi_w').textContent='-'+fmtW(hi_w);
  document.getElementById('hi_e').textContent='사업주: -'+fmtW(hi_e);
  document.getElementById('lt_w').textContent='-'+fmtW(lt_w);
  document.getElementById('lt_e').textContent='사업주: -'+fmtW(lt_e);
  document.getElementById('np_w').textContent='-'+fmtW(np_w);
  document.getElementById('np_e').textContent='사업주: -'+fmtW(np_e);
  document.getElementById('ei_w').textContent='-'+fmtW(ei_w);
  document.getElementById('ei_e').textContent='사업주: -'+fmtW(ei_e);
  document.getElementById('t_worker').textContent='-'+fmtW(worker);
  document.getElementById('t_emp').textContent='-'+fmtW(emp);
  document.getElementById('t_total').textContent=fmtW(total);
  document.getElementById('t_net').textContent=fmtW(net)+'/월';
}
</script>
</body>
</html>
