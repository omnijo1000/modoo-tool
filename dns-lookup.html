<style>

.input-row select:focus{border-color:var(--accent);}

.btn-primary{background:var(--accent);color:#000;}

.tag-A{background:rgba(74,222,128,.12);color:var(--green);}

<script>
const typeMap = {1:'A',28:'AAAA',5:'CNAME',15:'MX',2:'NS',16:'TXT',6:'SOA',12:'PTR',33:'SRV',255:'ANY'};

async function dnsLookup(domain, type) {
  const types = type === 'ALL' ? ['A','AAAA','MX','NS','TXT','CNAME'] : [type];
  const results = [];
  for (const t of types) {
    try {
      const r = await fetch(`https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(domain)}&type=${t}`, {
        headers: {'Accept': 'application/dns-json'}
      });
      if (!r.ok) continue;
      const data = await r.json();
      if (data.Answer) {
        data.Answer.forEach(rec => results.push({
          name: rec.name,
          type: typeMap[rec.type] || String(rec.type),
          ttl: rec.TTL,
          data: rec.data
        }));
      }
    } catch(e) { /* skip individual type errors */ }
  }
  return results;
}

function normalizeDomain(raw) {
  return raw.trim().replace(/^https?:\/\//i,'').replace(/\/.*$/,'').toLowerCase();
}

function showLoading(show) {
  document.getElementById('loadingDiv').classList.toggle('hidden', !show);
}

function showError(msg) {
  const el = document.getElementById('errorDiv');
  el.textContent = msg;
  el.classList.remove('hidden');
  document.getElementById('resultsCard').classList.add('hidden');
}

function hideError() {
  document.getElementById('errorDiv').classList.add('hidden');
}

function renderResults(records, domain, type) {
  const t = _i18n[currentLang] || _i18n.ko;
  document.getElementById('resultsTitle').textContent = `${domain} — ${type}`;
  document.getElementById('recordCount').textContent = `${records.length} ${t.recordsUnit || 'records'}`;
  const tbody = document.getElementById('resultsBody');
  const noDiv = document.getElementById('noResultsDiv');
  if (records.length === 0) {
    tbody.innerHTML = '';
    noDiv.classList.remove('hidden');
  } else {
    noDiv.classList.add('hidden');
    tbody.innerHTML = records.map(rec => {
      const tagClass = `tag-${rec.type}`;
      return `<tr>
        <td>${rec.name}</td>
        <td><span class="type-tag ${tagClass}">${rec.type}</span></td>
        <td class="ttl-cell">${rec.ttl}</td>
        <td>${escHtml(rec.data)}</td>
      </tr>`;
    }).join('');
  }
  document.getElementById('resultsCard').classList.remove('hidden');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function doLookup() {
  const raw = document.getElementById('domainInput').value;
  if (!raw.trim()) return;
  const domain = normalizeDomain(raw);
  const type = document.getElementById('typeSelect').value;
  hideError();
  showLoading(true);
  document.getElementById('resultsCard').classList.add('hidden');
  try {
    const records = await dnsLookup(domain, type);
    showLoading(false);
    renderResults(records, domain, type);
  } catch(e) {
    showLoading(false);
    const t = _i18n[currentLang] || _i18n.ko;
    showError(t.errNetwork);
  }
}

function setPreset(domain) {
  document.getElementById('domainInput').value = domain;
  doLookup();
}

function useMyDomain() {
  const host = location.hostname;
  if (host && host !== 'localhost' && host !== '127.0.0.1') {
    document.getElementById('domainInput').value = host;
    doLookup();
  } else {
    const t = _i18n[currentLang] || _i18n.ko;
    showError(t.errMyDomain || 'Could not detect domain from current URL.');
  }
}

document.addEventListener('keydown', e => {
  if (e.target === document.getElementById('domainInput') && e.key === 'Enter') doLookup();
});

    btnLookup: '조회', btnMyDomain: '내 도메인',
    labelName: 'Name', labelType2: 'Type', labelTtl: 'TTL', labelValue: 'Value',
    loading: '조회 중...', noResults: '해당 레코드가 없습니다.',
    recordsUnit: '개 레코드',

    seoHtml:`<h2>DNS란 무엇인가요?</h2><p><strong>DNS(Domain Name System)</strong>는 도메인 이름을 IP 주소로 변환해주는 인터넷의 핵심 인프라입니다. 사람이 기억하기 쉬운 도메인명(예: google.com)을 서버가 인식하는 숫자 IP 주소(예: 142.250.196.14)로 매핑합니다. 이 도구는 Cloudflare DNS over HTTPS API를 사용하여 빠르고 정확하게 DNS 레코드를 조회합니다. A, AAAA, MX, NS, TXT, CNAME, SOA, PTR 레코드를 한 번에 확인할 수 있어 도메인 설정 검증, 이메일 서버 확인, DNS 전파 확인 등에 활용됩니다.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. DNS란 무엇인가요?</summary><p>A. DNS(Domain Name System)는 도메인 이름을 IP 주소로 변환하는 인터넷 전화번호부입니다. google.com을 입력하면 DNS 서버가 해당 도메인의 IP 주소를 알려주어 실제 서버에 연결됩니다.</p></details><details class="faq-item"><summary>Q. A 레코드란 무엇인가요?</summary><p>A. A 레코드는 도메인 이름을 IPv4 주소(예: 93.184.216.34)에 매핑하는 가장 기본적인 DNS 레코드입니다. 웹사이트 접속 시 브라우저가 가장 먼저 조회하는 레코드입니다.</p></details><details class="faq-item"><summary>Q. MX 레코드는 이메일과 어떤 관련이 있나요?</summary><p>A. MX(Mail Exchange) 레코드는 도메인으로 오는 이메일을 어느 메일 서버로 전달할지 지정합니다. 이메일 수신이 되지 않을 때 MX 레코드를 확인하세요. 우선순위(Priority) 숫자가 낮을수록 먼저 시도됩니다.</p></details><details class="faq-item"><summary>Q. CNAME과 A 레코드의 차이는?</summary><p>A. A 레코드는 도메인을 직접 IP에 연결하고, CNAME(Canonical Name)은 도메인을 다른 도메인에 별칭으로 연결합니다. 예를 들어 www.example.com을 example.com의 CNAME으로 설정하면 www 트래픽이 루트 도메인으로 전달됩니다.</p></details><details class="faq-item"><summary>Q. TTL은 무슨 의미인가요?</summary><p>A. TTL(Time To Live)은 DNS 레코드가 캐시에 저장되는 시간(초)입니다. TTL이 3600이면 1시간 동안 DNS 서버가 레코드를 캐시합니다. DNS 레코드 변경 전 TTL을 낮추면 전파 속도를 빠르게 할 수 있습니다.</p></details><details class="faq-item"><summary>Q. NS 레코드란 무엇인가요?</summary><p>A. NS(Name Server) 레코드는 도메인의 권한 있는 DNS 서버를 지정합니다. 도메인 등록기관에서 설정하며, DNS 레코드 관리를 어느 서버에서 할지 결정합니다.</p></details><details class="faq-item"><summary>Q. TXT 레코드는 SPF/DKIM과 어떤 관련인가요?</summary><p>A. TXT 레코드는 텍스트 정보를 저장하는 범용 레코드입니다. SPF(발신 서버 허가), DKIM(이메일 서명), DMARC(이메일 인증 정책) 같은 이메일 보안 설정이 TXT 레코드로 저장됩니다. 도메인 소유권 인증에도 사용됩니다.</p></details><details class="faq-item"><summary>Q. DNS 전파 시간은 얼마나 걸리나요?</summary><p>A. DNS 변경 후 전 세계에 전파되는 데 보통 1~48시간이 걸립니다. TTL 값에 따라 다르며, TTL을 300초(5분)로 설정하면 최대 5분 내 전파됩니다. 전파 확인은 여러 DNS 서버에서 조회해야 합니다.</p></details>`

    seoHtml:`<h2>What is DNS Lookup?</h2><p><strong>DNS (Domain Name System) Lookup</strong> queries the DNS records for any domain, revealing how it's configured. This tool uses Cloudflare's DNS over HTTPS API to retrieve A, AAAA, MX, NS, TXT, CNAME, SOA, and PTR records instantly. Use it to verify DNS configuration, troubleshoot email delivery, confirm DNS propagation, and inspect domain settings without installing any software.</p><h2 class="seo-sub">FAQ</h2><details class="faq-item"><summary>Q. What is DNS?</summary><p>A. DNS (Domain Name System) is the internet&apos;s phone book — it translates human-readable domain names like google.com into machine-readable IP addresses, allowing browsers and servers to find each other on the internet.</p></details><details class="faq-item"><summary>Q. What is an A record?</summary><p>A. An A record maps a domain name to an IPv4 address (e.g., 93.184.216.34). It&apos;s the most fundamental DNS record type, telling browsers which server to connect to when visiting a website.</p></details><details class="faq-item"><summary>Q. How does MX record relate to email?</summary><p>A. MX (Mail Exchange) records specify which mail servers handle email for a domain. When someone sends email to user@example.com, the sending server looks up the MX records to find the right mail server. Lower priority numbers are tried first.</p></details><details class="faq-item"><summary>Q. What is the difference between CNAME and A record?</summary><p>A. An A record directly maps a domain to an IP address. A CNAME (Canonical Name) creates an alias — it maps one domain name to another domain name. For example, www.example.com can be a CNAME pointing to example.com.</p></details><details class="faq-item"><summary>Q. What does TTL mean?</summary><p>A. TTL (Time To Live) is the number of seconds a DNS record is cached. A TTL of 3600 means resolvers cache the record for 1 hour. Lowering TTL before making DNS changes helps propagate updates faster.</p></details><details class="faq-item"><summary>Q. What is an NS record?</summary><p>A. NS (Name Server) records specify the authoritative DNS servers for a domain. They tell the internet which servers have the official DNS records for that domain, set at your domain registrar.</p></details><details class="faq-item"><summary>Q. How do TXT records relate to SPF and DKIM?</summary><p>A. TXT records store arbitrary text data. SPF (sender policy), DKIM (email signing keys), and DMARC (email authentication policy) are all stored as TXT records. They&apos;re also used for domain ownership verification by Google, AWS, etc.</p></details><details class="faq-item"><summary>Q. How long does DNS propagation take?</summary><p>A. DNS changes typically propagate worldwide within 1–48 hours, depending on TTL values. Setting a low TTL (e.g., 300 seconds) before changes speeds up propagation. Use multiple DNS checkers to verify global propagation.</p></details>`

let currentLang = detectLang();
function detectLang(){
  const p=new URLSearchParams(location.search).get('lang');
  if(p&&_i18n[p])return p;
  const s=localStorage.getItem('modoo_lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language||'';
  if(n.startsWith('zh'))return 'zh';
  if(n.startsWith('ja'))return 'ja';
  if(n.startsWith('ko'))return 'ko';
  return 'en';
}
function applyLang(l){
  const t=_i18n[l]||_i18n.ko;
  document.documentElement.lang=l;
  document.title=t.pageTitle;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const v=t[el.dataset.i18n];
    if(v!==undefined)el.innerHTML=v;
  });
  const inp=document.getElementById('domainInput');
  if(inp)inp.placeholder=l==='ko'?'예: google.com':'e.g. google.com';
  document.getElementById('seoArea').innerHTML=t.seoHtml;
}
function toggleLang(){
  const order=['ko','en','zh','ja'];
  const next=order[(order.indexOf(currentLang)+1)%order.length];
  currentLang=next;
  localStorage.setItem('modoo_lang',next);
  const url=new URL(location.href);
  url.searchParams.set('lang',next);
  history.replaceState(null,'',url);
  applyLang(next);
}
document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));
</script>
