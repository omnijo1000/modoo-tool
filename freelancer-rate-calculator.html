  <p class="sub" data-i18n="sub">목표 수입과 비용으로 적정 시급을 산출합니다</p>

  <div class="card">
    <h2 data-i18n="incomeTitle">수입 목표</h2>

      <div class="field">
        <label data-i18n="targetLabel">목표 연 수입 (만원)</label>

        <div class="field-hint" data-i18n="targetHint">세전 목표 수입</div>
      </div>
      <div class="field">
        <label data-i18n="expenseLabel">연간 비용 (만원)</label>

        <div class="field-hint" data-i18n="expenseHint">장비, 소프트웨어, 보험 등</div>
      </div>
    </div>
  </div>

<script>
const _i18n={
  ko:{pageTitle:'프리랜서 요율 계산기 | 모두의 툴',h1:'🧮 프리랜서 요율 계산기',sub:'목표 수입과 비용으로 적정 시급을 산출합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',incomeTitle:'수입 목표',targetLabel:'목표 연 수입 (만원)',targetHint:'세전 목표 수입',expenseLabel:'연간 비용 (만원)',expenseHint:'장비, 소프트웨어, 보험 등',timeTitle:'근무 시간 설정',workWeeksLabel:'연간 근무 주 수',workWeeksHint:'52주 - 휴가 주 수',hoursPerWeekLabel:'주 근무시간',billableLabel:'청구 가능 비율 (%)',billableHint:'영업·관리 시간 제외 후 실제 청구 비율',taxLabel:'세율 / 기타 공제 (%)',taxHint:'소득세 + 4대보험 추정',rateLbl:'최소 시급',bkHoursLbl:'연간 청구 시간',bkDailyLbl:'일당 (8h)',bkMonthlyLbl:'월 수익 목표',seoHtml:`<h2>프리랜서 요율 계산기란?</h2><p>프리랜서가 목표 연 수입을 달성하기 위해 청구해야 하는 최소 시급을 계산합니다. 연간 비용(장비, 소프트웨어, 보험), 휴가일, 비청구 시간(영업, 관리), 세금을 모두 반영합니다. 많은 프리랜서들이 비청구 시간을 간과해 수익이 목표에 미치지 못하는 실수를 범합니다. 이 계산기로 정확한 최소 요율을 설정하세요. 공식: 시급 = (목표 수입 + 비용) / (1 - 세율) / 연간 청구 시간.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. 비청구 비율은 왜 중요한가요?</summary><p>A. 영업, 마케팅, 미팅, 행정에 쓰는 시간은 클라이언트에게 청구되지 않습니다. 이를 무시하면 실제 수입이 목표의 70% 수준으로 떨어집니다.</p></details><details class="faq-item"><summary>Q. 적정 비청구 비율은?</summary><p>A. 신규 프리랜서는 40-50%, 경력자는 20-30% 비청구 시간을 예상합니다.</p></details><details class="faq-item"><summary>Q. 세율은 얼마로 설정해야 하나요?</summary><p>A. 한국 프리랜서는 소득세 + 건강보험 등을 포함해 20-30%로 추정하는 것이 일반적입니다.</p></details><details class="faq-item"><summary>Q. 연간 비용에 무엇을 포함해야 하나요?</summary><p>A. 장비, 소프트웨어 구독, 사무실 임대료, 보험, 교육비, 마케팅 비용 등.</p></details><details class="faq-item"><summary>Q. 프로젝트 요율은 어떻게 전환하나요?</summary><p>A. 시급 × 예상 소요 시간 × 1.2~1.5(리스크 버퍼) = 프로젝트 견적.</p></details><details class="faq-item"><summary>Q. 인상 주기는?</summary><p>A. 연 1회 물가상승률(3-5%) + 기술 성장 반영해 시급을 올리는 것이 좋습니다.</p></details><details class="faq-item"><summary>Q. 업종별 평균 프리랜서 시급은?</summary><p>A. 개발 10-15만원, 디자인 5-10만원, 번역 3-5만원, 컨설팅 15만원+.</p></details><details class="faq-item"><summary>Q. 해외 클라이언트 요율은?</summary><p>A. 국내 요율의 2-3배 수준을 목표로 하는 경우가 많습니다. 달러/유로 결제 시 환율도 고려하세요.</p></details>`},
  en:{pageTitle:'Freelancer Rate Calculator | Modoo Tools',h1:'🧮 Freelancer Rate Calculator',sub:'Calculate your ideal hourly rate from target income and expenses',backLink:'← All Tools',langBtn:'🌐 中文',incomeTitle:'Income Target',targetLabel:'Target Annual Income ($)',targetHint:'Gross income before taxes',expenseLabel:'Annual Business Expenses ($)',expenseHint:'Equipment, software, insurance, etc.',timeTitle:'Time Settings',workWeeksLabel:'Working Weeks/Year',workWeeksHint:'52 weeks minus vacation',hoursPerWeekLabel:'Hours/Week',billableLabel:'Billable Rate (%)',billableHint:'Actual client-billable % after sales & admin',taxLabel:'Tax / Deductions (%)',taxHint:'Income tax + self-employment tax',rateLbl:'Minimum Hourly Rate',bkHoursLbl:'Billable Hours/Year',bkDailyLbl:'Day Rate (8h)',bkMonthlyLbl:'Monthly Income Target',seoHtml:`<h2>Freelancer Rate Calculator</h2><p>Calculate the minimum hourly rate you need to charge as a freelancer to reach your target income. Accounts for annual business expenses, vacation time, non-billable hours (sales, admin), and taxes. Many freelancers undercharge by ignoring non-billable time. Formula: Rate = (Target Income + Expenses) / (1 − Tax Rate) / Billable Hours.</p><h2 class="seo-sub">FAQ</h2><details class="faq-item"><summary>Q. Why is non-billable time important?</summary><p>A. Time spent on sales, marketing, meetings, and admin can&apos;t be billed to clients. Ignoring it can cut your effective income to 60-70% of your target.</p></details><details class="faq-item"><summary>Q. What is a typical billable rate?</summary><p>A. New freelancers: 50-60% billable. Experienced freelancers: 70-80%.</p></details><details class="faq-item"><summary>Q. What tax rate should I use?</summary><p>A. In the US, self-employed pay ~15.3% self-employment tax + income tax. Budget 25-35% total.</p></details><details class="faq-item"><summary>Q. What business expenses should I include?</summary><p>A. Software subscriptions, equipment, office rent, insurance, training, and marketing.</p></details><details class="faq-item"><summary>Q. How do I convert to project rates?</summary><p>A. Hourly rate × estimated hours × 1.2-1.5 (risk buffer) = project quote.</p></details><details class="faq-item"><summary>Q. How often should I raise my rates?</summary><p>A. Annually, reflecting inflation (3-5%) plus skill growth. Many freelancers raise rates when at capacity.</p></details><details class="faq-item"><summary>Q. Average freelance rates by industry?</summary><p>A. Software dev: $75-150/h, Design: $50-100/h, Writing: $30-80/h, Consulting: $100-300/h.</p></details><details class="faq-item"><summary>Q. Should I charge more for international clients?</summary><p>A. Many freelancers charge international clients 1.5-2× their local rate, especially in USD/EUR.</p></details>`},
  zh:{pageTitle:'自由职业者报价计算器 | Modoo工具',h1:'🧮 自由职业者报价计算器',sub:'根据目标收入和费用计算适合的时薪',backLink:'← 首页',langBtn:'🌐 日本語',incomeTitle:'收入目标',targetLabel:'目标年收入（元）',targetHint:'税前目标收入',expenseLabel:'年度业务费用（元）',expenseHint:'设备、软件、保险等',timeTitle:'工作时间设置',workWeeksLabel:'年工作周数',workWeeksHint:'52周减去休假周数',hoursPerWeekLabel:'每周工作时间',billableLabel:'可计费比率 (%)',billableHint:'扣除营销、管理后的实际可计费比率',taxLabel:'税率/其他扣除 (%)',taxHint:'个税加社保估算',rateLbl:'最低时薪',bkHoursLbl:'年可计费小时',bkDailyLbl:'日费（8小时）',bkMonthlyLbl:'月收入目标',seoHtml:`<h2>自由职业者报价计算器</h2><p>计算自由职业者达到目标年收入所需的最低时薪。考虑年度业务费用、假期、不可计费时间（销售、管理）和税费。公式：时薪 = (目标收入+费用) / (1-税率) / 可计费小时数。</p><h2 class="seo-sub">常见问题</h2><details class="faq-item"><summary>Q. 为什么不可计费时间很重要？</summary><p>A. 销售、营销、会议、行政时间无法向客户收费。忽视这部分会让实际收入降至目标的60-70%。</p></details><details class="faq-item"><summary>Q. 典型的可计费比率是多少？</summary><p>A. 新手自由职业者约50-60%，有经验者约70-80%。</p></details><details class="faq-item"><summary>Q. 税率应该设多少？</summary><p>A. 建议参考当地个税税率加社保，通常为20-30%。</p></details><details class="faq-item"><summary>Q. 业务费用包括哪些？</summary><p>A. 软件订阅、设备、办公场地、保险、培训和营销费用等。</p></details><details class="faq-item"><summary>Q. 如何换算为项目报价？</summary><p>A. 时薪×预计工时×1.2-1.5（风险缓冲）=项目报价。</p></details><details class="faq-item"><summary>Q. 多久应该提价？</summary><p>A. 建议每年调整一次，反映通胀和技能增长。</p></details><details class="faq-item"><summary>Q. 各行业平均时薪是多少？</summary><p>A. 开发：300-800元/时，设计：200-500元/时，翻译：100-300元/时，咨询：500元+/时。</p></details><details class="faq-item"><summary>Q. 海外客户应该收更高吗？</summary><p>A. 很多自由职业者对海外客户收取1.5-2倍的国内价格。</p></details>`},
  ja:{pageTitle:'フリーランス料金計算機 | Modooツール',h1:'🧮 フリーランス料金計算機',sub:'目標収入と費用から適正時給を算出します',backLink:'← ホーム',langBtn:'🌐 한국어',incomeTitle:'収入目標',targetLabel:'目標年収（万円）',targetHint:'税引前の目標収入',expenseLabel:'年間業務費用（万円）',expenseHint:'機材、ソフト、保険など',timeTitle:'勤務時間設定',workWeeksLabel:'年間勤務週数',workWeeksHint:'52週から休暇週数を引いた数',hoursPerWeekLabel:'週の勤務時間',billableLabel:'請求可能比率 (%)',billableHint:'営業・管理時間を除いた実際の請求比率',taxLabel:'税率/その他控除 (%)',taxHint:'所得税+社会保険の推定',rateLbl:'最低時給',bkHoursLbl:'年間請求可能時間',bkDailyLbl:'日当（8時間）',bkMonthlyLbl:'月収目標',seoHtml:`<h2>フリーランス料金計算機とは</h2><p>目標年収を達成するために必要な最低時給を計算します。年間業務費用、休暇、非請求時間（営業・管理）、税金を全て反映します。公式：時給 = (目標収入+費用) / (1-税率) / 年間請求可能時間。</p><h2 class="seo-sub">よくある質問</h2><details class="faq-item"><summary>Q. 非請求時間はなぜ重要ですか？</summary><p>A. 営業・マーケティング・会議・事務に使う時間はクライアントに請求できません。無視すると実収入が目標の60-70%に留まります。</p></details><details class="faq-item"><summary>Q. 典型的な請求可能比率は？</summary><p>A. 新人フリーランサーは50-60%、経験者は70-80%が目安です。</p></details><details class="faq-item"><summary>Q. 税率はいくら設定すればよいですか？</summary><p>A. 日本では所得税＋住民税＋国民健康保険で20-30%を見込むのが一般的です。</p></details><details class="faq-item"><summary>Q. 業務費用には何を含めますか？</summary><p>A. ソフトウェアサブスク、機材、オフィス賃料、保険、研修費、マーケティング費など。</p></details><details class="faq-item"><summary>Q. プロジェクト料金に換算するには？</summary><p>A. 時給×見積時間×1.2-1.5（リスクバッファ）＝プロジェクト見積。</p></details><details class="faq-item"><summary>Q. 値上げのタイミングは？</summary><p>A. 年1回、インフレ率(3-5%)＋スキル成長を反映して値上げするのが理想です。</p></details><details class="faq-item"><summary>Q. 業種別の平均時給は？</summary><p>A. 開発：5,000-15,000円/時、デザイン：3,000-8,000円/時、ライティング：2,000-5,000円/時、コンサル：10,000円+/時。</p></details><details class="faq-item"><summary>Q. 海外クライアントには高く請求すべきですか？</summary><p>A. 多くのフリーランサーが海外クライアントには国内の1.5-2倍の料金を設定しています。</p></details>`}

let currentLang='ko';
function detectLang(){const p=new URLSearchParams(location.search).get('lang');if(p&&_i18n[p])return p;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
function applyLang(l){const t=_i18n[l]||_i18n.ko;document.title=t.pageTitle;document.documentElement.lang=l;document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});document.getElementById('seoContent').innerHTML=t.seoHtml||'';}
function toggleLang(){const order=['ko','en','zh','ja'];const next=order[(order.indexOf(currentLang)+1)%order.length];currentLang=next;localStorage.setItem('modoo_lang',next);const url=new URL(location.href);url.searchParams.set('lang',next);history.replaceState(null,'',url);applyLang(next);}
currentLang=detectLang();
document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));

function calc(){
  const targetKRW=(parseFloat(document.getElementById('targetIncome').value)||0)*10000;
  const expensesKRW=(parseFloat(document.getElementById('expenses').value)||0)*10000;
  const workWeeks=parseFloat(document.getElementById('workWeeks').value)||48;
  const hpw=parseFloat(document.getElementById('hoursPerWeek').value)||40;
  const billPct=(parseFloat(document.getElementById('billablePct').value)||70)/100;
  const taxRate=(parseFloat(document.getElementById('taxRate').value)||20)/100;

  const totalNeeded=(targetKRW+expensesKRW)/(1-taxRate);
  const billableHours=workWeeks*hpw*billPct;
  if(billableHours<=0){document.getElementById('resultCard').style.display='none';return;}
  const hourly=totalNeeded/billableHours;
  const daily=hourly*8;
  const monthly=targetKRW/12;
  const fmt=(n)=>'₩'+Math.round(n).toLocaleString();
  document.getElementById('rateNum').textContent=fmt(hourly);
  document.getElementById('billableHoursNum').textContent=Math.round(billableHours)+'h';
  document.getElementById('dailyRateNum').textContent=fmt(daily);
  document.getElementById('monthlyTargetNum').textContent=fmt(monthly);
  document.getElementById('insightBox').innerHTML=`연간 필요 청구시간 <strong>${Math.round(billableHours)}시간</strong>, 총 필요 수익 <strong>${fmt(totalNeeded)}</strong> (세금 포함)`;
  document.getElementById('resultCard').style.display='block';
}
calc();
</script>
