<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2e2e2e;--accent:#38bdf8;--text:#f0f0f0;--text-muted:#888;--text-dim:#555;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif;min-height:100vh;}
header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
main{max-width:720px;margin:0 auto;padding:48px 24px;}
h1{font-size:28px;font-weight:900;margin-bottom:8px;}
h1 span{color:var(--accent);}
.subtitle{font-size:13px;color:var(--text-muted);margin-bottom:28px;line-height:1.6;}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center;}
.stat-val{font-size:26px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
.stat-label{font-size:10px;color:var(--text-dim);margin-top:3px;text-transform:uppercase;letter-spacing:0.08em;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;color:var(--text);font-size:14px;font-family:'Noto Sans',sans-serif;line-height:1.8;outline:none;resize:vertical;min-height:180px;transition:border-color 0.2s;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--text-dim);}
.col-label{font-size:11px;color:var(--text-dim);margin-bottom:6px;font-family:'DM Mono',monospace;letter-spacing:0.08em;}
.sentence-list{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;max-height:280px;overflow-y:auto;margin-bottom:16px;}
.s-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.s-item:last-child{border-bottom:none;}
.s-num{color:var(--accent);font-family:'DM Mono',monospace;font-weight:700;min-width:28px;}
.s-text{color:var(--text-muted);line-height:1.5;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.tool-btn{background:#111;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans',sans-serif;transition:all 0.15s;}
.tool-btn:hover{border-color:var(--accent);color:var(--accent);}
.seo{margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}
.seo h2{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
.seo strong{color:var(--text-muted);}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:48px;padding:24px;}
.back-link{margin-left:auto;font-size:13px;color:var(--text-muted);text-decoration:none;}
.back-link:hover{color:var(--accent);}
.lang-toggle{margin-left:4px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;transition:all 0.15s;}
.lang-toggle:hover{border-color:var(--accent);color:var(--accent);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
.header-label{font-size:13px;color:var(--text-muted);letter-spacing:0.1em;font-family:'DM Mono',monospace;}
@media(max-width:500px){.stats-bar{grid-template-columns:1fr 1fr;}}
</style>

<body>
<header>
  <div class="dot"></div>
  <span class="header-label">MODOO HUB</span>
  <a href="index.html" class="back-link">← 모두의 툴</a>
  <div class="lang-toggle" onclick="cycleLang()" id="langBtn">🌐 EN</div>
</header>
<main>
  <h1>Sentence <span>Counter</span></h1>
  <p class="subtitle" data-i18n="sub">Paste your text to count sentences, words, and characters in real time.</p>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="sSents">0</div><div class="stat-label" data-i18n="statSents">Sentences</div></div>
    <div class="stat"><div class="stat-val" id="sWords">0</div><div class="stat-label" data-i18n="statWords">Words</div></div>
    <div class="stat"><div class="stat-val" id="sChars">0</div><div class="stat-label" data-i18n="statChars">Characters</div></div>
    <div class="stat"><div class="stat-val" id="sAvgW">0</div><div class="stat-label" data-i18n="statAvg">Avg Words/Sent</div></div>
  </div>

  <div style="margin-bottom:8px"><div class="col-label" data-i18n="labelInput">INPUT</div></div>
  <textarea id="inputArea" placeholder="Paste your text here..." oninput="update()"></textarea>

  <div class="toolbar" style="margin-top:12px;">
    <button class="tool-btn" onclick="copyText()" data-i18n="btnCopy">📋 Copy</button>
    <button class="tool-btn" onclick="clearAll()" data-i18n="btnClear">🗑 Clear</button>
  </div>

  <div id="sentListWrap" style="display:none">
    <div class="col-label" data-i18n="labelSentList">SENTENCE LIST</div>
    <div class="sentence-list" id="sentList"></div>
  </div>

  <div class="seo">
    <h2 id="seoTitle1"></h2>
    <p id="seoBody1"></p>
    <p id="seoFaq1"></p>
    <p id="seoFaq2"></p>
  </div>
  <footer>© 2026 MODOO HUB · Free · <a href="privacy.html" style="color:var(--text-dim);text-decoration:none;">Privacy Policy</a></footer>
</main>
<script>
function update(){
  const v=document.getElementById('inputArea').value;
  if(!v.trim()){document.getElementById('sSents').textContent='0';document.getElementById('sWords').textContent='0';document.getElementById('sChars').textContent='0';document.getElementById('sAvgW').textContent='0';document.getElementById('sentListWrap').style.display='none';return;}
  const sentences=v.match(/[^.!?。！？\n]+[.!?。！？]+/g)||[];
  const words=v.trim().split(/\s+/).filter(w=>w.length>0);
  const avg=sentences.length>0?(words.length/sentences.length).toFixed(1):0;
  document.getElementById('sSents').textContent=sentences.length.toLocaleString();
  document.getElementById('sWords').textContent=words.length.toLocaleString();
  document.getElementById('sChars').textContent=v.length.toLocaleString();
  document.getElementById('sAvgW').textContent=avg;
  if(sentences.length>0){
    document.getElementById('sentList').innerHTML=sentences.map((s,i)=>`<div class="s-item"><span class="s-num">${i+1}.</span><span class="s-text">${escHtml(s.trim())}</span></div>`).join('');
    document.getElementById('sentListWrap').style.display='block';
  }else{document.getElementById('sentListWrap').style.display='none';}
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function copyText(){const v=document.getElementById('inputArea').value;if(v)navigator.clipboard.writeText(v);}
function clearAll(){document.getElementById('inputArea').value='';update();}
</script>
<script>
const _i18n={
  ko:{lang:'ko',title:'문장 수 세기 - 문장·단어·글자 수 분석 | 무료',btn:'🌐 EN',
    sub:'텍스트를 붙여넣으면 문장, 단어, 글자 수가 실시간으로 계산됩니다.',
    statSents:'문장',statWords:'단어',statChars:'글자',statAvg:'평균 단어/문장',

    seoTitle1:'문장 수 세기 도구란?',seoBody1:'문장 수 세기 도구는 텍스트의 문장 수, 단어 수, 글자 수, 문장당 평균 단어 수를 실시간으로 계산합니다. 글쓰기 분석, 가독성 평가 등에 활용됩니다.',
    seoFaq1:'<strong>Q. 문장은 어떻게 구분하나요?</strong><br>마침표(.), 느낌표(!), 물음표(?) 등의 문장 종결 부호를 기준으로 문장을 구분합니다.',

  en:{lang:'en',title:'Sentence Counter - Count Sentences, Words, Characters | Free',btn:'🌐 中文',
    sub:'Paste your text to count sentences, words, and characters in real time.',
    statSents:'Sentences',statWords:'Words',statChars:'Characters',statAvg:'Avg Words/Sent',

    seoTitle1:'What is Sentence Counter?',seoBody1:'Sentence Counter is a free online tool that counts sentences, words, characters, and the average number of words per sentence. Great for writers, editors, and students analyzing text readability.',

    seoFaq2:'<strong>Q. Does it work with non-English text?</strong><br>Yes. The tool also recognizes Chinese and Japanese sentence-ending punctuation (。！？).'},
  zh:{lang:'zh',title:'句子计数 - 在线统计句子·单词·字符数 | 免费',btn:'🌐 日本語',
    sub:'粘贴文本，实时统计句子数、单词数和字符数。',

    labelInput:'输入',labelSentList:'句子列表',btnCopy:'📋 复制',btnClear:'🗑 清空',
    seoTitle1:'句子计数工具简介',seoBody1:'句子计数工具可以实时统计文本的句子数、单词数、字符数以及每句平均单词数，适用于写作分析、可读性评估等场景。',

    statSents:'文章数',statWords:'単語数',statChars:'文字数',statAvg:'平均単語数/文',
    labelInput:'入力',labelSentList:'文章リスト',btnCopy:'📋 コピー',btnClear:'🗑 クリア',
    seoTitle1:'文章カウンターとは？',seoBody1:'文章カウンターはテキストの文章数・単語数・文字数・1文あたりの平均単語数をリアルタイムで集計するツールです。文章分析や可読性の評価に活用できます。',

};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
  ['seoTitle1','seoBody1','seoFaq1','seoFaq2'].forEach(id=>{const el=document.getElementById(id);if(el&&t[id]!==undefined)el.innerHTML=t[id];});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
