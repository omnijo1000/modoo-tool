<main>
  <h1>Sentence <span>Counter</span></h1>
  <p class="subtitle" data-i18n="sub">Paste your text to count sentences, words, and characters in real time.</p>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="sSents">0</div><div class="stat-label" data-i18n="statSents">Sentences</div></div>
    <div class="stat"><div class="stat-val" id="sWords">0</div><div class="stat-label" data-i18n="statWords">Words</div></div>
    <div class="stat"><div class="stat-val" id="sChars">0</div><div class="stat-label" data-i18n="statChars">Characters</div></div>
    <div class="stat"><div class="stat-val" id="sAvgW">0</div><div class="stat-label" data-i18n="statAvg">Avg Words/Sent</div></div>
  </div>

  <div style="margin-bottom:8px"><div class="col-label" data-i18n="labelInput">INPUT</div></div>
  <textarea id="inputArea" placeholder="Paste your text here..." oninput="update()"></textarea>

  <div class="toolbar" style="margin-top:12px;">
    <button class="tool-btn" onclick="copyText()" data-i18n="btnCopy">📋 Copy</button>
    <button class="tool-btn" onclick="clearAll()" data-i18n="btnClear">🗑 Clear</button>
  </div>

  <div id="sentListWrap" style="display:none">
    <div class="col-label" data-i18n="labelSentList">SENTENCE LIST</div>
    <div class="sentence-list" id="sentList"></div>
  </div>

  <div class="seo" data-i18n="seoHtml"></div>
  <footer>© 2026 MODOO HUB · Free · <a href="privacy.html" style="color:var(--text-dim);text-decoration:none;">Privacy Policy</a> · <a href="about.html" style="color:var(--text-dim);text-decoration:none;">About</a> · <a href="contact.html" style="color:var(--text-dim);text-decoration:none;">Contact</a></footer>
</main>
<script>
function update(){
  const v=document.getElementById('inputArea').value;
  if(!v.trim()){document.getElementById('sSents').textContent='0';document.getElementById('sWords').textContent='0';document.getElementById('sChars').textContent='0';document.getElementById('sAvgW').textContent='0';document.getElementById('sentListWrap').style.display='none';return;}
  const sentences=v.match(/[^.!?。！？\n]+[.!?。！？]+/g)||[];
  const words=v.trim().split(/\s+/).filter(w=>w.length>0);
  const avg=sentences.length>0?(words.length/sentences.length).toFixed(1):0;
  document.getElementById('sSents').textContent=sentences.length.toLocaleString();
  document.getElementById('sWords').textContent=words.length.toLocaleString();
  document.getElementById('sChars').textContent=v.length.toLocaleString();
  document.getElementById('sAvgW').textContent=avg;
  if(sentences.length>0){
    document.getElementById('sentList').innerHTML=sentences.map((s,i)=>`<div class="s-item"><span class="s-num">${i+1}.</span><span class="s-text">${escHtml(s.trim())}</span></div>`).join('');
    document.getElementById('sentListWrap').style.display='block';
  }else{document.getElementById('sentListWrap').style.display='none';}
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function copyText(){const v=document.getElementById('inputArea').value;if(v)navigator.clipboard.writeText(v);}
function clearAll(){document.getElementById('inputArea').value='';update();}
</script>

    seoHtml:'<h2>문장 수 세기 도구란?</h2><p>문장 수 세기 도구는 텍스트의 문장 수, 단어 수, 글자 수, 문장당 평균 단어 수를 실시간으로 계산합니다. 글쓰기 분석, 가독성 평가 등에 활용됩니다.</p><details class="faq-item"><summary>문장은 어떻게 구분하나요?</summary><p>마침표(.), 느낌표(!), 물음표(?) 등의 문장 종결 부호를 기준으로 문장을 구분합니다.</p></details><details class="faq-item"><summary>한국어 문장도 지원하나요?</summary><p>네. 한국어 문장 부호(。！？)도 지원합니다. 다양한 언어의 종결 부호를 인식합니다.</p></details><details class="faq-item"><summary>단어는 어떻게 계산되나요?</summary><p>공백으로 구분된 토큰을 단어로 계산합니다. 특수문자가 포함된 단어도 하나로 간주됩니다.</p></details><details class="faq-item"><summary>좋은 문장 길이 기준이 있나요?</summary><p>가독성을 위해 문장당 15~20단어가 이상적입니다. 평균이 25단어를 넘으면 문장이 너무 복잡할 수 있습니다.</p></details><details class="faq-item"><summary>글자 수는 공백 포함인가요?</summary><p>네. 글자 수(Characters)는 공백을 포함한 전체 문자 수입니다. 공백 제외 수는 별도로 확인이 필요합니다.</p></details><details class="faq-item"><summary>문장 당 평균 단어 수는 어느 정도가 좋나요?</summary><p>읽기 편한 문장은 15~20단어가 이상적입니다. 20단어를 넘으면 복잡하게 느껴질 수 있고, 8단어 이하면 단조롭게 느껴질 수 있습니다. 다양한 길이의 문장을 섞어 리듬을 만드는 것이 좋습니다.</p></details><details class="faq-item"><summary>단락(paragraph) 수도 세어주나요?</summary><p>네. 문장 수, 단어 수, 문자 수와 함께 단락 수도 제공됩니다. 빈 줄로 구분된 텍스트 블록을 단락으로 인식합니다.</p></details><details class="faq-item"><summary>특정 독자를 위한 가독성 수준을 어떻게 확인하나요?</summary><p>Flesch-Kincaid 가독성 점수, Gunning Fog 지수 등 가독성 지표를 통해 텍스트가 적합한 독자 수준을 파악할 수 있습니다. 일반 성인 독자는 60~70점(8학년 수준)을 목표로 합니다.</p></details>'},

    seoHtml:'<h2>What is Sentence Counter?</h2><p>Sentence Counter is a free online tool that counts sentences, words, characters, and the average number of words per sentence. Great for writers, editors, and students analyzing text readability.</p><details class="faq-item"><summary>How are sentences detected?</summary><p>Sentences are split on period (.), exclamation mark (!), and question mark (?) characters.</p></details><details class="faq-item"><summary>Does it work with non-English text?</summary><p>Yes. The tool also recognizes Chinese and Japanese sentence-ending punctuation (。！？).</p></details><details class="faq-item"><summary>How are words counted?</summary><p>Words are counted as whitespace-separated tokens. A token with punctuation attached (e.g., "hello,") is still counted as one word.</p></details><details class="faq-item"><summary>What is a good sentence length?</summary><p>For readability, aim for 15–20 words per sentence. Consistently averaging over 25 words per sentence may indicate overly complex writing.</p></details><details class="faq-item"><summary>Does the character count include spaces?</summary><p>Yes. The character count includes all characters including spaces. To get a space-excluded count, use a dedicated character counter tool.</p></details><details class="faq-item"><summary>What is the ideal average words per sentence?</summary><p>An ideal readable sentence is 15–20 words. More than 20 words can feel complex; fewer than 8 can feel choppy. Mixing sentence lengths creates a natural rhythm in writing.</p></details><details class="faq-item"><summary>Is paragraph count also counted?</summary><p>Yes. Paragraph count is provided alongside sentence, word, and character counts. Blocks of text separated by blank lines are recognized as paragraphs.</p></details><details class="faq-item"><summary>How can I check the readability level for a specific audience?</summary><p>Readability metrics like the Flesch-Kincaid Reading Ease score and Gunning Fog Index show the appropriate reader level. General adult readers benefit from scores of 60–70 (8th-grade level).</p></details>'},
  zh:{lang:'zh',title:'句子计数 - 在线统计句子·单词·字符数 | 免费',btn:'🌐 日本語',

    labelInput:'输入',labelSentList:'句子列表',btnCopy:'📋 复制',btnClear:'🗑 清空',
    seoHtml:'<h2>句子计数工具简介</h2><p>句子计数工具可以实时统计文本的句子数、单词数、字符数以及每句平均单词数，适用于写作分析、可读性评估等场景。</p><details class="faq-item"><summary>如何判断句子边界？</summary><p>以句号(.)、感叹号(!)、问号(?)等句子终止符作为分割依据。</p></details><details class="faq-item"><summary>支持中文句子吗？</summary><p>支持。工具也识别中文标点符号（。！？），可正确统计中文句子数量。</p></details><details class="faq-item"><summary>单词是如何计算的？</summary><p>以空白字符分隔的标记视为单词。带有标点符号的词（如"hello,"）仍计为一个单词。</p></details><details class="faq-item"><summary>好的句子长度标准是什么？</summary><p>可读性较高的句子通常为15–20个单词。平均超过25个单词可能意味着文章结构过于复杂。</p></details><details class="faq-item"><summary>字符数包含空格吗？</summary><p>是的。字符数包括所有字符（含空格）。如需不含空格的字符数，请使用专用字符计数工具。</p></details><details class="faq-item"><summary>每句话的理想平均词数是多少？</summary><p>易读句子的理想词数为15-20个。超过20词可能显得复杂，少于8词则可能单调。混合不同长度的句子有助于创造写作节奏。</p></details><details class="faq-item"><summary>也会统计段落数吗？</summary><p>会。在句子数、单词数和字符数的同时也提供段落数，以空行分隔的文本块被识别为段落。</p></details><details class="faq-item"><summary>如何检查面向特定读者的可读性水平？</summary><p>通过Flesch-Kincaid可读性分数、Gunning Fog指数等可读性指标可了解文本适合的读者水平。面向普通成年读者建议目标60-70分（8年级水平）。</p></details>'},

    seoHtml:'<h2>文章カウンターとは？</h2><p>文章カウンターはテキストの文章数・単語数・文字数・1文あたりの平均単語数をリアルタイムで集計するツールです。文章分析や可読性の評価に活用できます。</p><details class="faq-item"><summary>文章の区切りはどのように判定しますか？</summary><p>ピリオド(.)・感嘆符(!)・疑問符(?)などの文末記号を基準に文章を区切ります。</p></details><details class="faq-item"><summary>日本語の文章にも対応していますか？</summary><p>はい。日本語の句読点（。！？）にも対応しており、日本語の文章数を正しく集計できます。</p></details><details class="faq-item"><summary>単語はどのようにカウントされますか？</summary><p>空白で区切られたトークンを単語として数えます。記号が付いたトークン（例：「hello,」）も1単語として扱われます。</p></details><details class="faq-item"><summary>良い文章の長さの目安は？</summary><p>読みやすさのためには1文15〜20語が理想的です。平均が25語を超えると文章が複雑になりすぎている可能性があります。</p></details><details class="faq-item"><summary>文字数にスペースは含まれますか？</summary><p>はい。文字数にはスペースを含む全文字が計上されます。スペースを除いた文字数は専用ツールをご利用ください。</p></details><details class="faq-item"><summary>1文あたりの理想的な平均単語数は？</summary><p>読みやすい文の理想は15〜20語です。20語を超えると複雑に感じられ、8語以下では単調になりがちです。長さの違う文を組み合わせると自然なリズムが生まれます。</p></details><details class="faq-item"><summary>段落数もカウントされますか？</summary><p>はい。文数、単語数、文字数とともに段落数も提供されます。空行で区切られたテキストブロックが段落として認識されます。</p></details><details class="faq-item"><summary>特定の読者向けの可読性レベルを確認するにはどうすればいいですか？</summary><p>Flesch-Kincaid読みやすさスコアやGunning Fog指数などの可読性指標でテキストが適した読者レベルを把握できます。一般成人向けには60〜70点（8年生レベル）を目標にします。</p></details>'}
};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
