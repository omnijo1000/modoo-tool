    seoHtml:`<h2>What is a Favicon?</h2><p>A favicon is a small icon shown in browser tabs, bookmarks, and app shortcuts. It is a key branding element that must be provided at the correct sizes to display sharply on all devices. <strong>PNG format is recommended</strong>; ICO and SVG are also supported.</p>
<h2 class="seo-sub">Frequently Asked Questions</h2>
<details class="faq-item"><summary>What favicon sizes are recommended?</summary><p>Minimum: 16×16 (browser tab), 32×32 (high-res tab), 48×48 (Windows shortcuts), 180×180 (Apple Touch Icon), 192×192 (Android PWA), 512×512 (PWA splash). Source image should be at least 512×512 and square.</p></details>
<details class="faq-item"><summary>Where do I add the favicon HTML code?</summary><p>Add it inside the &lt;head&gt; tag. Upload the favicon files to your web server root (/) or adjust the href paths in the &lt;link&gt; tags accordingly.</p></details>

<details class="faq-item"><summary>What is the Apple Touch Icon?</summary><p>The icon used when adding a website to the iOS home screen. 180×180px is the recommended size: &lt;link rel="apple-touch-icon" href="/apple-touch-icon.png"&gt;.</p></details>

<details class="faq-item"><summary>Favicon design tips?</summary><p>Tiny sizes (16×16, 32×32) can blur fine details. Use simple, high-contrast designs. A transparent PNG background works well in both dark and light mode interfaces.</p></details>`

    seoHtml:`<h2>什么是Favicon？</h2><p>Favicon是显示在浏览器标签、书签和应用快捷方式中的小图标，是网站品牌的核心元素。必须提供正确尺寸以在所有设备上清晰显示。<strong>推荐使用PNG格式</strong>，也支持ICO和SVG。</p>

<details class="faq-item"><summary>可以使用SVG favicon吗？</summary><p>现代浏览器（Chrome、Firefox、Safari）支持SVG favicon：&lt;link rel="icon" type="image/svg+xml" href="/favicon.svg"&gt;。SVG在任何尺寸下都能完美缩放。</p></details>
<details class="faq-item"><summary>什么是Apple Touch Icon？</summary><p>在iOS设备上将网站添加到主屏幕时使用的图标，推荐尺寸180×180px：&lt;link rel="apple-touch-icon" href="/apple-touch-icon.png"&gt;。</p></details>
<details class="faq-item"><summary>如何设置PWA图标？</summary><p>在manifest.json中注册192×192和512×512 PNG图标。512×512也用于安装启动画面。提供maskable版本更佳。</p></details>
<details class="faq-item"><summary>Favicon因浏览器缓存不更新怎么办？</summary><p>Favicon会被长期缓存。通过添加查询参数强制刷新：&lt;link rel="icon" href="/favicon.png?v=2"&gt;，或手动清除浏览器缓存。</p></details>
<details class="faq-item"><summary>Favicon设计技巧？</summary><p>小尺寸（16×16、32×32）中细节容易模糊。使用简洁高对比度的设计。透明PNG背景在深色/浅色模式下都适用。</p></details>`
  },
  ja:{pageTitle:'ファビコンジェネレーター - 画像からFaviconを作成 | MODOO HUB',h1Span:'ジェネレーター',sub:'画像をアップロード → 6サイズPNGを即時ダウンロード',backLink:'← ホーム',langBtn:'🌐 한국어',uploadText:'クリックまたは画像をドラッグしてください',uploadHint:'PNG・JPG・SVG・WebP · 推奨：256×256以上の正方形',btnGenerate:'生成',btnClear:'クリア',labelHtml:'HTMLコード',btnCopy:'コピー',copyDone:'コピー完了 ✓',dlBtn:'ダウンロード',
    seoHtml:`<h2>ファビコン(Favicon)とは</h2><p>ファビコンはブラウザのタブ・ブックマーク・アプリショートカットに表示される小さなアイコンです。サイトブランディングの重要要素で、正しいサイズと形式で設定すれば全デバイスで鮮明に表示されます。<strong>PNG形式が推奨</strong>され、ICO・SVG形式も対応しています。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>ファビコンの推奨サイズは？</summary><p>最低：16×16（ブラウザタブ）・32×32（高解像度タブ）・48×48（Windowsショートカット）・180×180（Apple Touch Icon）・192×192（Android PWA）・512×512（PWAスプラッシュ）。元画像は最低512×512以上の正方形が推奨です。</p></details>
<details class="faq-item"><summary>ファビコンのHTMLコードはどこに入れますか？</summary><p>&lt;head&gt;タグ内に追加してください。ファビコンファイルをWebサーバーのルート(/)にアップロードするか、&lt;link&gt;タグのhrefパスを適宜修正してください。</p></details>
<details class="faq-item"><summary>favicon.icoも必要ですか？</summary><p>モダンブラウザはPNGファビコンをサポートしますが、一部の古いブラウザやツールはfavicon.icoを使用します。サイトルートにfavicon.icoを置くと互換性が向上します。</p></details>
<details class="faq-item"><summary>SVGファビコンは使えますか？</summary><p>モダンブラウザ（Chrome・Firefox・Safari）はSVGファビコンをサポートします：&lt;link rel="icon" type="image/svg+xml" href="/favicon.svg"&gt;。どのサイズでも鮮明に表示される利点があります。</p></details>
<details class="faq-item"><summary>Apple Touch Iconとは？</summary><p>iOSデバイスでWebサイトをホーム画面に追加する際に使用されるアイコンです。推奨サイズは180×180pxです：&lt;link rel="apple-touch-icon" href="/apple-touch-icon.png"&gt;。</p></details>
<details class="faq-item"><summary>PWAアイコンの設定方法は？</summary><p>manifest.jsonに192×192と512×512のPNGアイコンを登録します。512×512はインストール時のスプラッシュ画面にも使われます。maskableバリアントも準備するとなお良いです。</p></details>
<details class="faq-item"><summary>ブラウザキャッシュでファビコンが更新されない場合は？</summary><p>ファビコンは長くキャッシュされます。クエリパラメータを追加して強制更新してください：&lt;link rel="icon" href="/favicon.png?v=2"&gt;。またはブラウザキャッシュを直接クリアしてください。</p></details>
<details class="faq-item"><summary>ファビコンデザインのヒントは？</summary><p>小さいサイズ（16×16・32×32）では細かなディテールが潰れます。シンプルで高コントラストなデザインが効果的です。透明PNG背景にするとダーク/ライトモード両方に馴染みます。</p></details>`

const LANGS=['ko','en','zh','ja'];
let _lang='ko';
let _sourceImg=null;
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1Span').textContent=t.h1Span;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('uploadText').textContent=t.uploadText;document.getElementById('uploadHint').textContent=t.uploadHint;
  document.getElementById('btnGenerate').textContent=t.btnGenerate;document.getElementById('btnClear').textContent=t.btnClear;
  document.getElementById('labelHtml').textContent=t.labelHtml;document.getElementById('btnCopyHtml').textContent=t.btnCopy;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function onDragOver(e){e.preventDefault();document.getElementById('uploadArea').classList.add('drag');}
function onDragLeave(){document.getElementById('uploadArea').classList.remove('drag');}
function onDrop(e){e.preventDefault();document.getElementById('uploadArea').classList.remove('drag');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))loadFile(f);}
function onFileChange(e){const f=e.target.files[0];if(f)loadFile(f);}
function loadFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      _sourceImg=img;
      const pr=document.getElementById('previewRow');
      document.getElementById('previewImg').src=ev.target.result;
      document.getElementById('previewInfo').textContent=file.name+'\n'+img.width+'×'+img.height+'px';
      pr.style.display='flex';
      document.getElementById('btnGenerate').disabled=false;
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function clearAll(){
  _sourceImg=null;
  document.getElementById('previewRow').style.display='none';
  document.getElementById('previewImg').src='';
  document.getElementById('fileInput').value='';
  document.getElementById('btnGenerate').disabled=true;
  document.getElementById('resultsArea').className='results';
}
function resizeToCanvas(img,w,h){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  ctx.drawImage(img,0,0,w,h);
  return c;
}
function generate(){
  if(!_sourceImg)return;
  const t=_i18n[_lang];
  const grid=document.getElementById('favGrid');grid.innerHTML='';
  const htmlLines=[];
  SIZES.forEach(s=>{
    const canvas=resizeToCanvas(_sourceImg,s.w,s.h);
    const dataUrl=canvas.toDataURL('image/png');
    const card=document.createElement('div');card.className='fav-card';
    const previewSize=Math.min(s.w,64);
    card.innerHTML=`<img class="fav-preview" src="${dataUrl}" width="${previewSize}" height="${previewSize}" alt="${s.label}"><div class="fav-size">${s.label}</div><button class="fav-dl" onclick="downloadFav('${dataUrl}','${s.name}')">${t.dlBtn}</button>`;
    grid.appendChild(card);
    if(s.rel==='apple-touch-icon'){
      htmlLines.push(`<link rel="apple-touch-icon" sizes="${s.sizes}" href="/${s.name}">`);
    } else {
      htmlLines.push(`<link rel="icon" type="${s.type}" sizes="${s.sizes}" href="/${s.name}">`);
    }
  });
  htmlLines.push('<link rel="shortcut icon" href="/favicon.ico">');
  document.getElementById('htmlOutput').value=htmlLines.join('\n');
  document.getElementById('resultsArea').className='results show';
}
function downloadFav(dataUrl,name){
  const a=document.createElement('a');a.href=dataUrl;a.download=name;a.click();
}
function copyHtml(){
  const t=_i18n[_lang];
  const text=document.getElementById('htmlOutput').value;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('btnCopyHtml');
    const orig=btn.textContent;
    btn.textContent=t.copyDone;btn.style.background='var(--green)';btn.style.borderColor='var(--green)';btn.style.color='#000';
    setTimeout(()=>{btn.textContent=orig;btn.style.background='';btn.style.borderColor='';btn.style.color='';},2000);
  });
}
_lang=detectLang();applyLang();
