<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2e2e2e;--accent:#38bdf8;--text:#f0f0f0;--text-muted:#888;--text-dim:#555;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif;min-height:100vh;}
header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
main{max-width:720px;margin:0 auto;padding:48px 24px;}
h1{font-size:28px;font-weight:900;margin-bottom:8px;}
h1 span{color:var(--accent);}
.subtitle{font-size:13px;color:var(--text-muted);margin-bottom:28px;line-height:1.6;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;color:var(--text);font-size:14px;font-family:'DM Mono',monospace;line-height:1.8;outline:none;resize:vertical;min-height:200px;transition:border-color 0.2s;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--text-dim);}
.col-label{font-size:11px;color:var(--text-dim);margin-bottom:6px;font-family:'DM Mono',monospace;letter-spacing:0.08em;}
.fr-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
.fr-input-wrap{display:flex;flex-direction:column;}
.fr-input{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:14px;font-family:'DM Mono',monospace;outline:none;transition:border-color 0.2s;width:100%;}
.fr-input:focus{border-color:var(--accent);}
.fr-input::placeholder{color:var(--text-dim);}
.opt-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.opt-label{font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:6px;cursor:pointer;}
.opt-label input{accent-color:var(--accent);}
.match-badge{background:rgba(56,189,248,0.15);border:1px solid var(--accent);border-radius:8px;padding:4px 12px;font-size:12px;color:var(--accent);font-family:'DM Mono',monospace;display:inline-block;margin-bottom:12px;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.tool-btn{background:#111;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans',sans-serif;transition:all 0.15s;}
.tool-btn:hover{border-color:var(--accent);color:var(--accent);}
.tool-btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.tool-btn.primary:hover{opacity:0.85;}
.error-msg{color:#ef4444;font-size:12px;font-family:'DM Mono',monospace;margin-bottom:8px;}
.seo{margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}
.seo h2{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
.seo strong{color:var(--text-muted);}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:48px;padding:24px;}
.back-link{margin-left:auto;font-size:13px;color:var(--text-muted);text-decoration:none;}
.back-link:hover{color:var(--accent);}
.lang-toggle{margin-left:4px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;transition:all 0.15s;}
.lang-toggle:hover{border-color:var(--accent);color:var(--accent);}

.header-label{font-size:13px;color:var(--text-muted);letter-spacing:0.1em;font-family:'DM Mono',monospace;}
@media(max-width:500px){.fr-row{grid-template-columns:1fr;}}

<body>
<header>
  <div class="dot"></div>
  <span class="header-label">MODOO HUB</span>

<main>
  <h1>Find <span>&amp; Replace</span></h1>
  <p class="subtitle" data-i18n="sub">Find and replace text with powerful options including regex and whole word matching.</p>

  <div class="col-label" data-i18n="labelText">TEXT</div>
  <textarea id="mainArea" placeholder="Paste or type your text here..." oninput="countMatches()"></textarea>

  <div class="fr-row">
    <div class="fr-input-wrap">
      <div class="col-label" data-i18n="labelFind">FIND</div>
      <input class="fr-input" type="text" id="findInput" placeholder="Search term..." oninput="countMatches()">
    </div>
    <div class="fr-input-wrap">
      <div class="col-label" data-i18n="labelReplace">REPLACE</div>
      <input class="fr-input" type="text" id="replaceInput" placeholder="Replace with...">
    </div>
  </div>

  <div class="opt-row">
    <label class="opt-label"><input type="checkbox" id="optCase"> <span data-i18n="optCase">Case-sensitive</span></label>
    <label class="opt-label"><input type="checkbox" id="optRegex"> <span data-i18n="optRegex">Regex mode</span></label>
    <label class="opt-label"><input type="checkbox" id="optWholeWord"> <span data-i18n="optWholeWord">Whole word</span></label>
  </div>

  <div id="matchBadge" class="match-badge" style="display:none"></div>
  <div id="errorMsg" class="error-msg"></div>

  <div class="toolbar">
    <button class="tool-btn primary" onclick="doReplace()" data-i18n="btnReplace">Replace All</button>
    <button class="tool-btn" onclick="copyOutput()" data-i18n="btnCopy">📋 Copy</button>
    <button class="tool-btn" onclick="clearAll()" data-i18n="btnClear">🗑 Clear</button>
  </div>

  <div class="seo">
    <h2 id="seoTitle1"></h2>
    <p id="seoBody1"></p>
    <p id="seoFaq1"></p>
    <p id="seoFaq2"></p>
  </div>
  <footer>© 2026 MODOO HUB · Free · <a href="privacy.html" style="color:var(--text-dim);text-decoration:none;">Privacy Policy</a></footer>
</main>
<script>
function buildRegex(find){
  const cs=document.getElementById('optCase').checked;
  const rx=document.getElementById('optRegex').checked;
  const ww=document.getElementById('optWholeWord').checked;
  let pattern=rx?find:find.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  if(ww)pattern=`\\b${pattern}\\b`;
  return new RegExp(pattern,cs?'g':'gi');
}
function countMatches(){
  const text=document.getElementById('mainArea').value;
  const find=document.getElementById('findInput').value;
  document.getElementById('errorMsg').textContent='';
  if(!find){document.getElementById('matchBadge').style.display='none';return;}
  try{
    const re=buildRegex(find);
    const matches=(text.match(re)||[]).length;
    const badge=document.getElementById('matchBadge');
    badge.textContent=_i18n[_lang]?(_i18n[_lang].matchCount||'Matches')+': '+matches:matches+' matches';
    badge.style.display='inline-block';
  }catch(e){document.getElementById('errorMsg').textContent='Invalid regex: '+e.message;document.getElementById('matchBadge').style.display='none';}
}
function doReplace(){
  const text=document.getElementById('mainArea').value;
  const find=document.getElementById('findInput').value;
  const repl=document.getElementById('replaceInput').value;
  if(!find)return;
  try{
    const re=buildRegex(find);
    document.getElementById('mainArea').value=text.replace(re,repl);
    countMatches();
  }catch(e){document.getElementById('errorMsg').textContent='Invalid regex: '+e.message;}
}
function copyOutput(){const v=document.getElementById('mainArea').value;if(v)navigator.clipboard.writeText(v);}
function clearAll(){document.getElementById('mainArea').value='';document.getElementById('findInput').value='';document.getElementById('replaceInput').value='';document.getElementById('matchBadge').style.display='none';document.getElementById('errorMsg').textContent='';}
</script>
<script>
const _i18n={
  ko:{lang:'ko',title:'찾기 & 바꾸기 - 온라인 텍스트 찾기 바꾸기 도구 | 무료',btn:'🌐 EN',
    sub:'정규식, 대소문자 구분, 전체 단어 매칭 옵션으로 텍스트를 찾고 바꾸세요.',
    labelText:'텍스트',labelFind:'찾기',labelReplace:'바꾸기',
    optCase:'대소문자 구분',optRegex:'정규식 모드',optWholeWord:'전체 단어',
    matchCount:'일치',btnReplace:'모두 바꾸기',btnCopy:'📋 복사',btnClear:'🗑 지우기',
    seoTitle1:'찾기 & 바꾸기 도구란?',seoBody1:'찾기 & 바꾸기 도구는 텍스트에서 특정 단어나 패턴을 찾아 다른 텍스트로 교체하는 온라인 도구입니다. 정규식 모드를 사용하면 복잡한 패턴 매칭도 가능합니다.',

    sub:'Find and replace text with powerful options including regex and whole word matching.',
    labelText:'TEXT',labelFind:'FIND',labelReplace:'REPLACE',
    optCase:'Case-sensitive',optRegex:'Regex mode',optWholeWord:'Whole word',
    matchCount:'Matches',btnReplace:'Replace All',btnCopy:'📋 Copy',btnClear:'🗑 Clear',
    seoTitle1:'What is Find & Replace?',seoBody1:'Find & Replace is a free online tool that searches your text for a term or pattern and replaces it with another string. Enable regex mode for advanced pattern matching, or use whole word to avoid partial matches.',

    matchCount:'匹配数',btnReplace:'全部替换',btnCopy:'📋 复制',btnClear:'🗑 清空',

    labelText:'テキスト',labelFind:'検索',labelReplace:'置換',

    matchCount:'一致数',btnReplace:'すべて置換',btnCopy:'📋 コピー',btnClear:'🗑 クリア',
    seoTitle1:'検索と置換ツールとは？',seoBody1:'検索と置換ツールは、テキスト内の特定の単語やパターンを別の文字列に置き換える無料オンラインツールです。正規表現モードで高度なパターンマッチングも可能です。',

};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
  ['seoTitle1','seoBody1','seoFaq1','seoFaq2'].forEach(id=>{const el=document.getElementById(id);if(el&&t[id]!==undefined)el.innerHTML=t[id];});
  countMatches();
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
