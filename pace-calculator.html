<style>
:root{--bg:#0a0a0a;--surface:#141414;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#f97316;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:10px;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:560px;margin:0 auto;padding:40px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:28px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:28px;line-height:1.6;}
.mode-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:24px;}
.mbtn{padding:10px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;text-align:center;line-height:1.4;}
.mbtn.on{background:rgba(249,115,22,.12);border-color:var(--accent);color:var(--accent);font-weight:700;}
.input-group{margin-bottom:16px;}
label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:6px;font-family:'DM Mono',monospace;}
.time-wrap{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:6px;align-items:center;}
.time-sep{font-size:20px;font-weight:700;color:var(--text-dim);text-align:center;}
input[type=number]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:18px;font-weight:700;font-family:'DM Mono',monospace;outline:none;text-align:center;}
input:focus{border-color:var(--accent);}
input.big{font-size:24px;}
.unit-row{display:flex;gap:8px;margin-bottom:20px;}
.ubtn{padding:6px 14px;border:1px solid var(--border);border-radius:999px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}
.ubtn.on{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.dist-shortcuts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.dbtn{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}
.dbtn:hover{border-color:var(--accent);color:var(--accent);}
.calc-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;font-family:'Noto Sans KR',sans-serif;}
.calc-btn:hover{opacity:.85;}
.result-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px;display:none;}
.result-box.show{display:block;}
.result-main{text-align:center;padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid var(--border);}
.rl{font-size:12px;color:var(--text-muted);margin-bottom:4px;font-family:'DM Mono',monospace;}
.rv{font-size:48px;font-weight:900;color:var(--accent);font-family:'DM Mono',monospace;line-height:1;}
.ru{font-size:13px;color:var(--text-muted);margin-top:6px;}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.s-row:last-child{border-bottom:none;}
.s-label{font-size:13px;color:var(--text-muted);}
.s-val{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);}
.race-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;}
.race-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;}
.rc-name{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:4px;}
.rc-time{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;}
.seo{margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}
.seo h2{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:40px;}
</style>

<body>
<header>
  <span class="logo">MODOO HUB</span>

      <label data-i18n="distLabel">거리</label>
      <input type="number" class="big" id="d1" placeholder="10" step="0.01">
    </div>
  </div>

  <!-- Mode 2: Time + Distance → Pace -->
  <div id="sec2" style="display:none">
    <div class="input-group">
      <label data-i18n="timeLabel">완주 시간</label>
      <div class="time-wrap">
        <input type="number" id="th" placeholder="0" min="0">
        <span class="time-sep">:</span>
        <input type="number" id="tm" placeholder="50" min="0" max="59">
        <span class="time-sep">:</span>
        <input type="number" id="ts" placeholder="00" min="0" max="59">
      </div>
    </div>
    <div class="input-group">
      <label data-i18n="distLabel">거리</label>
      <input type="number" class="big" id="d2" placeholder="10" step="0.01">
    </div>
  </div>

  <!-- Mode 3: Pace + Time → Distance -->
  <div id="sec3" style="display:none">
    <div class="input-group">
      <label data-i18n="paceLabel">페이스 (분:초 / km)</label>
      <div class="time-wrap">
        <input type="number" id="p3min" placeholder="5" min="0" max="59">
        <span class="time-sep">:</span>
        <input type="number" id="p3sec" placeholder="30" min="0" max="59">
        <span class="time-sep" style="font-size:13px;color:var(--text-dim)" data-i18n="perUnit">/ km</span>
        <span></span>
      </div>
    </div>
    <div class="input-group">
      <label data-i18n="timeLabel">달린 시간</label>
      <div class="time-wrap">
        <input type="number" id="th3" placeholder="1" min="0">
        <span class="time-sep">:</span>
        <input type="number" id="tm3" placeholder="00" min="0" max="59">
        <span class="time-sep">:</span>
        <input type="number" id="ts3" placeholder="00" min="0" max="59">
      </div>
    </div>
  </div>

  <div class="dist-shortcuts" id="shortcuts">
    <button class="dbtn" onclick="setDist(5)">5K</button>
    <button class="dbtn" onclick="setDist(10)">10K</button>
    <button class="dbtn" onclick="setDist(21.0975)">하프</button>
    <button class="dbtn" onclick="setDist(42.195)">풀마라톤</button>
  </div>

  <button class="calc-btn" onclick="calc()" data-i18n="calcBtn">계산하기</button>

  <div class="result-box" id="result">
    <div class="result-main">
      <div class="rl" id="rLabel">완주 시간</div>
      <div class="rv" id="rMain">--</div>
      <div class="ru" id="rUnit"></div>
    </div>
    <div id="rRows"></div>
    <div class="race-grid" id="raceGrid" style="display:none">
      <div class="race-card"><div class="rc-name">5K</div><div class="rc-time" id="race5k">--</div></div>
      <div class="race-card"><div class="rc-name">10K</div><div class="rc-time" id="race10k">--</div></div>
      <div class="race-card"><div class="rc-name" data-i18n="halfLabel">하프마라톤</div><div class="rc-time" id="raceHalf">--</div></div>
      <div class="race-card"><div class="rc-name" data-i18n="fullLabel">풀마라톤</div><div class="rc-time" id="raceFull">--</div></div>
    </div>
  </div>

  <div class="seo" data-i18n="seoHtml"></div>
  <footer data-i18n="footer">러닝 페이스 계산기 · 마라톤 · 하프마라톤 · 5K · 10K</footer>
</main>
<script>
const _i18n = {
  ko:{
    h1:'페이스 <span style="color:var(--accent)">계산기</span>',
    sub:'페이스·속도·시간·거리를 서로 변환합니다',

    m2Btn:'시간 + 거리<br>→ 페이스',
    m3Btn:'페이스 + 시간<br>→ 거리',

    distLabel:'거리',

    calcBtn:'계산하기',

    halfLabel:'하프마라톤',
    fullLabel:'풀마라톤',
    seoHtml:'<h2>페이스 계산기란?</h2><p>달리기 <strong>페이스(pace)</strong>는 1km 또는 1마일을 달리는 데 걸리는 시간입니다. 페이스+거리로 완주 시간을, 시간+거리로 페이스를 역산하며, 하프/풀마라톤 예상 완주 시간도 자동 계산합니다.</p><details class="faq-item"><summary>페이스와 속도(km/h)의 차이는 무엇인가요?</summary><p>페이스는 1km당 걸리는 시간(분:초)이고, 속도는 시간당 거리(km/h)입니다. 두 값은 역수 관계입니다: 페이스(분/km) = 60 ÷ 속도(km/h). 예: 6:00/km = 10 km/h, 5:00/km = 12 km/h.</p></details><details class="faq-item"><summary>마라톤 완주 시간별 페이스는 어떻게 되나요?</summary><p>풀마라톤(42.195km) 기준: 3시간 = 4:16/km, 3시간30분 = 4:58/km, 4시간 = 5:41/km, 4시간30분 = 6:24/km, 5시간 = 7:06/km. 하프마라톤은 거리가 절반이므로 같은 페이스에 약 절반의 시간이 걸립니다.</p></details><details class="faq-item"><summary>음수 분할(네거티브 스플릿)이란 무엇인가요?</summary><p>레이스 후반부를 전반부보다 빠르게 달리는 전략입니다. 초반 에너지를 아껴 후반에 페이스를 높이며, 대부분의 마라톤 세계 기록은 네거티브 스플릿으로 세워졌습니다. 초보자보다는 경험 있는 러너에게 권장됩니다.</p></details><details class="faq-item"><summary>km와 마일은 어떻게 다른가요?</summary><p>1마일 = 1.60934km입니다. 미국·영국에서는 마일 페이스(분/마일)를 주로 사용하고, 한국·유럽에서는 km 페이스를 사용합니다. 예: 6:00/km ≈ 9:39/마일, 8:00/마일 ≈ 4:58/km.</p></details><details class="faq-item"><summary>처음 달리기를 시작할 때 적정 페이스는?</summary><p>초보자에게는 옆 사람과 대화가 가능한 "대화 페이스"를 권장합니다. 일반적으로 7:00–8:30/km 수준이며, 무리하지 않고 꾸준히 달리는 것이 부상 예방과 지구력 향상에 중요합니다.</p></details><details class="faq-item"><summary>마라톤 페이스와 하프 마라톤 페이스는 어떻게 다른가요?</summary><p>대부분의 러너는 하프 마라톤을 마라톤 페이스보다 km당 10~20초 빠르게 달립니다. 유산소 임계점(lactate threshold) 이상의 페이스로 달리면 완주가 어려워 적절한 페이스 조절이 중요합니다.</p></details><details class="faq-item"><summary>페이스 훈련에서 인터벌과 템포 런의 차이는?</summary><p>인터벌은 고강도 단거리 구간과 회복 구간을 반복합니다. 템포 런은 유산소 임계점 근처 강도로 20~40분간 지속적으로 달립니다. 템포 런은 레이스 페이스 향상에, 인터벌은 VO2max 개선에 효과적입니다.</p></details><details class="faq-item"><summary>달리기 페이스 계산 시 고도(경사도)는 어떻게 반영하나요?</summary><p>경사가 1% 오를 때마다 km당 약 6초 느려집니다. 고도 보정 페이스(grade adjusted pace)는 경사 구간의 노력도를 평지 기준으로 환산합니다. GPS 러닝 앱 대부분이 이 기능을 지원합니다.</p></details>',

    seoHtml:'<h2>Running Pace Calculator</h2><p>Calculate your <strong>running pace</strong>, finish time, or distance with three modes: pace + distance → finish time; time + distance → pace; pace + time → distance. Includes automatic predictions for 5K, 10K, half marathon, and full marathon.</p><details class="faq-item"><summary>What is the difference between pace and speed?</summary><p>Pace is the time per unit distance (e.g., min/km or min/mile), while speed is distance per unit time (e.g., km/h). They are inverses: Pace (min/km) = 60 ÷ Speed (km/h). Example: 6:00/km = 10 km/h, 5:00/km = 12 km/h.</p></details><details class="faq-item"><summary>What pace do I need for a sub-4-hour marathon?</summary><p>To finish a full marathon (42.195 km) in under 4 hours, you need to maintain a pace faster than 5:41/km (9:08/mile). For a 3:30 finish: 4:58/km. For a 3:00 finish: 4:16/km. This calculator shows race predictions automatically after entering your pace.</p></details><details class="faq-item"><summary>What is a negative split?</summary><p>Running the second half of a race faster than the first. It conserves energy early and allows a strong finish. Most marathon world records are set with negative splits. It requires experience and discipline — beginners may find even splits easier to execute.</p></details><details class="faq-item"><summary>How do km and miles compare?</summary><p>1 mile = 1.60934 km. The US and UK typically use miles (min/mile), while Korea and Europe use km (min/km). Conversion: 6:00/km ≈ 9:39/mile; 8:00/mile ≈ 4:58/km. This calculator supports both units.</p></details><details class="faq-item"><summary>What pace is good for a beginner runner?</summary><p>Beginners should aim for a "conversational pace" — slow enough to speak in full sentences without gasping. This is typically 7:00–9:00/km. Running at this comfortable effort builds aerobic base, reduces injury risk, and allows consistent training.</p></details><details class="faq-item"><summary>How do marathon pace and half-marathon pace differ?</summary><p>Most runners run a half-marathon 10–20 seconds per km faster than their full marathon pace. Running above the lactate threshold makes it difficult to sustain over a marathon, so pacing discipline is critical in longer races.</p></details><details class="faq-item"><summary>What is the difference between interval training and tempo runs?</summary><p>Intervals alternate short high-intensity efforts with recovery periods. Tempo runs sustain effort near the lactate threshold for 20–40 minutes continuously. Tempo runs improve race pace, while intervals primarily target VO2max development.</p></details><details class="faq-item"><summary>How does elevation affect pace calculations?</summary><p>For every 1% increase in gradient, pace slows by approximately 6 seconds per km. Grade-adjusted pace converts hilly-segment effort into flat-equivalent pacing. Most GPS running apps support grade-adjusted pace as a metric.</p></details>',

  zh:{

    langBtn:'🌐 日本語',

    fullLabel:'全程马拉松',
    seoHtml:'<h2>配速计算器</h2><p>计算跑步的<strong>配速</strong>、完赛时间或距离，支持三种模式：配速+距离→完赛时间；时间+距离→配速；配速+时间→距离。自动预测5K、10K、半程和全程马拉松成绩。</p><details class="faq-item"><summary>配速和速度有什么区别？</summary><p>配速是跑完单位距离所需时间（如分/公里），速度是单位时间内跑过的距离（如公里/小时）。两者互为倒数：配速（分/km）= 60 ÷ 速度（km/h）。例如：6:00/km = 10 km/h，5:00/km = 12 km/h。</p></details><details class="faq-item"><summary>全程马拉松破4小时需要什么配速？</summary><p>全程马拉松（42.195km）破4小时需要保持快于5:41/km（9:08/英里）的配速。破3:30需要4:58/km，破3:00需要4:16/km。输入配速后，计算器会自动显示各项赛事的预测成绩。</p></details><details class="faq-item"><summary>什么是负分割（Negative Split）？</summary><p>后半程比前半程跑得更快的策略。前期节省体力，后期发力冲刺。大多数马拉松世界纪录都以负分割创造。需要经验和自律——初学者可能更适合匀速跑。</p></details><details class="faq-item"><summary>公里和英里如何换算？</summary><p>1英里 = 1.60934公里。美国和英国通常使用英里配速（分/英里），中国和欧洲使用公里配速（分/km）。换算：6:00/km ≈ 9:39/英里；8:00/英里 ≈ 4:58/km。</p></details><details class="faq-item"><summary>初学者跑步的合适配速是多少？</summary><p>初学者应以"对话配速"为目标——慢到可以正常说话而不气喘。通常为7:00–9:00/km。以这种舒适强度跑步能建立有氧基础、降低受伤风险并保持持续训练。</p></details><details class="faq-item"><summary>马拉松配速和半马配速有什么不同？</summary><p>大多数跑者的半马配速比全马配速每公里快10-20秒。超过乳酸阈值的配速难以在全马中维持，因此配速控制至关重要。</p></details><details class="faq-item"><summary>间歇训练和节奏跑有什么区别？</summary><p>间歇训练交替进行短时高强度冲刺和恢复阶段。节奏跑在乳酸阈值附近保持20-40分钟的持续强度。节奏跑有助于提升比赛配速，而间歇训练主要用于提高最大摄氧量。</p></details><details class="faq-item"><summary>配速计算时如何考虑海拔（坡度）？</summary><p>每1%的坡度增加会使配速每公里减慢约6秒。坡度调整配速将山地路段的努力程度换算为平地等效配速，大多数GPS跑步应用程序都支持此功能。</p></details>',

    seoHtml:'<h2>ランニングペース計算機とは？</h2><p>3つのモードで<strong>ランニングペース</strong>・完走タイム・距離を計算します：ペース+距離→完走タイム、タイム+距離→ペース、ペース+タイム→距離。5K・10K・ハーフ・フルマラソンの予測タイムも自動表示します。</p><details class="faq-item"><summary>ペースと速度（km/h）の違いは？</summary><p>ペースは単位距離を走るのにかかる時間（例：分/km）、速度は単位時間に進む距離（例：km/h）です。両者は逆数の関係です：ペース（分/km）= 60 ÷ 速度（km/h）。例：6:00/km = 10 km/h、5:00/km = 12 km/h。</p></details><details class="faq-item"><summary>フルマラソンのサブ4を達成するには何ペースが必要ですか？</summary><p>フルマラソン（42.195km）でサブ4を達成するには5:41/km（9:08/マイル）より速いペースを維持する必要があります。サブ3:30なら4:58/km、サブ3:00なら4:16/km。ペースを入力すると各レースの予測タイムが自動表示されます。</p></details><details class="faq-item"><summary>ネガティブスプリットとは何ですか？</summary><p>レースの後半を前半より速く走る戦略です。序盤にエネルギーを温存し、後半に加速します。マラソンの世界記録の多くはネガティブスプリットで樹立されています。経験が必要で、初心者にはイーブンペースの方が実行しやすい場合があります。</p></details><details class="faq-item"><summary>kmとマイルはどう違いますか？</summary><p>1マイル = 1.60934kmです。米国・英国ではマイルペース（分/マイル）が主流で、日本・欧州ではkmペース（分/km）が使われます。換算：6:00/km ≈ 9:39/マイル、8:00/マイル ≈ 4:58/km。</p></details><details class="faq-item"><summary>初心者ランナーに適したペースは？</summary><p>初心者には「会話ができるペース」が推奨されます。ゆっくり話せるくらいの強度で、通常7:00–9:00/km程度です。このペースで有酸素基盤を作り、怪我のリスクを下げながら継続的なトレーニングを続けることが重要です。</p></details><details class="faq-item"><summary>マラソンペースとハーフマラソンペースはどう違いますか？</summary><p>ほとんどのランナーはハーフマラソンをフルマラソンよりkm当たり10〜20秒速く走ります。乳酸閾値を超えるペースはフルマラソンで維持できないため、ペース管理が重要です。</p></details><details class="faq-item"><summary>インターバルトレーニングとテンポランの違いは？</summary><p>インターバルは短時間の高強度走と回復を交互に繰り返します。テンポランは乳酸閾値付近の強度で20〜40分継続して走ります。テンポランはレースペース向上に、インターバルはVO2max改善に効果的です。</p></details><details class="faq-item"><summary>ペース計算で傾斜はどう反映しますか？</summary><p>傾斜が1%増えるごとにペースはkm当たり約6秒遅くなります。勾配調整ペース（grade adjusted pace）は傾斜区間の努力度を平坦路基準に換算します。ほとんどのGPSランニングアプリがこの機能をサポートしています。</p></details>',

let _lang = 'ko', _unit = 'km', _mode = 1;
const LANGS = ['ko','en','zh','ja'];
const RACE_DISTS_KM = [5, 10, 21.0975, 42.195];
const RACE_DISTS_MI = [3.10686, 6.21371, 13.1094, 26.2188];

function detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language?.slice(0,2);
  return (n === 'zh') ? 'zh' : (n === 'ja') ? 'ja' : (n === 'ko') ? 'ko' : 'en';
}
function cycleLang() {
  const idx = LANGS.indexOf(_lang);
  _lang = LANGS[(idx+1)%LANGS.length];
  localStorage.setItem('modoo_lang', _lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', _lang);
  history.replaceState({}, '', url);
  applyLang();
}
function applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = _lang;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('backBtn').innerHTML = t.backBtn;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (t[k] !== undefined) el.innerHTML = t[k];
  });
  document.getElementById('mBtn1').innerHTML = t.m1Btn;
  document.getElementById('mBtn2').innerHTML = t.m2Btn;
  document.getElementById('mBtn3').innerHTML = t.m3Btn;
  const sc = document.querySelectorAll('.dist-shortcuts .dbtn');
  if (t.distShortcuts) t.distShortcuts.forEach((l,i) => { if(sc[i]) sc[i].textContent = l; });
  updatePerUnit();
}
function updatePerUnit() {
  const u = _unit === 'km' ? (_lang === 'ko' ? '/ km' : '/ km') : (_lang === 'ko' ? '/ 마일' : '/ mile');
  document.querySelectorAll('[data-i18n="perUnit"]').forEach(el => el.textContent = u);
}
function setUnit(u) {
  _unit = u;
  document.getElementById('uKm').classList.toggle('on', u === 'km');
  document.getElementById('uMi').classList.toggle('on', u === 'mi');
  updatePerUnit();
}
function setMode(m) {
  _mode = m;
  [1,2,3].forEach(i => {
    document.getElementById('sec'+i).style.display = i===m ? '' : 'none';
    document.getElementById('mBtn'+i).classList.toggle('on', i===m);
  });
  document.getElementById('shortcuts').style.display = m === 3 ? 'none' : '';
  document.getElementById('result').classList.remove('show');
}
function setDist(km) {
  const v = _unit === 'km' ? km : km / 1.60934;
  const id = _mode === 1 ? 'd1' : 'd2';
  document.getElementById(id).value = parseFloat(v.toFixed(4));
}
function fmtTime(totalSec) {
  totalSec = Math.round(totalSec);
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec%3600)/60);
  const s = totalSec%60;
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return m + ':' + String(s).padStart(2,'0');
}
function fmtPace(secPerUnit) {
  const m = Math.floor(secPerUnit/60);
  const s = Math.round(secPerUnit%60);
  return m + ':' + String(s).padStart(2,'0');
}
function makeRows(rows) {
  return rows.map(([k,v]) => `<div class="s-row"><span class="s-label">${k}</span><span class="s-val">${v}</span></div>`).join('');
}
function calc() {
  const t = _i18n[_lang];
  const res = document.getElementById('result');
  const kmFactor = _unit === 'km' ? 1 : 1.60934;
  let mainVal, mainLabel, rows = [], showRace = false, paceSecPerKm = 0;

  if (_mode === 1) {
    const pm = parseInt(document.getElementById('p1min').value)||0;
    const ps = parseInt(document.getElementById('p1sec').value)||0;
    const dist = parseFloat(document.getElementById('d1').value);
    if (!dist) { res.classList.remove('show'); return; }
    const paceSecPerUnit = pm*60 + ps;
    if (!paceSecPerUnit) { res.classList.remove('show'); return; }
    paceSecPerKm = paceSecPerUnit / kmFactor;
    const totalSec = paceSecPerUnit * dist;
    const speedKmh = 3600 / paceSecPerKm;
    mainLabel = t.rLabelTime;
    mainVal = fmtTime(totalSec);
    rows = [[t.rPace, fmtPace(paceSecPerUnit)+' /'+_unit],[t.rSpeed, speedKmh.toFixed(2)+' km/h'],[t.rDist, dist+' '+_unit]];
    showRace = true;
  } else if (_mode === 2) {
    const h = parseInt(document.getElementById('th').value)||0;
    const m = parseInt(document.getElementById('tm').value)||0;
    const s = parseInt(document.getElementById('ts').value)||0;
    const dist = parseFloat(document.getElementById('d2').value);
    const totalSec = h*3600 + m*60 + s;
    if (!totalSec || !dist) { res.classList.remove('show'); return; }
    const paceSecPerUnit = totalSec / dist;
    paceSecPerKm = paceSecPerUnit / kmFactor;
    const speedKmh = 3600 / paceSecPerKm;
    mainLabel = t.rLabelPace;
    mainVal = fmtPace(paceSecPerUnit) + ' /'+_unit;
    rows = [[t.rTime, fmtTime(totalSec)],[t.rDist, dist+' '+_unit],[t.rSpeed, speedKmh.toFixed(2)+' km/h']];
    showRace = true;
  } else {
    const pm = parseInt(document.getElementById('p3min').value)||0;
    const ps = parseInt(document.getElementById('p3sec').value)||0;
    const h = parseInt(document.getElementById('th3').value)||0;
    const m = parseInt(document.getElementById('tm3').value)||0;
    const s = parseInt(document.getElementById('ts3').value)||0;
    const paceSecPerUnit = pm*60 + ps;
    const totalSec = h*3600 + m*60 + s;
    if (!paceSecPerUnit || !totalSec) { res.classList.remove('show'); return; }
    const dist = totalSec / paceSecPerUnit;
    paceSecPerKm = paceSecPerUnit / kmFactor;
    const speedKmh = 3600 / paceSecPerKm;
    mainLabel = t.rLabelDist;
    mainVal = dist.toFixed(2) + ' ' + _unit;
    rows = [[t.rPace, fmtPace(paceSecPerUnit)+' /'+_unit],[t.rTime, fmtTime(totalSec)],[t.rSpeed, speedKmh.toFixed(2)+' km/h']];
  }

  document.getElementById('rLabel').textContent = mainLabel;
  document.getElementById('rMain').textContent = mainVal;
  document.getElementById('rUnit').textContent = '';
  document.getElementById('rRows').innerHTML = makeRows(rows);

  const raceIds = ['race5k','race10k','raceHalf','raceFull'];
  const dists = _unit === 'km' ? RACE_DISTS_KM : RACE_DISTS_MI;
  if (showRace && paceSecPerKm > 0) {
    document.getElementById('raceGrid').style.display = 'grid';
    raceIds.forEach((id,i) => {
      const distKm = RACE_DISTS_KM[i];
      document.getElementById(id).textContent = fmtTime(paceSecPerKm * distKm);
    });
  } else {
    document.getElementById('raceGrid').style.display = 'none';
  }
  res.classList.add('show');
}
_lang = detectLang();
applyLang();
</script>
