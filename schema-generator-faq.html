<style>

body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:10px;}

h1{font-size:clamp(22px,4vw,32px);font-weight:900;margin-bottom:6px;}

.faq-num{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.btn-rm{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 4px;}
input,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:6px;}
input:focus,textarea:focus{border-color:var(--accent);}
textarea{min-height:60px;resize:vertical;margin-bottom:0;}
.field-label{font-size:10px;color:var(--text-dim);margin-bottom:3px;font-family:'DM Mono',monospace;}
.btn-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.btn{padding:7px 18px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:#f59e0b;}
.btn-sec{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
.btn-sec:hover{border-color:var(--accent);}
.btn-add{background:transparent;border:1px dashed var(--border);color:var(--text-muted);width:100%;padding:10px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;margin-bottom:16px;}
.btn-add:hover{border-color:var(--accent);color:var(--accent);}
.out-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.out-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
.out-title{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.btn-copy{padding:4px 12px;border-radius:6px;background:var(--accent);color:#000;border:none;cursor:pointer;font-size:11px;font-weight:700;}
pre{padding:14px;font-size:12px;font-family:'DM Mono',monospace;color:var(--text-muted);line-height:1.6;overflow-x:auto;white-space:pre-wrap;word-break:break-word;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
.seo-sub{font-size:14px;font-weight:700;margin:16px 0 8px;color:var(--text-muted);}
details.faq-item{border:1px solid var(--border);border-radius:6px;margin-bottom:8px;}
details.faq-item summary{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-muted);list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item[open] summary{border-bottom:1px solid var(--border);}
details.faq-item p{padding:10px 14px;font-size:13px;color:var(--text-dim);line-height:1.8;}

<script>
const LANGS=['ko','en','zh','ja'];let _lang='ko';let _items=[];
const _i18n={
  ko:{h1Accent:'스키마 생성기',sub:'FAQ 페이지용 JSON-LD 구조화 데이터를 생성하여 Google 리치 결과에 노출합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',btnAdd:'+ 질문/답변 추가',btnGen:'스키마 생성',btnSample:'샘플',btnClear:'초기화',outTitle:'JSON-LD 스키마',btnCopy:'복사',lblQ:'질문',lblA:'답변',lblItem:'FAQ',
    seoHtml:`<h2>FAQ 스키마 생성기</h2><p>FAQ(자주 묻는 질문) 페이지를 위한 JSON-LD 구조화 데이터를 생성합니다. Google은 FAQPage 스키마를 인식하여 검색 결과에 질문과 답변을 직접 표시하는 리치 결과를 제공합니다. 클릭률 향상에 효과적입니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>FAQ 스키마로 리치 결과가 항상 나오나요?</summary><p>아니오, Google이 적합하다고 판단할 때만 표시합니다. 콘텐츠가 페이지에 실제로 있어야 합니다.</p></details>
<details class="faq-item"><summary>FAQ 스키마를 어디에 삽입하나요?</summary><p>&lt;head&gt; 또는 &lt;body&gt; 내 어디에나 &lt;script type="application/ld+json"&gt;으로 삽입 가능합니다.</p></details>
<details class="faq-item"><summary>FAQ 항목은 몇 개까지 추가할 수 있나요?</summary><p>Google은 3~10개를 권장하며 검색 결과에는 최대 2~3개만 표시될 수 있습니다.</p></details>
<details class="faq-item"><summary>HTML 태그를 답변에 사용할 수 있나요?</summary><p>스키마 마크업에서는 일부 HTML 포맷을 지원하지만, 단순 텍스트가 안전합니다.</p></details>
<details class="faq-item"><summary>FAQ 스키마와 HowTo 스키마 차이는?</summary><p>FAQ는 질문-답변 형식, HowTo는 단계별 지침에 사용합니다.</p></details>
<details class="faq-item"><summary>Google Search Console에서 검증할 수 있나요?</summary><p>예, Google Rich Results Test(search.google.com/test/rich-results)에서 검증할 수 있습니다.</p></details>
<details class="faq-item"><summary>중복 FAQ 스키마를 사용해도 되나요?</summary><p>같은 페이지에 같은 질문을 두 번 사용하면 안 됩니다. 중복을 피하세요.</p></details>
<details class="faq-item"><summary>모바일과 데스크탑 모두에서 리치 결과가 나오나요?</summary><p>예, 모바일과 데스크탑 모두에서 FAQPage 리치 결과가 표시될 수 있습니다.</p></details>`
  },
  en:{h1Accent:'Schema Generator',sub:'Generate JSON-LD structured data for FAQ pages to appear in Google rich results',backLink:'← All Tools',langBtn:'🌐 中文',btnAdd:'+ Add Q&A',btnGen:'Generate Schema',btnSample:'Sample',btnClear:'Clear',outTitle:'JSON-LD Schema',btnCopy:'Copy',lblQ:'Question',lblA:'Answer',lblItem:'FAQ',
    seoHtml:`<h2>FAQ Schema Generator</h2><p>Generate JSON-LD structured data for FAQ pages. Google recognizes FAQPage schema to display questions and answers directly in search results as rich results, improving click-through rates significantly.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Do FAQ schemas always produce rich results?</summary><p>No — Google only shows them when it deems appropriate. The content must actually exist on the page.</p></details>
<details class="faq-item"><summary>Where do I insert the FAQ schema?</summary><p>Inside &lt;head&gt; or &lt;body&gt; as a &lt;script type="application/ld+json"&gt; block anywhere on the page.</p></details>
<details class="faq-item"><summary>How many FAQ items can I add?</summary><p>Google recommends 3–10 items, though search results may show only 2–3.</p></details>
<details class="faq-item"><summary>Can I use HTML tags in answers?</summary><p>Some HTML formatting is supported in the schema, but plain text is safest.</p></details>
<details class="faq-item"><summary>FAQ schema vs. HowTo schema?</summary><p>FAQ is for Q&A format; HowTo is for step-by-step instructions.</p></details>
<details class="faq-item"><summary>Can I validate it in Google Search Console?</summary><p>Yes — use Google Rich Results Test (search.google.com/test/rich-results).</p></details>
<details class="faq-item"><summary>Can I use duplicate FAQ schemas?</summary><p>Do not repeat the same question twice on a page. Avoid duplicates.</p></details>
<details class="faq-item"><summary>Do rich results show on mobile and desktop?</summary><p>Yes — FAQPage rich results can appear on both mobile and desktop.</p></details>`
  },
  zh:{h1Accent:'架构生成器',sub:'生成FAQ页面的JSON-LD结构化数据以显示在Google富媒体搜索结果中',backLink:'← 所有工具',langBtn:'🌐 日本語',btnAdd:'+ 添加问答',btnGen:'生成架构',btnSample:'示例',btnClear:'清除',outTitle:'JSON-LD架构',btnCopy:'复制',lblQ:'问题',lblA:'答案',lblItem:'FAQ',
    seoHtml:`<h2>FAQ架构生成器</h2><p>为FAQ页面生成JSON-LD结构化数据。Google识别FAQPage架构，在搜索结果中直接显示问题和答案作为富媒体结果，有效提高点击率。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>FAQ架构总能产生富媒体结果吗？</summary><p>不，Google只在认为合适时才显示。内容必须实际存在于页面上。</p></details>
<details class="faq-item"><summary>在哪里插入FAQ架构？</summary><p>在页面任何位置的&lt;head&gt;或&lt;body&gt;内，以&lt;script type="application/ld+json"&gt;形式插入。</p></details>
<details class="faq-item"><summary>可以添加多少个FAQ条目？</summary><p>Google推荐3~10个，搜索结果中可能只显示2~3个。</p></details>
<details class="faq-item"><summary>答案中可以使用HTML标签吗？</summary><p>架构标记支持部分HTML格式，但纯文本更安全。</p></details>
<details class="faq-item"><summary>FAQ架构和HowTo架构的区别？</summary><p>FAQ用于问答格式，HowTo用于分步说明。</p></details>
<details class="faq-item"><summary>可以在Google Search Console中验证吗？</summary><p>是的，使用Google Rich Results Test（search.google.com/test/rich-results）。</p></details>
<details class="faq-item"><summary>可以使用重复的FAQ架构吗？</summary><p>页面上不要重复使用相同的问题，避免重复。</p></details>
<details class="faq-item"><summary>富媒体结果在移动端和桌面端都显示吗？</summary><p>是的，FAQPage富媒体结果可以在移动端和桌面端都显示。</p></details>`
  },
  ja:{h1Accent:'スキーマジェネレーター',sub:'FAQページ用JSON-LD構造化データを生成してGoogle リッチリザルトに表示',backLink:'← ホーム',langBtn:'🌐 한국어',btnAdd:'+ Q&A追加',btnGen:'スキーマ生成',btnSample:'サンプル',btnClear:'クリア',outTitle:'JSON-LDスキーマ',btnCopy:'コピー',lblQ:'質問',lblA:'回答',lblItem:'FAQ',
    seoHtml:`<h2>FAQスキーマジェネレーター</h2><p>FAQページ用のJSON-LD構造化データを生成します。GoogleはFAQPageスキーマを認識し、検索結果に質問と回答を直接表示するリッチリザルトを提供します。クリック率の向上に効果的です。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>FAQスキーマは必ずリッチリザルトになりますか？</summary><p>いいえ、Googleが適切と判断した場合のみ表示されます。コンテンツがページ上に実際に存在する必要があります。</p></details>
<details class="faq-item"><summary>FAQスキーマはどこに挿入しますか？</summary><p>ページ内の&lt;head&gt;または&lt;body&gt;どこでも&lt;script type="application/ld+json"&gt;ブロックとして挿入できます。</p></details>
<details class="faq-item"><summary>FAQ項目は何個まで追加できますか？</summary><p>Googleは3〜10個を推奨しており、検索結果には最大2〜3個しか表示されない場合があります。</p></details>
<details class="faq-item"><summary>回答にHTMLタグを使えますか？</summary><p>一部のHTMLフォーマットはサポートされていますが、プレーンテキストが最も安全です。</p></details>
<details class="faq-item"><summary>FAQスキーマとHowToスキーマの違いは？</summary><p>FAQは質問回答形式、HowToはステップバイステップの説明に使用します。</p></details>
<details class="faq-item"><summary>Google Search Consoleで検証できますか？</summary><p>はい — Google Rich Results Test（search.google.com/test/rich-results）で検証できます。</p></details>
<details class="faq-item"><summary>重複FAQスキーマを使っていいですか？</summary><p>同じページで同じ質問を2回使用しないでください。重複を避けてください。</p></details>
<details class="faq-item"><summary>リッチリザルトはモバイルとデスクトップ両方で表示されますか？</summary><p>はい — FAQPageリッチリザルトはモバイルとデスクトップ両方で表示される可能性があります。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','btnAdd','btnGen','btnSample','btnClear','outTitle','btnCopy'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  renderList();
}
let _id=0;
function addItem(q='',a=''){_items.push({id:_id++,q,a});renderList();}
function removeItem(id){_items=_items.filter(x=>x.id!==id);renderList();}
function renderList(){
  const t=_i18n[_lang];
  const list=document.getElementById('faqList');
  list.innerHTML=_items.map((item,idx)=>`
<div class="faq-item-wrap">
  <div class="faq-item-head"><span class="faq-num">${t.lblItem} ${idx+1}</span><button class="btn-rm" onclick="removeItem(${item.id})">✕</button></div>
  <div class="field-label">${t.lblQ}</div>
  <input value="${escH(item.q)}" placeholder="${t.lblQ}..." oninput="_items.find(x=>x.id===${item.id}).q=this.value" data-id="${item.id}" data-field="q">
  <div class="field-label">${t.lblA}</div>
  <textarea placeholder="${t.lblA}..." oninput="_items.find(x=>x.id===${item.id}).a=this.value">${escH(item.a)}</textarea>
</div>`).join('');
}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function generate(){
  const entities=_items.filter(x=>x.q.trim()&&x.a.trim());
  if(!entities.length)return;
  const schema={"@context":"https://schema.org","@type":"FAQPage","mainEntity":entities.map(x=>({"@type":"Question","name":x.q,"acceptedAnswer":{"@type":"Answer","text":x.a}}))};
  document.getElementById('outPre').textContent=JSON.stringify(schema,null,2);
  document.getElementById('outBox').style.display='block';
}
function copyOut(){navigator.clipboard.writeText(document.getElementById('outPre').textContent);}
function clearAll(){_items=[];renderList();document.getElementById('outBox').style.display='none';}
