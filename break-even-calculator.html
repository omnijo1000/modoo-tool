  ko:{h1Accent:'손익분기점',sub:'BEP 판매량과 매출을 계산합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',
    lblFixed:'고정비 (월 또는 기간 총 고정비용)',lblVariable:'단위당 변동비 (개당 생산비)',lblPrice:'단위당 판매가',lblTarget:'목표 이익 (선택, 0=BEP만)',

    seoHtml:`<h2>손익분기점(BEP) 계산기</h2><p>손익분기점(Break-Even Point)은 총수익과 총비용이 같아지는 시점으로, 이익도 손실도 없는 판매량입니다. 고정비(임대료, 보험료), 단위당 변동비(원재료, 운송비), 판매가를 입력하면 BEP 수량과 매출이 자동으로 계산됩니다. 스타트업 사업 계획, 신제품 출시, 가격 전략 수립에 필수 도구입니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>손익분기점이란?</summary><p>총수익 = 총비용인 판매량으로, 이 이상 팔면 이익, 이하면 손실입니다. BEP = 고정비 ÷ (판매가 − 변동비)</p></details>
<details class="faq-item"><summary>고정비에는 무엇이 포함되나요?</summary><p>임대료, 인건비(기본급), 보험료, 감가상각비 등 판매량과 무관하게 발생하는 비용입니다.</p></details>
<details class="faq-item"><summary>변동비에는 무엇이 포함되나요?</summary><p>원재료, 포장재, 판매 수수료, 배송비 등 판매량에 비례하여 증가하는 비용입니다.</p></details>
<details class="faq-item"><summary>공헌이익(Contribution Margin)이란?</summary><p>판매가 - 단위당 변동비. 각 판매에서 고정비를 회수하는 데 기여하는 금액입니다.</p></details>
<details class="faq-item"><summary>BEP가 너무 높으면?</summary><p>고정비 절감, 판매가 인상, 변동비 절감 중 하나를 고려하세요. 세 요소 중 어느 것을 조정하면 효과적인지 시뮬레이션해 볼 수 있습니다.</p></details>
<details class="faq-item"><summary>목표 이익 포함 계산은?</summary><p>목표 수량 = (고정비 + 목표이익) ÷ (판매가 - 변동비)로 계산됩니다.</p></details>
<details class="faq-item"><summary>서비스업에도 적용할 수 있나요?</summary><p>네. 예를 들어 컨설팅의 경우 고정비는 사무실 임대료, 변동비는 세금, 판매가는 프로젝트 요금입니다.</p></details>
<details class="faq-item"><summary>여러 제품을 판매할 때는?</summary><p>가중 평균 공헌이익을 사용한 BEP 분석이 필요하며, 이 경우 각 제품의 매출 비중을 고려해야 합니다.</p></details>`
  },
  en:{h1Accent:'Break Even',sub:'Calculate the break-even point in units and revenue',backLink:'← All Tools',langBtn:'🌐 中文',
    lblFixed:'Fixed costs (total per month or period)',lblVariable:'Variable cost per unit',lblPrice:'Selling price per unit',lblTarget:'Target profit (optional, 0 = BEP only)',

    rBepQty:'BEP Units',rBepRev:'BEP Revenue',rContrib:'Contribution margin',rMargin:'Contribution ratio',
    rTargetQty:'Target units',rTargetRev:'Target revenue',
    lgRev:'Revenue',lgCost:'Total cost',lgBep:'Break-even point',
    seoHtml:`<h2>Break-Even Calculator</h2><p>The break-even point (BEP) is where total revenue equals total costs — no profit, no loss. Enter your fixed costs (rent, salaries), variable cost per unit (materials, shipping), and selling price to instantly calculate BEP units and revenue. Add a target profit to find how many units you need to sell to hit your goal. Essential for startup planning, product pricing, and financial modeling.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What is the break-even point?</summary><p>The sales volume where revenue = total costs. Above BEP = profit; below BEP = loss. BEP = Fixed Costs ÷ (Price − Variable Cost)</p></details>
<details class="faq-item"><summary>What are fixed costs?</summary><p>Costs that don't change with volume: rent, base salaries, insurance, depreciation.</p></details>
<details class="faq-item"><summary>What are variable costs?</summary><p>Costs that increase with each unit sold: raw materials, packaging, sales commissions, shipping.</p></details>
<details class="faq-item"><summary>What is contribution margin?</summary><p>Price minus variable cost per unit — the amount each sale contributes toward covering fixed costs.</p></details>
<details class="faq-item"><summary>BEP is too high — what to do?</summary><p>Reduce fixed costs, raise the price, or cut variable costs. Simulate each option to find the best lever.</p></details>
<details class="faq-item"><summary>How is target profit calculated?</summary><p>Target units = (Fixed Costs + Target Profit) ÷ (Price − Variable Cost per Unit).</p></details>
<details class="faq-item"><summary>Can I use this for service businesses?</summary><p>Yes — for consulting: fixed costs = office rent, variable cost = taxes per project, price = project fee.</p></details>
<details class="faq-item"><summary>What about multi-product businesses?</summary><p>You need a weighted average contribution margin BEP analysis that accounts for each product's revenue mix.</p></details>`
  },
  zh:{h1Accent:'盈亏平衡',sub:'以单位和收入计算盈亏平衡点',backLink:'← 所有工具',langBtn:'🌐 日本語',
    lblFixed:'固定成本（每月或每期总固定费用）',lblVariable:'单位变动成本',lblPrice:'单位售价',lblTarget:'目标利润（可选，0=仅BEP）',
    formula:'BEP数量 = 固定成本 ÷ (售价 − 单位变动成本)',
    rBepQty:'BEP销售数量',rBepRev:'BEP收入',rContrib:'单位边际贡献',rMargin:'贡献率',
    rTargetQty:'目标销售数量',rTargetRev:'目标收入',
    lgRev:'收入',lgCost:'总成本',lgBep:'盈亏平衡点',
    seoHtml:`<h2>盈亏平衡计算器</h2><p>盈亏平衡点(BEP)是总收入等于总成本的销售量，既不盈利也不亏损。输入固定成本（租金、工资）、单位变动成本（原材料、运费）和售价，即可自动计算BEP数量和收入。添加目标利润可计算达到目标所需的销售量。是创业规划、产品定价和财务建模的必备工具。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>什么是盈亏平衡点？</summary><p>收入=总成本时的销售量，超过BEP盈利，低于BEP亏损。BEP=固定成本÷(售价-变动成本)</p></details>
<details class="faq-item"><summary>固定成本包括什么？</summary><p>与销量无关的成本：租金、基本工资、保险费、折旧等。</p></details>
<details class="faq-item"><summary>变动成本包括什么？</summary><p>随销量增加的成本：原材料、包装、销售佣金、运费等。</p></details>
<details class="faq-item"><summary>什么是边际贡献？</summary><p>售价减去单位变动成本，每笔销售贡献于覆盖固定成本的金额。</p></details>
<details class="faq-item"><summary>BEP太高怎么办？</summary><p>降低固定成本、提高售价或降低变动成本，模拟每种方案找到最佳改善点。</p></details>
<details class="faq-item"><summary>如何计算目标利润？</summary><p>目标数量=(固定成本+目标利润)÷(售价-单位变动成本)。</p></details>
<details class="faq-item"><summary>服务业也可以用吗？</summary><p>可以，例如咨询业：固定成本=办公室租金，变动成本=项目税费，售价=项目费用。</p></details>
<details class="faq-item"><summary>多产品企业怎么用？</summary><p>需要使用加权平均边际贡献的BEP分析，需考虑每种产品的收入占比。</p></details>`
  },
  ja:{h1Accent:'損益分岐点',sub:'BEP販売数量と売上高を計算します',backLink:'← ホーム',langBtn:'🌐 한국어',
    lblFixed:'固定費（月次または期間の合計固定費用）',lblVariable:'単位当たり変動費',lblPrice:'単位当たり販売価格',lblTarget:'目標利益（任意、0=BEPのみ）',
    formula:'BEP数量 = 固定費 ÷ (販売価格 − 単位変動費)',
    rBepQty:'BEP販売数量',rBepRev:'BEP売上高',rContrib:'限界利益（単位）',rMargin:'限界利益率',
    rTargetQty:'目標達成数量',rTargetRev:'目標達成売上高',
    lgRev:'売上高',lgCost:'総コスト',lgBep:'損益分岐点',
    seoHtml:`<h2>損益分岐点計算機</h2><p>損益分岐点(BEP)は総収益と総費用が等しくなる販売量で、利益も損失もゼロです。固定費（家賃、給与）、単位当たり変動費（原材料、送料）、販売価格を入力すると、BEP数量と売上高が自動計算されます。目標利益を追加すると達成に必要な販売数量も計算できます。スタートアップ計画、製品価格設定、財務モデリングに必須のツールです。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>損益分岐点とは？</summary><p>収益=総費用となる販売量です。超えると利益、下回ると損失。BEP=固定費÷(価格-変動費)</p></details>
<details class="faq-item"><summary>固定費には何が含まれますか？</summary><p>販売量に関係なく発生する費用：家賃、基本給、保険料、減価償却費など。</p></details>
<details class="faq-item"><summary>変動費には何が含まれますか？</summary><p>販売量に比例して増える費用：原材料、包装費、販売手数料、配送費など。</p></details>
<details class="faq-item"><summary>限界利益とは？</summary><p>販売価格から単位変動費を引いた額で、各販売が固定費回収に貢献する金額です。</p></details>
<details class="faq-item"><summary>BEPが高すぎる場合は？</summary><p>固定費削減、価格引き上げ、変動費削減のいずれかを検討し、各オプションをシミュレーションしてください。</p></details>
<details class="faq-item"><summary>目標利益の計算方法は？</summary><p>目標数量=(固定費+目標利益)÷(価格-単位変動費)です。</p></details>
<details class="faq-item"><summary>サービス業にも使えますか？</summary><p>はい、例えばコンサルティング：固定費=オフィス家賃、変動費=税金、販売価格=プロジェクト料金。</p></details>
<details class="faq-item"><summary>複数製品の場合は？</summary><p>各製品の売上比率を考慮した加重平均限界利益によるBEP分析が必要です。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();calc();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblFixed','lblVariable','lblPrice','lblTarget','lgRev','lgCost','lgBep'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('formulaBox').textContent=t.formula;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function fmt(n){return Math.round(n).toLocaleString();}
function drawChart(bep,fixed,varCost,price){
  const canvas=document.getElementById('bepChart');const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||600;const H=canvas.height=160;canvas.width=W;
  const maxQ=Math.max(bep*2,1);const step=maxQ/50;const pts=[];
  for(let i=0;i<=50;i++){const q=i*step;pts.push({q,rev:q*price,cost:fixed+q*varCost});}
  const maxV=Math.max(...pts.map(p=>Math.max(p.rev,p.cost)));
  const pad={l:40,r:10,t:10,b:20};const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const sx=q=>(q/maxQ)*cw+pad.l,sy=v=>H-pad.b-(v/maxV)*ch;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#252525';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=H-pad.b-(i/4)*ch;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();}
  function polyline(data,key,color){ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;data.forEach((p,i)=>{i===0?ctx.moveTo(sx(p.q),sy(p[key])):ctx.lineTo(sx(p.q),sy(p[key]));});ctx.stroke();}
  polyline(pts,'rev','#60a5fa');polyline(pts,'cost','#f87171');
  const bx=sx(bep),by=sy(bep*price);
  ctx.beginPath();ctx.arc(bx,by,5,0,Math.PI*2);ctx.fillStyle='#fbbf24';ctx.fill();
  ctx.strokeStyle='#fbbf24';ctx.setLineDash([4,4]);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(bx,H-pad.b);ctx.lineTo(bx,by);ctx.stroke();ctx.setLineDash([]);
}
function calc(){
  const t=_i18n[_lang];
  const fc=parseFloat(document.getElementById('fixedCost').value)||0;
  const vc=parseFloat(document.getElementById('varCost').value)||0;
  const sp=parseFloat(document.getElementById('salePrice').value)||0;
  const tp=parseFloat(document.getElementById('targetProfit').value)||0;
  if(!sp||sp<=vc){document.getElementById('resultCard').style.display='none';return;}
  const contrib=sp-vc;const bepQ=fc/contrib;const bepRev=bepQ*sp;
  const targetQ=(fc+tp)/contrib;const targetRev=targetQ*sp;
  const contribRatio=(contrib/sp*100).toFixed(1)+'%';
  const grid=document.getElementById('resultsGrid');grid.innerHTML='';
  const results=[
    {l:t.rBepQty,v:fmt(bepQ)+' 개',c:'var(--accent)',hl:true},
    {l:t.rBepRev,v:fmt(bepRev),c:'var(--accent)',hl:true},
    {l:t.rContrib,v:fmt(contrib),c:'var(--green)'},
    {l:t.rMargin,v:contribRatio,c:'var(--green)'},
    ...(tp>0?[{l:t.rTargetQty,v:fmt(targetQ)+' 개',c:'var(--blue)'},{l:t.rTargetRev,v:fmt(targetRev),c:'var(--blue)'}]:[])
  ];
  results.forEach(r=>{grid.innerHTML+=`<div class="res-box${r.hl?' highlight':''}"><div class="res-val" style="color:${r.c}">${r.v}</div><div class="res-label">${r.l}</div></div>`;});
  document.getElementById('resultCard').style.display='block';
  drawChart(bepQ,fc,vc,sp);
}
_lang=detectLang();applyLang();
</script>
