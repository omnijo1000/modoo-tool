<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#f87171;--accent-break:#34d399;--accent-long:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:540px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.mode-tabs{display:flex;gap:6px;margin-bottom:20px;}
.mode-tab{flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;background:none;color:var(--text-muted);text-align:center;transition:all .15s;}
.mode-tab.focus.on{border-color:var(--accent);color:var(--accent);background:rgba(248,113,113,.08);}
.mode-tab.brk.on{border-color:var(--accent-break);color:var(--accent-break);background:rgba(52,211,153,.08);}
.mode-tab.lng.on{border-color:var(--accent-long);color:var(--accent-long);background:rgba(96,165,250,.08);}
.timer-wrap{text-align:center;margin-bottom:24px;}
.timer-ring{position:relative;display:inline-block;width:220px;height:220px;}
.timer-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-prog{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s linear,stroke .3s;}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.timer-digits{font-size:48px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;}
.timer-mode{font-size:12px;color:var(--text-muted);margin-top:4px;font-family:'DM Mono',monospace;}
.controls{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.ctrl-btn{padding:11px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;transition:opacity .15s;}
.ctrl-btn.start{background:var(--accent);color:#000;border:none;}
.ctrl-btn.reset{background:none;border:1px solid var(--border);color:var(--text-muted);}
.ctrl-btn:hover{opacity:.8;}
.session-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px;}
.session-dots{display:flex;gap:6px;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--surface2);transition:background .3s;}
.dot.done{background:var(--accent);}
.session-count{font-size:12px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.settings{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.settings-title{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:12px;}
.setting-row{display:flex;align-items:center;margin-bottom:10px;}
.setting-row:last-child{margin-bottom:0;}
.setting-label{flex:1;font-size:12px;color:var(--text-muted);}
.num-ctrl{display:flex;align-items:center;gap:6px;}
.num-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:5px;background:none;color:var(--text-muted);cursor:pointer;font-size:14px;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;}
.num-btn:hover{border-color:var(--accent);color:var(--accent);}
.num-val{font-size:13px;font-family:'DM Mono',monospace;min-width:28px;text-align:center;}
.sound-chk{display:flex;align-items:center;gap:6px;}
.sound-chk label{font-size:12px;color:var(--text-muted);cursor:pointer;}
input[type=checkbox]{accent-color:var(--accent);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<script>
const _i18n={
  ko:{sub:'집중 25분 · 휴식 5분 · 뽀모도로 기법 타이머',langBtn:'🌐 EN',backBtn:'← 모두의 툴',tabFocus:'집중',tabBreak:'짧은 휴식',tabLong:'긴 휴식',modeFocus:'집중 시간',modeBreak:'짧은 휴식',modeLong:'긴 휴식',startBtn:'▶ 시작',pauseBtn:'⏸ 일시정지',resetBtn:'↺ 리셋',settingsTitle:'설정',setFocus:'집중 시간 (분)',setBreak:'짧은 휴식 (분)',setLong:'긴 휴식 (분)',setSessions:'긴 휴식까지 세션 수',setSound:'소리 알림',sessionLabel:'세션',seoHtml:'<h2>Pomodoro Timer란?</h2><p><strong>뽀모도로 기법(Pomodoro Technique)</strong>은 집중 25분 + 짧은 휴식 5분 사이클로 생산성을 높이는 시간 관리 방법입니다. 4세션 후 15분 긴 휴식을 취하며, 집중 시간과 휴식 시간을 원하는 대로 설정할 수 있습니다.</p><details class="faq-item"><summary>뽀모도로 기법이 왜 효과적인가요?</summary><p>일정한 시간 블록과 의무적인 휴식이 집중력 유지를 돕습니다. 작업을 25분 단위로 나누면 심리적 부담이 줄어들고, 정기 휴식이 두뇌의 과부하를 방지합니다. 또한 완료된 뽀모도로 수를 추적함으로써 성취감을 얻을 수 있습니다.</p></details><details class="faq-item"><summary>집중 시간을 25분이 아닌 다른 시간으로 설정해도 되나요?</summary><p>네. 설정 패널에서 집중 시간, 짧은 휴식, 긴 휴식 시간을 자유롭게 조정할 수 있습니다. 일반적으로 50분/10분이나 90분/20분을 선호하는 사람도 있으며, 자신에게 맞는 리듬을 찾는 것이 중요합니다.</p></details><details class="faq-item"><summary>휴식 시간에 무엇을 해야 효과적인가요?</summary><p>화면에서 눈을 떼고, 자리에서 일어나 스트레칭을 하거나 물을 마시는 것이 좋습니다. SNS나 이메일 확인은 피하고, 두뇌가 실제로 쉴 수 있는 활동을 선택하세요. 긴 휴식(15분)에는 짧은 산책도 추천합니다.</p></details><details class="faq-item"><summary>알림 소리는 어떻게 설정하나요?</summary><p>설정 패널에서 소리 알림 체크박스를 통해 켜고 끌 수 있습니다. 소리 알림은 세션 전환 시 브라우저 내장 오디오로 재생됩니다. 소리가 필요 없는 환경에서는 끄고 사용하세요.</p></details><details class="faq-item"><summary>뽀모도로 기법을 누가 만들었나요?</summary><p>1980년대 말 프란체스코 시릴로(Francesco Cirillo)가 개발했습니다. 토마토 모양 주방 타이머를 사용해 시간을 추적한 데서 이름이 유래했습니다(pomodoro = 이탈리아어로 토마토). 현재 전 세계 수백만 명이 사용하는 생산성 방법론입니다.</p></details><details class="faq-item"><summary>포모도로 기법의 25분은 과학적 근거가 있나요?</summary><p>25분은 Francesco Cirillo가 경험적으로 정한 시간이며 개인차가 있습니다. 연구에 따르면 집중력 유지 가능 시간은 10~45분으로 다양합니다. 30분, 50분으로 조정해 자신에게 최적인 사이클을 찾는 것을 권장합니다.</p></details><details class="faq-item"><summary>포모도로 중 급한 연락이 오면 어떻게 하나요?</summary><p>방해 요소가 생기면 포모도로를 취소하고 처음부터 다시 시작하는 것이 원칙입니다. 실제로는 30초 이내 처리 가능한 경우 빠르게 처리 후 계속하거나, 메모 후 다음 포모도로에 처리하는 방식을 사용합니다.</p></details><details class="faq-item"><summary>4포모도로 후 긴 휴식은 얼마나 해야 하나요?</summary><p>전통 포모도로 기법에서는 4포모도로(약 2시간) 후 15~30분의 긴 휴식을 권장합니다. 긴 휴식에는 자리를 벗어나 스트레칭, 산책, 물 마시기 등 완전한 휴식을 취하는 것이 효과적입니다.</p></details>'},
  en:{sub:'25-min focus · 5-min break · Pomodoro technique timer',langBtn:'🌐 中文',backBtn:'← All Tools',tabFocus:'Focus',tabBreak:'Short Break',tabLong:'Long Break',modeFocus:'Focus Time',modeBreak:'Short Break',modeLong:'Long Break',startBtn:'▶ Start',pauseBtn:'⏸ Pause',resetBtn:'↺ Reset',settingsTitle:'Settings',setFocus:'Focus (min)',setBreak:'Short Break (min)',setLong:'Long Break (min)',setSessions:'Sessions before long break',setSound:'Sound alert',sessionLabel:'sessions',seoHtml:'<h2>Pomodoro Timer</h2><p>The <strong>Pomodoro Technique</strong> is a time management method using 25-minute focused work sessions followed by 5-minute breaks, with a 15-minute long break after every 4 sessions. Customize all interval lengths to match your workflow.</p><details class="faq-item"><summary>Why is the Pomodoro Technique effective?</summary><p>Fixed time blocks with mandatory breaks help sustain concentration. Breaking work into 25-minute units reduces the psychological burden of large tasks. Regular breaks prevent mental fatigue, and counting completed pomodoros gives a sense of measurable progress throughout the day.</p></details><details class="faq-item"><summary>Can I change the focus duration from 25 minutes?</summary><p>Yes. Use the settings panel to adjust focus time, short break, and long break durations freely. Some people prefer 50/10 or 90/20 cycles. The key is finding a rhythm that keeps you focused without burning out — experiment to find what works best for you.</p></details><details class="faq-item"><summary>What should I do during breaks?</summary><p>Look away from screens, stand up, stretch, or drink water. Avoid checking social media or email — you need your brain to actually rest. For long breaks (15 minutes), a short walk outside is ideal. The goal is physical and mental reset, not switching to another screen.</p></details><details class="faq-item"><summary>How does the sound alert work?</summary><p>Toggle the sound alert checkbox in the settings panel. When enabled, a browser audio tone plays at the end of each session. Turn it off when working in quiet environments or when you prefer visual cues only.</p></details><details class="faq-item"><summary>Who invented the Pomodoro Technique?</summary><p>Francesco Cirillo developed it in the late 1980s as a university student. He named it after the tomato-shaped kitchen timer he used (pomodoro means "tomato" in Italian). It remains one of the most widely adopted productivity methods worldwide.</p></details><details class="faq-item"><summary>Is the 25-minute work interval scientifically proven?</summary><p>The 25-minute duration was chosen empirically by Francesco Cirillo and is not based on a single clinical study. Research shows sustainable focus spans range from 10 to 45 minutes depending on the individual. Adjust to 30 or 50 minutes to find your personal optimal cycle.</p></details><details class="faq-item"><summary>What should you do if an urgent message arrives mid-Pomodoro?</summary><p>The strict rule is to cancel the Pomodoro and restart. In practice, issues resolved in under 30 seconds can be handled quickly before resuming, or you can note the interruption and address it in the next Pomodoro. Tracking interruptions helps identify common distraction patterns.</p></details><details class="faq-item"><summary>How long should the long break be after 4 Pomodoros?</summary><p>The traditional technique recommends a 15–30 minute long break after every four Pomodoros (roughly 2 hours of focused work). Use the long break to step away from your desk entirely — stretch, walk, hydrate — to fully reset before the next set of Pomodoros.</p></details>'},
  zh:{sub:'专注25分钟 · 休息5分钟 · 番茄工作法计时器',langBtn:'🌐 日本語',backBtn:'← 所有工具',tabFocus:'专注',tabBreak:'短暂休息',tabLong:'长时间休息',modeFocus:'专注时间',modeBreak:'短暂休息',modeLong:'长时间休息',startBtn:'▶ 开始',pauseBtn:'⏸ 暂停',resetBtn:'↺ 重置',settingsTitle:'设置',setFocus:'专注时间（分钟）',setBreak:'短暂休息（分钟）',setLong:'长时间休息（分钟）',setSessions:'长休前的番茄数',setSound:'声音提醒',sessionLabel:'个番茄',seoHtml:'<h2>番茄工作法计时器</h2><p><strong>番茄工作法（Pomodoro Technique）</strong>是一种时间管理方法，通过专注25分钟+短休5分钟的循环来提高生产效率，每完成4个番茄钟后进行15分钟长休息。可自定义所有时间间隔。</p><details class="faq-item"><summary>为什么番茄工作法有效？</summary><p>固定的时间块和强制休息有助于维持专注力。将工作分解为25分钟单元可以减轻面对大任务的心理压力。定期休息防止大脑疲劳，而统计完成的番茄数则带来可量化的成就感。</p></details><details class="faq-item"><summary>可以把专注时间改为25分钟以外的时长吗？</summary><p>可以。在设置面板中可以自由调整专注时间、短休息和长休息的时长。有些人偏好50/10分钟或90/20分钟的节奏。关键是找到适合自己的、既能保持专注又不会过度疲劳的节奏。</p></details><details class="faq-item"><summary>休息期间应该做什么？</summary><p>离开屏幕，起身伸展或喝水。避免查看社交媒体或邮件——让大脑真正得到休息。长休息（15分钟）时，在室外短暂散步是理想选择。目标是身心的真正放松，而非切换到另一个屏幕。</p></details><details class="faq-item"><summary>声音提醒如何设置？</summary><p>在设置面板中勾选或取消声音提醒复选框。开启后，每个阶段结束时浏览器会播放提示音。在安静环境或只需视觉提示时可将其关闭。</p></details><details class="faq-item"><summary>番茄工作法是谁发明的？</summary><p>弗朗切斯科·西里洛（Francesco Cirillo）在1980年代末作为大学生时发明了这一方法。他以当时使用的番茄形厨房计时器命名（pomodoro在意大利语中意为"番茄"）。时至今日，这一方法已成为全球最广泛采用的生产力工具之一。</p></details><details class="faq-item"><summary>25分钟工作间隔有科学依据吗？</summary><p>25分钟是Francesco Cirillo凭经验确定的，并非基于单一临床研究。研究表明，个人可持续专注时间为10-45分钟不等。可以调整为30或50分钟，找到最适合自己的周期。</p></details><details class="faq-item"><summary>番茄钟进行中收到紧急消息怎么办？</summary><p>严格规则是取消当前番茄钟并重新开始。实际操作中，30秒内能解决的问题可快速处理后继续，或记录下来在下一个番茄钟处理。追踪打断情况有助于识别常见干扰模式。</p></details><details class="faq-item"><summary>4个番茄钟后的长休息应该多长？</summary><p>传统方法建议每完成4个番茄钟（约2小时专注工作）后休息15-30分钟。长休息时应完全离开工作区域——伸展、散步、补水——为下一组番茄钟做好充分恢复。</p></details>'},
  ja:{sub:'集中25分 · 休憩5分 · ポモドーロテクニックタイマー',langBtn:'🌐 한국어',backBtn:'← ホーム',tabFocus:'集中',tabBreak:'短い休憩',tabLong:'長い休憩',modeFocus:'集中時間',modeBreak:'短い休憩',modeLong:'長い休憩',startBtn:'▶ 開始',pauseBtn:'⏸ 一時停止',resetBtn:'↺ リセット',settingsTitle:'設定',setFocus:'集中時間（分）',setBreak:'短い休憩（分）',setLong:'長い休憩（分）',setSessions:'長休憩までのセッション数',setSound:'サウンド通知',sessionLabel:'セッション',seoHtml:'<h2>ポモドーロタイマーとは？</h2><p><strong>ポモドーロテクニック</strong>は集中25分＋短い休憩5分のサイクルで生産性を高める時間管理法です。4セッション後に15分の長休憩を取ります。すべてのインターバル時間を自由にカスタマイズできます。</p><details class="faq-item"><summary>ポモドーロテクニックが効果的な理由は？</summary><p>決まった時間ブロックと強制的な休憩が集中力の維持を助けます。作業を25分単位に分割することで大きなタスクの心理的負担が軽減されます。定期的な休憩で脳の疲労を防ぎ、完了したポモドーロ数を数えることで達成感が得られます。</p></details><details class="faq-item"><summary>集中時間を25分以外に変更できますか？</summary><p>はい。設定パネルから集中時間・短い休憩・長い休憩をすべて自由に変更できます。50/10分や90/20分のリズムを好む人もいます。自分にとって集中を維持しながら燃え尽きないリズムを見つけることが重要です。</p></details><details class="faq-item"><summary>休憩中は何をすればよいですか？</summary><p>画面から目を離し、立ち上がってストレッチをしたり水を飲んだりしましょう。SNSやメールのチェックは避け、脳が本当に休める活動を選んでください。長休憩（15分）は外を短く歩くのがおすすめです。</p></details><details class="faq-item"><summary>サウンド通知の設定方法は？</summary><p>設定パネルのサウンド通知チェックボックスで切り替えられます。オンにすると各セッション終了時にブラウザの音声が再生されます。静かな環境や視覚的な合図だけで十分な場合はオフにしてください。</p></details><details class="faq-item"><summary>ポモドーロテクニックを考案したのは誰ですか？</summary><p>フランチェスコ・シリロ（Francesco Cirillo）が1980年代後半に大学生として開発しました。使用していたトマト型の台所タイマーにちなんで命名されました（pomodoroはイタリア語で「トマト」）。現在、世界中で最も広く使われている生産性メソッドの一つです。</p></details><details class="faq-item"><summary>25分の作業インターバルには科学的根拠がありますか？</summary><p>25分はFrancesco Cirillo が経験的に決めたもので、単一の臨床研究に基づくものではありません。研究によると持続可能な集中時間は個人差があり10〜45分と幅があります。30分や50分に調整して自分に最適なサイクルを見つけることをお勧めします。</p></details><details class="faq-item"><summary>ポモドーロ中に緊急の連絡が来たらどうしますか？</summary><p>厳密なルールではポモドーロをキャンセルして最初からやり直します。実際には30秒以内に解決できる場合は素早く対処して続けるか、メモして次のポモドーロで対処する方法を使います。中断を記録することで一般的な妨げのパターンを把握できます。</p></details><details class="faq-item"><summary>4ポモドーロ後の長い休憩はどのくらい取るべきですか？</summary><p>伝統的な手法では4ポモドーロ（約2時間の集中作業）ごとに15〜30分の長い休憩を推奨します。長い休憩には完全に机から離れ、ストレッチ、散歩、水分補給など完全な休息を取ることが効果的です。</p></details>'},
};
const MODES={focus:{key:'focus',color:'#f87171',tab:'tabFocus',label:'modeFocus'},break:{key:'break',color:'#34d399',tab:'tabBreak',label:'modeBreak'},long:{key:'long',color:'#60a5fa',tab:'tabLong',label:'modeLong'}};
let _lang='ko',_mode='focus',_running=false,_tid=null;
let cfg={focus:25,break:5,long:15,sessions:4};
let _remain=25*60,_total=25*60,_sessions=0;
const LANGS=['ko','en','zh','ja'];
const R=100,C=2*Math.PI*R;
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('backBtn').innerHTML=t.backBtn;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});
  updateStartBtn();updateSessionCount();
}
function pad(n){return String(n).padStart(2,'0');}
function updateDisplay(){
  const m=Math.floor(_remain/60),s=_remain%60;
  document.getElementById('timerDisplay').textContent=`${pad(m)}:${pad(s)}`;
  const pct=_remain/_total;
  document.getElementById('ring').style.strokeDashoffset=C*(1-pct);
  document.getElementById('ring').style.stroke=MODES[_mode].color;
  document.title=`${pad(m)}:${pad(s)} - Pomodoro`;
}
function updateMode(){
  Object.values(MODES).forEach(m=>document.getElementById(m.tab).classList.remove('on'));
  document.getElementById(MODES[_mode].tab).classList.add('on');
  ['focus','break','long'].forEach(k=>{
    const el=document.getElementById('tab'+k.charAt(0).toUpperCase()+k.slice(1));
    el.classList.remove('focus','brk','lng');
    el.classList.add(k==='focus'?'focus':k==='break'?'brk':'lng');
  });
  document.getElementById('timerMode').setAttribute('data-i18n',MODES[_mode].label);
  const t=_i18n[_lang];
  document.getElementById('timerMode').textContent=t[MODES[_mode].label];
}
function updateDots(){
  const d=document.getElementById('dots');d.innerHTML='';
  for(let i=0;i<cfg.sessions;i++){
    const dot=document.createElement('div');
    dot.className='dot'+(i<_sessions?' done':'');
    d.appendChild(dot);
  }
}
function updateSessionCount(){
  const t=_i18n[_lang];
  document.getElementById('sessionCount').textContent=`${_sessions} / ${cfg.sessions} ${t.sessionLabel}`;
}
function updateStartBtn(){
  const t=_i18n[_lang];
  document.getElementById('startBtn').innerHTML=_running?t.pauseBtn:t.startBtn;
}
function setMode(m){
  if(_running){stop();}
  _mode=m;
  const mins=m==='focus'?cfg.focus:m==='break'?cfg.break:cfg.long;
  _remain=mins*60;_total=mins*60;
  updateMode();updateDisplay();updateStartBtn();
}
function toggle(){_running?stop():start();}
function start(){_running=true;updateStartBtn();_tid=setInterval(tick,1000);}
function stop(){_running=false;clearInterval(_tid);updateStartBtn();}
function reset(){stop();setMode(_mode);}
function tick(){
  if(_remain>0){_remain--;updateDisplay();}
  else{
    clearInterval(_tid);_running=false;
    beep();
    if(_mode==='focus'){
      _sessions++;
      if(_sessions>=cfg.sessions){_sessions=0;setMode('long');}
      else setMode('break');
    } else {
      setMode('focus');
    }
    updateDots();updateSessionCount();
  }
}
function beep(){
  if(!document.getElementById('soundOn').checked)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;g.gain.value=0.3;
    o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);
    o.stop(ctx.currentTime+0.6);
  }catch(e){}
}
function adj(key,delta){
  const mins=['focus','break','long'];
  if(mins.includes(key)){cfg[key]=Math.max(1,Math.min(99,cfg[key]+delta));document.getElementById('set'+key.charAt(0).toUpperCase()+key.slice(1)+'Val').textContent=cfg[key];}
  else{cfg.sessions=Math.max(1,Math.min(8,cfg.sessions+delta));document.getElementById('setSessionsVal').textContent=cfg.sessions;}
  if(!_running)setMode(_mode);
  updateDots();updateSessionCount();
}
_lang=detectLang();
_remain=cfg.focus*60;_total=cfg.focus*60;
updateMode();updateDisplay();updateDots();
applyLang();
</script>
