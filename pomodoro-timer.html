<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer - Free Online Focus Timer</title>
<meta name="description" content="Free online Pomodoro timer. 25-minute focus sessions with short and long breaks. Customizable intervals, session counter, and sound notifications.">

<link rel="alternate" hreflang="zh" href="https://modoohub.com/pomodoro-timer.html?lang=zh">

<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#f87171;--accent-break:#34d399;--accent-long:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:540px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.mode-tabs{display:flex;gap:6px;margin-bottom:20px;}
.mode-tab{flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;background:none;color:var(--text-muted);text-align:center;transition:all .15s;}
.mode-tab.focus.on{border-color:var(--accent);color:var(--accent);background:rgba(248,113,113,.08);}
.mode-tab.brk.on{border-color:var(--accent-break);color:var(--accent-break);background:rgba(52,211,153,.08);}
.mode-tab.lng.on{border-color:var(--accent-long);color:var(--accent-long);background:rgba(96,165,250,.08);}
.timer-wrap{text-align:center;margin-bottom:24px;}
.timer-ring{position:relative;display:inline-block;width:220px;height:220px;}
.timer-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:8;}
.ring-prog{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s linear,stroke .3s;}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.timer-digits{font-size:48px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;}
.timer-mode{font-size:12px;color:var(--text-muted);margin-top:4px;font-family:'DM Mono',monospace;}
.controls{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.ctrl-btn{padding:11px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;transition:opacity .15s;}
.ctrl-btn.start{background:var(--accent);color:#000;border:none;}
.ctrl-btn.reset{background:none;border:1px solid var(--border);color:var(--text-muted);}
.ctrl-btn:hover{opacity:.8;}
.session-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px;}
.session-dots{display:flex;gap:6px;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--surface2);transition:background .3s;}
.dot.done{background:var(--accent);}
.session-count{font-size:12px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.settings{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.settings-title{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:12px;}
.setting-row{display:flex;align-items:center;margin-bottom:10px;}
.setting-row:last-child{margin-bottom:0;}
.setting-label{flex:1;font-size:12px;color:var(--text-muted);}
.num-ctrl{display:flex;align-items:center;gap:6px;}
.num-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:5px;background:none;color:var(--text-muted);cursor:pointer;font-size:14px;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;}
.num-btn:hover{border-color:var(--accent);color:var(--accent);}
.num-val{font-size:13px;font-family:'DM Mono',monospace;min-width:28px;text-align:center;}
.sound-chk{display:flex;align-items:center;gap:6px;}
.sound-chk label{font-size:12px;color:var(--text-muted);cursor:pointer;}
input[type=checkbox]{accent-color:var(--accent);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<meta property="og:title" content="Pomodoro Timer - Free Online Focus Timer">
<meta property="og:image" content="https://modoohub.com/og-image.png">
</head>
<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>Pomodoro <span>Timer</span></h1>
  <p class="sub" data-i18n="sub">집중 25분 · 휴식 5분 · 뽀모도로 기법 타이머</p>

  <div class="mode-tabs">
    <button class="mode-tab focus on" id="tabFocus" onclick="setMode('focus')" data-i18n="tabFocus">집중</button>
    <button class="mode-tab brk" id="tabBreak" onclick="setMode('break')" data-i18n="tabBreak">짧은 휴식</button>
    <button class="mode-tab lng" id="tabLong" onclick="setMode('long')" data-i18n="tabLong">긴 휴식</button>
  </div>

  <div class="timer-wrap">
    <div class="timer-ring">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle class="ring-bg" cx="110" cy="110" r="100"/>
        <circle class="ring-prog" id="ring" cx="110" cy="110" r="100" stroke="#f87171"
          stroke-dasharray="628.3" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text">
        <div class="timer-digits" id="timerDisplay">25:00</div>
        <div class="timer-mode" id="timerMode" data-i18n="modeFocus">집중 시간</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn start" id="startBtn" onclick="toggle()" data-i18n="startBtn">▶ 시작</button>
    <button class="ctrl-btn reset" onclick="reset()" data-i18n="resetBtn">↺ 리셋</button>
  </div>

  <div class="session-row">
    <div class="session-dots" id="dots"></div>
    <div class="session-count" id="sessionCount"></div>
  </div>

  <div class="settings">
    <div class="settings-title" data-i18n="settingsTitle">설정</div>
    <div class="setting-row">
      <span class="setting-label" data-i18n="setFocus">집중 시간 (분)</span>
      <div class="num-ctrl">
        <button class="num-btn" onclick="adj('focus',-1)">−</button>
        <span class="num-val" id="setFocusVal">25</span>
        <button class="num-btn" onclick="adj('focus',1)">+</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label" data-i18n="setBreak">짧은 휴식 (분)</span>
      <div class="num-ctrl">
        <button class="num-btn" onclick="adj('break',-1)">−</button>
        <span class="num-val" id="setBreakVal">5</span>
        <button class="num-btn" onclick="adj('break',1)">+</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label" data-i18n="setLong">긴 휴식 (분)</span>
      <div class="num-ctrl">
        <button class="num-btn" onclick="adj('long',-1)">−</button>
        <span class="num-val" id="setLongVal">15</span>
        <button class="num-btn" onclick="adj('long',1)">+</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label" data-i18n="setSessions">긴 휴식까지 세션 수</span>
      <div class="num-ctrl">
        <button class="num-btn" onclick="adj('sessions',-1)">−</button>
        <span class="num-val" id="setSessionsVal">4</span>
        <button class="num-btn" onclick="adj('sessions',1)">+</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="sound-chk">
        <input type="checkbox" id="soundOn" checked>
        <label for="soundOn" data-i18n="setSound">소리 알림</label>
      </div>
    </div>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">Pomodoro Timer란?</h2>
    <p data-i18n="seoP">뽀모도로 기법은 집중 25분 + 휴식 5분 사이클로 생산성을 높이는 시간 관리 방법입니다. 4세션 후 15분 긴 휴식을 취합니다. 집중 시간과 휴식 시간을 자유롭게 설정하세요.</p>
  </div>
  <footer>Pomodoro Timer · Free Online Tool</footer>
</main>
<script>
const _i18n={
  ko:{sub:'집중 25분 · 휴식 5분 · 뽀모도로 기법 타이머',langBtn:'🌐 EN',backBtn:'← 모두의 툴',tabFocus:'집중',tabBreak:'짧은 휴식',tabLong:'긴 휴식',modeFocus:'집중 시간',modeBreak:'짧은 휴식',modeLong:'긴 휴식',startBtn:'▶ 시작',pauseBtn:'⏸ 일시정지',resetBtn:'↺ 리셋',settingsTitle:'설정',setFocus:'집중 시간 (분)',setBreak:'짧은 휴식 (분)',setLong:'긴 휴식 (분)',setSessions:'긴 휴식까지 세션 수',setSound:'소리 알림',sessionLabel:'세션',seoH2:'Pomodoro Timer란?',seoP:'집중 25분+휴식 5분 사이클로 생산성을 높이는 뽀모도로 기법 타이머입니다.'},
  en:{sub:'25-min focus · 5-min break · Pomodoro technique timer',langBtn:'🌐 中文',backBtn:'← All Tools',tabFocus:'Focus',tabBreak:'Short Break',tabLong:'Long Break',modeFocus:'Focus Time',modeBreak:'Short Break',modeLong:'Long Break',startBtn:'▶ Start',pauseBtn:'⏸ Pause',resetBtn:'↺ Reset',settingsTitle:'Settings',setFocus:'Focus (min)',setBreak:'Short Break (min)',setLong:'Long Break (min)',setSessions:'Sessions before long break',setSound:'Sound alert',sessionLabel:'sessions',seoH2:'Pomodoro Timer',seoP:'Boost productivity with the Pomodoro technique: 25-min focus sessions followed by 5-min breaks. Take a 15-min long break after 4 sessions.'},
  zh:{sub:'专注25分钟 · 休息5分钟 · 番茄工作法计时器',langBtn:'🌐 日本語',backBtn:'← 所有工具',tabFocus:'专注',tabBreak:'短暂休息',tabLong:'长时间休息',modeFocus:'专注时间',modeBreak:'短暂休息',modeLong:'长时间休息',startBtn:'▶ 开始',pauseBtn:'⏸ 暂停',resetBtn:'↺ 重置',settingsTitle:'设置',setFocus:'专注时间（分钟）',setBreak:'短暂休息（分钟）',setLong:'长时间休息（分钟）',setSessions:'长休前的番茄数',setSound:'声音提醒',sessionLabel:'个番茄',seoH2:'番茄工作法计时器',seoP:'通过番茄工作法提高效率：专注25分钟后休息5分钟，完成4个番茄钟后进行15分钟长休息。'},
  ja:{sub:'集中25分 · 休憩5分 · ポモドーロテクニックタイマー',langBtn:'🌐 한국어',backBtn:'← ホーム',tabFocus:'集中',tabBreak:'短い休憩',tabLong:'長い休憩',modeFocus:'集中時間',modeBreak:'短い休憩',modeLong:'長い休憩',startBtn:'▶ 開始',pauseBtn:'⏸ 一時停止',resetBtn:'↺ リセット',settingsTitle:'設定',setFocus:'集中時間（分）',setBreak:'短い休憩（分）',setLong:'長い休憩（分）',setSessions:'長休憩までのセッション数',setSound:'サウンド通知',sessionLabel:'セッション',seoH2:'ポモドーロタイマーとは？',seoP:'ポモドーロテクニックは集中25分＋休憩5分のサイクルで生産性を高める時間管理法です。4セッション後に15分の長休憩を取ります。'},
};
const MODES={focus:{key:'focus',color:'#f87171',tab:'tabFocus',label:'modeFocus'},break:{key:'break',color:'#34d399',tab:'tabBreak',label:'modeBreak'},long:{key:'long',color:'#60a5fa',tab:'tabLong',label:'modeLong'}};
let _lang='ko',_mode='focus',_running=false,_tid=null;
let cfg={focus:25,break:5,long:15,sessions:4};
let _remain=25*60,_total=25*60,_sessions=0;
const LANGS=['ko','en','zh','ja'];
const R=100,C=2*Math.PI*R;
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('backBtn').innerHTML=t.backBtn;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});
  updateStartBtn();updateSessionCount();
}
function pad(n){return String(n).padStart(2,'0');}
function updateDisplay(){
  const m=Math.floor(_remain/60),s=_remain%60;
  document.getElementById('timerDisplay').textContent=`${pad(m)}:${pad(s)}`;
  const pct=_remain/_total;
  document.getElementById('ring').style.strokeDashoffset=C*(1-pct);
  document.getElementById('ring').style.stroke=MODES[_mode].color;
  document.title=`${pad(m)}:${pad(s)} - Pomodoro`;
}
function updateMode(){
  Object.values(MODES).forEach(m=>document.getElementById(m.tab).classList.remove('on'));
  document.getElementById(MODES[_mode].tab).classList.add('on');
  ['focus','break','long'].forEach(k=>{
    const el=document.getElementById('tab'+k.charAt(0).toUpperCase()+k.slice(1));
    el.classList.remove('focus','brk','lng');
    el.classList.add(k==='focus'?'focus':k==='break'?'brk':'lng');
  });
  document.getElementById('timerMode').setAttribute('data-i18n',MODES[_mode].label);
  const t=_i18n[_lang];
  document.getElementById('timerMode').textContent=t[MODES[_mode].label];
}
function updateDots(){
  const d=document.getElementById('dots');d.innerHTML='';
  for(let i=0;i<cfg.sessions;i++){
    const dot=document.createElement('div');
    dot.className='dot'+(i<_sessions?' done':'');
    d.appendChild(dot);
  }
}
function updateSessionCount(){
  const t=_i18n[_lang];
  document.getElementById('sessionCount').textContent=`${_sessions} / ${cfg.sessions} ${t.sessionLabel}`;
}
function updateStartBtn(){
  const t=_i18n[_lang];
  document.getElementById('startBtn').innerHTML=_running?t.pauseBtn:t.startBtn;
}
function setMode(m){
  if(_running){stop();}
  _mode=m;
  const mins=m==='focus'?cfg.focus:m==='break'?cfg.break:cfg.long;
  _remain=mins*60;_total=mins*60;
  updateMode();updateDisplay();updateStartBtn();
}
function toggle(){_running?stop():start();}
function start(){_running=true;updateStartBtn();_tid=setInterval(tick,1000);}
function stop(){_running=false;clearInterval(_tid);updateStartBtn();}
function reset(){stop();setMode(_mode);}
function tick(){
  if(_remain>0){_remain--;updateDisplay();}
  else{
    clearInterval(_tid);_running=false;
    beep();
    if(_mode==='focus'){
      _sessions++;
      if(_sessions>=cfg.sessions){_sessions=0;setMode('long');}
      else setMode('break');
    } else {
      setMode('focus');
    }
    updateDots();updateSessionCount();
  }
}
function beep(){
  if(!document.getElementById('soundOn').checked)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;g.gain.value=0.3;
    o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);
    o.stop(ctx.currentTime+0.6);
  }catch(e){}
}
function adj(key,delta){
  const mins=['focus','break','long'];
  if(mins.includes(key)){cfg[key]=Math.max(1,Math.min(99,cfg[key]+delta));document.getElementById('set'+key.charAt(0).toUpperCase()+key.slice(1)+'Val').textContent=cfg[key];}
  else{cfg.sessions=Math.max(1,Math.min(8,cfg.sessions+delta));document.getElementById('setSessionsVal').textContent=cfg.sessions;}
  if(!_running)setMode(_mode);
  updateDots();updateSessionCount();
}
_lang=detectLang();
_remain=cfg.focus*60;_total=cfg.focus*60;
updateMode();updateDisplay();updateDots();
applyLang();
</script>
<script src="related.js"></script>
</body>
</html>
