<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Difference between og:title and title tag?</summary><p>og:title is used for social sharing. If absent, the title tag is used. You can set them differently.</p></details>

  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblTitle','lblDesc','lblUrl','lblImg','lblOgTitle','lblOgDesc','btnSample','btnCopy','lblGoogle','lblFacebook','lblTwitter','lblCode'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  update();
}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function trunc(s,n){return s.length>n?s.slice(0,n-3)+'...':s;}
function getDomain(url){try{return new URL(url.startsWith('http')?url:'https://'+url).hostname;}catch{return url||'example.com';}}
function update(){
  const title=document.getElementById('titleIn').value;
  const desc=document.getElementById('descIn').value;
  const url=document.getElementById('urlIn').value||'https://example.com';
  const img=document.getElementById('imgIn').value;
  const ogTitle=document.getElementById('ogTitleIn').value||title;
  const ogDesc=document.getElementById('ogDescIn').value||desc;
  const tc=title.length,dc=desc.length;
  const tcEl=document.getElementById('titleCount');const dcEl=document.getElementById('descCount');
  tcEl.textContent=`${tc}/60`;tcEl.className=tc<=60?'char-ok':tc<=80?'char-warn':'char-over';
  dcEl.textContent=`${dc}/160`;dcEl.className=dc<=160?'char-ok':dc<=200?'char-warn':'char-over';
  const domain=getDomain(url);
  const dispTitle=title||'Page Title';const dispDesc=desc||'Page description';
  document.getElementById('googlePrev').innerHTML=`<div class="g-wrap"><div class="g-url">🌐 ${escH(domain)}</div><div class="g-title">${escH(trunc(dispTitle,60))}</div><div class="g-desc">${escH(trunc(dispDesc,160))}</div></div>`;
  const imgHtml=img?`<img src="${escH(img)}" style="width:100%;height:140px;object-fit:cover;" onerror="this.style.display='none'">`:
    `<div class="fb-img">🖼️</div>`;
  document.getElementById('fbPrev').innerHTML=`<div class="fb-wrap">${imgHtml}<div class="fb-body"><div class="fb-domain">${escH(domain)}</div><div class="fb-title">${escH(trunc(ogTitle||dispTitle,88))}</div><div class="fb-desc">${escH(trunc(ogDesc||dispDesc,200))}</div></div></div>`;
  const twImgHtml=img?`<img src="${escH(img)}" style="width:100%;height:130px;object-fit:cover;" onerror="this.style.display='none'">`:
    `<div class="tw-img">🖼️</div>`;
  document.getElementById('twPrev').innerHTML=`<div class="tw-wrap">${twImgHtml}<div class="tw-body"><div class="tw-title">${escH(trunc(ogTitle||dispTitle,70))}</div><div class="tw-desc">${escH(trunc(ogDesc||dispDesc,200))}</div><div class="tw-domain">${escH(domain)}</div></div></div>`;
  const lines=[`<meta charset="UTF-8">`,`<meta name="viewport" content="width=device-width, initial-scale=1.0">`];
  if(title)lines.push(`<title>${escH(title)}</title>`,`<meta name="description" content="${escH(desc)}">`);
  if(url)lines.push(`<link rel="canonical" href="${escH(url)}">`);
  lines.push(`<meta property="og:type" content="website">`);
  if(url)lines.push(`<meta property="og:url" content="${escH(url)}">`);
  lines.push(`<meta property="og:title" content="${escH(ogTitle||title)}">`);
  lines.push(`<meta property="og:description" content="${escH(ogDesc||desc)}">`);
  if(img)lines.push(`<meta property="og:image" content="${escH(img)}">`);
  lines.push(`<meta name="twitter:card" content="${img?'summary_large_image':'summary'}">`);
  lines.push(`<meta name="twitter:title" content="${escH(ogTitle||title)}">`);
  lines.push(`<meta name="twitter:description" content="${escH(ogDesc||desc)}">`);
  if(img)lines.push(`<meta name="twitter:image" content="${escH(img)}">`);
  document.getElementById('codeOut').textContent=lines.join('\n');
}
function copyMeta(){navigator.clipboard.writeText(document.getElementById('codeOut').textContent);}
function loadSample(){
  document.getElementById('titleIn').value='무료 온라인 개발자 툴 모음 - MODOO HUB';
  document.getElementById('descIn').value='335가지 무료 온라인 개발자 도구. JSON 포맷터, JWT 디코더, Base64 인코더, 색상 변환기 등을 즉시 사용하세요.';
  document.getElementById('urlIn').value='https://modoohub.com/';
  document.getElementById('imgIn').value='';
  document.getElementById('ogTitleIn').value='';
  document.getElementById('ogDescIn').value='';
  update();
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
