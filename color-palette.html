<script>
let currentHex='#c084fc', currentScheme='complementary';

function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}
  else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;default:h=((r-g)/d+4)/6;}}
  return[h*360,s*100,l*100];
}
function hslToHex(h,s,l){
  s/=100;l/=100;const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(-1,Math.min(k-3,9-k,1));return Math.round(255*c).toString(16).padStart(2,'0');};
  return '#'+f(0)+f(8)+f(4);
}
function getContrast(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const l=0.2126*(r/255)**2.2+0.7152*(g/255)**2.2+0.0722*(b/255)**2.2;
  return l>0.179?'#111111':'#ffffff';
}
function generateScheme(hex,scheme){
  const[h,s,l]=hexToHsl(hex);
  switch(scheme){
    case'complementary':return[hex,hslToHex((h+180)%360,s,l),hslToHex(h,s*0.6,l*1.2>100?90:l*1.2),hslToHex((h+180)%360,s*0.6,l*1.2>100?90:l*1.2),hslToHex(h,s,Math.max(20,l-20))];
    case'triadic':return[hex,hslToHex((h+120)%360,s,l),hslToHex((h+240)%360,s,l),hslToHex(h,s*0.7,80),hslToHex((h+120)%360,s*0.7,80)];
    case'analogous':return[hslToHex((h-30+360)%360,s,l),hslToHex((h-15+360)%360,s,l),hex,hslToHex((h+15)%360,s,l),hslToHex((h+30)%360,s,l)];
    case'split':return[hex,hslToHex((h+150)%360,s,l),hslToHex((h+210)%360,s,l),hslToHex(h,s*0.5,90),hslToHex((h+180)%360,s*0.5,25)];
    case'tetradic':return[hex,hslToHex((h+90)%360,s,l),hslToHex((h+180)%360,s,l),hslToHex((h+270)%360,s,l),hslToHex(h,s*0.6,80)];
    case'monochromatic':return[hslToHex(h,s,20),hslToHex(h,s,35),hslToHex(h,s,50),hex,hslToHex(h,s*0.6,70),hslToHex(h,s*0.4,85),hslToHex(h,s*0.2,95)];
    default:return[hex];
  }
}
function renderPalette(){
  const colors=generateScheme(currentHex,currentScheme);
  const isMono=currentScheme==='monochromatic';
  const grid=document.getElementById('paletteGrid');
  grid.className='palette-grid'+(isMono?' mono':'');
  grid.innerHTML=colors.map(c=>`
    <div class="color-swatch" onclick="copyHex('${c}')">
      <div class="swatch-color" style="background:${c}"></div>
      <div class="swatch-info">
        <div class="swatch-hex">${c.toUpperCase()}</div>
        <div class="swatch-name">Click to copy</div>
      </div>
    </div>`).join('');

  // shades
  const[h,s]=hexToHsl(currentHex);
  const shades=[10,25,40,55,70,80,90].map(l=>hslToHex(h,s,l));
  document.getElementById('shadesRow').innerHTML=shades.map(c=>`
    <div class="shade-item" onclick="copyHex('${c}')">
      <div class="shade-color" style="background:${c}"></div>
      <div class="shade-hex">${c.toUpperCase()}</div>
    </div>`).join('');

  // contrast preview
  const fg=getContrast(currentHex);
  const fgInv=fg==='#ffffff'?'#111111':'#ffffff';
  document.getElementById('contrastPreview').innerHTML=`
    <div class="cp-item" style="background:${currentHex};color:${fg};">Text on base color</div>
    <div class="cp-item" style="background:${fg};color:${currentHex};">Text in base color</div>
    <div class="cp-item" style="background:#ffffff;color:${currentHex};">On white background</div>
    <div class="cp-item" style="background:#111111;color:${currentHex};">On dark background</div>`;
}
function setScheme(s,btn){
  currentScheme=s;
  document.querySelectorAll('.scheme-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPalette();
}
function onPickerChange(v){currentHex=v;document.getElementById('hexInput').value=v;renderPalette();}
function onHexChange(v){if(/^#[0-9A-Fa-f]{6}$/.test(v)){currentHex=v;document.getElementById('colorPicker').value=v;renderPalette();}}
function randomColor(){const h=Math.random()*360,s=50+Math.random()*40,l=40+Math.random()*25;currentHex=hslToHex(h,s,l);document.getElementById('colorPicker').value=currentHex;document.getElementById('hexInput').value=currentHex;renderPalette();}
function copyHex(hex){
  navigator.clipboard.writeText(hex);
  const t=document.getElementById('copyToast');
  t.textContent=(_i18n[_lang].cpCopied||'Copied')+' '+hex;t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',1500);
}
renderPalette();
</script>

 },
  en: { lang:'en', title:'Color Palette Generator - Complementary, Triadic, Analogous Colors', h1:'Color Palette Generator', sub:'Pick a base color and instantly generate harmonious color schemes for design.', btn:'🌐 中文', cpRandom:'🎲 Random', cpComp:'Complementary', cpTriadic:'Triadic', cpAnalogous:'Analogous', cpMono:'Monochromatic', cpCopied:'Copied',
  seoHtml:'<h2>How to Use the Color Palette Generator</h2><p>Pick a base color and instantly generate harmonious color schemes — complementary, triadic, analogous, split-complementary, and monochromatic. Click any swatch to copy its HEX code to the clipboard.</p><details class="faq-item"><summary>What is a color palette for?</summary><p>Color palettes are essential in UI/UX design, brand identity, web development, and graphic design. A well-chosen palette ensures visual harmony and sufficient contrast ratios for accessibility and readability.</p></details><details class="faq-item"><summary>What is color harmony theory?</summary><p>Complementary: colors opposite on the wheel (180°) — high contrast. Triadic: three colors 120° apart — balanced and colorful. Analogous: adjacent colors — harmonious and natural. Monochromatic: tints and shades of one hue — elegant and cohesive.</p></details><details class="faq-item"><summary>How should I choose colors for UI/UX?</summary><p>WCAG accessibility guidelines recommend a minimum contrast ratio of 4.5:1 for normal text and 3:1 for large text against the background. Use the Contrast Preview section in this tool to check readability of your chosen color on white and dark backgrounds.</p></details><details class="faq-item"><summary>What is the difference between complementary and split-complementary?</summary><p>Complementary uses the exact opposite color (180°). Split-complementary uses the two colors adjacent to the complement (at 150° and 210°), giving a softer, more versatile combination while retaining contrast.</p></details><details class="faq-item"><summary>How do I copy a HEX color code?</summary><p>Click any color swatch in the palette — the HEX code is automatically copied to your clipboard. A toast notification at the bottom confirms the copy.</p></details>',

function _detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  else if (n.startsWith('ja')) return 'ja';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}
let _lang = _detectLang();
function _applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = t.lang;
  document.title = t.title;
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = t.btn;
  const h1 = document.querySelector('h1');
  if (h1) h1.innerHTML = t.h1;
  const sub = document.querySelector('.subtitle');
  if (sub) sub.textContent = t.sub;
  const back = document.querySelector('.back-link');
  if (back) back.textContent = (_lang === 'ko') ? '← 모두의 툴' : (_lang === 'zh') ? '← 首页' : (_lang === 'ja') ? '← ホーム' : '← Home';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
}
const _langOrder = ['ko','en','zh','ja'];
function cycleLang() {
  const idx = _langOrder.indexOf(_lang);
  _lang = _langOrder[(idx + 1) % _langOrder.length];
  localStorage.setItem('lang', _lang);
  const url = new URL(location.href);
  if (_lang === 'ko') { url.searchParams.delete('lang'); } else { url.searchParams.set('lang', _lang); }
  history.replaceState({}, '', url);
  _applyLang();
}
_applyLang();
