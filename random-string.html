<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#a78bfa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:620px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;line-height:1.6;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;}
.panel-title{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:.1em;margin-bottom:14px;}
.row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.row:last-child{margin-bottom:0;}
label{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;min-width:80px;}
input[type=number]{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;width:90px;}
input[type=number]:focus{border-color:var(--accent);}
input[type=text]{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;flex:1;}
input[type=text]:focus{border-color:var(--accent);}
.checkbox-row{display:flex;flex-wrap:wrap;gap:10px;}
.cb-item{display:flex;align-items:center;gap:6px;cursor:pointer;}
.cb-item input{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;}
.cb-item span{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.gen-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-bottom:14px;}
.gen-btn:hover{opacity:.85;}
.output-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:13px;line-height:2;min-height:60px;word-break:break-all;color:var(--accent);cursor:pointer;white-space:pre-wrap;}
.output-box:hover{border-color:var(--accent);}
.action-row{display:flex;gap:8px;margin-top:8px;}
.tbtn{padding:7px 16px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.copied-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:20px;font-family:'DM Mono',monospace;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;}
.copied-toast.show{opacity:1;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>Random <span>String</span></h1>
  <p class="sub" data-i18n="sub">암호학적 난수 기반 랜덤 문자열 생성기</p>

  <div class="panel">
    <div class="panel-title" data-i18n="optTitle">OPTIONS</div>
    <div class="row">
      <label data-i18n="lenLabel">길이</label>
      <input type="number" id="length" value="16" min="1" max="4096">
    </div>
    <div class="row">
      <label data-i18n="countLabel">개수</label>
      <input type="number" id="count" value="1" min="1" max="100">
    </div>
    <div class="row">
      <label data-i18n="charsetLabel">문자셋</label>
      <div class="checkbox-row">
        <label class="cb-item"><input type="checkbox" id="cbUpper" checked><span data-i18n="cbUpper">대문자 A-Z</span></label>
        <label class="cb-item"><input type="checkbox" id="cbLower" checked><span data-i18n="cbLower">소문자 a-z</span></label>
        <label class="cb-item"><input type="checkbox" id="cbNum" checked><span data-i18n="cbNum">숫자 0-9</span></label>
        <label class="cb-item"><input type="checkbox" id="cbSpec"><span data-i18n="cbSpec">특수문자</span></label>
      </div>
    </div>
    <div class="row">
      <label data-i18n="customLabel">커스텀</label>
      <input type="text" id="custom" placeholder="직접 입력 (선택)">
    </div>
  </div>

  <button class="gen-btn" onclick="generate()" data-i18n="genBtn">▶ 생성</button>

  <div class="output-box" id="output" onclick="copyAll()"></div>
  <div class="action-row">
    <button class="tbtn" onclick="copyAll()" data-i18n="copyBtn">복사</button>
    <button class="tbtn" onclick="generate()" data-i18n="regenBtn">↺ 재생성</button>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">Random String Generator란?</h2>
    <p data-i18n="seoP">crypto.getRandomValues()를 사용한 암호학적 난수로 문자열을 생성합니다. 대문자·소문자·숫자·특수문자 조합과 길이를 자유롭게 설정할 수 있습니다. API 키, 토큰, 임시 비밀번호 생성에 활용하세요.</p>
  </div>
  <footer>Random String Generator · crypto.getRandomValues() · All in browser</footer>
</main>
<div class="copied-toast" id="toast" data-i18n="toastMsg">복사되었습니다!</div>
<script>
const _i18n={
  ko:{sub:'암호학적 난수 기반 랜덤 문자열 생성기',langBtn:'🌐 EN',backBtn:'← 모두의 툴',optTitle:'OPTIONS',lenLabel:'길이',countLabel:'개수',charsetLabel:'문자셋',cbUpper:'대문자 A-Z',cbLower:'소문자 a-z',cbNum:'숫자 0-9',cbSpec:'특수문자',customLabel:'커스텀',genBtn:'▶ 생성',copyBtn:'복사',regenBtn:'↺ 재생성',seoH2:'Random String Generator란?',seoP:'crypto.getRandomValues()로 암호학적 난수 문자열을 생성합니다. API 키·토큰·임시 비밀번호 생성에 활용하세요.',toastMsg:'복사되었습니다!'},
  en:{sub:'Cryptographically secure random string generator',langBtn:'🌐 中文',backBtn:'← All Tools',optTitle:'OPTIONS',lenLabel:'Length',countLabel:'Count',charsetLabel:'Charset',cbUpper:'Uppercase A-Z',cbLower:'Lowercase a-z',cbNum:'Digits 0-9',cbSpec:'Special chars',customLabel:'Custom',genBtn:'▶ Generate',copyBtn:'Copy',regenBtn:'↺ Regenerate',seoH2:'Random String Generator',seoP:'Generates cryptographically secure random strings using crypto.getRandomValues(). Perfect for API keys, tokens, and temporary passwords.',toastMsg:'Copied!'},
  zh:{sub:'加密安全随机字符串生成器',langBtn:'🌐 日本語',backBtn:'← 所有工具',optTitle:'选项',lenLabel:'长度',countLabel:'数量',charsetLabel:'字符集',cbUpper:'大写 A-Z',cbLower:'小写 a-z',cbNum:'数字 0-9',cbSpec:'特殊字符',customLabel:'自定义',genBtn:'▶ 生成',copyBtn:'复制',regenBtn:'↺ 重新生成',seoH2:'随机字符串生成器',seoP:'使用crypto.getRandomValues()生成加密安全的随机字符串，适合生成API密钥、令牌和临时密码。',toastMsg:'已复制！'},
  ja:{sub:'暗号的乱数ベースのランダム文字列生成器',langBtn:'🌐 한국어',backBtn:'← ホーム',optTitle:'OPTIONS',lenLabel:'長さ',countLabel:'個数',charsetLabel:'文字セット',cbUpper:'大文字 A-Z',cbLower:'小文字 a-z',cbNum:'数字 0-9',cbSpec:'特殊文字',customLabel:'カスタム',genBtn:'▶ 生成',copyBtn:'コピー',regenBtn:'↺ 再生成',seoH2:'ランダム文字列生成器とは？',seoP:'crypto.getRandomValues()を使用した暗号的乱数で文字列を生成します。APIキー、トークン、一時パスワードの生成に活用できます。',toastMsg:'コピーしました！'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

function buildCharset(){
  let s='';
  if(document.getElementById('cbUpper').checked) s+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('cbLower').checked) s+='abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('cbNum').checked) s+='0123456789';
  if(document.getElementById('cbSpec').checked) s+='!@#$%^&*()_+-=[]{}|;:,.<>?';
  const custom=document.getElementById('custom').value;
  if(custom) s+=custom;
  return [...new Set(s)].join('');
}

function randString(len, charset){
  const arr=new Uint32Array(len);
  crypto.getRandomValues(arr);
  return [...arr].map(n=>charset[n%charset.length]).join('');
}

function generate(){
  const charset=buildCharset();
  if(!charset){document.getElementById('output').textContent='⚠ 문자셋을 선택해주세요';return;}
  const len=Math.min(4096,Math.max(1,parseInt(document.getElementById('length').value)||16));
  const cnt=Math.min(100,Math.max(1,parseInt(document.getElementById('count').value)||1));
  const results=Array.from({length:cnt},()=>randString(len,charset));
  document.getElementById('output').textContent=results.join('\n');
}

function copyAll(){
  const text=document.getElementById('output').textContent;
  if(!text||text.startsWith('⚠'))return;
  navigator.clipboard?.writeText(text).then(showToast).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();});
}
function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
_lang=detectLang();applyLang();generate();
</script>
<script src="related.js"></script>
</body>
