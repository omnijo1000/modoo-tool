const _i18n={
  ko:{sub:'암호학적 난수 기반 랜덤 문자열 생성기',langBtn:'🌐 EN',backBtn:'← 모두의 툴',optTitle:'OPTIONS',lenLabel:'길이',countLabel:'개수',charsetLabel:'문자셋',cbUpper:'대문자 A-Z',cbLower:'소문자 a-z',cbNum:'숫자 0-9',cbSpec:'특수문자',customLabel:'커스텀',genBtn:'▶ 생성',copyBtn:'복사',regenBtn:'↺ 재생성',seoHtml:'<h2>Random String Generator란?</h2><p><strong>crypto.getRandomValues()</strong>를 사용한 암호학적 난수로 문자열을 생성합니다. 대문자·소문자·숫자·특수문자 조합과 길이·개수를 자유롭게 설정하며, 모든 처리가 브라우저 안에서 이루어집니다.</p><details class="faq-item"><summary>crypto.getRandomValues()가 왜 안전한가요?</summary><p>Math.random()은 예측 가능한 의사난수(PRNG)를 사용하지만, crypto.getRandomValues()는 운영체제 수준의 암호학적으로 안전한 난수 생성기(CSPRNG)를 사용합니다. 보안이 중요한 토큰·비밀번호·키 생성에 적합합니다.</p></details><details class="faq-item"><summary>특수문자 옵션에는 어떤 문자가 포함되나요?</summary><p>!@#$%^&amp;*()_+-=[]{}|;\':",./&lt;&gt;? 등 표준 ASCII 특수문자가 포함됩니다. 시스템에 따라 일부 특수문자가 허용되지 않을 수 있으므로, 사용할 서비스의 비밀번호 정책을 확인하세요.</p></details><details class="faq-item"><summary>API 키 생성에 적합한 길이는 얼마인가요?</summary><p>일반적으로 32자 이상을 권장합니다. 128비트 엔트로피를 위해 Base64 대신 영숫자를 사용한다면 22자 이상이 필요합니다. 중요도에 따라 32·64·128자를 많이 사용합니다.</p></details><details class="faq-item"><summary>커스텀 문자셋은 어떻게 사용하나요?</summary><p>커스텀 입력 필드에 원하는 문자를 직접 입력하면 해당 문자들만 사용하여 랜덤 문자열을 생성합니다. 예: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"처럼 특정 문자셋을 지정할 수 있습니다.</p></details><details class="faq-item"><summary>생성된 문자열이 서버로 전송되나요?</summary><p>아니요. 모든 난수 생성과 처리가 브라우저 내에서 이루어집니다. 생성된 문자열은 외부 서버로 전송되지 않아 안전하게 사용할 수 있습니다.</p></details><details class="faq-item"><summary>생성된 문자열의 엔트로피는 얼마나 되나요?</summary><p>영문 대소문자+숫자 62자 중 32자리를 선택하는 경우 엔트로피는 약 190비트입니다. 비밀번호·토큰 용도로 충분히 안전한 수준입니다.</p></details><details class="faq-item"><summary>비밀번호와 API 키 생성에 권장 길이가 다른가요?</summary><p>비밀번호는 최소 16자, API 키는 32~64자를 권장합니다. 충분한 길이와 문자 종류의 다양성이 보안의 핵심입니다.</p></details><details class="faq-item"><summary>생성된 문자열에 특정 패턴이 없어야 한다면?</summary><p>모든 문자는 crypto.getRandomValues()를 통해 암호학적으로 독립 생성됩니다. 자연어 패턴이나 반복 시퀀스 없이 완전 랜덤한 결과를 보장합니다.</p></details>',toastMsg:'복사되었습니다!'},
  en:{sub:'Cryptographically secure random string generator',langBtn:'🌐 中文',backBtn:'← All Tools',optTitle:'OPTIONS',lenLabel:'Length',countLabel:'Count',charsetLabel:'Charset',cbUpper:'Uppercase A-Z',cbLower:'Lowercase a-z',cbNum:'Digits 0-9',cbSpec:'Special chars',customLabel:'Custom',genBtn:'▶ Generate',copyBtn:'Copy',regenBtn:'↺ Regenerate',seoHtml:'<h2>Random String Generator</h2><p>Generate cryptographically secure random strings using <strong>crypto.getRandomValues()</strong>. Customize length, count, and character set (uppercase, lowercase, digits, special characters). All processing is in the browser — nothing is sent to a server.</p><details class="faq-item"><summary>Why is crypto.getRandomValues() more secure than Math.random()?</summary><p>Math.random() uses a predictable pseudo-random number generator (PRNG) that can potentially be reverse-engineered. crypto.getRandomValues() uses the operating system\'s cryptographically secure random number generator (CSPRNG), making it suitable for security-sensitive tokens, passwords, and API keys.</p></details><details class="faq-item"><summary>What special characters are included?</summary><p>Standard ASCII special characters: !@#$%^&amp;*()_+-=[]{}|;\':",./&lt;&gt;? Some systems may not accept all special characters in passwords. Check the password policy of the service you\'re generating credentials for before using special characters.</p></details><details class="faq-item"><summary>What length is appropriate for API keys?</summary><p>32 characters or more is generally recommended. For 128-bit entropy using alphanumeric characters, at least 22 characters are needed. Common choices are 32, 64, or 128 characters depending on security requirements and API design conventions.</p></details><details class="faq-item"><summary>How do I use a custom character set?</summary><p>Enter the exact characters you want in the custom field, and the generator will use only those characters. Example: type "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789" to generate strings using only uppercase letters and digits — useful for codes that need to be easy to read and type.</p></details><details class="faq-item"><summary>Are the generated strings sent to a server?</summary><p>No. All random generation and processing happens entirely inside your browser using the Web Crypto API. The generated strings never leave your device, making it safe to use for sensitive credentials.</p></details><details class="faq-item"><summary>How much entropy does a generated string have?</summary><p>Selecting 32 characters from 62 alphanumeric characters provides approximately 190 bits of entropy — more than sufficient for passwords and API tokens.</p></details><details class="faq-item"><summary>What is the recommended length for passwords vs API keys?</summary><p>A minimum of 16 characters is recommended for passwords; 32–64 characters for API keys. Length and character variety are the key factors for security.</p></details><details class="faq-item"><summary>How can I ensure there are no patterns in the generated string?</summary><p>All characters are independently generated using crypto.getRandomValues(). The output is cryptographically random with no language patterns or repeated sequences.</p></details>',toastMsg:'Copied!'},
  zh:{sub:'加密安全随机字符串生成器',langBtn:'🌐 日本語',backBtn:'← 所有工具',optTitle:'选项',lenLabel:'长度',countLabel:'数量',charsetLabel:'字符集',cbUpper:'大写 A-Z',cbLower:'小写 a-z',cbNum:'数字 0-9',cbSpec:'特殊字符',customLabel:'自定义',genBtn:'▶ 生成',copyBtn:'复制',regenBtn:'↺ 重新生成',seoHtml:'<h2>随机字符串生成器</h2><p>使用<strong>crypto.getRandomValues()</strong>生成加密安全的随机字符串。可自定义长度、数量和字符集（大写、小写、数字、特殊字符）。所有处理在浏览器内完成，不向服务器发送任何数据。</p><details class="faq-item"><summary>为什么crypto.getRandomValues()比Math.random()更安全？</summary><p>Math.random()使用可预测的伪随机数生成器（PRNG），存在被破解的风险。crypto.getRandomValues()使用操作系统级别的密码学安全随机数生成器（CSPRNG），适用于安全敏感的令牌、密码和API密钥。</p></details><details class="faq-item"><summary>特殊字符包含哪些？</summary><p>包含标准ASCII特殊字符：!@#$%^&amp;*()_+-=[]{}|;\':",./&lt;&gt;?。某些系统可能不接受所有特殊字符作为密码，使用前请确认目标服务的密码策略。</p></details><details class="faq-item"><summary>API密钥适合多少字符长度？</summary><p>通常建议32个字符或更多。使用字母数字字符实现128位熵至少需要22个字符。常见选择是32、64或128个字符，具体取决于安全需求和API设计规范。</p></details><details class="faq-item"><summary>如何使用自定义字符集？</summary><p>在自定义字段中输入您想要的确切字符，生成器将只使用这些字符。例如：输入"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"可生成只含大写字母和数字的字符串，适合易读易输入的验证码场景。</p></details><details class="faq-item"><summary>生成的字符串会发送到服务器吗？</summary><p>不会。所有随机生成和处理完全在浏览器内使用Web Crypto API完成。生成的字符串不会离开您的设备，可以安全地用于敏感凭据的生成。</p></details><details class="faq-item"><summary>生成的字符串有多少熵？</summary><p>从62个字母数字中选取32位，熵约为190比特，对于密码和API令牌已足够安全。</p></details><details class="faq-item"><summary>密码和API密钥推荐的长度有什么不同？</summary><p>密码建议至少16位，API密钥建议32-64位。长度和字符种类的多样性是安全的关键。</p></details><details class="faq-item"><summary>如何确保生成的字符串没有规律性？</summary><p>所有字符都通过crypto.getRandomValues()独立生成，保证完全随机，无任何语言规律或重复序列。</p></details>',toastMsg:'已复制！'},
  ja:{sub:'暗号的乱数ベースのランダム文字列生成器',langBtn:'🌐 한국어',backBtn:'← ホーム',optTitle:'OPTIONS',lenLabel:'長さ',countLabel:'個数',charsetLabel:'文字セット',cbUpper:'大文字 A-Z',cbLower:'小文字 a-z',cbNum:'数字 0-9',cbSpec:'特殊文字',customLabel:'カスタム',genBtn:'▶ 生成',copyBtn:'コピー',regenBtn:'↺ 再生成',seoHtml:'<h2>ランダム文字列生成器とは？</h2><p><strong>crypto.getRandomValues()</strong>を使用した暗号的乱数で文字列を生成します。長さ・個数・文字セット（大文字・小文字・数字・特殊文字）を自由に設定でき、すべての処理がブラウザ内で完結します。</p><details class="faq-item"><summary>なぜcrypto.getRandomValues()がMath.random()より安全なのですか？</summary><p>Math.random()は予測可能な疑似乱数生成器（PRNG）を使用しており、解析されるリスクがあります。crypto.getRandomValues()はOSレベルの暗号的乱数生成器（CSPRNG）を使用するため、トークン・パスワード・APIキーなどセキュリティが重要な場面に適しています。</p></details><details class="faq-item"><summary>特殊文字にはどんな文字が含まれますか？</summary><p>標準ASCII特殊文字が含まれます：!@#$%^&amp;*()_+-=[]{}|;\':",./&lt;&gt;?。システムによっては一部の特殊文字がパスワードとして使用できない場合があります。利用するサービスのパスワードポリシーを事前に確認してください。</p></details><details class="faq-item"><summary>APIキーに適した文字列の長さは？</summary><p>一般的には32文字以上が推奨されます。英数字で128ビットのエントロピーを実現するには22文字以上必要です。セキュリティ要件とAPI設計の慣習に応じて32・64・128文字がよく使われます。</p></details><details class="faq-item"><summary>カスタム文字セットはどのように使いますか？</summary><p>カスタムフィールドに使用したい文字を直接入力すると、その文字のみを使ってランダム文字列を生成します。例：「ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789」と入力すれば、大文字と数字のみの読みやすい文字列を生成できます。</p></details><details class="faq-item"><summary>生成された文字列はサーバーに送信されますか？</summary><p>いいえ。すべての乱数生成と処理はWeb Crypto APIを使用してブラウザ内で完結します。生成された文字列がデバイスの外に出ることはなく、機密性の高いクレデンシャルの生成にも安全に使用できます。</p></details><details class="faq-item"><summary>生成される文字列のエントロピーはどれくらいですか？</summary><p>62文字の英数字から32文字を選択する場合、エントロピーは約190ビットです。パスワードやAPIトークンとして十分安全なレベルです。</p></details><details class="faq-item"><summary>パスワードとAPIキーで推奨長さは違いますか？</summary><p>パスワードは最低16文字、APIキーは32〜64文字を推奨します。長さと文字の多様性がセキュリティの鍵です。</p></details><details class="faq-item"><summary>生成された文字列にパターンがないことを確認するには？</summary><p>すべての文字はcrypto.getRandomValues()で独立して生成されます。言語パターンや繰り返しシーケンスのない完全ランダムな結果が保証されます。</p></details>',toastMsg:'コピーしました！'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

function buildCharset(){
  let s='';
  if(document.getElementById('cbUpper').checked) s+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('cbLower').checked) s+='abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('cbNum').checked) s+='0123456789';
  if(document.getElementById('cbSpec').checked) s+='!@#$%^&*()_+-=[]{}|;:,.<>?';
  const custom=document.getElementById('custom').value;
  if(custom) s+=custom;
  return [...new Set(s)].join('');
}

function randString(len, charset){
  const arr=new Uint32Array(len);
  crypto.getRandomValues(arr);
  return [...arr].map(n=>charset[n%charset.length]).join('');
}

function generate(){
  const charset=buildCharset();
  if(!charset){document.getElementById('output').textContent='⚠ 문자셋을 선택해주세요';return;}
  const len=Math.min(4096,Math.max(1,parseInt(document.getElementById('length').value)||16));
  const cnt=Math.min(100,Math.max(1,parseInt(document.getElementById('count').value)||1));
  const results=Array.from({length:cnt},()=>randString(len,charset));
  document.getElementById('output').textContent=results.join('\n');
}

function copyAll(){
  const text=document.getElementById('output').textContent;
  if(!text||text.startsWith('⚠'))return;
  navigator.clipboard?.writeText(text).then(showToast).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();});
}
function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
_lang=detectLang();applyLang();generate();
</script>
