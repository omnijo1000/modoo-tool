  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','tabText','tabEmoji','tabImage','lblTxt','lblFontSize','lblBg','lblFg','lblRadius','lblEmoji','lblEmojiBg','dzText','lblPreview'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
document.getElementById('tabsEl').querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab,.tab-panel').forEach(e=>e.classList.remove('active'));
    tab.classList.add('active');_mode=tab.dataset.tab;
    document.getElementById('panel-'+_mode).classList.add('active');
    render();
  });
});
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFile(e.dataTransfer.files[0]);});
document.getElementById('fileIn').addEventListener('change',e=>loadFile(e.target.files[0]));
function loadFile(file){if(!file||!file.type.startsWith('image/'))return;const url=URL.createObjectURL(file);const img=new Image();img.onload=()=>{_srcImg=img;render();URL.revokeObjectURL(url);};img.src=url;}
['txtInput','fontSize','bgColor','fgColor','radius','emojiInput','emojiBgColor'].forEach(id=>document.getElementById(id)?.addEventListener('input',render));
function drawFavicon(size){
  const cvs=document.createElement('canvas');cvs.width=size;cvs.height=size;
  const ctx=cvs.getContext('2d');
  if(_mode==='image'&&_srcImg){
    ctx.drawImage(_srcImg,0,0,size,size);return cvs;
  }
  const bg=_mode==='emoji'?document.getElementById('emojiBgColor').value:document.getElementById('bgColor').value;
  const r=_mode==='text'?(parseFloat(document.getElementById('radius').value)/100*size):0;
  ctx.fillStyle=bg;
  if(r>0){ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fill();}
  else{ctx.fillRect(0,0,size,size);}
  if(_mode==='text'){
    const txt=document.getElementById('txtInput').value||'?';
    const fsPct=parseFloat(document.getElementById('fontSize').value)/100;
    ctx.fillStyle=document.getElementById('fgColor').value;
    ctx.font=`bold ${Math.round(size*fsPct)}px "Noto Sans KR",sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(txt,size/2,size/2+1);
  }else if(_mode==='emoji'){
    const em=document.getElementById('emojiInput').value||'⚡';
    ctx.font=`${Math.round(size*0.75)}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(em,size/2,size/2+size*0.05);
  }
  return cvs;
}
function render(){
  const area=document.getElementById('previewArea');const dlRow=document.getElementById('dlRow');
  area.innerHTML='';dlRow.innerHTML='';
  SIZES.forEach(sz=>{
    const cvs=drawFavicon(sz);
    const item=document.createElement('div');item.className='pv-item';
    const scale=Math.max(1,Math.floor(64/sz));cvs.style.width=(sz*scale)+'px';cvs.style.height=(sz*scale)+'px';
    item.appendChild(cvs);
    const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent=sz+'×'+sz;item.appendChild(lbl);
    area.appendChild(item);
    const btn=document.createElement('button');btn.className='btn-ghost';btn.textContent=sz+'px';
    btn.addEventListener('click',()=>{const a=document.createElement('a');a.href=drawFavicon(sz).toDataURL('image/png');a.download=`favicon-${sz}.png`;a.click();});
    dlRow.appendChild(btn);
  });
}
_lang=detectLang();applyLang();render();
</script>
<script src="related.js"></script>
</body>
