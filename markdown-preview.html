function mdToHtml(md){
  let h=md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g,(_,lang,code)=>`<pre><code class="lang-${lang}">${code.trim()}</code></pre>`)
    // inline code
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    // headings
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    // bold+italic
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/__(.+?)__/g,'<strong>$1</strong>')
    .replace(/_(.+?)_/g,'<em>$1</em>')
    // strikethrough
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    // images before links
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">')
    // links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    // hr
    .replace(/^---+$/gm,'<hr>')
    // blockquote
    .replace(/^&gt; (.+)$/gm,'<blockquote><p>$1</p></blockquote>')
    // unordered list
    .replace(/(^[*-] .+$\n?)+/gm,m=>'<ul>'+m.replace(/^[*-] (.+)$/gm,'<li>$1</li>')+'</ul>')
    // ordered list
    .replace(/(^\d+\. .+$\n?)+/gm,m=>'<ol>'+m.replace(/^\d+\. (.+)$/gm,'<li>$1</li>')+'</ol>')
    // tables
    .replace(/(\|.+\|\n\|[-| :]+\|\n(?:\|.+\|\n?)*)/g,t=>{
      const rows=t.trim().split('\n');
      const header=rows[0].split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
      const body=rows.slice(2).map(r=>'<tr>'+r.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('')+'</tr>').join('');
      return `<table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
    })
    // paragraphs
    .replace(/\n\n([^<])/g,'\n<p>$1')
    .replace(/([^>])\n\n/g,'$1</p>\n');
  return h;
}

function render(){
  const md=document.getElementById('mdInput').value;
  document.getElementById('mdPreview').innerHTML=mdToHtml(md);
  const words=md.trim()===''?0:md.trim().split(/\s+/).length;
  const lang = (window._lang && ['ko','en','zh'].includes(window._lang)) ? window._lang : 'en';
  const labels = {
    en:{w:'words',c:'chars',l:'lines'},
    ko:{w:'단어',c:'글자',l:'줄'},
    zh:{w:'词',c:'字符',l:'行'}
  }[lang];
  document.getElementById('statWords').textContent=words+' '+labels.w;
  document.getElementById('statChars').textContent=md.length+' '+labels.c;
  document.getElementById('statLines').textContent=md.split('\n').length+' '+labels.l;
}

function ins(before,after){
  const ta=document.getElementById('mdInput');
  const s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.substring(s,e);
  ta.value=ta.value.substring(0,s)+before+sel+after+ta.value.substring(e);
  ta.selectionStart=s+before.length;
  ta.selectionEnd=s+before.length+sel.length;
  ta.focus();render();
}
function insLine(prefix){
  const ta=document.getElementById('mdInput');
  const pos=ta.selectionStart;
  const lineStart=ta.value.lastIndexOf('\n',pos-1)+1;
  ta.value=ta.value.substring(0,lineStart)+prefix+ta.value.substring(lineStart);
  ta.selectionStart=ta.selectionEnd=pos+prefix.length;
  ta.focus();render();
}
function insTable(){
  ins('\n| Col 1 | Col 2 | Col 3 |\n|-------|-------|-------|\n| Cell | Cell | Cell |\n','');
}
function clearMD(){document.getElementById('mdInput').value='';render();}
function copyHTML(){navigator.clipboard.writeText(document.getElementById('mdPreview').innerHTML);}
function copyMD(){navigator.clipboard.writeText(document.getElementById('mdInput').value);}

// init
document.getElementById('mdInput').value=DEFAULTS.en;
render();
</script>

<details class="faq-item"><summary>Q. GitHub Flavored Markdown(GFM)이란?</summary><p>GitHub이 CommonMark 규격을 확장한 마크다운 방언입니다. 추가 기능: 표(Table), 취소선(~~text~~), 체크리스트(- [ ] / - [x]), URL 자동 링크, 구문 강조 코드블럭. GitHub·GitLab·Notion 등에서 사용됩니다.</p></details>
<details class="faq-item"><summary>Q. 마크다운을 HTML로 변환하려면?</summary><p>이 도구에서 'HTML 복사' 버튼으로 렌더링된 HTML을 클립보드에 복사할 수 있습니다. 프로젝트에서는 marked.js(JS), python-markdown(Python), kramdown(Ruby) 등 라이브러리를 사용합니다. Next.js·Gatsby 등에서는 MDX(마크다운+JSX) 형식도 지원합니다.</p></details>
<details class="faq-item"><summary>Q. 이미지 삽입 방법은?</summary><p>![대체텍스트](이미지URL) 형식. 로컬 이미지는 URL이 없으므로 Imgur·GitHub Issues 등에 업로드 후 URL을 사용합니다. 크기 조절은 표준 마크다운에서 불가능하며 HTML 태그 &lt;img width="300"&gt;를 직접 사용해야 합니다.</p></details>
<details class="faq-item"><summary>Q. 코드 블럭을 삽입하는 방법은?</summary><p>A. 백틱 3개(\`\`\`)로 감싸고 첫 줄에 언어명을 적으면 구문 강조가 적용됩니다. 인라인 코드는 백틱 1개(\`코드\`)로 감쌉니다.</p></details>
<details class="faq-item"><summary>Q. HTML을 마크다운과 혼용할 수 있나요?</summary><p>A. 대부분의 마크다운 파서는 HTML 태그를 그대로 렌더링합니다. div, span, br 등 기본 태그는 대부분 지원되며 이 도구에서도 동일하게 동작합니다.</p></details>

  en: { lang:'en', title:'Markdown Preview - Live Editor & Renderer | Free Online Tool', btn:'🌐 中文', paneInput:'MARKDOWN INPUT', panePreview:'PREVIEW', tbCode:'code', tbList:'List', tbQuote:'Quote', tbBlock:'block', tbLink:'Link', tbImg:'Img', tbTable:'Table', tbClear:'Clear', tbCopyHtml:'Copy HTML', tbCopyMd:'Copy MD',
  seoHtml:`<h2>Markdown Preview Guide</h2>
<p><strong>Markdown</strong> is a lightweight markup language created by John Gruber in 2004. Plain text formatting is converted to HTML — used by GitHub, Notion, Obsidian, Reddit and countless other platforms. This tool renders <strong>GitHub Flavored Markdown (GFM)</strong> in real time, supporting tables, code blocks, checklists and more.</p>
<h3 class="seo-sub">Frequently Asked Questions</h3>
<details class="faq-item"><summary>Q. What are the most common Markdown syntax elements?</summary><p># Heading 1 / ## Heading 2 / ### Heading 3. **bold** / *italic* / ~~strikethrough~~. \`inline code\`. \`\`\`lang ... \`\`\` for code blocks. - or * for unordered lists. 1. for numbered lists. > for blockquotes. [link text](URL). ![alt](image URL). --- for horizontal rule.</p></details>
<details class="faq-item"><summary>Q. How do I create a Markdown table?</summary><p>Use pipe | to separate columns, and a second row of |---|---| as the header separator. Example: | Name | Age | / |---|---| / | Alice | 30 |. Alignment: |:---| left, |:---:| center, |---:| right.</p></details>
<details class="faq-item"><summary>Q. What is GitHub Flavored Markdown (GFM)?</summary><p>GFM is GitHub's extension of the CommonMark spec. Extra features: tables, strikethrough (~~text~~), task lists (- [ ] / - [x]), auto-linked URLs, and syntax-highlighted fenced code blocks. Used by GitHub, GitLab, Notion and many other platforms.</p></details>
<details class="faq-item"><summary>Q. How do I export Markdown as HTML?</summary><p>Click "Copy HTML" to copy the rendered HTML to your clipboard. For projects, use marked.js (JavaScript), python-markdown (Python), or kramdown (Ruby). Frameworks like Next.js and Gatsby also support MDX (Markdown + JSX components).</p></details>
<details class="faq-item"><summary>Q. How do I insert and resize images?</summary><p>Use ![alt text](image URL) syntax. For local images, upload to Imgur or GitHub Issues first to get a URL. Standard Markdown doesn't support resizing — use an HTML &lt;img width="300"&gt; tag directly for size control.</p></details>
<details class="faq-item"><summary>Q. How do I insert a code block?</summary><p>A. Wrap code with three backticks (\`\`\`) and write the language name on the first line for syntax highlighting. Use a single backtick (\`code\`) for inline code.</p></details>
<details class="faq-item"><summary>Q. Can I mix HTML and Markdown?</summary><p>A. Most Markdown parsers render raw HTML tags as-is. Basic tags like div, span, and br are generally supported and work in this tool too.</p></details>
<details class="faq-item"><summary>Q. Can I add comments in a Markdown file?</summary><p>A. Markdown has no native comment syntax. HTML comments &lt;!-- text --&gt; work in most parsers and won't appear in the rendered output.</p></details>`},
  zh: { lang:'zh', title:'Markdown预览 - 实时编辑器·渲染器 | 免费', btn:'🌐 日本語', paneInput:'Markdown 输入', panePreview:'预览', tbCode:'代码', tbList:'列表', tbQuote:'引用', tbBlock:'代码块', tbLink:'链接', tbImg:'图片', tbTable:'表格', tbClear:'清空', tbCopyHtml:'复制 HTML', tbCopyMd:'复制 MD',
  seoHtml:`<h2>Markdown预览工具指南</h2>
<p><strong>Markdown</strong>是John Gruber于2004年创建的轻量级标记语言，用纯文本格式标记内容并转换为HTML。GitHub、Notion、Obsidian、Reddit等众多平台均支持Markdown。本工具基于<strong>GitHub Flavored Markdown（GFM）</strong>规范实时渲染，支持表格、代码块、任务列表等扩展语法。</p>
<h3 class="seo-sub">常见问题</h3>
<details class="faq-item"><summary>Q. 常用Markdown语法有哪些？</summary><p># 一级标题 / ## 二级标题 / ### 三级标题。**粗体** / *斜体* / ~~删除线~~。\`行内代码\`。\`\`\`语言名 ... \`\`\` 代码块。- 或 * 无序列表。1. 有序列表。> 引用。[链接文字](URL)。![替代文字](图片URL)。--- 水平线。</p></details>
<details class="faq-item"><summary>Q. 如何创建Markdown表格？</summary><p>用 | 分隔列，第二行用 |---|---| 作为表头分隔符。示例：| 姓名 | 年龄 | / |---|---| / | 张三 | 30 |。对齐方式：|:---| 左对齐，|:---:| 居中，|---:| 右对齐。</p></details>
<details class="faq-item"><summary>Q. 什么是GitHub Flavored Markdown(GFM)？</summary><p>GFM是GitHub对CommonMark规范的扩展，新增了：表格、删除线(~~text~~)、任务列表(- [ ] / - [x])、URL自动链接、语法高亮代码块。GitHub、GitLab、Notion等平台均支持GFM。</p></details>
<details class="faq-item"><summary>Q. 如何将Markdown导出为HTML？</summary><p>点击"复制HTML"按钮可将渲染后的HTML复制到剪贴板。项目开发中可使用marked.js（JavaScript）、python-markdown（Python）或kramdown（Ruby）等库。Next.js和Gatsby等框架还支持MDX（Markdown+JSX组件）格式。</p></details>
<details class="faq-item"><summary>Q. 如何插入图片并调整大小？</summary><p>使用 ![替代文字](图片URL) 语法。本地图片需先上传至Imgur或GitHub Issues获取URL。标准Markdown不支持调整图片大小，需直接使用HTML标签 &lt;img width="300"&gt; 来控制尺寸。</p></details>
<details class="faq-item"><summary>Q. 如何插入代码块？</summary><p>A. 用三个反引号(\`\`\`)包裹，第一行写语言名可启用语法高亮。行内代码用单个反引号(\`代码\`)包裹。</p></details>
<details class="faq-item"><summary>Q. Markdown中可以混用HTML吗？</summary><p>A. 大多数Markdown解析器会原样渲染HTML标签，div、span、br等基本标签通常都支持，本工具也同样处理。</p></details>
<details class="faq-item"><summary>Q. Markdown文件中可以添加注释吗？</summary><p>A. Markdown没有原生注释语法。使用HTML注释 &lt;!-- 内容 --&gt; 在大多数解析器中不会出现在渲染结果中。</p></details>`},

  seoHtml:`<h2>Markdownプレビュー 完全ガイド</h2>
<p><strong>Markdown</strong>はJohn Gruberが2004年に作成した軽量マークアップ言語で、プレーンテキストでフォーマットを指定するとHTMLに変換されます。GitHub・Notion・Obsidian・Redditなど多くのプラットフォームで使用されています。このツールは<strong>GitHub Flavored Markdown（GFM）</strong>仕様に基づいてリアルタイムレンダリングし、表・コードブロック・タスクリストなどをサポートしています。</p>
<h3 class="seo-sub">よくある質問</h3>
<details class="faq-item"><summary>Q. よく使うMarkdown記法は？</summary><p># 見出し1 / ## 見出し2 / ### 見出し3。**太字** / *斜体* / ~~取り消し線~~。\`インラインコード\`。\`\`\`言語名 ... \`\`\` コードブロック。- または * 箇条書き。1. 番号付きリスト。> 引用。[リンクテキスト](URL)。![代替テキスト](画像URL)。--- 水平線。</p></details>
<details class="faq-item"><summary>Q. Markdownで表を作るには？</summary><p>| で列を区切り、2行目に |---|---| の区切り線が必要です。例：| 名前 | 年齢 | / |---|---| / | 田中 | 30 |。揃え：|:---| 左揃え、|:---:| 中央揃え、|---:| 右揃え。</p></details>
<details class="faq-item"><summary>Q. GitHub Flavored Markdown（GFM）とは？</summary><p>GFMはGitHubがCommonMark仕様を拡張したMarkdown方言です。追加機能：表、取り消し線(~~text~~)、タスクリスト(- [ ] / - [x])、URL自動リンク、シンタックスハイライト付きコードブロック。GitHub・GitLab・Notionなどで使用されています。</p></details>
<details class="faq-item"><summary>Q. MarkdownをHTMLとして書き出すには？</summary><p>「HTMLコピー」ボタンをクリックするとレンダリングされたHTMLをクリップボードにコピーできます。プロジェクトではmarked.js（JavaScript）、python-markdown（Python）、kramdown（Ruby）などのライブラリを使います。Next.jsやGatsbyではMDX（Markdown+JSXコンポーネント）もサポートしています。</p></details>
<details class="faq-item"><summary>Q. 画像の挿入とサイズ調整は？</summary><p>![代替テキスト](画像URL) の形式で挿入します。ローカル画像はImgurやGitHub Issuesにアップロードしてから URLを使います。標準MarkdownではサイズはHTMLタグ &lt;img width="300"&gt; を直接使う必要があります。</p></details>
<details class="faq-item"><summary>Q. コードブロックの挿入方法は？</summary><p>A. バッククォート3つ(\`\`\`)で囲み、最初の行に言語名を書くとシンタックスハイライトが適用されます。インラインコードはバッククォート1つ(\`コード\`)で囲みます。</p></details>
<details class="faq-item"><summary>Q. MarkdownとHTMLを混在させられますか？</summary><p>A. 多くのMarkdownパーサーはHTMLタグをそのままレンダリングします。div、span、brなどの基本タグは通常サポートされており、このツールでも同様に動作します。</p></details>
<details class="faq-item"><summary>Q. Markdownファイルにコメントを追加できますか？</summary><p>A. Markdownに標準のコメント構文はありません。HTMLコメント &lt;!-- 内容 --&gt; は多くのパーサーでレンダリング結果に表示されません。</p></details>`}
};
function _detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  else if (n.startsWith('ja')) return 'ja';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}
let _lang = _detectLang();
function _applyLang() {
  const t = _i18n[_lang];
  window._lang = _lang;
  document.documentElement.lang = t.lang;
  document.title = t.title;
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = t.btn;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.textContent = t[key];
  });
  const back = document.querySelector('.back-link');
  if (back) back.textContent = (_lang === 'ko') ? '← 모두의 툴' : (_lang === 'zh') ? '← 首页' : (_lang === 'ja') ? '← ホーム' : '← Home';
  const seoEl = document.getElementById('seoSection');
  if (seoEl && t.seoHtml) seoEl.innerHTML = t.seoHtml;

  // 기본 예시 텍스트는 사용자 입력이 없거나 기존 기본값일 때만 언어에 맞춰 교체
  const input = document.getElementById('mdInput');
  if (input) {
    const current = input.value;
    const isDefault = Object.values(DEFAULTS).includes(current);
    if (isDefault) {
      input.value = DEFAULTS[_lang] || DEFAULTS.en;
      render();
    } else {
      render();
    }
  }
}
const _langOrder = ['ko','en','zh','ja'];
function cycleLang() {
  const idx = _langOrder.indexOf(_lang);
  _lang = _langOrder[(idx + 1) % _langOrder.length];
  localStorage.setItem('lang', _lang);
  const url = new URL(location.href);
  if (_lang === 'ko') { url.searchParams.delete('lang'); } else { url.searchParams.set('lang', _lang); }
  history.replaceState({}, '', url);
  _applyLang();
}
_applyLang();
</script>
