:root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2e2e2e;--accent:#a3e635;--text:#f0f0f0;--text-muted:#888;--text-dim:#555;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;}

.tb-btn:hover{border-color:var(--accent);color:var(--accent);}

.pane-wrap{display:flex;flex-direction:column;border-right:1px solid var(--border);}

.pane-header{padding:8px 16px;font-size:11px;color:var(--text-dim);letter-spacing:0.1em;font-family:'DM Mono',monospace;border-bottom:1px solid var(--border);background:var(--surface);}

.md-preview{flex:1;overflow-y:auto;padding:16px 24px;background:var(--surface);}

.md-preview h1,.md-preview h2,.md-preview h3{color:var(--accent);margin:16px 0 8px;line-height:1.3;}
.md-preview h1{font-size:22px;border-bottom:1px solid var(--border);padding-bottom:8px;}

.md-preview code{background:#111;border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:'DM Mono',monospace;font-size:13px;color:#fcd34d;}
.md-preview pre{background:#111;border:1px solid var(--border);border-radius:8px;padding:14px;margin:10px 0;overflow-x:auto;}
.md-preview pre code{background:none;border:none;padding:0;color:#d0d0d0;}
.md-preview blockquote{border-left:3px solid var(--accent);padding:8px 14px;margin:10px 0;background:#111;border-radius:0 6px 6px 0;}
.md-preview blockquote p{color:var(--text-muted);}
.md-preview ul,.md-preview ol{padding-left:20px;margin:8px 0;}
.md-preview li{margin:4px 0;line-height:1.7;color:#d0d0d0;}
.md-preview table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;}
.md-preview th{background:#111;padding:8px 12px;text-align:left;border:1px solid var(--border);color:var(--accent);}
.md-preview td{padding:7px 12px;border:1px solid var(--border);color:#d0d0d0;}
.md-preview tr:nth-child(even) td{background:#111;}
.md-preview hr{border:none;border-top:1px solid var(--border);margin:16px 0;}
.md-preview img{max-width:100%;border-radius:6px;}
.md-preview strong{color:#fff;}
.md-preview em{color:#aaa;font-style:italic;}
.status-bar{padding:6px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;display:flex;gap:16px;flex-shrink:0;background:var(--surface);}
@media(max-width:600px){.editor-layout{grid-template-columns:1fr;}}

<header>

  <button class="tb-btn" onclick="ins('*','*')"><i>I</i></button>

  <button class="tb-btn" onclick="insLine('### ')">H3</button>
  <button class="tb-btn" onclick="insLine('- ')" data-i18n="tbList">List</button>
  <button class="tb-btn" onclick="insLine('1. ')">OL</button>

  <button class="tb-btn" onclick="insLine('---')">HR</button>
  <button class="tb-btn" onclick="ins('[','](url)')" data-i18n="tbLink">Link</button>

<div class="editor-layout">
  <div class="pane-wrap">

  </div>
  <div class="pane-wrap">
    <div class="pane-header" data-i18n="panePreview">PREVIEW</div>
    <div class="md-preview" id="mdPreview"></div>
  </div>
</div>
<div class="status-bar">
  <span id="statWords">0 words</span>
  <span id="statChars">0 chars</span>
  <span id="statLines">0 lines</span>
</div>
<script>
const DEFAULTS={
en:`# Welcome to Markdown Preview

Type your **Markdown** on the left and see the preview here.

## Features

- GitHub Flavored Markdown (GFM)

ko:`# 마크다운 미리보기에 오신 것을 환영합니다

왼쪽에 **마크다운**을 입력하면 오른쪽에서 바로 결과를 볼 수 있습니다.

## 기능

---
*MODOO HUB와 함께 만들었어요*`,
zh:`# 欢迎使用 Markdown 预览

在左侧输入 **Markdown**，右侧会实时显示渲染结果。

## 功能
- 实时预览
- 支持 GitHub Flavored Markdown (GFM)
- 支持代码块、表格、引用

## 代码示例

## 表格示例

| 粗体 / 斜体 | ✅ |
| 代码块 | ✅ |
| 表格 | ✅ |
| 链接 / 图片 | ✅ |

> **提示：** 可使用上方工具栏快速插入语法。

};

function mdToHtml(md){
  let h=md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g,(_,lang,code)=>`<pre><code class="lang-${lang}">${code.trim()}</code></pre>`)
    // inline code
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    // headings
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    // bold+italic
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/__(.+?)__/g,'<strong>$1</strong>')
    .replace(/_(.+?)_/g,'<em>$1</em>')
    // strikethrough
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    // images before links
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">')
    // links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    // hr
    .replace(/^---+$/gm,'<hr>')
    // blockquote
    .replace(/^&gt; (.+)$/gm,'<blockquote><p>$1</p></blockquote>')
    // unordered list
    .replace(/(^[*-] .+$\n?)+/gm,m=>'<ul>'+m.replace(/^[*-] (.+)$/gm,'<li>$1</li>')+'</ul>')
    // ordered list
    .replace(/(^\d+\. .+$\n?)+/gm,m=>'<ol>'+m.replace(/^\d+\. (.+)$/gm,'<li>$1</li>')+'</ol>')
    // tables
    .replace(/(\|.+\|\n\|[-| :]+\|\n(?:\|.+\|\n?)*)/g,t=>{
      const rows=t.trim().split('\n');
      const header=rows[0].split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
      const body=rows.slice(2).map(r=>'<tr>'+r.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('')+'</tr>').join('');
      return `<table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
    })
    // paragraphs
    .replace(/\n\n([^<])/g,'\n<p>$1')
    .replace(/([^>])\n\n/g,'$1</p>\n');
  return h;
}

function render(){
  const md=document.getElementById('mdInput').value;
  document.getElementById('mdPreview').innerHTML=mdToHtml(md);
  const words=md.trim()===''?0:md.trim().split(/\s+/).length;
  const lang = (window._lang && ['ko','en','zh'].includes(window._lang)) ? window._lang : 'en';
  const labels = {
    en:{w:'words',c:'chars',l:'lines'},
    ko:{w:'단어',c:'글자',l:'줄'},
    zh:{w:'词',c:'字符',l:'行'}
  }[lang];
  document.getElementById('statWords').textContent=words+' '+labels.w;
  document.getElementById('statChars').textContent=md.length+' '+labels.c;
  document.getElementById('statLines').textContent=md.split('\n').length+' '+labels.l;
}

function ins(before,after){
  const ta=document.getElementById('mdInput');
  const s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.substring(s,e);
  ta.value=ta.value.substring(0,s)+before+sel+after+ta.value.substring(e);
  ta.selectionStart=s+before.length;
  ta.selectionEnd=s+before.length+sel.length;
  ta.focus();render();
}
function insLine(prefix){
  const ta=document.getElementById('mdInput');
  const pos=ta.selectionStart;
  const lineStart=ta.value.lastIndexOf('\n',pos-1)+1;
  ta.value=ta.value.substring(0,lineStart)+prefix+ta.value.substring(lineStart);
  ta.selectionStart=ta.selectionEnd=pos+prefix.length;
  ta.focus();render();
}
function insTable(){
  ins('\n| Col 1 | Col 2 | Col 3 |\n|-------|-------|-------|\n| Cell | Cell | Cell |\n','');
}
function clearMD(){document.getElementById('mdInput').value='';render();}
function copyHTML(){navigator.clipboard.writeText(document.getElementById('mdPreview').innerHTML);}
function copyMD(){navigator.clipboard.writeText(document.getElementById('mdInput').value);}

// init
document.getElementById('mdInput').value=DEFAULTS.en;
render();
</script>

<script>
/* ===== i18n multilingual ===== */
const _i18n = {
  ko: { lang:'ko', title:'마크다운 미리보기 - 실시간 마크다운 에디터·렌더러 | 무료', btn:'🌐 EN', paneInput:'마크다운 입력', panePreview:'미리보기', tbCode:'코드', tbList:'목록', tbQuote:'인용', tbBlock:'블록', tbLink:'링크', tbImg:'이미지', tbTable:'표', tbClear:'지우기', tbCopyHtml:'HTML 복사', tbCopyMd:'MD 복사' },
  en: { lang:'en', title:'Markdown Preview - Live Editor & Renderer | Free Online Tool', btn:'🌐 中文', paneInput:'MARKDOWN INPUT', panePreview:'PREVIEW', tbCode:'code', tbList:'List', tbQuote:'Quote', tbBlock:'block', tbLink:'Link', tbImg:'Img', tbTable:'Table', tbClear:'Clear', tbCopyHtml:'Copy HTML', tbCopyMd:'Copy MD' },
  zh: { lang:'zh', title:'Markdown预览 - 实时编辑器·渲染器 | 免费', btn:'🌐 한국어', paneInput:'Markdown 输入', panePreview:'预览', tbCode:'代码', tbList:'列表', tbQuote:'引用', tbBlock:'代码块', tbLink:'链接', tbImg:'图片', tbTable:'表格', tbClear:'清空', tbCopyHtml:'复制 HTML', tbCopyMd:'复制 MD' }
};
function _detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}
let _lang = _detectLang();
function _applyLang() {
  const t = _i18n[_lang];
  window._lang = _lang;
  document.documentElement.lang = t.lang;
  document.title = t.title;
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = t.btn;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.textContent = t[key];
  });
  const back = document.querySelector('.back-link');
  if (back) back.textContent = (_lang === 'ko') ? '← 모두의 툴' : (_lang === 'zh') ? '← 首页' : '← Home';

  // 기본 예시 텍스트는 사용자 입력이 없거나 기존 기본값일 때만 언어에 맞춰 교체
  const input = document.getElementById('mdInput');
  if (input) {
    const current = input.value;
    const isDefault = Object.values(DEFAULTS).includes(current);
    if (isDefault) {
      input.value = DEFAULTS[_lang] || DEFAULTS.en;
      render();
    } else {
      render();
    }
  }
}
const _langOrder = ['ko','en','zh'];
function cycleLang() {
  const idx = _langOrder.indexOf(_lang);
  _lang = _langOrder[(idx + 1) % _langOrder.length];
  localStorage.setItem('lang', _lang);
  const url = new URL(location.href);
  if (_lang === 'ko') { url.searchParams.delete('lang'); } else { url.searchParams.set('lang', _lang); }
  history.replaceState({}, '', url);
  _applyLang();
}
_applyLang();
</script>
