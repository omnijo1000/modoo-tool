<style>
:root{--bg:#0a0a0a;--surface:#141414;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#4ade80;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:10px;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:540px;margin:0 auto;padding:40px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:28px;font-weight:900;margin-bottom:6px;}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:32px;line-height:1.6;}
.unit-toggle{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ut-btn{flex:1;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;background:var(--surface);color:var(--text-muted);border:none;transition:all .15s;}
.ut-btn.on{background:var(--accent);color:#000;}
.input-group{margin-bottom:18px;}
label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:6px;font-family:'DM Mono',monospace;}
input[type=number]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;}
input:focus{border-color:var(--accent);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.calc-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Noto Sans KR',sans-serif;}
.calc-btn:hover{opacity:.85;}
.result-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px;display:none;}
.result-main{text-align:center;padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid var(--border);}
.result-main .rl{font-size:12px;color:var(--text-muted);margin-bottom:4px;font-family:'DM Mono',monospace;}
.result-main .rv{font-size:42px;font-weight:900;color:var(--accent);}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.s-row:last-child{border-bottom:none;}
.s-label{font-size:13px;color:var(--text-muted);}
.s-val{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;}
.seo{margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}
.seo h2{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
.seo strong{color:var(--text-muted);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:40px;}
</style>

    <div class="s-row"><span class="s-label" data-i18n="fuelRoundTrip">왕복 예상 비용</span><span class="s-val" id="rRound">-</span></div>

<script>
let _unit='metric';
function setUnit(u){
  _unit=u;
  document.getElementById('btnMetric').classList.toggle('on',u==='metric');
  document.getElementById('btnImperial').classList.toggle('on',u==='imperial');
  _updateLabels();
}
function _updateLabels(){
  const t=typeof _i18n!=='undefined'&&_i18n[typeof _lang!=='undefined'?_lang:'en']||{};
  const isM=_unit==='metric';
  document.getElementById('lblDist').textContent=isM?(t.fuelDistKm||'Distance (km)'):(t.fuelDistMi||'Distance (miles)');
  document.getElementById('lblEff').textContent=isM?(t.fuelEffL||'Fuel Efficiency (L/100km)'):(t.fuelEffMpg||'Fuel Efficiency (MPG)');
  document.getElementById('lblPrice').textContent=isM?(t.fuelPriceL||'Fuel Price (per liter)'):(t.fuelPriceG||'Fuel Price (per gallon)');
  document.getElementById('lblFuelNeeded').textContent=isM?(t.fuelNeededL||'Fuel needed (L)'):(t.fuelNeededG||'Fuel needed (gal)');
  document.getElementById('lblPerKm').textContent=isM?(t.fuelPerKm||'Cost per km'):(t.fuelPerMi||'Cost per mile');
  if(isM){document.getElementById('fuelEff').value=document.getElementById('fuelEff').dataset.metricVal||'8';document.getElementById('fuelPrice').value=document.getElementById('fuelPrice').dataset.metricVal||'1700';}
  else{document.getElementById('fuelEff').value='28';document.getElementById('fuelPrice').value='3.80';}
}
function fmtCost(n){
  const l=typeof _lang!=='undefined'?_lang:'en';
  if(l==='ko')return Math.round(n).toLocaleString('ko-KR')+'원';
  if(l==='zh')return '¥'+n.toFixed(2);
  return '$'+n.toFixed(2);
}
function calc(){
  const dist=parseFloat(document.getElementById('fuelDist').value)||0;
  const eff=parseFloat(document.getElementById('fuelEff').value)||1;
  const price=parseFloat(document.getElementById('fuelPrice').value)||0;

  let fuelNeeded,costPerUnit;
  if(_unit==='metric'){
    fuelNeeded=dist*eff/100;
    costPerUnit=dist>0?fuelNeeded*price/dist:0;
  } else {
    fuelNeeded=eff>0?dist/eff:0;
    costPerUnit=dist>0?fuelNeeded*price/dist:0;
  }
  const totalCost=fuelNeeded*price;
  const unitLabel=_unit==='metric'?' L':' gal';

  document.getElementById('rCost').textContent=fmtCost(totalCost);
  document.getElementById('rFuel').textContent=fuelNeeded.toFixed(2)+unitLabel;
  document.getElementById('rPerKm').textContent=fmtCost(costPerUnit);
  document.getElementById('rRound').textContent=fmtCost(totalCost*2);
  document.getElementById('result').style.display='block';
}
</script>

    seoHtml:'<h2>燃料費計算機とは？</h2><p>走行距離・燃費・燃料価格を入力するだけで、<strong>総燃料費</strong>・km/マイルあたりのコスト・往復予想費用を即座に計算します。メートル法（L/100km）とヤード・ポンド法（MPG）の両方に対応しており、ドライブ旅行の計画や通勤コストの把握に役立ちます。</p><details class="faq-item"><summary>燃料費の計算式は何ですか？</summary><p>メートル法：燃料(L) = 距離(km) × 燃費(L/100km) ÷ 100。費用 = 燃料(L) × 1Lあたりの価格。ヤード・ポンド法：燃料(ガロン) = 距離(マイル) ÷ MPG。費用 = 燃料(ガロン) × 1ガロンあたりの価格。</p></details><details class="faq-item"><summary>L/100kmとMPGの変換方法は？</summary><p>MPG = 235.21 ÷ L/100km という計算式を使います。例：8L/100km ≈ 29.4 MPG、6L/100km ≈ 39.2 MPG。L/100kmが低いほど、MPGが高いほど燃費が良好です。</p></details><details class="faq-item"><summary>燃費を向上させるにはどうすればよいですか？</summary><p>高速道路ではクルーズコントロールで一定速度を維持し、タイヤ空気圧を適正値に保ち（10PSI不足でMPGが約1低下）、未使用時はルーフラックを取り外し、1分以上のアイドリングを避けましょう。</p></details><details class="faq-item"><summary>往復予想費用はどのように計算されますか？</summary><p>往復費用 = 片道燃料費 × 2で計算されます。実際の費用は渋滞・地形・エアコン使用状況によって変わるため、見積もりに10–15%の余裕を持たせることをお勧めします。</p></details><details class="faq-item"><summary>電気自動車にも使えますか？</summary><p>この計算機はガソリン・ディーゼル車向けです。電気自動車はkWh/100kmや電費（km/kWh）を使用するため、別途EV専用の費用計算機をご利用ください。</p></details>',

function _detectLang(){
  const u=new URLSearchParams(location.search).get('lang');
  if(u&&_i18n[u])return u;
  const s=localStorage.getItem('lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language||'';
  if(n.startsWith('zh'))return 'zh';
  else if(n.startsWith('ja'))return 'ja';
  if(n.startsWith('ko'))return 'ko';
  return 'en';
}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;
  document.title=t.title;
  document.getElementById('langBtn').textContent=t.btn;
  const back=document.getElementById('backBtn');
  if(back)back.textContent=_lang==='ko'?'← 모두의 툴':_lang==='zh'?'← 首页':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const v=t[el.dataset.i18n];
    if(v!==undefined)el.innerHTML=v;
  });
  _updateLabels();
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){
  const idx=_langOrder.indexOf(_lang);
  _lang=_langOrder[(idx+1)%_langOrder.length];
  localStorage.setItem('lang',_lang);
  const url=new URL(location.href);
  if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}
  history.replaceState({},'',url);
  _applyLang();
}
_applyLang();
</script>
