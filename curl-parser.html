function parseCurl(raw){
  const s=raw.replace(/\\\s*\n/g,' ').replace(/\s+/g,' ').trim();
  const tokens=tokenize(s);
  const result={method:'GET',url:'',headers:{},body:'',opts:[]};
  let i=0;
  if(tokens[0]&&tokens[0].toLowerCase()==='curl')i++;
  while(i<tokens.length){
    const t=tokens[i];
    if(t==='-X'||t==='--request'){result.method=(tokens[++i]||'GET').toUpperCase();}
    else if(t==='-H'||t==='--header'){const h=tokens[++i]||'';const ci=h.indexOf(':');if(ci>-1)result.headers[h.slice(0,ci).trim()]=h.slice(ci+1).trim();}
    else if(t==='-d'||t==='--data'||t==='--data-raw'){result.body=tokens[++i]||'';}
    else if(t==='-u'||t==='--user'){const u=tokens[++i]||'';result.headers['Authorization']='Basic '+btoa(u);}
    else if(t==='-L'||t==='--location')result.opts.push('Follow Redirects');
    else if(t==='-k'||t==='--insecure')result.opts.push('Insecure (skip SSL)');
    else if(t==='-v'||t==='--verbose')result.opts.push('Verbose');
    else if(!t.startsWith('-')&&!result.url&&/^https?:\/\//.test(t.replace(/^'/,'').replace(/'$/,'')))result.url=t.replace(/^'/,'').replace(/'$/,'');
    i++;
  }
  if(!result.method&&result.body)result.method='POST';
  return result;

function tokenize(s){
  const tokens=[];let cur='',inQ=false,qCh='';
  for(const c of s){
    if(inQ){if(c===qCh)inQ=false;else cur+=c;}
    else if(c==="'"||c==='"'){inQ=true;qCh=c;}
    else if(c===' '){if(cur)tokens.push(cur);cur='';}
    else cur+=c;
  }
  if(cur)tokens.push(cur);return tokens;

  const mClass='m-'+r.method.toLowerCase();
  const hdrs=Object.entries(r.headers);
  let hdrsHtml=hdrs.length?`<table class="headers-table">${hdrs.map(([k,v])=>`<tr><td>${k}:</td><td style="color:var(--text-dim)">${v}</td></tr>`).join('')}</table>`:t.noHeaders;
  let urlObj=null;let queryHtml='';
  try{urlObj=new URL(r.url);const p=[...urlObj.searchParams.entries()];
    if(p.length)queryHtml=`<div class="result-item" style="margin-top:10px"><div class="result-key">Query Params</div><div class="result-val"><table class="headers-table">${p.map(([k,v])=>`<tr><td>${k}:</td><td style="color:var(--text-dim)">${v}</td></tr>`).join('')}</table></div></div>`;
  }catch{}
  grid.innerHTML=`
    <div class="result-item"><div class="result-key">${t.method}</div><div class="result-val"><span class="method-badge ${mClass}">${r.method}</span></div></div>
    <div class="result-item"><div class="result-key">${t.url}</div><div class="result-val">${r.url||'—'}</div></div>
    ${queryHtml}
    <div class="result-item"><div class="result-key">${t.headers}</div><div class="result-val">${hdrsHtml}</div></div>
    <div class="result-item"><div class="result-key">${t.body}</div><div class="result-val">${bodyFmt||t.noBody}</div></div>
    ${r.opts.length?`<div class="result-item"><div class="result-key">${t.options}</div><div class="result-val">${r.opts.join(', ')}</div></div>`:''}
  `;
}
function clearAll(){document.getElementById('curlIn').value='';document.getElementById('resultGrid').innerHTML='';}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
