header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:10px;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}

.sub{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6;}

.tbtn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}

.tbtn.primary:hover{opacity:.85;}
.sep{width:1px;height:20px;background:var(--border);}
.opt-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}

@media(max-width:650px){.editor-row{grid-template-columns:1fr;}}
.editor-wrap{display:flex;flex-direction:column;gap:6px;}
.editor-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:.08em;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;resize:none;line-height:1.7;min-height:380px;}

.output-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:13px;line-height:1.7;min-height:380px;overflow:auto;white-space:pre-wrap;word-break:break-word;cursor:pointer;}
.output-box:hover{border-color:var(--accent);}
.kw{color:var(--kw);font-weight:700;}
.fn{color:var(--fn);}
.str{color:var(--str);}
.num{color:var(--num);}
.cmt{color:var(--cmt);font-style:italic;}
.op{color:var(--text-muted);}
.copied-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 24px;border-radius:20px;font-family:'DM Mono',monospace;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;}
.copied-toast.show{opacity:1;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}

.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<script>
const _i18n={
  ko:{sub:'SQL 쿼리 자동 정렬 · 들여쓰기 · 키워드 강조',langBtn:'🌐 EN',backBtn:'← 모두의 툴',fmtBtn:'▶ 포맷',minBtn:'압축',clearBtn:'초기화',kwCaseLabel:'키워드',indentLabel:'들여쓰기',copyBtn:'복사',inputLabel:'INPUT SQL',outputLabel:'FORMATTED OUTPUT',seoHtml:'<h2>SQL Formatter 사용법</h2><p>SQL Formatter는 들여쓰기, 키워드 대문자화, 줄바꿈 정렬을 통해 읽기 어려운 SQL 쿼리를 깔끔하게 정리해 줍니다. SELECT, JOIN, WHERE, GROUP BY 등 주요 절마다 자동으로 줄바꿈을 적용합니다.</p><details class="faq-item"><summary>MySQL, PostgreSQL 등 모든 SQL 방언을 지원하나요?</summary><p>이 도구는 표준 SQL 키워드 기반으로 동작하므로 MySQL, PostgreSQL, SQLite, MSSQL 등 대부분의 방언과 호환됩니다. 방언별 고유 문법(예: PostgreSQL의 ::\)은 일부 지원되지 않을 수 있습니다.</p></details><details class="faq-item"><summary>압축(Minify) 기능은 어떻게 사용하나요?</summary><p>압축 모드는 불필요한 공백과 줄바꿈을 제거하여 SQL을 한 줄로 만들어 줍니다. URL 파라미터나 API 요청에 SQL을 삽입할 때 유용합니다.</p></details><details class="faq-item"><summary>서브쿼리나 CTE도 올바르게 포맷되나요?</summary><p>네, 중첩된 서브쿼리와 WITH(CTE) 구문도 들여쓰기 레벨에 맞게 자동 정렬됩니다. 복잡한 쿼리일수록 포맷 전후의 가독성 차이가 크게 납니다.</p></details><details class="faq-item"><summary>키워드를 대문자로만 써야 하나요?</summary><p>SQL 키워드는 대소문자를 구분하지 않아 select, SELECT 모두 유효합니다. 다만 팀 컨벤션이나 가독성을 위해 키워드는 대문자, 컬럼·테이블명은 소문자로 쓰는 것이 일반적입니다.</p></details><details class="faq-item"><summary>포맷된 SQL이 서버에 저장되나요?</summary><p>아니요. 모든 처리는 브라우저 내에서만 이루어지며 입력한 SQL은 서버로 전송되지 않습니다. 민감한 쿼리도 안심하고 사용할 수 있습니다.</p></details>',footer:'SQL Formatter · 브라우저에서 처리',toastMsg:'복사되었습니다!'},
  en:{sub:'Auto-format SQL queries · Indent · Keyword highlight',langBtn:'🌐 中文',backBtn:'← All Tools',fmtBtn:'▶ Format',minBtn:'Minify',clearBtn:'Clear',kwCaseLabel:'Keywords',indentLabel:'Indent',copyBtn:'Copy',inputLabel:'INPUT SQL',outputLabel:'FORMATTED OUTPUT',seoHtml:'<h2>How to Use the SQL Formatter</h2><p>SQL Formatter automatically indents SQL queries, capitalizes keywords, and adds line breaks for major clauses like SELECT, JOIN, WHERE, and GROUP BY — turning messy one-liners into clean, readable code. All processing runs in your browser.</p><details class="faq-item"><summary>Does it support MySQL, PostgreSQL, and other SQL dialects?</summary><p>The formatter works with standard SQL keywords and is compatible with MySQL, PostgreSQL, SQLite, MSSQL, and most other dialects. Some dialect-specific syntax (e.g., PostgreSQL\'s :: cast notation) may not be fully handled.</p></details><details class="faq-item"><summary>What does the Minify mode do?</summary><p>Minify mode strips all extra whitespace and newlines, collapsing your SQL into a single line. This is useful when embedding SQL in URLs, API requests, or configuration files where compact formatting is required.</p></details><details class="faq-item"><summary>Does it handle subqueries and CTEs correctly?</summary><p>Yes — nested subqueries and WITH (CTE) clauses are indented according to their nesting level. Complex queries benefit the most from formatting, as structure becomes immediately visible.</p></details><details class="faq-item"><summary>Do SQL keywords have to be uppercase?</summary><p>No — SQL keywords are case-insensitive, so select and SELECT are both valid. However, it is common convention to write keywords in uppercase and column/table names in lowercase for readability and team consistency.</p></details><details class="faq-item"><summary>Is my SQL sent to any server?</summary><p>No. All formatting runs entirely in your browser using JavaScript. Your SQL is never uploaded or stored anywhere, so it is safe to use with sensitive or proprietary queries.</p></details>',footer:'SQL Formatter · All processing in browser',toastMsg:'Copied!'},
  zh:{sub:'自动格式化SQL · 缩进 · 关键字高亮',langBtn:'🌐 日本語',backBtn:'← 所有工具',fmtBtn:'▶ 格式化',minBtn:'压缩',clearBtn:'清空',kwCaseLabel:'关键字',indentLabel:'缩进',copyBtn:'复制',inputLabel:'输入SQL',outputLabel:'格式化输出',seoHtml:'<h2>SQL格式化工具使用指南</h2><p>SQL格式化工具可自动缩进SQL查询、大写关键字，并为SELECT、JOIN、WHERE、GROUP BY等主要语句添加换行，将杂乱的SQL整理为清晰易读的代码。所有处理均在浏览器本地完成。</p><details class="faq-item"><summary>支持MySQL、PostgreSQL等SQL方言吗？</summary><p>本工具基于标准SQL关键字工作，兼容MySQL、PostgreSQL、SQLite、MSSQL等大多数数据库方言。部分方言特有语法（如PostgreSQL的::类型转换）可能不完全支持。</p></details><details class="faq-item"><summary>压缩（Minify）功能有什么用？</summary><p>压缩模式会删除多余的空格和换行符，将SQL压缩为单行。适用于在URL参数、API请求或配置文件中嵌入SQL的场景。</p></details><details class="faq-item"><summary>能正确格式化子查询和CTE吗？</summary><p>可以，嵌套子查询和WITH（CTE）语句会按照嵌套层级自动缩进。查询越复杂，格式化前后的可读性差异越明显。</p></details><details class="faq-item"><summary>SQL关键字必须大写吗？</summary><p>不必须。SQL关键字不区分大小写，select和SELECT均有效。但通常约定关键字大写、表名和列名小写，以提高可读性和团队代码一致性。</p></details><details class="faq-item"><summary>我的SQL会被上传到服务器吗？</summary><p>不会。所有格式化操作完全在浏览器中通过JavaScript完成，您输入的SQL不会被上传或存储，可以放心使用敏感或专有查询。</p></details>',footer:'SQL格式化 · 全本地处理',toastMsg:'已复制！'},
  ja:{sub:'SQLクエリの自動フォーマット · インデント · キーワードハイライト',langBtn:'🌐 한국어',backBtn:'← ホーム',fmtBtn:'▶ フォーマット',minBtn:'圧縮',clearBtn:'クリア',kwCaseLabel:'キーワード',indentLabel:'インデント',copyBtn:'コピー',inputLabel:'入力SQL',outputLabel:'フォーマット出力',seoHtml:'<h2>SQLフォーマッターの使い方</h2><p>SQLフォーマッターはSQLクエリを自動的にインデントし、キーワードを大文字に整え、SELECT・JOIN・WHERE・GROUP BYなどの主要節に改行を加えて読みやすく整形します。すべての処理はブラウザ内で完結します。</p><details class="faq-item"><summary>MySQL、PostgreSQLなど各SQL方言に対応していますか？</summary><p>標準SQLキーワードをベースに動作するため、MySQL・PostgreSQL・SQLite・MSSQLなど主要な方言と互換性があります。PostgreSQLの::キャスト記法など、方言固有の構文は一部対応していない場合があります。</p></details><details class="faq-item"><summary>圧縮（Minify）モードはどんな時に使いますか？</summary><p>圧縮モードは余分なスペースと改行を削除してSQLを1行にまとめます。URLパラメータ・APIリクエスト・設定ファイルにSQLを埋め込む際に便利です。</p></details><details class="faq-item"><summary>サブクエリやCTEは正しくフォーマットされますか？</summary><p>はい、ネストされたサブクエリやWITH（CTE）句もネスト深度に合わせて自動インデントされます。複雑なクエリほどフォーマット前後の可読性の差が大きくなります。</p></details><details class="faq-item"><summary>SQLキーワードは大文字でなければなりませんか？</summary><p>いいえ。SQLキーワードは大文字・小文字を区別しないため、selectもSELECTも有効です。ただし、可読性とチームの一貫性のためにキーワードは大文字、テーブル・カラム名は小文字とする慣習が一般的です。</p></details><details class="faq-item"><summary>入力したSQLはサーバーに送信されますか？</summary><p>送信されません。すべての処理はブラウザ内のJavaScriptで完結しており、入力したSQLがアップロードまたは保存されることはありません。機密クエリでも安心してご利用いただけます。</p></details>',footer:'SQLフォーマッター · すべてブラウザで処理',toastMsg:'コピーしました！'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

const KEYWORDS = ['SELECT','DISTINCT','FROM','WHERE','AND','OR','NOT','IN','BETWEEN','LIKE','IS','NULL','JOIN','INNER JOIN','LEFT JOIN','RIGHT JOIN','FULL JOIN','FULL OUTER JOIN','LEFT OUTER JOIN','RIGHT OUTER JOIN','CROSS JOIN','ON','AS','GROUP BY','ORDER BY','HAVING','LIMIT','OFFSET','UNION','UNION ALL','INTERSECT','EXCEPT','INSERT INTO','INSERT','VALUES','UPDATE','SET','DELETE FROM','DELETE','CREATE TABLE','CREATE','DROP TABLE','DROP','ALTER TABLE','ALTER','ADD','MODIFY','COLUMN','PRIMARY KEY','FOREIGN KEY','REFERENCES','INDEX','UNIQUE','DEFAULT','NOT NULL','AUTO_INCREMENT','CONSTRAINT','CASE','WHEN','THEN','ELSE','END','EXISTS','ALL','ANY','SOME','WITH','RECURSIVE','RETURNING'];
const NEWLINE_BEFORE = new Set(['SELECT','FROM','WHERE','GROUP BY','ORDER BY','HAVING','LIMIT','OFFSET','UNION','UNION ALL','INTERSECT','EXCEPT','INNER JOIN','LEFT JOIN','RIGHT JOIN','FULL JOIN','FULL OUTER JOIN','LEFT OUTER JOIN','RIGHT OUTER JOIN','CROSS JOIN','JOIN','ON','VALUES','SET','INSERT INTO','DELETE FROM','CREATE TABLE','DROP TABLE','ALTER TABLE','WITH','RETURNING']);
const INDENT_AFTER = new Set(['SELECT','FROM','WHERE','ON','SET','VALUES','HAVING','GROUP BY','ORDER BY','LIMIT']);

function getIndent(){const v=document.getElementById('indentSize').value;return v==='tab'?'\t':' '.repeat(parseInt(v));}
function kwCase(w){const c=document.getElementById('kwCase').value;if(c==='upper')return w.toUpperCase();if(c==='lower')return w.toLowerCase();return w;}

function tokenize(sql){
  const tokens=[];
  let i=0;
  while(i<sql.length){
    if(sql[i]==="'"||sql[i]==='"'||sql[i]==='`'){
      const q=sql[i]; let j=i+1;
      while(j<sql.length&&(sql[j]!==q||sql[j-1]==='\\'))j++;
      tokens.push({type:'string',val:sql.slice(i,j+1)});i=j+1;continue;
    }
    if(sql.slice(i,i+2)==='--'){let j=i;while(j<sql.length&&sql[j]!=='\n')j++;tokens.push({type:'comment',val:sql.slice(i,j)});i=j;continue;}
    if(sql.slice(i,i+2)==='/*'){let j=sql.indexOf('*/',i+2);j=j===-1?sql.length:j+2;tokens.push({type:'comment',val:sql.slice(i,j)});i=j;continue;}
    if(/\s/.test(sql[i])){let j=i;while(j<sql.length&&/\s/.test(sql[j]))j++;tokens.push({type:'ws',val:sql.slice(i,j)});i=j;continue;}
    if(/[a-zA-Z_]/.test(sql[i])){let j=i;while(j<sql.length&&/[\w]/.test(sql[j]))j++;tokens.push({type:'word',val:sql.slice(i,j)});i=j;continue;}
    if(/[0-9]/.test(sql[i])||(sql[i]==='.'&&/[0-9]/.test(sql[i+1]||''))){let j=i;while(j<sql.length&&/[0-9.]/.test(sql[j]))j++;tokens.push({type:'number',val:sql.slice(i,j)});i=j;continue;}
    tokens.push({type:'op',val:sql[i]});i++;
  }
  return tokens;
}

function formatSQL(sql){
  const indent=getIndent();
  const tokens=tokenize(sql);
  let out='',depth=0,newline=false;
  for(let i=0;i<tokens.length;i++){
    const tk=tokens[i];
    if(tk.type==='ws') continue;
    if(tk.type==='comment'){out+=(out&&!out.endsWith('\n')?'\n':'')+indent.repeat(depth)+tk.val+'\n';continue;}
    if(tk.type==='string'){out+=tk.val;continue;}
    if(tk.type==='number'){out+=tk.val;continue;}
    if(tk.type==='op'){
      if(tk.val==='('){
        const peek=tokens.slice(i+1).find(t=>t.type!=='ws');
        if(peek&&peek.type==='word'&&KEYWORDS.includes(peek.val.toUpperCase())){
          out+='(\n'+indent.repeat(depth+1);depth++;
        } else { out+='('; }
        continue;
      }
      if(tk.val===')'){if(depth>0){depth--;out+='\n'+indent.repeat(depth)+')';}else out+=')';continue;}
      if(tk.val===','){out+=',\n'+indent.repeat(depth);continue;}
      if(tk.val===';'){out+=';\n';continue;}
      out+=tk.val; continue;
    }
    const up=tk.val.toUpperCase();
    let matched='';
    for(const kw of KEYWORDS.sort((a,b)=>b.length-a.length)){
      const kwParts=kw.split(' ');
      let match=true;
      for(let k=0;k<kwParts.length;k++){
        const t=tokens[i+k];
        if(!t||t.type==='ws'){const nxt=tokens[i+k+1];if(!nxt||nxt.val.toUpperCase()!==kwParts[k]){match=false;break;}}
        else if(t.type==='word'&&t.val.toUpperCase()!==kwParts[k]){match=false;break;}
        else if(t.type!=='word'){match=false;break;}
      }
      if(match&&kwParts.length>1){matched=kw;break;}
    }
    if(!matched&&KEYWORDS.includes(up)) matched=up;
    if(matched){
      const parts=matched.split(' ');
      if(NEWLINE_BEFORE.has(matched)){
        if(out&&!out.endsWith('\n'))out+='\n';
        out+=indent.repeat(depth)+kwCase(matched);
        i+=parts.length-1;
        out+=' ';
      } else if(matched==='AND'||matched==='OR'){
        out+='\n'+indent.repeat(depth)+kwCase(matched)+' ';
      } else {
        out+=kwCase(matched)+' ';
      }
    } else {
      if(out.endsWith('\n')) out+=indent.repeat(depth);
      out+=tk.val+' ';
    }
  }
  return out.replace(/ +\n/g,'\n').replace(/\n{3,}/g,'\n\n').replace(/\s+$/,'');
}

function highlight(sql){
  return sql.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/'[^']*'/g,m=>`<span class="str">${m}</span>`)
    .replace(/"[^"]*"/g,m=>`<span class="str">${m}</span>`)
    .replace(/`[^`]*`/g,m=>`<span class="str">${m}</span>`)
    .replace(/--[^\n]*/g,m=>`<span class="cmt">${m}</span>`)
    .replace(/\b(\d+(\.\d+)?)\b/g,'<span class="num">$1</span>')
    .replace(/\b(SELECT|DISTINCT|FROM|WHERE|AND|OR|NOT|IN|BETWEEN|LIKE|IS|NULL|JOIN|INNER|LEFT|RIGHT|FULL|OUTER|CROSS|ON|AS|GROUP BY|ORDER BY|HAVING|LIMIT|OFFSET|UNION|ALL|INTERSECT|EXCEPT|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|TABLE|DROP|ALTER|ADD|MODIFY|COLUMN|PRIMARY|FOREIGN|KEY|REFERENCES|INDEX|UNIQUE|DEFAULT|AUTO_INCREMENT|CONSTRAINT|CASE|WHEN|THEN|ELSE|END|EXISTS|ANY|SOME|WITH|RECURSIVE|RETURNING)\b/gi,
      m=>`<span class="kw">${m}</span>`)
    .replace(/\b(COUNT|SUM|AVG|MAX|MIN|COALESCE|IFNULL|NULLIF|CAST|CONVERT|NOW|CURDATE|DATE|YEAR|MONTH|DAY|CONCAT|SUBSTRING|LENGTH|UPPER|LOWER|TRIM|ROUND|FLOOR|CEIL|ABS|MOD|RAND|ROW_NUMBER|RANK|DENSE_RANK|LAG|LEAD|OVER|PARTITION)\b/gi,
      m=>`<span class="fn">${m}</span>`);
}

let _debounce;
function liveFormat(){clearTimeout(_debounce);_debounce=setTimeout(format,300);}

function format(){
  const sql=document.getElementById('sqlInput').value.trim();
  if(!sql){document.getElementById('sqlOutput').innerHTML='';return;}
  const formatted=formatSQL(sql);
  document.getElementById('sqlOutput').innerHTML=highlight(formatted);
  document.getElementById('sqlOutput')._plain=formatted;
}

function minify(){
  const sql=document.getElementById('sqlInput').value;
  const minified=sql.replace(/\s+/g,' ').trim();
  document.getElementById('sqlOutput').innerHTML=highlight(minified);
  document.getElementById('sqlOutput')._plain=minified;
}

function clearAll(){document.getElementById('sqlInput').value='';document.getElementById('sqlOutput').innerHTML='';}

function copyOutput(){
  const el=document.getElementById('sqlOutput');
  const text=el._plain||el.textContent;
  if(!text)return;
  navigator.clipboard?.writeText(text).then(showToast).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();});
}
function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}

_lang=detectLang();applyLang();
