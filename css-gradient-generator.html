function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblPreview','lblType','lblAngle','lblShape','lblRepeating','lblStops','btnAddStop','btnCopyBg','btnCopyBi'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function setType(type){_type=type;['L','R','C'].forEach((k,i)=>document.getElementById('tab'+k).classList.toggle('active',['linear','radial','conic'][i]===type));document.getElementById('angleOpts').style.display=type==='radial'?'none':'block';document.getElementById('radialOpts').style.display=type==='radial'?'block':'none';update();}
function buildGrad(){
  const rep=document.getElementById('repeating').checked;const pre=rep?'repeating-':'';
  const stopsStr=stops.map(s=>`${s.c} ${s.p}%`).join(', ');
  if(_type==='linear'){const a=document.getElementById('angle').value;return`${pre}linear-gradient(${a}deg, ${stopsStr})`;}
  if(_type==='radial'){const sh=document.getElementById('radShape').value;return`${pre}radial-gradient(${sh} at center, ${stopsStr})`;}
  if(_type==='conic'){const a=document.getElementById('angle').value;return`${pre}conic-gradient(from ${a}deg, ${stopsStr})`;}
}
function update(){
  const grad=buildGrad();
  document.getElementById('preview').style.background=grad;
  renderStopBar(grad);
  document.getElementById('codeDisplay').textContent=`background: ${grad};`;
}
function renderStopBar(grad){
  const bar=document.getElementById('stopBar');bar.style.background=`linear-gradient(90deg, ${stops.map(s=>`${s.c} ${s.p}%`).join(', ')})`;
  bar.innerHTML='';
  stops.forEach((s,i)=>{
    const h=document.createElement('div');h.className='stop-handle';h.style.cssText=`left:${s.p}%;background:${s.c};`;
    let dragging=false;
    h.addEventListener('mousedown',e=>{dragging=true;e.preventDefault();});
    window.addEventListener('mousemove',e=>{if(!dragging)return;const rect=bar.getBoundingClientRect();const p=Math.max(0,Math.min(100,((e.clientX-rect.left)/rect.width)*100));stops[i].p=Math.round(p);renderStops();update();});
    window.addEventListener('mouseup',()=>{dragging=false;});
    bar.appendChild(h);
  });
}
function renderStops(){
  const con=document.getElementById('stopsContainer');con.innerHTML='';
  stops.forEach((s,i)=>{
    const row=document.createElement('div');row.className='stop-row';
    const col=document.createElement('input');col.type='color';col.className='stop-color-input';col.value=s.c;col.oninput=()=>{stops[i].c=col.value;update();};
    const pos=document.createElement('input');pos.type='number';pos.className='stop-pos-input';pos.value=s.p;pos.min=0;pos.max=100;pos.oninput=()=>{stops[i].p=+pos.value;update();};
    const del=document.createElement('button');del.className='stop-del';del.textContent='×';del.onclick=()=>{if(stops.length>2)stops.splice(i,1);renderStops();update();};
    const num=document.createElement('span');num.className='stop-num';num.textContent=i+1+'.';
    row.append(num,col,pos,del);con.appendChild(row);
  });
}
function addStop(){stops.push({c:'#ffffff',p:Math.min(stops[stops.length-1].p+15,100)});renderStops();update();}
function copyBg(){copy(`background: ${buildGrad()};`);}
function copyBi(){copy(`background-image: ${buildGrad()};`);}
function copy(txt){navigator.clipboard.writeText(txt).catch(()=>{});const t=_i18n[_lang];const d=document.getElementById('codeDisplay');const orig=d.textContent;d.textContent=t.copied;setTimeout(()=>{d.textContent=`background: ${buildGrad()};`;},1200);}
_lang=detectLang();applyLang();renderStops();update();
