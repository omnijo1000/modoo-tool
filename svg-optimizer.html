<details class="faq-item"><summary>なぜSVGを最適化するのですか？</summary><p>エディタからエクスポートされたSVGには不要なメタデータ、コメント、空グループが含まれており、削除するとファイルサイズが20〜70%削減されます。</p></details>
<details class="faq-item"><summary>最適化でSVGが壊れませんか？</summary><p>視覚的レンダリングに影響しない要素のみを削除します。プレビューで最適化前後を比較できます。</p></details>
<details class="faq-item"><summary>何が削除されますか？</summary><p>XMLコメント、メタデータ、DOCTYPE宣言、XML宣言、空グループ、非表示要素、不要な空白。</p></details>
<details class="faq-item"><summary>どのくらいサイズが削減できますか？</summary><p>通常20〜70%。メタデータが多いInkscapeファイルで最も効果的です。</p></details>
<details class="faq-item"><summary>最適化オプションを個別に選択できますか？</summary><p>はい、チェックボックスで適用する最適化を選択できます。</p></details>
<details class="faq-item"><summary>SVGコードを直接貼り付けられますか？</summary><p>はい、入力エリアにSVGコードを貼り付けて最適化ボタンをクリックしてください。</p></details>
<details class="faq-item"><summary>SVG Cleanerとの違いは？</summary><p>SVG Optimizerはサイズ最適化に集中し、SVG Cleanerはエディタ固有の要素のクリーニングに特化しています。</p></details>
<details class="faq-item"><summary>最適化されたSVGの使い方は？</summary><p>コピーボタンでクリップボードにコピーするか、ダウンロードボタンでファイルとして保存してください。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','dropText','dropHint','btnOpt','btnCopy','btnDl','btnClear','lblInput','lblOutput'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  renderOpts();
}
function renderOpts(){
  const t=_i18n[_lang];const grid=document.getElementById('optsGrid');grid.innerHTML='';
  OPTS.forEach(o=>{
    const label=o[_lang]||o.ko;
    const div=document.createElement('label');div.className='opt-item';
    div.innerHTML=`<input type="checkbox" ${optState[o.key]?'checked':''}><span class="opt-label">${label}</span>`;
    div.querySelector('input').addEventListener('change',e=>optState[o.key]=e.target.checked);
    grid.appendChild(div);
  });
}
function optimizeSvg(svg){
  let s=svg;
  if(optState.removeComments)s=s.replace(/<!--[\s\S]*?-->/g,'');
  if(optState.removeDoctype)s=s.replace(/<!DOCTYPE[^>]*>/gi,'');
  if(optState.removeXmlDecl)s=s.replace(/<\?xml[^?]*\?>/gi,'');
  if(optState.removeMetadata)s=s.replace(/<metadata[\s\S]*?<\/metadata>/gi,'').replace(/<sodipodi:[^/]*\/>/gi,'').replace(/<sodipodi:[\s\S]*?<\/sodipodi:[^>]*>/gi,'').replace(/<inkscape:[^/]*\/>/gi,'').replace(/<inkscape:[\s\S]*?<\/inkscape:[^>]*>/gi,'').replace(/xmlns:inkscape="[^"]*"/g,'').replace(/xmlns:sodipodi="[^"]*"/g,'').replace(/inkscape:[a-z-]+=("[^"]*"|'[^']*')/g,'').replace(/sodipodi:[a-z-]+=("[^"]*"|'[^']*')/g,'');
  if(optState.removeEmptyGroups)s=s.replace(/<g[^>]*>\s*<\/g>/g,'');
  if(optState.removeHidden)s=s.replace(/<[^>]+(?:display="none"|visibility="hidden")[^>]*(?:\/>|>[\s\S]*?<\/[^>]+>)/g,'');
  if(optState.removeDefaultAttrs){s=s.replace(/\s*fill="black"/g,'').replace(/\s*fill="none"\s+fill="none"/g,' fill="none"').replace(/\s*stroke="none"/g,'').replace(/\s*opacity="1"/g,'').replace(/\s*fill-opacity="1"/g,'').replace(/\s*stroke-opacity="1"/g,'');}
  if(optState.collapseWhitespace){s=s.replace(/\s+/g,' ').replace(/> </g,'><').replace(/\n\s*/g,'').trim();}
  return s;
}
function optimize(){
  const inp=document.getElementById('inputSvg').value.trim();
  if(!inp)return;
  const out=optimizeSvg(inp);
  document.getElementById('outputSvg').value=out;
  const t=_i18n[_lang];const inSz=new Blob([inp]).size;const outSz=new Blob([out]).size;
  const saved=inSz-outSz;const pct=((saved/inSz)*100).toFixed(1);
  document.getElementById('statBefore').innerHTML=`${t.before}: <span>${fmt(inSz)}</span>`;
  document.getElementById('statAfter').innerHTML=`${t.after}: <span>${fmt(outSz)}</span>`;
  document.getElementById('statSaved').innerHTML=`${t.saved}: <span>${fmt(saved)} (${pct}%)</span>`;
  document.getElementById('statsBar').style.display='flex';
  document.getElementById('infoSizeIn').textContent=fmt(inSz);
  document.getElementById('infoSizeOut').textContent=fmt(outSz);
  document.getElementById('prevBefore').innerHTML=inp;
  document.getElementById('prevAfter').innerHTML=out;
  document.getElementById('previewRow').style.display='grid';
}
function fmt(b){return b>1024?`${(b/1024).toFixed(1)}KB`:`${b}B`;}
function updateInSize(){const v=document.getElementById('inputSvg').value;document.getElementById('infoSizeIn').textContent=fmt(new Blob([v]).size);}
function copyOut(){const v=document.getElementById('outputSvg').value;if(v)navigator.clipboard.writeText(v);}
function downloadOut(){
  const v=document.getElementById('outputSvg').value;if(!v)return;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([v],{type:'image/svg+xml'}));a.download='optimized.svg';a.click();
}
function clearAll(){document.getElementById('inputSvg').value='';document.getElementById('outputSvg').value='';document.getElementById('statsBar').style.display='none';document.getElementById('previewRow').style.display='none';document.getElementById('infoSizeIn').textContent='';document.getElementById('infoSizeOut').textContent='';}
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)loadFile(f);});
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});
function loadFile(f){const r=new FileReader();r.onload=e=>{document.getElementById('inputSvg').value=e.target.result;updateInSize();};r.readAsText(f);}
_lang=detectLang();applyLang();
</script>
