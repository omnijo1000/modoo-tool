body{background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif;min-height:100vh;}
header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
main{max-width:720px;margin:0 auto;padding:48px 24px;}
h1{font-size:28px;font-weight:900;margin-bottom:8px;}
h1 span{color:var(--accent);}
.subtitle{font-size:13px;color:var(--text-muted);margin-bottom:28px;line-height:1.6;}
.options-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.opt-label{font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:6px;cursor:pointer;}
.opt-label input{accent-color:var(--accent);}
.mode-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.mode-btn{background:#111;border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans',sans-serif;transition:all 0.15s;}
.mode-btn:hover{border-color:var(--accent);color:var(--accent);}
.mode-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;color:var(--text);font-size:14px;font-family:'DM Mono',monospace;line-height:1.8;outline:none;resize:vertical;min-height:180px;transition:border-color 0.2s;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--text-dim);}
.col-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.col-label{font-size:11px;color:var(--text-dim);margin-bottom:6px;font-family:'DM Mono',monospace;letter-spacing:0.08em;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.tool-btn{background:#111;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans',sans-serif;transition:all 0.15s;}

.tool-btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}

.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
.seo strong{color:var(--text-muted);}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:48px;padding:24px;}

<body>
<header>
  <div class="dot"></div>
  <span class="header-label">MODOO HUB</span>
  <a href="index.html" class="back-link">← 모두의 툴</a>

</header>
<main>
  <h1>Alpha<span>betizer</span></h1>
  <p class="subtitle" data-i18n="sub">Sort your text lines alphabetically in ascending or descending order.</p>

  <div class="mode-row">
    <button class="mode-btn active" id="modeAZ" onclick="setMode('az')" data-i18n="modeAZ">A → Z</button>
    <button class="mode-btn" id="modeZA" onclick="setMode('za')" data-i18n="modeZA">Z → A</button>
  </div>

  <div class="options-row">
    <label class="opt-label"><input type="checkbox" id="optCI" checked> <span data-i18n="optCI">Case-insensitive</span></label>
    <label class="opt-label"><input type="checkbox" id="optDeDup"> <span data-i18n="optDeDup">Remove duplicates</span></label>
    <label class="opt-label"><input type="checkbox" id="optTrim" checked> <span data-i18n="optTrim">Trim lines</span></label>
  </div>

  <div class="col-wrap">
    <div>
      <div class="col-label" data-i18n="labelInput">INPUT</div>
      <textarea id="inputArea" placeholder="Paste lines here, one per line..."></textarea>
    </div>
    <div>
      <div class="col-label" data-i18n="labelOutput">OUTPUT</div>
      <textarea id="outputArea" placeholder="Sorted lines will appear here..." readonly></textarea>
    </div>
  </div>

  <div class="toolbar">
    <button class="tool-btn primary" onclick="doSort()" data-i18n="btnSort">Sort</button>
    <button class="tool-btn" onclick="copyOutput()" data-i18n="btnCopy">📋 Copy</button>
    <button class="tool-btn" onclick="clearAll()" data-i18n="btnClear">🗑 Clear</button>
  </div>

  <div class="seo">
    <h2 id="seoTitle1"></h2>
    <p id="seoBody1"></p>
    <p id="seoFaq1"></p>
    <p id="seoFaq2"></p>
  </div>
  <footer>© 2026 MODOO HUB · Free · <a href="privacy.html" style="color:var(--text-dim);text-decoration:none;">Privacy Policy</a></footer>
</main>
<script>
let _mode='az';
function setMode(m){_mode=m;document.getElementById('modeAZ').classList.toggle('active',m==='az');document.getElementById('modeZA').classList.toggle('active',m==='za');}
function doSort(){
  const input=document.getElementById('inputArea').value;
  const ci=document.getElementById('optCI').checked;
  const dedup=document.getElementById('optDeDup').checked;
  const trim=document.getElementById('optTrim').checked;
  let lines=input.split('\n');
  if(trim)lines=lines.map(l=>l.trim());
  if(dedup){const seen=new Set();lines=lines.filter(l=>{const k=ci?l.toLowerCase():l;if(seen.has(k))return false;seen.add(k);return true;});}
  lines.sort((a,b)=>{const ka=ci?a.toLowerCase():a;const kb=ci?b.toLowerCase():b;return ka.localeCompare(kb);});
  if(_mode==='za')lines.reverse();
  document.getElementById('outputArea').value=lines.join('\n');
}
function copyOutput(){const v=document.getElementById('outputArea').value;if(v)navigator.clipboard.writeText(v);}
function clearAll(){document.getElementById('inputArea').value='';document.getElementById('outputArea').value='';}
</script>
<script>

    labelInput:'입력',labelOutput:'출력',btnSort:'정렬',btnCopy:'📋 복사',btnClear:'🗑 지우기',

    labelInput:'入力',labelOutput:'出力',btnSort:'並び替え',btnCopy:'📋 コピー',btnClear:'🗑 クリア',

    seoFaq2:'<strong>Q. 並び替えと同時に重複行を削除できますか？</strong><br>はい。「重複を削除」オプションにチェックを入れると、並び替えと同時に重複行を削除します。'}
};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
  ['seoTitle1','seoBody1','seoFaq1','seoFaq2'].forEach(id=>{const el=document.getElementById(id);if(el&&t[id]!==undefined)el.innerHTML=t[id];});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
