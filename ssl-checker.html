<script>
function normalizeDomain(raw) {
  return raw.trim().replace(/^https?:\/\//i,'').replace(/\/.*$/,'').replace(/:\d+$/,'').toLowerCase();
}

async function checkSsl(domain) {
  const r = await fetch(`https://crt.sh/?q=${encodeURIComponent(domain)}&output=json`);
  if (!r.ok) throw new Error('NETWORK');
  const certs = await r.json();
  if (!certs || certs.length === 0) throw new Error('NOT_FOUND');
  // Sort by not_after descending — get most recent valid cert
  const sorted = certs.sort((a, b) => new Date(b.not_after) - new Date(a.not_after));
  const latest = sorted[0];
  const dnsNames = (latest.name_value || '').split(/\n|,/).map(s => s.trim()).filter(s => s && !s.startsWith('*') === false || s).filter(Boolean);
  // Get unique SANs
  const allNames = [...new Set(
    certs.slice(0, 5).flatMap(c => (c.name_value || '').split(/\n|,/).map(s => s.trim()).filter(Boolean))
  )].slice(0, 30);
  return {
    commonName: latest.common_name || latest.name_value?.split('\n')[0] || domain,
    issuer: latest.issuer_name || '—',
    notBefore: latest.not_before,
    notAfter: latest.not_after,
    dnsNames: allNames,
    serial: latest.serial_number || '',
    id: latest.id
  };
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  return Math.ceil((d - Date.now()) / 86400000);
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toISOString().split('T')[0];
}

function showLoading(show) {
  document.getElementById('loadingDiv').classList.toggle('hidden', !show);
}

function showError(msg) {
  const el = document.getElementById('errorDiv');
  el.textContent = msg;
  el.classList.remove('hidden');
  document.getElementById('resultsSection').classList.add('hidden');
}

function hideError() {
  document.getElementById('errorDiv').classList.add('hidden');
}

function renderResults(info) {
  const t = _i18n[currentLang] || _i18n.ko;
  const days = daysUntil(info.notAfter);
  const now = new Date();
  const expiry = new Date(info.notAfter);
  const isExpired = expiry < now;

  // Status banner
  const banner = document.getElementById('statusBanner');
  let bannerClass, iconText, labelClass, labelText, pillClass = '', pillText = '';
  if (isExpired) {
    bannerClass = 'status-expired'; iconText = '✗'; labelClass = 'status-label-expired';
    labelText = t.labelExpiredCert || 'Expired';
    pillClass = 'pill-red'; pillText = `${Math.abs(days)}d ${t.ago || 'ago'}`;
  } else if (days < 30) {
    bannerClass = 'status-warn'; iconText = '⚠'; labelClass = 'status-label-warn';
    labelText = t.labelValidCert || 'Valid';
    pillClass = 'pill-red'; pillText = `${days}d ${t.left || 'left'}`;
  } else if (days < 90) {
    bannerClass = 'status-warn'; iconText = '✓'; labelClass = 'status-label-warn';
    labelText = t.labelValidCert || 'Valid';
    pillClass = 'pill-yellow'; pillText = `${days}d ${t.left || 'left'}`;
  } else {
    bannerClass = 'status-valid'; iconText = '✓'; labelClass = 'status-label-valid';
    labelText = t.labelValidCert || 'Valid';
    pillClass = 'pill-green'; pillText = `${days}d ${t.left || 'left'}`;
  }
  banner.className = `status-banner ${bannerClass}`;
  banner.innerHTML = `<div class="status-icon">${iconText}</div><div class="status-text"><span class="status-label ${labelClass}">${labelText}</span><span class="days-pill ${pillClass}">${pillText}</span></div>`;

  // Extract issuer CN
  const issuerMatch = info.issuer.match(/CN=([^,]+)/);
  const issuerCn = issuerMatch ? issuerMatch[1] : info.issuer;

  document.getElementById('infoGrid').innerHTML = `
    <div class="info-card">
      <div class="info-label" data-i18n-text="labelCn">${t.labelCn || 'Common Name'}</div>
      <div class="info-value">${escHtml(info.commonName)}</div>
    </div>
    <div class="info-card">
      <div class="info-label">${t.labelIssuer || 'Issuer'}</div>
      <div class="info-value">${escHtml(issuerCn)}</div>
    </div>
    <div class="info-card">
      <div class="info-label">${t.labelValidFrom || 'Valid From'}</div>
      <div class="info-value">${formatDate(info.notBefore)}</div>
    </div>
    <div class="info-card">
      <div class="info-label">${t.labelExpiry || 'Expires'}</div>
      <div class="info-value">${formatDate(info.notAfter)}</div>
    </div>
  `;

  const sanList = document.getElementById('sanList');
  if (info.dnsNames.length > 0) {
    sanList.innerHTML = info.dnsNames.map(n => `<span class="san-tag">${escHtml(n)}</span>`).join('');
  } else {
    sanList.innerHTML = `<span style="font-size:12px;color:var(--text-dim);">—</span>`;
  }

  document.getElementById('resultsSection').classList.remove('hidden');
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function doCheck() {
  const raw = document.getElementById('domainInput').value;
  if (!raw.trim()) return;
  const domain = normalizeDomain(raw);
  hideError();
  showLoading(true);
  document.getElementById('resultsSection').classList.add('hidden');
  try {
    const info = await checkSsl(domain);
    showLoading(false);
    renderResults(info);
  } catch(e) {
    showLoading(false);
    const t = _i18n[currentLang] || _i18n.ko;
    if (e.message === 'NOT_FOUND') showError(t.errNotFound || 'No SSL certificate found for this domain.');
    else showError(t.errNetwork);
  }
}

document.addEventListener('keydown', e => {
  if (e.target === document.getElementById('domainInput') && e.key === 'Enter') doCheck();
});

let currentLang = detectLang();
function detectLang(){
  const p=new URLSearchParams(location.search).get('lang');
  if(p&&_i18n[p])return p;
  const s=localStorage.getItem('modoo_lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language||'';
  if(n.startsWith('zh'))return 'zh';
  if(n.startsWith('ja'))return 'ja';
  if(n.startsWith('ko'))return 'ko';
  return 'en';
}
function applyLang(l){
  const t=_i18n[l]||_i18n.ko;
  document.documentElement.lang=l;
  document.title=t.pageTitle;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const v=t[el.dataset.i18n];
    if(v!==undefined)el.innerHTML=v;
  });
  const inp=document.getElementById('domainInput');
  if(inp)inp.placeholder=l==='ko'?'예: google.com':'e.g. google.com';
  document.getElementById('seoArea').innerHTML=t.seoHtml;
}
function toggleLang(){
  const order=['ko','en','zh','ja'];
  const next=order[(order.indexOf(currentLang)+1)%order.length];
  currentLang=next;
  localStorage.setItem('modoo_lang',next);
  const url=new URL(location.href);
  url.searchParams.set('lang',next);
  history.replaceState(null,'',url);
  applyLang(next);
}
document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));
</script>
