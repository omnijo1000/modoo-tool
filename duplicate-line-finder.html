  document.getElementById('inputLabel').textContent=t.inputLabel;document.getElementById('lblCase').textContent=t.lblCase;
  document.getElementById('lblTrim').textContent=t.lblTrim;document.getElementById('lblBlank').textContent=t.lblBlank;
  document.getElementById('lblTotal').textContent=t.lblTotal;document.getElementById('lblDup').textContent=t.lblDup;
  document.getElementById('lblUniq').textContent=t.lblUniq;document.getElementById('removeBtn').textContent=t.removeBtn;
  document.getElementById('previewLabel').textContent=t.previewLabel;document.getElementById('inputArea').placeholder=t.placeholder;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;analyze();
}
function normalize(s){
  let v=s;
  if(document.getElementById('optTrim').checked)v=v.trim();
  if(document.getElementById('optCase').checked)v=v.toLowerCase();
  return v;
}
function analyze(){
  const raw=document.getElementById('inputArea').value;
  const lines=raw.split('\n');
  const ignoreBlank=document.getElementById('optBlank').checked;
  const seen=new Map();const dupSet=new Set();
  lines.forEach((l,i)=>{
    if(ignoreBlank&&l.trim()==='')return;
    const key=normalize(l);
    if(seen.has(key)){dupSet.add(key);seen.get(key).push(i);}
    else seen.set(key,[i]);
  });
  const dupLines=new Set();
  for(const[k,idxs] of seen){if(idxs.length>1)idxs.slice(1).forEach(i=>dupLines.add(i));}
  const total=lines.length;const dup=dupLines.size;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDup').textContent=dup;
  document.getElementById('statUniq').textContent=total-dup;
  const prev=document.getElementById('preview');
  prev.innerHTML=lines.map((l,i)=>{
    const cls=dupLines.has(i)?'line-dup':'line-ok';
    return `<div class="${cls}">${escHtml(l)||'&nbsp;'}</div>`;
  }).join('');
  _result=lines.filter((_,i)=>!dupLines.has(i)).join('\n');
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function removeDups(){document.getElementById('inputArea').value=_result;analyze();}
function copyResult(){if(_result!==undefined)navigator.clipboard.writeText(_result);}
function clearAll(){document.getElementById('inputArea').value='';analyze();}
_lang=detectLang();applyLang();
</script>
