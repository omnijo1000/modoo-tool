<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>什么是HMAC-SHA256？</summary><p>将密钥和消息通过哈希函数组合生成的认证码，用于检测负载篡改。</p></details>

function loadTemplate(){
  const v=document.getElementById('templateSel').value;
  if(TEMPLATES[v])document.getElementById('payload').value=JSON.stringify(TEMPLATES[v],null,2);
  generateSig();

async function generateSig(){
  const body=document.getElementById('payload').value;
  const secret=document.getElementById('secret').value;
  const bytes=new TextEncoder().encode(body).length;
  document.getElementById('resPayloadSize').textContent=`${bytes} bytes / ${body.length} chars`;
  if(!secret){document.getElementById('resSig').textContent='— (enter secret key above)';return;}
  try{
    const enc=new TextEncoder();
    const key=await crypto.subtle.importKey('raw',enc.encode(secret),{name:'HMAC',hash:'SHA-256'},false,['sign']);
    const mac=await crypto.subtle.sign('HMAC',key,enc.encode(body));
    const hex=Array.from(new Uint8Array(mac)).map(b=>b.toString(16).padStart(2,'0')).join('');
    document.getElementById('resSig').textContent='sha256='+hex;
  }catch(e){document.getElementById('resSig').textContent='Error: '+e.message;}
}
function copyAll(){
  const t=_i18n[_lang];const v=document.getElementById('resSig').textContent;if(!v||v.startsWith('—'))return;
  navigator.clipboard.writeText(v).then(()=>{const btn=document.getElementById('btnCopy');const orig=btn.textContent;btn.textContent=t.copied;setTimeout(()=>btn.textContent=orig,2000);});
}
_lang=detectLang();applyLang();
</script>
