<script>
const LANGS=['ko','en','zh','ja'];let _lang='ko';let _tab='desktop';
const _i18n={
  ko:{h1Accent:'스니펫 미리보기',sub:'Google 검색 결과에 표시될 스니펫을 실시간으로 미리 확인합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',lblTitle:'페이지 제목 (Title)',lblUrl:'URL',lblDesc:'메타 설명 (Description)',lblDate:'날짜 표시 (선택)',lblFavicon:'파비콘 이모지 (선택)',btnSample:'샘플',btnClear:'초기화',prevLabel:'Google 검색 결과 미리보기',
    titleWarn:'제목이 너무 깁니다 (권장: 60자 이하)',descWarn:'설명이 너무 깁니다 (권장: 160자 이하)',
    seoHtml:`<h2>SERP 스니펫 미리보기</h2><p>Google 검색 결과 페이지(SERP)에 표시될 제목, URL, 설명 스니펫을 실시간으로 미리 확인합니다. 제목은 60자, 설명은 160자 이내를 권장합니다. 데스크탑과 모바일 미리보기를 모두 지원합니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>제목은 몇 자까지 표시되나요?</summary><p>Google은 약 600픽셀 너비까지 표시하므로 일반적으로 50~60자를 권장합니다.</p></details>
<details class="faq-item"><summary>메타 설명은 항상 표시되나요?</summary><p>아니오, Google이 페이지 콘텐츠에서 더 적합한 텍스트를 찾으면 메타 설명 대신 표시할 수 있습니다.</p></details>
<details class="faq-item"><summary>URL은 어떻게 표시되나요?</summary><p>도메인과 경로가 계층 구조로 표시됩니다. 슬러그를 읽기 쉬운 단어로 구성하세요.</p></details>
<details class="faq-item"><summary>날짜는 왜 표시되나요?</summary><p>Google은 최신 기사나 뉴스의 경우 발행일을 스니펫에 표시합니다.</p></details>
<details class="faq-item"><summary>파비콘은 어디에 표시되나요?</summary><p>모바일 검색 결과에서 URL 옆에 작은 아이콘으로 표시됩니다.</p></details>
<details class="faq-item"><summary>키워드를 제목에 넣어야 하나요?</summary><p>예, 주요 키워드를 제목 앞부분에 배치하면 클릭률(CTR)이 향상됩니다.</p></details>
<details class="faq-item"><summary>같은 페이지의 모바일과 데스크탑 스니펫이 다른가요?</summary><p>모바일은 제목과 설명이 약간 더 짧게 잘릴 수 있습니다.</p></details>
<details class="faq-item"><summary>설명에 이모지를 사용해도 되나요?</summary><p>Google이 간혹 이모지를 제거하지만 눈에 띄어 CTR을 높일 수 있습니다.</p></details>`
  },
  en:{h1Accent:'Snippet Preview',sub:'Preview how your page will appear in Google search results in real-time',backLink:'← All Tools',langBtn:'🌐 中文',lblTitle:'Page title',lblUrl:'URL',lblDesc:'Meta description',lblDate:'Date (optional)',lblFavicon:'Favicon emoji (optional)',btnSample:'Sample',btnClear:'Clear',prevLabel:'Google Search Result Preview',
    titleWarn:'Title too long (recommended: under 60 chars)',descWarn:'Description too long (recommended: under 160 chars)',
    seoHtml:`<h2>SERP Snippet Preview</h2><p>Preview how your page title, URL, and description will appear in Google search results (SERP) in real-time. Recommended: title under 60 chars, description under 160 chars. Supports both desktop and mobile previews.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>How many characters are shown in the title?</summary><p>Google displays up to ~600px width, typically 50–60 characters for most fonts.</p></details>
<details class="faq-item"><summary>Is the meta description always shown?</summary><p>No — Google may replace it with content from the page if it finds a better match for the query.</p></details>
<details class="faq-item"><summary>How is the URL displayed?</summary><p>Domain and path are shown in a breadcrumb style. Use readable words in your slugs.</p></details>
<details class="faq-item"><summary>Why does a date appear?</summary><p>Google shows publish dates for news and freshness-sensitive content.</p></details>
<details class="faq-item"><summary>Where does the favicon appear?</summary><p>Next to the URL in mobile search results as a small icon.</p></details>
<details class="faq-item"><summary>Should I include keywords in the title?</summary><p>Yes — placing primary keywords early in the title improves click-through rate (CTR).</p></details>
<details class="faq-item"><summary>Are mobile and desktop snippets different?</summary><p>Mobile may truncate title and description slightly shorter.</p></details>
<details class="faq-item"><summary>Can I use emojis in the description?</summary><p>Google sometimes strips them, but they can stand out and boost CTR when shown.</p></details>`
  },
  zh:{h1Accent:'摘要预览',sub:'实时预览您的页面在Google搜索结果中的显示效果',backLink:'← 所有工具',langBtn:'🌐 日本語',lblTitle:'页面标题',lblUrl:'URL',lblDesc:'元描述',lblDate:'日期（可选）',lblFavicon:'网站图标表情（可选）',btnSample:'示例',btnClear:'清除',prevLabel:'Google搜索结果预览',
    titleWarn:'标题过长（建议60字符以内）',descWarn:'描述过长（建议160字符以内）',
    seoHtml:`<h2>SERP摘要预览</h2><p>实时预览页面标题、URL和描述在Google搜索结果页面(SERP)中的显示效果。建议：标题60字符以内，描述160字符以内。支持桌面和移动端预览。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>标题显示多少字符？</summary><p>Google显示约600px宽度，通常为50~60个字符。</p></details>
<details class="faq-item"><summary>元描述总是显示吗？</summary><p>不，如果Google找到更匹配查询的页面内容，可能会替换元描述。</p></details>
<details class="faq-item"><summary>URL如何显示？</summary><p>域名和路径以面包屑样式显示。在slug中使用易读单词。</p></details>
<details class="faq-item"><summary>为什么显示日期？</summary><p>Google对新闻和时效性内容显示发布日期。</p></details>
<details class="faq-item"><summary>网站图标显示在哪里？</summary><p>在移动端搜索结果中显示在URL旁边作为小图标。</p></details>
<details class="faq-item"><summary>应该在标题中包含关键词吗？</summary><p>是的，将主要关键词放在标题前部可以提高点击率(CTR)。</p></details>
<details class="faq-item"><summary>移动端和桌面端摘要不同吗？</summary><p>移动端标题和描述可能略短。</p></details>
<details class="faq-item"><summary>描述中可以使用表情符号吗？</summary><p>Google有时会删除它们，但显示时可以突出并提高CTR。</p></details>`
  },
  ja:{h1Accent:'スニペットプレビュー',sub:'Google検索結果にページがどのように表示されるかをリアルタイムで確認します',backLink:'← ホーム',langBtn:'🌐 한국어',lblTitle:'ページタイトル',lblUrl:'URL',lblDesc:'メタディスクリプション',lblDate:'日付（任意）',lblFavicon:'ファビコン絵文字（任意）',btnSample:'サンプル',btnClear:'クリア',prevLabel:'Google検索結果プレビュー',
    titleWarn:'タイトルが長すぎます（推奨：60文字以内）',descWarn:'説明が長すぎます（推奨：160文字以内）',
    seoHtml:`<h2>SERPスニペットプレビュー</h2><p>ページのタイトル、URL、説明がGoogle検索結果(SERP)にどのように表示されるかをリアルタイムでプレビューします。推奨：タイトル60文字以内、説明160文字以内。デスクトップとモバイルの両プレビューに対応。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>タイトルは何文字まで表示されますか？</summary><p>Googleは約600px幅まで表示し、通常50〜60文字程度です。</p></details>
<details class="faq-item"><summary>メタディスクリプションは常に表示されますか？</summary><p>いいえ、Googleがクエリに合ったページコンテンツを見つけた場合、差し替えることがあります。</p></details>
<details class="faq-item"><summary>URLはどのように表示されますか？</summary><p>ドメインとパスがパンくず形式で表示されます。スラッグに読みやすい単語を使ってください。</p></details>

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblTitle','lblUrl','lblDesc','lblDate','lblFavicon','btnSample','btnClear','prevLabel'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  update();
}
function setTab(t){_tab=t;['desktop','mobile'].forEach(id=>{document.getElementById('pt-'+id).classList.toggle('active',id===t);});update();}
function formatUrl(raw){try{const u=new URL(raw.startsWith('http')?raw:'https://'+raw);return{domain:u.hostname,path:u.pathname==='/'?'':u.pathname.replace(/^\/|\/$/g,'').split('/').join(' › ')};}catch{return{domain:raw||'example.com',path:''};}}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function update(){
  const t=_i18n[_lang];
  const title=document.getElementById('titleIn').value;
  const url=document.getElementById('urlIn').value||'https://example.com';
  const desc=document.getElementById('descIn').value;
  const dateVal=document.getElementById('dateIn').value;
  const favicon=document.getElementById('faviconIn').value||'🌐';
  const tc=title.length;const dc=desc.length;
  const titleOk=tc<=60,descOk=dc<=160;
  const tcCls=tc===0?'':tc<=60?'ok':tc<=80?'warn':'over';
  const dcCls=dc===0?'':dc<=160?'ok':dc<=200?'warn':'over';
  document.getElementById('titleCount').textContent=`${tc}/60`;document.getElementById('titleCount').className='char-count '+tcCls;
  document.getElementById('descCount').textContent=`${dc}/160`;document.getElementById('descCount').className='char-count '+dcCls;
  const {domain,path}=formatUrl(url);
  const dispTitle=title||'Page Title';const dispDesc=desc||'Page description will appear here...';
  const truncTitle=title.length>60?title.slice(0,57)+'...':title||'Page Title';
  const truncDesc=desc.length>160?desc.slice(0,157)+'...':desc||'Page description will appear here...';
  const dateStr=dateVal?new Date(dateVal).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'})+' — ':'';
  let html='';
  if(_tab==='desktop'){
    html=`<div class="serp-desktop"><div class="serp-url"><span>${favicon} ${domain}</span>${path?' › '+escH(path):''}</div><div class="serp-title${!titleOk?' over-title':''}">${escH(truncTitle)}</div><div class="serp-desc"><span class="serp-date">${dateStr}</span>${escH(truncDesc)}</div></div>`;
  }else{
    html=`<div class="serp-mobile"><div class="mobile-url">${favicon} ${domain}${path?' › '+escH(path.split(' › ').join('/')):''}  •  3 min read</div><div class="mobile-title">${escH(truncTitle.length>55?truncTitle.slice(0,52)+'...':truncTitle)}</div><div class="mobile-desc">${escH(truncDesc.length>130?truncDesc.slice(0,127)+'...':truncDesc)}</div></div>`;
  }
  document.getElementById('previewEl').innerHTML=html;
}
