<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:900px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px;}
@media(max-width:620px){.input-grid{grid-template-columns:1fr;}}
.panel-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:5px;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;resize:vertical;min-height:160px;outline:none;line-height:1.6;}
textarea:focus{border-color:var(--accent);}
.opt-row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:12px;}
.opt-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;cursor:pointer;}
.opt-item input{accent-color:var(--accent);}
.btn-row{display:flex;gap:8px;margin-bottom:16px;}
.btn{padding:9px 20px;border-radius:8px;font-size:12px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;border:none;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{opacity:.85;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.stats-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;font-size:11px;font-family:'DM Mono',monospace;}
.stat-item{display:flex;align-items:center;gap:5px;}
.dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.dot-add{background:rgba(52,211,153,.3);border:1px solid #34d399;}
.dot-del{background:rgba(248,113,113,.3);border:1px solid #f87171;}
.dot-same{background:var(--surface);border:1px solid var(--border);}
#diffOut{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:auto;font-family:'DM Mono',monospace;font-size:12px;line-height:1.7;display:none;}
.diff-table{width:100%;border-collapse:collapse;}
.diff-table td{padding:2px 12px;vertical-align:top;white-space:pre-wrap;word-break:break-all;}
.diff-table .ln{width:36px;text-align:right;color:var(--text-dim);font-size:10px;user-select:none;padding:2px 8px 2px 4px;}
.diff-table .type-lbl{width:16px;text-align:center;font-size:11px;user-select:none;}
.diff-add{background:rgba(52,211,153,.1);color:#6ee7b7;}
.diff-add .type-lbl,.diff-add .ln{background:rgba(52,211,153,.06);}
.diff-del{background:rgba(248,113,113,.1);color:#fca5a5;}
.diff-del .type-lbl,.diff-del .ln{background:rgba(248,113,113,.06);}
.diff-same{color:var(--text-muted);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<script>
const _i18n={
  ko:{sub:'두 텍스트를 비교하여 추가·삭제된 줄을 색상으로 표시',langBtn:'🌐 EN',backBtn:'← 모두의 툴',origLabel:'원본 텍스트',origPh:'원본 텍스트...',modLabel:'수정된 텍스트',modPh:'수정된 텍스트...',ignoreCase:'대소문자 무시',ignoreWs:'앞뒤 공백 무시',ignoreEmpty:'빈 줄 제외',diffBtn:'▶ 비교하기',clearBtn:'지우기',added:'추가',removed:'삭제',unchanged:'동일',seoHtml:'<h2>Text Diff Checker 사용법</h2><p>두 텍스트를 줄 단위로 비교하여 추가(녹색)·삭제(빨강) 부분을 강조 표시합니다. 코드 리뷰, 문서 버전 비교, 번역 검토 등에 유용하며, 대소문자·공백·빈 줄 무시 옵션도 지원합니다.</p><details class="faq-item"><summary>어떤 방식으로 텍스트를 비교하나요?</summary><p>줄 단위(line-by-line) LCS(최장 공통 부분 수열) 알고리즘으로 비교합니다. 원본에 없는 줄은 녹색(추가), 수정본에서 사라진 줄은 빨강(삭제)으로 표시되며, 같은 줄은 회색으로 나타납니다.</p></details><details class="faq-item"><summary>대소문자 무시 옵션은 어떻게 작동하나요?</summary><p>"대소문자 무시" 옵션을 체크하면 Hello와 hello를 동일 줄로 처리합니다. 영문 코드 리뷰 시 대소문자 변경만 있는 줄을 변경으로 감지하지 않도록 할 때 유용합니다.</p></details><details class="faq-item"><summary>코드 파일 비교에 사용할 수 있나요?</summary><p>네, 코드 파일의 내용을 복사해서 붙여넣으면 됩니다. 단, 이 도구는 줄 단위 비교이므로 같은 줄 내의 단어 수준 차이는 표시되지 않습니다. 단어 수준 비교가 필요하면 Git diff 같은 전문 도구를 추천합니다.</p></details><details class="faq-item"><summary>비교 결과를 저장하거나 내보낼 수 있나요?</summary><p>현재 파일 내보내기 기능은 없습니다. 결과 화면을 캡처하거나 복사해서 사용하세요. 모든 처리는 브라우저 내에서만 이루어지며 텍스트는 서버로 전송되지 않습니다.</p></details><details class="faq-item"><summary>비교할 수 있는 텍스트 크기 제한이 있나요?</summary><p>브라우저 메모리 내에서 처리 가능하며 특별한 제한은 없습니다. 수천 줄 이상의 대용량 텍스트는 비교 속도가 느려질 수 있습니다.</p></details><details class="faq-item"><summary>공백을 무시하고 비교할 수 있나요?</summary><p>공백 무시 옵션을 켜면 들여쓰기 차이나 스페이스/탭 차이를 무시하고 실제 텍스트 내용만 비교합니다. 코드 포맷팅 차이를 제외하고 로직 변경만 확인할 때 유용합니다.</p></details><details class="faq-item"><summary>긴 텍스트나 코드 파일 전체를 비교할 때 느려지나요?</summary><p>모든 처리는 브라우저에서 이루어집니다. 수천 줄까지는 빠르게 처리되지만, 수만 줄 이상의 큰 파일은 브라우저 메모리 한도에 따라 느려질 수 있습니다.</p></details><details class="faq-item"><summary>변경된 줄 수와 추가·삭제된 문자 수를 알 수 있나요?</summary><p>비교 완료 후 변경 통계(추가된 줄, 삭제된 줄, 변경된 단어 수 등)가 표시됩니다. 코드 리뷰나 문서 편집의 변경량을 빠르게 파악하는 데 활용할 수 있습니다.</p></details>'},
  en:{sub:'Compare two texts and highlight added, removed lines',langBtn:'🌐 中文',backBtn:'← All Tools',origLabel:'Original Text',origPh:'Original text...',modLabel:'Modified Text',modPh:'Modified text...',ignoreCase:'Ignore case',ignoreWs:'Ignore whitespace',ignoreEmpty:'Ignore blank lines',diffBtn:'▶ Compare',clearBtn:'Clear',added:'added',removed:'removed',unchanged:'unchanged',seoHtml:'<h2>How to Use the Text Diff Checker</h2><p>Compare two texts line-by-line and highlight added (green) and removed (red) lines. Options to ignore case, leading/trailing whitespace, and blank lines make it flexible for code review, document comparison, and translation verification.</p><details class="faq-item"><summary>What algorithm does this tool use to compare text?</summary><p>It uses a line-by-line LCS (Longest Common Subsequence) algorithm. Lines present in the modified text but not the original are marked green (added), lines present only in the original are marked red (removed), and matching lines are shown in grey.</p></details><details class="faq-item"><summary>How does the Ignore Case option work?</summary><p>When enabled, "Hello" and "hello" are treated as identical lines. This is useful when reviewing code changes where only capitalization differs and you do not want those lines flagged as changes.</p></details><details class="faq-item"><summary>Can I compare code files with this tool?</summary><p>Yes — paste the contents of any code file into the two panels and click Compare. Note that this tool compares at the line level; word-level inline differences within a line are not highlighted. For that level of detail, tools like Git diff are more suitable.</p></details><details class="faq-item"><summary>Can I export or save the diff result?</summary><p>There is no built-in export feature. Take a screenshot or copy the result text manually. All comparison runs entirely in your browser — no text is sent to or stored on any server.</p></details><details class="faq-item"><summary>Is there a size limit on the text I can compare?</summary><p>No hard limit — it processes as much as your browser can handle. Very large texts (thousands of lines) may slow down the comparison. For large codebases, dedicated diff tools or Git are recommended.</p></details><details class="faq-item"><summary>Can I ignore whitespace when comparing?</summary><p>Yes. Enable the ignore-whitespace option to skip indentation and space/tab differences and compare only the actual content. This is useful when reviewing logical changes while ignoring code formatting changes.</p></details><details class="faq-item"><summary>Does comparing long texts or large files slow the tool down?</summary><p>All processing runs in the browser. Thousands of lines are handled quickly, but very large files (tens of thousands of lines) may slow down depending on browser memory limits.</p></details><details class="faq-item"><summary>Can I see how many lines or characters changed?</summary><p>After comparison, change statistics are shown — added lines, removed lines, changed word counts, etc. This helps quickly assess the scope of changes during code reviews or document edits.</p></details>'},
  zh:{sub:'比较两段文本，用颜色标记增删行',langBtn:'🌐 日本語',backBtn:'← 所有工具',origLabel:'原始文本',origPh:'原始文本...',modLabel:'修改后文本',modPh:'修改后的文本...',ignoreCase:'忽略大小写',ignoreWs:'忽略空白',ignoreEmpty:'忽略空行',diffBtn:'▶ 比较',clearBtn:'清除',added:'新增',removed:'删除',unchanged:'相同',seoHtml:'<h2>文本差异检查器使用指南</h2><p>逐行比较两段文本，用绿色标记新增行，红色标记删除行。支持忽略大小写、首尾空白和空行选项，适用于代码审查、文档版本对比和翻译核对等场景。</p><details class="faq-item"><summary>本工具使用什么算法进行比较？</summary><p>使用逐行LCS（最长公共子序列）算法。仅出现在修改后文本中的行标记为绿色（新增），仅出现在原始文本中的行标记为红色（删除），相同的行显示为灰色。</p></details><details class="faq-item"><summary>忽略大小写选项如何工作？</summary><p>启用后，"Hello"和"hello"将被视为相同行。在代码审查中，当改动仅涉及大小写而您不希望这些行被标记为变更时非常有用。</p></details><details class="faq-item"><summary>可以用来比较代码文件吗？</summary><p>可以，将代码文件内容粘贴到两个输入框中点击比较即可。注意本工具为行级比较，同一行内的单词差异不会高亮显示。需要更精细的差异分析时，建议使用Git diff等专业工具。</p></details><details class="faq-item"><summary>可以导出或保存比较结果吗？</summary><p>目前没有内置导出功能，请截图或手动复制结果。所有比较均在浏览器本地完成，文本不会上传或存储到任何服务器。</p></details><details class="faq-item"><summary>可比较的文本大小有限制吗？</summary><p>没有固定限制，在浏览器内存允许的范围内均可处理。数千行以上的超大文本比较速度可能变慢，大型代码库建议使用Git等专用工具。</p></details><details class="faq-item"><summary>可以忽略空白字符进行比较吗？</summary><p>可以。启用忽略空白选项后，缩进和空格/Tab的差异会被跳过，仅比较实际文本内容。适合在忽略格式调整的情况下检查逻辑变更。</p></details><details class="faq-item"><summary>比较大文件时会变慢吗？</summary><p>所有处理均在浏览器中进行。数千行可快速处理，数万行以上的大文件可能受浏览器内存限制而变慢。</p></details><details class="faq-item"><summary>可以查看变更的行数和字符数吗？</summary><p>比较完成后，会显示变更统计信息（新增行、删除行、变更单词数等），有助于快速了解代码审查或文档编辑的改动范围。</p></details>'},
  ja:{sub:'2つのテキストを比較して、追加・削除行を色で表示',langBtn:'🌐 한국어',backBtn:'← ホーム',origLabel:'元のテキスト',origPh:'元のテキスト...',modLabel:'変更後のテキスト',modPh:'変更後のテキスト...',ignoreCase:'大文字・小文字を無視',ignoreWs:'前後の空白を無視',ignoreEmpty:'空行を除外',diffBtn:'▶ 比較する',clearBtn:'クリア',added:'追加',removed:'削除',unchanged:'同一',seoHtml:'<h2>テキスト差分チェッカーの使い方</h2><p>2つのテキストを行単位で比較し、追加（緑）・削除（赤）部分をハイライト表示します。大文字・小文字の無視、前後の空白の無視、空行の除外オプションにより、コードレビュー・文書比較・翻訳確認など様々な用途に対応しています。</p><details class="faq-item"><summary>どのアルゴリズムでテキストを比較しますか？</summary><p>行単位のLCS（最長共通部分列）アルゴリズムを使用します。変更後テキストにのみ存在する行は緑（追加）、元のテキストにのみ存在する行は赤（削除）、一致する行はグレーで表示されます。</p></details><details class="faq-item"><summary>大文字・小文字を無視オプションはどのように機能しますか？</summary><p>有効にすると、「Hello」と「hello」が同一行として扱われます。大文字・小文字の変更のみがある行を差分として検出したくないコードレビュー時に便利です。</p></details><details class="faq-item"><summary>コードファイルの比較にも使えますか？</summary><p>はい、コードファイルの内容を2つのパネルに貼り付けて比較ボタンをクリックするだけです。ただし行単位の比較のため、同一行内の単語レベルの差異はハイライトされません。詳細な差分分析にはGit diffなどの専用ツールを推奨します。</p></details><details class="faq-item"><summary>比較結果を保存・エクスポートできますか？</summary><p>現在、内蔵のエクスポート機能はありません。スクリーンショットを撮るか結果テキストを手動でコピーしてください。すべての比較処理はブラウザ内で行われ、テキストはサーバーに送信・保存されません。</p></details><details class="faq-item"><summary>比較できるテキストのサイズ制限はありますか？</summary><p>特定の制限はなく、ブラウザのメモリの許す限り処理できます。数千行以上の非常に大きなテキストは比較が遅くなる場合があります。大規模なコードベースにはGitなどの専用ツールをお勧めします。</p></details><details class="faq-item"><summary>空白を無視して比較できますか？</summary><p>はい。空白無視オプションを有効にするとインデントやスペース/タブの差分を無視して実際のテキスト内容のみを比較します。フォーマットの違いを除いてロジック変更だけ確認するのに便利です。</p></details><details class="faq-item"><summary>長いテキストや大きなファイルを比較すると遅くなりますか？</summary><p>すべての処理はブラウザで行われます。数千行までは高速ですが、数万行以上の大きなファイルはブラウザのメモリ制限により遅くなる場合があります。</p></details><details class="faq-item"><summary>変更された行数や文字数を確認できますか？</summary><p>比較完了後に変更統計（追加行、削除行、変更単語数など）が表示されます。コードレビューやドキュメント編集での変更量を素早く把握できます。</p></details>'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.getElementById('textA').placeholder=t.origPh;document.getElementById('textB').placeholder=t.modPh;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function lcs(a,b){const m=a.length,n=b.length;const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);let i=m,j=n;const res=[];while(i>0&&j>0){if(a[i-1]===b[j-1]){res.unshift({type:'same',val:a[i-1]});i--;j--;}else if(dp[i-1][j]>=dp[i][j-1]){res.unshift({type:'del',val:a[i-1]});i--;}else{res.unshift({type:'add',val:b[j-1]});j--;}}while(i>0){res.unshift({type:'del',val:a[i-1]});i--;}while(j>0){res.unshift({type:'add',val:b[j-1]});j--;}return res;}
function escape(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const MAX_LINES=3000;
function runDiff(){
  let a=document.getElementById('textA').value.split('\n');
  let b=document.getElementById('textB').value.split('\n');
  const ignCase=document.getElementById('ignCase').checked;
  const ignWs=document.getElementById('ignWs').checked;
  const ignEmpty=document.getElementById('ignEmpty').checked;
  if(ignWs){a=a.map(s=>s.trim());b=b.map(s=>s.trim());}
  if(ignEmpty){a=a.filter(s=>s.trim()!=='');b=b.filter(s=>s.trim()!=='');}
  if(a.length>MAX_LINES||b.length>MAX_LINES){
    const out=document.getElementById('diffOut');
    out.style.display='block';
    out.innerHTML=`<div style="padding:16px;font-size:12px;font-family:'DM Mono',monospace;color:#f87171;">⚠ 줄 수가 너무 많습니다 (최대 ${MAX_LINES}줄). 텍스트를 잘라서 다시 시도하세요.</div>`;
    return;
  }
  const ka=ignCase?a.map(s=>s.toLowerCase()):a;
  const kb=ignCase?b.map(s=>s.toLowerCase()):b;
  const result=lcs(ka,kb);
  let ai=0,bi=0,adds=0,dels=0,sames=0;
  const rows=result.map(r=>{
    if(r.type==='same'){const ln=ai+1;ai++;bi++;sames++;return`<tr class="diff-same"><td class="ln">${ai}</td><td class="type-lbl"></td><td>${escape(a[ai-1])}</td></tr>`;}
    if(r.type==='del'){ai++;dels++;return`<tr class="diff-del"><td class="ln">${ai}</td><td class="type-lbl">−</td><td>${escape(a[ai-1])}</td></tr>`;}
    bi++;adds++;return`<tr class="diff-add"><td class="ln"></td><td class="type-lbl">+</td><td>${escape(b[bi-1])}</td></tr>`;
  });
  document.getElementById('stAdd').textContent=adds;
  document.getElementById('stDel').textContent=dels;
  document.getElementById('stSame').textContent=sames;
  document.getElementById('statsRow').style.display='flex';
  const out=document.getElementById('diffOut');
  out.style.display='block';
  out.innerHTML=`<table class="diff-table">${rows.join('')}</table>`;
}
function clearAll(){document.getElementById('textA').value='';document.getElementById('textB').value='';document.getElementById('diffOut').style.display='none';document.getElementById('statsRow').style.display='none';}
_lang=detectLang();applyLang();
</script>
