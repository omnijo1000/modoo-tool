<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Diff Checker - Compare Two Texts Online</title>
<meta name="description" content="Free online text diff checker. Compare two texts side by side and highlight differences. Line-by-line diff with added, removed, and changed lines highlighted.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="alternate" hreflang="ko" href="https://modoohub.com/text-diff-checker.html">
<link rel="alternate" hreflang="en" href="https://modoohub.com/text-diff-checker.html?lang=en">
<link rel="alternate" hreflang="zh" href="https://modoohub.com/text-diff-checker.html?lang=zh">
<link rel="alternate" hreflang="x-default" href="https://modoohub.com/text-diff-checker.html">
<link rel="canonical" href="https://modoohub.com/text-diff-checker.html">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:auto;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:900px;margin:0 auto;padding:36px 20px 60px;}
.back{font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;display:inline-block;margin-bottom:22px;}
.back:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px;}
@media(max-width:620px){.input-grid{grid-template-columns:1fr;}}
.panel-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:5px;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;resize:vertical;min-height:160px;outline:none;line-height:1.6;}
textarea:focus{border-color:var(--accent);}
.opt-row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:12px;}
.opt-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;cursor:pointer;}
.opt-item input{accent-color:var(--accent);}
.btn-row{display:flex;gap:8px;margin-bottom:16px;}
.btn{padding:9px 20px;border-radius:8px;font-size:12px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;border:none;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{opacity:.85;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.stats-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;font-size:11px;font-family:'DM Mono',monospace;}
.stat-item{display:flex;align-items:center;gap:5px;}
.dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.dot-add{background:rgba(52,211,153,.3);border:1px solid #34d399;}
.dot-del{background:rgba(248,113,113,.3);border:1px solid #f87171;}
.dot-same{background:var(--surface);border:1px solid var(--border);}
#diffOut{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:auto;font-family:'DM Mono',monospace;font-size:12px;line-height:1.7;display:none;}
.diff-table{width:100%;border-collapse:collapse;}
.diff-table td{padding:2px 12px;vertical-align:top;white-space:pre-wrap;word-break:break-all;}
.diff-table .ln{width:36px;text-align:right;color:var(--text-dim);font-size:10px;user-select:none;padding:2px 8px 2px 4px;}
.diff-table .type-lbl{width:16px;text-align:center;font-size:11px;user-select:none;}
.diff-add{background:rgba(52,211,153,.1);color:#6ee7b7;}
.diff-add .type-lbl,.diff-add .ln{background:rgba(52,211,153,.06);}
.diff-del{background:rgba(248,113,113,.1);color:#fca5a5;}
.diff-del .type-lbl,.diff-del .ln{background:rgba(248,113,113,.06);}
.diff-same{color:var(--text-muted);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NR6VJF0534"></script>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6334638921720175" crossorigin="anonymous"></script>
<meta property="og:title" content="Text Diff Checker - Compare Two Texts Online">
<meta property="og:image" content="https://modoohub.com/og-image.png">

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <a href="index.html" class="back" id="backBtn">← 모두의 툴</a>
  <h1>Text Diff <span>Checker</span></h1>
  <p class="sub" data-i18n="sub">두 텍스트를 비교하여 추가·삭제된 줄을 색상으로 표시</p>

  <div class="input-grid">
    <div><div class="panel-label" data-i18n="origLabel">원본 텍스트</div><textarea id="textA" data-i18n-ph="origPh" placeholder="원본 텍스트..."></textarea></div>
    <div><div class="panel-label" data-i18n="modLabel">수정된 텍스트</div><textarea id="textB" data-i18n-ph="modPh" placeholder="수정된 텍스트..."></textarea></div>
  </div>

  <div class="opt-row">
    <label class="opt-item"><input type="checkbox" id="ignCase"><span data-i18n="ignoreCase">대소문자 무시</span></label>
    <label class="opt-item"><input type="checkbox" id="ignWs"><span data-i18n="ignoreWs">앞뒤 공백 무시</span></label>
    <label class="opt-item"><input type="checkbox" id="ignEmpty"><span data-i18n="ignoreEmpty">빈 줄 제외</span></label>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="runDiff()" data-i18n="diffBtn">▶ 비교하기</button>
    <button class="btn btn-ghost" onclick="clearAll()" data-i18n="clearBtn">지우기</button>
  </div>

  <div class="stats-row" id="statsRow" style="display:none">
    <span class="stat-item"><span class="dot dot-add"></span><span id="stAdd">0</span>&nbsp;<span data-i18n="added">추가</span></span>
    <span class="stat-item"><span class="dot dot-del"></span><span id="stDel">0</span>&nbsp;<span data-i18n="removed">삭제</span></span>
    <span class="stat-item"><span class="dot dot-same"></span><span id="stSame">0</span>&nbsp;<span data-i18n="unchanged">동일</span></span>
  </div>

  <div id="diffOut"></div>

  <div class="seo">
    <h2 data-i18n="seoH2">Text Diff Checker란?</h2>
    <p data-i18n="seoP">두 텍스트를 줄 단위로 비교하여 추가(녹색)·삭제(빨강) 부분을 강조 표시합니다. 코드 리뷰, 문서 버전 비교, 번역 검토 등에 유용합니다.</p>
  </div>
  <footer>Text Diff Checker · Free Online Tool</footer>
</main>
<script>
const _i18n={
  ko:{sub:'두 텍스트를 비교하여 추가·삭제된 줄을 색상으로 표시',langBtn:'🌐 EN',backBtn:'← 모두의 툴',origLabel:'원본 텍스트',origPh:'원본 텍스트...',modLabel:'수정된 텍스트',modPh:'수정된 텍스트...',ignoreCase:'대소문자 무시',ignoreWs:'앞뒤 공백 무시',ignoreEmpty:'빈 줄 제외',diffBtn:'▶ 비교하기',clearBtn:'지우기',added:'추가',removed:'삭제',unchanged:'동일',seoH2:'Text Diff Checker란?',seoP:'두 텍스트를 줄 단위로 비교하여 추가·삭제 부분을 색상으로 표시합니다.'},
  en:{sub:'Compare two texts and highlight added, removed lines',langBtn:'🌐 中文',backBtn:'← All Tools',origLabel:'Original Text',origPh:'Original text...',modLabel:'Modified Text',modPh:'Modified text...',ignoreCase:'Ignore case',ignoreWs:'Ignore whitespace',ignoreEmpty:'Ignore blank lines',diffBtn:'▶ Compare',clearBtn:'Clear',added:'added',removed:'removed',unchanged:'unchanged',seoH2:'Text Diff Checker',seoP:'Compare two texts line-by-line and highlight added (green) and removed (red) lines. Useful for code review, document comparison, and translation.'},
  zh:{sub:'比较两段文本，用颜色标记增删行',langBtn:'🌐 한국어',backBtn:'← 所有工具',origLabel:'原始文本',origPh:'原始文本...',modLabel:'修改后文本',modPh:'修改后的文本...',ignoreCase:'忽略大小写',ignoreWs:'忽略空白',ignoreEmpty:'忽略空行',diffBtn:'▶ 比较',clearBtn:'清除',added:'新增',removed:'删除',unchanged:'相同',seoH2:'文本差异检查器',seoP:'逐行比较两段文本，用绿色标记新增行，红色标记删除行。适用于代码审查、文档对比和翻译核对。'},
};
let _lang='ko';
const LANGS=['ko','en','zh'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.getElementById('textA').placeholder=t.origPh;document.getElementById('textB').placeholder=t.modPh;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function lcs(a,b){const m=a.length,n=b.length;const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);let i=m,j=n;const res=[];while(i>0&&j>0){if(a[i-1]===b[j-1]){res.unshift({type:'same',val:a[i-1]});i--;j--;}else if(dp[i-1][j]>=dp[i][j-1]){res.unshift({type:'del',val:a[i-1]});i--;}else{res.unshift({type:'add',val:b[j-1]});j--;}}while(i>0){res.unshift({type:'del',val:a[i-1]});i--;}while(j>0){res.unshift({type:'add',val:b[j-1]});j--;}return res;}
function escape(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const MAX_LINES=3000;
function runDiff(){
  let a=document.getElementById('textA').value.split('\n');
  let b=document.getElementById('textB').value.split('\n');
  const ignCase=document.getElementById('ignCase').checked;
  const ignWs=document.getElementById('ignWs').checked;
  const ignEmpty=document.getElementById('ignEmpty').checked;
  if(ignWs){a=a.map(s=>s.trim());b=b.map(s=>s.trim());}
  if(ignEmpty){a=a.filter(s=>s.trim()!=='');b=b.filter(s=>s.trim()!=='');}
  if(a.length>MAX_LINES||b.length>MAX_LINES){
    const out=document.getElementById('diffOut');
    out.style.display='block';
    out.innerHTML=`<div style="padding:16px;font-size:12px;font-family:'DM Mono',monospace;color:#f87171;">⚠ 줄 수가 너무 많습니다 (최대 ${MAX_LINES}줄). 텍스트를 잘라서 다시 시도하세요.</div>`;
    return;
  }
  const ka=ignCase?a.map(s=>s.toLowerCase()):a;
  const kb=ignCase?b.map(s=>s.toLowerCase()):b;
  const result=lcs(ka,kb);
  let ai=0,bi=0,adds=0,dels=0,sames=0;
  const rows=result.map(r=>{
    if(r.type==='same'){const ln=ai+1;ai++;bi++;sames++;return`<tr class="diff-same"><td class="ln">${ai}</td><td class="type-lbl"></td><td>${escape(a[ai-1])}</td></tr>`;}
    if(r.type==='del'){ai++;dels++;return`<tr class="diff-del"><td class="ln">${ai}</td><td class="type-lbl">−</td><td>${escape(a[ai-1])}</td></tr>`;}
    bi++;adds++;return`<tr class="diff-add"><td class="ln"></td><td class="type-lbl">+</td><td>${escape(b[bi-1])}</td></tr>`;
  });
  document.getElementById('stAdd').textContent=adds;
  document.getElementById('stDel').textContent=dels;
  document.getElementById('stSame').textContent=sames;
  document.getElementById('statsRow').style.display='flex';
  const out=document.getElementById('diffOut');
  out.style.display='block';
  out.innerHTML=`<table class="diff-table">${rows.join('')}</table>`;
}
function clearAll(){document.getElementById('textA').value='';document.getElementById('textB').value='';document.getElementById('diffOut').style.display='none';document.getElementById('statsRow').style.display='none';}
_lang=detectLang();applyLang();
</script>
</body>
</html>
