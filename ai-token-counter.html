const _i18n={
  ko:{sub:'GPT·Claude·Gemini 토큰 수 추정 · API 비용 계산',langBtn:'🌐 EN',backBtn:'← 모두의 툴',ph:'텍스트를 입력하세요...',tokensLabel:'추정 토큰',charsLabel:'문자수',wordsLabel:'단어수',linesLabel:'줄수',colModel:'모델',colCtx:'컨텍스트',colTokens:'토큰',colCost:'예상 비용',noteText:'※ 토큰 수는 추정값입니다. 정확한 수는 각 API 공식 도구를 사용하세요.',seoHtml:'<h2>AI Token Counter란?</h2><p>LLM API 호출 시 과금 기준인 <strong>토큰 수</strong>를 추정하고 예상 비용을 계산합니다. GPT-4o·Claude 3·Gemini 등 주요 모델의 컨텍스트 한도와 입력 비용을 한눈에 비교할 수 있습니다. 토큰은 텍스트를 모델이 처리하는 단위로, 영어 단어 1개 ≈ 1~2토큰, 한국어 1음절 ≈ 2~3토큰이 일반적입니다.</p><h2>자주 묻는 질문 (FAQ)</h2><details class="faq-item"><summary>토큰과 글자수(문자수)의 차이는?</summary><p>토큰은 모델이 텍스트를 분해하는 단위입니다. 영어 단어 1개는 보통 1~2토큰, 한국어·중국어 문자 1개는 2~3토큰입니다. 같은 내용이라도 언어에 따라 토큰 수가 달라져 비용이 다릅니다.</p></details><details class="faq-item"><summary>이 계산기의 토큰 수가 정확한가요?</summary><p>추정값입니다. 정확한 토큰 수는 모델마다 사용하는 토크나이저가 달라 OpenAI의 tiktoken, Anthropic의 공식 API 등을 통해 확인해야 합니다. 이 계산기는 빠른 예상치 파악에 활용하세요.</p></details><details class="faq-item"><summary>컨텍스트 한도를 초과하면 어떻게 되나요?</summary><p>모델이 처리할 수 있는 최대 토큰 수(컨텍스트 윈도우)를 초과하면 오류가 발생하거나 초과 부분이 잘립니다. 긴 문서 요약이나 대화 기록 유지 시 컨텍스트 한도 확인이 중요합니다.</p></details><details class="faq-item"><summary>입력 토큰과 출력 토큰의 가격이 다른가요?</summary><p>네. 대부분의 LLM API는 입력(prompt) 토큰보다 출력(completion) 토큰 단가가 2~4배 높습니다. 이 계산기는 입력 토큰 기준 비용을 표시합니다.</p></details><details class="faq-item"><summary>여러 모델의 비용을 동시에 비교할 수 있나요?</summary><p>네. 텍스트를 입력하면 GPT-4o, Claude 3, Gemini 등 주요 모델의 토큰 수와 예상 비용이 동시에 표시되어 바로 비교할 수 있습니다.</p></details>'},
  en:{sub:'Estimate token count for GPT, Claude, Gemini · API cost estimator',langBtn:'🌐 中文',backBtn:'← All Tools',ph:'Paste your text here...',tokensLabel:'Est. Tokens',charsLabel:'Characters',wordsLabel:'Words',linesLabel:'Lines',colModel:'Model',colCtx:'Context',colTokens:'Tokens',colCost:'Est. Cost',noteText:'※ Token count is an estimate. Use official tools like tiktoken for exact counts.',seoHtml:'<h2>What is AI Token Counter?</h2><p>Estimate <strong>token counts</strong> and API costs for major LLMs including GPT-4o, Claude 3, and Gemini. Tokens are the units AI models use to process text — 1 English word ≈ 1–2 tokens, while CJK characters typically use 2–3 tokens each. Compare context limits and pricing across models instantly.</p><h2>FAQ</h2><details class="faq-item"><summary>How are tokens different from characters?</summary><p>Tokens are subword units used by the model\'s tokenizer. An English word is usually 1–2 tokens; Korean or Chinese characters are 2–3 tokens each. The same content costs more tokens in non-English languages.</p></details><details class="faq-item"><summary>Are these token counts exact?</summary><p>These are estimates. Exact counts depend on the model\'s tokenizer (e.g., OpenAI tiktoken, Anthropic API). Use this tool for quick estimates; verify with official tools before billing-sensitive decisions.</p></details><details class="faq-item"><summary>What happens if I exceed the context limit?</summary><p>The model will either throw an error or truncate the input. Always check the context window limit when processing long documents, conversation history, or large prompts.</p></details><details class="faq-item"><summary>Is output token pricing different from input?</summary><p>Yes. Most LLM APIs charge 2–4× more for output (completion) tokens than input (prompt) tokens. This tool shows input token cost estimates.</p></details><details class="faq-item"><summary>Can I compare multiple models at once?</summary><p>Yes. Enter your text once and instantly see token counts and estimated costs for GPT-4o, Claude 3, Gemini, and other major models side by side.</p></details>'},
  zh:{sub:'估算GPT·Claude·Gemini的Token数量 · API费用计算',langBtn:'🌐 日本語',backBtn:'← 所有工具',ph:'请粘贴您的文本...',tokensLabel:'估计Token数',charsLabel:'字符数',wordsLabel:'单词数',linesLabel:'行数',colModel:'模型',colCtx:'上下文',colTokens:'Token数',colCost:'预估费用',noteText:'※ Token数为估算值，精确计数请使用各API的官方工具。',seoHtml:'<h2>AI Token计数器是什么？</h2><p>估算GPT-4o、Claude 3、Gemini等主流LLM的<strong>Token数量</strong>和API费用。Token是AI模型处理文本的基本单位，英文单词约1-2个Token，中文字符约2-3个Token。可同时比较多个模型的上下文限制和定价。</p><h2>常见问题 (FAQ)</h2><details class="faq-item"><summary>Token和字符数有什么区别？</summary><p>Token是模型分词器使用的子词单位。英文单词通常1-2个Token，中文/日文字符约2-3个Token。同样内容在不同语言下Token数量不同，费用也有差异。</p></details><details class="faq-item"><summary>这里的Token数量准确吗？</summary><p>为估算值。精确数量取决于各模型的分词器（如OpenAI tiktoken）。建议用本工具快速估算，涉及计费决策时请通过官方API验证。</p></details><details class="faq-item"><summary>超出上下文限制会怎样？</summary><p>模型会报错或截断输入。处理长文档、对话历史或大型提示词时，需注意上下文窗口限制。</p></details><details class="faq-item"><summary>输入Token和输出Token价格一样吗？</summary><p>不一样。大多数LLM API的输出Token价格是输入的2-4倍。本工具显示的是输入Token的预估费用。</p></details><details class="faq-item"><summary>可以同时比较多个模型吗？</summary><p>可以。输入文本后，GPT-4o、Claude 3、Gemini等主流模型的Token数量和预估费用会同时显示，方便对比。</p></details>'},
  ja:{sub:'GPT・Claude・GeminiのToken数を推定 · API費用計算',langBtn:'🌐 한국어',backBtn:'← ホーム',ph:'テキストをここに貼り付けてください...',tokensLabel:'推定トークン数',charsLabel:'文字数',wordsLabel:'単語数',linesLabel:'行数',colModel:'モデル',colCtx:'コンテキスト',colTokens:'トークン数',colCost:'推定費用',noteText:'※ トークン数は推定値です。正確な数値は各APIのtiktokenなどの公式ツールをご利用ください。',seoHtml:'<h2>AIトークンカウンターとは？</h2><p>GPT-4o・Claude 3・Geminiなど主要LLMの<strong>トークン数</strong>とAPI費用を推定します。トークンはAIモデルがテキストを処理する単位で、英単語1語≈1〜2トークン、日本語・中国語の文字は1文字≈2〜3トークンが目安です。複数モデルのコンテキスト上限と料金を一覧比較できます。</p><h2>よくある質問 (FAQ)</h2><details class="faq-item"><summary>トークンと文字数の違いは？</summary><p>トークンはモデルのトークナイザーが分割するサブワード単位です。英単語は1〜2トークン、日本語・中国語の文字は2〜3トークンが一般的です。同じ内容でも言語によってトークン数が異なり、費用も変わります。</p></details><details class="faq-item"><summary>トークン数は正確ですか？</summary><p>推定値です。正確な数値はモデルごとのトークナイザー（例：OpenAI tiktoken）に依存します。課金に関わる判断には公式APIで確認してください。</p></details><details class="faq-item"><summary>コンテキスト上限を超えるとどうなりますか？</summary><p>エラーが発生するか、入力が切り捨てられます。長文書・会話履歴・大きなプロンプトを扱う際はコンテキストウィンドウの上限に注意してください。</p></details><details class="faq-item"><summary>入力トークンと出力トークンで価格が違いますか？</summary><p>はい。多くのLLM APIでは出力（completion）トークンの単価が入力（prompt）の2〜4倍です。このツールは入力トークンの推定費用を表示しています。</p></details><details class="faq-item"><summary>複数モデルを同時に比較できますか？</summary><p>はい。テキストを入力すると、GPT-4o・Claude 3・Geminiなどのトークン数と推定費用が一覧表示されてすぐ比較できます。</p></details>'},

function estimateTokens(text){
  if(!text)return 0;
  let tokens=0;
  const words=text.match(/\S+/g)||[];
  for(const w of words){
    const cjk=(w.match(/[一-鿿가-힣぀-ゟ゠-ヿ]/g)||[]).length;
    const ascii=w.length-cjk;
    tokens+=Math.ceil(cjk*0.7)+Math.ceil(ascii/4)+1;
  }
  const spaces=(text.match(/\s+/g)||[]).length;
  return Math.max(1,Math.round(tokens+spaces*0.3));
}
function update(){
  const text=document.getElementById('inputText').value;
  const chars=text.length;
  const words=(text.match(/\S+/g)||[]).length;
  const lines=text?text.split('\n').length:0;
  const tokens=estimateTokens(text);
  document.getElementById('charInfo').textContent=chars+' chars';
  document.getElementById('sTokens').textContent=tokens.toLocaleString();
  document.getElementById('sChars').textContent=chars.toLocaleString();
  document.getElementById('sWords').textContent=words.toLocaleString();
  document.getElementById('sLines').textContent=lines.toLocaleString();
  const t=_i18n[_lang];
  document.getElementById('modelRows').innerHTML=MODELS.map(m=>{
    const limit=CTX_LIMITS[m.ctx]||128000;
    const within=tokens<=limit;
    const cost=(tokens/1000*m.rate).toFixed(4);
    return`<div class="mt-row">
      <span class="model-name">${m.name}</span>
      <span class="model-ctx">${m.ctx}</span>
      <span class="model-tokens ${within?'within':'over'}">${within?'✓':'✗'} ${tokens.toLocaleString()}</span>
      <span class="model-cost">$${cost}</span>
    </div>`;
  }).join('');
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
