    seoHtml:`<h2>AI API料金比較とは</h2><p>OpenAI、Anthropic、Google GeminiのAPIの<strong>入力・出力トークン単価を一覧で比較</strong>します。使用量ベースのコスト計算機で日次・月次の推定コストをすぐに確認できます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>出力トークンが高い理由は？</summary><p>出力トークンはモデルが逐次生成するため、より多くの計算が必要です。入力より3〜5倍高くなります。</p></details>
<details class="faq-item"><summary>バッチAPI割引とは？</summary><p>OpenAIとAnthropicは非同期バッチ処理に最大50%オフを提供します。リアルタイム応答が不要な大量処理に最適です。</p></details>

<details class="faq-item"><summary>キャッシングでコストを削減できますか？</summary><p>Anthropicのプロンプトキャッシングで繰り返し入力トークンコストを最大90%削減できます。</p></details>

  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=['ko','en','zh','ja'].indexOf(_lang);_lang=['ko','en','zh','ja'][(idx+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);render();}
function fmt(n){return n<0.01?n.toFixed(4):n<1?n.toFixed(3):n.toFixed(2);}
function fmtCost(n){return n<0.001?'< $0.001':n<1?`$${n.toFixed(4)}`:`$${n.toFixed(2)}`;}
function recalc(){render();}
function render(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('calcTitle').textContent=t.calcTitle;
  document.getElementById('lblIn').textContent=t.lblIn;document.getElementById('lblOut').textContent=t.lblOut;
  document.getElementById('noteEl').textContent=t.note;document.getElementById('seoDiv').innerHTML=t.seoHtml;
  const inTok=parseFloat(document.getElementById('inTok').value)||0;
  const outTok=parseFloat(document.getElementById('outTok').value)||0;
  document.getElementById('tblHead').innerHTML=`<tr><th>${t.hModel}</th><th>${t.hCtx}</th><th>${t.hPriceIn}</th><th>${t.hPriceOut}</th><th>${t.hBatch}</th><th>${t.hFree}</th><th>${t.hDayCost}</th><th>${t.hMonthCost}</th></tr>`;
  let lastBrand='';
  const rows=MODELS.map(m=>{
    const dayCost=(inTok/1e6*m.pIn)+(outTok/1e6*m.pOut);
    const monCost=dayCost*30;
    let s='';
    if(m.brand!==lastBrand){lastBrand=m.brand;s=`<tr class="section-row"><td colspan="8">${BRANDS[m.brand]}</td></tr>`;}
    return s+`<tr>
      <td><span class="brand-badge ${m.brand}">${BRANDS[m.brand].slice(0,3)}</span> ${m.name}${m.free?` <span class="free-badge">FREE</span>`:''}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px">${m.ctx}</td>
      <td><span class="price-in">$${fmt(m.pIn)}</span></td>
      <td><span class="price-out">$${fmt(m.pOut)}</span></td>
      <td style="text-align:center;font-size:11px;color:${m.batch?'var(--green)':'var(--text-dim)'}">${m.batch?t.yes:t.no}</td>
      <td style="text-align:center;font-size:11px;color:${m.free?'var(--green)':'var(--text-dim)'}">${m.free?t.freeTier:t.noTier}</td>
      <td class="cost-cell">${fmtCost(dayCost)}</td>
      <td class="cost-cell">${fmtCost(monCost)}</td>
    </tr>`;
  }).join('');
  document.getElementById('tblBody').innerHTML=rows;
}
_lang=detectLang();render();
</script>
