  words=words.filter(w=>w.length>=minLen);
  if(useStop)words=words.filter(w=>!EN_STOP.has(w.toLowerCase()));
  const freq=new Map();words.forEach(w=>freq.set(w,(freq.get(w)||0)+1));
  const sorted=[...freq.entries()].sort((a,b)=>b[1]-a[1]).slice(0,top);
  const maxCnt=sorted[0]?.[1]||1;
  rb.style.display='block';
  const grid=sorted.map(([w,n])=>`<div class="kw-chip" onclick="copy('${w.replace(/'/g,"\\'").replace(/</g,'&lt;')}',this)">
    <span class="kw-word">${w.replace(/</g,'&lt;')}</span>
    <span class="kw-cnt">${n}</span>
  </div>`).join('');
  const bars=sorted.slice(0,15).map(([w,n])=>`<div class="bar-row">
    <div class="bar-word">${w.replace(/</g,'&lt;')}</div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${n/maxCnt*100}%"></div></div>
    <div class="bar-cnt">${n}</div>
  </div>`).join('');
  document.getElementById('kwGrid').innerHTML=grid||`<span class="empty">${t.empty}</span>`;
  document.getElementById('barSection').innerHTML=bars;
}
function copy(w,el){
  navigator.clipboard.writeText(w).then(()=>{const s=el.querySelector('.kw-cnt');const p=s.textContent;s.textContent=_i18n[_lang].copied;setTimeout(()=>s.textContent=p,1200);});
}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','lblInput','lblTop','lblMinLen','lblStop','lblCase','lblResult'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;extract();
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
