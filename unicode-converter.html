function toUtf8Hex(cp){
  if(cp<0x80)return cp.toString(16).padStart(2,'0').toUpperCase();
  const bytes=[];
  if(cp<0x800){bytes.push(0xC0|(cp>>6));bytes.push(0x80|(cp&0x3F));}
  else if(cp<0x10000){bytes.push(0xE0|(cp>>12));bytes.push(0x80|((cp>>6)&0x3F));bytes.push(0x80|(cp&0x3F));}
  else{bytes.push(0xF0|(cp>>18));bytes.push(0x80|((cp>>12)&0x3F));bytes.push(0x80|((cp>>6)&0x3F));bytes.push(0x80|(cp&0x3F));}
  return bytes.map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
}
function convert(){
  const raw=document.getElementById('inputArea').value;
  if(!raw){['outUPlus','outJsEsc','outHtmlEnt','outUtf8'].forEach(id=>document.getElementById(id).textContent='');return;}
  const chars=[...raw];
  const uplusArr=chars.map(c=>'U+'+c.codePointAt(0).toString(16).toUpperCase().padStart(4,'0'));
  const jsArr=chars.map(c=>{const cp=c.codePointAt(0);return cp<=0xFFFF?'\\u'+cp.toString(16).padStart(4,'0').toUpperCase():'\\u{'+cp.toString(16).toUpperCase()+'}';});
  const htmlArr=chars.map(c=>{const cp=c.codePointAt(0);return cp>127?`&#${cp};`:c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');});
  const utf8Arr=chars.map(c=>toUtf8Hex(c.codePointAt(0)));
  document.getElementById('outUPlus').textContent=uplusArr.join(' ');
  document.getElementById('outJsEsc').textContent=jsArr.join('');
  document.getElementById('outHtmlEnt').textContent=htmlArr.join('');
  document.getElementById('outUtf8').textContent=utf8Arr.join(' ');
}
function decode(){
  const raw=document.getElementById('decodeArea').value;
  let result=raw;
  result=result.replace(/\\u\{([0-9a-fA-F]+)\}/g,(_,h)=>String.fromCodePoint(parseInt(h,16)));
  result=result.replace(/\\u([0-9a-fA-F]{4})/g,(_,h)=>String.fromCodePoint(parseInt(h,16)));
  result=result.replace(/U\+([0-9a-fA-F]{4,6})/g,(_,h)=>String.fromCodePoint(parseInt(h,16)));
  result=result.replace(/&#([0-9]+);/g,(_,d)=>String.fromCodePoint(parseInt(d,10)));
  result=result.replace(/&#x([0-9a-fA-F]+);/g,(_,h)=>String.fromCodePoint(parseInt(h,16)));
  document.getElementById('decodeOut').textContent=result;
}
function copyOut(id){navigator.clipboard.writeText(document.getElementById(id).textContent);}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('inputLabel').textContent=t.inputLabel;document.getElementById('convertBtn').textContent=t.convertBtn;
  document.getElementById('keyUPlus').textContent=t.keyUPlus;document.getElementById('keyJsEsc').textContent=t.keyJsEsc;
  document.getElementById('keyHtmlEnt').textContent=t.keyHtmlEnt;document.getElementById('keyUtf8').textContent=t.keyUtf8;
  document.getElementById('decodeLabel').textContent=t.decodeLabel;
  document.getElementById('inputArea').placeholder=t.placeholder;document.getElementById('decodeArea').placeholder=t.decodePh;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;convert();
}
_lang=detectLang();applyLang();
