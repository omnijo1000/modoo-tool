    seoHtml:`<h2>What is a Twitter Card?</h2><p>Twitter Cards are meta tags that display a <strong>rich preview card with title, description, and image</strong> when a URL is shared on Twitter (X). The four core tags are twitter:card, twitter:title, twitter:description, and twitter:image. Without them, Twitter falls back to Open Graph tags.</p>
<h2 class="seo-sub">Frequently Asked Questions</h2>
<details class="faq-item"><summary>What is a Twitter Card?</summary><p>A Twitter Card is a meta tag standard that displays rich previews — title, description, and image — when a link is shared on Twitter (X). Adding a twitter:card tag to your HTML head lets Twitter crawl the page and generate a card.</p></details>
<details class="faq-item"><summary>What is the difference between summary and summary_large_image?</summary><p>The summary card shows a small square thumbnail (120×120px minimum) on the left. The summary_large_image card shows a large wide image (1200×630px recommended) at the top of the card for stronger visual impact. Use summary_large_image when your image is important.</p></details>
<details class="faq-item"><summary>What is the difference between twitter:site and twitter:creator?</summary><p>twitter:site is the Twitter handle of the website that publishes the content. twitter:creator is the handle of the individual author who wrote the content. For a news site, site is the outlet&apos;s account and creator is the journalist&apos;s account.</p></details>
<details class="faq-item"><summary>What is the recommended image size?</summary><p>For summary_large_image, use 1200×630px (aspect ratio 1.91:1). For summary, use a square image of at least 120×120px. Supported formats are JPEG, PNG, WEBP, and GIF. File size must be under 5MB.</p></details>
<details class="faq-item"><summary>How do I use the Twitter Card Validator?</summary><p>Go to the Twitter Card Validator (cards-dev.twitter.com/validator), enter your URL, and preview how your card will appear. Use this tool to verify your tags after making changes.</p></details>
<details class="faq-item"><summary>Do I need both OG tags and Twitter Card tags?</summary><p>Twitter falls back to og:title, og:description, and og:image when no twitter:card tag is found. OG tags alone work for Twitter shares, but adding twitter:card gives you more precise control over how the card appears.</p></details>

const LANGS=['ko','en','zh','ja'];
let _lang='ko';
let _cardType='summary_large_image';

function detectLang(){
  const u=new URLSearchParams(location.search).get('lang');
  if(u&&_i18n[u])return u;
  const s=localStorage.getItem('modoo_lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language?.slice(0,2);
  return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';
}

function cycleLang(){
  const idx=LANGS.indexOf(_lang);
  _lang=LANGS[(idx+1)%LANGS.length];
  localStorage.setItem('modoo_lang',_lang);
  const url=new URL(location.href);
  url.searchParams.set('lang',_lang);
  history.replaceState({},'',url);
  applyLang();
}

function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.title=t.pageTitle;
  document.getElementById('h1El').innerHTML=t.h1;
  document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('formLabel').textContent=t.formLabel;
  document.getElementById('labelType').textContent=t.labelType;
  document.getElementById('labelTitle').textContent=t.labelTitle;
  document.getElementById('labelDesc').textContent=t.labelDesc;
  document.getElementById('labelImage').textContent=t.labelImage;
  document.getElementById('labelImageAlt').textContent=t.labelImageAlt;
  document.getElementById('labelSite').textContent=t.labelSite;
  document.getElementById('labelCreator').textContent=t.labelCreator;
  document.getElementById('btnCopy').textContent=t.btnCopy;
  document.getElementById('btnClear').textContent=t.btnClear;
  document.getElementById('previewLabel').textContent=t.previewLabel;
  document.getElementById('outputLabel').textContent=t.outputLabel;
  document.getElementById('noImageText').textContent=t.noImageText;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  onInput();
}

function setCard(type, el){
  _cardType=type;
  document.querySelectorAll('.radio-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  onInput();
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function onInput(){
  const title=document.getElementById('twTitle').value;
  const desc=document.getElementById('twDesc').value;
  const image=document.getElementById('twImage').value;
  const site=document.getElementById('twSite').value;

  const tc=document.getElementById('titleCount');
  tc.textContent=`${title.length}/70`;
  tc.className='char-count'+(title.length>70?' warn':'');
  const dc=document.getElementById('descCount');
  dc.textContent=`${desc.length}/200`;
  dc.className='char-count'+(desc.length>200?' warn':'');

  // Update preview image
  const previewImg=document.getElementById('previewImg');
  const isLarge=_cardType==='summary_large_image';
  previewImg.className='tw-preview-img'+(isLarge?'':' summary-size');
  if(image){
    previewImg.innerHTML=`<img src="${escHtml(image)}" alt="card image" onerror="this.parentElement.innerHTML='<span>${_i18n[_lang].noImageText}</span>'">`;
  } else {
    previewImg.innerHTML=`<span id="noImageText">${_i18n[_lang].noImageText}</span>`;
  }
  document.getElementById('previewSite').textContent=site?site:'example.com';
  document.getElementById('previewTitle').textContent=title||'Page Title';
  document.getElementById('previewDesc').textContent=desc||'Description will appear here...';

  generateCard();
}

function generateCard(){
  const title=document.getElementById('twTitle').value;
  const desc=document.getElementById('twDesc').value;
  const image=document.getElementById('twImage').value;
  const imageAlt=document.getElementById('twImageAlt').value;
  const site=document.getElementById('twSite').value;
  const creator=document.getElementById('twCreator').value;

  const lines=[];
  const add=(name,val)=>{if(val.trim())lines.push(`<meta name="${name}" content="${escHtml(val)}">`);};
  lines.push(`<meta name="twitter:card" content="${_cardType}">`);
  add('twitter:title',title);
  add('twitter:description',desc);
  add('twitter:image',image);
  add('twitter:image:alt',imageAlt);
  add('twitter:site',site);
  add('twitter:creator',creator);
  document.getElementById('outputTa').value=lines.join('\n');
}

function copyOutput(){
  const t=_i18n[_lang];
  const text=document.getElementById('outputTa').value;
  if(!text)return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('btnCopy');
    btn.textContent=t.copyDone;
    btn.style.background='var(--green)';
    btn.style.borderColor='var(--green)';
    btn.style.color='#000';
    setTimeout(()=>{btn.textContent=t.btnCopy;btn.style.background='';btn.style.borderColor='';btn.style.color='';},2000);
  }).catch(()=>{document.getElementById('outputTa').select();document.execCommand('copy');});
}

function doClear(){
  ['twTitle','twDesc','twImage','twImageAlt','twSite','twCreator'].forEach(id=>{document.getElementById(id).value='';});
  onInput();
}

_lang=detectLang();
applyLang();
