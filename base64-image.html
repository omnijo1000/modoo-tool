header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}

main{max-width:720px;margin:0 auto;padding:32px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}

.drop-icon{font-size:36px;margin-bottom:10px;}

textarea.b64-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;outline:none;resize:none;line-height:1.6;min-height:160px;}

const _i18n={
  ko:{sub:'이미지 → Base64 Data URL 변환 · Base64 → 이미지 디코딩',langBtn:'🌐 EN',backBtn:'← 모두의 툴',modeEncode:'이미지 → Base64',modeDecode:'Base64 → 이미지',dropText:'이미지를 드래그하거나 클릭해서 선택',dropHint:'PNG · JPEG · GIF · WebP · SVG · BMP',dataUrlLabel:'DATA URL',copyDataUrl:'Data URL 복사',copyRaw:'Raw Base64 복사',downloadBtn:'다운로드',downloadDecoded:'이미지 저장',seoHtml:'<h2>Base64 이미지 변환기란?</h2><p>이미지 파일을 <strong>Base64 Data URL</strong>로 인코딩하거나, Base64 문자열을 원본 이미지로 디코딩합니다. 인코딩된 이미지는 HTML <code>&lt;img src="data:image/..."&gt;</code> 또는 CSS <code>background-image</code>에 직접 삽입할 수 있어 별도 파일 없이 단일 HTML 파일에 이미지를 포함할 때 유용합니다. PNG·JPEG·GIF·WebP·SVG·BMP를 지원하며 모든 처리는 브라우저에서 이루어집니다.</p><h2>자주 묻는 질문 (FAQ)</h2><details class="faq-item"><summary>Base64 이미지는 언제 사용하나요?</summary><p>이메일 HTML 본문에 이미지 삽입, 단일 HTML 파일로 배포할 때, CDN 없이 소규모 아이콘을 CSS에 포함할 때 유용합니다. 단, 파일 크기가 원본보다 약 33% 커집니다.</p></details><details class="faq-item"><summary>Data URL과 Raw Base64의 차이는?</summary><p>Data URL은 <code>data:image/png;base64,...</code> 형식으로 브라우저가 바로 이미지로 해석할 수 있습니다. Raw Base64는 순수 인코딩 문자열로 API 전송이나 서버 처리 시 사용합니다.</p></details><details class="faq-item"><summary>용량 제한이 있나요?</summary><p>브라우저 메모리 한도 내에서 처리 가능하지만, 대용량 이미지(수 MB 이상)는 Base64 인코딩 시 페이지 성능에 영향을 줄 수 있습니다. 큰 이미지는 별도 파일로 호스팅하는 것을 권장합니다.</p></details><details class="faq-item"><summary>SVG도 Base64로 변환할 수 있나요?</summary><p>네. SVG는 텍스트 기반이므로 Base64 외에도 URL 인코딩(<code>data:image/svg+xml,...</code>)으로 삽입할 수 있습니다. 이 계산기는 Base64 변환을 지원합니다.</p></details><details class="faq-item"><summary>보안 문제는 없나요?</summary><p>모든 처리가 브라우저 내에서만 이루어지며 서버로 이미지가 전송되지 않습니다. 민감한 이미지도 안전하게 변환할 수 있습니다.</p></details>',toastMsg:'복사되었습니다!'},
  en:{sub:'Image → Base64 Data URL · Base64 → Image decode',langBtn:'🌐 中文',backBtn:'← All Tools',modeEncode:'Image → Base64',modeDecode:'Base64 → Image',dropText:'Drag & drop or click to select image',dropHint:'PNG · JPEG · GIF · WebP · SVG · BMP',dataUrlLabel:'DATA URL',copyDataUrl:'Copy Data URL',copyRaw:'Copy Raw Base64',downloadBtn:'Download',downloadDecoded:'Save Image',seoHtml:'<h2>Base64 Image Converter</h2><p>Encode image files to <strong>Base64 Data URLs</strong> for inline HTML/CSS embedding, or decode Base64 strings back to original images. Encoded images can be used directly in <code>&lt;img src="data:image/..."&gt;</code> or CSS <code>background-image</code> — no separate file needed. Supports PNG, JPEG, GIF, WebP, SVG, and BMP. All processing happens in the browser.</p><h2>FAQ</h2><details class="faq-item"><summary>When should I use Base64 images?</summary><p>Base64 is useful for embedding images in HTML emails, packaging single-file HTML documents, or inlining small icons in CSS without a CDN. Note: Base64 increases file size by ~33% vs the original.</p></details><details class="faq-item"><summary>What is the difference between Data URL and Raw Base64?</summary><p>A Data URL includes the MIME type prefix (<code>data:image/png;base64,...</code>) and can be used directly in browsers. Raw Base64 is just the encoded string, useful for API calls or server-side processing.</p></details><details class="faq-item"><summary>Is there a file size limit?</summary><p>Processing is limited by browser memory. Very large images (several MB+) can slow down the page when encoded to Base64. For large images, hosting them as separate files is recommended.</p></details><details class="faq-item"><summary>Can I convert SVG to Base64?</summary><p>Yes. SVGs can also be embedded using URL-encoding (<code>data:image/svg+xml,...</code>), but this tool converts them to Base64 format.</p></details><details class="faq-item"><summary>Is it safe to use with sensitive images?</summary><p>Yes — all processing is done locally in your browser. No images are sent to any server.</p></details>',toastMsg:'Copied!'},
  zh:{sub:'图片→Base64 Data URL转换 · Base64→图片解码',langBtn:'🌐 日本語',backBtn:'← 所有工具',modeEncode:'图片 → Base64',modeDecode:'Base64 → 图片',dropText:'拖放或点击选择图片',dropHint:'PNG · JPEG · GIF · WebP · SVG · BMP',dataUrlLabel:'DATA URL',copyDataUrl:'复制Data URL',copyRaw:'复制Raw Base64',downloadBtn:'下载',downloadDecoded:'保存图片',seoHtml:'<h2>Base64图片转换器</h2><p>将图片文件编码为<strong>Base64 Data URL</strong>用于HTML/CSS内联，或将Base64字符串解码为原始图片。编码后的图片可直接用于<code>&lt;img src="data:image/..."&gt;</code>或CSS背景图，无需单独文件。支持PNG、JPEG、GIF、WebP、SVG、BMP，全部在浏览器本地处理。</p><h2>常见问题 (FAQ)</h2><details class="faq-item"><summary>什么时候使用Base64图片？</summary><p>适用于HTML邮件中嵌入图片、打包单文件HTML文档、或在CSS中内联小图标（无需CDN）。注意：Base64编码后文件大小比原始增加约33%。</p></details><details class="faq-item"><summary>Data URL和Raw Base64有什么区别？</summary><p>Data URL包含MIME类型前缀（<code>data:image/png;base64,...</code>），可直接在浏览器中使用。Raw Base64是纯编码字符串，适用于API传输或服务器处理。</p></details><details class="faq-item"><summary>有文件大小限制吗？</summary><p>受浏览器内存限制，大文件（几MB以上）编码为Base64时可能影响页面性能。大图片建议独立托管。</p></details><details class="faq-item"><summary>SVG也可以转换成Base64吗？</summary><p>可以。SVG还可以使用URL编码（<code>data:image/svg+xml,...</code>）方式嵌入，本工具支持Base64格式转换。</p></details><details class="faq-item"><summary>使用时安全吗？</summary><p>完全安全——所有处理均在浏览器本地进行，图片不会上传至任何服务器。</p></details>',toastMsg:'已复制！'},
  ja:{sub:'画像→Base64 Data URL変換 · Base64→画像デコード',langBtn:'🌐 한국어',backBtn:'← ホーム',modeEncode:'画像 → Base64',modeDecode:'Base64 → 画像',dropText:'画像をドラッグするかクリックして選択',dropHint:'PNG · JPEG · GIF · WebP · SVG · BMP',dataUrlLabel:'DATA URL',copyDataUrl:'Data URL をコピー',copyRaw:'Raw Base64 をコピー',downloadBtn:'ダウンロード',downloadDecoded:'画像を保存',seoHtml:'<h2>Base64画像コンバーターとは？</h2><p>画像ファイルを<strong>Base64 Data URL</strong>にエンコードしてHTML/CSSにインライン埋め込みしたり、Base64文字列を元の画像にデコードしたりします。エンコードした画像は<code>&lt;img src="data:image/..."&gt;</code>やCSS <code>background-image</code>に直接使用でき、別ファイル不要で単一HTMLに画像を含められます。PNG・JPEG・GIF・WebP・SVG・BMPに対応し、すべてブラウザ内で処理します。</p><h2>よくある質問 (FAQ)</h2><details class="faq-item"><summary>Base64画像はどんな場面で使いますか？</summary><p>HTMLメール内への画像埋め込み、単一ファイルHTMLの配布、CDNなしでCSSに小アイコンをインラインする場合に便利です。なお、Base64エンコード後はファイルサイズが約33%増加します。</p></details><details class="faq-item"><summary>Data URLとRaw Base64の違いは？</summary><p>Data URLはMIMEタイプのプレフィックス（<code>data:image/png;base64,...</code>）を含み、ブラウザが直接画像として解釈できます。Raw Base64は純粋なエンコード文字列で、API送信やサーバー処理に使います。</p></details><details class="faq-item"><summary>ファイルサイズの制限はありますか？</summary><p>ブラウザのメモリ制限内で処理できますが、数MB以上の大きな画像をBase64化するとページパフォーマンスに影響する場合があります。大きな画像は別ファイルでホスティングを推奨します。</p></details><details class="faq-item"><summary>SVGもBase64に変換できますか？</summary><p>はい。SVGはURL エンコード（<code>data:image/svg+xml,...</code>）でも埋め込めますが、このツールはBase64変換に対応しています。</p></details><details class="faq-item"><summary>プライバシー面は安全ですか？</summary><p>はい。すべての処理はブラウザ内のみで完結し、画像はサーバーに送信されません。機密性の高い画像も安全に変換できます。</p></details>',toastMsg:'コピーしました！'},
};
let _lang='ko',_mode='encode',_dataUrl='';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

function setMode(m){
  _mode=m;
  document.getElementById('modeEncode').classList.toggle('on',m==='encode');
  document.getElementById('modeDecode').classList.toggle('on',m==='decode');
  document.getElementById('encodeWrap').style.display=m==='encode'?'block':'none';
  document.getElementById('decodeWrap').style.display=m==='decode'?'block':'none';
}

function onDragOver(e){e.preventDefault();document.getElementById('dropZone').classList.add('over');}
function onDragLeave(){document.getElementById('dropZone').classList.remove('over');}
function onDrop(e){e.preventDefault();document.getElementById('dropZone').classList.remove('over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))readFile(f);}
function onFileSelect(e){const f=e.target.files[0];if(f)readFile(f);}

function readFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    _dataUrl=e.target.result;
    document.getElementById('previewImg').src=_dataUrl;
    document.getElementById('previewWrap').style.display='block';
    document.getElementById('fileInfo').textContent=file.name+' · '+file.type+' · '+(file.size/1024).toFixed(1)+' KB';
    document.getElementById('b64Output').textContent=_dataUrl;
    document.getElementById('outputSection').style.display='block';
  };
  reader.readAsDataURL(file);
}

function copyB64(){if(!_dataUrl)return;navigator.clipboard?.writeText(_dataUrl).then(showToast).catch(()=>fallbackCopy(_dataUrl));}
function copyB64Raw(){if(!_dataUrl)return;const raw=_dataUrl.split(',')[1]||'';navigator.clipboard?.writeText(raw).then(showToast).catch(()=>fallbackCopy(raw));}
function downloadImg(){if(!_dataUrl)return;const a=document.createElement('a');a.href=_dataUrl;a.download='image';a.click();}

function decodeB64(){
  const raw=document.getElementById('b64Input').value.trim();
  const err=document.getElementById('decodeErr');
  err.style.display='none';
  document.getElementById('decodeActions').style.display='none';
  const img=document.getElementById('decodedImg');
  img.style.display='none';
  if(!raw)return;
  let src=raw;
  if(!raw.startsWith('data:')){
    src='data:image/png;base64,'+raw.replace(/\s/g,'');
  }
  img.onload=()=>{img.style.display='block';document.getElementById('decodeActions').style.display='flex';};
  img.onerror=()=>{img.style.display='none';err.textContent='⚠ 유효하지 않은 Base64 이미지입니다.';err.style.display='block';};
  img.src=src;
}

function downloadDecoded(){const img=document.getElementById('decodedImg');if(!img.src)return;const a=document.createElement('a');a.href=img.src;a.download='decoded-image';a.click();}

function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();}
function showToast(){const el=document.getElementById('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
_lang=detectLang();applyLang();setMode('encode');
</script>
<script src="related.js"></script>
