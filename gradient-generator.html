<details class="faq-item"><summary>Tailwind CSSでも使えますか？</summary><p>任意値構文で使えます：bg-[linear-gradient(...)]。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblType','lblAngle','lblStops','lblPresets','btnAddStop','lblCss'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('copyBadge').textContent=t.copyBadge;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function setType(type){_type=type;['linear','radial','conic'].forEach((t,i)=>document.getElementById('tab'+i).classList.toggle('active',t===type));document.getElementById('angleRow').style.display=(type==='radial')?'none':'flex';update();}
function buildCss(){
  const stopsStr=stops.map(s=>`${s.c} ${s.p}%`).join(', ');
  if(_type==='linear'){const a=document.getElementById('angle').value;return`linear-gradient(${a}deg, ${stopsStr})`;}
  if(_type==='radial')return`radial-gradient(circle, ${stopsStr})`;
  if(_type==='conic'){const a=document.getElementById('angle').value;return`conic-gradient(from ${a}deg, ${stopsStr})`;}
}
function update(){const css=buildCss();document.getElementById('preview').style.background=css;document.getElementById('codeText').textContent=`background: ${css};`;}
function renderStops(){
  const list=document.getElementById('stopsList');list.innerHTML='';
  stops.forEach((s,i)=>{
    const row=document.createElement('div');row.className='stop-row';
    const col=document.createElement('input');col.type='color';col.value=s.c;col.oninput=()=>{stops[i].c=col.value;update();};
    const pos=document.createElement('input');pos.type='number';pos.className='stop-pos';pos.value=s.p;pos.min=0;pos.max=100;pos.oninput=()=>{stops[i].p=+pos.value;update();};
    const del=document.createElement('button');del.className='stop-del';del.textContent='×';del.onclick=()=>{if(stops.length>2)stops.splice(i,1);renderStops();update();};
    row.appendChild(col);row.appendChild(pos);row.appendChild(del);list.appendChild(row);
  });
}
function addStop(){stops.push({c:'#ffffff',p:Math.min(stops[stops.length-1].p+20,100)});renderStops();update();}
function copyCode(){
  const css=document.getElementById('codeText').textContent;
  navigator.clipboard.writeText(css).catch(()=>{});
  const b=document.getElementById('copyBadge');b.textContent=_i18n[_lang].copied;setTimeout(()=>{b.textContent=_i18n[_lang].copyBadge;},1500);
}
function buildPresets(){
  const row=document.getElementById('presetsRow');row.innerHTML='';
  PRESETS.forEach(colors=>{
    const p=document.createElement('div');p.className='preset';
    p.style.background=`linear-gradient(135deg, ${colors.join(', ')})`;
    p.onclick=()=>{stops=colors.map((c,i)=>({c,p:Math.round(i*(100/(colors.length-1)))}));renderStops();update();};
    row.appendChild(p);
  });
}
_lang=detectLang();applyLang();buildPresets();renderStops();update();
</script>
