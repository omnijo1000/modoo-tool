  <div id="sectBasic" class="section-title">기본 정보</div>

    <div class="field"><div class="field-label" id="lblUrl">제품 URL</div><input id="fUrl" placeholder="https://..."></div>
  </div>
  <div id="sectOffer" class="section-title">가격 / 재고</div>

    seoHtml:`<h2>제품 스키마 생성기</h2><p>Product Schema(상품 구조화 데이터)를 JSON-LD 형식으로 생성합니다. Google 검색 결과에서 제품 이름, 가격, 평점, 재고 상태가 리치 결과로 표시되어 클릭률을 높일 수 있습니다. 쇼핑몰, 이커머스 사이트에 필수적인 SEO 최적화 도구입니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>Product 스키마가 가격 정보를 표시하나요?</summary><p>예, Google은 가격과 통화, 재고 상태를 검색 결과에 표시할 수 있습니다.</p></details>
<details class="faq-item"><summary>평점은 실제 리뷰 수와 달라도 되나요?</summary><p>아니오, ratingCount는 실제 리뷰 수와 정확히 일치해야 합니다. 허위 정보는 패널티를 받을 수 있습니다.</p></details>

  en:{h1Accent:'Schema Generator',sub:'Generate Product Schema JSON-LD to show product info in Google rich results',backLink:'← All Tools',langBtn:'🌐 中文',sectBasic:'Basic Info',sectOffer:'Price / Availability',sectRating:'Rating (optional)',lblName:'Product name',lblDesc:'Description',lblBrand:'Brand',lblSku:'SKU / Model number',lblImg:'Image URL',lblUrl:'Product URL',lblPrice:'Price',lblCurrency:'Currency',lblAvail:'Availability',lblPriceValid:'Price valid until',lblRatingVal:'Avg rating (1-5)',lblRatingCount:'Review count',btnGen:'Generate Schema',btnSample:'Sample',btnClear:'Clear',outTitle:'JSON-LD Schema',btnCopy:'Copy',availOpts:['In Stock','Out of Stock','Pre-Order','Limited Availability'],
    seoHtml:`<h2>Product Schema Generator</h2><p>Generate Product Schema structured data in JSON-LD format. Google can show product name, price, rating, and availability as rich results in search, boosting click-through rates for e-commerce and product pages.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Does Product schema show price info?</summary><p>Yes — Google can display price, currency, and availability in search results.</p></details>
<details class="faq-item"><summary>Must the rating match actual reviews?</summary><p>Yes — ratingCount must match actual review counts. False data can lead to penalties.</p></details>

    seoHtml:`<h2>产品架构生成器</h2><p>以JSON-LD格式生成Product Schema结构化数据。Google可以在搜索结果中以富媒体形式显示产品名称、价格、评分和库存状态，提高电商和产品页面的点击率。</p>

  ja:{h1Accent:'スキーマジェネレーター',sub:'Product Schema JSON-LDを生成してGoogle リッチリザルトに製品情報を表示します',backLink:'← ホーム',langBtn:'🌐 한국어',sectBasic:'基本情報',sectOffer:'価格/在庫',sectRating:'評価（任意）',lblName:'製品名',lblDesc:'説明',lblBrand:'ブランド',lblSku:'SKU/型番',lblImg:'画像URL',lblUrl:'製品URL',lblPrice:'価格',lblCurrency:'通貨',lblAvail:'在庫状況',lblPriceValid:'価格有効期限',lblRatingVal:'平均評価(1-5)',lblRatingCount:'レビュー数',btnGen:'スキーマ生成',btnSample:'サンプル',btnClear:'クリア',outTitle:'JSON-LDスキーマ',btnCopy:'コピー',availOpts:['在庫あり','在庫なし','予約注文','在庫僅少'],
    seoHtml:`<h2>製品スキーマジェネレーター</h2><p>JSON-LD形式でProduct Schema構造化データを生成します。GoogleはECサイトや製品ページで製品名、価格、評価、在庫状況をリッチリザルトとして表示でき、クリック率向上に役立ちます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>Product スキーマは価格情報を表示しますか？</summary><p>はい — Googleは価格、通貨、在庫状況を検索結果に表示できます。</p></details>
<details class="faq-item"><summary>評価は実際のレビューと一致する必要がありますか？</summary><p>はい — ratingCountは実際のレビュー数と正確に一致する必要があります。虚偽情報はペナルティの対象です。</p></details>
<details class="faq-item"><summary>SKUは必須ですか？</summary><p>必須ではありませんが、Googleが製品を正確に識別するのに役立ちます。</p></details>
<details class="faq-item"><summary>複数の価格オプションを表現できますか？</summary><p>配列内の複数のOfferオブジェクトまたはAggregateOfferタイプを使用します。</p></details>
<details class="faq-item"><summary>画像は何枚追加できますか？</summary><p>配列で複数の画像を提供できます。</p></details>
<details class="faq-item"><summary>Product スキーマはGoogle Shoppingに影響しますか？</summary><p>Google ShoppingにはMerchant Centerの別のフィードが必要です。スキーマはオーガニックリッチリザルト用です。</p></details>
<details class="faq-item"><summary>価格がよく変わる場合は？</summary><p>priceValidUntilを設定し、価格が変わるたびにスキーマを更新してください。</p></details>
<details class="faq-item"><summary>評価なしでProduct スキーマを使えますか？</summary><p>はい — aggregateRatingは任意です。価格と在庫情報だけでもリッチリザルトになる可能性があります。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','sectBasic','sectOffer','sectRating','lblName','lblDesc','lblBrand','lblSku','lblImg','lblUrl','lblPrice','lblCurrency','lblAvail','lblPriceValid','lblRatingVal','lblRatingCount','btnGen','btnSample','btnClear','outTitle','btnCopy'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  const avEl=document.getElementById('fAvail');if(avEl)t.availOpts.forEach((o,i)=>{if(avEl.options[i])avEl.options[i].text=o;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function gv(id){return document.getElementById(id).value.trim();}
function generate(){
  const name=gv('fName');if(!name)return;
  const schema={"@context":"https://schema.org","@type":"Product","name":name};
  if(gv('fDesc'))schema.description=gv('fDesc');
  if(gv('fImg'))schema.image=gv('fImg');
  if(gv('fUrl'))schema.url=gv('fUrl');
  if(gv('fSku'))schema.sku=gv('fSku');
  if(gv('fBrand'))schema.brand={"@type":"Brand","name":gv('fBrand')};
  const price=gv('fPrice');
  if(price){
    const offer={"@type":"Offer","price":price,"priceCurrency":gv('fCurrency'),"availability":"https://schema.org/"+gv('fAvail')};
    if(gv('fPriceValid'))offer.priceValidUntil=gv('fPriceValid');
    schema.offers=offer;
  }
  const rating=gv('fRating');const ratingCount=gv('fRatingCount');
  if(rating&&ratingCount)schema.aggregateRating={"@type":"AggregateRating","ratingValue":parseFloat(rating),"reviewCount":parseInt(ratingCount)};
  document.getElementById('outPre').textContent=JSON.stringify(schema,null,2);
  document.getElementById('outBox').style.display='block';
}
function copyOut(){navigator.clipboard.writeText(document.getElementById('outPre').textContent);}
function clearForm(){['fName','fDesc','fBrand','fSku','fImg','fUrl','fPrice','fPriceValid','fRating','fRatingCount'].forEach(id=>document.getElementById(id).value='');document.getElementById('outBox').style.display='none';}
function loadSample(){
  document.getElementById('fName').value=_lang==='ko'?'스마트폰 케이스 갤럭시 S24 울트라':_lang==='ja'?'スマートフォンケース Galaxy S24 Ultra':_lang==='zh'?'智能手机保护套 Galaxy S24 Ultra':'Smartphone Case for Galaxy S24 Ultra';
  document.getElementById('fDesc').value=_lang==='ko'?'고강도 TPU 소재의 충격 방지 케이스. 카메라 렌즈 보호 기능 내장.':_lang==='ja'?'高強度TPU素材の耐衝撃ケース。カメラレンズ保護機能内蔵。':_lang==='zh'?'高强度TPU材料防震保护套，内置摄像头镜头保护功能。':'High-strength TPU shock-absorbing case with built-in camera lens protection.';
  document.getElementById('fBrand').value='CasePro';document.getElementById('fSku').value='CP-S24U-BLK-001';
  document.getElementById('fImg').value='https://example.com/images/case-s24u.jpg';
  document.getElementById('fUrl').value='https://example.com/products/galaxy-s24-ultra-case';
  document.getElementById('fPrice').value='19.99';document.getElementById('fCurrency').value='USD';
  document.getElementById('fAvail').value='InStock';
  document.getElementById('fPriceValid').value='2026-12-31';
  document.getElementById('fRating').value='4.7';document.getElementById('fRatingCount').value='328';
  generate();
}
_lang=detectLang();applyLang();
</script>
