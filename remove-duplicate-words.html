<header>

<main>
  <h1><span data-i18n="h1a">Remove Duplicate</span> <span data-i18n="h1b">Words</span></h1>
  <p class="subtitle" data-i18n="sub">Remove all duplicate words from your text while preserving order.</p>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="sTotalW">0</div><div class="stat-label" data-i18n="statTotal">Total Words</div></div>
    <div class="stat"><div class="stat-val" id="sUniqueW">0</div><div class="stat-label" data-i18n="statUnique">Unique Words</div></div>
    <div class="stat"><div class="stat-val" id="sRemovedW">0</div><div class="stat-label" data-i18n="statRemoved">Removed</div></div>
  </div>

  <div class="options-row">
    <label class="opt-label"><input type="checkbox" id="optCaseInsensitive" checked> <span data-i18n="optCase">Case-insensitive</span></label>
    <label class="opt-label"><input type="checkbox" id="optPreserveOrder" checked> <span data-i18n="optOrder">Preserve order</span></label>
  </div>

  <div class="col-wrap">
    <div>
      <div class="col-label" data-i18n="labelInput">INPUT</div>
      <textarea id="inputArea" placeholder="Paste your text here..."></textarea>
    </div>
    <div>
      <div class="col-label" data-i18n="labelOutput">OUTPUT</div>
      <textarea id="outputArea" placeholder="Result will appear here..." readonly></textarea>
    </div>
  </div>

  <div class="toolbar">
    <button class="tool-btn primary" onclick="processText()" data-i18n="btnProcess">Remove Duplicates</button>
    <button class="tool-btn" onclick="copyOutput()" data-i18n="btnCopy">📋 Copy</button>
    <button class="tool-btn" onclick="clearAll()" data-i18n="btnClear">🗑 Clear</button>
  </div>

  <div class="seo">
    <h2 id="seoTitle1"></h2>
    <p id="seoBody1"></p>
    <p id="seoFaq1"></p>
    <p id="seoFaq2"></p>
  </div>
  <footer>© 2026 MODOO HUB · Free · <a href="privacy.html" style="color:var(--text-dim);text-decoration:none;">Privacy Policy</a></footer>
</main>
<script>
function processText(){
  const input=document.getElementById('inputArea').value;
  const ci=document.getElementById('optCaseInsensitive').checked;
  const po=document.getElementById('optPreserveOrder').checked;
  const words=input.match(/\S+/g)||[];
  const seen=new Set();
  let result;
  if(po){
    result=words.filter(w=>{const k=ci?w.toLowerCase():w;if(seen.has(k))return false;seen.add(k);return true;});
  }else{
    const unique=[...new Set(words.map(w=>ci?w.toLowerCase():w))];
    result=unique;
  }
  document.getElementById('outputArea').value=result.join(' ');
  document.getElementById('sTotalW').textContent=words.length.toLocaleString();
  document.getElementById('sUniqueW').textContent=result.length.toLocaleString();
  document.getElementById('sRemovedW').textContent=(words.length-result.length).toLocaleString();
}
function copyOutput(){const v=document.getElementById('outputArea').value;if(v)navigator.clipboard.writeText(v);}
function clearAll(){document.getElementById('inputArea').value='';document.getElementById('outputArea').value='';['sTotalW','sUniqueW','sRemovedW'].forEach(id=>document.getElementById(id).textContent='0');}
</script>

};
function _detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';else if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
let _lang=_detectLang();
function _applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=t.lang;document.title=t.title;
  const btn=document.getElementById('langBtn');if(btn)btn.textContent=t.btn;
  const back=document.querySelector('.back-link');
  if(back)back.textContent=(_lang==='ko')?'← 모두의 툴':(_lang==='zh')?'← 首页':(_lang==='ja')?'← ホーム':'← Home';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
  ['seoTitle1','seoBody1','seoFaq1','seoFaq2'].forEach(id=>{const el=document.getElementById(id);if(el&&t[id]!==undefined)el.innerHTML=t[id];});
}
const _langOrder=['ko','en','zh','ja'];
function cycleLang(){const idx=_langOrder.indexOf(_lang);_lang=_langOrder[(idx+1)%_langOrder.length];localStorage.setItem('lang',_lang);const url=new URL(location.href);if(_lang==='ko'){url.searchParams.delete('lang');}else{url.searchParams.set('lang',_lang);}history.replaceState({},'',url);_applyLang();}
_applyLang();
</script>
