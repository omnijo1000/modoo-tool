  if(document.getElementById('optAll'))document.getElementById('optAll').textContent=t.optAll;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])loadPdf(e.dataTransfer.files[0]);});
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])loadPdf(e.target.files[0]);});
async function loadPdf(file){
  _fileName=file.name;
  const ab=await file.arrayBuffer();
  _pdf=await pdfjsLib.getDocument({data:ab}).promise;
  document.getElementById('ctrlSection').style.display='block';
  document.getElementById('thumbGrid').innerHTML='';
}
async function generate(){
  if(!_pdf)return;
  const t=_i18n[_lang];const mode=document.getElementById('pageMode').value;const scale=parseFloat(document.getElementById('scale').value);
  const n=mode==='first'?1:_pdf.numPages;
  const grid=document.getElementById('thumbGrid');grid.innerHTML='';
  document.getElementById('progressBar').style.display='block';
  for(let i=1;i<=n;i++){
    const page=await _pdf.getPage(i);
    const vp=page.getViewport({scale});
    const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;
    const ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport:vp}).promise;
    const dataUrl=canvas.toDataURL('image/png');
    const card=document.createElement('div');card.className='thumb-card';
    const img=document.createElement('img');img.src=dataUrl;img.className='thumb-img';
    const footer=document.createElement('div');footer.className='thumb-footer';
    footer.innerHTML=`<span class="thumb-label">${t.page} ${i}</span>`;
    const dlBtn=document.createElement('button');dlBtn.className='dl-btn';dlBtn.textContent=t.dlBtn;
    dlBtn.onclick=()=>{const a=document.createElement('a');a.href=dataUrl;a.download=`${_fileName.replace(/\.pdf$/i,'')}_page${i}.png`;a.click();};
    footer.appendChild(dlBtn);card.appendChild(img);card.appendChild(footer);grid.appendChild(card);
    document.getElementById('progressFill').style.width=`${(i/n)*100}%`;
  }
  document.getElementById('progressBar').style.display='none';
}
function clearAll(){document.getElementById('ctrlSection').style.display='none';document.getElementById('thumbGrid').innerHTML='';document.getElementById('fileInput').value='';_pdf=null;}
_lang=detectLang();applyLang();
</script>
