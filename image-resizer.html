<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Resizer - Free Online Image Resize Tool</title>
<meta name="description" content="Free online image resizer. Resize images by pixels or percentage. Lock aspect ratio. Export as JPEG, PNG, WebP. All processing in browser.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="alternate" hreflang="ko" href="https://modoohub.com/image-resizer.html">
<link rel="alternate" hreflang="en" href="https://modoohub.com/image-resizer.html?lang=en">
<link rel="alternate" hreflang="zh" href="https://modoohub.com/image-resizer.html?lang=zh">
<link rel="alternate" hreflang="x-default" href="https://modoohub.com/image-resizer.html">
<link rel="canonical" href="https://modoohub.com/image-resizer.html">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#a78bfa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:680px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:50px 20px;text-align:center;cursor:pointer;transition:all .2s;}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:rgba(167,139,250,.05);}
.drop-icon{font-size:40px;margin-bottom:10px;}
.drop-text{font-size:14px;color:var(--text-muted);}
input[type=file]{display:none;}
.opts{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-top:16px;display:none;}
.mode-row{display:flex;gap:6px;margin-bottom:14px;}
.mode-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;background:none;transition:all .15s;}
.mode-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(167,139,250,.08);}
.dim-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.dim-label{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;min-width:24px;}
input.dim-in{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;width:100px;text-align:center;}
input.dim-in:focus{border-color:var(--accent);}
.lock-btn{padding:7px 12px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--accent);font-size:14px;cursor:pointer;}
.lock-btn.locked{background:rgba(167,139,250,.1);}
.info-row{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:12px;}
.opt-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.opt-label{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;min-width:60px;}
select.sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
input[type=range]{flex:1;accent-color:var(--accent);}
.val-b{font-size:13px;color:var(--accent);font-family:'DM Mono',monospace;min-width:40px;}
.resize-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-top:12px;}
.resize-btn:hover{opacity:.85;}
.result{margin-top:20px;display:none;}
.result-img-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;margin-bottom:12px;}
.result-img{max-width:100%;max-height:300px;border-radius:6px;object-fit:contain;}
.result-info{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:8px;}
.dl-btn{width:100%;padding:11px;border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;background:none;}
.dl-btn:hover{background:rgba(167,139,250,.1);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NR6VJF0534"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-NR6VJF0534');</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6334638921720175" crossorigin="anonymous"></script>
<meta property="og:title" content="Image Resizer - Free Online Image Resize Tool">
<meta property="og:image" content="https://modoohub.com/og-image.png">
</head>
<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>Image <span>Resizer</span></h1>
  <p class="sub" data-i18n="sub">이미지 크기 변경 · 픽셀/비율 조절 · 비율 잠금</p>

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fi').click()"
       ondragover="ev(event,'over')" ondragleave="ev(event,'leave')" ondrop="ev(event,'drop')">
    <div class="drop-icon">📐</div>
    <div class="drop-text" data-i18n="dropText">이미지를 드래그하거나 클릭해서 선택</div>
  </div>
  <input type="file" id="fi" accept="image/*" onchange="onFile(event)">

  <div class="opts" id="opts">
    <div class="mode-row">
      <button class="mode-btn on" id="mPx" onclick="setMode('px')" data-i18n="modePx">픽셀</button>
      <button class="mode-btn" id="mPct" onclick="setMode('pct')" data-i18n="modePct">비율 (%)</button>
    </div>
    <div id="pxWrap">
      <div class="info-row" id="origDim"></div>
      <div class="dim-row">
        <span class="dim-label">W</span>
        <input class="dim-in" type="number" id="wIn" min="1" oninput="onW()">
        <span style="color:var(--text-dim)">×</span>
        <span class="dim-label">H</span>
        <input class="dim-in" type="number" id="hIn" min="1" oninput="onH()">
        <button class="lock-btn locked" id="lockBtn" onclick="toggleLock()" title="aspect ratio">🔒</button>
      </div>
    </div>
    <div id="pctWrap" style="display:none">
      <div class="dim-row">
        <span class="dim-label">%</span>
        <input type="range" id="pctIn" min="1" max="200" value="100" oninput="document.getElementById('pctVal').textContent=this.value+'%'">
        <span class="val-b" id="pctVal">100%</span>
      </div>
    </div>
    <div class="opt-row" style="margin-top:4px">
      <span class="opt-label" data-i18n="fmtLabel">출력</span>
      <select class="sm" id="outFmt">
        <option value="jpeg">JPEG</option>
        <option value="png">PNG</option>
        <option value="webp">WebP</option>
      </select>
      <span class="opt-label" data-i18n="qualLabel">품질</span>
      <input type="range" id="quality" min="1" max="100" value="90" oninput="document.getElementById('qVal').textContent=this.value+'%'">
      <span class="val-b" id="qVal">90%</span>
    </div>
    <button class="resize-btn" onclick="doResize()" data-i18n="resizeBtn">▶ 리사이즈</button>
  </div>

  <div class="result" id="result">
    <div class="result-img-wrap">
      <img class="result-img" id="resultImg">
      <div class="result-info" id="resultInfo"></div>
    </div>
    <button class="dl-btn" onclick="download()" data-i18n="dlBtn">⬇ 다운로드</button>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">Image Resizer란?</h2>
    <p data-i18n="seoP">Canvas API를 사용해 브라우저에서 이미지 크기를 변경합니다. 가로/세로 픽셀 직접 입력 또는 비율(%) 조절, 비율 잠금 기능을 지원합니다.</p>
  </div>
  <footer>Image Resizer · Canvas API · All processing in browser</footer>
</main>
<script>
const _i18n={
  ko:{sub:'이미지 크기 변경 · 픽셀/비율 조절 · 비율 잠금',langBtn:'🌐 EN',backBtn:'← 모두의 툴',dropText:'이미지를 드래그하거나 클릭해서 선택',modePx:'픽셀',modePct:'비율 (%)',fmtLabel:'출력',qualLabel:'품질',resizeBtn:'▶ 리사이즈',dlBtn:'⬇ 다운로드',seoH2:'Image Resizer란?',seoP:'Canvas API로 이미지 크기를 변경합니다. 픽셀 직접 입력·비율 조절·비율 잠금을 지원합니다.'},
  en:{sub:'Resize images · Pixels or percentage · Lock aspect ratio',langBtn:'🌐 中文',backBtn:'← All Tools',dropText:'Drag & drop or click to select image',modePx:'Pixels',modePct:'Percent (%)',fmtLabel:'Output',qualLabel:'Quality',resizeBtn:'▶ Resize',dlBtn:'⬇ Download',seoH2:'Image Resizer',seoP:'Resize images in the browser using Canvas API. Supports pixel dimensions, percentage scaling and aspect ratio lock.'},
  zh:{sub:'图片尺寸调整 · 像素/比例 · 宽高比锁定',langBtn:'🌐 한국어',backBtn:'← 所有工具',dropText:'拖放或点击选择图片',modePx:'像素',modePct:'比例 (%)',fmtLabel:'输出',qualLabel:'质量',resizeBtn:'▶ 调整大小',dlBtn:'⬇ 下载',seoH2:'图片尺寸调整工具',seoP:'使用Canvas API在浏览器中调整图片尺寸，支持像素输入、比例缩放和宽高比锁定。'},
};
let _lang='ko',_locked=true,_ratio=1,_origW=0,_origH=0,_img=null,_origFile=null,_blob=null,_mode='px';
const LANGS=['ko','en','zh'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

function ev(e,type){e.preventDefault();const dz=document.getElementById('dropZone');if(type==='over')dz.classList.add('over');else if(type==='leave')dz.classList.remove('over');else{dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))loadFile(f);}}
function onFile(e){const f=e.target.files[0];if(f)loadFile(f);}

function loadFile(f){
  _origFile=f;
  const reader=new FileReader();
  reader.onload=e=>{
    _img=new Image();
    _img.onload=()=>{
      _origW=_img.naturalWidth;_origH=_img.naturalHeight;_ratio=_origW/_origH;
      document.getElementById('wIn').value=_origW;
      document.getElementById('hIn').value=_origH;
      document.getElementById('origDim').textContent=`Original: ${_origW} × ${_origH} px`;
      document.getElementById('opts').style.display='block';
      document.getElementById('result').style.display='none';
    };
    _img.src=e.target.result;
  };
  reader.readAsDataURL(f);
}

function setMode(m){
  _mode=m;
  document.getElementById('mPx').classList.toggle('on',m==='px');
  document.getElementById('mPct').classList.toggle('on',m==='pct');
  document.getElementById('pxWrap').style.display=m==='px'?'block':'none';
  document.getElementById('pctWrap').style.display=m==='pct'?'block':'none';
}
function toggleLock(){_locked=!_locked;document.getElementById('lockBtn').textContent=_locked?'🔒':'🔓';document.getElementById('lockBtn').classList.toggle('locked',_locked);}
function onW(){if(!_locked)return;const w=parseInt(document.getElementById('wIn').value);if(w>0)document.getElementById('hIn').value=Math.round(w/_ratio);}
function onH(){if(!_locked)return;const h=parseInt(document.getElementById('hIn').value);if(h>0)document.getElementById('wIn').value=Math.round(h*_ratio);}

function doResize(){
  if(!_img)return;
  let tw,th;
  if(_mode==='px'){tw=parseInt(document.getElementById('wIn').value)||_origW;th=parseInt(document.getElementById('hIn').value)||_origH;}
  else{const pct=parseInt(document.getElementById('pctIn').value)/100;tw=Math.round(_origW*pct);th=Math.round(_origH*pct);}
  const c=document.createElement('canvas');c.width=tw;c.height=th;
  c.getContext('2d').drawImage(_img,0,0,tw,th);
  const fmt='image/'+document.getElementById('outFmt').value;
  const q=parseInt(document.getElementById('quality').value)/100;
  c.toBlob(blob=>{
    _blob=blob;
    const url=URL.createObjectURL(blob);
    document.getElementById('resultImg').src=url;
    document.getElementById('resultInfo').textContent=`${tw} × ${th} px · ${(blob.size/1024).toFixed(1)} KB`;
    document.getElementById('result').style.display='block';
  },fmt,q);
}

function download(){
  if(!_blob)return;
  const ext=document.getElementById('outFmt').value;
  const name=(_origFile?.name.replace(/\.[^.]+$/,'')||'image')+'_resized.'+ext;
  const a=document.createElement('a');a.href=URL.createObjectURL(_blob);a.download=name;a.click();
}
_lang=detectLang();applyLang();
</script>
</body>
</html>
