<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Merge - Free Online PDF Combiner</title>
<meta name="description" content="Free online PDF merger. Combine multiple PDF files into one. Drag to reorder pages. All processing in browser with pdf-lib.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="alternate" hreflang="ko" href="https://modoohub.com/pdf-merge.html">
<link rel="alternate" hreflang="en" href="https://modoohub.com/pdf-merge.html?lang=en">
<link rel="alternate" hreflang="zh" href="https://modoohub.com/pdf-merge.html?lang=zh">
<link rel="alternate" hreflang="x-default" href="https://modoohub.com/pdf-merge.html">
<link rel="canonical" href="https://modoohub.com/pdf-merge.html">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:680px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:44px 20px;text-align:center;cursor:pointer;transition:all .2s;}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:rgba(248,113,113,.05);}
.drop-icon{font-size:38px;margin-bottom:10px;}
.drop-text{font-size:14px;color:var(--text-muted);}
.drop-hint{font-size:12px;color:var(--text-dim);margin-top:5px;font-family:'DM Mono',monospace;}
input[type=file]{display:none;}
.file-list{margin-top:14px;display:flex;flex-direction:column;gap:6px;}
.file-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:grab;user-select:none;}
.file-item.dragging{opacity:.5;border-style:dashed;}
.file-item.drag-over{border-color:var(--accent);}
.fi-num{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;min-width:20px;text-align:center;}
.fi-icon{font-size:20px;}
.fi-name{flex:1;font-size:13px;font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi-pages{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;white-space:nowrap;}
.fi-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:2px 6px;}
.fi-del:hover{color:var(--accent);}
.merge-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-top:14px;}
.merge-btn:hover{opacity:.85;}
.merge-btn:disabled{opacity:.5;cursor:not-allowed;}
.progress{background:var(--surface2);border-radius:6px;height:6px;margin-top:10px;overflow:hidden;display:none;}
.progress-bar{height:100%;background:var(--accent);border-radius:6px;transition:width .3s;}
.result{margin-top:14px;display:none;}
.dl-btn{width:100%;padding:12px;border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-family:'DM Mono',monospace;font-size:14px;cursor:pointer;background:none;font-weight:700;}
.dl-btn:hover{background:rgba(248,113,113,.1);}
.info-badge{font-size:12px;color:var(--text-dim);font-family:'DM Mono',monospace;text-align:center;margin-top:6px;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NR6VJF0534"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-NR6VJF0534');</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6334638921720175" crossorigin="anonymous"></script>
<meta property="og:title" content="PDF Merge - Free Online PDF Combiner">
<meta property="og:image" content="https://modoohub.com/og-image.png">
</head>
<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>PDF <span>Merge</span></h1>
  <p class="sub" data-i18n="sub">여러 PDF 파일을 하나로 합치기 · 순서 변경 · 브라우저 처리</p>

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fi').click()"
       ondragover="ev(event,'over')" ondragleave="ev(event,'leave')" ondrop="ev(event,'drop')">
    <div class="drop-icon">📄</div>
    <div class="drop-text" data-i18n="dropText">PDF 파일을 드래그하거나 클릭해서 추가</div>
    <div class="drop-hint" data-i18n="dropHint">여러 파일 동시 선택 가능 · 드래그로 순서 변경</div>
  </div>
  <input type="file" id="fi" accept=".pdf,application/pdf" multiple onchange="onFiles(event)">

  <div class="file-list" id="fileList"></div>
  <div class="progress" id="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <button class="merge-btn" id="mergeBtn" onclick="merge()" style="display:none" data-i18n="mergeBtn">▶ PDF 합치기</button>

  <div class="result" id="result">
    <button class="dl-btn" id="dlBtn" data-i18n="dlBtn">⬇ 합친 PDF 다운로드</button>
    <div class="info-badge" id="resultInfo"></div>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">PDF Merge란?</h2>
    <p data-i18n="seoP">pdf-lib 라이브러리를 사용해 브라우저에서 직접 여러 PDF를 하나의 파일로 합칩니다. 파일이 서버로 전송되지 않으므로 개인정보가 보호됩니다.</p>
  </div>
  <footer>PDF Merge · pdf-lib · All processing in browser</footer>
</main>
<script>
const _i18n={
  ko:{sub:'여러 PDF 파일을 하나로 합치기 · 순서 변경 · 브라우저 처리',langBtn:'🌐 EN',backBtn:'← 모두의 툴',dropText:'PDF 파일을 드래그하거나 클릭해서 추가',dropHint:'여러 파일 동시 선택 가능 · 드래그로 순서 변경',mergeBtn:'▶ PDF 합치기',dlBtn:'⬇ 합친 PDF 다운로드',seoH2:'PDF Merge란?',seoP:'pdf-lib로 브라우저에서 직접 여러 PDF를 하나로 합칩니다. 파일이 서버로 전송되지 않습니다.'},
  en:{sub:'Combine multiple PDF files into one · Reorder · All in browser',langBtn:'🌐 中文',backBtn:'← All Tools',dropText:'Drag & drop PDF files or click to add',dropHint:'Select multiple files · Drag to reorder',mergeBtn:'▶ Merge PDFs',dlBtn:'⬇ Download Merged PDF',seoH2:'PDF Merge',seoP:'Merges multiple PDF files into one directly in the browser using pdf-lib. Files are never sent to any server.'},
  zh:{sub:'合并多个PDF文件 · 调整顺序 · 浏览器处理',langBtn:'🌐 한국어',backBtn:'← 所有工具',dropText:'拖放PDF文件或点击添加',dropHint:'可同时选择多个文件 · 拖动调整顺序',mergeBtn:'▶ 合并PDF',dlBtn:'⬇ 下载合并后的PDF',seoH2:'PDF合并工具',seoP:'使用pdf-lib在浏览器中直接合并多个PDF文件，文件不会上传服务器，保护隐私。'},
};
let _lang='ko',_files=[],_dragIdx=null,_mergedBlob=null;
const LANGS=['ko','en','zh'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}

function ev(e,type){e.preventDefault();const dz=document.getElementById('dropZone');if(type==='over')dz.classList.add('over');else if(type==='leave')dz.classList.remove('over');else{dz.classList.remove('over');addFiles(e.dataTransfer.files);}}
function onFiles(e){addFiles(e.target.files);}
function addFiles(list){
  const pdfs=[...list].filter(f=>f.type==='application/pdf'||f.name.endsWith('.pdf'));
  _files=[..._files,...pdfs];
  renderList();
}
function fmtSize(b){return b>1024*1024?(b/1024/1024).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';}

function renderList(){
  const ul=document.getElementById('fileList');ul.innerHTML='';
  _files.forEach((f,i)=>{
    const item=document.createElement('div');item.className='file-item';
    item.draggable=true;
    item.innerHTML=`<span class="fi-num">${i+1}</span><span class="fi-icon">📄</span><span class="fi-name">${f.name}</span><span class="fi-pages">${fmtSize(f.size)}</span><button class="fi-del" onclick="removeFile(${i})">✕</button>`;
    item.addEventListener('dragstart',()=>{_dragIdx=i;item.classList.add('dragging');});
    item.addEventListener('dragend',()=>item.classList.remove('dragging'));
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{e.preventDefault();item.classList.remove('drag-over');if(_dragIdx!==null&&_dragIdx!==i){const moved=_files.splice(_dragIdx,1)[0];_files.splice(i,0,moved);renderList();}});
    ul.appendChild(item);
  });
  document.getElementById('mergeBtn').style.display=_files.length>=2?'block':'none';
  document.getElementById('result').style.display='none';
}
function removeFile(i){_files.splice(i,1);renderList();}

async function merge(){
  if(_files.length<2)return;
  const btn=document.getElementById('mergeBtn');btn.disabled=true;
  const prog=document.getElementById('progress');prog.style.display='block';
  const bar=document.getElementById('progressBar');
  try{
    const merged=await PDFLib.PDFDocument.create();
    for(let i=0;i<_files.length;i++){
      bar.style.width=Math.round((i/_files.length)*90)+'%';
      const buf=await _files[i].arrayBuffer();
      const doc=await PDFLib.PDFDocument.load(buf);
      const pages=await merged.copyPages(doc,doc.getPageIndices());
      pages.forEach(p=>merged.addPage(p));
    }
    bar.style.width='100%';
    const bytes=await merged.save();
    _mergedBlob=new Blob([bytes],{type:'application/pdf'});
    document.getElementById('resultInfo').textContent=`${_files.length} PDFs → ${fmtSize(_mergedBlob.size)} · ${merged.getPageCount()} pages`;
    const dlBtn=document.getElementById('dlBtn');
    dlBtn.onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(_mergedBlob);a.download='merged.pdf';a.click();};
    document.getElementById('result').style.display='block';
  }catch(e){alert('Error: '+e.message);}
  finally{btn.disabled=false;setTimeout(()=>{prog.style.display='none';bar.style.width='0%';},600);}
}
_lang=detectLang();applyLang();
</script>
</body>
</html>
