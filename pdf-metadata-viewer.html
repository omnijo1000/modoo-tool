:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#252525;--accent:#fbbf24;--text:#f5f5f5;--text-muted:#888;--text-dim:#444;--green:#4ade80;--red:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:10px;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;}
.back-link:hover{color:var(--text-muted);}
.lang-btn{font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:640px;margin:0 auto;padding:36px 20px 60px;}
h1{font-size:clamp(22px,4vw,32px);font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;}
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:48px 24px;text-align:center;cursor:pointer;transition:border-color .2s;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);}
.drop-zone-icon{font-size:36px;margin-bottom:12px;}
.drop-zone-text{font-size:13px;color:var(--text-muted);}
.box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px;}
.meta-table{width:100%;border-collapse:collapse;}
.meta-table tr{border-bottom:1px solid var(--border);}
.meta-table tr:last-child{border-bottom:none;}
.meta-table td{padding:10px 0;font-size:13px;vertical-align:top;}
.meta-table .key{color:var(--text-muted);width:40%;font-weight:600;padding-right:12px;font-family:'DM Mono',monospace;font-size:11px;}
.meta-table .val{color:var(--text);word-break:break-all;font-family:'DM Mono',monospace;font-size:12px;}
.meta-table .val.empty{color:var(--text-dim);}
.section-label{font-size:11px;color:var(--text-dim);margin-bottom:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
.seo strong{color:var(--text-muted);}
.seo-sub{font-size:14px;font-weight:700;margin:16px 0 8px;color:var(--text-muted);}
details.faq-item{border:1px solid var(--border);border-radius:6px;margin-bottom:8px;}
details.faq-item summary{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-muted);list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item[open] summary{border-bottom:1px solid var(--border);}
details.faq-item p{padding:10px 14px;font-size:13px;color:var(--text-dim);line-height:1.8;}

<script>
const LANGS=['ko','en','zh','ja'];
let _lang='ko';
const _i18n={
  ko:{h1b:'메타데이터 뷰어',sub:'PDF 파일의 메타데이터를 확인합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',pageTitle:'PDF 메타데이터 뷰어 | MODOO HUB',dropTxt:'PDF 파일을 드래그하거나 클릭하여 선택',lblMeta:'메타데이터',empty:'(비어있음)',
    keys:{title:'제목',author:'저자',subject:'주제',keywords:'키워드',creator:'작성 프로그램',producer:'변환 프로그램',creationDate:'생성일',modificationDate:'수정일',pageCount:'페이지 수',fileSize:'파일 크기',pdfVersion:'PDF 버전'},
    seoHtml:`<h2>PDF 메타데이터 뷰어</h2><p><strong>PDF 파일</strong>의 제목·저자·주제·키워드·생성일·수정일 등 메타데이터를 확인합니다. 브라우저에서 로컬로 처리됩니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>어떤 메타데이터를 확인할 수 있나요?</summary><p>제목, 저자, 주제, 키워드, 작성/변환 프로그램, 생성일, 수정일, 페이지 수 등입니다.</p></details>
<details class="faq-item"><summary>파일이 서버로 전송되나요?</summary><p>아니요. 브라우저 내에서만 처리됩니다.</p></details>
<details class="faq-item"><summary>메타데이터 수정도 가능한가요?</summary><p>이 도구는 확인만 가능합니다. 수정은 지원하지 않습니다.</p></details>
<details class="faq-item"><summary>생성일이 표시되지 않는 경우는?</summary><p>PDF에 생성일 정보가 없거나 제거된 경우입니다.</p></details>
<details class="faq-item"><summary>암호화된 PDF도 처리되나요?</summary><p>암호화되지 않은 PDF만 처리됩니다.</p></details>
<details class="faq-item"><summary>PDF 버전 정보도 확인할 수 있나요?</summary><p>예, PDF 스펙 버전(예: 1.4, 1.7)을 확인할 수 있습니다.</p></details>
<details class="faq-item"><summary>개인정보가 포함될 수 있나요?</summary><p>저자·생성 프로그램 등에 개인정보가 포함될 수 있습니다. 확인 후 공유 전 삭제를 권장합니다.</p></details>
<details class="faq-item"><summary>메타데이터를 제거하려면?</summary><p>EXIF 제거기나 PDF 메타데이터 편집 도구를 사용하세요.</p></details>`
  },
  en:{h1b:'Metadata Viewer',sub:'View metadata from PDF files',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'PDF Metadata Viewer | MODOO HUB',dropTxt:'Drop PDF here or click to select',lblMeta:'Metadata',empty:'(empty)',
    keys:{title:'Title',author:'Author',subject:'Subject',keywords:'Keywords',creator:'Creator',producer:'Producer',creationDate:'Creation Date',modificationDate:'Modified Date',pageCount:'Page Count',fileSize:'File Size',pdfVersion:'PDF Version'},
    seoHtml:`<h2>PDF Metadata Viewer</h2><p>View <strong>PDF metadata</strong> including title, author, subject, keywords, creation date, modification date, and more. Fully local browser processing.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What metadata is shown?</summary><p>Title, author, subject, keywords, creator, producer, creation/modification dates, page count, etc.</p></details>
<details class="faq-item"><summary>Is my file uploaded?</summary><p>No — fully local browser processing.</p></details>
<details class="faq-item"><summary>Can I edit the metadata?</summary><p>This tool is view-only. Editing is not supported.</p></details>
<details class="faq-item"><summary>Why is creation date missing?</summary><p>The PDF may not contain creation date information.</p></details>
<details class="faq-item"><summary>Encrypted PDFs?</summary><p>Only unencrypted PDFs are supported.</p></details>
<details class="faq-item"><summary>Is PDF version shown?</summary><p>Yes — PDF spec version (e.g. 1.4, 1.7) is displayed.</p></details>
<details class="faq-item"><summary>Can metadata contain personal info?</summary><p>Yes — author, creator fields may contain personal info. Review before sharing.</p></details>
<details class="faq-item"><summary>How to remove metadata?</summary><p>Use a dedicated PDF metadata editor or EXIF remover tool.</p></details>`
  },
  zh:{h1b:'元数据查看器',sub:'查看PDF文件的元数据信息',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'PDF元数据查看器 | MODOO HUB',dropTxt:'拖放PDF文件或点击选择',lblMeta:'元数据',empty:'（空）',
    keys:{title:'标题',author:'作者',subject:'主题',keywords:'关键词',creator:'创建程序',producer:'转换程序',creationDate:'创建日期',modificationDate:'修改日期',pageCount:'页数',fileSize:'文件大小',pdfVersion:'PDF版本'},
    seoHtml:`<h2>PDF元数据查看器</h2><p>查看<strong>PDF文件</strong>的标题、作者、主题、关键词、创建日期、修改日期等元数据。完全在浏览器本地处理。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>可以查看哪些元数据？</summary><p>标题、作者、主题、关键词、创建/转换程序、创建/修改日期、页数等。</p></details>
<details class="faq-item"><summary>文件会上传服务器吗？</summary><p>不会，完全本地处理。</p></details>
<details class="faq-item"><summary>可以编辑元数据吗？</summary><p>此工具仅供查看，不支持编辑。</p></details>
<details class="faq-item"><summary>为什么创建日期不显示？</summary><p>该PDF可能没有包含创建日期信息。</p></details>
<details class="faq-item"><summary>加密PDF支持吗？</summary><p>只支持未加密的PDF。</p></details>
<details class="faq-item"><summary>可以查看PDF版本吗？</summary><p>可以，显示PDF规范版本（如1.4、1.7）。</p></details>
<details class="faq-item"><summary>元数据可能包含个人信息吗？</summary><p>是的，作者、创建程序等字段可能包含个人信息，分享前请检查。</p></details>
<details class="faq-item"><summary>如何删除元数据？</summary><p>使用专用PDF元数据编辑器或EXIF删除工具。</p></details>`
  },
  ja:{h1b:'メタデータビューアー',sub:'PDFファイルのメタデータを確認します',backLink:'← ホーム',langBtn:'🌐 한국어',pageTitle:'PDFメタデータビューアー | MODOO HUB',dropTxt:'PDFファイルをドロップまたはクリックして選択',lblMeta:'メタデータ',empty:'（空）',
    keys:{title:'タイトル',author:'作成者',subject:'件名',keywords:'キーワード',creator:'作成プログラム',producer:'変換プログラム',creationDate:'作成日',modificationDate:'更新日',pageCount:'ページ数',fileSize:'ファイルサイズ',pdfVersion:'PDFバージョン'},
    seoHtml:`<h2>PDFメタデータビューアー</h2><p><strong>PDFファイル</strong>のタイトル・作成者・件名・キーワード・作成日・更新日などのメタデータを確認します。すべてブラウザ内でローカル処理されます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>どのようなメタデータが表示されますか？</summary><p>タイトル、作成者、件名、キーワード、作成/変換プログラム、作成/更新日、ページ数などです。</p></details>
<details class="faq-item"><summary>ファイルはサーバーに送信されますか？</summary><p>いいえ、すべてブラウザ内でローカル処理されます。</p></details>
<details class="faq-item"><summary>メタデータを編集できますか？</summary><p>このツールは閲覧のみです。編集には対応していません。</p></details>
<details class="faq-item"><summary>作成日が表示されない場合は？</summary><p>PDFに作成日情報が含まれていないか削除されている場合です。</p></details>
<details class="faq-item"><summary>暗号化PDFは対応していますか？</summary><p>暗号化されていないPDFのみ対応しています。</p></details>
<details class="faq-item"><summary>PDFバージョンも確認できますか？</summary><p>はい、PDFスペックバージョン（例：1.4、1.7）が表示されます。</p></details>
<details class="faq-item"><summary>メタデータに個人情報が含まれますか？</summary><p>作成者・作成プログラムなどに個人情報が含まれる場合があります。共有前に確認を推奨します。</p></details>
<details class="faq-item"><summary>メタデータを削除するには？</summary><p>専用のPDFメタデータ編集ツールやEXIF削除ツールをご利用ください。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','dropTxt','lblMeta'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function ev(e,cls){e.preventDefault();document.getElementById('dropZone').className='drop-zone'+' '+cls;}
function drop(e){e.preventDefault();document.getElementById('dropZone').className='drop-zone';const f=e.dataTransfer.files[0];if(f)loadFile(f);}
async function loadFile(f){
  if(!f||!f.name.endsWith('.pdf'))return;
  const t=_i18n[_lang];
  const buf=await f.arrayBuffer();
  try{
    const {PDFDocument}=PDFLib;
    const pdfDoc=await PDFDocument.load(buf);
    const rows=[
      [t.keys.title,pdfDoc.getTitle()],
      [t.keys.author,pdfDoc.getAuthor()],
      [t.keys.subject,pdfDoc.getSubject()],
      [t.keys.keywords,pdfDoc.getKeywords()],
      [t.keys.creator,pdfDoc.getCreator()],
      [t.keys.producer,pdfDoc.getProducer()],
      [t.keys.creationDate,fmt(pdfDoc.getCreationDate())],
      [t.keys.modificationDate,fmt(pdfDoc.getModificationDate())],
      [t.keys.pageCount,pdfDoc.getPageCount()+''],
      [t.keys.fileSize,fmtBytes(f.size)],
      [t.keys.pdfVersion,pdfDoc.getPdfHeader()],
    ];
    const tbl=document.getElementById('metaTable');tbl.innerHTML='';
    rows.forEach(([k,v])=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td class="key">${k}</td><td class="val${!v?' empty':''}">${v||t.empty}</td>`;
      tbl.appendChild(tr);
    });
    document.getElementById('metaBox').style.display='block';
  }catch(e){alert('Error: '+e.message);}
}
function fmt(d){if(!d)return'';try{return d instanceof Date?d.toLocaleString():String(d);}catch(e){return String(d);}}
function fmtBytes(b){return b>1048576?(b/1048576).toFixed(1)+' MB':Math.round(b/1024)+' KB';}
_lang=detectLang();applyLang();
</script>
