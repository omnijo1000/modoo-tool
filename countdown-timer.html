<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer - Free Online Date Countdown</title>
<meta name="description" content="Free online countdown timer. Count down to any date and time. Save multiple countdowns for birthdays, events, deadlines. Live updating days, hours, minutes, seconds.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="alternate" hreflang="ko" href="https://modoohub.com/countdown-timer.html">
<link rel="alternate" hreflang="en" href="https://modoohub.com/countdown-timer.html?lang=en">
<link rel="alternate" hreflang="zh" href="https://modoohub.com/countdown-timer.html?lang=zh">
<link rel="alternate" hreflang="x-default" href="https://modoohub.com/countdown-timer.html">
<link rel="canonical" href="https://modoohub.com/countdown-timer.html">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#fb923c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:640px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.add-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;}
.add-row{display:flex;gap:8px;flex-wrap:wrap;}
.inp{flex:1;min-width:140px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;}
.inp:focus{border-color:var(--accent);}
input[type=datetime-local]{font-family:'DM Mono',monospace;color-scheme:dark;}
.add-btn{padding:9px 18px;background:var(--accent);color:#000;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;white-space:nowrap;}
.add-btn:hover{opacity:.85;}
.countdowns{display:flex;flex-direction:column;gap:12px;}
.cd-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;}
.cd-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.cd-date{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:14px;}
.cd-units{display:flex;gap:10px;justify-content:center;}
.cd-unit{text-align:center;min-width:60px;}
.cd-val{font-size:32px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);line-height:1;}
.cd-unit-label{font-size:10px;color:var(--text-dim);margin-top:4px;font-family:'DM Mono',monospace;}
.cd-past{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;color:var(--text-muted);text-align:center;padding:8px 0;}
.cd-del{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;}
.cd-del:hover{color:#f87171;}
.sep{display:flex;align-items:center;font-size:22px;color:var(--text-dim);font-weight:900;padding-bottom:6px;}
.empty{text-align:center;padding:30px 0;font-size:13px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NR6VJF0534"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-NR6VJF0534');</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6334638921720175" crossorigin="anonymous"></script>
<meta property="og:title" content="Countdown Timer - Free Online Date Countdown">
<meta property="og:image" content="https://modoohub.com/og-image.png">
</head>
<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>Countdown <span>Timer</span></h1>
  <p class="sub" data-i18n="sub">날짜·이벤트까지 카운트다운 · 여러 개 저장</p>

  <div class="add-card">
    <div class="add-row">
      <input class="inp" type="text" id="titleIn" data-i18n-placeholder="titlePh" placeholder="이벤트 이름 (예: 생일)">
      <input class="inp" type="datetime-local" id="dtIn">
      <button class="add-btn" onclick="addCountdown()" data-i18n="addBtn">+ 추가</button>
    </div>
  </div>

  <div class="countdowns" id="cdList"></div>

  <div class="seo">
    <h2 data-i18n="seoH2">Countdown Timer란?</h2>
    <p data-i18n="seoP">특정 날짜·시간까지 남은 일·시간·분·초를 실시간으로 표시합니다. 생일, 기념일, 마감일 등 여러 카운트다운을 저장하고 관리할 수 있습니다.</p>
  </div>
  <footer>Countdown Timer · Free Online Tool</footer>
</main>
<script>
const _i18n={
  ko:{sub:'날짜·이벤트까지 카운트다운 · 여러 개 저장',langBtn:'🌐 EN',backBtn:'← 모두의 툴',titlePh:'이벤트 이름 (예: 생일)',addBtn:'+ 추가',dLabel:'일',hLabel:'시간',mLabel:'분',sLabel:'초',pastLabel:'지났습니다',emptyMsg:'+ 버튼으로 카운트다운을 추가하세요',seoH2:'Countdown Timer란?',seoP:'목표 날짜까지 실시간 카운트다운. 생일·기념일·마감일 등 여러 개를 저장합니다.'},
  en:{sub:'Count down to any date or event · Save multiple countdowns',langBtn:'🌐 中文',backBtn:'← All Tools',titlePh:'Event name (e.g. Birthday)',addBtn:'+ Add',dLabel:'Days',hLabel:'Hours',mLabel:'Min',sLabel:'Sec',pastLabel:'has passed',emptyMsg:'Click + Add to create a countdown',seoH2:'Countdown Timer',seoP:'Live countdown to any date. Save multiple countdowns for birthdays, anniversaries, and deadlines.'},
  zh:{sub:'倒计时到任何日期或事件 · 保存多个倒计时',langBtn:'🌐 日本語',backBtn:'← 所有工具',titlePh:'活动名称（例如：生日）',addBtn:'+ 添加',dLabel:'天',hLabel:'小时',mLabel:'分钟',sLabel:'秒',pastLabel:'已过去',emptyMsg:'点击+添加按钮创建倒计时',seoH2:'倒计时工具',seoP:'实时倒计时到任意日期，可保存多个倒计时用于生日、纪念日和截止日期。'},
  ja:{sub:'任意の日付・イベントまでカウントダウン · 複数保存',langBtn:'🌐 한국어',backBtn:'← ホーム',titlePh:'イベント名（例：誕生日）',addBtn:'+ 追加',dLabel:'日',hLabel:'時間',mLabel:'分',sLabel:'秒',pastLabel:'が過ぎました',emptyMsg:'＋追加ボタンでカウントダウンを作成してください',seoH2:'カウントダウンタイマー',seoP:'任意の日付へのリアルタイムカウントダウン。誕生日・記念日・締め切りなど複数のカウントダウンを保存できます。'},
};
let _lang='ko',_items=[],_tid=null;
const LANGS=['ko','en','zh','ja'];
const LS_KEY='modoo_cd';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('backBtn').innerHTML=t.backBtn;
  document.getElementById('titleIn').placeholder=t.titlePh;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});
  renderAll();
}
function pad(n){return String(n).padStart(2,'0');}
function fmtDt(iso){return new Date(iso).toLocaleString(_lang==='ko'?'ko-KR':_lang==='zh'?'zh-CN':'en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function addCountdown(){
  const title=document.getElementById('titleIn').value.trim()||(_lang==='ko'?'이벤트':_lang==='zh'?'活动':'Event');
  const dt=document.getElementById('dtIn').value;
  if(!dt){alert(_lang==='ko'?'날짜를 선택하세요':_lang==='zh'?'请选择日期':'Please select a date');return;}
  _items.push({id:Date.now(),title,dt});
  save();
  document.getElementById('titleIn').value='';
  renderAll();
}
function removeItem(id){_items=_items.filter(i=>i.id!==id);save();renderAll();}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(_items));}catch(e){}}
function load(){try{const d=localStorage.getItem(LS_KEY);if(d)_items=JSON.parse(d);}catch(e){_items=[];}}
function renderAll(){
  const t=_i18n[_lang];
  const el=document.getElementById('cdList');
  if(!_items.length){el.innerHTML=`<div class="empty">${t.emptyMsg}</div>`;return;}
  el.innerHTML='';
  _items.forEach(item=>{
    const card=document.createElement('div');card.className='cd-card';card.id='cd-'+item.id;
    const diff=new Date(item.dt)-Date.now();
    const past=diff<0;
    const abs=Math.abs(diff);
    const d=Math.floor(abs/86400000);
    const h=Math.floor((abs%86400000)/3600000);
    const m=Math.floor((abs%3600000)/60000);
    const s=Math.floor((abs%60000)/1000);
    card.innerHTML=`<button class="cd-del" onclick="removeItem(${item.id})">✕</button>
      <div class="cd-title">${item.title}</div>
      <div class="cd-date">${fmtDt(item.dt)}</div>
      ${past
        ?`<div class="cd-past">${t.pastLabel}</div>`
        :`<div class="cd-units">
          <div class="cd-unit"><div class="cd-val">${d}</div><div class="cd-unit-label">${t.dLabel}</div></div>
          <div class="sep">:</div>
          <div class="cd-unit"><div class="cd-val">${pad(h)}</div><div class="cd-unit-label">${t.hLabel}</div></div>
          <div class="sep">:</div>
          <div class="cd-unit"><div class="cd-val">${pad(m)}</div><div class="cd-unit-label">${t.mLabel}</div></div>
          <div class="sep">:</div>
          <div class="cd-unit"><div class="cd-val">${pad(s)}</div><div class="cd-unit-label">${t.sLabel}</div></div>
        </div>`
      }`;
    el.appendChild(card);
  });
}
function tick(){renderAll();}
const now=new Date();now.setSeconds(0,0);
const def=new Date(now.getTime()+86400000*7);
document.getElementById('dtIn').value=def.toISOString().slice(0,16);
load();
_lang=detectLang();applyLang();
clearInterval(_tid);_tid=setInterval(tick,1000);
</script>
<script src="related.js"></script>
</body>
</html>
