    seoHtml:`<h2>Text to Unicode</h2><p>Convert text to <strong>\\uXXXX Unicode escape sequences</strong> for use in JavaScript, JSON, Java, and Python. Supports non-ASCII-only mode and uppercase/lowercase hex options.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>When do I need Unicode escapes?</summary><p>To safely store non-ASCII characters in JSON, or pass special characters to ASCII-only systems.</p></details>
<details class="faq-item"><summary>What is non-ASCII only mode?</summary><p>Keeps English letters, digits, and basic symbols as-is; converts Korean, emoji, and special chars to \\uXXXX.</p></details>
<details class="faq-item"><summary>Python vs JavaScript difference?</summary><p>For U+10000+ chars, JavaScript uses \\u{1F389}, Python 3 uses \\U0001F389.</p></details>
<details class="faq-item"><summary>How are emoji converted?</summary><p>🎉 (U+1F389) → \\u{1F389} in JavaScript format.</p></details>
<details class="faq-item"><summary>How are newlines handled?</summary><p>LF → \\u000A, CR → \\u000D.</p></details>
<details class="faq-item"><summary>How do I decode back to text?</summary><p>Use the Unicode to Text converter tool.</p></details>
<details class="faq-item"><summary>Can I choose uppercase/lowercase?</summary><p>Yes — toggle between \\uAC00 and \\uac00.</p></details>
<details class="faq-item"><summary>Is it Java-compatible?</summary><p>Yes — the \\uXXXX format is fully compatible with Java.</p></details>`
  },
  zh:{pageTitle:'文本转Unicode - 将文本转换为\\uXXXX转义序列 | MODOO HUB',h1b:'Unicode',sub:'将字符转换为\\uXXXX Unicode转义序列',backLink:'← 所有工具',langBtn:'🌐 日本語',inputLabel:'输入文本',modeAll:'全部转义',modeNonAscii:'仅非ASCII',lblUpper:'大写HEX',outJsLabel:'\\uXXXX（JavaScript/JSON）',outULabel:'U+XXXX（Unicode标准表示）',outPyLabel:'\\uXXXX（Python）',placeholder:'输入要转换的文本（Hello 안녕 🎉）',
    seoHtml:`<h2>文本转Unicode</h2><p>将文本转换为<strong>JavaScript、JSON、Java、Python使用的\\uXXXX Unicode转义序列</strong>，支持仅非ASCII模式和大小写十六进制选项。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>什么时候需要Unicode转义？</summary><p>在JSON文件中安全存储非ASCII字符，或向仅支持ASCII的系统传递特殊字符时需要。</p></details>
<details class="faq-item"><summary>什么是仅非ASCII模式？</summary><p>保留英文字母、数字和基本符号不变，只将中文、表情符号和特殊字符转换为\\uXXXX。</p></details>

<details class="faq-item"><summary>换行符如何处理？</summary><p>LF→\\u000A，CR→\\u000D。</p></details>
<details class="faq-item"><summary>如何反向转换（Unicode→文本）？</summary><p>使用Unicode转文本工具。</p></details>
<details class="faq-item"><summary>可以选择大小写吗？</summary><p>是的，可以在\\uAC00和\\uac00之间切换。</p></details>
<details class="faq-item"><summary>与Java兼容吗？</summary><p>是的，\\uXXXX格式与Java完全兼容。</p></details>`
  },
  ja:{pageTitle:'テキストからUnicode変換 - \\uXXXXエスケープシーケンスに変換 | MODOO HUB',h1b:'Unicode',sub:'文字を\\uXXXX Unicodeエスケープシーケンスに変換',backLink:'← ホーム',langBtn:'🌐 한국어',inputLabel:'テキスト入力',modeAll:'全て変換',modeNonAscii:'非ASCIIのみ',lblUpper:'大文字HEX',outJsLabel:'\\uXXXX（JavaScript/JSON）',outULabel:'U+XXXX（Unicode標準表記）',outPyLabel:'\\uXXXX（Python）',placeholder:'変換するテキストを入力（Hello 안녕 🎉）',
    seoHtml:`<h2>テキストからUnicode変換とは</h2><p>テキストをJavaScript、JSON、Java、Pythonで使用する<strong>\\uXXXXユニコードエスケープシーケンス</strong>に変換します。非ASCIIのみモードと大文字/小文字16進数オプションをサポートします。</p>

<details class="faq-item"><summary>PythonとJavaScriptの違いは？</summary><p>U+10000以上の文字では、JavaScriptは\\u{1F389}、Python 3は\\U0001F389形式を使います。</p></details>

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function toHex(n,len){const h=n.toString(16);const r=document.getElementById('optUpper').checked?h.toUpperCase():h;return r.padStart(len,'0');}
function convert(){
  const raw=document.getElementById('inputArea').value;
  const nonAscii=document.querySelector('input[name=mode]:checked').value==='nonascii';
  const chars=[...raw];
  const jsArr=chars.map(c=>{
    const cp=c.codePointAt(0);
    if(nonAscii&&cp<128)return c;
    return cp<=0xFFFF?'\\u'+toHex(cp,4):'\\u{'+toHex(cp,4)+'}';
  });
  const uArr=chars.map(c=>{
    const cp=c.codePointAt(0);
    if(nonAscii&&cp<128)return c;
    return 'U+'+toHex(cp,4);
  });
  const pyArr=chars.map(c=>{
    const cp=c.codePointAt(0);
    if(nonAscii&&cp<128)return c;
    return cp<=0xFFFF?'\\u'+toHex(cp,4):'\\U'+toHex(cp,8);
  });
  document.getElementById('outJs').value=jsArr.join('');
  document.getElementById('outU').value=uArr.join(' ');
  document.getElementById('outPy').value=pyArr.join('');
}
function copyId(id){navigator.clipboard.writeText(document.getElementById(id).value);}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('inputLabel').textContent=t.inputLabel;document.getElementById('modeAll').textContent=t.modeAll;

}
