    seoHtml:`<h2>Bcrypt 생성기란?</h2><p>bcrypt은 비밀번호 해싱 전용 알고리즘으로, <strong>cost factor</strong>로 계산 비용을 조절합니다. 매 해시마다 랜덤 salt를 생성해 같은 비밀번호도 다른 해시값이 나옵니다. SHA-256보다 훨씬 안전한 비밀번호 저장 방식입니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>bcrypt 해시는 왜 매번 다른가요?</summary><p>bcrypt은 해시마다 랜덤 salt를 생성합니다. 같은 비밀번호도 매번 다른 해시가 생성되므로 레인보우 테이블 공격을 방어합니다.</p></details>
<details class="faq-item"><summary>cost factor 10과 12의 차이는?</summary><p>cost factor가 1 증가할 때마다 계산 시간이 2배 증가합니다. 12는 10보다 4배 느립니다.</p></details>
<details class="faq-item"><summary>bcrypt 해시 형식은?</summary><p>$2a$10$salt22charshashval31chars 형식입니다. $2a$는 버전, $10$은 cost factor, 그 뒤가 salt+hash입니다.</p></details>
<details class="faq-item"><summary>비밀번호가 서버로 전송되나요?</summary><p>아니요. bcryptjs 라이브러리가 브라우저에서만 실행되며 서버로 데이터를 전송하지 않습니다.</p></details>
<details class="faq-item"><summary>bcrypt 해시 최대 비밀번호 길이는?</summary><p>bcrypt는 72바이트(대부분의 경우 72자)까지만 처리합니다. 더 긴 비밀번호는 잘립니다.</p></details>
<details class="faq-item"><summary>bcrypt vs Argon2 vs PBKDF2?</summary><p>세 모두 키 스트레칭 알고리즘입니다. Argon2는 메모리 집약적이라 더 현대적입니다. bcrypt은 광범위하게 지원됩니다.</p></details>
<details class="faq-item"><summary>생성된 해시를 데이터베이스에 저장하나요?</summary><p>네. bcrypt 해시는 60자이므로 VARCHAR(60) 컬럼에 저장하면 됩니다.</p></details>

  },
  en:{pageTitle:'Bcrypt Generator - Hash Passwords with Bcrypt | MODOO HUB',h1b:'Generator',sub:'Securely hash passwords with bcrypt',backLink:'← All Tools',langBtn:'🌐 中文',labelPwd:'Password',labelCost:'Cost Factor',labelResult:'Bcrypt Hash',btnGen:'Generate Hash',btnClear:'Clear',btnCopy:'Copy',loadMsg:'Generating...',copied:'Copied ✓',approx:'~',costNote:'(higher = more secure, slower)',
    seoHtml:`<h2>Bcrypt Generator</h2><p>bcrypt is a password-specific hashing algorithm using an adjustable <strong>cost factor</strong> to control computation time. A random salt is generated per hash, so the same password always produces a different hash — defending against rainbow table attacks.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Why is the hash different each time?</summary><p>bcrypt generates a random salt per hash. Same password → different hash each time, defeating rainbow table attacks.</p></details>
<details class="faq-item"><summary>Cost factor 10 vs 12?</summary><p>Each increment doubles computation time. Cost 12 is 4× slower than cost 10.</p></details>
<details class="faq-item"><summary>What is the bcrypt hash format?</summary><p>$2a$10$[22-char salt][31-char hash]. $2a$ is version, $10$ is cost factor.</p></details>
<details class="faq-item"><summary>Is the password sent to a server?</summary><p>No. bcryptjs runs entirely in the browser — no data is transmitted.</p></details>
<details class="faq-item"><summary>Max password length for bcrypt?</summary><p>bcrypt truncates at 72 bytes. Passwords longer than 72 chars are silently truncated.</p></details>
<details class="faq-item"><summary>bcrypt vs Argon2 vs PBKDF2?</summary><p>All are key-stretching algorithms. Argon2 is more modern (memory-hard). bcrypt has wide support.</p></details>
<details class="faq-item"><summary>How do I store the hash in a database?</summary><p>bcrypt hashes are 60 chars — use a VARCHAR(60) column.</p></details>
<details class="faq-item"><summary>How do I verify a bcrypt hash?</summary><p>Use the bcrypt-validator tool to compare a password against a stored hash.</p></details>`
  },
  zh:{pageTitle:'Bcrypt生成器 - 密码bcrypt哈希生成 | MODOO HUB',h1b:'生成器',sub:'使用bcrypt安全地哈希密码',backLink:'← 所有工具',langBtn:'🌐 日本語',labelPwd:'密码',labelCost:'Cost Factor',labelResult:'Bcrypt哈希',btnGen:'生成哈希',btnClear:'清除',btnCopy:'复制',loadMsg:'生成中...',copied:'已复制 ✓',approx:'约',costNote:'（越高越安全，越慢）',
    seoHtml:`<h2>Bcrypt生成器</h2><p>bcrypt是专用于密码哈希的算法，通过cost factor调整计算成本。每次哈希生成随机盐值，相同密码产生不同哈希，防御彩虹表攻击。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>为什么每次哈希不同？</summary><p>bcrypt每次哈希生成随机盐值，相同密码每次产生不同哈希，防御彩虹表攻击。</p></details>
<details class="faq-item"><summary>cost factor 10和12的区别？</summary><p>每增加1，计算时间翻倍。cost 12比cost 10慢4倍。</p></details>
<details class="faq-item"><summary>bcrypt哈希格式是什么？</summary><p>$2a$10$[22字符盐][31字符哈希]。$2a$是版本，$10$是cost factor。</p></details>
<details class="faq-item"><summary>密码会发送到服务器吗？</summary><p>不会，bcryptjs完全在浏览器中运行。</p></details>
<details class="faq-item"><summary>bcrypt最大密码长度？</summary><p>bcrypt截断为72字节，超过72字符的密码会被静默截断。</p></details>
<details class="faq-item"><summary>bcrypt vs Argon2 vs PBKDF2？</summary><p>都是密钥拉伸算法，Argon2更现代（内存密集），bcrypt广泛支持。</p></details>
<details class="faq-item"><summary>如何在数据库中存储哈希？</summary><p>bcrypt哈希为60字符，使用VARCHAR(60)列存储。</p></details>

  },
  ja:{pageTitle:'Bcrypt生成ツール - パスワードbcryptハッシュ生成 | MODOO HUB',h1b:'生成ツール',sub:'bcryptでパスワードを安全にハッシュ化',backLink:'← ホーム',langBtn:'🌐 한국어',labelPwd:'パスワード',labelCost:'Cost Factor',labelResult:'bcryptハッシュ',btnGen:'ハッシュ生成',btnClear:'クリア',btnCopy:'コピー',loadMsg:'生成中...',copied:'コピー完了 ✓',approx:'約',costNote:'（高いほど安全・低速）',
    seoHtml:`<h2>Bcrypt生成ツールとは</h2><p>bcryptはパスワード専用のハッシュアルゴリズムで、cost factorで計算コストを調整します。ハッシュごとにランダムなsaltを生成するため、同じパスワードでも毎回異なるハッシュが生成されます。レインボーテーブル攻撃を防ぎます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>なぜ毎回異なるハッシュが生成されますか？</summary><p>bcryptはハッシュごとにランダムなsaltを生成します。同じパスワードでも毎回異なるハッシュになり、レインボーテーブル攻撃を防ぎます。</p></details>
<details class="faq-item"><summary>cost factor 10と12の違いは？</summary><p>1増えるごとに計算時間が2倍になります。cost 12はcost 10の4倍遅いです。</p></details>
<details class="faq-item"><summary>bcryptハッシュの形式は？</summary><p>$2a$10$[22文字のsalt][31文字のハッシュ]。$2a$はバージョン、$10$はcost factorです。</p></details>
<details class="faq-item"><summary>パスワードはサーバーに送信されますか？</summary><p>いいえ。bcryptjsはブラウザ内のみで実行されます。</p></details>
<details class="faq-item"><summary>bcryptの最大パスワード長は？</summary><p>bcryptは72バイトで切り捨てます。72文字を超えるパスワードは黙って切り捨てられます。</p></details>
<details class="faq-item"><summary>bcrypt vs Argon2 vs PBKDF2？</summary><p>すべてキーストレッチングアルゴリズムです。Argon2はよりモダン（メモリ集約型）。bcryptは広くサポートされています。</p></details>
<details class="faq-item"><summary>DBへのハッシュ保存方法は？</summary><p>bcryptハッシュは60文字なのでVARCHAR(60)カラムに保存します。</p></details>
<details class="faq-item"><summary>bcryptハッシュの検証は？</summary><p>bcrypt-validatorツールでパスワードと保存ハッシュを比較検証できます。</p></details>`
  }

const LANGS=['ko','en','zh','ja'];
let _lang='ko',_hash='';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('labelPwd').textContent=t.labelPwd;document.getElementById('labelCost').textContent=t.labelCost;
  document.getElementById('labelResult').textContent=t.labelResult;document.getElementById('btnGen').textContent=t.btnGen;
  document.getElementById('btnClear').textContent=t.btnClear;document.getElementById('btnCopy').textContent=t.btnCopy;
  document.getElementById('loadMsg').textContent=t.loadMsg;document.getElementById('seoDiv').innerHTML=t.seoHtml;
  updateCost();
}
function updateCost(){
  const t=_i18n[_lang];const v=document.getElementById('costRange').value;
  document.getElementById('costVal').textContent=v;
  document.getElementById('costTime').textContent=t.approx+COST_TIMES[v]+' '+t.costNote;
}
async function generateHash(){
  const t=_i18n[_lang];const pwd=document.getElementById('pwdIn').value;if(!pwd)return;
  const cost=parseInt(document.getElementById('costRange').value);
  document.getElementById('btnGen').disabled=true;document.getElementById('loadMsg').style.display='';
  document.getElementById('resultPanel').style.display='none';
  await new Promise(r=>setTimeout(r,10));
  _hash=await bcrypt.hash(pwd,cost);
  const parts=_hash.split('$');
  document.getElementById('hashBox').textContent=_hash;
  document.getElementById('hashParts').innerHTML=`Version: <span>$${parts[1]}$</span> &nbsp; Cost: <span>$${parts[2]}$</span> &nbsp; Salt (22): <span>${_hash.slice(7,29)}</span> &nbsp; Hash (31): <span>${_hash.slice(29)}</span>`;
  document.getElementById('resultPanel').style.display='';
  document.getElementById('btnGen').disabled=false;document.getElementById('loadMsg').style.display='none';
}
function copyHash(){const t=_i18n[_lang];if(!_hash)return;
  navigator.clipboard.writeText(_hash).then(()=>{const btn=document.getElementById('btnCopy');const orig=btn.textContent;btn.textContent=t.copied;setTimeout(()=>btn.textContent=orig,2000);});
}
function clearAll(){document.getElementById('pwdIn').value='';document.getElementById('resultPanel').style.display='none';_hash='';}
_lang=detectLang();applyLang();
