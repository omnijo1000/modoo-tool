function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1a').textContent=t.h1a;document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('lblAcc').textContent=t.lblAcc;document.getElementById('lblTime').textContent=t.lblTime;
  document.getElementById('typingArea').placeholder=t.txtPh;document.getElementById('btnReset').textContent=t.btnReset;
  document.getElementById('rAccLabel').textContent=t.rAccLabel;document.getElementById('rTimeLabel').textContent=t.rTimeLabel;
  document.getElementById('btnRetry').textContent=t.btnRetry;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function renderPassage(){
  const box=document.getElementById('passageBox');
  let html='';
  for(let i=0;i<_chars.length;i++){
    const c=_chars[i]==='<'?'&lt;':_chars[i]==='>'?'&gt;':_chars[i]===' '?'&nbsp;':_chars[i];
    if(i<_idx)html+=`<span class="${_chars[i]===_correct[i]?'correct':'wrong'}">${c}</span>`;
    else if(i===_idx)html+=`<span class="cursor pending">${c}</span>`;
    else html+=`<span class="pending">${c}</span>`;
  }
  box.innerHTML=html;
}
let _correct=[];
function resetTest(){
  clearInterval(_timer);_done=false;_idx=0;_startTime=null;_wrongCount=0;
  _passage=PASSAGES[Math.floor(Math.random()*PASSAGES.length)];
  _chars=_passage.split('');_correct=[..._chars];
  document.getElementById('typingArea').value='';document.getElementById('typingArea').disabled=false;
  document.getElementById('statWpm').textContent='0';document.getElementById('statCpm').textContent='0';
  document.getElementById('statAcc').textContent='100%';document.getElementById('statTimer').textContent='0s';
  document.getElementById('resultPanel').classList.remove('show');
  renderPassage();
}
function onType(){
  if(_done)return;
  const val=document.getElementById('typingArea').value;
  if(!_startTime&&val.length>0){_startTime=Date.now();startTimer();}
  _idx=val.length;_wrongCount=0;
  for(let i=0;i<val.length;i++){if(val[i]!==_chars[i])_wrongCount++;}
  renderPassage();updateStats(val);
  if(val.length===_chars.length){finishTest();}
}
function updateStats(val){
  if(!_startTime)return;
  const sec=(Date.now()-_startTime)/1000;const min=sec/60;
  const words=val.trim().split(/\s+/).filter(Boolean).length;
  const wpm=min>0?Math.round(words/min):0;const cpm=min>0?Math.round(val.length/min):0;
  const acc=val.length>0?Math.round((val.length-_wrongCount)/val.length*100):100;
  document.getElementById('statWpm').textContent=wpm;document.getElementById('statCpm').textContent=cpm;
  document.getElementById('statAcc').textContent=acc+'%';
}
function startTimer(){_timer=setInterval(()=>{if(!_startTime)return;const s=Math.round((Date.now()-_startTime)/1000);document.getElementById('statTimer').textContent=s+'s';},500);}
function finishTest(){
  _done=true;clearInterval(_timer);document.getElementById('typingArea').disabled=true;
  const sec=(Date.now()-_startTime)/1000;const min=sec/60;
  const words=_passage.trim().split(/\s+/).length;
  const wpm=Math.round(words/min);const cpm=Math.round(_passage.length/min);
  const acc=Math.round((_passage.length-_wrongCount)/_passage.length*100);
  document.getElementById('resultWpm').textContent=wpm;document.getElementById('rCpm').textContent=cpm;
  document.getElementById('rAcc').textContent=acc+'%';document.getElementById('rTime').textContent=Math.round(sec)+'s';
  document.getElementById('rankBadge').textContent=_i18n[_lang].rankFn(wpm);
  document.getElementById('resultPanel').classList.add('show');
}
_lang=detectLang();applyLang();resetTest();
</script>
<script src="related.js"></script>
