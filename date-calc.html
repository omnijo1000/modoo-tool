<style>

  input[type=number] { width:100%; background:transparent; border:none; outline:none; font-size:24px; font-weight:700; color:var(--text); font-family:'DM Mono',monospace; }

  .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; }
  .toggle-label { font-size:13px; color:var(--text-muted); }
  .toggle { width:40px; height:22px; background:var(--surface2); border:1px solid var(--border); border-radius:11px; cursor:pointer; position:relative; transition:all 0.2s; }
  .toggle.on { background:var(--accent2); border-color:var(--accent2); }
  .toggle::after { content:''; position:absolute; width:16px; height:16px; background:#fff; border-radius:50%; top:2px; left:2px; transition:left 0.2s; }
  .toggle.on::after { left:20px; }

  .result { border-radius:16px; padding:24px 28px; margin-bottom:20px; display:none; background:var(--accent-dim); border:1px solid var(--accent2); }
  .result.show { display:block; }
  .result-main { text-align:center; margin-bottom:16px; }
  .result-value { font-family:'DM Mono',monospace; font-size:36px; font-weight:700; color:var(--accent2); }
  .result-sub { font-size:14px; color:var(--text-muted); margin-top:6px; }
  .divider { height:1px; background:var(--border); margin:14px 0; }
  .detail-rows { display:flex; flex-direction:column; gap:8px; }
  .detail-row { display:flex; justify-content:space-between; font-size:13px; }
  .detail-label { color:var(--text-muted); }
  .detail-value { font-family:'DM Mono',monospace; color:var(--text); }

  .seo { border-top:1px solid var(--border); padding-top:32px; }
  .seo h2 { font-size:16px; font-weight:700; margin-bottom:12px; }
  .seo p { font-size:13px; color:var(--text-muted); line-height:1.8; margin-bottom:14px; }
  .seo strong { color:var(--text-muted); }

  details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
  details.faq-item summary::-webkit-details-marker{display:none;}
  details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}

  footer { text-align:center; font-size:12px; color:var(--text-dim); margin-top:48px; }
  .lang-toggle { margin-left:4px; font-size:12px; color:var(--text-muted); cursor:pointer; padding:4px 12px; border:1px solid var(--border); border-radius:6px; font-family:'DM Mono',monospace; transition:all 0.15s; }
  .lang-toggle:hover { border-color:var(--accent2,#4ade80); color:var(--accent2,#4ade80); }

<body>
<header>
  <div class="dot"></div>
  <span class="header-label">MODOO HUB</span>
  <a href="index.html" class="back-link">← 모두의 툴</a>
  <div class="lang-toggle" onclick="cycleLang()" id="langBtn">🌐 EN</div>
</header>
<main>
  <h1>날짜<br><span>계산기</span></h1>
  <p class="subtitle">날짜 더하기·빼기, 두 날짜 사이의 기간을 계산합니다</p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('add')" data-i18n="tabAdd">날짜 더하기/빼기</div>
    <div class="tab" onclick="switchTab('diff')" data-i18n="tabDiff">기간 계산</div>
  </div>

  <!-- 날짜 더하기/빼기 -->
  <div id="tabAdd">
    <div class="card">
      <label data-i18n="baseLabel">기준 날짜</label>
      <input type="date" id="baseDate" oninput="calcAdd()">
    </div>
    <div class="op-btns">
      <div class="op-btn active" data-op="+" onclick="selectOp('+')" data-i18n="opAdd">+ 더하기</div>
      <div class="op-btn" data-op="-" onclick="selectOp('-')" data-i18n="opSub">− 빼기</div>
    </div>
    <div class="card-row">
      <div class="card">
        <label data-i18n="lblDays">일수</label>
        <input type="number" id="addDays" placeholder="30" oninput="calcAdd()">
      </div>
      <div class="card">
        <label data-i18n="lblMonths">개월수</label>
        <input type="number" id="addMonths" placeholder="0" oninput="calcAdd()">
      </div>
    </div>
    <div class="card" style="padding:14px 20px;">
      <div class="toggle-row">
        <span class="toggle-label" data-i18n="bizWeekend">주말 제외 (영업일 기준)</span>
        <div class="toggle" id="bizToggle" onclick="toggleBiz()"></div>
      </div>
    </div>
  </div>

  <!-- 기간 계산 -->
  <div id="tabDiff" style="display:none">
    <div class="card-row">
      <div class="card">
        <label data-i18n="lblFrom">시작 날짜</label>
        <input type="date" id="diffStart" oninput="calcDiff()">
      </div>
      <div class="card">
        <label data-i18n="lblTo">종료 날짜</label>
        <input type="date" id="diffEnd" oninput="calcDiff()">
      </div>
    </div>
  </div>

  <div class="result" id="result">
    <div class="result-main">
      <div class="result-value" id="resultValue"></div>
      <div class="result-sub" id="resultSub"></div>
    </div>
    <div class="divider"></div>
    <div class="detail-rows" id="detailRows"></div>
  </div>

  <div class="seo" data-i18n="seoHtml"></div>
  <footer>공휴일은 미포함 · 영업일 계산은 주말만 제외</footer>
</main>
<script>
const DAYS_MAP = {ko:['일','월','화','수','목','금','토'],en:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],zh:['日','一','二','三','四','五','六'],ja:['日','月','火','水','木','金','土']};
function DAYS(i){return (DAYS_MAP[_lang]||DAYS_MAP.ko)[i];}
let currentTab = 'add';
let currentOp = '+';
let bizMode = false;

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabAdd').style.display = tab==='add'?'':'none';
  document.getElementById('tabDiff').style.display = tab==='diff'?'':'none';
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0)===(tab==='add')));
  document.getElementById('result').classList.remove('show');
}

function selectOp(op) {
  currentOp = op;
  document.querySelectorAll('.op-btn').forEach(el => el.classList.toggle('active', el.dataset.op===op));
  calcAdd();
}

function toggleBiz() {
  bizMode = !bizMode;
  document.getElementById('bizToggle').classList.toggle('on', bizMode);
  calcAdd();
}

function pad(n) { return String(n).padStart(2,'0'); }
function fmtDate(d) { return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} (${DAYS(d.getDay())})`; }

function addBizDays(date, days) {
  let d = new Date(date);
  let count = 0;
  const sign = days >= 0 ? 1 : -1;
  const target = Math.abs(days);
  while (count < target) {
    d.setDate(d.getDate() + sign);
    if (d.getDay() !== 0 && d.getDay() !== 6) count++;
  }
  return d;
}

function calcAdd() {
  const base = document.getElementById('baseDate').value;
  const days = parseInt(document.getElementById('addDays').value) || 0;
  const months = parseInt(document.getElementById('addMonths').value) || 0;
  if (!base) { document.getElementById('result').classList.remove('show'); return; }

  const baseDate = new Date(base);
  let result = new Date(baseDate);

  if (months) result.setMonth(result.getMonth() + (currentOp==='+' ? months : -months));
  if (days) {
    const sign = currentOp === '+' ? 1 : -1;
    if (bizMode) {
      result = addBizDays(result, days * sign);
    } else {
      result.setDate(result.getDate() + days * sign);
    }
  }

  const totalDays = Math.round((result - baseDate) / (1000*60*60*24));
  showAddResult(result, Math.abs(totalDays));
}

function showAddResult(result, totalDays) {
  document.getElementById('result').classList.add('show');
  document.getElementById('resultValue').textContent = fmtDate(result);
  const t=_i18n[_lang];
  document.getElementById('resultSub').textContent = bizMode ? t.bizCal : t.calCal;
  document.getElementById('detailRows').innerHTML = `
    <div class="detail-row"><span class="detail-label">${t.movedDays}</span><span class="detail-value">${totalDays.toLocaleString()}${t.unitDay}</span></div>
    <div class="detail-row"><span class="detail-label">${t.lblWeek}</span><span class="detail-value">${Math.floor(totalDays/7)}${t.unitWeek} ${totalDays%7}${t.unitDay}</span></div>
    <div class="detail-row"><span class="detail-label">${t.lblMonthApprox}</span><span class="detail-value">${(totalDays/30).toFixed(1)}${t.unitMonth}</span></div>
  `;
}

function calcDiff() {
  const start = document.getElementById('diffStart').value;
  const end = document.getElementById('diffEnd').value;
  if (!start || !end) { document.getElementById('result').classList.remove('show'); return; }
  const s = new Date(start), e = new Date(end);
  const diff = Math.abs(Math.round((e-s)/(1000*60*60*24)));
  const weeks = Math.floor(diff/7);
  const months = Math.floor(diff/30);
  const years = Math.floor(diff/365);

  // 영업일
  let bizDays = 0;
  const cursor = new Date(Math.min(s,e));
  const endD = new Date(Math.max(s,e));
  while (cursor <= endD) {
    if (cursor.getDay()!==0 && cursor.getDay()!==6) bizDays++;
    cursor.setDate(cursor.getDate()+1);
  }

  const t=_i18n[_lang];
  document.getElementById('result').classList.add('show');
  document.getElementById('resultValue').textContent = `${diff.toLocaleString()}${t.unitDay}`;
  document.getElementById('resultSub').textContent = e >= s ? t.after : t.before;
  document.getElementById('detailRows').innerHTML = `
    <div class="detail-row"><span class="detail-label">${t.lblWeek}</span><span class="detail-value">${weeks}${t.unitWeek} ${diff%7}${t.unitDay}</span></div>
    <div class="detail-row"><span class="detail-label">${t.lblMonthApprox}</span><span class="detail-value">${months}${t.unitMonth}</span></div>
    <div class="detail-row"><span class="detail-label">${t.lblYearApprox}</span><span class="detail-value">${(diff/365).toFixed(1)}${t.unitYear}</span></div>
    <div class="detail-row"><span class="detail-label">${t.bizDaysLabel}</span><span class="detail-value">${bizDays}${t.unitDay}</span></div>
  `;
}

// 오늘로 기본값
document.getElementById('baseDate').value = new Date().toISOString().split('T')[0];
</script>

Object.assign(_i18n.ko, {
  seoHtml:'<h2>날짜 계산기 완전 가이드</h2><p>날짜 계산기는 특정 날짜에 일수·주수·개월수를 더하거나 빼서 목표 날짜를 산출하거나, 두 날짜 사이의 <strong>정확한 기간</strong>(일수, 주수, 개월, 영업일)을 계산합니다. <strong>법적 기한</strong>(소멸시효, 제소 기간), <strong>프로젝트 일정</strong>(납기일), <strong>계약 관리</strong>(만기일, 갱신일), <strong>금융 계산</strong>(이자 기간, 만기일)에 활용됩니다.</p><details class="faq-item"><summary>영업일 계산이란?</summary><p>주말(토요일·일요일)을 제외하고 실제 업무일만 카운트하는 방식입니다. 이 계산기는 공휴일을 자동으로 제외하지 않으므로, 공휴일이 많은 기간에는 수동으로 조정이 필요합니다.</p></details><details class="faq-item"><summary>30일 후 날짜를 구하려면?</summary><p>"날짜 더하기/빼기" 탭에서 기준 날짜를 선택하고 일수에 30을 입력하면 됩니다. 월 단위로는 1개월을 선택하면 해당 월의 일수를 반영한 날짜가 계산됩니다(예: 1월 31일 + 1개월 = 2월 28일).</p></details><details class="faq-item"><summary>계약 만기일 계산에도 사용할 수 있나요?</summary><p>네. 계약 시작일을 입력하고 계약 기간(개월수)을 더하면 만기일이 계산됩니다. 예: 2024-03-01 + 12개월 = 2025-03-01. 자동갱신 방지를 위한 해지 통보 기한도 만기일 - n일로 역산할 수 있습니다.</p></details><details class="faq-item"><summary>법적 시효(소멸시효)는 어떻게 계산하나요?</summary><p>한국 민법상 일반 채권 소멸시효는 10년, 상사채권은 5년, 불법행위 손해배상은 3년(안 날로부터), 근로 임금은 3년입니다. 이 계산기에서 사건 발생일 + 해당 연수를 더해 시효 만료일을 구하세요. 법적 결정에는 반드시 전문가 상담이 필요합니다.</p></details><details class="faq-item"><summary>음력 날짜와 양력 날짜를 변환할 수 있나요?</summary><p>이 계산기는 그레고리력(양력) 기준으로만 계산합니다. 음력↔양력 변환은 별도의 음양력 변환 도구를 사용하세요. 음력은 달의 주기를 기반으로 하므로 단순한 날수 계산으로는 변환이 불가능합니다.</p></details><details class="faq-item"><summary>양력과 음력 날짜 계산도 지원하나요?</summary><p>이 날짜 계산기는 그레고리력(양력) 기준으로 동작합니다. 음력 날짜 계산이 필요하다면 음력 전용 변환기를 사용하세요. 한국의 음력은 천문 계산을 기반으로 하며 단순 공식으로 변환하기 어렵습니다.</p></details><details class="faq-item"><summary>두 날짜 사이에 포함된 주말 수를 알 수 있나요?</summary><p>날짜 범위 계산 시 총 일수, 평일 수, 주말 수를 각각 구분해 표시합니다. 업무 기간 계산이나 평일 기준 납기 계산에 활용할 수 있습니다.</p></details><details class="faq-item"><summary>특정 날짜가 윤년인지 확인할 수 있나요?</summary><p>윤년은 4로 나누어 떨어지는 해 중 100으로 나누어 떨어지지 않거나, 400으로 나누어 떨어지는 해입니다. 예: 2024년은 윤년(2월 29일 있음), 2100년은 윤년이 아닙니다.</p></details>'

Object.assign(_i18n.en, {
  seoHtml:'<h2>Date Calculator — Complete Guide</h2><p>The Date Calculator lets you add or subtract days, weeks, or months from a base date to find a target date, or calculate the exact period between two dates (days, weeks, months, business days). Applications: <strong>legal deadlines</strong> (statutes of limitation, filing deadlines), <strong>project management</strong> (delivery dates, sprint end dates), <strong>contract management</strong> (expiry, renewal, notice periods), <strong>finance</strong> (loan maturity, interest periods). Business day calculations exclude weekends — public holidays must be adjusted manually.</p><details class="faq-item"><summary>What is business day calculation?</summary><p>Business days count working days excluding weekends (Saturday and Sunday). This calculator does not automatically exclude public holidays — subtract the number of holidays in the period from the result if you need to account for them.</p></details><details class="faq-item"><summary>How do I find the date 30 days from today?</summary><p>In the "Add/Subtract" tab, set today as the base date and enter 30 as the number of days. For months, selecting 1 month accounts for variable month lengths (e.g., Jan 31 + 1 month = Feb 28).</p></details><details class="faq-item"><summary>Can I use this for contract expiry dates?</summary><p>Yes. Enter the contract start date and add the duration in months to get the expiry date. You can also back-calculate the latest notice-of-cancellation date: expiry date minus the required notice period.</p></details><details class="faq-item"><summary>How do I calculate a statute of limitations deadline?</summary><p>Enter the date the cause of action arose as the base date, then add the limitation period (e.g., 3 years for tort, 5 years for commercial contract, 10 years for general civil claims in Korea). Always verify with a lawyer — limitation periods vary by jurisdiction and claim type.</p></details><details class="faq-item"><summary>Can the calculator convert between lunar and solar calendar dates?</summary><p>No — this calculator works with the Gregorian (solar) calendar only. Lunar-to-solar conversion requires a dedicated tool because lunar months do not correspond to fixed-length periods, making simple arithmetic impossible.</p></details><details class="faq-item"><summary>Is the lunar calendar supported for date calculations?</summary><p>This date calculator operates on the Gregorian (solar) calendar. For lunar date calculations use a dedicated lunar calendar converter. Korean lunar dates are based on astronomical calculation and cannot be converted with simple formulas.</p></details><details class="faq-item"><summary>Can I see how many weekends fall between two dates?</summary><p>When calculating a date range, the tool displays total days, weekdays, and weekends separately. Useful for calculating business durations or business-day-based deadlines.</p></details><details class="faq-item"><summary>Can I check whether a specific year is a leap year?</summary><p>A leap year is divisible by 4, but not by 100, unless also divisible by 400. Example: 2024 is a leap year (Feb 29 exists), but 2100 is not a leap year.</p></details>'
});
Object.assign(_i18n.zh, {
  seoHtml:'<h2>日期计算器完全指南</h2><p>日期计算器可以在基准日期上加减天数、周数或月数来找到目标日期，或计算两个日期之间的精确间隔（天、周、月、工作日）。应用场景：<strong>法律期限</strong>（诉讼时效、申报截止日）、<strong>项目管理</strong>（交付日、冲刺结束日）、<strong>合同管理</strong>（到期日、续签日、通知期）、<strong>金融</strong>（贷款到期日、利息计算期）。工作日计算排除周末，法定假日需手动调整。</p><details class=”faq-item”><summary>什么是工作日计算？</summary><p>工作日计算只统计实际工作日，默认排除周末（周六/周日），不自动排除法定节假日。若需扣除节假日，请手动从结果中减去该时间段内的节假日数量。</p></details><details class=”faq-item”><summary>如何计算30天后的日期？</summary><p>在”日期加减”标签中，将今天设为基准日期，输入天数30。若使用月数，选择1个月会自动处理月份长度差异（例如：1月31日 + 1个月 = 2月28日）。</p></details><details class=”faq-item”><summary>可以用于合同到期日计算吗？</summary><p>可以。输入合同开始日期，加上合同期限（月数）即可得到到期日。您也可以反向计算最晚通知解约日：到期日减去所需通知期。</p></details><details class=”faq-item”><summary>如何计算诉讼时效截止日？</summary><p>将权利发生日期作为基准日，加上诉讼时效期限（如韩国：侵权行为3年、商事合同5年、一般民事10年）。计算结果仅供参考，具体诉讼时效因案件类型和司法管辖区而异，请务必咨询专业律师。</p></details><details class=”faq-item”><summary>计算器能进行农历和公历转换吗？</summary><p>不能——本计算器只基于格里历（公历）运算。农历转公历需要专用工具，因为农历月份对应的天数不固定，简单的天数算术无法完成转换。</p></details><details class="faq-item"><summary>支持农历日期计算吗？</summary><p>本日期计算器基于公历（格里历）运行。如需农历日期计算，请使用专用的农历转换工具。中国农历基于天文计算，无法用简单公式转换。</p></details><details class="faq-item"><summary>可以查看两个日期之间有多少个周末吗？</summary><p>计算日期范围时，工具会分别显示总天数、工作日数和周末数，适用于计算业务周期或基于工作日的截止日期。</p></details><details class="faq-item"><summary>可以检查特定年份是否为闰年吗？</summary><p>闰年规则：能被4整除但不能被100整除，或能被400整除。例：2024年是闰年（有2月29日），而2100年不是闰年。</p></details>'
});
Object.assign(_i18n.ja, {
  seoHtml:'<h2>日付計算機 完全ガイド</h2><p>日付計算機は基準日に日数・週数・月数を加算または減算して目標日を求めたり、2つの日付間の<strong>正確な期間</strong>（日数・週数・月数・営業日）を計算したりできます。<strong>法的期限</strong>（時効、出訴期限）、<strong>プロジェクト管理</strong>（納期、スプリント終了日）、<strong>契約管理</strong>（満了日、更新日、通知期間）、<strong>金融</strong>（ローン満期日・利息計算期間）に活用できます。営業日計算は土日を除外しますが、祝日は手動で調整が必要です。</p><details class="faq-item"><summary>営業日計算とは？</summary><p>土曜日・日曜日を除いた実際の業務日のみをカウントする方式です。この計算機は祝日を自動的に除外しません。祝日を考慮する場合は、計算結果から該当期間の祝日数を手動で差し引いてください。</p></details><details class="faq-item"><summary>30日後の日付を求めるには？</summary><p>「日付の加算/減算」タブで基準日を選択し、日数に30を入力してください。月単位では「1ヶ月」を選択するとその月の日数を考慮した日付が計算されます（例：1月31日 + 1ヶ月 = 2月28日）。</p></details><details class="faq-item"><summary>契約満了日の計算にも使えますか？</summary><p>はい。契約開始日を入力し、契約期間（月数）を加算すると満了日が計算されます。また、満了日から解約通知の必要日数を差し引いて、最遅通知日の逆算にも使えます。</p></details><details class="faq-item"><summary>消滅時効（法的期限）はどう計算しますか？</summary><p>権利が発生した日を基準日として、時効期間を加算します（日本民法：一般債権は10年→2020年改正で5年+主観的起算点、不法行為は3年）。この計算機で概算を求め、実際の法的判断は必ず専門家に相談してください。</p></details><details class="faq-item"><summary>旧暦（陰暦）と新暦（グレゴリオ暦）の変換はできますか？</summary><p>この計算機はグレゴリオ暦（新暦）のみで動作します。旧暦↔新暦変換には専用ツールが必要です。旧暦は月の満ち欠けを基準にしており、月の長さが一定でないため、単純な日数計算では変換できません。</p></details><details class="faq-item"><summary>旧暦の日付計算に対応していますか？</summary><p>この日付計算機はグレゴリオ暦（新暦）を基準に動作します。旧暦の計算には専用の旧暦コンバーターをご使用ください。韓国の旧暦は天文計算に基づき、簡単な公式では変換できません。</p></details><details class="faq-item"><summary>2つの日付の間に含まれる週末の数を確認できますか？</summary><p>日付範囲計算時に合計日数、平日数、週末数がそれぞれ表示されます。業務期間の計算や営業日基準の納期計算に活用できます。</p></details><details class="faq-item"><summary>特定の年が閏年かどうか確認できますか？</summary><p>閏年は4で割り切れ、かつ100で割り切れない年、または400で割り切れる年です。例：2024年は閏年（2月29日あり）、2100年は閏年ではありません。</p></details>'
});
function _detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  else if (n.startsWith('ja')) return 'ja';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}
let _lang = _detectLang();
function _applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = t.lang;
  document.title = t.title;
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = t.btn;
  const h1 = document.querySelector('h1');
  if (h1) h1.innerHTML = t.h1;
  const sub = document.querySelector('.subtitle');
  if (sub) sub.textContent = t.sub;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  const back = document.querySelector('.back-link');
  if (back) back.textContent = (_lang === 'ko') ? '← 모두의 툴' : (_lang === 'zh') ? '← 首页' : (_lang === 'ja') ? '← ホーム' : '← Home';
}
const _langOrder = ['ko','en','zh','ja'];
function cycleLang() {
  const idx = _langOrder.indexOf(_lang);
  _lang = _langOrder[(idx + 1) % _langOrder.length];
  localStorage.setItem('lang', _lang);
  const url = new URL(location.href);
  if (_lang === 'ko') { url.searchParams.delete('lang'); } else { url.searchParams.set('lang', _lang); }
  history.replaceState({}, '', url);
  _applyLang();
}
_applyLang();
</script>
