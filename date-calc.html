<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>날짜 계산기 - 날짜 더하기 빼기, 기간 계산</title>
<meta name="description" content="날짜 계산기. 날짜에 일수를 더하거나 빼고, 두 날짜 사이의 기간을 계산하세요. 영업일 계산, 주말 제외 계산도 지원하는 무료 날짜 계산기.">
<meta name="keywords" content="날짜 계산기, 날짜 더하기, 날짜 빼기, 기간 계산, 영업일 계산, 날짜 차이">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0f0a; --surface:#111811; --surface2:#182018; --border:#1e2e1e;
    --accent:#86efac; --accent2:#4ade80; --accent-dim:rgba(134,239,172,0.08);
    --text:#f0fff0; --text-muted:#7a9a7a; --text-dim:#3a5a3a;
    --green:#4ade80; --red:#f87171; --yellow:#facc15; --blue:#60a5fa;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; }
  header { border-bottom:1px solid var(--border); padding:20px 24px; display:flex; align-items:center; gap:12px; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--accent2); }
  .header-label { font-size:13px; color:var(--text-muted); letter-spacing:0.1em; font-family:'DM Mono',monospace; }
  .back-link { margin-left:auto; font-size:13px; color:var(--text-muted); text-decoration:none; }
  .back-link:hover { color:var(--accent2); }
  main { max-width:640px; margin:0 auto; padding:48px 24px; }
  h1 { font-size:clamp(24px,5vw,36px); font-weight:900; line-height:1.1; margin-bottom:12px; }
  h1 span { color:var(--accent2); }
  .subtitle { color:var(--text-muted); font-size:14px; margin-bottom:32px; }
  .tabs { display:flex; gap:8px; margin-bottom:20px; }
  .tab { flex:1; padding:11px; text-align:center; border:1px solid var(--border); border-radius:10px; cursor:pointer; font-size:14px; font-weight:700; color:var(--text-muted); background:var(--surface); transition:all 0.15s; }
  .tab.active { border-color:var(--accent2); color:var(--accent2); background:var(--accent-dim); }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 24px; margin-bottom:14px; transition:border-color 0.2s; }
  .card:focus-within { border-color:var(--accent2); }
  .card-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  label { font-size:12px; color:var(--text-muted); letter-spacing:0.08em; display:block; margin-bottom:10px; }
  input[type=date] { width:100%; background:transparent; border:none; outline:none; font-size:22px; font-weight:700; color:var(--text); font-family:'DM Mono',monospace; }
  input[type=date]::-webkit-calendar-picker-indicator { filter:invert(0.5); }
  input[type=number] { width:100%; background:transparent; border:none; outline:none; font-size:24px; font-weight:700; color:var(--text); font-family:'DM Mono',monospace; }
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }

  .op-btns { display:flex; gap:8px; margin-bottom:14px; }
  .op-btn { flex:1; padding:10px; text-align:center; border:1px solid var(--border); border-radius:8px; cursor:pointer; font-size:18px; color:var(--text-muted); background:var(--surface); transition:all 0.15s; }
  .op-btn.active { border-color:var(--accent2); color:var(--accent2); background:var(--accent-dim); }

  .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; }
  .toggle-label { font-size:13px; color:var(--text-muted); }
  .toggle { width:40px; height:22px; background:var(--surface2); border:1px solid var(--border); border-radius:11px; cursor:pointer; position:relative; transition:all 0.2s; }
  .toggle.on { background:var(--accent2); border-color:var(--accent2); }
  .toggle::after { content:''; position:absolute; width:16px; height:16px; background:#fff; border-radius:50%; top:2px; left:2px; transition:left 0.2s; }
  .toggle.on::after { left:20px; }

  .result { border-radius:16px; padding:24px 28px; margin-bottom:20px; display:none; background:var(--accent-dim); border:1px solid var(--accent2); }
  .result.show { display:block; }
  .result-main { text-align:center; margin-bottom:16px; }
  .result-value { font-family:'DM Mono',monospace; font-size:36px; font-weight:700; color:var(--accent2); }
  .result-sub { font-size:14px; color:var(--text-muted); margin-top:6px; }
  .divider { height:1px; background:var(--border); margin:14px 0; }
  .detail-rows { display:flex; flex-direction:column; gap:8px; }
  .detail-row { display:flex; justify-content:space-between; font-size:13px; }
  .detail-label { color:var(--text-muted); }
  .detail-value { font-family:'DM Mono',monospace; color:var(--text); }

  .seo { border-top:1px solid var(--border); padding-top:32px; }
  .seo h2 { font-size:16px; font-weight:700; margin-bottom:12px; }
  .seo p { font-size:13px; color:var(--text-muted); line-height:1.8; margin-bottom:24px; }
  footer { text-align:center; font-size:12px; color:var(--text-dim); margin-top:48px; }
</style>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-NR6VJF0534"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

  gtag('config', 'G-NR6VJF0534');
</script>
</head>
<body>
<header>
  <div class="dot"></div>
  <span class="header-label">DATE CALCULATOR</span>
  <a href="index.html" class="back-link">← 모두의 툴</a>
</header>
<main>
  <h1>날짜<br><span>계산기</span></h1>
  <p class="subtitle">날짜 더하기·빼기, 두 날짜 사이의 기간을 계산합니다</p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('add')">날짜 더하기/빼기</div>
    <div class="tab" onclick="switchTab('diff')">기간 계산</div>
  </div>

  <!-- 날짜 더하기/빼기 -->
  <div id="tabAdd">
    <div class="card">
      <label>기준 날짜</label>
      <input type="date" id="baseDate" oninput="calcAdd()">
    </div>
    <div class="op-btns">
      <div class="op-btn active" data-op="+" onclick="selectOp('+')">+ 더하기</div>
      <div class="op-btn" data-op="-" onclick="selectOp('-')">− 빼기</div>
    </div>
    <div class="card-row">
      <div class="card">
        <label>일수</label>
        <input type="number" id="addDays" placeholder="30" oninput="calcAdd()">
      </div>
      <div class="card">
        <label>개월수</label>
        <input type="number" id="addMonths" placeholder="0" oninput="calcAdd()">
      </div>
    </div>
    <div class="card" style="padding:14px 20px;">
      <div class="toggle-row">
        <span class="toggle-label">주말 제외 (영업일 기준)</span>
        <div class="toggle" id="bizToggle" onclick="toggleBiz()"></div>
      </div>
    </div>
  </div>

  <!-- 기간 계산 -->
  <div id="tabDiff" style="display:none">
    <div class="card-row">
      <div class="card">
        <label>시작 날짜</label>
        <input type="date" id="diffStart" oninput="calcDiff()">
      </div>
      <div class="card">
        <label>종료 날짜</label>
        <input type="date" id="diffEnd" oninput="calcDiff()">
      </div>
    </div>
  </div>

  <div class="result" id="result">
    <div class="result-main">
      <div class="result-value" id="resultValue"></div>
      <div class="result-sub" id="resultSub"></div>
    </div>
    <div class="divider"></div>
    <div class="detail-rows" id="detailRows"></div>
  </div>

  <div class="seo">
    <h2>날짜 계산기 활용법</h2>
    <p>계약 만료일, 납기일, 시험 날짜 등 특정 날짜로부터 며칠 후를 계산하거나, 두 날짜 사이의 정확한 기간을 계산할 때 유용합니다. 영업일 기준으로 주말을 제외한 계산도 가능합니다.</p>
  </div>
  <footer>공휴일은 미포함 · 영업일 계산은 주말만 제외</footer>
</main>
<script>
const DAYS = ['일','월','화','수','목','금','토'];
let currentTab = 'add';
let currentOp = '+';
let bizMode = false;

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabAdd').style.display = tab==='add'?'':'none';
  document.getElementById('tabDiff').style.display = tab==='diff'?'':'none';
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0)===(tab==='add')));
  document.getElementById('result').classList.remove('show');
}

function selectOp(op) {
  currentOp = op;
  document.querySelectorAll('.op-btn').forEach(el => el.classList.toggle('active', el.dataset.op===op));
  calcAdd();
}

function toggleBiz() {
  bizMode = !bizMode;
  document.getElementById('bizToggle').classList.toggle('on', bizMode);
  calcAdd();
}

function pad(n) { return String(n).padStart(2,'0'); }
function fmtDate(d) { return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} (${DAYS[d.getDay()]})`; }

function addBizDays(date, days) {
  let d = new Date(date);
  let count = 0;
  const sign = days >= 0 ? 1 : -1;
  const target = Math.abs(days);
  while (count < target) {
    d.setDate(d.getDate() + sign);
    if (d.getDay() !== 0 && d.getDay() !== 6) count++;
  }
  return d;
}

function calcAdd() {
  const base = document.getElementById('baseDate').value;
  const days = parseInt(document.getElementById('addDays').value) || 0;
  const months = parseInt(document.getElementById('addMonths').value) || 0;
  if (!base) { document.getElementById('result').classList.remove('show'); return; }

  const baseDate = new Date(base);
  let result = new Date(baseDate);

  if (months) result.setMonth(result.getMonth() + (currentOp==='+' ? months : -months));
  if (days) {
    const sign = currentOp === '+' ? 1 : -1;
    if (bizMode) {
      result = addBizDays(result, days * sign);
    } else {
      result.setDate(result.getDate() + days * sign);
    }
  }

  const totalDays = Math.round((result - baseDate) / (1000*60*60*24));
  showAddResult(result, Math.abs(totalDays));
}

function showAddResult(result, totalDays) {
  document.getElementById('result').classList.add('show');
  document.getElementById('resultValue').textContent = fmtDate(result);
  document.getElementById('resultSub').textContent = bizMode ? '영업일 기준' : '달력 기준';
  document.getElementById('detailRows').innerHTML = `
    <div class="detail-row"><span class="detail-label">이동한 일수</span><span class="detail-value">${totalDays.toLocaleString()}일</span></div>
    <div class="detail-row"><span class="detail-label">주</span><span class="detail-value">${Math.floor(totalDays/7)}주 ${totalDays%7}일</span></div>
    <div class="detail-row"><span class="detail-label">개월 (약)</span><span class="detail-value">${(totalDays/30).toFixed(1)}개월</span></div>
  `;
}

function calcDiff() {
  const start = document.getElementById('diffStart').value;
  const end = document.getElementById('diffEnd').value;
  if (!start || !end) { document.getElementById('result').classList.remove('show'); return; }
  const s = new Date(start), e = new Date(end);
  const diff = Math.abs(Math.round((e-s)/(1000*60*60*24)));
  const weeks = Math.floor(diff/7);
  const months = Math.floor(diff/30);
  const years = Math.floor(diff/365);

  // 영업일
  let bizDays = 0;
  const cursor = new Date(Math.min(s,e));
  const endD = new Date(Math.max(s,e));
  while (cursor <= endD) {
    if (cursor.getDay()!==0 && cursor.getDay()!==6) bizDays++;
    cursor.setDate(cursor.getDate()+1);
  }

  document.getElementById('result').classList.add('show');
  document.getElementById('resultValue').textContent = `${diff.toLocaleString()}일`;
  document.getElementById('resultSub').textContent = e >= s ? '후' : '전';
  document.getElementById('detailRows').innerHTML = `
    <div class="detail-row"><span class="detail-label">주</span><span class="detail-value">${weeks}주 ${diff%7}일</span></div>
    <div class="detail-row"><span class="detail-label">개월 (약)</span><span class="detail-value">${months}개월</span></div>
    <div class="detail-row"><span class="detail-label">년 (약)</span><span class="detail-value">${(diff/365).toFixed(1)}년</span></div>
    <div class="detail-row"><span class="detail-label">영업일 (주말 제외)</span><span class="detail-value">${bizDays}일</span></div>
  `;
}

// 오늘로 기본값
document.getElementById('baseDate').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
