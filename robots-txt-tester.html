<script>
const LANGS=['ko','en','zh','ja'];let _lang='ko';
const _i18n={
  ko:{h1Accent:'테스터',sub:'robots.txt 규칙을 입력하고 URL 크롤링 허용 여부를 테스트합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',lblRobots:'robots.txt 내용',lblParsed:'파싱 결과',btnTest:'테스트',btnSample:'샘플',parsedEmpty:'규칙을 입력하세요',
    allowed:'✓ 크롤링 허용',blocked:'✗ 크롤링 차단',defaultAllow:'(기본값: 허용)',matchedRule:'일치 규칙: ',
    seoHtml:`<h2>robots.txt 테스터</h2><p>robots.txt 파일의 규칙을 입력하고 특정 URL과 User-agent 조합에 대해 크롤링이 허용되는지 차단되는지 테스트합니다. Allow/Disallow 규칙의 우선순위와 와일드카드 매칭을 정확하게 시뮬레이션합니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>robots.txt 파일은 어디에 위치해야 하나요?</summary><p>반드시 도메인 루트에 위치해야 합니다. 예: https://example.com/robots.txt</p></details>
<details class="faq-item"><summary>Allow와 Disallow 중 어느 것이 우선인가요?</summary><p>규칙이 충돌할 때는 더 구체적인(긴) 경로 패턴이 우선합니다. 같은 길이면 Allow가 우선합니다.</p></details>
<details class="faq-item"><summary>* 와일드카드는 어떻게 작동하나요?</summary><p>Disallow: /admin* 처럼 경로 내 임의 문자열을 매칭합니다.</p></details>
<details class="faq-item"><summary>$ 기호는 무엇인가요?</summary><p>경로의 끝을 의미합니다. Disallow: /*.pdf$ 는 .pdf로 끝나는 URL을 차단합니다.</p></details>
<details class="faq-item"><summary>robots.txt를 무시하는 봇도 있나요?</summary><p>예, 악성 봇은 robots.txt를 무시할 수 있습니다. 중요한 보호는 서버 레벨에서 하세요.</p></details>
<details class="faq-item"><summary>User-agent: * 와 특정 봇 규칙이 동시에 있으면?</summary><p>특정 봇에 맞는 User-agent 섹션이 존재하면 그 섹션만 적용됩니다. * 규칙은 무시됩니다.</p></details>
<details class="faq-item"><summary>Sitemap 디렉티브는 무엇인가요?</summary><p>Sitemap: https://example.com/sitemap.xml 처럼 사이트맵 URL을 명시하면 검색 엔진이 발견하는 데 도움됩니다.</p></details>
<details class="faq-item"><summary>Crawl-delay는 무엇인가요?</summary><p>Crawl-delay: 10 처럼 크롤러가 요청 사이에 대기할 초를 지정합니다. Google은 무시합니다.</p></details>`
  },
  en:{h1Accent:'Tester',sub:'Enter robots.txt rules and test whether a URL is allowed or blocked',backLink:'← All Tools',langBtn:'🌐 中文',lblRobots:'robots.txt content',lblParsed:'Parsed rules',btnTest:'Test',btnSample:'Sample',parsedEmpty:'Enter rules above',
    allowed:'✓ Crawling allowed',blocked:'✗ Crawling blocked',defaultAllow:'(default: allowed)',matchedRule:'Matched rule: ',
    seoHtml:`<h2>Robots.txt Tester</h2><p>Enter your robots.txt rules and test whether a specific URL/User-agent combination is allowed or blocked. Accurately simulates Allow/Disallow rule priority and wildcard matching.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Where does robots.txt need to be located?</summary><p>It must be at the domain root: https://example.com/robots.txt</p></details>
<details class="faq-item"><summary>Which takes priority — Allow or Disallow?</summary><p>When rules conflict, the more specific (longer) path pattern wins. At equal length, Allow wins.</p></details>
<details class="faq-item"><summary>How does the * wildcard work?</summary><p>Disallow: /admin* matches any URL starting with /admin.</p></details>
<details class="faq-item"><summary>What does $ mean?</summary><p>End of URL. Disallow: /*.pdf$ blocks URLs ending in .pdf.</p></details>
<details class="faq-item"><summary>Can bots ignore robots.txt?</summary><p>Yes — malicious bots can ignore it. Server-level protection is needed for truly sensitive content.</p></details>
<details class="faq-item"><summary>What if there's a specific bot section and a * section?</summary><p>The bot-specific section applies exclusively; the * section is ignored for that bot.</p></details>
<details class="faq-item"><summary>What is the Sitemap directive?</summary><p>Sitemap: https://example.com/sitemap.xml tells search engines where to find your sitemap.</p></details>
<details class="faq-item"><summary>What is Crawl-delay?</summary><p>Crawl-delay: 10 tells crawlers to wait 10 seconds between requests. Google ignores this.</p></details>`
  },
  zh:{h1Accent:'测试器',sub:'输入robots.txt规则并测试URL是否被允许或阻止',backLink:'← 所有工具',langBtn:'🌐 日本語',lblRobots:'robots.txt内容',lblParsed:'解析结果',btnTest:'测试',btnSample:'示例',parsedEmpty:'请输入规则',
    allowed:'✓ 允许爬取',blocked:'✗ 禁止爬取',defaultAllow:'（默认：允许）',matchedRule:'匹配规则: ',
    seoHtml:`<h2>robots.txt测试器</h2><p>输入robots.txt规则，测试特定URL和User-agent组合是否被允许或阻止爬取。准确模拟Allow/Disallow规则优先级和通配符匹配。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>robots.txt必须放在哪里？</summary><p>必须放在域名根目录：https://example.com/robots.txt</p></details>
<details class="faq-item"><summary>Allow和Disallow哪个优先？</summary><p>规则冲突时，更具体（更长）的路径模式优先。长度相同时Allow优先。</p></details>
<details class="faq-item"><summary>*通配符如何工作？</summary><p>Disallow: /admin*匹配所有以/admin开头的URL。</p></details>
<details class="faq-item"><summary>$符号是什么意思？</summary><p>URL结尾。Disallow: /*.pdf$阻止以.pdf结尾的URL。</p></details>
<details class="faq-item"><summary>爬虫可以忽略robots.txt吗？</summary><p>是的，恶意爬虫可以忽略。重要保护需在服务器层面实现。</p></details>
<details class="faq-item"><summary>同时有特定爬虫和*规则怎么办？</summary><p>特定爬虫段专门适用，该爬虫忽略*规则。</p></details>
<details class="faq-item"><summary>Sitemap指令是什么？</summary><p>Sitemap: https://example.com/sitemap.xml告诉搜索引擎您的站点地图位置。</p></details>
<details class="faq-item"><summary>Crawl-delay是什么？</summary><p>Crawl-delay: 10告诉爬虫请求之间等待10秒。Google会忽略此指令。</p></details>`
  },
  ja:{h1Accent:'テスター',sub:'robots.txtルールを入力してURLのクロール許可/拒否をテストします',backLink:'← ホーム',langBtn:'🌐 한국어',lblRobots:'robots.txt内容',lblParsed:'解析結果',btnTest:'テスト',btnSample:'サンプル',parsedEmpty:'ルールを入力してください',
    allowed:'✓ クロール許可',blocked:'✗ クロール拒否',defaultAllow:'（デフォルト：許可）',matchedRule:'一致ルール: ',
    seoHtml:`<h2>robots.txtテスター</h2><p>robots.txtルールを入力し、特定のURL/User-agent組み合わせがクロール許可か拒否かをテストします。Allow/Disallowルールの優先度とワイルドカードマッチングを正確にシミュレートします。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>robots.txtはどこに置く必要がありますか？</summary><p>ドメインルートに置く必要があります: https://example.com/robots.txt</p></details>
<details class="faq-item"><summary>AllowとDisallow、どちらが優先されますか？</summary><p>競合する場合、より具体的な（長い）パスパターンが優先します。同じ長さならAllowが優先。</p></details>
<details class="faq-item"><summary>*ワイルドカードはどう機能しますか？</summary><p>Disallow: /admin* は /admin で始まるすべてのURLに一致します。</p></details>
<details class="faq-item"><summary>$記号は何ですか？</summary><p>URLの末尾を示します。Disallow: /*.pdf$ は .pdf で終わるURLをブロックします。</p></details>
<details class="faq-item"><summary>ボットがrobots.txtを無視することはありますか？</summary><p>はい、悪意のあるボットは無視します。重要なコンテンツはサーバーレベルで保護してください。</p></details>
<details class="faq-item"><summary>特定ボットと*のセクションが両方ある場合は？</summary><p>そのボット専用のセクションが適用され、*セクションは無視されます。</p></details>
<details class="faq-item"><summary>Sitemapディレクティブとは？</summary><p>Sitemap: https://example.com/sitemap.xml で検索エンジンにサイトマップの場所を伝えます。</p></details>
<details class="faq-item"><summary>Crawl-delayとは？</summary><p>Crawl-delay: 10 でリクエスト間の待機秒数を指定します。Googleは無視します。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblRobots','lblParsed','btnTest','btnSample'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});

  const t=_i18n[_lang];
  const txt=document.getElementById('robotsIn').value.trim();
  if(!txt){document.getElementById('parsedOut').innerHTML=`<span style="color:var(--text-dim)">${t.parsedEmpty}</span>`;return;}
  const groups=[];let cur=null;
  txt.split('\n').forEach(line=>{
    line=line.trim();if(!line||line.startsWith('#'))return;
    const [key,...rest]=line.split(':');const val=rest.join(':').trim();
    if(key.toLowerCase()==='user-agent'){if(!cur||cur.rules.length>0){cur={ua:val,rules:[]};groups.push(cur);}else{cur.ua+=', '+val;}}
    else if(cur&&(key.toLowerCase()==='allow'||key.toLowerCase()==='disallow')){cur.rules.push({type:key.toLowerCase(),path:val});}
  });
  let html='';
  groups.forEach(g=>{
    html+=`<div class="ua-group"><div class="ua-name">User-agent: ${g.ua}</div>`;
    if(!g.rules.length)html+=`<div class="rule-line" style="color:var(--text-dim)">-- no rules --</div>`;
    g.rules.forEach(r=>{html+=`<div class="rule-line ${r.type==='allow'?'rule-allow':'rule-disallow'}">${r.type==='allow'?'Allow':'Disallow'}: ${r.path||'/'}</div>`;});
    html+='</div>';
  });
  document.getElementById('parsedOut').innerHTML=html||`<span style="color:var(--text-dim)">${t.parsedEmpty}</span>`;
}
function matchPath(pattern,path){
  const regStr=pattern.replace(/[.+^${}()|[\]\\]/g,'\\$&').replace(/\*/g,'.*').replace(/\\\$/,'$');
  const re=new RegExp('^'+regStr);return re.test(path);
}
function test(){
  const t=_i18n[_lang];
  const url=document.getElementById('urlIn').value.trim()||'/';
  const ua=document.getElementById('uaSel').value;
  const txt=document.getElementById('robotsIn').value.trim();
  if(!txt){document.getElementById('resultBanner').style.display='none';return;}
  const lines=txt.split('\n');
  const groups=[];let cur=null;
  lines.forEach(line=>{
    line=line.trim();if(!line||line.startsWith('#'))return;
    const [key,...rest]=line.split(':');const val=rest.join(':').trim();
    if(key.toLowerCase()==='user-agent'){if(!cur||cur.uas.length>0){cur={uas:[val],rules:[]};groups.push(cur);}else cur.uas.push(val);}
    else if(cur&&(key.toLowerCase()==='allow'||key.toLowerCase()==='disallow')){cur.rules.push({type:key.toLowerCase(),path:val});}
  });
  const relevant=groups.filter(g=>g.uas.some(a=>a==='*'||a.toLowerCase()===ua.toLowerCase()));
  const specific=groups.filter(g=>g.uas.some(a=>a.toLowerCase()===ua.toLowerCase()));
  const applyGroups=specific.length?specific:groups.filter(g=>g.uas.includes('*'));
  let bestRule=null;let bestLen=-1;let allowed=true;
  applyGroups.forEach(g=>{
    g.rules.forEach(r=>{
      if(!r.path&&r.type==='disallow')return;
      if(matchPath(r.path,url)){
        if(r.path.length>bestLen||(r.path.length===bestLen&&r.type==='allow')){
          bestLen=r.path.length;bestRule=r;allowed=r.type==='allow';
        }
      }
    });
  });
  if(!bestRule)allowed=true;
  const banner=document.getElementById('resultBanner');
  const txtEl=document.getElementById('resultText');
  const matchEl=document.getElementById('matchedRule');
  banner.className='result-banner '+(allowed?'result-allowed':'result-blocked');
  txtEl.textContent=allowed?t.allowed:t.blocked;
  matchEl.textContent=bestRule?`${t.matchedRule}${bestRule.type==='allow'?'Allow':'Disallow'}: ${bestRule.path}`:t.defaultAllow;
  banner.style.display='block';
}
function loadSample(){
  document.getElementById('robotsIn').value=`User-agent: *
Disallow: /admin/
Disallow: /private/
Allow: /admin/public-files/
Crawl-delay: 10

User-agent: Googlebot
Disallow: /no-google/
Allow: /

Sitemap: https://example.com/sitemap.xml`;
  document.getElementById('urlIn').value='/admin/dashboard';
  parseRobots();test();
}
