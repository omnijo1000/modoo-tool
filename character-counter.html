* { box-sizing:border-box; margin:0; padding:0; }

<script>
const textarea = document.getElementById('inputText');
const limitInput = document.getElementById('limitInput');
let limitMode = 'include'; // 'include' = 공백포함, 'exclude' = 공백제외

// 저장된 값 복원
const saved = localStorage.getItem('cc_text');
if (saved) textarea.value = saved;

function toggleLimitMode() {
  limitMode = limitMode === 'include' ? 'exclude' : 'include';
  const t=_i18n[_lang];
  document.getElementById('limitModeBtn').textContent = limitMode === 'include' ? t.limitInclude : t.limitExclude;
  update();
}

function setPreset(n) {
  limitInput.value = n;
  update();
}

function clearText() {
  textarea.value = '';
  localStorage.removeItem('cc_text');
  update();
}

function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(2) + ' MB';
}

function getUtf8Bytes(str) {
  return new TextEncoder().encode(str).length;
}

function getEuckrEstimate(str) {
  let bytes = 0;
  for (const ch of str) {
    const code = ch.charCodeAt(0);
    if (code <= 0x7f) bytes += 1;        // ASCII
    else if (code >= 0xAC00 && code <= 0xD7A3) bytes += 2; // 한글 완성형
    else if (code >= 0x3131 && code <= 0x314E) bytes += 2; // 자음
    else if (code >= 0x314F && code <= 0x3163) bytes += 2; // 모음
    else bytes += 2; // 기타 CJK
  }
  return bytes;
}

function update() {
  const text = textarea.value;
  const withSpace = text.length;
  const noSpace = text.replace(/\s/g, '').length;
  const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
  const lines = text === '' ? 0 : text.split('\n').length;
  const sentences = text === '' ? 0 : (text.match(/[.!?。！？]+/g) || []).length;
  const paragraphs = text === '' ? 0 : text.split(/\n\s*\n/).filter(p => p.trim()).length || (text.trim() ? 1 : 0);

  const korean = (text.match(/[가-힣]/g) || []).length;
  const ascii = (text.match(/[a-zA-Z0-9]/g) || []).length;
  const utf8Bytes = getUtf8Bytes(text);
  const euckrBytes = getEuckrEstimate(text);

  // 제한 처리
  const limit = parseInt(limitInput.value) || 0;
  const countForLimit = limitMode === 'include' ? withSpace : noSpace;
  const isOver = limit > 0 && countForLimit > limit;
  const isWarn = limit > 0 && countForLimit >= limit * 0.9;

  // 주요 수치 표시
  const numWithSpaceEl = document.getElementById('numWithSpace');
  const numNoSpaceEl = document.getElementById('numNoSpace');
  numWithSpaceEl.textContent = withSpace.toLocaleString();
  numNoSpaceEl.textContent = noSpace.toLocaleString();
  document.getElementById('numWords').textContent = words.toLocaleString();
  document.getElementById('numLines').textContent = lines.toLocaleString();
  document.getElementById('numSentences').textContent = sentences.toLocaleString();
  document.getElementById('numParagraphs').textContent = paragraphs.toLocaleString();

  // 색상 처리
  const activeEl = limitMode === 'include' ? numWithSpaceEl : numNoSpaceEl;
  [numWithSpaceEl, numNoSpaceEl].forEach(el => el.className = 'stat-num');
  if (isOver) activeEl.classList.add('over');
  else if (isWarn) activeEl.classList.add('warn');
  textarea.className = isOver ? 'over-limit' : '';

  // 진행바
  if (limit > 0) {
    const pct = Math.min((countForLimit / limit) * 100, 100);
    document.getElementById('progressWrap').style.display = '';
    const fill = document.getElementById('progressFill');
    fill.style.width = pct + '%';
    fill.className = 'progress-fill' + (isOver ? ' over' : isWarn ? ' warn' : '');
    document.getElementById('progressLabel').textContent =
      `${countForLimit.toLocaleString()} / ${limit.toLocaleString()} (${pct.toFixed(1)}%)`;
  } else {
    document.getElementById('progressWrap').style.display = 'none';
  }

  // 바이트
  document.getElementById('byteUtf8').textContent = formatBytes(utf8Bytes);
  document.getElementById('byteEuckr').textContent = formatBytes(euckrBytes);
  const cu = _i18n[_lang].unitChar || '자';
  document.getElementById('byteAscii').textContent = ascii.toLocaleString() + cu;
  document.getElementById('byteKorean').textContent = korean.toLocaleString() + cu;

  // 로컬 저장
  localStorage.setItem('cc_text', text);
}

textarea.addEventListener('input', update);
limitInput.addEventListener('input', update);
update();
</script>

<h3 class="seo-sub">Frequently Asked Questions</h3>
<details class="faq-item"><summary>Q. What are the character limits for major social platforms?</summary><p>X (Twitter): 280 characters (CJK characters count as 2). Instagram caption: 2,200. Facebook post: 63,206. LinkedIn post: 3,000. YouTube title: 100, description: 5,000. TikTok caption: 2,200. Always verify current limits as platforms update them frequently.</p></details>
<details class="faq-item"><summary>Q. What are recommended SEO meta tag lengths?</summary><p>Meta title: 50–60 characters (prevents search result truncation). Meta description: 150–160 characters. Open Graph title: under 70 characters. Search engines truncate by pixel width, not character count, so English text has slightly more leeway than CJK characters.</p></details>
<details class="faq-item"><summary>Q. What's the difference between characters with and without spaces?</summary><p>Space characters (spaces, tabs, newlines) are counted in "with spaces" mode but excluded in "without spaces." Academic journals often use word count; essay competitions may specify "characters including spaces." Always check submission guidelines before final submission.</p></details>
<details class="faq-item"><summary>Q. When do UTF-8 bytes vs character count matter?</summary><p>Databases store text as bytes, not characters. A VARCHAR(100) in MySQL may hold only 33 Korean characters (each 3 bytes in UTF-8) vs 100 ASCII characters. API rate limits and SMS gateways often measure bytes. This tool shows both so you can match your system's encoding.</p></details>
<details class="faq-item"><summary>Q. How does this counter handle emoji?</summary><p>Each emoji typically occupies 2 characters in JavaScript (due to surrogate pairs) and 4 bytes in UTF-8. Some platforms count emojis as 2 characters, others as 1. If emoji character limits matter for your platform, verify the platform's specific counting method.</p></details>
<details class="faq-item"><summary>Q. Can I also count bytes?</summary><p>Korean characters are 3 bytes each in UTF-8; English and numbers are 1 byte. This matters when setting database column sizes or checking API payload limits.</p></details>

<details class="faq-item"><summary>Q. Does it handle mixed-language text accurately?</summary><p>Yes. Korean, English, Japanese, and Chinese can be mixed and are counted correctly. Emoji count as 1 character per Unicode codepoint.</p></details>`

function _detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}
let _lang = _detectLang();
function _applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = t.lang;
  document.title = t.title;
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = t.btn;
  const h1 = document.querySelector('h1');
  if (h1) h1.innerHTML = t.h1;
  const sub = document.querySelector('.subtitle');
  if (sub) sub.textContent = t.sub;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  const back = document.querySelector('.back-link');
  if (back) back.textContent = (_lang === 'ko') ? '← 모두의 툴' : (_lang === 'zh') ? '← 首页' : '← Home';
  const ta = document.getElementById('inputText');
  if (ta && t.placeholder) ta.placeholder = t.placeholder;
  const limitModeBtn = document.getElementById('limitModeBtn');
  if (limitModeBtn) limitModeBtn.textContent = limitMode === 'include' ? t.limitInclude : t.limitExclude;
}
const _langOrder = ['ko','en','zh','ja'];
function cycleLang() {
  const idx = _langOrder.indexOf(_lang);
  _lang = _langOrder[(idx + 1) % _langOrder.length];
  localStorage.setItem('lang', _lang);
  const url = new URL(location.href);
  if (_lang === 'ko') { url.searchParams.delete('lang'); } else { url.searchParams.set('lang', _lang); }
  history.replaceState({}, '', url);
  _applyLang();
}
_applyLang();
