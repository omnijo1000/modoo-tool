:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#252525;--accent:#fbbf24;--text:#f5f5f5;--text-muted:#888;--text-dim:#444;--green:#4ade80;--blue:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:10px;}

main{max-width:720px;margin:0 auto;padding:36px 20px 60px;}
h1{font-size:clamp(22px,4vw,32px);font-weight:900;margin-bottom:6px;}

.box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:40px 20px;text-align:center;cursor:pointer;transition:.2s;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);}

.meta-table{width:100%;border-collapse:collapse;}
.meta-table tr{border-bottom:1px solid var(--border);}
.meta-table tr:last-child{border-bottom:none;}
.meta-table td{padding:8px 10px;font-size:12px;}
.meta-table td:first-child{color:var(--text-muted);font-family:'DM Mono',monospace;width:40%;font-size:11px;}
.meta-table td:last-child{color:var(--text);word-break:break-all;}
.preview-thumb{max-width:100%;max-height:200px;border-radius:8px;border:1px solid var(--border);display:block;margin:0 auto 16px;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}

.seo-sub{font-size:14px;font-weight:700;margin:16px 0 8px;color:var(--text-muted);}
details.faq-item{border:1px solid var(--border);border-radius:6px;margin-bottom:8px;}
details.faq-item summary{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-muted);list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item[open] summary{border-bottom:1px solid var(--border);}
details.faq-item p{padding:10px 14px;font-size:13px;color:var(--text-dim);line-height:1.8;}
</style>

<script>
const LANGS=['ko','en','zh','ja'];
let _lang='ko';
const _i18n={
  ko:{h1a:'이미지',sub:'이미지 파일의 크기, 해상도, 형식 등 메타데이터를 분석합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',pageTitle:'이미지 메타데이터 뷰어 | MODOO HUB',dzText:'이미지를 드래그하거나 클릭하여 업로드',lblMeta:'메타데이터',keys:{name:'파일명',size:'파일 크기',type:'MIME 유형',width:'너비',height:'높이',px:'총 픽셀',ratio:'비율',mp:'메가픽셀'},
    seoHtml:`<h2>이미지 메타데이터 뷰어</h2><p>이미지 파일의 <strong>파일명, 크기, 해상도, MIME 유형, 가로세로 비율, 픽셀 수, 메가픽셀</strong> 등의 메타데이터를 빠르게 확인할 수 있습니다. 서버 전송 없이 브라우저 로컬에서 처리되어 개인정보가 보호됩니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>어떤 정보를 확인할 수 있나요?</summary><p>파일명, 크기(바이트/KB/MB), 해상도(px), 비율, 픽셀 수, 메가픽셀, MIME 유형을 확인할 수 있습니다.</p></details>
<details class="faq-item"><summary>EXIF 데이터도 확인할 수 있나요?</summary><p>EXIF 상세 데이터는 exif-viewer 도구를 사용하세요.</p></details>
<details class="faq-item"><summary>어떤 형식을 지원하나요?</summary><p>PNG, JPG, WebP, GIF 등 브라우저에서 지원하는 이미지 형식을 지원합니다.</p></details>
<details class="faq-item"><summary>파일이 서버로 전송되나요?</summary><p>아니요. 모두 브라우저 로컬에서 처리됩니다.</p></details>
<details class="faq-item"><summary>여러 이미지를 한 번에 분석할 수 있나요?</summary><p>현재 한 번에 하나의 이미지를 분석합니다.</p></details>
<details class="faq-item"><summary>메가픽셀이란?</summary><p>가로 × 세로 픽셀 수를 100만으로 나눈 값입니다. 카메라 스펙에서 자주 사용됩니다.</p></details>
<details class="faq-item"><summary>GIF 애니메이션의 해상도도 확인되나요?</summary><p>예, 첫 프레임을 기준으로 해상도를 표시합니다.</p></details>
<details class="faq-item"><summary>SVG도 지원하나요?</summary><p>브라우저에서 렌더링 가능한 SVG는 지원되며, 렌더링된 크기를 표시합니다.</p></details>`
  },
  en:{h1a:'Image',sub:'Analyze image file metadata: size, resolution, format and more',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'Image Metadata Viewer | MODOO HUB',dzText:'Drag & drop image or click to upload',lblMeta:'Metadata',keys:{name:'Filename',size:'File size',type:'MIME type',width:'Width',height:'Height',px:'Total pixels',ratio:'Aspect ratio',mp:'Megapixels'},
    seoHtml:`<h2>Image Metadata Viewer</h2><p>Instantly view image <strong>filename, file size, resolution, MIME type, aspect ratio, pixel count, and megapixels</strong>. All processing is local — no server upload, no privacy risk.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What info is shown?</summary><p>Filename, size (bytes/KB/MB), resolution (px), aspect ratio, total pixels, megapixels, and MIME type.</p></details>
<details class="faq-item"><summary>What about EXIF data?</summary><p>Use the exif-viewer tool for detailed EXIF metadata.</p></details>
<details class="faq-item"><summary>Supported formats?</summary><p>PNG, JPG, WebP, GIF — any browser-supported image.</p></details>
<details class="faq-item"><summary>Is my file sent to a server?</summary><p>No — fully local processing.</p></details>
<details class="faq-item"><summary>Multiple images at once?</summary><p>Currently one image at a time.</p></details>
<details class="faq-item"><summary>What are megapixels?</summary><p>Width × height in pixels divided by 1,000,000. Common in camera specs.</p></details>
<details class="faq-item"><summary>GIF animations?</summary><p>Resolution is based on the first frame.</p></details>
<details class="faq-item"><summary>SVG support?</summary><p>Browser-renderable SVGs are supported; rendered dimensions are shown.</p></details>`
  },
  zh:{h1a:'图像',sub:'分析图像文件元数据：大小、分辨率、格式等',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'图像元数据查看器 | MODOO HUB',dzText:'拖拽图片或点击上传',lblMeta:'元数据',keys:{name:'文件名',size:'文件大小',type:'MIME类型',width:'宽度',height:'高度',px:'总像素',ratio:'宽高比',mp:'百万像素'},
    seoHtml:`<h2>图像元数据查看器</h2><p>快速查看图像的<strong>文件名、大小、分辨率、MIME类型、宽高比、像素数和百万像素</strong>等元数据。所有处理在浏览器本地完成，无需上传服务器，保护隐私。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>可以查看哪些信息？</summary><p>文件名、大小（字节/KB/MB）、分辨率（像素）、宽高比、总像素、百万像素、MIME类型。</p></details>
<details class="faq-item"><summary>可以查看EXIF数据吗？</summary><p>请使用exif-viewer工具查看详细EXIF元数据。</p></details>
<details class="faq-item"><summary>支持哪些格式？</summary><p>PNG、JPG、WebP、GIF等浏览器支持的所有图像格式。</p></details>
<details class="faq-item"><summary>文件会上传服务器吗？</summary><p>不会，所有处理在浏览器本地完成。</p></details>
<details class="faq-item"><summary>可以同时分析多张图片吗？</summary><p>目前一次只能分析一张图片。</p></details>
<details class="faq-item"><summary>什么是百万像素？</summary><p>宽×高像素数除以1,000,000，常见于相机规格中。</p></details>
<details class="faq-item"><summary>GIF动画呢？</summary><p>以第一帧为基准显示分辨率。</p></details>
<details class="faq-item"><summary>支持SVG吗？</summary><p>浏览器可渲染的SVG支持，显示渲染后的尺寸。</p></details>`
  },
  ja:{h1a:'画像',sub:'画像ファイルのメタデータ（サイズ、解像度、フォーマット等）を分析',backLink:'← ホーム',langBtn:'🌐 한국어',pageTitle:'画像メタデータビューアー | MODOO HUB',dzText:'画像をドラッグまたはクリックしてアップロード',lblMeta:'メタデータ',keys:{name:'ファイル名',size:'ファイルサイズ',type:'MIMEタイプ',width:'幅',height:'高さ',px:'総ピクセル数',ratio:'アスペクト比',mp:'メガピクセル'},
    seoHtml:`<h2>画像メタデータビューアー</h2><p>画像の<strong>ファイル名・サイズ・解像度・MIMEタイプ・アスペクト比・ピクセル数・メガピクセル</strong>などのメタデータを素早く確認できます。すべてブラウザのローカルで処理するため、プライバシーが保護されます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>確認できる情報は？</summary><p>ファイル名・サイズ（バイト/KB/MB）・解像度（px）・アスペクト比・総ピクセル数・メガピクセル・MIMEタイプ。</p></details>
<details class="faq-item"><summary>EXIFデータも確認できますか？</summary><p>詳細EXIFデータにはexif-viewerツールをご利用ください。</p></details>
<details class="faq-item"><summary>対応フォーマットは？</summary><p>PNG・JPG・WebP・GIFなどブラウザがサポートするすべての画像形式。</p></details>
<details class="faq-item"><summary>ファイルはサーバーに送信されますか？</summary><p>いいえ、すべてローカルで処理されます。</p></details>
<details class="faq-item"><summary>複数の画像を一度に分析できますか？</summary><p>現在は一度に1枚のみ対応しています。</p></details>
<details class="faq-item"><summary>メガピクセルとは？</summary><p>幅×高さのピクセル数を100万で割った値です。カメラのスペックでよく使われます。</p></details>
<details class="faq-item"><summary>GIFアニメーションは？</summary><p>最初のフレームを基準に解像度を表示します。</p></details>
<details class="faq-item"><summary>SVG対応は？</summary><p>ブラウザでレンダリング可能なSVGに対応し、レンダリング後のサイズを表示します。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1a','subEl','backLink','langBtn','dzText','lblMeta'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function fmtBytes(n){if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(2)+' MB';}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFile(e.dataTransfer.files[0]);});
document.getElementById('fileIn').addEventListener('change',e=>loadFile(e.target.files[0]));
function loadFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const url=URL.createObjectURL(file);
  document.getElementById('thumb').src=url;
  const img=new Image();
  img.onload=()=>{
    const t=_i18n[_lang];const k=t.keys;
    const w=img.naturalWidth,h=img.naturalHeight;
    const g=gcd(w,h);const r=`${w/g}:${h/g}`;
    const mp=(w*h/1e6).toFixed(2);
    const rows=[[k.name,file.name],[k.size,fmtBytes(file.size)],[k.type,file.type],[k.width,w+' px'],[k.height,h+' px'],[k.px,(w*h).toLocaleString()],[k.ratio,r],[k.mp,mp]];
    document.getElementById('metaTable').innerHTML=rows.map(([a,b])=>`<tr><td>${a}</td><td>${b}</td></tr>`).join('');
    document.getElementById('outBox').style.display='block';
    URL.revokeObjectURL(url);
    document.getElementById('thumb').src=URL.createObjectURL(file);
  };
  img.src=url;
}
_lang=detectLang();applyLang();
</script>
