    <div class="stat-card"><div class="stat-val">${chars.toLocaleString()}</div><div class="stat-label">${t.chars}</div></div>
    <div class="stat-card"><div class="stat-val">${words.toLocaleString()}</div><div class="stat-label">${t.words}</div></div>
    <div class="stat-card"><div class="stat-val">${lines.toLocaleString()}</div><div class="stat-label">${t.lines}</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${baseTokens.toLocaleString()}</div><div class="stat-label">${t.tokens}</div></div>`;
  const maxCtx=1000000;
  document.getElementById('modelGrid').innerHTML=MODELS.map(m=>{
    const tk=countTokens(txt,m.factor);
    const ctxVal=parseInt(m.ctx)*1000;
    const pct=Math.min(tk/ctxVal*100,100);
    const ctxLabel=t.ctx+': '+m.ctx;
    return `<div class="model-card">
      <div class="model-name">${m.name}</div>
      <div class="model-tokens" style="color:${m.color}">${tk.toLocaleString()}</div>
      <div class="model-ctx">${ctxLabel} · ${pct<1?'<1':pct.toFixed(1)}%</div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${m.color}"></div></div>
    </div>`;
  }).join('');
}
_lang=detectLang();applyLang();
</script>
