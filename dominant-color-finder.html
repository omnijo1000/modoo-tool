  },
  en:{h1b:'Color Finder',sub:'Extract the single most dominant color from an image',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'Dominant Color Finder | MODOO HUB',dzText:'Drag & drop image or click to upload',copyHintEl:'Click a code card to copy',copied:'Copied!',
    seoHtml:`<h2>Dominant Color Finder</h2><p>Extract the <strong>single most dominant color</strong> from any image. Provides HEX, RGB, and HSL codes — click a card to copy to clipboard. Useful for brand color analysis and UI design.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Dominant vs average color?</summary><p>Dominant is the most common color cluster; average is the mean of all pixels — often different.</p></details>

<details class="faq-item"><summary>Use cases?</summary><p>Brand color extraction, CSS background color, UI theme design.</p></details>
<details class="faq-item"><summary>Need multiple colors?</summary><p>Use the image-color-extractor tool for a full palette.</p></details>
<details class="faq-item"><summary>Works on grayscale images?</summary><p>Yes — the dominant gray shade is extracted.</p></details>`
  },
  zh:{h1b:'颜色查找',sub:'从图像中提取最主要的单一颜色',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'图像主色查找器 | MODOO HUB',dzText:'拖拽图片或点击上传',copyHintEl:'点击代码卡片可复制',copied:'已复制！',
    seoHtml:`<h2>图像主色查找器</h2><p>从任意图像中提取<strong>最主要的单一颜色</strong>，提供HEX、RGB和HSL代码，点击卡片即可复制到剪贴板，适合品牌色分析和UI设计。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>主色和平均色有什么区别？</summary><p>主色是最常见的颜色聚类，平均色是所有像素的平均值，两者通常不同。</p></details>
<details class="faq-item"><summary>如何复制代码？</summary><p>点击HEX、RGB或HSL卡片即可复制对应值。</p></details>
<details class="faq-item"><summary>文件会上传服务器吗？</summary><p>不会，所有处理在浏览器本地完成。</p></details>
<details class="faq-item"><summary>支持哪些格式？</summary><p>PNG、JPG、WebP等浏览器支持的所有图像格式。</p></details>
<details class="faq-item"><summary>支持透明背景图像吗？</summary><p>透明像素会被排除在分析之外。</p></details>
<details class="faq-item"><summary>应用场景有哪些？</summary><p>品牌色提取、CSS背景色设置、UI主题设计等。</p></details>
<details class="faq-item"><summary>需要多种颜色怎么办？</summary><p>使用image-color-extractor工具可提取完整调色板。</p></details>
<details class="faq-item"><summary>灰度图像也适用吗？</summary><p>是的，会提取最主要的灰色调。</p></details>`
  },

    seoHtml:`<h2>ドミナントカラーファインダー</h2><p>任意の画像から<strong>最も支配的な単一カラー</strong>を抽出します。HEX・RGB・HSLコードを提供し、カードをクリックするとクリップボードにコピーされます。ブランドカラー分析やUIデザインに役立ちます。</p>

<details class="faq-item"><summary>複数色が必要な場合は？</summary><p>image-color-extractorツールでパレット全体を抽出できます。</p></details>
<details class="faq-item"><summary>グレースケール画像でも使えますか？</summary><p>はい、主要なグレー色調が抽出されます。</p></details>`

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','dzText','copyHintEl'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFile(e.dataTransfer.files[0]);});
document.getElementById('fileIn').addEventListener('change',e=>loadFile(e.target.files[0]));
function loadFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const url=URL.createObjectURL(file);
  document.getElementById('thumb').src=url;
  const img=new Image();
  img.onload=()=>{findDominant(img);document.getElementById('outBox').style.display='block';URL.revokeObjectURL(url);document.getElementById('thumb').src=URL.createObjectURL(file);};
  img.src=url;
}
function colorDist(a,b){return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2);}
function toHex(r,g,b){return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max===min){h=s=0;}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}return[Math.round(h*360),Math.round(s*100),Math.round(l*100)];}
function findDominant(img){
  const SAMPLE=60;const cvs=document.createElement('canvas');cvs.width=SAMPLE;cvs.height=SAMPLE;
  const ctx=cvs.getContext('2d');ctx.drawImage(img,0,0,SAMPLE,SAMPLE);
  const idata=ctx.getImageData(0,0,SAMPLE,SAMPLE).data;
  const pixels=[];for(let i=0;i<idata.length;i+=4){if(idata[i+3]>128)pixels.push([idata[i],idata[i+1],idata[i+2]]);}
  if(!pixels.length)return;
  const K=5;let centers=pixels.filter((_,i)=>i%(Math.max(1,Math.floor(pixels.length/K)))===0).slice(0,K);
  for(let iter=0;iter<8;iter++){const clusters=Array.from({length:K},()=>[]);pixels.forEach(p=>{let bi=0,bd=Infinity;centers.forEach((c,i)=>{const d=colorDist(p,c);if(d<bd){bd=d;bi=i;}});clusters[bi].push(p);});clusters.forEach((cl,i)=>{if(!cl.length)return;const s=[0,0,0];cl.forEach(p=>{s[0]+=p[0];s[1]+=p[1];s[2]+=p[2];});centers[i]=s.map(v=>Math.round(v/cl.length));});}
  const counts=new Array(K).fill(0);pixels.forEach(p=>{let bi=0,bd=Infinity;centers.forEach((c,i)=>{const d=colorDist(p,c);if(d<bd){bd=d;bi=i;}});counts[bi]++;});
  const dom=centers[counts.indexOf(Math.max(...counts))];
  _domColor=dom;
  const hex=toHex(dom[0],dom[1],dom[2]);
  const rgb=`rgb(${dom[0]},${dom[1]},${dom[2]})`;
  const [h,s,l]=rgbToHsl(dom[0],dom[1],dom[2]);
  const hsl=`hsl(${h},${s}%,${l}%)`;
  const luma=0.299*dom[0]+0.587*dom[1]+0.114*dom[2];
  const textColor=luma>140?'#000':'#fff';
  document.getElementById('colorBlock').style.background=hex;
  document.getElementById('hexBig').textContent=hex;document.getElementById('hexBig').style.color=textColor;
  document.getElementById('hexVal').textContent=hex;
  document.getElementById('rgbVal').textContent=rgb;
  document.getElementById('hslVal').textContent=hsl;
}
function copyCode(type){
  const t=_i18n[_lang];const map={hex:document.getElementById('hexVal').textContent,rgb:document.getElementById('rgbVal').textContent,hsl:document.getElementById('hslVal').textContent};
  const el=document.getElementById(type+'Val');const orig=el.textContent;
  navigator.clipboard.writeText(map[type]).then(()=>{el.textContent=t.copied;setTimeout(()=>el.textContent=orig,1500);});
}
_lang=detectLang();applyLang();
</script>
