    seoHtml:`<h2>AI Prompt Improver</h2><p>Automatically analyze and enhance your prompts with role definition, context, format instructions, tone settings, and length guidance. Get significantly better AI responses by improving prompt quality.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What makes a good prompt?</summary><p>Role, context, task, format, tone, and length guidance are the key elements.</p></details>
<details class="faq-item"><summary>What is the RCTF framework?</summary><p>Role, Context, Task, Format — a 4-element framework for structured prompts.</p></details>
<details class="faq-item"><summary>Does longer mean better?</summary><p>Specific and relevant detail helps, but unnecessary content hurts.</p></details>
<details class="faq-item"><summary>English vs. other languages?</summary><p>Most LLMs perform better with English prompts due to training data distribution.</p></details>
<details class="faq-item"><summary>System prompt vs. user prompt?</summary><p>System prompts define overall model behavior; user prompts make specific requests.</p></details>
<details class="faq-item"><summary>What is chain-of-thought?</summary><p>Adding "think step by step" encourages the model to reason through problems.</p></details>
<details class="faq-item"><summary>What is few-shot prompting?</summary><p>Providing 1-5 examples so the AI learns the desired response pattern.</p></details>
<details class="faq-item"><summary>Can I use the improved prompt as-is?</summary><p>Yes — copy and adjust the specifics to your situation.</p></details>`

<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>好的提示词有什么特点？</summary><p>角色、背景、任务、格式、语气和长度指导是关键要素。</p></details>
<details class="faq-item"><summary>什么是RCTF框架？</summary><p>角色、背景、任务、格式——构建结构化提示词的4要素框架。</p></details>
<details class="faq-item"><summary>提示词越长越好吗？</summary><p>具体相关的细节有帮助，但不必要的内容会起反作用。</p></details>
<details class="faq-item"><summary>中文提示词效果如何？</summary><p>大多数LLM在英文提示词上表现更好，但中文也可以接受。</p></details>

};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1Accent','subEl','backLink','langBtn','lblIssues','lblScore','lblInput','lblOutput','btnImprove','btnSample','btnClear','btnCopy'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function loadSample(){document.getElementById('promptIn').value=SAMPLES[_lang]||SAMPLES.ko;improve();}
function clearAll(){document.getElementById('promptIn').value='';document.getElementById('promptOut').value='';document.getElementById('issuesBox').style.display='none';document.getElementById('scoreRow').style.display='none';}
function improve(){
  const t=_i18n[_lang];
  const p=document.getElementById('promptIn').value.trim();
  if(!p)return;
  const issues=t.checks.filter(c=>c.test(p));
  const score=Math.round((1-issues.length/t.checks.length)*100);
  const scoreColor=score>=80?'var(--green)':score>=50?'var(--accent)':'var(--red)';
  document.getElementById('issuesBox').style.display=issues.length?'block':'none';
  document.getElementById('issuesList').innerHTML=issues.map(c=>`<div class="issue-item"><span class="issue-icon">${c.icon}</span><div class="issue-text"><strong>${c.label}</strong> → ${c.tip}</div></div>`).join('');
  document.getElementById('scoreRow').style.display='flex';
  document.getElementById('scoreFill').style.width=score+'%';
  document.getElementById('scoreFill').style.background=scoreColor;
  document.getElementById('scoreNum').style.color=scoreColor;
  document.getElementById('scoreNum').textContent=score+'/100';
  document.getElementById('promptOut').value=t.improvePrefix(p);
}
function copyOut(){
  const v=document.getElementById('promptOut').value;const t=_i18n[_lang];
  if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{const b=document.getElementById('btnCopy');b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,2000);});
}
_lang=detectLang();applyLang();
</script>
