<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#34d399;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}

.opts{display:flex;flex-wrap:wrap;gap:12px;margin:12px 0;align-items:center;}

.btn-row{display:flex;gap:8px;margin:12px 0;}

details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<script>
const _i18n={
  ko:{sub:'텍스트에서 중복 줄을 제거하여 고유한 줄만 남깁니다',langBtn:'🌐 EN',backBtn:'← 모두의 툴',inputLabel:'입력',inputPh:'중복 제거할 텍스트를 입력하세요...',outputLabel:'출력',outputPh:'결과가 여기에 표시됩니다...',caseSens:'대소문자 구분',trimWs:'앞뒤 공백 제거',remEmpty:'빈 줄 제거',sortLines:'결과 정렬',totalLines:'전체:',uniqueLines:'고유:',removedLines:'제거됨:',copyBtn:'복사',clearBtn:'지우기',copied:'✓ 복사됨',seoHtml:'<h2>중복 줄 제거기란?</h2><p>텍스트의 중복된 줄을 자동으로 제거하고 <strong>고유한 줄만</strong> 남깁니다. 대소문자 구분·공백 처리·빈 줄 제거·결과 정렬 옵션을 지원하며, 입력 즉시 실시간으로 처리됩니다.</p><details class="faq-item"><summary>대소문자 구분 옵션은 어떻게 동작하나요?</summary><p>대소문자 구분 활성화 시 "Apple"과 "apple"을 서로 다른 줄로 취급합니다. 비활성화 시 대소문자 관계없이 같은 내용으로 판단하여 하나만 남깁니다. 목록 정리에는 비활성화가 더 유용한 경우가 많습니다.</p></details><details class="faq-item"><summary>앞뒤 공백 제거 옵션은 무엇인가요?</summary><p>각 줄의 앞뒤 공백(스페이스, 탭)을 제거한 후 중복 여부를 비교합니다. 예: "  apple  "과 "apple"을 같은 줄로 처리합니다. 데이터 정리나 CSV 처리 시 유용합니다.</p></details><details class="faq-item"><summary>결과 정렬 옵션을 사용하면 원래 순서가 바뀌나요?</summary><p>네. 정렬 옵션 활성화 시 결과가 알파벳순으로 정렬됩니다. 순서가 중요한 경우에는 비활성화하세요 — 기본적으로 첫 등장 순서를 유지합니다.</p></details><details class="faq-item"><summary>어떤 경우에 이 도구를 사용하나요?</summary><p>이메일 목록 정리, 키워드 목록 중복 제거, 로그 파일 분석, CSV 데이터 전처리, 코드에서 중복 import 제거 등 다양한 상황에 유용합니다. 대용량 텍스트도 브라우저에서 빠르게 처리합니다.</p></details><details class="faq-item"><summary>처리할 수 있는 텍스트 크기 제한이 있나요?</summary><p>엄격한 제한은 없지만, 매우 큰 텍스트(수십만 줄 이상)는 처리 속도가 느려질 수 있습니다. 일반적인 데이터 정리 작업(수천~수만 줄)에서는 빠르게 동작합니다.</p></details>'},
  en:{sub:'Remove duplicate lines from text and keep only unique lines',langBtn:'🌐 中文',backBtn:'← All Tools',inputLabel:'Input',inputPh:'Paste text with duplicate lines here...',outputLabel:'Output',outputPh:'Result will appear here...',caseSens:'Case sensitive',trimWs:'Trim whitespace',remEmpty:'Remove blank lines',sortLines:'Sort output',totalLines:'Total:',uniqueLines:'Unique:',removedLines:'Removed:',copyBtn:'Copy',clearBtn:'Clear',copied:'✓ Copied',seoHtml:'<h2>Remove Duplicate Lines</h2><p>Automatically remove duplicate lines from any text and keep only <strong>unique lines</strong>. Supports case sensitivity, whitespace trimming, blank line removal, and alphabetical sorting. Processes instantly as you type.</p><details class="faq-item"><summary>How does the case-sensitive option work?</summary><p>When case-sensitive is on, "Apple" and "apple" are treated as different lines and both are kept. When off, they are treated as duplicates and only the first occurrence is kept. For most list-cleaning tasks, turning case sensitivity off gives more useful results.</p></details><details class="faq-item"><summary>What does the "Trim whitespace" option do?</summary><p>It strips leading and trailing spaces (and tabs) from each line before comparing. For example, "  apple  " and "apple" will be treated as identical after trimming. This is especially useful when processing CSV files or copy-pasted data with inconsistent spacing.</p></details><details class="faq-item"><summary>Does the sort option change the original order?</summary><p>Yes. Enabling sort rearranges the output in alphabetical order. If the original line order matters, keep sort off — by default, lines appear in their first-occurrence order from the input.</p></details><details class="faq-item"><summary>When would I use this tool?</summary><p>Cleaning email lists, deduplicating keyword lists, filtering log files, preprocessing CSV data, removing duplicate imports in code, or any situation where you need only unique lines from a text. Works for both small and large inputs directly in the browser.</p></details><details class="faq-item"><summary>Is there a limit on how much text I can process?</summary><p>There is no strict limit, but very large inputs (hundreds of thousands of lines) may slow down processing. For typical data cleaning tasks involving thousands to tens of thousands of lines, processing is near-instant.</p></details>'},
  zh:{sub:'从文本中删除重复行，只保留唯一行',langBtn:'🌐 日本語',backBtn:'← 所有工具',inputLabel:'输入',inputPh:'粘贴含重复行的文本...',outputLabel:'输出',outputPh:'结果显示在这里...',caseSens:'区分大小写',trimWs:'去除首尾空白',remEmpty:'删除空行',sortLines:'排序结果',totalLines:'总行数:',uniqueLines:'唯一:',removedLines:'已删除:',copyBtn:'复制',clearBtn:'清除',copied:'✓ 已复制',seoHtml:'<h2>删除重复行工具</h2><p>自动删除文本中的重复行，只保留<strong>唯一行</strong>。支持大小写区分、空白处理、空行删除和字母排序选项，输入即处理，实时显示结果。</p><details class="faq-item"><summary>区分大小写选项如何工作？</summary><p>开启时，"Apple"和"apple"被视为不同行，两者都保留。关闭时，视为重复项，只保留第一次出现的行。对于大多数列表清理任务，关闭大小写区分通常能得到更实用的结果。</p></details><details class="faq-item"><summary>「去除首尾空白」选项有什么作用？</summary><p>在比较前去除每行首尾的空格和制表符。例如，"  apple  "和"apple"去除空白后视为相同。处理CSV文件或复制粘贴的间距不一致数据时特别有用。</p></details><details class="faq-item"><summary>排序选项会改变原始顺序吗？</summary><p>会的。开启排序后，输出按字母顺序重新排列。如果原始行顺序重要，请关闭排序——默认情况下，行按输入中首次出现的顺序显示。</p></details><details class="faq-item"><summary>这个工具有哪些使用场景？</summary><p>清理电子邮件列表、关键词去重、过滤日志文件、预处理CSV数据、删除代码中的重复导入，以及任何需要从文本中提取唯一行的场景。直接在浏览器中处理，适合大小各种输入。</p></details><details class="faq-item"><summary>处理文本大小有限制吗？</summary><p>没有严格限制，但非常大的输入（数十万行以上）可能会降低处理速度。对于典型的数据清理任务（数千到数万行），处理几乎是即时的。</p></details>'},
  ja:{sub:'テキストから重複行を削除して一意の行のみ残します',langBtn:'🌐 한국어',backBtn:'← ホーム',inputLabel:'入力',inputPh:'重複を削除するテキストを入力してください...',outputLabel:'出力',outputPh:'結果がここに表示されます...',caseSens:'大文字小文字を区別',trimWs:'前後の空白を削除',remEmpty:'空行を削除',sortLines:'結果をソート',totalLines:'全体:',uniqueLines:'一意:',removedLines:'削除済み:',copyBtn:'コピー',clearBtn:'クリア',copied:'✓ コピー済み',seoHtml:'<h2>重複行削除ツールとは？</h2><p>テキストの重複した行を自動的に削除し、<strong>一意の行のみ</strong>を残します。大文字小文字の区別・空白処理・空行削除・アルファベット順ソートオプションに対応し、入力すると即座に処理されます。</p><details class="faq-item"><summary>「大文字小文字を区別」オプションはどう動作しますか？</summary><p>オンにすると「Apple」と「apple」は異なる行として両方保持されます。オフにすると重複として扱われ、最初に出現した行のみ保持されます。ほとんどのリスト整理タスクではオフの方が有用な結果が得られます。</p></details><details class="faq-item"><summary>「前後の空白を削除」オプションは何をしますか？</summary><p>比較前に各行の先頭と末尾のスペース・タブを除去します。例えば「  apple  」と「apple」は空白除去後に同一と判定されます。CSVファイルやコピー貼り付けデータのスペースが不揃いな場合に特に役立ちます。</p></details><details class="faq-item"><summary>ソートオプションは元の順序を変えますか？</summary><p>はい。ソートを有効にすると出力がアルファベット順に並べ替えられます。元の行順が重要な場合はオフにしてください — デフォルトでは入力中の初出順に表示されます。</p></details><details class="faq-item"><summary>このツールはどんな場面で使いますか？</summary><p>メールリストの整理、キーワードリストの重複除去、ログファイルのフィルタリング、CSVデータの前処理、コードの重複インポート削除など、テキストから一意の行を抽出したいあらゆる場面で活用できます。</p></details><details class="faq-item"><summary>処理できるテキストのサイズに制限はありますか？</summary><p>厳密な制限はありませんが、非常に大きな入力（数十万行以上）は処理が遅くなる場合があります。一般的なデータ整理タスク（数千〜数万行）では、ほぼ即座に処理されます。</p></details>'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.getElementById('inputText').placeholder=t.inputPh;document.getElementById('outputText').placeholder=t.outputPh;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function liveUpdate(){
  const text=document.getElementById('inputText').value;
  if(!text.trim()){document.getElementById('outputText').value='';document.getElementById('stats').style.display='none';return;}
  const cs=document.getElementById('caseSens').checked;
  const tw=document.getElementById('trimWs').checked;
  const re=document.getElementById('remEmpty').checked;
  const so=document.getElementById('sortOut').checked;
  let lines=text.split('\n');
  if(tw)lines=lines.map(l=>l.trim());
  if(re)lines=lines.filter(l=>l!=='');
  const total=lines.length;
  const seen=new Set();
  const unique=lines.filter(l=>{const k=cs?l:l.toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
  if(so)unique.sort((a,b)=>a.localeCompare(b));
  document.getElementById('outputText').value=unique.join('\n');
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sUniq').textContent=unique.length;
  document.getElementById('sRem').textContent=total-unique.length;
  document.getElementById('stats').style.display='flex';
}
function copyOut(){const v=document.getElementById('outputText').value;if(!v)return;navigator.clipboard.writeText(v);const t=document.getElementById('toast');t.style.display='inline';setTimeout(()=>{t.style.display='none';},1600);}
function clearAll(){document.getElementById('inputText').value='';document.getElementById('outputText').value='';document.getElementById('stats').style.display='none';}
_lang=detectLang();applyLang();
</script>
