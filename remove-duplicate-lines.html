<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#34d399;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:700px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.panel-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:5px;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;resize:vertical;min-height:180px;outline:none;line-height:1.6;}
textarea:focus{border-color:var(--accent);}
textarea[readonly]{color:var(--text-muted);}
.opts{display:flex;flex-wrap:wrap;gap:12px;margin:12px 0;align-items:center;}
.opt{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;cursor:pointer;}
.opt input{accent-color:var(--accent);}
.btn-row{display:flex;gap:8px;margin:12px 0;}
.btn{padding:9px 20px;border-radius:8px;font-size:12px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;border:none;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{opacity:.85;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.copy-toast{display:none;font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-left:4px;}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0 12px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim);}
.stat span{color:var(--accent);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>Remove Duplicate <span>Lines</span></h1>
  <p class="sub" data-i18n="sub">텍스트에서 중복 줄을 제거하여 고유한 줄만 남깁니다</p>

  <div class="panel-label" data-i18n="inputLabel">입력</div>
  <textarea id="inputText" data-i18n-ph="inputPh" placeholder="중복 제거할 텍스트를 입력하세요..." oninput="liveUpdate()"></textarea>

  <div class="opts">
    <label class="opt"><input type="checkbox" id="caseSens" onchange="liveUpdate()"><span data-i18n="caseSens">대소문자 구분</span></label>
    <label class="opt"><input type="checkbox" id="trimWs" checked onchange="liveUpdate()"><span data-i18n="trimWs">앞뒤 공백 제거</span></label>
    <label class="opt"><input type="checkbox" id="remEmpty" onchange="liveUpdate()"><span data-i18n="remEmpty">빈 줄 제거</span></label>
    <label class="opt"><input type="checkbox" id="sortOut" onchange="liveUpdate()"><span data-i18n="sortLines">결과 정렬</span></label>
  </div>

  <div class="stats" id="stats" style="display:none">
    <span data-i18n="totalLines">전체:</span>&nbsp;<span id="sTotal">0</span>
    &nbsp;&nbsp;<span data-i18n="uniqueLines">고유:</span>&nbsp;<span id="sUniq">0</span>
    &nbsp;&nbsp;<span data-i18n="removedLines">제거됨:</span>&nbsp;<span id="sRem">0</span>
  </div>

  <div class="panel-label" data-i18n="outputLabel">출력</div>
  <textarea id="outputText" readonly data-i18n-ph="outputPh" placeholder="결과가 여기에 표시됩니다..."></textarea>

  <div class="btn-row">
    <button class="btn btn-ghost" onclick="copyOut()" data-i18n="copyBtn">복사</button>
    <button class="btn btn-ghost" onclick="clearAll()" data-i18n="clearBtn">지우기</button>
    <span class="copy-toast" id="toast" data-i18n="copied">✓ 복사됨</span>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">Remove Duplicate Lines란?</h2>
    <p data-i18n="seoP">텍스트의 중복된 줄을 자동으로 제거하고 고유한 줄만 남깁니다. 대소문자 구분, 공백 처리, 빈 줄 제거 옵션을 제공합니다.</p>
  </div>
  <footer>Remove Duplicate Lines · Free Online Tool</footer>
</main>
<script>
const _i18n={
  ko:{sub:'텍스트에서 중복 줄을 제거하여 고유한 줄만 남깁니다',langBtn:'🌐 EN',backBtn:'← 모두의 툴',inputLabel:'입력',inputPh:'중복 제거할 텍스트를 입력하세요...',outputLabel:'출력',outputPh:'결과가 여기에 표시됩니다...',caseSens:'대소문자 구분',trimWs:'앞뒤 공백 제거',remEmpty:'빈 줄 제거',sortLines:'결과 정렬',totalLines:'전체:',uniqueLines:'고유:',removedLines:'제거됨:',copyBtn:'복사',clearBtn:'지우기',copied:'✓ 복사됨',seoH2:'Remove Duplicate Lines란?',seoP:'텍스트의 중복된 줄을 자동으로 제거하고 고유한 줄만 남깁니다.'},
  en:{sub:'Remove duplicate lines from text and keep only unique lines',langBtn:'🌐 中文',backBtn:'← All Tools',inputLabel:'Input',inputPh:'Paste text with duplicate lines here...',outputLabel:'Output',outputPh:'Result will appear here...',caseSens:'Case sensitive',trimWs:'Trim whitespace',remEmpty:'Remove blank lines',sortLines:'Sort output',totalLines:'Total:',uniqueLines:'Unique:',removedLines:'Removed:',copyBtn:'Copy',clearBtn:'Clear',copied:'✓ Copied',seoH2:'Remove Duplicate Lines',seoP:'Automatically remove duplicate lines from text and keep only unique lines. Options for case sensitivity, whitespace trimming, and sorting.'},
  zh:{sub:'从文本中删除重复行，只保留唯一行',langBtn:'🌐 日本語',backBtn:'← 所有工具',inputLabel:'输入',inputPh:'粘贴含重复行的文本...',outputLabel:'输出',outputPh:'结果显示在这里...',caseSens:'区分大小写',trimWs:'去除首尾空白',remEmpty:'删除空行',sortLines:'排序结果',totalLines:'总行数:',uniqueLines:'唯一:',removedLines:'已删除:',copyBtn:'复制',clearBtn:'清除',copied:'✓ 已复制',seoH2:'删除重复行',seoP:'自动删除文本中的重复行，只保留唯一行，支持大小写选项、空白处理和排序。'},
  ja:{sub:'テキストから重複行を削除して一意の行のみ残します',langBtn:'🌐 한국어',backBtn:'← ホーム',inputLabel:'入力',inputPh:'重複を削除するテキストを入力してください...',outputLabel:'出力',outputPh:'結果がここに表示されます...',caseSens:'大文字小文字を区別',trimWs:'前後の空白を削除',remEmpty:'空行を削除',sortLines:'結果をソート',totalLines:'全体:',uniqueLines:'一意:',removedLines:'削除済み:',copyBtn:'コピー',clearBtn:'クリア',copied:'✓ コピー済み',seoH2:'重複行削除ツールとは？',seoP:'テキストの重複した行を自動的に削除し、一意の行のみを残します。大文字小文字の区別、空白処理、ソートオプションを提供します。'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.getElementById('inputText').placeholder=t.inputPh;document.getElementById('outputText').placeholder=t.outputPh;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function liveUpdate(){
  const text=document.getElementById('inputText').value;
  if(!text.trim()){document.getElementById('outputText').value='';document.getElementById('stats').style.display='none';return;}
  const cs=document.getElementById('caseSens').checked;
  const tw=document.getElementById('trimWs').checked;
  const re=document.getElementById('remEmpty').checked;
  const so=document.getElementById('sortOut').checked;
  let lines=text.split('\n');
  if(tw)lines=lines.map(l=>l.trim());
  if(re)lines=lines.filter(l=>l!=='');
  const total=lines.length;
  const seen=new Set();
  const unique=lines.filter(l=>{const k=cs?l:l.toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
  if(so)unique.sort((a,b)=>a.localeCompare(b));
  document.getElementById('outputText').value=unique.join('\n');
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sUniq').textContent=unique.length;
  document.getElementById('sRem').textContent=total-unique.length;
  document.getElementById('stats').style.display='flex';
}
function copyOut(){const v=document.getElementById('outputText').value;if(!v)return;navigator.clipboard.writeText(v);const t=document.getElementById('toast');t.style.display='inline';setTimeout(()=>{t.style.display='none';},1600);}
function clearAll(){document.getElementById('inputText').value='';document.getElementById('outputText').value='';document.getElementById('stats').style.display='none';}
_lang=detectLang();applyLang();
</script>
</body>
</html>
