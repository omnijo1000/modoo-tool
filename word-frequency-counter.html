<h2 class="seo-sub">FAQ</h2>

<details class="faq-item"><summary>単語の境界はどう判断されますか？</summary><p>空白と特殊文字を基準に単語を分割します。</p></details>
<details class="faq-item"><summary>数字も単語として認識されますか？</summary><p>はい、数字トークンも単語として計数されます。</p></details>
<details class="faq-item"><summary>処理速度はどうですか？</summary><p>ブラウザで即座に処理されます。数万語も素早く分析できます。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','lblCase','lblStop','lblPunct','lblMin','lblTop','lblInput','lblResult','btnClear','btnCsv','btnSample','emptyMsg'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  analyze();
}
function gch(id){return document.getElementById(id).checked;}
let _lastFreq=[];
function analyze(){
  const t=_i18n[_lang];const raw=document.getElementById('textIn').value;
  if(!raw.trim()){document.getElementById('resultWrap').innerHTML='<div class="empty">'+t.emptyMsg+'</div>';document.getElementById('statsRow').textContent='';_lastFreq=[];return;}
  let text=raw;
  if(gch('chkPunct'))text=text.replace(/[^\w\s가-힣぀-ヿ一-鿿]/g,' ');
  const tokens=text.trim().split(/\s+/).filter(w=>w.length>0);
  const total=tokens.length;
  const freqMap={};
  for(let w of tokens){
    if(gch('chkCase'))w=w.toLowerCase();
    if(gch('chkStop')&&EN_STOP.has(w.toLowerCase()))continue;
    freqMap[w]=(freqMap[w]||0)+1;
  }
  const minF=parseInt(document.getElementById('minFreq').value)||1;
  const topN=parseInt(document.getElementById('topN').value)||50;
  let entries=Object.entries(freqMap).filter(([,c])=>c>=minF).sort((a,b)=>b[1]-a[1]).slice(0,topN);
  _lastFreq=entries;
  const maxC=entries[0]?entries[0][1]:1;
  const unique=Object.keys(freqMap).length;
  const rows=entries.map(([w,c])=>{
    const pct=((c/total)*100).toFixed(1);
    const bw=Math.round((c/maxC)*100);
    return`<tr><td>${w}</td><td class="freq-num">${c}</td><td><div class="bar" style="width:${bw}%"></div></td><td class="pct">${pct}%</td></tr>`;
  }).join('');
  document.getElementById('resultWrap').innerHTML=`<table class="word-table"><thead><tr><th>${t.colWord}</th><th>${t.colFreq}</th><th style="min-width:60px"></th><th>${t.colPct}</th></tr></thead><tbody>${rows}</tbody></table>`;
  document.getElementById('statsRow').textContent=t.stats(total,unique);
}
function clearInput(){document.getElementById('textIn').value='';analyze();}
function exportCsv(){
  if(!_lastFreq.length)return;
  const t=_i18n[_lang];const csv=t.colWord+','+t.colFreq+'\n'+_lastFreq.map(([w,c])=>`"${w}",${c}`).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='word-frequency.csv';a.click();
}
function loadSample(){document.getElementById('textIn').value='The quick brown fox jumps over the lazy dog. The fox was very quick and the dog was very lazy. A quick fox and a lazy dog made the day interesting.';analyze();}
_lang=detectLang();applyLang();
</script>
