<details class="faq-item"><summary>AESパスワードを忘れたら？</summary><p>正しいパスワードなしでは復号できません。</p></details>
<details class="faq-item"><summary>日本語テキストも暗号化できますか？</summary><p>AESとROT13はあらゆる言語に対応します。Caesar/Vigenereは英字のみ変換します。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function setAlgo(a){
  _algo=a;
  document.querySelectorAll('.algo-chip').forEach(c=>c.classList.toggle('active',c.dataset.algo===a));
  buildKeyArea();
}
function buildKeyArea(){
  const t=_i18n[_lang];const div=document.getElementById('keyArea');
  if(_algo==='aes'){
    div.innerHTML=`<div class="field-row"><span class="field-label">${t.lblPwd}</span><input class="field-input" id="pwdInput" type="password" placeholder="..."></div>`;
  }else if(_algo==='caesar'){
    div.innerHTML=`<div class="field-row"><span class="field-label">${t.lblShift}</span><input class="field-input" id="shiftInput" type="number" value="3" min="1" max="25" style="max-width:80px;"></div>`;
  }else if(_algo==='vigenere'){
    div.innerHTML=`<div class="field-row"><span class="field-label">${t.lblKey}</span><input class="field-input" id="keyInput" type="text" placeholder="secret"></div>`;
  }else{div.innerHTML='';}
}
function rot13(s){return s.replace(/[a-zA-Z]/g,c=>{const b=c<='Z'?65:97;return String.fromCharCode((c.charCodeAt(0)-b+13)%26+b);});}
function caesar(s,n){return s.replace(/[a-zA-Z]/g,c=>{const b=c<='Z'?65:97;return String.fromCharCode((c.charCodeAt(0)-b+n+26)%26+b);});}
function vigenere(s,key){
  key=key.toLowerCase().replace(/[^a-z]/g,'');if(!key)return s;
  let ki=0;return s.replace(/[a-zA-Z]/g,c=>{const b=c<='Z'?65:97;const sh=key[ki++%key.length].charCodeAt(0)-97;return String.fromCharCode((c.charCodeAt(0)-b+sh)%26+b);});
}
async function aesEncrypt(text,pwd){
  const enc=new TextEncoder();
  const keyMat=await crypto.subtle.importKey('raw',enc.encode(pwd),{name:'PBKDF2'},false,['deriveKey']);
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},keyMat,{name:'AES-GCM',length:256},false,['encrypt']);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(text));
  const buf=new Uint8Array(salt.length+iv.length+ct.byteLength);
  buf.set(salt,0);buf.set(iv,16);buf.set(new Uint8Array(ct),28);
  return btoa(String.fromCharCode(...buf));
}
async function doEncrypt(){
  const t=_i18n[_lang];const text=document.getElementById('input').value;
  const errEl=document.getElementById('errMsg');errEl.textContent='';
  if(!text.trim()){errEl.textContent=t.errNo;return;}
  let result='';
  try{
    if(_algo==='rot13'){result=rot13(text);}
    else if(_algo==='caesar'){const sh=parseInt(document.getElementById('shiftInput')?.value)||3;result=caesar(text,sh);}
    else if(_algo==='vigenere'){const k=document.getElementById('keyInput')?.value||'';if(!k.match(/[a-zA-Z]/)){errEl.textContent=t.errNoKey;return;}result=vigenere(text,k);}
    else{const pwd=document.getElementById('pwdInput')?.value||'';if(!pwd){errEl.textContent=t.errNoPwd;return;}result=await aesEncrypt(text,pwd);}
  }catch(e){errEl.textContent='Error: '+e.message;return;}
  const ob=document.getElementById('outBox');ob.style.display='block';
  document.getElementById('outputTa').value=result;
  const notices={aes:t.noticeAes,caesar:t.noticeCaesar,rot13:t.noticeRot13,vigenere:t.noticeVig};
  document.getElementById('noticeEl').textContent=notices[_algo]||'';
}
function copyOut(){
  const t=_i18n[_lang];const b=document.getElementById('btnCopy');
  navigator.clipboard.writeText(document.getElementById('outputTa').value).then(()=>{b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,1500);});
}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('lblAlgo').textContent=t.lblAlgo;document.getElementById('lblInput').textContent=t.lblInput;
  document.getElementById('lblOut').textContent=t.lblOut;document.getElementById('btnEnc').textContent=t.btnEnc;document.getElementById('btnCopy').textContent=t.btnCopy;
  document.getElementById('algoRow').innerHTML=ALGOS.map((a,i)=>`<button class="algo-chip${_algo===a?' active':''}" data-algo="${a}" onclick="setAlgo('${a}')">${t.algos[i]}</button>`).join('');
  buildKeyArea();document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
_lang=detectLang();applyLang();
