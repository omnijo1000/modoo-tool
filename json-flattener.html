    seoHtml:`<h2>JSON 평탄화란?</h2><p>중첩된 JSON 객체를 <strong>단일 레벨의 키-값 쌍</strong>으로 변환합니다. 예: {"user":{"name":"Alice"}} → {"user.name":"Alice"}. 데이터베이스 저장, 환경변수 설정, 검색 인덱싱, 스프레드시트 내보내기 등 다양한 용도에 활용됩니다. 역변환(Unflatten)으로 다시 중첩 구조로 복원할 수 있습니다.</p>

<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Are arrays flattened?</summary><p>Arrays are flattened using index notation: {"tags":["a","b"]} → {"tags.0":"a","tags.1":"b"}.</p></details>
<details class="faq-item"><summary>Can I change the separator?</summary><p>Yes. Replace dot (.) with underscore, slash, or any character. Useful for env vars or specific system formats.</p></details>
<details class="faq-item"><summary>What is Unflatten?</summary><p>Restores a flattened JSON back to nested structure. {"user.name":"Alice"} → {"user":{"name":"Alice"}}.</p></details>
<details class="faq-item"><summary>How is null handled?</summary><p>null is preserved as-is. {"a":{"b":null}} → {"a.b":null}.</p></details>

  },
  zh:{pageTitle:'JSON扁平化工具 - 将嵌套JSON转换为平铺键值对 | MODOO HUB',h1b:'扁平化',sub:'嵌套JSON → 即时转换为单层键值对',backLink:'← 所有工具',langBtn:'🌐 日本語',labelIn:'JSON输入',labelOut:'结果',optSepLabel:'分隔符:',btnFlatten:'扁平化',btnUnflatten:'反向转换',btnCopy:'复制',btnClear:'清除',copied:'已复制 ✓',errParse:'解析错误: ',
    seoHtml:`<h2>JSON扁平化工具</h2><p>将嵌套JSON对象转换为<strong>单层键值对</strong>，使用点号表示法。例：{"user":{"name":"Alice"}} → {"user.name":"Alice"}。适用于数据库存储、环境变量配置、搜索索引等场景。</p>
<h2 class="seo-sub">常见问题</h2>

<details class="faq-item"><summary>可以更改分隔符吗？</summary><p>可以。将点号替换为下划线、斜杠等其他字符。</p></details>

<details class="faq-item"><summary>null值如何处理？</summary><p>null值保持原样。{"a":{"b":null}} → {"a.b":null}。</p></details>

    seoHtml:`<h2>JSONフラット化ツールとは</h2><p>ネストされたJSONオブジェクトをドット表記の<strong>単一レベルのキー値ペア</strong>に変換します。例：{"user":{"name":"Alice"}} → {"user.name":"Alice"}。DB保存・環境変数・検索インデックスなどに便利です。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>配列もフラット化されますか？</summary><p>インデックスを使ってフラット化します：{"tags":["a","b"]} → {"tags.0":"a","tags.1":"b"}。</p></details>
<details class="faq-item"><summary>区切り文字を変更できますか？</summary><p>はい。ドット(.)をアンダースコアやスラッシュなどに変更できます。</p></details>

function getSep(){return document.getElementById('separator').value||'.';}
function flattenObj(obj,sep,prefix){
  const out={};
  Object.entries(obj).forEach(([k,v])=>{
    const key=prefix?prefix+sep+k:k;
    if(v!==null&&typeof v==='object'&&!Array.isArray(v)&&Object.keys(v).length>0){
      Object.assign(out,flattenObj(v,sep,key));
    } else if(Array.isArray(v)&&v.length>0){
      v.forEach((item,i)=>{
        const ak=key+sep+i;
        if(item!==null&&typeof item==='object'&&!Array.isArray(item)){
          Object.assign(out,flattenObj(item,sep,ak));
        } else {
          out[ak]=item;
        }
      });
    } else {
      out[key]=v;
    }
  });
  return out;
}
function unflattenObj(flat,sep){
  const out={};
  Object.entries(flat).forEach(([k,v])=>{
    const parts=k.split(sep);
    let cur=out;
    parts.forEach((p,i)=>{
      if(i===parts.length-1){cur[p]=v;}
      else{if(!cur[p])cur[p]={};cur=cur[p];}
    });
  });
  return out;
}
function clearAll(){document.getElementById('jsonIn').value='';document.getElementById('jsonOut').value='';document.getElementById('errMsg').textContent='';}
function flatten(){
  const t=_i18n[_lang];const sep=getSep();

    const obj=JSON.parse(document.getElementById('jsonIn').value);
    document.getElementById('jsonOut').value=JSON.stringify(flattenObj(obj,sep,''),null,2);
    document.getElementById('errMsg').textContent='';
  }catch(e){document.getElementById('errMsg').textContent=t.errParse+e.message;}
}
function unflatten(){
  const t=_i18n[_lang];const sep=getSep();
  try{
    const flat=JSON.parse(document.getElementById('jsonIn').value);
    document.getElementById('jsonOut').value=JSON.stringify(unflattenObj(flat,sep),null,2);
    document.getElementById('errMsg').textContent='';
  }catch(e){document.getElementById('errMsg').textContent=t.errParse+e.message;}
}

  if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{
    const btn=document.getElementById('btnCopy');const orig=btn.textContent;
    btn.textContent=t.copied;setTimeout(()=>btn.textContent=orig,2000);
  });
}
_lang=detectLang();applyLang();
</script>
