<script>
const SAMPLE_PEM = `-----BEGIN CERTIFICATE-----
MIIDdzCCAl+gAwIBAgIEbTFkaTANBgkqhkiG9w0BAQsFADBsMQswCQYDVQQGEwJV
UzEPMA0GA1UECBMGTmV2YWRhMRIwEAYDVQQHEwlMYXMgVmVnYXMxETAPBgNVBAoT
CEludGVybmFsMQwwCgYDVQQLEwNXZWIxGTAXBgNVBAMTEHRlc3QuZXhhbXBsZS5j
b20wHhcNMjQwMTAxMDAwMDAwWhcNMjUwMTAxMDAwMDAwWjBsMQswCQYDVQQGEwJV
UzEPMA0GA1UECBMGTmV2YWRhMRIwEAYDVQQHEwlMYXMgVmVnYXMxETAPBgNVBAoT
CEludGVybmFsMQwwCgYDVQQLEwNXZWIxGTAXBgNVBAMTEHRlc3QuZXhhbXBsZS5j
b20wggEiMA0GCSqGSIb3DQEBAQUAA4IBDwAwggEKAoIBAQC7o4qne60TB3wolNGy
bCxgPBkjkZnE/mJkBnmHEuEbkAR5GFAH7a9WLi7mRY4xCmA8JkPaSdmDovWkfmH
AgMBAAGjITAfMB0GA1UdDgQWBBT4zJKLkT6hCGWFbhMhPHHm6LdpHDANBgkqhkiG
9w0BAQsFAAOCAQEAHh0FJ9kW0k3bW5rxCUhI7RNMHZ7lVkp2gA0BuJUmO7v1DmJL
FGkVRDAP/example/cert/data/here/for/demo/purposes/only==
-----END CERTIFICATE-----`;

function doDecode() {
  const pem = document.getElementById('pemInput').value.trim();
  if (!pem) {
    showError((_i18n[currentLang] || _i18n.ko).errEmpty || '인증서를 붙여넣으세요.'); return;
  }
  hideError();
  try {
    const result = decodePem(pem);
    renderResults(result);
  } catch(e) {
    showError((_i18n[currentLang] || _i18n.ko).errInvalid || '유효한 PEM 형식이 아닙니다.');
  }
}

function decodePem(pem) {
  const typeMatch = pem.match(/-----BEGIN ([^-]+)-----/);
  if (!typeMatch) throw new Error('NO_HEADER');
  const type = typeMatch[1].trim();
  const b64 = pem.replace(/-----[^-]+-----/g, '').replace(/\s/g, '');
  if (!b64) throw new Error('NO_DATA');
  let binary;
  try { binary = atob(b64); } catch(e) { throw new Error('INVALID_B64'); }
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const hex = Array.from(bytes.slice(0, 64)).map(b => b.toString(16).padStart(2, '0')).join(' ');
  // Detect ASN.1 header: 0x30 = SEQUENCE
  const isAsn1 = bytes[0] === 0x30;
  // Parse basic ASN.1 length
  let asn1Len = 0;
  if (isAsn1 && bytes[1] === 0x82) {
    asn1Len = (bytes[2] << 8) | bytes[3];
  } else if (isAsn1 && bytes[1] < 0x80) {
    asn1Len = bytes[1];
  }
  return { type, b64Length: b64.length, rawBytes: bytes.length, hex, isAsn1, asn1Len };
}

function getTypeClass(type) {
  if (type.includes('CERTIFICATE') && !type.includes('REQUEST')) return 'type-cert';
  if (type.includes('REQUEST') || type.includes('CSR')) return 'type-csr';
  if (type.includes('KEY')) return 'type-key';
  return 'type-other';
}

function renderResults(r) {
  const t = _i18n[currentLang] || _i18n.ko;
  const badgeClass = getTypeClass(r.type);
  document.getElementById('infoGrid').innerHTML = `
    <div class="info-card">
      <div class="info-label">${t.labelType || 'Type'}</div>
      <div class="info-value"><span class="type-badge ${badgeClass}">${escHtml(r.type)}</span></div>
    </div>
    <div class="info-card">
      <div class="info-label">${t.labelB64Len || 'Base64 Length'}</div>
      <div class="info-value">${r.b64Length.toLocaleString()} chars</div>
    </div>
    <div class="info-card">
      <div class="info-label">${t.labelBytes || 'DER Bytes'}</div>
      <div class="info-value">${r.rawBytes.toLocaleString()} bytes</div>
    </div>
    <div class="info-card">
      <div class="info-label">ASN.1</div>
      <div class="info-value">${r.isAsn1 ? (t.asn1Yes || '✓ SEQUENCE') : (t.asn1No || '— Not ASN.1')}</div>
    </div>
  `;

  // HEX display with offset markers
  const hexPairs = r.hex.split(' ');
  const hexHtml = hexPairs.map((pair, i) => {
    const offset = (i % 16 === 0) ? `<span style="color:var(--text-dim);margin-right:8px;">${i.toString(16).padStart(4,'0')}</span>` : '';
    const nl = (i > 0 && i % 16 === 0) ? '<br>' : '';
    return `${nl}${offset}${pair} `;
  }).join('');
  document.getElementById('hexContent').innerHTML = hexHtml;

  // CLI commands
  const isKey = r.type.includes('KEY');
  const isCsr = r.type.includes('REQUEST');
  let cmds = [];
  if (r.type.includes('CERTIFICATE') && !isCsr) {
    cmds = [
      { label: t.cliParseCert || 'Parse certificate details', cmd: 'openssl x509 -in cert.pem -text -noout' },
      { label: t.cliFingerprint || 'Get certificate fingerprint (SHA256)', cmd: 'openssl x509 -in cert.pem -fingerprint -sha256 -noout' },
      { label: t.cliDates || 'Check validity dates', cmd: 'openssl x509 -in cert.pem -dates -noout' },
      { label: t.cliToDer || 'Convert PEM to DER', cmd: 'openssl x509 -in cert.pem -outform DER -out cert.der' },
    ];
  } else if (isCsr) {
    cmds = [
      { label: t.cliParseCsr || 'Parse CSR details', cmd: 'openssl req -in cert.csr -text -noout' },
      { label: t.cliVerifyCsr || 'Verify CSR signature', cmd: 'openssl req -in cert.csr -verify -noout' },
    ];
  } else if (isKey) {
    cmds = [
      { label: t.cliParseKey || 'Parse RSA key info', cmd: 'openssl rsa -in key.pem -text -noout' },
      { label: t.cliKeyCheck || 'Check key consistency', cmd: 'openssl rsa -in key.pem -check' },
    ];
  } else {
    cmds = [
      { label: t.cliGeneric || 'Inspect PEM content', cmd: 'openssl asn1parse -in file.pem' },
    ];
  }
  document.getElementById('cliCommands').innerHTML = cmds.map(c =>
    `<div class="cli-cmd" onclick="copyCmd('${escAttr(c.cmd)}', this)">
      <div class="cli-cmd-label">${escHtml(c.label)}</div>
      <code>${escHtml(c.cmd)}</code>
      <span class="copy-hint">click to copy</span>
    </div>`
  ).join('');

  document.getElementById('resultsSection').classList.remove('hidden');
}

function copyCmd(cmd, el) {
  navigator.clipboard.writeText(cmd).then(() => {
    const hint = el.querySelector('.copy-hint');
    const orig = hint.textContent;
    hint.textContent = '✓ copied!';
    setTimeout(() => hint.textContent = orig, 1500);
  });
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s||'').replace(/'/g,"\\'"); }

function showError(msg) {
  const el = document.getElementById('errorDiv');
  el.textContent = msg; el.classList.remove('hidden');
  document.getElementById('resultsSection').classList.add('hidden');
}
function hideError() { document.getElementById('errorDiv').classList.add('hidden'); }

function loadSample() {
  document.getElementById('pemInput').value = SAMPLE_PEM;
  doDecode();
}
function clearInput() {
  document.getElementById('pemInput').value = '';
  hideError();
  document.getElementById('resultsSection').classList.add('hidden');
}

let currentLang = detectLang();
function detectLang(){
  const p=new URLSearchParams(location.search).get('lang');
  if(p&&_i18n[p])return p;
  const s=localStorage.getItem('modoo_lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language||'';
  if(n.startsWith('zh'))return 'zh';
  if(n.startsWith('ja'))return 'ja';
  if(n.startsWith('ko'))return 'ko';
  return 'en';
}
function applyLang(l){
  const t=_i18n[l]||_i18n.ko;
  document.documentElement.lang=l;
  document.title=t.pageTitle;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const v=t[el.dataset.i18n];
    if(v!==undefined)el.innerHTML=v;
  });
  document.getElementById('seoArea').innerHTML=t.seoHtml;
}
function toggleLang(){
  const order=['ko','en','zh','ja'];
  const next=order[(order.indexOf(currentLang)+1)%order.length];
  currentLang=next;
  localStorage.setItem('modoo_lang',next);
  const url=new URL(location.href);
  url.searchParams.set('lang',next);
  history.replaceState(null,'',url);
  applyLang(next);
}
document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));
