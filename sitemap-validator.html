    seoHtml:`<h2>XML 사이트맵이란?</h2><p>XML 사이트맵은 검색 엔진에 사이트의 모든 페이지 URL을 알려주는 파일입니다. <strong>Google Search Console에 제출</strong>하면 크롤링 효율이 높아지고 새 페이지가 더 빨리 색인됩니다. 특히 링크가 적은 깊은 페이지나 최신 콘텐츠에 효과적입니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>사이트맵 URL 수 제한은?</summary><p>하나의 사이트맵 파일에 최대 50,000개 URL, 50MB(압축 전) 이내입니다. 초과 시 사이트맵 인덱스 파일(&lt;sitemapindex&gt;)로 분할하고 인덱스 파일만 Search Console에 제출하세요.</p></details>
<details class="faq-item"><summary>lastmod 날짜 형식은?</summary><p>W3C 날짜 형식을 사용합니다: YYYY-MM-DD 또는 YYYY-MM-DDTHH:MM:SS+00:00 형식입니다. 실제 콘텐츠 수정일과 일치해야 합니다. 임의로 오늘 날짜를 넣으면 Google이 신뢰도를 낮춥니다.</p></details>
<details class="faq-item"><summary>changefreq와 priority는 효과가 있나요?</summary><p>Google은 changefreq와 priority를 무시하거나 힌트로만 사용합니다. 크롤링 빈도는 Google이 자체적으로 결정합니다. 정확한 lastmod가 더 중요합니다.</p></details>
<details class="faq-item"><summary>사이트맵에 non-canonical URL을 포함하면?</summary><p>사이트맵에는 canonical URL만 포함해야 합니다. non-canonical, noindex, 리디렉션 URL은 제외하세요. 혼란을 주면 크롤 예산이 낭비됩니다.</p></details>
<details class="faq-item"><summary>사이트맵 자동 생성 방법은?</summary><p>WordPress는 Yoast SEO, Rank Math 플러그인이 자동 생성합니다. Next.js, Nuxt.js 등 프레임워크도 자동 생성 기능을 제공합니다. 정적 사이트는 빌드 스크립트로 생성하세요.</p></details>
<details class="faq-item"><summary>robots.txt에 사이트맵을 명시해야 하나요?</summary><p>robots.txt 파일에 Sitemap: https://example.com/sitemap.xml 줄을 추가하면 모든 검색 엔진이 자동으로 발견할 수 있습니다. Google Search Console 제출과 병행하는 것이 좋습니다.</p></details>

    seoHtml:`<h2>What is an XML Sitemap?</h2><p>An XML sitemap is a file that tells search engines about all pages on your site. <strong>Submit it to Google Search Console</strong> to improve crawl efficiency and speed up indexing of new content. It is especially effective for deep pages and fresh content.</p>
<h2 class="seo-sub">Frequently Asked Questions</h2>
<details class="faq-item"><summary>How many URLs can a sitemap contain?</summary><p>A single sitemap file can contain a maximum of 50,000 URLs and must be under 50MB (uncompressed). For larger sites, split into multiple files and link them via a sitemap index file.</p></details>
<details class="faq-item"><summary>What lastmod date format is required?</summary><p>Use W3C date format: YYYY-MM-DD or YYYY-MM-DDTHH:MM:SS+00:00. The date must reflect the actual content modification date. Using today&apos;s date arbitrarily reduces Google&apos;s trust in your sitemap.</p></details>
<details class="faq-item"><summary>Do changefreq and priority actually matter?</summary><p>Google largely ignores changefreq and priority — it determines crawl frequency itself. Accurate lastmod dates are far more influential.</p></details>
<details class="faq-item"><summary>Should non-canonical URLs be in the sitemap?</summary><p>Only include canonical URLs in your sitemap. Exclude non-canonical, noindex, and redirect URLs. Mixing these confuses search engines and wastes crawl budget.</p></details>
<details class="faq-item"><summary>How to auto-generate sitemaps?</summary><p>WordPress: use Yoast SEO or Rank Math plugins. Next.js/Nuxt.js: built-in sitemap generation features. Static sites: generate via build scripts.</p></details>
<details class="faq-item"><summary>Should I declare the sitemap in robots.txt?</summary><p>Add <code>Sitemap: https://example.com/sitemap.xml</code> to robots.txt so all search engines can discover it automatically. Do this alongside submitting to Google Search Console.</p></details>
<details class="faq-item"><summary>What are image and video sitemaps?</summary><p>Image sitemaps (&lt;image:image&gt;) help Google index images; video sitemaps (&lt;video:video&gt;) enable video rich snippets in search results. Each requires its own XML namespace.</p></details>
<details class="faq-item"><summary>How to diagnose sitemap errors?</summary><p>In Google Search Console → Indexing → Sitemaps, you can see errors for submitted sitemaps — categorized by type (inaccessible, invalid XML, URL errors, etc.).</p></details>`

<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>站点地图URL数量限制是多少？</summary><p>单个站点地图文件最多包含50,000个URL，大小不超过50MB（未压缩）。超出时请拆分为多个文件并通过站点地图索引文件链接。</p></details>

  ja:{pageTitle:'サイトマップバリデーター - XML Sitemap検証 & URL分析 | MODOO HUB',h1Span:'バリデーター',sub:'XMLサイトマップ形式検証·URL数分析·重複検出',backLink:'← ホーム',langBtn:'🌐 한국어',tabPaste:'XML貼り付け',tabFetch:'URL取得',labelPaste:'XMLサイトマップ貼り付け',labelUrl:'サイトマップURL',btnValidate:'検証',btnClear:'クリア',btnFetch:'取得',titleUrls:'URLリスト（最大100件表示）',thLoc:'URL',thLastmod:'lastmod',thFreq:'changefreq',thPri:'priority',fetchNote:'⚠ CORSにより直接取得が制限される場合があります。',fetchError:'取得失敗。XML貼り付けタブをご利用ください。',loading:'取得中...',

    seoHtml:`<h2>XMLサイトマップとは</h2><p>XMLサイトマップはサイトの全ページURLを検索エンジンに伝えるファイルです。<strong>Google Search Consoleに送信</strong>するとクロール効率が向上し、新しいページのインデックスが早まります。リンクが少ない深いページや最新コンテンツに特に効果的です。</p>

const LANGS=['ko','en','zh','ja'];
let _lang='ko';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1Span').textContent=t.h1Span;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('tabPaste').textContent=t.tabPaste;document.getElementById('tabFetch').textContent=t.tabFetch;
  document.getElementById('labelPaste').textContent=t.labelPaste;document.getElementById('labelUrl').textContent=t.labelUrl;
  document.getElementById('btnValidatePaste').textContent=t.btnValidate;document.getElementById('btnClearPaste').textContent=t.btnClear;
  document.getElementById('btnFetch').textContent=t.btnFetch;document.getElementById('btnClearFetch').textContent=t.btnClear;
  document.getElementById('titleUrls').textContent=t.titleUrls;document.getElementById('thLoc').textContent=t.thLoc;
  document.getElementById('thLastmod').textContent=t.thLastmod;document.getElementById('thFreq').textContent=t.thFreq;
  document.getElementById('thPri').textContent=t.thPri;document.getElementById('fetchNote').textContent=t.fetchNote;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function switchTab(tab){
  document.getElementById('tabPaste').className='tab'+(tab==='paste'?' active':'');
  document.getElementById('tabFetch').className='tab'+(tab==='fetch'?' active':'');
  document.getElementById('panelPaste').className='tab-panel'+(tab==='paste'?' active':'');
  document.getElementById('panelFetch').className='tab-panel'+(tab==='fetch'?' active':'');
}
function clearAll(){document.getElementById('xmlInput').value='';document.getElementById('urlInput').value='';document.getElementById('resultsArea').className='results';}
function getTag(xml,tag){const m=xml.match(new RegExp('<'+tag+'[^>]*>([\\s\\S]*?)</'+tag+'>','i'));return m?m[1].trim():'';}
function getAllTags(xml,tag){const re=new RegExp('<'+tag+'[^>]*>([\\s\\S]*?)</'+tag+'>','gi');const r=[];let m;while((m=re.exec(xml)))r.push(m[1].trim());return r;}
function parseSitemap(xml){
  const t=_i18n[_lang];
  const issues=[];
  let isIndex=false;
  const parser=new DOMParser();
  const doc=parser.parseFromString(xml,'application/xml');
  const err=doc.querySelector('parsererror');
  if(err){issues.push({type:'error',msg:t.errInvalidXml+(err.textContent.slice(0,100))});return{issues,urls:[],total:0,dups:0,isIndex};}
  const root=doc.documentElement;
  if(!root||(!root.localName.includes('urlset')&&!root.localName.includes('sitemapindex'))){
    issues.push({type:'error',msg:t.errNoUrlset});return{issues,urls:[],total:0,dups:0,isIndex};
  }
  isIndex=root.localName.includes('sitemapindex');
  const urlEls=isIndex?[...doc.querySelectorAll('sitemap')]:[...doc.querySelectorAll('url')];
  const urls=urlEls.map(el=>({
    loc:el.querySelector('loc')?.textContent?.trim()||'',
    lastmod:el.querySelector('lastmod')?.textContent?.trim()||'',
    changefreq:el.querySelector('changefreq')?.textContent?.trim()||'',
    priority:el.querySelector('priority')?.textContent?.trim()||''
  }));
  const total=urls.length;
  const seen={};const dups=[];
  urls.forEach(u=>{if(u.loc){seen[u.loc]=(seen[u.loc]||0)+1;if(seen[u.loc]===2)dups.push(u.loc);}});
  const dupCount=dups.length;
  if(total>50000)issues.push({type:'error',msg:t.errOver50k});
  else issues.push({type:'pass',msg:t.passUnder50k});
  issues.push({type:'pass',msg:t.passValid});
  if(dupCount>0)issues.push({type:'warn',msg:t.warnDup(dupCount)});
  const noLastmod=urls.filter(u=>!u.lastmod).length;
  if(noLastmod>0)issues.push({type:'warn',msg:t.warnNoLastmod});
  return{issues,urls,total,dups:dupCount,isIndex};
}
function renderResults(result){
  const t=_i18n[_lang];
  const sg=document.getElementById('statsGrid');
  sg.innerHTML='';
  [{v:result.total,l:t.sTotal},{v:result.dups,l:t.sDup},{v:result.issues.filter(i=>i.type==='error').length,l:t.sErr},{v:result.isIndex?t.isIndex:t.notIndex,l:t.sIndex}].forEach(s=>{
    const d=document.createElement('div');d.className='stat-card';
    d.innerHTML=`<div class="stat-val">${s.v}</div><div class="stat-label">${s.l}</div>`;
    sg.appendChild(d);
  });
  const il=document.getElementById('issueList');il.innerHTML='';
  result.issues.forEach(({type,msg})=>{
    const d=document.createElement('div');d.className='issue '+type;
    const icon=type==='error'?'✗':type==='warn'?'⚠':'✓';
    d.innerHTML=`<span>${icon}</span><span>${escHtml(msg)}</span>`;
    il.appendChild(d);
  });
  const tbody=document.getElementById('urlTbody');tbody.innerHTML='';
  result.urls.slice(0,100).forEach((u,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${i+1}</td><td class="url-cell">${escHtml(u.loc)}</td><td>${escHtml(u.lastmod)}</td><td>${escHtml(u.changefreq)}</td><td>${escHtml(u.priority)}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('resultsArea').className='results show';
}
function validatePaste(){const xml=document.getElementById('xmlInput').value.trim();if(!xml)return;renderResults(parseSitemap(xml));}
async function fetchSitemap(){
  const url=document.getElementById('urlInput').value.trim();if(!url)return;
  const t=_i18n[_lang];
  const btn=document.getElementById('btnFetch');btn.textContent=t.loading;btn.disabled=true;
  try{
    const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
    const resp=await fetch(proxy);const data=await resp.json();
    if(data&&data.contents){document.getElementById('xmlInput').value=data.contents;switchTab('paste');validatePaste();}
    else alert(t.fetchError);
  }catch(e){alert(t.fetchError);}
  finally{btn.textContent=t.btnFetch;btn.disabled=false;}
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
_lang=detectLang();applyLang();
</script>
