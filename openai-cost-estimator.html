const LANGS=['ko','en','zh','ja'];
let _lang='ko';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('labelModel').textContent=t.labelModel;document.getElementById('labelIn').textContent=t.labelIn;
  document.getElementById('labelOut').textContent=t.labelOut;document.getElementById('labelReqs').textContent=t.labelReqs;
  document.getElementById('monthLabel').textContent=t.monthLabel;document.getElementById('perCallLabel').textContent=t.perCallLabel;
  document.getElementById('dayLabel').textContent=t.dayLabel;document.getElementById('yearLabel').textContent=t.yearLabel;
  document.getElementById('noteEl').textContent=t.note;document.getElementById('labelTable').textContent=t.labelTable;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  buildTable();calc();
}
function buildTable(){
  const t=_i18n[_lang];const sel=document.getElementById('modelSel').value;
  document.getElementById('pricingTable').innerHTML=`<thead><tr><th>${t.thModel}</th><th>${t.thIn}</th><th>${t.thOut}</th></tr></thead><tbody>${Object.entries(MODELS).map(([k,m])=>`<tr class="${k===sel?'sel':''}"><td>${m.label}</td><td>$${m.pIn.toFixed(2)}</td><td>$${m.pOut.toFixed(2)}</td></tr>`).join('')}</tbody>`;
}
function calc(){
  const sel=document.getElementById('modelSel').value;const m=MODELS[sel];
  const inTok=parseFloat(document.getElementById('inTok').value)||0;
  const outTok=parseFloat(document.getElementById('outTok').value)||0;
  const reqs=parseFloat(document.getElementById('reqsDay').value)||0;
  const perCall=(inTok/1e6*m.pIn)+(outTok/1e6*m.pOut);
  const day=perCall*reqs;const month=day*30;const year=day*365;
  document.getElementById('monthCost').textContent='$'+month.toFixed(month<0.01?4:2);
  document.getElementById('perCall').textContent='$'+perCall.toFixed(6);
  document.getElementById('dayTotal').textContent='$'+day.toFixed(day<0.01?4:2);
  document.getElementById('yearTotal').textContent='$'+year.toFixed(2);
  buildTable();
}
_lang=detectLang();applyLang();
