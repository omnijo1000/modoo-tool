<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#38bdf8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:760px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:620px){.layout{grid-template-columns:1fr;}}
.panel-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:6px;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;resize:vertical;min-height:260px;outline:none;line-height:1.7;}
textarea:focus{border-color:var(--accent);}
textarea[readonly]{color:var(--text-muted);}
.controls{margin:14px 0;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.ctrl-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.fmt-btn{padding:6px 14px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--text-muted);background:none;}
.fmt-btn:hover,.fmt-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,.08);}
.inp-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
.inp-small{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;width:180px;}
.inp-small:focus{border-color:var(--accent);}
.inp-lbl{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.action-row{display:flex;gap:8px;margin-top:10px;}
.btn{padding:9px 20px;border-radius:8px;font-size:12px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;border:none;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{opacity:.85;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.copy-toast{display:none;font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-left:8px;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<script>
const _i18n={
  ko:{sub:'AI 프롬프트 포맷 변환 · ChatML · XML · Markdown',langBtn:'🌐 EN',backBtn:'← 모두의 툴',fmtLabel:'포맷:',systemLabel:'System:',systemPh:'You are a helpful assistant.',userLabel:'User prefix:',inputLabel:'입력 (원본 텍스트)',inputPh:'여기에 텍스트를 입력하세요. 줄바꿈으로 메시지 분리.',outputLabel:'출력 (포맷된 프롬프트)',fmtBtn:'▶ 포맷 적용',copyBtn:'복사',clearBtn:'지우기',copied:'✓ 복사됨',seoHtml:'<h2>Prompt Formatter란?</h2><p>텍스트를 <strong>ChatML·XML 태그·Markdown·JSONL</strong> 등 다양한 AI 프롬프트 포맷으로 변환합니다. GPT·Claude·Llama 등 주요 LLM에 최적화된 프롬프트 구조를 빠르게 만들고 복사할 수 있습니다.</p><details class="faq-item"><summary>ChatML 포맷이란 무엇인가요?</summary><p>OpenAI의 GPT 모델에서 사용하는 프롬프트 구조로, &lt;|im_start|&gt;role\\n메시지&lt;|im_end|&gt; 형식을 사용합니다. system·user·assistant 역할을 명확히 구분하며, 파인튜닝 데이터 준비나 API 호출 구조화에 활용됩니다.</p></details><details class="faq-item"><summary>XML 태그 포맷은 언제 사용하나요?</summary><p>Claude(Anthropic)는 &lt;system&gt;·&lt;human&gt;·&lt;assistant&gt; XML 태그 형식을 권장합니다. 태그 기반 구조는 모델이 역할을 명확히 파악하도록 돕고, 긴 복잡한 프롬프트의 구조화에 효과적입니다.</p></details><details class="faq-item"><summary>줄바꿈으로 메시지를 어떻게 구분하나요?</summary><p>입력 텍스트에서 빈 줄(빈 행)이 메시지 구분자입니다. 빈 줄 없이 줄바꿈만 하면 같은 메시지 블록 안에 포함됩니다. User prefix 설정으로 각 메시지 블록의 시작에 역할 라벨을 추가할 수 있습니다.</p></details><details class="faq-item"><summary>JSONL 포맷은 어디에 사용하나요?</summary><p>JSONL(JSON Lines)은 OpenAI 파인튜닝 데이터셋 형식입니다. 각 줄이 {"messages": [{role, content}, ...]} 형태의 JSON 객체로 구성됩니다. GPT 모델의 파인튜닝 훈련 데이터를 준비할 때 사용합니다.</p></details><details class="faq-item"><summary>System 프롬프트는 무엇인가요?</summary><p>System 프롬프트는 AI의 역할·지침·제약 조건을 정의하는 초기 지시문입니다. "You are a helpful assistant"처럼 모델이 어떻게 행동해야 하는지를 설정합니다. 대부분의 LLM API에서 system 역할로 별도 제공합니다.</p></details><details class="faq-item"><summary>어떤 AI 모델에서 ChatML 포맷을 사용하나요?</summary><p>ChatML은 OpenAI GPT 모델의 학습 포맷으로 시작되었습니다. 현재는 Mistral, LLaMA, Phi 등 많은 오픈소스 모델이 채택했습니다. Anthropic Claude는 ChatML 대신 자체 Human/Assistant 포맷을 사용합니다.</p></details><details class="faq-item"><summary>Few-shot 예시를 프롬프트에 추가할 때 형식은?</summary><p>Few-shot 예시는 user/assistant 쌍으로 구성합니다. 예: user: "파리의 수도는?" → assistant: "프랑스입니다" → user: "도쿄의 수도는?" 순으로 대화 이력을 구성한 뒤 실제 질문을 마지막에 추가하세요.</p></details><details class="faq-item"><summary>프롬프트 템플릿을 버전 관리할 수 있나요?</summary><p>이 도구는 브라우저 내에서만 실행됩니다. 프롬프트 버전 관리가 필요하면 Git, Notion, 또는 프롬프트 관리 전용 도구(PromptLayer, Langsmith 등)를 함께 사용하는 것을 권장합니다.</p></details>'},
  en:{sub:'Convert text to AI prompt formats · ChatML · XML · Markdown',langBtn:'🌐 中文',backBtn:'← All Tools',fmtLabel:'Format:',systemLabel:'System:',systemPh:'You are a helpful assistant.',userLabel:'User prefix:',inputLabel:'Input (raw text)',inputPh:'Enter text here. Blank line separates messages.',outputLabel:'Output (formatted prompt)',fmtBtn:'▶ Format',copyBtn:'Copy',clearBtn:'Clear',copied:'✓ Copied',seoHtml:'<h2>Prompt Formatter</h2><p>Convert raw text into <strong>ChatML, XML tags, Markdown, or JSONL</strong> format optimized for GPT, Claude, Llama, and other major LLMs. Quickly structure prompts with system/user/assistant roles and copy them ready for API use.</p><details class="faq-item"><summary>What is the ChatML format?</summary><p>ChatML is OpenAI\'s chat markup language used by GPT models: &lt;|im_start|&gt;role\\n message&lt;|im_end|&gt;. It clearly separates system, user, and assistant turns. It\'s commonly used for fine-tuning data preparation and direct API call structuring.</p></details><details class="faq-item"><summary>When should I use the XML tag format?</summary><p>Anthropic\'s Claude models respond well to XML-style prompts using &lt;system&gt;, &lt;human&gt;, and &lt;assistant&gt; tags. XML structure helps the model parse roles clearly, especially in long or complex multi-turn conversations.</p></details><details class="faq-item"><summary>How do blank lines separate messages?</summary><p>A blank line (empty row) in the input text marks the boundary between separate messages. A single line break within a paragraph keeps it in the same message block. The "User prefix" setting adds a role label at the start of each block.</p></details><details class="faq-item"><summary>What is JSONL format used for?</summary><p>JSONL (JSON Lines) is the format required for OpenAI fine-tuning datasets. Each line is a JSON object: {"messages": [{"role": "...", "content": "..."}, ...]}. Use it when preparing training data to fine-tune a GPT model on your own examples.</p></details><details class="faq-item"><summary>What is a system prompt?</summary><p>A system prompt defines the AI\'s role, instructions, and constraints at the start of a conversation. Examples: "You are a helpful assistant" or "Respond only in formal English." Most LLM APIs accept a system message separately from user messages.</p></details><details class="faq-item"><summary>Which AI models use the ChatML format?</summary><p>ChatML originated as a training format for OpenAI GPT models. It has since been adopted by many open-source models including Mistral, LLaMA, and Phi. Anthropic Claude uses its own Human/Assistant format rather than ChatML.</p></details><details class="faq-item"><summary>What is the format for adding few-shot examples to a prompt?</summary><p>Few-shot examples are structured as user/assistant pairs. Example: user: "Capital of France?" → assistant: "Paris" → user: "Capital of Japan?" → build the conversation history this way, then add your actual question last.</p></details><details class="faq-item"><summary>Can I version-control my prompt templates?</summary><p>This tool runs entirely in the browser. For prompt version control, pair it with Git, Notion, or dedicated prompt management tools such as PromptLayer or LangSmith.</p></details>'},
  zh:{sub:'AI提示词格式转换 · ChatML · XML · Markdown',langBtn:'🌐 日本語',backBtn:'← 所有工具',fmtLabel:'格式:',systemLabel:'系统:',systemPh:'你是一个有帮助的助手。',userLabel:'用户前缀:',inputLabel:'输入（原始文本）',inputPh:'在此输入文本。空行分隔消息。',outputLabel:'输出（格式化提示词）',fmtBtn:'▶ 应用格式',copyBtn:'复制',clearBtn:'清除',copied:'✓ 已复制',seoHtml:'<h2>提示词格式化工具</h2><p>将文本转换为<strong>ChatML、XML标签、Markdown或JSONL</strong>格式，针对GPT、Claude、Llama等主流大语言模型优化。快速构建包含system/user/assistant角色的提示词结构，一键复制用于API调用。</p><details class="faq-item"><summary>ChatML格式是什么？</summary><p>ChatML是OpenAI GPT模型使用的聊天标记语言：&lt;|im_start|&gt;role\\n消息&lt;|im_end|&gt;。它清晰分隔system、user和assistant轮次，常用于微调数据准备和API调用结构化。</p></details><details class="faq-item"><summary>什么时候应该使用XML标签格式？</summary><p>Anthropic的Claude模型对&lt;system&gt;、&lt;human&gt;和&lt;assistant&gt; XML标签格式响应良好。XML结构帮助模型清晰解析角色，特别适合长而复杂的多轮对话。</p></details><details class="faq-item"><summary>空行如何分隔消息？</summary><p>输入文本中的空行（空白行）标记不同消息之间的边界。段落内的单个换行保持在同一消息块中。「用户前缀」设置可在每个消息块开头添加角色标签。</p></details><details class="faq-item"><summary>JSONL格式用于什么场景？</summary><p>JSONL（JSON Lines）是OpenAI微调数据集所需的格式。每行是一个JSON对象：{"messages": [{"role": "...", "content": "..."}, ...]}。用于准备GPT模型微调的训练数据。</p></details><details class="faq-item"><summary>什么是系统提示词（System Prompt）？</summary><p>系统提示词在对话开始时定义AI的角色、指令和约束条件。例如："你是一个有帮助的助手"或"只用正式中文回复"。大多数LLM API将系统消息与用户消息分开接受。</p></details><details class="faq-item"><summary>哪些AI模型使用ChatML格式？</summary><p>ChatML最初是OpenAI GPT模型的训练格式，现已被Mistral、LLaMA、Phi等众多开源模型采用。Anthropic Claude使用自己的Human/Assistant格式而非ChatML。</p></details><details class="faq-item"><summary>在提示词中添加少样本示例的格式是什么？</summary><p>少样本示例以用户/助手对的形式构成。例：user: "法国首都是？" → assistant: "巴黎" → user: "日本首都是？"，按此方式构建对话历史，最后添加实际问题。</p></details><details class="faq-item"><summary>可以对提示词模板进行版本管理吗？</summary><p>本工具完全在浏览器内运行。如需提示词版本管理，建议配合Git、Notion或专用提示词管理工具（如PromptLayer、LangSmith）使用。</p></details>'},
  ja:{sub:'AIプロンプト形式変換 · ChatML · XML · Markdown',langBtn:'🌐 한국어',backBtn:'← ホーム',fmtLabel:'フォーマット:',systemLabel:'システム:',systemPh:'あなたは役立つアシスタントです。',userLabel:'ユーザープレフィックス:',inputLabel:'入力（元のテキスト）',inputPh:'ここにテキストを入力してください。空行でメッセージを区切ります。',outputLabel:'出力（フォーマット済みプロンプト）',fmtBtn:'▶ フォーマット適用',copyBtn:'コピー',clearBtn:'クリア',copied:'✓ コピー済み',seoHtml:'<h2>Prompt Formatterとは？</h2><p>テキストを<strong>ChatML・XMLタグ・Markdown・JSONL</strong>など様々なAIプロンプト形式に変換します。GPT・Claude・Llamaなど主要LLMに最適化されたsystem/user/assistant構造のプロンプトを素早く作成・コピーできます。</p><details class="faq-item"><summary>ChatML形式とは何ですか？</summary><p>ChatMLはOpenAIのGPTモデルが使用するチャットマークアップ言語です：&lt;|im_start|&gt;role\\nメッセージ&lt;|im_end|&gt;。system・user・assistantのターンを明確に分離します。ファインチューニングデータの準備やAPI呼び出しの構造化に使われます。</p></details><details class="faq-item"><summary>XMLタグ形式はいつ使うべきですか？</summary><p>AnthropicのClaudeモデルは&lt;system&gt;・&lt;human&gt;・&lt;assistant&gt;のXMLタグ形式に良く反応します。XML構造はモデルが役割を明確に把握するのに役立ち、長く複雑なマルチターン会話に特に効果的です。</p></details><details class="faq-item"><summary>空白行でメッセージをどのように区切りますか？</summary><p>入力テキストの空白行（空の行）が別々のメッセージ間の区切りを表します。段落内の単純な改行は同じメッセージブロック内に収まります。「ユーザープレフィックス」設定で各ブロックの先頭に役割ラベルを追加できます。</p></details><details class="faq-item"><summary>JSONL形式はどんな用途に使いますか？</summary><p>JSONL（JSON Lines）はOpenAIのファインチューニングデータセットに必要な形式です。各行が{"messages": [{"role": "...", "content": "..."}, ...]}というJSONオブジェクトです。GPTモデルのファインチューニング用訓練データを準備する際に使用します。</p></details><details class="faq-item"><summary>システムプロンプトとは何ですか？</summary><p>システムプロンプトは会話の最初にAIの役割・指示・制約を定義します。例：「あなたは役立つアシスタントです」や「フォーマルな日本語でのみ回答してください」。多くのLLM APIではシステムメッセージをユーザーメッセージと別に受け付けます。</p></details><details class="faq-item"><summary>ChatMLフォーマットを使うAIモデルはどれですか？</summary><p>ChatMLはOpenAI GPTモデルのトレーニングフォーマットとして始まり、現在はMistral、LLaMA、Phiなど多くのオープンソースモデルが採用しています。Anthropic ClaudeはChatMLの代わりに独自のHuman/Assistantフォーマットを使用します。</p></details><details class="faq-item"><summary>プロンプトにFew-shotの例を追加する形式は？</summary><p>Few-shotの例はuser/assistantのペアで構成します。例：user: "フランスの首都は？" → assistant: "パリです" → user: "日本の首都は？" のように会話履歴を構築し、実際の質問を最後に追加します。</p></details><details class="faq-item"><summary>プロンプトテンプレートをバージョン管理できますか？</summary><p>このツールはブラウザ内のみで動作します。プロンプトのバージョン管理にはGit、Notion、またはPromptLayer、LangSmithなどの専用プロンプト管理ツールを併用することをお勧めします。</p></details>'},
};
let _lang='ko',_fmt='chatml';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.getElementById('inputText').placeholder=t.inputPh;document.getElementById('systemMsg').placeholder=t.systemPh;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});doFormat();}
function setFmt(btn){document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');_fmt=btn.dataset.fmt;doFormat();}
function doFormat(){
  const raw=document.getElementById('inputText').value;
  const sys=document.getElementById('systemMsg').value.trim();
  const uPrefix=document.getElementById('userPrefix').value||'User';
  if(!raw.trim()){document.getElementById('outputText').value='';return;}
  const lines=raw.split('\n\n').map(s=>s.trim()).filter(Boolean);
  let out='';
  if(_fmt==='chatml'){
    if(sys)out+=`<|im_start|>system\n${sys}\n<|im_end|>\n`;
    lines.forEach((ln,i)=>{
      const role=i%2===0?uPrefix.toLowerCase():'assistant';
      out+=`<|im_start|>${role}\n${ln}\n<|im_end|>\n`;
    });
  }else if(_fmt==='xml'){
    if(sys)out+=`<system>\n${sys}\n</system>\n\n`;
    lines.forEach((ln,i)=>{
      const role=i%2===0?uPrefix.toLowerCase():'assistant';
      out+=`<${role}>\n${ln}\n</${role}>\n\n`;
    });
    out=out.trimEnd();
  }else if(_fmt==='markdown'){
    if(sys)out+=`## System\n${sys}\n\n---\n\n`;
    lines.forEach((ln,i)=>{
      const role=i%2===0?`## ${uPrefix}`:'## Assistant';
      out+=`${role}\n${ln}\n\n---\n\n`;
    });
    out=out.trimEnd();
  }else if(_fmt==='jsonl'){
    const msgs=[];
    if(sys)msgs.push({role:'system',content:sys});
    lines.forEach((ln,i)=>{msgs.push({role:i%2===0?'user':'assistant',content:ln});});
    out=msgs.map(m=>JSON.stringify(m)).join('\n');
  }else{
    const parts=[];
    if(sys)parts.push(`[SYSTEM]\n${sys}`);
    lines.forEach((ln,i)=>{parts.push(`[${i%2===0?uPrefix.toUpperCase():'ASSISTANT'}]\n${ln}`);});
    out=parts.join('\n\n');
  }
  document.getElementById('outputText').value=out;
}
function copyOut(){const v=document.getElementById('outputText').value;if(!v)return;navigator.clipboard.writeText(v);const t=document.getElementById('toast');t.style.display='inline';setTimeout(()=>{t.style.display='none';},1600);}
function clearAll(){document.getElementById('inputText').value='';document.getElementById('outputText').value='';}
_lang=detectLang();applyLang();
</script>
