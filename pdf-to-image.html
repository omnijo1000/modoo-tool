<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#a78bfa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:680px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:44px 20px;text-align:center;cursor:pointer;transition:all .2s;}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:rgba(167,139,250,.05);}
.drop-icon{font-size:38px;margin-bottom:10px;}
.drop-text{font-size:14px;color:var(--text-muted);}
input[type=file]{display:none;}
.opts{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:14px;display:none;}
.opt-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.opt-row:last-child{margin-bottom:0;}
.opt-label{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;min-width:60px;}
select.sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;}
.conv-btn{padding:10px 20px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;}
.conv-btn:hover{opacity:.85;}
.progress{background:var(--surface2);border-radius:6px;height:6px;margin-top:10px;overflow:hidden;display:none;}
.progress-bar{height:100%;background:var(--accent);border-radius:6px;transition:width .2s;}
.status-text{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:6px;display:none;}
.page-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:14px;}
.page-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;text-align:center;}
.page-card canvas{width:100%;display:block;}
.page-card-info{padding:8px;display:flex;align-items:center;justify-content:space-between;}
.page-num{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.dl-sm{padding:5px 10px;border:1px solid var(--accent);border-radius:5px;color:var(--accent);font-size:10px;cursor:pointer;background:none;font-family:'DM Mono',monospace;}
.dl-sm:hover{background:rgba(167,139,250,.1);}
.dl-all-btn{width:100%;padding:11px;border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;background:none;margin-top:10px;display:none;}
.dl-all-btn:hover{background:rgba(167,139,250,.1);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>PDF <span>to Image</span></h1>
  <p class="sub" data-i18n="sub">PDF 페이지를 PNG 이미지로 변환 · 개별 또는 전체 다운로드</p>

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fi').click()"
       ondragover="ev(event,'over')" ondragleave="ev(event,'leave')" ondrop="ev(event,'drop')">
    <div class="drop-icon">🖼️</div>
    <div class="drop-text" data-i18n="dropText">PDF 파일을 드래그하거나 클릭해서 선택</div>
  </div>
  <input type="file" id="fi" accept=".pdf,application/pdf" onchange="onFile(event)">

  <div class="opts" id="opts">
    <div class="opt-row">
      <span class="opt-label" data-i18n="scaleLabel">해상도</span>
      <select class="sm" id="scale">
        <option value="1.5">72 dpi</option>
        <option value="2" selected>144 dpi</option>
        <option value="3">216 dpi (High)</option>
      </select>
    </div>
    <div class="opt-row">
      <button class="conv-btn" onclick="convert()" data-i18n="convBtn">▶ 변환</button>
    </div>
  </div>
  <div class="progress" id="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="status-text" id="statusText"></div>

  <div class="page-grid" id="pageGrid"></div>
  <button class="dl-all-btn" id="dlAllBtn" onclick="downloadAll()" data-i18n="dlAllBtn">⬇ 모두 다운로드</button>

  <div class="seo">
    <h2 data-i18n="seoH2">PDF to Image란?</h2>
    <p data-i18n="seoP">PDF.js를 사용해 브라우저에서 직접 PDF 페이지를 PNG 이미지로 변환합니다. 해상도 설정으로 품질을 조절하고 개별 또는 전체 페이지를 다운로드할 수 있습니다.</p>
  </div>
  <footer>PDF to Image · PDF.js · All processing in browser</footer>
</main>
<script>
const PDFJS_CDN='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';
const PDFJS_WORKER='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
const _i18n={
  ko:{sub:'PDF 페이지를 PNG 이미지로 변환 · 개별 또는 전체 다운로드',langBtn:'🌐 EN',backBtn:'← 모두의 툴',dropText:'PDF 파일을 드래그하거나 클릭해서 선택',scaleLabel:'해상도',convBtn:'▶ 변환',dlAllBtn:'⬇ 모두 다운로드',seoH2:'PDF to Image란?',seoP:'PDF.js로 브라우저에서 직접 PDF 페이지를 PNG로 변환합니다. 해상도 조절과 개별/전체 다운로드를 지원합니다.'},
  en:{sub:'Convert PDF pages to PNG images · Download individually or all at once',langBtn:'🌐 中文',backBtn:'← All Tools',dropText:'Drag & drop or click to select PDF',scaleLabel:'Resolution',convBtn:'▶ Convert',dlAllBtn:'⬇ Download All',seoH2:'PDF to Image',seoP:'Convert PDF pages to PNG images directly in the browser using PDF.js. Adjust resolution and download pages individually or all at once.'},
  zh:{sub:'将PDF页面转换为PNG图片 · 单页或全部下载',langBtn:'🌐 日本語',backBtn:'← 所有工具',dropText:'拖放或点击选择PDF文件',scaleLabel:'分辨率',convBtn:'▶ 转换',dlAllBtn:'⬇ 全部下载',seoH2:'PDF转图片工具',seoP:'使用PDF.js在浏览器中直接将PDF页面转换为PNG图片，支持分辨率调节和单页/全部下载。'},
  ja:{sub:'PDFページをPNG画像に変換 · 個別または全ページダウンロード',langBtn:'🌐 한국어',backBtn:'← ホーム',dropText:'PDFファイルをドラッグするかクリックして選択',scaleLabel:'解像度',convBtn:'▶ 変換',dlAllBtn:'⬇ 全てダウンロード',seoH2:'PDF to Imageとは？',seoP:'PDF.jsを使用してブラウザで直接PDFページをPNG画像に変換します。解像度の調整と個別/全ページのダウンロードに対応しています。'},
};
let _lang='ko',_pdfDoc=null,_canvases=[],_origName='';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function ev(e,type){e.preventDefault();const dz=document.getElementById('dropZone');if(type==='over')dz.classList.add('over');else if(type==='leave')dz.classList.remove('over');else{dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f)loadPDF(f);}}
function onFile(e){const f=e.target.files[0];if(f)loadPDF(f);}
function loadPdfJs(cb){
  if(window.pdfjsLib){cb();return;}
  const s=document.createElement('script');s.src=PDFJS_CDN;
  s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc=PDFJS_WORKER;cb();};
  document.head.appendChild(s);
}
async function loadPDF(f){
  _origName=f.name.replace(/\.pdf$/i,'');
  const buf=await f.arrayBuffer();
  document.getElementById('opts').style.display='block';
  document.getElementById('pageGrid').innerHTML='';
  document.getElementById('dlAllBtn').style.display='none';
  loadPdfJs(async()=>{
    _pdfDoc=await pdfjsLib.getDocument({data:buf}).promise;
    document.getElementById('opts').querySelector('.opt-label').nextElementSibling;
  });
}
async function convert(){
  if(!_pdfDoc)return;
  const scale=parseFloat(document.getElementById('scale').value);
  const n=_pdfDoc.numPages;
  _canvases=[];
  const grid=document.getElementById('pageGrid');grid.innerHTML='';
  const prog=document.getElementById('progress');prog.style.display='block';
  const bar=document.getElementById('progressBar');
  const st=document.getElementById('statusText');st.style.display='block';
  document.getElementById('dlAllBtn').style.display='none';
  for(let i=1;i<=n;i++){
    bar.style.width=Math.round((i-1)/n*100)+'%';
    st.textContent=`Rendering page ${i} / ${n}...`;
    const page=await _pdfDoc.getPage(i);
    const vp=page.getViewport({scale});
    const c=document.createElement('canvas');
    c.width=vp.width;c.height=vp.height;
    await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
    _canvases.push(c);
    const card=document.createElement('div');card.className='page-card';
    const thumb=document.createElement('canvas');
    const tw=150,th=Math.round(vp.height/vp.width*tw);
    thumb.width=tw;thumb.height=th;
    thumb.getContext('2d').drawImage(c,0,0,tw,th);
    card.appendChild(thumb);
    const info=document.createElement('div');info.className='page-card-info';
    info.innerHTML=`<span class="page-num">p.${i}</span><button class="dl-sm" data-idx="${i-1}">↓ PNG</button>`;
    info.querySelector('.dl-sm').onclick=()=>dlPage(i-1);
    card.appendChild(info);
    grid.appendChild(card);
  }
  bar.style.width='100%';
  st.textContent=`Done · ${n} pages`;
  document.getElementById('dlAllBtn').style.display='block';
  setTimeout(()=>{prog.style.display='none';},600);
}
function dlPage(idx){
  const c=_canvases[idx];if(!c)return;
  c.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${_origName}_p${idx+1}.png`;a.click();},'image/png');
}
function downloadAll(){_canvases.forEach((_,i)=>setTimeout(()=>dlPage(i),i*200));}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
</html>
