<details class="faq-item"><summary>null과 undefined 차이도 표시되나요?</summary><p>null은 JSON에서 유효한 값으로, null → 다른 값으로 변경되면 변경으로 표시됩니다. undefined는 JSON에 존재하지 않아 키 없음으로 처리됩니다.</p></details>

  },
  en:{pageTitle:'JSON Diff - Compare Two JSON Objects | MODOO HUB',h1b:'Diff',sub:'Paste two JSON objects → instantly compare added, deleted, modified keys',backLink:'← All Tools',langBtn:'🌐 中文',labelA:'JSON A (base)',labelB:'JSON B (compare)',btnDiff:'Compare',btnClear:'Clear',added:'added',deleted:'deleted',modified:'modified',same:'same',errA:'JSON A parse error',errB:'JSON B parse error',
    seoHtml:`<h2>JSON Diff Tool</h2><p>Instantly compare two JSON objects. <strong>Added keys (green)</strong>, <strong>deleted keys (red)</strong>, and <strong>modified values (blue)</strong> are color-coded for quick identification. Useful for API response changes, config file comparison, and data migration validation.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>How are arrays compared?</summary><p>Arrays are compared by index. Different order is treated as modified. Semantic equality (same elements, different order) is not detected.</p></details>
<details class="faq-item"><summary>Are nested objects supported?</summary><p>Yes, nested objects are recursively traversed and compared. Nested paths are shown with dot notation.</p></details>
<details class="faq-item"><summary>Is null vs undefined detected?</summary><p>null is a valid JSON value — changing null to another value is shown as modified. undefined does not exist in JSON and is treated as missing.</p></details>

<details class="faq-item"><summary>JSON validation included?</summary><p>Yes, each JSON is parsed before comparison. Parse errors are reported before the diff runs.</p></details>`

    seoHtml:`<h2>JSON差异比较器</h2><p>即时比较两个JSON对象的差异。<strong>新增键（绿色）</strong>、<strong>删除键（红色）</strong>、<strong>修改值（蓝色）</strong>用颜色区分，快速识别变化。</p>
<h2 class="seo-sub">常见问题</h2>

    seoHtml:`<h2>JSON差分比較ツールとは</h2><p>2つのJSONオブジェクトの差分を即時分析します。<strong>追加されたキー（緑）</strong>、<strong>削除されたキー（赤）</strong>、<strong>変更された値（青）</strong>を色分けして素早く把握できます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>配列の比較はどうなりますか？</summary><p>配列はインデックス基準で比較します。順序が異なれば変更として表示されます。</p></details>
<details class="faq-item"><summary>ネストされたオブジェクトも比較できますか？</summary><p>はい。再帰的に比較し、ネストパスはドット表記で表示します。</p></details>

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){

function clearAll(){document.getElementById('jsonA').value='';document.getElementById('jsonB').value='';document.getElementById('diffResult').className='diff-result';}
function diffObjs(a,b,path){
  const results=[];
  const keys=new Set([...Object.keys(a),...Object.keys(b)]);
  keys.forEach(k=>{
    const fp=path?path+'.'+k:k;
    if(!(k in a)){results.push({type:'add',path:fp,val:b[k]});}
    else if(!(k in b)){results.push({type:'del',path:fp,val:a[k]});}
    else if(typeof a[k]==='object'&&a[k]!==null&&typeof b[k]==='object'&&b[k]!==null&&!Array.isArray(a[k])&&!Array.isArray(b[k])){
      results.push(...diffObjs(a[k],b[k],fp));
    } else {
      const av=JSON.stringify(a[k]);const bv=JSON.stringify(b[k]);
      if(av!==bv){results.push({type:'mod',path:fp,from:a[k],to:b[k]});}
      else{results.push({type:'same',path:fp,val:a[k]});}
    }
  });
  return results;
}
function doDiff(){
  const t=_i18n[_lang];
  const ra=document.getElementById('diffResult');
  let a,b;
  try{a=JSON.parse(document.getElementById('jsonA').value);}catch(e){ra.className='diff-result show';document.getElementById('diffStats').innerHTML=`<span style="color:var(--red)">${t.errA}: ${e.message}</span>`;document.getElementById('diffLines').innerHTML='';return;}
  try{b=JSON.parse(document.getElementById('jsonB').value);}catch(e){ra.className='diff-result show';document.getElementById('diffStats').innerHTML=`<span style="color:var(--red)">${t.errB}: ${e.message}</span>`;document.getElementById('diffLines').innerHTML='';return;}
  const results=diffObjs(a,b,'');
  const counts={add:0,del:0,mod:0,same:0};
  results.forEach(r=>counts[r.type]++);
  document.getElementById('diffStats').innerHTML=
    `<span class="stat add">+ ${counts.add} ${t.added}</span><span class="stat del">- ${counts.del} ${t.deleted}</span><span class="stat mod">~ ${counts.mod} ${t.modified}</span><span class="stat same">= ${counts.same} ${t.same}</span>`;
  let lines='';
  results.forEach(r=>{
    if(r.type==='add') lines+=`<div class="diff-line add"><span class="diff-sign">+</span><span>${r.path}: ${JSON.stringify(r.val)}</span></div>`;
    else if(r.type==='del') lines+=`<div class="diff-line del"><span class="diff-sign">-</span><span>${r.path}: ${JSON.stringify(r.val)}</span></div>`;
    else if(r.type==='mod') lines+=`<div class="diff-line mod"><span class="diff-sign">~</span><span>${r.path}: ${JSON.stringify(r.from)} → ${JSON.stringify(r.to)}</span></div>`;
    else lines+=`<div class="diff-line"><span class="diff-sign"> </span><span style="color:var(--text-dim)">${r.path}: ${JSON.stringify(r.val)}</span></div>`;
  });
  document.getElementById('diffLines').innerHTML=lines;
  ra.className='diff-result show';
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
