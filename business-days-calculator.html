<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#38bdf8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:620px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:480px){.row{grid-template-columns:1fr;}}
.field label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
input[type=date]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;color-scheme:dark;}
input[type=date]:focus{border-color:var(--accent);}
.opt-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.opt-row label{font-size:13px;color:var(--text-muted);cursor:pointer;}
input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;}
.holiday-wrap{margin-top:6px;display:none;}
.holiday-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;}
.holiday-input:focus{border-color:var(--accent);}
.holiday-hint{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:4px;}
.calc-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;}
.calc-btn:hover{opacity:.85;}
.result{margin-top:14px;display:none;}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:480px){.res-grid{grid-template-columns:1fr 1fr;}}
.res-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.res-box.highlight{border-color:var(--accent);background:rgba(56,189,248,.06);}
.res-val{font-size:28px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
.res-box:not(.highlight) .res-val{color:var(--text);}
.res-label{font-size:11px;color:var(--text-dim);margin-top:4px;}
.range-info{font-size:12px;color:var(--text-dim);font-family:'DM Mono',monospace;text-align:center;margin-top:10px;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<meta property="og:title" content="Business Days Calculator - Count Working Days">

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>Business <span>Days</span></h1>
  <p class="sub" data-i18n="sub">두 날짜 사이의 영업일·평일 계산기</p>

  <div class="card">
    <div class="row">
      <div class="field">
        <label data-i18n="startLabel">시작일</label>
        <input type="date" id="startDate">
      </div>
      <div class="field">
        <label data-i18n="endLabel">종료일</label>
        <input type="date" id="endDate">
      </div>
    </div>
    <div class="opt-row">
      <input type="checkbox" id="exWeekend" checked>
      <label for="exWeekend" data-i18n="exWeekend">주말 제외 (토·일)</label>
    </div>
    <div class="opt-row">
      <input type="checkbox" id="inclEnd">
      <label for="inclEnd" data-i18n="inclEnd">종료일 포함</label>
    </div>
    <div class="opt-row">
      <input type="checkbox" id="useHoliday" onchange="document.getElementById('holidayWrap').style.display=this.checked?'block':'none'">
      <label for="useHoliday" data-i18n="useHoliday">공휴일 제외</label>
    </div>
    <div class="holiday-wrap" id="holidayWrap">
      <input class="holiday-input" type="text" id="holidayInput" placeholder="2026-01-01, 2026-05-05">
      <div class="holiday-hint" data-i18n="holidayHint">YYYY-MM-DD 형식, 쉼표로 구분</div>
    </div>
    <button class="calc-btn" onclick="calc()" data-i18n="calcBtn">▶ 계산하기</button>
  </div>

  <div class="result" id="result">
    <div class="res-grid">
      <div class="res-box highlight">
        <div class="res-val" id="rBiz">-</div>
        <div class="res-label" data-i18n="rBizLabel">영업일</div>
      </div>
      <div class="res-box">
        <div class="res-val" id="rTotal">-</div>
        <div class="res-label" data-i18n="rTotalLabel">총 일수</div>
      </div>
      <div class="res-box">
        <div class="res-val" id="rWeekend">-</div>
        <div class="res-label" data-i18n="rWeekendLabel">주말</div>
      </div>
      <div class="res-box">
        <div class="res-val" id="rHoliday">-</div>
        <div class="res-label" data-i18n="rHolidayLabel">공휴일</div>
      </div>
      <div class="res-box">
        <div class="res-val" id="rWeeks">-</div>
        <div class="res-label" data-i18n="rWeeksLabel">주</div>
      </div>
      <div class="res-box">
        <div class="res-val" id="rMonths">-</div>
        <div class="res-label" data-i18n="rMonthsLabel">개월</div>
      </div>
    </div>
    <div class="range-info" id="rangeInfo"></div>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">Business Days Calculator란?</h2>
    <p data-i18n="seoP">두 날짜 사이의 영업일(평일)을 계산합니다. 주말 제외, 공휴일 제외 옵션을 설정하고 프로젝트 마감일이나 계약 기간을 쉽게 계산하세요.</p>
  </div>
  <footer>Business Days Calculator · Free Online Tool</footer>
</main>
<script>
const _i18n={
  ko:{sub:'두 날짜 사이의 영업일·평일 계산기',langBtn:'🌐 EN',backBtn:'← 모두의 툴',startLabel:'시작일',endLabel:'종료일',exWeekend:'주말 제외 (토·일)',inclEnd:'종료일 포함',useHoliday:'공휴일 제외',holidayHint:'YYYY-MM-DD 형식, 쉼표로 구분',calcBtn:'▶ 계산하기',rBizLabel:'영업일',rTotalLabel:'총 일수',rWeekendLabel:'주말',rHolidayLabel:'공휴일',rWeeksLabel:'주',rMonthsLabel:'개월',seoH2:'Business Days Calculator란?',seoP:'두 날짜 사이 영업일을 계산합니다. 주말·공휴일 제외 옵션을 지원합니다.'},
  en:{sub:'Count business days & weekdays between two dates',langBtn:'🌐 中文',backBtn:'← All Tools',startLabel:'Start Date',endLabel:'End Date',exWeekend:'Exclude weekends (Sat & Sun)',inclEnd:'Include end date',useHoliday:'Exclude holidays',holidayHint:'YYYY-MM-DD format, comma separated',calcBtn:'▶ Calculate',rBizLabel:'Business Days',rTotalLabel:'Total Days',rWeekendLabel:'Weekend Days',rHolidayLabel:'Holidays',rWeeksLabel:'Weeks',rMonthsLabel:'Months',seoH2:'Business Days Calculator',seoP:'Calculate business days between two dates with options to exclude weekends and custom holidays. Perfect for project deadlines and contract periods.'},
  zh:{sub:'计算两个日期之间的工作日',langBtn:'🌐 日本語',backBtn:'← 所有工具',startLabel:'开始日期',endLabel:'结束日期',exWeekend:'排除周末（周六·周日）',inclEnd:'包含结束日期',useHoliday:'排除假期',holidayHint:'YYYY-MM-DD格式，用逗号分隔',calcBtn:'▶ 计算',rBizLabel:'工作日',rTotalLabel:'总天数',rWeekendLabel:'周末天数',rHolidayLabel:'假期',rWeeksLabel:'周',rMonthsLabel:'月',seoH2:'工作日计算器',seoP:'计算两个日期之间的工作日，支持排除周末和自定义假期，适用于项目截止日期和合同期限计算。'},
  ja:{sub:'2つの日付間の営業日を計算',langBtn:'🌐 한국어',backBtn:'← ホーム',startLabel:'開始日',endLabel:'終了日',exWeekend:'週末を除外（土・日）',inclEnd:'終了日を含む',useHoliday:'祝日を除外',holidayHint:'YYYY-MM-DD形式、カンマ区切り',calcBtn:'▶ 計算する',rBizLabel:'営業日',rTotalLabel:'総日数',rWeekendLabel:'週末日数',rHolidayLabel:'祝日',rWeeksLabel:'週',rMonthsLabel:'ヶ月',seoH2:'営業日計算機とは？',seoP:'2つの日付間の営業日（平日）を計算します。週末・祝日の除外オプションに対応しており、プロジェクトの締め切りや契約期間の計算に最適です。'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function parseHolidays(){
  const raw=document.getElementById('holidayInput').value;
  const set=new Set();
  raw.split(',').forEach(s=>{const d=s.trim();if(/^\d{4}-\d{2}-\d{2}$/.test(d))set.add(d);});
  return set;
}
function toDateStr(d){return d.toISOString().slice(0,10);}
function calc(){
  const s=document.getElementById('startDate').value;
  const e=document.getElementById('endDate').value;
  if(!s||!e){alert('날짜를 입력하세요');return;}
  const start=new Date(s),end=new Date(e);
  if(start>end){alert('시작일이 종료일보다 늦습니다');return;}
  const exW=document.getElementById('exWeekend').checked;
  const inclE=document.getElementById('inclEnd').checked;
  const holidays=document.getElementById('useHoliday').checked?parseHolidays():new Set();
  const endAdj=new Date(end);if(inclE)endAdj.setDate(endAdj.getDate()+1);
  let total=0,weekend=0,holiday=0,biz=0;
  const cur=new Date(start);
  while(cur<endAdj){
    const day=cur.getDay();
    const str=toDateStr(cur);
    const isWeekend=day===0||day===6;
    const isHoliday=holidays.has(str);
    total++;
    if(isWeekend)weekend++;
    else if(isHoliday)holiday++;
    else biz++;
    cur.setDate(cur.getDate()+1);
  }
  if(!exW)biz=total-holiday;
  const weeks=(total/7).toFixed(1);
  const months=(total/30.44).toFixed(1);
  document.getElementById('rBiz').textContent=exW?biz:(total-holiday);
  document.getElementById('rTotal').textContent=total;
  document.getElementById('rWeekend').textContent=exW?weekend:'-';
  document.getElementById('rHoliday').textContent=holiday;
  document.getElementById('rWeeks').textContent=weeks;
  document.getElementById('rMonths').textContent=months;
  const fmt=d=>d.toLocaleDateString(_lang==='ko'?'ko-KR':_lang==='zh'?'zh-CN':'en-US');
  const endDisp=inclE?new Date(end):new Date(end.getTime()-86400000);
  document.getElementById('rangeInfo').textContent=`${fmt(start)} → ${fmt(inclE?end:endAdj)}`;
  document.getElementById('result').style.display='block';
}
const today=new Date();
const wd=d=>{const s=new Date(d);return s.toISOString().slice(0,10);};
document.getElementById('startDate').value=wd(today);
const nxt=new Date(today);nxt.setDate(nxt.getDate()+30);
document.getElementById('endDate').value=wd(nxt);
_lang=detectLang();applyLang();
</script>
</body>
