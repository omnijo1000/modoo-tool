<details class="faq-item"><summary>品質は維持されますか？</summary><p>品質スライダーで出力品質を調整できます。80%以上では見た目の差はほぼありません。</p></details>
<details class="faq-item"><summary>ファイルはサーバーにアップロードされますか？</summary><p>いいえ、すべての変換はブラウザのローカルで処理されます。</p></details>
<details class="faq-item"><summary>ブラウザがAVIFに対応していない場合は？</summary><p>Chrome 85+、Firefox 93+、Safari 16+にアップグレードするか、WebPを代替として使用してください。</p></details>
<details class="faq-item"><summary>AVIFファイルが開けません。</summary><p>最新のChrome、Firefox、Safari、EdgeはAVIFに対応しています。Windowsフォトビューアーはまだ対応していない場合があります。</p></details>
<details class="faq-item"><summary>複数ファイルを一度に変換できますか？</summary><p>はい、複数ファイルを選択またはドロップすると順番に変換されます。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
let avifSupported=null;
function checkAvif(){
  return new Promise(res=>{
    const c=document.createElement('canvas');c.width=1;c.height=1;
    c.toBlob(b=>res(b&&b.size>0),'image/avif',0.5);
  });
}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','dropText','dropHint','lblQuality','btnClear'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  const sb=document.getElementById('supportBar');
  if(avifSupported===true)sb.innerHTML=`<span class="badge ok">${t.supportOk}</span>`;
  else if(avifSupported===false){sb.innerHTML=`<span class="badge no">${t.supportNo}</span>`;document.getElementById('noSupportMsg').textContent=t.noSupport;document.getElementById('noSupportMsg').style.display='block';}
}
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFiles(e.dataTransfer.files);});
document.getElementById('fileInput').addEventListener('change',e=>handleFiles(e.target.files));
function handleFiles(files){
  for(const f of files){
    if(!f.type.startsWith('image/')){continue;}
    const id='ri_'+Math.random().toString(36).slice(2);
    addResult(id,f.name);
    const img=new Image();const url=URL.createObjectURL(f);
    img.onload=()=>{
      const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
      const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
      const q=parseInt(document.getElementById('quality').value)/100;
      c.toBlob(blob=>{
        if(!blob||blob.size===0){updateResult(id,null,null,0,'err');URL.revokeObjectURL(url);return;}
        const outName=f.name.replace(/\.\w+$/,'.avif');
        const outUrl=URL.createObjectURL(blob);
        updateResult(id,outUrl,outName,blob.size,'ok');
        URL.revokeObjectURL(url);
      },'image/avif',q);
    };
    img.onerror=()=>URL.revokeObjectURL(url);
    img.src=url;
  }
}
function addResult(id,name){
  const t=_i18n[_lang];const el=document.createElement('div');el.className='result-item';el.id=id;
  el.innerHTML=`<div style="width:48px;height:48px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px" id="${id}_icon">🖼️</div><div class="file-info"><div class="file-name">${name}</div><div class="file-meta" id="${id}_info"><span class="status proc">${t.proc}</span></div></div>`;
  document.getElementById('resultList').appendChild(el);
}
function updateResult(id,url,outName,size,state){
  const t=_i18n[_lang];
  if(state==='ok'){
    const img=document.createElement('img');img.src=url;img.className='thumb';
    document.getElementById(id+'_icon').replaceWith(img);
    document.getElementById(id).querySelector('.file-name').textContent=outName;
    document.getElementById(id+'_info').innerHTML=`<span class="status ok">${t.done}</span> · ${(size/1024).toFixed(1)}KB`;
    const btn=document.createElement('a');btn.href=url;btn.download=outName;btn.className='dl-btn';btn.textContent=t.dl;
    document.getElementById(id).appendChild(btn);
  }else{
    document.getElementById(id+'_info').innerHTML=`<span class="status err">${t.err}</span>`;
  }
}
function clearAll(){document.getElementById('resultList').innerHTML='';document.getElementById('fileInput').value='';}
_lang=detectLang();
checkAvif().then(ok=>{avifSupported=ok;applyLang();});
</script>
<script src="related.js"></script>
