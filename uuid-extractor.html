    stats:(n,u)=>`${n} found (${u} unique)`,

<details class="faq-item"><summary>Can I see where UUIDs appear in the original text?</summary><p>Yes — after extraction, UUIDs are highlighted in the original text.</p></details>`

  zh:{h1Accent:'提取器',sub:'从文本、日志或JSON中查找并提取所有UUID',backLink:'← 所有工具',langBtn:'🌐 日本語',lblDedup:'去重',lblLower:'小写规范化',lblVersion:'显示版本',btnExtract:'提取',btnCopy:'复制全部',btnSample:'示例',btnClear:'清除',copyBtn:'复制',copied:'已复制!',noMatch:'未找到UUID。',

    seoHtml:`<h2>UUID提取器</h2><p>从文本、服务器日志、JSON、API响应或任何格式中自动查找并提取所有UUID。支持去重、小写规范化和版本检测(v1-v5)。</p>

<details class="faq-item"><summary>可以提取哪些格式的UUID？</summary><p>标准连字符格式(8-4-4-4-12)的v1-v5 UUID。</p></details>

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;['h1Accent','subEl','backLink','langBtn','lblDedup','lblLower','lblVersion','btnExtract','btnCopy','btnSample','btnClear'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});document.getElementById('seoDiv').innerHTML=t.seoHtml;}
function getVersion(u){const c=u[14];return c?'v'+c:'?';}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function extract(){
  const t=_i18n[_lang];const text=document.getElementById('textIn').value;
  const dedup=document.getElementById('optDedup').checked;const lower=document.getElementById('optLower').checked;const showVer=document.getElementById('optVersion').checked;
  const re=new RegExp(UUID_RE.source,'gi');const found=[];let m;
  while((m=re.exec(text))!==null)found.push(lower?m[0].toLowerCase():m[0]);
  _extracted=dedup?[...new Set(found)]:found;
  document.getElementById('statsEl').textContent=_extracted.length?t.stats(found.length,new Set(found.size?found:[...found]).size):'';
  if(!_extracted.length){document.getElementById('listEl').innerHTML=`<div style="padding:14px;color:var(--text-dim);font-size:12px;">${t.noMatch}</div>`;document.getElementById('highlightEl').style.display='none';document.getElementById('statsEl').textContent=t.noMatch;return;}
  document.getElementById('statsEl').textContent=t.stats(found.length,[...new Set(found)].length);
  const html=`<div class="uuid-list">${_extracted.map((u,i)=>`<div class="uuid-item"><span class="uuid-num">${i+1}</span><span class="uuid-val">${u}</span>${showVer?`<span class="uuid-version">${getVersion(u)}</span>`:''}<button class="uuid-copy" onclick="copyOne(this,'${u}')">${t.copyBtn}</button></div>`).join('')}</div>`;
  document.getElementById('listEl').innerHTML=html;
  const highlighted=escHtml(text).replace(new RegExp(UUID_RE.source,'gi'),u=>`<span class="hl-uuid">${u}</span>`);
  document.getElementById('highlightEl').innerHTML=highlighted;document.getElementById('highlightEl').style.display='block';
}
function copyOne(btn,u){const t=_i18n[_lang];navigator.clipboard.writeText(u).then(()=>{const o=btn.textContent;btn.textContent=t.copied;setTimeout(()=>btn.textContent=t.copyBtn,1200);});}
