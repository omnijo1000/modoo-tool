  }
};
const LANGS=['ko','en','zh','ja'];
let _lang='ko',_currentId='';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('labelPreset').textContent=t.labelPreset;document.getElementById('labelAlphabet').textContent=t.labelAlphabet;
  document.getElementById('labelLen').textContent=t.labelLen;document.getElementById('labelCount').textContent=t.labelCount;
  document.getElementById('btnGen').textContent=t.btnGen;document.getElementById('btnCopy').textContent=t.btnCopy;
  document.getElementById('btnBatch').textContent=t.btnBatch;document.getElementById('btnCopyBatch').textContent=t.btnCopyBatch;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  renderPresets();genOne();
}
function renderPresets(){
  const prs=PRESETS[_lang]||PRESETS.en;
  document.getElementById('presetRow').innerHTML=prs.map((p,i)=>`<button class="preset-btn" onclick="applyPreset(${i})">${p.label}</button>`).join('');
}
function applyPreset(i){const p=(PRESETS[_lang]||PRESETS.en)[i];document.getElementById('alphabet').value=p.alpha;genOne();}
function generateNanoId(alpha,len){
  const buf=new Uint8Array(len*2);crypto.getRandomValues(buf);
  let id='';for(let i=0;i<buf.length&&id.length<len;i++){const idx=buf[i]%alpha.length;if(buf[i]<Math.floor(256/alpha.length)*alpha.length)id+=alpha[idx];}
  while(id.length<len){const x=new Uint8Array(1);crypto.getRandomValues(x);if(x[0]<Math.floor(256/alpha.length)*alpha.length)id+=alpha[x[0]%alpha.length];}
  return id.slice(0,len);
}
function genOne(){
  const alpha=[...new Set(document.getElementById('alphabet').value)].join('');
  const len=Math.min(256,Math.max(1,parseInt(document.getElementById('length').value)||21));
  if(alpha.length<2){document.getElementById('idDisplay').textContent='⚠ 알파벳 2자 이상 필요';return;}
  _currentId=generateNanoId(alpha,len);
  document.getElementById('idDisplay').textContent=_currentId;
  const bits=len*Math.log2(alpha.length);document.getElementById('entropyInfo').textContent=`${_i18n[_lang].entropy}: ${bits.toFixed(1)} bits`;
}
function copyOne(){const t=_i18n[_lang];if(!_currentId)return;
  navigator.clipboard.writeText(_currentId).then(()=>{const btn=document.getElementById('btnCopy');const orig=btn.textContent;btn.textContent=t.copied;setTimeout(()=>btn.textContent=orig,2000);});
}
function genBatch(){
  const alpha=[...new Set(document.getElementById('alphabet').value)].join('');
  const len=Math.min(256,Math.max(1,parseInt(document.getElementById('length').value)||21));
  const n=Math.min(100,Math.max(1,parseInt(document.getElementById('count').value)||10));
  if(alpha.length<2){document.getElementById('listBox').textContent='⚠';return;}
  const ids=Array.from({length:n},()=>generateNanoId(alpha,len));
  document.getElementById('listBox').innerHTML=ids.map(id=>`<span style="color:var(--accent)">${id}</span><br>`).join('');
  genBatch._ids=ids;
}
function copyBatch(){const t=_i18n[_lang];const ids=genBatch._ids;if(!ids)return;
  navigator.clipboard.writeText(ids.join('\n')).then(()=>{const btn=document.getElementById('btnCopyBatch');const orig=btn.textContent;btn.textContent=t.copied;setTimeout(()=>btn.textContent=orig,2000);});
}
_lang=detectLang();applyLang();
</script>
