    seoHtml:`<h2>PDF → TXT 변환</h2><p><strong>PDF 파일</strong>을 TXT 텍스트 파일로 변환합니다. 업로드하면 자동으로 텍스트를 추출하여 미리보기와 TXT 다운로드를 제공합니다. 브라우저에서 완전 로컬 처리됩니다.</p>

<details class="faq-item"><summary>표·서식이 유지되나요?</summary><p>단순 텍스트만 추출됩니다. 표 구조는 보장되지 않습니다.</p></details>
<details class="faq-item"><summary>한글 PDF도 변환되나요?</summary><p>PDF에 한글 텍스트 레이어가 있으면 변환됩니다.</p></details>
<details class="faq-item"><summary>암호화된 PDF도 처리되나요?</summary><p>암호화되지 않은 PDF만 처리됩니다.</p></details>
<details class="faq-item"><summary>여러 파일을 한 번에 처리할 수 있나요?</summary><p>현재는 파일 하나씩 처리됩니다.</p></details>`
  },
  en:{h1b:'TXT',sub:'Convert PDF files to plain text',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'PDF to Text Converter | MODOO HUB',dropTxt:'Drop PDF here or click to select',dlBtn:'⬇️ Download TXT',copyBtn:'Copy All',prevLabel:'Preview',progLabel:'Converting',copiedMsg:'Copied',pgLabel:'Page',
    seoHtml:`<h2>PDF to Text Converter</h2><p>Convert <strong>PDF files</strong> to plain TXT text files. Upload a PDF and instantly extract text for preview and TXT download. Fully local browser processing — no uploads.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Can scanned PDFs be converted?</summary><p>Only PDFs with OCR-embedded text layers work.</p></details>
<details class="faq-item"><summary>Is my file uploaded?</summary><p>No — fully local browser processing.</p></details>
<details class="faq-item"><summary>TXT file encoding?</summary><p>UTF-8 encoding.</p></details>
<details class="faq-item"><summary>Are page breaks included?</summary><p>Yes — page separators are included.</p></details>
<details class="faq-item"><summary>Is table structure preserved?</summary><p>Only plain text is extracted — table structure is not guaranteed.</p></details>
<details class="faq-item"><summary>Non-Latin languages?</summary><p>Any language embedded in the PDF text layer is extracted.</p></details>
<details class="faq-item"><summary>Encrypted PDFs?</summary><p>Only unencrypted PDFs are supported.</p></details>
<details class="faq-item"><summary>Multiple files at once?</summary><p>Currently one file at a time.</p></details>`
  },
  zh:{h1b:'TXT',sub:'将PDF文件转换为纯文本文件',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'PDF转TXT | MODOO HUB',dropTxt:'拖放PDF文件或点击选择',dlBtn:'⬇️ 下载TXT',copyBtn:'全部复制',prevLabel:'预览',progLabel:'转换中',copiedMsg:'已复制',pgLabel:'页',
    seoHtml:`<h2>PDF转文本</h2><p>将<strong>PDF文件</strong>转换为纯文本TXT文件。上传PDF后自动提取文本，提供预览和TXT下载。完全在浏览器本地处理。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>扫描PDF也能转换吗？</summary><p>只有经过OCR处理含有文本层的PDF才能转换。</p></details>
<details class="faq-item"><summary>文件会上传服务器吗？</summary><p>不会，完全本地处理。</p></details>
<details class="faq-item"><summary>TXT文件编码是什么？</summary><p>UTF-8编码。</p></details>
<details class="faq-item"><summary>包含页面分隔符吗？</summary><p>是的，包含页面分隔线。</p></details>
<details class="faq-item"><summary>表格结构会保留吗？</summary><p>只提取纯文本，表格结构无法保证。</p></details>
<details class="faq-item"><summary>支持中文PDF吗？</summary><p>只要PDF内嵌了文本层，即可提取中文。</p></details>
<details class="faq-item"><summary>加密PDF支持吗？</summary><p>只支持未加密的PDF。</p></details>
<details class="faq-item"><summary>可以同时处理多个文件吗？</summary><p>目前每次只处理一个文件。</p></details>`
  },
  ja:{h1b:'TXT',sub:'PDFファイルをテキストファイルに変換します',backLink:'← ホーム',langBtn:'🌐 한국어',pageTitle:'PDF→TXT変換 | MODOO HUB',dropTxt:'PDFファイルをドロップまたはクリックして選択',dlBtn:'⬇️ TXTダウンロード',copyBtn:'全てコピー',prevLabel:'プレビュー',progLabel:'変換中',copiedMsg:'コピー済み',pgLabel:'ページ',
    seoHtml:`<h2>PDF→TXT変換</h2><p><strong>PDFファイル</strong>をプレーンテキストTXTファイルに変換します。アップロードすると自動でテキストを抽出してプレビューとTXTダウンロードを提供します。すべてブラウザ内でローカル処理されます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>スキャンPDFも変換できますか？</summary><p>OCRが適用されテキストレイヤーがあるPDFのみ変換できます。</p></details>
<details class="faq-item"><summary>ファイルはサーバーに送信されますか？</summary><p>いいえ、すべてブラウザ内でローカル処理されます。</p></details>
<details class="faq-item"><summary>TXTファイルのエンコーディングは？</summary><p>UTF-8エンコーディングです。</p></details>
<details class="faq-item"><summary>ページ区切りは含まれますか？</summary><p>はい、ページ区切り線が含まれます。</p></details>
<details class="faq-item"><summary>表の構造は保持されますか？</summary><p>プレーンテキストのみ抽出されます。表構造は保証されません。</p></details>
<details class="faq-item"><summary>日本語PDFも変換できますか？</summary><p>PDFに埋め込まれたテキストレイヤーがあれば変換できます。</p></details>
<details class="faq-item"><summary>暗号化PDFは対応していますか？</summary><p>暗号化されていないPDFのみ対応しています。</p></details>
<details class="faq-item"><summary>複数ファイルを一度に処理できますか？</summary><p>現在は一度に1ファイルのみ処理できます。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','dropTxt','dlBtn','copyBtn','prevLabel'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function ev(e,cls){e.preventDefault();document.getElementById('dropZone').className='drop-zone'+' '+cls;}
function drop(e){e.preventDefault();document.getElementById('dropZone').className='drop-zone';const f=e.dataTransfer.files[0];if(f)loadFile(f);}
async function loadFile(f){
  if(!f||!f.name.endsWith('.pdf'))return;
  _fname=f.name;_allText='';
  const t=_i18n[_lang];
  const prog=document.getElementById('progressEl');
  document.getElementById('resultBox').style.display='none';
  const arr=new Uint8Array(await f.arrayBuffer());
  const pdf=await pdfjsLib.getDocument({data:arr}).promise;
  const pages=[];
  for(let i=1;i<=pdf.numPages;i++){
    prog.textContent=`${t.progLabel} ${i}/${pdf.numPages}...`;
    const pg=await pdf.getPage(i);
    const tc=await pg.getTextContent();
    let text='';
    tc.items.forEach(item=>{if(item.str)text+=item.str;if(item.hasEOL)text+='\n';});
    pages.push(text.trim());
  }
  prog.textContent='';
  _allText=pages.map((p,i)=>`--- ${t.pgLabel} ${i+1} ---\n${p}`).join('\n\n');
  const words=_allText.split(/\s+/).filter(Boolean).length;
  document.getElementById('statsEl').textContent=`${pdf.numPages} pp · ${_allText.length.toLocaleString()} chars · ${words.toLocaleString()} words`;
  document.getElementById('prevText').textContent=_allText.slice(0,3000)+((_allText.length>3000)?'\n...(truncated)':'');
  document.getElementById('resultBox').style.display='block';
}
function copyAll(){
  const t=_i18n[_lang];const btn=document.getElementById('copyBtn');
  navigator.clipboard.writeText(_allText).then(()=>{const orig=btn.textContent;btn.textContent=t.copiedMsg;setTimeout(()=>btn.textContent=orig,1500);});
}
function downloadTxt(){
  const blob=new Blob([_allText],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(_fname||'doc').replace('.pdf','')+'.txt';a.click();
}
_lang=detectLang();applyLang();
</script>
