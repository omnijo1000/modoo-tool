    seoHtml:`<h2>Slug Checker</h2><p>A URL <strong>slug</strong> is the part of a URL after the domain. Good slugs use only lowercase letters, numbers, and hyphens — and stay under 60 characters. Including relevant keywords improves SEO.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What is a URL slug?</summary><p>The path segment of a URL that identifies a page in a human-readable way.</p></details>
<details class="faq-item"><summary>Can I use non-ASCII characters?</summary><p>Technically yes, but they get URL-encoded and look messy. Stick to ASCII.</p></details>
<details class="faq-item"><summary>Hyphens vs underscores?</summary><p>Google treats hyphens as word separators — use hyphens for better SEO.</p></details>
<details class="faq-item"><summary>Ideal slug length?</summary><p>3–5 words, under 60 characters.</p></details>
<details class="faq-item"><summary>Does changing a slug hurt SEO?</summary><p>Without a 301 redirect, old links break and rankings can drop.</p></details>

<details class="faq-item"><summary>Uppercase slugs — problem?</summary><p>Case mismatch can create duplicate URLs. Always use lowercase.</p></details>`

<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>URL slug是什么？</summary><p>URL中域名后面的路径部分，以人类可读的方式标识页面。</p></details>

<details class="faq-item"><summary>连字符还是下划线？</summary><p>谷歌将连字符视为单词分隔符，建议使用连字符以获得更好的SEO效果。</p></details>

<details class="faq-item"><summary>URLスラグとは？</summary><p>URLのドメイン後のパス部分で、ページを人が読める形で識別します。</p></details>

<details class="faq-item"><summary>スラグに日付を含めるべき？</summary><p>エバーグリーンコンテンツは不要、ニュース/イベントは含めるのが効果的です。</p></details>
<details class="faq-item"><summary>ストップワードを削除すべき？</summary><p>「a」「the」「of」などを削除するとスラグが短くきれいになります。</p></details>
<details class="faq-item"><summary>大文字スラグは問題になる？</summary><p>大文字小文字の不一致で重複URLが発生することがあります。常に小文字を使用してください。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','slugPrefix','fixLabel','btnFix'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('slugInput').placeholder=t.ph;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  check();
}
function autoFix(s){
  return s.toLowerCase().replace(/[^a-z0-9-\s]/g,'').replace(/\s+/g,'-').replace(/_/g,'-').replace(/^-+|-+$/g,'').replace(/-{2,}/g,'-').slice(0,60);
}
function applyFix(){const f=document.getElementById('fixVal').textContent;document.getElementById('slugInput').value=f;check();}
function check(){
  const t=_i18n[_lang];const slug=document.getElementById('slugInput').value;
  const badge=document.getElementById('overallBadge');
  if(!slug){badge.textContent=t.empty;badge.className='overall-badge badge-empty';document.getElementById('rulesList').innerHTML='';document.getElementById('fixWrap').style.display='none';return;}
  const rules=t.rules;let allPass=true;
  let html='';
  rules.forEach(r=>{
    const pass=r.check(slug);if(!pass)allPass=false;
    html+=`<div class="rule-item">
      <span class="rule-icon">${pass?'✅':'❌'}</span>
      <div class="rule-text"><div class="rule-name" style="color:${pass?'var(--green)':'var(--red)'}">${r.name}</div><div class="rule-desc">${r.desc}</div></div>
    </div>`;
  });
  document.getElementById('rulesList').innerHTML=html;
  badge.textContent=(allPass?'✅ ':'❌ ')+(allPass?t.ok:t.fail)+' — '+slug.length+'자';
  badge.className='overall-badge '+(allPass?'badge-ok':'badge-fail');
  if(!allPass){
    const fixed=autoFix(slug);
    document.getElementById('fixVal').textContent=fixed;
    document.getElementById('fixWrap').style.display=fixed&&fixed!==slug?'block':'none';
  }else{document.getElementById('fixWrap').style.display='none';}
}
_lang=detectLang();applyLang();
</script>
