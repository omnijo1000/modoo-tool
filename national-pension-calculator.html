  ko:{pageTitle:'국민연금 계산기 - 2024년 보험료·예상수령액 | MODOO HUB',h1:'국민연금 계산기',sub:'2024년 기준 국민연금 보험료 및 예상 수령액 자동 계산',backLink:'← 모두의 툴',langBtn:'🌐 EN',lblSalary:'월 소득 (만원)',lblAge:'현재 나이',lblYears:'현재까지 가입 기간 (년)',lblMyShare:'내 월 납부액',bkBase:'기준소득월액',bkEmployee:'근로자 부담 (4.5%)',bkEmployer:'사업주 부담 (4.5%)',bkTotal:'총 보험료 (9%)',estTitle:'예상 노령연금 (월)',est20:'20년 가입 시',est30:'30년 가입 시',estFull:'60세까지 납부 시',notice:'※ 예상 수령액은 현재 소득·가입 기간이 60세까지 동일하게 유지된다고 가정한 간편 추산입니다. 실제 수령액은 국민연금공단에서 확인하세요.',
    seoHtml:`<h2>2024년 국민연금 보험료 계산 방법</h2><p>2024년 국민연금 보험료율은 기준소득월액의 <strong>9%</strong>입니다. 직장가입자는 근로자와 사업주가 각각 <strong>4.5%</strong>씩 부담합니다. 기준소득월액 상한은 <strong>590만원</strong>, 하한은 <strong>37만원</strong>입니다. 노령연금 수령 개시 연령은 현재 만 63세(1961~1964년생 기준)이며, 점차 65세로 상향됩니다.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. 2024년 국민연금 보험료율은?</summary><p>A. 기준소득월액의 9%. 직장가입자는 근로자·사업주 각 4.5%, 지역가입자는 전액 본인 부담입니다.</p></details><details class="faq-item"><summary>Q. 기준소득월액 상·하한은?</summary><p>A. 2024년 기준 상한 590만원, 하한 37만원. 소득이 590만원을 초과해도 590만원 기준으로 계산합니다.</p></details><details class="faq-item"><summary>Q. 국민연금 수령 나이는?</summary><p>A. 현재 만 63세 (1961~1964년생). 이후 단계적으로 65세까지 상향됩니다.</p></details><details class="faq-item"><summary>Q. 최소 가입 기간은?</summary><p>A. 노령연금 수령을 위한 최소 가입 기간은 10년(120개월)입니다.</p></details><details class="faq-item"><summary>Q. 외국인도 국민연금에 가입해야 하나요?</summary><p>A. 본국과 사회보장협정이 체결되지 않은 외국인 근로자는 원칙적으로 가입 의무가 있습니다.</p></details><details class="faq-item"><summary>Q. 국민연금 임의가입이란?</summary><p>A. 소득 없는 전업주부, 학생, 농어업인 등 의무가입 대상이 아닌 사람도 본인 희망에 따라 가입할 수 있는 제도입니다.</p></details><details class="faq-item"><summary>Q. 연금 수령액을 늘리는 방법은?</summary><p>A. 가입 기간을 늘리거나(임의계속가입), 연기연금(최대 5년 연기 시 연 7.2% 증가), 또는 반납·추납 제도를 활용하면 수령액이 증가합니다.</p></details><details class="faq-item"><summary>Q. 조기 수령이 가능한가요?</summary><p>A. 가입 기간 10년 이상이고 소득이 없는 경우 최대 5년 일찍 수령 가능하지만, 1개월당 0.5%씩 감액됩니다.</p></details>`},
  en:{pageTitle:'Korean National Pension Calculator - 2024 Premium | MODOO HUB',h1:'National Pension Calculator',sub:'Calculate 2024 Korean national pension contributions and estimated benefits',backLink:'← All Tools',langBtn:'🌐 中文',lblSalary:'Monthly income (10,000 KRW)',lblAge:'Current age',lblYears:'Years already enrolled',lblMyShare:'Your monthly contribution',bkBase:'Standard monthly income',bkEmployee:'Employee share (4.5%)',bkEmployer:'Employer share (4.5%)',bkTotal:'Total premium (9%)',estTitle:'Estimated Monthly Pension',est20:'At 20 years enrolled',est30:'At 30 years enrolled',estFull:'If contributions continue to age 60',notice:'※ Estimates assume current income and enrollment continue to age 60. Verify actual amounts with the National Pension Service.',
    seoHtml:`<h2>Korean National Pension Calculator</h2><p>In 2024, Korea's National Pension premium rate is <strong>9% of standard monthly income</strong>, split equally between employee (4.5%) and employer (4.5%). The income ceiling is <strong>5.9 million KRW</strong> and the floor is <strong>370,000 KRW</strong>. Old-age pension receipt begins at 63 (for those born 1961-1964), rising to 65.</p><h2 class="seo-sub">FAQ</h2><details class="faq-item"><summary>Q. What is the 2024 national pension rate?</summary><p>A. 9% of standard monthly income — 4.5% each for employee and employer. Self-employed pay the full 9%.</p></details><details class="faq-item"><summary>Q. What are the income ceiling and floor?</summary><p>A. 2024: ceiling 5.9 million KRW, floor 370,000 KRW. Income above the ceiling is capped at the ceiling for premium calculation.</p></details><details class="faq-item"><summary>Q. When can I start receiving pension?</summary><p>A. Currently age 63 (for those born 1961-1964), gradually rising to 65.</p></details><details class="faq-item"><summary>Q. What is the minimum enrollment period?</summary><p>A. 10 years (120 months) minimum to qualify for old-age pension.</p></details><details class="faq-item"><summary>Q. Do foreign workers pay into the national pension?</summary><p>A. Foreign workers not covered by a social security agreement with their home country are generally required to enroll.</p></details><details class="faq-item"><summary>Q. Can I increase my pension amount?</summary><p>A. Yes: extend enrollment (voluntary continued enrollment), defer receipt (7.2% increase per year deferred, up to 5 years), or pay back missed contributions.</p></details><details class="faq-item"><summary>Q. Can I receive pension early?</summary><p>A. Yes, if enrolled 10+ years and income-free, up to 5 years early — but reduced 0.5% per month.</p></details><details class="faq-item"><summary>Q. How accurate is this estimate?</summary><p>A. This uses a simplified model. Actual benefits depend on the national average wage (A-value), personal contribution history, and benefit formula. Check the NPS website for official estimates.</p></details>`},
  zh:{pageTitle:'韩国国民年金计算器 - 2024年保险费 | MODOO HUB',h1:'国民年金计算器',sub:'2024年韩国国民年金保险费及预计领取额自动计算',backLink:'← 首页',langBtn:'🌐 日本語',lblSalary:'月收入（万韩元）',lblAge:'当前年龄',lblYears:'已参保年数',lblMyShare:'每月个人缴纳额',bkBase:'基准月收入',bkEmployee:'员工负担（4.5%）',bkEmployer:'雇主负担（4.5%）',bkTotal:'保险费合计（9%）',estTitle:'预计月养老金',est20:'参保20年时',est30:'参保30年时',estFull:'缴至60岁时',notice:'※ 预计金额假设当前收入和参保状态持续至60岁。实际金额请向国民年金公团确认。',
    seoHtml:`<h2>韩国国民年金计算器</h2><p>2024年韩国国民年金费率为基准月收入的<strong>9%</strong>，员工和雇主各承担<strong>4.5%</strong>。收入上限为<strong>590万韩元</strong>，下限为<strong>37万韩元</strong>。</p><h2 class="seo-sub">常见问题</h2><details class="faq-item"><summary>Q. 2024年国民年金费率是多少？</summary><p>A. 基准月收入的9%，员工与雇主各4.5%。个体参保者自行承担全额9%。</p></details><details class="faq-item"><summary>Q. 外籍劳工也需要缴纳吗？</summary><p>A. 未与本国签订社会保障协议的外籍劳工原则上需要参保。</p></details><details class="faq-item"><summary>Q. 何时可以领取养老金？</summary><p>A. 目前63岁起领取（1961-1964年出生者），逐步提高至65岁。</p></details><details class="faq-item"><summary>Q. 最低参保年限是多少？</summary><p>A. 领取老龄年金需至少参保10年（120个月）。</p></details><details class="faq-item"><summary>Q. 如何增加年金领取额？</summary><p>A. 可延长参保期限、推迟领取（每延迟1年增加7.2%，最多5年），或补缴漏缴月份。</p></details><details class="faq-item"><summary>Q. 可以提前领取吗？</summary><p>A. 参保10年以上且无收入时可提前最多5年领取，但每月减少0.5%。</p></details><details class="faq-item"><summary>Q. 计算结果准确吗？</summary><p>A. 本计算器使用简化模型，实际金额请向国民年金公团咨询。</p></details><details class="faq-item"><summary>Q. 收入上下限是多少？</summary><p>A. 2024年上限590万韩元，下限37万韩元。超出上限部分按上限计算。</p></details>`},
  ja:{pageTitle:'韓国国民年金計算機 - 2024年保険料・受給額 | MODOO HUB',h1:'国民年金計算機',sub:'2024年韓国国民年金保険料と予想受給額を自動計算',backLink:'← ホーム',langBtn:'🌐 한국어',lblSalary:'月収（万ウォン）',lblAge:'現在の年齢',lblYears:'加入済み年数',lblMyShare:'月間個人負担額',bkBase:'基準所得月額',bkEmployee:'労働者負担（4.5%）',bkEmployer:'事業主負担（4.5%）',bkTotal:'保険料合計（9%）',estTitle:'予想月額老齢年金',est20:'20年加入時',est30:'30年加入時',estFull:'60歳まで納付した場合',notice:'※ 予想額は現在の所得と加入状態が60歳まで継続すると仮定した簡易推定です。実際の金額は国民年金公団でご確認ください。',
    seoHtml:`<h2>韓国国民年金計算機</h2><p>2024年の韓国国民年金保険料率は基準所得月額の<strong>9%</strong>で、労働者と事業主が<strong>4.5%</strong>ずつ負担します。所得上限は<strong>590万ウォン</strong>、下限は<strong>37万ウォン</strong>です。</p><h2 class="seo-sub">よくある質問</h2><details class="faq-item"><summary>Q. 2024年の国民年金料率は？</summary><p>A. 基準所得月額の9%。労働者・事業主各4.5%。地域加入者は全額自己負担。</p></details><details class="faq-item"><summary>Q. 受給開始年齢は？</summary><p>A. 現在63歳（1961〜1964年生まれ）、段階的に65歳に引き上げられます。</p></details><details class="faq-item"><summary>Q. 最低加入期間は？</summary><p>A. 老齢年金受給には最低10年（120ヶ月）の加入が必要です。</p></details><details class="faq-item"><summary>Q. 所得の上下限は？</summary><p>A. 2024年：上限590万ウォン、下限37万ウォン。</p></details><details class="faq-item"><summary>Q. 外国人労働者にも適用されますか？</summary><p>A. 本国との社会保障協定がない外国人労働者は原則として加入義務があります。</p></details><details class="faq-item"><summary>Q. 受給額を増やす方法は？</summary><p>A. 加入期間延長、受給繰り下げ（1年で7.2%増、最大5年）、または未納分の追納で増やせます。</p></details><details class="faq-item"><summary>Q. 早期受給は可能ですか？</summary><p>A. 10年以上加入かつ収入がない場合、最大5年早く受給可能ですが、1ヶ月につき0.5%減額されます。</p></details><details class="faq-item"><summary>Q. 計算精度は？</summary><p>A. 簡易推定モデルを使用しています。正確な金額は国民年金公団にお問い合わせください。</p></details>`}

let currentLang=detectLang();
function detectLang(){const p=new URLSearchParams(location.search).get('lang');if(p&&_i18n[p])return p;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
function applyLang(l){const t=_i18n[l]||_i18n.ko;document.title=t.pageTitle;document.documentElement.lang=l;document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});document.getElementById('seoSection').innerHTML=t.seoHtml;calculate();}
function toggleLang(){const order=['ko','en','zh','ja'];const next=order[(order.indexOf(currentLang)+1)%order.length];currentLang=next;localStorage.setItem('modoo_lang',next);const url=new URL(location.href);url.searchParams.set('lang',next);history.replaceState(null,'',url);applyLang(next);}
function fmt(n){return Math.round(n).toLocaleString()+'원';}

function calculate(){
  const t=_i18n[currentLang]||_i18n.ko;
  const rawSalary=(parseFloat(document.getElementById('salary').value)||0)*10000;
  const age=parseInt(document.getElementById('age').value)||0;
  const enrolledYears=parseFloat(document.getElementById('years').value)||0;
  if(!rawSalary||!age){document.getElementById('result').classList.add('hidden');return;}

  const base=Math.min(MAX_INCOME,Math.max(MIN_INCOME,rawSalary));
  const totalPremium=Math.round(base*RATE);
  const employeePremium=Math.round(base*EMPLOYEE_RATE);
  const employerPremium=totalPremium-employeePremium;

  // 예상 수령액 간략 추산: 월 소득 × 가입기간 × 1% (실제보다 단순화)
  const remainYears=Math.max(0,60-age);
  const totalYears20=Math.max(0,enrolledYears)+20;
  const totalYears30=Math.max(0,enrolledYears)+30;
  const totalYearsFull=enrolledYears+remainYears;
  const est20=Math.round(base*Math.min(totalYears20,42)*0.01/12);
  const est30=Math.round(base*Math.min(totalYears30,42)*0.01/12);
  const estFull=Math.round(base*Math.min(totalYearsFull,42)*0.01/12);

  document.getElementById('myShare').textContent=fmt(employeePremium);
  document.getElementById('resGrid').innerHTML=`
    <div class="res-card"><span class="res-label">${t.bkBase}</span><span class="res-val">${fmt(base)}</span></div>
    <div class="res-card"><span class="res-label">${t.bkEmployee}</span><span class="res-val accent">${fmt(employeePremium)}</span></div>
    <div class="res-card"><span class="res-label">${t.bkEmployer}</span><span class="res-val">${fmt(employerPremium)}</span></div>
    <div class="res-card"><span class="res-label">${t.bkTotal}</span><span class="res-val">${fmt(totalPremium)}</span></div>
  `;
  document.getElementById('pensionEst').innerHTML=`
    <div class="pension-est-title">📊 ${t.estTitle}</div>
    <div class="pension-row"><span>${t.est20}</span><span>${fmt(est20)}/월</span></div>
    <div class="pension-row"><span>${t.est30}</span><span>${fmt(est30)}/월</span></div>
    <div class="pension-row"><span>${t.estFull}</span><span>${fmt(estFull)}/월</span></div>
  `;
  document.getElementById('result').classList.remove('hidden');
}

document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));
</script>
