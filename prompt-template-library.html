:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#252525;--accent:#fbbf24;--accent2:#f59e0b;--text:#f5f5f5;--text-muted:#888;--text-dim:#444;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#c084fc;}
*{box-sizing:border-box;margin:0;padding:0;}

main{max-width:900px;margin:0 auto;padding:36px 20px 60px;}
h1{font-size:clamp(22px,4vw,32px);font-weight:900;margin-bottom:6px;}

.sub{font-size:13px;color:var(--text-muted);margin-bottom:20px;}
.search-row{display:flex;gap:10px;margin-bottom:14px;}
.search-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;}
.search-input:focus{border-color:var(--accent);}
.cat-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;color:var(--text-muted);cursor:pointer;background:var(--surface);transition:all .15s;}
.chip:hover,.chip.active{background:var(--accent);color:#000;border-color:var(--accent);}
.template-grid{display:grid;gap:10px;}
.tpl-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:border-color .15s;}
.tpl-card:hover{border-color:var(--accent);}
.tpl-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.tpl-icon{font-size:20px;flex-shrink:0;}
.tpl-meta{flex:1;}
.tpl-title{font-size:14px;font-weight:700;margin-bottom:2px;}
.tpl-cat{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.tpl-body{font-size:12px;color:var(--text-muted);line-height:1.7;white-space:pre-wrap;font-family:'DM Mono',monospace;max-height:80px;overflow:hidden;position:relative;}
.tpl-body.expanded{max-height:none;}
.tpl-fade{position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent,var(--surface));}
.tpl-actions{display:flex;gap:8px;margin-top:10px;}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;}
.btn-primary{background:var(--accent);color:#000;}
.btn-sec{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
.btn-sec:hover{border-color:var(--accent);}
.empty{text-align:center;color:var(--text-dim);padding:40px;font-size:13px;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:14px;}
.seo strong{color:var(--text-muted);}
.seo-sub{font-size:14px;font-weight:700;margin:16px 0 8px;color:var(--text-muted);}
details.faq-item{border:1px solid var(--border);border-radius:6px;margin-bottom:8px;}
details.faq-item summary{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-muted);list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item[open] summary{border-bottom:1px solid var(--border);}
details.faq-item p{padding:10px 14px;font-size:13px;color:var(--text-dim);line-height:1.8;}

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1Accent').textContent=t.h1Accent;
  document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('searchInput').placeholder=t.searchPh;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  renderCats();render();
}
function renderCats(){
  const cats=CATS[_lang];
  document.getElementById('catChips').innerHTML=Object.entries(cats).map(([k,v])=>
    `<button class="chip${_activeCat===k?' active':''}" onclick="setCat('${k}')">${v}</button>`
  ).join('');
}
function setCat(cat){_activeCat=cat;renderCats();render();}
function render(){
  const t=_i18n[_lang];
  const q=document.getElementById('searchInput').value.toLowerCase();
  const tpls=(TEMPLATES[_lang]||TEMPLATES.ko).filter(tpl=>{
    if(_activeCat!=='all'&&tpl.cat!==_activeCat)return false;
    if(q&&!tpl.title.toLowerCase().includes(q)&&!tpl.body.toLowerCase().includes(q))return false;
    return true;
  });
  if(!tpls.length){document.getElementById('tplGrid').innerHTML=`<div class="empty">${t.empty}</div>`;return;}
  document.getElementById('tplGrid').innerHTML=tpls.map((tpl,i)=>`
    <div class="tpl-card" id="card${i}">
      <div class="tpl-header">
        <div class="tpl-icon">${tpl.icon}</div>
        <div class="tpl-meta">
          <div class="tpl-title">${tpl.title}</div>
          <div class="tpl-cat">${CATS[_lang][tpl.cat]||tpl.cat}</div>
        </div>
      </div>
      <div class="tpl-body" id="body${i}">${tpl.body.replace(/</g,'&lt;').replace(/>/g,'&gt;')}<div class="tpl-fade" id="fade${i}"></div></div>
      <div class="tpl-actions">
        <button class="btn btn-primary" onclick="copyTpl(${i})" id="btnCopy${i}">${t.btnCopy}</button>
        <button class="btn btn-sec" onclick="toggleExpand(${i})" id="btnExp${i}">${t.btnExpand}</button>
      </div>
    </div>`).join('');
  window._tpls=tpls;
}
function copyTpl(i){
  const t=_i18n[_lang];
  navigator.clipboard.writeText(window._tpls[i].body).then(()=>{
    const b=document.getElementById('btnCopy'+i);
    b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,2000);
  });
}
function toggleExpand(i){
  const t=_i18n[_lang];
  const body=document.getElementById('body'+i);
  const btn=document.getElementById('btnExp'+i);
  const fade=document.getElementById('fade'+i);
  const expanded=body.classList.toggle('expanded');
  btn.textContent=expanded?t.btnCollapse:t.btnExpand;
  if(fade)fade.style.display=expanded?'none':'block';
}
_lang=detectLang();applyLang();
