.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:44px 20px;text-align:center;cursor:pointer;transition:all .2s;}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:rgba(96,165,250,.05);}
.drop-icon{font-size:38px;margin-bottom:10px;}
.drop-text{font-size:14px;color:var(--text-muted);}
.drop-hint{font-size:12px;color:var(--text-dim);margin-top:5px;font-family:'DM Mono',monospace;}
input[type=file]{display:none;}
.file-list{margin-top:14px;display:flex;flex-direction:column;gap:6px;}
.file-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:grab;user-select:none;}
.file-item.dragging{opacity:.5;border-style:dashed;}
.file-item.drag-over{border-color:var(--accent);}
.fi-num{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;min-width:20px;text-align:center;}
.fi-thumb{width:36px;height:36px;object-fit:cover;border-radius:4px;flex-shrink:0;}
.fi-name{flex:1;font-size:13px;font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi-size{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.fi-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:15px;padding:2px 5px;}
.fi-del:hover{color:var(--accent);}
.opts{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:14px;display:none;}
.opt-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.opt-row:last-child{margin-bottom:0;}
.opt-label{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;min-width:70px;}
select.sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;}
.conv-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-top:4px;}
.conv-btn:hover{opacity:.85;}
.progress{background:var(--surface2);border-radius:6px;height:6px;margin-top:12px;overflow:hidden;display:none;}
.progress-bar{height:100%;background:var(--accent);border-radius:6px;transition:width .2s;}
.result{margin-top:14px;display:none;}
.dl-btn{width:100%;padding:12px;border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-family:'DM Mono',monospace;font-size:14px;cursor:pointer;background:none;font-weight:700;}
.dl-btn:hover{background:rgba(96,165,250,.1);}
.info-badge{font-size:12px;color:var(--text-dim);font-family:'DM Mono',monospace;text-align:center;margin-top:6px;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<script>
const _i18n={
  ko:{sub:'여러 이미지를 PDF로 변환 · A4/Letter/이미지 크기 · 드래그로 순서 변경',langBtn:'🌐 EN',backBtn:'← 모두의 툴',dropText:'이미지를 드래그하거나 클릭해서 추가',pageLabel:'페이지',margLabel:'여백',convBtn:'▶ PDF 만들기',dlBtn:'⬇ PDF 다운로드',seoHtml:'<h2>이미지 to PDF 변환기란?</h2><p>여러 이미지(JPEG·PNG·GIF·WebP)를 <strong>하나의 PDF 파일</strong>로 변환합니다. pdf-lib 라이브러리를 사용해 브라우저에서 직접 처리하므로 서버 업로드가 없습니다. A4·Letter·이미지 원본 크기 중 페이지 크기를 선택할 수 있고, 드래그로 순서를 변경할 수 있습니다.</p><h2>자주 묻는 질문 (FAQ)</h2><details class="faq-item"><summary>지원하는 이미지 형식은?</summary><p>JPEG·PNG·GIF·WebP를 지원합니다. 이미지 파일을 드래그 앤 드롭하거나 클릭해 선택하면 됩니다.</p></details><details class="faq-item"><summary>이미지 개수 제한이 있나요?</summary><p>브라우저 메모리 한도 내에서 제한 없이 추가할 수 있습니다. 다만 고해상도 이미지를 많이 추가하면 처리 속도가 느려질 수 있습니다.</p></details><details class="faq-item"><summary>페이지 크기는 어떻게 설정하나요?</summary><p>A4(210×297mm), Letter(216×279mm), 이미지 크기(원본 픽셀 기준) 세 가지 중 선택할 수 있습니다.</p></details><details class="faq-item"><summary>이미지 순서를 바꿀 수 있나요?</summary><p>네. 썸네일을 드래그 앤 드롭해 PDF 페이지 순서를 변경할 수 있습니다.</p></details><details class="faq-item"><summary>서버에 이미지가 업로드되나요?</summary><p>아니요. 모든 처리는 브라우저 내에서만 이루어집니다. 이미지가 외부 서버로 전송되지 않아 개인정보가 보호됩니다.</p></details><details class="faq-item"><summary>PDF 품질을 조절할 수 있나요?</summary><p>이미지 자체의 해상도가 PDF 품질을 결정합니다. 선명한 PDF를 원한다면 300DPI 이상의 고해상도 이미지를 사용하세요. PDF로 변환 시 이미지 원본 화질이 유지됩니다.</p></details><details class="faq-item"><summary>이미지 여러 장을 한 PDF로 합치면 페이지 크기는 어떻게 되나요?</summary><p>각 이미지가 별도 페이지로 삽입됩니다. 기본적으로 각 이미지의 가로세로 비율에 맞게 페이지 크기가 설정됩니다. A4 고정 크기가 필요하면 해당 옵션을 선택하세요.</p></details><details class="faq-item"><summary>변환된 PDF의 텍스트를 검색할 수 있나요?</summary><p>이미지를 PDF로 변환할 경우 텍스트는 이미지로 존재하므로 검색이 불가합니다. 텍스트 검색이 가능한 PDF가 필요하다면 OCR(광학 문자 인식) 변환을 추가로 거쳐야 합니다.</p></details>'},
  en:{sub:'Convert multiple images to PDF · A4 / Letter / fit · Drag to reorder',langBtn:'🌐 中文',backBtn:'← All Tools',dropText:'Drag & drop or click to add images',pageLabel:'Page',margLabel:'Margin',convBtn:'▶ Create PDF',dlBtn:'⬇ Download PDF',seoHtml:'<h2>Image to PDF Converter</h2><p>Convert multiple images (JPEG, PNG, GIF, WebP) into a <strong>single PDF file</strong> directly in the browser using pdf-lib — no server upload required. Choose between A4, Letter, or image-native page sizes, and drag to reorder pages before generating.</p><h2>FAQ</h2><details class="faq-item"><summary>Which image formats are supported?</summary><p>JPEG, PNG, GIF, and WebP are supported. Drag & drop files or click to select them.</p></details><details class="faq-item"><summary>Is there a limit on the number of images?</summary><p>No hard limit — you can add as many as browser memory allows. Processing may slow with many high-resolution images.</p></details><details class="faq-item"><summary>What page size options are available?</summary><p>A4 (210×297 mm), Letter (216×279 mm), and image-native size (matching each image\'s pixel dimensions).</p></details><details class="faq-item"><summary>Can I reorder images before creating the PDF?</summary><p>Yes. Drag the image thumbnails to rearrange the page order before clicking "Create PDF".</p></details><details class="faq-item"><summary>Are my images uploaded to a server?</summary><p>No. All processing happens locally in your browser using pdf-lib. Your images never leave your device.</p></details><details class="faq-item"><summary>Can I control the PDF output quality?</summary><p>The resolution of your source images determines the PDF quality. Use 300 DPI or higher images for sharp output. The tool preserves original image quality during conversion.</p></details><details class="faq-item"><summary>What page size is used when combining multiple images into one PDF?</summary><p>Each image becomes a separate page, sized to match the image aspect ratio. Select the A4 fixed-size option if you need uniform page dimensions.</p></details><details class="faq-item"><summary>Is text searchable in the converted PDF?</summary><p>Images converted to PDF are raster content — text within images is not searchable. To create a searchable PDF you would need an additional OCR (optical character recognition) step.</p></details>'},
  zh:{sub:'将多张图片转换为PDF · A4/Letter/图片大小 · 拖动排序',langBtn:'🌐 日本語',backBtn:'← 所有工具',dropText:'拖放或点击添加图片',pageLabel:'页面',margLabel:'边距',convBtn:'▶ 创建PDF',dlBtn:'⬇ 下载PDF',seoHtml:'<h2>图片转PDF工具</h2><p>使用pdf-lib在浏览器中直接将多张图片（JPEG、PNG、GIF、WebP）合并为<strong>一个PDF文件</strong>，无需上传至服务器。支持A4、Letter和图片原始大小，可拖动缩略图调整页面顺序。</p><h2>常见问题 (FAQ)</h2><details class="faq-item"><summary>支持哪些图片格式？</summary><p>支持JPEG、PNG、GIF和WebP格式。可拖放文件或点击选择。</p></details><details class="faq-item"><summary>图片数量有限制吗？</summary><p>没有硬性限制，受浏览器内存上限约束。添加大量高分辨率图片时处理速度可能变慢。</p></details><details class="faq-item"><summary>页面尺寸有哪些选项？</summary><p>A4（210×297mm）、Letter（216×279mm）和图片原始尺寸（按各图片像素大小）。</p></details><details class="faq-item"><summary>可以调整图片顺序吗？</summary><p>可以。创建PDF前拖动缩略图即可调整页面顺序。</p></details><details class="faq-item"><summary>图片会上传到服务器吗？</summary><p>不会。所有处理均在浏览器本地完成，图片不会离开您的设备。</p></details><details class="faq-item"><summary>可以控制PDF输出质量吗？</summary><p>PDF质量由原始图片的分辨率决定。建议使用300DPI以上的高分辨率图片，转换时原始画质会被保留。</p></details><details class="faq-item"><summary>多张图片合并为一个PDF时，页面大小如何设置？</summary><p>每张图片各成一页，页面大小默认按图片宽高比设置。如需统一A4尺寸请选择对应选项。</p></details><details class="faq-item"><summary>转换后的PDF中文字可以搜索吗？</summary><p>图片转PDF后文字以图像形式存在，无法直接搜索。如需可搜索的PDF，需额外进行OCR（光学字符识别）处理。</p></details>'},
  ja:{sub:'複数の画像を PDF に変換 · A4/Letter/画像サイズ · ドラッグで順序変更',langBtn:'🌐 한국어',backBtn:'← ホーム',dropText:'画像をドラッグまたはクリックして追加',pageLabel:'ページ',margLabel:'余白',convBtn:'▶ PDF を作成',dlBtn:'⬇ PDF をダウンロード',seoHtml:'<h2>Image to PDF とは？</h2><p>pdf-libを使用してブラウザ内で複数の画像（JPEG・PNG・GIF・WebP）を<strong>1つのPDF</strong>に変換します。サーバーへのアップロード不要。A4・Letter・画像サイズに対応し、ドラッグでページ順序を変更できます。</p><h2>よくある質問 (FAQ)</h2><details class="faq-item"><summary>対応している画像形式は？</summary><p>JPEG・PNG・GIF・WebPに対応しています。ファイルをドラッグ＆ドロップするか、クリックして選択します。</p></details><details class="faq-item"><summary>画像の枚数に制限はありますか？</summary><p>ブラウザのメモリ制限内であれば制限はありません。高解像度の画像を多数追加すると処理が遅くなる場合があります。</p></details><details class="faq-item"><summary>ページサイズの選択肢は？</summary><p>A4（210×297mm）・Letter（216×279mm）・画像サイズ（各画像のピクセル寸法に合わせる）の3種類から選択できます。</p></details><details class="faq-item"><summary>画像の順序を変更できますか？</summary><p>はい。サムネイルをドラッグ＆ドロップしてPDF作成前にページ順序を変更できます。</p></details><details class="faq-item"><summary>画像はサーバーにアップロードされますか？</summary><p>いいえ。すべての処理はブラウザ内のみで完結します。画像がデバイス外に送信されることはありません。</p></details><details class="faq-item"><summary>PDF出力の品質を調整できますか？</summary><p>ソース画像の解像度がPDF品質を決定します。鮮明なPDFには300DPI以上の画像を使用してください。変換時に元の画質が維持されます。</p></details><details class="faq-item"><summary>複数画像を1つのPDFにまとめる際のページサイズは？</summary><p>各画像が別ページになり、サイズは画像のアスペクト比に合わせて設定されます。統一されたA4サイズが必要な場合は該当オプションを選択してください。</p></details><details class="faq-item"><summary>変換したPDFのテキストは検索できますか？</summary><p>画像をPDFに変換すると文字はラスター画像として存在するため検索できません。検索可能なPDFには別途OCR処理が必要です。</p></details>'},
};
const PAGE_SIZES={a4:[595.28,841.89],letter:[612,792]};
let _lang='ko',_files=[],_dragIdx=null,_pdfBlob=null;
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function fmtSize(b){return b>1024*1024?(b/1024/1024).toFixed(2)+' MB':(b/1024).toFixed(0)+' KB';}
function ev(e,type){e.preventDefault();const dz=document.getElementById('dropZone');if(type==='over')dz.classList.add('over');else if(type==='leave')dz.classList.remove('over');else{dz.classList.remove('over');addFiles(e.dataTransfer.files);}}
function onFiles(e){addFiles(e.target.files);}
function addFiles(list){_files=[..._files,...[...list].filter(f=>f.type.startsWith('image/'))];renderList();}
function renderList(){
  const ul=document.getElementById('fileList');ul.innerHTML='';
  _files.forEach((f,i)=>{
    const item=document.createElement('div');item.className='file-item';item.draggable=true;
    const url=URL.createObjectURL(f);
    item.innerHTML=`<span class="fi-num">${i+1}</span><img class="fi-thumb" src="${url}"><span class="fi-name">${f.name}</span><span class="fi-size">${fmtSize(f.size)}</span><button class="fi-del" onclick="removeFile(${i})">✕</button>`;
    item.addEventListener('dragstart',()=>{_dragIdx=i;item.classList.add('dragging');});
    item.addEventListener('dragend',()=>item.classList.remove('dragging'));
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{e.preventDefault();item.classList.remove('drag-over');if(_dragIdx!==null&&_dragIdx!==i){const mv=_files.splice(_dragIdx,1)[0];_files.splice(i,0,mv);renderList();}});
    ul.appendChild(item);
  });
  document.getElementById('opts').style.display=_files.length?'block':'none';
  document.getElementById('result').style.display='none';
}
function removeFile(i){_files.splice(i,1);renderList();}
function loadImageBitmap(file){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=e.target.result;};r.onerror=rej;r.readAsDataURL(file);});
}
async function convert(){
  if(!_files.length)return;
  const psKey=document.getElementById('pageSize').value;
  const margin=parseInt(document.getElementById('margin').value);
  const prog=document.getElementById('progress');prog.style.display='block';
  const bar=document.getElementById('progressBar');bar.style.width='0%';
  document.getElementById('result').style.display='none';
  try{
    const pdf=await PDFLib.PDFDocument.create();
    for(let i=0;i<_files.length;i++){
      bar.style.width=Math.round(i/_files.length*90)+'%';
      const img=await loadImageBitmap(_files[i]);
      const iw=img.naturalWidth,ih=img.naturalHeight;
      const canvas=document.createElement('canvas');canvas.width=iw;canvas.height=ih;
      canvas.getContext('2d').drawImage(img,0,0);
      const pngBytes=await new Promise(r=>canvas.toBlob(b=>b.arrayBuffer().then(r),'image/png'));
      const pngImg=await pdf.embedPng(pngBytes);
      let pw,ph;
      if(psKey==='fit'){pw=iw;ph=ih;}
      else{[pw,ph]=PAGE_SIZES[psKey];}
      const page=pdf.addPage([pw,ph]);
      const avW=pw-margin*2,avH=ph-margin*2;
      const scale=Math.min(avW/iw,avH/ih,1);
      const dw=iw*scale,dh=ih*scale;
      const x=(pw-dw)/2,y=(ph-dh)/2;
      page.drawImage(pngImg,{x,y,width:dw,height:dh});
    }
    bar.style.width='100%';
    const bytes=await pdf.save();
    _pdfBlob=new Blob([bytes],{type:'application/pdf'});
    document.getElementById('resultInfo').textContent=`${_files.length} image${_files.length>1?'s':''} → ${fmtSize(_pdfBlob.size)} · ${pdf.getPageCount()} pages`;
    const dlBtn=document.getElementById('dlBtn');
    dlBtn.onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(_pdfBlob);a.download='images.pdf';a.click();};
    document.getElementById('result').style.display='block';
  }catch(e){alert('Error: '+e.message);}
  finally{setTimeout(()=>{prog.style.display='none';bar.style.width='0%';},600);}
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
</body>
