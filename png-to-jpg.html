    seoHtml:`<h2>PNG를 JPG로 변환하는 이유</h2><p><strong>PNG</strong>는 무손실 압축으로 투명도를 완벽히 지원하지만, 사진과 같은 복잡한 이미지에서는 파일 크기가 매우 커집니다. <strong>JPG</strong>는 손실 압축을 사용해 사진 이미지에서 PNG 대비 60~80% 작은 파일 크기를 실현합니다. 이메일 첨부, 웹 업로드, 소셜 미디어 공유 등 빠른 전송이 필요한 경우 JPG 변환이 효과적입니다. 이 도구는 서버 전송 없이 브라우저 내 Canvas API로 처리하며, 투명도가 있는 PNG는 선택한 배경색으로 채워집니다.</p><h2>자주 묻는 질문 (FAQ)</h2><details class="faq-item"><summary>PNG와 JPG의 차이점은 무엇인가요?</summary><p>PNG는 무손실 압축으로 투명도(알파 채널)를 지원하며, 텍스트·로고·스크린샷에 적합합니다. JPG는 손실 압축으로 투명도를 지원하지 않으며, 사진처럼 색상이 복잡한 이미지에서 훨씬 작은 파일 크기를 제공합니다.</p></details><details class="faq-item"><summary>JPG를 사용해야 할 때 vs PNG를 사용해야 할 때는?</summary><p>JPG: 사진, 풍경, 인물 이미지 등 자연스러운 색상 그라데이션이 많은 경우. PNG: 로고, 아이콘, 스크린샷, 투명 배경이 필요한 경우, 텍스트가 포함된 이미지.</p></details><details class="faq-item"><summary>JPG 파일이 PNG보다 작은 이유는?</summary><p>JPG는 사람의 눈이 잘 인식하지 못하는 색상 차이 정보를 제거하는 손실 압축을 사용합니다. 같은 이미지라도 JPG는 PNG보다 60~80% 작은 파일을 만들 수 있습니다.</p></details><details class="faq-item"><summary>품질과 파일 크기의 관계는?</summary><p>품질이 높을수록 파일 크기가 커지고 화질 손실이 줄어듭니다. 웹 사용 목적으로는 85~90%가 일반적으로 권장됩니다. 60% 이하로 설정하면 눈에 보이는 블록 현상(아티팩트)이 발생할 수 있습니다.</p></details><details class="faq-item"><summary>투명도가 있는 PNG를 JPG로 변환하면 어떻게 되나요?</summary><p>JPG는 투명도를 지원하지 않으므로, 투명 영역은 선택한 배경색으로 채워집니다. 기본값은 흰색(#ffffff)입니다. 배경색 피커에서 원하는 색상을 선택할 수 있습니다.</p></details><details class="faq-item"><summary>스크린샷을 JPG로 변환하면 텍스트가 흐릿해지나요?</summary><p>텍스트, 선, 날카로운 경계가 있는 이미지는 JPG 압축 시 아티팩트가 생겨 흐릿해질 수 있습니다. 스크린샷이나 다이어그램은 PNG가 더 적합합니다. 사진 이미지라면 JPG 변환이 효과적입니다.</p></details><details class="faq-item"><summary>프로그레시브 JPG와 기본 JPG의 차이는?</summary><p>기본(Baseline) JPG는 위에서 아래로 순차적으로 로드됩니다. 프로그레시브(Progressive) JPG는 먼저 전체 이미지의 저해상도 버전을 표시하고 점차 선명해집니다. 이 도구는 Canvas API의 기본 출력 방식을 사용합니다.</p></details><details class="faq-item"><summary>변환 시 EXIF 메타데이터가 유지되나요?</summary><p>Canvas API를 통한 변환 과정에서 EXIF 메타데이터(GPS 위치, 카메라 정보, 촬영 날짜 등)는 기본적으로 제거됩니다. 개인정보 보호 측면에서는 유리하지만 메타데이터가 필요한 경우 전문 도구를 사용하세요.</p></details>`

    seoHtml:`<h2>PNG to JPG Conversion</h2><p><strong>PNG</strong> uses lossless compression and supports transparency, making it ideal for logos and graphics — but results in large files for photographs. <strong>JPG</strong> uses lossy compression and produces files 60–80% smaller for photographic content, making it the format of choice for email attachments, web uploads, and social media sharing. Transparent areas in PNG are filled with the background color you choose (default: white) since JPG does not support transparency. All processing happens locally in your browser via the Canvas API — no files are uploaded.</p><h2>Frequently Asked Questions</h2><details class="faq-item"><summary>What is the difference between PNG and JPG?</summary><p>PNG uses lossless compression and supports transparency (alpha channel), making it ideal for logos, icons, and screenshots. JPG uses lossy compression with no transparency support, but delivers much smaller files for photographs with complex color gradients.</p></details><details class="faq-item"><summary>When should I use JPG vs PNG?</summary><p>Use JPG for photographs, landscapes, and images with natural color gradients where file size matters. Use PNG for logos, icons, screenshots, transparent backgrounds, and images containing text where sharpness is critical.</p></details><details class="faq-item"><summary>Why is JPG smaller than PNG?</summary><p>JPG uses lossy compression that discards subtle color variations imperceptible to the human eye. This can reduce file size by 60–80% compared to PNG for the same photographic image while maintaining acceptable visual quality.</p></details><details class="faq-item"><summary>How does quality affect file size?</summary><p>Higher quality means larger files with less visible compression. For web use, 85–90% offers an excellent balance. Below 70%, block artifacts (JPEG banding) become increasingly visible. The default of 90% is a safe starting point for most use cases.</p></details><details class="faq-item"><summary>What happens to transparency when converting PNG to JPG?</summary><p>JPG does not support transparency. Transparent areas are filled with the background color you choose in the color picker (default: white). If your PNG has transparency, set the background to match your page or design background before converting.</p></details><details class="faq-item"><summary>Will screenshots look blurry when converted to JPG?</summary><p>Images with text, lines, or sharp edges can exhibit JPEG artifacts (blurriness or ringing) around those edges. Screenshots and diagrams are better kept as PNG. Convert to JPG only for photographic content where slight quality loss is acceptable.</p></details><details class="faq-item"><summary>What is the difference between progressive and baseline JPG?</summary><p>Baseline JPG loads top-to-bottom sequentially. Progressive JPG renders a low-resolution version first, then sharpens progressively — often better for web. This tool uses the browser's Canvas API default JPEG output.</p></details><details class="faq-item"><summary>Is EXIF metadata preserved during conversion?</summary><p>No. The Canvas API strips EXIF metadata (GPS location, camera settings, date taken) during conversion. This is a privacy benefit. If you need to preserve EXIF data, use a dedicated metadata-preserving tool.</p></details>`

    transparencyNote:'含透明背景的PNG将以所选背景色填充',
    seoHtml:`<h2>PNG转JPG工具</h2><p><strong>PNG</strong>采用无损压缩并支持透明背景，适合Logo和图标，但照片文件体积较大。<strong>JPG</strong>采用有损压缩，照片内容可比PNG小60–80%，适合邮件附件、网页上传和社交分享。由于JPG不支持透明度，PNG的透明区域将用所选背景色填充（默认白色）。本工具通过Canvas API在浏览器中直接处理，文件不会上传至任何服务器。</p><h2>常见问题</h2><details class="faq-item"><summary>PNG和JPG有什么区别？</summary><p>PNG采用无损压缩并支持透明度，适合Logo、图标和截图。JPG采用有损压缩，不支持透明度，但对照片类内容文件体积小得多。</p></details><details class="faq-item"><summary>什么时候用JPG，什么时候用PNG？</summary><p>JPG：照片、风景、自然色彩丰富且注重文件大小的场景。PNG：Logo、图标、截图、需要透明背景或包含文字的图片。</p></details><details class="faq-item"><summary>为什么JPG比PNG小？</summary><p>JPG使用有损压缩，丢弃人眼难以察觉的细微色差，可将同一照片的文件大小减少60–80%，同时保持可接受的视觉质量。</p></details><details class="faq-item"><summary>质量对文件大小的影响是什么？</summary><p>质量越高，文件越大，压缩失真越少。网页使用建议85–90%，低于70%时JPEG块状失真（瑕疵）会明显增多。默认90%对大多数场景是安全的起始点。</p></details><details class="faq-item"><summary>含透明背景的PNG转JPG会怎样？</summary><p>JPG不支持透明度，透明区域将用颜色选择器中选定的背景色填充（默认白色）。如果PNG有透明背景，建议设置与目标页面或设计背景相匹配的颜色。</p></details><details class="faq-item"><summary>截图转JPG后文字会模糊吗？</summary><p>含文字、线条或锐利边缘的图片转JPG时，这些区域可能出现JPEG瑕疵（模糊或振铃效应）。截图和图表建议保留PNG格式，照片类内容才适合转JPG。</p></details><details class="faq-item"><summary>渐进式JPG和基线JPG有什么区别？</summary><p>基线JPG从上到下顺序加载；渐进式JPG先显示低分辨率版本再逐渐清晰，通常更适合网页。本工具使用浏览器Canvas API的默认JPEG输出方式。</p></details><details class="faq-item"><summary>转换时EXIF元数据会保留吗？</summary><p>不会。Canvas API转换过程中会去除EXIF元数据（GPS位置、相机参数、拍摄日期等），有助于保护隐私。如需保留EXIF，请使用专用元数据工具。</p></details>`
  },
  ja:{

    backLink:'← ホーム',

    dropLabel:'PNGファイルをここにドラッグまたはクリック',
    dropLabelSub:'.pngファイル · 複数ファイル対応',
    btnSelectFiles:'+ ファイル追加',
    btnConvertAll:'▶ 変換',
    btnDownloadAll:'⬇ 全てダウンロード',
    btnClear:'✕ クリア',
    btnDownload:'↓ 保存',
    labelQuality:'品質',
    labelBgColor:'背景色',
    colFile:'ファイル',
    colOrigSize:'元のサイズ',
    colNewSize:'変換後',

    statusConverting:'変換中...',
    statusDone:'✓ 完了',

    transparencyNote:'透過PNG は選択した背景色で塗りつぶされます',
    seoHtml:`<h2>PNG to JPGとは</h2><p><strong>PNG</strong>は可逆圧縮で透過に対応しロゴやアイコンに最適ですが、写真では大きいファイルになります。<strong>JPG</strong>は非可逆圧縮で写真コンテンツをPNG比60–80%小さくでき、メール添付・Web・SNSシェアに適しています。JPGは透過非対応のため、PNGの透過部分は選択した背景色（デフォルト:白）で塗りつぶされます。Canvas APIでブラウザ内のみ処理し、ファイルはサーバーに送信されません。</p><h2>よくある質問 (FAQ)</h2><details class="faq-item"><summary>PNGとJPGの違いは何ですか？</summary><p>PNGは可逆圧縮で透過（アルファチャンネル）をサポートし、ロゴ・アイコン・スクリーンショットに適しています。JPGは非可逆圧縮で透過非対応ですが、写真では大幅に小さいファイルを実現します。</p></details><details class="faq-item"><summary>JPGとPNGをどう使い分ければいいですか？</summary><p>JPG：写真・風景・自然な色のグラデーションが多く、ファイルサイズ重視の場合。PNG：ロゴ・アイコン・スクリーンショット・透過背景・テキストを含む画像で鮮明さが必要な場合。</p></details><details class="faq-item"><summary>JPGがPNGより小さいのはなぜですか？</summary><p>JPGは人間の目では気づきにくい微細な色差情報を削除する非可逆圧縮を使用します。同じ写真でもJPGはPNGより60–80%小さいファイルを生成できます。</p></details><details class="faq-item"><summary>品質とファイルサイズの関係は？</summary><p>品質が高いほどファイルは大きく圧縮劣化が少なくなります。Web用には85–90%が推奨です。70%未満ではJPEGブロックノイズ（アーティファクト）が目立つようになります。</p></details><details class="faq-item"><summary>透過PNGをJPGに変換するとどうなりますか？</summary><p>JPGは透過をサポートしないため、透過部分はカラーピッカーで選択した背景色（デフォルト:白）で塗りつぶされます。デザインの背景色に合わせた色を設定してから変換することをお勧めします。</p></details><details class="faq-item"><summary>スクリーンショットをJPGに変換すると文字がぼやけますか？</summary><p>テキスト・線・鋭いエッジを含む画像はJPE圧縮でアーティファクト（にじみ）が生じやすいです。スクリーンショットや図表はPNGのまま保持を推奨します。写真コンテンツならJPG変換が効果的です。</p></details><details class="faq-item"><summary>プログレッシブJPGとベースラインJPGの違いは？</summary><p>ベースラインJPGは上から下へ順次読み込みます。プログレッシブJPGは全体を低解像度で表示してから徐々に鮮明になり、Web向けに有利です。本ツールはCanvas APIのデフォルトJPEG出力を使用します。</p></details><details class="faq-item"><summary>変換時にEXIFメタデータは保持されますか？</summary><p>いいえ。Canvas API変換ではEXIFメタデータ（GPS位置・カメラ設定・撮影日時）がデフォルトで削除されます。プライバシー保護の観点でメリットがあります。EXIFを保持したい場合は専用ツールをお使いください。</p></details>`

let _lang='ko', _files=[], _results=[];
const LANGS=['ko','en','zh','ja'];

function detectLang(){
  const u=new URLSearchParams(location.search).get('lang');
  if(u&&_i18n[u])return u;
  const s=localStorage.getItem('modoo_lang');
  if(s&&_i18n[s])return s;
  const n=navigator.language?.slice(0,2);
  return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';
}
function cycleLang(){
  const idx=LANGS.indexOf(_lang);
  _lang=LANGS[(idx+1)%LANGS.length];
  localStorage.setItem('modoo_lang',_lang);
  const url=new URL(location.href);
  if(_lang==='ko')url.searchParams.delete('lang');else url.searchParams.set('lang',_lang);
  history.replaceState({},'',url);
  applyLang();
}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.title=t.pageTitle;
  document.querySelector('h1').innerHTML=t.h1;
  document.getElementById('subText').textContent=t.sub;
  document.getElementById('backBtn').innerHTML=t.backLink;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('dropLabel').textContent=t.dropLabel;
  document.getElementById('dropLabelSub').textContent=t.dropLabelSub;
  document.getElementById('btnSelectFiles').textContent=t.btnSelectFiles;
  document.getElementById('btnConvertAll').textContent=t.btnConvertAll;
  document.getElementById('btnDownloadAll').textContent=t.btnDownloadAll;
  document.getElementById('btnClear').textContent=t.btnClear;
  document.getElementById('labelQuality').textContent=t.labelQuality;
  document.getElementById('labelBgColor').textContent=t.labelBgColor;
  document.getElementById('transparencyNote').textContent=t.transparencyNote;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  renderList();
}

function fmtSize(b){return b>1024*1024?(b/1024/1024).toFixed(2)+' MB':(b/1024).toFixed(1)+' KB';}

function ev(e,type){
  e.preventDefault();
  const dz=document.getElementById('dropZone');
  if(type==='over')dz.classList.add('over');
  else if(type==='leave')dz.classList.remove('over');
  else{dz.classList.remove('over');addFiles(e.dataTransfer.files);}
}
function onFiles(e){addFiles(e.target.files);}
function addFiles(fileList){
  const toAdd=[...fileList].filter(f=>f.type==='image/png'||f.name.toLowerCase().endsWith('.png'));
  _files=[..._files,...toAdd];
  _results=new Array(_files.length).fill(null);
  if(_files.length){
    document.getElementById('optsPanel').style.display='block';
    document.getElementById('transparencyNote').style.display='block';
  }
  renderList();
}

function renderList(){
  const t=_i18n[_lang];
  const list=document.getElementById('fileList');
  list.innerHTML='';
  _files.forEach((f,i)=>{
    const item=document.createElement('div');
    item.className='file-item';
    const res=_results[i];
    const thumbUrl=URL.createObjectURL(f);
    let statusClass='wait', statusText='-';
    if(res==='converting'){statusClass='converting';statusText=t.statusConverting;}
    else if(res==='error'){statusClass='error';statusText=t.statusError;}
    else if(res&&res.size){statusClass='done';statusText=t.statusDone;}
    let sizesHtml=fmtSize(f.size);
    let savingsHtml='';
    if(res&&res.size){
      const saved=f.size-res.size;
      const pct=Math.round(saved/f.size*100);
      sizesHtml+=` → ${fmtSize(res.size)}`;
      if(saved>0){
        savingsHtml=`<div class="file-savings saved">▼ ${pct}% ${t.colSavings}</div>`;
      } else {
        savingsHtml=`<div class="file-savings larger">▲ ${Math.abs(pct)}%</div>`;
      }
    }
    const dlBtn=res&&res.size?`<button class="dl-item-btn" onclick="dlOne(${i})">${t.btnDownload}</button>`:'';
    item.innerHTML=`<img class="file-thumb" src="${thumbUrl}" onload="URL.revokeObjectURL(this.src)"><div class="file-info"><div class="file-name">${f.name}</div><div class="file-sizes">${sizesHtml}</div>${savingsHtml}</div><span class="file-status ${statusClass}">${statusText}</span>${dlBtn}`;
    list.appendChild(item);
  });
}

function pngToJpg(file, quality, bgColor){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      canvas.width=img.naturalWidth;
      canvas.height=img.naturalHeight;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle=bgColor;
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob=>{
        if(blob)resolve(blob);
        else reject(new Error('Conversion failed'));
      },'image/jpeg',quality/100);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Load failed'));};
    img.src=url;
  });
}

function downloadBlob(blob,filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

async function convertAll(){
  const quality=parseInt(document.getElementById('quality').value);
  const bgColor=document.getElementById('bgColor').value;
  for(let i=0;i<_files.length;i++){
    if(_results[i]&&_results[i].size)continue;
    _results[i]='converting';
    renderList();
    try{
      const blob=await pngToJpg(_files[i],quality,bgColor);
      _results[i]=blob;
    }catch(e){
      _results[i]='error';
    }
    renderList();
  }
}

function dlOne(i){
  const blob=_results[i];
  if(!blob||!blob.size)return;
  const name=_files[i].name.replace(/\.png$/i,'')+'.jpg';
  downloadBlob(blob,name);
}

function downloadAll(){
  _results.forEach((r,i)=>{
    if(r&&r.size)setTimeout(()=>dlOne(i),i*200);
  });
}

function clearAll(){
  _files=[];_results=[];
  document.getElementById('fileList').innerHTML='';
  document.getElementById('optsPanel').style.display='none';
  document.getElementById('transparencyNote').style.display='none';
  document.getElementById('fi').value='';
}

_lang=detectLang();applyLang();
</script>
