<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>URLスラグとは？</summary><p>URLのドメイン後のパス部分で、ページを識別するために使用されます。</p></details>
<details class="faq-item"><summary>日本語テキストを変換できますか？</summary><p>非ASCII文字は削除されます。英語テキストを使用するかローマ字に変換してください。</p></details>
<details class="faq-item"><summary>ハイフンとアンダースコアどちらがいい？</summary><p>GoogleはハイフンをSEO単語区切りとして認識するのでハイフンを推奨します。</p></details>
<details class="faq-item"><summary>ストップワードとは？</summary><p>「a」「the」「of」などの一般的な語で、削除するとスラグが短くなります。</p></details>
<details class="faq-item"><summary>理想的なスラグの長さは？</summary><p>3〜5単語、60文字以内がSEOに最適です。</p></details>
<details class="faq-item"><summary>WordPressでスラグを設定するには？</summary><p>投稿エディタのタイトル下のスラグフィールドに直接入力します。</p></details>
<details class="faq-item"><summary>スラグに日付を含めるべき？</summary><p>ニュース/イベントは含め、エバーグリーンコンテンツは含めないことを推奨します。</p></details>
<details class="faq-item"><summary>スラグ変更はSEOに影響する？</summary><p>影響します — 必ず301リダイレクトを設定して旧リンクを維持してください。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','lblInput','lblSep','lblOpts','lblOptLower','lblOptStop','lblOptTrunc','lblOptNum','lblResult','btnCopy','btnClear','lblHist','previewDomain'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id]||el.textContent;});
  document.getElementById('txtInput').placeholder=t.ph;
  document.getElementById('sep-').textContent=t.sepHyphen;
  document.getElementById('sep_').textContent=t.sepUnder;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  gen();
}
function setSep(el,s){document.querySelectorAll('.sep-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');_sep=s;gen();}
function clearInput(){document.getElementById('txtInput').value='';gen();}
function gen(){
  const t=_i18n[_lang];
  let txt=document.getElementById('txtInput').value;
  if(!txt){document.getElementById('resultSlug').textContent='—';document.getElementById('resultUrl').textContent='';return;}
  const lower=document.getElementById('optLower').checked;
  const stop=document.getElementById('optStop').checked;
  const trunc=document.getElementById('optTrunc').checked;
  const keepNum=document.getElementById('optNum').checked;
  let slug=txt;
  if(lower)slug=slug.toLowerCase();
  // remove non-ASCII (Korean etc)
  slug=slug.replace(/[^\x00-\x7F]/g,' ');
  // remove special chars except alphanumeric, space, hyphen
  if(keepNum)slug=slug.replace(/[^a-zA-Z0-9\s-]/g,' ');
  else slug=slug.replace(/[^a-zA-Z\s-]/g,' ');
  // split words
  let words=slug.trim().split(/\s+/).filter(Boolean);
  if(stop)words=words.filter(w=>!STOP_WORDS.has(w.toLowerCase()));
  slug=words.join(_sep);
  // clean up separators
  slug=slug.replace(new RegExp('['+_sep+']{2,}','g'),_sep).replace(new RegExp('^['+_sep+']+|['+_sep+']+$','g'),'');
  if(trunc)slug=slug.slice(0,60);
  document.getElementById('resultSlug').textContent=slug||'—';
  document.getElementById('resultUrl').textContent=slug;
  // history
  if(slug&&(_history.length===0||_history[0]!==slug)){_history.unshift(slug);if(_history.length>5)_history.pop();renderHist();}
}
function renderHist(){
  const t=_i18n[_lang];
  if(!_history.length){document.getElementById('histWrap').style.display='none';return;}
  document.getElementById('histWrap').style.display='block';
  const html=_history.map(s=>`<div class="hist-item"><span class="hist-slug">${s}</span><button class="hist-copy" onclick="copyText('${s.replace(/'/g,"&apos;")}')">${t.histCopy}</button></div>`).join('');
  document.getElementById('histList').innerHTML=html;
}
function copySlug(){const s=document.getElementById('resultSlug').textContent;if(s==='—')return;navigator.clipboard.writeText(s).then(()=>{const t=_i18n[_lang];const btn=document.getElementById('btnCopy');btn.textContent=t.copied;setTimeout(()=>btn.textContent=t.btnCopy,2000);});}
function copyText(s){navigator.clipboard.writeText(s);}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
