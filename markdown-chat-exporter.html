function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('tab0').textContent=t.tabBuild;document.getElementById('tab1').textContent=t.tabPaste;
  document.getElementById('pasteLabel').textContent=t.pasteLabel;document.getElementById('parseHint').textContent=t.parseHint;
  document.getElementById('parseBtn').textContent=t.parseBtn;document.getElementById('labelOpts').textContent=t.labelOpts;
  document.getElementById('lblTitle').textContent=t.lblTitle;document.getElementById('lblTs').textContent=t.lblTs;
  document.getElementById('lblHr').textContent=t.lblHr;document.getElementById('lblRole').textContent=t.lblRole;
  document.getElementById('lblStyle').textContent=t.lblStyle;document.getElementById('lblModel').textContent=t.lblModel;
  document.getElementById('convertBtn').textContent=t.convertBtn;document.getElementById('labelOut').textContent=t.labelOut;
  document.getElementById('dlBtn').textContent=t.dlBtn;
  document.getElementById('addUserBtn').textContent=t.addUserBtn;document.getElementById('addAssistBtn').textContent=t.addAssistBtn;document.getElementById('addSysBtn').textContent=t.addSysBtn;
  document.getElementById('optHeading').textContent=t.optHeading;document.getElementById('optBold').textContent=t.optBold;
  document.getElementById('optBq').textContent=t.optBq;document.getElementById('optPlain').textContent=t.optPlain;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  renderMsgs();
}
function switchTab(n){_tab=n;['pane0','pane1'].forEach((id,i)=>{document.getElementById(id).style.display=i===n?'':'none';});document.getElementById('tab0').className='tab'+(n===0?' active':'');document.getElementById('tab1').className='tab'+(n===1?' active':'');}
function addMsg(role){_msgs.push({role,text:''});renderMsgs();}
function delMsg(i){_msgs.splice(i,1);renderMsgs();}
function renderMsgs(){
  const rl=ROLE_LABELS[_lang];
  const opts=[{v:'user',l:rl.user},{v:'assistant',l:rl.assistant},{v:'system',l:rl.system}];
  document.getElementById('msgList').innerHTML=_msgs.map((m,i)=>`
    <div class="msg-row">
      <select class="role-sel" onchange="_msgs[${i}].role=this.value">${opts.map(o=>`<option value="${o.v}"${m.role===o.v?' selected':''}>${o.l}</option>`).join('')}</select>
      <div style="display:flex;gap:4px;align-items:start">
        <textarea class="msg-ta" oninput="_msgs[${i}].text=this.value" placeholder="${opts.find(o=>o.v===m.role)?.l||''}...">${m.text}</textarea>
        <button class="del-btn" onclick="delMsg(${i})">×</button>
      </div>
    </div>`).join('');
}
function parsePaste(){
  const raw=document.getElementById('pasteArea').value.trim();if(!raw)return;
  const lines=raw.split('\n');
  const rl=ROLE_LABELS[_lang];
  const patterns=[
    {re:/^(user|사용자|ユーザー|用户|you|human)\s*[:：]/i,role:'user'},
    {re:/^(assistant|어시스턴트|アシスタント|助手|ai|chatgpt|claude|gemini)\s*[:：]/i,role:'assistant'},
    {re:/^(system|시스템|システム|系统)\s*[:：]/i,role:'system'},
  ];
  const msgs=[];let cur=null;
  for(const line of lines){
    let matched=false;
    for(const p of patterns){if(p.re.test(line)){if(cur)msgs.push(cur);cur={role:p.role,text:line.replace(p.re,'').trim()};matched=true;break;}}
    if(!matched&&cur)cur.text+=(cur.text?'\n':'')+line;
  }
  if(cur)msgs.push(cur);
  if(msgs.length){_msgs=msgs;switchTab(0);renderMsgs();}
}
function convert(){
  const t=_i18n[_lang];const rl=ROLE_LABELS[_lang];
  const style=document.getElementById('styleSelect').value;
  const model=document.getElementById('modelName').value||'AI';
  const doTitle=document.getElementById('optTitle').checked;
  const doTs=document.getElementById('optTimestamp').checked;
  const doHr=document.getElementById('optHr').checked;
  const doRole=document.getElementById('optRole').checked;
  let out='';
  if(doTitle){const now=new Date();out+=`# ${model} Chat Export\n\n`;}
  if(doTs){out+=`> ${new Date().toLocaleString()}\n\n`;}
  _msgs.forEach((m,i)=>{
    const roleLabel=rl[m.role]||m.role;
    if(doHr&&i>0)out+='\n---\n\n';
    if(doRole){
      if(style==='heading')out+=`### ${roleLabel}\n\n`;
      else if(style==='bold')out+=`**${roleLabel}**\n\n`;
      else if(style==='blockquote')out+=`> **${roleLabel}**\n\n`;
    }
    if(style==='blockquote'){out+=m.text.split('\n').map(l=>`> ${l}`).join('\n')+'\n\n';}
    else{out+=m.text+'\n\n';}
  });
  document.getElementById('outArea').textContent=out.trim();
}
function copyOut(){
  const t=_i18n[_lang];const v=document.getElementById('outArea').textContent;if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{const btn=document.getElementById('copyBtn');const o=btn.textContent;btn.textContent=t.copied;setTimeout(()=>btn.textContent='Copy',1500);});
}
function download(){
  const v=document.getElementById('outArea').textContent;if(!v)return;
  const blob=new Blob([v],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='chat-export.md';a.click();
}
_lang=detectLang();applyLang();
