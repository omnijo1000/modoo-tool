        "@type": "Answer",
        "text": "SHA-256 (Secure Hash Algorithm 256-bit) is a cryptographic hash function from the SHA-2 family, standardized by NIST. It converts any input into a fixed 256-bit (64 hex character) digest. It is used in TLS certificates, Bitcoin, JWT signing, and password hashing."

      }
    },
    {
      "@type": "Question",
      "name": "What is the difference between SHA-256 and MD5?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "MD5 produces 128-bit (32 hex chars) output and has known collision vulnerabilities — two different inputs can produce the same hash. SHA-256 produces 256-bit (64 hex chars) output and has no known collisions. For security purposes, always prefer SHA-256 or SHA-512."
      }
    },
    {
      "@type": "Question",
      "name": "Can I use SHA-256 to store passwords?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Not recommended without salting. SHA-256 is fast, making it vulnerable to GPU brute-force and rainbow table attacks. For passwords, use bcrypt, Argon2, or scrypt — algorithms designed to be slow and include built-in salting."

    {
      "@type": "Question",
      "name": "How is SHA-256 used in blockchain?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Bitcoin uses double SHA-256 for block hashing and proof-of-work. Each block contains the hash of the previous block, forming a chain. Changing any block alters its hash, invalidating all subsequent blocks and making tampering evident."

        "@type": "Answer",

<p>SHA-256 (Secure Hash Algorithm 256-bit) is a cryptographic hash function from the <strong>SHA-2 family</strong>, standardized by NIST (FIPS 180-4). It converts input data of any length into a fixed 256-bit (64 hex character) digest. SHA-256 is widely used in TLS/SSL certificates, Bitcoin, JWT signing, software checksums, and digital signatures. The same input always produces the same output, and reversing the hash is computationally infeasible.</p>
<details class="faq-item"><summary>Why is SHA-256 one-way?</summary><p>SHA-256 applies a series of mathematical transformations (bit rotations, XOR, modular additions) that compress any input into 256 bits, discarding information irreversibly. Recovering the original input would require testing 2^256 possible combinations — more than the estimated number of atoms in the observable universe — making it computationally infeasible.</p></details>
<details class="faq-item"><summary>SHA-256 vs MD5 vs SHA-512: which should I use?</summary><p>MD5 (128-bit, 32 chars): collision vulnerabilities demonstrated — use only for non-security checksums. SHA-256 (256-bit, 64 chars): current recommended standard for security use cases. SHA-512 (512-bit, 128 chars): stronger and actually faster than SHA-256 on 64-bit CPUs. For any security purpose, use SHA-256 or SHA-512.</p></details>
<details class="faq-item"><summary>Can I use SHA-256 to store passwords?</summary><p>Not without salting. SHA-256 is very fast — an attacker with a GPU can try billions of hashes per second. For passwords, use bcrypt, Argon2 (NIST recommended), or scrypt. These are intentionally slow, include built-in salting, and resist GPU-based brute-force attacks.</p></details>
<details class="faq-item"><summary>What is collision resistance?</summary><p>Collision resistance means it is computationally infeasible to find two different inputs that produce the same hash. SHA-256 has 2^256 possible outputs (~1.16 × 10^77), making practical collisions impossible. MD5 and SHA-1 have had real collisions demonstrated, rendering them insecure.</p></details>
<details class="faq-item"><summary>How is SHA-256 used in blockchain?</summary><p>Bitcoin uses double SHA-256: SHA256(SHA256(block_header)). Each block includes the hash of the previous block, forming a chain. Altering any block changes its hash, invalidating all subsequent blocks. The proof-of-work mining algorithm requires finding a nonce that produces a hash starting with a required number of zero bits.</p></details>
<details class="faq-item"><summary>What is a rainbow table attack?</summary><p>A precomputed lookup table mapping common strings to their SHA-256 hashes. If an attacker steals a database of hashed passwords, they can look up the hash to find the original password. Adding a unique random salt per user before hashing defeats rainbow table attacks, since the attacker would need a separate table for every possible salt.</p></details>
<details class="faq-item"><summary>What is the role of SHA-256 in digital signatures?</summary><p>Rather than encrypting the entire message, a digital signature encrypts only the SHA-256 hash of the message. The recipient recomputes the hash and decrypts the signature — if they match, the message is authentic and unmodified. RSA-SHA256 and ECDSA-SHA256 are the most common combinations, used in TLS certificates and code signing.</p></details>
<details class="faq-item"><summary>How long is a SHA-256 hash?</summary><p>Always 256 bits (32 bytes) — exactly 64 hexadecimal characters. Whether the input is a single character or a multi-gigabyte file, the output length is identical. Encoded as Base64 it becomes 44 characters.</p></details>
<details class="faq-item"><summary>How do I verify file integrity with SHA-256?</summary><p>Compare the SHA-256 checksum published by the distributor with the hash of your downloaded file. Use the "Hash a File" button in this tool — the hash is computed locally in your browser without uploading. If even one character differs, the file is corrupted or has been tampered with.</p></details>
<details class="faq-item"><summary>Is my input sent to a server?</summary><p>No. All hashing uses the browser's built-in Web Crypto API (crypto.subtle.digest). Nothing leaves your device — not the text you type, not files you select. You can safely hash sensitive data.</p></details>`

<details class="faq-item"><summary>SHA-256 在区块链中如何使用？</summary><p>比特币使用双SHA-256：SHA256(SHA256(区块头))。每个区块包含前一个区块的哈希，形成链条。修改任何区块会改变其哈希，使后续所有区块无效。工作量证明挖矿算法需要找到一个使哈希以所需数量零位开头的随机数。</p></details>
<details class="faq-item"><summary>什么是彩虹表攻击？</summary><p>彩虹表是将常见字符串预先映射到其SHA-256哈希的查找表。攻击者窃取哈希密码数据库后，可以通过查表找到原始密码。为每个用户哈希前添加唯一随机盐值可以防御此攻击，因为攻击者需要为每个可能的盐值准备单独的表。</p></details>

let _lang = 'ko';
let _hash = '';
let _uppercase = false;
const LANGS = ['ko', 'en', 'zh', 'ja'];

function detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language?.slice(0, 2);
  return n === 'zh' ? 'zh' : n === 'ja' ? 'ja' : n === 'ko' ? 'ko' : 'en';
}

function cycleLang() {
  const idx = LANGS.indexOf(_lang);
  _lang = LANGS[(idx + 1) % LANGS.length];
  localStorage.setItem('modoo_lang', _lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', _lang);
  history.replaceState({}, '', url);
  applyLang();
}

function applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = _lang;
  document.title = t.pageTitle;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('backBtn').innerHTML = t.backBtn;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (t[k] !== undefined) el.innerHTML = t[k];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const k = el.dataset.i18nPlaceholder;
    if (t[k] !== undefined) el.placeholder = t[k];
  });
  // update empty state text if no hash
  if (!_hash) {
    const out = document.getElementById('hashOutput');
    out.textContent = t.statusEmpty;
    out.className = 'hash-output empty';
  }
}

async function sha256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function onTextInput() {
  const text = document.getElementById('textInput').value;
  if (!text) {
    _hash = '';
    const out = document.getElementById('hashOutput');
    out.textContent = _i18n[_lang].statusEmpty;
    out.className = 'hash-output empty';
    return;
  }
  _hash = await sha256(text);
  renderHash();
}

function renderHash() {
  const out = document.getElementById('hashOutput');
  if (!_hash) {
    out.textContent = _i18n[_lang].statusEmpty;
    out.className = 'hash-output empty';
    return;
  }
  out.textContent = _uppercase ? _hash.toUpperCase() : _hash;
  out.className = 'hash-output';
}

function setCase(mode) {
  _uppercase = (mode === 'upper');
  document.getElementById('btnLower').className = _uppercase ? 'btn' : 'btn active';
  document.getElementById('btnUpper').className = _uppercase ? 'btn active' : 'btn';
  renderHash();
}

async function doPaste() {
  try {
    const t = await navigator.clipboard.readText();
    document.getElementById('textInput').value = t;
    onTextInput();
  } catch(e) {}
}

function doClear() {
  document.getElementById('textInput').value = '';
  onTextInput();
}

function doSample() {
  document.getElementById('textInput').value = 'Hello, World!';
  onTextInput();
}

function doCopy() {
  if (!_hash) return;
  const val = _uppercase ? _hash.toUpperCase() : _hash;
  navigator.clipboard.writeText(val).then(showToast).catch(() => fallbackCopy(val));
}

function fallbackCopy(t) {
  const ta = document.createElement('textarea');
  ta.value = t;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast();
}

function showToast() {
  const el = document.getElementById('toast');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

async function onFileChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  const buf = await file.arrayBuffer();
  const hashBuffer = await crypto.subtle.digest('SHA-256', buf);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  _hash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  document.getElementById('textInput').value = `[File: ${file.name} (${(file.size / 1024).toFixed(1)} KB)]`;
  renderHash();
  // reset file input so the same file can be re-selected
  e.target.value = '';
}

_lang = detectLang();
applyLang();
