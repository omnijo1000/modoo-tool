    seoHtml:`<h2>JWT 인스펙터란?</h2><p>JWT 인스펙터는 토큰의 각 파트(<span style="color:var(--red)">Header</span>.<span style="color:var(--blue)">Payload</span>.<span style="color:var(--purple)">Signature</span>)를 색상으로 구분해 시각화하고, 각 클레임의 의미와 알고리즘 정보, 시간 타임라인을 상세하게 분석합니다. <strong>jwt.io</strong>와 같은 역할을 브라우저에서 직접 수행합니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>JWT 인스펙터와 검증기 차이는?</summary><p>인스펙터는 상세 분석 중심, 검증기는 유효성 판별 중심입니다. 인스펙터는 각 클레임의 의미와 알고리즘 정보를 설명하고 타임라인을 시각화합니다.</p></details>
<details class="faq-item"><summary>JWT 알고리즘 종류는?</summary><p>HS256/HS384/HS512(HMAC, 대칭), RS256/RS384/RS512(RSA, 비대칭), ES256/ES384/ES512(ECDSA, 비대칭), PS256/PS384/PS512(RSA-PSS). alg:none은 서명 없음으로 보안상 허용하면 안 됩니다.</p></details>
<details class="faq-item"><summary>kid 클레임이란?</summary><p>Key ID의 약자로, 서명에 사용된 키를 식별하는 힌트입니다. JWKS(JSON Web Key Set)에서 올바른 공개키를 찾을 때 사용됩니다.</p></details>
<details class="faq-item"><summary>JWT Payload를 암호화할 수 있나요?</summary><p>표준 JWT는 페이로드를 Base64URL로만 인코딩합니다. 암호화가 필요하면 JWE(JSON Web Encryption)를 사용해야 합니다.</p></details>
<details class="faq-item"><summary>aud 클레임이 배열인 경우는?</summary><p>토큰이 여러 대상(서비스)을 위한 경우 배열로 지정됩니다. 수신자는 자신의 식별자가 aud에 포함되어 있는지 확인해야 합니다.</p></details>
<details class="faq-item"><summary>alg:none 토큰은 왜 위험한가요?</summary><p>서명이 없어 토큰 내용을 임의로 변조할 수 있습니다. 일부 JWT 라이브러리 취약점에서 alg:none을 허용해 인증 우회가 발생한 사례가 있습니다.</p></details>
<details class="faq-item"><summary>JWT 갱신(Refresh) 패턴이란?</summary><p>Access Token(만료 짧음)과 Refresh Token(만료 김)을 함께 발급해, Access Token 만료 시 Refresh Token으로 새 Access Token을 발급받는 패턴입니다.</p></details>
<details class="faq-item"><summary>JWKS란 무엇인가요?</summary><p>JSON Web Key Set의 약자로, 서명 검증에 사용되는 공개키 목록을 JSON 형식으로 공개하는 엔드포인트입니다. /.well-known/jwks.json 경로를 많이 사용합니다.</p></details>`

<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Inspector vs Validator?</summary><p>The inspector focuses on deep understanding: claim meanings, algorithm info, and timeline. The validator focuses on validity judgments.</p></details>
<details class="faq-item"><summary>What JWT algorithms exist?</summary><p>HS256/HS384/HS512 (HMAC, symmetric), RS256/RS384/RS512 (RSA, asymmetric), ES256/ES384/ES512 (ECDSA, asymmetric), PS256/PS384/PS512 (RSA-PSS). alg:none means no signature and must never be allowed.</p></details>
<details class="faq-item"><summary>What is the kid claim?</summary><p>Key ID — a hint identifying which key was used to sign the token. Used to look up the correct public key from a JWKS endpoint.</p></details>
<details class="faq-item"><summary>Can I encrypt the JWT payload?</summary><p>Standard JWT only Base64URL-encodes the payload. Use JWE (JSON Web Encryption) if encryption is required.</p></details>
<details class="faq-item"><summary>aud claim as an array?</summary><p>When the token targets multiple services, aud can be an array. Recipients must verify their identifier is in the aud array.</p></details>
<details class="faq-item"><summary>Why is alg:none dangerous?</summary><p>No signature means the token content can be freely tampered with. Some JWT library vulnerabilities accepted alg:none, enabling authentication bypass.</p></details>
<details class="faq-item"><summary>What is the JWT refresh pattern?</summary><p>Issue a short-lived Access Token and a long-lived Refresh Token. When the Access Token expires, use the Refresh Token to obtain a new one.</p></details>
<details class="faq-item"><summary>What is JWKS?</summary><p>JSON Web Key Set — a JSON endpoint (usually /.well-known/jwks.json) that publishes the public keys used for signature verification.</p></details>`

    seoHtml:`<h2>JWT检查器</h2><p>JWT检查器将令牌各部分用颜色区分，解释声明含义，显示算法信息和有效期时间线，功能类似jwt.io。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>检查器和验证器的区别？</summary><p>检查器侧重深度理解：声明含义、算法信息和时间线。验证器侧重有效性判断。</p></details>
<details class="faq-item"><summary>JWT有哪些算法？</summary><p>HS256/HS384/HS512（HMAC，对称），RS256/RS384/RS512（RSA，非对称），ES256/ES384/ES512（ECDSA，非对称）。alg:none表示无签名，绝不应允许。</p></details>
<details class="faq-item"><summary>kid声明是什么？</summary><p>密钥ID，标识签名所用密钥的提示，用于从JWKS端点查找正确的公钥。</p></details>
<details class="faq-item"><summary>可以加密JWT载荷吗？</summary><p>标准JWT只做Base64URL编码。如需加密，应使用JWE（JSON Web Encryption）。</p></details>
<details class="faq-item"><summary>aud声明可以是数组吗？</summary><p>当令牌面向多个服务时，aud可以是数组。接收方必须验证自己的标识符在aud数组中。</p></details>
<details class="faq-item"><summary>为什么alg:none很危险？</summary><p>没有签名意味着令牌内容可以随意篡改。一些JWT库漏洞接受了alg:none，导致认证绕过。</p></details>

const LANGS=['ko','en','zh','ja'];
let _lang='ko';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('labelInput').textContent=t.labelInput;document.getElementById('labelVisual').textContent=t.labelVisual;
  document.getElementById('labelHeader').textContent=t.labelHeader;document.getElementById('labelAlgo').textContent=t.labelAlgo;
  document.getElementById('labelPayload').textContent=t.labelPayload;document.getElementById('labelTimeline').textContent=t.labelTimeline;
  document.getElementById('btnInspect').textContent=t.btnInspect;document.getElementById('btnClear').textContent=t.btnClear;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function b64urlDecode(str){
  str=str.replace(/-/g,'+').replace(/_/g,'/');while(str.length%4)str+='=';
  try{return JSON.parse(atob(str));}catch(e){return null;}
}
function fmtTime(ts){return new Date(ts*1000).toISOString().replace('T',' ').slice(0,19);}
function clearAll(){document.getElementById('tokenInput').value='';document.getElementById('resultArea').className='result';}
function inspect(){
  const t=_i18n[_lang];
  const raw=document.getElementById('tokenInput').value.trim();
  const ra=document.getElementById('resultArea');
  if(!raw){ra.className='result';return;}
  const parts=raw.split('.');
  if(parts.length!==3){ra.className='result';return;}
  const header=b64urlDecode(parts[0]);
  const payload=b64urlDecode(parts[1]);
  if(!header||!payload){ra.className='result';return;}
  ra.className='result show';
  // Visual
  document.getElementById('tokenVisual').innerHTML=
    `<span class="part-h">${parts[0]}</span><span class="sep">.</span><span class="part-p">${parts[1]}</span><span class="sep">.</span><span class="part-s">${parts[2].substring(0,20)}…</span>`;
  // Header claims
  let hHtml='';
  Object.entries(header).forEach(([k,v])=>{
    const desc=t.claimDescs[k]||'';
    hHtml+=`<div class="claim-row"><span class="ck">${k}</span><span class="cv">${v}<br><span class="cdesc">${desc}</span></span></div>`;
  });
  document.getElementById('headerClaims').innerHTML=hHtml;
  // Algo info
  const alg=header.alg||'';
  const algDesc=t.algDescs[alg]||alg;
  const algType=alg.startsWith('HS')?'symmetric':alg==='none'?'none':'asymmetric';
  const algTag=algType==='symmetric'?'<span class="tag warn">symmetric</span>':algType==='none'?'<span class="tag err">none</span>':'<span class="tag ok">asymmetric</span>';
  document.getElementById('algoInfo').innerHTML=`<div class="claim-row"><span class="ck">alg</span><span class="cv">${alg} ${algTag}<br><span class="cdesc">${algDesc}</span></span></div>`;
  // Payload claims
  let pHtml='';
  const now=Math.floor(Date.now()/1000);
  Object.entries(payload).forEach(([k,v])=>{
    const desc=t.claimDescs[k]||'';
    let display=typeof v==='object'?JSON.stringify(v):String(v);
    let note='';
    if((k==='exp'||k==='iat'||k==='nbf')&&typeof v==='number'){
      display=fmtTime(v);
      if(k==='exp') note=v<now?'<span class="tag err">expired</span>':'<span class="tag ok">valid</span>';
      if(k==='nbf') note=v>now?'<span class="tag warn">not yet</span>':'<span class="tag ok">active</span>';
    }
    pHtml+=`<div class="claim-row"><span class="ck">${k}</span><span class="cv">${display}${note}<br><span class="cdesc">${desc}</span></span></div>`;
  });
  document.getElementById('payloadClaims').innerHTML=pHtml;
  // Timeline
  const events=[];
  if(payload.iat) events.push({label:t.tlIat,ts:payload.iat,dot:'dim'});
  if(payload.nbf) events.push({label:t.tlNbf,ts:payload.nbf,dot:payload.nbf>now?'err':'ok'});
  events.push({label:t.tlNow,ts:now,dot:'ok',now:true});
  if(payload.exp) events.push({label:t.tlExp,ts:payload.exp,dot:payload.exp<now?'err':'ok'});
  events.sort((a,b)=>a.ts-b.ts);
  let tlHtml='';
  events.forEach(e=>{
    const extra=e.now?'<span class="tag ok" style="margin-left:4px">now</span>':'';
    const expired=payload.exp&&payload.exp<now&&e.label===t.tlExp?'<span class="tag err" style="margin-left:4px">'+t.tlExpired+'</span>':'';
    tlHtml+=`<div class="tl-item"><div class="tl-dot ${e.dot}"></div><span class="tl-label">${e.label}</span><span class="tl-time">${fmtTime(e.ts)}${extra}${expired}</span></div>`;
  });
  document.getElementById('timeline').innerHTML=tlHtml;
}
_lang=detectLang();applyLang();
