    labelNext:'다음 실행 예정 시간', labelRef:'특수 문자 참고',
    seoHtml:'<h2>Cron 표현식이란?</h2><p>Cron은 Unix 계열 시스템에서 특정 시간에 자동으로 작업을 실행하는 스케줄러입니다. Cron 표현식은 "분 시 일 월 요일" 5개 필드로 구성되며, Spring @Scheduled, Jenkins, GitHub Actions, Linux crontab 등에서 사용합니다.</p><details class="faq-item"><summary>Spring @Scheduled cron과 표준 cron의 차이는?</summary><p>Spring은 초(second) 필드가 추가되어 6개 필드를 사용합니다. 맨 앞에 초(0~59)를 추가해야 합니다. 예: "0 0 9 * * MON-FRI"</p></details><details class="faq-item"><summary>*/5 * * * * 는 무슨 의미인가요?</summary><p>매 5분마다 실행을 의미합니다. */n은 n분(시간/일)마다 실행하는 간격 표현입니다. 예) */10은 10분마다, 시 필드의 */2는 2시간마다를 의미합니다.</p></details><details class="faq-item"><summary>평일 오전 9시에만 실행하려면?</summary><p>0 9 * * 1-5 를 사용합니다. 1-5는 월요일(1)부터 금요일(5)까지를 의미합니다. 주말만 실행하려면 0 9 * * 0,6 을 사용합니다.</p></details><details class="faq-item"><summary>매월 말일에 실행하려면?</summary><p>일 필드에 L을 사용합니다. 예: 0 0 L * * (매월 마지막 날 자정). L은 표준 Linux crontab에서는 지원되지 않고 Jenkins, Spring 등 일부 스케줄러에서만 지원합니다.</p></details><details class="faq-item"><summary>서버가 꺼져 있어 작업이 누락되면 어떻게 되나요?</summary><p>표준 cron은 누락된 작업을 자동으로 재실행하지 않습니다. 서버가 복구되면 다음 예정 시간에만 실행됩니다. 누락된 작업 처리가 필요하면 Quartz Scheduler나 APScheduler 같은 라이브러리를 고려하세요.</p></details>',

    seoHtml:'<h2>What is a Cron Expression?</h2><p>Cron is a time-based job scheduler in Unix-like systems. A cron expression consists of 5 fields — minute, hour, day, month, and weekday — and is used in Spring @Scheduled, Jenkins, GitHub Actions, and Linux crontab.</p><details class="faq-item"><summary>What is the difference between Spring @Scheduled and standard cron?</summary><p>Spring adds a second field at the start, making it 6 fields total. The second value (0–59) comes before the minute. Example: "0 0 9 * * MON-FRI" runs every weekday at 9:00:00 AM.</p></details><details class="faq-item"><summary>What does */5 * * * * mean?</summary><p>It runs every 5 minutes. The */n syntax means "every n units" — */10 runs every 10 minutes, */2 in the hour field runs every 2 hours, and so on.</p></details><details class="faq-item"><summary>How do I run a job on weekdays at 9am only?</summary><p>Use 0 9 * * 1-5. The range 1-5 means Monday (1) through Friday (5). To run on weekends only, use 0 9 * * 0,6.</p></details><details class="faq-item"><summary>How do I run a job on the last day of the month?</summary><p>Use L in the day field: 0 0 L * * runs at midnight on the last day of each month. Note that L is not supported by standard Linux crontab — it works in Jenkins, Spring, and similar schedulers.</p></details><details class="faq-item"><summary>What happens if the server is down and a cron job is missed?</summary><p>Standard cron does not replay missed jobs. When the server recovers, it simply waits for the next scheduled time. For missed-job recovery, consider Quartz Scheduler or APScheduler instead of plain cron.</p></details>',

let lang = localStorage.getItem('lang');
if (!lang || !i18n[lang]) {
  const nav = navigator.language || '';
  if (nav.startsWith('zh')) lang = 'zh';
  else if (nav.startsWith('ja')) lang = 'ja';
  else if (nav.startsWith('ko')) lang = 'ko';
  else lang = 'en';
}
const fieldIds = ['f-min','f-hour','f-dom','f-mon','f-dow'];

function applyLang() {
  const t = i18n[lang];
  document.documentElement.lang = lang;
  document.title = t.pageTitle;
  if (document.getElementById('h1Title')) document.getElementById('h1Title').innerHTML = t.h1;
  if (document.getElementById('h1Sub')) document.getElementById('h1Sub').textContent = t.sub;
  if (document.getElementById('backLink')) document.getElementById('backLink').textContent = t.backLink;
  if (document.getElementById('langBtn')) document.getElementById('langBtn').textContent = t.langBtn;
  if (document.getElementById('labelExpr')) document.getElementById('labelExpr').textContent = t.labelExpr;
  if (document.getElementById('copyBtn')) document.getElementById('copyBtn').textContent = t.copyBtn;
  if (document.getElementById('labelPresets')) document.getElementById('labelPresets').textContent = t.labelPresets;
  if (document.getElementById('labelBuilder')) document.getElementById('labelBuilder').textContent = t.labelBuilder;
  if (document.getElementById('labelManual')) document.getElementById('labelManual').textContent = t.labelManual;
  if (document.getElementById('manualHint')) document.getElementById('manualHint').textContent = t.manualHint;
  if (document.getElementById('labelNext')) document.getElementById('labelNext').textContent = t.labelNext;
  if (document.getElementById('labelRef')) document.getElementById('labelRef').textContent = t.labelRef;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});
  if (document.getElementById('footerText')) document.getElementById('footerText').textContent = t.footer;
  renderPresets(); renderBuilder(); renderRefs(); buildCron();
}

function toggleLang() {
  const order = ['ko','en','zh','ja'];
  const idx = order.indexOf(lang);
  lang = order[(idx + 1) % order.length];
  localStorage.setItem('lang', lang);
  applyLang();
}

function renderPresets() {
  if (document.getElementById('presetGrid')) document.getElementById('presetGrid').innerHTML = i18n[lang].presets.map(p=>
    `<button class="preset-btn" onclick="applyPreset('${p.expr}','${p.name}')"><span class="preset-name">${p.name}</span><span class="preset-expr">${p.expr}</span></button>`
  ).join('');
}

function renderBuilder() {
  const defaults = ['0','0','*','*','*'];
  if (document.getElementById('builderEl')) document.getElementById('builderEl').innerHTML = i18n[lang].fields.map((f,i)=>`
    <div class="field">
      <div class="field-header"><span class="field-name">${f.name}</span><input type="text" class="field-input" id="${fieldIds[i]}" value="${defaults[i]}" oninput="buildCron()"></div>
      <div class="field-desc">${f.desc}</div>
      <div class="option-btns">${f.opts.map(o=>`<button class="opt-btn" onclick="setField('${fieldIds[i]}','${o.v}')">${o.l}</button>`).join('')}</div>
    </div>`
  ).join('');
}

function renderRefs() {
  if (document.getElementById('refGrid')) document.getElementById('refGrid').innerHTML = i18n[lang].refs.map(r=>
    `<div class="ref-item"><div class="ref-expr">${r.e}</div><div class="ref-desc">${r.d}</div></div>`
  ).join('');
}

function getFields() {
  return fieldIds.map(id=>(document.getElementById(id)||{value:'*'}).value.trim()||'*');
}

function buildCron() {
  const f = getFields();
  const expr = f.join(' ');
  if (document.getElementById('cronExpr')) document.getElementById('cronExpr').textContent = expr;
  document.getElementById('manualExpr').value = expr;
  const labels = i18n[lang].fields.map(f=>f.name.split(' ')[0]);
  if (document.getElementById('cronParts')) document.getElementById('cronParts').innerHTML = f.map((v,i)=>`<div class="cron-part"><span>${labels[i]}</span>${v}</div>`).join('');
  updateDesc(f);
  updateNextRuns(expr);
}

function setField(id,val) { document.getElementById(id).value=val; buildCron(); }

function applyPreset(expr, name) {
  const parts = expr.split(' ');
  if(parts.length!==5) return;
  fieldIds.forEach((id,i)=>document.getElementById(id).value=parts[i]);
  if (document.getElementById('cronExpr')) document.getElementById('cronExpr').textContent = expr;
  document.getElementById('manualExpr').value=expr;
  if (document.getElementById('cronDesc')) document.getElementById('cronDesc').textContent = '→ '+name;
  if (document.getElementById('cronParts')) document.getElementById('cronParts').innerHTML = parts.map((v,i)=>`<div class="cron-part"><span>${i18n[lang].fields[i].name.split(' ')[0]}</span>${v}</div>`).join('');
  updateNextRuns(expr);
}

function validateManual() {
  const val = document.getElementById('manualExpr').value.trim();
  const parts = val.split(/\s+/);
  if(parts.length!==5) return;
  fieldIds.forEach((id,i)=>{ if(document.getElementById(id)) document.getElementById(id).value=parts[i]; });
  if (document.getElementById('cronExpr')) document.getElementById('cronExpr').textContent = val;
  updateDesc(parts);
  updateNextRuns(val);
}

function updateDesc(f) {
  const isKo = lang==='ko';
  const isZh = lang==='zh';
  let timeDesc='';
  if(f[0].startsWith('*/') && f[1]==='*') {
    if(isKo) timeDesc=`${f[0].slice(2)}분마다`;
    else if(isZh) timeDesc=`每${f[0].slice(2)}分钟`;
    else timeDesc=`Every ${f[0].slice(2)} min`;
  } else if(f[1].startsWith('*/')) {
    if(isKo) timeDesc=`${f[1].slice(2)}시간마다`;
    else if(isZh) timeDesc=`每${f[1].slice(2)}小时`;
    else timeDesc=`Every ${f[1].slice(2)} hours`;
  } else if(f[1]==='*') {
    if(f[0]==='*') { if(isKo) timeDesc='매분'; else if(isZh) timeDesc='每分钟'; else timeDesc='Every minute'; }
    else { if(isKo) timeDesc=`매시 ${f[0]}분`; else if(isZh) timeDesc=`每小时第${f[0]}分`; else timeDesc=`At ${f[0]} min past every hour`; }
  } else {
    const h=parseInt(f[1]); const m=f[0]==='*'?'00':f[0].padStart(2,'0');
    if(isKo) timeDesc=`${h>=12?'오후':'오전'} ${h>12?h-12:h}시 ${m}분`;
    else if(isZh) timeDesc=`${h>=12?'下午':'上午'} ${h>12?h-12:h===0?12:h}:${m}`;
    else timeDesc=`${h>=12?'PM':'AM'} ${h>12?h-12:h===0?12:h}:${m}`;
  }
  if (document.getElementById('cronDesc')) document.getElementById('cronDesc').textContent = '→ '+timeDesc+(isKo?' 실행':isZh?' 执行':'');
}

function updateNextRuns(expr) {
  const parts=expr.split(/\s+/);
  if(parts.length!==5) return;
  const runs=calcNextRuns(parts,5);
  if (document.getElementById('nextRuns')) document.getElementById('nextRuns').innerHTML = runs.map((d,i)=>`<div class="next-item"><span class="next-num">${i+1}</span>${formatDate(d)}</div>`).join('');
}

function calcNextRuns(parts,count) {
  const results=[];
  let d=new Date(); d.setSeconds(0,0); d.setMinutes(d.getMinutes()+1);
  let tries=0;
  while(results.length<count&&tries<100000){
    tries++;
    if(matchField(d.getMonth()+1,parts[3],1,12)&&matchField(d.getDate(),parts[2],1,31)&&matchDow(d.getDay(),parts[4])&&matchField(d.getHours(),parts[1],0,23)&&matchField(d.getMinutes(),parts[0],0,59)) results.push(new Date(d));
    d.setMinutes(d.getMinutes()+1);
  }
  return results;
}

function matchField(val,expr,min,max){if(expr==='*'||expr==='?') return true;if(expr==='L') return true;if(expr.startsWith('*/')) return val%parseInt(expr.slice(2))===0;if(expr.includes(',')) return expr.split(',').some(p=>matchField(val,p.trim(),min,max));if(expr.includes('-')){const[a,b]=expr.split('-').map(Number);return val>=a&&val<=b;}return parseInt(expr)===val;}
function matchDow(day,expr){if(expr==='*'||expr==='?') return true;if(expr.includes(',')) return expr.split(',').some(p=>matchDow(day,p.trim()));if(expr.includes('-')){const[a,b]=expr.split('-').map(Number);return day>=a&&day<=b;}return parseInt(expr)===day;}

function formatDate(d) {
  const days=i18n[lang].days;
  const pad=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} (${days[d.getDay()]}) ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function copyExpr() {
  const expr=document.getElementById('cronExpr').textContent;
  navigator.clipboard.writeText(expr).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent=i18n[lang].copyDone;
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=i18n[lang].copyBtn;btn.classList.remove('copied');},2000);
  });
}

applyLang();
</script>
