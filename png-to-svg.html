    seoHtml:`<h2>PNG to SVG 변환기</h2><p>PNG 이미지를 SVG 벡터 형식으로 변환합니다. <strong>비트맵 추적(tracing)</strong> 방식으로 픽셀을 경로(path)로 변환합니다. 임계값(밝기)을 조정하면 전경과 배경을 구분하는 기준을 설정할 수 있습니다. 단순한 로고·아이콘에 최적이며, 변환된 SVG는 Inkscape, Illustrator 등에서 편집 가능합니다.</p>

<details class="faq-item"><summary>투명도가 있는 PNG는요?</summary><p>투명 영역은 배경(흰색)으로 처리됩니다.</p></details>

    seoHtml:`<h2>PNG to SVG Converter</h2><p>Convert PNG images to SVG vector format using <strong>bitmap tracing</strong>. The threshold (brightness) setting controls how pixels are separated into foreground and background. Best for simple logos and icons; the resulting SVG can be edited in Inkscape, Illustrator, or Figma.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Can I convert photos to SVG?</summary><p>Technically yes, but complex photos create many paths and may produce very large SVG files.</p></details>
<details class="faq-item"><summary>What is the threshold?</summary><p>Brightness cutoff to separate foreground (dark) from background (light). Higher values include more pixels as foreground.</p></details>
<details class="faq-item"><summary>Can I edit the resulting SVG?</summary><p>Yes — in Inkscape, Illustrator, Figma, and other vector tools.</p></details>

    seoHtml:`<h2>PNG转SVG转换器</h2><p>使用<strong>位图追踪</strong>技术将PNG图像转换为SVG矢量格式。阈值（亮度）设置控制前景和背景的分离基准。适合简单徽标和图标，转换后的SVG可在Inkscape、Illustrator等工具中编辑。</p>

<details class="faq-item"><summary>可以将照片转为SVG吗？</summary><p>技术上可以，但复杂照片会产生大量路径，导致SVG文件更大。</p></details>
<details class="faq-item"><summary>什么是阈值？</summary><p>区分前景（深色）和背景（浅色）的亮度基准值。值越高，越多像素被视为前景。</p></details>

    seoHtml:`<h2>PNGからSVGへ変換</h2><p><strong>ビットマップトレース</strong>技術を使ってPNG画像をSVGベクター形式に変換します。閾値（明るさ）で前景と背景の分離基準を調整できます。シンプルなロゴやアイコンに最適で、変換後のSVGはInkscape・Illustratorなどで編集可能です。</p>

};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','dzText','lblOpts','noticeEl','lblThresh','btnConvert','lblOut','btnDl','btnCopy','lblSrc','lblResult'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFile(e.dataTransfer.files[0]);});
document.getElementById('fileIn').addEventListener('change',e=>loadFile(e.target.files[0]));
function loadFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{_imgEl=img;document.getElementById('optBox').style.display='block';document.getElementById('outBox').style.display='none';};
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}
function convert(){
  if(!_imgEl)return;
  const thresh=parseInt(document.getElementById('thresh').value)||128;
  const MAX=400;
  let w=_imgEl.naturalWidth,h=_imgEl.naturalHeight;
  if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
  const sc=document.getElementById('srcCvs');sc.width=w;sc.height=h;
  const ctx=sc.getContext('2d');ctx.drawImage(_imgEl,0,0,w,h);
  const idata=ctx.getImageData(0,0,w,h).data;
  const grid=[];
  for(let y=0;y<h;y++){grid[y]=[];for(let x=0;x<w;x++){const i=(y*w+x)*4;const bright=(idata[i]*.299+idata[i+1]*.587+idata[i+2]*.114);grid[y][x]=bright<thresh?1:0;}}
  let rects='';
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){if(grid[y][x])rects+=`<rect x="${x}" y="${y}" width="1" height="1"/>`;}}
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><g fill="#000000">${rects}</g></svg>`;
  document.getElementById('svgOut').value=svg;
  document.getElementById('svgPreview').innerHTML=svg;
  document.getElementById('outBox').style.display='block';
}
let _svgResult='';
function download(){
  const s=document.getElementById('svgOut').value;if(!s)return;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([s],{type:'image/svg+xml'}));a.download='output.svg';a.click();
}
function copySvg(){
  const t=_i18n[_lang];const b=document.getElementById('btnCopy');
  navigator.clipboard.writeText(document.getElementById('svgOut').value).then(()=>{b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,1500);});
}
_lang=detectLang();applyLang();
</script>
