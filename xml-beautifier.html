function getIndent(){const v=document.getElementById('indentSel').value;return v==='tab'?'\t':' '.repeat(Number(v));}
function serializeNode(node,indent,level){
  const pad=indent.repeat(level);
  if(node.nodeType===3){const txt=node.textContent.trim();return txt?pad+txt+'\n':'';}
  if(node.nodeType===8){return pad+'<!--'+node.nodeValue+'-->\n';}
  if(node.nodeType!==1)return '';
  let attrs='';
  for(const a of node.attributes)attrs+=` ${a.name}="${a.value}"`;
  const hasChildren=node.childNodes.length>0;
  const singleTextChild=node.childNodes.length===1&&node.childNodes[0].nodeType===3;
  if(!hasChildren)return pad+`<${node.tagName}${attrs}/>\n`;
  if(singleTextChild){const txt=node.childNodes[0].textContent.trim();return pad+`<${node.tagName}${attrs}>${txt}</${node.tagName}>\n`;}
  let out=pad+`<${node.tagName}${attrs}>\n`;
  for(const child of node.childNodes)out+=serializeNode(child,indent,level+1);
  out+=pad+`</${node.tagName}>\n`;
  return out;
}

  return xml
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(&lt;\/?)([a-zA-Z0-9_:\-]+)/g,'$1<span class="xml-tag">$2</span>')
    .replace(/([a-zA-Z0-9_:\-]+)=&quot;([^&]*)&quot;/g,'<span class="xml-attr">$1</span>=<span class="xml-val">&quot;$2&quot;</span>')
    .replace(/(&lt;!--)(.*?)(--&gt;)/g,'<span class="xml-cmt">$1$2$3</span>');
}
function beautify(){
  const t=_i18n[_lang];const raw=document.getElementById('inXml').value.trim();
  document.getElementById('errBox').style.display='none';
  if(!raw)return;
  try{
    const parser=new DOMParser();const doc=parser.parseFromString(raw,'application/xml');
    const err=doc.querySelector('parsererror');
    if(err){document.getElementById('errBox').textContent=t.errParse+(err.textContent.split('\n')[0]||'');document.getElementById('errBox').style.display='block';document.getElementById('outBox').textContent='';return;}
    const ind=getIndent();let out='';
    const keepDecl=document.getElementById('optDecl').checked;
    if(keepDecl&&raw.startsWith('<?xml'))out='<?xml version="1.0" encoding="UTF-8"?>\n';
    for(const child of doc.childNodes)if(child.nodeType!==7)out+=serializeNode(child,ind,0);
    const doColor=document.getElementById('optColor').checked;
    document.getElementById('outBox').innerHTML=doColor?colorize(out):'';
    if(!doColor)document.getElementById('outBox').textContent=out;
    document.getElementById('outBox')._raw=out;
  }catch(e){document.getElementById('errBox').textContent=t.errParse+e.message;document.getElementById('errBox').style.display='block';}
}
function minify(){
  const t=_i18n[_lang];const raw=document.getElementById('inXml').value.trim();
  if(!raw)return;
  try{
    const parser=new DOMParser();const doc=parser.parseFromString(raw,'application/xml');
    const err=doc.querySelector('parsererror');if(err){document.getElementById('errBox').textContent=t.errParse+(err.textContent.split('\n')[0]||'');document.getElementById('errBox').style.display='block';return;}
    const s=new XMLSerializer();const out=s.serializeToString(doc).replace(/>\s+</g,'><').replace(/\s+/g,' ').trim();
    document.getElementById('outBox').textContent=out;document.getElementById('outBox')._raw=out;
  }catch(e){document.getElementById('errBox').textContent=t.errParse+e.message;document.getElementById('errBox').style.display='block';}
}
let _autoTimer=null;
function autoBeautify(){clearTimeout(_autoTimer);_autoTimer=setTimeout(beautify,400);}
function loadSample(){document.getElementById('inXml').value=`<?xml version="1.0" encoding="UTF-8"?><catalog><book id="bk101"><author>Gambardella, Matthew</author><title>XML Developer\'s Guide</title><price>44.95</price></book><book id="bk102"><author>Ralls, Kim</author><title>Midnight Rain</title><price>5.95</price></book></catalog>`;beautify();}
function clearAll(){document.getElementById('inXml').value='';document.getElementById('outBox').textContent='';document.getElementById('outBox')._raw='';}
function copyOut(){const txt=document.getElementById('outBox')._raw||document.getElementById('outBox').textContent;navigator.clipboard.writeText(txt).then(()=>{const btn=document.getElementById('btnCopy');const orig=btn.textContent;btn.textContent=_i18n[_lang].copiedMsg;setTimeout(()=>btn.textContent=orig,1500);});}
_lang=detectLang();applyLang();
