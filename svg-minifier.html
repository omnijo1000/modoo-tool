function download(){
  const s=document.getElementById('output').value;if(!s)return;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([s],{type:'image/svg+xml'}));a.download='minified.svg';a.click();
}
function copyOut(){
  const t=_i18n[_lang];const b=document.getElementById('btnCopy');
  navigator.clipboard.writeText(document.getElementById('output').value).then(()=>{b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,1500);});
}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','lblInput','lblComments','lblWhitespace','lblMeta','lblXmlDecl','btnMin','lblOutput','btnDl','btnCopy'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
