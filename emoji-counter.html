function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function getEmojis(s){
  const seg=new Intl.Segmenter(undefined,{granularity:'grapheme'});
  const emojiRe=/\p{Emoji}/u;
  return [...seg.segment(s)].map(x=>x.segment).filter(g=>emojiRe.test(g)&&!/^[0-9#*]$/.test(g));
}
function count(){
  const t=_i18n[_lang];const raw=document.getElementById('inputArea').value;
  const emojis=getEmojis(raw);
  const total=emojis.length;
  const freq=new Map();emojis.forEach(e=>freq.set(e,(freq.get(e)||0)+1));
  const sorted=[...freq.entries()].sort((a,b)=>b[1]-a[1]);
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statUniq').textContent=freq.size;
  document.getElementById('statChars').textContent=[...raw].length;
  const list=document.getElementById('emojiList');
  if(!total){list.innerHTML=`<div class="empty">${t.emptyMsg}</div>`;return;}
  list.innerHTML=sorted.map(([e,n])=>`<div class="emoji-chip" onclick="navigator.clipboard.writeText('${e}')"><span>${e}</span><span class="emoji-count">×${n}</span></div>`).join('');
}
