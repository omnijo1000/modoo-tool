<script>
const LANGS=['ko','en','zh','ja'];
let _lang='ko',_files=[];
const _i18n={
  ko:{h1b:'WebP',sub:'JPG/PNG 이미지를 WebP로 변환하여 파일 크기를 줄입니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',pageTitle:'JPG to WebP 변환기 | MODOO HUB',dzText:'이미지를 드래그하거나 클릭하여 업로드 (여러 파일 가능)',lblQ:'품질 설정',lblQLabel:'품질',btnConvert:'WebP 변환',lblResult:'변환 결과',saved:'절감',dl:'다운로드',
    seoHtml:`<h2>JPG to WebP 변환기</h2><p>JPG/PNG 이미지를 <strong>WebP 형식</strong>으로 변환합니다. 동일 화질 대비 JPG보다 25~34% 작은 파일을 얻을 수 있어 웹 성능 최적화에 효과적입니다. 품질 슬라이더로 용량과 화질의 균형을 조절할 수 있으며, 여러 파일을 동시에 변환할 수 있습니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>WebP란 무엇인가요?</summary><p>Google이 개발한 차세대 이미지 형식으로, 손실/무손실 압축을 모두 지원하고 JPG/PNG보다 파일 크기가 작습니다.</p></details>
<details class="faq-item"><summary>품질을 얼마로 설정해야 하나요?</summary><p>80~85가 화질과 용량의 균형점입니다. 로고 등 정밀도가 필요한 경우 90 이상을 추천합니다.</p></details>
<details class="faq-item"><summary>투명도(PNG 알파)가 유지되나요?</summary><p>예, WebP는 투명도를 지원합니다.</p></details>
<details class="faq-item"><summary>모든 브라우저에서 WebP가 지원되나요?</summary><p>Chrome, Firefox, Safari(14+), Edge 등 현대 브라우저 모두 지원합니다.</p></details>
<details class="faq-item"><summary>파일이 서버로 전송되나요?</summary><p>아니요. 모두 브라우저 로컬에서 처리됩니다.</p></details>
<details class="faq-item"><summary>여러 파일을 한 번에 처리할 수 있나요?</summary><p>예, 여러 이미지를 동시에 업로드하여 일괄 변환할 수 있습니다.</p></details>
<details class="faq-item"><summary>손실 없이 변환할 수 있나요?</summary><p>품질을 100으로 설정하면 최고 품질을 유지하지만 완전한 무손실은 아닙니다.</p></details>
<details class="faq-item"><summary>절감률은 어떻게 계산되나요?</summary><p>원본 파일 크기 대비 WebP 파일 크기의 감소율로 계산됩니다.</p></details>`
  },
  en:{h1b:'WebP',sub:'Convert JPG/PNG to WebP to reduce file size',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'JPG to WebP Converter | MODOO HUB',dzText:'Drag & drop images or click to upload (multiple)',lblQ:'Quality',lblQLabel:'Quality',btnConvert:'Convert to WebP',lblResult:'Results',saved:'saved',dl:'Download',
    seoHtml:`<h2>JPG to WebP Converter</h2><p>Convert JPG/PNG images to <strong>WebP format</strong>. WebP files are typically 25–34% smaller than JPEG at equivalent quality. Adjust the quality slider for the best size/quality balance. Multiple files can be converted at once.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What is WebP?</summary><p>A next-gen image format by Google. Supports lossy and lossless compression with smaller file sizes than JPG/PNG.</p></details>
<details class="faq-item"><summary>What quality should I use?</summary><p>80–85 is the sweet spot for quality vs. size. Use 90+ for logos needing precision.</p></details>
<details class="faq-item"><summary>Is PNG transparency preserved?</summary><p>Yes — WebP supports alpha transparency.</p></details>
<details class="faq-item"><summary>Browser support?</summary><p>Chrome, Firefox, Safari 14+, Edge — all modern browsers.</p></details>
<details class="faq-item"><summary>Is my file sent to a server?</summary><p>No — fully local.</p></details>
<details class="faq-item"><summary>Multiple files at once?</summary><p>Yes — batch convert multiple images simultaneously.</p></details>
<details class="faq-item"><summary>Lossless conversion?</summary><p>Quality 100 gives best quality but is not fully lossless.</p></details>
<details class="faq-item"><summary>How is savings % calculated?</summary><p>(1 - WebP size / original size) × 100.</p></details>`
  },
  zh:{h1b:'WebP',sub:'将JPG/PNG图像转换为WebP格式以减小文件大小',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'JPG转WebP | MODOO HUB',dzText:'拖拽图片或点击上传（支持多文件）',lblQ:'质量设置',lblQLabel:'质量',btnConvert:'转换为WebP',lblResult:'转换结果',saved:'节省',dl:'下载',
    seoHtml:`<h2>JPG转WebP转换器</h2><p>将JPG/PNG图像转换为<strong>WebP格式</strong>。相同画质下WebP通常比JPG小25~34%，有效优化Web性能。可用质量滑块调节大小和画质的平衡，支持多文件同时转换。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>什么是WebP？</summary><p>Google开发的新一代图像格式，支持有损和无损压缩，文件比JPG/PNG更小。</p></details>
<details class="faq-item"><summary>应该设置多少质量？</summary><p>80~85是画质和体积的平衡点，需要精度的Logo等建议90以上。</p></details>
<details class="faq-item"><summary>PNG透明度会保留吗？</summary><p>是的，WebP支持Alpha透明度。</p></details>
<details class="faq-item"><summary>所有浏览器都支持WebP吗？</summary><p>Chrome、Firefox、Safari 14+、Edge等现代浏览器均支持。</p></details>
<details class="faq-item"><summary>文件会上传服务器吗？</summary><p>不会，所有处理在浏览器本地完成。</p></details>
<details class="faq-item"><summary>可以同时处理多个文件吗？</summary><p>可以，支持多图片同时批量转换。</p></details>
<details class="faq-item"><summary>可以无损转换吗？</summary><p>质量设为100可获得最高质量，但并非完全无损。</p></details>
<details class="faq-item"><summary>节省率如何计算？</summary><p>（1 - WebP大小/原始大小）× 100。</p></details>`
  },
  ja:{h1b:'WebP',sub:'JPG/PNG画像をWebPに変換してファイルサイズを削減',backLink:'← ホーム',langBtn:'🌐 한국어',pageTitle:'JPGからWebPへ変換 | MODOO HUB',dzText:'画像をドラッグまたはクリックしてアップロード（複数可）',lblQ:'品質設定',lblQLabel:'品質',btnConvert:'WebPに変換',lblResult:'変換結果',saved:'削減',dl:'ダウンロード',
    seoHtml:`<h2>JPGからWebPへ変換</h2><p>JPG/PNG画像を<strong>WebP形式</strong>に変換します。同等の画質でJPEGより25~34%小さいファイルを得られ、Web性能の最適化に有効です。品質スライダーでサイズと画質のバランスを調整でき、複数ファイルを同時変換できます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>WebPとは？</summary><p>Googleが開発した次世代画像フォーマット。非可逆・可逆圧縮の両方をサポートし、JPG/PNGより小さいファイルサイズです。</p></details>
<details class="faq-item"><summary>品質はいくつに設定すればいいですか？</summary><p>80〜85が画質とサイズのバランス点。ロゴなど精度が必要な場合は90以上を推奨します。</p></details>
<details class="faq-item"><summary>PNG透明度は保持されますか？</summary><p>はい、WebPはアルファ透明度をサポートしています。</p></details>
<details class="faq-item"><summary>ブラウザのサポートは？</summary><p>Chrome・Firefox・Safari 14+・Edgeなど現代のブラウザはすべて対応しています。</p></details>
<details class="faq-item"><summary>ファイルはサーバーに送信されますか？</summary><p>いいえ、すべてローカルで処理されます。</p></details>
<details class="faq-item"><summary>複数ファイルを一度に処理できますか？</summary><p>はい、複数画像を同時にバッチ変換できます。</p></details>
<details class="faq-item"><summary>可逆変換できますか？</summary><p>品質を100に設定すると最高品質ですが、完全な可逆ではありません。</p></details>
<details class="faq-item"><summary>削減率はどう計算されますか？</summary><p>（1 - WebPサイズ / 元サイズ）× 100。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','dzText','lblQ','lblQLabel','btnConvert','lblResult'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function fmtBytes(n){if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(2)+' MB';}
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFiles(e.dataTransfer.files);});
document.getElementById('fileIn').addEventListener('change',e=>loadFiles(e.target.files));
function loadFiles(files){_files=Array.from(files).filter(f=>f.type.startsWith('image/'));if(_files.length)document.getElementById('optBox').style.display='block';}
function convertAll(){
  if(!_files.length)return;
  const t=_i18n[_lang];const q=parseInt(document.getElementById('quality').value)/100;
  document.getElementById('outBox').style.display='block';
  document.getElementById('resultList').innerHTML='';
  _files.forEach(file=>{
    const url=URL.createObjectURL(file);const img=new Image();
    img.onload=()=>{
      const cvs=document.createElement('canvas');cvs.width=img.naturalWidth;cvs.height=img.naturalHeight;
      cvs.getContext('2d').drawImage(img,0,0);
      cvs.toBlob(blob=>{
        const saved=((1-blob.size/file.size)*100).toFixed(1);
        const blobUrl=URL.createObjectURL(blob);
        const fname=file.name.replace(/\.[^.]+$/,'')+'.webp';
        const div=document.createElement('div');div.className='result-item';
        const thumb=document.createElement('img');thumb.src=blobUrl;
        div.innerHTML=`<img src="${blobUrl}" width="48" height="48" style="object-fit:cover;border-radius:4px;border:1px solid var(--border);">
<div class="result-info"><div class="fname">${file.name}</div><div class="sizes">${fmtBytes(file.size)} → ${fmtBytes(blob.size)}</div><div class="saved">▼ ${saved}% ${t.saved}</div></div>
<a href="${blobUrl}" download="${fname}" class="result-dl">${t.dl}</a>`;
        document.getElementById('resultList').appendChild(div);
        URL.revokeObjectURL(url);
      },'image/webp',q);
    };img.src=url;
  });
}
_lang=detectLang();applyLang();
</script>
