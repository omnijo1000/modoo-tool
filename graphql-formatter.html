const _i18n={
  ko:{pageTitle:'GraphQL 포맷터 - GraphQL 쿼리 정렬·최소화 | MODOO HUB',h1b:'포맷터',sub:'GraphQL 쿼리 정렬·최소화 즉시 변환',backLink:'← 모두의 툴',langBtn:'🌐 EN',labelIn:'GraphQL 입력',labelOut:'결과',btnFormat:'포맷',btnMinify:'최소화',btnCopy:'복사',btnClear:'초기화',copied:'복사됨 ✓',
    seoHtml:`<h2>GraphQL 포맷터란?</h2><p>GraphQL 쿼리·뮤테이션·구독을 <strong>일관된 들여쓰기와 줄바꿈</strong>으로 재구성해 가독성을 높입니다. 최소화(Minify) 기능으로 불필요한 공백을 제거해 HTTP 요청 payload 크기를 줄일 수도 있습니다. Apollo Studio, GraphQL Playground 없이 브라우저에서 즉시 사용하세요.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>GraphQL 쿼리 포맷팅이 필요한 이유는?</summary><p>개발 중 가독성 향상, 코드 리뷰 시 변경 사항 파악, 팀 내 코드 스타일 통일을 위해 필요합니다.</p></details>
<details class="faq-item"><summary>GraphQL 최소화는 언제 사용하나요?</summary><p>HTTP 요청의 query 파라미터로 전송할 때 불필요한 공백을 제거해 payload 크기를 줄이고 URL 인코딩을 단순화합니다.</p></details>
<details class="faq-item"><summary>GraphQL 주석은 처리되나요?</summary><p>GraphQL에서 # 주석은 토큰 사이에 위치합니다. 이 포맷터는 주석을 제거하고 구조만 재정렬합니다.</p></details>
<details class="faq-item"><summary>쿼리 변수는 포맷되나요?</summary><p>이 도구는 GraphQL 쿼리 문자열만 포맷합니다. 쿼리 변수(variables)는 JSON 포맷터를 사용하세요.</p></details>
<details class="faq-item"><summary>뮤테이션과 구독도 지원하나요?</summary><p>네, mutation {...}, subscription {...} 키워드를 포함한 모든 GraphQL 문서를 지원합니다.</p></details>
<details class="faq-item"><summary>스키마 정의도 포맷 가능한가요?</summary><p>type, interface, enum, input 등 SDL(Schema Definition Language)도 동일한 규칙으로 포맷합니다.</p></details>
<details class="faq-item"><summary>인수가 긴 쿼리는?</summary><p>인수가 포함된 필드도 올바르게 처리합니다. user(id: "1", name: "Alice") 형식을 유지합니다.</p></details>
<details class="faq-item"><summary>포맷 결과를 복사하는 방법은?</summary><p>복사 버튼을 클릭하거나 결과 텍스트를 직접 선택해 복사하세요.</p></details>`
  },
  en:{pageTitle:'GraphQL Formatter - Format & Minify GraphQL Queries | MODOO HUB',h1b:'Formatter',sub:'Format or minify GraphQL queries instantly',backLink:'← All Tools',langBtn:'🌐 中文',labelIn:'GraphQL Input',labelOut:'Result',btnFormat:'Format',btnMinify:'Minify',btnCopy:'Copy',btnClear:'Clear',copied:'Copied ✓',
    seoHtml:`<h2>GraphQL Formatter</h2><p>Reformat GraphQL queries, mutations, and subscriptions with <strong>consistent indentation and line breaks</strong> for readability. Minify to strip whitespace for HTTP payload optimization. Use it directly in the browser without Apollo Studio or GraphQL Playground.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Why format GraphQL queries?</summary><p>Improves readability during development, makes code review changes clearer, and enforces consistent team style.</p></details>
<details class="faq-item"><summary>When to minify?</summary><p>When sending GraphQL as HTTP query parameters — removing whitespace reduces payload size and simplifies URL encoding.</p></details>
<details class="faq-item"><summary>Are comments handled?</summary><p># comments are removed during formatting — only structure is reformatted.</p></details>
<details class="faq-item"><summary>What about query variables?</summary><p>This tool formats the GraphQL query string only. Use a JSON formatter for variables.</p></details>
<details class="faq-item"><summary>Mutations and subscriptions?</summary><p>Yes — mutation {...} and subscription {...} are fully supported.</p></details>
<details class="faq-item"><summary>Schema definitions (SDL)?</summary><p>type, interface, enum, input SDL documents are also formatted with the same rules.</p></details>
<details class="faq-item"><summary>Long argument lists?</summary><p>Fields with arguments like user(id: "1", name: "Alice") are preserved correctly.</p></details>
<details class="faq-item"><summary>How to copy the result?</summary><p>Click the Copy button or select the output text and copy manually.</p></details>`
  },
  zh:{pageTitle:'GraphQL格式化工具 - 格式化和压缩GraphQL查询 | MODOO HUB',h1b:'格式化工具',sub:'即时格式化或压缩GraphQL查询',backLink:'← 所有工具',langBtn:'🌐 日本語',labelIn:'GraphQL输入',labelOut:'结果',btnFormat:'格式化',btnMinify:'压缩',btnCopy:'复制',btnClear:'清除',copied:'已复制 ✓',
    seoHtml:`<h2>GraphQL格式化工具</h2><p>将GraphQL查询、变更和订阅用<strong>一致的缩进和换行</strong>重新格式化，提高可读性。压缩功能去除空格以优化HTTP载荷。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>为什么要格式化GraphQL查询？</summary><p>提高开发可读性，使代码审查更清晰，统一团队风格。</p></details>
<details class="faq-item"><summary>什么时候需要压缩？</summary><p>通过HTTP查询参数发送GraphQL时，删除空格可减小载荷大小并简化URL编码。</p></details>
<details class="faq-item"><summary>注释如何处理？</summary><p>#注释在格式化时会被删除，只重新格式化结构。</p></details>
<details class="faq-item"><summary>查询变量呢？</summary><p>此工具只格式化查询字符串，变量请使用JSON格式化工具。</p></details>
<details class="faq-item"><summary>支持变更和订阅吗？</summary><p>是的，mutation {...}和subscription {...}都支持。</p></details>
<details class="faq-item"><summary>Schema定义(SDL)也支持吗？</summary><p>type、interface、enum、input等SDL文档也按同样规则格式化。</p></details>
<details class="faq-item"><summary>长参数列表怎么处理？</summary><p>带参数的字段如user(id:"1",name:"Alice")会被正确保留。</p></details>
<details class="faq-item"><summary>如何复制结果？</summary><p>点击复制按钮，或直接选择输出文本复制。</p></details>`
  },
  ja:{pageTitle:'GraphQLフォーマッター - GraphQLクエリの整形・最小化 | MODOO HUB',h1b:'フォーマッター',sub:'GraphQLクエリを即時整形・最小化',backLink:'← ホーム',langBtn:'🌐 한국어',labelIn:'GraphQL入力',labelOut:'結果',btnFormat:'フォーマット',btnMinify:'最小化',btnCopy:'コピー',btnClear:'クリア',copied:'コピー完了 ✓',
    seoHtml:`<h2>GraphQLフォーマッターとは</h2><p>GraphQLクエリ・ミューテーション・サブスクリプションを<strong>一貫したインデントと改行</strong>で再フォーマットして可読性を高めます。最小化でHTTPペイロードを最適化できます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>なぜGraphQLクエリをフォーマットするのですか？</summary><p>開発中の可読性向上、コードレビューの明確化、チームスタイルの統一のためです。</p></details>
<details class="faq-item"><summary>最小化はいつ使いますか？</summary><p>HTTPクエリパラメータでGraphQLを送信する際、空白を削除してペイロードサイズを削減しURLエンコードを単純化します。</p></details>
<details class="faq-item"><summary>コメントはどう処理されますか？</summary><p>#コメントはフォーマット時に削除され、構造のみ再フォーマットされます。</p></details>
<details class="faq-item"><summary>クエリ変数は？</summary><p>このツールはクエリ文字列のみフォーマットします。変数にはJSONフォーマッターを使用してください。</p></details>
<details class="faq-item"><summary>ミューテーションとサブスクリプションも対応？</summary><p>はい、mutation {...}とsubscription {...}も完全サポートします。</p></details>
<details class="faq-item"><summary>スキーマ定義（SDL）も？</summary><p>type、interface、enum、input等のSDLドキュメントも同じルールでフォーマットします。</p></details>
<details class="faq-item"><summary>長い引数リストは？</summary><p>user(id:"1",name:"Alice")のような引数付きフィールドも正しく処理します。</p></details>
<details class="faq-item"><summary>結果をコピーするには？</summary><p>コピーボタンをクリックするか、出力テキストを直接選択してコピーしてください。</p></details>`
  }
};
const LANGS=['ko','en','zh','ja'];
let _lang='ko';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('labelIn').textContent=t.labelIn;document.getElementById('labelOut').textContent=t.labelOut;
  document.getElementById('btnFormat').textContent=t.btnFormat;document.getElementById('btnMinify').textContent=t.btnMinify;
  document.getElementById('btnCopy').textContent=t.btnCopy;document.getElementById('btnClear').textContent=t.btnClear;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function gqlFormat(src){
  let out='';let depth=0;const ind='  ';
  src=src.replace(/#[^\n]*/g,'').replace(/\s+/g,' ').trim();
  for(let i=0;i<src.length;i++){
    const c=src[i];
    if(c==='{'){out+=(' '+c+'\n'+ind.repeat(++depth)).trim();out+='\n'+ind.repeat(depth);}
    else if(c==='}'){depth--;out+='\n'+ind.repeat(depth)+c;}
    else if(c===','){out+=c+'\n'+ind.repeat(depth);}
    else{out+=c;}
  }
  return out.replace(/\n\s*\n/g,'\n').trim();
}
function gqlMinify(src){return src.replace(/#[^\n]*/g,'').replace(/\s+/g,' ').replace(/\s*([{}()\[\]:,])\s*/g,'$1').trim();}
function autoFormat(){format();}
function clearAll(){document.getElementById('gqlIn').value='';document.getElementById('gqlOut').value='';}
function format(){const v=document.getElementById('gqlIn').value.trim();if(v)document.getElementById('gqlOut').value=gqlFormat(v);}
function minify(){const v=document.getElementById('gqlIn').value.trim();if(v)document.getElementById('gqlOut').value=gqlMinify(v);}
function copyOut(){
  const t=_i18n[_lang];const v=document.getElementById('gqlOut').value;if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{
    const btn=document.getElementById('btnCopy');const orig=btn.textContent;
    btn.textContent=t.copied;setTimeout(()=>btn.textContent=orig,2000);
  });
}
_lang=detectLang();applyLang();
</script>
