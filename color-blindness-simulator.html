    seoHtml:`<h2>색맹 시뮬레이터</h2><p>이미지를 업로드하면 적색맹(제1색맹), 녹색맹(제2색맹), 청황색맹(제3색맹), 전색맹, 제1색약, 제2색약 등 다양한 색각 유형으로 어떻게 보이는지 시뮬레이션합니다. 디자이너가 색각 장애를 가진 사용자를 위해 접근성 높은 디자인을 만들 때 필수 도구입니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>색맹이란?</summary><p>색각 이상으로 특정 색을 구별하기 어려운 상태입니다. 남성의 약 8%, 여성의 약 0.5%가 색각 이상을 가집니다.</p></details>
<details class="faq-item"><summary>적색맹과 녹색맹의 차이는?</summary><p>적색맹(제1색맹)은 적색 감지 원추세포가 없고, 녹색맹(제2색맹)은 녹색 감지 원추세포가 없습니다. 둘 다 적-녹 구별이 어렵습니다.</p></details>
<details class="faq-item"><summary>색맹 친화적 디자인이란?</summary><p>색만으로 정보를 전달하지 않고, 패턴·형태·텍스트를 함께 사용합니다. 또한 색 조합을 신중하게 선택합니다.</p></details>
<details class="faq-item"><summary>이 시뮬레이터는 정확한가요?</summary><p>행렬 기반 근사값으로, 실제 색각 경험을 완벽히 재현하지는 않지만 디자인 검토에 충분히 유용합니다.</p></details>
<details class="faq-item"><summary>파일이 서버에 업로드되나요?</summary><p>아니요. 모든 처리가 브라우저에서 이루어집니다.</p></details>

<details class="faq-item"><summary>어떤 색상 조합이 색맹에 어렵나요?</summary><p>빨강-초록, 빨강-검정, 초록-갈색, 파란-보라가 가장 구별하기 어렵습니다.</p></details>

    seoHtml:`<h2>Color Blindness Simulator</h2><p>Upload an image and see how it appears to people with protanopia (red blindness), deuteranopia (green blindness), tritanopia (blue-yellow), achromatopsia (total color blindness), and milder anomaly variants. An essential tool for designers building accessible experiences for colorblind users. All processing happens locally — no uploads.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>What is color blindness?</summary><p>A color vision deficiency where certain colors are hard to distinguish. Affects ~8% of males and ~0.5% of females.</p></details>
<details class="faq-item"><summary>Protanopia vs. deuteranopia?</summary><p>Protanopia lacks red cone cells; deuteranopia lacks green cone cells. Both cause red-green confusion.</p></details>
<details class="faq-item"><summary>What is colorblind-friendly design?</summary><p>Don't rely on color alone — use patterns, shapes, and text labels. Choose color combinations carefully.</p></details>
<details class="faq-item"><summary>How accurate is this simulator?</summary><p>Matrix-based approximation — close enough for design review but not a perfect representation of lived experience.</p></details>
<details class="faq-item"><summary>Are files uploaded?</summary><p>No — everything runs in your browser.</p></details>
<details class="faq-item"><summary>Can I download the simulated images?</summary><p>Yes — click the download button under each simulation.</p></details>
<details class="faq-item"><summary>What color combinations are hardest for colorblind users?</summary><p>Red-green, red-black, green-brown, and blue-purple are the most problematic.</p></details>
<details class="faq-item"><summary>Can I use this to test for color blindness?</summary><p>No — this is a design tool. Actual testing requires professional evaluation like an Ishihara test.</p></details>`

<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>什么是色盲？</summary><p>一种难以区分某些颜色的色觉异常。约影响8%的男性和0.5%的女性。</p></details>
<details class="faq-item"><summary>红色盲和绿色盲有什么区别？</summary><p>红色盲缺乏红色视锥细胞，绿色盲缺乏绿色视锥细胞，两者都难以区分红绿色。</p></details>
<details class="faq-item"><summary>什么是色盲友好设计？</summary><p>不单靠颜色传达信息，同时使用图案、形状和文字标签，谨慎选择颜色组合。</p></details>
<details class="faq-item"><summary>这个模拟器准确吗？</summary><p>基于矩阵的近似值，足够用于设计审查，但不能完美复现实际色觉体验。</p></details>
<details class="faq-item"><summary>文件会上传吗？</summary><p>不会，所有处理都在浏览器中完成。</p></details>
<details class="faq-item"><summary>可以下载模拟图像吗？</summary><p>可以，点击每个模拟图像下方的下载按钮。</p></details>
<details class="faq-item"><summary>哪些颜色组合对色盲用户最难区分？</summary><p>红绿、红黑、绿棕和蓝紫最难区分。</p></details>

    seoHtml:`<h2>色盲シミュレーター</h2><p>画像をアップロードすると、第一色盲（赤色盲）、第二色盲（緑色盲）、第三色盲（青黄色盲）、全色盲、第一・第二色弱など様々な色覚タイプでどう見えるかをシミュレーションします。色覚障害を持つユーザーにアクセシブルなデザインを作るデザイナーに必須のツールです。すべてブラウザ内で処理されます。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>色盲とは何ですか？</summary><p>特定の色の区別が困難な色覚異常で、男性の約8%、女性の約0.5%に影響します。</p></details>
<details class="faq-item"><summary>第一色盲と第二色盲の違いは？</summary><p>第一色盲は赤の錐体細胞がなく、第二色盲は緑の錐体細胞がありません。どちらも赤緑の区別が困難です。</p></details>
<details class="faq-item"><summary>色盲対応デザインとは？</summary><p>色だけで情報を伝えず、パターン・形・テキストも使います。また、色の組み合わせを慎重に選びます。</p></details>
<details class="faq-item"><summary>このシミュレーターは正確ですか？</summary><p>行列ベースの近似値で、デザインレビューには十分ですが、実際の色覚体験の完全な再現ではありません。</p></details>
<details class="faq-item"><summary>ファイルはアップロードされますか？</summary><p>いいえ、すべてブラウザで処理されます。</p></details>
<details class="faq-item"><summary>シミュレーション画像をダウンロードできますか？</summary><p>はい、各シミュレーション画像下のダウンロードボタンをクリックしてください。</p></details>
<details class="faq-item"><summary>色盲のユーザーに最も難しい色の組み合わせは？</summary><p>赤緑、赤黒、緑茶色、青紫が最も区別しにくいです。</p></details>
<details class="faq-item"><summary>色盲のテストに使えますか？</summary><p>いいえ、これはデザインツールです。実際の検査は石原色覚検査などの専門的評価が必要です。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','dropText'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  if(_img)renderAll();
}
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])loadImg(e.dataTransfer.files[0]);});
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])loadImg(e.target.files[0]);});
function loadImg(file){
  const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>{_img=img;renderAll();};img.src=ev.target.result;};reader.readAsDataURL(file);
}
function applyMatrix(imgData,matrix){
  const d=imgData.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    d[i]=Math.min(255,Math.max(0,r*matrix[0]+g*matrix[1]+b*matrix[2]));
    d[i+1]=Math.min(255,Math.max(0,r*matrix[3]+g*matrix[4]+b*matrix[5]));
    d[i+2]=Math.min(255,Math.max(0,r*matrix[6]+g*matrix[7]+b*matrix[8]));
  }
  return imgData;
}
function renderAll(){
  const t=_i18n[_lang];const names=NAMES[_lang];const info=INFO[_lang];
  document.getElementById('typeRow').style.display='block';
  const grid=document.getElementById('simGrid');grid.innerHTML='';
  const maxW=400;const scale=_img.width>maxW?maxW/_img.width:1;const W=Math.round(_img.width*scale),H=Math.round(_img.height*scale);
  TYPES.forEach(type=>{
    const card=document.createElement('div');card.className='sim-card';
    const header=document.createElement('div');header.className='sim-header';
    header.innerHTML=`<span class="sim-name">${names[type.key]}</span><span class="sim-info">${info[type.key]||''}</span>`;
    const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;canvas.className='sim-canvas';
    const ctx=canvas.getContext('2d');ctx.drawImage(_img,0,0,W,H);
    if(type.matrix){const imgData=ctx.getImageData(0,0,W,H);ctx.putImageData(applyMatrix(imgData,type.matrix),0,0);}
    const dlRow=document.createElement('div');dlRow.className='dl-row';
    const dlBtn=document.createElement('button');dlBtn.className='dl-btn';dlBtn.textContent=t.dlBtn;
    dlBtn.onclick=()=>{const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=`${type.key}.png`;a.click();};
    dlRow.appendChild(dlBtn);card.append(header,canvas,dlRow);grid.appendChild(card);
  });
  document.getElementById('pillRow').innerHTML='';
}
_lang=detectLang();applyLang();
</script>
