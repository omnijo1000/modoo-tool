    seoHtml:`<h2>Image Base64 Encoder</h2><p>Convert images to <strong>Base64 strings</strong>. Generates Data URL, raw Base64, HTML img tag, and CSS background code. Useful for embedding images inline in HTML, CSS, JSON, or email without a separate file.</p>

<details class="faq-item"><summary>Data URL vs Base64?</summary><p>Data URL includes the data:image/...;base64, prefix; Base64 is just the encoded data portion.</p></details>`
  },
  zh:{h1b:'Base64编码器',sub:'将图像转换为Base64字符串',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'图像Base64编码器 | MODOO HUB',dzText:'拖拽图片或点击上传',tabDataurl:'Data URL',tabB64:'仅Base64',tabHtml:'HTML',tabCss:'CSS',btnCopy:'复制',copied:'已复制！',statOrig:'原始大小',statB64:'Base64大小',statRatio:'大小增加',
    seoHtml:`<h2>图像Base64编码器</h2><p>将图像转换为<strong>Base64字符串</strong>，生成Data URL、纯Base64、HTML img标签和CSS背景代码。适用于在HTML、CSS、JSON或邮件中内联嵌入图像，无需单独的文件。</p>

<details class="faq-item"><summary>Base64编码会增加文件大小吗？</summary><p>是的，Base64编码后大小增加约33%。</p></details>

  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','dzText','tabDataurl','tabB64','tabHtml','tabCss','btnCopy'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
  if(_dataUrl)renderStat();
}
function fmtBytes(n){if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(2)+' MB';}
document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');_activeTab=tab.dataset.tab;renderCode();});});
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFile(e.dataTransfer.files[0]);});
document.getElementById('fileIn').addEventListener('change',e=>loadFile(e.target.files[0]));
function loadFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const r=new FileReader();
  r.onload=e=>{_dataUrl=e.target.result;_b64=_dataUrl.split(',')[1];_mime=file.type;document.getElementById('outBox').style.display='block';renderStat();renderCode();};
  r.readAsDataURL(file);
}
function renderStat(){
  const t=_i18n[_lang];const orig=Math.round(_b64.length*3/4);const b64size=_b64.length;const ratio=((b64size/orig-1)*100).toFixed(1);
  document.getElementById('statRow').innerHTML=`<div class="stat-card"><div class="stat-val">${fmtBytes(orig)}</div><div class="stat-label">${t.statOrig}</div></div><div class="stat-card"><div class="stat-val">${fmtBytes(b64size)}</div><div class="stat-label">${t.statB64}</div></div><div class="stat-card"><div class="stat-val">+${ratio}%</div><div class="stat-label">${t.statRatio}</div></div>`;
}
function renderCode(){
  if(!_dataUrl)return;
  const codes={dataurl:_dataUrl,b64:_b64,html:`<img src="${_dataUrl}" alt="">`,css:`background-image: url("${_dataUrl}");`};
  document.getElementById('outText').value=codes[_activeTab]||'';
}
function copyOut(){
  const t=_i18n[_lang];const b=document.getElementById('btnCopy');navigator.clipboard.writeText(document.getElementById('outText').value).then(()=>{b.textContent=t.copied;setTimeout(()=>b.textContent=t.btnCopy,1500);});
}
_lang=detectLang();applyLang();
</script>
