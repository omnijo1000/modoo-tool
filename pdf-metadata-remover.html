    seoHtml:`<h2>PDF Metadata Remover</h2><p>Remove metadata from PDF files — author, title, dates, and software information. Before distributing a PDF, removing this metadata is an important privacy measure to prevent unintentional disclosure of personal or company information. Uses pdf-lib to process files directly in your browser — nothing is uploaded to a server.</p>

<details class="faq-item"><summary>削除後にファイルサイズは変わりますか？</summary><p>メタデータは小さいため、ファイルサイズへの影響はほぼありません。</p></details>
<details class="faq-item"><summary>XMPメタデータも削除されますか？</summary><p>このツールはPDF情報ディクショナリを削除します。埋め込みXMPメタデータは別途処理が必要な場合があります。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;
  ['h1Accent','subEl','backLink','langBtn','dropText','dropHint','btnRemove','btnSelAll','btnDeselAll'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});
let _metaInfo={};
async function handleFile(file){
  _fileName=file.name;
  _pdfBytes=new Uint8Array(await file.arrayBuffer());
  const pdf=await pdfjsLib.getDocument({data:_pdfBytes}).promise;
  const meta=await pdf.getMetadata().catch(()=>({info:{}}));
  _metaInfo=meta.info||{};
  renderMetaTable();
  document.getElementById('metaSection').style.display='block';
  document.getElementById('resultMsg').innerHTML='';
}
function renderMetaTable(){
  const t=_i18n[_lang];const labels=t.labels;
  const table=document.getElementById('metaTable');
  table.innerHTML=`<div class="meta-header"><span class="meta-title">${t.lblBefore}</span></div>
<div class="meta-row" style="font-weight:700;font-size:10px;font-family:'DM Mono',monospace;color:var(--text-dim)"><span>${t.lblField}</span><span>${t.lblValue}</span><span>${t.lblRemove}</span></div>
${META_FIELDS.map(f=>{
  const val=_metaInfo[f];
  const display=val||`<span class="empty">${t.empty}</span>`;
  return`<div class="meta-row"><span class="meta-key">${labels[f]||f}</span><span class="meta-val">${val||`<span class="empty">${t.empty}</span>`}</span><input class="check-toggle" type="checkbox" id="chk_${f}" ${val?'checked':'disabled'}></div>`;
}).join('')}`;
}
function selectAll(v){META_FIELDS.forEach(f=>{const el=document.getElementById('chk_'+f);if(el&&!el.disabled)el.checked=v;});}
async function removeMetadata(){
  const t=_i18n[_lang];
  try{
    const doc=await PDFLib.PDFDocument.load(_pdfBytes);
    const toRemove=META_FIELDS.filter(f=>document.getElementById('chk_'+f)?.checked);
    const info={};
    META_FIELDS.forEach(f=>{if(!toRemove.includes(f)&&_metaInfo[f])info[f]=_metaInfo[f];});
    doc.setTitle(info.Title||'');doc.setAuthor(info.Author||'');doc.setSubject(info.Subject||'');
    doc.setKeywords([info.Keywords||'']);doc.setCreator(info.Creator||'');doc.setProducer(info.Producer||'');
    const saved=await doc.save();
    const blob=new Blob([saved],{type:'application/pdf'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=_fileName.replace(/\.pdf$/i,'_no_meta.pdf');a.click();
    document.getElementById('resultMsg').innerHTML=`<div class="result-msg ok">${t.done}</div>`;
  }catch(e){document.getElementById('resultMsg').innerHTML=`<div class="result-msg err">${t.err}</div>`;}
}
_lang=detectLang();applyLang();
</script>
