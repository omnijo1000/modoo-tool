:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#34d399;--accent2:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}

h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:480px){.row2{grid-template-columns:1fr;}}
.field label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}

.section-title{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

.calc-btn:hover{opacity:.85;}
.result{margin-top:14px;display:none;}
.compare-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:480px){.compare-wrap{grid-template-columns:1fr;}}
.comp-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.comp-card.extra{border-color:var(--accent);}
.comp-title{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim);margin-bottom:10px;}
.comp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.comp-key{font-size:12px;color:var(--text-muted);}
.comp-val{font-size:13px;font-family:'DM Mono',monospace;font-weight:700;}
.comp-val.good{color:var(--accent);}
.comp-val.bad{color:var(--accent2);}
.save-banner{background:rgba(52,211,153,.1);border:1px solid var(--accent);border-radius:10px;padding:14px;text-align:center;margin-bottom:14px;}
.save-title{font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:4px;}
.save-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
.amort-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.amort-header{display:grid;grid-template-columns:60px 1fr 1fr 1fr 1fr;gap:0;padding:8px 12px;background:var(--surface2);font-size:10px;font-family:'DM Mono',monospace;color:var(--text-dim);}
.amort-row{display:grid;grid-template-columns:60px 1fr 1fr 1fr 1fr;gap:0;padding:8px 12px;border-top:1px solid var(--border);font-size:11px;font-family:'DM Mono',monospace;}
.amort-row:hover{background:var(--surface2);}
.amort-scroll{max-height:240px;overflow-y:auto;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

const _i18n={
  ko:{sub:'대출 상환 기간 · 총 이자 · 추가 납입 절감 효과 계산',langBtn:'🌐 EN',backBtn:'← 모두의 툴',sec1:'현재 대출 정보',balLabel:'현재 잔액',rateLabel:'연이율 (%)',pmtLabel:'월 납입금',extraLabel:'추가 납입금 (월)',calcBtn:'▶ 계산하기',saveTitle:'추가 납입으로 절감',baseTitle:'기본 납입',extraTitle:'추가 납입',payoffLabel:'상환 완료',monthsLabel:'개월수',totalIntLabel:'총 이자',totalPayLabel:'총 납입',aMonth:'월',aPmt:'납입금',aInt:'이자',aPrin:'원금',aBalance:'잔액',seoHtml:'<h2>Loan Payoff Calculator란?</h2><p>현재 대출 잔액·연이율·월 납입금을 입력하면 <strong>상환 완료 시점</strong>과 <strong>총 이자 비용</strong>을 즉시 계산합니다. 추가 납입금을 설정하면 기본 납입과 비교하여 절감되는 이자 금액과 단축되는 기간을 확인할 수 있습니다. 원리금 균등 상환 방식을 기반으로 하며, 월별 원금·이자 내역표도 제공합니다.</p><details class="faq-item"><summary>대출 상환 계산기에 어떤 정보를 입력해야 하나요?</summary><p>현재 잔액(남은 원금), 연이율(%), 월 납입금 세 가지가 필수입니다. 추가 납입금은 선택 사항으로, 매월 일정 금액을 더 납입할 경우의 절감 효과를 비교할 때 입력합니다.</p></details><details class="faq-item"><summary>추가 납입금이 왜 중요한가요?</summary><p>추가 납입금은 이자가 아닌 원금에서 직접 차감됩니다. 원금이 줄면 다음 달 이자 계산 기준이 낮아지는 복리 효과가 생겨, 소액 추가 납입으로도 수백만 원의 이자를 절감하고 상환 기간을 수년 단축할 수 있습니다.</p></details><details class="faq-item"><summary>월 납입금이 이자보다 적으면 어떻게 되나요?</summary><p>월 납입금이 당월 발생 이자보다 적거나 같으면 원금이 줄지 않아 대출을 영원히 갚을 수 없습니다. 이 경우 계산기는 오류를 표시합니다. 납입금이 최소 이자보다 충분히 커야 상환이 가능합니다.</p></details><details class="faq-item"><summary>원리금 균등 상환이란 무엇인가요?</summary><p>매월 동일한 금액을 납입하되, 초기에는 이자 비중이 높고 시간이 지날수록 원금 비중이 늘어나는 방식입니다. 하단 상환 일정표에서 월별 이자·원금·잔액 변화를 확인할 수 있습니다.</p></details><details class="faq-item"><summary>계산 결과는 실제 대출과 정확히 일치하나요?</summary><p>이 계산기는 표준 원리금 균등 상환 공식을 사용하므로 대부분의 주택담보대출·신용대출에 근사합니다. 다만 취급 수수료, 중도 상환 수수료, 변동금리 조정, 보험료 등은 반영되지 않으므로 참고용으로만 활용하세요.</p></details><details class="faq-item"><summary>추가 납입이 대출 상환 기간을 얼마나 단축하나요?</summary><p>월 납입금에서 10만원을 추가로 납입하면 금리에 따라 수개월에서 수년까지 단축될 수 있습니다. 금리가 높을수록 조기 상환 효과가 큽니다. 이 계산기로 추가 납입액별 단축 효과를 확인하세요.</p></details><details class="faq-item"><summary>거치 기간 종료 후 원리금상환 계획을 어떻게 세우나요?</summary><p>거치 기간 종료 후 잔여 원금, 남은 기간, 적용 금리를 입력하면 새 월 납입금을 계산할 수 있습니다. 변경된 조건으로 원리금균등상환을 재설계하는 데 활용하세요.</p></details><details class="faq-item"><summary>연간 일괄 추가 상환과 월별 추가 상환 중 어느 쪽이 더 유리한가요?</summary><p>같은 총액이라면 월별 소액 추가 상환이 이자 절감 면에서 더 유리합니다. 이자는 잔여 원금에 매일 계산되므로 원금을 빨리 줄일수록 이자 절약 효과가 큽니다.</p></details>'},
  en:{sub:'Loan payoff date · Total interest · Extra payment savings',langBtn:'🌐 中文',backBtn:'← All Tools',sec1:'Current Loan Info',balLabel:'Current Balance',rateLabel:'Annual Rate (%)',pmtLabel:'Monthly Payment',extraLabel:'Extra Payment (mo.)',calcBtn:'▶ Calculate',saveTitle:'Savings with extra payment',baseTitle:'Regular Payment',extraTitle:'With Extra Payment',payoffLabel:'Payoff Date',monthsLabel:'Months',totalIntLabel:'Total Interest',totalPayLabel:'Total Paid',aMonth:'Mo.',aPmt:'Payment',aInt:'Interest',aPrin:'Principal',aBalance:'Balance',seoHtml:'<h2>Loan Payoff Calculator</h2><p>Enter your current loan balance, annual interest rate, and monthly payment to instantly calculate your <strong>payoff date</strong> and <strong>total interest cost</strong>. Add an optional extra monthly payment to compare savings — see exactly how much interest you avoid and how many months sooner you\'ll be debt-free. Includes a full month-by-month amortization schedule.</p><details class="faq-item"><summary>What information do I need to use this calculator?</summary><p>You need three values: current balance (remaining principal), annual interest rate (%), and monthly payment amount. The extra payment field is optional — use it to compare how much you save by paying a little more each month.</p></details><details class="faq-item"><summary>Why does extra payment save so much interest?</summary><p>Extra payments reduce your principal directly, which lowers the interest charged in every future month — a compounding effect. Even a small extra amount each month can save thousands in interest and cut years off your loan term.</p></details><details class="faq-item"><summary>What happens if my payment is too low?</summary><p>If your monthly payment is less than or equal to the monthly interest charge, your principal never decreases and the loan can never be paid off. The calculator will show an error in this case — you must increase your payment above the monthly interest amount.</p></details><details class="faq-item"><summary>What is an amortization schedule?</summary><p>An amortization schedule breaks down each monthly payment into its interest and principal portions. Early payments are mostly interest; later payments are mostly principal. The table below the results shows this month-by-month breakdown for up to 360 months.</p></details><details class="faq-item"><summary>Are the results accurate for my actual loan?</summary><p>This calculator uses the standard fixed-rate amortization formula, which matches most mortgages and personal loans. It does not account for origination fees, prepayment penalties, variable rate adjustments, or insurance. Use results as estimates and verify with your lender.</p></details><details class="faq-item"><summary>How much does an extra payment reduce my loan term?</summary><p>Even a modest extra payment each month can shorten your loan by months or years depending on the interest rate. The higher the rate, the bigger the impact. Use this calculator to see how much each extra amount saves.</p></details><details class="faq-item"><summary>How do I plan my payments after an interest-only period ends?</summary><p>After the interest-only period, enter the remaining principal, remaining term, and applicable rate into this calculator to find your new monthly payment under standard amortization.</p></details><details class="faq-item"><summary>Is it better to make an annual lump-sum extra payment or monthly extra payments?</summary><p>Monthly extra payments are more effective than a single annual payment of the same total, because interest accrues daily on the remaining principal — reducing principal sooner saves more interest overall.</p></details>'},
  zh:{sub:'贷款还清日期·总利息·提前还款节省金额',langBtn:'🌐 日本語',backBtn:'← 所有工具',sec1:'当前贷款信息',balLabel:'当前余额',rateLabel:'年利率（%）',pmtLabel:'月还款额',extraLabel:'额外还款（月）',calcBtn:'▶ 计算',saveTitle:'额外还款节省',baseTitle:'正常还款',extraTitle:'额外还款',payoffLabel:'还清日期',monthsLabel:'月数',totalIntLabel:'总利息',totalPayLabel:'总还款',aMonth:'月',aPmt:'还款额',aInt:'利息',aPrin:'本金',aBalance:'余额',seoHtml:'<h2>贷款还清计算器</h2><p>输入当前贷款余额、年利率和月还款额，立即计算<strong>还清日期</strong>和<strong>总利息成本</strong>。添加额外月还款额，对比节省的利息和缩短的还款期限。附完整的逐月还款计划表，清晰展示每月本金与利息分配。</p><details class="faq-item"><summary>使用此计算器需要哪些信息？</summary><p>需要三个数值：当前余额（剩余本金）、年利率（%）和月还款额。额外还款字段为可选项，用于比较每月多还一点时节省的利息金额。</p></details><details class="faq-item"><summary>为什么额外还款能节省大量利息？</summary><p>额外还款直接减少本金，从而降低未来每月的利息计算基数，产生复利效果。即使每月多还少量金额，也能节省数万元利息并提前数年还清贷款。</p></details><details class="faq-item"><summary>月还款额低于利息会怎样？</summary><p>如果月还款额小于或等于当月利息，本金永远不会减少，贷款将无法还清。此时计算器会显示错误提示，必须将还款额提高到高于月利息的水平。</p></details><details class="faq-item"><summary>什么是还款摊销计划？</summary><p>摊销计划将每月还款分解为利息和本金两部分。初期还款以利息为主，后期以本金为主。结果下方的表格展示最多360个月的逐月明细。</p></details><details class="faq-item"><summary>计算结果与实际贷款完全一致吗？</summary><p>本计算器使用标准等额还款公式，与大多数房贷和个人贷款相符。但不包含手续费、提前还款违约金、浮动利率调整或保险费用。请将结果作为参考，并向贷款机构核实。</p></details><details class="faq-item"><summary>额外还款能缩短多少还款期限？</summary><p>每月额外还款可缩短贷款数月乃至数年，利率越高效果越显著。使用本计算器可查看不同额外还款金额对还款期限的具体影响。</p></details><details class="faq-item"><summary>利率期结束后如何规划还款？</summary><p>在本计算器中输入剩余本金、剩余期限和适用利率，即可按标准等额还款方式计算出新的月供金额。</p></details><details class="faq-item"><summary>年度一次性额外还款和月度额外还款哪个更划算？</summary><p>在总额相同的情况下，月度额外还款比年度一次性还款更有效，因为利息按剩余本金每日计算，越早减少本金节省的利息越多。</p></details>'},
  ja:{sub:'ローン完済日 · 総利息 · 繰り上げ返済の節約効果',langBtn:'🌐 한국어',backBtn:'← ホーム',sec1:'現在のローン情報',balLabel:'現在残高',rateLabel:'年利率 (%)',pmtLabel:'月返済額',extraLabel:'追加返済額（月）',calcBtn:'▶ 計算する',saveTitle:'追加返済による節約',baseTitle:'通常返済',extraTitle:'追加返済',payoffLabel:'完済日',monthsLabel:'ヶ月数',totalIntLabel:'総利息',totalPayLabel:'総返済額',aMonth:'月',aPmt:'返済額',aInt:'利息',aPrin:'元金',aBalance:'残高',seoHtml:'<h2>ローン完済計算機とは？</h2><p>現在の残高・年利率・月返済額を入力するだけで、<strong>完済日</strong>と<strong>総利息コスト</strong>を即座に計算します。毎月の追加返済額を設定すると、節約できる利息と短縮される返済期間を比較できます。月別元金・利息・残高の返済スケジュール表も表示されます。</p><details class="faq-item"><summary>この計算機にはどんな情報が必要ですか？</summary><p>必要な情報は3つです：現在残高（残元金）、年利率（%）、月返済額。追加返済額はオプションで、毎月少し多く返済した場合の節約効果を比較するために使用します。</p></details><details class="faq-item"><summary>なぜ追加返済で利息を大幅に節約できるのですか？</summary><p>追加返済は元金を直接減らすため、それ以降の毎月の利息計算の基準が下がります。この複利効果により、少額の追加返済でも数十万円の利息を節約し、返済期間を数年短縮できます。</p></details><details class="faq-item"><summary>月返済額が利息以下の場合はどうなりますか？</summary><p>月返済額が月利息以下の場合、元金が減らないため永遠に完済できません。この場合、計算機はエラーを表示します。返済額を月利息より十分高く設定してください。</p></details><details class="faq-item"><summary>返済スケジュール（アモチゼーション）とは何ですか？</summary><p>毎月の返済を元金分と利息分に分解した表です。返済初期は利息の割合が高く、後半になるほど元金の割合が増えます。結果の下の表で最大360ヶ月分の月別明細を確認できます。</p></details><details class="faq-item"><summary>計算結果は実際のローンと一致しますか？</summary><p>標準的な元利均等返済の計算式を使用しており、住宅ローンや個人ローンの多くに近い結果が得られます。ただし、手数料、繰り上げ返済違約金、変動金利の調整、保険料は含まれないため、参考値としてご利用ください。</p></details><details class="faq-item"><summary>追加返済でローン期間はどれくらい短縮できますか？</summary><p>毎月少額でも追加返済すると金利に応じて数か月〜数年短縮できます。金利が高いほど効果が大きく、このツールで追加額ごとの期間短縮効果を確認できます。</p></details><details class="faq-item"><summary>据置期間終了後の返済計画はどう立てますか？</summary><p>このツールに残元金、残期間、適用金利を入力すると、通常の元利均等返済での新しい月払いが算出されます。</p></details><details class="faq-item"><summary>年1回の一括追加返済と毎月の追加返済、どちらが有利ですか？</summary><p>同じ合計金額なら毎月の追加返済の方が有利です。利息は残元金に毎日計算されるため、早く元金を減らすほど利息の節約効果が大きくなります。</p></details>'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function fmt(n){return Math.round(n).toLocaleString(_lang==='ko'?'ko-KR':_lang==='ja'?'ja-JP':'en-US');}
function simulate(bal,monthlyRate,pmt){
  let b=bal,months=0,totalInt=0;
  const rows=[];
  while(b>0.01&&months<1200){
    months++;
    const int=b*monthlyRate;
    const prin=Math.min(pmt-int,b);
    if(prin<=0)return null;
    b=Math.max(0,b-prin);
    totalInt+=int;
    rows.push({m:months,pmt:pmt,int,prin,bal:b});
    if(rows.length>360)rows.length=360;
  }
  return{months,totalInt,rows};
}
function payoffDate(months){const d=new Date();d.setMonth(d.getMonth()+months);return d.toLocaleDateString(_lang==='ko'?'ko-KR':'en-US',{year:'numeric',month:'short'});}
function calc(){
  const bal=parseFloat(document.getElementById('balance').value)||0;
  const rate=parseFloat(document.getElementById('rate').value)/100/12||0;
  const pmt=parseFloat(document.getElementById('payment').value)||0;
  const extra=parseFloat(document.getElementById('extra').value)||0;
  const t=_i18n[_lang];
  const base=simulate(bal,rate,pmt);
  if(!base){alert('월 납입금이 이자보다 커야 합니다');return;}
  document.getElementById('bPayoff').textContent=payoffDate(base.months);
  document.getElementById('bMonths').textContent=base.months+'mo';
  document.getElementById('bInt').textContent=fmt(base.totalInt);
  document.getElementById('bTotal').textContent=fmt(pmt*base.months);
  const amortBody=document.getElementById('amortBody');
  amortBody.innerHTML=base.rows.map(r=>`<div class="amort-row"><span>${r.m}</span><span>${fmt(r.pmt)}</span><span>${fmt(r.int)}</span><span>${fmt(r.prin)}</span><span>${fmt(r.bal)}</span></div>`).join('');
  if(extra>0){
    const ex=simulate(bal,rate,pmt+extra);
    document.getElementById('extraCard').style.display='block';
    document.getElementById('ePayoff').textContent=payoffDate(ex.months);
    document.getElementById('eMonths').textContent=ex.months+'mo';
    document.getElementById('eInt').textContent=fmt(ex.totalInt);
    document.getElementById('eTotal').textContent=fmt((pmt+extra)*ex.months);
    const saved=base.totalInt-ex.totalInt;
    const savedMonths=base.months-ex.months;
    document.getElementById('saveVal').textContent=`${fmt(saved)} (${savedMonths}mo)`;
    document.getElementById('saveBanner').style.display='block';
  }else{
    document.getElementById('extraCard').style.display='none';
    document.getElementById('saveBanner').style.display='none';
  }
  document.getElementById('result').style.display='block';
}
_lang=detectLang();applyLang();
</script>
