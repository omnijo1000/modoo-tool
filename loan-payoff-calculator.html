<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#34d399;--accent2:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:660px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:480px){.row2{grid-template-columns:1fr;}}
.field label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
.inp:focus{border-color:var(--accent);}
.section-title{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.calc-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;margin-top:4px;}
.calc-btn:hover{opacity:.85;}
.result{margin-top:14px;display:none;}
.compare-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:480px){.compare-wrap{grid-template-columns:1fr;}}
.comp-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.comp-card.extra{border-color:var(--accent);}
.comp-title{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim);margin-bottom:10px;}
.comp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.comp-key{font-size:12px;color:var(--text-muted);}
.comp-val{font-size:13px;font-family:'DM Mono',monospace;font-weight:700;}
.comp-val.good{color:var(--accent);}
.comp-val.bad{color:var(--accent2);}
.save-banner{background:rgba(52,211,153,.1);border:1px solid var(--accent);border-radius:10px;padding:14px;text-align:center;margin-bottom:14px;}
.save-title{font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:4px;}
.save-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
.amort-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.amort-header{display:grid;grid-template-columns:60px 1fr 1fr 1fr 1fr;gap:0;padding:8px 12px;background:var(--surface2);font-size:10px;font-family:'DM Mono',monospace;color:var(--text-dim);}
.amort-row{display:grid;grid-template-columns:60px 1fr 1fr 1fr 1fr;gap:0;padding:8px 12px;border-top:1px solid var(--border);font-size:11px;font-family:'DM Mono',monospace;}
.amort-row:hover{background:var(--surface2);}
.amort-scroll{max-height:240px;overflow-y:auto;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>Loan <span>Payoff</span></h1>
  <p class="sub" data-i18n="sub">대출 상환 기간 · 총 이자 · 추가 납입 절감 효과 계산</p>

  <div class="card">
    <div class="section-title" data-i18n="sec1">현재 대출 정보</div>
    <div class="row2">
      <div class="field"><label data-i18n="balLabel">현재 잔액</label><input class="inp" type="number" id="balance" value="20000000" min="0"></div>
      <div class="field"><label data-i18n="rateLabel">연이율 (%)</label><input class="inp" type="number" id="rate" value="5.5" min="0" step="0.01"></div>
    </div>
    <div class="row2" style="margin-bottom:0">
      <div class="field"><label data-i18n="pmtLabel">월 납입금</label><input class="inp" type="number" id="payment" value="400000" min="0"></div>
      <div class="field"><label data-i18n="extraLabel">추가 납입금 (월)</label><input class="inp" type="number" id="extra" value="0" min="0"></div>
    </div>
    <button class="calc-btn" onclick="calc()" style="margin-top:14px" data-i18n="calcBtn">▶ 계산하기</button>
  </div>

  <div class="result" id="result">
    <div class="save-banner" id="saveBanner" style="display:none">
      <div class="save-title" data-i18n="saveTitle">추가 납입으로 절감</div>
      <div class="save-val" id="saveVal"></div>
    </div>
    <div class="compare-wrap">
      <div class="comp-card" id="baseCard">
        <div class="comp-title" data-i18n="baseTitle">기본 납입</div>
        <div class="comp-row"><span class="comp-key" data-i18n="payoffLabel">상환 완료</span><span class="comp-val" id="bPayoff"></span></div>
        <div class="comp-row"><span class="comp-key" data-i18n="monthsLabel">개월수</span><span class="comp-val" id="bMonths"></span></div>
        <div class="comp-row"><span class="comp-key" data-i18n="totalIntLabel">총 이자</span><span class="comp-val bad" id="bInt"></span></div>
        <div class="comp-row"><span class="comp-key" data-i18n="totalPayLabel">총 납입</span><span class="comp-val" id="bTotal"></span></div>
      </div>
      <div class="comp-card extra" id="extraCard" style="display:none">
        <div class="comp-title" data-i18n="extraTitle">추가 납입</div>
        <div class="comp-row"><span class="comp-key" data-i18n="payoffLabel">상환 완료</span><span class="comp-val good" id="ePayoff"></span></div>
        <div class="comp-row"><span class="comp-key" data-i18n="monthsLabel">개월수</span><span class="comp-val good" id="eMonths"></span></div>
        <div class="comp-row"><span class="comp-key" data-i18n="totalIntLabel">총 이자</span><span class="comp-val good" id="eInt"></span></div>
        <div class="comp-row"><span class="comp-key" data-i18n="totalPayLabel">총 납입</span><span class="comp-val good" id="eTotal"></span></div>
      </div>
    </div>
    <div class="amort-wrap">
      <div class="amort-header">
        <span data-i18n="aMonth">월</span><span data-i18n="aPmt">납입금</span><span data-i18n="aInt">이자</span><span data-i18n="aPrin">원금</span><span data-i18n="aBalance">잔액</span>
      </div>
      <div class="amort-scroll" id="amortBody"></div>
    </div>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">Loan Payoff Calculator란?</h2>
    <p data-i18n="seoP">현재 대출 잔액과 월 납입금을 입력하면 상환 완료 시점과 총 이자를 계산합니다. 추가 납입금을 설정하면 절감 효과를 비교할 수 있습니다.</p>
  </div>
  <footer>Loan Payoff Calculator · Free Online Tool</footer>
</main>
<script>
const _i18n={
  ko:{sub:'대출 상환 기간 · 총 이자 · 추가 납입 절감 효과 계산',langBtn:'🌐 EN',backBtn:'← 모두의 툴',sec1:'현재 대출 정보',balLabel:'현재 잔액',rateLabel:'연이율 (%)',pmtLabel:'월 납입금',extraLabel:'추가 납입금 (월)',calcBtn:'▶ 계산하기',saveTitle:'추가 납입으로 절감',baseTitle:'기본 납입',extraTitle:'추가 납입',payoffLabel:'상환 완료',monthsLabel:'개월수',totalIntLabel:'총 이자',totalPayLabel:'총 납입',aMonth:'월',aPmt:'납입금',aInt:'이자',aPrin:'원금',aBalance:'잔액',seoH2:'Loan Payoff Calculator란?',seoP:'현재 잔액·이율·납입금으로 상환 완료 시점과 총 이자를 계산합니다.'},
  en:{sub:'Loan payoff date · Total interest · Extra payment savings',langBtn:'🌐 中文',backBtn:'← All Tools',sec1:'Current Loan Info',balLabel:'Current Balance',rateLabel:'Annual Rate (%)',pmtLabel:'Monthly Payment',extraLabel:'Extra Payment (mo.)',calcBtn:'▶ Calculate',saveTitle:'Savings with extra payment',baseTitle:'Regular Payment',extraTitle:'With Extra Payment',payoffLabel:'Payoff Date',monthsLabel:'Months',totalIntLabel:'Total Interest',totalPayLabel:'Total Paid',aMonth:'Mo.',aPmt:'Payment',aInt:'Interest',aPrin:'Principal',aBalance:'Balance',seoH2:'Loan Payoff Calculator',seoP:'Enter your loan balance, rate, and monthly payment to calculate payoff date and total interest. Add an extra payment to see how much you save.'},
  zh:{sub:'贷款还清日期·总利息·提前还款节省金额',langBtn:'🌐 日本語',backBtn:'← 所有工具',sec1:'当前贷款信息',balLabel:'当前余额',rateLabel:'年利率（%）',pmtLabel:'月还款额',extraLabel:'额外还款（月）',calcBtn:'▶ 计算',saveTitle:'额外还款节省',baseTitle:'正常还款',extraTitle:'额外还款',payoffLabel:'还清日期',monthsLabel:'月数',totalIntLabel:'总利息',totalPayLabel:'总还款',aMonth:'月',aPmt:'还款额',aInt:'利息',aPrin:'本金',aBalance:'余额',seoH2:'贷款还清计算器',seoP:'输入贷款余额、利率和月还款额，计算还清日期和总利息。添加额外还款查看节省效果。'},
  ja:{sub:'ローン完済日 · 総利息 · 繰り上げ返済の節約効果',langBtn:'🌐 한국어',backBtn:'← ホーム',sec1:'現在のローン情報',balLabel:'現在残高',rateLabel:'年利率 (%)',pmtLabel:'月返済額',extraLabel:'追加返済額（月）',calcBtn:'▶ 計算する',saveTitle:'追加返済による節約',baseTitle:'通常返済',extraTitle:'追加返済',payoffLabel:'完済日',monthsLabel:'ヶ月数',totalIntLabel:'総利息',totalPayLabel:'総返済額',aMonth:'月',aPmt:'返済額',aInt:'利息',aPrin:'元金',aBalance:'残高',seoH2:'ローン完済計算機とは？',seoP:'現在の残高・利率・月返済額を入力すると完済日と総利息が計算されます。追加返済額を設定して節約効果を比較できます。'},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});}
function fmt(n){return Math.round(n).toLocaleString(_lang==='ko'?'ko-KR':_lang==='ja'?'ja-JP':'en-US');}
function simulate(bal,monthlyRate,pmt){
  let b=bal,months=0,totalInt=0;
  const rows=[];
  while(b>0.01&&months<1200){
    months++;
    const int=b*monthlyRate;
    const prin=Math.min(pmt-int,b);
    if(prin<=0)return null;
    b=Math.max(0,b-prin);
    totalInt+=int;
    rows.push({m:months,pmt:pmt,int,prin,bal:b});
    if(rows.length>360)rows.length=360;
  }
  return{months,totalInt,rows};
}
function payoffDate(months){const d=new Date();d.setMonth(d.getMonth()+months);return d.toLocaleDateString(_lang==='ko'?'ko-KR':'en-US',{year:'numeric',month:'short'});}
function calc(){
  const bal=parseFloat(document.getElementById('balance').value)||0;
  const rate=parseFloat(document.getElementById('rate').value)/100/12||0;
  const pmt=parseFloat(document.getElementById('payment').value)||0;
  const extra=parseFloat(document.getElementById('extra').value)||0;
  const t=_i18n[_lang];
  const base=simulate(bal,rate,pmt);
  if(!base){alert('월 납입금이 이자보다 커야 합니다');return;}
  document.getElementById('bPayoff').textContent=payoffDate(base.months);
  document.getElementById('bMonths').textContent=base.months+'mo';
  document.getElementById('bInt').textContent=fmt(base.totalInt);
  document.getElementById('bTotal').textContent=fmt(pmt*base.months);
  const amortBody=document.getElementById('amortBody');
  amortBody.innerHTML=base.rows.map(r=>`<div class="amort-row"><span>${r.m}</span><span>${fmt(r.pmt)}</span><span>${fmt(r.int)}</span><span>${fmt(r.prin)}</span><span>${fmt(r.bal)}</span></div>`).join('');
  if(extra>0){
    const ex=simulate(bal,rate,pmt+extra);
    document.getElementById('extraCard').style.display='block';
    document.getElementById('ePayoff').textContent=payoffDate(ex.months);
    document.getElementById('eMonths').textContent=ex.months+'mo';
    document.getElementById('eInt').textContent=fmt(ex.totalInt);
    document.getElementById('eTotal').textContent=fmt((pmt+extra)*ex.months);
    const saved=base.totalInt-ex.totalInt;
    const savedMonths=base.months-ex.months;
    document.getElementById('saveVal').textContent=`${fmt(saved)} (${savedMonths}mo)`;
    document.getElementById('saveBanner').style.display='block';
  }else{
    document.getElementById('extraCard').style.display='none';
    document.getElementById('saveBanner').style.display='none';
  }
  document.getElementById('result').style.display='block';
}
_lang=detectLang();applyLang();
</script>
</body>
</html>
