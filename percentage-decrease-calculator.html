<script>
const _i18n={
  ko:{pageTitle:'퍼센트 감소 계산기 | 모두의 툴',h1:'📉 퍼센트 감소 계산기',sub:'두 값 사이의 감소율을 계산합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',tab0:'감소율 계산',tab1:'감소 후 값 계산',origLabel:'원래 값',newLabel:'새 값',rateLabel:'감소율 (%)',seoHtml:`<h2>퍼센트 감소 계산기란?</h2><p>원래 값과 새 값을 입력해 퍼센트 감소율을 계산하거나, 원래 값과 감소율로 감소 후 값을 역산합니다. 가격 하락률, 비용 절감률, 재고 감소율, 주가 하락률 등 다양한 상황에서 활용됩니다. 공식: 감소율(%) = (원래 값 - 새 값) / 원래 값 × 100. 결과는 소수점 두 자리까지 표시됩니다.</p><h2 class="seo-sub">자주 묻는 질문</h2><details class="faq-item"><summary>Q. 100에서 70이 되면 감소율은?</summary><p>A. (100-70)/100×100 = 30%. 30% 감소입니다.</p></details><details class="faq-item"><summary>Q. 역산 모드란?</summary><p>A. 원래 값과 감소율을 입력해 감소 후 값을 계산합니다. 예: 100에서 30% 감소 → 70.</p></details><details class="faq-item"><summary>Q. 결과가 음수면?</summary><p>A. 새 값이 원래 값보다 크면 음수(실제로는 증가)가 나옵니다. 퍼센트 증가 계산기를 사용하세요.</p></details><details class="faq-item"><summary>Q. 할인율 계산에도 쓸 수 있나요?</summary><p>A. 네, 정가를 원래 값, 할인가를 새 값으로 입력하면 할인율이 나옵니다.</p></details><details class="faq-item"><summary>Q. 주가 하락률 계산 방법은?</summary><p>A. 전일 종가를 원래 값, 현재가를 새 값으로 입력하세요.</p></details><details class="faq-item"><summary>Q. 소수점 결과도 나오나요?</summary><p>A. 네, 소수점 두 자리까지 정밀하게 표시됩니다.</p></details><details class="faq-item"><summary>Q. 원래 값이 0이면?</summary><p>A. 0으로 나누기 불가 — 원래 값은 0이 아닌 값을 입력해야 합니다.</p></details><details class="faq-item"><summary>Q. 비용 절감율을 계산하려면?</summary><p>A. 기존 비용을 원래 값, 절감 후 비용을 새 값으로 입력하세요.</p></details>`},
  en:{pageTitle:'Percentage Decrease Calculator | Modoo Tools',h1:'📉 Percentage Decrease Calculator',sub:'Calculate percentage decrease between two values',backLink:'← All Tools',langBtn:'🌐 中文',tab0:'Calculate Decrease',tab1:'Find New Value',origLabel:'Original Value',newLabel:'New Value',rateLabel:'Decrease Rate (%)',seoHtml:`<h2>Percentage Decrease Calculator</h2><p>Enter the original and new values to calculate the percentage decrease, or enter the original value and rate to find the new value. Useful for price drops, cost reductions, stock losses, and inventory decline. Formula: Rate (%) = (Original − New) / Original × 100. Results are shown to two decimal places.</p><h2 class="seo-sub">FAQ</h2><details class="faq-item"><summary>Q. What is the percentage decrease from 100 to 70?</summary><p>A. (100-70)/100×100 = 30%. A 30% decrease.</p></details><details class="faq-item"><summary>Q. What is reverse mode?</summary><p>A. Enter the original value and rate to find the decreased value. E.g. 100 - 30% → 70.</p></details><details class="faq-item"><summary>Q. What if the result is negative?</summary><p>A. If the new value exceeds the original, it means an increase. Use the percentage increase calculator instead.</p></details><details class="faq-item"><summary>Q. Can I calculate discount rates?</summary><p>A. Yes. Enter the original price as original value and the discounted price as new value.</p></details><details class="faq-item"><summary>Q. How to calculate stock price drop?</summary><p>A. Enter the previous closing price as original and the current price as new value.</p></details><details class="faq-item"><summary>Q. Are decimals shown?</summary><p>A. Yes, results are shown to two decimal places.</p></details><details class="faq-item"><summary>Q. What if the original value is 0?</summary><p>A. Division by zero is undefined — original value must be non-zero.</p></details><details class="faq-item"><summary>Q. How to calculate cost savings?</summary><p>A. Enter previous cost as original value and new cost as new value.</p></details>`},
  zh:{pageTitle:'百分比减少计算器 | Modoo工具',h1:'📉 百分比减少计算器',sub:'计算两个值之间的减少率',backLink:'← 首页',langBtn:'🌐 日本語',tab0:'计算减少率',tab1:'计算减少后的值',origLabel:'原始值',newLabel:'新值',rateLabel:'减少率 (%)',seoHtml:`<h2>百分比减少计算器</h2><p>输入原始值和新值计算百分比减少率，或输入原始值和减少率反算减少后的值。适用于价格下跌、成本节约、库存减少等场景。公式：减少率(%) = (原始值 - 新值) / 原始值 × 100。结果精确到小数点后两位。</p><h2 class="seo-sub">常见问题</h2><details class="faq-item"><summary>Q. 100到70的减少率是多少？</summary><p>A. (100-70)/100×100 = 30%，减少了30%。</p></details><details class="faq-item"><summary>Q. 反算模式是什么？</summary><p>A. 输入原始值和减少率，计算减少后的值。例如：100减少30%→70。</p></details><details class="faq-item"><summary>Q. 结果是负数怎么办？</summary><p>A. 如果新值大于原始值，说明是增加。请使用百分比增长计算器。</p></details><details class="faq-item"><summary>Q. 可以计算折扣率吗？</summary><p>A. 可以。将原价作为原始值，折扣价作为新值即可。</p></details><details class="faq-item"><summary>Q. 如何计算股价跌幅？</summary><p>A. 将前一日收盘价作为原始值，现价作为新值。</p></details><details class="faq-item"><summary>Q. 结果会显示小数吗？</summary><p>A. 会，结果精确到小数点后两位。</p></details><details class="faq-item"><summary>Q. 原始值为0怎么办？</summary><p>A. 不能除以零，原始值必须为非零值。</p></details><details class="faq-item"><summary>Q. 如何计算成本节省率？</summary><p>A. 将原始成本作为原始值，节省后的成本作为新值。</p></details>`},
  ja:{pageTitle:'パーセント減少計算機 | Modooツール',h1:'📉 パーセント減少計算機',sub:'2つの値の間の減少率を計算します',backLink:'← ホーム',langBtn:'🌐 한국어',tab0:'減少率を計算',tab1:'減少後の値を計算',origLabel:'元の値',newLabel:'新しい値',rateLabel:'減少率 (%)',seoHtml:`<h2>パーセント減少計算機とは</h2><p>元の値と新しい値を入力してパーセント減少率を計算、または元の値と減少率から減少後の値を逆算します。価格下落、コスト削減、在庫減少、株価下落など様々な場面で活用できます。公式：減少率(%) = (元の値 - 新しい値) / 元の値 × 100。結果は小数点以下2桁まで表示されます。</p><h2 class="seo-sub">よくある質問</h2><details class="faq-item"><summary>Q. 100から70への減少率は？</summary><p>A. (100-70)/100×100 = 30%。30%の減少です。</p></details><details class="faq-item"><summary>Q. 逆算モードとは？</summary><p>A. 元の値と減少率を入力して減少後の値を計算します。例：100から30%減少→70。</p></details><details class="faq-item"><summary>Q. マイナスの結果が出た場合は？</summary><p>A. 新しい値が元の値より大きい場合は増加を意味します。パーセント増加計算機をご使用ください。</p></details><details class="faq-item"><summary>Q. 割引率の計算に使えますか？</summary><p>A. はい。定価を元の値、割引価格を新しい値として入力してください。</p></details><details class="faq-item"><summary>Q. 株価下落率を計算するには？</summary><p>A. 前日終値を元の値、現在の株価を新しい値として入力してください。</p></details><details class="faq-item"><summary>Q. 小数の結果は表示されますか？</summary><p>A. はい、小数点以下2桁まで表示されます。</p></details><details class="faq-item"><summary>Q. 元の値が0の場合は？</summary><p>A. ゼロ除算は不可です。元の値は0以外を入力してください。</p></details><details class="faq-item"><summary>Q. コスト削減率を計算するには？</summary><p>A. 元のコストを元の値、削減後のコストを新しい値として入力してください。</p></details>`}
};
let currentLang='ko', mode=0;
function detectLang(){const p=new URLSearchParams(location.search).get('lang');if(p&&_i18n[p])return p;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language||'';if(n.startsWith('zh'))return'zh';if(n.startsWith('ja'))return'ja';if(n.startsWith('ko'))return'ko';return'en';}
function applyLang(l){const t=_i18n[l]||_i18n.ko;document.title=t.pageTitle;document.documentElement.lang=l;document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.dataset.i18n];if(v!==undefined)el.innerHTML=v;});document.getElementById('seoContent').innerHTML=t.seoHtml||'';}
function toggleLang(){const order=['ko','en','zh','ja'];const next=order[(order.indexOf(currentLang)+1)%order.length];currentLang=next;localStorage.setItem('modoo_lang',next);const url=new URL(location.href);url.searchParams.set('lang',next);history.replaceState(null,'',url);applyLang(next);}
currentLang=detectLang();
document.addEventListener('DOMContentLoaded',()=>applyLang(currentLang));

function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===m));
  document.getElementById('mode0').style.display=m===0?'block':'none';
  document.getElementById('mode1').style.display=m===1?'block':'none';
  document.getElementById('resultBox').style.display='none';
  calc();
}
function calc(){
  const box=document.getElementById('resultBox');
  const numEl=document.getElementById('resultNum');
  const labelEl=document.getElementById('resultLabel');
  const fillEl=document.getElementById('visFill');
  const fmEl=document.getElementById('formulaBox');
  if(mode===0){
    const orig=parseFloat(document.getElementById('orig0').value);
    const nv=parseFloat(document.getElementById('new0').value);
    if(isNaN(orig)||isNaN(nv)||orig===0){box.style.display='none';return;}
    const rate=((orig-nv)/orig*100);
    numEl.textContent=rate.toFixed(2)+'%';
    numEl.style.color=rate>=0?'var(--red)':'var(--green)';
    labelEl.textContent=`${orig} → ${nv}`;
    fillEl.style.width=Math.min(Math.abs(rate),100)+'%';
    fillEl.style.background=rate>=0?'var(--red)':'var(--green)';
    fmEl.textContent=`(${orig} - ${nv}) / ${orig} × 100 = ${rate.toFixed(2)}%`;
    box.style.display='block';
  } else {
    const orig=parseFloat(document.getElementById('orig1').value);
    const rate=parseFloat(document.getElementById('rate1').value);
    if(isNaN(orig)||isNaN(rate)){box.style.display='none';return;}
    const nv=orig*(1-rate/100);
    numEl.textContent=nv.toFixed(2);
    numEl.style.color='var(--red)';
    labelEl.textContent=`${orig} - ${rate}% = ?`;
    fillEl.style.width=Math.min(Math.abs(rate),100)+'%';
    fmEl.textContent=`${orig} × (1 - ${rate}/100) = ${nv.toFixed(2)}`;
    box.style.display='block';
  }
}
</script>
