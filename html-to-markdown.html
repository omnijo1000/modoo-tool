<p>Webスクレイピングによるドキュメンteーション化、WordPress/DrupalからJekyll/Hugo/Gatsbyなどの静的サイトジェネレーターへの移行、GitHub README作成、ObsidianやNotionへのコンテンツインポートなどの際にHTMLをMarkdownに変換する必要があります。このツールはブラウザのDOMを使用してHTMLを解析し、クリーンなMarkdownを出力します。</p>
<h2>よくある質問 (FAQ)</h2>
<details class="faq-item"><summary>HTMLをMarkdownに変換する理由は？</summary><p>A. 主なシナリオ：(1)Webスクレイピング — Webページを読みやすいMarkdownドキュメントとして保存。(2)CMS移行 — WordPressコンテンツをMarkdownベースの静的サイトに移行。(3)GitHub — 既存HTMLページからREADMEを作成。(4)ノートツール — WebコンテンツをObsidian・Notion・Bearにインポート。</p></details>
<details class="faq-item"><summary>どのHTML要素がきれいに変換されますか？</summary><p>A. 対応要素：見出し(h1~h6)・段落(p)・太字(strong/b)・斜体(em/i)・取り消し線(del/s)・リンク(a)・画像(img)・箇条書き(ul/li)・番号付きリスト(ol/li)・引用(blockquote)・コード(code/pre)・水平線(hr)・テーブル(table)。div・section・articleは子要素を再帰処理します。</p></details>
<details class="faq-item"><summary>変換で失われる情報は何ですか？</summary><p>A. CSSスタイル・class/id属性・data属性・aria属性・インラインスタイル・JavaScriptイベントハンドラーなど、Markdownに対応する概念がないものは変換時に削除されます。テキストの内容と構造のみが保持されます。</p></details>
<details class="faq-item"><summary>MarkdownのテーブルはどうなりますかHTMLテーブル？</summary><p>A. HTMLの&lt;table&gt;要素はGFM（GitHub Flavored Markdown）のテーブル記法に変換されます。colspan/rowspanによるセル結合はMarkdownで非対応のため、単純なセルとして出力されます。</p></details>
<details class="faq-item"><summary>ネストされたリストはどう処理されますか？</summary><p>A. ネストされた&lt;ul&gt;/&lt;ol&gt;リストは現在フラット化されて単一レベルで処理されます。複雑なネスト構造は変換後に手動調整が必要な場合があります。</p></details>
<details class="faq-item"><summary>HTMLエンティティはどう処理されますか？</summary><p>A. ブラウザのDOMがHTMLエンティティを自動的にデコードします。例えば&amp;amp;は&amp;に、&amp;lt;は&lt;に、&amp;nbsp;はスペースに変換されます。</p></details>
<details class="faq-item"><summary>GitHub Flavored Markdown（GFM）テーブルに対応していますか？</summary><p>A. はい。HTMLテーブルはGFMテーブル記法（| ヘッダー | / |---|---| / | データ |）に変換されます。GitHub・GitLab・Notionなどでそのまま使用できます。</p></details>
<details class="faq-item"><summary>変換を使わない方がよい場合は？</summary><p>A. 元のHTMLに大量のCSSスタイル・複雑なレイアウト・スクリプト・マルチメディア埋め込み・フォームが含まれる場合、変換結果が不完全になる可能性があります。シンプルなコンテンツ重視のHTML（記事・ドキュメント・ブログ投稿）に最適です。</p></details>`
  }
};

const LANGS = ['ko','en','zh','ja'];
let _lang = 'ko';

function detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  if (n.startsWith('ja')) return 'ja';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}

function cycleLang() {
  const idx = LANGS.indexOf(_lang);
  _lang = LANGS[(idx + 1) % LANGS.length];
  localStorage.setItem('modoo_lang', _lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', _lang);
  history.replaceState({}, '', url);
  applyLang();
}

function applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = _lang;
  document.title = t.pageTitle;
  document.getElementById('h1Title').innerHTML = t.h1;
  document.getElementById('subText').textContent = t.sub;
  document.getElementById('backBtn').textContent = t.backLink;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('btnPaste').textContent = t.btnPaste;
  document.getElementById('btnClear').textContent = t.btnClear;
  document.getElementById('btnSample').textContent = t.btnSample;
  document.getElementById('btnConvert').textContent = t.btnConvert;
  document.getElementById('btnCopy').textContent = t.btnCopy;
  document.getElementById('btnDownload').textContent = t.btnDownload;
  document.getElementById('labelInput').textContent = t.labelInput;
  document.getElementById('labelOutput').textContent = t.labelOutput;
  document.getElementById('toast').textContent = t.copyDone;
  document.getElementById('seoSection').innerHTML = t.seoHtml;
}

// HTML to Markdown converter using DOM
function htmlToMarkdown(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  return nodeToMd(div).replace(/\n{3,}/g, '\n\n').trim();
}

function nodeToMd(node) {
  if (node.nodeType === 3) {
    // Text node — normalize whitespace
    return node.textContent.replace(/\s+/g, ' ');
  }
  if (node.nodeType !== 1) return '';
  const tag = node.tagName ? node.tagName.toLowerCase() : '';

  switch (tag) {
    case 'head': case 'script': case 'style': case 'noscript':
    case 'nav': case 'footer': case 'aside':
      return '';
    case 'html': case 'body': case 'main': case 'article':
    case 'section': case 'div': case 'form': case 'fieldset': {
      const inner = childrenToMd(node);
      return inner ? inner + '\n' : '';
    }
    case 'h1': return `\n# ${childrenToMd(node).trim()}\n\n`;
    case 'h2': return `\n## ${childrenToMd(node).trim()}\n\n`;
    case 'h3': return `\n### ${childrenToMd(node).trim()}\n\n`;
    case 'h4': return `\n#### ${childrenToMd(node).trim()}\n\n`;
    case 'h5': return `\n##### ${childrenToMd(node).trim()}\n\n`;
    case 'h6': return `\n###### ${childrenToMd(node).trim()}\n\n`;
    case 'p': {
      const inner = childrenToMd(node).trim();
      return inner ? `\n${inner}\n\n` : '';
    }
    case 'br': return '\n';
    case 'strong': case 'b': {
      const inner = childrenToMd(node).trim();
      return inner ? `**${inner}**` : '';
    }
    case 'em': case 'i': {
      const inner = childrenToMd(node).trim();
      return inner ? `*${inner}*` : '';
    }
    case 'del': case 's': case 'strike': {
      const inner = childrenToMd(node).trim();
      return inner ? `~~${inner}~~` : '';
    }
    case 'code': {
      // Check if inside pre
      if (node.parentElement && node.parentElement.tagName.toLowerCase() === 'pre') {
        return node.textContent;
      }
      return `\`${node.textContent.replace(/`/g, "'")}\``;
    }
    case 'pre': {
      // Try to detect language from class
      const codeEl = node.querySelector('code');
      let lang = '';
      if (codeEl) {
        const cls = codeEl.className || '';
        const m = cls.match(/(?:lang|language)-(\w+)/);
        if (m) lang = m[1];
      }
      const content = (codeEl ? codeEl.textContent : node.textContent).replace(/\n$/, '');
      return `\n\`\`\`${lang}\n${content}\n\`\`\`\n\n`;
    }
    case 'blockquote': {
      const inner = childrenToMd(node).trim();
      if (!inner) return '';
      return '\n' + inner.split('\n').map(l => l.trim() ? `> ${l}` : '>').join('\n') + '\n\n';
    }
    case 'a': {
      const href = node.getAttribute('href') || '';
      const text = childrenToMd(node).trim();
      if (!href || href.startsWith('#') || href.startsWith('javascript')) return text;
      if (!text) return href;
      if (text === href) return href;
      return `[${text}](${href})`;
    }
    case 'img': {
      const src = node.getAttribute('src') || '';
      const alt = node.getAttribute('alt') || '';
      if (!src) return alt;
      return `![${alt}](${src})`;
    }
    case 'ul': {
      const items = Array.from(node.children)
        .filter(el => el.tagName.toLowerCase() === 'li')
        .map(li => `- ${liContent(li).trim()}`)
        .filter(s => s.trim() !== '-');
      return items.length ? '\n' + items.join('\n') + '\n\n' : '';
    }
    case 'ol': {
      const items = Array.from(node.children)
        .filter(el => el.tagName.toLowerCase() === 'li')
        .map((li, i) => `${i + 1}. ${liContent(li).trim()}`)
        .filter((s, i) => s.trim() !== `${i + 1}.`);
      return items.length ? '\n' + items.join('\n') + '\n\n' : '';
    }
    case 'li': return childrenToMd(node);
    case 'hr': return '\n---\n\n';
    case 'table': return tableToMd(node);
    case 'thead': case 'tbody': case 'tfoot': return childrenToMd(node);
    case 'tr': case 'th': case 'td': return childrenToMd(node);
    case 'span': case 'label': case 'abbr': case 'cite':
    case 'time': case 'mark': case 'small': case 'sup': case 'sub':
      return childrenToMd(node);
    case 'figure': return childrenToMd(node) + '\n';
    case 'figcaption': return `*${childrenToMd(node).trim()}*\n`;
    default:
      return childrenToMd(node);
  }
}

function childrenToMd(node) {
  return Array.from(node.childNodes).map(nodeToMd).join('');
}

function liContent(li) {
  // Inline content only (skip nested ul/ol — they'd produce double entries)
  let result = '';
  for (const child of li.childNodes) {
    const tag = child.tagName ? child.tagName.toLowerCase() : '';
    if (tag === 'ul' || tag === 'ol') continue;
    result += nodeToMd(child);
  }
  return result;
}

function tableToMd(table) {
  const rows = Array.from(table.querySelectorAll('tr'));
  if (!rows.length) return '';

  // First row: header
  const headerCells = Array.from(rows[0].querySelectorAll('th, td'))
    .map(c => c.textContent.replace(/\|/g, '\\|').trim());
  if (!headerCells.length) return '';

  const sep = headerCells.map(() => '---');
  const bodyRows = rows.slice(1).map(r =>
    Array.from(r.querySelectorAll('td, th')).map(c => c.textContent.replace(/\|/g, '\\|').trim())
  ).filter(r => r.length);

  const lines = [
    `| ${headerCells.join(' | ')} |`,
    `| ${sep.join(' | ')} |`,
    ...bodyRows.map(r => `| ${r.join(' | ')} |`)
  ];
  return '\n' + lines.join('\n') + '\n\n';
}

let _debounce;
function liveConvert() {
  clearTimeout(_debounce);
  _debounce = setTimeout(convert, 300);
}

function convert() {
  const html = document.getElementById('htmlInput').value.trim();
  if (!html) {
    document.getElementById('mdOutput').textContent = '';
    return;
  }
  const md = htmlToMarkdown(html);
  document.getElementById('mdOutput').textContent = md;
  document.getElementById('mdOutput')._mdText = md;
}

function pasteFromClipboard() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(text => {
      document.getElementById('htmlInput').value = text;
      convert();
    }).catch(() => document.getElementById('htmlInput').focus());
  } else {
    document.getElementById('htmlInput').focus();
  }
}

function clearAll() {
  document.getElementById('htmlInput').value = '';
  document.getElementById('mdOutput').textContent = '';
  document.getElementById('mdOutput')._mdText = '';
}

const SAMPLE = `<h1>Hello World</h1>
<p>This is <strong>bold</strong> and <em>italic</em> with <code>inline code</code>.</p>
<h2>List Example</h2>
<ul>
  <li>Item one</li>
  <li>Item two</li>
  <li>Item three</li>
</ul>
<h2>Ordered List</h2>
<ol>
  <li>First item</li>
  <li>Second item</li>
</ol>
<blockquote><p>This is a blockquote with some text inside.</p></blockquote>

<pre><code class="language-javascript">const greeting = "Hello, World!";
console.log(greeting);</code></pre>
<h2>Table Example</h2>
<table>
  <tr><th>Name</th><th>Age</th><th>City</th></tr>
  <tr><td>Alice</td><td>28</td><td>Seoul</td></tr>
  <tr><td>Bob</td><td>34</td><td>Tokyo</td></tr>
</table>
<p><a href="https://example.com">Visit Example</a></p>`;

function loadSample() {
  document.getElementById('htmlInput').value = SAMPLE;
  convert();
}

function copyMd() {
  const text = document.getElementById('mdOutput')._mdText || document.getElementById('mdOutput').textContent;
  if (!text) return;
  navigator.clipboard?.writeText(text).then(showToast).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); showToast();
  });
}

function downloadMd() {
  const text = document.getElementById('mdOutput')._mdText || document.getElementById('mdOutput').textContent;
  if (!text) return;
  const a = document.createElement('a');
  a.href = 'data:text/markdown;charset=utf-8,' + encodeURIComponent(text);
  a.download = 'output.md'; a.click();
}

function showToast() {
  const el = document.getElementById('toast');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

_lang = detectLang();
applyLang();
loadSample();
