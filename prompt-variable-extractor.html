const LANGS=['ko','en','zh','ja'];
let _lang='ko';
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('labelTemplate').textContent=t.labelTemplate;document.getElementById('labelVars').textContent=t.labelVars;
  document.getElementById('labelOutput').textContent=t.labelOutput;document.getElementById('clearBtn').textContent=t.clearBtn;
  document.getElementById('exBtn').textContent=t.exBtn;document.getElementById('applyBtn').textContent=t.applyBtn;
  document.getElementById('copyBtn').textContent='Copy';document.getElementById('emptyState').textContent=t.empty;
  document.getElementById('seoDiv').innerHTML=t.seoHtml;extract();
}
function extractVars(tpl){
  const found=new Set();
  const p1=[...tpl.matchAll(/\{\{(\w+)\}\}/g)];
  const p2=[...tpl.matchAll(/\{(\w+)\}/g)];
  const p3=[...tpl.matchAll(/\[(\w+)\]/g)];
  [...p1,...p2,...p3].forEach(m=>found.add(m[1]));
  return [...found];
}
function extract(){
  const t=_i18n[_lang];const tpl=document.getElementById('templateArea').value;
  const vars=extractVars(tpl);
  const vc=document.getElementById('varCount');
  vc.textContent=vars.length?(t.varCountTpl||'{n} variable(s) found').replace('{n}',vars.length):'';
  const frm=document.getElementById('varForms');
  if(!vars.length){frm.innerHTML=`<div class="empty-state" id="emptyState">${t.empty}</div>`;return;}
  const existing={};document.querySelectorAll('.var-input').forEach(el=>{existing[el.dataset.var]=el.value;});
  frm.innerHTML=vars.map(v=>`<div class="var-form"><div class="var-label">{{${v}}}</div><input class="var-input" data-var="${v}" value="${(existing[v]||'').replace(/"/g,'&quot;')}" placeholder="${v}..." oninput="autoApply()"></div>`).join('');
}
function autoApply(){applyVars();}
function applyVars(){
  const tpl=document.getElementById('templateArea').value;
  let out=tpl;
  document.querySelectorAll('.var-input').forEach(el=>{
    const v=el.dataset.var;const val=el.value;
    out=out.replace(new RegExp('\\{\\{'+v+'\\}\\}','g'),val);
    out=out.replace(new RegExp('\\{'+v+'\\}','g'),val);
    out=out.replace(new RegExp('\\['+v+'\\]','g'),val);
  });
  document.getElementById('outputArea').value=out;
}
function clearAll(){document.getElementById('templateArea').value='';document.getElementById('outputArea').value='';extract();}
function loadExample(){document.getElementById('templateArea').value=_i18n[_lang].example||EXAMPLE_EN;extract();applyVars();}
function copyOut(){
  const t=_i18n[_lang];const v=document.getElementById('outputArea').value;if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{const btn=document.getElementById('copyBtn');const o=btn.textContent;btn.textContent=t.copied;setTimeout(()=>btn.textContent=o,1500);});
}
_lang=detectLang();applyLang();
</script>
<script src="related.js"></script>
