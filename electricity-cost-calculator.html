<html lang="ko">
<head>

<title>Electricity Cost Calculator - Free Online Power Bill Estimator</title>
<meta name="description" content="Free online electricity cost calculator. Calculate daily, monthly, and annual electricity costs for any appliance. Enter watts, hours per day, and electricity rate.">

<link rel="alternate" hreflang="zh" href="https://modoohub.com/electricity-cost-calculator.html?lang=zh">

<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:auto;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:640px;margin:0 auto;padding:36px 20px 60px;}
.back{font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;display:inline-block;margin-bottom:22px;}
.back:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:500px){.row2,.row3{grid-template-columns:1fr;}}
.field label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
.inp:focus{border-color:var(--accent);}
select.inp{cursor:pointer;}
.preset-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:8px;}
.preset-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--text-muted);background:none;}
.chip:hover{border-color:var(--accent);color:var(--accent);}
.calc-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;}
.calc-btn:hover{opacity:.85;}
.result{margin-top:14px;display:none;}
.res-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:500px){.res-grid{grid-template-columns:1fr 1fr;}}
.res-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.res-box.hi{border-color:var(--accent);background:rgba(251,191,36,.06);}
.res-val{font-size:20px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
.res-box:not(.hi) .res-val{color:var(--text);}
.res-label{font-size:11px;color:var(--text-dim);margin-top:3px;}
.kwh-info{font-size:12px;color:var(--text-dim);font-family:'DM Mono',monospace;text-align:center;margin-top:6px;}
.appliance-list{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:14px;}
.al-title{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:10px;}
.al-row{display:flex;justify-content:space-between;font-size:12px;font-family:'DM Mono',monospace;padding:5px 0;border-bottom:1px solid var(--border);}
.al-row:last-child{border-bottom:none;}
.al-name{color:var(--text-muted);}
.al-val{color:var(--text);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <a href="index.html" class="back" id="backBtn">← 모두의 툴</a>
  <h1>Electricity <span>Cost</span></h1>
  <p class="sub" data-i18n="sub">가전제품 전기요금 계산기 · 일간·월간·연간 비용</p>

  <div class="card">
    <div class="preset-label" data-i18n="presetLabel">빠른 선택</div>
    <div class="preset-chips" id="presets"></div>
    <div class="row3">
      <div class="field"><label data-i18n="wattsLabel">소비전력 (W)</label><input class="inp" type="number" id="watts" value="1000" min="0" step="0.1"></div>
      <div class="field"><label data-i18n="hoursLabel">하루 사용 시간</label><input class="inp" type="number" id="hours" value="3" min="0" max="24" step="0.5"></div>
      <div class="field"><label data-i18n="daysLabel">월 사용 일수</label><input class="inp" type="number" id="days" value="30" min="1" max="31"></div>
    </div>
    <div class="row2" style="margin-bottom:0">
      <div class="field"><label data-i18n="rateLabel">전기 요금 (원/kWh)</label><input class="inp" type="number" id="rate" value="150" min="0" step="0.01"></div>
      <div class="field">
        <label data-i18n="currLabel">통화</label>
        <select class="inp" id="currency">
          <option value="₩">₩ 원</option>
          <option value="$">$ USD</option>
          <option value="¥">¥ JPY/CNY</option>
          <option value="€">€ EUR</option>
          <option value="£">£ GBP</option>
        </select>
      </div>
    </div>
    <button class="calc-btn" onclick="calc()" style="margin-top:14px" data-i18n="calcBtn">▶ 계산하기</button>
  </div>

  <div class="result" id="result">
    <div class="res-grid">
      <div class="res-box"><div class="res-val" id="rKwh">-</div><div class="res-label" data-i18n="kwhDay">kWh/일</div></div>
      <div class="res-box"><div class="res-val" id="rDaily">-</div><div class="res-label" data-i18n="dailyCost">일 요금</div></div>
      <div class="res-box hi"><div class="res-val" id="rMonthly">-</div><div class="res-label" data-i18n="monthlyCost">월 요금</div></div>
      <div class="res-box"><div class="res-val" id="rAnnual">-</div><div class="res-label" data-i18n="annualCost">연 요금</div></div>
    </div>
    <div class="kwh-info" id="kwhInfo"></div>
    <div class="appliance-list">
      <div class="al-title" data-i18n="compareTitle">일반 가전 비교 (같은 조건)</div>
      <div id="compareList"></div>
    </div>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">Electricity Cost Calculator란?</h2>
    <p data-i18n="seoP">가전제품의 소비전력(W)과 사용 시간을 입력하면 일·월·연간 전기요금을 계산합니다. TV, 에어컨, 세탁기 등 프리셋을 제공하며 통화와 요금제도 설정할 수 있습니다.</p>
  </div>
  <footer>Electricity Cost Calculator · Free Online Tool</footer>
</main>
<script>
const _i18n={
  ko:{sub:'가전제품 전기요금 계산기 · 일간·월간·연간 비용',langBtn:'🌐 EN',backBtn:'← 모두의 툴',presetLabel:'빠른 선택',wattsLabel:'소비전력 (W)',hoursLabel:'하루 사용 시간',daysLabel:'월 사용 일수',rateLabel:'전기 요금 (원/kWh)',currLabel:'통화',calcBtn:'▶ 계산하기',kwhDay:'kWh/일',dailyCost:'일 요금',monthlyCost:'월 요금',annualCost:'연 요금',kwhInfoTpl:'{m} kWh/월 · {y} kWh/연',compareTitle:'일반 가전 비교 (같은 조건)',seoH2:'Electricity Cost Calculator란?',seoP:'소비전력(W)과 사용 시간으로 일·월·연간 전기요금을 계산합니다.'},
  en:{sub:'Appliance electricity cost · Daily · Monthly · Annual bill',langBtn:'🌐 中文',backBtn:'← All Tools',presetLabel:'Quick select',wattsLabel:'Power (Watts)',hoursLabel:'Hours per day',daysLabel:'Days per month',rateLabel:'Electricity rate (per kWh)',currLabel:'Currency',calcBtn:'▶ Calculate',kwhDay:'kWh/day',dailyCost:'Daily Cost',monthlyCost:'Monthly Cost',annualCost:'Annual Cost',kwhInfoTpl:'{m} kWh/month · {y} kWh/year',compareTitle:'Common appliance comparison (same usage)',seoH2:'Electricity Cost Calculator',seoP:'Calculate daily, monthly, and annual electricity costs for any appliance. Enter wattage, usage hours, and your electricity rate.'},
  zh:{sub:'家电电费计算器 · 日·月·年费用',langBtn:'🌐 한국어',backBtn:'← 所有工具',presetLabel:'快速选择',wattsLabel:'功率（瓦）',hoursLabel:'每天使用时间',daysLabel:'每月使用天数',rateLabel:'电费（每千瓦时）',currLabel:'货币',calcBtn:'▶ 计算',kwhDay:'kWh/天',dailyCost:'日费用',monthlyCost:'月费用',annualCost:'年费用',kwhInfoTpl:'{m} kWh/月 · {y} kWh/年',compareTitle:'常见家电对比（相同使用条件）',seoH2:'电费计算器',seoP:'输入功率(W)和使用时间，计算任何家电的日、月、年电费。'},
};
const PRESETS_KO=[{n:'에어컨',w:1500},{n:'냉장고',w:150},{n:'세탁기',w:500},{n:'TV(55")',w:120},{n:'전자레인지',w:1000},{n:'컴퓨터',w:200},{n:'LED 조명',w:10},{n:'전기장판',w:200}];
const PRESETS_EN=[{n:'Air Cond.',w:1500},{n:'Refrigerator',w:150},{n:'Washing Machine',w:500},{n:'TV (55")',w:120},{n:'Microwave',w:1000},{n:'Desktop PC',w:200},{n:'LED Light',w:10},{n:'Electric Heater',w:1500}];
const PRESETS_ZH=[{n:'空调',w:1500},{n:'冰箱',w:150},{n:'洗衣机',w:500},{n:'电视(55")',w:120},{n:'微波炉',w:1000},{n:'台式电脑',w:200},{n:'LED灯',w:10},{n:'电热毯',w:200}];
const COMPARE=[{n:'에어컨/Air Cond.',w:1500},{n:'냉장고/Fridge',w:150},{n:'세탁기/Washer',w:500},{n:'전자레인지/Microwave',w:1000},{n:'TV(55")',w:120},{n:'LED조명/LED',w:10}];
let _lang='ko';
const LANGS=['ko','en','zh'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('backBtn').innerHTML=t.backBtn;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});
  buildPresets();
}
function buildPresets(){
  const presets=_lang==='ko'?PRESETS_KO:_lang==='zh'?PRESETS_ZH:PRESETS_EN;
  const wrap=document.getElementById('presets');
  wrap.innerHTML='';
  presets.forEach(p=>{
    const c=document.createElement('button');c.className='chip';c.textContent=`${p.n} ${p.w}W`;
    c.onclick=()=>{document.getElementById('watts').value=p.w;calc();};
    wrap.appendChild(c);
  });
}
function fmt(n,cur){return cur+(n<10?n.toFixed(2):n<100?n.toFixed(1):Math.round(n).toLocaleString());}
function calc(){
  const w=parseFloat(document.getElementById('watts').value)||0;
  const h=parseFloat(document.getElementById('hours').value)||0;
  const d=parseInt(document.getElementById('days').value)||30;
  const rate=parseFloat(document.getElementById('rate').value)||0;
  const cur=document.getElementById('currency').value;
  const kwhDay=w*h/1000;
  const kwhMonth=kwhDay*d;
  const kwhYear=kwhDay*365;
  const daily=kwhDay*rate;
  const monthly=kwhMonth*rate;
  const annual=kwhYear*rate;
  document.getElementById('rKwh').textContent=kwhDay.toFixed(3);
  document.getElementById('rDaily').textContent=fmt(daily,cur);
  document.getElementById('rMonthly').textContent=fmt(monthly,cur);
  document.getElementById('rAnnual').textContent=fmt(annual,cur);
  const tpl=_i18n[_lang].kwhInfoTpl;
  document.getElementById('kwhInfo').textContent=tpl.replace('{m}',kwhMonth.toFixed(1)).replace('{y}',kwhYear.toFixed(0));
  const cl=document.getElementById('compareList');
  cl.innerHTML=COMPARE.map(a=>{
    const names=a.n.split('/');
    const name=_lang==='ko'?names[0]:names[1]||names[0];
    const m=a.w*h/1000*d*rate;
    return`<div class="al-row"><span class="al-name">${name} (${a.w}W)</span><span class="al-val">${fmt(m,cur)}/월</span></div>`;
  }).join('');
  document.getElementById('result').style.display='block';
}
_lang=detectLang();applyLang();
</script>
</body>
</html>
