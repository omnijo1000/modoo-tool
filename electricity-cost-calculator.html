<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:640px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:500px){.row2,.row3{grid-template-columns:1fr;}}
.field label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;}
.inp:focus{border-color:var(--accent);}
select.inp{cursor:pointer;}
.preset-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:8px;}
.preset-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--text-muted);background:none;}
.chip:hover{border-color:var(--accent);color:var(--accent);}
.calc-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;}
.calc-btn:hover{opacity:.85;}
.result{margin-top:14px;display:none;}
.res-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:500px){.res-grid{grid-template-columns:1fr 1fr;}}
.res-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.res-box.hi{border-color:var(--accent);background:rgba(251,191,36,.06);}
.res-val{font-size:20px;font-weight:900;font-family:'DM Mono',monospace;color:var(--accent);}
.res-box:not(.hi) .res-val{color:var(--text);}
.res-label{font-size:11px;color:var(--text-dim);margin-top:3px;}
.kwh-info{font-size:12px;color:var(--text-dim);font-family:'DM Mono',monospace;text-align:center;margin-top:6px;}
.appliance-list{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:14px;}
.al-title{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:10px;}
.al-row{display:flex;justify-content:space-between;font-size:12px;font-family:'DM Mono',monospace;padding:5px 0;border-bottom:1px solid var(--border);}
.al-row:last-child{border-bottom:none;}
.al-name{color:var(--text-muted);}
.al-val{color:var(--text);}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
.seo strong{color:var(--text);}
details.faq-item{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
details.faq-item summary{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;list-style:none;}
details.faq-item summary::-webkit-details-marker{display:none;}
details.faq-item summary::before{content:'Q. ';color:var(--primary,#4f8cff);}
details.faq-item p{padding:0 16px 12px;font-size:13px;color:var(--text-dim);line-height:1.8;margin:0;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<script>
const _i18n={
  ko:{sub:'가전제품 전기요금 계산기 · 일간·월간·연간 비용',langBtn:'🌐 EN',backBtn:'← 모두의 툴',presetLabel:'빠른 선택',wattsLabel:'소비전력 (W)',hoursLabel:'하루 사용 시간',daysLabel:'월 사용 일수',rateLabel:'전기 요금 (원/kWh)',currLabel:'통화',calcBtn:'▶ 계산하기',kwhDay:'kWh/일',dailyCost:'일 요금',monthlyCost:'월 요금',annualCost:'연 요금',kwhInfoTpl:'{m} kWh/월 · {y} kWh/연',compareTitle:'일반 가전 비교 (같은 조건)',seoHtml:'<h2>전기요금 계산기란?</h2><p>가전제품의 <strong>소비전력(W)과 하루 사용 시간</strong>을 입력하면 일·월·연간 전기요금을 자동 계산합니다. TV·에어컨·세탁기·냉장고 등 주요 가전 프리셋을 제공하며, 원화·달러 등 통화와 kWh 단가를 직접 설정할 수 있습니다. 전기요금이 많이 나오는 가전을 파악하고 절약 방법을 찾는 데 활용하세요.</p><h2>자주 묻는 질문 (FAQ)</h2><details class="faq-item"><summary>kWh(킬로와트시)란 무엇인가요?</summary><p>전력 사용량의 단위입니다. 1kWh = 1,000W 가전제품을 1시간 사용한 전력량입니다. 500W 에어컨을 2시간 사용하면 1kWh 소비됩니다.</p></details><details class="faq-item"><summary>에어컨 vs 선풍기 전기요금 차이는?</summary><p>에어컨은 약 800~1,500W, 선풍기는 30~50W 수준입니다. 같은 시간 사용 시 에어컨이 선풍기보다 약 20~30배 더 많은 전력을 소비합니다. 이 계산기로 직접 비교해 보세요.</p></details><details class="faq-item"><summary>한국 전기요금 단가(kWh당 요금)는 얼마인가요?</summary><p>주택용 저압 기준 2026년 평균 약 120~140원/kWh 수준입니다. 실제 요금은 누진제·계절·지역에 따라 다르므로 요금제 탭에서 직접 입력하세요.</p></details><details class="faq-item"><summary>대기전력도 계산할 수 있나요?</summary><p>네. 대기 시 소비전력(예: TV 대기 0.5W)을 입력하고 하루 24시간 대기 기준으로 계산하면 연간 대기전력 비용을 파악할 수 있습니다.</p></details><details class="faq-item"><summary>여러 가전제품을 합산할 수 있나요?</summary><p>현재 이 계산기는 가전 1대씩 계산합니다. 여러 기기를 합산하려면 각각 계산 후 결과를 더해주세요.</p></details><details class="faq-item"><summary>한국 전기요금 누진세 구간은 어떻게 되나요?</summary><p>2024년 기준 주택용 전력 누진 구간은 200kWh 이하(1구간), 201~400kWh(2구간), 400kWh 초과(3구간)입니다. 여름철 7~8월과 겨울철 12~2월에는 누진 완화 적용으로 구간이 조정됩니다. 한국전력 홈페이지에서 최신 요금을 확인하세요.</p></details><details class="faq-item"><summary>전기 요금을 줄이는 가장 효과적인 방법은?</summary><p>대기 전력 차단(멀티탭 전원 끄기), 에어컨 설정 온도 1도 높이기, LED 조명 교체, 고효율 가전제품 사용이 효과적입니다. 냉장고는 전체 전력의 15~20%를 차지하므로 온도 설정과 문 밀폐 상태를 점검하세요.</p></details><details class="faq-item"><summary>태양광 패널 설치 시 전기 요금이 얼마나 줄어드나요?</summary><p>3kW 태양광 시스템은 월 평균 300~360kWh를 발전합니다. 한국 4인 가구 평균 월 사용량이 약 350kWh이므로 대부분의 전기 요금을 절감할 수 있습니다. 단, 설치비용 회수 기간은 보조금 수령 여부에 따라 다릅니다.</p></details>'},
  en:{sub:'Appliance electricity cost · Daily · Monthly · Annual bill',langBtn:'🌐 中文',backBtn:'← All Tools',presetLabel:'Quick select',wattsLabel:'Power (Watts)',hoursLabel:'Hours per day',daysLabel:'Days per month',rateLabel:'Electricity rate (per kWh)',currLabel:'Currency',calcBtn:'▶ Calculate',kwhDay:'kWh/day',dailyCost:'Daily Cost',monthlyCost:'Monthly Cost',annualCost:'Annual Cost',kwhInfoTpl:'{m} kWh/month · {y} kWh/year',compareTitle:'Common appliance comparison (same usage)',seoHtml:'<h2>Electricity Cost Calculator</h2><p>Enter an appliance\'s <strong>power draw (Watts) and daily usage hours</strong> to calculate daily, monthly, and annual electricity costs. Includes presets for common appliances (TV, AC, washing machine, fridge) and lets you set your local electricity rate and currency. Identify high-consumption devices and find ways to cut your bill.</p><h2>FAQ</h2><details class="faq-item"><summary>What is a kWh (kilowatt-hour)?</summary><p>kWh is the standard unit of electrical energy. 1 kWh = a 1,000W device running for 1 hour. Example: a 500W appliance used for 2 hours consumes 1 kWh.</p></details><details class="faq-item"><summary>How much more does an air conditioner cost vs. a fan?</summary><p>An AC typically draws 800–1,500W; a fan uses 30–50W. Running the AC costs roughly 20–30× more than a fan for the same duration. Use this calculator to compare them directly.</p></details><details class="faq-item"><summary>What electricity rate should I enter?</summary><p>Check your electricity bill for the cost per kWh. In the US it\'s roughly $0.12–0.18/kWh; in Korea around ₩120–140/kWh. You can also enter tiered rates manually for more accuracy.</p></details><details class="faq-item"><summary>Can I calculate standby power cost?</summary><p>Yes. Enter the standby wattage (e.g., 0.5W for a TV on standby) and set daily hours to 24 to calculate annual standby electricity cost.</p></details><details class="faq-item"><summary>Can I total up multiple appliances?</summary><p>This calculator handles one appliance at a time. Calculate each device separately and add the results together for a total household estimate.</p></details><details class="faq-item"><summary>How does the Korean tiered electricity pricing system work?</summary><p>As of 2024, residential electricity is billed in three tiers: up to 200 kWh (Tier 1), 201–400 kWh (Tier 2), and above 400 kWh (Tier 3). The thresholds are adjusted upward during summer (July–August) and winter (December–February). Check KEPCO for the latest rates.</p></details><details class="faq-item"><summary>What are the most effective ways to reduce electricity bills?</summary><p>Top strategies: cut standby power by using switchable power strips, raise the AC setpoint by 1°C, replace bulbs with LEDs, and switch to energy-efficient appliances. Refrigerators account for 15–20% of total household electricity — check door seals and temperature settings regularly.</p></details><details class="faq-item"><summary>How much can solar panels reduce electricity costs?</summary><p>A 3 kW solar system generates an average of 300–360 kWh per month. The average Korean household of four uses about 350 kWh per month, meaning solar can cover most of the electricity bill. Payback period varies significantly depending on government subsidy eligibility.</p></details>'},
  zh:{sub:'家电电费计算器 · 日·月·年费用',langBtn:'🌐 日本語',backBtn:'← 所有工具',presetLabel:'快速选择',wattsLabel:'功率（瓦）',hoursLabel:'每天使用时间',daysLabel:'每月使用天数',rateLabel:'电费（每千瓦时）',currLabel:'货币',calcBtn:'▶ 计算',kwhDay:'kWh/天',dailyCost:'日费用',monthlyCost:'月费用',annualCost:'年费用',kwhInfoTpl:'{m} kWh/月 · {y} kWh/年',compareTitle:'常见家电对比（相同使用条件）',seoHtml:'<h2>电费计算器</h2><p>输入家电的<strong>功率（瓦）和每日使用时间</strong>，自动计算日、月、年电费。内置常见家电预设（电视、空调、洗衣机、冰箱），可自定义电价和货币单位。找出高耗电设备，制定节电策略。</p><h2>常见问题 (FAQ)</h2><details class="faq-item"><summary>什么是kWh（千瓦时）？</summary><p>kWh是电能的标准单位。1kWh = 1000W的设备运行1小时所消耗的电量。例如：500W的设备使用2小时 = 1kWh。</p></details><details class="faq-item"><summary>空调和风扇的电费相差多少？</summary><p>空调通常消耗800-1500W，风扇只需30-50W。相同使用时间内，空调的耗电量约为风扇的20-30倍。可用本计算器直接对比。</p></details><details class="faq-item"><summary>应该输入什么电价？</summary><p>查看电费账单上的每千瓦时费用。中国一般为0.5-0.8元/kWh，具体以当地电力公司标准为准。</p></details><details class="faq-item"><summary>可以计算待机电耗吗？</summary><p>可以。输入待机功率（如电视待机0.5W），每日使用时间设为24小时，即可计算年度待机电费。</p></details><details class="faq-item"><summary>可以同时计算多个家电吗？</summary><p>本计算器每次计算一台设备。多台设备请分别计算后将结果相加。</p></details><details class="faq-item"><summary>韩国阶梯电价制度是如何运作的？</summary><p>截至2024年，韩国居民用电分三个阶梯：200度以下（第一阶梯）、201-400度（第二阶梯）、400度以上（第三阶梯）。夏季（7-8月）和冬季（12-2月）阶梯门槛会相应调整。请访问韩国电力公司官网查询最新电价。</p></details><details class="faq-item"><summary>降低电费最有效的方法有哪些？</summary><p>主要方法：使用带开关的插排切断待机电源、空调设定温度提高1℃、更换LED灯具、使用高效能家电。冰箱占家庭总用电量的15-20%，应定期检查门封条和温度设置。</p></details><details class="faq-item"><summary>安装太阳能板可以节省多少电费？</summary><p>3千瓦太阳能系统每月平均发电300-360度。韩国四口之家平均月用电约350度，因此太阳能可覆盖大部分电费。回收期因政府补贴申请情况而存在较大差异。</p></details>'},
  ja:{sub:'家電の電気代計算 · 日額・月額・年額',langBtn:'🌐 한국어',backBtn:'← ホーム',presetLabel:'クイック選択',wattsLabel:'消費電力 (W)',hoursLabel:'1日あたりの使用時間',daysLabel:'月あたりの使用日数',rateLabel:'電気料金 (円/kWh)',currLabel:'通貨',calcBtn:'▶ 計算する',kwhDay:'kWh/日',dailyCost:'日額料金',monthlyCost:'月額料金',annualCost:'年額料金',kwhInfoTpl:'{m} kWh/月 · {y} kWh/年',compareTitle:'一般家電の比較（同じ使用条件）',seoHtml:'<h2>電気代計算機</h2><p>家電の<strong>消費電力（W）と1日の使用時間</strong>を入力すると、日・月・年間の電気代を自動計算します。テレビ・エアコン・洗濯機・冷蔵庫などのプリセットを用意しており、電力単価や通貨も設定できます。電気代が高い家電を特定して節約策を立てるのに役立ちます。</p><h2>よくある質問 (FAQ)</h2><details class="faq-item"><summary>kWh（キロワット時）とは何ですか？</summary><p>電力量の標準単位です。1kWh = 1,000Wの機器を1時間使用した電力量です。例：500Wの家電を2時間使用すると1kWh消費します。</p></details><details class="faq-item"><summary>エアコンと扇風機の電気代の違いは？</summary><p>エアコンは約800〜1,500W、扇風機は30〜50W程度です。同じ時間使用した場合、エアコンは扇風機の約20〜30倍の電力を消費します。このツールで比較してみてください。</p></details><details class="faq-item"><summary>電気料金単価はどこで確認できますか？</summary><p>電気料金の明細書またはご契約の電力会社のサイトで確認できます。日本では地域・契約プランにより異なりますが、一般的に25〜35円/kWh程度です。</p></details><details class="faq-item"><summary>待機電力も計算できますか？</summary><p>はい。待機時の消費電力（例：テレビ待機時0.5W）を入力し、1日の使用時間を24時間に設定すると年間待機電力費用を把握できます。</p></details><details class="faq-item"><summary>複数の家電をまとめて計算できますか？</summary><p>このツールは1台ずつ計算します。複数台は個別に計算した結果を合計してください。</p></details><details class="faq-item"><summary>韓国の電気料金累進制はどのように機能しますか？</summary><p>2024年基準で住宅用電力の累進区間は200kWh以下（第1段階）、201〜400kWh（第2段階）、400kWh超（第3段階）です。夏季（7〜8月）と冬季（12〜2月）は区間の閾値が緩和されます。最新の料金はKEPCO（韓国電力）のウェブサイトで確認してください。</p></details><details class="faq-item"><summary>電気代を削減する最も効果的な方法は？</summary><p>主な方法：スイッチ付きタップで待機電力をカット、エアコンの設定温度を1度上げる、LED照明に交換、省エネ家電への切替。冷蔵庫は家庭消費電力の15〜20%を占めるため、ドアのパッキンや温度設定を定期的に点検してください。</p></details><details class="faq-item"><summary>太陽光パネル設置で電気代はどれくらい減りますか？</summary><p>3kWの太陽光システムは月平均300〜360kWhを発電します。韓国の4人家族の月平均使用量は約350kWhのため、ほとんどの電気代をカバーできます。補助金の受給有無によって初期費用の回収期間は大きく異なります。</p></details>'},
};
const PRESETS_KO=[{n:'에어컨',w:1500},{n:'냉장고',w:150},{n:'세탁기',w:500},{n:'TV(55")',w:120},{n:'전자레인지',w:1000},{n:'컴퓨터',w:200},{n:'LED 조명',w:10},{n:'전기장판',w:200}];
const PRESETS_EN=[{n:'Air Cond.',w:1500},{n:'Refrigerator',w:150},{n:'Washing Machine',w:500},{n:'TV (55")',w:120},{n:'Microwave',w:1000},{n:'Desktop PC',w:200},{n:'LED Light',w:10},{n:'Electric Heater',w:1500}];
const PRESETS_ZH=[{n:'空调',w:1500},{n:'冰箱',w:150},{n:'洗衣机',w:500},{n:'电视(55")',w:120},{n:'微波炉',w:1000},{n:'台式电脑',w:200},{n:'LED灯',w:10},{n:'电热毯',w:200}];
const COMPARE=[{n:'에어컨/Air Cond.',w:1500},{n:'냉장고/Fridge',w:150},{n:'세탁기/Washer',w:500},{n:'전자레인지/Microwave',w:1000},{n:'TV(55")',w:120},{n:'LED조명/LED',w:10}];
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function applyLang(){
  const t=_i18n[_lang];
  document.documentElement.lang=_lang;
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('backBtn').innerHTML=t.backBtn;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});
  buildPresets();
}
function buildPresets(){
  const presets=_lang==='ko'?PRESETS_KO:_lang==='zh'?PRESETS_ZH:PRESETS_EN;
  const wrap=document.getElementById('presets');
  wrap.innerHTML='';
  presets.forEach(p=>{
    const c=document.createElement('button');c.className='chip';c.textContent=`${p.n} ${p.w}W`;
    c.onclick=()=>{document.getElementById('watts').value=p.w;calc();};
    wrap.appendChild(c);
  });
}
function fmt(n,cur){return cur+(n<10?n.toFixed(2):n<100?n.toFixed(1):Math.round(n).toLocaleString());}
function calc(){
  const w=parseFloat(document.getElementById('watts').value)||0;
  const h=parseFloat(document.getElementById('hours').value)||0;
  const d=parseInt(document.getElementById('days').value)||30;
  const rate=parseFloat(document.getElementById('rate').value)||0;
  const cur=document.getElementById('currency').value;
  const kwhDay=w*h/1000;
  const kwhMonth=kwhDay*d;
  const kwhYear=kwhDay*365;
  const daily=kwhDay*rate;
  const monthly=kwhMonth*rate;
  const annual=kwhYear*rate;
  document.getElementById('rKwh').textContent=kwhDay.toFixed(3);
  document.getElementById('rDaily').textContent=fmt(daily,cur);
  document.getElementById('rMonthly').textContent=fmt(monthly,cur);
  document.getElementById('rAnnual').textContent=fmt(annual,cur);
  const tpl=_i18n[_lang].kwhInfoTpl;
  document.getElementById('kwhInfo').textContent=tpl.replace('{m}',kwhMonth.toFixed(1)).replace('{y}',kwhYear.toFixed(0));
  const cl=document.getElementById('compareList');
  cl.innerHTML=COMPARE.map(a=>{
    const names=a.n.split('/');
    const name=_lang==='ko'?names[0]:names[1]||names[0];
    const m=a.w*h/1000*d*rate;
    return`<div class="al-row"><span class="al-name">${name} (${a.w}W)</span><span class="al-val">${fmt(m,cur)}/월</span></div>`;
  }).join('');
  document.getElementById('result').style.display='block';
}
_lang=detectLang();applyLang();
</script>
