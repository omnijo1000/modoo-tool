<script>
const LANGS=['ko','en','zh','ja'];
let _lang='ko';
const _i18n={
  ko:{h1b:'제거기',sub:'사진에서 GPS, 촬영 날짜, 카메라 정보 등 EXIF 메타데이터를 제거합니다',backLink:'← 모두의 툴',langBtn:'🌐 EN',pageTitle:'EXIF 제거기 | MODOO HUB',dzText:'이미지를 드래그하거나 클릭하여 업로드 (여러 파일 가능)',noticeEl:'Canvas API를 통해 이미지를 재렌더링하여 EXIF를 제거합니다. 모두 브라우저 로컬에서 처리됩니다.',lblResult:'처리 결과',statBefore:'원본',statAfter:'EXIF 제거 후',statSaved:'절감',btnDl:'다운로드',done:'완료',
    seoHtml:`<h2>EXIF 제거기</h2><p>사진에서 <strong>GPS 위치, 촬영 날짜/시간, 카메라 모델, 렌즈 정보</strong> 등 모든 EXIF 메타데이터를 제거합니다. Canvas API를 통해 이미지를 재렌더링하여 EXIF를 삭제하며, 서버 전송 없이 브라우저 로컬에서 처리됩니다. 개인정보 보호를 위해 SNS에 사진을 올리기 전에 사용하세요.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>EXIF 제거 후 화질이 떨어지나요?</summary><p>Canvas 재렌더링으로 EXIF만 제거합니다. JPEG 품질 95% 기본값으로 화질을 유지합니다.</p></details>
<details class="faq-item"><summary>GPS 정보도 제거되나요?</summary><p>예, GPS 좌표를 포함한 모든 EXIF 메타데이터가 제거됩니다.</p></details>
<details class="faq-item"><summary>여러 파일을 한 번에 처리할 수 있나요?</summary><p>예, 여러 이미지를 동시에 업로드하여 처리할 수 있습니다.</p></details>
<details class="faq-item"><summary>파일이 서버로 전송되나요?</summary><p>아니요. 모두 브라우저 로컬에서 처리됩니다.</p></details>
<details class="faq-item"><summary>PNG 파일도 처리되나요?</summary><p>예, PNG와 기타 이미지 형식도 지원됩니다.</p></details>
<details class="faq-item"><summary>출력 형식은?</summary><p>JPEG는 JPEG로, 기타 형식은 PNG로 다운로드됩니다.</p></details>
<details class="faq-item"><summary>제거 후 EXIF가 정말 없는지 확인하려면?</summary><p>exif-viewer 도구로 제거된 파일을 확인할 수 있습니다.</p></details>
<details class="faq-item"><summary>GIF 애니메이션은?</summary><p>첫 프레임만 처리됩니다. GIF 애니메이션을 유지하려면 다른 방법을 사용하세요.</p></details>`
  },
  en:{h1b:'Remover',sub:'Strip GPS, capture date, camera info and all EXIF metadata from photos',backLink:'← All Tools',langBtn:'🌐 中文',pageTitle:'EXIF Remover | MODOO HUB',dzText:'Drag & drop images or click to upload (multiple files)',noticeEl:'Images are re-rendered via Canvas API to strip EXIF. All processing is local in your browser.',lblResult:'Results',statBefore:'Original',statAfter:'EXIF stripped',statSaved:'Saved',btnDl:'Download',done:'Done',
    seoHtml:`<h2>EXIF Remover</h2><p>Strip all EXIF metadata from photos — <strong>GPS location, capture date/time, camera model, lens info</strong>, and more. Images are re-rendered via Canvas API to remove EXIF, all locally in the browser. Use before sharing on social media to protect privacy.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Does quality drop after EXIF removal?</summary><p>Canvas re-rendering removes only EXIF. JPEG quality defaults to 95% to preserve quality.</p></details>
<details class="faq-item"><summary>Is GPS removed too?</summary><p>Yes — all EXIF including GPS coordinates is removed.</p></details>
<details class="faq-item"><summary>Multiple files at once?</summary><p>Yes — upload multiple images simultaneously.</p></details>
<details class="faq-item"><summary>Is my file sent to a server?</summary><p>No — fully local processing.</p></details>
<details class="faq-item"><summary>PNG files?</summary><p>Yes — PNG and other formats are supported.</p></details>
<details class="faq-item"><summary>Output format?</summary><p>JPEG stays as JPEG; others output as PNG.</p></details>
<details class="faq-item"><summary>How to verify EXIF is gone?</summary><p>Upload the stripped file to exif-viewer to confirm.</p></details>
<details class="faq-item"><summary>GIF animations?</summary><p>Only the first frame is processed; animation is not preserved.</p></details>`
  },
  zh:{h1b:'删除工具',sub:'从照片中删除GPS、拍摄日期、相机信息等EXIF元数据',backLink:'← 所有工具',langBtn:'🌐 日本語',pageTitle:'EXIF删除工具 | MODOO HUB',dzText:'拖拽图片或点击上传（支持多文件）',noticeEl:'通过Canvas API重新渲染图像来删除EXIF，所有处理在浏览器本地完成。',lblResult:'处理结果',statBefore:'原始',statAfter:'删除EXIF后',statSaved:'节省',btnDl:'下载',done:'完成',
    seoHtml:`<h2>EXIF删除工具</h2><p>从照片中删除所有EXIF元数据——<strong>GPS位置、拍摄日期/时间、相机型号、镜头信息</strong>等。通过Canvas API重新渲染图像来删除EXIF，所有处理在浏览器本地完成。在社交媒体分享前使用，保护个人隐私。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>删除EXIF后画质会下降吗？</summary><p>通过Canvas重新渲染只删除EXIF，JPEG默认质量95%，画质保持。</p></details>
<details class="faq-item"><summary>GPS信息也会被删除吗？</summary><p>是的，包括GPS坐标在内的所有EXIF元数据都会被删除。</p></details>
<details class="faq-item"><summary>可以同时处理多个文件吗？</summary><p>可以，支持同时上传多张图片处理。</p></details>
<details class="faq-item"><summary>文件会上传服务器吗？</summary><p>不会，所有处理在浏览器本地完成。</p></details>
<details class="faq-item"><summary>支持PNG文件吗？</summary><p>支持，PNG及其他图像格式均支持。</p></details>
<details class="faq-item"><summary>输出格式？</summary><p>JPEG保持JPEG格式，其他格式以PNG下载。</p></details>
<details class="faq-item"><summary>如何确认EXIF已删除？</summary><p>使用exif-viewer工具验证处理后的文件。</p></details>
<details class="faq-item"><summary>GIF动画呢？</summary><p>仅处理第一帧，不保留动画。</p></details>`
  },
  ja:{h1b:'削除ツール',sub:'写真からGPS・撮影日時・カメラ情報などのEXIFメタデータを削除',backLink:'← ホーム',langBtn:'🌐 한국어',pageTitle:'EXIF削除ツール | MODOO HUB',dzText:'画像をドラッグまたはクリックしてアップロード（複数可）',noticeEl:'Canvas APIで画像を再レンダリングしてEXIFを削除します。すべてブラウザのローカルで処理されます。',lblResult:'処理結果',statBefore:'元のサイズ',statAfter:'EXIF削除後',statSaved:'削減',btnDl:'ダウンロード',done:'完了',
    seoHtml:`<h2>EXIF削除ツール</h2><p>写真からすべてのEXIFメタデータを削除します——<strong>GPS位置・撮影日時・カメラモデル・レンズ情報</strong>など。Canvas APIで画像を再レンダリングしてEXIFを削除し、すべてブラウザのローカルで処理されます。SNSにアップロードする前にプライバシーを守るためにお使いください。</p>
<h2 class="seo-sub">よくある質問</h2>
<details class="faq-item"><summary>EXIF削除後に画質は落ちますか？</summary><p>Canvas再レンダリングはEXIFのみ削除します。JPEGは品質95%のデフォルトで高品質を維持します。</p></details>
<details class="faq-item"><summary>GPSも削除されますか？</summary><p>はい、GPS座標を含むすべてのEXIFメタデータが削除されます。</p></details>
<details class="faq-item"><summary>複数ファイルを一度に処理できますか？</summary><p>はい、複数の画像を同時にアップロードして処理できます。</p></details>
<details class="faq-item"><summary>ファイルはサーバーに送信されますか？</summary><p>いいえ、すべてローカルで処理されます。</p></details>
<details class="faq-item"><summary>PNGファイルも対応していますか？</summary><p>はい、PNGやその他の画像形式にも対応しています。</p></details>
<details class="faq-item"><summary>出力形式は？</summary><p>JPEGはJPEGのまま、その他はPNGで出力されます。</p></details>
<details class="faq-item"><summary>EXIFが削除されたか確認するには？</summary><p>exif-viewerツールで処理後のファイルを確認してください。</p></details>
<details class="faq-item"><summary>GIFアニメーションは？</summary><p>最初のフレームのみ処理され、アニメーションは保持されません。</p></details>`
  }
};
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  ['h1b','subEl','backLink','langBtn','dzText','noticeEl','lblResult'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
  document.getElementById('seoDiv').innerHTML=t.seoHtml;
}
function fmtBytes(n){if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(2)+' MB';}
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFiles(e.dataTransfer.files);});
document.getElementById('fileIn').addEventListener('change',e=>loadFiles(e.target.files));
function loadFiles(files){
  if(!files.length)return;
  document.getElementById('outBox').style.display='block';
  document.getElementById('resultList').innerHTML='';
  Array.from(files).forEach(f=>{if(f.type.startsWith('image/'))processFile(f);});
}
function processFile(file){
  const t=_i18n[_lang];
  const div=document.createElement('div');div.style.cssText='margin-bottom:14px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;';
  div.innerHTML=`<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;font-family:'DM Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${file.name}</div><div id="stat_${Date.now()}" style="font-size:11px;color:var(--text-dim);">처리 중...</div>`;
  document.getElementById('resultList').appendChild(div);
  const statEl=div.querySelector('div:last-child');
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>{
    const cvs=document.createElement('canvas');cvs.width=img.naturalWidth;cvs.height=img.naturalHeight;
    cvs.getContext('2d').drawImage(img,0,0);
    const isJpeg=file.type==='image/jpeg';
    const mime=isJpeg?'image/jpeg':'image/png';
    const qual=isJpeg?0.95:undefined;
    cvs.toBlob(blob=>{
      const origSize=file.size,newSize=blob.size;
      const saved=((1-newSize/origSize)*100).toFixed(1);
      const dlUrl=URL.createObjectURL(blob);
      const ext=isJpeg?'.jpg':'.png';
      const fname=file.name.replace(/\.[^.]+$/,'')+'-noexif'+ext;
      statEl.innerHTML=`<span style="color:var(--green)">✓ ${t.done}</span>  ${fmtBytes(origSize)} → ${fmtBytes(newSize)} (${saved}%)<br><a href="${dlUrl}" download="${fname}" style="color:var(--accent);font-size:12px;text-decoration:none;">${t.btnDl}</a>`;
      URL.revokeObjectURL(url);
    },mime,qual);
  };
  img.onerror=()=>{statEl.textContent='Error';URL.revokeObjectURL(url);};
  img.src=url;
}
_lang=detectLang();applyLang();
</script>
