<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;--text-muted:#777;--text-dim:#444;--accent:#fb923c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;}
.logo{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.lang-btn{margin-left:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:none;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:760px;margin:0 auto;padding:36px 20px 60px;}
.back-link{margin-left:auto;font-size:12px;color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;}
.back-link:hover{color:var(--text-muted);}
h1{font-size:26px;font-weight:900;margin-bottom:6px;}
h1 span{color:var(--accent);}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
@media(max-width:620px){.layout{grid-template-columns:1fr;}}
.panel-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:5px;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;resize:vertical;min-height:220px;outline:none;line-height:1.6;}
textarea:focus{border-color:var(--accent);}
textarea[readonly]{color:var(--text-muted);}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
@media(max-width:620px){.opts-grid{grid-template-columns:1fr;}}
.opt-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.opt-card:hover{border-color:var(--accent);}
.opt-card input{accent-color:var(--accent);margin-top:2px;flex-shrink:0;}
.opt-body{flex:1;}
.opt-name{font-size:12px;font-family:'DM Mono',monospace;color:var(--text-muted);}
.opt-desc{font-size:10px;color:var(--text-dim);margin-top:2px;line-height:1.4;}
.find-replace{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin:10px 0;}
.fr-title{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:8px;}
.fr-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.inp-s{flex:1;min-width:120px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;}
.inp-s:focus{border-color:var(--accent);}
.arrow{color:var(--text-dim);font-size:12px;font-family:'DM Mono',monospace;}
.btn-row{display:flex;gap:8px;margin:12px 0;}
.btn{padding:9px 20px;border-radius:8px;font-size:12px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;border:none;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{opacity:.85;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.copy-toast{display:none;font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-left:4px;}
.info{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin:4px 0;}
.seo{margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.seo h2{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text-muted);}
.seo p{font-size:13px;color:var(--text-dim);line-height:1.8;}
footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}
</style>

<body>
<header>
  <span class="logo">MODOO HUB</span>
  <a href="index.html" class="back-link" id="backBtn">← 모두의 툴</a>
  <button class="lang-btn" onclick="cycleLang()" id="langBtn">🌐 EN</button>
</header>
<main>
  <h1>Text <span>Cleaner</span></h1>
  <p class="sub" data-i18n="sub">공백·줄바꿈·HTML태그·특수문자 제거 등 텍스트 정리 도구</p>

  <div class="layout">
    <div>
      <div class="panel-label" data-i18n="inputLabel">입력</div>
      <textarea id="inputText" data-i18n-ph="inputPh" placeholder="정리할 텍스트를 입력하세요..." oninput="liveClean()"></textarea>
      <div class="info" id="infoA"></div>
    </div>
    <div>
      <div class="panel-label" data-i18n="outputLabel">출력</div>
      <textarea id="outputText" readonly data-i18n-ph="outputPh" placeholder="결과가 여기에 표시됩니다..."></textarea>
      <div class="info" id="infoB"></div>
    </div>
  </div>

  <div class="opts-grid" id="optsGrid"></div>

  <div class="find-replace">
    <div class="fr-title" data-i18n="frTitle">찾아 바꾸기</div>
    <div class="fr-row">
      <input class="inp-s" type="text" id="findTxt" data-i18n-ph="findPh" placeholder="찾을 텍스트">
      <span class="arrow">→</span>
      <input class="inp-s" type="text" id="replaceTxt" data-i18n-ph="replacePh" placeholder="바꿀 텍스트">
      <label style="display:flex;align-items:center;gap:5px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim);cursor:pointer"><input type="checkbox" id="frRegex" style="accent-color:var(--accent)"><span>Regex</span></label>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="liveClean()" data-i18n="applyBtn">▶ 적용</button>
    <button class="btn btn-ghost" onclick="copyOut()" data-i18n="copyBtn">복사</button>
    <button class="btn btn-ghost" onclick="clearAll()" data-i18n="clearBtn">지우기</button>
    <span class="copy-toast" id="toast" data-i18n="copied">✓ 복사됨</span>
  </div>

  <div class="seo">
    <h2 data-i18n="seoH2">Text Cleaner란?</h2>
    <p data-i18n="seoP">텍스트에서 불필요한 공백, 빈 줄, HTML 태그, 특수문자, 숫자 등을 한번에 제거합니다. 찾아바꾸기 기능과 정규식도 지원합니다.</p>
  </div>
  <footer>Text Cleaner · Free Online Tool</footer>
</main>
<script>
const _i18n={
  ko:{sub:'공백·줄바꿈·HTML태그·특수문자 제거 등 텍스트 정리 도구',langBtn:'🌐 EN',backBtn:'← 모두의 툴',inputLabel:'입력',inputPh:'정리할 텍스트를 입력하세요...',outputLabel:'출력',outputPh:'결과가 여기에 표시됩니다...',frTitle:'찾아 바꾸기',findPh:'찾을 텍스트',replacePh:'바꿀 텍스트',applyBtn:'▶ 적용',copyBtn:'복사',clearBtn:'지우기',copied:'✓ 복사됨',seoH2:'Text Cleaner란?',seoP:'텍스트에서 불필요한 공백, HTML 태그, 특수문자 등을 제거합니다.',
    opts:[{id:'trimLines',name:'앞뒤 공백 제거',desc:'각 줄 시작·끝 공백 제거'},{id:'extraSpaces',name:'연속 공백 정리',desc:'여러 공백을 하나로'},{id:'blankLines',name:'빈 줄 제거',desc:'빈 줄 모두 삭제'},{id:'multiBlank',name:'연속 빈 줄 정리',desc:'2개 이상 빈 줄을 1개로'},{id:'htmlTags',name:'HTML 태그 제거',desc:'<...> 태그 모두 삭제'},{id:'specialChars',name:'특수문자 제거',desc:'!@#$%^&* 등 제거'},{id:'numbers',name:'숫자 제거',desc:'0-9 숫자 모두 삭제'},{id:'lineBreaks',name:'줄바꿈 제거',desc:'모든 줄을 한 줄로 합침'},{id:'toLower',name:'소문자 변환',desc:'모든 문자를 소문자로'},{id:'toUpper',name:'대문자 변환',desc:'모든 문자를 대문자로'}]},
  en:{sub:'Remove spaces, blank lines, HTML tags, special characters and more',langBtn:'🌐 中文',backBtn:'← All Tools',inputLabel:'Input',inputPh:'Paste text to clean here...',outputLabel:'Output',outputPh:'Result will appear here...',frTitle:'Find & Replace',findPh:'Find text',replacePh:'Replace with',applyBtn:'▶ Apply',copyBtn:'Copy',clearBtn:'Clear',copied:'✓ Copied',seoH2:'Text Cleaner',seoP:'Remove extra spaces, blank lines, HTML tags, special characters, numbers, and more from text in one click.',
    opts:[{id:'trimLines',name:'Trim line whitespace',desc:'Remove leading/trailing spaces per line'},{id:'extraSpaces',name:'Collapse spaces',desc:'Replace multiple spaces with one'},{id:'blankLines',name:'Remove blank lines',desc:'Delete all empty lines'},{id:'multiBlank',name:'Collapse blank lines',desc:'Reduce multiple blanks to one'},{id:'htmlTags',name:'Strip HTML tags',desc:'Remove all <...> tags'},{id:'specialChars',name:'Remove special chars',desc:'Remove !@#$%^&* etc.'},{id:'numbers',name:'Remove numbers',desc:'Delete 0-9 digits'},{id:'lineBreaks',name:'Remove line breaks',desc:'Join all lines into one'},{id:'toLower',name:'Lowercase',desc:'Convert all text to lowercase'},{id:'toUpper',name:'Uppercase',desc:'Convert all text to uppercase'}]},
  zh:{sub:'删除多余空格、空行、HTML标签、特殊字符等文本清理工具',langBtn:'🌐 한국어',backBtn:'← 所有工具',inputLabel:'输入',inputPh:'粘贴要清理的文本...',outputLabel:'输出',outputPh:'结果显示在这里...',frTitle:'查找替换',findPh:'查找文本',replacePh:'替换为',applyBtn:'▶ 应用',copyBtn:'复制',clearBtn:'清除',copied:'✓ 已复制',seoH2:'文本清理器',seoP:'一键删除文本中的多余空格、空行、HTML标签、特殊字符、数字等，支持查找替换和正则表达式。',
    opts:[{id:'trimLines',name:'去除行首尾空白',desc:'删除每行开头和结尾的空格'},{id:'extraSpaces',name:'合并多余空格',desc:'将多个空格替换为一个'},{id:'blankLines',name:'删除空行',desc:'删除所有空白行'},{id:'multiBlank',name:'合并空行',desc:'将多个空行减少为一个'},{id:'htmlTags',name:'删除HTML标签',desc:'删除所有<...>标签'},{id:'specialChars',name:'删除特殊字符',desc:'删除!@#$%^&*等字符'},{id:'numbers',name:'删除数字',desc:'删除所有0-9数字'},{id:'lineBreaks',name:'删除换行符',desc:'将所有行合并为一行'},{id:'toLower',name:'转为小写',desc:'将所有文字转为小写'},{id:'toUpper',name:'转为大写',desc:'将所有文字转为大写'}]},
};
let _lang='ko';
const LANGS=['ko','en','zh'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function buildOpts(){
  const opts=_i18n[_lang].opts;
  const grid=document.getElementById('optsGrid');
  grid.innerHTML=opts.map(o=>{
    const checked=document.getElementById(o.id+'_cb')?.checked||false;
    return`<label class="opt-card"><input type="checkbox" id="${o.id}_cb" ${checked?'checked':''} onchange="liveClean()"><div class="opt-body"><div class="opt-name">${o.name}</div><div class="opt-desc">${o.desc}</div></div></label>`;
  }).join('');
}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.getElementById('inputText').placeholder=t.inputPh;document.getElementById('outputText').placeholder=t.outputPh;document.getElementById('findTxt').placeholder=t.findPh;document.getElementById('replaceTxt').placeholder=t.replacePh;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});buildOpts();liveClean();}
function getOpt(id){const el=document.getElementById(id+'_cb');return el?el.checked:false;}
function liveClean(){
  let text=document.getElementById('inputText').value;
  const inChars=text.length;
  if(getOpt('trimLines'))text=text.split('\n').map(l=>l.trim()).join('\n');
  if(getOpt('extraSpaces'))text=text.replace(/ {2,}/g,' ');
  if(getOpt('blankLines'))text=text.split('\n').filter(l=>l.trim()!=='').join('\n');
  if(getOpt('multiBlank'))text=text.replace(/\n{3,}/g,'\n\n');
  if(getOpt('htmlTags'))text=text.replace(/<[^>]*>/g,'');
  if(getOpt('specialChars'))text=text.replace(/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>/?`~]/g,'');
  if(getOpt('numbers'))text=text.replace(/[0-9]/g,'');
  if(getOpt('lineBreaks'))text=text.replace(/\r?\n/g,' ').replace(/ {2,}/g,' ').trim();
  if(getOpt('toLower'))text=text.toLowerCase();
  if(getOpt('toUpper'))text=text.toUpperCase();
  const findTxt=document.getElementById('findTxt').value;
  const replaceTxt=document.getElementById('replaceTxt').value;
  if(findTxt){
    try{
      const regex=document.getElementById('frRegex').checked?new RegExp(findTxt,'g'):null;
      text=regex?text.replace(regex,replaceTxt):text.split(findTxt).join(replaceTxt);
    }catch(e){}
  }
  document.getElementById('outputText').value=text;
  document.getElementById('infoA').textContent=`${inChars} chars`;
  document.getElementById('infoB').textContent=`${text.length} chars`;
}
function copyOut(){const v=document.getElementById('outputText').value;if(!v)return;navigator.clipboard.writeText(v);const t=document.getElementById('toast');t.style.display='inline';setTimeout(()=>{t.style.display='none';},1600);}
function clearAll(){document.getElementById('inputText').value='';document.getElementById('outputText').value='';document.getElementById('infoA').textContent='';document.getElementById('infoB').textContent='';document.getElementById('findTxt').value='';document.getElementById('replaceTxt').value='';}
_lang=detectLang();applyLang();
</script>
</body>
</html>
