.arrow{color:var(--text-dim);font-size:12px;font-family:'DM Mono',monospace;}
.btn-row{display:flex;gap:8px;margin:12px 0;}
.btn{padding:9px 20px;border-radius:8px;font-size:12px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;border:none;}
.btn-primary{background:var(--accent);color:#000;}

.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-muted);}

.copy-toast{display:none;font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-left:4px;}

details.faq-item summary::-webkit-details-marker{display:none;}

footer{text-align:center;font-size:12px;color:var(--text-dim);margin-top:32px;}

<script>
const _i18n={
  ko:{sub:'공백·줄바꿈·HTML태그·특수문자 제거 등 텍스트 정리 도구',langBtn:'🌐 EN',backBtn:'← 모두의 툴',inputLabel:'입력',inputPh:'정리할 텍스트를 입력하세요...',outputLabel:'출력',outputPh:'결과가 여기에 표시됩니다...',frTitle:'찾아 바꾸기',findPh:'찾을 텍스트',replacePh:'바꿀 텍스트',applyBtn:'▶ 적용',copyBtn:'복사',clearBtn:'지우기',copied:'✓ 복사됨',seoHtml:'<h2>Text Cleaner 사용법</h2><p>Text Cleaner는 텍스트에서 불필요한 공백, 빈 줄, HTML 태그, 특수문자, 숫자 등을 한번에 제거합니다. 찾아바꾸기와 정규식도 지원하여 복잡한 텍스트 정리 작업을 빠르게 처리할 수 있습니다.</p><details class="faq-item"><summary>HTML 태그 제거 기능은 어떻게 작동하나요?</summary><p>&lt;b&gt;, &lt;p&gt;, &lt;div&gt; 같은 HTML 태그를 모두 제거하고 텍스트만 남깁니다. 웹 페이지에서 복사한 내용을 순수 텍스트로 변환할 때 유용합니다.</p></details><details class="faq-item"><summary>공백 제거와 트림(Trim)의 차이는 무엇인가요?</summary><p>트림은 텍스트 앞뒤의 공백만 제거합니다. 공백 제거 옵션은 단어 사이의 연속 공백을 하나로 줄이거나 모든 공백을 제거합니다. 용도에 따라 적절한 옵션을 선택하세요.</p></details><details class="faq-item"><summary>찾아바꾸기에서 정규식을 사용할 수 있나요?</summary><p>네, 정규식(Regex) 모드를 활성화하면 패턴 기반 찾기·바꾸기가 가능합니다. 예를 들어 숫자 패턴 \\d+나 특수문자 패턴 [^a-zA-Z0-9]를 사용해 원하는 텍스트를 정밀하게 처리할 수 있습니다.</p></details><details class="faq-item"><summary>특수문자 제거 시 한글이나 영문도 지워지나요?</summary><p>아니요, 특수문자 제거 옵션은 알파벳·숫자·한글·기본 공백을 유지하고 @, #, $, % 같은 기호만 제거합니다. 한글과 영문은 영향을 받지 않습니다.</p></details><details class="faq-item"><summary>처리할 수 있는 텍스트 크기에 제한이 있나요?</summary><p>브라우저 메모리 한도 내에서 대용량 텍스트도 처리 가능합니다. 수십 MB 이상의 파일은 브라우저가 느려질 수 있으며, 모든 처리는 서버 전송 없이 브라우저 내에서만 이루어집니다.</p></details><details class="faq-item"><summary>여러 개의 연속된 공백을 한 칸으로 줄일 수 있나요?</summary><p>가능합니다. "연속 공백 압축" 또는 "공백 정리" 옵션을 사용하면 여러 개의 연속 공백이 단일 공백으로 압축됩니다. 크롤링한 텍스트나 PDF 추출 데이터 정리에 자주 사용됩니다.</p></details><details class="faq-item"><summary>줄바꿈을 제거하거나 통일할 수 있나요?</summary><p>Windows(\r\n), Mac(\r), Unix(\n) 등 다른 줄바꿈 형식을 하나로 통일하거나 완전히 제거할 수 있습니다. 다른 OS에서 만들어진 파일을 통합할 때 유용합니다.</p></details><details class="faq-item"><summary>유니코드 특수 공백(NBSP, 얇은 공백 등)도 제거되나요?</summary><p>유니코드 공백 문자 정리 옵션을 사용하면 일반 스페이스 외에 Non-Breaking Space(\u00A0), Em Space(\u2003) 등 다양한 유니코드 공백 문자도 일반 공백으로 변환됩니다.</p></details>',
    opts:[{id:'trimLines',name:'앞뒤 공백 제거',desc:'각 줄 시작·끝 공백 제거'},{id:'extraSpaces',name:'연속 공백 정리',desc:'여러 공백을 하나로'},{id:'blankLines',name:'빈 줄 제거',desc:'빈 줄 모두 삭제'},{id:'multiBlank',name:'연속 빈 줄 정리',desc:'2개 이상 빈 줄을 1개로'},{id:'htmlTags',name:'HTML 태그 제거',desc:'<...> 태그 모두 삭제'},{id:'specialChars',name:'특수문자 제거',desc:'!@#$%^&* 등 제거'},{id:'numbers',name:'숫자 제거',desc:'0-9 숫자 모두 삭제'},{id:'lineBreaks',name:'줄바꿈 제거',desc:'모든 줄을 한 줄로 합침'},{id:'toLower',name:'소문자 변환',desc:'모든 문자를 소문자로'},{id:'toUpper',name:'대문자 변환',desc:'모든 문자를 대문자로'}]},
  en:{sub:'Remove spaces, blank lines, HTML tags, special characters and more',langBtn:'🌐 中文',backBtn:'← All Tools',inputLabel:'Input',inputPh:'Paste text to clean here...',outputLabel:'Output',outputPh:'Result will appear here...',frTitle:'Find & Replace',findPh:'Find text',replacePh:'Replace with',applyBtn:'▶ Apply',copyBtn:'Copy',clearBtn:'Clear',copied:'✓ Copied',seoHtml:'<h2>How to Use the Text Cleaner</h2><p>Text Cleaner removes extra spaces, blank lines, HTML tags, special characters, numbers, and more from text in a single click. It also supports Find &amp; Replace with optional regex, making complex text cleanup fast and precise.</p><details class="faq-item"><summary>How does the HTML tag removal work?</summary><p>It strips all HTML tags like &lt;b&gt;, &lt;p&gt;, and &lt;div&gt;, leaving only the plain text content. This is useful for converting copy-pasted web content into clean, unformatted text.</p></details><details class="faq-item"><summary>What is the difference between Trim and Remove Spaces?</summary><p>Trim removes leading and trailing whitespace from the entire text. The Remove Spaces option collapses multiple consecutive spaces into one, or removes all spaces entirely depending on the setting selected.</p></details><details class="faq-item"><summary>Can I use regular expressions in Find &amp; Replace?</summary><p>Yes — enable Regex mode to use pattern-based find and replace. For example, use \\d+ to match any number, or [^a-zA-Z0-9] to match all non-alphanumeric characters and replace or remove them.</p></details><details class="faq-item"><summary>Will removing special characters affect letters or numbers?</summary><p>No — the special character removal option keeps letters, digits, and basic whitespace intact. Only symbols like @, #, $, and % are removed, so your words and sentences remain unaffected.</p></details><details class="faq-item"><summary>Is there a size limit on how much text I can process?</summary><p>There is no hard limit — it processes as much as your browser memory allows. Very large files (tens of MB) may slow down the browser. All processing runs locally with no data sent to any server.</p></details><details class="faq-item"><summary>Can I collapse multiple consecutive spaces into one?</summary><p>Yes. Use the "collapse whitespace" option to reduce multiple consecutive spaces to a single space. This is commonly used to clean up scraped text or PDF-extracted data.</p></details><details class="faq-item"><summary>Can I normalize or remove line endings?</summary><p>You can normalize line endings from Windows (\r\n), Mac (\r), and Unix (\n) formats to a single consistent format, or remove them entirely. Useful for unifying files created on different operating systems.</p></details><details class="faq-item"><summary>Are Unicode special spaces (NBSP, thin spaces) also removed?</summary><p>The Unicode whitespace option converts non-breaking spaces (\u00A0), em spaces (\u2003), and other Unicode whitespace characters into regular spaces in addition to standard ASCII spaces.</p></details>',
    opts:[{id:'trimLines',name:'Trim line whitespace',desc:'Remove leading/trailing spaces per line'},{id:'extraSpaces',name:'Collapse spaces',desc:'Replace multiple spaces with one'},{id:'blankLines',name:'Remove blank lines',desc:'Delete all empty lines'},{id:'multiBlank',name:'Collapse blank lines',desc:'Reduce multiple blanks to one'},{id:'htmlTags',name:'Strip HTML tags',desc:'Remove all <...> tags'},{id:'specialChars',name:'Remove special chars',desc:'Remove !@#$%^&* etc.'},{id:'numbers',name:'Remove numbers',desc:'Delete 0-9 digits'},{id:'lineBreaks',name:'Remove line breaks',desc:'Join all lines into one'},{id:'toLower',name:'Lowercase',desc:'Convert all text to lowercase'},{id:'toUpper',name:'Uppercase',desc:'Convert all text to uppercase'}]},
  zh:{sub:'删除多余空格、空行、HTML标签、特殊字符等文本清理工具',langBtn:'🌐 日本語',backBtn:'← 所有工具',inputLabel:'输入',inputPh:'粘贴要清理的文本...',outputLabel:'输出',outputPh:'结果显示在这里...',frTitle:'查找替换',findPh:'查找文本',replacePh:'替换为',applyBtn:'▶ 应用',copyBtn:'复制',clearBtn:'清除',copied:'✓ 已复制',seoHtml:'<h2>文本清理器使用指南</h2><p>文本清理器可一键删除文本中的多余空格、空行、HTML标签、特殊字符、数字等，同时支持查找替换和正则表达式，让复杂的文本清理工作变得简单高效。</p><details class="faq-item"><summary>HTML标签删除功能是如何工作的？</summary><p>它会删除所有HTML标签，如&lt;b&gt;、&lt;p&gt;、&lt;div&gt;等，仅保留纯文本内容。适用于将从网页复制的内容转换为干净的纯文本格式。</p></details><details class="faq-item"><summary>去除空格和Trim（修剪）有什么区别？</summary><p>Trim仅删除文本首尾的空白字符。去除空格选项则可将多个连续空格合并为一个，或根据设置完全删除所有空格，适用于不同的清理需求。</p></details><details class="faq-item"><summary>查找替换支持正则表达式吗？</summary><p>支持，启用正则模式即可使用基于模式的查找和替换。例如用\\d+匹配数字，或用[^a-zA-Z0-9]匹配所有非字母数字字符，实现精准处理。</p></details><details class="faq-item"><summary>删除特殊字符会影响中文或英文字母吗？</summary><p>不会，特殊字符删除选项会保留字母、数字和基本空格，仅删除@、#、$、%等符号，中文和英文内容不受影响。</p></details><details class="faq-item"><summary>可处理的文本大小有限制吗？</summary><p>在浏览器内存允许的范围内可处理大量文本。数十MB以上的文件可能导致浏览器变慢。所有处理均在本地完成，不会将任何数据发送到服务器。</p></details><details class="faq-item"><summary>可以将多个连续空格压缩为一个吗？</summary><p>可以。使用"压缩空白"选项可将多个连续空格缩减为单个空格，常用于清理爬取的文本或PDF提取数据。</p></details><details class="faq-item"><summary>可以统一或删除换行符吗？</summary><p>可以将Windows(\r\n)、Mac(\r)、Unix(\n)等不同换行格式统一为一种，或完全删除，适合合并不同操作系统创建的文件。</p></details><details class="faq-item"><summary>Unicode特殊空格（不换行空格等）也会被处理吗？</summary><p>启用Unicode空白选项后，除普通空格外，不换行空格（\u00A0）、全角空格（\u2003）等各种Unicode空白字符也会转换为普通空格。</p></details>',
    opts:[{id:'trimLines',name:'去除行首尾空白',desc:'删除每行开头和结尾的空格'},{id:'extraSpaces',name:'合并多余空格',desc:'将多个空格替换为一个'},{id:'blankLines',name:'删除空行',desc:'删除所有空白行'},{id:'multiBlank',name:'合并空行',desc:'将多个空行减少为一个'},{id:'htmlTags',name:'删除HTML标签',desc:'删除所有<...>标签'},{id:'specialChars',name:'删除特殊字符',desc:'删除!@#$%^&*等字符'},{id:'numbers',name:'删除数字',desc:'删除所有0-9数字'},{id:'lineBreaks',name:'删除换行符',desc:'将所有行合并为一行'},{id:'toLower',name:'转为小写',desc:'将所有文字转为小写'},{id:'toUpper',name:'转为大写',desc:'将所有文字转为大写'}]},
  ja:{sub:'余分なスペース・空行・HTMLタグ・特殊文字などを削除するテキスト整理ツール',langBtn:'🌐 한국어',backBtn:'← ホーム',inputLabel:'入力',inputPh:'整理するテキストをここに貼り付けてください...',outputLabel:'出力',outputPh:'結果がここに表示されます...',frTitle:'検索と置換',findPh:'検索するテキスト',replacePh:'置換後のテキスト',applyBtn:'▶ 適用',copyBtn:'コピー',clearBtn:'クリア',copied:'✓ コピー済み',seoHtml:'<h2>テキストクリーナーの使い方</h2><p>テキストクリーナーは余分なスペース・空行・HTMLタグ・特殊文字・数字などをワンクリックで削除します。検索と置換・正規表現にも対応しており、複雑なテキスト整理作業を素早く処理できます。</p><details class="faq-item"><summary>HTMLタグ削除機能はどのように動作しますか？</summary><p>&lt;b&gt;・&lt;p&gt;・&lt;div&gt;などのHTMLタグをすべて削除し、テキスト内容のみを残します。ウェブページからコピーした内容をプレーンテキストに変換する際に便利です。</p></details><details class="faq-item"><summary>スペース削除とトリム（Trim）の違いは何ですか？</summary><p>トリムはテキスト全体の先頭・末尾のスペースのみ削除します。スペース削除オプションは連続したスペースを1つにまとめるか、設定に応じてすべてのスペースを削除します。</p></details><details class="faq-item"><summary>検索と置換で正規表現は使えますか？</summary><p>はい、正規表現モードを有効にするとパターンベースの検索・置換が可能です。例えば\\d+で数字を、[^a-zA-Z0-9]で非英数字文字をマッチさせて精密な処理ができます。</p></details><details class="faq-item"><summary>特殊文字削除で日本語や英文字も消えますか？</summary><p>消えません。特殊文字削除オプションはアルファベット・数字・ひらがな・カタカナ・漢字などを保持し、@・#・$・%などの記号のみ削除します。</p></details><details class="faq-item"><summary>処理できるテキストサイズに制限はありますか？</summary><p>ブラウザのメモリの許す限り大量テキストの処理が可能です。数十MB以上のファイルはブラウザの動作が遅くなる場合があります。すべての処理はブラウザ内で完結し、データはサーバーに送信されません。</p></details><details class="faq-item"><summary>複数の連続スペースを1つに圧縮できますか？</summary><p>できます。「空白の圧縮」オプションを使うと複数の連続スペースが1つのスペースに圧縮されます。スクレイピングしたテキストやPDF抽出データのクリーニングによく使われます。</p></details><details class="faq-item"><summary>改行コードを正規化または削除できますか？</summary><p>Windows(\r\n)、Mac(\r)、Unix(\n)などの異なる改行形式を1種類に統一したり、完全に削除したりできます。異なるOSで作成されたファイルをまとめる際に便利です。</p></details><details class="faq-item"><summary>Unicodeの特殊スペース（NBSP、細いスペースなど）も処理されますか？</summary><p>Unicodeスペースオプションを使うとノーブレークスペース（\u00A0）やEmスペース（\u2003）などのUnicode空白文字も通常スペースに変換されます。</p></details>',
    opts:[{id:'trimLines',name:'行頭・行末の空白を削除',desc:'各行の先頭と末尾のスペースを削除'},{id:'extraSpaces',name:'連続スペースを整理',desc:'複数のスペースを1つに'},{id:'blankLines',name:'空行を削除',desc:'すべての空行を削除'},{id:'multiBlank',name:'連続空行を整理',desc:'複数の空行を1行に'},{id:'htmlTags',name:'HTMLタグを削除',desc:'すべての<...>タグを削除'},{id:'specialChars',name:'特殊文字を削除',desc:'!@#$%^&*などを削除'},{id:'numbers',name:'数字を削除',desc:'0-9の数字をすべて削除'},{id:'lineBreaks',name:'改行を削除',desc:'すべての行を1行に結合'},{id:'toLower',name:'小文字に変換',desc:'すべての文字を小文字に'},{id:'toUpper',name:'大文字に変換',desc:'すべての文字を大文字に'}]},
};
let _lang='ko';
const LANGS=['ko','en','zh','ja'];
function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=navigator.language?.slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const idx=LANGS.indexOf(_lang);_lang=LANGS[(idx+1)%LANGS.length];localStorage.setItem('modoo_lang',_lang);const url=new URL(location.href);url.searchParams.set('lang',_lang);history.replaceState({},'',url);applyLang();}
function buildOpts(){
  const opts=_i18n[_lang].opts;
  const grid=document.getElementById('optsGrid');
  grid.innerHTML=opts.map(o=>{
    const checked=document.getElementById(o.id+'_cb')?.checked||false;
    return`<label class="opt-card"><input type="checkbox" id="${o.id}_cb" ${checked?'checked':''} onchange="liveClean()"><div class="opt-body"><div class="opt-name">${o.name}</div><div class="opt-desc">${o.desc}</div></div></label>`;
  }).join('');
}
function applyLang(){const t=_i18n[_lang];document.documentElement.lang=_lang;document.getElementById('langBtn').textContent=t.langBtn;document.getElementById('backBtn').innerHTML=t.backBtn;document.getElementById('inputText').placeholder=t.inputPh;document.getElementById('outputText').placeholder=t.outputPh;document.getElementById('findTxt').placeholder=t.findPh;document.getElementById('replaceTxt').placeholder=t.replacePh;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.innerHTML=t[k];});buildOpts();liveClean();}
function getOpt(id){const el=document.getElementById(id+'_cb');return el?el.checked:false;}
function liveClean(){
  let text=document.getElementById('inputText').value;
  const inChars=text.length;
  if(getOpt('trimLines'))text=text.split('\n').map(l=>l.trim()).join('\n');
  if(getOpt('extraSpaces'))text=text.replace(/ {2,}/g,' ');
  if(getOpt('blankLines'))text=text.split('\n').filter(l=>l.trim()!=='').join('\n');
  if(getOpt('multiBlank'))text=text.replace(/\n{3,}/g,'\n\n');
  if(getOpt('htmlTags'))text=text.replace(/<[^>]*>/g,'');
  if(getOpt('specialChars'))text=text.replace(/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>/?`~]/g,'');
  if(getOpt('numbers'))text=text.replace(/[0-9]/g,'');
  if(getOpt('lineBreaks'))text=text.replace(/\r?\n/g,' ').replace(/ {2,}/g,' ').trim();
  if(getOpt('toLower'))text=text.toLowerCase();
  if(getOpt('toUpper'))text=text.toUpperCase();
  const findTxt=document.getElementById('findTxt').value;
  const replaceTxt=document.getElementById('replaceTxt').value;
  if(findTxt){
    try{
      const regex=document.getElementById('frRegex').checked?new RegExp(findTxt,'g'):null;
      text=regex?text.replace(regex,replaceTxt):text.split(findTxt).join(replaceTxt);
    }catch(e){}
  }
  document.getElementById('outputText').value=text;
  document.getElementById('infoA').textContent=`${inChars} chars`;
  document.getElementById('infoB').textContent=`${text.length} chars`;
}
function copyOut(){const v=document.getElementById('outputText').value;if(!v)return;navigator.clipboard.writeText(v);const t=document.getElementById('toast');t.style.display='inline';setTimeout(()=>{t.style.display='none';},1600);}
function clearAll(){document.getElementById('inputText').value='';document.getElementById('outputText').value='';document.getElementById('infoA').textContent='';document.getElementById('infoB').textContent='';document.getElementById('findTxt').value='';document.getElementById('replaceTxt').value='';}
_lang=detectLang();applyLang();
</script>
