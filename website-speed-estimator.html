    seoHtml: `<h2>Website Speed Estimator 사용 가이드</h2>
<p>웹 페이지의 HTML 소스를 붙여넣으면 <strong>HTML 크기</strong>, <strong>렌더 차단 리소스</strong>, 이미지 최적화 여부, viewport 메타 태그 등을 즉시 분석합니다. URL을 입력하면 Google PageSpeed Insights로 바로 연결해 실제 성능 점수와 Core Web Vitals를 확인할 수 있습니다.</p>
<h2 class="seo-sub">자주 묻는 질문</h2>
<details class="faq-item"><summary>Q. 페이지 속도는 왜 중요한가요?</summary><p>A. 페이지 속도는 사용자 경험, SEO 순위, 전환율에 직접적인 영향을 미칩니다. Google은 Core Web Vitals를 검색 순위 신호로 사용하며, 1초 지연 시 전환율이 최대 20% 감소할 수 있습니다.</p></details>
<details class="faq-item"><summary>Q. Core Web Vitals란 무엇인가요?</summary><p>A. Core Web Vitals는 Google이 정의한 웹 성능 지표로 LCP(최대 콘텐츠 렌더), FID(첫 입력 지연), CLS(누적 레이아웃 이동) 세 가지로 구성됩니다.</p></details>
<details class="faq-item"><summary>Q. LCP를 어떻게 최적화하나요?</summary><p>A. LCP(Largest Contentful Paint)를 개선하려면 히어로 이미지를 최적화하고, 중요 리소스를 preload하며, 서버 응답 시간을 줄이고, 렌더 차단 리소스를 제거해야 합니다.</p></details>
<details class="faq-item"><summary>Q. 렌더 차단 리소스란?</summary><p>A. 브라우저가 페이지를 렌더링하기 전에 먼저 로드해야 하는 CSS나 JS 파일입니다. defer나 async 속성을 사용하거나 CSS를 인라인으로 처리해 렌더링을 차단하지 않도록 합니다.</p></details>
<details class="faq-item"><summary>Q. 이미지 lazy load는 어떻게 구현하나요?</summary><p>A. &lt;img&gt; 태그에 loading="lazy" 속성을 추가하면 브라우저가 화면 밖 이미지의 로딩을 지연시킵니다. 모든 현대 브라우저에서 지원합니다.</p></details>
<details class="faq-item"><summary>Q. font-display:swap은 무엇인가요?</summary><p>A. 웹 폰트가 로드될 때까지 시스템 폰트를 표시하는 CSS 속성입니다. 폰트가 로드되면 교체되며, CLS에 영향을 미칠 수 있으므로 size-adjust와 함께 사용하면 좋습니다.</p></details>

function analyzeHtml(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const htmlSizeKb = (new TextEncoder().encode(html).length / 1024).toFixed(1);
  const scripts = Array.from(doc.querySelectorAll('script[src]'));
  const headScripts = Array.from(doc.querySelectorAll('head script[src]')).filter(s => !s.hasAttribute('defer') && !s.hasAttribute('async'));
  const styles = Array.from(doc.querySelectorAll('link[rel="stylesheet"]'));
  const images = Array.from(doc.querySelectorAll('img'));
  const inlineScripts = Array.from(doc.querySelectorAll('script:not([src])')).length;
  const viewport = doc.querySelector('meta[name="viewport"]');
  const title = doc.querySelector('title')?.textContent?.trim() || '';
  const desc = doc.querySelector('meta[name="description"]')?.getAttribute('content') || '';
  const imagesNoLazy = images.filter(i => !i.getAttribute('loading')).length;
  return { htmlSizeKb, scripts: scripts.length, headScripts: headScripts.length, styles: styles.length, images: images.length, inlineScripts, viewport: !!viewport, title, titleLen: title.length, desc, descLen: desc.length, imagesNoLazy };
}

function analyze() {
  const t = _i18n[currentLang] || _i18n.ko;
  const html = document.getElementById('htmlInput').value.trim();
  if (!html) { alert(currentLang === 'ko' ? 'HTML을 입력하세요' : 'Please paste HTML'); return; }
  const r = analyzeHtml(html);

  const stats = [
    { v: r.htmlSizeKb + ' KB', l: t.labelHtmlSize, cls: parseFloat(r.htmlSizeKb) > 100 ? 'warn' : 'ok' },
    { v: r.scripts, l: t.labelScripts, cls: r.scripts > 10 ? 'warn' : 'ok' },
    { v: r.styles, l: t.labelStyles, cls: r.styles > 5 ? 'warn' : 'ok' },
    { v: r.images, l: t.labelImages, cls: 'ok' },
    { v: r.headScripts, l: t.labelHeadScripts, cls: r.headScripts > 0 ? 'err' : 'ok' },
    { v: r.inlineScripts, l: t.labelInlineScripts, cls: r.inlineScripts > 5 ? 'warn' : 'ok' },
    { v: r.viewport ? t.present : t.missing, l: t.labelViewport, cls: r.viewport ? 'ok' : 'err' },
    { v: r.title ? (r.title.slice(0, 30) + (r.title.length > 30 ? '…' : '')) : t.missing, l: t.labelTitle, cls: r.title ? 'ok' : 'err' },
  ];

  document.getElementById('statsGrid').style.gridTemplateColumns = 'repeat(4,1fr)';
  document.getElementById('statsGrid').innerHTML = stats.slice(0, 4).map(s =>
    `<div class="stat-box ${s.cls}"><div class="stat-v">${s.v}</div><div class="stat-l">${s.l}</div></div>`).join('');

  document.getElementById('metaGrid').innerHTML = stats.slice(4).map(s =>
    `<div class="meta-item"><div class="meta-label">${s.l}</div><div class="meta-value ${s.cls === 'ok' ? 'ok' : s.cls === 'err' ? 'bad' : ''}">${s.v}</div></div>`).join('');

  const suggestions = [];
  if (r.headScripts > 0) suggestions.push({ level: 'error', msg: t.msgRenderBlocking(r.headScripts) });
  if (!r.viewport) suggestions.push({ level: 'error', msg: t.msgViewport });
  if (!r.title) suggestions.push({ level: 'error', msg: t.msgTitle });
  if (!r.desc) suggestions.push({ level: 'warn', msg: t.msgDesc });
  if (r.imagesNoLazy > 3) suggestions.push({ level: 'info', msg: t.msgLazyLoad(r.imagesNoLazy) });
  if (r.inlineScripts > 5) suggestions.push({ level: 'warn', msg: t.msgInlineScripts(r.inlineScripts) });

  const suggList = document.getElementById('suggList');
  if (suggestions.length === 0) {
    suggList.innerHTML = `<div class="sugg-item"><span class="sugg-dot info"></span><span class="sugg-msg">${t.msgNoIssues}</span></div>`;
  } else {
    suggList.innerHTML = suggestions.map(s => `<div class="sugg-item"><span class="sugg-dot ${s.level}"></span><span class="sugg-msg">${s.msg}</span></div>`).join('');
  }

  document.getElementById('resultsSection').classList.add('show');
}

function detectLang() {
  const p = new URLSearchParams(location.search).get('lang');
  if (p && _i18n[p]) return p;
  const s = localStorage.getItem('modoo_lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  if (n.startsWith('ja')) return 'ja';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}

function toggleLang() {
  const order = ['ko', 'en', 'zh', 'ja'];
  const next = order[(order.indexOf(currentLang) + 1) % order.length];
  currentLang = next;
  localStorage.setItem('modoo_lang', next);
  const url = new URL(location.href);
  url.searchParams.set('lang', next);
  history.replaceState(null, '', url);
  applyLang(next);
}
