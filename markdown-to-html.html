<h2>Frequently Asked Questions</h2>
<details class="faq-item"><summary>What is Markdown?</summary><p>A. Markdown is a lightweight markup language that lets you write formatted text using a plain-text syntax that converts to HTML. Created by John Gruber in 2004, it is supported by GitHub, Notion, Reddit, Stack Overflow, and thousands of other platforms.</p></details>
<details class="faq-item"><summary>Who invented Markdown?</summary><p>A. John Gruber created Markdown in 2004, with significant contributions from Aaron Swartz on the syntax design. The original goal was to make it easy to write HTML without learning the full tag syntax.</p></details>
<details class="faq-item"><summary>What is the difference between Markdown and HTML?</summary><p>A. HTML is a markup language interpreted directly by web browsers. Markdown is a simpler authoring format converted to HTML by a renderer. Markdown is a superset in that you can embed raw HTML tags directly in a Markdown document.</p></details>
<details class="faq-item"><summary>What is the CommonMark standard?</summary><p>A. CommonMark is a formal, unambiguous Markdown specification proposed in 2014. The original Markdown spec had many edge cases with inconsistent output across implementations. CommonMark resolves these. GitHub, Stack Overflow, and Discourse all build on CommonMark.</p></details>
<details class="faq-item"><summary>What are common Markdown rendering engines?</summary><p>A. Popular renderers include marked.js (JavaScript), remark (JS/React ecosystem), python-markdown (Python), kramdown (Ruby), and pandoc (universal). GitHub uses its own GFM (GitHub Flavored Markdown) renderer based on CommonMark.</p></details>
<details class="faq-item"><summary>What is the syntax for headings, bold, and italic?</summary><p>A. Headings: # H1, ## H2, ### H3. Bold: **text** or __text__. Italic: *text* or _text_. Bold+Italic: ***text***. Strikethrough: ~~text~~.</p></details>
<details class="faq-item"><summary>How do I write code blocks in Markdown?</summary><p>A. Inline code: wrap in backticks — \`code\`. Fenced code blocks: wrap with triple backticks (\`\`\`). Add a language name on the opening line for syntax highlighting, e.g. \`\`\`javascript.</p></details>
<details class="faq-item"><summary>Is there an XSS security risk with Markdown to HTML?</summary><p>A. Yes — if user-supplied Markdown containing raw HTML tags like &lt;script&gt; is rendered, it can create XSS vulnerabilities. Always sanitize the HTML output using a library like DOMPurify before inserting it into the DOM in production applications. This tool is for personal use and does not sanitize.</p></details>
<details class="faq-item"><summary>Q. Can the converted HTML be used directly?</summary><p>A. Yes. Click Copy to grab it from your clipboard immediately. Note that different Markdown parsers may produce slightly different HTML, so test in your actual environment.</p></details>`

const LANGS = ['ko','en','zh','ja'];
let _lang = 'ko';

function detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  if (n.startsWith('ja')) return 'ja';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}

function cycleLang() {
  const idx = LANGS.indexOf(_lang);
  _lang = LANGS[(idx + 1) % LANGS.length];
  localStorage.setItem('modoo_lang', _lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', _lang);
  history.replaceState({}, '', url);
  applyLang();
}

// Markdown to HTML parser
function markdownToHtml(md) {
  // Protect fenced code blocks first
  const codeBlocks = [];
  md = md.replace(/```([\w]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    codeBlocks.push(`<pre><code${lang?' class="lang-'+lang+'"':''}>${escaped.trim()}</code></pre>`);
    return `\x00CODE${idx}\x00`;
  });

  // Protect inline code
  const inlineCodes = [];
  md = md.replace(/`([^`\n]+)`/g, (_, code) => {
    const idx = inlineCodes.length;
    const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    inlineCodes.push(`<code>${escaped}</code>`);
    return `\x00ICODE${idx}\x00`;
  });

  // Escape HTML in remaining text
  md = md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Restore inline codes and fenced blocks (after escape)
  md = md.replace(/\x00ICODE(\d+)\x00/g, (_, i) => inlineCodes[i]);
  md = md.replace(/\x00CODE(\d+)\x00/g, (_, i) => codeBlocks[i]);

  let html = md;

  // Headings
  html = html.replace(/^#{6}\s+(.+)$/gm, '<h6>$1</h6>');
  html = html.replace(/^#{5}\s+(.+)$/gm, '<h5>$1</h5>');
  html = html.replace(/^#{4}\s+(.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^#{3}\s+(.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^#{2}\s+(.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

  // Bold and italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
  html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
  html = html.replace(/_([^_\n]+)_/g, '<em>$1</em>');

  // Strikethrough
  html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

  // Images before links
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Blockquotes
  html = html.replace(/^&gt;\s*(.+)$/gm, '<blockquote>$1</blockquote>');

  // Horizontal rule
  html = html.replace(/^---+$/gm, '<hr>');
  html = html.replace(/^\*\*\*+$/gm, '<hr>');

  // Unordered lists
  html = html.replace(/((?:^[*\-]\s.+\n?)+)/gm, m => {
    const items = m.trim().split('\n').map(l => '<li>' + l.replace(/^[*\-]\s/, '') + '</li>').join('');
    return '<ul>' + items + '</ul>\n';
  });

  // Ordered lists
  html = html.replace(/((?:^\d+\.\s.+\n?)+)/gm, m => {
    const items = m.trim().split('\n').map(l => '<li>' + l.replace(/^\d+\.\s/, '') + '</li>').join('');
    return '<ol>' + items + '</ol>\n';
  });

  // Tables (GFM style)
  html = html.replace(/(\|.+\|\n\|[-| :]+\|\n(?:\|.+\|\n?)*)/g, t => {
    const rows = t.trim().split('\n');
    const header = rows[0].split('|').filter((c, i, a) => i > 0 && i < a.length - 1).map(c => `<th>${c.trim()}</th>`).join('');
    const body = rows.slice(2).map(r => '<tr>' + r.split('|').filter((c, i, a) => i > 0 && i < a.length - 1).map(c => `<td>${c.trim()}</td>`).join('') + '</tr>').join('');
    return `<table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>\n`;
  });

  // Paragraphs (wrap double-newline separated blocks not already tagged)
  const lines = html.split('\n');
  const result = [];
  let inPara = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const isBlock = /^<(h[1-6]|ul|ol|li|blockquote|pre|hr|table|thead|tbody|tr|p|div)/.test(line.trim()) || line.trim() === '';
    if (!isBlock && line.trim()) {
      if (!inPara) { result.push('<p>'); inPara = true; }
      result.push(line);
    } else {
      if (inPara) { result.push('</p>'); inPara = false; }
      result.push(line);
    }
  }
  if (inPara) result.push('</p>');

  return result.join('\n').trim();
}

let _debounce;
function liveConvert() {
  clearTimeout(_debounce);
  _debounce = setTimeout(convert, 200);
}

function convert() {
  const md = document.getElementById('mdInput').value;
  const html = markdownToHtml(md);
  document.getElementById('mdPreview').innerHTML = html;
  document.getElementById('htmlSource').textContent = html;
}

function copyHtml() {
  const html = document.getElementById('htmlSource').textContent;
  if (!html) return;
  navigator.clipboard?.writeText(html).then(showToast).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = html; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); showToast();
  });
}

function pasteFromClipboard() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(text => {
      document.getElementById('mdInput').value = text;
      convert();
    }).catch(() => document.getElementById('mdInput').focus());
  } else {
    document.getElementById('mdInput').focus();
  }
}

function clearAll() {
  document.getElementById('mdInput').value = '';
  document.getElementById('mdPreview').innerHTML = '';
  document.getElementById('htmlSource').textContent = '';
}

function switchTab(tab) {
  _activeTab = tab;
  ['input','preview','html'].forEach(t => {
    const panelId = {input:'panelInput',preview:'panelPreview',html:'panelHtml'}[t];
    const btnId = {input:'tabInputBtn',preview:'tabPreviewBtn',html:'tabHtmlBtn'}[t];
    document.getElementById(panelId).classList.toggle('mobile-visible', t === tab);
    document.getElementById(btnId).classList.toggle('active', t === tab);
  });
}

function showToast() {
  const el = document.getElementById('toast');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// On desktop all three panels are visible
function initPanels() {
  if (window.innerWidth > 900) {
    document.getElementById('panelInput').classList.add('mobile-visible');
    document.getElementById('panelPreview').classList.add('mobile-visible');
    document.getElementById('panelHtml').classList.add('mobile-visible');
  } else {
    switchTab('preview');
  }
}
