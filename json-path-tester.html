    seoHtml:`<h2>JSONPath 테스터란?</h2><p><strong>JSONPath</strong>는 XPath의 JSON 버전으로, JSON 데이터에서 특정 값을 추출하는 쿼리 언어입니다. $ (루트), . (자식), .. (재귀), * (와일드카드), [] (인덱스/필터) 구문을 지원합니다. API 응답 분석, 데이터 추출, 조건부 필터링에 활용합니다.</p>

<details class="faq-item"><summary>재귀 하강(..)이란?</summary><p>$..title은 JSON의 모든 깊이에서 title 키를 찾아 값을 반환합니다.</p></details>

  },

    seoHtml:`<h2>JSONPath Tester</h2><p><strong>JSONPath</strong> is the JSON equivalent of XPath — a query language for extracting values from JSON. Supports $ (root), . (child), .. (recursive descent), * (wildcard), [] (index/filter) syntax. Great for API response analysis, data extraction, and conditional filtering.</p>
<h2 class="seo-sub">FAQ</h2>
<details class="faq-item"><summary>Basic JSONPath syntax?</summary><p>$ (root), . (child), .. (recursive descent), * (wildcard), [n] (index), [?(@.key > val)] (filter), [-1] (last element).</p></details>
<details class="faq-item"><summary>What does $.store.books[*].title mean?</summary><p>Root ($) → store → all elements (*) of books array → title field.</p></details>

    seoHtml:`<h2>JSONPath测试器</h2><p>JSONPath是XPath的JSON版本，用于从JSON数据中提取特定值。支持$（根）、.（子）、..（递归）、*（通配符）、[]（索引/过滤）语法。</p>
<h2 class="seo-sub">常见问题</h2>
<details class="faq-item"><summary>JSONPath基本语法？</summary><p>$（根）、.（子）、..（递归下降）、*（通配符）、[n]（索引）、[?(@.key>val)]（过滤）、[-1]（最后元素）。</p></details>

<details class="faq-item"><summary>支持数组切片吗？</summary><p>部分JSONPath实现支持[0:2]切片，本工具支持基本索引和过滤表达式。</p></details>

    seoHtml:`<h2>JSONPathテスターとは</h2><p>JSONPathはXPathのJSON版で、JSONデータから特定の値を抽出するクエリ言語です。$（ルート）、.（子）、..（再帰）、*（ワイルドカード）、[]（インデックス/フィルタ）構文をサポートします。</p>

function getByPath(obj,path){
  const normalized=path.replace(/^\$/,'').replace(/\[(\d+)\]/g,'.$1');
  const parts=normalized.split('.').filter(Boolean);
  let current=[obj];
  for(const part of parts){
    if(part==='*'){current=current.flatMap(c=>Array.isArray(c)?c:typeof c==='object'&&c?Object.values(c):[]);}
    else if(part==='..'){
      const all=[];
      function recurse(v){all.push(v);if(typeof v==='object'&&v)Object.values(v).forEach(recurse);}
      current.forEach(recurse);current=all;
    }
    else{current=current.map(c=>typeof c==='object'&&c?c[part]:undefined).filter(v=>v!==undefined);}
  }
  return current;
}
function evaluateFilter(arr,filterExpr){
  const m=filterExpr.match(/\?\(@\.(\w+)\s*(==|!=|>|>=|<|<=)\s*(.+)\)/);
  if(!m)return arr;
  const[,key,op,rawVal]=m;
  let val;
  try{val=JSON.parse(rawVal);}catch{val=rawVal.replace(/^['"]|['"]$/g,'');}
  return arr.filter(item=>{
    if(typeof item!=='object'||!item)return false;
    const iv=item[key];
    if(op==='==')return iv==val;if(op==='!=')return iv!=val;
    if(op==='>') return iv>val;if(op==='>=')return iv>=val;
    if(op==='<') return iv<val;if(op==='<=')return iv<=val;
    return false;
  });
}
function jsonPath(obj,path){
  if(!path.startsWith('$'))return [];
  const rest=path.slice(1);
  const tokens=[];
  let buf='',inBracket=false;
  for(let i=0;i<rest.length;i++){
    const c=rest[i];
    if(c==='['&&!inBracket){if(buf)tokens.push({type:'key',val:buf.replace(/^\./,'')});buf='[';inBracket=true;}
    else if(c===']'&&inBracket){buf+=']';tokens.push({type:'bracket',val:buf});buf='';inBracket=false;}
    else if(c==='.'&&!inBracket&&rest[i+1]==='.'&&!inBracket){if(buf)tokens.push({type:'key',val:buf.replace(/^\./,'')});tokens.push({type:'recursive'});buf='';i++;}
    else{buf+=c;}
  }
  if(buf)tokens.push({type:'key',val:buf.replace(/^\./,'')});
  let current=[obj];
  for(const tok of tokens){
    if(tok.type==='key'){
      if(tok.val==='*'){current=current.flatMap(c=>Array.isArray(c)?c:typeof c==='object'&&c?Object.values(c):[]);}
      else if(tok.val){current=current.map(c=>typeof c==='object'&&c?c[tok.val]:undefined).filter(v=>v!==undefined);}
    } else if(tok.type==='bracket'){
      const inner=tok.val.slice(1,-1).trim();
      if(inner==='*'){current=current.flatMap(c=>Array.isArray(c)?c:typeof c==='object'&&c?Object.values(c):[]);}
      else if(inner.startsWith('?(')){current=current.flatMap(c=>Array.isArray(c)?evaluateFilter(c,inner):[]);}
      else{
        const idx=parseInt(inner);
        if(!isNaN(idx)){current=current.map(c=>Array.isArray(c)?c[idx<0?c.length+idx:idx]:undefined).filter(v=>v!==undefined);}
      }
    } else if(tok.type==='recursive'){
      const all=[];
      function recurse(v){all.push(v);if(typeof v==='object'&&v)Object.values(v).forEach(recurse);}
      current.forEach(recurse);current=all;
    }
  }
  return current;
}
function evaluate(){
  const t=_i18n[_lang];
  const rb=document.getElementById('resultBox');
  let obj;
  try{obj=JSON.parse(document.getElementById('jsonIn').value);}catch(e){rb.className='result-box err';rb.textContent=t.errParse+e.message;return;}
  const path=document.getElementById('pathIn').value.trim();
  if(!path){rb.className='result-box';rb.textContent='';return;}
  try{
    const res=jsonPath(obj,path);
    if(res.length===0){rb.className='result-box';rb.textContent=t.noMatch;}
    else{rb.className='result-box ok';rb.textContent=JSON.stringify(res.length===1?res[0]:res,null,2);}
  }catch(e){rb.className='result-box err';rb.textContent=e.message;}
}
_lang=detectLang();applyLang();
