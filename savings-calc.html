<body>
<header>
  <div class="dot"></div>
  <span class="header-label">MODOO HUB</span>
  <a href="index.html" class="back-link">← 모두의 툴</a>
  <div class="lang-toggle" onclick="cycleLang()" id="langBtn">🌐 EN</div>
</header>
<main>
  <h1><span>적금 만기</span><br>계산기</h1>
  <p class="subtitle">월 납입액·금리·기간으로 만기 수령액 계산 · 이자과세 15.4% 자동 반영</p>

  <div class="card">
    <label data-i18n="saveMonthly">월 납입액</label>
    <div class="input-wrap">
      <input type="number" id="monthly" placeholder="0" oninput="calc()">
      <span class="unit" data-i18n="saveUnit">만원</span>
    </div>
    <div class="quick-btns">
      <div class="qbtn" onclick="setVal('monthly',10)">10만</div>
      <div class="qbtn" onclick="setVal('monthly',30)">30만</div>
      <div class="qbtn" onclick="setVal('monthly',50)">50만</div>
      <div class="qbtn" onclick="setVal('monthly',100)">100만</div>
    </div>
  </div>

  <div class="card">
    <label data-i18n="saveRate">연 금리</label>
    <div class="input-wrap">
      <input type="number" id="rate" placeholder="0.0" step="0.01" oninput="calc()">
      <span class="unit">%</span>
    </div>
    <div class="quick-btns">
      <div class="qbtn" onclick="setVal('rate',3)">3%</div>
      <div class="qbtn" onclick="setVal('rate',3.5)">3.5%</div>
      <div class="qbtn" onclick="setVal('rate',4)">4%</div>
      <div class="qbtn" onclick="setVal('rate',5)">5%</div>
    </div>
  </div>

  <div class="card">
    <label data-i18n="savePeriod">저축 기간</label>
    <div class="radio-row" id="period">
      <div class="rbtn" onclick="sel(this,'period');calc()" data-val="6" data-i18n="save6mo">6개월</div>
      <div class="rbtn on" onclick="sel(this,'period');calc()" data-val="12" data-i18n="save12mo">12개월</div>
      <div class="rbtn" onclick="sel(this,'period');calc()" data-val="24" data-i18n="save24mo">24개월</div>
      <div class="rbtn" onclick="sel(this,'period');calc()" data-val="36" data-i18n="save36mo">36개월</div>
    </div>
  </div>

  <div class="card">
    <label data-i18n="saveTaxType">이자 과세 유형</label>
    <div class="radio-row" id="taxType">
      <div class="rbtn on" onclick="sel(this,'taxType');calc()" data-val="0.154" data-i18n="saveTax154">일반과세 15.4%</div>
      <div class="rbtn" onclick="sel(this,'taxType');calc()" data-val="0" data-i18n="saveTax0">비과세 (ISA 등)</div>
      <div class="rbtn" onclick="sel(this,'taxType');calc()" data-val="0.099" data-i18n="saveTax99">저율과세 9.9%</div>
    </div>
  </div>

  <div class="result" id="result">
    <div class="big-num" id="r_recv">—</div>
    <div class="big-label" data-i18n="saveAfterTaxTitle">세후 만기 수령액</div>
    <div class="divider"></div>
    <div class="row"><span class="lk" data-i18n="savePrincipalLabel">총 납입 원금</span><span class="lv" id="r_principal">—</span></div>
    <div class="row"><span class="lk" data-i18n="savePreTaxInt">세전 이자</span><span class="lv green" id="r_interest">—</span></div>
    <div class="row"><span class="lk" data-i18n="saveIntTax">이자 세금</span><span class="lv red" id="r_tax">—</span></div>
    <div class="row"><span class="lk" data-i18n="saveAfterTaxInt">세후 이자</span><span class="lv green" id="r_netInt">—</span></div>
    <div class="divider"></div>
    <div class="row"><span class="lk" data-i18n="saveAfterTaxTotal">세후 만기 수령액</span><span class="lv green" style="font-size:16px" id="r_total">—</span></div>
    <div class="row"><span class="lk" data-i18n="saveEffRate">실효 세후 수익률</span><span class="lv yellow" id="r_eff">—</span></div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:0%"></div>
    </div>
    <div class="progress-labels">
      <span id="pl_principal">원금</span>
      <span id="pl_interest">이자</span>
    </div>
  </div>
  <div class="seo" data-i18n="seoHtml"><h2>적금 만기 계산기 가이드</h2></div>
  <footer>© 2026 MODOO HUB · Free · <a href="privacy.html" style="color:var(--text-dim);text-decoration:none;">Privacy Policy</a></footer>
</main>
<script>
function fmt(n){return Math.round(n).toLocaleString('ko-KR');}
function fmtW(n){const u=typeof _lang!=='undefined'?(_lang==='zh'?'万韩元':_lang==='en'?' (×10K KRW)':'만원'):'만원';return fmt(n)+u;}
function setVal(id,v){document.getElementById(id).value=v;calc();}
function sel(el,g){document.querySelectorAll('#'+g+' .rbtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');}
function getVal(g){return document.querySelector('#'+g+' .rbtn.on')?.dataset.val||'';}

function calc(){
  const m=parseFloat(document.getElementById('monthly').value)||0;
  const r=parseFloat(document.getElementById('rate').value)||0;
  if(m<=0||r<=0){document.getElementById('result').style.display='none';return;}

  const months=parseInt(getVal('period'))||12;
  const _tv=getVal('taxType');
  const taxRate=_tv!==''?parseFloat(_tv):0.154;

  // 적금 이자 = 월 납입 × 연이율/12 × (n*(n+1)/2) / n ... 단리 방식
  const monthlyRate=r/100/12;
  let totalInterest=0;
  for(let i=1;i<=months;i++){
    totalInterest+=m*monthlyRate*(months-i+1);
  }
  const principal=m*months;
  const taxAmt=totalInterest*taxRate;
  const netInt=totalInterest-taxAmt;
  const total=principal+netInt;
  const effRate=(netInt/principal)*(12/months)*100;

  document.getElementById('result').style.display='block';
  document.getElementById('r_principal').textContent=fmtW(principal);
  document.getElementById('r_interest').textContent='+'+fmtW(totalInterest);
  document.getElementById('r_tax').textContent='-'+fmtW(taxAmt);
  document.getElementById('r_netInt').textContent='+'+fmtW(netInt);
  document.getElementById('r_total').textContent=fmtW(total);
  document.getElementById('r_recv').textContent=fmtW(total);
  const _yr=typeof _lang!=='undefined'?(_lang==='zh'?'年':_lang==='en'?'yr':'년'):'년';
  document.getElementById('r_eff').textContent=effRate.toFixed(2)+'%/'+_yr;

  const pct=(netInt/total*100).toFixed(1);
  document.getElementById('progress').style.width=pct+'%';
  const _lt=typeof _i18n!=='undefined'&&_i18n[typeof _lang!=='undefined'?_lang:'ko']||{};
  document.getElementById('pl_principal').textContent=(_lt.savePrincipalShort||'원금')+' '+fmtW(principal);
  document.getElementById('pl_interest').textContent=(_lt.saveInterestShort||'이자')+' '+fmtW(netInt);
}
</script>

  ko: { lang:'ko', title:'적금 만기 계산기 2026 - 이자·세후 수령액 계산', h1:'적금 만기계산기', sub:'월 납입액·금리·기간으로 만기 수령액 계산. 이자과세 15.4% 자동 반영.', btn:'🌐 EN',
  saveAfterTaxTitle:'세후 만기 수령액', savePrincipalLabel:'총 납입 원금', savePreTaxInt:'세전 이자',

  saveEffRate:'실효 세후 수익률', savePrincipalShort:'원금', saveInterestShort:'이자',
  seoHtml:`<h2>적금 만기 계산기 완벽 가이드</h2><p>적금은 매달 일정 금액을 저축하면 만기 시 원금과 이자를 수령하는 금융상품입니다. 이자 계산 공식(단리 방식): 총 이자 = 월 납입액 × (연이율/12) × n(n+1)/2. 예: 월 50만원, 연이율 4%, 12개월 → 총 이자 ≈ 130,000원, 세전. 이자 과세 유형: 일반과세 15.4%(이자소득세 14% + 지방소득세 1.4%), 세금우대(저율과세) 9.9%, 비과세(ISA 특례, 장기저축 등). 실효 세후 수익률 = 세후 이자 / 총 납입 원금 × (12/기간 개월수). 은행별 금리 비교 후 최적 상품을 선택하는 데 활용하세요.</p><h3 class="seo-sub">활용 예시</h3><ul class="seo-ul"><li>월 30만원, 연 3.5%, 12개월 일반과세 → 세후 만기 수령액 계산</li><li>월 100만원, 연 4%, 24개월 비과세(ISA) → 이자 전액 수령 시뮬레이션</li><li>3.5% vs 4.0% 상품 12개월 비교 → 이자 차이 확인</li><li>저율과세(9.9%) vs 일반과세(15.4%) → 세금 절약 효과 비교</li><li>은퇴 자금 마련: 월 200만원, 연 5%, 36개월 만기 수령액 계산</li><li>목표 금액(5,000만원) 달성에 필요한 월 납입액 역산</li></ul><h3 class="seo-sub">자주 묻는 질문</h3><details class="faq-item"><summary>Q. 적금 이자는 어떻게 계산되나요?</summary><p>단리 방식(대부분의 적금): 총 이자 = 월 납입액 × 월이율 × Σ(n부터 1까지 잔여 개월). 공식: 월 납입액 × (연이율/12) × n(n+1)/2. 예: 월 50만원, 연 4%, 12개월 → 이자 = 500,000 × (0.04/12) × 78 ≈ 130,000원.</p></details><details class="faq-item"><summary>Q. 이자 세율은 몇 퍼센트인가요?</summary><p>일반과세: 15.4%(이자소득세 14% + 지방소득세 1.4%). 저율과세(세금우대): 9.9%(1인당 3,000만원 한도, 장애인·노인 등). 비과세: ISA 만기·분리과세, 주택청약저축(연 240만원 한도), 비과세종합저축(65세 이상·장애인 5,000만원 한도).</p></details><details class="faq-item"><summary>Q. ISA 계좌를 이용하면 이자를 더 받을 수 있나요?</summary><p>ISA(개인종합자산관리계좌)는 연간 2,000만원(5년 총 1억원) 납입 가능, 만기 시 순이익 200만원(서민형 400만원) 이하 비과세, 초과분은 9.9% 분리과세. 일반과세 15.4% 대비 세금 절약 효과가 큽니다.</p></details><details class="faq-item"><summary>Q. 적금과 예금의 차이는?</summary><p>적금: 매달 일정 금액을 납입, 만기 시 수령. 예금: 목돈을 한 번에 맡기고 만기 수령. 같은 금리라면 목돈 예금이 이자가 더 많습니다. 예: 1,200만원 일시 예금 vs 월 100만원 적금 → 일시 예금의 이자가 약 2배.</p></details><details class="faq-item"><summary>Q. 실효 수익률이란?</summary><p>실제로 받는 세후 이자를 연 기준으로 환산한 수익률. 실효 세후 수익률 = 세후 이자 / 총 납입 원금 × (12/기간 개월수) × 100. 다른 금융 상품(펀드, ETF 등)과 수익률을 비교할 때 사용합니다.</p></details><details class="faq-item"><summary>Q. 복리 적금 상품은 있나요?</summary><p>대부분의 정기적금은 단리를 적용합니다. 복리 적금은 일부 은행·저축은행에서 취급하며, 장기(2~3년) 상품에서 단리 대비 약간의 추가 이자를 기대할 수 있습니다. 이 계산기는 단리 기준으로 계산됩니다.</p></details><details class="faq-item"><summary>Q. 중도 해지하면 이자를 다 받을 수 있나요?</summary><p>아니요. 중도 해지 시 약정 금리가 아닌 중도 해지 금리(보통 약정 금리의 30~50%)가 적용됩니다. 긴급 자금 필요 시 해지 대신 적금 담보 대출 또는 마이너스 통장 활용을 먼저 검토하세요.</p></details><details class="faq-item"><summary>Q. 저축은행 적금이 시중 은행보다 금리가 높은 이유는?</summary><p>저축은행은 시중 은행보다 신용도가 낮아 고금리로 자금을 조달합니다. 예금자보호법에 따라 1인당 5,000만원(원금+이자 합산)까지 보호되므로, 5,000만원 이하 범위에서는 안전하게 고금리 혜택을 누릴 수 있습니다.</p></details><details class="faq-item"><summary>Q. 비과세 한도를 초과한 이자는 어떻게 과세되나요?</summary><p>ISA에서 비과세 한도(200만원/서민형 400만원) 초과분은 9.9% 분리과세로 납부. 일반 금융 계좌에서 연간 금융 소득이 2,000만원을 초과하면 다른 소득과 합산해 누진 종합소득세가 적용됩니다.</p></details><details class="faq-item"><summary>Q. 주택청약종합저축의 이자는 비과세인가요?</summary><p>주택청약종합저축은 연 납입액 240만원 한도로 소득공제(연봉 7,000만원 이하 무주택 세대주, 40% 공제) 혜택이 있습니다. 이자는 1.5~2.1%로 비과세 적용(비과세종합저축에 포함 시). 청약 목적 외에도 세금 혜택을 활용할 수 있습니다.</p></details><details class="faq-item"><summary>Q. 목표 금액 달성을 위한 월 납입액은?</summary><p>목표 금액 T, 연이율 r, 기간 n개월 시: 단리 총 이자 = 월 납입 × r/12 × n(n+1)/2. 원금 = 월 납입 × n. 이 계산기에서 다양한 월 납입액을 입력해 목표 달성 가능 여부를 확인하세요.</p></details><details class="faq-item"><summary>Q. 연 금리가 같은 적금 상품이라도 이자가 다를 수 있나요?</summary><p>네. 복리/단리 방식, 이자 지급 시점(만기/중간), 세금 유형(일반/비과세)에 따라 실수령액이 달라집니다. 또한 저축 기간이 짧을수록 실효 이자율이 낮아 보일 수 있습니다. 이 계산기로 동일 금리 상품의 세후 수령액을 비교하세요.</p></details>` },
  en: { lang:'en', title:'Savings Calculator - Maturity Amount & After-tax Returns', h1:'Savings Calculator', sub:'Calculate maturity amount from monthly deposit, interest rate and term. Tax on interest auto-applied.', btn:'🌐 中文',
  saveMonthly:'Monthly Deposit', saveUnit:'10K KRW', saveRate:'Annual Rate', savePeriod:'Savings Term',
  save6mo:'6 Months', save12mo:'12 Months', save24mo:'24 Months', save36mo:'36 Months',
  saveTaxType:'Tax Type', saveTax154:'Standard Tax 15.4%', saveTax0:'Tax Free (ISA etc.)', saveTax99:'Low Tax 9.9%',
  saveAfterTaxTitle:'After-tax Maturity Amount', savePrincipalLabel:'Total Principal', savePreTaxInt:'Pre-tax Interest',
  saveIntTax:'Tax on Interest', saveAfterTaxInt:'After-tax Interest', saveAfterTaxTotal:'After-tax Maturity Amount',
  saveEffRate:'Effective After-tax Rate', savePrincipalShort:'Principal', saveInterestShort:'Interest',
  seoHtml:`<h2>Savings Calculator — Complete Guide</h2><p>A regular savings plan (installment savings) lets you deposit a fixed amount each month, earning interest on each deposit for its remaining term. Simple interest formula: Total Interest = Monthly Deposit × (Annual Rate/12) × n(n+1)/2. Example: ₩500K/month, 4% annual rate, 12 months → interest ≈ ₩130,000 before tax. Korean tax rates: Standard 15.4% (income tax 14% + local tax 1.4%), preferential rate 9.9%, tax-free (ISA special account). Effective after-tax return = after-tax interest / total principal × (12/months). Use this calculator to compare savings products and maximize your take-home interest.</p><h3 class="seo-sub">Usage Examples</h3><ul class="seo-ul"><li>₩300K/month, 3.5%, 12 months at standard 15.4% tax → calculate after-tax maturity amount</li><li>₩1M/month, 4%, 24 months with ISA tax-free → full interest retention simulation</li><li>Compare 3.5% vs 4.0% products for 12 months → see exact interest difference</li><li>Preferential tax 9.9% vs standard 15.4% → calculate tax saving benefit</li><li>₩2M/month, 5%, 36 months → calculate retirement fund accumulation</li><li>Target amount ₩50M → reverse-calculate required monthly deposit</li></ul><h3 class="seo-sub">Frequently Asked Questions</h3><details class="faq-item"><summary>Q. How is installment savings interest calculated?</summary><p>Simple interest method (most Korean savings accounts): Total Interest = Monthly deposit × (annual rate/12) × n(n+1)/2. Where n = term in months. Example: ₩500K/month at 4% annual, 12 months → Interest = 500,000 × (0.04/12) × 78 ≈ ₩130,000 before tax.</p></details><details class="faq-item"><summary>Q. What are the interest tax rates in Korea?</summary><p>Standard rate: 15.4% (14% income tax + 1.4% local tax). Preferential/tax-advantaged rate: 9.9% (up to ₩30M per person, for elderly/disabled). Tax-free: ISA maturity, long-term housing savings (₩2.4M/year limit), senior/disabled tax-free savings (up to ₩50M).</p></details><details class="faq-item"><summary>Q. How does an ISA account save on interest tax?</summary><p>Korea's ISA (Individual Savings Account) allows up to ₩20M/year (₩100M total over 5 years). On maturity, the first ₩2M of net income is tax-free (₩4M for low-income), and excess is taxed at 9.9% (vs 15.4% standard). Significant tax savings for those with substantial interest income.</p></details><details class="faq-item"><summary>Q. What is the difference between installment savings and fixed deposit?</summary><p>Installment savings: deposit monthly, receive at maturity. Fixed deposit: invest lump sum, receive at maturity. Same rate: lump sum fixed deposit earns more interest. Example: ₩12M fixed deposit vs ₩1M/month installment savings — lump sum earns roughly twice the interest at the same rate.</p></details><details class="faq-item"><summary>Q. What is the effective after-tax rate?</summary><p>Effective after-tax rate = (after-tax interest / total principal) × (12 / months) × 100. Annualizes the actual return for comparison with other products (funds, ETFs, bonds). Use it to compare savings accounts across different terms and tax treatments.</p></details><details class="faq-item"><summary>Q. Are there compound interest savings accounts?</summary><p>Most Korean regular savings accounts use simple interest. Some banks and savings banks offer compound interest products, providing marginally higher returns over long terms (2–3 years). This calculator uses simple interest, which applies to most standard Korean savings products.</p></details><details class="faq-item"><summary>Q. What happens if I make an early withdrawal?</summary><p>Early termination typically applies a reduced early-termination rate (usually 30–50% of the contracted rate). Instead of early termination, consider a savings-collateral loan or revolving credit line first — these preserve your full interest on the savings account while providing emergency funds.</p></details><details class="faq-item"><summary>Q. Why do mutual savings banks offer higher rates?</summary><p>Mutual savings banks (저축은행) compensate for lower credit ratings with higher rates. Korean deposit protection covers up to ₩50M per depositor per institution (principal + interest combined). Within the ₩50M limit, mutual savings bank accounts are safe while offering higher yields.</p></details><details class="faq-item"><summary>Q. How is interest taxed if I exceed the ISA tax-free limit?</summary><p>For ISA: income above the tax-free limit (₩2M/₩4M) is taxed at 9.9% separately. For regular accounts: if total financial income exceeds ₩20M/year, it is added to other income and subject to progressive comprehensive income tax (최고 49.5%). High earners should prioritize tax-advantaged accounts.</p></details><details class="faq-item"><summary>Q. Does Korea's housing subscription savings (청약) offer tax benefits?</summary><p>Korea's Housing Subscription Savings (주택청약종합저축) offers a 40% income deduction on contributions up to ₩2.4M/year for single-earner households earning below ₩70M. Interest rates are 1.5–2.1%. The tax deduction benefit often outweighs the interest income for eligible savers.</p></details><details class="faq-item"><summary>Q. How do I find the monthly deposit needed to reach a target amount?</summary><p>Target: T = M×n + M×(r/12)×n(n+1)/2 (before tax). Solve for M: M = T / (n + (r/12)×n(n+1)/2). Try different monthly amounts in this calculator until the after-tax maturity total matches your goal. For a tax-free account, the before-tax and after-tax amounts will be the same.</p></details><details class="faq-item"><summary>Q. Can two products with the same rate still have different returns?</summary><p>Yes. Compound vs simple interest, timing of interest payment (maturity vs periodic), and tax treatment all affect take-home amounts. A savings product with a slightly lower nominal rate but tax-free status may outperform a higher-rate standard-tax product. Use this calculator to compare side-by-side.</p></details>` },
  zh: { lang:'zh', title:'定期储蓄计算器 - 到期金额计算', h1:'定期储蓄计算器', sub:'根据月存款、利率和期限计算到期金额。自动计算利息税。', btn:'🌐 日本語',
  saveMonthly:'月存款额', saveUnit:'万韩元', saveRate:'年利率', savePeriod:'储蓄期限',
  save6mo:'6个月', save12mo:'12个月', save24mo:'24个月', save36mo:'36个月',
  saveTaxType:'税务类型', saveTax154:'普通税 15.4%', saveTax0:'免税 (ISA等)', saveTax99:'低税 9.9%',
  saveAfterTaxTitle:'税后到期金额', savePrincipalLabel:'总本金', savePreTaxInt:'税前利息',
  saveIntTax:'利息税', saveAfterTaxInt:'税后利息', saveAfterTaxTotal:'税后到期金额',
  saveEffRate:'实际税后收益率', savePrincipalShort:'本金', saveInterestShort:'利息',
  seoHtml:`<h2>定期储蓄计算器完全指南</h2><p>定期储蓄（分期存款）让您每月存入固定金额，到期后一次性获得本金和利息。单利计算公式：总利息 = 月存款 × (年利率/12) × n(n+1)/2。示例：月存₩50万，年利率4%，12个月 → 税前利息约₩130,000。韩国利息税率：普通税15.4%（所得税14%+地方税1.4%），优惠税率9.9%，免税（ISA特殊账户等）。税后实效收益率 = 税后利息 / 总本金 × (12/月数)。使用本计算器比较储蓄产品，最大化到手利息。</p><h3 class="seo-sub">使用示例</h3><ul class="seo-ul"><li>月存₩30万，3.5%，12个月，普通税15.4% → 计算税后到期金额</li><li>月存₩100万，4%，24个月，ISA免税 → 利息全额保留模拟</li><li>3.5%与4.0%产品12个月对比 → 查看利息差异</li><li>优惠税率9.9%与普通税15.4%对比 → 计算节税效果</li><li>月存₩200万，5%，36个月 → 退休金积累计算</li><li>目标金额₩5000万 → 反推所需月存款额</li></ul><h3 class="seo-sub">常见问题</h3><details class="faq-item"><summary>Q. 分期存款利息是如何计算的？</summary><p>单利法（大多数韩国储蓄账户）：总利息 = 月存款 × (年利率/12) × n(n+1)/2。n=期限月数。示例：月存₩50万，年利率4%，12个月 → 利息 = 500,000 × (0.04/12) × 78 ≈ ₩130,000（税前）。</p></details><details class="faq-item"><summary>Q. 韩国利息税率是多少？</summary><p>普通税率：15.4%（所得税14%+地方税1.4%）。优惠/税收减免税率：9.9%（每人最高₩3000万，适用于老年人/残障人士等）。免税：ISA到期、长期住房储蓄（年限₩240万）、老年人/残障人士免税储蓄（最高₩5000万）。</p></details><details class="faq-item"><summary>Q. ISA账户如何节省利息税？</summary><p>韩国ISA（个人综合资产管理账户）每年最多存入₩2000万（5年总计₩1亿）。到期时前₩200万净收益免税（低收入者₩400万），超出部分按9.9%分离课税（相比普通15.4%）。对利息收入较多的储户节税效果显著。</p></details><details class="faq-item"><summary>Q. 分期存款和定期存款有什么区别？</summary><p>分期存款：每月定额存入，到期一次性领取。定期存款：一次性存入大额资金，到期领取。相同利率下，定期存款利息更高。示例：一次性存₩1200万 vs 每月存₩100万（12个月） → 一次性存款利息约为分期的两倍。</p></details><details class="faq-item"><summary>Q. 税后实效收益率是什么？</summary><p>税后实效收益率 = (税后利息 / 总本金) × (12/月数) × 100，将实际收益年化便于与其他产品（基金、ETF、债券）比较。使用此指标对比不同期限和税率处理的储蓄账户。</p></details><details class="faq-item"><summary>Q. 有复利储蓄账户吗？</summary><p>大多数韩国定期储蓄账户使用单利。部分银行和储蓄银行提供复利产品，在较长期限（2~3年）下可获得略高于单利的收益。本计算器使用单利计算，适用于大多数标准韩国储蓄产品。</p></details><details class="faq-item"><summary>Q. 提前支取会怎样？</summary><p>提前终止通常适用较低的提前解约利率（通常为约定利率的30~50%）。在紧急情况下，可考虑以储蓄为抵押申请贷款或使用循环信用额度，这样既保留全额利息又能获得应急资金。</p></details><details class="faq-item"><summary>Q. 为什么储蓄银行（互助储蓄银行）利率更高？</summary><p>互助储蓄银行（저축은행）因信用评级较低而以高利率吸引存款。韩国存款保险每人每家机构最高保障₩5000万（含本金和利息）。在₩5000万限额内，储蓄银行账户既安全又能享受更高收益。</p></details><details class="faq-item"><summary>Q. 超出ISA免税限额的利息如何征税？</summary><p>ISA中超出免税额（₩200万/₩400万）的部分按9.9%单独课税。普通账户中，若年度金融收入超过₩2000万，将与其他收入合并按累进综合所得税征税（最高49.5%）。高收入者应优先使用税收优惠账户。</p></details><details class="faq-item"><summary>Q. 韩国住房认购储蓄（청약）有税收优惠吗？</summary><p>韩国住房认购综合储蓄（주택청약종합저축）对年收入₩7000万以下的无房家庭户主，每年最高₩240万缴存额可享受40%所得扣除。利率1.5~2.1%。对符合条件的储户而言，税收扣除优惠通常超过利息收益本身。</p></details><details class="faq-item"><summary>Q. 如何计算达到目标所需的月存款额？</summary><p>目标金额 T = M×n + M×(r/12)×n(n+1)/2（税前）。求解M：M = T / (n + (r/12)×n(n+1)/2)。在本计算器中尝试不同月存款额，直到税后到期总额与目标匹配。对于免税账户，税前和税后金额相同。</p></details><details class="faq-item"><summary>Q. 同一利率的两款产品可能收益不同吗？</summary><p>是的。复利与单利计算、利息支付时机（到期vs定期）、税率处理方式（普通税/非课税）都会影响实际收益。利率略低但免税的产品可能优于高利率的普通税产品。使用本计算器进行并排比较。</p></details>` },

  seoHtml:`<h2>積立満期計算機 完全ガイド</h2><p>積立貯蓄（分割払い型定期預金）は毎月一定額を積み立て、満期時に元本と利息を受け取る金融商品です。単利計算式：総利息 = 月積立額 × (年利率/12) × n(n+1)/2。例：月50万ウォン、年利4%、12ヶ月 → 税引前利息約13万ウォン。韓国の利息課税：一般課税15.4%（所得税14%+地方税1.4%）、優遇税率9.9%（障害者・高齢者等向け）、非課税（ISA特例等）。税引後実効収益率 = 税引後利息 / 総元金 × (12/月数)。本計算機で預金商品を比較し、手取り利息を最大化しましょう。</p><h3 class="seo-sub">活用例</h3><ul class="seo-ul"><li>月30万ウォン、3.5%、12ヶ月、一般課税15.4% → 税引後満期受取額を計算</li><li>月100万ウォン、4%、24ヶ月、ISA非課税 → 利息全額受取シミュレーション</li><li>3.5%と4.0%の商品を12ヶ月で比較 → 利息差を確認</li><li>優遇税率9.9%と一般課税15.4%を比較 → 節税効果を計算</li><li>月200万ウォン、5%、36ヶ月 → 老後資金の積み立て計算</li><li>目標金額5,000万ウォン → 必要な月積立額を逆算</li></ul><h3 class="seo-sub">よくある質問</h3><details class="faq-item"><summary>Q. 積立預金の利息はどのように計算されますか？</summary><p>単利法（韓国の大多数の積立預金）：総利息 = 月積立額 × (年利率/12) × n(n+1)/2。n=期間（月数）。例：月50万ウォン、年利4%、12ヶ月 → 利息 = 500,000 × (0.04/12) × 78 ≈ 13万ウォン（税引前）。</p></details><details class="faq-item"><summary>Q. 韓国の利息税率は？</summary><p>一般課税：15.4%（所得税14%+地方税1.4%）。優遇/税優遇税率：9.9%（1人あたり3,000万ウォン上限、高齢者・障害者等向け）。非課税：ISA満期、長期住宅貯蓄（年240万ウォン限度）、高齢者・障害者向け非課税総合貯蓄（5,000万ウォン上限）。</p></details><details class="faq-item"><summary>Q. ISA口座はどのように節税できますか？</summary><p>韓国のISA（個人総合資産管理口座）は年間2,000万ウォン（5年総額1億ウォン）まで積み立て可能。満期時に純利益200万ウォン以下（低所得者400万ウォン）は非課税、超過分は9.9%の分離課税（通常の15.4%より低い）。利息収入が多い方に大きな節税効果があります。</p></details><details class="faq-item"><summary>Q. 積立預金と定期預金の違いは？</summary><p>積立預金：毎月定額を積み立て、満期一括受取。定期預金：まとまった金額を一括預け入れ、満期受取。同じ金利なら一括定期預金の方が利息は多い。例：1,200万ウォン一括定期 vs 月100万ウォン積立（12ヶ月）→ 一括預金の利息は積立の約2倍。</p></details><details class="faq-item"><summary>Q. 実効税引後収益率とは何ですか？</summary><p>実効税引後収益率 = (税引後利息 / 総元金) × (12/月数) × 100。実際の手取りリターンを年率換算し、他の商品（ファンド・ETF・債券）と比較可能にします。異なる期間・税率の預金商品を比較する際に活用してください。</p></details><details class="faq-item"><summary>Q. 複利の積立預金はありますか？</summary><p>韓国の定期積立預金の大半は単利計算です。一部の銀行・貯蓄銀行では複利型商品も取り扱っており、長期（2〜3年）では単利より若干高い利息が期待できます。本計算機は単利計算を採用しており、一般的な韓国の積立預金に対応しています。</p></details><details class="faq-item"><summary>Q. 中途解約するとどうなりますか？</summary><p>中途解約すると、約定金利ではなく中途解約利率（通常は約定金利の30〜50%）が適用されます。緊急資金が必要な場合は、解約前に積立を担保とした貸付やカードローンを検討してください——これにより積立の利息を維持しながら資金を確保できます。</p></details><details class="faq-item"><summary>Q. 貯蓄銀行が高金利を提供できる理由は？</summary><p>韓国の相互貯蓄銀行（저축은행）は信用格付けが低い分、高金利で資金調達しています。韓国の預金保護制度では1人あたり1機関につき5,000万ウォン（元金+利息合計）まで保護されます。この限度内であれば、貯蓄銀行口座は安全に高利回りを享受できます。</p></details><details class="faq-item"><summary>Q. ISA非課税限度を超えた利息はどう課税されますか？</summary><p>ISAでは非課税限度（200万/400万ウォン）を超えた部分は9.9%の分離課税。通常口座では年間金融所得が2,000万ウォンを超えると他の所得と合算され、累進総合所得税（最高49.5%）が課されます。高所得者は税優遇口座の優先活用が重要です。</p></details><details class="faq-item"><summary>Q. 韓国の住宅청약貯蓄に税制優遇はありますか？</summary><p>주택청약종합저축は年収7,000万ウォン以下の無住宅世帯主に対し、年間最大240万ウォンの積立額に40%の所得控除が適用されます。金利は1.5〜2.1%で非課税適用の場合も。対象者にとっては税控除の恩恵が利息収入を上回ることも多いです。</p></details><details class="faq-item"><summary>Q. 目標金額達成に必要な月積立額はどう計算しますか？</summary><p>目標金額 T = M×n + M×(r/12)×n(n+1)/2（税引前）。Mの解：M = T / (n + (r/12)×n(n+1)/2)。本計算機でさまざまな月積立額を試し、税引後満期総額が目標に一致するまで調整してください。非課税口座の場合、税引前・後の金額は同じになります。</p></details><details class="faq-item"><summary>Q. 同じ金利の商品でも受取額が違うことはありますか？</summary><p>はい。複利・単利の計算方式、利息支払いのタイミング（満期一括か定期か）、税率の種類（一般課税/非課税）によって手取り額が変わります。名目金利がやや低くても非課税商品の方が一般課税商品を上回る場合もあります。本計算機で並べて比較してください。</p></details>` }
};
function _detectLang() {
  const u = new URLSearchParams(location.search).get('lang');
  if (u && _i18n[u]) return u;
  const s = localStorage.getItem('lang');
  if (s && _i18n[s]) return s;
  const n = navigator.language || '';
  if (n.startsWith('zh')) return 'zh';
  else if (n.startsWith('ja')) return 'ja';
  if (n.startsWith('ko')) return 'ko';
  return 'en';
}
let _lang = _detectLang();
function _applyLang() {
  const t = _i18n[_lang];
  document.documentElement.lang = t.lang;
  document.title = t.title;
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = t.btn;
  const h1 = document.querySelector('h1');
  if (h1) h1.innerHTML = t.h1;
  const sub = document.querySelector('.subtitle');
  if (sub) sub.textContent = t.sub;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if (v !== undefined) el.innerHTML = v;
  });
  const back = document.querySelector('.back-link');
  if (back) back.textContent = (_lang === 'ko') ? '← 모두의 툴' : (_lang === 'zh') ? '← 首页' : '← Home';
}
const _langOrder = ['ko','en','zh','ja'];
function cycleLang() {
  const idx = _langOrder.indexOf(_lang);
  _lang = _langOrder[(idx + 1) % _langOrder.length];
  localStorage.setItem('lang', _lang);
  const url = new URL(location.href);
  if (_lang === 'ko') { url.searchParams.delete('lang'); } else { url.searchParams.set('lang', _lang); }
  history.replaceState({}, '', url);
  _applyLang();
}
_applyLang();
</script>
