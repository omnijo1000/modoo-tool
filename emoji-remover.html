    seoHtml:`<h2>表情符号删除器</h2><p>一键自动<strong>检测并删除文本中的所有表情符号</strong>。可选清理删除后留下的多余空格，适用于数据预处理、邮件整理和数据库存储。</p>

function detectLang(){const u=new URLSearchParams(location.search).get('lang');if(u&&_i18n[u])return u;const s=localStorage.getItem('modoo_lang');if(s&&_i18n[s])return s;const n=(navigator.language||'').slice(0,2);return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';}
function cycleLang(){const i=LANGS.indexOf(_lang);_lang=LANGS[(i+1)%4];localStorage.setItem('modoo_lang',_lang);const u=new URL(location.href);u.searchParams.set('lang',_lang);history.replaceState({},'',u);applyLang();}
function getEmojis(s){
  const seg=new Intl.Segmenter(undefined,{granularity:'grapheme'});
  const re=/\p{Emoji}/u;
  return [...seg.segment(s)].map(x=>x.segment).filter(g=>re.test(g)&&!/^[0-9#*]$/.test(g));
}
function remove(){
  const raw=document.getElementById('inputArea').value;
  const seg=new Intl.Segmenter(undefined,{granularity:'grapheme'});
  const re=/\p{Emoji}/u;
  let removed=0;
  let out=[...seg.segment(raw)].map(x=>{
    const g=x.segment;
    if(re.test(g)&&!/^[0-9#*]$/.test(g)){removed++;return'';}
    return g;
  }).join('');
  if(document.getElementById('optSpace').checked)out=out.replace(/ {2,}/g,' ');
  if(document.getElementById('optTrim').checked)out=out.trim();
  document.getElementById('statRemoved').textContent=removed;
  document.getElementById('statBefore').textContent=[...raw].length;
  document.getElementById('statAfter').textContent=[...out].length;
  document.getElementById('outputArea').value=out;
}
function copyOut(){navigator.clipboard.writeText(document.getElementById('outputArea').value);}
function clearAll(){document.getElementById('inputArea').value='';remove();}
function applyLang(){
  const t=_i18n[_lang];document.documentElement.lang=_lang;document.title=t.pageTitle;
  document.getElementById('h1b').textContent=t.h1b;document.getElementById('subEl').textContent=t.sub;
  document.getElementById('backLink').textContent=t.backLink;document.getElementById('langBtn').textContent=t.langBtn;

  document.getElementById('outputLabel').textContent=t.outputLabel;document.getElementById('inputArea').placeholder=t.placeholder;

}
