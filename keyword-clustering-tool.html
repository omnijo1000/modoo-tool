<details class="faq-item"><summary>Q. 키워드 클러스터링이란 무엇인가요?</summary><p>A. 키워드 클러스터링은 의미적으로 유사하거나 공통 어근을 공유하는 키워드들을 그룹(클러스터)으로 분류하는 작업입니다. SEO에서는 하나의 콘텐츠 페이지가 여러 관련 키워드를 동시에 커버하도록 구성하여 검색 가시성을 극대화합니다. 수백 개의 키워드를 수작업으로 분류하는 대신 자동 클러스터링 도구를 활용하면 시간을 크게 절약할 수 있습니다.</p></details>

const LANGS = ['ko','en','zh','ja'];
let _lang = 'ko';
let _lastResult = null;

function detectLang(){
  const u = new URLSearchParams(location.search).get('lang');
  if(u && _i18n[u]) return u;
  const s = localStorage.getItem('modoo_lang');
  if(s && _i18n[s]) return s;
  const n = navigator.language?.slice(0,2);
  return n==='zh'?'zh':n==='ja'?'ja':n==='ko'?'ko':'en';
}

function cycleLang(){
  const idx = LANGS.indexOf(_lang);
  _lang = LANGS[(idx+1) % LANGS.length];
  localStorage.setItem('modoo_lang', _lang);
  const url = new URL(location.href);
  url.searchParams.set('lang', _lang);
  history.replaceState({}, '', url);
  applyLang();
}

function applyLang(){
  const t = _i18n[_lang];
  document.documentElement.lang = _lang;
  document.title = t.pageTitle;
  document.getElementById('h1El').innerHTML = t.h1;
  document.getElementById('subEl').textContent = t.sub;
  document.getElementById('backLink').textContent = t.backLink;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('labelKeywords').textContent = t.labelKeywords;
  document.getElementById('labelMinSize').textContent = t.labelMinSize;
  document.getElementById('labelMaxClusters').textContent = t.labelMaxClusters;
  document.getElementById('btnCluster').textContent = t.btnCluster;
  document.getElementById('btnSample').textContent = t.btnSample;
  document.getElementById('btnClear').textContent = t.btnClear;
  document.getElementById('btnCopyJson').textContent = t.btnCopyJson;
  document.getElementById('btnCopyText').textContent = t.btnCopyText;
  document.getElementById('labelResult').textContent = t.labelResult;
  document.getElementById('placeholderMsg').textContent = t.placeholderMsg;
  document.getElementById('seoDiv').innerHTML = t.seoHtml;
  if(_lastResult) renderResult(_lastResult);
}

function parseKeywords(raw, sep){
  let kws;
  if(sep === 'comma') {
    kws = raw.split(/,/).map(k => k.trim()).filter(k => k.length > 0);
  } else {
    kws = raw.split(/[\n,]/).map(k => k.trim()).filter(k => k.length > 0);
  }
  return [...new Set(kws)];
}

function cluster(keywords, minSize, maxClusters){
  const tokenMap = {};
  keywords.forEach(kw => {
    const tokens = kw.toLowerCase().replace(/[^a-z0-9가-힣\s]/g,'').split(/\s+/).filter(t => t.length > 1);
    tokens.forEach(t => {
      if(!tokenMap[t]) tokenMap[t] = [];
      tokenMap[t].push(kw);
    });
  });
  const sorted = Object.entries(tokenMap).sort((a,b) => b[1].length - a[1].length);
  const assigned = new Set();
  const clusters = [];
  for(const [token, kws] of sorted){
    if(clusters.length >= maxClusters) break;
    const unassigned = kws.filter(k => !assigned.has(k));
    if(unassigned.length >= minSize){
      clusters.push({name: token, keywords: unassigned});
      unassigned.forEach(k => assigned.add(k));
    }
  }
  const unclustered = keywords.filter(k => !assigned.has(k));
  return {clusters, unclustered};
}

function runCluster(){
  const raw = document.getElementById('kwInput').value.trim();
  if(!raw){ return; }
  const minSize = parseInt(document.getElementById('minSize').value) || 2;
  const maxClusters = parseInt(document.getElementById('maxClusters').value) || 20;
  const keywords = parseKeywords(raw, 'newline');
  _lastResult = cluster(keywords, minSize, maxClusters);
  _lastResult._total = keywords.length;
  renderResult(_lastResult);
}

function renderResult(res){
  const t = _i18n[_lang];
  const statsBar = document.getElementById('statsBar');
  const copyBtns = document.getElementById('copyBtns');
  const list = document.getElementById('clusterList');
  const ph = document.getElementById('placeholderMsg');

  statsBar.style.display = 'flex';
  copyBtns.style.display = 'flex';
  if(ph) ph.style.display = 'none';

  document.getElementById('statsText').textContent = t.statsText(res._total, res.clusters.length);

  let html = '';
  res.clusters.forEach((cl, i) => {
    const cc = 'cc' + (i % 6);
    html += `<div class="cluster-card ${cc}">
      <div class="cluster-header">
        <span class="cluster-name">${cl.name}</span>
        <span class="cluster-badge">${cl.keywords.length}</span>
      </div>
      <div class="cluster-kws">${cl.keywords.map(k => `<span class="kw-tag">${k}</span>`).join('')}</div>
    </div>`;
  });
  if(res.unclustered.length > 0){
    html += `<div class="cluster-card" style="border-color:var(--border)">
      <div class="cluster-header" style="background:var(--surface)">
        <span class="cluster-name" style="color:var(--text-dim)">${t.labelUnclustered}</span>
        <span class="cluster-badge" style="background:var(--surface2);color:var(--text-dim)">${res.unclustered.length}</span>
      </div>
      <div class="cluster-kws">${res.unclustered.map(k => `<span class="kw-tag">${k}</span>`).join('')}</div>
    </div>`;
  }
  list.innerHTML = html;
}

function loadSample(){
  document.getElementById('kwInput').value = SAMPLE_KEYWORDS[_lang] || SAMPLE_KEYWORDS.en;
}

function clearAll(){
  document.getElementById('kwInput').value = '';
  document.getElementById('clusterList').innerHTML = `<div class="placeholder-msg" id="placeholderMsg">${_i18n[_lang].placeholderMsg}</div>`;
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('copyBtns').style.display = 'none';
  _lastResult = null;
}

function copyJson(){
  if(!_lastResult) return;
  const obj = {
    clusters: _lastResult.clusters.map(c => ({name: c.name, keywords: c.keywords})),
    unclustered: _lastResult.unclustered,
  };
  const text = JSON.stringify(obj, null, 2);
  doCopy(text, document.getElementById('btnCopyJson'), _i18n[_lang].btnCopyJson);
}

function copyText(){
  if(!_lastResult) return;
  let lines = [];
  _lastResult.clusters.forEach(c => {
    lines.push(`[${c.name}]`);
    c.keywords.forEach(k => lines.push('  ' + k));
    lines.push('');
  });
  if(_lastResult.unclustered.length){
    lines.push('[unclustered]');
    _lastResult.unclustered.forEach(k => lines.push('  ' + k));
  }
  doCopy(lines.join('\n'), document.getElementById('btnCopyText'), _i18n[_lang].btnCopyText);
}

function doCopy(text, btn, origLabel){
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = _i18n[_lang].copyDone;
    setTimeout(() => { btn.textContent = origLabel; }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent = _i18n[_lang].copyDone;
    setTimeout(() => { btn.textContent = origLabel; }, 2000);
  });
}

_lang = detectLang();
applyLang();
</script>
